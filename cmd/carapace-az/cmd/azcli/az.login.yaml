# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: login
description: login
commands:
    - name: login
      description: Log in to access Azure subscriptions
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --allow-no-subscriptions=: Support accessing tenants without subscriptions.
        --certificate=: PEM file with key and public certificate.
        --client-id=: Client ID of the user-assigned managed identity
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --federated-token=: Federated token that can be used for OIDC token exchange.
        --object-id=: Object ID of the user-assigned managed identity
        --resource-id=: Resource ID of the user-assigned managed identity
        --scope=:
            description: Used in the /authorize request.
            nargs: -1
        --service-principal=: Log in with a service principal.
        --use-cert-sn-issuer=: Use Subject Name + Issuer (SN+I) authentication in order to support automatic certificate rolls.
        --use-device-code=: Use device code flow.
        -i, --identity=: Log in using managed identity
        -p, --password=: User password or service principal secret.
        -t, --tenant=: The Microsoft Entra tenant, must be provided when using a service principal.
        -u, --username=: User name, service principal client ID, or managed identity ID.
