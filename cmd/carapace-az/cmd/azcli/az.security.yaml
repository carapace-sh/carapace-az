# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: security
description: Manage your security posture with Microsoft Defender for Cloud.
commands:
    - name: adaptive-application-controls
      description: Enable control which applications can run on your Azure and non-Azure machines (Windows and Linux)
      commands:
        - name: list
          description: Adaptive Application Controls - List
          flags:
            --subscription=: Name or ID of subscription.
        - name: show
          description: Adaptive Application Controls - Get
          flags:
            --group-name=!: Name of an application control VM/server group
            --subscription=: Name or ID of subscription.
            -l, --location=: Location of the resource.
    - name: adaptive_network_hardenings
      description: View all Adaptive Network Hardening resources
      commands:
        - name: show
          description: Gets a single Adaptive Network Hardening resource.
          flags:
            --adaptive-network-hardenings-resource-name=!: Adaptive Network Hardening resource name
            --resource-name=!: Name of the resource
            --resource-namespace=!: The Namespace of the resource
            --resource-type=!: The type of the resource
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: list
          description: Gets a list of Adaptive Network Hardenings resources in scope of an extended resource.
          flags:
            --resource-name=!: Name of the resource
            --resource-namespace=!: The Namespace of the resource
            --resource-type=!: The type of the resource
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: alert
      description: View security alerts.
      commands:
        - name: show
          description: Shows a security alert.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -l, --location=!: location of the resource
            -n, --name=!: name of the resource to be fetched
        - name: list
          description: List security alerts.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -l, --location=: location of the resource
        - name: update
          description: Updates a security alert status.
          flags:
            --status=!: target status of the alert.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -l, --location=!: location of the resource
            -n, --name=!: name of the resource to be fetched
    - name: alerts-suppression-rule
      description: View and manage alerts suppression rules.
      commands:
        - name: delete
          description: Delete an alerts suppression rule.
          flags:
            --rule-name=!: The unique name of the alerts suppression rule.
            --subscription=: Name or ID of subscription.
        - name: show
          description: Shows an alerts suppression rule.
          flags:
            --rule-name=!: The unique name of the alerts suppression rule.
            --subscription=: Name or ID of subscription.
        - name: update
          description: Updates or create an alerts suppression rule.
          flags:
            --alert-type=!: Type of the alert to automatically suppress.
            --comment=: Any comment regarding the rule.
            --expiration-date-utc=: Expiration date of the rule, if value is not provided or provided as null this field will default to the maximum allowed expiration date.
            --reason=!: The reason for dismissing the alert.
            --rule-name=!: The unique name of the alerts suppression rule.
            --state=!: Possible states of the rule.
            --subscription=: Name or ID of subscription.
        - name: list
          description: List all alerts suppression rule on a subscription scope.
          flags:
            --subscription=: Name or ID of subscription.
        - name: delete_scope
          description: Delete an alerts suppression rule scope.
          flags:
            --field=!: Entity name.
            --rule-name=!: The unique name of the alerts suppression rule.
            --subscription=: Name or ID of subscription.
        - name: upsert_scope
          description: Update an alerts suppression rule with scope element.
          flags:
            --any-of=: A list of strings to scope the suppression rule by.
            --contains-substring=: The string to scope the suppression rule by.
            --field=!: Entity name.
            --rule-name=!: The unique name of the alerts suppression rule.
            --subscription=: Name or ID of subscription.
    - name: allowed_connections
      description: View all possible traffic between resources for the subscription and location, based on connection type.
      commands:
        - name: list
          description: list of all possible traffic between resources for the subscription.
          flags:
            --subscription=: Name or ID of subscription.
        - name: show
          description: List all possible traffic between resources for the subscription and location, based on connection type.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: name of the resource to be fetched
    - name: api-collection
      description: Discover, manage, and view security insights for API collections.
      commands:
        - name: apim
          description: Discover, manage, and view security insights for API collections from Azure API Management
          commands:
            - name: onboard
              description: Onboard an Azure API Management API to Microsoft Defender for APIs.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --no-wait=:
                    description: Do not wait for the long-running operation to finish.
                    nargs: -1
                --service-name=: The name of the API Management service.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: API revision identifier.
              completion:
                flag:
                    no-wait:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
            - name: wait
              description: Place the CLI in a waiting state until a condition is met.
              flags:
                --created=: wait until created with 'provisioningState' at 'Succeeded'
                --custom=: Wait until the condition satisfies a custom JMESPath query.
                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --interval=: polling interval in seconds
                --service-name=: The name of the API Management service.
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                -g, --resource-group=: Name of resource group.
                -n, --name=: API revision identifier.
            - name: offboard
              description: Offboard an Azure API Management API from Microsoft Defender for APIs.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --service-name=: The name of the API Management service.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: API revision identifier.
                -y, --yes=: Do not prompt for confirmation.
            - name: show
              description: Gets an Azure API Management API if it has been onboarded to Microsoft Defender for APIs.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --service-name=: The name of the API Management service.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: API revision identifier.
            - name: list
              description: Gets a list of API collections that have been onboarded to Microsoft Defender for APIs.
              flags:
                --max-items=: Total number of items to return in the command's output.
                --next-token=: Token to specify where to start paginating.
                --service-name=: The name of the API Management service.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
    - name: assessment
      description: View your security assessment results.
      commands:
        - name: delete
          description: Deletes a security assessment.
          flags:
            --assessed-resource-id=: The target resource for this assessment
            --subscription=: Name or ID of subscription.
            -n, --name=!: name of the resource to be fetched
        - name: show
          description: Shows a security assessment.
          flags:
            --assessed-resource-id=: The target resource for this assessment
            --subscription=: Name or ID of subscription.
            -n, --name=!: name of the resource to be fetched
        - name: list
          description: List all security assessment results.
          flags:
            --subscription=: Name or ID of subscription.
        - name: create
          description: Creates a customer managed security assessment.
          flags:
            --additional-data=: Data that is attached to the assessment result for better investigations or status clarity
            --assessed-resource-id=: The target resource for this assessment
            --status-cause=: Programmatic code for the cause of the assessment result
            --status-code=!: Programmatic code for the result of the assessment.
            --status-description=: Human readable description of the cause of the assessment result
            --subscription=: Name or ID of subscription.
            -n, --name=!: name of the resource to be fetched
    - name: assessment-metadata
      description: View your security assessment metadata.
      commands:
        - name: create
          description: Creates a customer managed security assessment type.
          flags:
            --description=!: Detailed string that will help users to understand the assessment and how it is calculated
            --display-name=!: Human readable title for this object
            --remediation-description=: Detailed string that will help users to understand the different ways to mitigate or fix the security issue
            --severity=!: Indicates the importance of the security risk if the assessment is unhealthy
            --subscription=: Name or ID of subscription.
            -n, --name=!: name of the resource to be fetched
        - name: list
          description: List all security assessment results.
          flags:
            --subscription=: Name or ID of subscription.
        - name: delete
          description: Deletes a security assessment type and all it's assessment results.
          flags:
            --subscription=: Name or ID of subscription.
            -n, --name=!: name of the resource to be fetched
        - name: show
          description: Shows a security assessment.
          flags:
            --subscription=: Name or ID of subscription.
            -n, --name=!: name of the resource to be fetched
    - name: atp
      description: View and manage Advanced Threat Protection settings.
      commands:
        - name: cosmosdb
          description: View and manage Advanced Threat Protection settings for Cosmos DB accounts.
          commands:
            - name: update
              description: Toggle status of Advanced Threat Protection for an Azure Cosmos DB account.
              flags:
                --cosmosdb-account=!: Name of an existing Cosmos DB account.
                --is-enabled=!:
                    description: Enable or disable Advanced Threat Protection for a received storage or Cosmos DB account.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
              completion:
                flag:
                    is-enabled:
                        - "true"
                        - "false"
            - name: show
              description: Display Advanced Threat Protection settings for an Azure Cosmos DB account.
              flags:
                --cosmosdb-account=!: Name of an existing Cosmos DB account.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
        - name: storage
          description: View and manage Advanced Threat Protection settings for storage accounts.
          commands:
            - name: show
              description: Display Advanced Threat Protection settings for a storage account.
              flags:
                --storage-account=!: Name of an existing Storage account.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: update
              description: Toggle status of Advanced Threat Protection for a storage account.
              flags:
                --is-enabled=!:
                    description: Enable or disable Advanced Threat Protection for a received storage or Cosmos DB account.
                    nargs: -1
                --storage-account=!: Name of an existing Storage account.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
              completion:
                flag:
                    is-enabled:
                        - "true"
                        - "false"
    - name: auto-provisioning-setting
      description: View your auto provisioning settings.
      commands:
        - name: update
          description: Updates your automatic provisioning settings on the subscription.
          flags:
            --auto-provision=!: Automatic provisioning toggle.
            --subscription=: Name or ID of subscription.
            -n, --name=!: name of the resource to be fetched
        - name: list
          description: List the auto provisioning settings.
          flags:
            --subscription=: Name or ID of subscription.
        - name: show
          description: Shows an auto provisioning setting.
          flags:
            --subscription=: Name or ID of subscription.
            -n, --name=!: name of the resource to be fetched
    - name: automation
      description: View your security automations.
      commands:
        - name: create_or_update
          description: Creates or update a security automation.
          flags:
            --actions=!: A collection of the actions which are triggered if all the configured rules evaluations, within at least one rule set, are true
            --description=: The security automation description
            --etag=: Entity tag is used for comparing two or more entities from the same requested resource
            --isEnabled=: Indicates whether the security automation is enabled
            --scopes=!: A collection of scopes on which the security automations logic is applied
            --sources=!: A collection of the source event types which evaluate the security automation set of rules
            --subscription=: Name or ID of subscription.
            --tags=: A list of key value pairs that describe the resource
            -g, --resource-group=!: Name of resource group.
            -l, --location=: location of the resource
            -n, --name=!: name of the resource to be fetched
        - name: show
          description: Shows a security automation.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: name of the resource to be fetched
        - name: validate
          description: Validates a security automation model before create or update.
          flags:
            --actions=!: A collection of the actions which are triggered if all the configured rules evaluations, within at least one rule set, are true
            --description=: The security automation description
            --etag=: Entity tag is used for comparing two or more entities from the same requested resource
            --isEnabled=: Indicates whether the security automation is enabled
            --scopes=!: A collection of scopes on which the security automations logic is applied
            --sources=!: A collection of the source event types which evaluate the security automation set of rules
            --subscription=: Name or ID of subscription.
            --tags=: A list of key value pairs that describe the resource
            -g, --resource-group=!: Name of resource group.
            -l, --location=: location of the resource
            -n, --name=!: name of the resource to be fetched
        - name: list
          description: List all security automations under subscription/resource group
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: delete
          description: Deletes a security automation.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: name of the resource to be fetched
    - name: automation-action-event-hub
      description: Creates security automation event hub action.
      commands:
        - name: create
          description: Creates security automation event hub action.
          flags:
            --connection-string=!: The target Event Hub connection string (it will not be included in any response)
            --event-hub-resource-id=!: The target Event Hub Azure Resource ID
            --sas-policy-name=: The target Event Hub SAS policy name
            --subscription=: Name or ID of subscription.
    - name: automation-action-logic-app
      description: Creates security automation logic app action.
      commands:
        - name: create
          description: Creates security automation logic app action.
          flags:
            --logic-app-resource-id=!: The triggered Logic App Azure Resource ID.
            --subscription=: Name or ID of subscription.
            --uri=!: The Logic App trigger URI endpoint (it will not be included in any response)
    - name: automation-action-workspace
      description: Creates security automation workspace action.
      commands:
        - name: create
          description: Creates security automation workspace action.
          flags:
            --subscription=: Name or ID of subscription.
            --workspace-resource-id=!: The fully qualified Log Analytics Workspace Azure Resource ID
    - name: automation-rule
      description: Creates security automation rule.
      commands:
        - name: create
          description: Creates security automation rule.
          flags:
            --expected-value=!: The expected value
            --operator=!: A valid comparer operator to use.
            --property-j-path=!: The JPath of the entity model property that should be checked
            --property-type=!: The data type of the compared operands (string, integer, floating point number or a boolean [true/false]]
            --subscription=: Name or ID of subscription.
    - name: automation-rule-set
      description: Creates security automation rule set.
      commands:
        - name: create
          description: Creates security automation rule set.
          flags:
            --rules=: A rule which is evaluated upon event interception.
            --subscription=: Name or ID of subscription.
    - name: automation-scope
      description: Creates security automation scope.
      commands:
        - name: create
          description: Creates security automation scope.
          flags:
            --description=!: The resources scope description
            --scope-path=!: The resources scope path.
            --subscription=: Name or ID of subscription.
    - name: automation-source
      description: Creates security automation source.
      commands:
        - name: create
          description: Creates security automation source.
          flags:
            --event-source=!: A valid event source type
            --rule-sets=: A set of rules which evaluate upon event interception.
            --subscription=: Name or ID of subscription.
    - name: contact
      description: View your security contacts.
      commands:
        - name: list
          description: List all security contact configurations for the subscription
          flags:
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
        - name: update
          description: Update security contact configurations for the subscription
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --alert-notifications=:
                description: Defines whether to send email notifications about new security alerts  Support shorthand-syntax, json-file and yaml-file.
                nargs: -1
            --emails=: List of email addresses which will get notifications from Microsoft Defender for Cloud by the configurations defined in this security contact.
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --notifications-by-role=:
                description: Defines whether to send email notifications from Microsoft Defender for Cloud to persons with specific RBAC roles on the subscription.
                nargs: -1
            --phone=: The security contact's phone number
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --name=: Name of the security contact object
          completion:
            flag:
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: show
          description: Get Default Security contact configurations for the subscription
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --name=: Name of the security contact object
        - name: create
          description: Creates a security contact.
          flags:
            --alert-notifications=:
                description: Defines whether to send email notifications about new security alerts  Support shorthand-syntax, json-file and yaml-file.
                nargs: -1
            --emails=: List of email addresses which will get notifications from Microsoft Defender for Cloud by the configurations defined in this security contact.
            --notifications-by-role=:
                description: Defines whether to send email notifications from Microsoft Defender for Cloud to persons with specific RBAC roles on the subscription.
                nargs: -1
            --phone=: The security contact's phone number
            --subscription=: Name or ID of subscription.
            -n, --name=!: Name of the security contact object
        - name: delete
          description: Delete security contact configurations for the subscription
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --name=: Name of the security contact object
            -y, --yes=: Do not prompt for confirmation.
    - name: discovered-security-solution
      description: View your discovered security solutions
      commands:
        - name: list
          description: List the discovered security solutions.
          flags:
            --subscription=: Name or ID of subscription.
        - name: show
          description: Shows a discovered security solution.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: name of the resource to be fetched
    - name: external-security-solution
      description: View your external security solutions
      commands:
        - name: list
          description: List the external security solutions.
          flags:
            --subscription=: Name or ID of subscription.
        - name: show
          description: Shows an external security solution.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: name of the resource to be fetched
    - name: iot-alerts
      description: View IoT Security aggregated alerts.
      commands:
        - name: delete
          description: Dismiss an aggregated IoT Security Alert.
          flags:
            --solution-name=!: Name of the IoT Security solution
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: name of the resource to be fetched
        - name: list
          description: List all yours IoT Security solution aggregated alerts.
          flags:
            --solution-name=!: Name of the IoT Security solution
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: show
          description: Shows a single aggregated alert of yours IoT Security solution.
          flags:
            --solution-name=!: Name of the IoT Security solution
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: name of the resource to be fetched
    - name: iot-analytics
      description: View IoT Security Analytics metrics.
      commands:
        - name: show
          description: Shows IoT Security Analytics metrics.
          flags:
            --solution-name=!: Name of the IoT Security solution
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: list
          description: List all IoT security Analytics metrics.
          flags:
            --solution-name=!: Name of the IoT Security solution
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: iot-recommendations
      description: View IoT Security aggregated recommendations.
      commands:
        - name: list
          description: List all yours IoT Security solution aggregated recommendations.
          flags:
            --solution-name=!: Name of the IoT Security solution
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: show
          description: Shows a single aggregated recommendation of yours IoT Security solution.
          flags:
            --solution-name=!: Name of the IoT Security solution
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: name of the resource to be fetched
    - name: iot-solution
      description: Manage your IoT Security solution.
      commands:
        - name: list
          description: List all IoT Security solutions.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: show
          description: Shows a IoT Security solution.
          flags:
            --solution-name=!: Name of the IoT Security solution
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: update
          description: Update your IoT Security solution.
          flags:
            --display-name=: Resource display name
            --iot-hubs=: IoT Hub resource IDs
            --solution-name=!: Name of the IoT Security solution
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: create
          description: Create your IoT Security solution.
          flags:
            --display-name=!: Resource display name
            --iot-hubs=!: IoT Hub resource IDs
            --solution-name=!: Name of the IoT Security solution
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -l, --location=!: location of the resource
        - name: delete
          description: Delete your IoT Security solution.
          flags:
            --solution-name=!: Name of the IoT Security solution
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: jit-policy
      description: Manage your Just in Time network access policies
      commands:
        - name: list
          description: List your Just in Time network access policies.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -l, --location=: location of the resource
        - name: show
          description: Shows a Just in Time network access policy.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -l, --location=!: location of the resource
            -n, --name=!: name of the resource to be fetched
    - name: location
      description: Shows the Microsoft Defender for Cloud Home region location.
      commands:
        - name: show
          description: Shows the Microsoft Defender for Cloud Home region location.
          flags:
            --subscription=: Name or ID of subscription.
            -n, --name=!: name of the resource to be fetched
        - name: list
          description: Shows the Microsoft Defender for Cloud Home region location.
          flags:
            --subscription=: Name or ID of subscription.
    - name: pricing
      description: Enables managing the Azure Defender plan for the subscription
      commands:
        - name: list
          description: Shows the Azure Defender plans for the subscription.
          flags:
            --subscription=: Name or ID of subscription.
        - name: create
          description: Updates the Azure defender plan for the subscription.
          flags:
            --extensions=:
                description: pricing extensions
                nargs: -1
            --subplan=: bundle suplan
            --subscription=: Name or ID of subscription.
            --tier=!: pricing tier type
            -n, --name=!: name of the resource to be fetched
        - name: show
          description: Shows the Azure Defender plan for the subscription
          flags:
            --subscription=: Name or ID of subscription.
            -n, --name=!: name of the resource to be fetched
    - name: regulatory-compliance-assessments
      description: regulatory compliance assessments.
      commands:
        - name: show
          description: Shows supported regulatory compliance details and state for selected assessment.
