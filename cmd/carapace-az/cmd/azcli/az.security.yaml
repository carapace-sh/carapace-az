    - name: contact
      commands:
        - name: update
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --alert-notifications=:
                description: Defines whether to send email notifications about new security alerts  Support shorthand-syntax, json-file and yaml-file.
                nargs: -1
            --emails=: List of email addresses which will get notifications from Microsoft Defender for Cloud by the configurations defined in this security contact.
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --notifications-by-role=:
                description: Defines whether to send email notifications from Microsoft Defender for Cloud to persons with specific RBAC roles on the subscription.
                nargs: -1
            --phone=: The security contact's phone number
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --name=: Name of the security contact object
          completion:
            flag:
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: delete
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --name=: Name of the security contact object
            -y, --yes=: Do not prompt for confirmation.
        - name: create
          flags:
            --alert-notifications=:
                description: Defines whether to send email notifications about new security alerts  Support shorthand-syntax, json-file and yaml-file.
                nargs: -1
            --emails=: List of email addresses which will get notifications from Microsoft Defender for Cloud by the configurations defined in this security contact.
            --notifications-by-role=:
                description: Defines whether to send email notifications from Microsoft Defender for Cloud to persons with specific RBAC roles on the subscription.
                nargs: -1
            --phone=: The security contact's phone number
            --subscription=: Name or ID of subscription.
            -n, --name=!: Name of the security contact object
        - name: list
          flags:
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
        - name: show
          flags:
            --ids=:
