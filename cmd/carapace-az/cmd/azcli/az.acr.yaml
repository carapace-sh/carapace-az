# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: acr
description: acr
commands:
    - name: agentpool
      commands:
        - name: create
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --no-wait=: Do not wait for the Agent Pool to complete action and return immediately after queuing the request.
            --os=: The os of the agent pool.
            --subnet-id=: The Virtual Network Subnet Resource Id of the agent machine.
            --subscription=: Name or ID of subscription.
            --tier=: Sets the VM your agent pool will run on.
            -c, --count=: The count of the agent pool.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the agent pool.
            -r, --registry=!: The name of the container registry.
        - name: update
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --no-wait=: Do not wait for the Agent Pool to complete action and return immediately after queuing the request.
            --subscription=: Name or ID of subscription.
            -c, --count=: The count of the agent pool.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the agent pool.
            -r, --registry=!: The name of the container registry.
        - name: show
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --queue-count=: Get only the queue count
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the agent pool.
            -r, --registry=!: The name of the container registry.
        - name: delete
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --no-wait=: Do not wait for the Agent Pool to complete action and return immediately after queuing the request.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the agent pool.
            -r, --registry=!: The name of the container registry.
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -r, --registry=!: The name of the container registry.
    - name: artifact-streaming
      commands:
        - name: create
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --no-wait=: Do not wait for the run to complete and return immediately after queuing the run.
            --subscription=: Name or ID of subscription.
            --suffix=: The tenant suffix in registry login server.
            -n, --name=!: The name of the container registry.
            -p, --password=: The password used to log into a container registry
            -t, --image=!: The name of the image.
            -u, --username=: The username used to log into a container registry
        - name: update
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --enable-streaming=!:
                description: Indicates whether artifact streaming is enabled for a repository.
                nargs: -1
            --repository=!: The name of the repository.
            --subscription=: Name or ID of subscription.
            --suffix=: The tenant suffix in registry login server.
            -n, --name=!: The name of the container registry.
            -p, --password=: The password used to log into a container registry
            -u, --username=: The username used to log into a container registry
          completion:
            flag:
                enable-streaming:
                    - "true"
                    - "false"
        - name: show
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --repository=!: The name of the repository.
            --subscription=: Name or ID of subscription.
            --suffix=: The tenant suffix in registry login server.
            -n, --name=!: The name of the container registry.
            -p, --password=: The password used to log into a container registry
            -u, --username=: The username used to log into a container registry
        - name: operation
          commands:
            - name: show
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=: The ID returned when creating a streaming artifact.
                --repository=: The name of the repository.
                --subscription=: Name or ID of subscription.
                --suffix=: The tenant suffix in registry login server.
                -n, --name=!: The name of the container registry.
                -p, --password=: The password used to log into a container registry
                -t, --image=: The name of the image.
                -u, --username=: The username used to log into a container registry
            - name: cancel
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=: The ID returned when creating a streaming artifact.
                --repository=: The name of the repository.
                --subscription=: Name or ID of subscription.
                --suffix=: The tenant suffix in registry login server.
                -n, --name=!: The name of the container registry.
                -p, --password=: The password used to log into a container registry
                -t, --image=: The name of the image.
                -u, --username=: The username used to log into a container registry
    - name: build
      flags:
        --__cmd__=:
            description: ==SUPPRESS==
            nargs: -1
        --agent-pool=: The name of the agent pool.
        --auth-mode=: Auth mode of the source registry.
        --build-arg=: Build argument in '--build-arg name[=value]' format.
        --log-template=: 'The repository and tag template for run log artifact using the format: ''log/repo:tag'' (e.g., ''acr/logs:{{.Run.ID}}'').'
        --no-format=: Indicates whether the logs should be displayed in raw format
        --no-logs=: Do not show logs after successfully queuing the build.
        --no-push=: Indicates whether the image built should be pushed to the registry.
        --no-wait=: Do not wait for the build to complete and return immediately after queuing the build.
        --platform=: The platform where build/task is run, Eg, 'windows' and 'linux'.
        --secret-build-arg=: Secret build argument in '--secret-build-arg name[=value]' format.
        --subscription=: Name or ID of subscription.
        --target=: The name of the target build stage.
        --timeout=: The timeout in seconds.
        -f, --file=: The relative path of the the docker file to the source code root folder.
        -g, --resource-group=: Name of resource group.
        -r, --registry=!: The name of the container registry.
        -t, --image=: 'The name and tag of the image using the format: ''-t repo/image:tag''.'
      completion:
        flag:
            auth-mode:
                - None
                - Default
    - name: cache
      commands:
        - name: list
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -r, --registry=!: The name of the container registry.
        - name: create
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -c, --cred-set=: The name of the credential set.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the cache rule.
            -r, --registry=!: The name of the container registry.
            -s, --source-repo=!: The full source repository path such as 'docker.io/library/ubuntu'.
            -t, --target-repo=!: The target repository namespace such as 'ubuntu'.
        - name: delete
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the cache rule.
            -r, --registry=!: The name of the container registry.
            -y, --yes=: Do not prompt for confirmation.
        - name: update
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --remove-cred-set=: Optional boolean indicating whether to remove the credential set from the cache rule.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -c, --cred-set=: The name of the credential set.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the cache rule.
            -r, --registry=!: The name of the container registry.
        - name: show
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the cache rule.
            -r, --registry=!: The name of the container registry.
    - name: check-health
      flags:
        --__cmd__=:
            description: ==SUPPRESS==
            nargs: -1
        --ignore-errors=: Provide all health checks, even if errors are found
        --subscription=: Name or ID of subscription.
        --vnet=: Virtual network ID so to run this command inside a VNET to verify the DNS routing to private endpoints
        -n, --name=: The name of the container registry.
        -y, --yes=: Do not prompt for confirmation.
    - name: check-name
      flags:
        --subscription=: Name or ID of subscription.
        -n, --name=!: The name of the container registry.
    - name: config
      commands:
        - name: content-trust
          commands:
            - name: show
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -r, --registry=!: The name of the container registry.
            - name: update
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --status=: Indicates whether content-trust is enabled.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -r, --registry=!: The name of the container registry.
              completion:
                flag:
                    status:
                        - enabled
                        - disabled
        - name: soft-delete
          commands:
            - name: show
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -r, --registry=!: The name of the container registry.
            - name: update
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --days=: 'The number of days to retain a soft-deleted manifest or tag after which it gets purged (Range: 1 to 90).'
                --status=: Indicates whether soft-delete policy is enabled.
                --subscription=: Name or ID of subscription.
                -r, --registry=!: The name of the container registry.
                -y, --yes=: Do not prompt for confirmation.
              completion:
                flag:
                    status:
                        - enabled
                        - disabled
        - name: retention
          commands:
            - name: show
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -r, --registry=!: The name of the container registry.
            - name: update
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --days=: 'The number of days to retain an untagged manifest after which it gets purged (Range: 0 to 365).'
                --status=: Indicates whether retention policy is enabled.
                --subscription=: Name or ID of subscription.
                --type=!: The type of retention policy.
                -g, --resource-group=: Name of resource group.
                -r, --registry=!: The name of the container registry.
              completion:
                flag:
                    status:
                        - enabled
                        - disabled
                    type:
                        - UntaggedManifests
        - name: authentication-as-arm
          commands:
            - name: show
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -r, --registry=!: The name of the container registry.
            - name: update
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --status=: Indicate whether authentication-as-arm is enabled.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -r, --registry=!: The name of the container registry.
              completion:
                flag:
                    status:
                        - enabled
                        - disabled
    - name: connected-registry
      commands:
        - name: create
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --audit-logs-enabled=:
                description: Indicate whether audit log synchronization is enabled.
                nargs: -1
            --client-tokens=:
                description: Specify the client access to the repositories in the connected registry.
                nargs: -1
            --log-level=: Set the log level for logging on the instance.
            --notifications=:
                description: List of artifact pattern for which notifications need to be generated.
                nargs: -1
            --repository=:
                description: Specify the repositories that need to be sync to the connected registry.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --sync-message-ttl=: Determine how long the sync messages will be kept in the cloud.
            --sync-token=: Specifies the sync token used to synchronize the connected registry with its parent.
            -g, --resource-group=: Name of resource group.
            -m, --mode=: Determine the access it will have when synchronized.
            -n, --name=!: Name for the connected registry.
            -p, --parent=: The name of the parent connected registry.
            -r, --registry=!: The login server of the Cloud ACR registry.
            -s, --sync-schedule=: Optional parameter to define the sync schedule.
            -w, --sync-window=: Required parameter if --sync-schedule is present.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                audit-logs-enabled:
                    - "true"
                    - "false"
                mode:
                    - ReadOnly
                    - ReadWrite
        - name: delete
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --cleanup=: It will aslo delete the sync token and the scope map resources.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name for the connected registry.
            -r, --registry=!: The login server of the Cloud ACR registry.
            -y, --yes=: Do not prompt for confirmation.
        - name: repo
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --add=:
                description: repository permissions to be added to the targeted connected registry and it's ancestors sync scope maps.
                nargs: -1
            --remove=:
                description: repository permissions to be removed from the targeted connected registry and it's succesors sync scope maps.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name for the connected registry.
            -r, --registry=!: The login server of the Cloud ACR registry.
        - name: permissions
          commands:
            - name: show
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=!: Name for the connected registry.
                -r, --registry=!: The login server of the Cloud ACR registry.
            - name: update
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --add=:
                    description: repository permissions to be added to the targeted connected registry and it's ancestors sync scope maps.
                    nargs: -1
                --remove=:
                    description: repository permissions to be removed from the targeted connected registry and it's succesors sync scope maps.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=!: Name for the connected registry.
                -r, --registry=!: The login server of the Cloud ACR registry.
        - name: get-settings
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --generate-password=: Select which password you want to generate, and it is required to retrieve the password from the sync token.
            --parent-protocol=!: Specify the protocol used to communicate with its parent.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name for the connected registry.
            -r, --registry=!: The login server of the Cloud ACR registry.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                generate-password:
                    - "1"
                    - "2"
                parent-protocol:
                    - http
                    - https
        - name: install
          commands:
            - name: info
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --parent-protocol=!: Specify the protocol used to communicate with its parent.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=!: Name for the connected registry.
                -r, --registry=!: The login server of the Cloud ACR registry.
              completion:
                flag:
                    parent-protocol:
                        - http
                        - https
            - name: renew-credentials
              flags:
                --__cmd__=:
                    description: ==SUPPRESS==
                    nargs: -1
                --parent-protocol=!: Specify the protocol used to communicate with its parent.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=!: Name for the connected registry.
                -r, --registry=!: The login server of the Cloud ACR registry.
                -y, --yes=: Do not prompt for confirmation.
              completion:
                flag:
                    parent-protocol:
                        - http
                        - https
        - name: list-client-tokens
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name for the connected registry.
            -r, --registry=!: The login server of the Cloud ACR registry.
        - name: list
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --no-children=: Used to remove all children from the list.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -p, --parent=: The name of the parent connected registry.
            -r, --registry=!: The login server of the Cloud ACR registry.
        - name: deactivate
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name for the connected registry.
            -r, --registry=!: The login server of the Cloud ACR registry.
            -y, --yes=: Do not prompt for confirmation.
        - name: show
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name for the connected registry.
            -r, --registry=!: The login server of the Cloud ACR registry.
        - name: update
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --add-client-tokens=:
                description: Client tokens to be added.
                nargs: -1
            --add-notifications=:
                description: List of artifact pattern to be added to notifications list.
                nargs: -1
            --audit-logs-enabled=:
                description: Indicate whether audit log synchronization is enabled.
                nargs: -1
            --log-level=: Set the log level for logging on the instance.
            --remove-client-tokens=:
                description: Client tokens to be removed.
                nargs: -1
            --remove-notifications=:
                description: List of artifact pattern to be removed from notifications list.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --sync-message-ttl=: Determine how long the sync messages will be kept in the cloud.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name for the connected registry.
            -r, --registry=!: The login server of the Cloud ACR registry.
            -s, --sync-schedule=: Optional parameter to define the sync schedule.
            -w, --sync-window=: Used to determine the schedule duration.
          completion:
            flag:
                audit-logs-enabled:
                    - "true"
                    - "false"
    - name: create
      flags:
        --__cmd__=:
            description: ==SUPPRESS==
            nargs: -1
        --admin-enabled=:
            description: Indicates whether the admin user is enabled
            nargs: -1
        --allow-exports=:
            description: Configure exportPolicy to allow/disallow artifacts from being exported from this registry.
            nargs: -1
        --allow-metadata-search=:
            description: Enable or disable the metadata-search feature for the registry.
            nargs: -1
        --allow-trusted-services=:
            description: Allow trusted Azure Services to access network restricted registries.
            nargs: -1
        --default-action=: Default action to apply when no rule matches.
        --identity=: Use assigned managed identity resource id or name if in the same resource group
        --key-encryption-key=: Key vault key uri.
        --public-network-enabled=:
            description: Allow public network access for the container registry.
            nargs: -1
        --sku=!: The SKU of the container registry
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --workspace=: Name or ID of the Log Analytics workspace to send registry diagnostic logs to.
        --zone-redundancy=: Indicates whether or not zone redundancy should be enabled for this registry or replication.
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: The name of the container registry.
      completion:
        flag:
            admin-enabled:
                - "true"
                - "false"
            allow-exports:
                - "true"
                - "false"
            allow-metadata-search:
                - "true"
                - "false"
            allow-trusted-services:
                - "true"
                - "false"
            default-action:
                - Allow
                - Deny
            public-network-enabled:
                - "true"
                - "false"
            sku:
                - Basic
                - Standard
                - Premium
            zone-redundancy:
                - Enabled
                - Disabled
    - name: credential
      commands:
        - name: show
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the container registry.
        - name: renew
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --password-name=!: The name of password to regenerate
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the container registry.
          completion:
            flag:
                password-name:
                    - password
                    - password2
    - name: credential-set
      commands:
        - name: delete
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the credential set.
            -r, --registry=!: The name of the container registry.
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -r, --registry=!: The name of the container registry.
        - name: show
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the credential set.
            -r, --registry=!: The name of the container registry.
        - name: update
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the credential set.
            -p, --password-id=: The Azure Key Vault secret ID of the secret containing the password to the upstream registry.
            -r, --registry=!: The name of the container registry.
            -u, --username-id=: The Azure Key Vault secret ID of the secret containing the username to the upstream registry.
        - name: create
          flags:
            --__cmd__=:
                description: ==SUPPRESS==
                nargs: -1
