# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: postgres
description: Manage Azure Database for PostgreSQL servers.
commands:
    - name: db
      commands:
        - name: delete
          description: Deletes a database.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the database
            -s, --server-name=: Name of the server.
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          description: List all the databases in a given server.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -s, --server-name=!: Name of the Server.
        - name: create
          description: Create a PostgreSQL database.
          flags:
            --charset=: The charset of the database
            --collation=: The collation of the database
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the database
            -s, --server-name=!: Name of the server.
        - name: show
          description: Gets information about a database.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the database
            -s, --server-name=: Name of the server.
    - name: flexible-server
      commands:
        - name: identity
          commands:
            - name: assign
              description: Add user assigned managed identities to the server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --identity=!:
                    description: Space-separated names or ID's of identities.
                    nargs: -1
                -s, --server-name=!: Name of the server.
            - name: remove
              description: Remove user assigned managed identites from the server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --identity=!:
                    description: Space-separated names or ID's of identities.
                    nargs: -1
                -s, --server-name=!: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
            - name: update
              description: Update to enable or disable system assigned managed identity on the server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                --system-assigned=!: Enable or disable system assigned identity to authenticate to cloud services without storing credentials in code.
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
              completion:
                flag:
                    system-assigned:
                        - Enabled
                        - Disabled
            - name: show
              description: Get an user assigned managed identity from the server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --identity=!: Name or ID of identity to show.
                -s, --server-name=!: Name of the server.
            - name: list
              description: List all user assigned managed identities from the server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
        - name: private-endpoint-connection
          commands:
            - name: approve
              description: Approve a private endpoint connection request for a server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --description=!: Comments for approve operation.
                --id=: The ID of the private endpoint connection associated with the Server.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the private endpoint connection associated with the Server.
                -s, --server-name=: Name of the Server.
            - name: delete
              description: Deletes a private endpoint connection with a given name.
              flags:
                --id=: The ID of the private endpoint connection associated with the Server.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the private endpoint connection associated with the Server.
                -s, --server-name=: Name of the Server.
            - name: reject
              description: Reject a private endpoint connection request for a server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --description=!: Comments for reject operation.
                --id=: The ID of the private endpoint connection associated with the Server.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the private endpoint connection associated with the Server.
                -s, --server-name=: Name of the Server.
            - name: list
              description: Gets all private endpoint connections on a server.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the server.
            - name: show
              description: Gets a private endpoint connection.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=: The ID of the private endpoint connection associated with the Server.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the private endpoint connection associated with the Server.
                -s, --server-name=: Name of the Server.
        - name: microsoft-entra-admin
          commands:
            - name: list
              description: List all Microsoft Entra administrators.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
            - name: wait
              description: Wait for a Microsoft Entra administrator to satisfy certain conditions.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --created=: wait until created with 'provisioningState' at 'Succeeded'
                --custom=: Wait until the condition satisfies a custom JMESPath query.
                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --interval=: polling interval in seconds
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                -g, --resource-group=!: Name of resource group.
                -i, --object-id=!: The unique ID of the Microsoft Entra administrator.
                -s, --server-name=!: Name of the server.
            - name: show
              description: Get a Microsoft Entra administrator.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -i, --object-id=!: The unique ID of the Microsoft Entra administrator.
                -s, --server-name=!: Name of the server.
            - name: delete
              description: Delete a Microsoft Entra administrator.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -i, --object-id=!: The unique ID of the Microsoft Entra administrator.
                -s, --server-name=!: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
            - name: create
              description: Create a Microsoft Entra administrator.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -i, --object-id=!: The unique ID of the Microsoft Entra administrator.
                -s, --server-name=!: Name of the server.
                -t, --type=: Type of the Microsoft Entra administrator.
                -u, --display-name=!: Display name of the Microsoft Entra administrator user or group.
              completion:
                flag:
                    type:
                        - User
                        - Group
                        - ServicePrincipal
                        - Unknown
        - name: fabric-mirroring
          commands:
            - name: start
              description: Enable bringing your PostgreSQL data into Microsoft Fabric.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -d, --database-names=!:
                    description: Space-separated list of the database names to be mirrored.
                    nargs: -1
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
            - name: stop
              description: Stop bringing your PostgreSQL data into Microsoft Fabric.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
            - name: update-databases
              description: Update allowed mirrored databases.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -d, --database-names=!:
                    description: Space-separated list of the database names to be mirrored.
                    nargs: -1
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
        - name: index-tuning
          commands:
            - name: set-settings
              description: Update a tuning setting for a PostgreSQL flexible server.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=!: The name of the tuning setting.
                -s, --server-name=: Name of the server.
                -v, --value=: Value of the tuning setting.
              completion:
                flag:
                    name:
                        - analysis_interval
                        - max_columns_per_index
                        - max_index_count
                        - max_indexes_per_table
                        - max_queries_per_database
                        - max_regression_factor
                        - max_total_size_factor
                        - min_improvement_factor
                        - mode
                        - unused_dml_per_table
                        - unused_min_period
                        - unused_reads_per_table
            - name: show
              description: Show state of index tuning for a PostgreSQL flexible server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the server.
            - name: show-settings
              description: Get a tuning setting for a PostgreSQL flexible server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=!: The name of the tuning setting.
                -s, --server-name=: Name of the server.
              completion:
                flag:
                    name:
                        - analysis_interval
                        - max_columns_per_index
                        - max_index_count
                        - max_indexes_per_table
                        - max_queries_per_database
                        - max_regression_factor
                        - max_total_size_factor
                        - min_improvement_factor
                        - mode
                        - unused_dml_per_table
                        - unused_min_period
                        - unused_reads_per_table
            - name: update
              description: Update index tuning to be enabled/disabled for a PostgreSQL flexible server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --enabled=!: Enable or disable index tuning feature.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the server.
              completion:
                flag:
                    enabled:
                        - "True"
                        - "False"
            - name: list-recommendations
              description: Get available tuning index recommendations associated with a PostgreSQL flexible server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -r, --recommendation-type=: Retrieve recommendations based on type.
                -s, --server-name=: Name of the server.
              completion:
                flag:
                    recommendation-type:
                        - CreateIndex
                        - DropIndex
            - name: list-settings
              description: Get tuning settings associated for a PostgreSQL flexible server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the server.
        - name: virtual-endpoint
          commands:
            - name: show
              description: Get the details of a virtual endpoint.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the virtual endpoint.
                -s, --server-name=: Name of the server.
            - name: list
              description: List all virtual endpoints for a flexible server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the server.
            - name: delete
              description: Delete a virtual endpoint.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the virtual endpoint.
                -s, --server-name=: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
            - name: create
              description: Create a new virtual endpoint for a flexible server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -m, --members=!: The read replicas the virtual endpoints point to.
                -n, --name=!: Name of the virtual endpoint.
                -s, --server-name=!: Name of the server.
                -t, --endpoint-type=!: Virtual Endpoints offer two distinct types of connection points.
              completion:
                flag:
                    endpoint-type:
                        - ReadWrite
            - name: update
              description: Update a virtual endpoint.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -m, --members=!: The read replicas the virtual endpoints point to.
                -n, --name=: Name of the virtual endpoint.
                -s, --server-name=: Name of the server.
                -t, --endpoint-type=!: Virtual Endpoints offer two distinct types of connection points.
              completion:
                flag:
                    endpoint-type:
                        - ReadWrite
        - name: show-connection-string
          description: Show the connection strings for a PostgreSQL flexible-server database.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --pg-bouncer=: Show connection strings for PgBouncer.
            --subscription=: Name or ID of subscription.
            -d, --database-name=: The name of the database to be created when provisioning the database server
            -p, --admin-password=: The password of the administrator.
            -s, --server-name=: Name of the server.
            -u, --admin-user=: Administrator username for the server.
        - name: firewall-rule
          commands:
            - name: list
              description: List all firewall rules for a flexible server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the server.
            - name: update
              description: Update a firewall rule.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --end-ip-address=: The end IP address of the firewall rule.
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --start-ip-address=: The start IP address of the firewall rule.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the server.
                -r, --rule-name=: The name of the firewall rule.
            - name: create
              description: Create a new firewall rule for a flexible server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --end-ip-address=: The end IP address of the firewall rule.
                --start-ip-address=: The start IP address of the firewall rule.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the server.
                -r, --rule-name=: The name of the firewall rule.
            - name: delete
              description: Delete a firewall rule.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the server.
                -r, --rule-name=: The name of the firewall rule.
                -y, --yes=: Do not prompt for confirmation.
            - name: show
              description: Get the details of a firewall rule.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the server.
                -r, --rule-name=: The name of the firewall rule.
        - name: ad-admin
          commands:
            - name: wait
              description: Wait for a Microsoft Entra administrator to satisfy certain conditions.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --created=: wait until created with 'provisioningState' at 'Succeeded'
                --custom=: Wait until the condition satisfies a custom JMESPath query.
                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --interval=: polling interval in seconds
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                -g, --resource-group=!: Name of resource group.
                -i, --object-id=!: The unique ID of the Microsoft Entra administrator.
                -s, --server-name=!: Name of the server.
            - name: create
              description: Create a Microsoft Entra administrator.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -i, --object-id=!: The unique ID of the Microsoft Entra administrator.
                -s, --server-name=!: Name of the server.
                -t, --type=: Type of the Microsoft Entra administrator.
                -u, --display-name=!: Display name of the Microsoft Entra administrator user or group.
              completion:
                flag:
                    type:
                        - User
                        - Group
                        - ServicePrincipal
                        - Unknown
            - name: delete
              description: Delete a Microsoft Entra administrator.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -i, --object-id=!: The unique ID of the Microsoft Entra administrator.
                -s, --server-name=!: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
            - name: show
              description: Get a Microsoft Entra administrator.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -i, --object-id=!: The unique ID of the Microsoft Entra administrator.
                -s, --server-name=!: Name of the server.
            - name: list
              description: List all Microsoft Entra administrators.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
        - name: parameter
          commands:
            - name: list
              description: List all the configurations in a given server.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
            - name: set
              description: Update the parameter of a flexible server.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --source=: Source of the configuration.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the server configuration
                -s, --server-name=: Name of the server.
                -v, --value=: Value of the configuration.
            - name: show
              description: Gets information about a configuration of server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the server configuration
                -s, --server-name=: Name of the server.
        - name: update
          description: Update a flexible server.
          flags:
            --active-directory-auth=: Whether Microsoft Entra authentication is enabled.
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --backup-identity=: The name or resource ID of the geo backup user identity for data encryption.
            --backup-key=: The resource ID of the geo backup keyvault key for data encryption.
            --backup-retention=: The number of days a backup is retained.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --high-availability=: Enable (ZoneRedundant or SameZone) or disable high availability feature.
            --identity=: The name or resource ID of the user assigned identity for data encryption.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --iops=: Value of IOPS in (operations/sec) to be allocated for this server.
            --key=: The resource ID of the primary keyvault key for data encryption.
            --maintenance-window=: Period of time (UTC) designated for maintenance.
            --microsoft-entra-auth=: Whether Microsoft Entra authentication is enabled.
            --node-count=: The number of nodes for elastic cluster.
            --password-auth=: Whether password authentication is enabled.
            --performance-tier=: Performance tier of the server.
            --private-dns-zone=: This parameter only applies for a server with private access.
