# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: relay
description: relay
commands:
    - name: hyco
      commands:
        - name: authorization-rule
          commands:
            - name: keys
              commands:
                - name: list
                  flags:
                    --hybrid-connection-name=!: Name of Hybrid Connection.
                    --namespace-name=!: Name of Namespace.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: Name of Hybrid Connection Authorization Rule.
                - name: renew
                  flags:
                    --hybrid-connection-name=: Name of Hybrid Connection.
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --key-value=: Optional.
                    --key=!: Specifies Primary or Secondary key needs to be reset.
                    --namespace-name=: Name of Namespace.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: Name of Hybrid Connection Authorization Rule.
                  completion:
                    flag:
                        key:
                            - PrimaryKey
                            - SecondaryKey
            - name: delete
              flags:
                --hybrid-connection-name=: Name of Hybrid Connection.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: Name of Namespace.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of Hybrid Connection Authorization Rule.
            - name: update
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --force-string=:
                    description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                    nargs: -1
                --hybrid-connection-name=: Name of Hybrid Connection.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: Name of Namespace.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --rights=!:
                    description: Space-separated list of Authorization rule rights.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of Hybrid Connection Authorization Rule.
              completion:
                flag:
                    force-string:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
            - name: create
              flags:
                --hybrid-connection-name=!: Name of Hybrid Connection.
                --namespace-name=!: Name of Namespace.
                --rights=:
                    description: Space-separated list of Authorization rule rights.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of Hybrid Connection Authorization Rule.
            - name: show
              flags:
                --hybrid-connection-name=: Name of Hybrid Connection.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: Name of Namespace.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of Hybrid Connection Authorization Rule.
            - name: list
              flags:
                --hybrid-connection-name=!: Name of Hybrid Connection.
                --max-items=: Total number of items to return in the command's output.
                --namespace-name=!: Name of Namespace.
                --next-token=: Token to specify where to start paginating.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
        - name: show
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: Name of Namespace.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of Hybrid Connection.
        - name: list
          flags:
            --max-items=: Total number of items to return in the command's output.
            --namespace-name=!: Name of Namespace.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: create
          flags:
            --namespace-name=!: Name of Namespace.
            --subscription=: Name or ID of subscription.
            --user-metadata=: Endpoint metadata.
            -c, --requires-client-authorization=:
                description: Indicates whether client authorization is required.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of Hybrid Connection.
          completion:
            flag:
                requires-client-authorization:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: delete
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: Name of Namespace.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of Hybrid Connection.
        - name: update
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: Name of Namespace.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --status=: Enumerates the possible values for the status of a messaging entity.
            --subscription=: Name or ID of subscription.
            --user-metadata=: Endpoint metadata.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of Hybrid Connection.
            -r, --requires-client-authorization=:
                description: Indicates whether client authorization is required.
                nargs: -1
          completion:
            flag:
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                requires-client-authorization:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                status:
                    - Active
                    - Disabled
                    - ReceiveDisabled
                    - SendDisabled
