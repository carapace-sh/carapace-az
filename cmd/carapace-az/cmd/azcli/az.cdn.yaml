# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: cdn
description: Manage Azure Content Delivery Networks (CDNs).
commands:
    - name: custom-domain
      commands:
        - name: show
          description: Show details for the custom domain of a CDN.
          flags:
            --endpoint-name=: Name of the endpoint under the profile which is unique globally.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --profile-name=: Name of the CDN profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the custom domain within an endpoint.
        - name: disable-https
          description: Disable https delivery of the custom domain.
          flags:
            --endpoint-name=!: Name of the endpoint under the profile which is unique globally.
            --profile-name=!: Name of the CDN profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Resource name of the custom domain.
        - name: update
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --endpoint-name=: Name of the endpoint under the profile which is unique globally.
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --hostname=: The host name of the custom domain.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=: Name of the CDN profile which is unique within the resource group.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the custom domain within an endpoint.
          completion:
            flag:
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: list
          flags:
            --endpoint-name=!: Name of the endpoint under the profile which is unique globally.
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --profile-name=!: Name of the CDN profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: wait
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --endpoint-name=: Name of the endpoint under the profile which is unique globally.
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --profile-name=: Name of the CDN profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the custom domain within an endpoint.
        - name: delete
          description: Delete the custom domain of a CDN.
          flags:
            --endpoint-name=: Name of the endpoint under the profile which is unique globally.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=: Name of the CDN profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the custom domain within an endpoint.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: enable-https
          description: Enable HTTPS for a custom domain.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --endpoint-name=!: Name of the parent endpoint.
            --min-tls-version=: The minimum TLS version required for the custom domain.
            --profile-name=!: Name of the parent profile.
            --subscription=: Name or ID of subscription.
            --user-cert-group-name=: The resource group of the KeyVault certificate
            --user-cert-protocol-type=: The protocol type of the certificate.
            --user-cert-secret-name=: The secret name of the KeyVault certificate
            --user-cert-secret-version=: The secret version of the KeyVault certificate, If not specified, the "Latest" version will always been used and the deployed certificate will be automatically rotated to the latest version when a newer version of the certificate is available.
            --user-cert-subscription-id=: The subscription id of the KeyVault certificate
            --user-cert-vault-name=: The vault name of the KeyVault certificate
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Resource name of the custom domain.
          completion:
            flag:
                min-tls-version:
                    - none
                    - "1.0"
                    - "1.2"
                user-cert-protocol-type:
                    - sni
                    - ip
        - name: create
          description: Create a new custom domain to provide a hostname for a CDN endpoint.
          flags:
            --endpoint-name=!: Name of the endpoint under the profile which is unique globally.
            --hostname=: The host name of the custom domain.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=!: Name of the CDN profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the custom domain within an endpoint.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
    - name: edge-node
      commands:
        - name: list
          flags:
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
    - name: endpoint
      commands:
        - name: stop
          description: Stop a CDN endpoint.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=: Name of the CDN profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the endpoint under the profile which is unique globally.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: rule
          commands:
            - name: action
              commands:
                - name: show
                  description: Gets an existing CDN endpoint with the specified endpoint name under the specified subscription, resource group and profile.
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --profile-name=: Name of the CDN profile which is unique within the resource group.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: Name of the CDN endpoint.
                - name: remove
                  description: CDN endpoint is the entity within a CDN profile containing configuration information such as origin, protocol, content caching and delivery behavior.
                  flags:
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --index=!: The index of the condition/action
                    --profile-name=: Name of the CDN profile which is unique within the resource group.
                    --rule-name=!: Name of the rule.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: Name of the CDN endpoint.
                - name: add
                  description: CDN endpoint is the entity within a CDN profile containing configuration information such as origin, protocol, content caching and delivery behavior.
                  flags:
                    --action-name=!: 'The name of the action for the delivery rule: https://learn.microsoft.com/en-us/azure/cdn/cdn-standard-rules-engine-actions'
                    --cache-behavior=: Caching behavior for the requests.
                    --cache-duration=: The duration for which the content needs to be cached.
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --custom-fragment=: Fragment to add to the redirect URL.
                    --custom-hostname=: Host to redirect.
                    --custom-path=: The full path to redirect.
                    --custom-querystring=: The set of query strings to be placed in the redirect URL.
                    --destination=: The destination path to be used in the rewrite.
                    --header-action=: Header action for the requests.
                    --header-name=: Name of the header to modify.
                    --header-value=: Value of the header.
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --origin-group=: Name or ID of the OriginGroup that would override the default OriginGroup
                    --preserve-unmatched-path=:
                        description: If True, the remaining path after the source                pattern will be appended to the new destination path.
                        nargs: -1
                    --profile-name=: Name of the CDN profile which is unique within the resource group.
                    --query-parameters=: Query parameters to include or exclude (comma separated).
                    --query-string-behavior=: Query string behavior for the requests.
                    --redirect-protocol=: Protocol to use for the redirect.
                    --redirect-type=: The redirect type the rule will use when redirecting traffic.
                    --rule-name=!: Name of the rule.
                    --source-pattern=: A request URI pattern that identifies the type of requests that may be rewritten.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: Name of the CDN endpoint.
                  completion:
                    flag:
                        action-name:
                            - CacheExpiration
                            - CacheKeyQueryString
                            - ModifyRequestHeader
                            - ModifyResponseHeader
                            - OriginGroupOverride
                            - UrlRedirect
                            - UrlRewrite
                        cache-behavior:
                            - BypassCache
                            - Override
                            - SetIfMissing
                        header-action:
                            - Append
                            - Overwrite
                            - Delete
                        preserve-unmatched-path:
                            - "true"
                            - "false"
                        query-string-behavior:
                            - Include
                            - IncludeAll
                            - Exclude
                            - ExcludeAll
                        redirect-protocol:
                            - MatchRequest
                            - Http
                            - Https
                        redirect-type:
                            - Moved
                            - Found
                            - TemporaryRedirect
                            - PermanentRedirect
            - name: condition
              commands:
                - name: show
                  description: Gets an existing CDN endpoint with the specified endpoint name under the specified subscription, resource group and profile.
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --profile-name=: Name of the CDN profile which is unique within the resource group.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: Name of the CDN endpoint.
                - name: remove
                  description: CDN endpoint is the entity within a CDN profile containing configuration information such as origin, protocol, content caching and delivery behavior.
                  flags:
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --index=!: The index of the condition/action
                    --profile-name=: Name of the CDN profile which is unique within the resource group.
                    --rule-name=!: Name of the rule.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: Name of the CDN endpoint.
                - name: add
                  description: CDN endpoint is the entity within a CDN profile containing configuration information such as origin, protocol, content caching and delivery behavior.
                  flags:
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --match-values=:
                        description: Match values of the match condition.
                        nargs: -1
                    --match-variable=!: 'Name of the match condition: https://learn.microsoft.com/en-us/azure/cdn/cdn-standard-rules-engine-match-conditions'
                    --negate-condition=:
                        description: If true, negates the condition
                        nargs: -1
                    --operator=!: Operator of the match condition.
                    --profile-name=: Name of the CDN profile which is unique within the resource group.
                    --rule-name=!: Name of the rule.
                    --selector=: Selector of the match condition.
                    --subscription=: Name or ID of subscription.
                    --transform=:
                        description: Transform to apply before matching.
                        nargs: -1
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: Name of the CDN endpoint.
                  completion:
                    flag:
                        match-variable:
                            - ClientPort
                            - Cookies
                            - HostName
                            - HttpVersion
                            - IsDevice
                            - PostArgs
                            - QueryString
                            - RemoteAddress
                            - RequestBody
                            - RequestHeader
                            - RequestMethod
                            - RequestScheme
                            - RequestUri
                            - ServerPort
                            - SocketAddr
                            - SslProtocol
                            - UrlFileExtension
                            - UrlFileName
                            - UrlPath
                        negate-condition:
                            - "true"
                            - "false"
                        transform:
                            - Lowercase
                            - Uppercase
            - name: show
              description: Gets an existing CDN endpoint with the specified endpoint name under the specified subscription, resource group and profile.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --profile-name=: Name of the CDN profile which is unique within the resource group.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the CDN endpoint.
            - name: add
              description: CDN endpoint is the entity within a CDN profile containing configuration information such as origin, protocol, content caching and delivery behavior.
              flags:
                --action-name=!: 'The name of the action for the delivery rule: https://learn.microsoft.com/en-us/azure/cdn/cdn-standard-rules-engine-actions'
                --cache-behavior=: Caching behavior for the requests.
                --cache-duration=: The duration for which the content needs to be cached.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --custom-fragment=: Fragment to add to the redirect URL.
                --custom-hostname=: Host to redirect.
                --custom-path=: The full path to redirect.
                --custom-querystring=: The set of query strings to be placed in the redirect URL.
                --destination=: The destination path to be used in the rewrite.
                --header-action=: Header action for the requests.
                --header-name=: Name of the header to modify.
                --header-value=: Value of the header.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --match-values=:
                    description: Match values of the match condition.
                    nargs: -1
                --match-variable=: 'Name of the match condition: https://learn.microsoft.com/en-us/azure/cdn/cdn-standard-rules-engine-match-conditions'
                --negate-condition=:
                    description: If true, negates the condition
                    nargs: -1
                --operator=: Operator of the match condition.
                --order=!: The order in which the rules are applied for the endpoint.
                --origin-group=: Name or ID of the OriginGroup that would override the default OriginGroup
                --preserve-unmatched-path=:
                    description: If True, the remaining path after the source                pattern will be appended to the new destination path.
                    nargs: -1
                --profile-name=: Name of the CDN profile which is unique within the resource group.
                --query-parameters=: Query parameters to include or exclude (comma separated).
                --query-string-behavior=: Query string behavior for the requests.
                --redirect-protocol=: Protocol to use for the redirect.
                --redirect-type=: The redirect type the rule will use when redirecting traffic.
                --rule-name=: Name of the rule.
                --selector=: Selector of the match condition.
                --source-pattern=: A request URI pattern that identifies the type of requests that may be rewritten.
                --subscription=: Name or ID of subscription.
                --transform=:
                    description: Transform to apply before matching.
                    nargs: -1
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the CDN endpoint.
              completion:
                flag:
                    action-name:
                        - CacheExpiration
                        - CacheKeyQueryString
                        - ModifyRequestHeader
                        - ModifyResponseHeader
                        - OriginGroupOverride
                        - UrlRedirect
                        - UrlRewrite
                    cache-behavior:
                        - BypassCache
                        - Override
                        - SetIfMissing
                    header-action:
                        - Append
                        - Overwrite
                        - Delete
                    match-variable:
                        - ClientPort
                        - Cookies
                        - HostName
                        - HttpVersion
                        - IsDevice
                        - PostArgs
                        - QueryString
                        - RemoteAddress
                        - RequestBody
                        - RequestHeader
                        - RequestMethod
                        - RequestScheme
                        - RequestUri
                        - ServerPort
                        - SocketAddr
                        - SslProtocol
                        - UrlFileExtension
                        - UrlFileName
                        - UrlPath
                    negate-condition:
                        - "true"
                        - "false"
                    preserve-unmatched-path:
                        - "true"
                        - "false"
                    query-string-behavior:
                        - Include
                        - IncludeAll
                        - Exclude
                        - ExcludeAll
                    redirect-protocol:
                        - MatchRequest
                        - Http
                        - Https
                    redirect-type:
                        - Moved
                        - Found
                        - TemporaryRedirect
                        - PermanentRedirect
                    transform:
                        - Lowercase
                        - Uppercase
            - name: remove
              description: CDN endpoint is the entity within a CDN profile containing configuration information such as origin, protocol, content caching and delivery behavior.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --order=: The order in which the rules are applied for the endpoint.
                --profile-name=: Name of the CDN profile which is unique within the resource group.
                --rule-name=: Name of the rule.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the CDN endpoint.
        - name: wait
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --profile-name=: Name of the CDN profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the endpoint under the profile which is unique globally.
        - name: purge
          description: Purge pre-loaded content for a CDN endpoint.
          flags:
            --content-paths=!:
                description: The path to the content to be purged.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=: Name of the CDN profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the endpoint under the profile which is unique globally.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: load
          description: Pre-load content for a CDN endpoint.
          flags:
            --content-paths=!:
                description: The path to the content to be loaded.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=: Name of the CDN profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the endpoint under the profile which is unique globally.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: start
          description: Start a CDN endpoint.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=: Name of the CDN profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the endpoint under the profile which is unique globally.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: show
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --profile-name=: Name of the CDN profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the endpoint under the profile which is unique globally.
        - name: create
          description: Create a named endpoint to connect to a CDN.
          flags:
            --content-types-to-compress=:
                description: List of content types on which compression applies.
                nargs: -1
            --default-origin-group=: The origin group to use for origins not explicitly included in an origin group.
            --delivery-policy=:
                description: A policy that specifies the delivery rules to be used for an endpoint.
                nargs: -1
            --enable-compression=:
                description: If compression is enabled, content will be served as compressed if user requests for a compressed version.
                nargs: -1
            --geo-filters=:
                description: List of rules defining the user's geo access within a CDN endpoint.
                nargs: -1
            --no-http=:
                description: Disable HTTP traffic.Indicates whether HTTP traffic is not allowed on the endpoint.
                nargs: -1
            --no-https=:
                description: Indicates whether HTTPS traffic is not allowed on the endpoint.
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --optimization-type=: Specifies what scenario the customer wants this CDN endpoint to optimize for, e.g. Download, Media services.
            --origin-groups=:
                description: The origin groups comprising of origins that are used for load balancing the traffic based on availability.
                nargs: -1
            --origin-host-header=: The host header value sent to the origin with each request.
            --origin-path=: A directory path on the origin that CDN can use to retrieve content from, e.g. contoso.cloudapp.net/originpath.
            --origin=!:
                description: 'Endpoint origin specified by the following space-delimited 7 tuple: www.example.com http_port https_port private_link_resource_id private_link_location private_link_approval_message origin_name.'
                nargs: -1
            --probe-path=: Path to a file hosted on the origin which helps accelerate delivery of the dynamic content and calculate the most optimal routes for the CDN.
            --profile-name=!: Name of the CDN profile which is unique within the resource group.
            --query-string-caching-behavior=: Defines how CDN caches requests that include query strings.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: Resource tags.
                nargs: -1
            --url-signing-keys=:
                description: List of keys used to validate the signed URL hashes.
                nargs: -1
            --web-application-firewall-policy-link=:
                description: Defines the Web Application Firewall policy for the endpoint (if applicable)  Support shorthand-syntax, json-file and yaml-file.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Resource location.
            -n, --name=!: Name of the endpoint under the profile which is unique globally.
          completion:
            flag:
                enable-compression:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                no-http:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                no-https:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
