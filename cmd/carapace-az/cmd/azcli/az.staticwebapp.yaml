# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: staticwebapp
description: Manage static apps.
commands:
    - name: appsettings
      description: Manage app settings the static app.
      commands:
        - name: delete
          description: Delete app settings with given keys of the static app.
          flags:
            --environment-name=: Name of the environment of static site
            --setting-names=!:
                description: Space-separated app setting names.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
        - name: list
          description: List app settings of the static app.
          flags:
            --environment-name=: Name of the environment of static site
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
        - name: set
          description: Add to or change the app settings of the static app.
          flags:
            --environment-name=: Name of the environment of static site
            --setting-names=!:
                description: Space-separated app settings in 'key=value' format.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
    - name: backends
      description: Link or unlink a prexisting backend with a static web app. Also known as "Bring your own API."
      commands:
        - name: unlink
          description: Unlink backend from a static web app
          flags:
            --environment-name=: Name of the environment of static site
            --remove-backend-auth=: If set to true, removes the identity provider configured on the backend during the linking process.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
        - name: link
          description: Link a backend to a static web app.
          flags:
            --backend-region=: Region of the backend resource.
            --backend-resource-id=!: Resource ID of the backend to link.
            --environment-name=: Name of the environment of static site
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
        - name: validate
          description: Validate a backend for a static web app
          flags:
            --backend-region=: Region of the backend resource.
            --backend-resource-id=!: Resource ID of the backend to link.
            --environment-name=: Name of the environment of static site
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
        - name: show
          description: Show details on the backend linked to a static web app
          flags:
            --environment-name=: Name of the environment of static site
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
    - name: create
      description: Create a static app.
      flags:
        --api-location=: Location of your Azure Functions code.
        --app-location=: Location of your application code.
        --login-with-ado=: Use azure credentials to create an Azure Dev Ops personal access token
        --login-with-github=: Interactively log in with Github to retrieve the Personal Access Token
        --no-wait=: Do not wait for the long-running operation to finish.
        --output-location=: The path of your build output relative to your apps location.
        --sku=: The pricing tiers for Static Web App
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -b, --branch=: The target branch in the repository.
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: Name of the static site
        -s, --source=: URL for the repository of the static site.
        -t, --token=: A user's GitHub or Azure Dev Ops repository token.
      completion:
        flag:
            sku:
                - Free
                - Standard
                - Dedicated
    - name: delete
      description: Delete a static app.
      flags:
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=!: Name of the static site
        -y, --yes=: Do not prompt for confirmation.
    - name: disconnect
      description: Disconnect source control to enable connecting to a different repo.
      flags:
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=!: Name of the static site
    - name: enterprise-edge
      description: Manage the Azure Front Door CDN for static webapps. For optimal experience and availability please check our documentation https://aka.ms/swaedge
      commands:
        - name: enable
          description: Enable the Azure Front Door CDN for a static webapp.
          flags:
            --no-register=: Don't try to register the Microsoft.CDN provider.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
        - name: show
          description: Show the status (Enabled, Disabled, Enabling, Disabling) of the Azure Front Door CDN for a webapp.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
        - name: disable
          description: Disable the Azure Front Door CDN for a static webapp.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
    - name: environment
      description: Manage environment of the static app.
      commands:
        - name: functions
          description: Show information about functions.
          flags:
            --environment-name=: Name of the environment of static site
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
        - name: delete
          description: Delete the static app production environment or the specified environment.
          flags:
            --environment-name=: Name of the environment of static site
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          description: List all environment of the static app including production.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
        - name: show
          description: Show information about the production environment or the specified environment.
          flags:
            --environment-name=: Name of the environment of static site
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
    - name: functions
      description: Link or unlink a prexisting functionapp with a static webapp. Also known as "Bring your own Functions."
      commands:
        - name: show
          description: Show details on the Azure Function linked to a static webapp
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
        - name: unlink
          description: Unlink an Azure Function from a static webapp
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
        - name: link
          description: Link an Azure Function to a static webapp.
          flags:
            --environment-name=: Name of the environment of static site
            --force=: Force the function link even if the function is already linked to a static webapp.
            --function-resource-id=!: Resource ID of the functionapp to link.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
    - name: hostname
      description: Manage custom hostnames of Functions of the static app.
      commands:
        - name: show
          description: Get details for a staticwebapp custom domain.
          flags:
            --hostname=!: custom hostname such as www.example.com. Only support sub domain in preview.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
        - name: set
          description: Set given sub-domain hostname to the static app.
          flags:
            --hostname=!: custom hostname such as www.example.com. Only support sub domain in preview.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -m, --validation-method=: Validation method for the custom domain.
            -n, --name=!: Name of the static site
          completion:
            flag:
                validation-method:
                    - cname-delegation
                    - dns-txt-token
        - name: list
          description: List custom hostnames of the static app.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
        - name: delete
          description: Delete given hostname of the static app.
          flags:
            --hostname=!: custom hostname such as www.example.com. Only support sub domain in preview.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
            -y, --yes=: Do not prompt for confirmation.
    - name: identity
      description: Manage a static web app's managed identity
      commands:
        - name: assign
          description: assign managed identity to the static web app
          flags:
            --identities=:
                description: Space-separated identities to assign.
                nargs: -1
            --role=: Role name or id the managed identity will be assigned
            --scope=: The scope the managed identity has access to
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
        - name: remove
          description: Disable static web app's managed identity
          flags:
            --identities=:
                description: Space-separated identities to assign.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
            -y, --yes=: Do not prompt for confirmation.
        - name: show
          description: display static web app's managed identity
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the static site
    - name: list
      description: List all static app resources in a subscription, or in resource group if provided
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: reconnect
      description: Connect to a repo and branch following a disconnect command.
      flags:
        --login-with-github=: Interactively log in with Github to retrieve the Personal Access Token
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        -b, --branch=!: The target branch in the repository.
        -g, --resource-group=: Name of resource group.
        -n, --name=!: Name of the static site
        -s, --source=!: URL for the repository of the static site.
        -t, --token=: A user's GitHub or Azure Dev Ops repository token.
    - name: secrets
      description: Manage deployment token for the static app
      commands:
        - name: list
          description: List the deployment token for the static app.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
        - name: reset-api-key
          description: Reset the deployment token for the static app.
          flags:
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
    - name: show
      description: Show details of a static app.
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=!: Name of the static site
    - name: update
      description: Update a static app.
      flags:
        --no-wait=: Do not wait for the long-running operation to finish.
        --sku=: The pricing tiers for Static Web App
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -b, --branch=: The target branch in the repository.
        -g, --resource-group=: Name of resource group.
        -n, --name=!: Name of the static site
        -s, --source=: URL for the repository of the static site.
        -t, --token=: A user's GitHub or Azure Dev Ops repository token.
      completion:
        flag:
            sku:
                - Free
                - Standard
                - Dedicated
    - name: users
      description: Manage users of the static app.
      commands:
        - name: update
          description: Updates a user entry with the listed roles.
          flags:
            --authentication-provider=: Authentication provider of the user identity such as AAD, Facebook, GitHub, Google, Twitter.
            --roles=!: Comma-separated default or user-defined role names.
            --subscription=: Name or ID of subscription.
            --user-details=: Email for AAD, Facebook, and Google.
            --user-id=: Given id of registered user.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
        - name: list
          description: Lists users and assigned roles, limited to users who accepted their invites.
          flags:
            --authentication-provider=: Authentication provider of the user identity such as AAD, Facebook, GitHub, Google, Twitter.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
        - name: invite
          description: Create invitation link for specified user to the static app.
          flags:
            --authentication-provider=!: Authentication provider of the user identity such as AAD, Facebook, GitHub, Google, Twitter.
            --domain=!: A domain added to the static app in quotes.
            --invitation-expiration-in-hours=!: This value sets when the link will expire in hours.
            --roles=!: Comma-separated default or user-defined role names.
            --subscription=: Name or ID of subscription.
            --user-details=!: Email for AAD, Facebook, and Google.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the static site
