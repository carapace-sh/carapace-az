# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: disk
description: Manage Azure Managed Disks.
commands:
    - name: config
      commands:
        - name: update
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the managed disk that is being created.
            -z, --size-gb=: If creationData.createOption is Empty, this field is mandatory and it indicates the size of the disk to create.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
    - name: create
      description: Create a managed disk.
      flags:
        --__GALLERY_IMAGE_REFERENCE_TYPE=:
            description: ==SUPPRESS==
            nargs: -1
        --__SOURCE_BLOB_URI=:
            description: ==SUPPRESS==
            nargs: -1
        --__SOURCE_DISK=:
            description: ==SUPPRESS==
            nargs: -1
        --__SOURCE_RESTORE_POINT=:
            description: ==SUPPRESS==
            nargs: -1
        --__SOURCE_SNAPSHOT=:
            description: ==SUPPRESS==
            nargs: -1
        --accelerated-network=:
            description: Customers can set on Managed Disks or Snapshots to enable the accelerated networking if the OS disk image support.
            nargs: -1
        --architecture=: CPU architecture.
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --data-access-auth-mode=: Specify the auth mode when exporting or uploading to a disk or snapshot.
        --disk-access=: Name or ID of the disk access resource for using private endpoints on disks.
        --disk-encryption-set=: Name or ID of disk encryption set that is used to encrypt the disk.
        --disk-iops-read-only=: The total number of IOPS that will be allowed across all VMs mounting the shared disk as ReadOnly.
        --disk-iops-read-write=: The number of IOPS allowed for this disk.
        --disk-mbps-read-only=: The total throughput (MBps) that will be allowed across all VMs mounting the shared disk as ReadOnly.
        --disk-mbps-read-write=: The bandwidth allowed for this disk.
        --edge-zone=: The name of edge zone.
        --enable-bursting=:
            description: Enable on-demand bursting beyond the provisioned performance target of the disk.
            nargs: -1
        --encryption-type=: Encryption type.
        --for-upload=:
            description: Create the disk for uploading blobs.
            nargs: -1
        --gallery-image-reference-lun=: If the disk is created from an image's data disk, this is an index that indicates which of the data disks in the image to use.
        --gallery-image-reference=: ID of the Compute, Shared or Community Gallery image version from which to create a disk.
        --hyper-v-generation=: The hypervisor generation of the Virtual Machine.
        --image-reference-lun=: If the disk is created from an image's data disk, this is an index that indicates which of the data disks in the image to use.
        --image-reference=: ID or URN (publisher:offer:sku:version) of the image from which to create a disk
        --logical-sector-size=: Logical sector size in bytes for Ultra disks.
        --max-shares=: The maximum number of VMs that can attach to the disk at the same time.
        --network-access-policy=: Policy for accessing the disk via network.
        --no-wait=: Do not wait for the long-running operation to finish.
        --optimized-for-frequent-attach=:
            description: Setting this property to true improves reliability and performance of data disks that are frequently (more than 5 times a day) by detached from one virtual machine and attached to another.
            nargs: -1
        --os-type=: The Operating System type of the Disk.
        --performance-plus=:
            description: Set this flag to true to get a boost on the performance target of the disk deployed.
            nargs: -1
        --public-network-access=: Customers can set on Managed Disks or Snapshots to control the export policy on the disk.
        --secure-vm-disk-encryption-set=: Name or ID of disk encryption set created with ConfidentialVmEncryptedWithCustomerKey encryption type.
        --security-data-uri=: Please specify the blob URI of VHD to be imported into VM guest state
        --security-type=: The security type of the VM.
        --sku=: Underlying storage SKU
        --source-storage-account-id=: used when source blob is in a different subscription
        --source=: source to create the disk/snapshot from, including unmanaged blob uri, managed disk id or name, or snapshot id or name
        --subscription=: Name or ID of subscription.
        --support-hibernation=:
            description: Indicate the OS on a disk supports hibernation.
            nargs: -1
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --tier=: 'Performance tier of the disk (e.g, P4, S10) as described here: https://azure.microsoft.com/pricing/details/managed-disks/.'
        --upload-size-bytes=: The size (in bytes) of the contents of the upload including the VHD footer.
        --upload-type=: Create the disk for upload scenario.
        --zone=: Availability zone into which to provision the resource.
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: The name of the managed disk
        -z, --size-gb=: size in GB.
      completion:
        flag:
            accelerated-network:
                - "true"
                - "false"
            architecture:
                - x64
                - Arm64
            data-access-auth-mode:
                - AzureActiveDirectory
                - None
            enable-bursting:
                - "true"
                - "false"
            encryption-type:
                - EncryptionAtRestWithPlatformKey
                - EncryptionAtRestWithCustomerKey
                - EncryptionAtRestWithPlatformAndCustomerKeys
            for-upload:
                - "true"
                - "false"
            hyper-v-generation:
                - V1
                - V2
            network-access-policy:
                - AllowAll
                - AllowPrivate
                - DenyAll
            optimized-for-frequent-attach:
                - "true"
                - "false"
            os-type:
                - Windows
                - Linux
            performance-plus:
                - "true"
                - "false"
            public-network-access:
                - Disabled
                - Enabled
            security-type:
                - TrustedLaunch
                - ConfidentialVM_VMGuestStateOnlyEncryptedWithPlatformKey
                - ConfidentialVM_DiskEncryptedWithPlatformKey
                - ConfidentialVM_DiskEncryptedWithCustomerKey
                - Standard
            sku:
                - Standard_LRS
                - Premium_LRS
                - StandardSSD_LRS
                - UltraSSD_LRS
                - Premium_ZRS
                - StandardSSD_ZRS
                - PremiumV2_LRS
            support-hibernation:
                - "true"
                - "false"
            upload-type:
                - Upload
                - UploadWithSecurityData
    - name: delete
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the managed disk that is being created.
        -y, --yes=: Do not prompt for confirmation.
      completion:
        flag:
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: grant-access
      flags:
        --access=: Access level.
        --duration-in-seconds=!: Time duration in seconds until the SAS access expires.
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the managed disk that is being created.
        -s, --secure-vm-guest-state-sas=:
            description: Get SAS on managed disk with VM guest state.
            nargs: -1
      completion:
        flag:
            access:
                - None
                - Read
                - Write
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            secure-vm-guest-state-sas:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: list
      flags:
        --max-items=: Total number of items to return in the command's output.
        --next-token=: Token to specify where to start paginating.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: revoke-access
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the managed disk that is being created.
      completion:
        flag:
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: show
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the managed disk that is being created.
    - name: update
      flags:
        --accelerated-network=:
            description: Customers can set on Managed Disks or Snapshots to enable the accelerated networking if the OS disk image support.
            nargs: -1
        --add=:
            description: Add an object to a list of objects by specifying a path and key value pairs.
            nargs: -1
        --architecture=: CPU architecture supported by an OS disk.
        --data-access-auth-mode=: Specify the auth mode when exporting or uploading to a disk or snapshot.
        --disk-access=: Name or ID of the disk access resource for using private endpoints on disks.
        --disk-encryption-set=: Name or ID of disk encryption set that is used to encrypt the disk.
        --disk-iops-read-only=: The total number of IOPS that will be allowed across all VMs mounting the shared disk as ReadOnly.
        --disk-iops-read-write=: The number of IOPS allowed for this disk; only settable for UltraSSD disks.
        --disk-mbps-read-only=: The total throughput (MBps) that will be allowed across all VMs mounting the shared disk as ReadOnly.
        --disk-mbps-read-write=: The bandwidth allowed for this disk; only settable for UltraSSD disks.
        --enable-bursting=:
            description: Enable on-demand bursting beyond the provisioned performance target of the disk.
            nargs: -1
        --encryption-type=: Encryption type.
        --force-string=:
            description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --max-shares=: The maximum number of VMs that can attach to the disk at the same time.
        --network-access-policy=: Policy for accessing the disk via network.
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --public-network-access=: Customers can set on Managed Disks or Snapshots to control the export policy on the disk.
        --remove=:
            description: Remove a property or an element from a list.
            nargs: -1
        --set=:
            description: Update an object by specifying a property path and value to set.
            nargs: -1
        --sku=: Underlying storage SKU.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the managed disk that is being created.
        -z, --size-gb=: Size in GB.
      completion:
        flag:
            accelerated-network:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            architecture:
                - Arm64
                - x64
            data-access-auth-mode:
                - AzureActiveDirectory
                - None
            enable-bursting:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            encryption-type:
                - EncryptionAtRestWithCustomerKey
                - EncryptionAtRestWithPlatformAndCustomerKeys
                - EncryptionAtRestWithPlatformKey
            force-string:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            network-access-policy:
                - AllowAll
                - AllowPrivate
                - DenyAll
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            public-network-access:
                - Disabled
                - Enabled
            sku:
                - PremiumV2_LRS
                - Premium_LRS
                - Premium_ZRS
                - StandardSSD_LRS
                - StandardSSD_ZRS
                - Standard_LRS
                - UltraSSD_LRS
    - name: wait
      description: Place the CLI in a waiting state until a condition of a managed disk is met.
      flags:
        --created=: wait until created with 'provisioningState' at 'Succeeded'
        --custom=: Wait until the condition satisfies a custom JMESPath query.
        --deleted=: wait until deleted
        --exists=: wait until the resource exists
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --interval=: polling interval in seconds
        --subscription=: Name or ID of subscription.
        --timeout=: maximum wait in seconds
        --updated=: wait until updated with provisioningState at 'Succeeded'
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the managed disk that is being created.
