# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: cosmosdb
description: Manage Azure Cosmos DB database accounts.
commands:
    - name: cassandra
      commands:
        - name: keyspace
          commands:
            - name: throughput
              commands:
                - name: migrate
                  description: Migrate an Azure Cosmos DB Cassandra keyspace throughput
                  flags:
                    --subscription=: Name or ID of subscription.
                    -a, --account-name=!: Cosmosdb account name.
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: Keyspace name
                    -t, --throughput-type=!: The type of throughput to migrate to.
                  completion:
                    flag:
                        throughput-type:
                            - autoscale
                            - manual
                - name: update
                  description: Update an Azure Cosmos DB Cassandra keyspace throughput
                  flags:
                    --max-throughput=: The maximum throughput resource can scale to (RU/s).
                    --subscription=: Name or ID of subscription.
                    --throughput=: The throughput of Cassandra keyspace (RU/s).
                    -a, --account-name=!: Cosmosdb account name.
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: Keyspace name
                - name: show
                  description: Gets the RUs per second of the Cassandra Keyspace under an existing Azure Cosmos DB database account with the provided name.
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -a, --account-name=!: Cosmosdb account name.
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: Keyspace name
            - name: create
              description: Create an Azure Cosmos DB Cassandra keyspace
              flags:
                --max-throughput=: The maximum throughput resource can scale to (RU/s).
                --subscription=: Name or ID of subscription.
                --throughput=: The throughput of Cassandra keyspace (RU/s).
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Keyspace name
            - name: delete
              description: Deletes an existing Azure Cosmos DB Cassandra keyspace.
              flags:
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Keyspace name
                -y, --yes=: Do not prompt for confirmation.
            - name: show
              description: Gets the Cassandra keyspaces under an existing Azure Cosmos DB database account with the provided name.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Keyspace name
            - name: exists
              description: Checks if an Azure Cosmos DB Cassandra keyspace exists
              flags:
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Keyspace name
            - name: list
              description: Lists the Cassandra keyspaces under an existing Azure Cosmos DB database account.
              flags:
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
        - name: table
          commands:
            - name: exists
              description: Checks if an Azure Cosmos DB Cassandra table exists
              flags:
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -k, --keyspace-name=!: Keyspace name
                -n, --name=!: Table name
            - name: list
              description: Lists the Cassandra table under an existing Azure Cosmos DB database account.
              flags:
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -k, --keyspace-name=!: Keyspace name
            - name: throughput
              commands:
                - name: update
                  description: Update an Azure Cosmos DB Cassandra table throughput
                  flags:
                    --max-throughput=: The maximum throughput resource can scale to (RU/s).
                    --subscription=: Name or ID of subscription.
                    --throughput=: The throughput of Cassandra table (RU/s).
                    -a, --account-name=!: Cosmosdb account name.
                    -g, --resource-group=!: Name of resource group.
                    -k, --keyspace-name=!: Keyspace name
                    -n, --name=!: Table name
                - name: show
                  description: Gets the RUs per second of the Cassandra table under an existing Azure Cosmos DB database account with the provided name.
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -a, --account-name=!: Cosmosdb account name.
                    -g, --resource-group=!: Name of resource group.
                    -k, --keyspace-name=!: Keyspace name
                    -n, --name=!: Table name
                - name: migrate
                  description: Migrate an Azure Cosmos DB Cassandra table throughput
                  flags:
                    --subscription=: Name or ID of subscription.
                    -a, --account-name=!: Cosmosdb account name.
                    -g, --resource-group=!: Name of resource group.
                    -k, --keyspace-name=!: Keyspace name
                    -n, --name=!: Table name
                    -t, --throughput-type=!: The type of throughput to migrate to.
                  completion:
                    flag:
                        throughput-type:
                            - autoscale
                            - manual
            - name: create
              description: Create an Azure Cosmos DB Cassandra table
              flags:
                --analytical-storage-ttl=: Analytical TTL, when analytical storage is enabled.
                --max-throughput=: The maximum throughput resource can scale to (RU/s).
                --schema=!: 'Schema, you can enter it as a string or as a file, e.g., --schema @schema-file.json or --schema "{\"columns\": [{\"name\": \"columnA\",\"type\": \"uuid\"}, {\"name\": \"columnB\",\"type\": \"Ascii\"}],\"partitionKeys\": [{\"name\": \"columnA\"}]}"'
                --subscription=: Name or ID of subscription.
                --throughput=: The throughput of Cassandra table (RU/s).
                --ttl=: Default TTL.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -k, --keyspace-name=!: Keyspace name
                -n, --name=!: Table name
            - name: delete
              description: Deletes an existing Azure Cosmos DB Cassandra table.
              flags:
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -k, --keyspace-name=!: Keyspace name
                -n, --name=!: Table name
                -y, --yes=: Do not prompt for confirmation.
            - name: update
              description: Update an Azure Cosmos DB Cassandra table
              flags:
                --analytical-storage-ttl=: Analytical TTL, when analytical storage is enabled.
                --schema=: 'Schema, you can enter it as a string or as a file, e.g., --schema @schema-file.json or --schema "{\"columns\": [{\"name\": \"columnA\",\"type\": \"uuid\"}, {\"name\": \"columnB\",\"type\": \"Ascii\"}],\"partitionKeys\": [{\"name\": \"columnA\"}]}"'
                --subscription=: Name or ID of subscription.
                --ttl=: Default TTL.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -k, --keyspace-name=!: Keyspace name
                -n, --name=!: Table name
            - name: show
              description: Gets the Cassandra table under an existing Azure Cosmos DB database account.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -k, --keyspace-name=!: Keyspace name
                -n, --name=!: Table name
    - name: check-name-exists
      description: Checks that the Azure Cosmos DB account name already exists.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -n, --name=: Name of the Cosmos DB database account
    - name: collection
      commands:
        - name: update
          description: Updates an Azure Cosmos DB collection
          flags:
            --default-ttl=: Default TTL.
            --indexing-policy=: Indexing Policy, you can enter it as a string or as a file, e.g., --indexing-policy @policy-file.json)
            --key=: Cosmos DB account key.
            --subscription=: Name or ID of subscription.
            --throughput=: Offer Throughput (RU/s)
            --url-connection=: Cosmos DB account url connection.
            -c, --collection-name=!: Collection Name
            -d, --db-name=!: Database Name
            -g, --resource-group-name=: name of the resource group.
            -n, --name=: Cosmos DB account name.
        - name: create
          description: Creates an Azure Cosmos DB collection
          flags:
            --cep=: 'Client Encryption Policy, you can enter it as a string or as a file, e.g., --cep @policy-file.json or --cep "{\"includedPaths\": [{\"path\": \"/path1\",\"clientEncryptionKeyId\": \"key1\",\"encryptionAlgorithm\": \"AEAD_AES_256_CBC_HMAC_SHA256\",\"encryptionType\": \"Deterministic\"}],\"policyFormatVersion\": 2}"'
            --default-ttl=: Default TTL.
            --indexing-policy=: Indexing Policy, you can enter it as a string or as a file, e.g., --indexing-policy @policy-file.json)
            --key=: Cosmos DB account key.
            --partition-key-path=: Partition Key Path, e.g., '/properties/name'
            --subscription=: Name or ID of subscription.
            --throughput=: Offer Throughput (RU/s)
            --url-connection=: Cosmos DB account url connection.
            --vector-embeddings=: 'Vector Embedding Policy, you can enter it as a string or as a file, e.g., --vector-embeddings @policy-file.json or --vector-embeddings "{\"vectorEmbeddings\": [{\"path\": \"/vector1\", \"dataType\": \"float32\", \"dimensions\": 2, \"distanceFunction\": \"dotproduct\" }]}"'
            -c, --collection-name=!: Collection Name
            -d, --db-name=!: Database Name
            -g, --resource-group-name=: name of the resource group.
            -n, --name=: Cosmos DB account name.
        - name: list
          description: Lists all Azure Cosmos DB collections
          flags:
            --key=: Cosmos DB account key.
            --subscription=: Name or ID of subscription.
            --url-connection=: Cosmos DB account url connection.
            -d, --db-name=!: Database Name
            -g, --resource-group-name=: name of the resource group.
            -n, --name=: Cosmos DB account name.
        - name: show
          description: Shows an Azure Cosmos DB collection and its offer
          flags:
            --key=: Cosmos DB account key.
            --subscription=: Name or ID of subscription.
            --url-connection=: Cosmos DB account url connection.
            -c, --collection-name=!: Collection Name
            -d, --db-name=!: Database Name
            -g, --resource-group-name=: name of the resource group.
            -n, --name=: Cosmos DB account name.
        - name: delete
          description: Deletes an Azure Cosmos DB collection
          flags:
            --key=: Cosmos DB account key.
            --subscription=: Name or ID of subscription.
            --url-connection=: Cosmos DB account url connection.
            -c, --collection-name=!: Collection Name
            -d, --db-name=!: Database Name
            -g, --resource-group-name=: name of the resource group.
            -n, --name=: Cosmos DB account name.
            -y, --yes=: Do not prompt for confirmation.
        - name: exists
          description: Returns a boolean indicating whether the collection exists
          flags:
            --key=: Cosmos DB account key.
            --subscription=: Name or ID of subscription.
            --url-connection=: Cosmos DB account url connection.
            -c, --collection-name=!: Collection Name
            -d, --db-name=!: Database Name
            -g, --resource-group-name=: name of the resource group.
            -n, --name=: Cosmos DB account name.
    - name: create
      description: Create a new Azure Cosmos DB database account.
      flags:
        --analytical-storage-schema-type=: Schema type for analytical storage.
        --assign-identity=:
            description: Assign system or user assigned identities separated by spaces.
            nargs: -1
        --backup-interval=: the frequency(in minutes) with which backups are taken (only for accounts with periodic mode backups)
        --backup-policy-type=: The type of backup policy of the account to create
        --backup-redundancy=: The redundancy type of the backup Storage account
        --backup-retention=: the time(in hours) for which each backup is retained (only for accounts with periodic mode backups)
        --capabilities=:
            description: set custom capabilities on the Cosmos DB database account.
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --continuous-tier=: The tier of Continuous backup
        --databases-to-restore=:
            description: Add a database and its collection names to restore
            nargs: -1
        --default-consistency-level=: default consistency level of the Cosmos DB database account
        --default-identity=: The primary identity to access key vault in CMK related features.
        --disable-key-based-metadata-write-access=:
            description: Disable write operations on metadata resources (databases, containers, throughput) via account keys
            nargs: -1
        --enable-analytical-storage=:
            description: Flag to enable log storage on the account.
            nargs: -1
        --enable-automatic-failover=:
            description: Enables automatic failover of the write region in the rare event that the region is unavailable due to an outage.
            nargs: -1
        --enable-burst-capacity=:
            description: Flag to enable burst capacity on the account.
            nargs: -1
        --enable-free-tier=:
            description: If enabled the account is free-tier.
            nargs: -1
        --enable-multiple-write-locations=:
            description: Enable Multiple Write Locations
            nargs: -1
        --enable-partition-merge=:
            description: Flag to enable partition merge on the account.
            nargs: -1
        --enable-prpp-autoscale=:
            description: Enable or disable PerRegionPerPartitionAutoscale.
            nargs: -1
        --enable-virtual-network=:
            description: Enables virtual network on the Cosmos DB database account
            nargs: -1
        --gremlin-databases-to-restore=:
            description: Add a gremlin database and its graph names to restore
            nargs: -1
        --ip-range-filter=:
            description: firewall support.
            nargs: -1
        --key-uri=: The URI of the key vault
        --kind=: The type of Cosmos DB database account to create
        --locations=:
            description: Add a location to the Cosmos DB database account
            nargs: -1
        --max-interval=: when used with Bounded Staleness consistency, this value represents the time amount of staleness (in seconds) tolerated.
        --max-staleness-prefix=: when used with Bounded Staleness consistency, this value represents the number of stale requests tolerated.
        --minimal-tls-version=: Indicates the minimum allowed TLS version
        --network-acl-bypass=: Flag to enable or disable Network Acl Bypass.
        --restore-source=: The restorable-database-account Id of the source account from which the account has to be restored.
        --restore-timestamp=: The timestamp to which the account has to be restored to.
        --server-version=: Valid only for MongoDB accounts.
        --subscription=: Name or ID of subscription.
        --tables-to-restore=:
            description: Add table names to restore
            nargs: -1
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --virtual-network-rules=:
            description: ACL's for virtual network
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -i, --network-acl-bypass-resource-ids=:
            description: List of Resource Ids to allow Network Acl Bypass.
            nargs: -1
        -n, --name=!: Name of the Cosmos DB database account
        -p, --public-network-access=: Sets public network access in server to either Enabled, Disabled, or SecuredByPerimeter.
        -r, --is-restore-request=:
            description: Restore from an existing/deleted account.
            nargs: -1
      completion:
        flag:
            analytical-storage-schema-type:
                - WellDefined
                - FullFidelity
            backup-policy-type:
                - Periodic
                - Continuous
            backup-redundancy:
                - Geo
                - Local
                - Zone
            continuous-tier:
                - Continuous7Days
                - Continuous30Days
            default-consistency-level:
                - Eventual
                - Session
                - BoundedStaleness
                - Strong
                - ConsistentPrefix
            disable-key-based-metadata-write-access:
                - "true"
                - "false"
            enable-analytical-storage:
                - "true"
                - "false"
            enable-automatic-failover:
                - "true"
                - "false"
            enable-burst-capacity:
                - "true"
                - "false"
            enable-free-tier:
                - "true"
                - "false"
            enable-multiple-write-locations:
                - "true"
                - "false"
            enable-partition-merge:
                - "true"
                - "false"
            enable-prpp-autoscale:
                - "true"
                - "false"
            enable-virtual-network:
                - "true"
                - "false"
            is-restore-request:
                - "true"
                - "false"
            kind:
                - GlobalDocumentDB
                - MongoDB
                - Parse
            minimal-tls-version:
                - Tls
                - Tls11
                - Tls12
            network-acl-bypass:
                - None
                - AzureServices
            public-network-access:
                - ENABLED
                - DISABLED
                - SECUREDBYPERIMETER
            server-version:
                - "3.2"
                - "3.6"
                - "4.0"
                - "4.2"
                - "5.0"
                - "6.0"
                - "7.0"
    - name: database
      commands:
        - name: list
          description: Lists all Azure Cosmos DB databases
          flags:
            --key=: Cosmos DB account key.
            --subscription=: Name or ID of subscription.
            --url-connection=: Cosmos DB account url connection.
            -g, --resource-group-name=: name of the resource group.
            -n, --name=: Cosmos DB account name.
        - name: show
          description: Shows an Azure Cosmos DB database
          flags:
            --key=: Cosmos DB account key.
            --subscription=: Name or ID of subscription.
            --url-connection=: Cosmos DB account url connection.
            -d, --db-name=!: Database Name
            -g, --resource-group-name=: name of the resource group.
            -n, --name=: Cosmos DB account name.
        - name: exists
          description: Returns a boolean indicating whether the database exists
          flags:
            --key=: Cosmos DB account key.
            --subscription=: Name or ID of subscription.
            --url-connection=: Cosmos DB account url connection.
            -d, --db-name=!: Database Name
            -g, --resource-group-name=: name of the resource group.
            -n, --name=: Cosmos DB account name.
        - name: create
          description: Creates an Azure Cosmos DB database
          flags:
            --key=: Cosmos DB account key.
            --subscription=: Name or ID of subscription.
            --throughput=: Offer Throughput (RU/s)
            --url-connection=: Cosmos DB account url connection.
            -d, --db-name=!: Database Name
            -g, --resource-group-name=: name of the resource group.
            -n, --name=: Cosmos DB account name.
        - name: delete
          description: Deletes an Azure Cosmos DB database
          flags:
            --key=: Cosmos DB account key.
            --subscription=: Name or ID of subscription.
            --url-connection=: Cosmos DB account url connection.
            -d, --db-name=!: Database Name
            -g, --resource-group-name=: name of the resource group.
            -n, --name=: Cosmos DB account name.
            -y, --yes=: Do not prompt for confirmation.
    - name: delete
      description: Deletes an Azure Cosmos DB database account.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the Cosmos DB database account
        -y, --yes=: Do not prompt for confirmation.
    - name: failover-priority-change
      description: Changes the failover priority for the Azure Cosmos DB database account.
      flags:
        --failover-policies=!:
            description: space-separated failover policies in 'regionName=failoverPriority' format.
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the Cosmos DB database account
    - name: gremlin
      commands:
        - name: database
          commands:
            - name: create
              description: Creates an Azure Cosmos DB Gremlin database
              flags:
                --max-throughput=: The maximum throughput resource can scale to (RU/s).
                --subscription=: Name or ID of subscription.
                --throughput=: The throughput Gremlin database (RU/s).
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Database name
            - name: throughput
              commands:
                - name: migrate
                  description: Migrate an Azure Cosmos DB Gremlin database throughput
                  flags:
                    --subscription=: Name or ID of subscription.
                    -a, --account-name=!: Cosmosdb account name.
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: Database name
                    -t, --throughput-type=!: The type of throughput to migrate to.
                  completion:
                    flag:
                        throughput-type:
                            - autoscale
                            - manual
                - name: update
                  description: Update an Azure Cosmos DB Gremlin database throughput
                  flags:
                    --max-throughput=: The maximum throughput resource can scale to (RU/s).
                    --subscription=: Name or ID of subscription.
                    --throughput=: The throughput of Gremlin database (RU/s).
                    -a, --account-name=!: Cosmosdb account name.
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: Database name
                - name: show
                  description: Gets the RUs per second of the Gremlin database under an existing Azure Cosmos DB database account with the provided name.
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -a, --account-name=!: Cosmosdb account name.
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: Database name
            - name: list
              description: Lists the Gremlin databases under an existing Azure Cosmos DB database account.
              flags:
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
            - name: show
              description: Gets the Gremlin databases under an existing Azure Cosmos DB database account with the provided name.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Database name
            - name: restore
              description: Restore a deleted gremlin database within the same account.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --disable-ttl=: Flag to restore with TTL disabled
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the CosmosDB Gremlin database name
                -t, --restore-timestamp=: The timestamp to which the database needs to be restored to.
            - name: exists
              description: Checks if an Azure Cosmos DB Gremlin database exists
              flags:
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Database name
            - name: delete
              description: Deletes an existing Azure Cosmos DB Gremlin database.
              flags:
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: Cosmosdb account name.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Database name
                -y, --yes=: Do not prompt for confirmation.
        - name: restorable-graph
          commands:
            - name: list
              description: Show the event feed of all mutations done on all the Azure Cosmos DB Gremlin graphs under a specific database.
              flags:
                --subscription=: Name or ID of subscription.
                -d, --database-rid=!: Rid of the gremlin database
                -e, --end-time=: End time of restorable Gremlin graph event feed
                -i, --instance-id=!: InstanceId of the Account
                -l, --location=!: Location
                -s, --start-time=: Start time of restorable Gremlin graph event feed
        - name: graph
          commands:
            - name: create
              description: Creates an Azure Cosmos DB Gremlin graph
              flags:
                --analytical-storage-ttl=: Analytical TTL, when analytical storage is enabled.
                --idx=: 'Indexing Policy, you can enter it as a string or as a file, e.g., --idx @policy-file.json or --idx "{\"indexingMode\": \"consistent\", \"automatic\": true, \"includedPaths\": [{\"path\": \"/*\"}], \"excludedPaths\": [{ \"path\": \"/headquarters/employees/?\"}, { \"path\": \"/\\"_etag\\"/?\"}]}"'
                --max-throughput=: The maximum throughput resource can scale to (RU/s).
                --subscription=: Name or ID of subscription.
                --throughput=: The throughput of Gremlin graph (RU/s).
                --ttl=: Default TTL.
                -a, --account-name=!: Cosmosdb account name.
                -c, --conflict-resolution-policy=: 'Conflict Resolution Policy, you can enter it as a string or as a file, e.g., --conflict-resolution-policy @policy-file.json or --conflict-resolution-policy "{\"mode\": \"lastWriterWins\", \"conflictResolutionPath\": \"/path\"}"'
                -d, --database-name=!: Database name.
