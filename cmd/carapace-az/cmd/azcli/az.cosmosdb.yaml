        flag:
            analytical-storage-schema-type:
                - WellDefined
                - FullFidelity
            backup-policy-type:
                - Periodic
                - Continuous
            backup-redundancy:
                - Geo
                - Local
                - Zone
            continuous-tier:
                - Continuous7Days
                - Continuous30Days
            default-consistency-level:
                - Eventual
                - Session
                - BoundedStaleness
                - Strong
                - ConsistentPrefix
            disable-key-based-metadata-write-access:
                - "true"
                - "false"
            enable-analytical-storage:
                - "true"
                - "false"
            enable-automatic-failover:
                - "true"
                - "false"
            enable-burst-capacity:
                - "true"
                - "false"
            enable-multiple-write-locations:
                - "true"
                - "false"
            enable-partition-merge:
                - "true"
                - "false"
            enable-prpp-autoscale:
                - "true"
                - "false"
            enable-virtual-network:
                - "true"
                - "false"
            minimal-tls-version:
                - Tls
                - Tls11
                - Tls12
            network-acl-bypass:
                - None
                - AzureServices
            public-network-access:
                - ENABLED
                - DISABLED
                - SECUREDBYPERIMETER
            server-version:
                - "3.2"
                - "3.6"
                - "4.0"
                - "4.2"
                - "5.0"
                - "6.0"
                - "7.0"
