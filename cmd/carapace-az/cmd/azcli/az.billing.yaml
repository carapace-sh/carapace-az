                nargs: -1
            --subscription=: Name or ID of subscription.
            --transfer-name=!: The ID that uniquely identifies a transfer request.
        - name: show
          description: Get a transfer request by ID.
          flags:
            --subscription=: Name or ID of subscription.
            --transfer-name=!: The ID that uniquely identifies a transfer request.
