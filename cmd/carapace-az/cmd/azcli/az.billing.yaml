# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: billing
description: Manage Azure Billing.
commands:
    - name: account
      description: Billing account.
      commands:
        - name: list
          description: List the billing accounts that a user has access to.
          flags:
            --expand=: May be used to expand the soldTo, invoice sections and billing profiles.
            --subscription=: Name or ID of subscription.
        - name: transaction
          description: Manage billing acount transaction
          commands:
            - name: list
              description: List the billed and unbilled transactions by billing account name for given start and end date.
              flags:
                --billing-account-name=!: The ID that uniquely identifies a billing account.
                --filter=: May be used to filter by transaction type.
                --max-items=: Total number of items to return in the command's output.
                --next-token=: Token to specify where to start paginating.
                --period-end-date=!: The end date to fetch the transactions.
                --period-start-date=!: The start date to fetch the transactions.
                --subscription=: Name or ID of subscription.
        - name: invoice-section
          description: Manage account invoice section
          commands:
            - name: list
              description: List all invoice sections for which a user has access.
              flags:
                --billing-account-name=!: Billing Account Id.
                --expand=: May be used to expand the billingProfiles.
                --max-items=: Total number of items to return in the command's output.
                --next-token=: Token to specify where to start paginating.
                --subscription=: Name or ID of subscription.
            - name: show
              description: Get the InvoiceSection by id.
              flags:
                --billing-account-name=!: Billing Account Id.
                --expand=: May be used to expand the billingProfiles.
                --invoice-section-name=!: InvoiceSection Id.
                --subscription=: Name or ID of subscription.
        - name: reservation
          description: Manage account reservation
          commands:
            - name: list
              description: List the reservations for a billing account and the roll up counts of reservations group by provisioning states.
              flags:
                --billing-account-name=!: The ID that uniquely identifies a billing account.
                --filter=: May be used to filter by reservation properties.
                --max-items=: Total number of items to return in the command's output.
                --next-token=: Token to specify where to start paginating.
                --orderby=: May be used to sort order by reservation properties.
                --refresh-summary=: To indicate whether to refresh the roll up counts of the reservations group by provisioning states
                --selected-state=: The selected provisioning state
                --subscription=: Name or ID of subscription.
        - name: show
          description: Get a billing account by its ID.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --expand=: May be used to expand the soldTo, invoice sections and billing profiles.
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies a billing account.
        - name: wait
          description: Place the CLI in a waiting state until a condition of the billing account is met.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --expand=: May be used to expand the soldTo, invoice sections and billing profiles.
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -n, --name=!: The ID that uniquely identifies a billing account.
        - name: list-invoice-section
          description: List the invoice sections for which the user has permission to create Azure subscriptions.
          flags:
            --billing-account-name=!: The ID that uniquely identifies a billing account.
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
        - name: update
          description: Update the properties of a billing account.
          flags:
            --billing-profiles-value=: The billing profiles associated with the billing account.
            --departments=: The departments associated to the enrollment.
            --display-name=: The billing account name.
            --enrollment-accounts=: The accounts associated to the enrollment.
            --no-wait=: Do not wait for the long-running operation to finish.
            --sold-to=:
                description: The address of the individual or organization that is responsible for the billing account.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies a billing account.
    - name: agreement
      description: Display billing agreement
      commands:
        - name: list
          description: List the agreements for a billing account.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --expand=: May be used to expand the participants.
            --subscription=: Name or ID of subscription.
        - name: show
          description: Get an agreement by ID.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --expand=: May be used to expand the participants.
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies an agreement.
    - name: balance
      description: billing balance
      commands:
        - name: show
          description: The available credit balance for a billing profile.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --profile-name=!: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
    - name: customer
      description: billing customer
      commands:
        - name: list
          description: List the customers that are billed to a billing account.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --filter=: May be used to filter the list of customers.
            --profile-name=: The ID that uniquely identifies a billing profile.
            --search=: Used for searching customers by their name.
            --subscription=: Name or ID of subscription.
        - name: show
          description: Get a customer by its ID.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --expand=: May be used to expand enabledAzurePlans and resellers
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies a customer.
    - name: enrollment-account
      description: Manage enrollment account
      commands:
        - name: billing-permission
          description: Manage enrollment account billing permission
          commands:
            - name: list
              description: List the billing permissions the caller has on an enrollment account.
              flags:
                --billing-account-name=!: The ID that uniquely identifies a billing account.
                --enrollment-account-name=!: The ID that uniquely identifies an enrollment account.
                --max-items=: Total number of items to return in the command's output.
                --next-token=: Token to specify where to start paginating.
                --subscription=: Name or ID of subscription.
        - name: list
          description: Lists the enrollment accounts the caller has access to.
          flags:
            --subscription=: Name or ID of subscription.
        - name: show
          description: Gets a enrollment account by name.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --name=!: name of the enrollment account
    - name: instruction
      description: Manage billing instruction
      commands:
        - name: create
          description: Create an instruction.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --amount=: The amount budgeted for this billing instruction.
            --creation-date=: The date this billing instruction was created.
            --end-date=: The date this billing instruction is no longer in effect.
            --profile-name=!: The ID that uniquely identifies a billing profile.
            --start-date=: The date this billing instruction goes into effect.
            --subscription=: Name or ID of subscription.
            -n, --name=!: Instruction Name.
        - name: update
          description: Update an instruction.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --amount=: The amount budgeted for this billing instruction.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --creation-date=: The date this billing instruction was created.
            --end-date=: The date this billing instruction is no longer in effect.
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --profile-name=!: The ID that uniquely identifies a billing profile.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --start-date=: The date this billing instruction goes into effect.
            --subscription=: Name or ID of subscription.
            -n, --name=!: Instruction Name.
        - name: show
          description: Show the instruction by name.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --profile-name=!: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
            -n, --name=!: Instruction Name.
        - name: list
          description: List the instructions by billing profile id.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --profile-name=!: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
    - name: invoice
      description: Manage invoice.
      commands:
        - name: section
          description: Manage invoice section
          commands:
            - name: show
              description: Get an invoice section by its ID.
              flags:
                --account-name=!: The ID that uniquely identifies a billing account.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --profile-name=!: The ID that uniquely identifies a billing profile.
                --subscription=: Name or ID of subscription.
                -n, --name=!: The ID that uniquely identifies an invoice section.
            - name: update
              description: Creates or updates an invoice section.
              flags:
                --account-name=!: The ID that uniquely identifies a billing account.
                --display-name=: The name of the invoice section.
                --labels=:
                    description: Dictionary of metadata associated with the invoice section.
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --profile-name=!: The ID that uniquely identifies a billing profile.
                --subscription=: Name or ID of subscription.
                -n, --name=!: The ID that uniquely identifies an invoice section.
            - name: create
              description: Creates or updates an invoice section.
              flags:
                --account-name=!: The ID that uniquely identifies a billing account.
                --display-name=: The name of the invoice section.
                --labels=:
                    description: Dictionary of metadata associated with the invoice section.
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --profile-name=!: The ID that uniquely identifies a billing profile.
                --subscription=: Name or ID of subscription.
                -n, --name=!: The ID that uniquely identifies an invoice section.
            - name: initiate-transfer
              description: Sends a request to a user in another billing account to transfer billing ownership of their subscriptions.
              flags:
                --billing-account-name=!: The ID that uniquely identifies a billing account.
                --billing-profile-name=!: The ID that uniquely identifies a billing profile.
                --invoice-section-name=!: The ID that uniquely identifies an invoice section.
                --recipient-email-id=: The email ID of the recipient to whom the transfer request is sent.
                --reseller-id=: Optional MPN ID of the reseller for transfer requests that are sent from a Microsoft Partner Agreement billing account.
                --subscription=: Name or ID of subscription.
            - name: wait
              description: Place the CLI in a waiting state until a condition of the billing invoice section is met.
              flags:
                --account-name=!: The ID that uniquely identifies a billing account.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --created=: wait until created with 'provisioningState' at 'Succeeded'
                --custom=: Wait until the condition satisfies a custom JMESPath query.
                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --interval=: polling interval in seconds
                --profile-name=!: The ID that uniquely identifies a billing profile.
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                -n, --name=!: The ID that uniquely identifies an invoice section.
            - name: list
              description: List the invoice sections that a user has access to.
              flags:
                --account-name=!: The ID that uniquely identifies a billing account.
                --profile-name=!: The ID that uniquely identifies a billing profile.
                --subscription=: Name or ID of subscription.
        - name: download
          description: Get URL to download invoice
          flags:
            --account-name=: The ID that uniquely identifies a billing account
            --download-token=: The download token with document source and document ID
            --download-urls=:
                description: Space-separated list of download urls for individual
                nargs: -1
            --invoice-name=: The ID that uniquely identifies an invoice
            --subscription=: Name or ID of subscription.
        - name: list
          description: List the invoices for a subscription.
          flags:
            --account-name=: The ID that uniquely identifies a billing account.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --period-end-date=!: The end date to fetch the invoices.
            --period-start-date=!: The start date to fetch the invoices.
            --profile-name=: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
        - name: show
          description: Get an invoice.
          flags:
            --account-name=: The ID that uniquely identifies a billing account.
            --by-subscription=: When provided, it must work with --invoice-name to get an invoice by subscription ID and invoice ID
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies an invoice.
    - name: period
      description: Manage billing periods for a subscription.
      commands:
        - name: list
          description: List the available billing periods for a subscription in reverse chronological order.
          flags:
            --filter=: May be used to filter billing periods by billingPeriodEndDate.
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --skiptoken=: Skiptoken is only used if a previous operation returned a partial result.
            --subscription=: Name or ID of subscription.
            --top=: May be used to limit the number of results to the most recent N billing periods.
        - name: show
          description: Show a named billing period.
          flags:
            --subscription=: Name or ID of subscription.
            -n, --name=!: Name of the billing period.
    - name: permission
      description: List billing permissions
      commands:
        - name: list
          description: List the billing permissions the caller has on a billing account.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --customer-name=: The ID that uniquely identifies a customer.
            --invoice-section-name=: The ID that uniquely identifies an invoice section.
            --profile-name=: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
    - name: policy
      description: billing policy
      commands:
        - name: update
          description: Update the policies for a billing profile.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --customer-name=: The ID that uniquely identifies a customer
            --marketplace-purchases=: The policy that controls whether Azure marketplace purchases are allowed for a billing profile.
            --profile-name=: The ID that uniquely identifies a billing profile.
            --reservation-purchases=: The policy that controls whether Azure reservation purchases are allowed for a billing profile.
            --subscription=: Name or ID of subscription.
            --view-charges=: The policy that controls whether users with Azure RBAC access to a subscription can view its charges.
          completion:
            flag:
                marketplace-purchases:
                    - AllAllowed
                    - OnlyFreeAllowed
                    - NotAllowed
                reservation-purchases:
                    - Allowed
                    - NotAllowed
                view-charges:
                    - Allowed
                    - NotAllowed
        - name: show
          description: Show the policies for a customer or for a billing profile.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --customer-name=: The ID that uniquely identifies a customer
            --profile-name=: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
    - name: product
      description: billing product
      commands:
        - name: move
          description: Moves a product's charges to a new invoice section.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --destination-invoice-section-id=: The destination invoice section id.
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies a product.
        - name: show
          description: Get a product by ID.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies a product.
        - name: update
          description: Update the properties of a Product.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --auto-renew=: Indicates whether auto renewal is turned on or off for a product.
            --billing-frequency=: The frequency at which the product will be billed.
            --status=: The current status of the product.
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies a product.
          completion:
            flag:
                auto-renew:
                    - "Off"
                    - "On"
                billing-frequency:
                    - OneTime
                    - Monthly
                    - UsageBased
                status:
                    - Active
                    - Inactive
                    - PastDue
                    - Expiring
                    - Expired
                    - Disabled
                    - Cancelled
                    - AutoRenew
        - name: list
          description: List the products for a billing account.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --customer-name=: The ID that uniquely identifies a customer.
            --filter=: May be used to filter by product type.
            --invoice-section-name=: The ID that uniquely identifies an invoice section.
            --profile-name=: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
        - name: validate-move
          description: Validate if a product's charges can be moved to a new invoice section.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --destination-invoice-section-id=: The destination invoice section id.
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies a product.
    - name: profile
      description: Manage profile
      commands:
        - name: create
          description: Creates or updates a billing profile.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --bill-to=:
                description: Billing address.
                nargs: -1
            --display-name=: The name of the billing profile.
            --enabled-azure-plans=:
                description: Information about the enabled azure plans.
                nargs: -1
            --invoice-email-opt-in=:
                description: Flag controlling whether the invoices for the billing profile are sent through email.
                nargs: -1
            --invoice-sections-value=: The invoice sections associated to the billing profile.
            --no-wait=: Do not wait for the long-running operation to finish.
            --po-number=: The purchase order name that will appear on the invoices generated for the billing profile.
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies a billing profile.
          completion:
            flag:
                invoice-email-opt-in:
                    - "true"
                    - "false"
        - name: reservation
          description: Manage profile reservation
          commands:
            - name: list
              description: List the reservations for a billing profile and the roll up counts of reservations group by provisioning state.
              flags:
                --billing-account-name=!: The ID that uniquely identifies a billing account.
                --billing-profile-name=!: The ID that uniquely identifies a billing profile.
                --filter=: May be used to filter by reservation properties.
                --max-items=: Total number of items to return in the command's output.
                --next-token=: Token to specify where to start paginating.
                --orderby=: May be used to sort order by reservation properties.
                --refresh-summary=: To indicate whether to refresh the roll up counts of the reservations group by provisioning state
                --selected-state=: The selected provisioning state
                --subscription=: Name or ID of subscription.
        - name: wait
          description: Place the CLI in a waiting state until a condition of the billing profile is met.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --expand=: May be used to expand the invoice sections.
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -n, --name=!: The ID that uniquely identifies a billing profile.
        - name: update
          description: Creates or updates a billing profile.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --bill-to=:
                description: Billing address.
                nargs: -1
            --display-name=: The name of the billing profile.
            --enabled-azure-plans=:
                description: Information about the enabled azure plans.
                nargs: -1
            --invoice-email-opt-in=:
                description: Flag controlling whether the invoices for the billing profile are sent through email.
                nargs: -1
            --invoice-sections-value=: The invoice sections associated to the billing profile.
            --no-wait=: Do not wait for the long-running operation to finish.
            --po-number=: The purchase order name that will appear on the invoices generated for the billing profile.
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies a billing profile.
          completion:
            flag:
                invoice-email-opt-in:
                    - "true"
                    - "false"
        - name: show
          description: Get a billing profile by its ID.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --expand=: May be used to expand the invoice sections.
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies a billing profile.
        - name: list
          description: List the billing profiles that a user has access to.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --expand=: May be used to expand the invoice sections.
            --subscription=: Name or ID of subscription.
    - name: property
      description: billing property
      commands:
        - name: update
          description: Update the billing property of a subscription.
          flags:
            --cost-center=: The cost center applied to the subscription.
            --subscription=: Name or ID of subscription.
        - name: show
          description: Get the billing properties for a subscription.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
    - name: role-assignment
      description: billing role-assignment
      commands:
        - name: list
          description: List the role assignments for the caller on a billing account.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --invoice-section-name=: The ID that uniquely identifies an invoice section.
            --profile-name=: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
        - name: delete
          description: Delete a role assignment for the caller on a billing account.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --invoice-section-name=: The ID that uniquely identifies an invoice section.
            --profile-name=: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies a role assignment.
            -y, --yes=: Do not prompt for confirmation.
        - name: show
          description: Show the role assignment detail for the caller within different scopes.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --invoice-section-name=: The ID that uniquely identifies an invoice section.
            --profile-name=: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
            -n, --name=!: The ID that uniquely identifies a role assignment.
    - name: role-definition
      description: Display billing role-definition
      commands:
        - name: show
          description: Show the role definition details
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --invoice-section-name=: The ID that uniquely identifies an invoice section.
            --profile-name=: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
            -n, --name=!: The name that uniquely identifies a role definition.
        - name: list
          description: List the role definitions for a billing account.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --invoice-section-name=: The ID that uniquely identifies an invoice section.
            --profile-name=: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
    - name: subscription
      description: billing subscription
      commands:
        - name: list
          description: List the subscriptions for a billing account.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --customer-name=: The ID that uniquely identifies a customer.
            --invoice-section-name=: The ID that uniquely identifies an invoice section.
            --profile-name=: The ID that uniquely identifies a billing profile.
            --subscription=: Name or ID of subscription.
        - name: update
          description: Update the properties of a billing subscription.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --cost-center=: The cost center applied to the subscription.
            --sku-id=: The sku ID of the Azure plan for the subscription.
            --subscription-billing-status=: The current billing status of the subscription.
            --subscription=: Name or ID of subscription.
          completion:
            flag:
                subscription-billing-status:
                    - Active
                    - Inactive
                    - Abandoned
                    - Deleted
                    - Warning
        - name: wait
          description: Place the CLI in a waiting state until a condition of the billing subscription is met.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
        - name: validate-move
          description: Validate if a subscription's charges can be moved to a new invoice section.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --destination-invoice-section-id=!: The destination invoice section id.
            --subscription=: Name or ID of subscription.
        - name: move
          description: Moves a subscription's charges to a new invoice section.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --destination-invoice-section-id=!: The destination invoice section id.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
        - name: show
          description: Get a subscription by its ID.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
    - name: transaction
      description: billing transaction
      commands:
        - name: list
          description: List the transactions for an invoice.
          flags:
            --account-name=!: The ID that uniquely identifies a billing account.
            --invoice-name=!: The ID that uniquely identifies an invoice.
            --subscription=: Name or ID of subscription.
    - name: transfer
      description: Manage transfer
      commands:
        - name: list
          description: List the transfer requests received by the caller.
          flags:
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
        - name: accept-transfer
          description: Accepts a transfer request.
          flags:
            --product-details=:
