# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: logicapp
description: Manage logic apps.
commands:
    - name: config
      description: Configure a logic app.
      commands:
        - name: appsettings
          description: Configure logic app settings.
          commands:
            - name: list
              description: Show settings for a logic app.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: name of the logic app.
                -s, --slot=: the name of the slot.
            - name: delete
              description: Delete a logic app's settings.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --setting-names=!:
                    description: space-separated app setting names
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: name of the logic app.
                -s, --slot=: the name of the slot.
            - name: set
              description: Update a logic app's settings.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --settings=:
                    description: space-separated app settings in a format of `<name>=<value>`
                    nargs: -1
                --slot-settings=:
                    description: space-separated slot app settings in a format of `<name>=<value>`
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: name of the logic app.
                -s, --slot=: the name of the slot.
    - name: create
      description: Create a logic app.
      flags:
        --app-insights-key=: Instrumentation key of App Insights to be added.
        --app-insights=: Name of the existing App Insights project to be added to the logic app.
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --disable-app-insights=:
            description: Disable creating application insights resource during logicapp create.
            nargs: -1
        --https-only=:
            description: Redirect all traffic made to an app using HTTP to HTTPS.
            nargs: -1
        --runtime-version=: The runtime version for logic app.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -b, --deployment-source-branch=: the branch to deploy
        -d, --docker-registry-server-user=: The container registry server username.
        -g, --resource-group=!: Name of resource group.
        -i, --deployment-container-image-name=: Container image name from container registry, e.g. publisher/image-name:tag
        -l, --deployment-local-git=: enable local git
        -n, --name=!: name of the new logic app
        -p, --plan=: name or resource id of the logicapp app service plan.
        -s, --storage-account=!: Provide a string value of a Storage Account in the provided Resource Group.
        -u, --deployment-source-url=: Git repository URL to link with manual integration
        -v, --functions-version=: The functions version for logic app.
        -w, --docker-registry-server-password=: The container registry server password.
      completion:
        flag:
            disable-app-insights:
                - "true"
                - "false"
            functions-version:
                - "4"
            https-only:
                - "true"
                - "false"
            runtime-version:
                - ~14
                - ~16
                - ~18
    - name: delete
      description: Delete a logic app.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: name of the logic app.
        -s, --slot=: the name of the slot.
        -y, --yes=: Do not prompt for confirmation.
    - name: deployment
      description: Manage logic app deployments.
      commands:
        - name: source
          description: Manage logicapp app deployment via source control.
          commands:
            - name: config-zip
              description: Perform deployment using the kudu zip push deployment for a logic app.
              flags:
                --build-remote=:
                    description: enable remote build during deployment
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --src=!: a zip file path for deployment
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: name of the logic app.
                -s, --slot=: the name of the slot.
                -t, --timeout=: Configurable timeout in seconds for checking the status of deployment
              completion:
                flag:
                    build-remote:
                        - "true"
                        - "false"
    - name: list
      description: List logic apps.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: restart
      description: Restart a logic app.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: name of the logic app.
        -s, --slot=: the name of the slot.
    - name: scale
      description: Scale a logic app.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --max-instances=: The maximum number of instances this logic app can scale out to under load.
        --min-instances=: The number of instances that are always ready and warm for this logic app.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: name of the logic app.
        -s, --slot=: the name of the slot.
    - name: show
      description: Get the details of a logic app.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: name of the logic app.
    - name: start
      description: Start a logic app.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: name of the logic app.
        -s, --slot=: the name of the slot.
    - name: stop
      description: Stop a logic app.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: name of the logic app.
        -s, --slot=: the name of the slot.
    - name: update
      description: Update a logic app.
      flags:
        --__FORCE=:
            description: ==SUPPRESS==
            nargs: -1
        --add=:
            description: Add an object to a list of objects by specifying a path and key value pairs.
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        --plan=: The name or resource id of the plan to update the logicapp with.
        --remove=:
            description: Remove a property or an element from a list.
            nargs: -1
        --set=:
            description: Update an object by specifying a property path and value to set.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: name of the logic app.
        -s, --slot=: the name of the slot.
