# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: databoxedge
description: Manage device with databoxedge.
commands:
    - name: alert
      commands:
        - name: list
          description: Get all the alerts for a Data Box Edge/Data Box Gateway device.
          flags:
            --subscription=: Name or ID of subscription.
            -d, --device-name=!: The device name.
            -g, --resource-group=!: Name of resource group.
        - name: show
          description: Get an alert by name.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -d, --device-name=: The device name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The alert name.
    - name: bandwidth-schedule
      commands:
        - name: show
          description: Get the properties of the specified bandwidth schedule.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -d, --device-name=: The device name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The bandwidth schedule name.
        - name: wait
          description: Place the CLI in a waiting state until a condition of the databoxedge bandwidth-schedule is met.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -d, --device-name=: The device name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The bandwidth schedule name.
        - name: list
          description: Get all the bandwidth schedules for a Data Box Edge/Data Box Gateway device.
          flags:
            --subscription=: Name or ID of subscription.
            -d, --device-name=!: The device name.
            -g, --resource-group=!: Name of resource group.
        - name: create
          description: Create a bandwidth schedule.
          flags:
            --days=!:
                description: The days of the week when this schedule is applicable.
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --rate-in-mbps=!: The bandwidth rate in Mbps.
            --start=!: The start time of the schedule in UTC.
            --stop=!: The stop time of the schedule in UTC.
            --subscription=: Name or ID of subscription.
            -d, --device-name=!: The device name.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The bandwidth schedule name which needs to be added/updated.
        - name: delete
          description: Delete the specified bandwidth schedule.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -d, --device-name=: The device name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The bandwidth schedule name.
            -y, --yes=: Do not prompt for confirmation.
        - name: update
          description: Update a bandwidth schedule.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --days=!:
                description: The days of the week when this schedule is applicable.
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --rate-in-mbps=!: The bandwidth rate in Mbps.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --start=!: The start time of the schedule in UTC.
            --stop=!: The stop time of the schedule in UTC.
            --subscription=: Name or ID of subscription.
            -d, --device-name=: The device name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The bandwidth schedule name which needs to be added/updated.
