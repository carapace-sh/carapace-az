# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: private-link
description: private-link
commands:
    - name: association
      commands:
        - name: show
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -m, --management-group-id=!: The management group id.
            -n, --name=!: The name of the private link association
        - name: list
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -m, --management-group-id=!: The management group id.
        - name: delete
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -m, --management-group-id=!: The management group id.
            -n, --name=!: The name of the private link association
            -y, --yes=: Do not prompt for confirmation.
        - name: create
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --public-network-access=!: restrict traffic to private link
            -m, --management-group-id=!: The management group id.
            -n, --name=!: The name of the private link association
            -p, --privatelink=!: The name of the private link
          completion:
            flag:
                public-network-access:
                    - enabled
                    - disabled
