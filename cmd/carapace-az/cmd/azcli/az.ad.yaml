# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: ad
description: Manage Microsoft Entra ID (formerly known as Azure Active Directory, Azure AD, AAD) entities needed for Azure role-based access control (Azure RBAC) through Microsoft Graph API.
commands:
    - name: app
      description: Manage Microsoft Entra applications.
      commands:
        - name: owner
          description: Manage application owners.
          commands:
            - name: list
              description: List application owners.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=!: identifier uri, application id, or object id of the application
            - name: add
              description: Add an application owner.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=!: identifier uri, application id, or object id
                --owner-object-id=!: owner's object id
            - name: remove
              description: Remove an application owner.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=!: identifier uri, application id, or object id
                --owner-object-id=!: owner's object id
        - name: permission
          description: Manage an application's OAuth2 permissions.
          commands:
            - name: admin-consent
              description: Grant Application & Delegated permissions through admin-consent.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=!: identifier uri, application id, or object id
            - name: grant
              description: Grant the app an API Delegated permissions
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --api=!: The id of the resource service principal to which access is authorized.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --consent-type=: Indicates whether authorization is granted for the client application to impersonate all users or only a specific user.
                --id=!: The id of the client service principal for the application which is authorized to act on behalf of a signed-in user when accessing an API.
                --principal-id=: The id of the user on behalf of whom the client is authorized to access the resource, when consentType is 'Principal'.
                --scope=!:
                    description: A space-separated list of the claim values for delegated permissions which should be included in access tokens for the resource application (the API).
                    nargs: -1
              completion:
                flag:
                    consent-type:
                        - AllPrincipals
                        - Principal
            - name: list-grants
              description: List Oauth2 permission grants
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --filter=: OData filter, e.g. --filter "displayname eq 'test' and servicePrincipalType eq 'Application'"
                --id=: identifier uri, application id, or object id
                -r, --show-resource-name=:
                    description: show resource's display name
                    nargs: -1
              completion:
                flag:
                    show-resource-name:
                        - "true"
                        - "false"
            - name: add
              description: Add an API permission
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --api-permissions=!:
                    description: Space-separated list of {id}={type}.
                    nargs: -1
                --api=!: requiredResourceAccess.resourceAppId - The unique identifier for the resource that the application requires access to.
                --id=!: identifier uri, application id, or object id
            - name: delete
              description: Remove an API permission
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --api-permissions=:
                    description: Specify `ResourceAccess.id` - The unique identifier for one of the OAuth2Permission or AppRole instances that the resource application exposes.
                    nargs: -1
                --api=!: requiredResourceAccess.resourceAppId - The unique identifier for the resource that the application requires access to.
                --id=!: identifier uri, application id, or object id
            - name: list
              description: List API permissions the application has requested
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=!: identifier uri, application id, or object id of the associated application
        - name: credential
          description: Manage an application's password or certificate credentials
          commands:
            - name: delete
              description: Delete an application's password or certificate credentials
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --cert=: Operate on certificate credentials
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=!: identifier uri, application id, or object id
                --key-id=!: credential key id
            - name: reset
              description: Reset an application's password or certificate credentials
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --append=: Append the new credential instead of overwriting.
                --cert=: Certificate to use for credentials.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --create-cert=: Create a self-signed certificate to use for the credential.
                --display-name=: Friendly name for the credential.
                --end-date=: Finer grain of expiry time if '--years' is insufficient, e.g. '2020-12-31T11:59:59+00:00' or '2299-12-31'
                --id=!: identifier uri, application id, or object id
                --keyvault=: Name or ID of a KeyVault to use for creating or retrieving certificates.
                --years=: Number of years for which the credentials will be valid.
            - name: list
              description: List an application's password or certificate credential metadata.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --cert=: Operate on certificate credentials
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=!: identifier uri, application id, or object id
        - name: delete
          description: Delete an application.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --id=!: identifier uri, application id, or object id
        - name: update
          description: Update an application.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --app-roles=: The collection of roles assigned to the application.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --display-name=: the display name of the application
            --enable-access-token-issuance=:
                description: Specifies whether this web application can request an access token using the OAuth 2.0 implicit flow.
                nargs: -1
            --enable-id-token-issuance=:
                description: Specifies whether this web application can request an ID token using the OAuth 2.0 implicit flow.
                nargs: -1
            --end-date=: Date or datetime after which credentials expire (e.g. '2017-12-31T11:59:59+00:00' or '2017-12-31').
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --id=!: identifier uri, application id, or object id
            --identifier-uris=:
                description: space-separated values.
                nargs: -1
            --is-fallback-public-client=:
                description: Specifies the fallback application type as public client, such as an installed application running on a mobile device.
                nargs: -1
            --key-display-name=: Friendly name for the key.
            --key-type=: the type of the key credentials associated with the application
            --key-usage=: the usage of the key credentials associated with the application.
            --key-value=: the value for the key credentials associated with the application
            --optional-claims=: Application developers can configure optional claims in their Microsoft Entra applications to specify the claims that are sent to their application by the Microsoft security token service.
            --public-client-redirect-uris=:
                description: Space-separated values.
                nargs: -1
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --requested-access-token-version=: Specifies the access token version expected by this resource.
            --required-resource-accesses=: Specifies the resources that the application needs to access.
            --service-management-reference=: References application or service contact information from a Service or Asset Management database.
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --sign-in-audience=: Specifies the Microsoft accounts that are supported for the current application.
            --start-date=: Date or datetime at which credentials become valid (e.g. '2017-01-01T01:00:00+00:00' or '2017-01-01').
            --web-home-page-url=: Home page or landing page of the application.
            --web-redirect-uris=:
                description: Space-separated values.
                nargs: -1
          completion:
            flag:
                enable-access-token-issuance:
                    - "true"
                    - "false"
                enable-id-token-issuance:
                    - "true"
                    - "false"
                is-fallback-public-client:
                    - "true"
                    - "false"
                key-type:
                    - AsymmetricX509Cert
                    - Password
                    - Symmetric
                key-usage:
                    - Sign
                    - Verify
                sign-in-audience:
                    - AzureADMyOrg
                    - AzureADMultipleOrgs
                    - AzureADandPersonalMicrosoftAccount
                    - PersonalMicrosoftAccount
        - name: federated-credential
          description: Manage application federated identity credentials.
          commands:
            - name: delete
              description: Delete application federated identity credential.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --federated-credential-id=!: ID or name of the federated identity credential
                --id=!: Application's appId, identifierUri, or id (formerly known as objectId)
            - name: create
              description: Create application federated identity credential.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=!: Application's appId, identifierUri, or id (formerly known as objectId)
                --parameters=!: Parameters for creating federated identity credential.
            - name: list
              description: List application federated identity credentials.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=!: Application's appId, identifierUri, or id (formerly known as objectId)
            - name: update
              description: Update application federated identity credential.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --federated-credential-id=!: ID or name of the federated identity credential
                --id=!: Application's appId, identifierUri, or id (formerly known as objectId)
                --parameters=!: Parameters for creating federated identity credential.
            - name: show
              description: Show application federated identity credential.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --federated-credential-id=!: ID or name of the federated identity credential
                --id=!: Application's appId, identifierUri, or id (formerly known as objectId)
        - name: create
          description: Create an application.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --app-roles=: The collection of roles assigned to the application.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --display-name=!: the display name of the application
            --enable-access-token-issuance=:
                description: Specifies whether this web application can request an access token using the OAuth 2.0 implicit flow.
                nargs: -1
            --enable-id-token-issuance=:
                description: Specifies whether this web application can request an ID token using the OAuth 2.0 implicit flow.
                nargs: -1
            --end-date=: Date or datetime after which credentials expire (e.g. '2017-12-31T11:59:59+00:00' or '2017-12-31').
            --identifier-uris=:
                description: space-separated values.
                nargs: -1
            --is-fallback-public-client=:
                description: Specifies the fallback application type as public client, such as an installed application running on a mobile device.
                nargs: -1
            --key-display-name=: Friendly name for the key.
            --key-type=: the type of the key credentials associated with the application
            --key-usage=: the usage of the key credentials associated with the application.
            --key-value=: the value for the key credentials associated with the application
            --optional-claims=: Application developers can configure optional claims in their Microsoft Entra applications to specify the claims that are sent to their application by the Microsoft security token service.
            --public-client-redirect-uris=:
                description: Space-separated values.
                nargs: -1
            --requested-access-token-version=: Specifies the access token version expected by this resource.
            --required-resource-accesses=: Specifies the resources that the application needs to access.
            --service-management-reference=: References application or service contact information from a Service or Asset Management database.
            --sign-in-audience=: Specifies the Microsoft accounts that are supported for the current application.
            --start-date=: Date or datetime at which credentials become valid (e.g. '2017-01-01T01:00:00+00:00' or '2017-01-01').
            --web-home-page-url=: Home page or landing page of the application.
            --web-redirect-uris=:
                description: Space-separated values.
                nargs: -1
          completion:
            flag:
                enable-access-token-issuance:
                    - "true"
                    - "false"
                enable-id-token-issuance:
                    - "true"
                    - "false"
                is-fallback-public-client:
                    - "true"
                    - "false"
                key-type:
                    - AsymmetricX509Cert
                    - Password
                    - Symmetric
                key-usage:
                    - Sign
                    - Verify
                sign-in-audience:
                    - AzureADMyOrg
                    - AzureADMultipleOrgs
                    - AzureADandPersonalMicrosoftAccount
                    - PersonalMicrosoftAccount
        - name: list
          description: List applications.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --all=: list all entities, expect long delay if under a big organization
            --app-id=: application id
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --display-name=: the display name of the application
            --filter=: OData filter, e.g. --filter "displayname eq 'test' and servicePrincipalType eq 'Application'"
            --identifier-uri=: graph application identifier, must be in uri format
            --show-mine=: list entities owned by the current user
        - name: show
          description: Get the details of an application.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --id=!: identifier uri, application id, or object id
    - name: group
      description: Manage Microsoft Entra groups.
      commands:
        - name: list
          description: List groups in the directory
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --display-name=: object's display name or its prefix
            --filter=: OData filter, e.g. --filter "displayname eq 'test' and servicePrincipalType eq 'Application'"
        - name: show
          description: Get the details of a group.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            -g, --group=!: group's object id or display name(prefix also works if there is a unique match)
        - name: owner
          description: Manage group owners.
          commands:
            - name: add
              description: Add a group owner.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --owner-object-id=!: owner's object id
                -g, --group=!: group's object id or display name(prefix also works if there is a unique match)
            - name: list
              description: List group owners.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                -g, --group=!: group's object id or display name(prefix also works if there is a unique match)
            - name: remove
              description: Remove a group owner.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --owner-object-id=!: owner's object id
                -g, --group=!: group's object id or display name(prefix also works if there is a unique match)
        - name: create
          description: Create a group.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --description=: Group description
            --display-name=!: object's display name or its prefix
            --force=:
                description: always create a new group instead of updating the one with same display and mail nickname
                nargs: -1
            --mail-nickname=!: Mail nickname
          completion:
            flag:
                force:
                    - "true"
                    - "false"
        - name: delete
          description: Delete a group.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            -g, --group=!: group's object id or display name(prefix also works if there is a unique match)
        - name: member
          description: Manage group members.
          commands:
            - name: add
              description: Add a member to a group.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --member-id=!: The object ID of the contact, group, user, or service principal
                -g, --group=!: group's object id or display name(prefix also works if there is a unique match)
            - name: remove
              description: Remove a member from a group.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --member-id=!: The object ID of the contact, group, user, or service principal
                -g, --group=!: group's object id or display name(prefix also works if there is a unique match)
            - name: list
              description: Get the members of a group.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                -g, --group=!: group's object id or display name(prefix also works if there is a unique match)
            - name: check
              description: Check if a member is in a group.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --member-id=!: The object ID of the contact, group, user, or service principal
                -g, --group=!: group's object id or display name(prefix also works if there is a unique match)
        - name: get-member-groups
          description: Get a collection of object IDs of groups of which the specified group is a member.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --security-enabled-only=:
                description: true to specify that only security groups that the entity is a member of should be returned; false to specify that all groups and directory roles that the entity is a member of should be returned.
                nargs: -1
            -g, --group=!: group's object id or display name(prefix also works if there is a unique match)
          completion:
            flag:
                security-enabled-only:
                    - "true"
                    - "false"
    - name: signed-in-user
      description: Show graph information about current signed-in user in CLI
      commands:
        - name: list-owned-objects
          description: Get the list of directory objects that are owned by the user
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            -t, --type=: object type filter, e.g. "application", "servicePrincipal"  "group", etc
        - name: show
          description: Get the details for the currently logged-in user.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
    - name: sp
      description: Manage Microsoft Entra service principals.
      commands:
        - name: show
          description: Get the details of a service principal.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --id=!: service principal name, or object id
        - name: delete
          description: Delete a service principal.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --id=!: service principal name, or object id
        - name: credential
          description: Manage a service principal's password or certificate credentials
          commands:
            - name: list
              description: List a service principal's password or certificate credential metadata.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --cert=: Operate on certificate credentials
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=!: service principal name, or object id
            - name: delete
              description: Delete a service principal's password or certificate credentials
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --cert=: Operate on certificate credentials
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=!: service principal name, or object id
                --key-id=!: credential key id
            - name: reset
              description: Reset a service principal's password or certificate credentials
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --append=: Append the new credential instead of overwriting.
                --cert=: Certificate to use for credentials.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --create-cert=: Create a self-signed certificate to use for the credential.
                --display-name=: Friendly name for the credential.
                --end-date=: Finer grain of expiry time if '--years' is insufficient, e.g. '2020-12-31T11:59:59+00:00' or '2299-12-31'
                --id=!: service principal name, or object id
                --keyvault=: Name or ID of a KeyVault to use for creating or retrieving certificates.
                --years=: Number of years for which the credentials will be valid.
        - name: update
          description: Update a service principal
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --id=!: service principal name, or object id
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
        - name: create-for-rbac
          description: Create a service principal and configure its access to Azure resources.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cert=: Certificate to use for credentials.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --create-cert=: Create a self-signed certificate to use for the credential.
            --keyvault=: Name or ID of a KeyVault to use for creating or retrieving certificates.
            --role=: Role of the service principal.
            --scopes=:
                description: Space-separated list of scopes the service principal's role assignment applies to.
                nargs: -1
            --sdk-auth=:
                description: Output service principal credential along with cloud endpoints in JSON format.
                nargs: -1
            --skip-assignment=:
                description: No-op.
                nargs: -1
            --years=: Number of years for which the credentials will be valid.
            -n, --display-name=: Display name of the service principal.
          completion:
            flag:
                sdk-auth:
                    - "true"
                    - "false"
                skip-assignment:
                    - "true"
                    - "false"
        - name: owner
          description: Manage service principal owners.
          commands:
            - name: list
              description: List service principal owners.
              flags:
                --___SUBSCRIPTION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=!: service principal name, or object id or the service principal
        - name: create
          description: Create a service principal.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --id=!: identifier uri, application id, or object id of the associated application
        - name: list
          description: List service principals.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --all=: list all entities, expect long delay if under a big organization
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --display-name=: object's display name or its prefix
            --filter=: OData filter, e.g. --filter "displayname eq 'test' and servicePrincipalType eq 'Application'"
            --show-mine=: list entities owned by the current user
            --spn=: service principal name
    - name: user
      description: Manage Microsoft Entra users.
      commands:
        - name: get-member-groups
          description: Get groups of which the user is a member
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --id=!: The object ID or principal name of the user for which to get information
            --security-enabled-only=:
                description: true to specify that only security groups that the entity is a member of should be returned; false to specify that all groups and directory roles that the entity is a member of should be returned.
                nargs: -1
          completion:
            flag:
                security-enabled-only:
                    - "true"
                    - "false"
        - name: show
          description: Get the details of a user.
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
