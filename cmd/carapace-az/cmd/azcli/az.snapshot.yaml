# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: snapshot
description: snapshot
commands:
    - name: create
      flags:
        --__SOURCE_BLOB_URI=:
            description: ==SUPPRESS==
            nargs: -1
        --__SOURCE_DISK=:
            description: ==SUPPRESS==
            nargs: -1
        --__SOURCE_SNAPSHOT=:
            description: ==SUPPRESS==
            nargs: -1
        --accelerated-network=:
            description: Customers can set on Managed Disks or Snapshots to enable the accelerated networking if the OS disk image support.
            nargs: -1
        --architecture=: CPU architecture.
        --bandwidth-copy-speed=: If this field is set on a snapshot and createOption is CopyStart, the snapshot will be copied at a quicker speed.
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --copy-start=:
            description: Create snapshot by using a deep copy process, where the resource creation is considered complete only after all data has been copied from the source.
            nargs: -1
        --disk-access=: Name or ID of the disk access resource for using private endpoints on disks.
        --disk-encryption-set=: Name or ID of disk encryption set that is used to encrypt the disk.
        --edge-zone=: The name of edge zone.
        --elastic-san-resource-id=: This is the ARM id of the source elastic san volume snapshot.
        --encryption-type=: Encryption type.
        --for-upload=:
            description: Create the snapshot for uploading blobs later on through storage commands.
            nargs: -1
        --hyper-v-generation=: The hypervisor generation of the Virtual Machine.
        --incremental=:
            description: Whether a snapshot is incremental.
            nargs: -1
        --network-access-policy=: Policy for accessing the disk via network.
        --no-wait=: Do not wait for the long-running operation to finish.
        --public-network-access=: Customers can set on Managed Disks or Snapshots to control the export policy on the disk.
        --sku=: ""
        --source-storage-account-id=: used when source blob is in a different subscription
        --source=: source to create the disk/snapshot from, including unmanaged blob uri, managed disk id or name, or snapshot id or name
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: The name of the snapshot
        -z, --size-gb=: size in GB.
      completion:
        flag:
            accelerated-network:
                - "true"
                - "false"
            architecture:
                - x64
                - Arm64
            bandwidth-copy-speed:
                - None
                - Enhanced
            copy-start:
                - "true"
                - "false"
            encryption-type:
                - EncryptionAtRestWithPlatformKey
                - EncryptionAtRestWithCustomerKey
                - EncryptionAtRestWithPlatformAndCustomerKeys
            for-upload:
                - "true"
                - "false"
            hyper-v-generation:
                - V1
                - V2
            incremental:
                - "true"
                - "false"
            network-access-policy:
                - AllowAll
                - AllowPrivate
                - DenyAll
            public-network-access:
                - Disabled
                - Enabled
            sku:
                - Standard_LRS
                - Premium_LRS
                - Standard_ZRS
    - name: delete
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the snapshot that is being created.
      completion:
        flag:
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: grant-access
      flags:
        --access=: Access level.
        --duration-in-seconds=!: Time duration in seconds until the SAS access expires.
        --file-format=: Used to specify the file format when making request for SAS on a VHDX file format snapshot
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the snapshot that is being created.
      completion:
        flag:
            access:
                - Read
                - Write
            file-format:
                - VHD
                - VHDX
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: list
      flags:
        --max-items=: Total number of items to return in the command's output.
        --next-token=: Token to specify where to start paginating.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: revoke-access
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the snapshot
      completion:
        flag:
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: show
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the snapshot that is being created.
    - name: update
      flags:
        --accelerated-network=:
            description: Customers can set on Managed Disks or Snapshots to enable the accelerated networking if the OS disk image support.
            nargs: -1
        --add=:
            description: Add an object to a list of objects by specifying a path and key value pairs.
            nargs: -1
        --architecture=: CPU architecture.
        --disk-access=: Name or ID of the disk access resource for using private endpoints on disks.
        --disk-encryption-set=: Name or ID of disk encryption set that is used to encrypt the disk.
        --encryption-type=: Encryption type.
        --force-string=:
            description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --network-access-policy=: Policy for accessing the disk via network.
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --public-network-access=: Policy for controlling export on the disk.
        --remove=:
            description: Remove a property or an element from a list.
            nargs: -1
        --set=:
            description: Update an object by specifying a property path and value to set.
            nargs: -1
        --sku=: The sku name.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the snapshot that is being created.
      completion:
        flag:
            accelerated-network:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            architecture:
                - Arm64
                - x64
            encryption-type:
                - EncryptionAtRestWithCustomerKey
                - EncryptionAtRestWithPlatformAndCustomerKeys
                - EncryptionAtRestWithPlatformKey
            force-string:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            network-access-policy:
                - AllowAll
                - AllowPrivate
                - DenyAll
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            public-network-access:
                - Disabled
                - Enabled
            sku:
                - Premium_LRS
                - Standard_LRS
                - Standard_ZRS
    - name: wait
      flags:
        --created=: wait until created with 'provisioningState' at 'Succeeded'
        --custom=: Wait until the condition satisfies a custom JMESPath query.
        --deleted=: wait until deleted
        --exists=: wait until the resource exists
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --interval=: polling interval in seconds
        --subscription=: Name or ID of subscription.
        --timeout=: maximum wait in seconds
        --updated=: wait until updated with provisioningState at 'Succeeded'
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the snapshot that is being created.
