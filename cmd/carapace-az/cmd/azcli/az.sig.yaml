                    nargs: -1
                -g, --resource-group=: Name of resource group.
                -l, --location=: Resource location
                -n, --name=: The name of the gallery application version.
                -r, --gallery-name=: Gallery name.
              completion:
                flag:
                    exclude-from:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
                    force-string:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
                    no-wait:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
            - name: wait
