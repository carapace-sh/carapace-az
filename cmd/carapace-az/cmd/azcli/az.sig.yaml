# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: sig
description: Manage shared image gallery.
commands:
    - name: create
      description: Create a shared image gallery.
      flags:
        --description=: The description of the gallery.
        --eula=: Community gallery publisher eula
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --permissions=: This property allows you to specify the permission of sharing gallery.
        --public-name-prefix=: Community gallery public name prefix
        --publisher-email=: Community gallery publisher contact email
        --publisher-uri=: Community gallery publisher uri
        --soft-delete=:
            description: Enable soft-deletion for resources in this gallery, allowing them to be recovered within retention time.
            nargs: -1
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'Space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Resource location  When not specified, the location of the resource group will be used.
        -r, --gallery-name=!: The name of the Shared Image Gallery to be deleted.
      completion:
        flag:
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            permissions:
                - Community
                - Groups
                - Private
            soft-delete:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: delete
      description: Delete a Shared Image Gallery.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -r, --gallery-name=: The name of the Shared Image Gallery to be deleted.
      completion:
        flag:
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: gallery-application
      description: Manage gallery application.
      commands:
        - name: update
          description: Update a gallery Application Definition.
