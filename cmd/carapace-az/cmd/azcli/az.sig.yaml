                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --expand=: The expand expression to apply on the operation.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --interval=: polling interval in seconds
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the gallery application version.
                -r, --gallery-name=: Gallery name.
              completion:
                flag:
                    expand:
                        - ReplicationStatus
            - name: create
              description: Create a gallery application version.
              flags:
                --application-name=!: The name of the gallery application.
                --config-file-name=: Optional.
                --default-file-link=: Optional.
                --end-of-life-date=: The end of life date of the gallery image version.
                --exclude-from=:
                    description: If set to true, Virtual Machines deployed from the latest version of the Image Definition won't use this Image Version.
                    nargs: -1
                --install-command=!: Required.
                --no-wait=:
                    description: Do not wait for the long-running operation to finish.
                    nargs: -1
                --package-file-link=!: Required.
                --package-file-name=: Optional.
                --remove-command=!: Required.
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: 'Space-separated tags: key[=value] [key[=value] ...].'
                    nargs: -1
                --target-regions=:
                    description: The target regions where the Image Version is going to be replicated to.
                    nargs: -1
                --update-command=: Optional.
                -g, --resource-group=!: Name of resource group.
                -l, --location=: Resource location  When not specified, the location of the resource group will be used.
                -n, --name=!: The name of the gallery application version.
                -r, --gallery-name=!: Gallery name.
              completion:
                flag:
                    exclude-from:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
                    no-wait:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
            - name: delete
              description: Delete a gallery application version.
              flags:
                --application-name=: The name of the gallery application.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --no-wait=:
                    description: Do not wait for the long-running operation to finish.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the gallery application version.
                -r, --gallery-name=: Gallery name.
                -y, --yes=: Do not prompt for confirmation.
              completion:
                flag:
                    no-wait:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
        - name: list
          description: List gallery Application Definitions in a gallery.
          flags:
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -r, --gallery-name=!: Gallery name.
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the gallery application.
            -r, --gallery-name=: Gallery name.
        - name: create
          description: Create a gallery Application Definition.
          flags:
            --description=: The description of this gallery Application Definition resource.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --os-type=!: This property allows you to specify the supported type of the OS that application is built for.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: Resource tags  Support shorthand-syntax, json-file and yaml-file.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Resource location  When not specified, the location of the resource group will be used.
            -n, --name=!: The name of the gallery application.
            -r, --gallery-name=!: Gallery name.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                os-type:
                    - Linux
                    - Windows
        - name: show
          description: Get information about a gallery Application Definition.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the gallery application.
            -r, --gallery-name=: Gallery name.
        - name: delete
          description: Delete a gallery Application.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the gallery application.
            -r, --gallery-name=: Gallery name.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
    - name: image-definition
      description: Manage shared gallery image with VM
      commands:
        - name: list-shared
          description: List VM Image definitions in a gallery shared directly to your subscription or tenant
          flags:
            --gallery-unique-name=: The unique name of the Shared Gallery.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --marker=: A string value that identifies the portion of the list of containers to be returned with the next listing operation.
            --shared-to=: The query parameter to decide what shared galleries to fetch when doing listing operations.
            --show-next-marker=: Show nextMarker in result when specified.
            --subscription=: Name or ID of subscription.
            -l, --location=: Location.
          completion:
            flag:
                shared-to:
                    - tenant
        - name: create
          description: create a gallery image definition
          flags:
            --architecture=: CPU architecture.
            --description=: the description of the gallery image definition
            --disallowed-disk-types=:
                description: disk types which would not work with the image, e.g., Standard_LRS
                nargs: -1
            --end-of-life-date=: the end of life date, e.g. '2020-12-31'
            --eula=: The Eula agreement for the gallery image
            --features=: A list of gallery image features.
            --hyper-v-generation=: The hypervisor generation of the Virtual Machine.
            --maximum-cpu-core=: maximum cpu cores
            --maximum-memory=: maximum memory in MB
            --minimum-cpu-core=: minimum cpu cores
            --minimum-memory=: minimum memory in MB
            --os-state=: This property allows the user to specify whether the virtual machines created under this image are 'Generalized' or 'Specialized'.
            --os-type=!: the type of the OS that is included in the disk if creating a VM from user-image or a specialized VHD
            --plan-name=: plan name
            --plan-product=: plan product
            --plan-publisher=: plan publisher
            --privacy-statement-uri=: The privacy statement uri
            --release-note-uri=: The release note uri
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -f, --offer=!: image offer
            -g, --resource-group=!: Name of resource group.
            -i, --gallery-image-definition=!: gallery image definition
            -l, --location=: Location.
            -p, --publisher=!: image publisher
            -r, --gallery-name=!: gallery name
            -s, --sku=!: image sku
          completion:
            flag:
                architecture:
                    - x64
                    - Arm64
                hyper-v-generation:
                    - V1
                    - V2
                os-state:
                    - Generalized
                    - Specialized
                os-type:
                    - Windows
                    - Linux
        - name: list-community
          description: List VM Image definitions in a gallery community
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --marker=: A string value that identifies the portion of the list of containers to be returned with the next listing operation.
            --public-gallery-name=: The public name of community gallery.
            --show-next-marker=: Show nextMarker in result when specified.
            --subscription=: Name or ID of subscription.
            -l, --location=: Location.
        - name: show-shared
          description: Get a shared gallery image
          flags:
            --gallery-unique-name=: The unique name of the Shared Gallery.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -i, --gallery-image-name=: The name of the Shared Gallery Image Definition from which the Image Versions are to be listed.
            -l, --location=: Location.
        - name: update
          description: Update a VM Image definition.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -i, --gallery-image-definition=: The name of the gallery image definition to be retrieved.
            -r, --gallery-name=: The name of the Shared Image Gallery in which the Image Definition resides.
          completion:
            flag:
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: list
          description: List gallery image definitions in a gallery.
          flags:
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -r, --gallery-name=!: The name of the Shared Image Gallery from which Image Definitions are to be listed.
        - name: delete
          description: Delete a gallery image.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -i, --gallery-image-name=: The name of the gallery image definition to be deleted.
            -r, --gallery-name=: The name of the Shared Image Gallery in which the Image Definition is to be deleted.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: show
          description: Get information about a gallery image definition.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -i, --gallery-image-name=: The name of the gallery image definition to be retrieved.
            -r, --gallery-name=: The name of the Shared Image Gallery from which the Image Definitions are to be retrieved.
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -i, --gallery-image-name=: The name of the gallery image definition to be retrieved.
            -r, --gallery-name=: The name of the Shared Image Gallery from which the Image Definitions are to be retrieved.
        - name: show-community
          description: Get a community gallery image.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --public-gallery-name=: The public name of the community gallery.
            --subscription=: Name or ID of subscription.
            -i, --gallery-image-definition=: The name of the community gallery image definition from which the image versions are to be listed.
            -l, --location=: Location.
    - name: image-version
      description: Manage shared gallery image version with VM
      commands:
        - name: update
          description: update a share image version
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --allow-replicated-location-deletion=:
                description: Indicate whether or not removing this gallery image version from replicated regions is allowed.
                nargs: -1
            --block-deletion-before-end-of-life=:
                description: Indicate whether or not the deletion is blocked for this gallery image version if its end of life has not expired
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --no-wait=: Do not wait for the long-running operation to finish.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --replica-count=: The default number of replicas to be created per region.
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --target-edge-zones=:
                description: Space-separated list of regions, edge zones, replica counts and storage types.
                nargs: -1
            --target-regions=:
                description: Space-separated list of regions and their replica counts.
                nargs: -1
            -e, --gallery-image-version=!: Gallery image version in semantic version pattern.
            -g, --resource-group=!: Name of resource group.
            -i, --gallery-image-definition=!: gallery image definition
            -r, --gallery-name=!: gallery name
          completion:
            flag:
                allow-replicated-location-deletion:
                    - "true"
                    - "false"
                block-deletion-before-end-of-life:
                    - "true"
                    - "false"
        - name: show-shared
          description: Get an image version in a gallery shared directly to your subscription or tenant
          flags:
            --gallery-unique-name=: The unique name of the Shared Gallery.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -e, --gallery-image-version=: The name of the gallery image version to be created.
            -i, --gallery-image-name=: The name of the Shared Gallery Image Definition from which the Image Versions are to be listed.
            -l, --location=: Location.
        - name: create
          description: create a new image version
          flags:
            --allow-replicated-location-deletion=:
                description: Indicate whether or not removing this gallery image version from replicated regions is allowed.
                nargs: -1
            --block-deletion-before-end-of-life=:
                description: Indicate whether or not the deletion is blocked for this gallery image version if its end of life has not expired
                nargs: -1
            --data-snapshot-luns=:
                description: Logical unit numbers (space-delimited) of data disk snapshots
                nargs: -1
            --data-snapshots=:
                description: Names or IDs (space-delimited) of data disk snapshots
                nargs: -1
            --data-vhds-luns=:
                description: Logical unit numbers (space-delimited) of source VHD URIs of data disks
                nargs: -1
            --data-vhds-storage-accounts=:
                description: Names or IDs (space-delimited) of storage accounts of source VHD URIs of data disks
                nargs: -1
            --data-vhds-uris=:
                description: Source VHD URIs (space-delimited) of data disks
                nargs: -1
            --end-of-life-date=: the end of life date, e.g. '2020-12-31'
            --exclude-from-latest=:
                description: The flag means that if it is set to true, people deploying VMs with version omitted will not use this version.
                nargs: -1
            --image-version=: Resource id of gallery image version source
