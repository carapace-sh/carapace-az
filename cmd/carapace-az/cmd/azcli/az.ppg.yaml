# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: ppg
description: Manage Proximity Placement Groups.
commands:
    - name: create
      description: Create a proximity placement group.
      flags:
        --intent-vm-sizes=:
            description: Specifies possible sizes of virtual machines that can be created in the proximity placement group.
            nargs: -1
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'Space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Resource location  When not specified, the location of the resource group will be used.
        -n, --name=!: The name of the proximity placement group.
        -t, --type=: The type of the proximity placement group.
        -z, --zone=:
            description: Specifies the Availability Zone where virtual machine, virtual machine scale set or availability set associated with the  proximity placement group can be created.
            nargs: -1
      completion:
        flag:
            type:
                - Standard
                - Ultra
    - name: delete
      description: Delete a proximity placement group.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the proximity placement group.
    - name: list
      description: List proximity placement groups.
      flags:
        --max-items=: Total number of items to return in the command's output.
        --next-token=: Token to specify where to start paginating.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: show
      description: Get a proximity placement group.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --include-colocation-status=:
            description: Enable fetching the colocation status of all the resources in the proximity placement group.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the proximity placement group.
      completion:
        flag:
            include-colocation-status:
                - "True"
                - "False"
    - name: update
      description: Update a proximity placement group.
      flags:
        --add=:
            description: Add an object to a list of objects by specifying a path and key value pairs.
            nargs: -1
        --force-string=:
            description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            nargs: -1
        --intent-vm-sizes=:
            description: Specifies possible sizes of virtual machines that can be created in the proximity placement group.
            nargs: -1
        --remove=:
            description: Remove a property or an element from a list.
            nargs: -1
        --set=:
            description: Update an object by specifying a property path and value to set.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The name of the proximity placement group.
        -t, --type=: The type of the proximity placement group.
      completion:
        flag:
            force-string:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            type:
                - Standard
                - Ultra
