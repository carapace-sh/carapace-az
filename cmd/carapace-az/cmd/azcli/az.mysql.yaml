# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: mysql
description: Manage Azure Database for MySQL servers.
commands:
    - name: db
      description: Manage MySQL databases on a server.
      commands:
        - name: delete
          description: Deletes a database.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the database
            -s, --server-name=: Name of the server.
            -y, --yes=: Do not prompt for confirmation.
        - name: show
          description: Gets information about a database.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the database
            -s, --server-name=: Name of the server.
        - name: list
          description: List all the databases in a given server.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -s, --server-name=!: Name of the Server.
        - name: create
          description: Create a MySQL database.
          flags:
            --charset=: The charset of the database
            --collation=: The collation of the database
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the database
            -s, --server-name=!: Name of the server.
    - name: flexible-server
      description: Manage Azure Database for MySQL Flexible Servers.
      commands:
        - name: ad-admin
          description: Manage server Active Directory administrator.
          commands:
            - name: create
              description: Create an Active Directory administrator.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --identity=!: Name or ID of identity used for AAD Authentication.
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -i, --object-id=!: The unique ID of the Azure AD administrator.
                -s, --server-name=!: Name of the server.
                -u, --display-name=!: Display name of the Azure AD administrator user or group.
            - name: wait
              description: Wait for the Active Directory administrator to satisfy certain conditions.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --created=: wait until created with 'provisioningState' at 'Succeeded'
                --custom=: Wait until the condition satisfies a custom JMESPath query.
                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --interval=: polling interval in seconds
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
            - name: delete
              description: Delete an Active Directory administrator.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
            - name: show
              description: Get an Active Directory administrator.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
            - name: list
              description: List all Active Directory administrators.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
        - name: stop
          description: Stop a flexible server.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the server.
        - name: export
          description: Manage export backup on a server.
          commands:
            - name: create
              description: Create an export backup for a given server with specified backup name.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -b, --backup-name=!: The name of the new export backup.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the server.
                -u, --sas-uri=!: SAS URI for destination container.
        - name: backup
          description: Manage flexible server backups.
          commands:
            - name: list
              description: List all the backups for a given server.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the server.
            - name: show
              description: Get backup for a given server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -b, --backup-name=: The name of the backup.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the server.
            - name: create
              description: Create backup for a given server with specified backup name.
              flags:
                --parameters=: The required parameters for creating and exporting backup of the given server.
                --subscription=: Name or ID of subscription.
                -b, --backup-name=!: The name of the new backup.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the server.
        - name: maintenance
          description: Manage maintenance on a flexible server.
          commands:
            - name: reschedule
              description: Reschedule the ongoing planned maintenance of a flexible server.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --start-time=!: The new start time of the rescheduled maintenance.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Resource Group Name of the server.
                -m, --maintenance-name=!: The name of the maintenance.
                -s, --server-name=: The name of the server.
            - name: list
              description: List all of the maintenances of a flexible server.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Resource Group Name of the server.
                -s, --server-name=!: The name of the server.
            - name: show
              description: Get the specific maintenance of a flexible server by maintenance name.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Resource Group Name of the server.
                -m, --maintenance-name=!: The name of the maintenance.
                -s, --server-name=: The name of the server.
        - name: upgrade
          description: Upgrade the major version of a flexible server.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the server.
            -v, --version=!: Server major version.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                version:
                    - "8"
        - name: show-connection-string
          description: Show the connection strings for a MySQL flexible-server database.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -d, --database-name=: The name of the database to be created when provisioning the database server
            -p, --admin-password=: The password of the administrator.
            -s, --server-name=: Name of the server.
            -u, --admin-user=: Administrator username for the server.
        - name: identity
          description: Manage server user assigned identities.
          commands:
            - name: list
              description: List all user assigned managed identities from the server.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
            - name: remove
              description: Remove user asigned managed identites from the server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --identity=!:
                    description: Space-separated names or ID's of identities.
                    nargs: -1
                -s, --server-name=!: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
            - name: assign
              description: Add user asigned managed identities to the server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --identity=!:
                    description: Space-separated names or ID's of identities.
                    nargs: -1
                -s, --server-name=!: Name of the server.
            - name: show
              description: Get an user assigned managed identity from the server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --identity=!: Name or ID of identity to show.
                -s, --server-name=!: Name of the server.
        - name: db
          description: Manage MySQL databases on a flexible server.
          commands:
            - name: show
              description: Gets information about a database.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -d, --database-name=: The name of the database to be created when provisioning the database server
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the server.
            - name: list
              description: List all the databases in a given server.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
            - name: create
              description: Create a MySQL database on a flexible server.
              flags:
                --charset=: The charset of the database.
                --collation=: The collation of the database.
                --subscription=: Name or ID of subscription.
                -d, --database-name=: The name of the database to be created when provisioning the database server
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
            - name: delete
              description: Delete a database on a flexible server.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -d, --database-name=: The name of the database to be created when provisioning the database server
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
        - name: replica
          description: Manage read replicas.
          commands:
            - name: stop-replication
              description: Stop replication to a read replica and make it a read/write server.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
            - name: create
              description: Create a read replica for a server.
              flags:
                --backup-retention=: The number of days a backup is retained.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --database-port=: The port of the database.
                --geo-redundant-backup=: Whether or not geo redundant backup is enabled.
                --iops=: Number of IOPS to be allocated for this server.
                --no-wait=: Do not wait for the long-running operation to finish.
                --private-dns-zone=: This parameter only applies if you are creating cross region replica server with private access.
                --public-access=: Determines the public access.
                --replica-name=!: The name of the server to restore to.
                --sku-name=: The name of the compute SKU.
                --source-server=!: The name or resource ID of the source server to restore from.
                --storage-redundancy=: Enable local redundancy or zone redundancy.
                --storage-size=: The storage capacity of the server.
                --subnet=: Name or resource ID of a new or existing subnet.
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: 'space-separated tags: key[=value] [key[=value] ...].'
                    nargs: -1
                --tier=: Compute tier of the server.
                --vnet=: Name or ID of a new or existing virtual network.
                -g, --resource-group=!: Name of resource group.
                -l, --location=: Location.
                -z, --zone=: Availability zone into which to provision the resource.
              completion:
                flag:
                    geo-redundant-backup:
                        - Enabled
                        - Disabled
                    public-access:
                        - Enabled
                        - Disabled
                    storage-redundancy:
                        - LocalRedundancy
                        - ZoneRedundancy
            - name: list
              description: List all the replicas for a given server.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the source server.
        - name: advanced-threat-protection-setting
          description: Manage the server's advanced threat protection setting.
          commands:
            - name: show
              description: Gets an advanced threat protection setting.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the server.
            - name: update
              description: Updates an advanced threat protection setting.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --state=!: State of server's advanced threat protection setting.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the server.
              completion:
                flag:
                    state:
                        - Enabled
                        - Disabled
        - name: parameter
          description: Commands for managing server parameter values for flexible server.
          commands:
            - name: list
              description: List all the configurations in a given server.
              flags:
                --keyword=: The keyword of the server configuration.
                --page-size=: The pageSize of the server configuration.
                --page=: The page of the server configuration.
                --subscription=: Name or ID of subscription.
                --tags=: The tags of the server configuration.
                -g, --resource-group=!: Name of resource group.
                -s, --server-name=!: Name of the server.
            - name: set-batch
              description: Batch update parameters of a flexible server.
              flags:
                --args=!:
                    description: List of the configuration key-value pair.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --source=: Source of the configuration.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the server.
            - name: show
              description: Gets information about a configuration of server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the server configuration
                -s, --server-name=: Name of the server.
            - name: set
              description: Update the parameter of a flexible server.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --source=: Source of the configuration.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the server configuration
                -s, --server-name=: Name of the server.
                -v, --value=: Value of the configuration.
        - name: deploy
          description: Enable and run GitHub Actions workflow for MySQL server
          commands:
            - name: setup
              description: Create GitHub Actions workflow file for MySQL server.
              flags:
                --action-name=: The name of the github action
                --allow-push=:
                    description: Push the action yml file to the remote repository.
                    nargs: -1
                --branch=: The name of the branch you want upload github action file.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --repo=!: The name of your github username and repository e.g., Azure/azure-cli
                --sql-file=!: The path of the sql file.
                --subscription=: Name or ID of subscription.
                -d, --database-name=: The name of the database to be created when provisioning the database server
                -g, --resource-group=: Name of resource group.
                -p, --admin-password=!: The password of the administrator.
                -s, --server-name=: Name of the server.
                -u, --admin-user=!: Administrator username for the server.
              completion:
                flag:
                    allow-push:
                        - "true"
                        - "false"
            - name: run
              description: Run an existing workflow in your github repository
              flags:
                --action-name=!: The name of the github action
                --branch=!: The name of the branch you want upload github action file.
                --subscription=: Name or ID of subscription.
        - name: geo-restore
          description: Geo-restore a flexible server from backup.
          flags:
            --accelerated-logs=: Enable or disable accelerated logs.
            --address-prefixes=: The IP address prefix to use when creating a new virtual network in CIDR format.
            --backup-retention=: The number of days a backup is retained.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --geo-redundant-backup=: Whether or not geo redundant backup is enabled.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --private-dns-zone=: This parameter only applies if you are creating cross region replica server with private access.
            --public-access=: Determines the public access.
            --sku-name=: The name of the compute SKU.
            --source-server=!: The name or resource ID of the source server to restore from.
            --storage-auto-grow=: Enable or disable autogrow of the storage.
            --storage-redundancy=: Enable local redundancy or zone redundancy.
            --storage-size=: The storage capacity of the server.
            --subnet-prefixes=: The subnet IP address prefix to use when creating a new subnet in CIDR format.
            --subnet=: Name or resource ID of a new or existing subnet.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --tier=: Compute tier of the server.
            --vnet=: Name or ID of a new or existing virtual network.
            -g, --resource-group=: Name of resource group.
            -l, --location=!: Location.
            -n, --name=: Name of the server.
            -y, --yes=: Do not prompt for confirmation.
            -z, --zone=: Availability zone into which to provision the resource.
          completion:
            flag:
                accelerated-logs:
                    - Enabled
                    - Disabled
                geo-redundant-backup:
                    - Enabled
                    - Disabled
                public-access:
                    - Enabled
                    - Disabled
                storage-auto-grow:
                    - Enabled
                    - Disabled
                storage-redundancy:
                    - LocalRedundancy
                    - ZoneRedundancy
        - name: firewall-rule
          description: Manage firewall rules for a server.
          commands:
            - name: delete
              description: Delete a firewall rule.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the server.
                -r, --rule-name=: The name of the firewall rule.
                -y, --yes=: Do not prompt for confirmation.
            - name: update
              description: Update a firewall rule.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --end-ip-address=: The end IP address of the firewall rule.
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --start-ip-address=: The start IP address of the firewall rule.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the server.
                -r, --rule-name=: The name of the firewall rule.
            - name: list
              description: List all firewall rules for a flexible server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the server.
            - name: show
              description: Get the details of a firewall rule.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the server.
                -r, --rule-name=: The name of the firewall rule.
            - name: create
              description: Create a new firewall rule for a flexible server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --end-ip-address=: The end IP address of the firewall rule.
                --start-ip-address=: The start IP address of the firewall rule.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the server.
                -r, --rule-name=: The name of the firewall rule.
        - name: create
          description: Create a MySQL flexible server.
          flags:
            --accelerated-logs=: Enable or disable accelerated logs.
            --address-prefixes=: The IP address prefix to use when creating a new virtual network in CIDR format.
            --auto-scale-iops=: Enable or disable the auto scale iops.
            --backup-identity=: The name or resource ID of the geo backup user identity for data encryption.
            --backup-key=: The resource ID of the geo backup keyvault key for data encryption.
            --backup-retention=: The number of days a backup is retained.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --database-port=: The port of the database.
            --geo-redundant-backup=: Whether or not geo redundant backup is enabled.
            --high-availability=: Enable (ZoneRedundant or SameZone) or disable high availability feature.
            --identity=: The name or resource ID of the user assigned identity for data encryption.
            --iops=: Number of IOPS to be allocated for this server.
            --key=: The resource ID of the primary keyvault key for data encryption.
            --maintenance-policy-patch-strategy=: The patch strategy of maintenance policy.
            --private-dns-zone=: This parameter only applies if you are creating cross region replica server with private access.
            --public-access=: Determines the public access.
            --sku-name=: The name of the compute SKU.
            --standby-zone=: The availability zone information of the standby server when high availability is enabled.
            --storage-auto-grow=: Enable or disable autogrow of the storage.
            --storage-redundancy=: Enable local redundancy or zone redundancy.
            --storage-size=: The storage capacity of the server.
            --subnet-prefixes=: The subnet IP address prefix to use when creating a new subnet in CIDR format.
            --subnet=: Name or resource ID of a new or existing subnet.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --tier=: Compute tier of the server.
            --version=: Server major version.
            --vnet=: Name or ID of a new or existing virtual network.
            -d, --database-name=: The name of the database to be created when provisioning the database server
            -g, --resource-group=: Name of resource group.
            -l, --location=: Location.
            -n, --name=: Name of the server.
            -p, --admin-password=: The password of the administrator.
            -u, --admin-user=: Administrator username for the server.
