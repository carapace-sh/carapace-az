# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: apim
description: Manage Azure API Management services.
commands:
    - name: api
      commands:
        - name: release
          commands:
            - name: delete
              description: Deletes the specified release in the API.
              flags:
                --api-id=!: API identifier.
                --if-match=: ETag of the Entity.
                --release-id=!: Release identifier within an API.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: list
              description: Lists all releases of an API.
              flags:
                --api-id=!: API identifier.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: create
              description: Creates a new Release for the API.
              flags:
                --api-id=!: API identifier.
                --api-revision=!: API revision number.
                --if-match=: ETag of the Entity.
                --notes=: Release Notes.
                --release-id=: Release identifier within an API.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: update
              description: Updates the details of the release of the API specified by its identifier.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --api-id=!: API identifier.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --if-match=: ETag of the Entity.
                --notes=: Release Notes.
                --release-id=!: Release identifier within an API.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: show
              description: Returns the details of an API release.
              flags:
                --api-id=!: API identifier.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --release-id=!: Release identifier within an API.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
        - name: schema
          commands:
            - name: wait
              description: Place the CLI in a waiting state until a condition of an apim api schema is met.
              flags:
                --api-id=!: API revision identifier.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --created=: wait until created with 'provisioningState' at 'Succeeded'
                --custom=: Wait until the condition satisfies a custom JMESPath query.
                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --interval=: polling interval in seconds
                --schema-id=!: Schema id identifier.
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: The name of the api management service instance
            - name: create
              description: creates or updates an API Schema.
              flags:
                --api-id=!: API identifier.
                --no-wait=: Do not wait for the long-running operation to finish.
                --resource-type=: The type of the resource.
                --schema-content=: Json escaped string defining the document representing the Schema
                --schema-id=!: Schema identifier.
                --schema-name=: The name of the schema resource.
                --schema-path=: File path specified to import schema of the API.
                --schema-type=!: Schema content type.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: delete
              description: Deletes an API Schema.
              flags:
                --api-id=!: API identifier.
                --if-match=: ETag of the Entity.
                --no-wait=: Do not wait for the long-running operation to finish.
                --schema-id=!: Schema identifier.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
                -y, --yes=: Do not prompt for confirmation.
            - name: get-etag
              description: Shows details of an API Schema.
              flags:
                --api-id=!: API identifier.
                --schema-id=!: Schema identifier.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: list
              description: Get the schema configuration at the API level.
              flags:
                --api-id=!: API identifier.
                --filter-display-name=: Filter of APIs by displayName.
                --skip=: Number of records to skip.
                --subscription=: Name or ID of subscription.
                --top=: Number of records to return.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: show
              description: Shows details of an API Schema.
              flags:
                --api-id=!: API identifier.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --schema-id=!: Schema identifier.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
        - name: show
          description: Shows details of an API.
          flags:
            --api-id=!: API identifier.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --service-name=!: The name of the API Management service instance.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: operation
          commands:
            - name: create
              description: Creates a new operation in the API or updates an existing one.
              flags:
                --api-id=!: API identifier.
                --description=: Description of the operation.
                --display-name=!: Required.
                --if-match=: ETag of the Entity.
                --method=!: Required.
                --operation-id=: Operation identifier within an API.
                --subscription=: Name or ID of subscription.
                --url-template=!: Relative URL template identifying the target resource for this operation.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
                -p, --template-parameters=:
                    description: Collection of URL template parameters.
                    nargs: -1
            - name: update
              description: Updates the details of the operation in the API specified by its identifier.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --api-id=!: API identifier.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --description=: Description of the operation.
                --display-name=: Required.
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --if-match=: ETag of the Entity.
                --method=: Required.
                --operation-id=!: Operation identifier within an API.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --url-template=: Relative URL template identifying the target resource for this operation.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: show
              description: Gets the details of the API Operation specified by its identifier.
              flags:
                --api-id=!: API identifier.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --operation-id=!: Operation identifier within an API.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: list
              description: List a collection of the operations for the specified API.
              flags:
                --api-id=!: API identifier.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: delete
              description: Deletes the specified operation in the API.
              flags:
                --api-id=!: API identifier.
                --if-match=: ETag of the Entity.
                --operation-id=!: Operation identifier within an API.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
        - name: versionset
          commands:
            - name: list
              description: Lists a collection of API Version Sets in the specified service instance.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: update
              description: Updates the details of the Api VersionSet specified by its identifier.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --description=: Description of API Version Set.
                --display-name=: Required.
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --if-match=: ETag of the Entity.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --version-header-name=: Name of HTTP header parameter that indicates the API Version if versioningScheme is set to `header`.
                --version-query-name=: Name of query parameter that indicates the API Version if versioningScheme is set to `query`.
                --version-set-id=!: A resource identifier for the related ApiVersionSet.
                --versioning-scheme=: Required.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: delete
              description: Deletes specific Api Version Set.
              flags:
                --if-match=: ETag of the Entity.
                --subscription=: Name or ID of subscription.
                --version-set-id=!: A resource identifier for the related ApiVersionSet.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: show
              description: Gets the details of the Api Version Set specified by its identifier.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --version-set-id=!: A resource identifier for the related ApiVersionSet.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: create
              description: Creates or Updates a Api Version Set.
              flags:
                --description=: Description of API Version Set.
                --display-name=!: Required.
                --if-match=: ETag of the Entity.
                --subscription=: Name or ID of subscription.
                --version-header-name=: Name of HTTP header parameter that indicates the API Version if versioningScheme is set to `header`.
                --version-query-name=: Name of query parameter that indicates the API Version if versioningScheme is set to `query`.
                --version-set-id=: A resource identifier for the related ApiVersionSet.
                --versioning-scheme=!: Required.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
        - name: create
          description: Creates a new API.
          flags:
            --api-id=!: API identifier.
            --api-type=: The type of the API.
            --authorization-scope=: Specifies the OAuth operations scope.
            --authorization-server-id=: Specifies the OAuth authorization server ID.
            --bearer-token-sending-methods=:
                description: Specifies the sending methods for bearer token.
                nargs: -1
            --description=: Description of the API.
            --display-name=!: API name.
            --no-wait=: Do not wait for the long-running operation to finish.
            --open-id-provider-id=: Specifies the openid in the authentication setting.
            --path=!: Required.
            --protocols=:
                description: Describes on which protocols the operations in this API can be invoked.
                nargs: -1
            --service-url=: Absolute URL of the backend service implementing this API.
            --subscription-key-header-name=: Specifies the subscription key header name.
            --subscription-key-query-param-name=: Specifies the subscription key query string parameter name.
            --subscription-key-required=: Specifies whether subscription key is required during call to this API, true - API is included into closed products only, false - API is included into open products alone, null - there is a mix of products.
            --subscription-required=:
                description: If true, the API requires a subscription key on requests.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --service-name=!: The name of the API Management service instance.
          completion:
            flag:
                api-type:
                    - http
                    - soap
                    - websocket
                    - graphql
                protocols:
                    - http
                    - https
                    - ws
                    - wss
                subscription-required:
                    - "true"
                    - "false"
        - name: revision
          commands:
            - name: list
              description: Lists all revisions of an API.
              flags:
                --api-id=!: API identifier.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: create
              description: Creates a new API Revision.
              flags:
                --api-id=!: API identifier.
                --api-revision-description=: Description of the Api Revision.
                --api-revision=!: Describes the Revision of the Api.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
        - name: list
          description: List all APIs of an API Management instance.
          flags:
            --filter-display-name=: Filter of APIs by displayName.
            --skip=: Number of records to skip.
            --subscription=: Name or ID of subscription.
            --top=: Number of records to return.
            -g, --resource-group=!: Name of resource group.
            -n, --service-name=!: The name of the API Management service instance.
        - name: wait
          description: Place the CLI in a waiting state until a condition of an apim api is met.
          flags:
            --api-id=!: API revision identifier.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the api management service instance
        - name: update
          description: Update an API Management API.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --api-id=!: API identifier.
            --api-type=: The type of the API.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --description=: Description of the API.
            --display-name=: API name.
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --if-match=: ETag of the Entity.
            --no-wait=: Do not wait for the long-running operation to finish.
            --path=: Required.
            --protocols=:
                description: Describes on which protocols the operations in this API can be invoked.
                nargs: -1
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --service-url=: Absolute URL of the backend service implementing this API.
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription-key-header-name=: Specifies the subscription key header name.
            --subscription-key-query-param-name=: Specifies the subscription key query string parameter name.
            --subscription-required=:
                description: If true, the API requires a subscription key on requests.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -n, --service-name=!: The name of the API Management service instance.
          completion:
            flag:
                api-type:
                    - http
                    - soap
                    - websocket
                    - graphql
                protocols:
                    - http
                    - https
                    - ws
                    - wss
                subscription-required:
                    - "true"
                    - "false"
        - name: delete
          description: Deletes an existing API.
          flags:
            --api-id=!: API identifier.
            --delete-revisions=: Delete all revisions of the Api.
            --if-match=: ETag of the Entity.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --service-name=!: The name of the API Management service instance.
            -y, --yes=: Do not prompt for confirmation.
        - name: import
          description: Import a new API
          flags:
            --api-id=: API identifier.
            --api-revision=: Describes the Revision of the Api.
            --api-type=: The type of the API.
            --api-version-set-id=: Describes the Version Set to be used with the API
            --api-version=: Describes the Version of the Api.
            --description=: Description of the API.
            --display-name=: Display name of this API.
            --no-wait=: Do not wait for the long-running operation to finish.
            --path=!: Required.
            --protocols=:
                description: Describes on which protocols(one or more) the operations in this API can be invoked.
                nargs: -1
            --service-url=: Absolute URL of the backend service implementing this API.
            --soap-api-type=: The type of API when file format is WSDL.
            --specification-format=!: Specify the format of the imported API.
            --specification-path=: File path specified to import the API.
            --specification-url=: Url specified to import the API.
            --subscription-key-header-name=: Specifies the subscription key header name.
            --subscription-key-query-param-name=: Specifies the subscription key query string parameter name.
            --subscription-required=:
                description: If true, the API requires a subscription key on requests.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --wsdl-endpoint-name=: Local name of WSDL Endpoint (port) to be imported.
            --wsdl-service-name=: Local name of WSDL Service to be imported.
            -g, --resource-group=!: Name of resource group.
            -n, --service-name=!: The name of the api management service instance
          completion:
            flag:
                api-type:
                    - http
                    - soap
                    - websocket
                    - graphql
                protocols:
                    - http
                    - https
                    - ws
                    - wss
                specification-format:
                    - Wadl
                    - Swagger
                    - OpenApi
                    - OpenApiJson
                    - Wsdl
                    - GraphQL
                subscription-required:
                    - "true"
                    - "false"
        - name: export
          description: Gets the details of the API specified by its identifier in the format specified
          flags:
            --api-id=!: API identifier.
            --export-format=!: Specify the format of the exporting API.
            --subscription=: Name or ID of subscription.
            -f, --file-path=: File path specified to export the API.
            -g, --resource-group=!: The name of the resource group.
            -n, --service-name=!: The name of the api management service instance
          completion:
            flag:
                export-format:
                    - WadlFile
                    - SwaggerFile
                    - OpenApiYamlFile
                    - OpenApiJsonFile
                    - WsdlFile
                    - WadlUrl
                    - SwaggerUrl
                    - OpenApiYamlUrl
                    - OpenApiJsonUrl
                    - WsdlUrl
    - name: apply-network-updates
      description: Update the API Management resource running in the virtual network to pick the updated network settings.
      flags:
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: The name of the api management service instance
    - name: backup
      description: back up an API Management service to the configured storage account
      flags:
        --backup-name=!: The name of the backup file to create.
        --no-wait=: Do not wait for the long-running operation to finish.
        --storage-account-container=!: The name of the storage account container used to place the backup.
        --storage-account-key=!: The access key of the storage account used to place the backup.
        --storage-account-name=!: The name of the storage account used to place the backup.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The name of the api management service instance
    - name: check-name
      description: checks to see if a service name is available to use
      flags:
        --subscription=: Name or ID of subscription.
        -n, --name=!: The name of the api management service instance
    - name: create
      description: Create an API Management service instance.
      flags:
        --disable-gateway=:
            description: Disable gateway in the master region.
            nargs: -1
        --enable-client-certificate=:
            description: Enforces a client certificate to be presented on each request to the gateway and also enables the ability to authenticate the certificate in the policy on the gateway.
            nargs: -1
        --enable-managed-identity=:
            description: Create a managed identity for the API Management service to access other Azure resources.
            nargs: -1
        --no-wait=: Do not wait for the long-running operation to finish.
        --public-network-access=:
            description: Whether or not public endpoint access is allowed for this API Management service.
            nargs: -1
        --publisher-email=!: The e-mail address to receive all system notifications.
        --publisher-name=!: The name of your organization for use in the developer portal and e-mail notifications.
        --sku-capacity=: The number of deployed units of the SKU.
        --sku-name=: The sku of the api management instance
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: The name of the api management service instance
        -v, --virtual-network=: The virtual network type.
      completion:
        flag:
            disable-gateway:
                - "true"
                - "false"
            enable-client-certificate:
                - "true"
                - "false"
            enable-managed-identity:
                - "true"
                - "false"
            public-network-access:
                - "true"
                - "false"
            sku-name:
                - Developer
                - Standard
                - Premium
                - Basic
                - Consumption
                - Isolated
            virtual-network:
                - None
                - External
                - Internal
    - name: delete
      description: Deletes an existing API Management service.
      flags:
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The name of the api management service instance
        -y, --yes=: Do not prompt for confirmation.
    - name: deletedservice
      commands:
        - name: show
          description: Get specific soft-deleted Api Management Service.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -l, --location=!: Location.
            -n, --service-name=!: The name of the soft deleted API Management service instance.
        - name: list
          description: List soft-deleted Api Management Service.
          flags:
            --subscription=: Name or ID of subscription.
        - name: purge
          description: Purge soft-deleted Api Management Service.
          flags:
            --subscription=: Name or ID of subscription.
            -l, --location=!: Location.
            -n, --service-name=!: The name of the soft deleted API Management service instance.
    - name: graphql
      commands:
        - name: resolver
          commands:
            - name: create
              description: Creates a new Resolver.
              flags:
                --api-id=!: API identifier.
                --description=: Description of the resolver.
                --display-name=!: Resolver Name.
                --path=!: Resolver identifier within a GraphQL API.
                --resolver-id=!: Resolver identifier within a GraphQL API.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --service-name=!: The name of the API Management service instance.
            - name: show
              description: Shows details of a Resolver.
              flags:
                --api-id=!: API identifier.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --resolver-id=!: Resolver identifier within a GraphQL API.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
