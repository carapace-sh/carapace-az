# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: hdinsight
description: Manage HDInsight resources.
commands:
    - name: application
      commands:
        - name: wait
          description: Place the CLI in a waiting state until an operation is complete.
          flags:
            --cluster-name=!: The name of the cluster.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The constant value for the application name.
        - name: delete
          description: Deletes the specified application on the HDInsight cluster.
          flags:
            --cluster-name=!: The name of the cluster.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The constant value for the application name.
            -y, --yes=: Do not prompt for confirmation.
        - name: create
          description: Create an application for a HDInsight cluster.
          flags:
            --access-mode=: The access mode for the application.
            --cluster-name=!: The name of the cluster.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --destination-port=: The destination port to connect to.
            --disable-gateway-auth=:
                description: Indicates whether to disable gateway authentication.
                nargs: -1
            --edgenode-size=: The size of the node.
            --marketplace-id=: The marketplace identifier.
            --no-validation-timeout=: Permit timeout error during argument validation phase.
            --script-action-name=!: The name of the script action.
            --script-parameters=: The parameters for the script.
            --script-uri=!: The URI to the script.
            --sub-domain-suffix=: The subdomain suffix of the application.
            --subnet=: The name or ID of subnet.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --vnet-name=: The name of a virtual network.
            -K, --ssh-public-key=: SSH public key for the cluster nodes.
            -P, --ssh-password=: SSH password for the cluster nodes.
            -U, --ssh-user=: SSH username for the cluster nodes.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The constant value for the application name.
            -t, --type=: The application type.
          completion:
            flag:
                disable-gateway-auth:
                    - "true"
                    - "false"
                type:
                    - CustomApplication
                    - RServer
        - name: show
          description: Gets properties of the specified application.
          flags:
            --cluster-name=!: The name of the cluster.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The constant value for the application name.
        - name: list
          description: Lists all of the applications for the HDInsight cluster.
          flags:
            --cluster-name=!: The name of the cluster.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: autoscale
      commands:
        - name: list-timezones
          description: List the available timezone name when enabling Schedule-based Autoscale.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
        - name: condition
          commands:
            - name: wait
              description: Place the CLI in a waiting state until an operation is complete.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --created=: wait until created with 'provisioningState' at 'Succeeded'
                --custom=: Wait until the condition satisfies a custom JMESPath query.
                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --interval=: polling interval in seconds
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: The name of the cluster.
            - name: delete
              description: Delete schedule condition.
              flags:
                --cluster-name=!: The name of the cluster.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --index=!:
                    description: The Space-separated list of condition indices which starts with 0 to delete.
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -y, --yes=: Do not prompt for confirmation.
            - name: list
              description: List all schedule conditions.
              flags:
                --cluster-name=!: The name of the cluster.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: create
              description: Add a new schedule condition.
              flags:
                --cluster-name=!: The name of the cluster.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --days=!:
                    description: A space-delimited list of schedule day.
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                --time=!: The 24-hour time in the form xx:xx in days.
                --workernode-count=!: The schedule workernode count.
                -g, --resource-group=!: Name of resource group.
              completion:
                flag:
                    days:
                        - Monday
                        - Tuesday
                        - Wednesday
                        - Thursday
                        - Friday
                        - Saturday
                        - Sunday
            - name: update
              description: Update a schedule condition.
              flags:
                --cluster-name=!: The name of the cluster.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --days=:
                    description: A space-delimited list of schedule day.
                    nargs: -1
                --index=!: The schedule condition index which starts with 0.
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                --time=: The 24-hour time in the form xx:xx in days.
                --workernode-count=: The schedule workernode count.
                -g, --resource-group=!: Name of resource group.
              completion:
                flag:
                    days:
                        - Monday
                        - Tuesday
                        - Wednesday
                        - Thursday
                        - Friday
                        - Saturday
                        - Sunday
        - name: update
          description: Update the Autoscale configuration.
          flags:
            --cluster-name=!: The name of the cluster.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --max-workernode-count=: The max workernode count for Load-based atuoscale.
            --min-workernode-count=: The minimal workernode count for Load-based atuoscale.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --timezone=: The timezone for schedule autoscale type.
            -g, --resource-group=!: Name of resource group.
        - name: show
          description: Get the Autoscale configuration of a specified cluster.
          flags:
            --cluster-name=!: The name of the cluster.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: wait
          description: Place the CLI in a waiting state until an operation is complete.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the cluster.
        - name: delete
          description: Disable Autoscale for a running cluster.
          flags:
            --cluster-name=!: The name of the cluster.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -y, --yes=: Do not prompt for confirmation.
        - name: create
          description: Enable Autoscale for a running cluster.
          flags:
            --cluster-name=!: The name of the cluster.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --days=:
                description: A space-delimited list of schedule day.
                nargs: -1
            --max-workernode-count=: The max workernode count for Load-based atuoscale.
            --min-workernode-count=: The minimal workernode count for Load-based atuoscale.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --time=: The 24-hour time in the form xx:xx in days.
            --timezone=: The timezone for schedule autoscale type.
            --type=!: The autoscale type.
            --workernode-count=: The schedule workernode count.
            -g, --resource-group=!: Name of resource group.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                days:
                    - Monday
                    - Tuesday
                    - Wednesday
                    - Thursday
                    - Friday
                    - Saturday
                    - Sunday
                type:
                    - Load
                    - Schedule
    - name: azure-monitor
      commands:
        - name: enable
          description: Enable the Azure Monitor logs integration on an HDInsight cluster.
          flags:
            --__WORKSPACE_TYPE=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --no-validation-timeout=: Permit timeout error during argument validation phase.
            --primary-key=: The certificate for the Log Analytics workspace.
            --subscription=: Name or ID of subscription.
            --workspace=!: The name, resource ID or workspace ID of Log Analytics workspace.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the cluster.
        - name: show
          description: Gets the status of Azure Monitor on the HDInsight cluster.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the cluster.
        - name: disable
          description: Disables the Azure Monitor on the HDInsight cluster.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the cluster.
    - name: azure-monitor-agent
      commands:
        - name: disable
          description: Disables the Azure Monitor Agent on the HDInsight cluster.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the cluster.
        - name: enable
          description: Enable the Azure Monitor Agent logs integration on an HDInsight cluster.
          flags:
            --__WORKSPACE_TYPE=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --no-validation-timeout=: Permit timeout error during argument validation phase.
            --primary-key=: The certificate for the Log Analytics workspace.
            --subscription=: Name or ID of subscription.
            --workspace=!: The name, resource ID or workspace ID of Log Analytics workspace.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the cluster.
        - name: show
          description: Gets the status of Azure Monitor Agent on the HDInsight cluster.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the cluster.
    - name: create
      description: Create a new cluster.
      flags:
        --assign-identity=:
            description: The name or ID of user assigned identity.
            nargs: -1
        --autoscale-max-workernode-count=: The max workernode count for Load-based atuoscale.
        --autoscale-min-workernode-count=: The minimal workernode count for Load-based atuoscale.
        --autoscale-type=: The autoscale type.
        --autoscale-workernode-count=: The scheduled workernode count.
        --cluster-admin-account=: The domain user account that will have admin privileges on the cluster.
        --cluster-admin-password=: The domain admin password.
        --cluster-configurations=: Extra configurations of various components.
        --cluster-tier=: The tier of the cluster
        --cluster-users-group-dns=:
            description: A space-delimited list of Distinguished Names for cluster user groups.
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --component-version=:
            description: The versions of various Hadoop components, in space-separated versions in 'component=version' format.
            nargs: -1
        --days=:
            description: A space-delimited list of schedule day.
            nargs: -1
        --domain=: The name or resource ID of the user's Azure Active Directory Domain Service.
        --edgenode-size=: The size of the node.
        --enable-compute-isolation=:
            description: Indicate whether enable compute isolation or not.
            nargs: -1
        --enable-private-link=:
            description: Indicate whether enable the private link or not.
            nargs: -1
        --encryption-algorithm=: Algorithm identifier for encryption.
        --encryption-at-host=:
            description: Indicates whether enable encryption at host or not.
            nargs: -1
        --encryption-in-transit=:
            description: Indicates whether enable encryption in transit.
            nargs: -1
        --encryption-key-name=: Key name that is used for enabling disk encryption.
        --encryption-key-version=: Key version that is used for enabling disk encryption.
        --encryption-vault-uri=: Base key vault URI where the customers key is located eg.
        --esp=: Specify to create cluster with Enterprise Security Package.
        --headnode-size=: The size of the node.
        --host-sku=: The dedicated host sku of compute isolation.
        --idbroker=: Specify to create ESP cluster with HDInsight ID Broker.
        --kafka-client-group-id=: The client AAD security group id for Kafka Rest Proxy
        --kafka-client-group-name=: The client AAD security group name for Kafka Rest Proxy
        --kafka-management-node-count=: The number of kafka management node in the cluster
        --kafka-management-node-size=: The size of the node.
        --ldaps-urls=:
            description: A space-delimited list of LDAPS protocol URLs to communicate with the Active Directory.
            nargs: -1
        --minimal-tls-version=: The minimal supported TLS version.
        --no-validation-timeout=: Permit timeout error during argument validation phase.
        --no-wait=: Do not wait for the long-running operation to finish.
        --outbound-dependencies-managed-type=: The direction for the resource provider connection.
        --private-link-config=: The private link configurations when creating cluster.
        --public-ip-tag-type=: 'Gets or sets the ipTag type: Example FirstPartyUsage.'
        --public-ip-tag-value=: Gets or sets value of the IpTag associated with the public IP.Example HDInsight, SQL, Storage etc
        --resource-provider-connection=: The resource provider connection type
        --storage-account-key=: The storage account key.
        --storage-account-managed-identity=: User-assigned managed identity with access to the storage account filesystem.
        --storage-account=: The name or ID of the storage account.
        --storage-container=: The storage container the cluster will use.
        --storage-filesystem=: The storage filesystem the cluster will use.
        --subnet=: The name or ID of subnet.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --time=: The 24-hour time in the form of xx:xx in days.
        --timezone=: The timezone for schedule autoscale type.
        --vnet-name=: The name of a virtual network.
        --workernode-data-disk-size=: The size of the data disk in GB, e.g. 1023.
        --workernode-data-disk-storage-account-type=: 'The type of storage account that will be used for the data disks: standard_lrs or premium_lrs'
        --workernode-data-disks-per-node=: The number of data disks to use per worker node.
        --workernode-size=: The size of the node.
        --zones=:
            description: A space-delimited list of availability zones where cluster will be created.
            nargs: -1
        --zookeepernode-size=: The size of the node.
        -K, --ssh-public-key=: SSH public key for the cluster nodes.
        -P, --ssh-password=: SSH password for the cluster nodes.
        -U, --ssh-user=: SSH username for the cluster nodes.
        -c, --workernode-count=: The number of worker nodes in the cluster.
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: The name of the cluster.
        -p, --http-password=: HTTP password for the cluster.
        -t, --type=!: 'Type of HDInsight cluster, like: hadoop, interactivehive, hbase, kafka, storm, spark, rserver, mlservices.'
        -u, --http-user=: HTTP username for the cluster.
        -v, --version=: The HDInsight cluster version.
      completion:
        flag:
            autoscale-type:
                - Load
                - Schedule
            cluster-tier:
                - Standard
                - Premium
            days:
                - Monday
                - Tuesday
                - Wednesday
                - Thursday
                - Friday
                - Saturday
                - Sunday
            enable-compute-isolation:
                - "true"
                - "false"
            enable-private-link:
                - "true"
                - "false"
            encryption-algorithm:
                - RSA-OAEP
                - RSA-OAEP-256
                - RSA1_5
            encryption-at-host:
                - "true"
                - "false"
            encryption-in-transit:
                - "true"
                - "false"
            minimal-tls-version:
                - "1.2"
            outbound-dependencies-managed-type:
                - Managed
                - External
            resource-provider-connection:
                - Inbound
                - Outbound
            workernode-data-disk-storage-account-type:
                - standard_lrs
                - premium_lrs
    - name: delete
      description: Deletes the specified HDInsight cluster.
      flags:
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The name of the cluster.
        -y, --yes=: Do not prompt for confirmation.
    - name: host
      commands:
        - name: restart
          description: Restarts the specified HDInsight cluster hosts.
          flags:
            --cluster-name=!: The name of the cluster.
            --host-names=!:
                description: A space-delimited list of host names that need to be restarted.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          description: Lists the HDInsight clusters hosts.
          flags:
            --cluster-name=!: The name of the cluster.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: list
      description: List HDInsight clusters in a resource group or subscription.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: list-usage
      description: Lists the usages for the specified location.
      flags:
        --subscription=: Name or ID of subscription.
        -l, --location=!: Location.
    - name: monitor
      commands:
        - name: disable
          description: Disables the Operations Management Suite (OMS) on the HDInsight cluster.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the cluster.
        - name: enable
          description: Enable the Classic Azure Monitor logs integration on an HDInsight cluster.
          flags:
            --__WORKSPACE_TYPE=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --no-validation-timeout=: Permit timeout error during argument validation phase.
            --primary-key=: The certificate for the Log Analytics workspace.
            --subscription=: Name or ID of subscription.
            --workspace=!: The name, resource ID or workspace ID of Log Analytics workspace.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the cluster.
        - name: show
          description: Gets the status of Operations Management Suite (OMS) on the HDInsight cluster.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the cluster.
    - name: resize
      description: Resize the specified HDInsight cluster to the specified size.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        -c, --workernode-count=!: The target worker node instance count for the operation.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The name of the cluster.
    - name: rotate-disk-encryption-key
      description: Rotate the disk encryption key of the specified HDInsight cluster.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --encryption-key-name=!: Key name that is used for enabling disk encryption.
        --encryption-key-version=!: Key version that is used for enabling disk encryption.
        --encryption-vault-uri=!: Base key vault URI where the customers key is located eg.
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The name of the cluster.
    - name: script-action
      commands:
        - name: delete
          description: Deletes a specified persisted script action of the cluster.
          flags:
            --cluster-name=!: The name of the cluster.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the script.
        - name: execute
          description: Execute script actions on the specified HDInsight cluster.
          flags:
            --cluster-name=!: The name of the cluster.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --persist-on-success=: If the scripts needs to be persisted.
            --roles=!:
                description: A space-delimited list of roles (nodes) where the script will be executed.
                nargs: -1
            --script-parameters=: The parameters for the script.
            --script-uri=!: The URI to the script.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the script action.
        - name: list
          description: Lists all the persisted script actions for the specified cluster.
          flags:
            --cluster-name=!: The name of the cluster.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: list-execution-history
          description: Lists all scripts' execution history for the specified cluster.
          flags:
            --cluster-name=!: The name of the cluster.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: show-execution-details
          description: Gets the script execution detail for the given script execution ID.
          flags:
            --cluster-name=!: The name of the cluster.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --execution-id=!: The script execution id
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: promote
          description: Promotes the specified ad-hoc script execution to a persisted script.
          flags:
            --cluster-name=!: The name of the cluster.
            --execution-id=!: The script execution id
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: show
      description: Gets the specified cluster.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The name of the cluster.
    - name: update
      description: Update the tags or identity of the specified HDInsight cluster.
      flags:
        --assign-identity-type=: The type of identity used for the cluster.
        --assign-identity=:
            description: The name or ID of user assigned identity.
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The name of the cluster.
    - name: wait
      description: Place the CLI in a waiting state until an operation is complete.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --created=: wait until created with 'provisioningState' at 'Succeeded'
        --custom=: Wait until the condition satisfies a custom JMESPath query.
        --deleted=: wait until deleted
        --exists=: wait until the resource exists
        --interval=: polling interval in seconds
