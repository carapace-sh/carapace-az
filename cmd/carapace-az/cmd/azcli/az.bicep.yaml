# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: bicep
description: Bicep CLI command group.
commands:
    - name: build
      description: Build a Bicep file.
      flags:
        --no-restore=: When set, builds the bicep file without restoring external modules.
        --outdir=: When set, saves the output at the specified directory.
        --outfile=: When set, saves the output as the specified file path.
        --stdout=: When set, prints all output to stdout instead of corresponding files.
        --subscription=: Name or ID of subscription.
        -f, --file=!: The path to the Bicep file to build in the file system.
    - name: build-params
      description: Build .bicepparam file.
      flags:
        --no-restore=: When set, builds the .bicepparam file without restoring external modules.
        --outdir=: When set, saves the output at the specified directory.
        --outfile=: When set, saves the output as the specified file path.
        --stdout=: When set, prints all output to stdout instead of corresponding files.
        --subscription=: Name or ID of subscription.
        -f, --file=!: The path to the .bicepparam file to build in the file system.
    - name: decompile
      description: Attempt to decompile an ARM template file to a Bicep file.
      flags:
        --force=: Allows overwriting the output file if it exists.
        --subscription=: Name or ID of subscription.
        -f, --file=!: The path to the ARM template to decompile in the file system.
    - name: decompile-params
      description: Decompile a parameters .json file to .bicepparam.
      flags:
        --bicep-file=: Path to the bicep template file (relative to the .bicepparam file) that will be referenced in the using declaration.
        --outdir=: When set, saves the output at the specified directory.
        --outfile=: When set, saves the output as the specified file path.
        --stdout=: When set, prints all output to stdout instead of corresponding files.
        --subscription=: Name or ID of subscription.
        -f, --file=!: The path to the parameters file to build in the file system.
    - name: format
      description: Format a Bicep file.
      flags:
        --indent-kind=: Set indentation kind.
        --indent-size=: Number of spaces to indent with (Only valid with --indent-kind set to Space).
        --insert-final-newline=: Insert a final newline.
        --newline-kind=: Set line ending characters.
        --newline=: Set newline char.
        --outdir=: When set, saves the output at the specified directory.
        --outfile=: When set, saves the output as the specified file path.
        --stdout=: When set, prints all output to stdout instead of corresponding files.
        --subscription=: Name or ID of subscription.
        -f, --file=!: The path to the Bicep file to format in the file system.
      completion:
        flag:
            indent-kind:
                - Space
                - Tab
            newline-kind:
                - LF
                - CRLF
                - CR
    - name: generate-params
      description: Generate parameters file for a Bicep file.
      flags:
        --include-params=: Set include params.
        --no-restore=: When set, generates the parameters file without restoring external modules.
        --outdir=: When set, saves the output at the specified directory.
        --outfile=: When set, saves the output as the specified file path.
        --output-format=: Set output format.
        --stdout=: When set, prints all output to stdout instead of corresponding files.
        --subscription=: Name or ID of subscription.
        -f, --file=!: The path to the Bicep file to generate the parameters file from in the file system.
    - name: install
      description: Install Bicep CLI.
      flags:
        --subscription=: Name or ID of subscription.
        -t, --target-platform=: The platform the Bicep CLI will be running on.
        -v, --version=: The version of Bicep CLI to be installed.
      completion:
        flag:
            target-platform:
                - win-x64
                - linux-musl-x64
                - linux-x64
                - osx-x64
                - linux-arm64
                - osx-arm64
                - win-arm64
    - name: lint
      description: Lint a Bicep file.
      flags:
        --diagnostics-format=: Set diagnostics format.
        --no-restore=: When set, generates the parameters file without restoring external modules.
        --subscription=: Name or ID of subscription.
        -f, --file=!: The path to the Bicep module file to lint in the file system.
      completion:
        flag:
            diagnostics-format:
                - default
                - sarif
    - name: list-versions
      description: List out all available versions of Bicep CLI.
      flags:
        --subscription=: Name or ID of subscription.
    - name: publish
      description: Publish a bicep file to a remote module registry.
      flags:
        --documentationUri=: The documentation uri of the Bicep module.
        --force=: Allow overwriting an existing Bicep module version.
        --subscription=: Name or ID of subscription.
        --with-source=: Publish source code with the module.
        -d, --documentation-uri=: The documentation uri of the Bicep module.
        -f, --file=!: The path to the Bicep module file to publish in the file system.
        -t, --target=!: The target location where the Bicep module will be published.
    - name: restore
      description: Restore external modules for a bicep file.
      flags:
        --force=: Allows overwriting the cached external modules.
        --subscription=: Name or ID of subscription.
        -f, --file=!: The path to the Bicep file to restore external modules for.
    - name: uninstall
      description: Uninstall Bicep CLI.
      flags:
        --subscription=: Name or ID of subscription.
    - name: upgrade
      description: Upgrade Bicep CLI to the latest version.
      flags:
        --subscription=: Name or ID of subscription.
        -t, --target-platform=: The platform the Bicep CLI will be running on.
      completion:
        flag:
            target-platform:
                - win-x64
                - linux-musl-x64
                - linux-x64
                - osx-x64
                - linux-arm64
                - osx-arm64
                - win-arm64
    - name: version
      description: Show the installed version of Bicep CLI.
      flags:
        --subscription=: Name or ID of subscription.
