# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: servicebus
description: servicebus
commands:
    - name: georecovery-alias
      commands:
        - name: list
          description: List all Alias(Disaster Recovery configurations)
          flags:
            --namespace-name=!: The namespace name
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: exists
          description: Check the give namespace name availability.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: The namespace name
            --subscription=: Name or ID of subscription.
            -a, --alias=!: The Name to check the namespace name availability and The namespace name can contain only letters, numbers, and hyphens.
            -g, --resource-group=: Name of resource group.
        - name: set
          description: Sets Service Bus Geo-Disaster Recovery Configuration Alias for the give Namespace
          flags:
            --alternate-name=: Alternate Name (Post failover) for Primary Namespace, when Namespace name and Alias name are same
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: Name of Namespace
            --no-wait=: Do not wait for the long-running operation to finish.
            --partner-namespace=!: Name (if within the same resource group) or ARM Id of Primary/Secondary Service Bus  namespace name, which is part of GEO DR pairing
            --subscription=: Name or ID of subscription.
            -a, --alias=!: Name of the Geo-Disaster Recovery Configuration Alias
            -g, --resource-group=: Name of resource group.
        - name: authorization-rule
          commands:
            - name: show
              description: Get an authorization rule for a namespace by rule name.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The namespace name
                --subscription=: Name or ID of subscription.
                -a, --alias=: The Disaster Recovery configuration name
                -g, --resource-group=: Name of resource group.
                -n, --name=: The authorization rule name.
            - name: list
              description: List the authorization rules for a namespace.
              flags:
                --namespace-name=!: The namespace name
                --subscription=: Name or ID of subscription.
                -a, --alias=!: The Disaster Recovery configuration name
                -g, --resource-group=!: Name of resource group.
            - name: keys
              commands:
                - name: list
                  description: Gets the primary and secondary connection strings for the namespace.
                  flags:
                    --namespace-name=!: The namespace name
                    --subscription=: Name or ID of subscription.
                    -a, --alias=!: The Disaster Recovery configuration name
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: The authorization rule name.
        - name: fail-over
          description: Invokes GEO DR failover and reconfigure the alias to point to the secondary namespace
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --is-safe-failover=:
                description: Safe failover is to indicate the service should wait for pending replication to finish before switching to the secondary.
                nargs: -1
            --namespace-name=: The namespace name
            --subscription=: Name or ID of subscription.
            -a, --alias=: The Disaster Recovery configuration name
            -g, --resource-group=: Name of resource group.
          completion:
            flag:
                is-safe-failover:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: show
          description: Get Alias(Disaster Recovery configuration) for primary or secondary namespace
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: The namespace name
            --subscription=: Name or ID of subscription.
            -a, --alias=: The Disaster Recovery configuration name
            -g, --resource-group=: Name of resource group.
        - name: create
          description: Create a new Alias(Disaster Recovery configuration)
          flags:
            --alternate-name=: Primary/Secondary eventhub namespace name, which is part of GEO DR pairing
            --namespace-name=!: The namespace name
            --partner-namespace=!: ARM Id of the Primary/Secondary eventhub namespace name, which is part of GEO DR pairing
            --subscription=: Name or ID of subscription.
            -a, --alias=!: The Disaster Recovery configuration name
            -g, --resource-group=!: Name of resource group.
        - name: break-pair
          description: This operation disables the Disaster Recovery and stops replicating changes from primary to secondary namespaces
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: The namespace name
            --subscription=: Name or ID of subscription.
            -a, --alias=: The Disaster Recovery configuration name
            -g, --resource-group=: Name of resource group.
        - name: delete
          description: Delete an Alias(Disaster Recovery configuration)
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: The namespace name
            --subscription=: Name or ID of subscription.
            -a, --alias=: The Disaster Recovery configuration name
            -g, --resource-group=: Name of resource group.
    - name: migration
      commands:
        - name: start
          description: Create Migration configuration and starts migration of entities from Standard to Premium namespace
          flags:
            --config-name=: The configuration name.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --post-migration-name=: Name to access Standard Namespace after migration
            --subscription=: Name or ID of subscription.
            --target-namespace=: Existing premium Namespace ARM Id name which has no entities, will be used for migration
            -g, --resource-group=: Name of resource group.
            -n, --name=: The namespace name
          completion:
            flag:
                config-name:
                    - $default
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: list
          description: List all migrationConfigurations
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The namespace name
        - name: complete
          description: This operation Completes Migration of entities by pointing the connection strings to Premium namespace and any entities created after the operation will be under Premium Namespace.
          flags:
            --config-name=: The configuration name.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The namespace name
          completion:
            flag:
                config-name:
                    - $default
        - name: delete
          description: Delete a MigrationConfiguration
          flags:
            --config-name=: The configuration name.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The namespace name
          completion:
            flag:
                config-name:
                    - $default
        - name: abort
          description: This operation reverts Migration
          flags:
            --config-name=: The configuration name.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The namespace name
          completion:
            flag:
                config-name:
                    - $default
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --config-name=: The configuration name.
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --namespace-name=: The namespace name
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
          completion:
            flag:
                config-name:
                    - $default
        - name: show
          description: Get Migration Config
          flags:
            --config-name=: The configuration name.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: The namespace name
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
          completion:
            flag:
                config-name:
                    - $default
    - name: namespace
      commands:
        - name: network-rule-set
          commands:
            - name: ip-rule
              commands:
                - name: remove
                  description: Remove Ip-Rule from network rule of namespace
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --ip-rule=:
                        description: List VirtualNetwork Rules.
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of resource group.
                    -n, --namespace-name=!: Name of the Namespace
                - name: add
                  description: Add a IP-Rule for network rule of namespace.
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --ip-rule=:
                        description: List VirtualNetwork Rules.
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of resource group.
                    -n, --namespace-name=!: Name of the Namespace
            - name: list
              description: List list of NetworkRuleSet for a Namespace.
              flags:
                --namespace-name=!: The namespace name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: create
              description: Create NetworkRuleSet for a Namespace.
              flags:
                --default-action=: Default Action for Network Rule Set
                --ip-rules=:
                    description: List of IpRules  Support shorthand-syntax, json-file and yaml-file.
                    nargs: -1
                --namespace-name=!: The namespace name
                --public-network-access=: This determines if traffic is allowed over public network.
                --subscription=: Name or ID of subscription.
                --virtual-network-rules=:
                    description: List VirtualNetwork Rules  Support shorthand-syntax, json-file and yaml-file.
                    nargs: -1
                -g, --resource-group=!: Name of resource group.
                -t, --enable-trusted-service-access=:
                    description: Value that indicates whether Trusted Service Access is Enabled or not.
                    nargs: -1
              completion:
                flag:
                    default-action:
                        - Allow
                        - Deny
                    enable-trusted-service-access:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
                    public-network-access:
                        - Disabled
                        - Enabled
            - name: update
              description: Update NetworkRuleSet for a Namespace.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --default-action=: Default Action for Network Rule Set
                --force-string=:
                    description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --ip-rules=:
                    description: List of IpRules  Support shorthand-syntax, json-file and yaml-file.
                    nargs: -1
                --namespace-name=: The namespace name
                --public-network-access=: This determines if traffic is allowed over public network.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --virtual-network-rules=:
                    description: List VirtualNetwork Rules  Support shorthand-syntax, json-file and yaml-file.
                    nargs: -1
                -g, --resource-group=: Name of resource group.
                -t, --enable-trusted-service-access=:
                    description: Value that indicates whether Trusted Service Access is Enabled or not.
                    nargs: -1
              completion:
                flag:
                    default-action:
                        - Allow
                        - Deny
                    enable-trusted-service-access:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
                    force-string:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
                    public-network-access:
                        - Disabled
                        - Enabled
            - name: virtual-network-rule
              commands:
                - name: remove
                  description: Remove network rule for a namespace
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --namespace-name=!: Name of the Namespace
                    --subnet=:
                        description: List VirtualNetwork Rules.
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of resource group.
                - name: add
                  description: Add a Virtual-Network-Rule for network rule of namespace.
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --namespace-name=!: Name of the Namespace
                    --subnet=:
                        description: List VirtualNetwork Rules.
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of resource group.
            - name: show
              description: Get NetworkRuleSet for a Namespace.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The namespace name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
        - name: list
          description: List all the available namespaces within the subscription by resource group & also irrespective of the resource groups.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: replica
          commands:
            - name: remove
              description: Remove one or more Replica properties to a namespace.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --geo-data-replication-config=!:
                    description: A list of regions where replicas of the namespace are maintained Object
                    nargs: -1
                --namespace-name=!: Name of the Namespace
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: add
              description: Add one or more Replica properties to a namespace.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --geo-data-replication-config=!:
                    description: A list of regions where replicas of the namespace are maintained Object
                    nargs: -1
                --namespace-name=!: Name of the Namespace
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -n, --name=: The namespace name
        - name: private-link-resource
          commands:
            - name: show
              description: List lists of resources that supports Privatelinks.
              flags:
                --namespace-name=!: The namespace name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
        - name: authorization-rule
          commands:
            - name: list
              description: List the authorization rules for a namespace.
              flags:
                --namespace-name=!: The namespace name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: show
              description: Get an authorization rule for a namespace by rule name.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The namespace name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The authorization rule name.
            - name: keys
              commands:
                - name: renew
                  description: Regenerates the primary or secondary connection strings for the namespace.
                  flags:
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --key-value=: Optional, if the key value provided, is reset for KeyType value or autogenerate Key value set for keyType
                    --key=!: The access key to regenerate.
                    --namespace-name=: The namespace name
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: The authorization rule name.
                  completion:
                    flag:
                        key:
                            - PrimaryKey
                            - SecondaryKey
                - name: list
                  description: Gets the primary and secondary connection strings for the namespace.
                  flags:
                    --namespace-name=!: The namespace name
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: The authorization rule name.
            - name: delete
              description: Delete a namespace authorization rule.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The namespace name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The authorization rule name.
            - name: create
              description: Create an authorization rule for a namespace.
              flags:
                --namespace-name=!: The namespace name
                --rights=:
                    description: The rights associated with the rule.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: The authorization rule name.
            - name: update
              description: Update an authorization rule for a namespace.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --force-string=:
                    description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The namespace name
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --rights=:
                    description: The rights associated with the rule.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The authorization rule name.
              completion:
                flag:
                    force-string:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
        - name: show
          description: Get a description for the specified namespace.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: The resourceGroup name
            -n, --name=: The namespace name
        - name: encryption
          commands:
            - name: remove
              description: Remove one or more Encryption properties from a namespace.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --encryption-config=!:
                    description: List of KeyVaultProperties objects.
                    nargs: -1
                --namespace-name=!: Name of the Namespace
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: add
              description: Add Encryption properties to a namespace.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --encryption-config=!:
                    description: List of KeyVaultProperties objects.
                    nargs: -1
                --infra-encryption=:
                    description: A boolean value that indicates whether Infrastructure Encryption (Double Encryption)
                    nargs: -1
                --namespace-name=!: Name of the Namespace
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
              completion:
                flag:
                    infra-encryption:
                        - "true"
                        - "false"
        - name: private-endpoint-connection
          commands:
            - name: show
              description: Get a description for the specified Private Endpoint Connection.
              flags:
                --id=: The ID of the private endpoint connection associated with the Service Bus Namespace.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The namespace name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The PrivateEndpointConnection name
            - name: wait
              description: Place the CLI in a waiting state until a condition is met.
              flags:
                --created=: wait until created with 'provisioningState' at 'Succeeded'
                --custom=: Wait until the condition satisfies a custom JMESPath query.
                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --interval=: polling interval in seconds
                --namespace-name=: The namespace name
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                -g, --resource-group=: Name of resource group.
                -n, --name=: The PrivateEndpointConnection name
            - name: create
              description: Create PrivateEndpointConnections of service namespace.
              flags:
                --description=: Description of the connection state.
                --namespace-name=!: The namespace name
                --provisioning-state=: Provisioning state of the Private Endpoint Connection.
                --status=: Status of the connection.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: The PrivateEndpointConnection name
              completion:
                flag:
                    provisioning-state:
                        - Canceled
                        - Creating
                        - Deleting
                        - Failed
                        - Succeeded
                        - Updating
                    status:
                        - Approved
                        - Disconnected
                        - Pending
                        - Rejected
            - name: update
              description: Update PrivateEndpointConnections of service namespace.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --description=: Description of the connection state.
                --force-string=:
                    description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The namespace name
                --provisioning-state=: Provisioning state of the Private Endpoint Connection.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --status=: Status of the connection.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The PrivateEndpointConnection name
              completion:
                flag:
                    force-string:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
                    provisioning-state:
                        - Canceled
                        - Creating
                        - Deleting
                        - Failed
                        - Succeeded
                        - Updating
                    status:
                        - Approved
                        - Disconnected
                        - Pending
                        - Rejected
            - name: delete
              description: Delete a private endpoint connection request for servicebus namespace.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --description=: Comments for delete operation.
                --id=: The ID of the private endpoint connection associated with the Service Bus Namespace.
                --namespace-name=: The Service Bus namesapce name.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: The resource group name of specified Service bus namespace.
                -n, --name=: The name of the private endpoint connection associated with the Service Bus Namespace.
                -y, --yes=: Do not prompt for confirmation.
            - name: reject
              description: Reject a private endpoint connection request for servicebus namespace.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --description=: Comments for reject operation.
                --id=: The ID of the private endpoint connection associated with the Service Bus Namespace.
                --namespace-name=: The Service Bus namesapce name.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: The resource group name of specified Service bus namespace.
                -n, --name=: The name of the private endpoint connection associated with the Service Bus Namespace.
            - name: list
              description: List the available PrivateEndpointConnections within a namespace.
              flags:
                --namespace-name=!: The namespace name
                --subscription=: Name or ID of subscription.
