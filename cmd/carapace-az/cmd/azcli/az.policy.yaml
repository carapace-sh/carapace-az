# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: policy
description: Manage resource policies.
commands:
    - name: assignment
      description: Manage resource policy assignments.
      commands:
        - name: update
          description: Updates a policy assignment
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --description=: Description of the policy assignment.
            --display-name=: Display name of the policy assignment.
            --not-scopes=: Space-separated scopes where the policy assignment does not apply.
            --scope=: Scope at which this policy assignment subcommand applies.
            --subscription=: Name or ID of subscription.
            -e, --enforcement-mode=: Enforcement mode of the policy assignment, e.g.
            -g, --resource-group=: the resource group where the policy will be applied
            -n, --name=: Name of the policy assignment.
            -p, --params=: JSON formatted string or a path to a file or uri with parameter values of the policy rule.
            -s, --sku=: policy sku.
          completion:
            flag:
                enforcement-mode:
                    - Default
                    - DoNotEnforce
                sku:
                    - free
                    - standard
        - name: non-compliance-message
          description: Manage a policy assignment's non-compliance messages.
          commands:
            - name: create
              description: Add a non-compliance message to a policy assignment.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --scope=: Scope at which this policy assignment subcommand applies.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: the resource group where the policy will be applied
                -m, --message=!: Message that will be shown when a resource is denied by policy or evaluation details are inspected.
                -n, --name=!: Name of the policy assignment.
                -r, --policy-definition-reference-id=: Policy definition reference ID within the assigned initiative (policy set) that the message applies to.
            - name: delete
              description: Remove one or more non-compliance messages from a policy assignment.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --scope=: Scope at which this policy assignment subcommand applies.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: the resource group where the policy will be applied
                -m, --message=!: Message that will be shown when a resource is denied by policy or evaluation details are inspected.
                -n, --name=!: Name of the policy assignment.
                -r, --policy-definition-reference-id=: Policy definition reference ID within the assigned initiative (policy set) that the message applies to.
            - name: list
              description: List the non-compliance messages for a policy assignment.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --scope=: Scope at which this policy assignment subcommand applies.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: the resource group where the policy will be applied
                -n, --name=!: Name of the policy assignment.
        - name: show
          description: Show a resource policy assignment.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --scope=: Scope at which this policy assignment subcommand applies.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: the resource group where the policy will be applied
            -n, --name=!: Name of the policy assignment.
        - name: identity
          description: Manage a policy assignment's managed identity.
          commands:
            - name: assign
              description: Add a system assigned identity or a user assigned identity to a policy assignment.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --identity-scope=: Scope that the system assigned identity can access
                --role=: Role name or id that will be assigned to the managed identity
                --scope=: Scope at which this policy assignment subcommand applies.
                --subscription=: Name or ID of subscription.
                --system-assigned=: Provide this flag to use system assigned identity for policy assignment.
                --user-assigned=: UserAssigned Identity Id to be used for policy assignment.
                -g, --resource-group=: the resource group where the policy will be applied
                -n, --name=!: Name of the policy assignment.
            - name: remove
              description: Remove a managed identity from a policy assignment.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --scope=: Scope at which this policy assignment subcommand applies.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: the resource group where the policy will be applied
                -n, --name=!: Name of the policy assignment.
            - name: show
              description: Show a policy assignment's managed identity.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --scope=: Scope at which this policy assignment subcommand applies.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: the resource group where the policy will be applied
                -n, --name=!: Name of the policy assignment.
        - name: create
          description: Creates a policy assignment
          flags:
            --assign-identity=:
                description: Assigns a system assigned identity to the policy assignment.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --description=: Description of the policy assignment.
            --display-name=: Display name of the policy assignment.
            --identity-scope=: Scope that the system assigned identity can access
            --mi-system-assigned=: Provide this flag to use system assigned identity for policy assignment.
            --mi-user-assigned=: UserAssigned Identity Id to be used for policy assignment.
            --not-scopes=: Space-separated scopes where the policy assignment does not apply.
            --policy=: Name or id of the policy definition.
            --role=: Role name or id that will be assigned to the managed identity
            --scope=: Scope at which this policy assignment subcommand applies.
            --subscription=: Name or ID of subscription.
            -d, --policy-set-definition=: Name or id of the policy set definition.
            -e, --enforcement-mode=: Enforcement mode of the policy assignment, e.g.
            -g, --resource-group=: the resource group where the policy will be applied
            -l, --location=: The location of the policy assignment.
            -n, --name=: Name of the new policy assignment.
            -p, --params=: JSON formatted string or a path to a file or uri with parameter values of the policy rule.
            -s, --sku=: policy sku.
          completion:
            flag:
                enforcement-mode:
                    - Default
                    - DoNotEnforce
                sku:
                    - free
                    - standard
        - name: list
          description: List resource policy assignments.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --disable-scope-strict-match=: Include policy assignments either inherited from parent scope or at child scope.
            --scope=: Scope at which this policy assignment subcommand applies.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: the resource group where the policy will be applied
        - name: delete
          description: Delete a resource policy assignment.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --scope=: Scope at which this policy assignment subcommand applies.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: the resource group where the policy will be applied
            -n, --name=!: Name of the policy assignment.
    - name: attestation
      description: Manage resource policy attestations.
      commands:
        - name: update
          description: Update an existing policy attestation.
          flags:
            --assessment-date=: The time the evidence was assessed.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --comments=: Comments describing why this attestation was created.
            --compliance-state=: The compliance state that should be set on the resource.
            --definition-reference-id=: The policy definition reference ID from a policy set definition that the attestation is setting the state for.
            --evidence=:
                description: The evidence supporting the compliance state set in this attestation.
                nargs: -1
            --expires-on=: The time the compliance state should expire.
            --metadata=:
                description: Additional metadata in space-separated key=value pairs for an attestation.
                nargs: -1
            --namespace=: 'Provider namespace (Ex: Microsoft.Provider).'
            --owner=: The person responsible for setting the state of the resource.
            --parent=: 'The parent path (Ex: resourceTypeA/nameA/resourceTypeB/nameB).'
            --resource-type=: 'Resource type (Ex: resourceTypeC).'
            --resource=: Resource ID or resource name.
            --subscription=: Name or ID of subscription.
            -a, --policy-assignment-id=: The resource ID of the policy assignment that the attestation is setting the state for.
            -g, --resource-group=: Name of resource group.
            -n, --attestation-name=!: The name of the attestation.
          completion:
            flag:
                compliance-state:
                    - Compliant
                    - NonCompliant
                    - Unknown
        - name: show
          description: Get a policy attestation.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --namespace=: 'Provider namespace (Ex: Microsoft.Provider).'
            --parent=: 'The parent path (Ex: resourceTypeA/nameA/resourceTypeB/nameB).'
            --resource-type=: 'Resource type (Ex: resourceTypeC).'
            --resource=: Resource ID or resource name.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --attestation-name=!: The name of the attestation.
        - name: list
          description: List all attestations for a resource.
          flags:
            --filter=: OData filter expression.
            --resource-id=: Resource ID.
            --subscription=: Name or ID of subscription.
            --top=: Maximum number of records to return.
            -g, --resource-group=: Name of resource group.
        - name: create
          description: Create a policy attestation.
          flags:
            --assessment-date=: The time the evidence was assessed.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --comments=: Comments describing why this attestation was created.
            --compliance-state=: The compliance state that should be set on the resource.
            --definition-reference-id=: The policy definition reference ID from a policy set definition that the attestation is setting the state for.
            --evidence=:
                description: The evidence supporting the compliance state set in this attestation.
                nargs: -1
            --expires-on=: The time the compliance state should expire.
            --metadata=:
                description: Additional metadata in space-separated key=value pairs for an attestation.
                nargs: -1
            --namespace=: 'Provider namespace (Ex: Microsoft.Provider).'
            --owner=: The person responsible for setting the state of the resource.
            --parent=: 'The parent path (Ex: resourceTypeA/nameA/resourceTypeB/nameB).'
            --resource-type=: 'Resource type (Ex: resourceTypeC).'
            --resource=: Resource ID or resource name.
            --subscription=: Name or ID of subscription.
            -a, --policy-assignment-id=!: The resource ID of the policy assignment that the attestation is setting the state for.
            -g, --resource-group=: Name of resource group.
            -n, --attestation-name=!: The name of the attestation.
          completion:
            flag:
                compliance-state:
                    - Compliant
                    - NonCompliant
                    - Unknown
        - name: delete
          description: Delete an existing policy attestation.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --namespace=: 'Provider namespace (Ex: Microsoft.Provider).'
            --parent=: 'The parent path (Ex: resourceTypeA/nameA/resourceTypeB/nameB).'
            --resource-type=: 'Resource type (Ex: resourceTypeC).'
            --resource=: Resource ID or resource name.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --attestation-name=!: The name of the attestation.
