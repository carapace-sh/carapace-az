                nargs: -1
            --description=: Description of policy exemption.
            --display-name=: Display name of the policy exemption.
            --expires-on=: The expiration date and time (in UTC ISO 8601 format yyyy-MM-ddTHH:mm:ssZ) of the policy exemption.
            --metadata=:
                description: Metadata in space-separated key=value pairs.
                nargs: -1
            --scope=: Scope to which this policy exemption applies.
            -a, --policy-assignment=: The referenced policy assignment Id for the policy exemption.
            -e, --exemption-category=: The policy exemption category of the policy exemption
