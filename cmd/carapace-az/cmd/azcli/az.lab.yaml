            --subscription=: Name or ID of subscription.
            --top=: The maximum number of resources to return from the operation.
            -g, --resource-group=!: Name of resource group.
        - name: show
          description: Get environment.
          flags:
            --expand=: Specify the $expand query.
            --lab-name=!: The name of the lab.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the environment.
        - name: delete
          description: Delete environment.
          flags:
            --lab-name=!: The name of the lab.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the environment.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --expand=: Specify the $expand query.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --lab-name=: The name of the lab.
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            --user-name=: The name of the user profile.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the environment.
        - name: create
          description: Create an existing environment.
          flags:
            --arm-template=!: Name or ID of the ARM template in the lab.
            --artifact-source-name=: Name of the artifact source in the lab.
            --lab-name=!: The name of the lab.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --parameters=: Path to the parameters of the azure resource manager template.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: The tags of the resource.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the environment.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
    - name: formula
      description: Manage formulas for an azure devtest lab.
      commands:
        - name: delete
          description: Delete formula.
          flags:
            --lab-name=!: The name of the lab.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the formula.
