    - name: vm
      description: Manage VMs in an azure devtest lab.
      commands:
        - name: hibernate
          description: Hibernate a virtual machine This operation can take a while to complete.
          flags:
            --lab-name=!: The name of the lab.
            --name=!: The name of the virtual machine.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: claim
          description: Command to claim a VM in the Azure DevTest Lab
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --lab-name=: Name of the lab.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the virtual machine to claim.
        - name: create
          description: Create a VM in a lab.
          flags:
            --admin-password=: Password for the VM admin.
            --admin-username=: Username for the VM admin.
            --allow-claim=:
                description: Flag indicating if the VM should be created as claimable.
                nargs: -1
            --artifacts=: Path to the JSON encoded array of artifacts to be applied.
            --authentication-type=: Type of authentication allowed for the VM.
            --disk-type=:
                description: Storage type to use for virtual machine.
                nargs: -1
            --expiration-date=: The expiration date for VM.
            --formula=: Name of the formula.
            --generate-ssh-keys=:
                description: Generate SSH public and private key files if missing.
                nargs: -1
            --image-type=: Type of the image.
            --image=: The name of the operating system image (gallery image name or custom image name/ID).
            --ip-configuration=: Type of IP configuration to use for the VM.
            --lab-name=!: The name of the lab.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --notes=: The notes of the virtual machine.
            --saved-secret=: Name of the saved secret to be used for authentication.
            --size=: The size of the VM to be created.
            --ssh-key=: The SSH public key or public key file path.
            --subnet=: Name of the subnet to add the VM to.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: The tags of the resource.
                nargs: -1
            --vnet-name=: Name of the virtual network to add the VM to.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the virtual machine or environment
          completion:
            flag:
                allow-claim:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                authentication-type:
                    - password
                    - ssh
                disk-type:
                    - Premium
                    - Standard
                    - StandardSSD
                generate-ssh-keys:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                image-type:
                    - gallery
                    - custom
                ip-configuration:
                    - shared
                    - public
                    - private
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: show
          description: Show virtual machine.
          flags:
            --expand=: Specify the $expand query.
            --lab-name=!: The name of the lab.
            --name=!: The name of the virtual machine.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: start
          description: Start a virtual machine.
          flags:
            --lab-name=!: The name of the lab.
            --name=!: The name of the virtual machine.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: delete
          description: Delete virtual machine.
          flags:
            --lab-name=!: The name of the lab.
            --name=!: The name of the virtual machine.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: apply-artifacts
          description: Apply artifacts to virtual machine.
          flags:
            --artifacts=: Path to the JSON encoded array of artifacts to be applied.
            --lab-name=!: The name of the lab.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the virtual machine.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: list
          description: List virtual machines in a given lab.
          flags:
            --all=:
                description: List all virtual machines in the lab.
                nargs: -1
            --claimable=:
                description: List only claimable virtual machines in the lab.
                nargs: -1
            --environment=: Name or ID of the environment to list virtual machines in.
            --expand=: Specify the $expand query.
            --filters=: The filter to apply to the operation.
            --lab-name=!: The name of the lab.
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --object-id=: Object ID of the owner to list VMs for.
            --order-by=: The ordering expression for the results, using OData notation.
            --subscription=: Name or ID of subscription.
            --top=: The maximum number of resources to return from the operation.
            -g, --resource-group=!: Name of resource group.
          completion:
            flag:
                all:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                claimable:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --expand=: Specify the $expand query.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --lab-name=: The name of the lab.
            --name=: The name of the virtual machine.
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
        - name: stop
          description: Stop a virtual machine This operation can take a while to complete.
          flags:
            --lab-name=!: The name of the lab.
            --name=!: The name of the virtual machine.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
