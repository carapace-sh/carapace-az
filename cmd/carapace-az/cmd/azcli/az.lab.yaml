            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --orderby=: The ordering expression for the results, using OData notation.
            --subscription=: Name or ID of subscription.
            --top=: The maximum number of resources to return from the operation.
            -g, --resource-group=!: Name of resource group.
    - name: get
      description: Get lab.
      flags:
        --expand=: Specify the $expand query.
        --name=!: The name of the lab.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
    - name: secret
      description: Manage secrets of an azure devtest lab.
      commands:
        - name: set
          description: Set a secret for a lab.
          flags:
            --lab-name=!: The name of the lab.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --value=!: The value of the secret for secret creation.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the secret.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: delete
          description: Delete secret.
          flags:
            --lab-name=!: The name of the lab.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the secret.
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          description: List secrets in a given user profile.
          flags:
            --expand=: Specify the $expand query.
            --filter=: The filter to apply to the operation.
            --lab-name=!: The name of the lab.
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --orderby=: The ordering expression for the results, using OData notation.
            --subscription=: Name or ID of subscription.
