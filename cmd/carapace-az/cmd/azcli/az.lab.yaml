# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: lab
description: Manage azure devtest labs.
commands:
    - name: arm-template
      description: Manage azure resource manager (ARM) templates in an azure devtest lab.
      commands:
        - name: list
          description: List azure resource manager templates in a given artifact source.
          flags:
            --artifact-source-name=!: The name of the artifact source.
            --expand=: Specify the $expand query.
            --filter=: The filter to apply to the operation.
            --lab-name=!: The name of the lab.
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --orderby=: The ordering expression for the results, using OData notation.
            --subscription=: Name or ID of subscription.
            --top=: The maximum number of resources to return from the operation.
            -g, --resource-group=!: Name of resource group.
        - name: show
          description: Show the details of an ARM template in a lab.
          flags:
            --artifact-source-name=!: The name of the artifact source.
            --export-parameters=:
                description: Whether or not to export parameters template.
                nargs: -1
            --lab-name=!: The name of the lab.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the azure resource manager template.
          completion:
            flag:
                export-parameters:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
    - name: artifact
      description: Manage devtest labs artifacts.
      commands:
        - name: list
          description: List artifacts in a given artifact source.
          flags:
            --artifact-source-name=!: The name of the artifact source.
            --expand=: Specify the $expand query.
            --filter=: The filter to apply to the operation.
            --lab-name=!: The name of the lab.
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --orderby=: The ordering expression for the results, using OData notation.
            --subscription=: Name or ID of subscription.
            --top=: The maximum number of resources to return from the operation.
            -g, --resource-group=!: Name of resource group.
    - name: artifact-source
      description: Manage devtest lab artifact sources.
      commands:
        - name: show
          description: Show artifact source.
          flags:
            --expand=: Specify the $expand query.
            --lab-name=!: The name of the lab.
            --name=!: The name of the artifact source.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: list
          description: List artifact sources in a given lab.
          flags:
            --expand=: Specify the $expand query.
            --filter=: The filter to apply to the operation.
            --lab-name=!: The name of the lab.
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --orderby=: The ordering expression for the results, using OData notation.
            --subscription=: Name or ID of subscription.
            --top=: The maximum number of resources to return from the operation.
            -g, --resource-group=!: Name of resource group.
    - name: custom-image
      description: Manage custom images of a devtest lab.
      commands:
        - name: show
          description: Get custom image.
          flags:
            --expand=: Specify the $expand query.
            --lab-name=!: The name of the lab.
            --name=!: The name of the custom image.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: delete
          description: Delete custom image.
          flags:
            --lab-name=!: The name of the lab.
            --name=!: The name of the custom image.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: list
          description: List custom images in a given lab.
          flags:
            --expand=: Specify the $expand query.
            --filter=: The filter to apply to the operation.
            --lab-name=!: The name of the lab.
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --orderby=: The ordering expression for the results, using OData notation.
            --subscription=: Name or ID of subscription.
            --top=: The maximum number of resources to return from the operation.
            -g, --resource-group=!: Name of resource group.
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --expand=: Specify the $expand query.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --lab-name=: The name of the lab.
            --name=: The name of the custom image.
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
        - name: create
          description: Create an existing custom image.
          flags:
            --author=: The author of the custom image.
            --description=: The description of the custom image.
            --lab-name=!: The name of the lab.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --os-state=!: The current state of the virtual machine.
            --os-type=!: Type of the OS on which the custom image is based.
            --source-vm-id=!: The resource ID of a virtual machine in the provided lab.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the custom image.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                os-type:
                    - Windows
                    - Linux
    - name: delete
      description: Delete lab.
      flags:
        --name=!: The name of the lab.
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -y, --yes=: Do not prompt for confirmation.
      completion:
        flag:
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: environment
      description: Manage environments for an azure devtest lab.
      commands:
        - name: list
          description: List environments in a given user profile.
          flags:
            --expand=: Specify the $expand query.
