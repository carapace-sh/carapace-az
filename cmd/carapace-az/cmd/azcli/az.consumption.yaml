# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: consumption
description: Manage consumption of Azure resources.
commands:
    - name: budget
      commands:
        - name: create
          description: Create a budget for an Azure subscription.
          flags:
            --amount=!: Amount of a budget.
            --budget-name=!: Name of a budget.
            --category=!: Category of the budget can be cost or usage.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --meter-filter=:
                description: Space-separated list of meters to filter on.
                nargs: -1
            --resource-filter=:
                description: Space-separated list of resource instances to filter on.
                nargs: -1
            --resource-group-filter=:
                description: Space-separated list of resource groups to filter on.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --time-grain=!: Time grain of the budget can be monthly, quarterly, or annually.
            -e, --end-date=!: End date (YYYY-MM-DD in UTC) of time period of a budget.
            -g, --resource-group=: Name of resource group.
            -s, --start-date=!: Start date (YYYY-MM-DD in UTC) of time period of a budget.
          completion:
            flag:
                category:
                    - cost
                    - usage
                time-grain:
                    - monthly
                    - quarterly
                    - annually
        - name: show
          description: Show budget for an Azure subscription.
          flags:
            --budget-name=!: Name of a budget.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: delete-with-rg
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Budget Name.
        - name: create-with-rg
          flags:
            --amount=: The total amount of cost to track with the budget
            --category=: The category of the budget, whether the budget tracks cost or usage.
            --e-tag=: eTag of the resource.
            --filters=:
                description: May be used to filter budgets by resource group, resource, or meter.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --notifications=:
                description: Dictionary of notifications associated with the budget.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --time-grain=: The time covered by a budget.
            --time-period=:
                description: Has start and end date of the budget.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Budget Name.
          completion:
            flag:
                category:
                    - Cost
                    - Usage
                time-grain:
                    - Annually
                    - Monthly
                    - Quarterly
        - name: update-with-rg
          flags:
            --amount=: The total amount of cost to track with the budget
            --category=: The category of the budget, whether the budget tracks cost or usage.
            --e-tag=: eTag of the resource.
            --filters=:
                description: May be used to filter budgets by resource group, resource, or meter.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --notifications=:
                description: Dictionary of notifications associated with the budget.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --time-grain=: The time covered by a budget.
            --time-period=:
                description: Has start and end date of the budget.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Budget Name.
          completion:
            flag:
                category:
                    - Cost
                    - Usage
                time-grain:
                    - Annually
                    - Monthly
                    - Quarterly
        - name: update
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --amount=: The total amount of cost to track with the budget
            --category=: The category of the budget, whether the budget tracks cost or usage.
            --e-tag=: eTag of the resource.
            --filters=:
                description: May be used to filter budgets by resource group, resource, or meter.
                nargs: -1
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --notifications=:
                description: Dictionary of notifications associated with the budget.
                nargs: -1
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --time-grain=: The time covered by a budget.
            --time-period=:
                description: Has start and end date of the budget.
                nargs: -1
            -n, --name=: Budget Name.
          completion:
            flag:
                category:
                    - Cost
                    - Usage
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                time-grain:
                    - Annually
                    - Monthly
                    - Quarterly
        - name: list
          description: List budgets for an Azure subscription.
          flags:
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: show-with-rg
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Budget Name.
        - name: delete
          description: Delete a budget for an Azure subscription.
          flags:
            --budget-name=!: Name of a budget.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
    - name: marketplace
      commands:
        - name: list
          description: List the marketplace for an Azure subscription within a billing period.
          flags:
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
            -e, --end-date=: End date (YYYY-MM-DD in UTC).
            -p, --billing-period-name=: Name of the billing period to get the marketplace.
            -s, --start-date=: Start date (YYYY-MM-DD in UTC).
            -t, --top=: Maximum number of items to return.
    - name: pricesheet
      commands:
        - name: show
          description: Show the price sheet for an Azure subscription within a billing period.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --include-meter-details=: Include meter details in the price sheet.
            --subscription=: Name or ID of subscription.
            -p, --billing-period-name=: Name of the billing period to get the price sheet.
    - name: reservation
      commands:
        - name: summary
          commands:
            - name: list
              description: List reservation summaries for daily or monthly by order Id or reservation id.
              flags:
                --grain=!: Reservation summary grain.
                --max-items=: Total number of items to return in the command's output.
                --next-token=: Token to specify where to start paginating.
                --reservation-id=: Id of the reservation
                --reservation-order-id=!: Reservation order id.
                --subscription=: Name or ID of subscription.
                -e, --end-date=: End date (YYYY-MM-DD in UTC).
                -s, --start-date=: Start date (YYYY-MM-DD in UTC).
              completion:
                flag:
                    grain:
                        - daily
                        - monthly
        - name: detail
          commands:
            - name: list
              description: List the details of a reservation by order id or reservation id.
              flags:
                --max-items=: Total number of items to return in the command's output.
                --next-token=: Token to specify where to start paginating.
                --reservation-id=: Reservation id.
                --reservation-order-id=!: Reservation order id.
                --subscription=: Name or ID of subscription.
                -e, --end-date=!: End date (YYYY-MM-DD in UTC).
                -s, --start-date=!: Start date (YYYY-MM-DD in UTC).
    - name: usage
      commands:
        - name: list
          description: List the details of Azure resource consumption, either as an invoice or within a billing period.
          flags:
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
            -a, --include-additional-properties=:
                description: Include additional properties in the usages.
                nargs: -1
            -e, --end-date=: End date (YYYY-MM-DD in UTC).
            -m, --include-meter-details=:
                description: Include meter details in the usages.
                nargs: -1
            -p, --billing-period-name=: Name of the billing period to get the usage details that associate with.
            -s, --start-date=: Start date (YYYY-MM-DD in UTC).
            -t, --top=: Maximum number of items to return.
