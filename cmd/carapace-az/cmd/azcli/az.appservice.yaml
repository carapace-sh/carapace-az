# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: appservice
description: Manage App Service plans.
commands:
    - name: ase
      commands:
        - name: list-addresses
          description: List VIPs associated with an app service environment v2.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the app service environment
        - name: create-inbound-services
          description: Private DNS Zone for Internal (ILB) App Service Environments.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --skip-dns=:
                description: Do not create Private DNS Zone and DNS records.
                nargs: -1
            --subnet=!: Name or ID of existing subnet for DNS Zone link.
            --subscription=: Name or ID of subscription.
            --vnet-name=: Name of the vNet.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the app service environment
          completion:
            flag:
                skip-dns:
                    - "true"
                    - "false"
        - name: send-test-notification
          description: Send a test upgrade notification in app service environment v3.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the app service environment
        - name: create
          description: Create app service environment.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --force-network-security-group=:
                description: Override network security group for subnet.
                nargs: -1
            --force-route-table=:
                description: Override route table for subnet.
                nargs: -1
            --front-end-scale-factor=: Scale of front ends to app service plan instance ratio.
            --front-end-sku=: Size of front end servers.
            --ignore-network-security-group=:
                description: Configure network security group manually.
                nargs: -1
            --ignore-route-table=:
                description: Configure route table manually.
                nargs: -1
            --ignore-subnet-size-validation=:
                description: Do not check if subnet is sized according to recommendations.
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --os-preference=: Determine if app service environment should start with Linux workers.
            --subnet=!: Name or ID of existing subnet.
            --subscription=: Name or ID of subscription.
            --virtual-ip-type=: Specify if app service environment should be accessible from internet
            --vnet-name=: Name of the vNet.
            --zone-redundant=:
                description: Configure App Service Environment as Zone Redundant.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -k, --kind=: Specify App Service Environment version
            -l, --location=: Location.
            -n, --name=!: Name of the app service environment
          completion:
            flag:
                force-network-security-group:
                    - "true"
                    - "false"
                force-route-table:
                    - "true"
                    - "false"
                front-end-sku:
                    - I1
                    - I2
                    - I3
                ignore-network-security-group:
                    - "true"
                    - "false"
                ignore-route-table:
                    - "true"
                    - "false"
                ignore-subnet-size-validation:
                    - "true"
                    - "false"
                kind:
                    - ASEv2
                    - ASEv3
                os-preference:
                    - Windows
                    - Linux
                virtual-ip-type:
                    - Internal
                    - External
                zone-redundant:
                    - "true"
                    - "false"
        - name: update
          description: Update app service environment.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --front-end-scale-factor=: (ASEv2 only) Scale of front ends to app service plan instance ratio between 5 and 15.
            --front-end-sku=: (ASEv2 only) Size of front end servers.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -f, --allow-incoming-ftp-connections=:
                description: (ASEv3 only) Configure App Service Environment to allow FTP access.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the app service environment
            -p, --allow-new-private-endpoint-connections=:
                description: (ASEv3 only) Configure Apps in App Service Environment to allow new private endpoint connections.
                nargs: -1
            -r, --allow-remote-debugging=:
                description: (ASEv3 only) Configure App Service Environment to allow remote debugging.
                nargs: -1
          completion:
            flag:
                allow-incoming-ftp-connections:
                    - "true"
                    - "false"
                allow-new-private-endpoint-connections:
                    - "true"
                    - "false"
                allow-remote-debugging:
                    - "true"
                    - "false"
                front-end-sku:
                    - I1
                    - I2
                    - I3
        - name: delete
          description: Delete app service environment.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the app service environment
            -y, --yes=: Do not prompt for confirmation.
        - name: list-plans
          description: List app service plans associated with an app service environment.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the app service environment
        - name: upgrade
          description: Upgrade app service environment v3.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the app service environment
            -y, --yes=: Do not prompt for confirmation.
        - name: show
          description: Show details of an app service environment.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: Name of the app service environment
        - name: list
          description: List app service environments.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
    - name: domain
      commands:
        - name: create
          description: Create and purchase a custom domain.
          flags:
            --accept-terms=: By using this flag, you are accepting the conditions shown using the --show-hostname-purchase-terms flag.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --dryrun=: Show summary of the purchase and create operation instead of executing it
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -a, --auto-renew=: Enable auto-renew on the domain
            -c, --contact-info=!: The file path to a JSON object with your contact info for domain registration.
            -g, --resource-group=!: Name of resource group.
            -n, --hostname=!: Name of the custom domain
            -p, --privacy=: Enable privacy protection
        - name: show-terms
          description: Show the legal terms for purchasing and creating a custom domain.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --hostname=!: Name of the custom domain
    - name: hybrid-connection
      commands:
        - name: set-key
          description: set the key that all apps in an appservice plan use to connect to the hybrid-connections in that appservice plan
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --hybrid-connection=!: Hybrid connection name
            --key-type=!: Which key (primary or secondary) should be used
            --namespace=!: Hybrid connection namespace
            --plan=!: AppService plan
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: list-locations
      description: List regions where a plan sku is available.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --hyperv-workers-enabled=: get regions which support hosting web apps on Windows Container workers
        --linux-workers-enabled=: get regions which support hosting web apps on Linux workers
        --sku=!: The pricing tiers, e.g., F1(Free), D1(Shared), B1(Basic Small), B2(Basic Medium), B3(Basic Large), S1(Standard Small), P1V2(Premium V2 Small), P2V2(Premium V2 Medium), P3V2(Premium V2 Large), P0V3(Premium V3 Extra Small), P1V3(Premium V3 Small), P2V3(Premium V3 Medium), P3V3(Premium V3 Large), P1MV3(Premium Memory Optimized V3 Small), P2MV3(Premium Memory Optimized V3 Medium), P3MV3(Premium Memory Optimized V3 Large), P4MV3(Premium Memory Optimized V3 Extra Large), P5MV3(Premium Memory Optimized V3 Extra Extra Large), I1 (Isolated Small), I2 (Isolated Medium), I3 (Isolated Large), I1V2 (Isolated V2 I1V2), I2V2 (Isolated V2 I2V2), I3V2 (Isolated V2 I3V2), I4V2 (Isolated V2 I4V2), I5V2 (Isolated V2 I5V2), I6V2 (Isolated V2 I6V2), I1MV2 (Isolated Memory Optimized V2 I1MV2), I2MV2 (Isolated Memory Optimized V2 I2MV2), I3MV2 (Isolated Memory Optimized V2 I3MV2), I4MV2 (Isolated Memory Optimized V2 I4MV2), I5MV2 (Isolated Memory Optimized V2 I5MV2), WS1 (Logic Apps Workflow Standard 1), WS2 (Logic Apps Workflow Standard 2), WS3 (Logic Apps Workflow Standard 3)
        --subscription=: Name or ID of subscription.
      completion:
        flag:
            sku:
                - F1
                - FREE
                - D1
                - SHARED
                - B1
                - B2
                - B3
                - S1
                - S2
                - S3
                - P1V2
                - P2V2
                - P3V2
                - P0V3
                - P1V3
                - P2V3
                - P3V3
                - P1MV3
                - P2MV3
                - P3MV3
                - P4MV3
                - P5MV3
                - I1
                - I2
                - I3
                - I1V2
                - I2V2
                - I3V2
                - I4V2
                - I5V2
                - I6V2
                - I1MV2
                - I2MV2
                - I3MV2
                - I4MV2
                - I5MV2
                - WS1
                - WS2
                - WS3
    - name: plan
      commands:
        - name: show
          description: Get the app service plans for a resource group or a set of resource groups.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the app service plan
        - name: delete
          description: Delete an App Service plan.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the app service plan
            -y, --yes=: Do not prompt for confirmation.
        - name: update
          description: Update an app service plan.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --elastic-scale=:
                description: Enable or disable automatic scaling.
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --number-of-workers=: Number of workers to be allocated.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --sku=: The pricing tiers, e.g., F1(Free), D1(Shared), B1(Basic Small), B2(Basic Medium), B3(Basic Large), S1(Standard Small), P1V2(Premium V2 Small), P2V2(Premium V2 Medium), P3V2(Premium V2 Large), P0V3(Premium V3 Extra Small), P1V3(Premium V3 Small), P2V3(Premium V3 Medium), P3V3(Premium V3 Large), P1MV3(Premium Memory Optimized V3 Small), P2MV3(Premium Memory Optimized V3 Medium), P3MV3(Premium Memory Optimized V3 Large), P4MV3(Premium Memory Optimized V3 Extra Large), P5MV3(Premium Memory Optimized V3 Extra Extra Large), I1 (Isolated Small), I2 (Isolated Medium), I3 (Isolated Large), I1V2 (Isolated V2 I1V2), I2V2 (Isolated V2 I2V2), I3V2 (Isolated V2 I3V2), I4V2 (Isolated V2 I4V2), I5V2 (Isolated V2 I5V2), I6V2 (Isolated V2 I6V2), I1MV2 (Isolated Memory Optimized V2 I1MV2), I2MV2 (Isolated Memory Optimized V2 I2MV2), I3MV2 (Isolated Memory Optimized V2 I3MV2), I4MV2 (Isolated Memory Optimized V2 I4MV2), I5MV2 (Isolated Memory Optimized V2 I5MV2), WS1 (Logic Apps Workflow Standard 1), WS2 (Logic Apps Workflow Standard 2), WS3 (Logic Apps Workflow Standard 3)
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -m, --max-elastic-worker-count=: Maximum number of instances that the plan can scale out to.
            -n, --name=: The name of the app service plan
          completion:
            flag:
                elastic-scale:
                    - "true"
                    - "false"
                sku:
                    - F1
                    - FREE
                    - D1
                    - SHARED
                    - B1
                    - B2
                    - B3
                    - S1
                    - S2
                    - S3
                    - P1V2
                    - P2V2
                    - P3V2
                    - P0V3
                    - P1V3
                    - P2V3
                    - P3V3
                    - P1MV3
                    - P2MV3
                    - P3MV3
                    - P4MV3
                    - P5MV3
                    - I1
                    - I2
                    - I3
                    - I1V2
                    - I2V2
                    - I3V2
                    - I4V2
                    - I5V2
                    - I6V2
                    - I1MV2
                    - I2MV2
                    - I3MV2
                    - I4MV2
                    - I5MV2
                    - WS1
                    - WS2
                    - WS3
        - name: list
          description: List app service plans.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: create
          description: Create an app service plan.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --hyper-v=: Host Windows Container Web App on Hyper-V worker.
            --is-linux=: host web app on Linux worker
            --no-wait=: Do not wait for the long-running operation to finish.
            --number-of-workers=: Number of workers to be allocated.
            --per-site-scaling=: Enable per-app scaling at the App Service plan level to allow for scaling an app independently from the App Service plan that hosts it.
            --sku=: The pricing tiers, e.g., F1(Free), D1(Shared), B1(Basic Small), B2(Basic Medium), B3(Basic Large), S1(Standard Small), P1V2(Premium V2 Small), P2V2(Premium V2 Medium), P3V2(Premium V2 Large), P0V3(Premium V3 Extra Small), P1V3(Premium V3 Small), P2V3(Premium V3 Medium), P3V3(Premium V3 Large), P1MV3(Premium Memory Optimized V3 Small), P2MV3(Premium Memory Optimized V3 Medium), P3MV3(Premium Memory Optimized V3 Large), P4MV3(Premium Memory Optimized V3 Extra Large), P5MV3(Premium Memory Optimized V3 Extra Extra Large), I1 (Isolated Small), I2 (Isolated Medium), I3 (Isolated Large), I1V2 (Isolated V2 I1V2), I2V2 (Isolated V2 I2V2), I3V2 (Isolated V2 I3V2), I4V2 (Isolated V2 I4V2), I5V2 (Isolated V2 I5V2), I6V2 (Isolated V2 I6V2), I1MV2 (Isolated Memory Optimized V2 I1MV2), I2MV2 (Isolated Memory Optimized V2 I2MV2), I3MV2 (Isolated Memory Optimized V2 I3MV2), I4MV2 (Isolated Memory Optimized V2 I4MV2), I5MV2 (Isolated Memory Optimized V2 I5MV2), WS1 (Logic Apps Workflow Standard 1), WS2 (Logic Apps Workflow Standard 2), WS3 (Logic Apps Workflow Standard 3)
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -e, --app-service-environment=: Name or ID of the app service environment.
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Location.
            -n, --name=!: Name of the new app service plan
            -z, --zone-redundant=: Enable zone redundancy for high availability.
          completion:
            flag:
                sku:
                    - F1
                    - FREE
                    - D1
                    - SHARED
                    - B1
                    - B2
                    - B3
                    - S1
                    - S2
                    - S3
                    - P1V2
                    - P2V2
                    - P3V2
                    - P0V3
                    - P1V3
                    - P2V3
                    - P3V3
                    - P1MV3
                    - P2MV3
                    - P3MV3
                    - P4MV3
                    - P5MV3
                    - I1
                    - I2
                    - I3
                    - I1V2
                    - I2V2
                    - I3V2
                    - I4V2
                    - I5V2
                    - I6V2
                    - I1MV2
                    - I2MV2
                    - I3MV2
                    - I4MV2
                    - I5MV2
                    - WS1
                    - WS2
                    - WS3
    - name: vnet-integration
      commands:
        - name: list
          description: list the virtual network integrations used in an appservice plan
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --plan=!: AppService plan
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
