# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: eventhubs
description: eventhubs
commands:
    - name: cluster
      commands:
        - name: show
          description: Get the resource description of the specified Event Hubs Cluster.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the Event Hubs Cluster.
        - name: list
          description: List the available Event Hubs Clusters within an ARM resource group.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: available-region
          description: List the quantity of available pre-provisioned Event Hubs Clusters, indexed by Azure region.
          flags:
            --subscription=: Name or ID of subscription.
        - name: create
          description: Create EventHubs Cluster
          flags:
            --capacity=: The quantity of Event Hubs Cluster Capacity Units contained in this cluster.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --provisioning-state=: Provisioning state of the Cluster.
            --sku=: Name of this SKU.
            --subscription=: Name or ID of subscription.
            --supports-scaling=:
                description: A value that indicates whether Scaling is Supported.
                nargs: -1
            --tags=:
                description: Resource tags.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Resource location.
            -n, --name=!: The name of the Event Hubs Cluster.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                sku:
                    - Dedicated
                supports-scaling:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: namespace
          commands:
            - name: list
              description: List of Namespaces within given Cluster.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: The name of the Event Hubs Cluster.
        - name: update
          description: Update tags of EventHubs Cluster
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --capacity=: The quantity of Event Hubs Cluster Capacity Units contained in this cluster.
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --provisioning-state=: Provisioning state of the Cluster.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --sku=: Name of this SKU.
            --subscription=: Name or ID of subscription.
            --supports-scaling=:
                description: A value that indicates whether Scaling is Supported.
                nargs: -1
            --tags=:
                description: Resource tags.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the Event Hubs Cluster.
          completion:
            flag:
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                sku:
                    - Dedicated
                supports-scaling:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: delete
          description: Delete an existing Event Hubs Cluster.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the Event Hubs Cluster.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: wait
          description: Place the CLI in a waiting state until a condition of the Cluster operation is completed.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the Event Hubs Cluster.
    - name: eventhub
      commands:
        - name: consumer-group
          commands:
            - name: update
              description: Updates the EventHub ConsumerGroup
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --eventhub-name=: The Event Hub name
                --force-string=:
                    description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The Namespace name
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --user-metadata=: User Metadata is a placeholder to store user-defined string data with maximum length 1024. e.g. it can be used to store descriptive data, such as list of teams and their contact information also user-defined configuration settings can be stored.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The consumer group name
              completion:
                flag:
                    force-string:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
            - name: delete
              description: Deletes the ConsumerGroup
              flags:
                --eventhub-name=: The Event Hub name
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The Namespace name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The consumer group name
            - name: list
              description: List the ConsumerGroup by Eventhub
              flags:
                --eventhub-name=!: The Event Hub name
                --max-items=: Total number of items to return in the command's output.
                --namespace-name=!: The Namespace name
                --next-token=: Token to specify where to start paginating.
                --skip=: Skip is only used if a previous operation returned a partial result.
                --subscription=: Name or ID of subscription.
                --top=: May be used to limit the number of results to the most recent N usageDetails.
                -g, --resource-group=!: Name of resource group.
            - name: create
              description: Creates the EventHub ConsumerGroup
              flags:
                --eventhub-name=!: The Event Hub name
                --namespace-name=!: The Namespace name
                --subscription=: Name or ID of subscription.
                --user-metadata=: User Metadata is a placeholder to store user-defined string data with maximum length 1024. e.g. it can be used to store descriptive data, such as list of teams and their contact information also user-defined configuration settings can be stored.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: The consumer group name
            - name: show
              description: Shows the ConsumerGroup Details
              flags:
                --eventhub-name=: The Event Hub name
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The Namespace name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The consumer group name
        - name: authorization-rule
          commands:
            - name: keys
              commands:
                - name: list
                  description: Shows the connection strings of Authorizationrule for the Eventhub.
                  flags:
                    --eventhub-name=!: The Event Hub name
                    --name=!: The authorization rule name.
                    --namespace-name=!: The Namespace name
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of resource group.
                - name: renew
                  description: Regenerate the connection strings of Authorizationrule for the namespace.
                  flags:
                    --eventhub-name=: The Event Hub name
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --key-value=: Optional, if the key value provided, is set for KeyType or autogenerated Key value set for keyType
                    --key=!: The access key to regenerate.
                    --name=: The authorization rule name.
                    --namespace-name=: The Namespace name
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                  completion:
                    flag:
                        key:
                            - PrimaryKey
                            - SecondaryKey
            - name: delete
              description: Deletes the Authorizationrule of Eventhub.
              flags:
                --eventhub-name=: The Event Hub name
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The Namespace name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The authorization rule name.
            - name: update
              description: Updates Authorizationrule for the given Eventhub
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --eventhub-name=: The Event Hub name
                --force-string=:
                    description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The Namespace name
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --rights=:
                    description: The rights associated with the rule.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The authorization rule name.
              completion:
                flag:
                    force-string:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
            - name: show
              description: shows the details of Authorizationrule
              flags:
                --eventhub-name=: The Event Hub name
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The Namespace name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The authorization rule name.
            - name: list
              description: shows the list of Authorization-rules by Eventhub
              flags:
                --eventhub-name=!: The Event Hub name
                --max-items=: Total number of items to return in the command's output.
                --namespace-name=!: The Namespace name
                --next-token=: Token to specify where to start paginating.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: create
              description: Creates Authorizationrule for the given Eventhub
              flags:
                --eventhub-name=!: The Event Hub name
                --namespace-name=!: The Namespace name
                --rights=:
                    description: The rights associated with the rule.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: The authorization rule name.
        - name: update
          description: Updates the EventHubs Eventhub
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --archive-name-format=: Blob naming convention for archive, e.g. {Namespace}/{EventHub}/{PartitionId}/{Year}/{Month}/{Day}/{Hour}/{Minute}/{Second}.
            --blob-container=: Blob container Name
            --capture-interval=: The time window allows you to set the frequency with which the capture to Azure Blobs will happen, value should between 60 to 900 seconds
            --capture-size-limit=: The size window defines the amount of data built up in your Event Hub before an capture operation, value should be between 10485760 to 524288000 bytes
            --cleanup-policy=: Enumerates the possible values for cleanup policy
            --destination-name=: Name for capture destination
            --enable-capture=:
                description: A value that indicates whether capture description is enabled.
                nargs: -1
            --encoding=: Enumerates the possible values for the encoding format of capture description.
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --identity=:
                description: A value that indicates whether capture description is enabled.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --min-lag=: The minimum time a message will remain ineligible for compaction in the log.
            --namespace-name=: The Namespace name
            --partition-count=: Number of partitions created for the Event Hub, allowed values are from 1 to 32 partitions.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --retention-time=: Number of hours to retain the events for this Event Hub.
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --skip-empty-archives=:
                description: A value that indicates whether to Skip Empty Archives
                nargs: -1
            --status=: Enumerates the possible values for the status of the Event Hub.
            --storage-account=: Resource id of the storage account to be used to create the blobs
            --subscription=: Name or ID of subscription.
            --timestamp-type=: Denotes the type of timestamp the message will hold.Two types of timestamp types - "AppendTime" and "CreateTime".
            --user-metadata=: Gets and Sets Metadata of User.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The Event Hub name
            -t, --tombstone-retention-time-in-hours=: Number of hours to retain the tombstone markers of a compacted Event Hub.
          completion:
            flag:
                cleanup-policy:
                    - Compact
                    - Delete
                    - DeleteOrCompact
                enable-capture:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                encoding:
                    - Avro
                    - AvroDeflate
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                skip-empty-archives:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                status:
                    - Active
                    - Creating
                    - Deleting
                    - Disabled
                    - ReceiveDisabled
                    - Renaming
                    - Restoring
                    - SendDisabled
                    - Unknown
                timestamp-type:
                    - Create
                    - LogAppend
        - name: list
          description: List the EventHub by Namespace
          flags:
            --max-items=: Total number of items to return in the command's output.
            --namespace-name=!: The Namespace name
            --next-token=: Token to specify where to start paginating.
            --skip=: Skip is only used if a previous operation returned a partial result.
            --subscription=: Name or ID of subscription.
            --top=: May be used to limit the number of results to the most recent N usageDetails.
            -g, --resource-group=!: Name of resource group.
        - name: create
          description: Creates the EventHubs Eventhub
          flags:
            --archive-name-format=: Blob naming convention for archive, e.g. {Namespace}/{EventHub}/{PartitionId}/{Year}/{Month}/{Day}/{Hour}/{Minute}/{Second}.
            --blob-container=: Blob container Name
            --capture-interval=: Allows you to set the frequency with which the capture to Azure Blobs will happen, value should between 60 to 900 seconds
            --capture-size-limit=: Defines the amount of data built up in your Event Hub before an capture operation, value should be between 10485760 to 524288000 bytes
            --cleanup-policy=: Enumerates the possible values for cleanup policy
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --destination-name=: Name for capture destination, should be EventHubArchive.AzureBlockBlob.
            --enable-capture=:
                description: A boolean value that indicates whether capture is enabled.
                nargs: -1
            --mi-system-assigned=:
                description: Enable System Assigned Identity
                nargs: -1
            --mi-user-assigned=: List of User Assigned Identity ids.
            --min-lag=: The minimum time a message will remain ineligible for compaction in the log.
            --namespace-name=!: name of Namespace
            --partition-count=: Number of partitions created for the Event Hub.
            --retention-time-in-hours=: Number of hours to retain the events for this Event Hub.
            --skip-empty-archives=:
                description: A boolean value that indicates whether to Skip Empty.
                nargs: -1
            --status=: Status of Eventhub
            --storage-account=: Name (if within same resource group and not of type Classic Storage) or ARM id of the storage account to be used to create the blobs
            --subscription=: Name or ID of subscription.
            --timestamp-type=: Denotes the type of timestamp the message will hold.
            --tombstone-retention-time-in-hours=: Number of hours to retain the tombstone markers of a compacted Event Hub.
            --user-metadata=: Gets and Sets Metadata of User.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of Eventhub
          completion:
            flag:
                cleanup-policy:
                    - Delete
                    - Compact
                    - DeleteOrCompact
                enable-capture:
                    - "true"
                    - "false"
                mi-system-assigned:
                    - "true"
                    - "false"
                skip-empty-archives:
                    - "true"
                    - "false"
                status:
                    - Active
                    - Disabled
                    - SendDisabled
                timestamp-type:
                    - Create
                    - LogAppend
        - name: delete
          description: Deletes the Eventhub
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: The Namespace name
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The Event Hub name
        - name: show
          description: shows the Eventhub Details
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: The Namespace name
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The Event Hub name
    - name: georecovery-alias
      commands:
        - name: break-pair
          description: Disables Geo-Disaster Recovery Configuration Alias and stops replicating changes from primary to secondary namespaces
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: The Namespace name
            --subscription=: Name or ID of subscription.
            -a, --alias=: The Disaster Recovery configuration name
            -g, --resource-group=: Name of resource group.
        - name: fail-over
          description: Invokes Geo-Disaster Recovery Configuration Alias to point to the secondary namespace
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: The Namespace name
            --subscription=: Name or ID of subscription.
            -a, --alias=: The Disaster Recovery configuration name
            -g, --resource-group=: Name of resource group.
        - name: authorization-rule
          commands:
            - name: show
              description: Show properties of EventHubs Geo-Disaster Recovery Configuration Alias and Namespace Authorizationrule
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --namespace-name=: The Namespace name
                --subscription=: Name or ID of subscription.
                -a, --alias=: The Disaster Recovery configuration name
                -g, --resource-group=: Name of resource group.
                -n, --name=: The authorization rule name.
            - name: list
              description: List of Authorizationrule by EventHubs Namespace
              flags:
                --max-items=: Total number of items to return in the command's output.
                --namespace-name=!: The Namespace name
                --next-token=: Token to specify where to start paginating.
                --subscription=: Name or ID of subscription.
                -a, --alias=!: The Disaster Recovery configuration name
                -g, --resource-group=!: Name of resource group.
            - name: keys
              commands:
                - name: list
                  description: Shows the keys and connection strings of Authorizationrule for the EventHubs Namespace
                  flags:
                    --namespace-name=!: The Namespace name
                    --subscription=: Name or ID of subscription.
                    -a, --alias=!: The Disaster Recovery configuration name
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: The authorization rule name.
        - name: exists
          description: Check the availability of Geo-Disaster Recovery Configuration Alias Name
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: The Namespace name
            --subscription=: Name or ID of subscription.
            -a, --alias=!: Name to check the namespace name availability
            -g, --resource-group=: Name of resource group.
        - name: set
          description: Sets a Geo-Disaster Recovery Configuration Alias for the give Namespace
          flags:
            --alternate-name=: Alternate Name for the Alias, when the Namespace name and Alias name are same
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: Name of Namespace
            --no-wait=: Do not wait for the long-running operation to finish.
            --partner-namespace=!: Name (if within the same resource group) or ARM Id of the Primary/Secondary eventhub namespace name, which is part of GEO DR pairing
            --subscription=: Name or ID of subscription.
            -a, --alias=!: Name of the Geo-Disaster Recovery Configuration Alias
            -g, --resource-group=: Name of resource group.
        - name: show
          description: shows properties of Geo-Disaster Recovery Configuration Alias for Primay or Secondary Namespace
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: The Namespace name
            --subscription=: Name or ID of subscription.
            -a, --alias=: The Disaster Recovery configuration name
            -g, --resource-group=: Name of resource group.
        - name: create
          flags:
            --alternate-name=: Alternate name specified when alias and namespace names are same.
            --namespace-name=!: The Namespace name
            --partner-namespace=: ARM Id of the Primary/Secondary eventhub namespace name, which is part of GEO DR pairing
            --subscription=: Name or ID of subscription.
            -a, --name=!: The Disaster Recovery configuration name
            -g, --resource-group=!: Name of resource group.
        - name: delete
          description: Delete Geo-Disaster Recovery Configuration Alias
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --namespace-name=: The Namespace name
            --subscription=: Name or ID of subscription.
            -a, --alias=: The Disaster Recovery configuration name
            -g, --resource-group=: Name of resource group.
        - name: list
          flags:
            --max-items=: Total number of items to return in the command's output.
            --namespace-name=!: The Namespace name
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: namespace
      commands:
        - name: update
          description: Updates the EventHubs Namespace
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --alternate-name=: Alternate name specified when alias and namespace names are same.
            --capacity=: The Event Hubs throughput units for Basic or Standard tiers, where value should be 0 to 20 throughput units.
            --cluster-arm-id=: Cluster ARM ID of the Namespace.
            --disable-local-auth=:
                description: This property disables SAS authentication for the Event Hubs namespace.
                nargs: -1
            --enable-auto-inflate=:
                description: Value that indicates whether AutoInflate is enabled for eventhub namespace.
                nargs: -1
            --encryption=:
                description: Properties of BYOK Encryption description  Support shorthand-syntax, json-file and yaml-file.
                nargs: -1
            --endpoint-connections=:
                description: List of private endpoint connections.
