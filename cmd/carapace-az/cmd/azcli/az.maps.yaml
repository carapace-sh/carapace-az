# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: maps
description: maps
commands:
    - name: account
      commands:
        - name: show
          description: Get a Maps Account.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Resource group name
            -n, --name=: The name of the maps account
        - name: update
          flags:
            --disable-local-auth=:
                description: Allows toggle functionality on Azure Policy to disable Azure Maps local authentication support.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --kind=: Get or Set Kind property.
            --linked-resources=:
                description: Sets the resources to be used for Managed Identities based operations for the Map account resource.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --type=: The identity type.
            --user-identities=: The list of user identities associated with the resource.
            -g, --resource-group=: Resource group name
            -n, --name=: The name of the maps account
            -s, --sku=!: The name of the SKU, in standard format (such as S0).
          completion:
            flag:
                disable-local-auth:
                    - "true"
                    - "false"
                kind:
                    - Gen1
                    - Gen2
                sku:
                    - S0
                    - S1
                    - G2
                type:
                    - SystemAssigned
                    - UserAssigned
                    - SystemAssigned, UserAssigned
                    - None
        - name: list
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Resource group name
        - name: keys
          commands:
            - name: list
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Resource group name
                -n, --name=!: The name of the maps account
            - name: renew
              flags:
                --key=!: Whether the operation refers to the primary or secondary key
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Resource group name
                -n, --name=!: The name of the maps account
              completion:
                flag:
                    key:
                        - primary
                        - secondary
        - name: create
          flags:
            --accept-tos=: You must agree to the License and Privacy Statement to create an account.
            --disable-local-auth=:
                description: Allows toggle functionality on Azure Policy to disable Azure Maps local authentication support.
                nargs: -1
            --kind=: Get or Set Kind property.
            --linked-resources=:
                description: Sets the resources to be used for Managed Identities based operations for the Map account resource.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --type=: The identity type.
            --user-identities=: The list of user identities associated with the resource.
            -g, --resource-group=!: Resource group name
            -n, --name=!: The name of the maps account
            -s, --sku=!: The name of the SKU, in standard format (such as S0).
          completion:
            flag:
                disable-local-auth:
                    - "true"
                    - "false"
                kind:
                    - Gen1
                    - Gen2
                sku:
                    - S0
                    - S1
                    - G2
                type:
                    - SystemAssigned
                    - UserAssigned
                    - SystemAssigned, UserAssigned
                    - None
        - name: delete
          description: Delete a Maps Account.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Resource group name
            -n, --name=: The name of the maps account
    - name: creator
      commands:
        - name: update
          flags:
            --creator-name=: The name of the Maps Creator instance.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --storage-units=: The storage units to be allocated.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -g, --resource-group=: Resource group name
            -n, --name=: The name of the maps account
        - name: create
          flags:
            --creator-name=!: The name of the Maps Creator instance.
            --storage-units=!: The storage units to be allocated.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -g, --resource-group=!: Resource group name
            -l, --location=: Location.
            -n, --name=!: The name of the maps account
        - name: delete
          flags:
            --creator-name=: The name of the Maps Creator instance.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Resource group name
            -n, --name=: The name of the maps account
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Resource group name
            -n, --name=!: The name of the maps account
        - name: show
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --creator-name=: The name of the Maps Creator instance.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Resource group name
            -n, --name=: The name of the maps account
    - name: map
      commands:
        - name: list-operation
          flags:
            --subscription=: Name or ID of subscription.
