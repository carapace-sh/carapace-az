# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: data-boundary
description: data boundary operations
commands:
    - name: create
      description: Create tenant to data boundary.
      flags:
        --data-boundary=: The data boundary definition.
        --default=!: Default string modeled as parameter for auto generation to work correctly.
        --subscription=: Name or ID of subscription.
      completion:
        flag:
            data-boundary:
                - EU
                - Global
                - NotDefined
            default:
                - default
    - name: show
      description: Get data boundary at specified scope
      flags:
        --default=!: Default string modeled as parameter for auto generation to work correctly.
        --scope=!: The scope at which the operation is performed.
        --subscription=: Name or ID of subscription.
      completion:
        flag:
            default:
                - default
    - name: show-tenant
      description: Get data boundary of tenant.
      flags:
        --default=!: Default string modeled as parameter for auto generation to work correctly.
        --subscription=: Name or ID of subscription.
      completion:
        flag:
            default:
                - default
