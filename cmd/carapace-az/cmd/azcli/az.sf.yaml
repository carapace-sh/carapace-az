            - name: delete
              description: Deletes a Service Fabric managed application type version resource.
              flags:
                --name=!: Specify the application type name.
                --subscription=: Name or ID of subscription.
                --version=!: Specify the application type version.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: update
              flags:
                --name=!: Specify the application type name.
                --package-url=: Specify the url of the application package sfpkg file.
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: 'space-separated tags: key[=value] [key[=value] ...].'
                    nargs: -1
                --version=!: Specify the application type version.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: show
              description: Gets a Service Fabric managed application type version resource.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --name=!: Specify the application type name.
                --subscription=: Name or ID of subscription.
                --version=!: Specify the application type version.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: list
              description: Gets the list of application type version resources created in the specified Service Fabric managed application type name resource.
              flags:
                --name=!: Specify the application type name.
                --subscription=: Name or ID of subscription.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
        - name: delete
          description: Deletes a Service Fabric managed application type name resource.
          flags:
            --name=!: Specify the application type name.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: show
          description: Gets a Service Fabric managed application type name resource.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --name=!: Specify the application type name.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: list
          description: Gets the list of application type name resources created in the specified Service Fabric managed cluster resource.
          flags:
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: create
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --name=!: Specify the application type name.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
