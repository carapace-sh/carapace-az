# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: sf
description: Manage and administer Azure Service Fabric clusters.
commands:
    - name: application
      description: Manage applications running on an Azure Service Fabric cluster. Only support ARM deployed applications.
      commands:
        - name: delete
          description: Deletes a Service Fabric application resource.
          flags:
            --name=!: Specify the application name.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: certificate
          description: Manage the certificate of an application.
          commands:
            - name: add
              description: Add a new certificate to the Virtual Machine Scale Sets that make up the cluster to be used by hosted applications.
              flags:
                --certificate-file=: The existing certificate file path for the primary cluster certificate.
                --certificate-output-folder=: The folder of the new certificate file to be created.
                --certificate-password=: The password of the certificate file.
                --certificate-subject-name=: The subject name of the certificate to be created.
                --secret-identifier=: The existing Azure key vault secret URL
                --subscription=: Name or ID of subscription.
                --vault-name=: Azure key vault name, it not given it will be the cluster resource group name
                --vault-rg=: Key vault resource group name, if not given it will be cluster resource group name
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
        - name: update
          description: Update a Azure Service Fabric application.
          flags:
            --failure-action=: Specify the action to take if the monitored upgrade fails.
            --force-restart=:
                description: Indicates that the service host restarts even if the upgrade is a configuration-only change.
                nargs: -1
            --hc-retry-timeout=: Specify the duration, in seconds, after which Service Fabric retries the health check if the previous health check fails.
            --hc-stable-duration=: Specify the duration, in seconds, that Service Fabric waits in order to verify that the application is stable before moving to the next upgrade domain or completing the upgrade.
            --hc-wait-duration=: Specify the duration, in seconds, that Service Fabric waits before it performs the initial health check after it finishes the upgrade on the upgrade domain.
            --max-nodes=: Specify the maximum number of nodes on which to place an application.
            --max-porcent-unhealthy-apps=: Specify the maximum percentage of the application instances deployed on the nodes in the cluster that have a health state of error before the application health state for the cluster is error.
            --max-porcent-unhealthy-partitions=: Specify the maximum percent of unhelthy partitions per service allowed by the health policy for the default service type to use for the monitored upgrade.
            --max-porcent-unhealthy-replicas=: Specify the maximum percent of unhelthy replicas per service allowed by the health policy for the default service type to use for the monitored upgrade.
            --max-porcent-unhealthy-services=: Specify the maximum percent of unhelthy services allowed by the health policy for the default service type to use for the monitored upgrade.
            --min-nodes=: Specify the minimum number of nodes where Service Fabric will reserve capacity for this application, this does not mean that the application is guaranteed to have replicas on all those nodes.
            --name=!: Specify the application name.
            --parameters=:
                description: Specify the application parameters as key/value pairs.
                nargs: -1
            --service-type-health-policy-map=: 'Specify the map of the health policy to use for different service types as a hash table in the following format: {"ServiceTypeName" : "MaxPercentUnhealthyPartitionsPerService,MaxPercentUnhealthyReplicasPerPartition,MaxPercentUnhealthyServices"}.'
            --subscription=: Name or ID of subscription.
            --ud-timeout=: Specify the maximum time, in seconds, that Service Fabric takes to upgrade a single upgrade domain.
            --upgrade-replica-set-check-timeout=: Specify the maximum time, in seconds, that Service Fabric waits for a service to reconfigure into a safe state, if not already in a safe state, before Service Fabric proceeds with the upgrade.
            --upgrade-timeout=: Specify the maximum time, in seconds, that Service Fabric takes for the entire upgrade.
            --version=: Specify the application type version.
            --warning-as-error=:
                description: Indicates whether to treat a warning health event as an error event during health evaluation.
                nargs: -1
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
          completion:
            flag:
                failure-action:
                    - Rollback
                    - Manual
                force-restart:
                    - "true"
                    - "false"
                warning-as-error:
                    - "true"
                    - "false"
        - name: create
          description: Create a new application on an Azure Service Fabric cluster.
          flags:
            --max-nodes=: Specify the maximum number of nodes on which to place an application.
            --min-nodes=: Specify the minimum number of nodes where Service Fabric will reserve capacity for this application, this does not mean that the application is guaranteed to have replicas on all those nodes.
            --name=!: Specify the application name.
            --package-url=: Specify the url of the application package sfpkg file.
            --parameters=:
                description: Specify the application parameters as key/value pairs.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --type-name=!: Specify the application type name.
            --version=!: Specify the application type version.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: show
          description: Gets a Service Fabric application resource.
          flags:
            --name=!: Specify the application name.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: list
          description: Gets the list of application resources created in the specified Service Fabric cluster resource.
          flags:
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
    - name: application-type
      description: Manage application types on an Azure Service Fabric cluster.
      commands:
        - name: show
          description: Gets a Service Fabric application type name resource.
          flags:
            --name=!: Specify the application type name.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: list
          description: Gets the list of application type name resources created in the specified Service Fabric cluster resource.
          flags:
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: version
          description: Manage application type versions on an Azure Service Fabric cluster. Only support ARM deployed application type versions.
          commands:
            - name: list
              description: Gets the list of application type version resources created in the specified Service Fabric application type name resource.
              flags:
                --name=!: Specify the application type name.
                --subscription=: Name or ID of subscription.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: create
              description: Create a new application type on an Azure Service Fabric cluster.
              flags:
                --name=!: Specify the application type name.
                --package-url=!: Specify the url of the application package sfpkg file.
                --subscription=: Name or ID of subscription.
                --version=!: Specify the application type version.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: show
              description: Gets a Service Fabric application type version resource.
              flags:
                --name=!: Specify the application type name.
                --subscription=: Name or ID of subscription.
                --version=!: Specify the application type version.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: delete
              description: Deletes a Service Fabric application type version resource.
              flags:
                --name=!: Specify the application type name.
                --subscription=: Name or ID of subscription.
                --version=!: Specify the application type version.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
        - name: delete
          description: Deletes a Service Fabric application type name resource.
          flags:
            --name=!: Specify the application type name.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: create
          description: Create a new application type on an Azure Service Fabric cluster.
          flags:
            --name=!: Specify the application type name.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
    - name: cluster
      description: Manage an Azure Service Fabric cluster.
      commands:
        - name: node-type
          description: Manage the node-type of a cluster.
          commands:
            - name: add
              description: Add a new node type to a cluster.
              flags:
                --capacity=!: The capacity tag applied to nodes in the node type.
                --durability-level=: durability level.
                --node-type=!: the Node type name.
                --subscription=: Name or ID of subscription.
                --vm-password=!: The password of the Vm
                --vm-sku=: VM Sku
                --vm-tier=: VM tier.
                --vm-user-name=!: The user name for logging to Vm.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
              completion:
                flag:
                    durability-level:
                        - Bronze
                        - Silver
                        - Gold
        - name: upgrade-type
          description: Manage the upgrade type of a cluster.
          commands:
            - name: set
              description: Change the  upgrade type for a cluster.
              flags:
                --subscription=: Name or ID of subscription.
                --upgrade-mode=!: cluster upgrade mode
                --version=: cluster code version
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
              completion:
                flag:
                    upgrade-mode:
                        - manual
                        - automatic
        - name: show
          description: Gets a Service Fabric cluster resource.
          flags:
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: node
          description: Manage the node instance of a cluster.
          commands:
            - name: remove
              description: Remove nodes from a node type in a cluster.
              flags:
                --node-type=!: the Node type name.
                --number-of-nodes-to-remove=!: number of nodes to remove.
                --subscription=: Name or ID of subscription.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: add
              description: Add nodes to a node type in a cluster.
              flags:
                --node-type=!: the Node type name.
                --number-of-nodes-to-add=!: number of nodes to add.
                --subscription=: Name or ID of subscription.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
        - name: list
          description: List cluster resources.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: The resource group name
        - name: client-certificate
          description: Manage the client certificate of a cluster.
          commands:
            - name: remove
              description: Remove client certificates or subject names used for authentication.
              flags:
                --certificate-common-name=: client certificate common name.
                --certificate-issuer-thumbprint=: client certificate issuer thumbprint.
                --client-certificate-common-names=: JSON encoded parameters configuration.
                --subscription=: Name or ID of subscription.
                --thumbprints=:
                    description: A single or Space-separated list of client certificate thumbprint(s) to be remove.
                    nargs: -1
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: add
              description: Add a common name or certificate thumbprint to the cluster for client authentication.
              flags:
                --admin-client-thumbprints=:
                    description: client certificate thumbprint that only has admin permission.
                    nargs: -1
                --certificate-common-name=: client certificate common name.
                --certificate-issuer-thumbprint=: client certificate issuer thumbprint.
                --client-certificate-common-names=: JSON encoded parameters configuration.
                --is-admin=: Client authentication type.
                --readonly-client-thumbprints=:
                    description: Space-separated list of client certificate thumbprint that has read only permission.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --thumbprint=: client certificate thumbprint.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
        - name: create
          description: Create a new Azure Service Fabric cluster.
          flags:
            --certificate-file=: The existing certificate file path for the primary cluster certificate.
            --certificate-output-folder=: The folder of the new certificate file to be created.
            --certificate-password=: The password of the certificate file.
            --certificate-subject-name=: The subject name of the certificate to be created.
            --parameter-file=: The path to the template parameter file.
            --secret-identifier=: The existing Azure key vault secret URL
            --subscription=: Name or ID of subscription.
            --template-file=: The path to the template file.
            --vault-name=: Azure key vault name, it not given it will be the cluster resource group name
            --vault-rg=: Key vault resource group name, if not given it will be cluster resource group name
            --vm-os=: The Operating System of the VMs that make up the cluster.
            --vm-password=: The password of the Vm
            --vm-sku=: VM Sku
            --vm-user-name=: The user name for logging to Vm.
            -c, --cluster-name=: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
            -l, --location=: Location.
            -s, --cluster-size=: The number of nodes in the cluster.
          completion:
            flag:
                vm-os:
                    - WindowsServer2012R2Datacenter
                    - WindowsServer2016Datacenter
                    - WindowsServer2016DatacenterwithContainers
                    - UbuntuServer1604
                    - WindowsServer1709
                    - WindowsServer1709withContainers
                    - WindowsServer1803withContainers
                    - WindowsServer1809withContainers
                    - WindowsServer2019Datacenter
                    - WindowsServer2019DatacenterwithContainers
        - name: setting
          description: Manage a cluster's settings.
          commands:
            - name: set
              description: Update the settings of a cluster.
              flags:
                --parameter=: parameter name
                --section=: section name
                --settings-section-description=: JSON encoded parameters configuration.
                --subscription=: Name or ID of subscription.
                --value=: Specify the value
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: remove
              description: Remove settings from a cluster.
              flags:
                --parameter=: parameter name
                --section=: section name
                --settings-section-description=: JSON encoded parameters configuration.
                --subscription=: Name or ID of subscription.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
        - name: reliability
          description: Manage the reliability of a cluster.
          commands:
            - name: update
              description: Update the reliability tier for the primary node in a cluster.
              flags:
                --auto-add-node=: Add node count automatically when changing reliability.
                --reliability-level=!: durability level.
                --subscription=: Name or ID of subscription.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
              completion:
                flag:
                    reliability-level:
                        - Bronze
                        - Silver
                        - Gold
                        - Platinum
        - name: durability
          description: Manage the durability of a cluster.
          commands:
            - name: update
              description: Update the durability tier or VM SKU of a node type in the cluster.
              flags:
                --durability-level=!: durability level.
                --node-type=!: the Node type name.
                --subscription=: Name or ID of subscription.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
              completion:
                flag:
                    durability-level:
                        - Bronze
                        - Silver
                        - Gold
    - name: managed-application
      description: Manage applications running on an Azure Service Fabric managed cluster. Only support ARM deployed applications.
      commands:
        - name: update
          description: Update a Azure Service Fabric managed application.
          flags:
            --failure-action=: Specify the action to take if the monitored upgrade fails.
            --force-restart=:
                description: Indicates that the service host restarts even if the upgrade is a configuration-only change.
                nargs: -1
            --hc-retry-timeout=: Specify the duration, in seconds, after which Service Fabric retries the health check if the previous health check fails.
            --hc-stable-duration=: Specify the duration, in seconds, that Service Fabric waits in order to verify that the application is stable before moving to the next upgrade domain or completing the upgrade.
            --hc-wait-duration=: Specify the duration, in seconds, that Service Fabric waits before it performs the initial health check after it finishes the upgrade on the upgrade domain.
            --instance-close-delay-duration=: Specify the duration in seconds, to wait before a stateless instance is closed, to allow the active requests to drain gracefully.
            --max-percent-unhealthy-deployed-applications=: Specify the maximum percentage of the application instances deployed on the nodes in the cluster that have a health state of error before the application health state for the cluster is error.
            --max-percent-unhealthy-partitions=: Specify the maximum percent of unhelthy partitions per service allowed by the health policy for the default service type to use for the monitored upgrade.
            --max-percent-unhealthy-replicas=: Specify the maximum percent of unhelthy replicas per service allowed by the health policy for the default service type to use for the monitored upgrade.
            --max-percent-unhealthy-services=: Specify the maximum percent of unhelthy services allowed by the health policy for the default service type to use for the monitored upgrade.
            --name=!: Specify the application name.
            --parameters=:
                description: Specify the application parameters as key/value pairs.
                nargs: -1
            --recreate-application=:
                description: Determines whether the application should be recreated on update.
                nargs: -1
            --service-type-health-policy-map=:
                description: 'Specify the map of the health policy to use for different service types as key/value pairs in the following format: "ServiceTypeName"="MaxPercentUnhealthyPartitionsPerService,MaxPercentUnhealthyReplicasPerPartition,MaxPercentUnhealthyServices".'
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --ud-timeout=: Specify the maximum time, in seconds, that Service Fabric takes to upgrade a single upgrade domain.
            --upgrade-mode=: Specify the mode used to monitor health during a rolling upgrade.
            --upgrade-replica-set-check-timeout=: Specify the maximum time, in seconds, that Service Fabric waits for a service to reconfigure into a safe state, if not already in a safe state, before Service Fabric proceeds with the upgrade.
            --upgrade-timeout=: Specify the maximum time, in seconds, that Service Fabric takes for the entire upgrade.
            --version=: Specify the application type version.
            --warning-as-error=:
                description: Indicates whether to treat a warning health event as an error event during health evaluation.
                nargs: -1
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
          completion:
            flag:
                failure-action:
                    - Rollback
                    - Manual
                force-restart:
                    - "true"
                    - "false"
                recreate-application:
                    - "true"
                    - "false"
                upgrade-mode:
                    - Monitored
                    - UnmonitoredAuto
                warning-as-error:
                    - "true"
                    - "false"
        - name: show
          description: Gets a Service Fabric managed application resource.
          flags:
            --name=!: Specify the application name.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: delete
          description: Deletes a Service Fabric managed application resource.
          flags:
            --name=!: Specify the application name.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: list
          description: Gets the list of managed application resources created in the specified Service Fabric cluster resource.
          flags:
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: create
          description: Create a new managed application on an Azure Service Fabric managed cluster.
          flags:
            --name=!: Specify the application name.
            --package-url=: Specify the url of the application package sfpkg file.
            --parameters=:
                description: Specify the application parameters as key/value pairs.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --type-name=!: Specify the application type name.
            --version=!: Specify the application type version.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
    - name: managed-application-type
      description: Manage application types on an Azure Service Fabric cluster.
      commands:
        - name: delete
          description: Deletes a Service Fabric managed application type name resource.
          flags:
            --name=!: Specify the application type name.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: list
          description: Gets the list of application type name resources created in the specified Service Fabric managed cluster resource.
          flags:
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: version
          description: Manage application type versions on an Azure Service Fabric managed cluster. Only support ARM deployed application type versions.
          commands:
            - name: show
              description: Gets a Service Fabric managed application type version resource.
              flags:
                --name=!: Specify the application type name.
                --subscription=: Name or ID of subscription.
                --version=!: Specify the application type version.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: list
              description: Gets the list of application type version resources created in the specified Service Fabric managed application type name resource.
              flags:
                --name=!: Specify the application type name.
                --subscription=: Name or ID of subscription.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: delete
              description: Deletes a Service Fabric managed application type version resource.
              flags:
                --name=!: Specify the application type name.
                --subscription=: Name or ID of subscription.
                --version=!: Specify the application type version.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: update
              description: Update a managed application type version.
              flags:
                --name=!: Specify the application type name.
                --package-url=: Specify the url of the application package sfpkg file.
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: 'space-separated tags: key[=value] [key[=value] ...].'
                    nargs: -1
                --version=!: Specify the application type version.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
            - name: create
              description: Create a new managed application type on an Azure Service Fabric managed cluster.
              flags:
                --name=!: Specify the application type name.
                --package-url=!: Specify the url of the application package sfpkg file.
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: 'space-separated tags: key[=value] [key[=value] ...].'
                    nargs: -1
                --version=!: Specify the application type version.
                -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
                -g, --resource-group=!: Specify the resource group name.
        - name: create
          description: Create a new managed application type on an Azure Service Fabric managed cluster.
          flags:
            --name=!: Specify the application type name.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
            -g, --resource-group=!: Specify the resource group name.
        - name: update
          description: Update an managed application type.
          flags:
            --name=!: Specify the application type name.
