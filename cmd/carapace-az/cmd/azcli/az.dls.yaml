# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: dls
description: dls
commands:
    - name: account
      commands:
        - name: firewall
          commands:
            - name: update
              flags:
                --end-ip-address=: ""
                --firewall-rule-name=!: ""
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --start-ip-address=: ""
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
            - name: show
              description: Gets the specified Data Lake Store firewall rule.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --firewall-rule-name=!: The name of the firewall rule to retrieve.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
            - name: create
              flags:
                --end-ip-address=!: ""
                --firewall-rule-name=!: ""
                --start-ip-address=!: ""
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=!: Name of the Data Lake Store account.
            - name: delete
              description: Deletes the specified firewall rule from the specified Data Lake Store account.
              flags:
                --firewall-rule-name=!: The name of the firewall rule to delete.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
            - name: list
              description: Lists the Data Lake Store firewall rules within the specified Data Lake Store account.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
        - name: update
          flags:
            --allow-azure-ips=: Allow/block Azure originating IPs through the firewall
            --default-group=: Name of the default group to give permissions to for freshly created files and folders in the Data Lake Store account.
            --firewall-state=: Enable/disable existing firewall rules.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --key-version=: Key version for the user-assigned encryption type.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --tier=: The desired commitment tier for this account to use.
            --trusted-id-provider-state=: Enable/disable the existing trusted ID providers.
            -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
            -n, --account=: Name of the Data Lake Store account.
          completion:
            flag:
                allow-azure-ips:
                    - Enabled
                    - Disabled
                firewall-state:
                    - Enabled
                    - Disabled
                tier:
                    - Consumption
                    - Commitment_1TB
                    - Commitment_10TB
                    - Commitment_100TB
                    - Commitment_500TB
                    - Commitment_1PB
                    - Commitment_5PB
                trusted-id-provider-state:
                    - Enabled
                    - Disabled
        - name: list
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: trusted-provider
          commands:
            - name: create
              flags:
                --id-provider=!: ""
                --subscription=: Name or ID of subscription.
                --trusted-id-provider-name=!: ""
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=!: Name of the Data Lake Store account.
            - name: list
              description: Lists the Data Lake Store trusted identity providers within the specified Data Lake Store account.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
            - name: update
              flags:
                --id-provider=: ""
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --trusted-id-provider-name=!: ""
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
            - name: show
              description: Gets the specified Data Lake Store trusted identity provider.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --trusted-id-provider-name=!: The name of the trusted identity provider to retrieve.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
            - name: delete
              description: Deletes the specified trusted identity provider from the specified Data Lake Store account.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --trusted-id-provider-name=!: The name of the trusted identity provider to delete.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
        - name: create
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --default-group=: Name of the default group to give permissions to for freshly created files and folders in the Data Lake Store account.
            --disable-encryption=: Indicates that the account will not have any form of encryption applied to it.
            --encryption-type=: Indicates what type of encryption to provision the account with.
            --key-name=: ""
            --key-vault-id=: ""
            --key-version=: Key version for the user-assigned encryption type.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --tier=: The desired commitment tier for this account to use.
            -g, --resource-group=: Name of resource group.
            -l, --location=: Location.
            -n, --account=!: Name of the Data Lake Store account.
          completion:
            flag:
                encryption-type:
                    - UserManaged
                    - ServiceManaged
                tier:
                    - Consumption
                    - Commitment_1TB
                    - Commitment_10TB
                    - Commitment_100TB
                    - Commitment_500TB
                    - Commitment_1PB
                    - Commitment_5PB
        - name: delete
          description: Deletes the specified Data Lake Store account.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
            -n, --account=: Name of the Data Lake Store account.
        - name: enable-key-vault
          description: Attempts to enable a user managed Key Vault for encryption of the specified Data Lake Store account.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
            -n, --account=: Name of the Data Lake Store account.
        - name: show
          description: Gets the specified Data Lake Store account.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
            -n, --account=: Name of the Data Lake Store account.
    - name: fs
      commands:
        - name: download
          flags:
            --__PROGRESS_CALLBACK=:
                description: ==SUPPRESS==
                nargs: -1
            --block-size=: Number of bytes for a block.
            --buffer-size=: Number of bytes for internal buffer.
            --chunk-size=: Number of bytes for a chunk.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --destination-path=!: ""
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --overwrite=: Indicates that, if the destination file or folder exists, it should be overwritten
            --source-path=!: ""
            --subscription=: Name or ID of subscription.
            --thread-count=: Specify the parallelism of the download.
            -n, --account=: Name of the Data Lake Store account.
        - name: access
          commands:
            - name: set-permission
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --permission=!: 'The octal representation of the permissions for user, group and mask (for example: 777 is full rwx for all entities)'
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
            - name: set-owner
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --group=: ""
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --owner=: ""
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
            - name: set
              flags:
                --acl-spec=!: The ACL specification to set on the path in the format '[default:]user|group|other:[entity id or UPN]:r|-w|-x|-,[default:]user|group|other:[entity id or UPN]:r|-w|-x|-,...'.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
            - name: remove-entry
              flags:
                --acl-spec=!: The ACL specification to set on the path in the format '[default:]user|group|other:[entity id or UPN]:r|-w|-x|-,[default:]user|group|other:[entity id or UPN]:r|-w|-x|-,...'.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
            - name: show
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
            - name: set-entry
              flags:
                --acl-spec=!: The ACL specification to set on the path in the format '[default:]user|group|other:[entity id or UPN]:r|-w|-x|-,[default:]user|group|other:[entity id or UPN]:r|-w|-x|-,...'.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
            - name: remove-all
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --default-acl=: A switch that, if specified, indicates that the remove ACL operation should remove the default ACL of the folder.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
        - name: join
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --destination-path=!: ""
            --force=: Indicates that, if the destination file already exists, it should be overwritten
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --source-paths=!:
                description: The list of files in the specified Data Lake Store account to join.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: upload
          flags:
            --__PROGRESS_CALLBACK=:
                description: ==SUPPRESS==
                nargs: -1
            --block-size=: Number of bytes for a block.
            --buffer-size=: Number of bytes for internal buffer.
            --chunk-size=: Number of bytes for a chunk.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --destination-path=!: ""
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --overwrite=: Indicates that, if the destination file or folder exists, it should be overwritten
            --source-path=!: ""
            --subscription=: Name or ID of subscription.
            --thread-count=: Specify the parallelism of the upload.
            -n, --account=: Name of the Data Lake Store account.
        - name: test
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: show
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: delete
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --recurse=: Indicates this should be a recursive delete of the folder.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: set-expiry
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --expiration-time=!: The absolute value of the expiration time expressed as milliseconds since the epoch.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: remove-expiry
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: preview
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --force=: Indicates that, if the preview is larger than 1MB, still retrieve it.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --length=: ""
            --offset=: ""
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: create
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --content=: ""
            --folder=: Indicates that this new item is a folder and not a file.
            --force=: Indicates that, if the file or folder exists, it should be overwritten
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=!: Name of the Data Lake Store account.
        - name: list
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: move
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --destination-path=!: ""
            --force=: Indicates that, if the destination file or folder already exists, it should be overwritten and replaced with the file or folder being moved.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --source-path=!: ""
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: append
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --content=!: ""
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
