# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: dls
description: Manage Data Lake Store accounts and filesystems.
commands:
    - name: account
      description: Manage Data Lake Store accounts.
      commands:
        - name: trusted-provider
          description: Manage Data Lake Store account trusted identity providers.
          commands:
            - name: show
              description: Gets the specified Data Lake Store trusted identity provider.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --trusted-id-provider-name=!: The name of the trusted identity provider to retrieve.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
            - name: create
              description: Creates or updates the specified trusted identity provider.
              flags:
                --id-provider=!: The URL of this trusted identity provider.
                --subscription=: Name or ID of subscription.
                --trusted-id-provider-name=!: The name of the trusted identity provider.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=!: Name of the Data Lake Store account.
            - name: list
              description: Lists the Data Lake Store trusted identity providers within the specified Data Lake Store account.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
            - name: delete
              description: Deletes the specified trusted identity provider from the specified Data Lake Store account.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --trusted-id-provider-name=!: The name of the trusted identity provider to delete.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
            - name: update
              description: Updates the specified trusted identity provider.
              flags:
                --id-provider=: The URL of this trusted identity provider.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --trusted-id-provider-name=!: The name of the trusted identity provider.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
        - name: create
          description: Creates a Data Lake Store account.
          flags:
            --default-group=: Name of the default group to give permissions to for freshly created files and folders in the Data Lake Store account.
            --disable-encryption=: Indicates that the account will not have any form of encryption applied to it.
            --encryption-type=: Indicates what type of encryption to provision the account with.
            --key-name=: Key name for the user-assigned encryption type.
            --key-vault-id=: Key vault for the user-assigned encryption type.
            --key-version=: Key version for the user-assigned encryption type.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --tier=: The desired commitment tier for this account to use.
            -g, --resource-group=: Name of resource group.
            -l, --location=: Location.
            -n, --account=!: Name of the Data Lake Store account.
          completion:
            flag:
                encryption-type:
                    - UserManaged
                    - ServiceManaged
                tier:
                    - Consumption
                    - Commitment_1TB
                    - Commitment_10TB
                    - Commitment_100TB
                    - Commitment_500TB
                    - Commitment_1PB
                    - Commitment_5PB
        - name: show
          description: Gets the specified Data Lake Store account.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
            -n, --account=: Name of the Data Lake Store account.
        - name: update
          description: Updates a Data Lake Store account.
          flags:
            --allow-azure-ips=: Allow/block Azure originating IPs through the firewall
            --default-group=: Name of the default group to give permissions to for freshly created files and folders in the Data Lake Store account.
            --firewall-state=: Enable/disable existing firewall rules.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --key-version=: Key version for the user-assigned encryption type.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --tier=: The desired commitment tier for this account to use.
            --trusted-id-provider-state=: Enable/disable the existing trusted ID providers.
            -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
            -n, --account=: Name of the Data Lake Store account.
          completion:
            flag:
                allow-azure-ips:
                    - Enabled
                    - Disabled
                firewall-state:
                    - Enabled
                    - Disabled
                tier:
                    - Consumption
                    - Commitment_1TB
                    - Commitment_10TB
                    - Commitment_100TB
                    - Commitment_500TB
                    - Commitment_1PB
                    - Commitment_5PB
                trusted-id-provider-state:
                    - Enabled
                    - Disabled
        - name: firewall
          description: Manage Data Lake Store account firewall rules.
          commands:
            - name: update
              description: Updates a firewall rule in a Data Lake Store account.
              flags:
                --end-ip-address=: The end of the valid ip range for the firewall rule.
                --firewall-rule-name=!: The name of the firewall rule.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --start-ip-address=: The start of the valid ip range for the firewall rule.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
            - name: list
              description: Lists the Data Lake Store firewall rules within the specified Data Lake Store account.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
            - name: create
              description: Creates a firewall rule in a Data Lake Store account.
              flags:
                --end-ip-address=!: The end of the valid ip range for the firewall rule.
                --firewall-rule-name=!: The name of the firewall rule.
                --start-ip-address=!: The start of the valid ip range for the firewall rule.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=!: Name of the Data Lake Store account.
            - name: delete
              description: Deletes the specified firewall rule from the specified Data Lake Store account.
              flags:
                --firewall-rule-name=!: The name of the firewall rule to delete.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
            - name: show
              description: Gets the specified Data Lake Store firewall rule.
              flags:
                --firewall-rule-name=!: The name of the firewall rule to retrieve.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
                -n, --account=: Name of the Data Lake Store account.
        - name: list
          description: Lists available Data Lake Store accounts.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: enable-key-vault
          description: Attempts to enable a user managed Key Vault for encryption of the specified Data Lake Store account.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
            -n, --account=: Name of the Data Lake Store account.
        - name: delete
          description: Deletes the specified Data Lake Store account.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
            -n, --account=: Name of the Data Lake Store account.
    - name: fs
      description: Manage a Data Lake Store filesystem.
      commands:
        - name: join
          description: Join files in a Data Lake Store account into one file.
          flags:
            --destination-path=!: The destination path in the Data Lake Store account.
            --force=: Indicates that, if the destination file already exists, it should be overwritten
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --source-paths=!:
                description: The list of files in the specified Data Lake Store account to join.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: access
          description: Manage Data Lake Store filesystem access and permissions.
          commands:
            - name: set
              description: Replace the existing access control list for a file or folder.
              flags:
                --acl-spec=!: The ACL specification to set on the path in the format '[default:]user|group|other:[entity id or UPN]:r|-w|-x|-,[default:]user|group|other:[entity id or UPN]:r|-w|-x|-,...'.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
            - name: set-permission
              description: Set the permissions for a file or folder in a Data Lake Store account.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --permission=!: 'The octal representation of the permissions for user, group and mask (for example: 777 is full rwx for all entities)'
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
            - name: show
              description: Display the access control list (ACL).
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
            - name: remove-all
              description: Remove the access control list for a file or folder.
              flags:
                --default-acl=: A switch that, if specified, indicates that the remove ACL operation should remove the default ACL of the folder.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
            - name: set-owner
              description: Set the owner information for a file or folder in a Data Lake Store account.
              flags:
                --group=: The group Azure Active Directory object ID or user principal name to set as the owning group.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --owner=: The user Azure Active Directory object ID or user principal name to set as the owner.
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
            - name: remove-entry
              description: Remove entries for the access control list of a file or folder.
              flags:
                --acl-spec=!: The ACL specification to set on the path in the format '[default:]user|group|other:[entity id or UPN]:r|-w|-x|-,[default:]user|group|other:[entity id or UPN]:r|-w|-x|-,...'.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
            - name: set-entry
              description: Update the access control list for a file or folder.
              flags:
                --acl-spec=!: The ACL specification to set on the path in the format '[default:]user|group|other:[entity id or UPN]:r|-w|-x|-,[default:]user|group|other:[entity id or UPN]:r|-w|-x|-,...'.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --path=!: The path in the specified Data Lake Store account where the action should take place.
                --subscription=: Name or ID of subscription.
                -n, --account=: Name of the Data Lake Store account.
        - name: show
          description: Get file or folder information in a Data Lake Store account.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: append
          description: Append content to a file in a Data Lake Store account.
          flags:
            --content=!: Content to be appended to the file.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: upload
          description: Upload a file or folder to a Data Lake Store account.
          flags:
            --block-size=: Number of bytes for a block.
            --buffer-size=: Number of bytes for internal buffer.
            --chunk-size=: Number of bytes for a chunk.
            --destination-path=!: The full path in the Data Lake Store filesystem to upload the file or folder to.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --overwrite=: Indicates that, if the destination file or folder exists, it should be overwritten
            --source-path=!: The path to the file or folder to upload.
            --subscription=: Name or ID of subscription.
            --thread-count=: Specify the parallelism of the upload.
            -n, --account=: Name of the Data Lake Store account.
        - name: create
          description: Creates a file or folder in a Data Lake Store account.
          flags:
            --content=: Content for the file to contain upon creation.
            --folder=: Indicates that this new item is a folder and not a file.
            --force=: Indicates that, if the file or folder exists, it should be overwritten
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=!: Name of the Data Lake Store account.
        - name: test
          description: Test for the existence of a file or folder in a Data Lake Store account.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: set-expiry
          description: Set the expiration time for a file.
          flags:
            --expiration-time=!: The absolute value of the expiration time expressed as milliseconds since the epoch.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: remove-expiry
          description: Remove the expiration time for a file.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: list
          description: List the files and folders in a Data Lake Store account.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: preview
          description: Preview the content of a file in a Data Lake Store account.
          flags:
            --force=: Indicates that, if the preview is larger than 1MB, still retrieve it.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --length=: The amount of data to preview in bytes.
            --offset=: The position in bytes to start the preview from.
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: download
          description: Download a file or folder from a Data Lake Store account to the local machine.
          flags:
            --block-size=: Number of bytes for a block.
            --buffer-size=: Number of bytes for internal buffer.
            --chunk-size=: Number of bytes for a chunk.
            --destination-path=!: The local path where the file or folder will be downloaded to.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --overwrite=: Indicates that, if the destination file or folder exists, it should be overwritten
            --source-path=!: The full path in the Data Lake Store filesystem to download the file or folder from.
            --subscription=: Name or ID of subscription.
            --thread-count=: Specify the parallelism of the download.
            -n, --account=: Name of the Data Lake Store account.
        - name: move
          description: Move a file or folder in a Data Lake Store account.
          flags:
            --destination-path=!: The destination path in the Data Lake Store account.
            --force=: Indicates that, if the destination file or folder already exists, it should be overwritten and replaced with the file or folder being moved.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --source-path=!: The file or folder to move.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
        - name: delete
          description: Delete a file or folder in a Data Lake Store account.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --path=!: The path in the specified Data Lake Store account where the action should take place.
            --recurse=: Indicates this should be a recursive delete of the folder.
            --subscription=: Name or ID of subscription.
            -n, --account=: Name of the Data Lake Store account.
