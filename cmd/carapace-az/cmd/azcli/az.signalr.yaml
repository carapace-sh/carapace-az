# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: signalr
description: signalr
commands:
    - name: cors
      commands:
        - name: list
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of signalr service.
        - name: remove
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --allowed-origins=!:
                description: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345).'
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
        - name: update
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --allowed-origins=!:
                description: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345).'
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
        - name: add
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --allowed-origins=!:
                description: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345).'
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
    - name: create
      flags:
        --default-action=: Default action to apply when no rule matches.
        --enable-message-logs=:
            description: The switch for messaging logs which signalr service will generate or not
            nargs: -1
        --service-mode=: The service mode which signalr service will be working on
        --sku=!: The sku name of the signalr service.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --unit-count=: The number of signalr service unit count
        -a, --allowed-origins=:
            description: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345).'
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: Name of signalr service.
      completion:
        flag:
            default-action:
                - Allow
                - Deny
            enable-message-logs:
                - "true"
                - "false"
            service-mode:
                - Default
                - Serverless
                - Classic
    - name: custom-certificate
      commands:
        - name: show
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --name=!: Name of the custom certificate.
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: update
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --keyvault-base-uri=: Key vault base URI.
            --keyvault-secret-name=: Key vault secret name where certificate is stored.
            --keyvault-secret-version=: Key vault secret version where certificate is stored.
            --name=!: Name of the custom certificate.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: delete
          flags:
            --name=!: Name of the custom certificate.
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: list
          flags:
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: create
          flags:
            --keyvault-base-uri=!: Key vault base URI.
            --keyvault-secret-name=!: Key vault secret name where certificate is stored.
            --keyvault-secret-version=: Key vault secret version where certificate is stored.
            --name=!: Name of the custom certificate.
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: custom-domain
      commands:
        - name: show
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --name=!: Name of the custom domain.
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: list
          flags:
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: create
          flags:
            --certificate-resource-id=!: ResourceId of a previously created custom certificate.
            --domain-name=!: Custom domain name.
            --name=!: Name of the custom domain.
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: update
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --certificate-resource-id=: ResourceId of a previously created custom certificate.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --domain-name=: Custom domain name.
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --name=!: Name of the custom domain.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: delete
          flags:
            --name=!: Name of the custom domain.
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: delete
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of signalr service.
    - name: identity
      commands:
        - name: remove
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
        - name: show
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
        - name: assign
          flags:
            --identity=!: Assigns managed identities to the service.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
    - name: key
      commands:
        - name: renew
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --key-type=!: The name of access key to regenerate
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
          completion:
            flag:
                key-type:
                    - primary
                    - secondary
        - name: list
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of signalr service.
    - name: list
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: network-rule
      commands:
        - name: update
          flags:
            --allow=:
                description: The allowed virtual network rule.
                nargs: -1
            --connection-name=:
                description: Space-separeted list of private endpoint connection name.
                nargs: -1
            --deny=:
                description: The denied virtual network rule.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --public-network=:
                description: Set rules for public network.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
          completion:
            flag:
                public-network:
                    - "true"
                    - "false"
        - name: ip-rule
          commands:
            - name: remove
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --ip-rule=!:
                    description: The IP rule for the hub.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of signalr service.
            - name: add
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --ip-rule=!:
                    description: The IP rule for the hub.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of signalr service.
        - name: list
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of signalr service.
    - name: replica
      commands:
        - name: update
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --region-endpoint-enabled=:
                description: Enable or disable region endpoint for a SignalR Service
                nargs: -1
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --replica-name=!: Name of the replica.
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            --unit-count=: The number of signalr service unit count
            -g, --resource-group=!: Name of resource group.
          completion:
            flag:
                region-endpoint-enabled:
                    - "true"
                    - "false"
        - name: start
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --replica-name=: Name of the replica.
            --signalr-name=: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: delete
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --replica-name=: Name of the replica.
            --signalr-name=: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: restart
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --replica-name=: Name of the replica.
            --signalr-name=: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: list
          flags:
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: create
          flags:
            --replica-name=!: Name of the replica.
            --signalr-name=!: Name of the SignalR.
            --sku=!: The sku name of the replica.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --unit-count=: The number of signalr service unit count
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Location.
        - name: stop
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --replica-name=: Name of the replica.
            --signalr-name=: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: show
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --replica-name=: Name of the replica.
            --signalr-name=: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
    - name: restart
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of signalr service.
    - name: show
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of signalr service.
    - name: start
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of signalr service.
    - name: stop
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of signalr service.
    - name: update
      flags:
        --add=:
            description: Add an object to a list of objects by specifying a path and key value pairs.
            nargs: -1
        --client-cert-enabled=:
            description: Enable or disable client certificate authentication for a SignalR Service
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --default-action=: Default action to apply when no rule matches.
        --disable-local-auth=:
            description: Enable or disable local auth for a SignalR Service
            nargs: -1
        --enable-message-logs=:
            description: The switch for messaging logs which signalr service will generate or not
            nargs: -1
        --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --region-endpoint-enabled=:
            description: Enable or disable region endpoint for a SignalR Service
            nargs: -1
        --remove=:
            description: Remove a property or an element from a list.
            nargs: -1
        --service-mode=: The service mode which signalr service will be working on
        --set=:
            description: Update an object by specifying a property path and value to set.
            nargs: -1
        --sku=: The sku name of the signalr service.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --unit-count=: The number of signalr service unit count
        -a, --allowed-origins=:
            description: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345).'
            nargs: -1
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of signalr service.
      completion:
        flag:
            client-cert-enabled:
                - "true"
                - "false"
            default-action:
                - Allow
                - Deny
            disable-local-auth:
                - "true"
                - "false"
            enable-message-logs:
                - "true"
                - "false"
            region-endpoint-enabled:
                - "true"
                - "false"
            service-mode:
                - Default
                - Serverless
                - Classic
    - name: upstream
      commands:
        - name: list
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of signalr service.
        - name: update
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --template=!:
                description: Template item for upstream settings.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
        - name: clear
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
