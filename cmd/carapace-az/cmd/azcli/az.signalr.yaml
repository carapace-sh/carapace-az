# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: signalr
description: Manage Azure SignalR Service.
commands:
    - name: cors
      description: Manage CORS for Azure SignalR Service.
      commands:
        - name: update
          description: Update allowed origins to a SignalR Service
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --allowed-origins=!:
                description: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345).'
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
        - name: list
          description: List allowed origins of a SignalR Service
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of signalr service.
        - name: add
          description: Add allowed origins to a SignalR Service
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --allowed-origins=!:
                description: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345).'
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
        - name: remove
          description: Remove allowed origins from a SignalR Service
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --allowed-origins=!:
                description: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345).'
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
    - name: create
      description: Creates a SignalR Service.
      flags:
        --default-action=: Default action to apply when no rule matches.
        --enable-message-logs=:
            description: The switch for messaging logs which signalr service will generate or not
            nargs: -1
        --service-mode=: The service mode which signalr service will be working on
        --sku=!: The sku name of the signalr service.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --unit-count=: The number of signalr service unit count
        -a, --allowed-origins=:
            description: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345).'
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: Name of signalr service.
      completion:
        flag:
            default-action:
                - Allow
                - Deny
            enable-message-logs:
                - "true"
                - "false"
            service-mode:
                - Default
                - Serverless
                - Classic
    - name: custom-certificate
      description: Manage custom certificate settings.
      commands:
        - name: list
          description: List custom certificate of SignalR Service.
          flags:
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: delete
          description: Delete a custom certificate of SignalR Service.
          flags:
            --name=!: Name of the custom certificate.
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: create
          description: Create a custom certificate of SignalR Service.
          flags:
            --keyvault-base-uri=!: Key vault base URI.
            --keyvault-secret-name=!: Key vault secret name where certificate is stored.
            --keyvault-secret-version=: Key vault secret version where certificate is stored.
            --name=!: Name of the custom certificate.
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: update
          description: Update a custom certificate of SignalR Service.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --keyvault-base-uri=: Key vault base URI.
            --keyvault-secret-name=: Key vault secret name where certificate is stored.
            --keyvault-secret-version=: Key vault secret version where certificate is stored.
            --name=!: Name of the custom certificate.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: show
          description: Show the detail of a custom certificate of SignalR Service.
          flags:
            --name=!: Name of the custom certificate.
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: custom-domain
      description: Manage custom domain settings.
      commands:
        - name: show
          description: Show the detail of a custom domain of SignalR Service.
          flags:
            --name=!: Name of the custom domain.
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: create
          description: Create a custom domain of SignalR Service.
          flags:
            --certificate-resource-id=!: ResourceId of a previously created custom certificate.
            --domain-name=!: Custom domain name.
            --name=!: Name of the custom domain.
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: delete
          description: Delete a custom domain of SignalR Service.
          flags:
            --name=!: Name of the custom domain.
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: list
          description: List custom domains of SignalR Service.
          flags:
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: update
          description: Update a custom domain of SignalR Service.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --certificate-resource-id=: ResourceId of a previously created custom certificate.
            --domain-name=: Custom domain name.
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --name=!: Name of the custom domain.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: delete
      description: Deletes a SignalR Service.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of signalr service.
    - name: identity
      description: Manage managed identity settings.
      commands:
        - name: remove
          description: Remove managed identity for SignalR Service.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
        - name: show
          description: Show managed identity for SignalR Service.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
        - name: assign
          description: Assign managed identity for SignalR Service.
          flags:
            --identity=!: Assigns managed identities to the service.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
    - name: key
      description: Manage keys for Azure SignalR Service.
      commands:
        - name: list
          description: List the access keys for a SignalR Service.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of signalr service.
        - name: renew
          description: Regenerate the access key for a SignalR Service.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --key-type=!: The name of access key to regenerate
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
          completion:
            flag:
                key-type:
                    - primary
                    - secondary
    - name: list
      description: Lists all the SignalR Service under the current subscription.
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: network-rule
      description: Manage network rules.
      commands:
        - name: update
          description: Update the Network access control of SignalR Service.
          flags:
            --allow=:
                description: The allowed virtual network rule.
                nargs: -1
            --connection-name=:
                description: Space-separeted list of private endpoint connection name.
                nargs: -1
            --deny=:
                description: The denied virtual network rule.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --public-network=:
                description: Set rules for public network.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
          completion:
            flag:
                public-network:
                    - "true"
                    - "false"
        - name: ip-rule
          description: Manage SignalR Service IP rules.
          commands:
            - name: remove
              description: Remove IP rule from SignalR Service.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --ip-rule=!:
                    description: The IP rule for the hub.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of signalr service.
            - name: add
              description: Add IP rule to SignalR Service.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --ip-rule=!:
                    description: The IP rule for the hub.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of signalr service.
        - name: list
          description: Get the Network access control of SignalR Service.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of signalr service.
    - name: replica
      description: Manage replica settings.
      commands:
        - name: show
          description: Show the details of a replica
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --replica-name=: Name of the replica.
            --signalr-name=: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: create
          description: Create a replica of SignalR Service.
          flags:
            --replica-name=!: Name of the replica.
            --signalr-name=!: Name of the SignalR.
            --sku=!: The sku name of the replica.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --unit-count=: The number of signalr service unit count
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Location.
        - name: start
          description: Start a replica of SignalR Service.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --replica-name=: Name of the replica.
            --signalr-name=: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: stop
          description: Stop a replica of SignalR Service.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --replica-name=: Name of the replica.
            --signalr-name=: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: list
          description: List replicas of SignalR Service.
          flags:
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: delete
          description: Delete a replica of SignalR Service.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --replica-name=: Name of the replica.
            --signalr-name=: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: update
          description: Update a replica of SignalR Service.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --region-endpoint-enabled=:
                description: Enable or disable region endpoint for a SignalR Service
                nargs: -1
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --replica-name=!: Name of the replica.
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --signalr-name=!: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            --unit-count=: The number of signalr service unit count
            -g, --resource-group=!: Name of resource group.
          completion:
            flag:
                region-endpoint-enabled:
                    - "true"
                    - "false"
        - name: restart
          description: Restart a replica of SignalR Service.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --replica-name=: Name of the replica.
            --signalr-name=: Name of the SignalR.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
    - name: restart
      description: Restart an existing SignalR Service.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of signalr service.
    - name: show
      description: Get the details of a SignalR Service.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of signalr service.
    - name: start
      description: Start an existing SignalR Service.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of signalr service.
    - name: stop
      description: Stop an existing SignalR Service.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of signalr service.
    - name: update
      description: Update an existing SignalR Service.
      flags:
        --add=:
            description: Add an object to a list of objects by specifying a path and key value pairs.
            nargs: -1
        --client-cert-enabled=:
            description: Enable or disable client certificate authentication for a SignalR Service
            nargs: -1
        --default-action=: Default action to apply when no rule matches.
        --disable-local-auth=:
            description: Enable or disable local auth for a SignalR Service
            nargs: -1
        --enable-message-logs=:
            description: The switch for messaging logs which signalr service will generate or not
            nargs: -1
        --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --region-endpoint-enabled=:
            description: Enable or disable region endpoint for a SignalR Service
            nargs: -1
        --remove=:
            description: Remove a property or an element from a list.
            nargs: -1
        --service-mode=: The service mode which signalr service will be working on
        --set=:
            description: Update an object by specifying a property path and value to set.
            nargs: -1
        --sku=: The sku name of the signalr service.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --unit-count=: The number of signalr service unit count
        -a, --allowed-origins=:
            description: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345).'
            nargs: -1
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of signalr service.
      completion:
        flag:
            client-cert-enabled:
                - "true"
                - "false"
            default-action:
                - Allow
                - Deny
            disable-local-auth:
                - "true"
                - "false"
            enable-message-logs:
                - "true"
                - "false"
            region-endpoint-enabled:
                - "true"
                - "false"
            service-mode:
                - Default
                - Serverless
                - Classic
    - name: upstream
      description: Manage upstream settings.
      commands:
        - name: clear
          description: Clear upstream settings of an existing SignalR Service.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
        - name: update
          description: Update order sensitive upstream settings for an existing SignalR Service.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --template=!:
                description: Template item for upstream settings.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of signalr service.
        - name: list
          description: List upstream settings of an existing SignalR Service.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of signalr service.
