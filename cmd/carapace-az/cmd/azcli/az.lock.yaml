# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: lock
description: lock
commands:
    - name: create
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
        --notes=: Notes about this lock.
        --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
        --resource-type=: 'The resource type (Ex: ''resC'').'
        --resource=: Name or ID of the resource being locked.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=!: Name of the lock
        -t, --lock-type=!: The type of lock restriction.
      completion:
        flag:
            lock-type:
                - CanNotDelete
                - ReadOnly
    - name: delete
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
        --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
        --resource-type=: 'The resource type (Ex: ''resC'').'
        --resource=: Name or ID of the resource being locked.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the lock
    - name: list
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --filter-string=: A query filter to use to restrict the results.
        --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
        --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
        --resource-type=: 'The resource type (Ex: ''resC'').'
        --resource=: Name or ID of the resource being locked.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: show
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
        --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
        --resource-type=: 'The resource type (Ex: ''resC'').'
        --resource=: Name or ID of the resource being locked.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the lock
    - name: update
      description: Allows updates to the lock-type(level) and the notes of the lock
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
        --notes=: Notes about this lock.
        --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
        --resource-type=: 'The resource type (Ex: ''resC'').'
        --resource=: Name or ID of the resource being locked.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the lock
        -t, --lock-type=: The type of lock restriction.
      completion:
        flag:
            lock-type:
                - CanNotDelete
                - ReadOnly
