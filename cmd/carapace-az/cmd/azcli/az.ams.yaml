# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: ams
description: Manage Azure Media Services resources.
commands:
    - name: account
      commands:
        - name: storage
          commands:
            - name: add
              description: Attach a secondary storage to an Azure Media Services account.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --system-assigned=:
                    description: Set the system managed identity on the storage account.
                    nargs: -1
                --user-assigned=: Set the user managed identity on the storage account.
                -a, --account-name=: The name of the Azure Media Services account.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name or resource ID of the secondary storage account to detach from the Azure Media Services account.
              completion:
                flag:
                    system-assigned:
                        - "true"
                        - "false"
            - name: set-authentication
              description: Set the authentication of a storage account attached to an Azure Media Services account.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --storage-account-id=: The storage account Id.
                --storage-auth=!: The type of authentication for the storage account associated with the media services account.
                --subscription=: Name or ID of subscription.
                --system-assigned=:
                    description: Set the system managed identity on the storage account.
                    nargs: -1
                --user-assigned=: Set the user managed identity on the storage account.
                -a, --account-name=: The name of the Azure Media Services account.
                -g, --resource-group=: Name of resource group.
              completion:
                flag:
                    storage-auth:
                        - System
                        - ManagedIdentity
                    system-assigned:
                        - "true"
                        - "false"
            - name: sync-storage-keys
              description: Synchronize storage account keys for a storage account associated with an Azure Media Services account.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --storage-account-id=!: The storage account Id.
                --subscription=: Name or ID of subscription.
                -a, --account-name=: The name of the Azure Media Services account.
                -g, --resource-group=: Name of resource group.
            - name: remove
              description: Detach a secondary storage from an Azure Media Services account.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -a, --account-name=: The name of the Azure Media Services account.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name or resource ID of the secondary storage account to detach from the Azure Media Services account.
        - name: create
          description: Create an Azure Media Services account.
          flags:
            --default-action=: The behavior for IP access control in Key Delivery.
            --disable-public-network=: Set this flag to disable public network access for resources under the Media Services account.
            --ip-allow-list=:
                description: The IP allow list for access control in Key Delivery.
                nargs: -1
            --mi-system-assigned=:
                description: Set the system managed identity on the media services account.
                nargs: -1
            --mi-user-assigned=:
                description: Set the user managed identities on the media services account.
                nargs: -1
            --storage-account=!: The name or resource ID of the primary storage account to attach to the Azure Media Services account.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Location.
            -n, --name=!: The name of the resource.
          completion:
            flag:
                mi-system-assigned:
                    - "true"
                    - "false"
        - name: show
          description: Show the details of an Azure Media Services account.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the resource.
        - name: identity
          commands:
            - name: remove
              description: Remove a managed identity to an Azure Media Services account.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --system-assigned=:
                    description: Set the system managed identity on the media services account.
                    nargs: -1
                --user-assigned=:
                    description: Set the user managed identities on the media services account.
                    nargs: -1
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the resource.
              completion:
                flag:
                    system-assigned:
                        - "true"
                        - "false"
            - name: show
              description: Show the details of managed identity settings for an Azure Media Services account.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the resource.
            - name: assign
              description: Assign a managed identity to an Azure Media Services account.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --system-assigned=:
                    description: Set the system managed identity on the media services account.
                    nargs: -1
                --user-assigned=:
                    description: Set the user managed identities on the media services account.
                    nargs: -1
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the resource.
              completion:
                flag:
                    system-assigned:
                        - "true"
                        - "false"
        - name: sp
          commands:
            - name: create
              description: Create or update a service principal and configure its access to an Azure Media Services account.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --new-sp-name=: The new app name or app URI to update the RBAC with.
                --role=: The role of the service principal.
                --subscription=: Name or ID of subscription.
                --xml=: Enables xml output format.
                --years=: Number of years for which the secret will be valid.
                -a, --account-name=!: The name of the Azure Media Services account.
                -g, --resource-group=!: Name of resource group.
                -n, --name=: The app name or app URI to associate the RBAC with.
                -p, --password=: The friendly name of the password.
            - name: reset-credentials
              description: Generate a new client secret for a service principal configured for an Azure Media Services account.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --role=: The role of the service principal.
                --subscription=: Name or ID of subscription.
                --xml=: Enables xml output format.
                --years=: Number of years for which the secret will be valid.
                -a, --account-name=: The name of the Azure Media Services account.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The app name or app URI to associate the RBAC with.
                -p, --password=: The friendly name of the password.
        - name: update
          description: Update the details of an Azure Media Services account.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the resource.
        - name: encryption
          commands:
            - name: show
              description: Show the details of encryption settings for an Azure Media Services account.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -a, --account-name=: The name of the Azure Media Services account.
                -g, --resource-group=: Name of resource group.
            - name: set
              description: Set the encryption settings for an Azure Media Services account.
              flags:
                --current-key-id=: The current key used to encrypt the Media Services account, including the key version.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --key-identifier=: The URL of the Key Vault key used to encrypt the account.
                --key-type=!: SystemKeyThe encryption key source (provider).
                --subscription=: Name or ID of subscription.
                --system-assigned=:
                    description: Set the system managed identity for account encryption.
                    nargs: -1
                --user-assigned=: Set the user managed identity for account encryption.
                -a, --account-name=: The name of the Azure Media Services account.
                -g, --resource-group=: Name of resource group.
              completion:
                flag:
                    system-assigned:
                        - "true"
                        - "false"
        - name: list
          description: List Azure Media Services accounts for the entire subscription.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: mru
          commands:
            - name: show
              description: Show the details of media reserved units for an Azure Media Services account.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the resource.
            - name: set
              description: Set the type and number of media reserved units for an Azure Media Services account.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --count=: The number of the encoding reserved units that you want to be provisioned for this account for concurrent tasks (one unit equals one task).
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --type=: Speed of reserved processing units.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the resource.
        - name: check-name
          description: Checks whether the Media Service resource name is available.
          flags:
            --subscription=: Name or ID of subscription.
            -l, --location=: Location.
            -n, --name=!: The name of the Azure Media Services account.
        - name: delete
          description: Delete a Media Services account.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the resource.
    - name: account-filter
      commands:
        - name: list
          description: List Account Filters.
          flags:
            --subscription=: Name or ID of subscription.
            -a, --account-name=!: The name of the Azure Media Services account.
            -g, --resource-group=!: Name of resource group.
        - name: create
          description: Create an account filter.
          flags:
            --bitrate=: The first quality bitrate.
            --end-timestamp=: Applies to Video on Demand (VoD).
            --first-quality=: The first quality (lowest) bitrate to include in the manifest.
            --force-end-timestamp=:
                description: Applies to Live Streaming only.
                nargs: -1
            --live-backoff-duration=: Applies to Live Streaming only.
            --presentation-window-duration=: Applies to Live Streaming only.
            --start-timestamp=: Applies to Video on Demand (VoD) or Live Streaming.
            --subscription=: Name or ID of subscription.
            --timescale=: Applies to all timestamps and durations in a Presentation Time Range, specified as the number of increments in one second.
            --tracks=: The JSON representing the track selections.
            -a, --account-name=!: The name of the Azure Media Services account.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the account filter.
          completion:
            flag:
                force-end-timestamp:
                    - "true"
                    - "false"
        - name: show
          description: Show the details of an account filter.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --account-name=: The name of the Azure Media Services account.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the account filter.
        - name: update
          description: Update the details of an account filter.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --bitrate=: The first quality bitrate.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --end-timestamp=: Applies to Video on Demand (VoD).
            --first-quality=: The first quality (lowest) bitrate to include in the manifest.
            --force-end-timestamp=:
                description: Applies to Live Streaming only.
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --live-backoff-duration=: Applies to Live Streaming only.
            --presentation-window-duration=: Applies to Live Streaming only.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --start-timestamp=: Applies to Video on Demand (VoD) or Live Streaming.
            --subscription=: Name or ID of subscription.
            --timescale=: Applies to all timestamps and durations in a Presentation Time Range, specified as the number of increments in one second.
            --tracks=: The JSON representing the track selections.
            -a, --account-name=: The name of the Azure Media Services account.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the account filter.
          completion:
            flag:
                force-end-timestamp:
                    - "true"
                    - "false"
        - name: delete
          description: Delete an Account Filter.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --account-name=: The name of the Azure Media Services account.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the account filter.
    - name: asset
      commands:
        - name: update
          description: Update the details of an asset.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --alternate-id=: The alternate id of the asset.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --description=: The asset description.
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --account-name=: The name of the Azure Media Services account.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the asset.
        - name: delete
          description: Delete an Asset.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --account-name=: The name of the Azure Media Services account.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the asset.
        - name: show
          description: Show the details of an asset.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --account-name=: The name of the Azure Media Services account.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the asset.
        - name: list-streaming-locators
          description: List Streaming Locators.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --account-name=: The name of the Azure Media Services account.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the asset.
        - name: get-encryption-key
          description: Get the asset storage encryption keys used to decrypt content created by version 2 of the Media Services API.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --account-name=: The name of the Azure Media Services account.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the asset.
        - name: get-sas-urls
          description: Lists storage container URLs with shared access signatures (SAS) for uploading and downloading Asset content.
          flags:
            --expiry=: Specifies the UTC datetime (Y-m-d'T'H:M:S'Z') at which the SAS becomes invalid.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --permissions=: The permissions to set on the SAS URL.
            --subscription=: Name or ID of subscription.
            -a, --account-name=: The name of the Azure Media Services account.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the asset.
          completion:
            flag:
                permissions:
                    - Read
                    - ReadWrite
                    - ReadWriteDelete
        - name: list
          description: List Assets.
          flags:
            --filter=: Restricts the set of items returned.
            --orderby=: Specifies the key by which the result collection should be ordered.
            --subscription=: Name or ID of subscription.
            --top=: Specifies a non-negative integer n that limits the number of items returned from a collection.
            -a, --account-name=!: The name of the Azure Media Services account.
            -g, --resource-group=!: Name of resource group.
        - name: create
          description: Create an asset.
          flags:
            --alternate-id=: The alternate id of the asset.
            --container=: The name of the asset blob container.
            --description=: The asset description.
            --storage-account=: The name of the storage account.
            --subscription=: Name or ID of subscription.
            -a, --account-name=!: The name of the Azure Media Services account.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the asset.
    - name: asset-filter
      commands:
        - name: delete
          description: Delete an Asset Filter.
          flags:
            --asset-name=: The name of the asset.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --account-name=: The name of the Azure Media Services account.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the asset filter.
        - name: show
          description: Show the details of an asset filter.
          flags:
            --asset-name=: The name of the asset.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -a, --account-name=: The name of the Azure Media Services account.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the asset filter.
        - name: update
          description: Update the details of an asset filter.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --asset-name=: The name of the asset.
            --bitrate=: The first quality bitrate.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --end-timestamp=: Applies to Video on Demand (VoD).For the Live Streaming presentation, it is silently ignored and applied when the presentation ends and the stream becomes VoD.This is a long value that represents an absolute end point of the presentation, rounded to the closest next GOP start.
            --first-quality=: The first quality (lowest) bitrate to include in the manifest.
            --force-end-timestamp=:
                description: Applies to Live Streaming only.
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --live-backoff-duration=: Applies to Live Streaming only.
            --presentation-window-duration=: Applies to Live Streaming only.Use presentationWindowDuration to apply a sliding window of fragments to include in a playlist.The unit for this property is timescale (see below).For example, set presentationWindowDuration=1200000000 to apply a two-minute sliding window.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --start-timestamp=: Applies to Video on Demand (VoD) or Live Streaming.
            --subscription=: Name or ID of subscription.
            --timescale=: Applies to all timestamps and durations in a Presentation Time Range, specified as the number of increments in one second.Default is 10000000 - ten million increments in one second, where each increment would be 100 nanoseconds long.
            --tracks=: The JSON representing the track selections.
            -a, --account-name=: The name of the Azure Media Services account.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the asset filter.
          completion:
            flag:
                force-end-timestamp:
                    - "true"
                    - "false"
        - name: create
          description: Create an asset filter.
          flags:
            --asset-name=!: The name of the asset.
            --bitrate=: The first quality bitrate.
            --end-timestamp=: Applies to Video on Demand (VoD).For the Live Streaming presentation, it is silently ignored and applied when the presentation ends and the stream becomes VoD.This is a long value that represents an absolute end point of the presentation, rounded to the closest next GOP start.
            --first-quality=: The first quality (lowest) bitrate to include in the manifest.
            --force-end-timestamp=:
                description: Applies to Live Streaming only.
                nargs: -1
            --live-backoff-duration=: Applies to Live Streaming only.
            --presentation-window-duration=: Applies to Live Streaming only.Use presentationWindowDuration to apply a sliding window of fragments to include in a playlist.The unit for this property is timescale (see below).For example, set presentationWindowDuration=1200000000 to apply a two-minute sliding window.
            --start-timestamp=: Applies to Video on Demand (VoD) or Live Streaming.
            --subscription=: Name or ID of subscription.
            --timescale=: Applies to all timestamps and durations in a Presentation Time Range, specified as the number of increments in one second.Default is 10000000 - ten million increments in one second, where each increment would be 100 nanoseconds long.
            --tracks=: The JSON representing the track selections.
            -a, --account-name=!: The name of the Azure Media Services account.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the asset filter.
          completion:
            flag:
                force-end-timestamp:
                    - "true"
                    - "false"
        - name: list
          description: List Asset Filters.
          flags:
            --asset-name=!: The name of the asset.
            --subscription=: Name or ID of subscription.
            -a, --account-name=!: The name of the Azure Media Services account.
            -g, --resource-group=!: Name of resource group.
    - name: asset-track
      commands:
        - name: create
          description: Create a track for an Azure Media Services asset.
          flags:
            --asset-name=!: The asset name
            --display-name=: The display name of the text track on a video player.
            --file-name=: The name of the file.
            --language-code=: The RFC5646 language code for the text track.
            --no-wait=: Do not wait for the long-running operation to finish.
            --player-visibility=: When PlayerVisibility is set to "Visible", the text track will be present in the DASH manifest or HLS playlist when requested by a client.
            --subscription=: Name or ID of subscription.
            --track-name=!: The name of the track.
            --track-type=!: The type of track.
            -a, --account-name=!: The name of the Azure Media Services account.
            -g, --resource-group=!: Name of resource group.
        - name: list
          description: List Tracks in the Asset.
          flags:
            --asset-name=!: The asset name
            --subscription=: Name or ID of subscription.
            -a, --account-name=!: The name of the Azure Media Services account.
            -g, --resource-group=!: Name of resource group.
        - name: update-data
          description: Update a track if the file in the storage container was recently modified.
          flags:
            --asset-name=!: The asset name
            --ids=:
                description: One or more resource IDs (space-delimited).
