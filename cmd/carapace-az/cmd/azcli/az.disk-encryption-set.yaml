# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: disk-encryption-set
description: Disk Encryption Set resource.
commands:
    - name: create
      flags:
        --auto-rotation=:
            description: Enable automatic rotation of keys.
            nargs: -1
        --encryption-type=: The type of key used to encrypt the data of the disk.
        --federated-client-id=: The federated client id used in cross tenant scenario.
        --key-url=!: URL pointing to a key or secret in KeyVault.
        --mi-system-assigned=:
            description: Provide this flag to use system assigned identity.
            nargs: -1
        --mi-user-assigned=:
            description: Space separated resource IDs to add user-assigned identities.
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --source-vault=: Name or ID of the KeyVault containing the key or secret.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: Resource tags  Support shorthand-syntax, json-file and yaml-file.
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Resource location  When not specified, the location of the resource group will be used.
        -n, --name=!: Name of disk encryption set.
      completion:
        flag:
            auto-rotation:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            encryption-type:
                - ConfidentialVmEncryptedWithCustomerKey
                - EncryptionAtRestWithCustomerKey
                - EncryptionAtRestWithPlatformAndCustomerKeys
            mi-system-assigned:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: delete
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of disk encryption set.
      completion:
        flag:
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: identity
      commands:
        - name: remove
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --system-assigned=:
                description: Provide this flag to use system assigned identity.
                nargs: -1
            --user-assigned=:
                description: User Assigned Identity ids to be used for disk encryption set.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of disk encryption set.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                system-assigned:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: assign
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --system-assigned=:
                description: Provide this flag to use system assigned identity.
                nargs: -1
            --user-assigned=:
                description: User Assigned Identity ids to be used for disk encryption set.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of disk encryption set.
          completion:
            flag:
                system-assigned:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: show
          description: Display managed identities of a disk encryption set.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of disk encryption set.
    - name: list
      flags:
        --max-items=: Total number of items to return in the command's output.
        --next-token=: Token to specify where to start paginating.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: list-associated-resources
      flags:
        --max-items=: Total number of items to return in the command's output.
        --next-token=: Token to specify where to start paginating.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: Name of disk encryption set.
    - name: show
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of disk encryption set.
    - name: update
      flags:
        --add=:
            description: Add an object to a list of objects by specifying a path and key value pairs.
            nargs: -1
        --auto-rotation=:
            description: Enable automatic rotation of keys.
            nargs: -1
        --federated-client-id=: The federated client id used in cross tenant scenario.
        --force-string=:
            description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --key-url=: URL pointing to a key or secret in KeyVault.
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --remove=:
            description: Remove a property or an element from a list.
            nargs: -1
        --set=:
            description: Update an object by specifying a property path and value to set.
            nargs: -1
        --source-vault=: Name or ID of the KeyVault containing the key or secret.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of disk encryption set.
      completion:
        flag:
            auto-rotation:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            force-string:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: wait
      flags:
        --created=: wait until created with 'provisioningState' at 'Succeeded'
        --custom=: Wait until the condition satisfies a custom JMESPath query.
        --deleted=: wait until deleted
        --exists=: wait until the resource exists
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --interval=: polling interval in seconds
        --subscription=: Name or ID of subscription.
        --timeout=: maximum wait in seconds
        --updated=: wait until updated with provisioningState at 'Succeeded'
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of disk encryption set.
