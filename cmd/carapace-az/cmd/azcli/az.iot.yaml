# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: iot
description: Manage Internet of Things (IoT) assets.
commands:
    - name: central
      description: Manage IoT Central resources.
      commands:
        - name: app
          description: Manage IoT Central applications.
          commands:
            - name: private-endpoint-connection
              description: Manage private endpoint connection of IoT Central application.
              commands:
                - name: approve
                  description: Approve a private endpoint connection request for an IoT Central application.
                  flags:
                    --account-name=: Name of the IoT Central application.
                    --description=: Comments for the approve operation.
                    --id=: The ID of the private endpoint connection associated with the IoT Central application.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: The resource group name of specified IoT Central application.
                    -n, --name=: The name of the private endpoint connection associated with IoT Central application.
                - name: show
                  description: Show details of a private endpoint connection request for an IoT Central application.
                  flags:
                    --account-name=: Name of the IoT Central application.
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --id=: The ID of the private endpoint connection associated with the IoT Central application.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: The resource group name of specified IoT Central application.
                    -n, --name=: The name of the private endpoint connection associated with IoT Central application.
                - name: list
                  description: List all of the private endpoint connections for an IoT Central application.
                  flags:
                    --account-name=: Name of the IoT Central application.
                    --id=: ID of the resource
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                - name: delete
                  description: Delete a private endpoint connection for an IoT Central application.
                  flags:
                    --account-name=: Name of the IoT Central application.
                    --id=: The ID of the private endpoint connection associated with the IoT Central application.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: The resource group name of specified IoT Central application.
                    -n, --name=: The name of the private endpoint connection associated with IoT Central application.
                    -y, --yes=: Do not prompt for confirmation.
                - name: reject
                  description: Reject a private endpoint connection request for an IoT Central application.
                  flags:
                    --account-name=: Name of the IoT Central application.
                    --description=: Comments for the reject operation.
                    --id=: The ID of the private endpoint connection associated with the IoT Central application.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: The resource group name of specified IoT Central application.
                    -n, --name=: The name of the private endpoint connection associated with IoT Central application.
            - name: update
              description: Update metadata for an IoT Central application.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: IoT Central application name.
            - name: identity
              description: Manage IoT Central application identities.
              commands:
                - name: remove
                  description: Remove managed identities from an IoT Central application
                  flags:
                    --subscription=: Name or ID of subscription.
                    --system-assigned=: Provide this flag to refer to the system-assigned identity.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=!: IoT Central application name.
                - name: show
                  description: Show the identity properties of an IoT Central application
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=!: IoT Central application name.
                - name: assign
                  description: Assign managed identities to an IoT Central application
                  flags:
                    --subscription=: Name or ID of subscription.
                    --system-assigned=: Provide this flag to refer to the system-assigned identity.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=!: IoT Central application name.
            - name: show
              description: Get the details of an IoT Central application.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=!: IoT Central application name.
            - name: private-link-resource
              description: Manage an IoT Central application private link resources.
              commands:
                - name: show
                  description: Show details of a private link resource in the specified IoT Central application.
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --group-id=: Name of the private link resource.
                    --id=: ID of the resource
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: Name of the resource.
                - name: list
                  description: List all of the IoT Central application private link resources in the specified account.
                  flags:
                    --id=: ID of the resource
                    --subscription=: Name or ID of subscription.
                    --type=: Type of the resource.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: IoT Central application name.
            - name: list
              description: List IoT Central applications.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
            - name: create
              description: Create an IoT Central application.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --mi-system-assigned=: Provide this flag to use system assigned identity.
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -d, --display-name=: Custom display name for the IoT Central app.
                -g, --resource-group=!: Name of resource group.
                -l, --location=: Where your app's info and resources are stored.
                -n, --name=!: Give your IoT Central app a unique name so you can find it later.This will be used as the resource name in the Azure portal and CLI.Avoid special characters `-` instead, use lower case letters (a-z), numbers (0-9), and dashes (-)
                -p, --sku=: Pricing plan for IoT Central application.
                -s, --subdomain=!: Enter a unique URL.
                -t, --template=: IoT Central application template name.
              completion:
                flag:
                    sku:
                        - ST0
                        - ST1
                        - ST2
            - name: delete
              description: Delete an IoT Central application.
              flags:
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: IoT Central application name.
                -y, --yes=: Do not prompt for confirmation.
    - name: dps
      description: Manage Azure IoT Hub Device Provisioning Service.
      commands:
        - name: certificate
          description: Manage certificates for an Azure IoT Hub Device Provisioning Service instance.
          commands:
            - name: generate-verification-code
              description: Generate a verification code for a certificate in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --dps-name=!: IoT Hub Device Provisioning Service name
                --subscription=: Name or ID of subscription.
                -e, --etag=!: Entity Tag (etag) of the object.
                -g, --resource-group=: Name of resource group.
                -n, --certificate-name=!: A friendly name for the certificate.
            - name: update
              description: Update a certificate in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --dps-name=!: IoT Hub Device Provisioning Service name
                --subscription=: Name or ID of subscription.
                -e, --etag=!: Entity Tag (etag) of the object.
                -g, --resource-group=: Name of resource group.
                -n, --certificate-name=!: A friendly name for the certificate.
                -p, --path=!: The path to the file containing the certificate.
                -v, --verified=:
                    description: A boolean indicating whether or not the certificate is verified.
                    nargs: -1
              completion:
                flag:
                    verified:
                        - "true"
                        - "false"
            - name: delete
              description: Delete a certificate in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --dps-name=!: IoT Hub Device Provisioning Service name
                --subscription=: Name or ID of subscription.
                -e, --etag=!: Entity Tag (etag) of the object.
                -g, --resource-group=: Name of resource group.
                -n, --certificate-name=!: A friendly name for the certificate.
            - name: show
              description: Show information about a particular certificate in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --dps-name=!: IoT Hub Device Provisioning Service name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --certificate-name=!: A friendly name for the certificate.
            - name: list
              description: List all certificates contained within an Azure IoT Hub Device Provisioning Service instance
              flags:
                --dps-name=!: IoT Hub Device Provisioning Service name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
            - name: verify
              description: Verify a certificate in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --dps-name=!: IoT Hub Device Provisioning Service name
                --subscription=: Name or ID of subscription.
                -e, --etag=!: Entity Tag (etag) of the object.
                -g, --resource-group=: Name of resource group.
                -n, --certificate-name=!: A friendly name for the certificate.
                -p, --path=!: The path to the file containing the certificate.
            - name: create
              description: Create/upload a certficate to an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --dps-name=!: IoT Hub Device Provisioning Service name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --certificate-name=!: A friendly name for the certificate.
                -p, --path=!: The path to the file containing the certificate.
                -v, --verified=:
                    description: A boolean indicating whether or not the certificate is verified.
                    nargs: -1
              completion:
                flag:
                    verified:
                        - "true"
                        - "false"
        - name: policy
          description: Manage shared access policies for an Azure IoT Hub Device Provisioning Service instance.
          commands:
            - name: list
              description: List all shared access policies in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --dps-name=!: IoT Hub Device Provisioning Service name
            - name: show
              description: Show details of a shared access policies in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --policy-name=!: A friendly name for DPS access policy.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --dps-name=!: IoT Hub Device Provisioning Service name
            - name: update
              description: Update a shared access policy in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --policy-name=!: A friendly name for DPS access policy.
                --primary-key=: Primary SAS key value.
                --secondary-key=: Secondary SAS key value.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --dps-name=!: IoT Hub Device Provisioning Service name
                -r, --rights=:
                    description: Access rights for the IoT Hub Device Provisioning Service.
                    nargs: -1
              completion:
                flag:
                    rights:
                        - ServiceConfig
                        - EnrollmentRead
                        - EnrollmentWrite
                        - DeviceConnect
                        - RegistrationStatusRead
                        - RegistrationStatusWrite
            - name: delete
              description: Delete a shared access policies in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --policy-name=!: A friendly name for DPS access policy.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --dps-name=!: IoT Hub Device Provisioning Service name
            - name: create
              description: Create a new shared access policy in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --policy-name=!: A friendly name for DPS access policy.
                --primary-key=: Primary SAS key value, if not provided it will be generated by the service
                --secondary-key=: Secondary SAS key value, if not provided it will be generated by the service
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --dps-name=!: IoT Hub Device Provisioning Service name
                -r, --rights=!:
                    description: Access rights for the IoT Hub Device Provisioning Service.
                    nargs: -1
              completion:
                flag:
                    rights:
                        - ServiceConfig
                        - EnrollmentRead
                        - EnrollmentWrite
                        - DeviceConnect
                        - RegistrationStatusRead
                        - RegistrationStatusWrite
        - name: show
          description: Get the details of an Azure IoT Hub Device Provisioning Service instance.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: IoT Hub Device Provisioning Service name
        - name: create
          description: Create an Azure IoT Hub Device Provisioning Service instance.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --enforce-data-residency=:
                description: Enforce data residency for this IoT Hub Device Provisioning Service by disabling cross geo-pair disaster recovery.
                nargs: -1
            --sku=: Pricing tier for the IoT Hub Device Provisioning Service.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --unit=: Units in your IoT Hub Device Provisioning Service.
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Location of your IoT Hub Device Provisioning Service.
            -n, --name=!: IoT Hub Device Provisioning Service name
          completion:
            flag:
                enforce-data-residency:
                    - "true"
                    - "false"
                sku:
                    - S1
        - name: update
          description: Update an Azure IoT Hub Device Provisioning Service instance.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: IoT Hub Device Provisioning Service name
        - name: linked-hub
          description: Manage linked IoT Hubs in an Azure IoT Hub Device Provisioning Service instance.
          commands:
            - name: list
              description: List all linked IoT hubs in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --dps-name=!: IoT Hub Device Provisioning Service name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
            - name: show
              description: Show details of a linked IoT hub in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --dps-name=!: IoT Hub Device Provisioning Service name
                --linked-hub=!: Host name of linked IoT Hub.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
            - name: update
              description: Update a linked IoT hub in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --allocation-weight=: Allocation weight of the IoT hub.
                --apply-allocation-policy=:
                    description: A boolean indicating whether to apply allocation policy to the Iot hub.
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --dps-name=!: IoT Hub Device Provisioning Service name
                --linked-hub=!: Host name of linked IoT Hub.
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
              completion:
                flag:
                    apply-allocation-policy:
                        - "true"
                        - "false"
            - name: delete
              description: Update a linked IoT hub in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --dps-name=!: IoT Hub Device Provisioning Service name
                --linked-hub=!: Host name of linked IoT Hub.
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
            - name: create
              description: Create a linked IoT hub in an Azure IoT Hub Device Provisioning Service instance.
              flags:
                --allocation-weight=: Allocation weight of the IoT hub.
                --apply-allocation-policy=:
                    description: A boolean indicating whether to apply allocation policy to the IoT hub.
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --connection-string=: Connection string of the IoT hub.
                --dps-name=!: IoT Hub Device Provisioning Service name
                --hub-name=: IoT Hub name.
                --hub-resource-group=: IoT Hub resource group name.
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -l, --location=: Location of the IoT hub.
              completion:
                flag:
                    apply-allocation-policy:
                        - "true"
                        - "false"
        - name: delete
          description: Delete an Azure IoT Hub Device Provisioning Service instance.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: IoT Hub Device Provisioning Service name
        - name: list
          description: List Azure IoT Hub Device Provisioning Service instances.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
    - name: hub
      description: Manage Azure IoT hubs.
      commands:
        - name: routing-endpoint
          description: Manage custom endpoints of an IoT hub.
          commands:
            - name: show
              description: Get information on mentioned endpoint for your IoT Hub.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --hub-name=: IoT Hub name.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --endpoint-name=!: Name of the Routing Endpoint.
            - name: list
              description: Get information on all the endpoints for your IoT Hub.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --hub-name=: IoT Hub name.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -t, --endpoint-type=: Type of the Routing Endpoint.
              completion:
                flag:
                    endpoint-type:
                        - eventhub
                        - servicebusqueue
                        - servicebustopic
                        - azurestoragecontainer
            - name: delete
              description: Delete all or mentioned endpoint for your IoT Hub.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --hub-name=: IoT Hub name.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --endpoint-name=: Name of the Routing Endpoint.
                -t, --endpoint-type=: Type of the Routing Endpoint.
              completion:
                flag:
                    endpoint-type:
                        - eventhub
                        - servicebusqueue
                        - servicebustopic
                        - azurestoragecontainer
            - name: create
              description: Add an endpoint to your IoT Hub.
              flags:
                --auth-type=: Authentication type for the endpoint.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --container-name=: Name of the storage container.
                --encoding=: Encoding format for the container.
                --endpoint-uri=: The uri of the endpoint resource.
                --entity-path=: The entity path of the endpoint resource.
                --file-name-format=: File name format for the blob.
                --hub-name=!: IoT Hub name.
                --identity=: Use a system-assigned or user-assigned managed identity for endpoint authentication.
                --subscription=: Name or ID of subscription.
                -b, --batch-frequency=: Request batch frequency in seconds.
                -c, --connection-string=: Connection string of the Routing Endpoint.
                -g, --resource-group=: Name of resource group.
                -n, --endpoint-name=!: Name of the Routing Endpoint.
                -r, --endpoint-resource-group=!: Resource group of the Endpoint resoure.
                -s, --endpoint-subscription-id=!: SubscriptionId of the Endpoint resource.
                -t, --endpoint-type=!: Type of the Routing Endpoint.
                -w, --chunk-size=: Request chunk size in megabytes(MB).
              completion:
                flag:
                    auth-type:
                        - keyBased
                        - identityBased
                    encoding:
                        - json
                        - avro
                    endpoint-type:
                        - eventhub
                        - servicebusqueue
                        - servicebustopic
                        - azurestoragecontainer
        - name: create
          description: Create an Azure IoT hub.
          flags:
            --c2d-max-delivery-count=: The number of times the IoT hub will attempt to deliver a cloud-to-device message to a device, between 1 and 100.
            --c2d-ttl=: The amount of time a message is available for the device to consume before it is expired by IoT Hub, between 1 and 48 hours.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --disable-device-sas=:
                description: A boolean indicating whether or not to disable all device (including Edge devices but excluding modules) scoped SAS keys for authentication
                nargs: -1
            --disable-local-auth=:
                description: A boolean indicating whether or not to disable IoT hub scoped SAS keys for authentication.
                nargs: -1
            --disable-module-sas=:
                description: A boolean indicating whether or not to disable module-scoped SAS keys for authentication.
                nargs: -1
            --enforce-data-residency=:
                description: Enforce data residency for this IoT Hub by disabling cross-region disaster recovery.
                nargs: -1
            --feedback-lock-duration=: The lock duration for the feedback queue, between 5 and 300 seconds.
            --feedback-max-delivery-count=: The number of times the IoT hub attempts to deliver a message on the feedback queue, between 1 and 100.
            --feedback-ttl=: The period of time for which the IoT hub will maintain the feedback for expiration or delivery of cloud-to-device messages, between 1 and 48 hours.
            --fileupload-notification-lock-duration=: The lock duration for the file upload notifications queue, between 5 and 300 seconds.
            --fileupload-notification-max-delivery-count=: The number of times the IoT hub will attempt to deliver a file notification message, between 1 and 100.
            --fileupload-notification-ttl=: The amount of time a file upload notification is available for the service to consume before it is expired by IoT Hub, between 1 and 48 hours.
            --fileupload-notifications=:
                description: A boolean indicating whether to log information about uploaded files to the messages/servicebound/filenotifications IoT Hub endpoint.
                nargs: -1
            --fileupload-sas-ttl=: The amount of time a SAS URI generated by IoT Hub is valid before it expires, between 1 and 24 hours.
            --fileupload-storage-auth-type=: The authentication type for the Azure Storage account to which files are uploaded.
            --fileupload-storage-connectionstring=: The connection string for the Azure Storage account to which files are uploaded.
            --fileupload-storage-container-name=: The name of the root container where you upload files.
            --fileupload-storage-identity=: The managed identity to use for file upload authentication.
            --mi-system-assigned=:
                description: Enable system-assigned managed identity for this hub
                nargs: -1
            --mi-user-assigned=:
                description: Enable user-assigned managed identities for this hub.
                nargs: -1
            --min-tls-version=: Specify the minimum TLS version to support for this hub.
            --no-wait=: Do not wait for the long-running operation to finish.
            --partition-count=: The number of partitions of the backing Event Hub for device-to-cloud messages.
            --retention-day=: Specifies how long this IoT hub will maintain device-to-cloud events, between 1 and 7 days.
            --role=: Role to assign to the hub's system-assigned managed identity.
            --scopes=:
                description: Space separated list of scopes to assign the role (--role) for the system-assigned managed identity.
                nargs: -1
            --sku=: Pricing tier for Azure IoT Hub.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --unit=: Units in your IoT Hub.
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Location of your IoT Hub.
            -n, --name=!: IoT Hub name.
          completion:
            flag:
