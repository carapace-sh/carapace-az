# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: sshkey
description: sshkey
commands:
    - name: create
      flags:
        --encryption-type=: The encryption type of the SSH keys to be generated.
        --public-key=: SSH public key used to authenticate to a virtual machine through ssh.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: The name of the SSH public key.
      completion:
        flag:
            encryption-type:
                - RSA
                - Ed25519
    - name: delete
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the SSH public key.
        -y, --yes=: Do not prompt for confirmation.
    - name: list
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: show
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the SSH public key.
    - name: update
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --public-key=: SSH public key used to authenticate to a virtual machine through ssh.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the SSH public key.
