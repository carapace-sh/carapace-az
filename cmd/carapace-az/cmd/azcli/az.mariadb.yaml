# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: mariadb
description: mariadb
commands:
    - name: db
      commands:
        - name: list
          description: List all the databases in a given server.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -s, --server-name=!: Name of the Server.
        - name: delete
          description: Deletes a database.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the database
            -s, --server-name=: Name of the server.
            -y, --yes=: Do not prompt for confirmation.
        - name: show
          description: Gets information about a database.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the database
            -s, --server-name=: Name of the server.
        - name: create
          flags:
            --charset=: The charset of the database
            --collation=: The collation of the database
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the database
            -s, --server-name=!: Name of the server.
    - name: server
      commands:
        - name: list
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: wait
          flags:
            --__CREATED=:
                description: ==SUPPRESS==
                nargs: -1
            --__DELETED=:
                description: ==SUPPRESS==
                nargs: -1
            --__UPDATED=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the server.
        - name: georestore
          flags:
            --backup-retention=: The number of days a backup is retained.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --geo-redundant-backup=: Enable or disable geo-redundant backups.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --sku-name=: The name of the sku.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -l, --location=!: Location.
            -n, --name=: Name of the server.
            -s, --source-server=!: The name or ID of the source server to restore from.
        - name: stop
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the server.
        - name: firewall-rule
          commands:
            - name: create
              flags:
                --end-ip-address=!: The end IP address of the firewall rule.
                --start-ip-address=!: The start IP address of the firewall rule.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: The name of the firewall rule.
                -s, --server-name=!: Name of the server.
            - name: delete
              description: Deletes a server firewall rule.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the firewall rule.
                -s, --server-name=: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
            - name: update
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --end-ip-address=: The end IP address of the firewall rule.
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --start-ip-address=: The start IP address of the firewall rule.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the firewall rule.
                -s, --server-name=: Name of the server.
            - name: list
              description: List all the firewall rules in a given server.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the server.
            - name: show
              description: Gets information about a server firewall rule.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the firewall rule.
                -s, --server-name=: Name of the server.
        - name: update
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --assign-identity=:
                description: Generate and assign an Microsoft Entra Identity for this server for use with key management services like Azure KeyVault.
                nargs: -1
            --auto-grow=: Enable or disable autogrow of the storage.
            --backup-retention=: The number of days a backup is retained.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --minimal-tls-version=: Set the minimal TLS version for connections to server when SSL is enabled.
            --public-network-access=: Enable or disable public network access to server.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --sku-name=: The name of the sku.
            --ssl-enforcement=: Enable or disable ssl enforcement for connections to server.
            --storage-size=: The storage capacity of the server (unit is megabytes).
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the server.
            -p, --admin-password=: The password of the administrator.
          completion:
            flag:
                auto-grow:
                    - Enabled
                    - Disabled
                minimal-tls-version:
                    - TLS1_0
                    - TLS1_1
                    - TLS1_2
                    - TLSEnforcementDisabled
                ssl-enforcement:
                    - Enabled
                    - Disabled
        - name: replica
          commands:
            - name: stop
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the server.
                -y, --yes=: Do not prompt for confirmation.
            - name: list
              description: List all the replicas for a given server.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the master server.
            - name: create
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --sku-name=: The name of the sku.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -l, --location=: Location.
                -n, --name=!: Name of the server.
                -s, --source-server=!: The name or resource ID of the master server to the create replica for.
        - name: start
          description: Starts a stopped server.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the server.
        - name: show
          description: Gets information about a server.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the server.
        - name: private-endpoint-connection
          commands:
            - name: reject
              description: Reject a private endpoint connection request for a server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --description=: Comments for reject operation.
                --id=: The ID of the private endpoint connection associated with the Server.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: The resource group name of specified server.
                -n, --name=: The name of the private endpoint connection associated with the Server.
                -s, --server-name=: Name of the Server.
            - name: show
              description: Gets a private endpoint connection.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=: The ID of the private endpoint connection associated with the Server.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: The resource group name of specified server.
                -n, --name=: The name of the private endpoint connection associated with the Server.
                -s, --server-name=: Name of the Server.
            - name: delete
              description: Deletes a private endpoint connection with a given name.
              flags:
                --id=: The ID of the private endpoint connection associated with the Server.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: The resource group name of specified server.
                -n, --name=: The name of the private endpoint connection associated with the Server.
                -s, --server-name=: Name of the Server.
            - name: approve
              description: Approve a private endpoint connection request for a server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --description=: Comments for approve operation.
                --id=: The ID of the private endpoint connection associated with the Server.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: The resource group name of specified server.
                -n, --name=: The name of the private endpoint connection associated with the Server.
                -s, --server-name=: Name of the Server.
        - name: restart
          description: Restarts a server.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the server.
        - name: vnet-rule
          commands:
            - name: delete
              description: Deletes the virtual network rule with the given name.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the vnet rule.
                -s, --server-name=: Name of the server.
            - name: update
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subnet=!: Name or ID of the subnet that allows access to an Azure Postgres Server.
                --subscription=: Name or ID of subscription.
                --vnet-name=: The virtual network name
                -g, --resource-group=: Name of resource group.
                -i, --ignore-missing-endpoint=:
                    description: Create vnet rule before virtual network has vnet service endpoint enabled
                    nargs: -1
                -n, --name=: The name of the vnet rule.
                -s, --server-name=: Name of the server.
              completion:
                flag:
                    ignore-missing-endpoint:
                        - "true"
                        - "false"
            - name: show
              description: Gets a virtual network rule.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the vnet rule.
                -s, --server-name=: Name of the server.
            - name: create
              flags:
                --subnet=!: Name or ID of the subnet that allows access to an Azure Postgres Server.
                --subscription=: Name or ID of subscription.
                --vnet-name=: The virtual network name
                -g, --resource-group=!: Name of resource group.
                -i, --ignore-missing-endpoint=:
                    description: Create vnet rule before virtual network has vnet service endpoint enabled
                    nargs: -1
                -n, --name=!: The name of the vnet rule.
                -s, --server-name=!: Name of the server.
              completion:
                flag:
                    ignore-missing-endpoint:
                        - "true"
                        - "false"
            - name: list
              description: Gets a list of virtual network rules in a server.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the server.
        - name: configuration
          commands:
            - name: list
              description: List all the configurations in a given server.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the server.
            - name: show
              description: Gets information about a configuration of server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the server configuration.
                -s, --server-name=: Name of the server.
            - name: set
              flags:
                --__SOURCE=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --value=: Value of the configuration.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the configuration
                -s, --server-name=: Name of the server.
        - name: restore
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --restore-point-in-time=!: The point in time in UTC to restore from (ISO8601 format), e.g., 2017-04-26T02:10:00+08:00
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the server.
            -s, --source-server=!: The name or resource ID of the source server to restore from.
        - name: list-skus
          description: List all the performance tiers at specified location in a given subscription.
          flags:
            --subscription=: Name or ID of subscription.
            -l, --location=!: The name of the location.
        - name: private-link-resource
          commands:
            - name: list
              description: Gets the private link resources for MariaDB server.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -s, --server-name=: Name of the Server.
        - name: create
          flags:
            --assign-identity=:
                description: Generate and assign an Microsoft Entra Identity for this server for use with key management services like Azure KeyVault.
                nargs: -1
            --auto-grow=: Enable or disable autogrow of the storage.
            --backup-retention=: The number of days a backup is retained.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --geo-redundant-backup=: Enable or disable geo-redundant backups.
            --minimal-tls-version=: Set the minimal TLS version for connections to server when SSL is enabled.
            --public-network-access=: Enable or disable public network access to server.
            --sku-name=: The name of the sku.
            --ssl-enforcement=: Enable or disable ssl enforcement for connections to server.
            --storage-size=: The storage capacity of the server (unit is megabytes).
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --version=: Server major version.
            -g, --resource-group=: Name of resource group.
            -i, --infrastructure-encryption=:
                description: Add an optional second layer of encryption for data using new encryption algorithm.
                nargs: -1
            -l, --location=: Location.
            -n, --name=: Name of the server.
            -p, --admin-password=: The password of the administrator.
            -u, --admin-user=: Administrator username for the server.
          completion:
            flag:
                auto-grow:
                    - Enabled
                    - Disabled
                geo-redundant-backup:
                    - Enabled
                    - Disabled
                infrastructure-encryption:
                    - Enabled
                    - Disabled
                minimal-tls-version:
                    - TLS1_0
                    - TLS1_1
                    - TLS1_2
                    - TLSEnforcementDisabled
                ssl-enforcement:
                    - Enabled
                    - Disabled
        - name: delete
          description: Deletes a server.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the server.
            -y, --yes=: Do not prompt for confirmation.
        - name: show-connection-string
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -d, --database-name=: The name of a database.
            -p, --admin-password=: The login password of the administrator.
            -s, --server-name=: Name of the server.
            -u, --admin-user=: The login username of the administrator.
    - name: server-logs
      commands:
        - name: download
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!:
                description: Space-separated list of log filenames on the server to download.
                nargs: -1
            -s, --server-name=: Name of the server.
        - name: list
          flags:
            --file-last-written=: Integer in hours to indicate file last modify time, default value is 72.
            --filename-contains=: The pattern that file name should match.
            --max-file-size=: The file size limitation to filter files.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -s, --server-name=!: Name of the Server.
