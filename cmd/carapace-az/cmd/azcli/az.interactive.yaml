# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: interactive
description: interactive
commands:
    - name: interactive
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --update=: Update the Interactive extension to the latest available.
        -s, --style=: The colors of the shell.
      completion:
        flag:
            style:
                - quiet
                - purple
                - default
                - none
                - contrast
                - pastel
                - halloween
                - grey
                - br
                - bg
                - primary
                - neon
