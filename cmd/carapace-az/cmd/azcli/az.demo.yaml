# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: demo
description: demo
commands:
    - name: byo-access-token
      flags:
        --access-token=!: Your own access token
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription-id=!: Subscription ID under which to list resource groups
        --subscription=: Name or ID of subscription.
    - name: secret-store
      commands:
        - name: save
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
        - name: load
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
    - name: style
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        --theme=: The theme to format styled text.
      completion:
        flag:
            theme:
                - dark
                - light
                - cloud-shell
                - none
