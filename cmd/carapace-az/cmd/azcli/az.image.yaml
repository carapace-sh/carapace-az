# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: image
description: Manage custom virtual machine images.
commands:
    - name: builder
      description: Manage and build image builder templates.
      commands:
        - name: optimizer
          description: Manage image builder template optimizer.
          commands:
            - name: add
              description: Add optimizer to an existing image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --enable-vm-boot=:
                    description: If this parameter is set to true, VM boot time will be improved by optimizing the final customized image output.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
              completion:
                flag:
                    enable-vm-boot:
                        - "true"
                        - "false"
            - name: show
              description: Show optimizer of an existing image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
            - name: remove
              description: Remove optimizer from an existing image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
            - name: update
              description: Update an optimizer from an existing image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --enable-vm-boot=:
                    description: If this parameter is set to true, VM boot time will be improved by optimizing the final customized image output.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
              completion:
                flag:
                    enable-vm-boot:
                        - "true"
                        - "false"
        - name: trigger
          description: Manage image builder template trigger.
          commands:
            - name: delete
              description: Delete a trigger for the specified virtual machine image template
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --image-template-name=: The name of the image Template
                --no-wait=:
                    description: Do not wait for the long-running operation to finish.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the trigger
                -y, --yes=: Do not prompt for confirmation.
              completion:
                flag:
                    no-wait:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
            - name: wait
              description: Place the CLI in a waiting state until a condition is met.
              flags:
                --created=: wait until created with 'provisioningState' at 'Succeeded'
                --custom=: Wait until the condition satisfies a custom JMESPath query.
                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --image-template-name=: The name of the image Template
                --interval=: polling interval in seconds
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the trigger
            - name: list
              description: List all triggers for the specified Image Template resource
              flags:
                --image-template-name=!: The name of the image Template
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: show
              description: Get the specified trigger for the specified image template resource
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --image-template-name=: The name of the image Template
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the trigger
            - name: create
              description: Create a trigger for the specified virtual machine image template
              flags:
                --image-template-name=!: The name of the image Template
                --kind=: The kind of trigger.
                --no-wait=:
                    description: Do not wait for the long-running operation to finish.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: The name of the trigger
              completion:
                flag:
                    kind:
                        - SourceImage
                    no-wait:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
        - name: customizer
          description: Manage image builder template customizers.
          commands:
            - name: clear
              description: Remove all image builder customizers from an image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
            - name: remove
              description: Remove an image builder customizer from an image builder template.
              flags:
                --customizer-name=!: Name of the customizer.
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
            - name: add
              description: Add an image builder customizer to an image builder template.
              flags:
                --customizer-name=!: Name of the customizer.
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --dest-path=: The absolute destination path where the file specified in --file-source will be downloaded to in the image
                --file-source=: The URI of the file to be downloaded into the image.
                --filters=:
                    description: Space delimited filters to select updates to apply.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --inline-script=:
                    description: Space-separated list of inline script lines to customize the image with.
                    nargs: -1
                --restart-check-command=: Command to verify that restart succeeded.
                --restart-command=: Command to execute the restart operation.
                --restart-timeout=: Restart timeout specified as a string consisting of a magnitude and unit, e.g. '5m' (5 minutes) or '2h' (2 hours)
                --script-url=: URL of script to customize the image with.
                --search-criteria=: Criteria to search updates.
                --subscription=: Name or ID of subscription.
                --update-limit=: Maximum number of updates to apply at a time.
                -e, --exit-codes=:
                    description: Space-separated list of valid exit codes, as integers
                    nargs: -1
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
                -t, --type=!: Type of customizer to be added to the image template.
              completion:
                flag:
                    type:
                        - shell
                        - powershell
                        - windows-restart
                        - windows-update
                        - file
        - name: output
          description: Manage image builder template output distributors.
          commands:
            - name: versioning
              description: Manage image builder template output versioner.
              commands:
                - name: set
                  description: Set the image builder output versioner of an image builder template.
                  flags:
                    --defer=:
                        description: Temporarily store the object in the local cache instead of sending to Azure.
                        nargs: -1
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --major=: Major version for the generated version number.
                    --output-name=!: Name of the image builder run output.
                    --scheme=!: Version numbering scheme to be used.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: The name of the image template.
                  completion:
                    flag:
                        scheme:
                            - Latest
                            - Source
                - name: show
                  description: Show versioning options on specified outputs.
                  flags:
                    --defer=:
                        description: Temporarily store the object in the local cache instead of sending to Azure.
                        nargs: -1
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --output-name=!: Name of the image builder run output.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: The name of the image template.
                - name: remove
                  description: Remove all versioning options on specified outputs.
                  flags:
                    --defer=:
                        description: Temporarily store the object in the local cache instead of sending to Azure.
                        nargs: -1
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --output-name=!: Name of the image builder run output.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: The name of the image template.
            - name: add
              description: Add an image builder output distributor to an image builder template.
              flags:
                --artifact-tags=:
                    description: Tags that will be applied to the output artifact once it has been created by the distributor.
                    nargs: -1
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --gallery-image-definition=: Name or ID of the existing SIG image definition to create the customized image version with.
                --gallery-name=: Shared image gallery name, if image definition name and not ID was provided.
                --gallery-replication-regions=:
                    description: Space-separated list of regions to replicate the image version into.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --is-vhd=: The output is a VHD distributor.
                --managed-image-location=: Location where the customized image will be created.
                --managed-image=: Name or ID of the customized managed image to be created.
                --output-name=: Name of the image builder run output.
                --subscription=: Name or ID of subscription.
                --versioning=: Describe how to generate new x.y.z version number for distribution.
                --vhd-uri=: Optional Azure Storage URI for the distributed VHD blob.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
              completion:
                flag:
                    versioning:
                        - Latest
                        - Source
            - name: remove
              description: Remove an image builder output distributor from an image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --output-name=!: Name of the image builder run output.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
            - name: clear
              description: Remove all image builder output distributors from an image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
        - name: update
          description: Update an image builder template.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --defer=:
                description: Temporarily store the object in the local cache instead of sending to Azure.
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the image template.
        - name: delete
          description: Delete a virtual machine image template.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the image template.
        - name: identity
          description: Manage identities of an image builder template.
          commands:
            - name: remove
              description: Remove managed identities from an existing image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --user-assigned=:
                    description: Specify one user assigned identity (name or ID, space delimited) of the image template.
                    nargs: -1
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
                -y, --yes=: Do not prompt for confirmation.
            - name: show
              description: Display managed identities of a image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
            - name: assign
              description: Add managed identities to an existing image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --user-assigned=:
                    description: Specify one user assigned identity (name or ID, space delimited) of the image template.
                    nargs: -1
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
        - name: show-runs
          description: Show an image builder template's run outputs.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --output-name=: Name of the image builder run output.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the image template.
        - name: validator
          description: Manage image builder template validate.
          commands:
            - name: add
              description: Add validate to an existing image builder template.
              flags:
                --continue-distribute-on-failure=:
                    description: If validation fails and this parameter is set to false, output image(s) will not be distributed.
                    nargs: -1
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --source-validation-only=:
                    description: If this parameter is set to true, the image specified in the 'source' section will directly be validated.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
              completion:
                flag:
                    continue-distribute-on-failure:
                        - "true"
                        - "false"
                    source-validation-only:
                        - "true"
                        - "false"
            - name: show
              description: Show validate of an existing image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
            - name: remove
              description: Remove validate from an existing image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
        - name: show
          description: Get information about a virtual machine image template.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the image template.
        - name: error-handler
          description: Manage image builder template error handler.
          commands:
            - name: add
              description: Add error handler to an existing image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --on-customizer-error=: If there is a customizer error and this field is set to "cleanup", the build VM and associated network resources will be cleaned up.
                --on-validation-error=: If there is a validation error and this field is set to "cleanup", the build VM and associated network resources will be cleaned up.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
              completion:
                flag:
                    on-customizer-error:
                        - cleanup
                        - abort
                    on-validation-error:
                        - cleanup
                        - abort
            - name: remove
              description: Remove error handler from an existing image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
            - name: show
              description: Show error handler of an existing image builder template.
              flags:
                --defer=:
                    description: Temporarily store the object in the local cache instead of sending to Azure.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the image template.
        - name: cancel
          description: Cancel the long running image build based on the image template.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the image template.
        - name: list
          description: List image builder templates.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: wait
          description: Place the CLI in a waiting state until a condition of the template is met.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the image template.
        - name: run
          description: Create artifacts from a existing image template.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the image template.
        - name: create
          description: Create an image builder template.
          flags:
            --build-timeout=: The Maximum duration to wait while building the image template, in minutes.
            --build-vm-identities=:
                description: Optional configuration of the virtual network to use to deploy the build virtual machine in.
                nargs: -1
            --checksum=: The SHA256 checksum of the Red Hat ISO image
            --defer=:
                description: Temporarily store the object in the local cache instead of sending to Azure.
                nargs: -1
            --identity=:
                description: List of user assigned identities (name or ID, space delimited) of the image template.
                nargs: -1
            --image-template=: Local path or URL to an image template file.
            --managed-image-destinations=:
                description: Managed image output distributor information.
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --os-disk-size=: Size of the OS disk in GB.
            --proxy-vm-size=: Size of the virtual machine used to build, customize and capture images (Standard_D1_v2 for Gen1 images and Standard_D2ds_v4 for Gen2 images).
            --scripts=:
                description: Space-separated list of shell or powershell scripts to customize the image with.
                nargs: -1
            --shared-image-destinations=:
                description: Shared image gallery (sig) output distributor information.
                nargs: -1
            --staging-resource-group=: The staging resource group id in the same subscription as the image template that will be used to build the image.
            --subnet=: Name or ID of subnet to deploy the build virtual machine
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --validator=:
                description: The type of validation you want to use on the Image.
                nargs: -1
            --vm-size=: Size of the virtual machine used to build, customize and capture images.
            --vnet=: Name of VNET to deploy the build virtual machine.
            -g, --resource-group=!: Name of resource group.
            -i, --image-source=: The base image to customize.
            -l, --location=: Location.
            -n, --name=!: The name of the image template.
    - name: create
      description: Create a custom Virtual Machine Image from managed disks or snapshots.
      flags:
        --data-disk-caching=: Storage caching type for the image's data disk.
        --data-disk-sources=:
            description: Space-separated list of data disk sources, including unmanaged blob URI, managed disk ID or name, or snapshot ID or name
            nargs: -1
        --edge-zone=: The name of edge zone.
        --hyper-v-generation=: The hypervisor generation of the Virtual Machine created from the image.
        --os-disk-caching=: Storage caching type for the image's OS disk.
        --os-type=: ""
        --source=!: OS disk source from the same region, including a virtual machine ID or name, OS disk blob URI, managed OS disk ID or name, or OS snapshot ID or name
        --storage-sku=: The SKU of the storage account with which to create the VM image.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --zone-resilient=:
            description: Specifies whether an image is zone resilient or not.
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: new image name
      completion:
        flag:
            data-disk-caching:
                - None
                - ReadOnly
                - ReadWrite
            hyper-v-generation:
                - V1
                - V2
            os-disk-caching:
                - None
                - ReadOnly
                - ReadWrite
            os-type:
                - Windows
                - Linux
            storage-sku:
                - Standard_LRS
                - Premium_LRS
                - StandardSSD_LRS
                - UltraSSD_LRS
                - Premium_ZRS
                - StandardSSD_ZRS
                - PremiumV2_LRS
            zone-resilient:
                - "true"
                - "false"
    - name: delete
      description: Delete an Image.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the image.
      completion:
        flag:
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
