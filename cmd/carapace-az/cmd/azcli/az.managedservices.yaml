# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: managedservices
description: Manage the registration assignments and definitions in Azure.
commands:
    - name: assignment
      description: Manage the registration assignments in Azure.
      commands:
        - name: delete
          description: Delete a registration assignment.
          flags:
            --assignment=!: The identifier (guid) or the fully qualified resource id of the registration assignment.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: show
          description: Show registration assignment.
          flags:
            --assignment=!: The identifier (guid) or the fully qualified resource id of the registration assignment.
            --include-definition=:
                description: Tells whether to return registration definition details also along with registration assignment details.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
          completion:
            flag:
                include-definition:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: create
          description: Create a registration assignment.
          flags:
            --assignment-id=: Can be used to override the generated registration assignment id.
            --definition=!: Fully qualified path of the registration definition.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: list
          description: List all the registration assignments.
          flags:
            --include-definition=:
                description: Tells whether to return registration definition details also along with registration assignment details.
                nargs: -1
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
          completion:
            flag:
                include-definition:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --assignment=!: The identifier (guid) or the fully qualified resource id of the registration assignment.
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --include-definition=:
                description: Tells whether to return registration definition details also along with registration assignment details.
                nargs: -1
            --interval=: polling interval in seconds
            --scope=!: Scope of the resource.
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
          completion:
            flag:
                include-definition:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
    - name: definition
      description: Manage the registration definitions in Azure.
      commands:
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --definition=!: Guid of the registration definition.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --interval=: polling interval in seconds
            --scope=!: Scope of the resource.
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
        - name: show
          description: Show the registration definition details.
          flags:
            --definition=!: Guid of the registration definition.
            --subscription=: Name or ID of subscription.
        - name: list
          description: List all the registration definitions under the default scope or under the subscription provided.
          flags:
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --subscription=: Name or ID of subscription.
        - name: delete
          description: Delete a registration definition.
          flags:
            --definition=!: Guid of the registration definition.
            --subscription=: Name or ID of subscription.
            -y, --yes=: Do not prompt for confirmation.
        - name: create
          description: Create a registration definition.
          flags:
            --definition-id=: Guid of the registration definition.
            --description=: Description of the registration definition.
            --name=!: Name of the registration definition.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --plan-name=: The plan name.
            --plan-product=: The product code.
            --plan-publisher=: The publisher ID.
            --plan-version=: The plan's version.
            --principal-id=!: The principal id.
            --role-definition-id=!: The role definition id.
            --subscription=: Name or ID of subscription.
            --tenant-id=!: Id of the managedBy tenant.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
