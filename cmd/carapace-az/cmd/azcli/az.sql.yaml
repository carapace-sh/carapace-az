# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: sql
description: Manage Azure SQL Databases and Data Warehouses.
commands:
    - name: db
      description: Manage databases.
      commands:
        - name: replica
          description: Manage replication between databases.
          commands:
            - name: list-links
              description: Gets a list of replication links on database.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the Azure SQL Database.
                -s, --server=: Name of the Azure SQL Server.
            - name: create
              description: Creates a secondary replica DB (i.e. create with 'Secondary' create mode.)
              flags:
                --auto-pause-delay=: Time in minutes after which database is automatically paused.
                --availability-zone=: Availability zone
                --backup-storage-redundancy=: Backup storage redundancy used to store backups.
                --compute-model=: The compute model of the database.
                --elastic-pool=: The name or resource id of the elastic pool to create the database in.
                --encryption-protector-auto-rotation=:
                    description: Specifies the database encryption protector key auto rotation flag.
                    nargs: -1
                --encryption-protector=: Specifies the Azure key vault key to be used as database encryption protector key.
                --federated-client-id=: The federated client id for the SQL Database.
                --keys=:
                    description: The list of AKV keys for the SQL Database.
                    nargs: -1
                --license-type=: The license type to apply for this database.``LicenseIncluded`` if you need a license, or ``BasePrice``if you have a license and are eligible for the Azure HybridBenefit.
                --min-capacity=: Minimal capacity that database will always have allocated, if not paused
                --no-wait=: Do not wait for the long-running operation to finish.
                --partner-database=: Name of the new replica.
                --partner-resource-group=: Name of the resource group to create the new replica in.
                --partner-server=!: Name of the server to create the new replica in.
                --preferred-enclave-type=: Specifies type of enclave for this resource.
                --read-replicas=: The number of high availability replicas to provision for the database.
                --read-scale=: If enabled, connections that have application intent set to readonly in their connection string may be routed to a readonly secondary replica.
                --secondary-type=: Type of secondary to create.
                --service-objective=: The service objective for the new database.
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: 'space-separated tags: key[=value] [key[=value] ...].'
                    nargs: -1
                --user-assigned-identity-id=:
                    description: The list of user assigned identity for the SQL Database.
                    nargs: -1
                -c, --capacity=: The capacity component of the sku in integer number of DTUs or vcores.
                -f, --family=: The compute generation component of the sku (for vcore skus only).
                -g, --resource-group=!: Name of resource group.
                -i, --assign-identity=:
                    description: Assign identity for database.
                    nargs: -1
                -n, --name=!: Name of the Azure SQL Database.
                -s, --server=!: Name of the Azure SQL Server.
                -z, --zone-redundant=:
                    description: Specifies whether to enable zone redundancy.
                    nargs: -1
              completion:
                flag:
                    assign-identity:
                        - "true"
                        - "false"
                    compute-model:
                        - Provisioned
                        - Serverless
                    encryption-protector-auto-rotation:
                        - "true"
                        - "false"
                    license-type:
                        - LicenseIncluded
                        - BasePrice
                    preferred-enclave-type:
                        - Default
                        - VBS
                    read-scale:
                        - Enabled
                        - Disabled
                    zone-redundant:
                        - "true"
                        - "false"
            - name: delete-link
              description: Deletes a replication link.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --partner-resource-group=: Name of the resource group that the other replica is in.
                --partner-server=!: Name of the server that the other replica is in.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the Azure SQL Database.
                -s, --server=: Name of the Azure SQL Server.
                -y, --yes=: Do not prompt for confirmation.
            - name: set-primary
              description: Fails over a database by setting the specified database as the new primary.
              flags:
                --allow-data-loss=: If specified, the failover operation will allow data loss.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of the resource group containing the secondary replica that will become the new primary.
                -n, --name=: Name of the database to fail over.
                -s, --server=: Name of the server containing the secondary replica that will become the new primary.
        - name: ltr-backup
          description: Manage SQL database long term retention backups.
          commands:
            - name: restore
              description: Restores an existing database (i.e. create with 'RestoreLongTermRetentionBackup' create mode.)
              flags:
                --auto-pause-delay=: Time in minutes after which database is automatically paused.
                --availability-zone=: Availability zone
                --backup-id=!: The resource id of the long term retention backup to be restored.
                --backup-storage-redundancy=: Backup storage redundancy used to store backups.
                --compute-model=: The compute model of the database.
                --dest-database=!: Name of the database that will be created as the restore destination.
                --dest-resource-group=!: Name of the resource group of the server to restore database to.
                --dest-server=!: Name of the server to restore database to.
                --elastic-pool=: The name or resource id of the elastic pool to create the database in.
                --encryption-protector-auto-rotation=:
                    description: Specifies the database encryption protector key auto rotation flag.
                    nargs: -1
                --encryption-protector=: Specifies the Azure key vault key to be used as database encryption protector key.
                --federated-client-id=: The federated client id for the SQL Database.
                --keys=:
                    description: The list of AKV keys for the SQL Database.
                    nargs: -1
                --license-type=: The license type to apply for this database.``LicenseIncluded`` if you need a license, or ``BasePrice``if you have a license and are eligible for the Azure HybridBenefit.
                --min-capacity=: Minimal capacity that database will always have allocated, if not paused
                --no-wait=: Do not wait for the long-running operation to finish.
                --preferred-enclave-type=: Specifies type of enclave for this resource.
                --read-replicas=: The number of high availability replicas to provision for the database.
                --read-scale=: If enabled, connections that have application intent set to readonly in their connection string may be routed to a readonly secondary replica.
                --service-objective=: The service objective for the new database.
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: 'space-separated tags: key[=value] [key[=value] ...].'
                    nargs: -1
                --user-assigned-identity-id=:
                    description: The list of user assigned identity for the SQL Database.
                    nargs: -1
                -c, --capacity=: The capacity component of the sku in integer number of DTUs or vcores.
                -e, --tier=: The edition component of the sku.
                -f, --family=: The compute generation component of the sku (for vcore skus only).
                -i, --assign-identity=:
                    description: Assign identity for database.
                    nargs: -1
                -z, --zone-redundant=:
                    description: Specifies whether to enable zone redundancy.
                    nargs: -1
              completion:
                flag:
                    assign-identity:
                        - "true"
                        - "false"
                    compute-model:
                        - Provisioned
                        - Serverless
                    encryption-protector-auto-rotation:
                        - "true"
                        - "false"
                    license-type:
                        - LicenseIncluded
                        - BasePrice
                    preferred-enclave-type:
                        - Default
                        - VBS
                    read-scale:
                        - Enabled
                        - Disabled
                    zone-redundant:
                        - "true"
                        - "false"
            - name: list
              description: Lists the long term retention backups for a specified location, instance, or database.
              flags:
                --database-state=: '''All'', ''Live'', or ''Deleted''.'
                --only-latest-per-database=: If true, will only return the latest backup for each database
                --subscription=: Name or ID of subscription.
                -d, --database=: Name of the Azure SQL Database.
                -g, --resource-group=: Name of resource group.
                -l, --location=!: The location of the desired backups.
                -s, --server=: Name of the Azure SQL Server.
            - name: delete
              description: Deletes a long term retention backup.
              flags:
                --subscription=: Name or ID of subscription.
                -d, --database=!: Name of the Azure SQL Database.
                -l, --location=!: The location of the desired backups.
                -n, --name=!: The name of the LTR backup.
                -s, --server=!: Name of the Azure SQL Server.
                -y, --yes=: Do not prompt for confirmation.
            - name: wait
              description: Place the CLI in a waiting state until a condition of the database is met.
              flags:
                --created=: wait until created with 'provisioningState' at 'Succeeded'
                --custom=: Wait until the condition satisfies a custom JMESPath query.
                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --expand=: The child resources to include in the response.
                --filter=: An OData filter expression that filters elements in the collection.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --interval=: polling interval in seconds
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the Azure SQL Database.
                -s, --server=: Name of the Azure SQL Server.
            - name: show
              description: Gets a long term retention backup.
              flags:
                --subscription=: Name or ID of subscription.
                -d, --database=!: Name of the Azure SQL Database.
                -l, --location=!: The location of the desired backups.
                -n, --name=!: The name of the LTR backup.
                -s, --server=!: Name of the Azure SQL Server.
        - name: rename
          description: Renames a DB.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --new-name=!: The new name that the database will be renamed to.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Azure SQL Database.
            -s, --server=: Name of the Azure SQL Server.
        - name: str-policy
          description: Manage SQL database short term retention policy.
          commands:
            - name: set
              description: Updates short term retention for live database
              flags:
                --diffbackup-hours=: New backup short term retention policy differential backup interval in hours.Valid differential backup interval for live database can be 12 or 24 hours.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --retention-days=!: New backup short term retention policy retention in days.Valid retention days for live database of (DTU) Basic can be 1-7 days; Rest models can be 1-35 days.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the Azure SQL Database.
                -s, --server=: Name of the Azure SQL Server.
            - name: wait
              description: Place the CLI in a waiting state until the policy is set.
              flags:
                --created=: wait until created with 'provisioningState' at 'Succeeded'
                --custom=: Wait until the condition satisfies a custom JMESPath query.
                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --interval=: polling interval in seconds
                --policy-name=!: The policy name.
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the Azure SQL Database.
                -s, --server=: Name of the Azure SQL Server.
            - name: show
              description: Gets short term retention for live database
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the Azure SQL Database.
                -s, --server=: Name of the Azure SQL Server.
        - name: geo-backup
          description: Manage SQL database geo redundant backups.
          commands:
            - name: restore
              description: Restores an existing database (i.e. create with 'recovery' create mode.)
              flags:
                --auto-pause-delay=: Time in minutes after which database is automatically paused.
                --availability-zone=: Availability zone
                --backup-storage-redundancy=: Backup storage redundancy used to store backups.
                --compute-model=: The compute model of the database.
                --dest-database=!: Name of the database that will be created as the restore destination.
                --dest-server=!: Name of the server to restore database to.
                --elastic-pool=: The name or resource id of the elastic pool to create the database in.
                --encryption-protector-auto-rotation=:
                    description: Specifies the database encryption protector key auto rotation flag.
                    nargs: -1
                --encryption-protector=: Specifies the Azure key vault key to be used as database encryption protector key.
                --federated-client-id=: The federated client id for the SQL Database.
                --geo-backup-id=!: The resource id of the geo-redundant backup to be restored.
                --keys=:
                    description: The list of AKV keys for the SQL Database.
                    nargs: -1
                --license-type=: The license type to apply for this database.``LicenseIncluded`` if you need a license, or ``BasePrice``if you have a license and are eligible for the Azure HybridBenefit.
                --min-capacity=: Minimal capacity that database will always have allocated, if not paused
                --preferred-enclave-type=: Specifies type of enclave for this resource.
                --read-replicas=: The number of high availability replicas to provision for the database.
                --read-scale=: If enabled, connections that have application intent set to readonly in their connection string may be routed to a readonly secondary replica.
                --resource-group=!: Name of the target resource group of the server to restore database to.
                --service-objective=: The service objective for the new database.
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: 'space-separated tags: key[=value] [key[=value] ...].'
                    nargs: -1
                --user-assigned-identity-id=:
                    description: The list of user assigned identity for the SQL Database.
                    nargs: -1
                -c, --capacity=: The capacity component of the sku in integer number of DTUs or vcores.
                -e, --tier=: The edition component of the sku.
                -f, --family=: The compute generation component of the sku (for vcore skus only).
                -i, --assign-identity=:
                    description: Assign identity for database.
                    nargs: -1
                -z, --zone-redundant=:
                    description: Specifies whether to enable zone redundancy.
                    nargs: -1
              completion:
                flag:
                    assign-identity:
                        - "true"
                        - "false"
                    compute-model:
                        - Provisioned
                        - Serverless
                    encryption-protector-auto-rotation:
                        - "true"
                        - "false"
                    license-type:
                        - LicenseIncluded
                        - BasePrice
                    preferred-enclave-type:
                        - Default
                        - VBS
                    read-scale:
                        - Enabled
                        - Disabled
                    zone-redundant:
                        - "true"
                        - "false"
            - name: show
              description: Gets a recoverable database
              flags:
                --expand-keys=:
                    description: Expand the AKV keys for the database.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --keys-filter=: Expand the AKV keys for the database.
                --subscription=: Name or ID of subscription.
                -d, --database-name=: retrieves a requested geo-redundant backup under this database.
                -g, --resource-group=: Retrieves a requested geo-redundant backup under this resource group.
                -s, --server-name=: Retrieves a requested geo-redundant backup under this server.
              completion:
                flag:
                    expand-keys:
                        - "true"
                        - "false"
            - name: list
              description: Gets the geo redundant backups for a server
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Retrieves all requested geo-redundant backups under this resource group.
                -s, --server-name=: Retrieves all requested geo-redundant backups under this server.
        - name: restore
          description: Restores an existing or deleted DB (i.e. create with 'Restore' or 'PointInTimeRestore' create mode.)
          flags:
            --auto-pause-delay=: Time in minutes after which database is automatically paused.
            --availability-zone=: Availability zone
            --backup-storage-redundancy=: Backup storage redundancy used to store backups.
            --compute-model=: The compute model of the database.
            --deleted-time=: If specified, restore from a deleted database instead of from an existing database.
            --dest-name=!: Name of the database that will be created as the restore destination.
            --elastic-pool=: The name or resource id of the elastic pool to create the database in.
            --encryption-protector-auto-rotation=:
                description: Specifies the database encryption protector key auto rotation flag.
                nargs: -1
            --encryption-protector=: Specifies the Azure key vault key to be used as database encryption protector key.
            --federated-client-id=: The federated client id for the SQL Database.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --keys=:
                description: The list of AKV keys for the SQL Database.
                nargs: -1
            --license-type=: The license type to apply for this database.``LicenseIncluded`` if you need a license, or ``BasePrice``if you have a license and are eligible for the Azure HybridBenefit.
            --min-capacity=: Minimal capacity that database will always have allocated, if not paused
            --no-wait=: Do not wait for the long-running operation to finish.
            --preferred-enclave-type=: Specifies type of enclave for this resource.
            --read-replicas=: The number of high availability replicas to provision for the database.
            --read-scale=: If enabled, connections that have application intent set to readonly in their connection string may be routed to a readonly secondary replica.
            --service-objective=: The service objective for the new database.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --user-assigned-identity-id=:
                description: The list of user assigned identity for the SQL Database.
                nargs: -1
            -c, --capacity=: The capacity component of the sku in integer number of DTUs or vcores.
            -e, --tier=: The edition component of the sku.
            -f, --family=: The compute generation component of the sku (for vcore skus only).
            -g, --resource-group=: Name of resource group.
            -i, --assign-identity=:
                description: Assign identity for database.
                nargs: -1
            -n, --name=: Name of the Azure SQL Database.
            -s, --server=: Name of the Azure SQL Server.
            -t, --time=: The point in time of the source database that will be restored to create the new database.
            -z, --zone-redundant=:
                description: Specifies whether to enable zone redundancy.
                nargs: -1
          completion:
            flag:
                assign-identity:
                    - "true"
                    - "false"
                compute-model:
                    - Provisioned
                    - Serverless
                encryption-protector-auto-rotation:
                    - "true"
                    - "false"
                license-type:
                    - LicenseIncluded
                    - BasePrice
                preferred-enclave-type:
                    - Default
                    - VBS
                read-scale:
                    - Enabled
                    - Disabled
                zone-redundant:
                    - "true"
                    - "false"
        - name: list
          description: Lists databases in a server or elastic pool.
          flags:
            --elastic-pool=: If specified, lists only the databases in this elastic pool
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -s, --server=: Name of the Azure SQL Server.
        - name: tde
          description: Manage a database's transparent data encryption.
          commands:
            - name: key
              description: Manage a database's encryption protector.
              commands:
                - name: revert
                  description: Reverts a database encryption protector.
                  flags:
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -d, --database=: Name of the Azure SQL Database.
                    -g, --resource-group=: Name of resource group.
                    -s, --server=: Name of the Azure SQL Server.
                - name: revalidate
                  description: Revalidate a database encryption protector.
                  flags:
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -d, --database=: Name of the Azure SQL Database.
                    -g, --resource-group=: Name of resource group.
                    -s, --server=: Name of the Azure SQL Server.
            - name: show
              description: Shows a Transparent Data Encryption
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -d, --database=: Name of the Azure SQL Database.
                -g, --resource-group=: Name of resource group.
                -s, --server=: Name of the Azure SQL Server.
            - name: set
              description: Sets a Transparent Data Encryption
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --status=!: Status of the transparent data encryption.
                --subscription=: Name or ID of subscription.
                -d, --database=: Name of the Azure SQL Database.
                -g, --resource-group=: Name of resource group.
                -s, --server=: Name of the Azure SQL Server.
              completion:
                flag:
                    status:
                        - Enabled
                        - Disabled
        - name: advanced-threat-protection-setting
          description: Manage a database's advanced threat protection setting.
          commands:
            - name: update
              description: Update a database's advanced threat protection setting.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --state=: State of the advanced threat protection setting
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the Azure SQL Database.
                -s, --server=: Name of the Azure SQL Server.
            - name: show
              description: Gets an advanced threat protection setting.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the Azure SQL Database.
                -s, --server=: Name of the Azure SQL Server.
        - name: classification
          description: Manage sensitivity classifications.
          commands:
            - name: delete
              description: Deletes the sensitivity label of a given column.
              flags:
                --column=!: The name of the column.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --schema=!: The name of the schema.
                --subscription=: Name or ID of subscription.
                --table=!: The name of the table.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the Azure SQL Database.
                -s, --server=: Name of the Azure SQL Server.
            - name: recommendation
              description: Manage sensitivity classification recommendations.
              commands:
                - name: list
                  description: Gets the sensitivity labels of a given database.
                  flags:
                    --filter=: An OData filter expression that filters elements in the collection.
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --include-disabled-recommendations=: Specifies whether to include disabled recommendations or not.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: Name of the Azure SQL Database.
                    -s, --server=: Name of the Azure SQL Server.
                - name: disable
                  description: Disables sensitivity recommendations on a given column.
                  flags:
                    --column=!: The name of the column.
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --schema=!: The name of the schema.
                    --subscription=: Name or ID of subscription.
                    --table=!: The name of the table.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: Name of the Azure SQL Database.
                    -s, --server=: Name of the Azure SQL Server.
                - name: enable
                  description: Enables sensitivity recommendations on a given column (recommendations are enabled by default on all columns).
                  flags:
                    --column=!: The name of the column.
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --schema=!: The name of the schema.
                    --subscription=: Name or ID of subscription.
                    --table=!: The name of the table.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: Name of the Azure SQL Database.
                    -s, --server=: Name of the Azure SQL Server.
            - name: list
              description: Gets the sensitivity labels of a given database.
              flags:
                --count=: Default value is None.
                --filter=: An OData filter expression that filters elements in the collection.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --skip-token=: Default value is None.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
