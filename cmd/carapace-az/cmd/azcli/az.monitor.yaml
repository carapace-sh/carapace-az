# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: monitor
description: Manage the Azure Monitor Service.
commands:
    - name: account
      description: Manage monitor account
      commands:
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the Azure Monitor workspace.
        - name: list
          description: List all workspaces in the specified subscription
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: create
          description: Create a workspace
          flags:
            --subscription=: Name or ID of subscription.
            --tags=:
                description: Resource tags.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -l, --location=: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
            -n, --name=!: The name of the Azure Monitor workspace.
        - name: show
          description: Show the specific azure monitor workspace
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the Azure Monitor workspace.
        - name: update
          description: Update a workspace
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: Resource tags.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the Azure Monitor workspace.
          completion:
            flag:
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: delete
          description: Delete a workspace
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the Azure Monitor workspace.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
    - name: action-group
      description: Manage action groups.
      commands:
        - name: test-notifications
          description: Manage action groups test-notifications.
          commands:
            - name: create
              description: Create an action group test-notifications.
              flags:
                --action-group=!: The name of the action group.
                --alert-type=!: The value of the supported alert type.
                --no-wait=:
                    description: Do not wait for the long-running operation to finish.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -a, --add-actions=:
                    description: Add receivers to the action group.
                    nargs: -1
                -g, --resource-group=!: Name of resource group.
              completion:
                flag:
                    no-wait:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
        - name: create
          description: Create a new action group.
          flags:
            --short-name=: The short name of the action group.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'Space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -a, --actions=:
                description: Add receivers to the action group during the creation.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Location.
            -n, --name=!: The name of the action group.
        - name: delete
          description: Delete an action group.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the action group.
        - name: list
          description: List action groups under a resource group or the current subscription.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: wait
          description: Place the CLI in a waiting state.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the action group.
        - name: enable-receiver
          description: Enable a receiver in an action group.
          flags:
            --action-group=: The name of the action group.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=!: The name of the receiver to resubscribe.
        - name: update
          description: Update an action group.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --short-name=: The short name of the action group.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'Space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -a, --add-actions=:
                description: Add receivers to the action group.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the action group.
            -r, --remove-action=:
                description: Remove receivers from the action group.
                nargs: -1
          completion:
            flag:
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: show
          description: Show the details of an action group.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the action group.
    - name: activity-log
      description: Manage activity logs.
      commands:
        - name: alert
          description: Manage activity log alert rules.
          commands:
            - name: action-group
              commands:
                - name: add
                  description: Add action groups to this activity log alert rule.
                  flags:
                    --add=:
                        description: Add an object to a list of objects by specifying a path and key value pairs.
                        nargs: -1
                    --force-string=:
                        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                        nargs: -1
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --remove=:
                        description: Remove a property or an element from a list.
                        nargs: -1
                    --reset=:
                        description: Remove all the existing action groups before add new conditions.
                        nargs: -1
                    --set=:
                        description: Update an object by specifying a property path and value to set.
                        nargs: -1
                    --strict=:
                        description: Fails the command if an action group to be added will change existing webhook properties.
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -a, --action-group=!:
                        description: The names or the resource ids of the action groups to be added.
                        nargs: -1
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: The name of the activity log alert.
                    -w, --webhook-properties=:
                        description: Space-separated webhook properties in 'key[=value]' format.
                        nargs: -1
                  completion:
                    flag:
                        force-string:
                            - "true"
                            - t
                            - "yes"
                            - "y"
                            - "1"
                            - "false"
                            - f
                            - "no"
                            - "n"
                            - "0"
                        reset:
                            - "true"
                            - t
                            - "yes"
                            - "y"
                            - "1"
                            - "false"
                            - f
                            - "no"
                            - "n"
                            - "0"
                        strict:
                            - "true"
                            - t
                            - "yes"
                            - "y"
                            - "1"
                            - "false"
                            - f
                            - "no"
                            - "n"
                            - "0"
                - name: remove
                  description: Remove action groups from this activity log alert rule.
                  flags:
                    --add=:
                        description: Add an object to a list of objects by specifying a path and key value pairs.
                        nargs: -1
                    --force-string=:
                        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                        nargs: -1
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --remove=:
                        description: Remove a property or an element from a list.
                        nargs: -1
                    --set=:
                        description: Update an object by specifying a property path and value to set.
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -a, --action-group=!:
                        description: The names or the resource ids of the action groups to be added.
                        nargs: -1
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: The name of the activity log alert.
                  completion:
                    flag:
                        force-string:
                            - "true"
                            - t
                            - "yes"
                            - "y"
                            - "1"
                            - "false"
                            - f
                            - "no"
                            - "n"
                            - "0"
            - name: scope
              commands:
                - name: add
                  description: Add scopes to this activity log alert rule.
                  flags:
                    --add=:
                        description: Add an object to a list of objects by specifying a path and key value pairs.
                        nargs: -1
                    --force-string=:
                        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                        nargs: -1
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --remove=:
                        description: Remove a property or an element from a list.
                        nargs: -1
                    --reset=:
                        description: Remove all the existing action groups before add new conditions.
                        nargs: -1
                    --set=:
                        description: Update an object by specifying a property path and value to set.
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: The name of the activity log alert.
                    -s, --scope=!:
                        description: List of scopes to add.
                        nargs: -1
                  completion:
                    flag:
                        force-string:
                            - "true"
                            - t
                            - "yes"
                            - "y"
                            - "1"
                            - "false"
                            - f
                            - "no"
                            - "n"
                            - "0"
                        reset:
                            - "true"
                            - t
                            - "yes"
                            - "y"
                            - "1"
                            - "false"
                            - f
                            - "no"
                            - "n"
                            - "0"
                - name: remove
                  description: Removes scopes from this activity log alert rule.
                  flags:
                    --add=:
                        description: Add an object to a list of objects by specifying a path and key value pairs.
                        nargs: -1
                    --force-string=:
                        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                        nargs: -1
                    --ids=:
                        description: One or more resource IDs (space-delimited).
                        nargs: -1
                    --remove=:
                        description: Remove a property or an element from a list.
                        nargs: -1
                    --set=:
                        description: Update an object by specifying a property path and value to set.
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --name=: The name of the activity log alert.
                    -s, --scope=!:
                        description: The scopes to remove.
                        nargs: -1
                  completion:
                    flag:
                        force-string:
                            - "true"
                            - t
                            - "yes"
                            - "y"
                            - "1"
                            - "false"
                            - f
                            - "no"
                            - "n"
                            - "0"
            - name: show
              description: Get an activity log alert.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the activity log alert.
            - name: update
              description: Update a new activity log alert or update an existing one.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --all-of=:
                    description: The list of Activity Log Alert rule conditions.
                    nargs: -1
                --description=: A description of this Activity Log Alert rule.
                --enabled=:
                    description: Indicates whether this Activity Log Alert rule is enabled.
                    nargs: -1
                --force-string=:
                    description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: The tags of the resource.
                    nargs: -1
                -c, --condition=:
                    description: The condition that will cause the alert rule to activate.
                    nargs: -1
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the activity log alert.
              completion:
                flag:
                    enabled:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
                    force-string:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
            - name: delete
              description: Delete an activity log alert.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the activity log alert.
            - name: create
              description: Create a default activity log alert rule.
              flags:
                --all-of=:
                    description: The list of Activity Log Alert rule conditions.
                    nargs: -1
                --description=: A description of this Activity Log Alert rule.
                --disable=:
                    description: Disable the activity log alert rule after it is created.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: The tags of the resource.
                    nargs: -1
                -a, --action-group=:
                    description: Add an action group.
                    nargs: -1
                -c, --condition=:
                    description: The condition that will cause the alert rule to activate.
                    nargs: -1
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: The name of the activity log alert.
                -s, --scope=:
                    description: A list of strings that will be used as prefixes.
                    nargs: -1
                -w, --webhook-properties=:
                    description: Space-separated webhook properties in 'key[=value]' format.
                    nargs: -1
              completion:
                flag:
                    disable:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
            - name: list
              description: List activity log alert rules under a resource group or the current subscription.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
        - name: list
          description: List and query activity log events.
          flags:
            --caller=: Caller to query for, such as an e-mail address or service principal ID.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --correlation-id=: Correlation ID to query.
            --end-time=:
                description: End time of the query.
                nargs: -1
            --max-events=: Maximum number of records to return.
            --namespace=: Resource provider namespace.
            --offset=: 'Time offset of the query range, in ##d##h format.'
            --resource-id=: ARM ID of a resource.
            --select=:
                description: Space-separated list of properties to return.
                nargs: -1
            --start-time=:
                description: Start time of the query.
                nargs: -1
            --status=: 'Status to query for (ex: Failed)'
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
          completion:
            flag:
                select:
                    - authorization
                    - claims
                    - caller
                    - description
                    - id
                    - eventDataId
                    - correlationId
                    - eventName
                    - category
                    - httpRequest
                    - level
                    - resourceGroupName
                    - resourceProviderName
                    - resourceId
                    - resourceType
                    - operationId
                    - operationName
                    - properties
                    - status
                    - subStatus
                    - eventTimestamp
                    - submissionTimestamp
                    - subscriptionId
                    - tenantId
        - name: list-categories
          description: List the list of available event categories supported in the Activity Logs Service.
          flags:
            --subscription=: Name or ID of subscription.
    - name: autoscale
      description: Manage autoscale settings
      commands:
        - name: show-predictive-metric
          description: Show predictive autoscale metric future data
          flags:
            --aggregation=!: The list of aggregation types (comma separated) to retrieve.
            --autoscale-setting-name=: The autoscale setting name.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=!: The interval (i.e. timegrain) of the query.
            --metric-name=!: The names of the metrics (comma separated) to retrieve.
            --metric-namespace=!: Metric namespace to query metric definitions for.
            --subscription=: Name or ID of subscription.
            --timespan=!: The timespan of the query.
            -g, --resource-group=: Name of resource group.
        - name: rule
          description: Manage autoscale scaling rules.
          commands:
            - name: list
              description: List autoscale rules for a profile.
              flags:
                --autoscale-name=!: Name of the autoscale settings.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --profile-name=: Name of the autoscale profile.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: copy
              description: Copy autoscale rules from one profile to another.
              flags:
                --autoscale-name=!: Name of the autoscale settings.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --dest-schedule=!: Name of the profile to copy rules to.
                --index=!:
                    description: Space-separated list of rule indices to copy, or '*' to copy all rules.
                    nargs: -1
                --source-schedule=: Name of the profile to copy rules from.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: delete
              description: Remove autoscale rules from a profile.
              flags:
                --autoscale-name=!: Name of the autoscale settings.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --index=!:
                    description: Space-separated list of rule indices to remove, or '*' to clear all rules.
                    nargs: -1
                --profile-name=: Name of the autoscale profile.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: create
              description: Add a new autoscale rule.
              flags:
                --autoscale-name=!: Name of the autoscale settings.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --condition=!:
                    description: Condition on which to scale.
                    nargs: -1
                --cooldown=: The number of minutes that must elapse before another scaling event can occur.
                --profile-name=: Name of the autoscale profile.
                --resource-namespace=: Target resource provider namespace.
                --resource-parent=: Target resource parent path, if applicable.
                --resource-type=: Target resource type.
                --resource=: Name or ID of the target resource.
                --scale=!:
                    description: The direction and amount to scale.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --timegrain=:
                    description: The way metrics are polled across instances.
                    nargs: -1
                -g, --resource-group=: Name of resource group.
        - name: update
          description: Update an autoscale setting.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --count=: The numer of instances to use.
            --email-administrator=:
                description: Send email to subscription administrator on scaling.
                nargs: -1
            --email-coadministrators=:
                description: Send email to subscription co-administrators on scaling.
                nargs: -1
            --enabled=:
                description: the enabled flag.
                nargs: -1
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --max-count=: The maximum number of instances.
            --min-count=: The minimum number of instances.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --scale-look-ahead-time=: the amount of time to specify by which instances are launched in advance.
            --scale-mode=: the predictive autoscale mode
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: Gets or sets a list of key value pairs that describe the resource.
                nargs: -1
            -a, --add-actions=:
                description: Add an action to fire when a scaling event occurs.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: The autoscale setting name.
            -r, --remove-actions=:
                description: Remove one or more actions.
                nargs: -1
          completion:
            flag:
                email-administrator:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                email-coadministrators:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                enabled:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
