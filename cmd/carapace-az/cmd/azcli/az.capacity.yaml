# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: capacity
description: Manage capacity.
commands:
    - name: reservation
      description: Manage capacity reservation.
      commands:
        - name: delete
          description: Delete operation to delete a capacity reservation.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -c, --capacity-reservation-group=: The name of the capacity reservation group.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the capacity reservation.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: group
          description: Manage capacity reservation group.
          commands:
            - name: create
              description: Create capacity reservation group.
              flags:
                --sharing-profile=:
                    description: Space-separated subscription resource IDs or nothing.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: 'space-separated tags: key[=value] [key[=value] ...].'
                    nargs: -1
                -g, --resource-group=!: Name of resource group.
                -l, --location=: Location.
                -n, --capacity-reservation-group=!: The name of the capacity reservation group.
                -z, --zones=:
                    description: Availability Zones to use for this capacity reservation group.
                    nargs: -1
            - name: list
              description: List the capacity reservation groups.
              flags:
                --max-items=: Total number of items to return in the command's output.
                --next-token=: Token to specify where to start paginating.
                --resource-ids-only=: The query option to fetch capacity reservation group resource Ids.
                --subscription=: Name or ID of subscription.
                --vm-instance=:
                    description: Retrieve the Virtual Machine Instance which are associated to capacity reservation group in the response.
                    nargs: -1
                --vmss-instance=:
                    description: Retrieve the ScaleSet VM Instance which are associated to capacity reservation group in the response.
                    nargs: -1
                -g, --resource-group=: Name of resource group.
              completion:
                flag:
                    resource-ids-only:
                        - All
                        - CreatedInSubscription
                        - SharedWithSubscription
                    vm-instance:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
                    vmss-instance:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
            - name: update
              description: Update capacity reservation group.
              flags:
                --sharing-profile=:
                    description: Space-separated subscription resource IDs or nothing.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: 'space-separated tags: key[=value] [key[=value] ...].'
                    nargs: -1
                -g, --resource-group=!: Name of resource group.
                -n, --capacity-reservation-group=!: The name of the capacity reservation group.
            - name: delete
              description: Delete operation to delete a capacity reservation group.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --capacity-reservation-group=: The name of the capacity reservation group.
                -y, --yes=: Do not prompt for confirmation.
            - name: show
              description: Show capacity reservation group.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -i, --instance-view=: Retrieve the list of instance views of the capacity reservations under the capacity reservation group which is a snapshot of the runtime properties of a capacity reservation that is managed by the platform and can change outside of control plane operations.
                -n, --capacity-reservation-group=!: The name of the capacity reservation group.
        - name: create
          description: Create capacity reservation.
          flags:
            --capacity=: Specify the number of virtual machines in the scale set.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -c, --capacity-reservation-group=!: The name of the capacity reservation group.
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Location.
            -n, --capacity-reservation-name=!: The name of the capacity reservation.
            -s, --sku=!: The SKU of the resource for which capacity needs be reserved.
            -z, --zone=: Availability Zone to use for this capacity reservation.
        - name: show
          description: Show capacity reservation.
          flags:
            --subscription=: Name or ID of subscription.
            -c, --capacity-reservation-group=!: The name of the capacity reservation group.
            -g, --resource-group=!: Name of resource group.
            -i, --instance-view=: Retrieve a snapshot of the runtime properties of the capacity reservation that is managed by the platform and can change outside of control plane operations.
            -n, --capacity-reservation-name=!: The name of the capacity reservation.
        - name: update
          description: Update capacity reservation.
          flags:
            --capacity=: Specify the number of virtual machines in the scale set.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -c, --capacity-reservation-group=!: The name of the capacity reservation group.
            -g, --resource-group=!: Name of resource group.
            -n, --capacity-reservation-name=!: The name of the capacity reservation.
        - name: list
          description: List all of the capacity reservations in the specified capacity reservation group.
          flags:
            --subscription=: Name or ID of subscription.
            -c, --capacity-reservation-group=!: The name of the capacity reservation group.
            -g, --resource-group=!: Name of resource group.
