# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: batchai
description: Manage Batch AI resources.
commands:
    - name: cluster
      description: Commands to manage clusters.
      commands:
        - name: create
          description: Create a cluster.
          flags:
            --afs-mount-path=: Relative mount path for Azure File share.
            --afs-name=: Name of Azure File Share to be mounted on each cluster node.
            --bfs-mount-path=: Relative mount path for Azure Storage container.
            --bfs-name=: Name of Azure Storage container to be mounted on each cluster node.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --custom-image=: ARM ID of a virtual machine image to be used for nodes creation.
            --generate-ssh-keys=: Generate SSH public and private key files in ~/.ssh directory (if missing).
            --max=: Max nodes count for the auto-scale cluster.
            --min=: Min nodes count for the auto-scale cluster.
            --nfs-mount-path=: Relative mount path for NFS.
            --nfs=: Name or ARM ID of a file server to be mounted on each cluster node.
            --setup-task-output=: Directory path to store where setup-task's logs.
            --setup-task=: A command line which should be executed on each compute node when it's got allocated or rebooted.
            --storage-account-key=: Storage account key.
            --storage-account-name=: Storage account name for Azure File Shares and/or Azure Storage Containers to be mounted on each cluster node.
            --subnet=: ARM ID of a virtual network subnet to put the cluster in.
            --subscription=: Name or ID of subscription.
            --use-auto-storage=: If provided, the command will create a storage account in a new or existing resource group named "batchaiautostorage".
            --vm-priority=: VM priority.
            -f, --config-file=: A path to a json file containing cluster create parameters (json representation of azure.mgmt.batchai.models.ClusterCreateParameters).
            -g, --resource-group=!: Name of resource group.
            -i, --image=: Operation system image for cluster nodes.
            -k, --ssh-key=: Optional SSH public key value or path.
            -n, --name=!: Name of cluster.
            -p, --password=: Optional password for the admin user account to be created on each compute node.
            -s, --vm-size=: VM size for cluster nodes (e.g. Standard_NC6 for 1 GPU node)
            -t, --target=: Number of nodes which should be allocated immediately after cluster creation.
            -u, --user-name=: Name of admin user account to be created on each compute node.
            -w, --workspace=!: Name of workspace.
          completion:
            flag:
                vm-priority:
                    - dedicated
                    - lowpriority
        - name: node
          description: Commands to work with cluster nodes.
          commands:
            - name: list
              description: Get the IP address, port of all the compute nodes in the Cluster.
              flags:
                --subscription=: Name or ID of subscription.
                -c, --cluster=!: Name of cluster.
                -g, --resource-group=!: Name of resource group.
                -w, --workspace=!: Name of workspace.
            - name: exec
              description: Executes a command line on a cluster's node with optional ports forwarding.
              flags:
                --exec=: Optional command line to be executed on the node.
                --subscription=: Name or ID of subscription.
                -L, --address=: Specifies that connections to the given TCP port or Unix socket on the local (client) host are to be forwarded to the given host and port, or Unix socket, on the remote side.
                -c, --cluster=!: Name of cluster.
                -g, --resource-group=!: Name of resource group.
                -k, --ssh-private-key=: Optional SSH private key path to establish SSH connection.
                -n, --node-id=: ID of the node to forward the ports to.
                -p, --password=: Optional password to establish SSH connection.
                -w, --workspace=!: Name of workspace.
        - name: delete
          description: Deletes a Cluster.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of cluster.
            -w, --workspace=: Name of workspace.
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          description: List clusters.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -w, --workspace=!: Name of workspace.
        - name: show
          description: Gets information about a Cluster.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of cluster.
            -w, --workspace=: Name of workspace.
        - name: resize
          description: Resize a cluster.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of cluster.
            -t, --target=!: Target number of compute nodes.
            -w, --workspace=: Name of workspace.
        - name: file
          description: Commands to work with files generated by node setup task.
          commands:
            - name: list
              description: List files generated by the cluster's node setup task.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --expiry=: Time in minutes for how long generated download URLs should remain valid.
                --subscription=: Name or ID of subscription.
                -c, --cluster=!: Name of cluster.
                -g, --resource-group=!: Name of resource group.
                -p, --path=: Relative path of a subfolder inside of the node setup task output directory.
                -w, --workspace=!: Name of workspace.
        - name: auto-scale
          description: Set auto-scale parameters for a cluster.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --max=!: Maximum number of nodes.
            --min=!: Minimum number of nodes.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of cluster.
            -w, --workspace=: Name of workspace.
    - name: experiment
      description: Commands to manage experiments.
      commands:
        - name: list
          description: Gets a list of Experiments within the specified Workspace.
          flags:
            --__EXPERIMENTS_LIST_BY_WORKSPACE_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -w, --workspace=!: Name of workspace.
        - name: delete
          description: Deletes an Experiment.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of experiment.
            -w, --workspace=: Name of workspace.
            -y, --yes=: Do not prompt for confirmation.
        - name: show
          description: Gets information about an Experiment.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of experiment.
            -w, --workspace=: Name of workspace.
        - name: create
          description: Creates an Experiment.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of experiment.
            -w, --workspace=!: Name of workspace.
    - name: file-server
      description: Commands to manage file servers.
      commands:
        - name: create
          description: Create a file server.
          flags:
            --caching-type=: Caching type for premium disks.
            --disk-count=: Number of disks.
            --disk-size=: Disk size in Gb.
            --generate-ssh-keys=: Generate SSH public and private key files in ~/.ssh directory (if missing).
            --no-wait=: Do not wait for the long-running operation to finish.
            --storage-sku=: The sku of storage account to persist VM.
            --subnet=: ARM ID of a virtual network subnet to put the file server in.
            --subscription=: Name or ID of subscription.
            -f, --config-file=: A path to a json file containing file server create parameters (json representation of azure.mgmt.batchai.models.FileServerCreateParameters).
            -g, --resource-group=!: Name of resource group.
            -k, --ssh-key=: Optional SSH public key value or path.
            -n, --name=!: Name of file server.
            -p, --password=: Optional password for the admin user created on the NFS node.
            -s, --vm-size=: VM size.
            -u, --user-name=: Name of admin user account to be created on NFS node.
            -w, --workspace=!: Name or ARM ID of the workspace.
          completion:
            flag:
                caching-type:
                    - none
                    - readonly
                    - readwrite
                storage-sku:
                    - Premium_LRS
                    - Standard_LRS
        - name: list
          description: Gets a list of File Servers associated with the specified workspace.
          flags:
            --__FILE_SERVERS_LIST_BY_WORKSPACE_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -w, --workspace=!: Name of workspace.
    - name: job
      description: Commands to manage jobs.
      commands:
        - name: wait
          description: Waits for specified job completion and setups the exit code to the job's exit code.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: Polling interval in sec.
            --subscription=: Name or ID of subscription.
            -e, --experiment=: Name of experiment.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of job.
            -w, --workspace=: Name of workspace.
        - name: node
          description: Commands to work with nodes which executed a job.
          commands:
            - name: exec
              description: Executes a command line on a cluster's node used to execute the job with optional ports forwarding.
              flags:
                --exec=: Optional command line to be executed on the node.
                --subscription=: Name or ID of subscription.
                -L, --address=: Specifies that connections to the given TCP port or Unix socket on the local (client) host are to be forwarded to the given host and port, or Unix socket, on the remote side.
                -e, --experiment=!: Name of experiment.
                -g, --resource-group=!: Name of resource group.
                -j, --job=!: Name of job.
                -k, --ssh-private-key=: Optional SSH private key path to establish SSH connection.
                -n, --node-id=: ID of the node to forward the ports to.
                -p, --password=: Optional password to establish SSH connection.
                -w, --workspace=!: Name of workspace.
            - name: list
              description: Gets a list of currently existing nodes which were used for the Job execution.
              flags:
                --subscription=: Name or ID of subscription.
                -e, --experiment=!: Name of experiment.
                -g, --resource-group=!: Name of resource group.
                -j, --job=!: Name of job.
                -w, --workspace=!: Name of workspace.
        - name: file
          description: Commands to list and stream files in job's output directories.
          commands:
            - name: list
              description: List job's output files in a directory with given id.
              flags:
                --expiry=: Time in minutes for how long generated download URL should remain valid.
                --subscription=: Name or ID of subscription.
                -d, --output-directory-id=: The Id of the job's output directory (as specified by "id" element in outputDirectories collection in the job create parameters).
                -e, --experiment=!: Name of experiment.
                -g, --resource-group=!: Name of resource group.
                -j, --job=!: Name of job.
                -p, --path=: Relative path in the given output directory.
                -w, --workspace=!: Name of workspace.
            - name: stream
              description: Stream the content of a file (similar to 'tail -f').
              flags:
                --subscription=: Name or ID of subscription.
                -d, --output-directory-id=: The Id of the job's output directory (as specified by "id" element in outputDirectories collection in the job create parameters).
                -e, --experiment=!: Name of experiment.
                -f, --file-name=!: The name of the file to stream.
                -g, --resource-group=!: Name of resource group.
                -j, --job=!: Name of job.
                -p, --path=: Relative path in the given output directory.
                -w, --workspace=!: Name of workspace.
        - name: delete
          description: Deletes a Job.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -e, --experiment=: Name of experiment.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of job.
            -w, --workspace=: Name of workspace.
            -y, --yes=: Do not prompt for confirmation.
        - name: show
          description: Gets information about a Job.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -e, --experiment=: Name of experiment.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of job.
            -w, --workspace=: Name of workspace.
        - name: terminate
          description: Terminates a job.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -e, --experiment=: Name of experiment.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of job.
            -w, --workspace=: Name of workspace.
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          description: Gets a list of Jobs within the specified Experiment.
          flags:
            --__JOBS_LIST_BY_EXPERIMENT_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -e, --experiment=!: Name of experiment.
            -g, --resource-group=!: Name of resource group.
            -w, --workspace=!: Name of workspace.
        - name: create
          description: Create a job.
          flags:
            --afs-mount-path=: Relative mount path for Azure File Share.
            --afs-name=: Name of Azure File Share to mount during the job execution.
            --bfs-mount-path=: Relative mount path for Azure Storage Blob Container.
            --bfs-name=: Name of Azure Storage Blob Container to mount during the job execution.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --nfs-mount-path=: Relative mount path for NFS.
            --nfs=: Name or ARM ID of the file server to be mounted during the job execution.
            --storage-account-key=: Storage account key.
            --storage-account-name=: Storage account name for Azure File Shares and/or Azure Storage Containers to be mounted on each cluster node.
            --subscription=: Name or ID of subscription.
            -c, --cluster=!: Name or ARM ID of the cluster to run the job.
            -e, --experiment=!: Name of experiment.
            -f, --config-file=!: A path to a json file containing job create parameters (json representation of azure.mgmt.batchai.models.JobCreateParameters).
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of job.
            -w, --workspace=!: Name of workspace.
    - name: list-usages
      description: Gets the current usage information as well as limits for Batch AI resources for given subscription.
      flags:
        --subscription=: Name or ID of subscription.
        -l, --location=!: Location.
    - name: workspace
      description: Commands to manage workspaces.
      commands:
        - name: delete
          description: Deletes a Workspace.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --workspace=: Name of workspace.
            -y, --yes=: Do not prompt for confirmation.
        - name: show
          description: Gets information about a Workspace.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --workspace=: Name of workspace.
        - name: create
          description: Create a workspace.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Location of the workspace.
            -n, --workspace=!: Name of workspace.
        - name: list
          description: List workspaces.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
