# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: term
description: Manage marketplace agreement with marketplaceordering
commands:
    - name: accept
      description: Accept marketplace terms.
      flags:
        --plan=!: Plan identifier string of image being deployed.
        --product=!: Offer identifier string of image being deployed.
        --publisher=!: Publisher identifier string of image being deployed.
        --subscription=: Name or ID of subscription.
    - name: show
      description: Get marketplace terms.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --plan=!: Plan identifier string of image being deployed.
        --product=!: Offeridentifier string of image being deployed.
        --publisher=!: Publisher identifier string of image being deployed.
        --subscription=: Name or ID of subscription.
