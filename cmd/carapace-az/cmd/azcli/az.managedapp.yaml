# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: managedapp
description: managedapp
commands:
    - name: create
      description: Create a new managed application.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --kind=!: the managed application kind.
        --parameters=: JSON formatted string or a path to a file with such content
        --plan-name=: the managed application package plan name
        --plan-product=: the managed application package plan product
        --plan-publisher=: the managed application package plan publisher
        --plan-version=: the managed application package plan version
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -d, --managedapp-definition-id=: the full qualified managed application definition id
        -g, --resource-group=!: the resource group of the managed application
        -l, --location=: the managed application location
        -m, --managed-rg-id=!: the resource group managed by the managed application
        -n, --name=!: the managed application name
    - name: definition
      commands:
        - name: show
          description: Gets a managed application definition.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: the resource group of the managed application definition
            -n, --name=: the managed application definition name
        - name: delete
          description: Deletes the managed application definition.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: the resource group of the managed application definition
            -n, --name=: The name of the managed application definition to delete.
        - name: create
          description: Create or update a new managed application definition.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --deployment-mode=: The managed application deployment mode.
            --description=!: the managed application definition description
            --display-name=!: the managed application definition display name
            --lock-level=!: The type of lock restriction.
            --package-file-uri=: the managed application definition package file uri
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -a, --authorizations=!:
                description: space-separated authorization pairs in a format of `<principalId>:<roleDefinitionId>`
                nargs: -1
            -c, --create-ui-definition=: JSON formatted string or a path to a file with such content
            -g, --resource-group=!: the resource group of the managed application definition
            -l, --location=: Location.
            -n, --name=!: the managed application definition name
            -t, --main-template=: JSON formatted string or a path to a file with such content
          completion:
            flag:
                deployment-mode:
                    - Incremental
                    - Complete
                lock-level:
                    - CanNotDelete
                    - ReadOnly
                    - None
        - name: update
          description: Create or update a new managed application definition.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --deployment-mode=: The managed application deployment mode.
            --description=!: the managed application definition description
            --display-name=!: the managed application definition display name
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --lock-level=!: The type of lock restriction.
            --package-file-uri=: the managed application definition package file uri
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -a, --authorizations=!:
                description: space-separated authorization pairs in a format of `<principalId>:<roleDefinitionId>`
                nargs: -1
            -c, --create-ui-definition=: JSON formatted string or a path to a file with such content
            -g, --resource-group=: the resource group of the managed application definition
            -l, --location=: Location.
            -n, --name=: the managed application definition name
            -t, --main-template=: JSON formatted string or a path to a file with such content
          completion:
            flag:
                deployment-mode:
                    - Incremental
                    - Complete
                lock-level:
                    - CanNotDelete
                    - ReadOnly
                    - None
        - name: list
          description: Lists the managed application definitions in a resource group.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: the resource group of the managed application definition
    - name: delete
      description: Deletes the managed application.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: the resource group of the managed application
        -n, --name=: The name of the managed application.
    - name: list
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: the resource group of the managed application
    - name: show
      description: Gets a managed application.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: the resource group of the managed application
        -n, --name=: the managed application name
