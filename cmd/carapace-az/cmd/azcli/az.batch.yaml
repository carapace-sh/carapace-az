            --if-match=: An ETag value associated with the version of the resource known to the client.
            --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --if-none-match=: An ETag value associated with the version of the resource known to the client.
            --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --json-file=: A file containing the pool specification in JSON (formatted to match the respective REST API body).
            --metadata=:
                description: A list of name-value pairs associated with the Pool as metadata.
                nargs: -1
            --pool-id=!: The ID of the Pool to get.
            --start-task-command-line=: The command line of the StartTask.
            --start-task-environment-settings=:
                description: A list of environment variable settings for the StartTask.
                nargs: -1
            --start-task-max-task-retry-count=: The maximum number of times the Task may be retried.
            --start-task-resource-files=:
                description: A list of files that the Batch service will download to the Compute Node before running the command line.
                nargs: -1
            --start-task-wait-for-success=: Whether the Batch service should wait for the StartTask to complete successfully (that is, to exit with exit code 0) before scheduling any Tasks on the Compute Node.
            --subscription=: Name or ID of subscription.
            --target-communication=: The desired node communication mode for the pool.
