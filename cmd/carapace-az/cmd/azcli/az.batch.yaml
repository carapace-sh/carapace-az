            --start-task-wait-for-success=: Whether the Batch service should wait for the start task to complete successfully (that is, to exit with exit code 0) before scheduling any tasks on the compute node.
            --subscription=: Name or ID of subscription.
            --target-communication=: The desired node communication mode for the pool.
