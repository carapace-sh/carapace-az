# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: batch
description: Manage Azure Batch.
commands:
    - name: account
      description: Manage Azure Batch accounts.
      commands:
        - name: keys
          description: Manage Batch account keys.
          commands:
            - name: list
              description: Gets the account keys for the specified Batch account.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of the resource group
                -n, --name=!: Name of the Batch account.
            - name: renew
              description: Renew keys for a Batch account.
              flags:
                --key-name=: Name of the batch account key.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of the resource group.
                -n, --name=: Name of the batch account to show.
              completion:
                flag:
                    key-name:
                        - Primary
                        - Secondary
        - name: network-profile
          description: Manage Batch account Network profiles.
          commands:
            - name: set
              description: Set the Network profile for Batch account.
              flags:
                --default-action=: Default action for endpoint access.
                --profile=: Network profile to set.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of the resource group.
                -n, --name=: Name of the batch account to show.
              completion:
                flag:
                    default-action:
                        - Allow
                        - Deny
                    profile:
                        - BatchAccount
                        - NodeManagement
            - name: network-rule
              description: Manage Batch account Network rules in Network Profile.
              commands:
                - name: add
                  description: Add a Network rule from a Network Profile.
                  flags:
                    --ip-address=: IPv4 address or CIDR range.
                    --profile=: Network profile to set.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of the resource group.
                    -n, --name=: Name of the batch account to show.
                  completion:
                    flag:
                        profile:
                            - BatchAccount
                            - NodeManagement
                - name: list
                  description: List the Network rules from a Network Profile.
                  flags:
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of the resource group.
                    -n, --name=: Name of the batch account to show.
                - name: delete
                  description: Delete a Network rule from a Network Profile.
                  flags:
                    --ip-address=: IPv4 address or CIDR range.
                    --profile=: Network profile to set.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of the resource group.
                    -n, --name=: Name of the batch account to show.
                    -y, --yes=: Do not prompt for confirmation.
                  completion:
                    flag:
                        profile:
                            - BatchAccount
                            - NodeManagement
            - name: show
              description: Get information about the Network profile for Batch account.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of the resource group.
                -n, --name=: Name of the batch account to show.
        - name: delete
          description: Deletes the specified Batch account.
          flags:
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of the resource group
            -n, --name=!: Name of the Batch account.
            -y, --yes=: Do not prompt for confirmation.
        - name: identity
          description: Manage identities of a batch account.
          commands:
            - name: show
              description: Display managed identities of a batch account.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of the resource group.
                -n, --name=!: Name of the batch account to show.
            - name: remove
              description: Remove managed identities from an existing batch account.
              flags:
                --subscription=: Name or ID of subscription.
                --system-assigned=: Provide this flag to use system assigned identity for batch accounts.
                --user-assigned=:
                    description: User Assigned Identity ids to be used for batch account.
                    nargs: -1
                -g, --resource-group=!: Name of the resource group.
                -n, --name=!: Name of the batch account to show.
                -y, --yes=: Do not prompt for confirmation.
            - name: assign
              description: Add managed identities to an existing batch account.
              flags:
                --subscription=: Name or ID of subscription.
                --system-assigned=: Provide this flag to use system assigned identity for batch accounts.
                --user-assigned=: User Assigned Identity ids to be used for batch account.
                -g, --resource-group=!: Name of the resource group.
                -n, --name=!: Name of the batch account to show.
        - name: set
          description: The properties related to the auto-storage account.
          flags:
            --encryption-key-identifier=: Part of the encryption configuration for the Batch account.
            --encryption-key-source=: Part of the encryption configuration for the Batch account.
            --public-network-access=: The network access type for accessing Azure Batch account.
            --storage-account=: The storage account name or resource ID to be used for auto storage.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -g, --resource-group=!: Name of the resource group
            -n, --name=!: Name of the Batch account.
          completion:
            flag:
                public-network-access:
                    - Enabled
                    - Disabled
        - name: list
          description: List the Batch accounts associated with a subscription or resource group.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of the resource group
        - name: outbound-endpoints
          description: Lists the endpoints that a Batch Compute Node under this Batch Account may call as part of Batch service administration.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of the resource group
            -n, --name=!: Name of the Batch account.
        - name: create
          description: The properties related to the auto-storage account.
          flags:
            --encryption-key-identifier=: Part of the encryption configuration for the Batch account.
            --encryption-key-source=: Part of the encryption configuration for the Batch account.
            --keyvault=: The KeyVault name or resource ID to be used for an account with a pool allocation mode of 'User Subscription'.
            --mi-system-assigned=: Set the system managed identity on the batch services account.
            --mi-user-assigned=: Resource ID of the user assigned identity for the batch services account.
            --no-wait=: Do not wait for the long-running operation to finish.
            --public-network-access=: The network access type for accessing Azure Batch account.
            --storage-account=: The storage account name or resource ID to be used for auto storage.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: Space-separated tags in 'key[=value]' format.
                nargs: -1
            -g, --resource-group=!: Name of the resource group
            -l, --location=!: The region in which to create the account.
            -n, --name=!: Name of the Batch account.
          completion:
            flag:
                encryption-key-source:
                    - Microsoft.Batch
                    - Microsoft.KeyVault
                public-network-access:
                    - Enabled
                    - Disabled
        - name: login
          description: Log in to a Batch account through Azure Active Directory or Shared Key authentication.
          flags:
            --shared-key-auth=: Using Shared Key authentication, if not specified, it will use Azure Active Directory authentication.
            --show=: Display the credential information for the Batch account.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of the resource group
            -n, --name=!: Name of the Batch account.
        - name: show
          description: Get a specified Batch account or the currently set account.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of the resource group.
            -n, --name=: Name of the batch account to show.
        - name: autostorage-keys
          description: Manage the access keys for the auto storage account configured for a Batch account.
          commands:
            - name: sync
              description: Synchronizes access keys for the auto-storage account configured for the specified Batch account, only if storage key authentication is being used.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of the resource group
                -n, --name=!: Name of the Batch account.
    - name: application
      description: Manage Batch applications.
      commands:
        - name: package
          description: Manage Batch application packages.
          commands:
            - name: show
              description: Gets information about the specified application package.
              flags:
                --application-name=!: The name of the application.
                --subscription=: Name or ID of subscription.
                --version-name=!: The version of the application.
                -g, --resource-group=!: Name of the resource group
                -n, --name=!: Name of the Batch account.
            - name: list
              description: Lists all of the application packages in the specified application.
              flags:
                --application-name=!: The name of the application.
                --maxresults=: The maximum number of items to return in the response.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of the resource group
                -n, --name=!: Name of the Batch account.
            - name: create
              description: Creates an application package record.
              flags:
                --application-name=!: The name of the application.
                --package-file=!: The path of the application package in zip format
                --subscription=: Name or ID of subscription.
                --version-name=!: The version name of the application.
                -g, --resource-group=!: Name of the resource group
                -n, --name=!: Name of the Batch account.
            - name: activate
              description: Activates the specified application package.
              flags:
                --application-name=!: The name of the application.
                --format=!: The format of the application package binary file.
                --subscription=: Name or ID of subscription.
                --version-name=!: The version name of the application.
                -g, --resource-group=!: Name of the resource group
                -n, --name=!: Name of the Batch account.
            - name: delete
              description: Deletes an application package record and its associated binary file.
              flags:
                --application-name=!: The name of the application.
                --subscription=: Name or ID of subscription.
                --version-name=!: The version of the application.
                -g, --resource-group=!: Name of the resource group
                -n, --name=!: Name of the Batch account.
                -y, --yes=: Do not prompt for confirmation.
        - name: delete
          description: Deletes an application.
          flags:
            --application-name=!: The name of the application.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of the resource group
            -n, --name=!: Name of the Batch account.
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          description: Lists all of the applications in the specified account.
          flags:
            --maxresults=: The maximum number of items to return in the response.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of the resource group
            -n, --name=!: Name of the Batch account.
        - name: summary
          description: View a summary of Batch application packages.
          commands:
            - name: list
              description: Lists all of the applications available in the specified Account.
              flags:
                --account-endpoint=: Batch service endpoint.
                --account-key=: Batch account key.
                --account-name=: Batch account name.
                --subscription=: Name or ID of subscription.
            - name: show
              description: Gets information about the specified Application.
              flags:
                --account-endpoint=: Batch service endpoint.
                --account-key=: Batch account key.
                --account-name=: Batch account name.
                --application-id=!: The ID of the Application.
                --subscription=: Name or ID of subscription.
        - name: show
          description: Gets information about the specified application.
          flags:
            --application-name=!: The name of the application.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of the resource group
            -n, --name=!: Name of the Batch account.
        - name: create
          description: Adds an application to the specified Batch account.
          flags:
            --application-name=!: The name of the application.
            --parameters=: The parameters for the request.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of the resource group
            -n, --name=!: Name of the Batch account.
        - name: set
          description: Contains information about an application in a Batch account.
          flags:
            --allow-updates=: Specify to indicate whether packages within the application may be overwritten using the same version string.
            --application-name=!: The name of the application.
            --default-version=: Specify which package to use if a client requests the application but does not specify a version.
            --display-name=: Specify the display name for the application.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of the resource group
            -n, --name=!: Name of the Batch account.
    - name: job
      description: Manage Batch jobs.
      commands:
        - name: prep-release-status
          description: View the status of Batch job preparation and release tasks.
          commands:
            - name: list
              description: Lists the execution status of the Job Preparation and Job Release Task for the specified Job across the Compute Nodes where the Job has run.
              flags:
                --account-endpoint=: Batch service endpoint.
                --account-key=: Batch account key.
                --account-name=: Batch account name.
                --filter=: An OData $filter clause.
                --job-id=!: The ID of the Job.
                --select=:
                    description: An OData $select clause.
                    nargs: -1
                --subscription=: Name or ID of subscription.
        - name: enable
          description: Enables the specified Job, allowing new Tasks to run.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --if-match=: An ETag value associated with the version of the resource known to the client.
            --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --if-none-match=: An ETag value associated with the version of the resource known to the client.
            --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --job-id=!: The ID of the Job to enable.
            --subscription=: Name or ID of subscription.
        - name: reset
          description: Updates the properties of the specified Job.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --allow-task-preemption=: Whether Tasks in this job can be preempted by other high priority jobs.
            --if-match=: An ETag value associated with the version of the resource known to the client.
            --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --if-none-match=: An ETag value associated with the version of the resource known to the client.
            --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --job-id=!: The ID of the Job whose properties you want to update.
            --job-max-task-retry-count=: The maximum number of times each Task may be retried.
            --job-max-wall-clock-time=: The maximum elapsed time that the Job may run, measured from the time the Job is created.
            --json-file=: A file containing the job specification in JSON (formatted to match the respective REST API body).
            --max-parallel-tasks=: The maximum number of tasks that can be executed in parallel for the job.
            --metadata=:
                description: A list of name-value pairs associated with the Job as metadata.
                nargs: -1
            --on-all-tasks-complete=: The action the Batch service should take when all Tasks in the Job are in the completed state.
            --pool-id=: The ID of an existing Pool.
            --priority=: The priority of the Job.
            --subscription=: Name or ID of subscription.
        - name: show
          description: Gets information about the specified Job.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --expand=:
                description: An OData $expand clause.
                nargs: -1
            --if-match=: An ETag value associated with the version of the resource known to the client.
            --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --if-none-match=: An ETag value associated with the version of the resource known to the client.
            --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --job-id=!: The ID of the Job.
            --select=:
                description: An OData $select clause.
                nargs: -1
            --subscription=: Name or ID of subscription.
        - name: set
          description: Updates the properties of the specified Job.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --allow-task-preemption=: Whether Tasks in this job can be preempted by other high priority jobs.
            --if-match=: An ETag value associated with the version of the resource known to the client.
            --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --if-none-match=: An ETag value associated with the version of the resource known to the client.
            --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --job-id=!: The ID of the Job whose properties you want to update.
            --job-max-task-retry-count=: The maximum number of times each Task may be retried.
            --job-max-wall-clock-time=: The maximum elapsed time that the Job may run, measured from the time the Job is created.
            --json-file=: A file containing the job specification in JSON (formatted to match the respective REST API body).
            --max-parallel-tasks=: The maximum number of tasks that can be executed in parallel for the job.
            --metadata=:
                description: A list of name-value pairs associated with the Job as metadata.
                nargs: -1
            --on-all-tasks-complete=: The action the Batch service should take when all Tasks in the Job are in the completed state.
            --pool-id=: The ID of an existing Pool.
            --priority=: The priority of the Job.
            --subscription=: Name or ID of subscription.
        - name: list
          description: List all of the jobs or job schedule in a Batch account.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: The Batch account key.
            --account-name=: The Batch account name.
            --expand=:
                description: An OData $expand clause.
                nargs: -1
            --filter=: An OData $filter clause.
            --job-schedule-id=: The ID of the job schedule from which you want to get a list of jobs.
            --select=:
                description: An OData $select clause.
                nargs: -1
            --subscription=: Name or ID of subscription.
        - name: disable
          description: Disables the specified Job, preventing new Tasks from running.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --disable-tasks=: What to do with active Tasks associated with the Job.
            --if-match=: An ETag value associated with the version of the resource known to the client.
            --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --if-none-match=: An ETag value associated with the version of the resource known to the client.
            --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --job-id=!: The ID of the Job to disable.
            --json-file=: A file containing the content specification in JSON (formatted to match the respective REST API body).
            --subscription=: Name or ID of subscription.
        - name: stop
          description: Terminates the specified Job, marking it as completed.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --if-match=: An ETag value associated with the version of the resource known to the client.
            --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --if-none-match=: An ETag value associated with the version of the resource known to the client.
            --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --job-id=!: The ID of the Job to terminate.
            --subscription=: Name or ID of subscription.
            --terminate-reason=: Termination reason.
        - name: task-counts
          description: View the number of tasks and slots in a Batch job and their states.
          commands:
            - name: show
              description: Gets the Task counts for the specified Job.
              flags:
                --account-endpoint=: Batch service endpoint.
                --account-key=: Batch account key.
                --account-name=: Batch account name.
                --job-id=!: The ID of the Job.
                --subscription=: Name or ID of subscription.
        - name: create
          description: Creates a Job to the specified Account.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --allow-task-preemption=: Whether Tasks in this job can be preempted by other high priority jobs.
            --id=: A string that uniquely identifies the Job within the Account.
            --job-manager-task-application-package-references=:
                description: A list of Application Packages that the Batch service will deploy to the Compute Node before running the command line.Application Packages are downloaded and deployed to a shared directory, not the Task working directory.
                nargs: -1
            --job-manager-task-command-line=: The command line of the Job Manager Task.
            --job-manager-task-environment-settings=:
                description: A list of environment variable settings for the Job Manager Task.
                nargs: -1
            --job-manager-task-id=: A string that uniquely identifies the Job Manager Task within the Job.
            --job-manager-task-resource-files=:
                description: A list of files that the Batch service will download to the Compute Node before running the command line.
                nargs: -1
            --job-max-task-retry-count=: The maximum number of times each Task may be retried.
            --job-max-wall-clock-time=: The maximum elapsed time that the Job may run, measured from the time the Job is created.
            --json-file=: A file containing the job specification in JSON (formatted to match the respective REST API body).
            --max-parallel-tasks=: The maximum number of tasks that can be executed in parallel for the job.
            --metadata=:
                description: A list of name-value pairs associated with the Job as metadata.
                nargs: -1
            --on-all-tasks-complete=: The action the Batch service should take when all Tasks in the Job are in the completed state.
            --pool-id=: The ID of an existing Pool.
            --priority=: The priority of the Job.
            --required-slots=: The number of scheduling slots that the Task requires to run.
            --subscription=: Name or ID of subscription.
            --uses-task-dependencies=: Whether Tasks in the Job can define dependencies on each other.
        - name: delete
          description: Deletes a Job.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --if-match=: An ETag value associated with the version of the resource known to the client.
            --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --if-none-match=: An ETag value associated with the version of the resource known to the client.
            --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --job-id=!: The ID of the Job to delete.
            --subscription=: Name or ID of subscription.
            -y, --yes=: Do not prompt for confirmation.
    - name: job-schedule
      description: Manage Batch job schedules.
      commands:
        - name: reset
          description: Updates the properties of the specified Job Schedule.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --allow-task-preemption=: Whether Tasks in this job can be preempted by other high priority jobs.
            --do-not-run-after=: A time after which no Job will be created under this Job Schedule.
            --do-not-run-until=: The earliest time at which any Job may be created under this Job Schedule.
            --if-match=: An ETag value associated with the version of the resource known to the client.
            --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --if-none-match=: An ETag value associated with the version of the resource known to the client.
            --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
            --job-manager-task-application-package-references=:
                description: A list of Application Packages that the Batch service will deploy to the Compute Node before running the command line.Application Packages are downloaded and deployed to a shared directory, not the Task working directory.
                nargs: -1
            --job-manager-task-command-line=: The command line of the Job Manager Task.
            --job-manager-task-environment-settings=:
                description: A list of environment variable settings for the Job Manager Task.
                nargs: -1
            --job-manager-task-id=: A string that uniquely identifies the Job Manager Task within the Job.
            --job-manager-task-resource-files=:
                description: A list of files that the Batch service will download to the Compute Node before running the command line.
                nargs: -1
            --job-max-task-retry-count=: The maximum number of times each Task may be retried.
            --job-max-wall-clock-time=: The maximum elapsed time that the Job may run, measured from the time the Job is created.
            --job-metadata=:
                description: A list of name-value pairs associated with each Job created under this schedule as metadata.
                nargs: -1
            --job-schedule-id=!: The ID of the Job Schedule to update.
            --json-file=: A file containing the job schedule specification in JSON (formatted to match the respective REST API body).
            --max-parallel-tasks=: The maximum number of tasks that can be executed in parallel for the job.
            --metadata=:
                description: A list of name-value pairs associated with the schedule as metadata.
                nargs: -1
            --on-all-tasks-complete=: The action the Batch service should take when all Tasks in a Job created under this schedule are in the completed state.
            --pool-id=: The ID of an existing Pool.
            --priority=: The priority of Jobs created under this schedule.
            --recurrence-interval=: The time interval between the start times of two successive Jobs under the Job Schedule.
            --required-slots=: The number of scheduling slots that the Task requires to run.
            --start-window=: The time interval, starting from the time at which the schedule indicates a Job should be created, within which a Job must be created.
            --subscription=: Name or ID of subscription.
            --uses-task-dependencies=: Whether Tasks in the Job can define dependencies on each other.
        - name: show
          description: Gets information about the specified Job Schedule.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --expand=:
                description: An OData $expand clause.
                nargs: -1
            --if-match=: An ETag value associated with the version of the resource known to the client.
