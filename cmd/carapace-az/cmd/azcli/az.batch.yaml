                    - classic
                    - simplified
        - name: set
          description: Updates the properties of the specified Pool.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --application-package-references=:
                description: A list of Packages to be installed on each Compute Node in the Pool.
