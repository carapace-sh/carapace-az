        - name: list
          description: Lists all of the Pools in the specified Account.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --expand=:
                description: An OData $expand clause.
                nargs: -1
            --filter=: An OData $filter clause.
            --select=:
                description: An OData $select clause.
                nargs: -1
            --subscription=: Name or ID of subscription.
        - name: create
          description: Creates a Pool to the specified Account.
          flags:
            --accelerated-networking=:
                description: Whether this pool should enable accelerated networking.
                nargs: -1
            --account-endpoint=: Batch service endpoint.
            --account-key=: Batch account key.
            --account-name=: Batch account name.
            --application-package-references=:
                description: The list of Packages to be installed on each Compute Node in the Pool.
                nargs: -1
            --auto-scale-formula=: A formula for the desired number of Compute Nodes in the Pool.
            --defer-os-rolling-upgrade=:
                description: Defer OS upgrades on the TVMs if they are running tasks.
                nargs: -1
            --disable-auto-rollback=:
                description: Whether OS image rollback feature should be disabled.
                nargs: -1
            --disk-encryption-targets=: A space separated list of DiskEncryptionTargets.
            --enable-auto-os-upgrade=:
                description: Indicates whether OS upgrades should automatically be applied to scale set instances in a rolling fashion when a newer version of the OS image becomes available.
                nargs: -1
            --enable-cross-zone-upgrade=:
                description: Allow VMSS to ignore AZ boundaries when constructing upgrade batches.
                nargs: -1
            --enable-inter-node-communication=: Whether the Pool permits direct communication between Compute Nodes.
            --enable-secure-boot=:
                description: Enable secure boot
                nargs: -1
            --enable-vtpm=:
                description: Enable vTPM
                nargs: -1
            --enable-write-accel=:
                description: Specify whether writeAccelerator should be enabled or disabled on the disk.
                nargs: -1
            --encryption-at-host=:
                description: This property can be used by user in the request to enable or disable the Host Encryption for the virtual machine or virtual machine scale set.
                nargs: -1
            --id=: A string that uniquely identifies the Pool within the Account.
            --image=: OS image reference.
            --json-file=: The file containing pool create properties parameter specification in JSON(formatted to match REST API request body).
            --max-batch-instance-percent=: The maximum percent of total virtual machine instances that will be upgraded simultaneously by the rolling upgrade in one batch.
            --max-unhealthy-instance-percent=: The maximum percentage of the total virtual machine instances in the scale set that can be simultaneously unhealthy, either as a result of being upgraded, or by being found in an unhealthy state by the virtual machine health checks before the rolling upgrade aborts.
            --max-unhealthy-upgraded-instance-percent=: The maximum percentage of upgraded virtual machine instances that can be found to be in an unhealthy state.
            --metadata=:
                description: A list of name-value pairs associated with the Pool as metadata.
                nargs: -1
            --node-agent-sku-id=: The SKU of the Batch Compute Node agent to be provisioned on Compute Nodes in the Pool.
            --os-disk-caching=: Specify the caching requirements.
            --os-disk-size=: The initial disk size in GB when creating new OS disk.
            --pause-time-between-batches=: The wait time between completing the update for all virtual machines in one batch and starting the next batch.
            --placement=: Specifies the ephemeral disk placement for operating system disk for all VMs in the pool.
            --policy=: Node placement Policy type on Batch Pools.
            --prioritize-unhealthy-instances=:
                description: Upgrade all unhealthy instances in a scale set before any healthy instances.
                nargs: -1
            --resize-timeout=: The timeout for allocation of Compute Nodes to the Pool.
            --resource-tags=: User is able to specify resource tags for the pool.
            --rollback-failed-instances-on-policy-breach=:
                description: Rollback failed instances to previous model if the Rolling Upgrade policy is violated.
                nargs: -1
            --security-type=: Specify the SecurityType of the virtual machine.
            --start-task-command-line=: The command line of the StartTask.
            --start-task-environment-settings=:
                description: A list of environment variable settings for the StartTask.
                nargs: -1
            --start-task-max-task-retry-count=: The maximum number of times the Task may be retried.
            --start-task-resource-files=:
                description: A list of files that the Batch service will download to the Compute Node before running the command line.
                nargs: -1
            --start-task-wait-for-success=: Whether the Batch service should wait for the StartTask to complete successfully (that is, to exit with exit code 0) before scheduling any Tasks on the Compute Node.
            --storage-account-type=: The storage account type for managed disk
            --subscription=: Name or ID of subscription.
            --target-communication=: The desired node communication mode for the pool.
            --target-dedicated-nodes=: The desired number of dedicated Compute Nodes in the Pool.
            --target-low-priority-nodes=: The desired number of Spot/Low-priority Compute Nodes in the Pool.
            --targets=:
                description: The list of disk targets Batch Service will encrypt on the compute node.
                nargs: -1
            --task-slots-per-node=: The number of task slots that can be used to run concurrent tasks on a single compute node in the pool.
            --upgrade-policy-mode=: The mode of the pool OS upgrade.
            --use-rolling-upgrade-policy=:
                description: Indicates whether rolling upgrade policy should be used during Auto OS Upgrade.
                nargs: -1
            --vm-size=: The size of virtual machines in the Pool.
          completion:
            flag:
                accelerated-networking:
                    - "true"
                    - "false"
                defer-os-rolling-upgrade:
                    - "true"
                    - "false"
                disable-auto-rollback:
                    - "true"
                    - "false"
                enable-auto-os-upgrade:
                    - "true"
                    - "false"
                enable-cross-zone-upgrade:
                    - "true"
                    - "false"
                enable-secure-boot:
                    - "true"
                    - "false"
                enable-vtpm:
                    - "true"
                    - "false"
                enable-write-accel:
                    - "true"
                    - "false"
                encryption-at-host:
                    - "true"
                    - "false"
                os-disk-caching:
                    - none
                    - readonly
                    - readwrite
                prioritize-unhealthy-instances:
                    - "true"
                    - "false"
                rollback-failed-instances-on-policy-breach:
                    - "true"
                    - "false"
                storage-account-type:
                    - standard_lrs
                    - premium_lrs
                    - standardssd_lrs
                target-communication:
                    - default
                    - classic
                    - simplified
                use-rolling-upgrade-policy:
                    - "true"
                    - "false"
    - name: private-endpoint-connection
      description: Manage Batch account private endpoint connections.
      commands:
        - name: list
          description: Lists all of the private endpoint connections in the specified account.
          flags:
            --account-name=!: The name of the Batch account.
            --maxresults=: The maximum number of items to return in the response.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of the resource group
        - name: show
          description: Gets information about the specified private endpoint connection.
          flags:
            --account-name=!: The name of the Batch account.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of the resource group
            -n, --name=!: The private endpoint connection name.
    - name: private-link-resource
      description: Manage Batch account private Link Resources.
      commands:
        - name: list
          description: Lists all of the private link resources in the specified account.
          flags:
            --account-name=!: The name of the Batch account.
            --maxresults=: The maximum number of items to return in the response.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of the resource group
        - name: show
          description: Gets information about the specified private link resource.
          flags:
            --account-name=!: The name of the Batch account.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of the resource group
            -n, --name=!: The private link resource name.
    - name: task
      description: Manage Batch tasks.
      commands:
        - name: reset
          description: Reset the properties of a Batch task.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: The Batch account key.
            --account-name=: The Batch account name.
            --if-match=: The operation will be performed only if the resource's current ETag exactly matches the specified value.
            --if-modified-since=: The operation will be performed only if the resource has been modified since the specified timestamp.
            --if-none-match=: The operation will not be performed only if the resource's current ETag exactly matches the specified value.
            --if-unmodified-since=: The operation will not be performed only if the resource has been modified since the specified timestamp.
            --job-id=!: The ID of the Job containing the Task.
            --json-file=: The file containing pool update properties parameter specification in JSON(formatted to match REST API request body).
            --max-task-retry-count=: The maximum number of times the Task may be retried.
            --max-wall-clock-time=: If this is not specified, there is no time limit on how long the Task may run.
            --retention-time=: The default is 7 days, i.e. the Task directory will be retained for 7 days unless the Compute Node is removed or the Job is deleted.
            --subscription=: Name or ID of subscription.
            --task-id=!: The ID of the Task to update.
        - name: subtask
          description: Manage subtask information of a Batch task.
          commands:
            - name: list
              description: Lists all of the subtasks that are associated with the specified multi-instance Task.
              flags:
                --account-endpoint=: Batch service endpoint.
                --account-key=: Batch account key.
                --account-name=: Batch account name.
                --job-id=!: The ID of the Job.
                --select=:
                    description: An OData $select clause.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --task-id=!: The ID of the Task.
        - name: file
          description: Manage Batch task files.
          commands:
            - name: delete
              description: Deletes the specified Task file from the Compute Node where the Task ran.
              flags:
                --account-endpoint=: Batch service endpoint.
                --account-key=: Batch account key.
                --account-name=: Batch account name.
                --file-path=!: The path to the Task file that you want to get the content of.
                --job-id=!: The ID of the Job that contains the Task.
                --recursive=:
                    description: Whether to delete children of a directory.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --task-id=!: The ID of the Task whose file you want to retrieve.
                -y, --yes=: Do not prompt for confirmation.
              completion:
                flag:
                    recursive:
                        - "true"
                        - "false"
            - name: list
              description: Lists the files in a Task's directory on its Compute Node.
              flags:
                --account-endpoint=: Batch service endpoint.
                --account-key=: Batch account key.
                --account-name=: Batch account name.
                --filter=: An OData $filter clause.
                --job-id=!: The ID of the Job that contains the Task.
                --recursive=:
                    description: Whether to list children of the Task directory.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --task-id=!: The ID of the Task whose files you want to list.
              completion:
                flag:
                    recursive:
                        - "true"
                        - "false"
            - name: show
              description: Gets the properties of the specified Task file.
              flags:
                --account-endpoint=: Batch service endpoint.
                --account-key=: Batch account key.
                --account-name=: Batch account name.
                --file-path=!: The path to the Task file that you want to get the content of.
                --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
                --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
                --job-id=!: The ID of the Job that contains the Task.
                --subscription=: Name or ID of subscription.
                --task-id=!: The ID of the Task whose file you want to retrieve.
            - name: download
              description: Returns the content of the specified Task file.
              flags:
                --account-endpoint=: Batch service endpoint.
                --account-key=: Batch account key.
                --account-name=: Batch account name.
                --destination=!: The path to the destination file or directory.
                --end-range=: The byte range to be retrieved.
                --file-path=!: The path to the Task file that you want to get the content of.
                --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
                --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
                --job-id=!: The ID of the Job that contains the Task.
                --start-range=: The byte range to be retrieved.
                --subscription=: Name or ID of subscription.
                --task-id=!: The ID of the Task whose file you want to retrieve.
        - name: create
          description: Parameters for creating an Azure Batch Task.
          flags:
            --account-endpoint=: Batch service endpoint.
            --account-key=: The Batch account key.
            --account-name=: The Batch account name.
            --affinity-id=: Required.
