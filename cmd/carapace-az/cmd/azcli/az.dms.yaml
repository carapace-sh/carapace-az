            --target-platform=!: ""
            -g, --resource-group=!: Name of resource group.
            -l, --location=!: Location.
            -n, --name=!: The name of the Project.
        - name: check-name
          flags:
            --service-name=!: The name of the Service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the Project.
        - name: list
          description: Get projects in a service.
          flags:
            --service-name=!: The name of the Service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: show
      description: Get DMS Service Instance.
      flags:
        --cmd=:
