          description: This implementation eschews the source and target connection details and the database list.
          flags:
            --service-name=!: The name of the Service.
            --source-platform=!: ""
            --subscription=: Name or ID of subscription.
            --tags=:
                description: A space-delimited list of tags in "tag1[=value1]" format.
