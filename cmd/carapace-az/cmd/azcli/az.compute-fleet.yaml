# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: compute-fleet
description: Manage for Azure Compute Fleet
commands:
    - name: create
      description: Create an Azure Compute Fleet
      flags:
        --alp=:
            description: Represents the configuration for additional locations where Fleet resources may be deployed.
            nargs: -1
        --cp=:
            description: Compute Profile to use for running user's workloads.
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --rpp=:
            description: Configuration Options for Regular instances in Compute Fleet.
            nargs: -1
        --spp=:
            description: Configuration Options for Spot instances in Compute Fleet.
            nargs: -1
        --subscription=: Name or ID of subscription.
        --vma=:
            description: Attribute based Fleet.
            nargs: -1
        --vmsizeprof=:
            description: List of VM sizes supported for Compute Fleet  Support shorthand-syntax, json-file and yaml-file.
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -i, --identity=:
            description: The managed service identities assigned to this resource.
            nargs: -1
        -l, --location=: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
        -n, --name=!: The name of the Compute Fleet
        -p, --plan=:
            description: Details of the resource plan.
            nargs: -1
        -t, --tags=:
            description: Resource tags.
            nargs: -1
        -z, --zones=:
            description: Zones in which the Compute Fleet is available  Support shorthand-syntax, json-file and yaml-file.
            nargs: -1
      completion:
        flag:
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: delete
      description: Delete an Azure Compute  Fleet
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the Compute Fleet
        -y, --yes=: Do not prompt for confirmation.
      completion:
        flag:
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: list
      description: List Fleet resources by subscription ID and resource group
      flags:
        --max-items=: Total number of items to return in the command's output.
        --next-token=: Token to specify where to start paginating.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: list-vmss
      description: List VirtualMachineScaleSet resources by Fleet
      flags:
        --max-items=: Total number of items to return in the command's output.
        --name=!: The name of the Fleet
        --next-token=: Token to specify where to start paginating.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
    - name: show
      description: Get a Fleet
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the Compute Fleet
    - name: update
      description: Update a Fleet
      flags:
        --add=:
            description: Add an object to a list of objects by specifying a path and key value pairs.
            nargs: -1
        --alp=:
            description: Represents the configuration for additional locations where Fleet resources may be deployed.
            nargs: -1
        --cp=:
            description: Compute Profile to use for running user's workloads.
            nargs: -1
        --force-string=:
            description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --remove=:
            description: Remove a property or an element from a list.
            nargs: -1
        --rpp=:
            description: Configuration Options for Regular instances in Compute Fleet.
            nargs: -1
        --set=:
            description: Update an object by specifying a property path and value to set.
            nargs: -1
        --spp=:
            description: Configuration Options for Spot instances in Compute Fleet.
            nargs: -1
        --subscription=: Name or ID of subscription.
        --vma=:
            description: Attribute based Fleet.
            nargs: -1
        --vmsizeprof=:
            description: List of VM sizes supported for Compute Fleet  Support shorthand-syntax, json-file and yaml-file.
            nargs: -1
        -g, --resource-group=: Name of resource group.
        -i, --identity=:
            description: The managed service identities assigned to this resource.
            nargs: -1
        -n, --name=: The name of the Compute Fleet
        -p, --plan=:
            description: Details of the resource plan.
            nargs: -1
        -t, --tags=:
            description: Resource tags.
            nargs: -1
        -z, --zones=:
            description: Zones in which the Compute Fleet is available  Support shorthand-syntax, json-file and yaml-file.
            nargs: -1
      completion:
        flag:
            force-string:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: wait
      description: Place the CLI in a waiting state until a condition is met.
      flags:
        --created=: wait until created with 'provisioningState' at 'Succeeded'
        --custom=: Wait until the condition satisfies a custom JMESPath query.
        --deleted=: wait until deleted
        --exists=: wait until the resource exists
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --interval=: polling interval in seconds
        --subscription=: Name or ID of subscription.
        --timeout=: maximum wait in seconds
        --updated=: wait until updated with provisioningState at 'Succeeded'
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the Compute Fleet
