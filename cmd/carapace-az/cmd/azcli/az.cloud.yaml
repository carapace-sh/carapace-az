# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: cloud
description: Manage registered Azure clouds.
commands:
    - name: list
      description: List registered clouds.
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
    - name: list-profiles
      description: List the supported profiles for a cloud.
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --show-all=: Show all available profiles supported in the CLI.
        -n, --name=: Name of a registered cloud.
    - name: register
      description: Register a cloud.
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cloud-config=: JSON encoded cloud configuration.
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --endpoint-active-directory-data-lake-resource-id=: The Active Directory resource ID for data lake services
        --endpoint-active-directory-graph-resource-id=: The Active Directory resource ID
        --endpoint-active-directory-resource-id=: The resource ID to obtain AD tokens for
        --endpoint-active-directory=: The Active Directory login endpoint
        --endpoint-gallery=: The template gallery endpoint
        --endpoint-management=: The management service endpoint
        --endpoint-resource-manager=: The resource management endpoint
        --endpoint-sql-management=: The sql server management endpoint
        --endpoint-vm-image-alias-doc=: The uri of the document which caches commonly used virtual machine images
        --profile=: Profile to use for this cloud
        --suffix-acr-login-server-endpoint=: The Azure Container Registry login server suffix
        --suffix-azure-datalake-analytics-catalog-and-job-endpoint=: The Data Lake analytics job and catalog service dns suffix
        --suffix-azure-datalake-store-file-system-endpoint=: The Data Lake store filesystem service dns suffix
        --suffix-keyvault-dns=: The Key Vault service dns suffix
        --suffix-sql-server-hostname=: The dns suffix for sql servers
        --suffix-storage-endpoint=: The endpoint suffix for storage accounts
        -n, --name=!: Name of a registered cloud
      completion:
        flag:
            profile:
                - latest
                - 2017-03-09-profile
                - 2018-03-01-hybrid
                - 2019-03-01-hybrid
                - 2020-09-01-hybrid
    - name: set
      description: Set the active cloud.
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --profile=: Profile to use for this cloud
        -n, --name=!: Name of a registered cloud
      completion:
        flag:
            profile:
                - latest
                - 2017-03-09-profile
                - 2018-03-01-hybrid
                - 2019-03-01-hybrid
                - 2020-09-01-hybrid
    - name: show
      description: Get the details of a registered cloud.
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        -n, --name=: Name of a registered cloud.
    - name: unregister
      description: Unregister a cloud.
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        -n, --name=!: Name of a registered cloud
    - name: update
      description: Update the configuration of a cloud.
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cloud-config=: JSON encoded cloud configuration.
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --endpoint-active-directory-data-lake-resource-id=: The Active Directory resource ID for data lake services
        --endpoint-active-directory-graph-resource-id=: The Active Directory resource ID
        --endpoint-active-directory-resource-id=: The resource ID to obtain AD tokens for
        --endpoint-active-directory=: The Active Directory login endpoint
        --endpoint-gallery=: The template gallery endpoint
        --endpoint-management=: The management service endpoint
        --endpoint-resource-manager=: The resource management endpoint
        --endpoint-sql-management=: The sql server management endpoint
        --endpoint-vm-image-alias-doc=: The uri of the document which caches commonly used virtual machine images
        --profile=: Profile to use for this cloud
        --suffix-acr-login-server-endpoint=: The Azure Container Registry login server suffix
        --suffix-azure-datalake-analytics-catalog-and-job-endpoint=: The Data Lake analytics job and catalog service dns suffix
        --suffix-azure-datalake-store-file-system-endpoint=: The Data Lake store filesystem service dns suffix
        --suffix-keyvault-dns=: The Key Vault service dns suffix
        --suffix-sql-server-hostname=: The dns suffix for sql servers
        --suffix-storage-endpoint=: The endpoint suffix for storage accounts
        -n, --name=: Name of a registered cloud.
      completion:
        flag:
            profile:
                - latest
                - 2017-03-09-profile
                - 2018-03-01-hybrid
                - 2019-03-01-hybrid
                - 2020-09-01-hybrid
