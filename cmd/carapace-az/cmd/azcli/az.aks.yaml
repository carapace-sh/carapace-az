# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: aks
description: Manage Azure Kubernetes Services.
commands:
    - name: approuting
      description: Commands to manage App Routing addon.
      commands:
        - name: disable
          description: Disable App Routing addon.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the managed cluster.
            -y, --yes=: Do not prompt for confirmation.
        - name: zone
          description: Commands to manage App Routing DNS Zones.
          commands:
            - name: add
              description: Add DNS Zone(s) to App Routing.
              flags:
                --attach-zones=: Grant DNS zone Contributor permissions on all zone IDs specified in --ids.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=!: Comma-separated list of DNS zone resource IDs to add to App Routing.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the managed cluster.
            - name: update
              description: Replace DNS Zone(s) in App Routing.
              flags:
                --attach-zones=: Grant DNS zone Contributor permissions on all zone IDs specified in --ids.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=!: Comma-separated list of DNS zone resource IDs to replace in App Routing.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the managed cluster.
            - name: delete
              description: Delete DNS Zone(s) from App Routing.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=!: Comma-separated list of DNS zone resource IDs to delete from App Routing.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the managed cluster.
                -y, --yes=: Do not prompt for confirmation.
            - name: list
              description: List DNS Zone IDs in App Routing.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the managed cluster.
        - name: enable
          description: Enable App Routing.
          flags:
            --attach-kv=: Attach a keyvault id to access secrets and certificates.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --enable-kv=: Enable the keyvault secrets provider.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the managed cluster.
        - name: update
          description: Update App Routing addon.
          flags:
            --attach-kv=: Attach a keyvault id to access secrets and certificates.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --enable-kv=: Enable the keyvault secrets provider addon.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the managed cluster.
    - name: browse
      description: Show the dashboard for a Kubernetes cluster in a web browser.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --disable-browser=: Don't launch a web browser after establishing port-forwarding.
        --listen-address=: The listening address for the dashboard.
        --listen-port=: The listening port for the dashboard.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: Name of the managed cluster.
    - name: check-acr
      description: Validate an ACR is accessible from an AKS cluster.
      flags:
        --acr=!: The FQDN of the ACR.
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --node-name=: The name of a specific node to perform acr pull test checks.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: Name of the managed cluster.
    - name: command
      description: See detail usage in 'az aks command invoke', 'az aks command result'.
      commands:
        - name: result
          description: Fetch result from previously triggered 'aks command invoke'.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -i, --command-id=: the command ID from "aks command invoke"
            -n, --name=!: Name of the managed cluster.
        - name: invoke
          description: Run a shell command (with kubectl, helm) on your aks cluster, support attaching files as well.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -c, --command=: the command to run
            -f, --file=: attach any files the command may use, or use '.' to upload the current folder.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the managed cluster.
