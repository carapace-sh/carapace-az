# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: aro
description: Manage Azure Red Hat OpenShift clusters.
commands:
    - name: create
      description: Create a cluster.
      flags:
        --apiserver-visibility=: API server visibility.
        --client-id=: Client ID of cluster service principal.
        --client-secret=: Client secret of cluster service principal.
        --cluster-resource-group=: Resource group of cluster.
        --disk-encryption-set=: ResourceID of the DiskEncryptionSet to be used for master and worker VMs.
        --domain=: Domain of cluster.
        --enable-preconfigured-nsg=:
            description: Use Preconfigured NSGs.
            nargs: -1
        --fips-validated-modules=:
            description: Use FIPS validated cryptography modules.
            nargs: -1
        --ingress-visibility=: Ingress visibility.
        --load-balancer-managed-outbound-ip-count=: The desired number of IPv4 outbound IPs created and managed by Azure for the cluster public load balancer.
        --master-encryption-at-host=:
            description: Encryption at host flag for master VMs.
            nargs: -1
        --master-subnet=!: Name or ID of master vnet subnet.
        --master-vm-size=: Size of master VMs.
        --no-wait=: Do not wait for the long-running operation to finish.
        --outbound-type=: Outbound type of cluster.
        --pod-cidr=: CIDR of pod network.
        --pull-secret=: Pull secret of cluster.
        --service-cidr=: CIDR of service network.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --version=: OpenShift version to use for cluster creation.
        --vnet-resource-group=: Name of vnet resource group.
        --vnet=: Name or ID of vnet.
        --worker-count=: Count of worker VMs.
        --worker-encryption-at-host=:
            description: Encryption at host flag for worker VMs.
            nargs: -1
        --worker-subnet=!: Name or ID of worker vnet subnet.
        --worker-vm-disk-size-gb=: Disk size in GB of worker VMs.
        --worker-vm-size=: Size of worker VMs.
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: Name of cluster.
      completion:
        flag:
            apiserver-visibility:
                - Private
                - Public
            enable-preconfigured-nsg:
                - "true"
                - "false"
            fips-validated-modules:
                - "true"
                - "false"
            ingress-visibility:
                - Private
                - Public
            master-encryption-at-host:
                - "true"
                - "false"
            worker-encryption-at-host:
                - "true"
                - "false"
    - name: delete
      description: Delete a cluster.
      flags:
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: Name of cluster.
        -y, --yes=: Do not prompt for confirmation.
    - name: get-admin-kubeconfig
      description: List admin kubeconfig of a cluster.
      flags:
        --subscription=: Name or ID of subscription.
        -f, --file=: Path to the file where kubeconfig should be saved.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: Name of cluster.
    - name: get-versions
      description: List versions available for installation.
      flags:
        --subscription=: Name or ID of subscription.
        -l, --location=!: Location.
    - name: list
      description: List clusters.
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: list-credentials
      description: List credentials of a cluster.
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: Name of cluster.
    - name: show
      description: Get the details of a cluster.
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: Name of cluster.
    - name: update
      description: Update a cluster.
      flags:
        --client-id=: Client ID of cluster service principal.
        --client-secret=: Client secret of cluster service principal.
        --load-balancer-managed-outbound-ip-count=: The desired number of IPv4 outbound IPs created and managed by Azure for the cluster public load balancer.
        --no-wait=: Do not wait for the long-running operation to finish.
        --refresh-credentials=:
            description: Refresh cluster application credentials.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: Name of cluster.
      completion:
        flag:
            refresh-credentials:
                - "true"
                - "false"
    - name: validate
      description: Validate permissions required to create a cluster.
      flags:
        --client-id=: Client ID of cluster service principal.
        --client-secret=: Client secret of cluster service principal.
        --cluster-resource-group=: Resource group of cluster.
        --disk-encryption-set=: ResourceID of the DiskEncryptionSet to be used for master and worker VMs.
        --master-subnet=!: Name or ID of master vnet subnet.
        --pod-cidr=: CIDR of pod network.
        --service-cidr=: CIDR of service network.
        --subscription=: Name or ID of subscription.
        --version=: OpenShift version to use for cluster creation.
        --vnet-resource-group=: Name of vnet resource group.
        --vnet=: Name or ID of vnet.
        --worker-subnet=!: Name or ID of worker vnet subnet.
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: Name of cluster.
    - name: wait
      description: Wait for a cluster to reach a desired state.
      flags:
        --created=: wait until created with 'provisioningState' at 'Succeeded'
        --custom=: Wait until the condition satisfies a custom JMESPath query.
        --deleted=: wait until deleted
        --exists=: wait until the resource exists
        --interval=: polling interval in seconds
        --subscription=: Name or ID of subscription.
        --timeout=: maximum wait in seconds
        --updated=: wait until updated with provisioningState at 'Succeeded'
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: Name of cluster.
