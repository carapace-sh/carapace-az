# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: rest
description: rest
commands:
    - name: rest
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --headers=:
            description: Space-separated headers in KEY=VALUE format or JSON string.
            nargs: -1
        --output-file=: save response payload to a file
        --resource=: Resource url for which CLI should acquire a token from AAD in order to access the service.
        --skip-authorization-header=: Do not auto-append Authorization header
        --subscription=: Name or ID of subscription.
        --uri-parameters=:
            description: Query parameters in the URL.
            nargs: -1
        -b, --body=: Request body.
        -m, --method=: HTTP request method
        -u, --url=!: Request URL.
      completion:
        flag:
            method:
                - head
                - get
                - put
                - post
                - delete
                - options
                - patch
