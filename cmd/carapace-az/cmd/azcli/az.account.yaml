# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: account
description: Manage Azure subscription information.
commands:
    - name: clear
      description: Clear all stored subscriptions.
    - name: get-access-token
      description: get AAD token to access to a specified resource.
      flags:
        --resource-type=: Type of well-known resource.
        --resource=: Azure resource endpoints in Microsoft Entra v1.0.
        --scope=:
            description: Space-separated scopes in Microsoft Entra v2.0.
            nargs: -1
        -s, --subscription=: Name or ID of subscription.
        -t, --tenant=: Tenant ID for which the token is acquired.
      completion:
        flag:
            resource-type:
                - oss-rdbms
                - arm
                - aad-graph
                - ms-graph
                - batch
                - media
                - data-lake
    - name: list
      description: List the imported subscriptions.
      flags:
        --all=: List all subscriptions from all clouds, including subscriptions that are not 'Enabled'.
        --refresh=: retrieve up-to-date subscriptions from server
    - name: list-locations
      description: List supported regions for the current subscription.
      flags:
        --include-extended-locations=:
            description: Whether to include extended locations.
            nargs: -1
      completion:
        flag:
            include-extended-locations:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: lock
      description: Manage Azure subscription level locks.
      commands:
        - name: list
          description: List lock information in the subscription.
          flags:
            --filter-string=: A query filter to use to restrict the results.
        - name: show
          description: Show the details of a subscription lock
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            -n, --name=: Name of the lock
        - name: create
          description: Create a subscription lock.
          flags:
            --notes=: Notes about this lock.
            -n, --name=!: Name of the lock
            -t, --lock-type=!: The type of lock restriction.
          completion:
            flag:
                lock-type:
                    - CanNotDelete
                    - ReadOnly
        - name: delete
          description: Delete a subscription lock.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            -n, --name=: Name of the lock
        - name: update
          description: Allows updates to the lock-type(level) and the notes of the lock
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --notes=: Notes about this lock.
            -n, --name=: Name of the lock
            -t, --lock-type=: The type of lock restriction.
          completion:
            flag:
                lock-type:
                    - CanNotDelete
                    - ReadOnly
    - name: management-group
      description: Manage Azure Management Groups.
      commands:
        - name: tenant-backfill
          description: Backfill Tenant Subscription Operations for Management Groups
          commands:
            - name: get
              description: Get the backfill status for a tenant.
            - name: start
              description: Start backfilling subscriptions for a tenant.
        - name: hierarchy-settings
          description: Provide operations for hierarchy settings defined at the management group level. Settings can only be set on the root Management Group of the hierarchy.
          commands:
            - name: update
              description: Update the hierarchy settings defined at the Management Group level.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                -m, --default-management-group=: ""
                -n, --name=!: ""
                -r, --require-authorization-for-group-creation=: ""
            - name: create
              description: Create hierarchy settings defined at the Management Group level.
              flags:
                -m, --default-management-group=: ""
                -n, --name=!: ""
                -r, --require-authorization-for-group-creation=: ""
            - name: list
              description: Get all the hierarchy settings defined at the Management Group level.
              flags:
                -n, --name=!: ""
            - name: delete
              description: Delete the hierarchy settings defined at the Management Group level.
              flags:
                -n, --name=!: ""
                -y, --yes=: Do not prompt for confirmation.
        - name: create
          description: Create a new management group.
          flags:
            --no-register=: Skip registration for resource provider Microsoft.Management
            -d, --display-name=: ""
            -n, --name=!: ""
            -p, --parent=: ""
        - name: subscription
          description: Subscription operations for Management Groups.
          commands:
            - name: remove
              description: Remove an existing subscription from a management group.
              flags:
                -n, --name=!: ""
                -s, --subscription=!: Name or ID of subscription.
            - name: add
              description: Add a subscription to a management group.
              flags:
                -n, --name=!: ""
                -s, --subscription=!: Name or ID of subscription.
            - name: show
              description: Show the details of a subscription under a known management group.
              flags:
                -n, --name=!: ""
                -s, --subscription=!: Name or ID of subscription.
            - name: show-sub-under-mg
              description: Get the subscription under a management group.
              flags:
                -n, --name=!: ""
        - name: update
          description: Update an existing management group.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            -d, --display-name=: ""
            -n, --name=!: ""
            -p, --parent=: ""
        - name: entities
          description: Entity operations (Management Group and Subscriptions) for Management Groups.
          commands:
            - name: list
              description: List all entities for the authenticated user.
        - name: delete
          description: Delete an existing management group.
          flags:
            --no-register=: Skip registration for resource provider Microsoft.Management
            -n, --name=!: ""
        - name: show
          description: Get the details of the management group.
          flags:
            --no-register=: Skip registration for resource provider Microsoft.Management
            -e, --expand=: ""
            -n, --name=!: ""
            -r, --recurse=: ""
        - name: check-name-availability
          description: Check if a Management Group Name is Valid.
          flags:
            -n, --name=!: ""
        - name: list
          description: List all management groups in the current tenant.
          flags:
            --no-register=: Skip registration for resource provider Microsoft.Management
    - name: set
      description: Set the current subscription
      flags:
        -s, --subscription=!: Name or ID of subscription.
    - name: show
      description: Get the details of a subscription.
      flags:
        -s, --subscription=: Name or ID of subscription.
