# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore-point
description: Manage restore point with res.
commands:
    - name: collection
      description: Create the restore point collection. Please refer to https://aka.ms/RestorePoints for more details. When updating a restore point collection, only tags may be modified.
      commands:
        - name: show
          description: Get the restore point collection.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --collection-name=!: The name of the restore point collection.
            --expand=: The expand expression to apply on the operation.
            --restore-points=: Show all contained restore points in the restore point collection.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: create
          description: Create the restore point collection.
          flags:
            --collection-name=!: The name of the restore point collection.
            --source-id=!: Resource Id of the source resource used to create this restore point collection
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Location.
        - name: list-all
          description: Get the list of restore point collections in the subscription.
          flags:
            --subscription=: Name or ID of subscription.
        - name: delete
          description: Delete the restore point collection.
          flags:
            --collection-name=: The name of the restore point collection.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: list
          description: Get the list of restore point collections in a resource group.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: wait
          description: Place the CLI in a waiting state until a condition of the restore-point-collection is met.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --collection-name=!: The name of the restore point collection.
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --expand=: The expand expression to apply on the operation.
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=!: Name of resource group.
        - name: update
          description: Update the restore point collection.
          flags:
            --collection-name=!: The name of the restore point collection.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -g, --resource-group=!: Name of resource group.
    - name: create
      description: Create the restore point.
      flags:
        --collection-name=!: The name of the restore point collection.
        --consistency-mode=: Consistency mode of the restore point.
        --data-disk-restore-point-encryption-set=:
            description: Customer managed data disk encryption set resource id
            nargs: -1
        --data-disk-restore-point-encryption-type=:
            description: The type of key used to encrypt the data of the data disk restore point.
            nargs: -1
        --exclude-disks=:
            description: List of disk resource ids that the customer wishes to exclude from the restore point.
            nargs: -1
        --no-wait=: Do not wait for the long-running operation to finish.
        --os-restore-point-encryption-set=: Customer managed OS disk encryption set resource id
        --os-restore-point-encryption-type=: The type of key used to encrypt the data of the OS disk restore point.
        --source-data-disk-resource=:
            description: Resource Id of the source data disk
            nargs: -1
        --source-os-resource=: Resource Id of the source OS disk
        --source-restore-point=: Resource Id of the source restore point from which a copy needs to be created
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The name of the restore point.
      completion:
        flag:
            consistency-mode:
                - CrashConsistent
                - FileSystemConsistent
                - ApplicationConsistent
            data-disk-restore-point-encryption-type:
                - EncryptionAtRestWithPlatformKey
                - EncryptionAtRestWithCustomerKey
                - EncryptionAtRestWithPlatformAndCustomerKeys
            os-restore-point-encryption-type:
                - EncryptionAtRestWithPlatformKey
                - EncryptionAtRestWithCustomerKey
                - EncryptionAtRestWithPlatformAndCustomerKeys
    - name: delete
      description: Delete the restore point.
      flags:
        --collection-name=: The name of the restore point collection.
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Do not wait for the long-running operation to finish.
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the restore point.
        -y, --yes=: Do not prompt for confirmation.
      completion:
        flag:
            no-wait:
                - "true"
                - t
                - "yes"
                - "y"
                - "1"
                - "false"
                - f
                - "no"
                - "n"
                - "0"
    - name: show
      description: Get the restore point.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --collection-name=!: The name of the restore point collection.
        --expand=: The expand expression to apply on the operation.
        --instance-view=: Show the instance view of a restore point.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The name of the restore point.
    - name: wait
      description: Place the CLI in a waiting state until a condition of the restore-point is met.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --collection-name=!: The name of the restore point collection.
        --created=: wait until created with 'provisioningState' at 'Succeeded'
        --custom=: Wait until the condition satisfies a custom JMESPath query.
        --deleted=: wait until deleted
        --exists=: wait until the resource exists
        --expand=: The expand expression to apply on the operation.
        --interval=: polling interval in seconds
        --subscription=: Name or ID of subscription.
        --timeout=: maximum wait in seconds
        --updated=: wait until updated with provisioningState at 'Succeeded'
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The name of the restore point.
