# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: extension
description: extension
commands:
    - name: add
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --allow-preview=:
            description: Include preview packages for extension installation, if exists
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --index=: ==SUPPRESS==
        --pip-extra-index-urls=:
            description: Space-separated list of extra URLs of package indexes to use.
            nargs: -1
        --pip-proxy=: Proxy for pip to use for extension dependencies in the form of [user:passwd@]proxy.server:port
        --system=: ""
        --upgrade=: Update the extension if already installed, otherwise just install the extension.
        --version=: The specific version of an extension
        -n, --name=: Name of extension
        -s, --source=: Filepath or URL to an extension
        -y, --yes=: Do not prompt for confirmation.
      completion:
        flag:
            allow-preview:
                - "true"
                - "false"
    - name: list
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
    - name: list-available
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --index=: ==SUPPRESS==
        -d, --show-details=: Show the raw data from the extension index.
    - name: list-versions
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --index=: ==SUPPRESS==
        -n, --name=!: Name of extension
    - name: remove
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        -n, --name=!: Name of extension
    - name: show
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        -n, --name=!: Name of extension
    - name: update
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --allow-preview=:
            description: Include preview packages for extension installation, if exists
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --index=: ==SUPPRESS==
        --pip-extra-index-urls=:
            description: Space-separated list of extra URLs of package indexes to use.
            nargs: -1
        --pip-proxy=: Proxy for pip to use for extension dependencies in the form of [user:passwd@]proxy.server:port
        -n, --name=!: Name of extension
      completion:
        flag:
            allow-preview:
                - "true"
                - "false"
