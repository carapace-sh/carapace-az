# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: ts
description: Manage template specs at subscription or resource group scope.
commands:
    - name: create
      description: Create a template spec and or template spec version.
      flags:
        --description=: The description of the parent template spec.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --ui-form-definition=: The uiFormDefinition file path in the file system for the template spec version.
        --version-description=: The description of the template spec version.
        -d, --display-name=: The display name of the template spec
        -f, --template-file=: a path to a template file or Bicep file in the file system
        -g, --resource-group=!: Name of resource group.
        -l, --location=: The location to store the template-spec and template-spec version(s).
        -n, --name=!: The name of the template spec.
        -v, --version=: The template spec version.
        -y, --yes=: Do not prompt for confirmation
    - name: delete
      description: Delete a specified template spec or template spec version by name or resource ID..
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the template spec.
        -s, --template-spec=: The template spec resource id.
        -v, --version=: The template spec version.
        -y, --yes=: Do not prompt for confirmation.
    - name: export
      description: Export the specified template spec version and artifacts (if any) to the specified output folder.
      flags:
        --output-folder=!: Existing folder to output export(s).
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the template spec.
        -s, --template-spec=: The template spec resource id.
        -v, --version=: The template spec version.
    - name: list
      description: List template specs or template spec versions.
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the template spec.
    - name: show
      description: Get the specified template spec or template spec version.
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the template spec.
        -s, --template-spec=: The template spec resource id.
        -v, --version=: The template spec version.
    - name: update
      description: Update a template spec version.
      flags:
        --description=: The description of the parent template spec.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --ui-form-definition=: The uiFormDefinition file path in the file system for the template spec version.
        --version-description=: The description of the template spec version.
        -d, --display-name=: The display name of the template spec
        -f, --template-file=: a path to a template file or Bicep file in the file system
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the template spec.
        -s, --template-spec=: The template spec resource id.
        -v, --version=: The template spec version.
        -y, --yes=: Do not prompt for confirmation.
