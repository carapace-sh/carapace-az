# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: eventgrid
description: Manage Azure Event Grid topics, domains, domain topics, system topics partner topics, event subscriptions, system topic event subscriptions and partner topic event subscriptions.
commands:
    - name: domain
      description: Manage event domains.
      commands:
        - name: topic
          description: Manage event domain topics.
          commands:
            - name: list
              description: List available topics in a domain.
              flags:
                --domain-name=!: Name of the domain.
                --odata-query=: The OData query used for filtering the list results.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: event-subscription
              description: Manage event subscriptions of a domain topic.
              commands:
                - name: delete
                  description: Delete an event subscription of a domain topic
                  flags:
                    --domain-name=!: Name of the domain.
                    --domain-topic-name=!: Name of the domain topic.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: Name of the event subscription.
                    -y, --yes=: Do not prompt for confirmation.
                - name: list
                  description: List event subscriptions of a specific domain topic.
                  flags:
                    --domain-name=!: Name of the domain.
                    --domain-topic-name=!: Name of the domain topic.
                    --odata-query=: The OData query used for filtering the list results.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of resource group.
                - name: create
                  description: Create a new event subscription for a domain topic
                  flags:
                    --advanced-filter=:
                        description: An advanced filter enables filtering of events based on a specific event property.
                        nargs: -1
                    --azure-active-directory-application-id-or-uri=: The Azure Active Directory Application Id or Uri to get the access token that will be included as the bearer token in delivery requests.
                    --azure-active-directory-tenant-id=: The Azure Active Directory Tenant Id to get the access token that will be included as the bearer token in delivery requests.
                    --deadletter-endpoint=: The Azure resource ID of an Azure Storage blob container destination where EventGrid should deadletter undeliverable events for this event subscription.
                    --domain-name=!: Name of the domain.
                    --domain-topic-name=!: Name of the domain topic.
                    --enable-advanced-filtering-on-arrays=:
                        description: Allows advanced filters to be evaluated against an array of values instead of expecting a singular value.
                        nargs: -1
                    --endpoint-type=: The type of the destination endpoint.
                    --endpoint=: Endpoint where EventGrid should deliver events matching this event subscription.
                    --event-delivery-schema=: The schema in which events should be delivered for this event subscription.
                    --event-ttl=: Event time to live (in minutes).
                    --expiration-date=: Date or datetime (in UTC, e.g. '2018-11-30T11:59:59+00:00' or '2018-11-30') after which the event subscription would expire.
                    --included-event-types=:
                        description: A space-separated list of event types (e.g., Microsoft.Storage.BlobCreated and Microsoft.Storage.BlobDeleted).
                        nargs: -1
                    --labels=:
                        description: A space-separated list of labels to associate with this event subscription.
                        nargs: -1
                    --max-delivery-attempts=: Maximum number of delivery attempts.
                    --max-events-per-batch=: Maximum number of events in a batch.
                    --preferred-batch-size-in-kilobytes=: Preferred batch size in kilobytes.
                    --storage-queue-msg-ttl=: Storage queue message time to live in seconds.
                    --subject-begins-with=: An optional string to filter events for an event subscription based on a prefix.
                    --subject-case-sensitive=:
                        description: Specify to indicate whether the subject fields should be compared in a case sensitive manner.
                        nargs: -1
                    --subject-ends-with=: An optional string to filter events for an event subscription based on a suffix.
                    --subscription=: Name or ID of subscription.
                    -d, --delivery-attribute-mapping=:
                        description: Add delivery attribute mapping to send additional information via HTTP headers when delivering events.
                        nargs: -1
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: Name of the event subscription.
                  completion:
                    flag:
                        enable-advanced-filtering-on-arrays:
                            - "true"
                            - "false"
                        endpoint-type:
                            - webhook
                            - eventhub
                            - storagequeue
                            - hybridconnection
                            - servicebusqueue
                            - servicebustopic
                            - azurefunction
                        event-delivery-schema:
                            - eventgridschema
                            - custominputschema
                            - cloudeventschemav1_0
                        subject-case-sensitive:
                            - "true"
                            - "false"
                - name: show
                  description: Get the details of an event subscription of a domain topic.
                  flags:
                    --domain-name=!: Name of the domain.
                    --domain-topic-name=!: Name of the domain topic.
                    --include-full-endpoint-url=:
                        description: Specify to indicate whether the full endpoint URL should be returned.
                        nargs: -1
                    --include-static-delivery-attribute-secret=:
                        description: Indicate whether any static delivery attribute secrets should be returned.
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: Name of the event subscription.
                  completion:
                    flag:
                        include-full-endpoint-url:
                            - "true"
                            - "false"
                        include-static-delivery-attribute-secret:
                            - "true"
                            - "false"
                - name: update
                  description: Update an event subscription of a domain topic.
                  flags:
                    --advanced-filter=:
                        description: An advanced filter enables filtering of events based on a specific event property.
                        nargs: -1
                    --deadletter-endpoint=: The Azure resource ID of an Azure Storage blob container destination where EventGrid should deadletter undeliverable events for this event subscription.
                    --domain-name=!: Name of the domain.
                    --domain-topic-name=!: Name of the domain topic.
                    --enable-advanced-filtering-on-arrays=:
                        description: Allows advanced filters to be evaluated against an array of values instead of expecting a singular value.
                        nargs: -1
                    --endpoint=: Endpoint where EventGrid should deliver events matching this event subscription.
                    --included-event-types=:
                        description: A space-separated list of event types (e.g., Microsoft.Storage.BlobCreated and Microsoft.Storage.BlobDeleted).
                        nargs: -1
                    --labels=:
                        description: A space-separated list of labels to associate with this event subscription.
                        nargs: -1
                    --storage-queue-msg-ttl=: Storage queue message time to live in seconds.
                    --subject-begins-with=: An optional string to filter events for an event subscription based on a prefix.
                    --subject-ends-with=: An optional string to filter events for an event subscription based on a suffix.
                    --subscription=: Name or ID of subscription.
                    --update-endpoint-type=: The type of the destination endpoint.
                    -d, --delivery-attribute-mapping=:
                        description: Add delivery attribute mapping to send additional information via HTTP headers when delivering events.
                        nargs: -1
                    -g, --resource-group=!: Name of resource group.
                    -n, --name=!: Name of the event subscription.
                  completion:
                    flag:
                        enable-advanced-filtering-on-arrays:
                            - "true"
                            - "false"
                        update-endpoint-type:
                            - webhook
                            - eventhub
                            - storagequeue
                            - hybridconnection
                            - servicebusqueue
                            - servicebustopic
                            - azurefunction
            - name: delete
              description: Delete a domain topic under a domain.
              flags:
                --domain-name=: Name of the domain.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the domain topic.
            - name: create
              description: Create a domain topic under a domain.
              flags:
                --domain-name=!: Name of the domain.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the domain topic.
            - name: show
              description: Get a domain topic.
              flags:
                --domain-name=: Name of the domain.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the domain topic.
        - name: update
          description: Update a domain.
          flags:
            --identity=: The managed identity type for the resource.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --inbound-ip-rules=:
                description: List of inbound IP rules.
                nargs: -1
            --mi-system-assigned=: Presence of this param indicates that SystemAssigned managed identity will be used
            --mi-user-assigned=:
                description: Add user assigned identities when identityType is user or mixed.
                nargs: -1
            --public-network-access=: This determines if traffic is allowed over public network.
            --sku=: The Sku name of the resource.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the domain.
          completion:
            flag:
                identity:
                    - noidentity
                    - systemassigned
                public-network-access:
                    - enabled
                    - disabled
                sku:
                    - basic
                    - premium
        - name: key
          description: Manage shared access keys of a domain.
          commands:
            - name: regenerate
              description: Regenerate a shared access key of a domain.
              flags:
                --key-name=!: Key name to regenerate key1 or key2
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the domain.
            - name: list
              description: List keys for a domain.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the domain.
        - name: list
          description: List available domains.
          flags:
            --odata-query=: The OData query used for filtering the list results.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: event-subscription
          description: Manage event subscriptions of domain.
          commands:
            - name: list
              description: List event subscriptions of a specific domain.
              flags:
                --domain-name=!: Name of the domain.
                --odata-query=: The OData query used for filtering the list results.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: show
