    - name: update-domain-walk
      description: Manual platform update domain walk to update virtual machines in a service fabric virtual machine scale set.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --placement-group-id=: The placement group id for which the manual recovery walk is requested.
        --platform-update-domain=!: The platform update domain for which a manual recovery walk is requested
        --subscription=: Name or ID of subscription.
        --vmss-name=: The name of the VM scale set.
        --zone=: The zone in which the manual recovery walk is requested for cross zone virtual machine scale set
        -g, --resource-group=: Name of resource group.
    - name: update-instances
      description: Upgrade VMs within a VMSS.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --instance-ids=!:
            description: 'Space-separated list of IDs (ex: 1 2 3 ...) or * for all instances.'
            nargs: -1
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: Scale set name.
    - name: wait
      description: Place the CLI in a waiting state until a condition of a scale set is met.
      flags:
        --__INCLUDE_USER_DATA=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --created=: wait until created with 'provisioningState' at 'Succeeded'
        --custom=: Wait until the condition satisfies a custom JMESPath query.
        --deleted=: wait until deleted
        --exists=: wait until the resource exists
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --instance-id=: Wait on the VM instance with this ID.
        --interval=: polling interval in seconds
        --subscription=: Name or ID of subscription.
        --timeout=: maximum wait in seconds
        --updated=: wait until updated with provisioningState at 'Succeeded'
        -g, --resource-group=: Name of resource group.
        -n, --name=: Scale set name.
