# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: cognitiveservices
description: Manage Azure Cognitive Services accounts.
commands:
    - name: account
      commands:
        - name: identity
          commands:
            - name: assign
              description: Assign the identity for Azure Cognitive Services account.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
            - name: show
              description: Show the identity for Azure Cognitive Services account.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
            - name: remove
              description: Remove the identity for Azure Cognitive Services account.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
        - name: list-usage
          description: List usages for Azure Cognitive Services account.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: cognitive service account name
        - name: commitment-plan
          commands:
            - name: create
              description: Create a commitment plan for Azure Cognitive Services account.
              flags:
                --auto-renew=!:
                    description: A boolean indicating whether to apply auto renew.
                    nargs: -1
                --commitment-plan-name=!: Cognitive Services account commitment plan name
                --current-count=: Cognitive Services account commitment plan current commitment period count.
                --current-tier=: Cognitive Services account commitment plan current commitment period tier.
                --hosting-model=!: Cognitive Services account hosting model
                --next-count=: Cognitive Services account commitment plan next commitment period count.
                --next-tier=: Cognitive Services account commitment plan next commitment period tier.
                --plan-type=!: Cognitive Services account commitment plan type
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
              completion:
                flag:
                    auto-renew:
                        - "true"
                        - "false"
                    hosting-model:
                        - Web
                        - ConnectedContainer
                        - DisconnectedContainer
                        - ProvisionedWeb
            - name: delete
              description: Deletes the specified commitmentPlan associated with the Cognitive Services account.
              flags:
                --commitment-plan-name=!: Cognitive Services account commitment plan name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
            - name: show
              description: Gets the specified commitmentPlans associated with the Cognitive Services account.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --commitment-plan-name=!: Cognitive Services account commitment plan name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
            - name: list
              description: Gets the commitmentPlans associated with the Cognitive Services account.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
        - name: network-rule
          commands:
            - name: remove
              description: Remove a network rule for Azure Cognitive Services account.
              flags:
                --ip-address=: IPv4 address or CIDR range.
                --subnet=: Name or ID of subnet.
                --subscription=: Name or ID of subscription.
                --vnet-name=: Name of a virtual network.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
            - name: add
              description: Add a network rule for Azure Cognitive Services account.
              flags:
                --ip-address=: IPv4 address or CIDR range.
                --subnet=: Name or ID of subnet.
                --subscription=: Name or ID of subscription.
                --vnet-name=: Name of a virtual network.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
            - name: list
              description: List network rules for Azure Cognitive Services account.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
        - name: recover
          description: Recover a deleted Azure Cognitive Services account.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -l, --location=!: Location.
            -n, --name=!: cognitive service account name
        - name: list-kinds
          description: List all valid kinds for Azure Cognitive Services account.
          flags:
            --subscription=: Name or ID of subscription.
        - name: list-skus
          description: List skus for Azure Cognitive Services account.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --kind=: the API name of cognitive services account
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -l, --location=: Location.
            -n, --name=: cognitive service account name
        - name: keys
          commands:
            - name: list
              description: Lists the account keys for the specified Cognitive Services account.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
            - name: regenerate
              description: Regenerates the specified account key for the specified Cognitive Services account.
              flags:
                --key-name=!: Key name to generate
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
              completion:
                flag:
                    key-name:
                        - Key1
                        - Key2
        - name: deployment
          commands:
            - name: show
              description: Gets the specified deployments associated with the Cognitive Services account.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --deployment-name=: Cognitive Services account deployment name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
            - name: create
              description: Create a deployment for Azure Cognitive Services account.
              flags:
                --capacity=: Capacity value of the Sku of Cognitive Services account/deployment.
                --deployment-name=: Cognitive Services account deployment name
                --model-format=!: Cognitive Services account deployment model format.
                --model-name=!: Cognitive Services account deployment model name.
                --model-source=: Cognitive Services account deployment model source.
                --model-version=!: Cognitive Services account deployment model version.
                --scale-capacity=: Cognitive Services account deployment scale settings capacity.
                --scale-type=: Cognitive Services account deployment scale settings scale type.
                --sku=: Name of the Sku of Cognitive Services account/deployment
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
              completion:
                flag:
                    scale-type:
                        - Standard
                        - Manual
            - name: list
              description: Gets the deployments associated with the Cognitive Services account.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
            - name: delete
              description: Deletes the specified deployment associated with the Cognitive Services account.
              flags:
                --deployment-name=: Cognitive Services account deployment name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: cognitive service account name
        - name: list-deleted
          description: Returns all the resources of a particular type belonging to a subscription.
          flags:
            --subscription=: Name or ID of subscription.
        - name: purge
          description: Deletes a Cognitive Services account from the resource group.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -l, --location=!: Location.
            -n, --name=!: cognitive service account name
        - name: delete
          description: Deletes a Cognitive Services account from the resource group.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: cognitive service account name
        - name: create
          description: Create an Azure Cognitive Services account.
          flags:
            --api-properties=:
                description: Api properties in JSON format or a=b c=d format.
                nargs: -1
            --assign-identity=: Generate and assign an Azure Active Directory Identity for this account.
            --custom-domain=: User domain assigned to the account.
            --encryption=: The encryption properties for this resource, in JSON format.
            --kind=!: the API name of cognitive services account
            --sku=!: Name of the Sku of Cognitive Services account/deployment
            --storage=: The storage accounts for this resource, in JSON array format.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --yes=: Do not prompt for terms confirmation
            -g, --resource-group=!: Name of resource group.
            -l, --location=!: Location.
            -n, --name=!: cognitive service account name
        - name: list-models
          description: List available Models for the requested Cognitive Services account.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: cognitive service account name
        - name: update
          description: Update an Azure Cognitive Services account.
          flags:
            --api-properties=:
                description: Api properties in JSON format or a=b c=d format.
                nargs: -1
            --custom-domain=: User domain assigned to the account.
            --encryption=: The encryption properties for this resource, in JSON format.
            --sku=: Name of the Sku of Cognitive Services account/deployment
            --storage=: The storage accounts for this resource, in JSON array format.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: cognitive service account name
        - name: list
          description: List all Azure Cognitive Services accounts.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: show-deleted
          description: Returns a Cognitive Services account specified by the parameters.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -l, --location=!: Location.
            -n, --name=!: cognitive service account name
        - name: show
          description: Returns a Cognitive Services account specified by the parameters.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: cognitive service account name
    - name: commitment-tier
      commands:
        - name: list
          description: List Commitment Tiers.
          flags:
            --subscription=: Name or ID of subscription.
            -l, --location=!: Location.
    - name: list
      description: List all Azure Cognitive Services accounts.
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: model
      commands:
        - name: list
          description: List Models.
          flags:
            --subscription=: Name or ID of subscription.
            -l, --location=!: Location.
    - name: usage
      commands:
        - name: list
          description: Get usages for the requested subscription.
          flags:
            --filter=: An OData filter expression that describes a subset of usages to return.
            --subscription=: Name or ID of subscription.
            -l, --location=!: Location.
