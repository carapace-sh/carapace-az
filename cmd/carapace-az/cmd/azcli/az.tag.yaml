# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: tag
description: Tag Management on a resource.
commands:
    - name: add-value
      description: Creates a predefined value for a predefined tag name.
      flags:
        --subscription=: Name or ID of subscription.
        --value=!: The tag value.
        -n, --name=!: The tag name.
    - name: create
      description: Create tags on a specific resource.
      flags:
        --resource-id=: The resource identifier for the tagged entity.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -n, --name=: The tag name.
    - name: delete
      description: Delete tags on a specific resource.
      flags:
        --resource-id=: The resource identifier for the tagged entity.
        --subscription=: Name or ID of subscription.
        -n, --name=: The tag name.
        -y, --yes=: Do not prompt for confirmation.
    - name: list
      description: List the entire set of tags on a specific resource.
      flags:
        --resource-id=: The resource identifier for the tagged entity.
        --subscription=: Name or ID of subscription.
    - name: remove-value
      description: Deletes a predefined tag value for a predefined tag name.
      flags:
        --subscription=: Name or ID of subscription.
        --value=!: The tag value.
        -n, --name=!: The tag name.
    - name: update
      description: Selectively update the set of tags on a specific resource.
      flags:
        --operation=!: 'The update operation: options include Merge, Replace and Delete.'
        --resource-id=!: The resource identifier for the tagged entity.
        --subscription=: Name or ID of subscription.
        --tags=!:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
      completion:
        flag:
            operation:
                - Merge
                - Replace
                - Delete
