# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: keyvault
description: Manage KeyVault keys, secrets, and certificates.
commands:
    - name: backup
      description: Manage full HSM backup.
      commands:
        - name: start
          description: Begin a full backup of the HSM.
          flags:
            --blob-container-name=: Name of Blob Container.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --hsm-name=: Name of the HSM.
            --id=: Full URI of the HSM.
            --storage-account-name=: Name of Azure Storage Account.
            --storage-resource-uri=: Azure Blob storage container Uri.
            --subscription=: Name or ID of subscription.
            --use-managed-identity=:
                description: If True, Managed HSM will use the configured user-assigned managed identity to authenticate with Azure Storage.
                nargs: -1
            -t, --storage-container-SAS-token=: The SAS token pointing to an Azure Blob storage container
          completion:
            flag:
                use-managed-identity:
                    - "true"
                    - "false"
    - name: certificate
      description: Manage certificates.
      commands:
        - name: show
          description: Gets a specific version of a certificate without returning its management policy.
          flags:
            --id=: Id of the certificate.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Key Vault.
            -n, --name=: Name of the certificate.
            -v, --version=: The certificate version.
        - name: issuer
          description: Manage certificate issuer information.
          commands:
            - name: show
              description: Gets the specified certificate issuer.
              flags:
                --issuer-name=!: Certificate issuer name.
                --subscription=: Name or ID of subscription.
                --vault-name=!: Name of the Vault.
            - name: update
              description: Update a certificate issuer record.
              flags:
                --account-id=: The issuer account id/username/etc.
                --enabled=:
                    description: Set issuer enabled state.
                    nargs: -1
                --issuer-name=!: Certificate issuer name.
                --organization-id=: The organization id.
                --password=: The issuer account password/secret/etc.
                --provider-name=: The certificate provider name.
                --subscription=: Name or ID of subscription.
                --vault-name=!: Name of the Vault.
              completion:
                flag:
                    enabled:
                        - "true"
                        - "false"
            - name: create
              description: Create a certificate issuer record.
              flags:
                --account-id=: The issuer account id/username/etc.
                --disabled=:
                    description: Set issuer to disabled state.
                    nargs: -1
                --issuer-name=!: Certificate issuer name.
                --organization-id=: The organization id.
                --password=: The issuer account password/secret/etc.
                --provider-name=!: The certificate provider name.
                --subscription=: Name or ID of subscription.
                --vault-name=!: Name of the Vault.
              completion:
                flag:
                    disabled:
                        - "true"
                        - "false"
            - name: admin
              description: Manage admin information for certificate issuers.
              commands:
                - name: add
                  description: Add admin details for a specified certificate issuer.
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --email=!: Admin e-mail address.
                    --first-name=: Admin first name.
                    --issuer-name=!: Certificate issuer name.
                    --last-name=: Admin last name.
                    --phone=: Admin phone number.
                    --subscription=: Name or ID of subscription.
                    --vault-name=!: Name of the Vault.
                - name: delete
                  description: Remove admin details for the specified certificate issuer.
                  flags:
                    --email=!: Admin e-mail address.
                    --issuer-name=!: Certificate issuer name.
                    --subscription=: Name or ID of subscription.
                    --vault-name=!: Name of the Vault.
                - name: list
                  description: Gets the specified certificate issuer.
                  flags:
                    --issuer-name=!: Certificate issuer name.
                    --subscription=: Name or ID of subscription.
                    --vault-name=!: Name of the Vault.
            - name: delete
              description: Deletes the specified certificate issuer.
              flags:
                --issuer-name=!: Certificate issuer name.
                --subscription=: Name or ID of subscription.
                --vault-name=!: Name of the Vault.
            - name: list
              description: Lists properties of the certificate issuers for the key vault.
              flags:
                --subscription=: Name or ID of subscription.
                --vault-name=!: Name of the Vault.
        - name: restore
          description: Restores a backed up certificate to a vault.
          flags:
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Key Vault.
            -f, --file=!: Local certificate backup from which to restore certificate.
        - name: pending
          description: Manage pending certificate creation operations.
          commands:
            - name: delete
              description: Deletes and stops the creation operation for a specific certificate.
              flags:
                --subscription=: Name or ID of subscription.
                --vault-name=!: Name of the Vault.
                -n, --name=!: Name of the pending certificate.
            - name: merge
              description: Merges a certificate or a certificate chain with a key pair existing on the server.
              flags:
                --disabled=:
                    description: Create certificate in disabled state.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --tags=:
                    description: 'space-separated tags: key[=value] [key[=value] ...].'
                    nargs: -1
                --vault-name=!: Name of the Vault.
                -f, --file=!: File containing the certificate or certificate chain to merge.
                -n, --name=!: Name of the pending certificate.
              completion:
                flag:
                    disabled:
                        - "true"
                        - "false"
            - name: show
              description: Gets the creation operation of a certificate.
              flags:
                --subscription=: Name or ID of subscription.
                --vault-name=!: Name of the Vault.
                -n, --name=!: Name of the pending certificate.
        - name: list-versions
          description: List the identifiers and properties of a certificate's versions.
          flags:
            --id=: Id of the certificate.
            --maxresults=: Maximum number of results to return in a page.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Key Vault.
            -n, --name=: Name of the certificate.
        - name: list
          description: List identifiers and properties of all certificates in the vault.
          flags:
            --id=: Full URI of the Vault.
            --include-pending=:
                description: Specifies whether to include certificates which are not completely provisioned.
                nargs: -1
            --maxresults=: Maximum number of results to return in a page.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Key Vault.
          completion:
            flag:
                include-pending:
                    - "true"
                    - "false"
        - name: import
          description: Import a certificate created externally.
          flags:
            --disabled=:
                description: Import the certificate in disabled state.
                nargs: -1
            --password=: If the private key in certificate is encrypted, the password used for encryption.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --vault-name=!: Name of the Vault.
            -f, --file=!: PKCS12 file or PEM file containing the certificate and private key.
            -n, --name=!: Name of the certificate.
            -p, --policy=: JSON encoded policy definition.
          completion:
            flag:
                disabled:
                    - "true"
                    - "false"
        - name: backup
          description: Backs up the specified certificate.
          flags:
            --id=: Id of the certificate.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Key Vault.
            -f, --file=!: Local file path in which to store certificate backup.
            -n, --name=: Name of the certificate.
        - name: delete
          description: Delete all versions of a certificate.
          flags:
            --id=: Id of the certificate.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Key Vault.
            -n, --name=: Name of the certificate.
        - name: list-deleted
          description: Lists the currently-recoverable deleted certificates.
          flags:
            --id=: Full URI of the Vault.
            --include-pending=:
                description: Specifies whether to include certificates which are not completely provisioned.
                nargs: -1
            --maxresults=: Maximum number of results to return in a page.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Key Vault.
          completion:
            flag:
                include-pending:
                    - "true"
                    - "false"
        - name: create
          description: Create a Key Vault certificate.
          flags:
            --disabled=:
                description: Create certificate in disabled state.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --validity=: Number of months the certificate is valid for.
            --vault-name=!: Name of the Vault.
            -n, --name=!: Name of the certificate.
            -p, --policy=!: JSON encoded policy definition.
          completion:
            flag:
                disabled:
                    - "true"
                    - "false"
        - name: download
          description: Download a certificate from a KeyVault.
          flags:
            --id=: Id of the certificate.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Key Vault.
            -e, --encoding=: Encoding of the certificate.
            -f, --file=!: File to receive the binary certificate contents.
            -n, --name=: Name of the certificate.
            -v, --version=: The certificate version.
          completion:
            flag:
                encoding:
                    - PEM
                    - DER
        - name: show-deleted
          description: Get a deleted certificate.
          flags:
            --id=: The recovery id of the certificate.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Vault.
            -n, --name=: Name of the certificate.
        - name: contact
          description: Manage contacts for certificate management.
          commands:
            - name: delete
              description: Remove a certificate contact from the specified vault.
              flags:
                --email=!: Contact e-mail address.
                --subscription=: Name or ID of subscription.
                --vault-name=!: Name of the Vault.
            - name: list
              description: Gets the certificate contacts for the key vault.
              flags:
                --subscription=: Name or ID of subscription.
                --vault-name=!: Name of the Vault.
            - name: add
              description: Add a contact to the specified vault to receive notifications of certificate operations.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --email=!: Contact e-mail address.
                --name=: Full contact name.
                --phone=: Contact phone number.
                --subscription=: Name or ID of subscription.
                --vault-name=!: Name of the Vault.
        - name: set-attributes
          description: Updates the specified attributes associated with the given certificate.
          flags:
            --enabled=:
                description: Enable the certificate.
                nargs: -1
            --id=: Id of the certificate.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --vault-name=: Name of the Key Vault.
            -n, --name=: Name of the certificate.
            -p, --policy=: JSON encoded policy definition.
            -v, --version=: The certificate version.
          completion:
            flag:
                enabled:
                    - "true"
                    - "false"
        - name: get-default-policy
          description: Get a default certificate policy to be used with `az keyvault certificate create`
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --scaffold=: create a fully formed policy structure with default values
            --subscription=: Name or ID of subscription.
        - name: recover
          description: Recover a deleted certificate to its latest version.
          flags:
            --id=: The recovery id of the certificate.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Vault.
            -n, --name=: Name of the certificate.
        - name: purge
          description: Permanently deletes a deleted certificate.
          flags:
            --id=: The recovery id of the certificate.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Vault.
            -n, --name=: Name of the certificate.
    - name: check-name
      description: Check that the given name is valid and is not already in use.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --resource-type=: Type of resource.
        --subscription=: Name or ID of subscription.
        -n, --name=!: The name of the HSM within the specified resource group
      completion:
        flag:
            resource-type:
                - hsm
    - name: create
      description: Create a Vault or HSM.
      flags:
        --administrators=:
            description: '[HSM Only] Administrator role for data plane operations for Managed HSM.'
            nargs: -1
        --bypass=: Bypass traffic for space-separated uses.
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --default-action=: Default action to apply when no rule matches.
        --enable-purge-protection=:
            description: Property specifying whether protection against purge is enabled for this vault/managed HSM pool.
            nargs: -1
        --enable-rbac-authorization=:
            description: Property that controls how data actions are authorized.
            nargs: -1
        --enabled-for-deployment=:
            description: '[Vault Only] Property to specify whether Azure Virtual Machines are permitted to retrieve certificates stored as secrets from the key vault.'
            nargs: -1
        --enabled-for-disk-encryption=:
            description: '[Vault Only] Property to specify whether Azure Disk Encryption is permitted to retrieve secrets from the vault and unwrap keys.'
            nargs: -1
        --enabled-for-template-deployment=:
            description: '[Vault Only] Property to specify whether Azure Resource Manager is permitted to retrieve secrets from the key vault.'
            nargs: -1
        --hsm-name=: Name of the HSM.
        --mi-user-assigned=:
            description: '[HSM Only] Enable user-assigned managed identities for managed HSM.'
            nargs: -1
        --network-acls-ips=:
            description: Network ACLs IP rules.
            nargs: -1
        --network-acls-vnets=:
            description: Network ACLS VNet rules.
            nargs: -1
        --network-acls=: Network ACLs.
        --no-self-perms=:
            description: '[Vault Only] Don''t add permissions for the current user/service principal in the new vault.'
            nargs: -1
        --no-wait=: Do not wait for the long-running operation to finish.
        --public-network-access=: Control permission for data plane traffic coming from public networks while private endpoint is enabled
        --retention-days=: Soft delete data retention days.
        --sku=: Required.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=: Name of the Vault.
      completion:
        flag:
            bypass:
                - AzureServices
                - None
            default-action:
                - Allow
                - Deny
            enable-purge-protection:
                - "true"
                - "false"
            enable-rbac-authorization:
                - "true"
                - "false"
            enabled-for-deployment:
                - "true"
                - "false"
            enabled-for-disk-encryption:
                - "true"
                - "false"
            enabled-for-template-deployment:
                - "true"
                - "false"
            no-self-perms:
                - "true"
                - "false"
            public-network-access:
                - Enabled
                - Disabled
    - name: delete
      description: Delete a Vault or HSM.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --hsm-name=: Name of the HSM.
        --no-wait=: Do not wait for the long-running operation to finish.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Proceed only if Key Vault belongs to the specified resource group.
        -n, --name=: Name of the Vault.
    - name: delete-policy
      description: Delete security policy settings for a Key Vault.
      flags:
        --application-id=: Application ID of the client making request on behalf of a principal.
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --no-wait=: Do not wait for the long-running operation to finish.
        --object-id=: a GUID that identifies the principal that will receive permissions
        --spn=: name of a service principal that will receive permissions
        --subscription=: Name or ID of subscription.
        --upn=: name of a user principal that will receive permissions
        -g, --resource-group=: Proceed only if Key Vault belongs to the specified resource group.
        -n, --name=!: Name of the Vault.
    - name: key
      description: Manage keys.
      commands:
        - name: purge
          description: Permanently deletes a deleted key.
          flags:
            --hsm-name=: Name of the HSM.
            --id=: The recovery id of the key.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Vault.
            -n, --name=: Name of the key.
        - name: list
          description: List keys in the specified Vault or HSM.
          flags:
            --hsm-name=: Name of the HSM.
            --id=: Full URI of the Vault or HSM.
            --include-managed=:
                description: Include managed keys.
                nargs: -1
            --maxresults=: Maximum number of results to return.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Vault.
          completion:
            flag:
                include-managed:
                    - "true"
                    - "false"
        - name: verify
          description: Verify a signature using the key that is stored in a Vault or HSM.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --digest=!: The value to sign
            --hsm-name=: Name of the HSM.
            --id=: Id of the key.
            --signature=!: signature to verify
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Vault.
            -a, --algorithm=!: Algorithm identifier
            -n, --name=: Name of the key.
            -v, --version=: The key version.
          completion:
            flag:
                algorithm:
                    - PS256
                    - PS384
                    - PS512
                    - RS256
                    - RS384
                    - RS512
                    - ES256
                    - ES384
                    - ES512
                    - ES256K
        - name: import
          description: Import a private key.
          flags:
            --byok-file=: BYOK file containing the key to be imported.
            --byok-string=: BYOK string containing the key to be imported.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --curve=: The curve name of the key to import (only for BYOK).
            --default-cvm-policy=: Use default policy under which the key can be exported for CVM disk encryption.
            --disabled=:
                description: Create key in disabled state.
                nargs: -1
            --expires=: Expiration UTC datetime  (Y-m-d'T'H:M:S'Z').
            --exportable=:
                description: Whether the private key can be exported.
                nargs: -1
            --hsm-name=: Name of the HSM.
            --id=: Id of the key.
            --immutable=:
                description: Mark a release policy as immutable.
                nargs: -1
            --kty=: The type of key to import (only for BYOK).
            --not-before=: Key not usable before the provided UTC datetime  (Y-m-d'T'H:M:S'Z').
            --ops=:
                description: Space-separated list of permitted JSON web key operations.
                nargs: -1
            --pem-file=: PEM file containing the key to be imported.
            --pem-password=: Password of PEM file.
            --pem-string=: PEM string containing the key to be imported.
            --policy=: The policy rules under which the key can be exported.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --vault-name=: Name of the Vault.
            -n, --name=: Name of the key.
            -p, --protection=: Specifies the type of key protection.
          completion:
            flag:
                curve:
                    - P-256
                    - P-384
                    - P-521
                    - P-256K
                disabled:
                    - "true"
                    - "false"
                exportable:
                    - "true"
                    - "false"
                immutable:
                    - "true"
                    - "false"
                kty:
                    - EC
                    - RSA
                    - oct
                ops:
                    - encrypt
                    - decrypt
                    - sign
                    - verify
                    - wrapKey
                    - unwrapKey
                    - import
                    - export
                protection:
                    - software
                    - hsm
        - name: download
          description: Download a key from a KeyVault.
          flags:
            --hsm-name=: Name of the HSM.
            --id=: Id of the key.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Vault.
            -e, --encoding=: 'Encoding of the key, default: PEM'
            -f, --file=!: File to receive the key contents.
            -n, --name=: Name of the key.
            -v, --version=: The key version.
          completion:
            flag:
                encoding:
                    - PEM
                    - DER
        - name: show-deleted
          description: Get a deleted key.
          flags:
            --hsm-name=: Name of the HSM.
            --id=: Id of the key.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Vault.
            -n, --name=: Name of the key.
        - name: backup
          description: Request that a backup of the specified key be downloaded to the client.
          flags:
            --hsm-name=: Name of the HSM.
            --id=: Id of the key.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Vault.
            -f, --file=!: Local file path in which to store key backup.
            -n, --name=: Name of the key.
        - name: rotation-policy
          description: Manage key's rotation policy.
          commands:
            - name: show
              description: Get the rotation policy of a Key Vault key.
              flags:
                --hsm-name=: Name of the HSM.
                --id=: Id of the key.
                --subscription=: Name or ID of subscription.
                --vault-name=: Name of the Vault.
                -n, --name=: Name of the key.
            - name: update
              description: Update the rotation policy of a Key Vault key.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --hsm-name=: Name of the HSM.
                --id=: Id of the key.
                --subscription=: Name or ID of subscription.
                --value=!: The rotation policy file definition as JSON, or a path to a file containing JSON policy definition.
                --vault-name=: Name of the Vault.
                -n, --name=: Name of the key.
        - name: get-policy-template
          description: Return policy template as JSON encoded policy definition.
          flags:
            --subscription=: Name or ID of subscription.
        - name: encrypt
          description: Encrypt an arbitrary sequence of bytes using an encryption key that is stored in a Vault or HSM.
          flags:
            --aad=: Optional data that is authenticated but not encrypted.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --data-type=: The type of the original data.
            --hsm-name=: Name of the HSM.
            --id=: Id of the key.
            --iv=: Initialization vector.
            --subscription=: Name or ID of subscription.
            --value=!: The value to be encrypted.
            --vault-name=: Name of the Vault.
            -a, --algorithm=!: Algorithm identifier
            -n, --name=: Name of the key.
            -v, --version=: The key version.
          completion:
            flag:
                algorithm:
                    - RSA-OAEP
                    - RSA-OAEP-256
                    - RSA1_5
                    - A128GCM
                    - A192GCM
                    - A256GCM
                    - A128CBC
                    - A192CBC
                    - A256CBC
                    - A128CBCPAD
                    - A192CBCPAD
                    - A256CBCPAD
                data-type:
                    - base64
                    - plaintext
        - name: list-versions
          description: List the identifiers and properties of a key's versions.
          flags:
            --hsm-name=: Name of the HSM.
            --id=: Id of the key.
            --maxresults=: Maximum number of results to return.
            --subscription=: Name or ID of subscription.
            --vault-name=: Name of the Vault.
            -n, --name=: Name of the key.
        - name: decrypt
          description: Decrypt a single block of encrypted data.
          flags:
            --aad=: Optional data that is authenticated but not encrypted.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --data-type=: The type of the original data.
            --hsm-name=: Name of the HSM.
            --id=: Id of the key.
            --iv=: The initialization vector used during encryption.
            --subscription=: Name or ID of subscription.
            --tag=: The authentication tag generated during encryption.
            --value=!: The value to be decrypted, which should be the result of "az keyvault encrypt"
            --vault-name=: Name of the Vault.
            -a, --algorithm=!: Algorithm identifier
            -n, --name=: Name of the key.
            -v, --version=: The key version.
          completion:
            flag:
                algorithm:
                    - RSA-OAEP
                    - RSA-OAEP-256
                    - RSA1_5
                    - A128GCM
                    - A192GCM
                    - A256GCM
                    - A128CBC
                    - A192CBC
                    - A256CBC
                    - A128CBCPAD
                    - A192CBCPAD
                    - A256CBCPAD
                data-type:
                    - base64
                    - plaintext
        - name: restore
          description: Restore a backed up key to a Vault or HSM.
          flags:
            --backup-folder=: Name of the blob container which contains the backup
