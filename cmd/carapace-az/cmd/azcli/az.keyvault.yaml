    - name: security-domain
      description: Manage security domain operations.
      commands:
        - name: download
          description: Download the security domain file from the HSM.
          flags:
            --hsm-name=: Name of the HSM.
            --id=: Full URI of the HSM.
            --no-wait=: Do not wait for the long-running operation to finish.
            --sd-quorum=!: The minimum number of shares required to decrypt the security domain for recovery.
            --sd-wrapping-keys=!:
                description: Space-separated file paths to PEM files containing public keys.
                nargs: -1
            --security-domain-file=!: Path to a file where the JSON blob returned by this command is stored.
            --subscription=: Name or ID of subscription.
        - name: wait
          description: Place the CLI in a waiting state until HSM security domain operation is finished.
          flags:
            --hsm-name=: Name of the HSM.
            --id=: Full URI of the HSM.
            --subscription=: Name or ID of subscription.
            --target-operation=: Target operation that needs waiting.
          completion:
            flag:
                target-operation:
                    - download
                    - upload
                    - restore_blob
        - name: restore-blob
          description: Enable to decrypt and encrypt security domain file as blob.
          flags:
            --passwords=:
                description: Space-separated password list for --sd-wrapping-keys.
                nargs: -1
            --sd-exchange-key=!: The exchange key for security domain.
            --sd-file-restore-blob=!: Local file path to store the security domain encrypted with the exchange key.
            --sd-file=!: This file contains security domain encrypted using SD Exchange file downloaded in security-domain init-recovery command.
            --sd-wrapping-keys=!:
                description: Space-separated file paths to PEM files containing private keys.
                nargs: -1
            --subscription=: Name or ID of subscription.
        - name: init-recovery
          description: Retrieve the exchange key of the HSM.
          flags:
            --hsm-name=: Name of the HSM.
            --id=: Full URI of the HSM.
            --sd-exchange-key=!: Local file path to store the exported key.
            --subscription=: Name or ID of subscription.
        - name: upload
          description: Start to restore the HSM.
          flags:
            --hsm-name=: Name of the HSM.
            --id=: Full URI of the HSM.
            --no-wait=: Do not wait for the long-running operation to finish.
            --passwords=:
                description: Space-separated password list for --sd-wrapping-keys.
                nargs: -1
            --restore-blob=: Indicator if blob is already restored.
            --sd-exchange-key=: The exchange key for security domain.
            --sd-file=!: This file contains security domain encrypted using SD Exchange file downloaded in security-domain init-recovery command.
            --sd-wrapping-keys=:
                description: Space-separated file paths to PEM files containing private keys.
                nargs: -1
            --subscription=: Name or ID of subscription.
