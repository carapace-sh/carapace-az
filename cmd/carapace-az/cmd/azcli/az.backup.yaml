# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: backup
description: backup
commands:
    - name: container
      commands:
        - name: register
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --resource-id=!: ID of the Azure Resource containing items to be protected by Azure Backup service.
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                workload-type:
                    - MSSQL
                    - SAPHANA
                    - SAPASE
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: list
          flags:
            --__STATUS=:
                description: ==SUPPRESS==
                nargs: -1
            --backup-management-type=!: Specify the backup management type.
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to list containers in secondary region.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                    - MAB
        - name: unregister
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -v, --vault-name=: Name of the Recovery services vault.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                    - MAB
        - name: re-register
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -v, --vault-name=: Name of the Recovery services vault.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                workload-type:
                    - MSSQL
                    - SAPHANA
                    - SAPASE
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: show
          flags:
            --__STATUS=:
                description: ==SUPPRESS==
                nargs: -1
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to show container in secondary region.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the container.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                    - MAB
    - name: item
      commands:
        - name: list
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to list items in secondary region.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                    - MAB
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: set-policy
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the backed up item.
            -p, --policy-name=!: Name of the Backup policy.
            -v, --vault-name=: Name of the Recovery services vault.
            -y, --yes=: Skip confirmation when updating Standard to Enhanced Policies.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: show
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to show item in secondary region.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the backed up item.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                    - MAB
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
    - name: job
      commands:
        - name: show
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to show recoverypoints in secondary region.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the job.
            -v, --vault-name=: Name of the Recovery services vault.
        - name: wait
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --timeout=: Maximum time, in seconds, to wait before aborting.
            --use-secondary-region=: Use this flag to show recoverypoints in secondary region.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the job.
            -v, --vault-name=: Name of the Recovery services vault.
        - name: list
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --end-date=: The end date of the range in UTC (d-m-Y).
            --operation=: User initiated operation.
            --start-date=: The start date of the range in UTC (d-m-Y).
            --status=: Status of the Job.
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to show recoverypoints in secondary region.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                    - MAB
                operation:
                    - Backup
                    - ConfigureBackup
                    - DeleteBackupData
                    - DisableBackup
                    - Restore
                status:
                    - Cancelled
                    - Completed
                    - CompletedWithWarnings
                    - Failed
                    - InProgress
        - name: stop
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to show recoverypoints in secondary region.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the job.
            -v, --vault-name=: Name of the Recovery services vault.
    - name: policy
      commands:
        - name: get-default-for-vm
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
        - name: delete
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the backup policy.
            -v, --vault-name=: Name of the Recovery services vault.
        - name: list-associated-items
          flags:
            --backup-management-type=: Specify the backup management type.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the backup policy.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
        - name: list
          flags:
            --backup-management-type=: Specify the backup management type.
            --move-to-archive-tier=: Parameter that specifies whether to only list policies where archive tier move is enabled/disabled.
            --policy-sub-type=: Sub type of policies to be retrieved.
            --subscription=: Name or ID of subscription.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                move-to-archive-tier:
                    - Enabled
                    - Disabled
                    - All
                policy-sub-type:
                    - Standard
                    - Enhanced
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: set
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --fix-for-inconsistent-items=:
                description: Specify whether or not to retry Policy Update for failed items.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --policy=: JSON encoded policy definition.
            --subscription=: Name or ID of subscription.
            --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Policy.
            -v, --vault-name=: Name of the Recovery services vault.
            -y, --yes=: Skip confirmation when updating Standard to Enhanced Policies.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                fix-for-inconsistent-items:
                    - "true"
                    - "false"
        - name: show
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the backup policy.
            -v, --vault-name=: Name of the Recovery services vault.
        - name: create
          flags:
            --backup-management-type=!: Specify the backup management type.
            --policy=!: JSON encoded policy definition.
            --subscription=: Name or ID of subscription.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Policy.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
    - name: protectable-item
      commands:
        - name: show
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --protectable-item-type=!: Specify the type of items within the Resource which should be discovered and protected by Azure Backup.
            --server-name=!: Parent Server name of the item.
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the protectable item.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                protectable-item-type:
                    - SQLAG
                    - SQLInstance
                    - SQLDatabase
                    - HANAInstance
                    - SAPHanaDatabase
                    - SAPHanaSystem
                workload-type:
                    - MSSQL
                    - SAPHANA
                    - SAPASE
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: list
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --protectable-item-type=: Specify the type of items within the Resource which should be discovered and protected by Azure Backup.
            --server-name=: Parent Server name of the item.
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                protectable-item-type:
                    - SQLAG
                    - SQLInstance
                    - SQLDatabase
                    - HANAInstance
                    - SAPHanaDatabase
                    - SAPHanaSystem
                workload-type:
                    - MSSQL
                    - SAPHANA
                    - SAPASE
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: initialize
          flags:
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=!: Name of the backup container.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                workload-type:
                    - MSSQL
                    - SAPHANA
                    - SAPASE
                    - SAPHanaDatabase
                    - SQLDataBase
    - name: protection
      commands:
        - name: auto-enable-for-azurewl
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --protectable-item-name=!: Specify the resource name to be protected by Azure Backup service.
            --protectable-item-type=!: Specify the type of items within the Resource which should be discovered and protected by Azure Backup.
            --server-name=!: Parent Server name of the item.
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=!: Name of resource group.
            -p, --policy-name=!: Name of the backup policy.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                protectable-item-type:
                    - SQLAG
                    - SQLInstance
                    - SQLDatabase
                    - HANAInstance
                    - SAPHanaDatabase
                    - SAPHanaSystem
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: auto-disable-for-azurewl
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --protectable-item-name=!: Specify the resource name to be protected by Azure Backup service.
            --protectable-item-type=!: Specify the type of items within the Resource which should be discovered and protected by Azure Backup.
            --server-name=!: Parent Server name of the item.
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                protectable-item-type:
                    - SQLAG
                    - SQLInstance
                    - SQLDatabase
                    - HANAInstance
                    - SAPHanaDatabase
                    - SAPHanaSystem
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: enable-for-azurewl
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --protectable-item-name=!: Specify the resource name to be protected by Azure Backup service.
            --protectable-item-type=!: Specify the type of items within the Resource which should be discovered and protected by Azure Backup.
            --server-name=!: Parent Server name of the item.
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=!: Name of resource group.
            -p, --policy-name=!: Name of the backup policy.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                protectable-item-type:
                    - SQLAG
                    - SQLInstance
                    - SQLDatabase
                    - HANAInstance
                    - SAPHanaDatabase
                    - SAPHanaSystem
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: enable-for-azurefileshare
          flags:
            --azure-file-share=!: Name of the Azure FileShare.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --storage-account=!: Name of the Storage Account of the FileShare.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -p, --policy-name=!: Name of the backup policy.
            -v, --vault-name=!: Name of the Recovery services vault.
        - name: backup-now
          flags:
            --backup-management-type=: Specify the backup management type.
            --backup-type=: '''Full, Differential, Log, CopyOnlyFull'' for backup Item type ''MSSQL''.'
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --enable-compression=:
                description: Option to enable compression
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --retain-until=: The date until which this backed up copy will be available for retrieval, in UTC (d-m-Y).
            --subscription=: Name or ID of subscription.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -i, --item-name=: Name of the backed up item.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                enable-compression:
                    - "true"
                    - "false"
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: undelete
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -i, --item-name=: Name of the backed up item.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: check-vm
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            --vm-id=: ID of the virtual machine to be checked for protection.
            --vm=: Name or ID of the Virtual Machine to be protected.
            -g, --resource-group=: Name of resource group.
        - name: update-for-vm
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --disk-list-setting=: option to decide whether to include or exclude the disk or reset any previous settings to default behavior
            --diskslist=:
                description: List of disks to be excluded or included.
                nargs: -1
            --exclude-all-data-disks=:
                description: Option to specify to backup OS disk only.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -i, --item-name=: Name of the backed up item.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                disk-list-setting:
                    - include
                    - exclude
                    - resetexclusionsettings
                exclude-all-data-disks:
                    - "true"
                    - "false"
        - name: resume
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -i, --item-name=: Name of the backed up item.
            -p, --policy-name=!: Name of the backup policy.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: enable-for-vm
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --disk-list-setting=: option to decide whether to include or exclude the disk or reset any previous settings to default behavior
            --diskslist=:
                description: List of disks to be excluded or included.
                nargs: -1
            --exclude-all-data-disks=:
                description: Option to specify to backup OS disk only.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --vm=!: Name or ID of the Virtual Machine to be protected.
            -g, --resource-group=!: Name of resource group.
            -p, --policy-name=!: Name of the backup policy.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                disk-list-setting:
                    - include
                    - exclude
                exclude-all-data-disks:
                    - "true"
                    - "false"
        - name: disable
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --delete-backup-data=:
                description: Option to delete existing backed up data in the Recovery services vault.
                nargs: -1
            --ids=:
