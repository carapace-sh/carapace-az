# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: backup
description: Manage Azure Backups.
commands:
    - name: container
      description: Resource which houses items or applications to be protected.
      commands:
        - name: show
          description: Show details of a container registered to a Recovery services vault.
          flags:
            --__STATUS=:
                description: ==SUPPRESS==
                nargs: -1
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to show container in secondary region.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the container.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                    - MAB
        - name: re-register
          description: Reset the registration details for a given container.
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -v, --vault-name=: Name of the Recovery services vault.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                workload-type:
                    - MSSQL
                    - SAPHANA
                    - SAPASE
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: unregister
          description: Unregister a Backup Container to make the underlying 'resource' be protected by another vault.
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -v, --vault-name=: Name of the Recovery services vault.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                    - MAB
        - name: list
          description: List containers registered to a Recovery services vault.
          flags:
            --__STATUS=:
                description: ==SUPPRESS==
                nargs: -1
            --backup-management-type=!: Specify the backup management type.
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to list containers in secondary region.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                    - MAB
        - name: register
          description: Register a Resource to the given Recovery Services Vault.
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --resource-id=!: ID of the Azure Resource containing items to be protected by Azure Backup service.
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                workload-type:
                    - MSSQL
                    - SAPHANA
                    - SAPASE
                    - SAPHanaDatabase
                    - SQLDataBase
    - name: item
      description: An item which is already protected or backed up to an Azure Recovery services vault with an associated policy.
      commands:
        - name: show
          description: Show details of a particular backed up item.
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to show item in secondary region.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the backed up item.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                    - MAB
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: list
          description: List all backed up items within a container.
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to list items in secondary region.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                    - MAB
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: set-policy
          description: Update the policy associated with this item.
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the backed up item.
            -p, --policy-name=!: Name of the Backup policy.
            -v, --vault-name=: Name of the Recovery services vault.
            -y, --yes=: Skip confirmation when updating Standard to Enhanced Policies.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
    - name: job
      description: Entity which contains details of the job.
      commands:
        - name: wait
          description: Wait until either the job completes or the specified timeout value is reached.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --timeout=: Maximum time, in seconds, to wait before aborting.
            --use-secondary-region=: Use this flag to show recoverypoints in secondary region.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the job.
            -v, --vault-name=: Name of the Recovery services vault.
        - name: list
          description: List all backup jobs of a Recovery Services vault.
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --end-date=: The end date of the range in UTC (d-m-Y).
            --operation=: User initiated operation.
            --start-date=: The start date of the range in UTC (d-m-Y).
            --status=: Status of the Job.
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to show recoverypoints in secondary region.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                    - MAB
                operation:
                    - Backup
                    - ConfigureBackup
                    - DeleteBackupData
                    - DisableBackup
                    - Restore
                status:
                    - Cancelled
                    - Completed
                    - CompletedWithWarnings
                    - Failed
                    - InProgress
        - name: show
          description: Show details of a particular job.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to show recoverypoints in secondary region.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the job.
            -v, --vault-name=: Name of the Recovery services vault.
        - name: stop
          description: Suspend or terminate a currently running job.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --use-secondary-region=: Use this flag to show recoverypoints in secondary region.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the job.
            -v, --vault-name=: Name of the Recovery services vault.
    - name: policy
      description: A backup policy defines when you want to take a backup and for how long you would retain each backup copy.
      commands:
        - name: list
          description: List all policies for a Recovery services vault.
          flags:
            --backup-management-type=: Specify the backup management type.
            --move-to-archive-tier=: Parameter that specifies whether to only list policies where archive tier move is enabled/disabled.
            --policy-sub-type=: Sub type of policies to be retrieved.
            --subscription=: Name or ID of subscription.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                move-to-archive-tier:
                    - Enabled
                    - Disabled
                    - All
                policy-sub-type:
                    - Standard
                    - Enhanced
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: show
          description: Show details of a particular policy.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the backup policy.
            -v, --vault-name=: Name of the Recovery services vault.
        - name: create
          description: Create a new policy for the given BackupManagementType and workloadType.
          flags:
            --backup-management-type=!: Specify the backup management type.
            --policy=!: JSON encoded policy definition.
            --subscription=: Name or ID of subscription.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Policy.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: delete
          description: Delete a backup policy which doesn't have any associated backup items.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the backup policy.
            -v, --vault-name=: Name of the Recovery services vault.
        - name: get-default-for-vm
          description: Get the default policy with default values to backup a VM.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
        - name: list-associated-items
          description: List all items protected by a backup policy.
          flags:
            --backup-management-type=: Specify the backup management type.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the backup policy.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
        - name: set
          description: Update the existing policy with the provided details.
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --fix-for-inconsistent-items=:
                description: Specify whether or not to retry Policy Update for failed items.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --policy=: JSON encoded policy definition.
            --subscription=: Name or ID of subscription.
            --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Policy.
            -v, --vault-name=: Name of the Recovery services vault.
            -y, --yes=: Skip confirmation when updating Standard to Enhanced Policies.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                fix-for-inconsistent-items:
                    - "true"
                    - "false"
    - name: protectable-item
      description: Manage the item which is yet to be protected or backed up to an Azure Recovery services vault with an associated policy.
      commands:
        - name: list
          description: Retrieve all protectable items within a certain container or across all registered containers.
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --protectable-item-type=: Specify the type of items within the Resource which should be discovered and protected by Azure Backup.
            --server-name=: Parent Server name of the item.
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                protectable-item-type:
                    - SQLAG
                    - SQLInstance
                    - SQLDatabase
                    - HANAInstance
                    - SAPHanaDatabase
                    - SAPHanaSystem
                workload-type:
                    - MSSQL
                    - SAPHANA
                    - SAPASE
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: initialize
          description: Trigger the discovery of any unprotected items of the given workload type in the given container.
          flags:
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=!: Name of the backup container.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                workload-type:
                    - MSSQL
                    - SAPHANA
                    - SAPASE
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: show
          description: Retrieve the specified protectable item within the given container.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --protectable-item-type=!: Specify the type of items within the Resource which should be discovered and protected by Azure Backup.
            --server-name=!: Parent Server name of the item.
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the protectable item.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                protectable-item-type:
                    - SQLAG
                    - SQLInstance
                    - SQLDatabase
                    - HANAInstance
                    - SAPHanaDatabase
                    - SAPHanaSystem
                workload-type:
                    - MSSQL
                    - SAPHANA
                    - SAPASE
                    - SAPHanaDatabase
                    - SQLDataBase
    - name: protection
      description: Manage protection of your items, enable protection or disable it, or take on-demand backups.
      commands:
        - name: update-for-vm
          description: Update disk exclusion settings associated with a backed up VM item.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --disk-list-setting=: option to decide whether to include or exclude the disk or reset any previous settings to default behavior
            --diskslist=:
                description: List of disks to be excluded or included.
                nargs: -1
            --exclude-all-data-disks=:
                description: Option to specify to backup OS disk only.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -i, --item-name=: Name of the backed up item.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                disk-list-setting:
                    - include
                    - exclude
                    - resetexclusionsettings
                exclude-all-data-disks:
                    - "true"
                    - "false"
        - name: resume
          description: Resume backup for the associated backup item.
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -i, --item-name=: Name of the backed up item.
            -p, --policy-name=!: Name of the backup policy.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: enable-for-vm
          description: Start protecting a previously unprotected Azure VM as per the specified policy to a Recovery services vault.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --disk-list-setting=: option to decide whether to include or exclude the disk or reset any previous settings to default behavior
            --diskslist=:
                description: List of disks to be excluded or included.
                nargs: -1
            --exclude-all-data-disks=:
                description: Option to specify to backup OS disk only.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --vm=!: Name or ID of the Virtual Machine to be protected.
            -g, --resource-group=!: Name of resource group.
            -p, --policy-name=!: Name of the backup policy.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                disk-list-setting:
                    - include
                    - exclude
                exclude-all-data-disks:
                    - "true"
                    - "false"
        - name: auto-enable-for-azurewl
          description: Automatically protect all existing unprotected DBs and any DB which will be added later with the given policy.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --protectable-item-name=!: Specify the resource name to be protected by Azure Backup service.
            --protectable-item-type=!: Specify the type of items within the Resource which should be discovered and protected by Azure Backup.
            --server-name=!: Parent Server name of the item.
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=!: Name of resource group.
            -p, --policy-name=!: Name of the backup policy.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                protectable-item-type:
                    - SQLAG
                    - SQLInstance
                    - SQLDatabase
                    - HANAInstance
                    - SAPHanaDatabase
                    - SAPHanaSystem
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: backup-now
          description: Perform an on-demand backup of a backed up item.
          flags:
            --backup-management-type=: Specify the backup management type.
            --backup-type=: '''Full, Differential, Log, CopyOnlyFull'' for backup Item type ''MSSQL''.'
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --enable-compression=:
                description: Option to enable compression
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --retain-until=: The date until which this backed up copy will be available for retrieval, in UTC (d-m-Y).
            --subscription=: Name or ID of subscription.
            --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -c, --container-name=: Name of the backup container.
            -g, --resource-group=: Name of resource group.
            -i, --item-name=: Name of the backed up item.
            -v, --vault-name=: Name of the Recovery services vault.
          completion:
            flag:
                backup-management-type:
                    - AzureIaasVM
                    - AzureStorage
                    - AzureWorkload
                enable-compression:
                    - "true"
                    - "false"
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: check-vm
          description: The command returns null/empty if the specified resource is not protected under any Recovery Services vault in the subscription.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            --vm-id=: ID of the virtual machine to be checked for protection.
            --vm=: Name or ID of the Virtual Machine to be protected.
            -g, --resource-group=: Name of resource group.
        - name: enable-for-azurefileshare
          description: Start protecting a previously unprotected Azure File share within an Azure Storage account as per the specified policy to a Recovery services vault.
          flags:
            --azure-file-share=!: Name of the Azure FileShare.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --storage-account=!: Name of the Storage Account of the FileShare.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -p, --policy-name=!: Name of the backup policy.
            -v, --vault-name=!: Name of the Recovery services vault.
        - name: auto-disable-for-azurewl
          description: Disable auto-protection for the specified protectable item.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --protectable-item-name=!: Specify the resource name to be protected by Azure Backup service.
            --protectable-item-type=!: Specify the type of items within the Resource which should be discovered and protected by Azure Backup.
            --server-name=!: Parent Server name of the item.
            --subscription=: Name or ID of subscription.
            --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
            -g, --resource-group=!: Name of resource group.
            -v, --vault-name=!: Name of the Recovery services vault.
          completion:
            flag:
                protectable-item-type:
                    - SQLAG
                    - SQLInstance
                    - SQLDatabase
                    - HANAInstance
                    - SAPHanaDatabase
                    - SAPHanaSystem
                workload-type:
                    - VM
                    - AzureFileShare
                    - SAPHANA
                    - MSSQL
                    - SAPHanaDatabase
                    - SQLDataBase
        - name: disable
          description: Stop protecting a backed up item.
          flags:
            --backup-management-type=: Specify the backup management type.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --delete-backup-data=:
