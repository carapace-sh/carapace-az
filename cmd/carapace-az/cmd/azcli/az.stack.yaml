# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: stack
description: A deployment stack is a native Azure resource type that enables you to perform operations on a resource collection as an atomic unit.
commands:
    - name: group
      commands:
        - name: delete
          description: Delete specified deployment stack from resource group scope
          flags:
            --action-on-unmanage=!: Defines what happens to resources that are no longer managed after the stack is updated or deleted.
            --bypass-stack-out-of-sync-error=:
                description: Flag to bypass service errors that indicate the stack resource list is not correctly synchronized.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --id=: The deployment stack resource id.
            --subscription=: Name or ID of subscription.
            --yes=: Do not prompt for confirmation
            -g, --resource-group=: The resource group where the deployment stack exists
            -n, --name=: The deployment stack name
          completion:
            flag:
                action-on-unmanage:
                    - deleteAll
                    - deleteResources
                    - detachAll
                bypass-stack-out-of-sync-error:
                    - "true"
                    - "false"
        - name: export
          description: Export the template used to create the deployment stack from resource group scope
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --id=: The deployment stack resource id.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: The resource group where the deployment stack exists
            -n, --name=: The deployment stack name
        - name: show
          description: Get specified deployment stack from resource group scope
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --id=: The deployment stack resource id.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: The resource group where the deployment stack exists
            -n, --name=: The deployment stack name
        - name: create
          description: Create or update a deployment stack at resource group scope
          flags:
            --action-on-unmanage=!: Defines what happens to resources that are no longer managed after the stack is updated or deleted.
            --bypass-stack-out-of-sync-error=:
                description: Flag to bypass service errors that indicate the stack resource list is not correctly synchronized.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --deny-settings-apply-to-child-scopes=: DenySettings will be applied to child scopes.
            --deny-settings-excluded-actions=: List of role-based management operations that are excluded from the denySettings.
            --deny-settings-excluded-principals=: List of AAD principal IDs excluded from the lock.
            --deny-settings-mode=!: Define which operations are denied on resources managed by the stack.
            --description=: The description of deployment stack.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            --yes=: Do not prompt for confirmation
            -f, --template-file=: a path to a template file or Bicep file in the file system
            -g, --resource-group=!: The resource group where the deployment stack will be created.
            -n, --name=!: The name of the deployment stack.
            -p, --parameters=:
                description: Parameters may be supplied from a file using the `@{path}` syntax, a JSON string, or as `<KEY=VALUE>` pairs.
                nargs: -1
            -q, --query-string=: The query string (a SAS token) to be used with the template-uri in the case of linked templates.
            -s, --template-spec=: The template spec resource id.
            -u, --template-uri=: a uri to a remote template file
          completion:
            flag:
                action-on-unmanage:
                    - deleteAll
                    - deleteResources
                    - detachAll
                bypass-stack-out-of-sync-error:
                    - "true"
                    - "false"
                deny-settings-mode:
                    - denyDelete
                    - denyWriteAndDelete
                    - none
        - name: list
          description: List all deployment stacks in resource group
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: The resource group where the deployment stack exists
        - name: validate
          description: Validate a deployment stack at resource group scope
          flags:
            --action-on-unmanage=!: Defines what happens to resources that are no longer managed after the stack is updated or deleted.
            --bypass-stack-out-of-sync-error=:
                description: Flag to bypass service errors that indicate the stack resource list is not correctly synchronized.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --deny-settings-apply-to-child-scopes=: DenySettings will be applied to child scopes.
            --deny-settings-excluded-actions=: List of role-based management operations that are excluded from the denySettings.
            --deny-settings-excluded-principals=: List of AAD principal IDs excluded from the lock.
            --deny-settings-mode=!: Define which operations are denied on resources managed by the stack.
            --description=: The description of deployment stack.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -f, --template-file=: a path to a template file or Bicep file in the file system
            -g, --resource-group=!: The resource group where the deployment stack will be created.
            -n, --name=!: The name of the deployment stack.
            -p, --parameters=:
                description: Parameters may be supplied from a file using the `@{path}` syntax, a JSON string, or as `<KEY=VALUE>` pairs.
