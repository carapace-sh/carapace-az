# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: search
description: search
commands:
    - name: admin-key
      commands:
        - name: show
          description: Gets the primary and secondary admin API keys for the specified Azure Cognitive Search service.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: renew
          description: Regenerates either the primary or secondary admin API key.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --key-kind=!: The type (primary or secondary) of the admin key.
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: private-endpoint-connection
      commands:
        - name: show
          description: Gets the details of the private endpoint connection to the search service in the given resource group.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --private-endpoint-connection-name=!: The name of the private endpoint connection to the Azure Cognitive Search service with the specified resource group.
        - name: update
          description: Update an existing private endpoint connection in a Search service in the given resource group.
          flags:
            --actions-required=!: Custom 'actions required' message when updating the private endpoint connection resource.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --description=!: Custom description when updating the private endpoint connection resource.
            --service-name=!: The name of the search service.
            --status=!: The updated status of the private endpoint connection resource.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: 'Name of the private endpoint connection resource; for example: {the name of the private endpoint resource}.{guid}.'
        - name: delete
          description: Disconnects the private endpoint connection and deletes it from the search service.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --private-endpoint-connection-name=!: The name of the private endpoint connection to the Azure Cognitive Search service with the specified resource group.
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          description: Gets a list of all private endpoint connections in the given service.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: private-link-resource
      commands:
        - name: list
          description: Gets a list of all supported private link resource types for the given service.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: query-key
      commands:
        - name: create
          description: Generates a new query key for the specified search service.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the query key.
        - name: list
          description: Returns the list of query API keys for the given Azure Cognitive Search service.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: delete
          description: Deletes the specified query key.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --key-value=!: The value of the query key.
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
    - name: service
      commands:
        - name: create
          flags:
            --aad-auth-failure-mode=: Describes what response the data plane API of a Search service would send for requests that failed authentication.
            --auth-options=: Some Help
            --disable-local-auth=:
                description: When set to true, calls to the search service will not be permitted to utilize API keys for authentication.
                nargs: -1
            --hosting-mode=: Applicable only for the standard3 SKU.
            --identity-type=: The identity type.
            --ip-rules=: Some help
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --partition-count=: The number of partitions in the search service; if specified, it can be 1, 2, 3, 4, 6, or 12. Values greater than 1 are only valid for standard SKUs.
            --public-access=: This value can be set to 'enabled' to avoid breaking changes on existing customer resources and templates.
            --replica-count=: The number of replicas in the search service.
            --semantic-search=: Sets options that control the availability of semantic search.
            --sku=!: The SKU of the search service.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: Resource tags.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -l, --location=: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
            -n, --name=!: The name of the Azure Cognitive Search service to create or update.
          completion:
            flag:
                aad-auth-failure-mode:
                    - http401WithBearerChallenge
                    - http403
                auth-options:
                    - aadOrApiKey
                    - apiKeyOnly
                disable-local-auth:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                hosting-mode:
                    - default
                    - highDensity
                identity-type:
                    - None
                    - SystemAssigned
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                public-access:
                    - disabled
                    - enabled
                semantic-search:
                    - disabled
                    - free
                    - standard
                sku:
                    - basic
                    - free
                    - standard
                    - standard2
                    - standard3
                    - storage_optimized_l1
                    - storage_optimized_l2
        - name: update
          flags:
            --aad-auth-failure-mode=: Describes what response the data plane API of a Search service would send for requests that failed authentication.
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --auth-options=: Some Help
            --disable-local-auth=:
                description: When set to true, calls to the search service will not be permitted to utilize API keys for authentication.
                nargs: -1
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --identity-type=: The identity type.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --ip-rules=: Some help
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --partition-count=: The number of partitions in the search service; if specified, it can be 1, 2, 3, 4, 6, or 12. Values greater than 1 are only valid for standard SKUs.
            --public-access=: This value can be set to 'enabled' to avoid breaking changes on existing customer resources and templates.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --replica-count=: The number of replicas in the search service.
            --semantic-search=: Sets options that control the availability of semantic search.
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: Resource tags.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the Azure Cognitive Search service associated with the specified resource group.
          completion:
            flag:
                aad-auth-failure-mode:
                    - http401WithBearerChallenge
                    - http403
                auth-options:
                    - aadOrApiKey
                    - apiKeyOnly
                disable-local-auth:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                identity-type:
                    - None
                    - SystemAssigned
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                public-access:
                    - disabled
                    - enabled
                semantic-search:
                    - disabled
                    - free
                    - standard
        - name: list
          description: Gets a list of all Search services in the given resource group.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: show
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the Azure Cognitive Search service associated with the specified resource group.
        - name: wait
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the Azure Cognitive Search service associated with the specified resource group.
        - name: delete
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the Azure Cognitive Search service associated with the specified resource group.
            -y, --yes=: Do not prompt for confirmation.
    - name: shared-private-link-resource
      commands:
        - name: create
          description: Create shared privatelink resources in a Search service in the given resource group.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --group-id=!: 'The group id of the resource; for example: blob, sql or vault.'
            --no-wait=: Do not wait for the long-running operation to finish.
            --request-message=: Custom request message when creating or updating the shared privatelink resources.
            --resource-id=!: Fully qualified resource ID for the resource.
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the shared private link resource.
        - name: show
          description: Gets the details of the shared private link resource managed by the search service in the given resource group.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the shared private link resource managed by the Azure Cognitive Search service within the specified resource group.
        - name: wait
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --interval=: polling interval in seconds
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the shared private link resource managed by the Azure Cognitive Search service within the specified resource group.
        - name: delete
          description: Initiates the deletion of the shared private link resource from the search service.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the shared private link resource managed by the Azure Cognitive Search service within the specified resource group.
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          description: Gets a list of all shared private link resources managed by the given service.
          flags:
            --__SEARCH_MANAGEMENT_REQUEST_OPTIONS=:
                description: ==SUPPRESS==
                nargs: -1
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: update
          description: Update shared privatelink resources in a Search service in the given resource group.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --group-id=!: 'The group id of the resource; for example: blob, sql or vault.'
            --no-wait=: Do not wait for the long-running operation to finish.
            --request-message=!: Custom request message when creating or updating the shared privatelink resources.
            --resource-id=!: 'Fully qualified resource ID for the resource; for example: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/ {resourceProviderNamespace}/{resourceType}/{resourceName}.'
            --service-name=!: The name of the search service.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the shared private link resource.
