                enable-private-link:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                enabled-state:
                    - Disabled
                    - Enabled
