# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: afd
description: Manage Azure Front Door Standard/Premium.
commands:
    - name: custom-domain
      description: Manage custom domains within the specified profile.
      commands:
        - name: list
          description: List existing AzureFrontDoor domains.
          flags:
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: show
          description: Get an existing AzureFrontDoor domain with the specified domain name under the specified subscription, resource group and profile.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the domain under the profile which is unique globally.
        - name: regenerate-validation-token
          description: Updates the domain validation token.
          flags:
            --custom-domain-name=: Name of the domain under the profile which is unique globally.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: create
          description: Create a new domain within the specified profile.
          flags:
            --azure-dns-zone=: ID of the Azure DNS zone.
            --certificate-type=: Defines the source of the SSL certificate.
            --host-name=: The host name of the domain.
            --minimum-tls-version=: TLS protocol version that will be used for Https
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --secret=: Resource reference to the secret.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the domain under the profile which is unique globally
          completion:
            flag:
                certificate-type:
                    - AzureFirstPartyManagedCertificate
                    - CustomerCertificate
                    - ManagedCertificate
                minimum-tls-version:
                    - TLS10
                    - TLS12
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: delete
          description: Delete an existing AzureFrontDoor domain with the specified domain name under the specified subscription, resource group and profile.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the domain under the profile which is unique globally.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: update
          description: Update a new domain within the specified profile.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --azure-dns-zone=: ID of the Azure DNS zone.
            --certificate-type=: Defines the source of the SSL certificate.
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --minimum-tls-version=: TLS protocol version that will be used for Https
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --secret=: Resource reference to the secret.
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the domain under the profile which is unique globally.
          completion:
            flag:
                certificate-type:
                    - AzureFirstPartyManagedCertificate
                    - CustomerCertificate
                    - ManagedCertificate
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                minimum-tls-version:
                    - TLS10
                    - TLS12
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the domain under the profile which is unique globally.
    - name: endpoint
      description: Manage AFD endpoints within the specified profile.  An endpoint is a logical grouping of domains and their associated configurations.
      commands:
        - name: show
          description: Get an existing AzureFrontDoor endpoint with the specified endpoint name under the specified subscription, resource group and profile.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the endpoint under the profile which is unique globally.
        - name: list
          description: List existing AzureFrontDoor endpoints.
          flags:
            --max-items=: Total number of items to return in the command's output.
            --next-token=: Token to specify where to start paginating.
            --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the endpoint under the profile which is unique globally.
        - name: purge
          description: Removes a content from AzureFrontDoor.
          flags:
            --content-paths=!:
                description: The path to the content to be purged.
                nargs: -1
            --domains=:
                description: List of domains.
                nargs: -1
            --endpoint-name=: Name of the endpoint under the profile which is unique globally.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: delete
          description: Delete an existing AzureFrontDoor endpoint with the specified endpoint name under the specified subscription, resource group and profile.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the endpoint under the profile which is unique globally.
            -y, --yes=: Do not prompt for confirmation.
          completion:
            flag:
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: create
          description: Create a new AzureFrontDoor endpoint with the specified endpoint name under the specified subscription, resource group and profile.
          flags:
            --enabled-state=: Whether to enable use of this rule.
            --name-reuse-scope=: Indicates the endpoint name reuse scope.
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: Resource tags.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the endpoint under the profile which is unique globally.
          completion:
            flag:
                enabled-state:
                    - Disabled
                    - Enabled
                name-reuse-scope:
                    - NoReuse
                    - ResourceGroupReuse
                    - SubscriptionReuse
                    - TenantReuse
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
        - name: update
          description: Update a new AzureFrontDoor endpoint with the specified endpoint name under the specified subscription, resource group and profile.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --enabled-state=: Whether to enable use of this rule.
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=:
                description: Do not wait for the long-running operation to finish.
                nargs: -1
            --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: Resource tags.
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the endpoint under the profile which is unique globally.
          completion:
            flag:
                enabled-state:
                    - Disabled
                    - Enabled
                force-string:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
                no-wait:
                    - "true"
                    - t
                    - "yes"
                    - "y"
                    - "1"
                    - "false"
                    - f
                    - "no"
                    - "n"
                    - "0"
    - name: log-analytic
      description: Manage afd log analytic results.
      commands:
        - name: metric
          description: Manage metric statistics for AFD profile.
          commands:
            - name: list
              description: Get log report for AFD profile
              flags:
                --continents=:
                    description: Support shorthand-syntax, json-file and yaml-file.
                    nargs: -1
                --country-or-regions=:
                    description: Support shorthand-syntax, json-file and yaml-file.
                    nargs: -1
                --custom-domains=!:
                    description: The domains to be included.
                    nargs: -1
                --date-time-begin=!: The start datetime.
                --date-time-end=!: The end datetime.
                --granularity=!: The interval granularity.
                --group-by=:
                    description: Support shorthand-syntax, json-file and yaml-file.
                    nargs: -1
                --metrics=!:
                    description: Metric types to include.
                    nargs: -1
                --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
                --protocols=!:
                    description: The protocols to be included.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
              completion:
                flag:
                    granularity:
                        - P1D
                        - PT1H
                        - PT5M
        - name: ranking
          description: Manage ranking statistics for AFD profile.
          commands:
            - name: list
              description: Get log analytics ranking report for AFD profile
              flags:
                --custom-domains=:
                    description: The domains to be included.
                    nargs: -1
                --date-time-begin=!: The start datetime.
                --date-time-end=!: The end datetime.
                --max-ranking=!: The maximum number of rows to return based on the ranking.
                --metrics=!:
                    description: Support shorthand-syntax, json-file and yaml-file.
                    nargs: -1
                --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
                --rankings=!:
                    description: Support shorthand-syntax, json-file and yaml-file.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
        - name: location
          description: Manage available location names for AFD log analysis.
          commands:
            - name: list
              description: Get all available location names for AFD log analytics report.
              flags:
                --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
        - name: resource
          description: Manage endpoints and custom domains available for AFD log analysis.
          commands:
            - name: list
              description: Get all endpoints and custom domains available for AFD log report
              flags:
                --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
    - name: origin
      description: Manage origins within the specified origin group.
      commands:
        - name: wait
          description: Place the CLI in a waiting state until a condition is met.
          flags:
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --interval=: polling interval in seconds
            --origin-group-name=: Name of the origin group which is unique within the profile.
            --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the origin which is unique within the profile.
        - name: update
          description: Update a new origin within the specified origin group.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --enable-private-link=:
                description: Indicates whether private link is enabled on that origin.
                nargs: -1
            --enabled-state=: Whether to enable health probes to be made against backends defined under backendPools.
            --enforce-certificate-name-check=:
                description: Whether to enable certificate name check at origin level
                nargs: -1
            --force-string=:
                description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                nargs: -1
            --host-name=: The address of the origin.
            --http-port=: The value of the HTTP port.
            --https-port=: The value of the HTTPS port.
            --ids=:
