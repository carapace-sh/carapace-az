# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: role
description: Manage Azure role-based access control (Azure RBAC).
commands:
    - name: assignment
      commands:
        - name: list
          description: List role assignments.
          flags:
            --all=: show all assignments under the current subscription
            --assignee=: represent a user, group, or service principal.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --include-classic-administrators=:
                description: list default role assignments for subscription classic administrators, aka co-admins
                nargs: -1
            --include-groups=: include extra assignments to the groups of which the user is a member(transitively).
            --include-inherited=: include assignments applied on parent scopes
            --role=: role name or id
            --scope=: scope at which the role assignment or definition applies to, e.g., /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, or /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: use it only if the role or assignment was added at the level of a resource group
          completion:
            flag:
                include-classic-administrators:
                    - "true"
                    - "false"
        - name: list-changelogs
          description: List changelogs for role assignments.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --end-time=: The end time of the query in the format of %Y-%m-%dT%H:%M:%SZ, e.g. 2000-12-31T12:59:59Z.
            --start-time=: The start time of the query in the format of %Y-%m-%dT%H:%M:%SZ, e.g. 2000-12-31T12:59:59Z.
            --subscription=: Name or ID of subscription.
        - name: update
          description: Update an existing role assignment for a user, group, or service principal.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --role-assignment=!: Description of an existing role assignment as JSON, or a path to a file containing a JSON description.
            --subscription=: Name or ID of subscription.
        - name: delete
          description: Delete role assignments.
          flags:
            --assignee=: represent a user, group, or service principal.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: space-separated role assignment ids
                nargs: -1
            --include-inherited=: include assignments applied on parent scopes
            --role=: role name or id
            --scope=: scope at which the role assignment or definition applies to, e.g., /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, or /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: use it only if the role or assignment was added at the level of a resource group
            -y, --yes=: Currently no-op.
        - name: create
          description: Check parameters are provided correctly, then call _create_role_assignment.
          flags:
            --assignee-object-id=: Use this parameter instead of '--assignee' to bypass Graph API invocation in case of insufficient privileges.
            --assignee-principal-type=: use with --assignee-object-id to avoid errors caused by propagation latency in Microsoft Graph
            --assignee=: represent a user, group, or service principal.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --condition-version=: Version of the condition syntax.
            --condition=: Condition under which the user can be granted permission.
            --description=: Description of role assignment.
            --role=!: role name or id
            --scope=!: scope at which the role assignment or definition applies to, e.g., /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, or /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM
            --subscription=: Name or ID of subscription.
            -n, --name=: A GUID for the role assignment.
          completion:
            flag:
                assignee-principal-type:
                    - User
                    - Group
                    - ServicePrincipal
                    - ForeignGroup
    - name: definition
      commands:
        - name: create
          description: Create a custom role definition.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --role-definition=!: json formatted content which defines the new role.
            --subscription=: Name or ID of subscription.
        - name: show
          description: Show a role definition.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --id=: The fully qualified role definition ID.
            --scope=: scope at which the role assignment or definition applies to, e.g., /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, or /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM
            --subscription=: Name or ID of subscription.
            -n, --name=: The role definition's name (GUID)
        - name: list
          description: List role definitions.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --custom-role-only=:
                description: custom roles only(vs.
                nargs: -1
            --scope=: scope at which the role assignment or definition applies to, e.g., /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, or /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: use it only if the role or assignment was added at the level of a resource group
            -n, --name=: Matches the role definition's name (GUID) or roleName (e.g. 'Reader') property.
          completion:
            flag:
                custom-role-only:
                    - "true"
                    - "false"
        - name: delete
          description: Delete a role definition.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --custom-role-only=:
                description: custom roles only(vs.
                nargs: -1
            --scope=: scope at which the role assignment or definition applies to, e.g., /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, or /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: use it only if the role or assignment was added at the level of a resource group
            -n, --name=!: Matches the role definition's name (GUID) or roleName (e.g. 'Reader') property.
          completion:
            flag:
                custom-role-only:
                    - "true"
                    - "false"
        - name: update
          description: Update a role definition.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --role-definition=!: json formatted content which defines the new role.
            --subscription=: Name or ID of subscription.
