# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: provider
description: Manage resource providers.
commands:
    - name: list
      description: Gets all resource providers for a subscription.
      flags:
        --expand=: The properties to include in the results.
        --subscription=: Name or ID of subscription.
    - name: operation
      commands:
        - name: list
          description: Get operations from all providers.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
        - name: show
          description: Get an individual provider's operations.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --namespace=!: the resource namespace, aka 'provider'
    - name: permission
      commands:
        - name: list
          description: List permissions from a provider.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -n, --namespace=!: the resource namespace, aka 'provider'
    - name: register
      description: Register a provider.
      flags:
        --accept-terms=: Accept market place terms and RP terms for RPaaS.
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        --wait=: wait for the registration to finish
        -c, --consent-to-permissions=: A value indicating whether authorization is consented or not.
        -m, --management-group-id=: The management group id to register.
        -n, --namespace=!: the resource namespace, aka 'provider'
    - name: show
      description: Gets the specified resource provider.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --expand=: The $expand query parameter.
        --subscription=: Name or ID of subscription.
        -n, --namespace=!: the resource namespace, aka 'provider'
    - name: unregister
      description: Unregister a provider.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        --wait=: wait for unregistration to finish
        -n, --namespace=!: the resource namespace, aka 'provider'
