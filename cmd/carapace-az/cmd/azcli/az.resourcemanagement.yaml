# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: resourcemanagement
description: resourcemanagement
commands:
    - name: private-link
      commands:
        - name: show
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: The name of the resource group.
            -n, --name=!: The name of the resource management private link.
        - name: list
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: The name of the resource group.
        - name: delete
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: The name of the resource group.
            -n, --name=!: The name of the resource management private link.
            -y, --yes=: Do not prompt for confirmation.
        - name: create
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: The name of the resource group.
            -l, --location=!: the region to create the resource management private link
            -n, --name=!: The name of the resource management private link.
