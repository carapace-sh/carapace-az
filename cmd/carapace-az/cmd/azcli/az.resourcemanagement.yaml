# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: resourcemanagement
description: resourcemanagement CLI command group.
commands:
    - name: private-link
      description: resourcemanagement private-link management on a resource.
      commands:
        - name: delete
          description: Delete a resource management private link.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: The name of the resource group.
            -n, --name=!: The name of the resource management private link.
            -y, --yes=: Do not prompt for confirmation.
        - name: list
          description: Get all the resource management private links at scope.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: The name of the resource group.
        - name: show
          description: Get resource management private.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: The name of the resource group.
            -n, --name=!: The name of the resource management private link.
        - name: create
          description: Create a resource management group private link.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: The name of the resource group.
            -l, --location=!: the region to create the resource management private link
            -n, --name=!: The name of the resource management private link.
