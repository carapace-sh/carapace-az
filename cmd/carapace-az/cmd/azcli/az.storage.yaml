# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: storage
description: storage
commands:
    - name: account
      commands:
        - name: private-endpoint-connection
          commands:
            - name: reject
              flags:
                --account-name=: The storage account name.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --description=: Comments for reject operation.
                --id=: The ID of the private endpoint connection associated with the Storage Account.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: The resource group name of specified storage account.
                -n, --name=: The name of the private endpoint connection associated with the Storage Account.
            - name: delete
              description: Deletes the specified private endpoint connection associated with the storage account.
              flags:
                --account-name=: The storage account name.
                --id=: The ID of the private endpoint connection associated with the Storage Account.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: The resource group name of specified storage account.
                -n, --name=: The name of the private endpoint connection associated with the Storage Account.
                -y, --yes=: Do not prompt for confirmation.
            - name: approve
              flags:
                --account-name=: The storage account name.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --description=: Comments for approve operation.
                --id=: The ID of the private endpoint connection associated with the Storage Account.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: The resource group name of specified storage account.
                -n, --name=: The name of the private endpoint connection associated with the Storage Account.
            - name: show
              description: Gets the specified private endpoint connection associated with the storage account.
              flags:
                --account-name=: The storage account name.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --id=: The ID of the private endpoint connection associated with the Storage Account.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: The resource group name of specified storage account.
                -n, --name=: The name of the private endpoint connection associated with the Storage Account.
        - name: private-link-resource
          commands:
            - name: list
              description: Gets the private link resources that need to be created for a storage account.
              flags:
                --account-name=!: The name of the storage account within the specified resource group.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
        - name: local-user
          commands:
            - name: show
              description: Get the local user of the storage account by username.
              flags:
                --account-name=!: The storage account name.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --user-name=!: The name of local user.
            - name: create
              flags:
                --account-name=!: The storage account name.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --has-shared-key=:
                    description: Indicates whether shared key exists.
                    nargs: -1
                --has-ssh-key=:
                    description: Indicates whether ssh key exists.
                    nargs: -1
                --has-ssh-password=:
                    description: Indicates whether ssh password exists.
                    nargs: -1
                --home-directory=: The home directory.
                --permission-scope=:
                    description: 'The permission scope argument list which includes the permissions, service, and resource_name.The permissions can be a combination of the below possible values: Read(r), Write (w), Delete (d), List (l), and Create (c).'
                    nargs: -1
                --ssh-authorized-key=:
                    description: SSH authorized keys for SFTP.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --user-name=!: The name of local user.
              completion:
                flag:
                    has-shared-key:
                        - "true"
                        - "false"
                    has-ssh-key:
                        - "true"
                        - "false"
                    has-ssh-password:
                        - "true"
                        - "false"
            - name: delete
              description: Deletes the local user associated with the specified storage account.
              flags:
                --account-name=!: The storage account name.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --user-name=!: The name of local user.
            - name: list-keys
              description: List SSH authorized keys and shared key of the local user.
              flags:
                --account-name=!: The storage account name.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --user-name=!: The name of local user.
            - name: regenerate-password
              description: Regenerate the local user SSH password.
              flags:
                --account-name=!: The storage account name.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --user-name=!: The name of local user.
            - name: update
              flags:
                --account-name=!: The storage account name.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --has-shared-key=:
                    description: Indicates whether shared key exists.
                    nargs: -1
                --has-ssh-key=:
                    description: Indicates whether ssh key exists.
                    nargs: -1
                --has-ssh-password=:
                    description: Indicates whether ssh password exists.
                    nargs: -1
                --home-directory=: The home directory.
                --permission-scope=:
                    description: 'The permission scope argument list which includes the permissions, service, and resource_name.The permissions can be a combination of the below possible values: Read(r), Write (w), Delete (d), List (l), and Create (c).'
                    nargs: -1
                --ssh-authorized-key=:
                    description: SSH authorized keys for SFTP.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --user-name=!: The name of local user.
              completion:
                flag:
                    has-shared-key:
                        - "true"
                        - "false"
                    has-ssh-key:
                        - "true"
                        - "false"
                    has-ssh-password:
                        - "true"
                        - "false"
            - name: list
              description: List the local users associated with the storage account.
              flags:
                --account-name=!: The storage account name.
                --filter=: Optional.
                --include=: Optional, when specified, will list local users enabled for the specific protocol.
                --maxpagesize=: Optional, specifies the maximum number of local users that will be included in the list response.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
        - name: encryption-scope
          commands:
            - name: update
              flags:
                --account-name=!: The storage account name.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --state=: Change the state the encryption scope.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=!: The name of the encryption scope within the specified storage account.
                -s, --key-source=: The provider for the encryption scope.
                -u, --key-uri=: The object identifier for a key vault key object.
              completion:
                flag:
                    key-source:
                        - Microsoft.Storage
                        - Microsoft.KeyVault
                    state:
                        - Enabled
                        - Disabled
            - name: show
              description: Returns the properties for the specified encryption scope.
              flags:
                --account-name=!: The storage account name.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=!: The name of the encryption scope within the specified storage account.
            - name: list
              flags:
                --account-name=!: The storage account name.
                --filter=: When specified, only encryption scope names starting with the filter will be listed
                --include=: when specified, will list encryption scopes with the specific state
                --marker=: A string value that identifies the portion of the list of containers to be returned with the next listing operation.
                --maxpagesize=: the maximum number of encryption scopes that will be included in the list response
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
              completion:
                flag:
                    include:
                        - All
                        - Enabled
                        - Disabled
            - name: create
              flags:
                --account-name=!: The storage account name.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -i, --require-infrastructure-encryption=:
                    description: A boolean indicating whether or not the service applies a secondary layer of encryption with platform managed keys for data at rest.
                    nargs: -1
                -n, --name=!: The name of the encryption scope within the specified storage account.
                -s, --key-source=: The provider for the encryption scope.
                -u, --key-uri=: The object identifier for a key vault key object.
              completion:
                flag:
                    key-source:
                        - Microsoft.Storage
                        - Microsoft.KeyVault
                    require-infrastructure-encryption:
                        - "true"
                        - "false"
        - name: keys
          commands:
            - name: renew
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --key-type=: The key type to regenerate.
                --key=!: The key options to regenerate.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --account-name=!: The storage account name.
              completion:
                flag:
                    key:
                        - primary
                        - secondary
                        - key1
                        - key2
                    key-type:
                        - kerb
            - name: list
              description: Lists the access keys or Kerberos keys (if active directory enabled) for the specified storage account.
              flags:
                --expand-key-type=: Specify the expanded key types to be listed.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --account-name=!: The storage account name.
        - name: management-policy
          commands:
            - name: delete
              flags:
                --account-name=!: The name of the storage account within the specified resource group.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: create
              flags:
                --account-name=!: The name of the storage account within the specified resource group.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --policy=!: The Storage Account ManagementPolicies Rules, in JSON format.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: show
              flags:
                --account-name=!: The name of the storage account within the specified resource group.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: update
              flags:
                --account-name=!: The name of the storage account within the specified resource group.
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
        - name: migration
          commands:
            - name: start
              flags:
                --account-name=: The name of the storage account within the specified resource group.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --name=: current value is 'default' for customer initiated migration
                --no-wait=:
                    description: Do not wait for the long-running operation to finish.
                    nargs: -1
                --sku=!: Target sku name for the account
                --subscription=: Name or ID of subscription.
                --type=: SrpAccountMigrationType in ARM contract which is 'accountMigrations'
                -g, --resource-group=: Name of resource group.
              completion:
                flag:
                    no-wait:
                        - "true"
                        - t
                        - "yes"
                        - "y"
                        - "1"
                        - "false"
                        - f
                        - "no"
                        - "n"
                        - "0"
                    sku:
                        - Premium_LRS
                        - Premium_ZRS
                        - Standard_GRS
                        - Standard_GZRS
                        - Standard_LRS
                        - Standard_RAGRS
                        - Standard_RAGZRS
                        - Standard_ZRS
            - name: show
              flags:
                --account-name=: The name of the storage account within the specified resource group.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: The name of the Storage Account Migration.
              completion:
                flag:
                    name:
                        - default
        - name: blob-service-properties
          commands:
            - name: update
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --change-feed-retention-days=: Indicate the duration of changeFeed retention in days.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --container-delete-retention-days=: Indicate the number of days that the deleted container should be retained.
                --delete-retention-days=: ""
                --enable-change-feed=:
                    nargs: -1
                --enable-container-delete-retention=:
                    description: Enable container delete retention policy for container soft delete when set to true.
                    nargs: -1
                --enable-delete-retention=:
                    nargs: -1
                --enable-restore-policy=:
                    description: Enable blob restore policy when it set to true.
                    nargs: -1
                --enable-versioning=:
                    description: Versioning is enabled if set to true.
                    nargs: -1
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --restore-days=: The number of days for the blob can be restored.
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -d, --default-service-version=: Indicate the default version to use for requests to the Blob service if an incoming request's version is not specified.
                -g, --resource-group=: Name of resource group.
                -n, --account-name=!: The storage account name.
                -t, --enable-last-access-tracking=:
                    description: When set to true last access time based tracking policy is enabled.
                    nargs: -1
              completion:
                flag:
                    enable-change-feed:
                        - "true"
                        - "false"
                    enable-container-delete-retention:
                        - "true"
                        - "false"
                    enable-delete-retention:
                        - "true"
                        - "false"
                    enable-last-access-tracking:
                        - "true"
                        - "false"
                    enable-restore-policy:
                        - "true"
                        - "false"
                    enable-versioning:
                        - "true"
                        - "false"
            - name: cors-rule
              commands:
                - name: add
                  flags:
                    --allowed-headers=:
                        description: Space-separated list of headers allowed to be part of the cross-origin request
                        nargs: -1
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --exposed-headers=:
                        description: Space-separated list of response headers to expose to CORS clients
                        nargs: -1
                    --max-age=!: The number of seconds that the client/browser should cache a preflight response
                    --methods=!:
                        description: Space-separated list of HTTP verbs (methods) allowed to be executed by the origin
                        nargs: -1
                    --origins=!:
                        description: Space-separated list of origin domains that will be allowed via CORS, or "*" to allow all domains
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --account-name=!: The storage account name.
                - name: list
                  flags:
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --account-name=!: The storage account name.
                - name: clear
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --account-name=!: The storage account name.
            - name: show
              description: Gets the properties of a storage account’s Blob service, including properties for Storage Analytics and CORS (Cross-Origin Resource Sharing) rules.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --account-name=!: The storage account name.
        - name: blob-inventory-policy
          commands:
            - name: delete
              flags:
                --account-name=!: The name of the storage account within the specified resource group.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -y, --yes=: Do not prompt for confirmation.
            - name: show
              flags:
                --account-name=!: The name of the storage account within the specified resource group.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
            - name: create
              flags:
                --account-name=!: The name of the storage account within the specified resource group.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --policy=!: The Storage Account Blob Inventory Policy, string in JSON format or json file path.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
            - name: update
              flags:
                --account-name=!: The name of the storage account within the specified resource group.
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
        - name: or-policy
          commands:
            - name: rule
              commands:
                - name: list
                  flags:
                    --policy-id=!: The ID of object replication policy or "default" if the policy ID is unknown.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --account-name=!: The storage account name.
                - name: update
                  flags:
                    --policy-id=!: The ID of object replication policy or "default" if the policy ID is unknown.
                    --prefix-match=:
                        description: Optional.
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -d, --destination-container=: The destination storage container name.
                    -g, --resource-group=: Name of resource group.
                    -n, --account-name=!: The storage account name.
                    -r, --rule-id=!: Rule Id is auto-generated for each new rule on destination account.
                    -s, --source-container=: The source storage container name.
                    -t, --min-creation-time=: Blobs created after the time will be replicated to the destination.
                - name: add
                  description: Initialize rule for or policy
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --policy-id=!: The ID of object replication policy or "default" if the policy ID is unknown.
                    --prefix-match=:
                        description: Optional.
                        nargs: -1
                    --subscription=: Name or ID of subscription.
                    -d, --destination-container=!: The destination storage container name.
                    -g, --resource-group=: Name of resource group.
                    -n, --account-name=!: The storage account name.
                    -s, --source-container=!: The source storage container name.
                    -t, --min-creation-time=: Blobs created after the time will be replicated to the destination.
                - name: remove
                  flags:
                    --policy-id=!: The ID of object replication policy or "default" if the policy ID is unknown.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --account-name=!: The storage account name.
                    -r, --rule-id=!: Rule Id is auto-generated for each new rule on destination account.
                - name: show
                  flags:
                    --cmd=:
                        description: ==SUPPRESS==
                        nargs: -1
                    --policy-id=!: The ID of object replication policy or "default" if the policy ID is unknown.
                    --subscription=: Name or ID of subscription.
                    -g, --resource-group=: Name of resource group.
                    -n, --account-name=!: The storage account name.
                    -r, --rule-id=!: Rule Id is auto-generated for each new rule on destination account.
            - name: list
              description: List the object replication policies associated with the storage account.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --account-name=!: The storage account name.
            - name: update
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --policy-id=: The ID of object replication policy or "default" if the policy ID is unknown.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -d, --destination-account=: The destination storage account name or resource Id.
                -g, --resource-group=: Name of resource group.
                -n, --account-name=!: The storage account name.
                -p, --policy=: The object replication policy definition between two storage accounts, in JSON format.
                -s, --source-account=: The source storage account name or resource Id.
            - name: delete
              description: Deletes the object replication policy associated with the specified storage account.
              flags:
                --policy-id=!: The ID of object replication policy or "default" if the policy ID is unknown.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --account-name=!: The storage account name.
            - name: create
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --destination-container=: The destination storage container name.
                --policy-id=: The ID of object replication policy or "default" if the policy ID is unknown.
                --prefix-match=:
                    description: Optional.
                    nargs: -1
                --rule-id=: Rule Id is auto-generated for each new rule on destination account.
                --source-container=: The source storage container name.
                --subscription=: Name or ID of subscription.
                -d, --destination-account=: The destination storage account name or resource Id.
                -g, --resource-group=: Name of resource group.
                -n, --account-name=!: The storage account name.
                -p, --policy=: The object replication policy definition between two storage accounts, in JSON format.
                -s, --source-account=: The source storage account name or resource Id.
                -t, --min-creation-time=: Blobs created after the time will be replicated to the destination.
            - name: show
              description: Get the object replication policy of the storage account by policy ID.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --policy-id=!: The ID of object replication policy or "default" if the policy ID is unknown.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --account-name=!: The storage account name.
        - name: show-usage
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -l, --location=!: Location.
        - name: network-rule
          commands:
            - name: add
              flags:
                --action=: The action of virtual network rule.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ip-address=:
                    description: IPv4 address or CIDR range.
                    nargs: -1
                --resource-id=: The resource id to add in network rule.
                --subnet=: Name or ID of subnet.
                --subscription=: Name or ID of subscription.
                --tenant-id=: The tenant id to add in network rule.
                --vnet-name=: Name of a virtual network.
                -g, --resource-group=: Name of resource group.
                -n, --account-name=!: The storage account name.
            - name: remove
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ip-address=:
                    description: IPv4 address or CIDR range.
                    nargs: -1
                --resource-id=: The resource id to add in network rule.
                --subnet=: Name or ID of subnet.
                --subscription=: Name or ID of subscription.
                --tenant-id=: The tenant id to add in network rule.
                --vnet-name=: Name of a virtual network.
                -g, --resource-group=: Name of resource group.
                -n, --account-name=!: The storage account name.
            - name: list
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --account-name=!: The storage account name.
