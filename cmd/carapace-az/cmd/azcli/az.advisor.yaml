# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: advisor
description: Manage Azure Advisor.
commands:
    - name: configuration
      description: Manage Azure Advisor configuration.
      commands:
        - name: update
          description: Update Azure Advisor configuration.
          flags:
            --add=:
                description: Add an object to a list of objects by specifying a path and key value pairs.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --configuration-name=: Advisor configuration name.
            --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
            --remove=:
                description: Remove a property or an element from a list.
                nargs: -1
            --set=:
                description: Update an object by specifying a property path and value to set.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -e, --exclude=: Exclude from recommendation generation.
            -g, --resource-group=: Name of resource group.
            -i, --include=: Include in recommendation generation.
            -l, --low-cpu-threshold=: Value for low CPU threshold.
          completion:
            flag:
                low-cpu-threshold:
                    - "5"
                    - "10"
                    - "15"
                    - "20"
        - name: list
          description: List Azure Advisor configuration for the entire subscription.
          flags:
            --subscription=: Name or ID of subscription.
        - name: show
          description: Show Azure Advisor configuration for the given subscription or resource group.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
    - name: recommendation
      description: Review Azure Advisor recommendations.
      commands:
        - name: disable
          description: Disable Azure Advisor recommendations.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -d, --days=: Number of days to disable.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the recommendation as output by the list command.
        - name: list
          description: List Azure Advisor recommendations.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -c, --category=: Name of recommendation category.
            -g, --resource-group=: Name of resource group.
            -r, --refresh=: Generate new recommendations.
          completion:
            flag:
                category:
                    - Cost
                    - HighAvailability
                    - Performance
                    - Security
        - name: enable
          description: Enable Azure Advisor recommendations.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The name of the recommendation as output by the list command.
