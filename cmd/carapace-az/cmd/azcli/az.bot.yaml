    - name: prepare-deploy
      description: Add scripts/config files for publishing with `az webapp deployment`.
      flags:
        --code-dir=: The directory to place the generated deployment files in.
        --lang=!: The language or runtime of the bot.
        --proj-file-path=: The path to the .csproj file relative to --code-dir.
        --subscription=: Name or ID of subscription.
      completion:
        flag:
            lang:
                - Csharp
                - Javascript
                - Typescript
    - name: prepare-publish
      description: Adds PostDeployScripts folder with necessary scripts to deploy v3 bot to Azure.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --code-dir=: The directory to download deployment scripts to.
        --proj-file-path=!: Path to the start up project file name.
        --sln-name=!: Name of the start up solution file name.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The resource name of the bot.
        -v, --version=: The Microsoft Bot Builder SDK version to be used in the bot template that will be created.
      completion:
        flag:
            version:
                - v3
                - v4
    - name: publish
      description: Publish to a bot's associated app service.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --code-dir=: The directory to upload bot code from.
        --keep-node-modules=:
            description: Keep node_modules folder and do not run `npm install` on the App Service.
            nargs: -1
        --proj-file-path=: Path to the start up project file name.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The resource name of the bot.
        -t, --timeout=: Configurable timeout in seconds for checking the status of deployment.
        -v, --version=: The Microsoft Bot Builder SDK version of the bot.
      completion:
        flag:
            keep-node-modules:
                - "true"
                - "false"
    - name: show
