# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: bot
description: Manage Microsoft Azure Bot Service.
commands:
    - name: authsetting
      description: Manage OAuth connection settings on a bot.
      commands:
        - name: list
          description: Returns all the Connection Settings registered to a particular BotService resource.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The resource name of the bot.
        - name: delete
          description: Deletes a Connection Setting registration for a Bot Service.
          flags:
            --subscription=: Name or ID of subscription.
            -c, --setting-name=!: Name of the oauth connection setting.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The resource name of the bot.
        - name: create
          description: Create a custom OAuth service provider.
          flags:
            --client-id=!: Client ID associated with the service provider setting.
            --client-secret=!: Client secret associated with the service provider setting.
            --parameters=:
                description: Parameter values for service provider parameters.
                nargs: -1
            --provider-scope-string=!: The scope string associated with the service provider setting.The string should be delimited as needed for the service provider.
            --service=!: Name of the service provider.
            --subscription=: Name or ID of subscription.
            -c, --setting-name=!: Name of the oauth connection setting.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The resource name of the bot.
        - name: show
          description: Get a Connection Setting registration for a Bot Service.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -c, --setting-name=!: Name of the oauth connection setting.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The resource name of the bot.
        - name: list-providers
          description: Gets supported OAuth Service providers.
          flags:
            --provider-name=: Service provider name for which to fetch details.
            --subscription=: Name or ID of subscription.
    - name: create
      description: Create a new v4 SDK bot.
      flags:
        --app-type=!: Microsoft App Type for the bot.
        --appid=!: The Microsoft account ID (MSA ID) to be used with the bot.
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --cmk-key-vault-key-url=: The key vault key url to enable Customer Managed Keys encryption
        --display-name=: The display name of the bot.
        --msi-resource-id=: Microsoft App Managed Identity Resource Id for the bot.
        --sku=: The Sku of the bot.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --tenant-id=: Microsoft App Tenant Id for the bot.
        -d, --description=: The description of the bot.
        -e, --endpoint=: The messaging endpoint of the bot.
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: The resource name of the bot.
      completion:
        flag:
            sku:
                - F0
                - S1
    - name: delete
      description: Deletes a Bot Service from the resource group.
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=!: Name of resource group.
        -n, --name=!: The resource name of the bot.
    - name: directline
      description: Manage the Directline Channel on a bot.
      commands:
        - name: delete
          description: Delete the Directline Channel on a bot
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The resource name of the bot.
        - name: show
          description: Get details of the Directline Channel on a bot
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            --with-secrets=:
                description: Show secrets in response for the channel.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The resource name of the bot.
          completion:
            flag:
                with-secrets:
                    - "true"
                    - "false"
        - name: update
          description: Update the DirectLine Channel on a bot with only v3 protocol enabled.
          flags:
            --add-disabled=:
                description: Add the channel in a disabled state.
                nargs: -1
            --disablev1=:
                description: If true, v1 protocol will be disabled on the channel
                nargs: -1
            --disablev3=:
                description: If true, v3 protocol will be disabled on the channel.
                nargs: -1
            --enable-enhanced-auth=:
                description: If true, enables enhanced authentication features.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --trusted-origins=:
                description: Space separated Trusted Origins URLs (must use HTTPS) e.g. --trusted-origins https://mybotsite1.azurewebsites.net https://mybotsite2.azurewebsites.net
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The resource name of the bot.
            -s, --site-name=: Name of the Directline channel site.
          completion:
            flag:
                add-disabled:
                    - "true"
                    - "false"
                disablev1:
                    - "true"
                    - "false"
                disablev3:
                    - "true"
                    - "false"
                enable-enhanced-auth:
                    - "true"
                    - "false"
        - name: create
          description: Create the DirectLine Channel on a bot with only v3 protocol enabled.
          flags:
            --add-disabled=:
                description: Add the channel in a disabled state.
                nargs: -1
            --disablev1=:
                description: If true, v1 protocol will be disabled on the channel
                nargs: -1
            --disablev3=:
                description: If true, v3 protocol will be disabled on the channel.
                nargs: -1
            --enable-enhanced-auth=:
                description: If true, enables enhanced authentication features.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --trusted-origins=:
                description: Space separated Trusted Origins URLs (must use HTTPS) e.g. --trusted-origins https://mybotsite1.azurewebsites.net https://mybotsite2.azurewebsites.net
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -l, --location=: Location.
            -n, --name=!: The resource name of the bot.
            -s, --site-name=: Name of the Directline channel site.
          completion:
            flag:
                add-disabled:
                    - "true"
                    - "false"
                disablev1:
                    - "true"
                    - "false"
                disablev3:
                    - "true"
                    - "false"
                enable-enhanced-auth:
                    - "true"
                    - "false"
    - name: download
      description: Download an existing bot.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --save-path=: The directory to download bot code to.
        --subscription=: Name or ID of subscription.
