                add-disabled:
                    - "true"
                    - "false"
                enable-calling:
                    - "true"
                    - "false"
                enable-groups:
                    - "true"
                    - "false"
                enable-media-cards:
                    - "true"
                    - "false"
                enable-messaging:
                    - "true"
                    - "false"
                enable-screen-sharing:
                    - "true"
                    - "false"
                enable-video:
