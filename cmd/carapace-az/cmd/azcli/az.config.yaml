# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: config
description: config
commands:
    - name: get
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --local=: Include local configuration.
    - name: param-persist
      commands:
        - name: "off"
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
        - name: show
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
        - name: "on"
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
        - name: delete
          flags:
            --___SUBSCRIPTION=:
                description: ==SUPPRESS==
                nargs: -1
            --all=: Clear all parameter persistence data.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --purge=: Delete parameter persistence file from working directory.
            --recursive=: Indicate this is recursive delete of parameter persistence.
            -y, --yes=: Do not prompt for confirmation.
    - name: set
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --local=: Set as a local configuration in the working directory.
    - name: unset
      flags:
        --___SUBSCRIPTION=:
            description: ==SUPPRESS==
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --local=: Include local configuration.
