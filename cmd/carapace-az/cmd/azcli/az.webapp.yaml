# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: webapp
description: Manage web apps.
commands:
    - name: auth
      description: Manage webapp authentication and authorization. To use v2 auth commands, run "az extension add --name authV2" to add the authV2 CLI extension.
      commands:
        - name: show
          description: Show the authentification settings for the webapp.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: name of the web app.
            -s, --slot=: the name of the slot.
        - name: update
          description: Update the authentication settings for the webapp.
          flags:
            --aad-allowed-token-audiences=:
                description: One or more token audiences (comma-delimited).
                nargs: -1
            --aad-client-id=: Application ID to integrate AAD organization account Sign-in into your web app
            --aad-client-secret-certificate-thumbprint=: Alternative to AAD Client Secret, thumbprint of a certificate used for signing purposes
            --aad-client-secret=: AAD application secret
            --aad-token-issuer-url=: This url can be found in the JSON output returned from your active directory endpoint using your tenantID.
            --action=: ""
            --allowed-external-redirect-urls=:
                description: One or more urls (space-delimited).
                nargs: -1
            --enabled=:
                nargs: -1
            --facebook-app-id=: Application ID to integrate Facebook Sign-in into your web app
            --facebook-app-secret=: Facebook Application client secret
            --facebook-oauth-scopes=:
                description: One or more facebook authentication scopes (comma-delimited).
                nargs: -1
            --google-client-id=: Application ID to integrate Google Sign-in into your web app
            --google-client-secret=: Google Application client secret
            --google-oauth-scopes=:
                description: One or more Google authentication scopes (space-delimited).
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --microsoft-account-client-id=: AAD V2 Application ID to integrate Microsoft account Sign-in into your web app
            --microsoft-account-client-secret=: AAD V2 Application client secret
            --microsoft-account-oauth-scopes=:
                description: One or more Microsoft authentification scopes (comma-delimited).
                nargs: -1
            --runtime-version=: Runtime version of the Authentication/Authorization feature in use for the current app
            --subscription=: Name or ID of subscription.
            --token-refresh-extension-hours=: Hours, must be formattable into a float
            --token-store=:
                description: use App Service Token Store
                nargs: -1
            --twitter-consumer-key=: Application ID to integrate Twitter Sign-in into your web app
            --twitter-consumer-secret=: Twitter Application client secret
            -g, --resource-group=: Name of resource group.
            -n, --name=: name of the web app.
            -s, --slot=: the name of the slot.
          completion:
            flag:
                action:
                    - AllowAnonymous
                    - LoginWithAzureActiveDirectory
                    - LoginWithFacebook
                    - LoginWithGoogle
                    - LoginWithMicrosoftAccount
                    - LoginWithTwitter
                enabled:
                    - "true"
                    - "false"
                token-store:
                    - "true"
                    - "false"
    - name: browse
      description: Open a web app in a browser.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -l, --logs=: Enable viewing the log stream immediately after launching the web app
        -n, --name=: name of the web app.
        -s, --slot=: the name of the slot.
    - name: config
      description: Configure a web app.
      commands:
        - name: hostname
          description: Configure hostnames for a web app.
          commands:
            - name: get-external-ip
              description: Get the external-facing IP address for a web app.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --webapp-name=: webapp name.
                -g, --resource-group=: Name of resource group.
            - name: delete
              description: Unbind a hostname from a web app.
              flags:
                --hostname=: hostname assigned to the site, such as custom domains
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --webapp-name=: webapp name.
                -g, --resource-group=: Name of resource group.
                -s, --slot=: the name of the slot.
            - name: list
              description: List all hostname bindings for a web app.
              flags:
                --subscription=: Name or ID of subscription.
                --webapp-name=!: name of the web app.
                -g, --resource-group=!: Name of resource group.
                -s, --slot=: the name of the slot.
            - name: add
              description: Bind a hostname to a web app.
              flags:
                --hostname=: hostname assigned to the site, such as custom domains
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --webapp-name=: webapp name.
                -g, --resource-group=: Name of resource group.
                -s, --slot=: the name of the slot.
        - name: container
          description: Manage an existing web app's container settings.
          commands:
            - name: show
              description: Get details of a web app's container settings.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --show-multicontainer-config=: shows decoded config if a multicontainer config is set
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the web app.
                -s, --slot=: the name of the slot.
            - name: delete
              description: Delete an existing web app's container settings.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the web app.
                -s, --slot=: the name of the slot.
            - name: set
              description: Set an existing web app's container settings.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --multicontainer-config-file=: config file for multicontainer apps
                --multicontainer-config-type=: config type
                --subscription=: Name or ID of subscription.
                -c, --container-image-name=: The container custom image name and optionally the tag name (e.g., `<registry-name>/<image-name>:<tag>`)
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the web app.
                -p, --container-registry-password=: The container registry server password
                -r, --container-registry-url=: The container registry server url
                -s, --slot=: the name of the slot.
                -t, --enable-app-service-storage=:
                    description: enables platform storage (custom container only)
                    nargs: -1
                -u, --container-registry-user=: The container registry server username
              completion:
                flag:
                    enable-app-service-storage:
                        - "true"
                        - "false"
                    multicontainer-config-type:
                        - COMPOSE
                        - KUBE
        - name: connection-string
          description: Manage a web app's connection strings.
          commands:
            - name: set
              description: Update a web app's connection strings.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --settings=:
                    description: space-separated connection-string in a format of `<name>=<value>`
                    nargs: -1
                --slot-settings=:
                    description: space-separated slot connection-string in a format of either `<name>=<value>` or `@<json_file>`
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the web app.
                -s, --slot=: the name of the slot.
                -t, --connection-string-type=: connection string type
              completion:
                flag:
                    connection-string-type:
                        - MySql
                        - SQLServer
                        - SQLAzure
                        - Custom
                        - NotificationHub
                        - ServiceBus
                        - EventHub
                        - ApiHub
                        - DocDb
                        - RedisCache
                        - PostgreSQL
            - name: delete
              description: Delete a web app's connection strings.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --setting-names=!:
                    description: space-separated connection-string names
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: Name of the web app.
                -s, --slot=: the name of the slot.
            - name: list
              description: Get a web app's connection strings.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: name of the web app.
                -s, --slot=: the name of the slot.
        - name: ssl
          description: Configure SSL certificates for web apps.
          commands:
            - name: upload
              description: Upload an SSL certificate to a web app.
              flags:
                --certificate-file=!: The filepath for the .pfx file
                --certificate-name=: The name of the certificate.
                --certificate-password=!: The ssl cert password
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the web app.
                -s, --slot=: The name of the slot.
            - name: unbind
              description: Unbind an SSL certificate from a web app.
              flags:
                --certificate-thumbprint=!: The ssl cert thumbprint
                --hostname=: The custom domain name.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the web app.
                -s, --slot=: the name of the slot.
            - name: import
              description: Import an SSL or App Service Certificate to a web app from Key Vault.
              flags:
                --certificate-name=: The name of the certificate.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --key-vault-certificate-name=!: The name of the certificate in Key Vault
                --key-vault=!: The name or resource ID of the Key Vault
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the web app.
            - name: show
              description: Show the details of an SSL certificate for a web app.
              flags:
                --certificate-name=!: The name of the certificate.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: create
              description: Create a Managed Certificate for a hostname in a webapp app.
              flags:
                --certificate-name=: The name of the certificate.
                --hostname=!: The custom domain name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the web app.
                -s, --slot=: the name of the slot.
            - name: bind
              description: Bind an SSL certificate to a web app.
              flags:
                --certificate-thumbprint=!: The ssl cert thumbprint
                --hostname=: The custom domain name.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --ssl-type=!: The ssl cert type
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the web app.
                -s, --slot=: the name of the slot.
              completion:
                flag:
                    ssl-type:
                        - SNI
                        - IP
            - name: list
              description: List SSL certificates for a web app.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: delete
              description: Delete an SSL certificate from a web app.
              flags:
                --certificate-thumbprint=!: The ssl cert thumbprint
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
        - name: appsettings
          description: Configure web app settings. Updating or removing application settings will cause an app recycle.
          commands:
            - name: list
              description: Get the details of a web app's settings.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: name of the web app.
                -s, --slot=: the name of the slot.
            - name: set
              description: Set a web app's settings.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --settings=:
                    description: space-separated appsettings in a format of `<name>=<value>`
                    nargs: -1
                --slot-settings=:
                    description: space-separated slot appsettings in a format of either `<name>=<value>` or `@<json_file>`
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the web app.
                -s, --slot=: the name of the slot.
            - name: delete
              description: Delete web app settings.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --setting-names=!:
                    description: space-separated appsettings names
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the web app.
                -s, --slot=: the name of the slot.
        - name: storage-account
          description: Manage a web app's Azure storage account configurations.
          commands:
            - name: update
              description: Update an existing Azure storage account configuration on a web app.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --share-name=: name of the file share as given in the storage account
                --slot-setting=: With slot setting you can decide to make BYOS configuration sticky to a slot, meaning that when that slot is swapped, the storage account stays with that slot.
                --subscription=: Name or ID of subscription.
                -a, --account-name=: storage account name
                -g, --resource-group=: Name of resource group.
                -i, --custom-id=!: name of the share configured within the web app
                -k, --access-key=: storage account access key
                -m, --mount-path=: 'the path which the web app uses to read-write data ex: /share1 or /share2'
                -n, --name=: name of the web app.
                -s, --slot=: the name of the slot.
                -t, --storage-type=: storage type
              completion:
                flag:
                    storage-type:
                        - AzureFiles
                        - AzureBlob
            - name: list
              description: Get a web app's Azure storage account configurations.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: name of the web app.
                -s, --slot=: the name of the slot.
            - name: delete
              description: Delete a web app's Azure storage account configuration.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -i, --custom-id=!: name of the share configured within the web app
                -n, --name=: name of the web app.
                -s, --slot=: the name of the slot.
            - name: add
              description: Add an Azure storage account configuration to a web app.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --share-name=!: name of the file share as given in the storage account
                --slot-setting=: With slot setting you can decide to make BYOS configuration sticky to a slot, meaning that when that slot is swapped, the storage account stays with that slot.
                --subscription=: Name or ID of subscription.
                -a, --account-name=!: storage account name
                -g, --resource-group=: Name of resource group.
                -i, --custom-id=!: name of the share configured within the web app
                -k, --access-key=!: storage account access key
                -m, --mount-path=: 'the path which the web app uses to read-write data ex: /share1 or /share2'
                -n, --name=: name of the web app.
                -s, --slot=: the name of the slot.
                -t, --storage-type=!: storage type
              completion:
                flag:
                    storage-type:
                        - AzureFiles
                        - AzureBlob
        - name: snapshot
          description: Manage web app snapshots.
          commands:
            - name: restore
              description: Restore a web app snapshot.
              flags:
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --restore-content-only=: Restore the web app files without restoring the settings.
                --source-name=: Name of the web app to retrieve snapshot from.
                --source-resource-group=: Name of the resource group to retrieve snapshot from.
                --source-slot=: Name of the web app slot to retrieve snapshot from.
                --subscription=: Name or ID of subscription.
                --time=!: Timestamp of the snapshot to restore.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the web app.
                -s, --slot=: The name of the slot.
            - name: list
              description: List the restorable snapshots for a web app.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: name of the web app.
                -s, --slot=: The name of the slot.
        - name: backup
          description: Manage backups for web apps.
          commands:
            - name: update
              description: Configure a new backup schedule for a web app.
              flags:
                --backup-name=: Name of the backup.
                --container-url=: URL with SAS token to the blob storage container
                --db-connection-string=: Connection string for the database in the backup
                --db-name=: Name of the database in the backup
                --db-type=: Type of database in the backup
                --frequency=: How often to backup.
                --retain-one=:
                    description: Always keep one backup, regardless of how old it is
                    nargs: -1
                --retention=: How many days to keep a backup before automatically deleting it.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --webapp-name=!: The name of the web app
                -s, --slot=: the name of the slot.
              completion:
                flag:
                    db-type:
                        - SqlAzure
                        - MySql
                        - LocalMySql
                        - PostgreSql
                    retain-one:
                        - "true"
                        - "false"
            - name: list
              description: List backups of a web app.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --webapp-name=!: The name of the web app
                -s, --slot=: the name of the slot.
            - name: delete
              description: Delete a web app backup.
              flags:
                --backup-id=!: Id of the backup.
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --webapp-name=!: The name of the web app
                -s, --slot=: The name of the slot.
                -y, --yes=: Do not prompt for confirmation.
            - name: show
              description: Show the backup schedule for a web app.
              flags:
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --webapp-name=!: The name of the web app
                -s, --slot=: the name of the slot.
            - name: create
              description: Create a backup of a web app.
              flags:
                --backup-name=: Name of the backup.
                --container-url=!: URL with SAS token to the blob storage container
                --db-connection-string=: Connection string for the database in the backup
                --db-name=: Name of the database in the backup
                --db-type=: Type of database in the backup
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --webapp-name=!: The name of the web app
                -s, --slot=: the name of the slot.
              completion:
                flag:
                    db-type:
                        - SqlAzure
                        - MySql
                        - LocalMySql
                        - PostgreSql
            - name: restore
              description: Restore a web app from a backup.
              flags:
                --backup-name=!: Name of the backup to restore
                --container-url=!: URL with SAS token to the blob storage container
                --db-connection-string=: Connection string for the database in the backup
                --db-name=: Name of the database in the backup
                --db-type=: Type of database in the backup
                --ignore-hostname-conflict=: Ignores custom hostnames stored in the backup
                --overwrite=: Overwrite the source web app, if --target-name is not specified
                --subscription=: Name or ID of subscription.
                --target-name=: The name to use for the restored web app.
                -g, --resource-group=!: Name of resource group.
                -n, --webapp-name=!: The name of the web app
                -s, --slot=: the name of the slot.
              completion:
                flag:
                    db-type:
                        - SqlAzure
                        - MySql
                        - LocalMySql
                        - PostgreSql
        - name: set
          description: Set a web app's configuration.
          flags:
            --acr-identity=: Accept system or user assigned identity which will be set for acr image pull.
            --acr-use-identity=:
                description: Enable or disable pull image from acr use managed identity
                nargs: -1
            --always-on=:
                description: ensure web app gets loaded all the time, rather unloaded after been idle.
                nargs: -1
            --auto-heal-enabled=:
                description: enable or disable auto heal
                nargs: -1
            --ftps-state=: Set the Ftps state value for an app.
            --generic-configurations=:
                description: Provide site configuration list in a format of either `key=value` pair or `@<json_file>`.
                nargs: -1
            --http20-enabled=:
                description: configures a web site to allow clients to connect over http2.0.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --java-container-version=: The version of the java container, e.g., '8.0.23' for Tomcat
            --java-container=: The java container, e.g., Tomcat, Jetty
            --java-version=: The version used to run your web app if using Java, e.g., '1.7' for Java 7, '1.8' for Java 8
            --linux-fx-version=: The runtime stack used for your linux-based webapp, e.g., "RUBY|2.5.5", "NODE|12LTS", "PHP|7.2", "DOTNETCORE|2.1".
            --min-tls-cipher-suite=: The minimum TLS Cipher Suite required for requests, e.g., 'TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384'
            --min-tls-version=: The minimum version of TLS required for SSL requests, e.g., '1.0', '1.1', '1.2'
            --net-framework-version=: The version used to run your web app if using .NET Framework, e.g., 'v4.0' for .NET 4.6 and 'v3.0' for .NET 3.5
            --number-of-workers=: The number of workers to be allocated.
            --php-version=: The version used to run your web app if using PHP, e.g., 5.5, 5.6, 7.0
            --powershell-version=: The version used to run your function app if using PowerShell, e.g., 7.2
            --prewarmed-instance-count=: Number of pre-warmed instances a function app has
            --python-version=: The version used to run your web app if using Python, e.g., 2.7, 3.4
            --remote-debugging-enabled=:
                description: enable or disable remote debugging
                nargs: -1
            --runtime=: Canonicalized web runtime in the format of Framework:Version, e.g. "PHP:7.2".Use `az webapp list-runtimes` for available list
            --startup-file=: The startup file for linux hosted web apps, e.g. 'process.json' for Node.js web
            --subscription=: Name or ID of subscription.
            --use-32bit-worker-process=:
                description: use 32 bits worker process or not
                nargs: -1
            --vnet-route-all-enabled=:
                description: Configure regional VNet integration to route all traffic to the VNet.
                nargs: -1
            --web-sockets-enabled=:
                description: enable or disable web sockets
                nargs: -1
            --windows-fx-version=: A docker image name used for your windows container web app, e.g., microsoft/nanoserver:ltsc2016
            -g, --resource-group=: Name of resource group.
            -n, --name=: name of the web app.
            -s, --slot=: the name of the slot.
          completion:
            flag:
                acr-use-identity:
                    - "true"
                    - "false"
                always-on:
                    - "true"
                    - "false"
                auto-heal-enabled:
                    - "true"
                    - "false"
                ftps-state:
                    - AllAllowed
                    - FtpsOnly
                    - Disabled
                http20-enabled:
                    - "true"
                    - "false"
                remote-debugging-enabled:
                    - "true"
                    - "false"
                use-32bit-worker-process:
                    - "true"
                    - "false"
                vnet-route-all-enabled:
                    - "true"
                    - "false"
                web-sockets-enabled:
                    - "true"
                    - "false"
        - name: access-restriction
          description: Methods that show, set, add, and remove access restrictions on a webapp
          commands:
            - name: add
              description: Adds an Access Restriction to the webapp.
              flags:
                --action=: Allow or deny access
                --description=: Description of the access restriction rule
