# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: managed-cassandra
description: Azure Managed Cassandra.
commands:
    - name: cluster
      description: Azure Managed Cassandra Cluster.
      commands:
        - name: deallocate
          description: Deallocate Azure Managed Cassandra Cluster
          flags:
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Cluster Name
            -g, --resource-group=!: Name of resource group.
        - name: start
          description: Start Azure Managed Cassandra Cluster
          flags:
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Cluster Name
            -g, --resource-group=!: Name of resource group.
        - name: invoke-command
          description: Invokes a command in Azure Managed Cassandra Cluster host
          flags:
            --arguments=:
                description: The key="value" of arguments for the command.
                nargs: -1
            --cassandra-stop-start=:
                description: If true, stops cassandra before executing the command and then start it again.
                nargs: -1
            --command-name=!: The command which should be run
            --host=!: IP address of the cassandra host to run the command on
            --no-wait=: Do not wait for the long-running operation to finish.
            --readwrite=:
                description: If true, allows the command to *write* to the cassandra directory, otherwise read-only.
                nargs: -1
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Cluster Name
            -g, --resource-group=!: Name of resource group.
          completion:
            flag:
                cassandra-stop-start:
                    - "true"
                    - "false"
                readwrite:
                    - "true"
                    - "false"
        - name: update
          description: Updates an Azure Managed Cassandra Cluster
          flags:
            --authentication-method=: Authentication mode can be None or Cassandra.
            --cassandra-version=: The version of Cassandra chosen.
            --client-certificates=:
                description: If specified, enables client certificate authentication to the Cassandra API.
                nargs: -1
            --external-seed-nodes=:
                description: A list of ip addresses of the seed nodes of on-premise data centers.
                nargs: -1
            --hours-between-backups=: The number of hours between backup attempts.
            --identity-type=: Type of identity used for Customer Managed Disk Key.
            --no-wait=: Do not wait for the long-running operation to finish.
            --repair-enabled=:
                description: Enables automatic repair.
                nargs: -1
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -c, --cluster-name=!: Cluster Name
            -e, --external-gossip-certificates=:
                description: A list of certificates that the managed cassandra data center's should accept.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
          completion:
            flag:
                authentication-method:
                    - None
                    - Cassandra
                identity-type:
                    - None
                    - SystemAssigned
                repair-enabled:
                    - "true"
                    - "false"
        - name: list
          description: List Azure Managed Cassandra Clusters by resource group and subscription.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
        - name: status
          description: Get Azure Managed Cassandra Cluster Node Status
          flags:
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Cluster Name
            -g, --resource-group=!: Name of resource group.
        - name: show
          description: Get the properties of a managed Cassandra cluster.
          flags:
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Cluster Name
            -g, --resource-group=!: Name of resource group.
        - name: delete
          description: Deletes a managed Cassandra cluster.
          flags:
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Cluster Name
            -g, --resource-group=!: Name of resource group.
            -y, --yes=: Do not prompt for confirmation.
        - name: create
          description: Creates an Azure Managed Cassandra Cluster
          flags:
            --authentication-method=: Authentication mode can be None or Cassandra.
            --cassandra-version=: The version of Cassandra chosen.
            --client-certificates=:
                description: If specified, enables client certificate authentication to the Cassandra API.
                nargs: -1
            --cluster-name-override=: If a cluster must have a name that is not a valid azure resource name, this field can be specified to choose the Cassandra cluster name.
            --external-seed-nodes=:
                description: A list of ip addresses of the seed nodes of on-premise data centers.
                nargs: -1
            --hours-between-backups=: The number of hours between backup attempts.
            --identity-type=: Type of identity used for Customer Managed Disk Key.
            --no-wait=: Do not wait for the long-running operation to finish.
            --repair-enabled=:
                description: Enables automatic repair.
                nargs: -1
            --restore-from-backup-id=: The resource id of a backup.
            --subscription=: Name or ID of subscription.
            --tags=:
                description: 'space-separated tags: key[=value] [key[=value] ...].'
                nargs: -1
            -c, --cluster-name=!: Cluster Name
            -e, --external-gossip-certificates=:
                description: A list of certificates that the managed cassandra data center's should accept.
                nargs: -1
            -g, --resource-group=!: Name of resource group.
            -i, --initial-cassandra-admin-password=: The intial password to be configured when a cluster is created for authentication_method Cassandra.
            -l, --location=!: Azure Location of the Cluster
            -s, --delegated-management-subnet-id=!: The resource id of a subnet where the ip address of the cassandra management server will be allocated.
          completion:
            flag:
                authentication-method:
                    - None
                    - Cassandra
                identity-type:
                    - None
                    - SystemAssigned
                repair-enabled:
                    - "true"
                    - "false"
    - name: datacenter
      description: Azure Managed Cassandra DataCenter.
      commands:
        - name: update
          description: Updates an Azure Managed Cassandra DataCenter
          flags:
            --no-wait=: Do not wait for the long-running operation to finish.
            --sku=: Virtual Machine SKU used for data centers.
            --subscription=: Name or ID of subscription.
            -b, --base64-encoded-cassandra-yaml-fragment=: This is a Base64 encoded yaml file that is a subset of cassandra.yaml.
            -c, --cluster-name=!: Cluster Name
            -d, --data-center-name=!: Datacenter Name
            -g, --resource-group=!: Name of resource group.
            -k, --managed-disk-customer-key-uri=: Key uri to use for encryption of managed disks.
            -n, --node-count=: The number of Cassandra virtual machines in this data center.
            -p, --backup-storage-customer-key-uri=: Indicates the Key Uri of the customer key to use for encryption of the backup storage account.
        - name: show
          description: Get the properties of a managed Cassandra data center.
          flags:
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Cluster Name
            -d, --data-center-name=!: Datacenter Name
            -g, --resource-group=!: Name of resource group.
        - name: list
          description: List all data centers in a particular managed Cassandra cluster.
          flags:
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Cluster Name
            -g, --resource-group=!: Name of resource group.
        - name: create
          description: Creates an Azure Managed Cassandra DataCenter
          flags:
            --disk-capacity=: Number of disk used for data centers.
            --disk-sku=: Disk SKU used for data centers.
            --no-wait=: Do not wait for the long-running operation to finish.
            --sku=: Virtual Machine SKU used for data centers.
            --subscription=: Name or ID of subscription.
            -b, --base64-encoded-cassandra-yaml-fragment=: This is a Base64 encoded yaml file that is a subset of cassandra.yaml.
            -c, --cluster-name=!: Cluster Name
            -d, --data-center-name=!: Datacenter Name
            -g, --resource-group=!: Name of resource group.
            -k, --managed-disk-customer-key-uri=: Key uri to use for encryption of managed disks.
            -l, --data-center-location=!: Azure Location of the Datacenter
            -n, --node-count=!: The number of Cassandra virtual machines in this data center.
            -p, --backup-storage-customer-key-uri=: Indicates the Key Uri of the customer key to use for encryption of the backup storage account.
            -s, --delegated-subnet-id=!: The resource id of a subnet where ip addresses of the Cassandra virtual machines will be allocated.
            -z, --availability-zone=:
                description: If the data center haves Availability Zone feature, apply it to the Virtual Machine ScaleSet that host the data center virtual machines.
                nargs: -1
          completion:
            flag:
                availability-zone:
                    - "true"
                    - "false"
        - name: delete
          description: Delete a managed Cassandra data center.
          flags:
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            -c, --cluster-name=!: Cluster Name
            -d, --data-center-name=!: Datacenter Name
            -g, --resource-group=!: Name of resource group.
            -y, --yes=: Do not prompt for confirmation.
