# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: synapse
description: Manage and operate Synapse Workspace, Spark Pool, SQL Pool.
commands:
    - name: activity-run
      description: synapse activity-run
      commands:
        - name: query-by-pipeline-run
          description: Query activity runs based on input filter conditions.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --continuation-token=: The continuation token for getting the next page of results.
            --filters=:
                description: List of filters.
                nargs: -1
            --last-updated-after=!: The time at or after which the run event was updated in 'ISO 8601' format.
            --last-updated-before=!: The time at or before which the run event was updated in 'ISO 8601' format.
            --order-by=:
                description: List of OrderBy option.
                nargs: -1
            --run-id=!: The pipeline run identifier.
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
            -n, --name=!: The pipeline name.
    - name: ad-only-auth
      description: Manage Azure Active Directly only Authentication settings for this Synapse workspace.
      commands:
        - name: enable
          description: Enable Azure Active Directly only Authentication for this Synapse workspace.
          flags:
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The name of the workspace
            -g, --resource-group=!: Name of resource group.
        - name: get
          description: Gets a list of Azure Active Directory only authentication property.
          flags:
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The name of the workspace.
            -g, --resource-group=!: Name of resource group.
        - name: disable
          description: Disable Azure Active Directly only Authentication for this Synapse workspace.
          flags:
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The name of the workspace
            -g, --resource-group=!: Name of resource group.
    - name: data-flow
      description: Manage Synapse's data flows.
      commands:
        - name: delete
          description: Delete a data flow.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
            -n, --name=!: The data flow name.
            -y, --yes=: Do not prompt for confirmation.
        - name: set
          description: Set an exist data flow.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --file=!: Properties may be supplied from a JSON file using the `@{path}` syntax or a JSON string.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
            -n, --name=!: The data flow name.
        - name: list
          description: List data flows.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
        - name: create
          description: Create a data flow.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --file=!: Properties may be supplied from a JSON file using the `@{path}` syntax or a JSON string.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
            -n, --name=!: The data flow name.
        - name: show
          description: Get a data flow.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
            -n, --name=!: The data flow name.
    - name: dataset
      description: Manage Synapse's datasets.
      commands:
        - name: set
          description: Update an exist dataset.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --file=!: Properties may be supplied from a JSON file using the `@{path}` syntax or a JSON string.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
            -n, --name=!: The dataset name.
        - name: show
          description: Get a dataset.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
            -n, --name=!: The dataset name.
        - name: delete
          description: Delete a dataset.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
            -n, --name=!: The dataset name.
            -y, --yes=: Do not prompt for confirmation.
        - name: create
          description: Create a dataset.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --file=!: Properties may be supplied from a JSON file using the `@{path}` syntax or a JSON string.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
            -n, --name=!: The dataset name.
        - name: list
          description: List datasets.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
        - name: update
          description: Update an exist dataset.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --file=!: Properties may be supplied from a JSON file using the `@{path}` syntax or a JSON string.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
            -n, --name=!: The dataset name.
    - name: integration-runtime
      description: Manage Synapse's integration runtimes.
      commands:
        - name: create
          description: Create an integration runtime.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --compute-type=: Compute type of the data flow cluster which will execute data flow job.
            --core-count=: Core count of the data flow cluster which will execute data flow job.
            --description=: The integration runtime description.
            --if-match=: ETag of the integration runtime entity.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --time-to-live=: Time to live (in minutes) setting of the data flow cluster which will execute data flow job.
            --type=!: The integration runtime type.
            --workspace-name=!: The workspace name.
            -g, --resource-group=!: Name of resource group.
            -l, --location=: The integration runtime location.
            -n, --name=!: The integration runtime name.
          completion:
            flag:
                compute-type:
                    - General
                    - MemoryOptimized
                    - ComputeOptimized
                type:
                    - Managed
                    - SelfHosted
        - name: get-status
          description: Get integration runtime status.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
        - name: regenerate-auth-key
          description: Regenerate self-hosted integration runtime key.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --key-name=: The name of the authentication key to regenerate.
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
          completion:
            flag:
                key-name:
                    - authKey1
                    - authKey2
        - name: get-monitoring-data
          description: Get integration runtime monitoring data.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
        - name: sync-credentials
          description: Sync integration runtime credentials.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
        - name: update
          description: Update an integration runtime.
          flags:
            --auto-update=!: Enable or disable the self-hosted integration runtime auto-update.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --update-delay-offset=!: The time of the day for the self-hosted integration runtime auto-update.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
          completion:
            flag:
                auto-update:
                    - "On"
                    - "Off"
        - name: self-hosted
          description: Manage integration runtime with synapse sub group self-hosted
          commands:
            - name: create
              description: Create an self-hosted integration runtime.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --description=: The integration runtime description.
                --if-match=: ETag of the integration runtime entity.
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                --workspace-name=!: The workspace name.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: The integration runtime name.
        - name: managed
          description: Manage integration runtime with synapse sub group managed
          commands:
            - name: create
              description: Create an managed integration runtime.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --compute-type=: Compute type of the data flow cluster which will execute data flow job.
                --core-count=: Core count of the data flow cluster which will execute data flow job.
                --description=: The integration runtime description.
                --if-match=: ETag of the integration runtime entity.
                --no-wait=: Do not wait for the long-running operation to finish.
                --subscription=: Name or ID of subscription.
                --time-to-live=: Time to live (in minutes) setting of the data flow cluster which will execute data flow job.
                --workspace-name=!: The workspace name.
                -g, --resource-group=!: Name of resource group.
                -l, --location=: The integration runtime location.
                -n, --name=!: The integration runtime name.
              completion:
                flag:
                    compute-type:
                        - General
                        - MemoryOptimized
                        - ComputeOptimized
        - name: wait
          description: Place the CLI in a waiting state until a condition of a integration runtime is met.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --if-none-match=: ETag of the integration runtime entity.
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            --workspace-name=!: The workspace name.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The integration runtime name.
        - name: show
          description: Get integration runtime.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --if-none-match=: ETag of the integration runtime entity.
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
        - name: delete
          description: Delete integration runtime.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
            -y, --yes=: Do not prompt for confirmation.
        - name: start
          description: Start integration runtime.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
        - name: list
          description: List integration runtimes.
          flags:
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
            -g, --resource-group=!: Name of resource group.
        - name: get-connection-info
          description: Get integration runtime connection info.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
        - name: list-auth-key
          description: List integration runtime authentication keys.
          flags:
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The workspace name.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The integration runtime name.
        - name: upgrade
          description: Upgrade integration runtime.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
        - name: stop
          description: Stop integration runtime.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
            -y, --yes=: Do not prompt for confirmation.
    - name: integration-runtime-node
      description: Manage Synapse's self-hosted integration runtime nodes.
      commands:
        - name: update
          description: Update self-hosted integration runtime node.
          flags:
            --auto-update=!: Enable or disable the self-hosted integration runtime auto-update.
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --node-name=!: The integration runtime node name.
            --subscription=: Name or ID of subscription.
            --update-delay-offset=!: The time of the day for the self-hosted integration runtime auto-update.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
          completion:
            flag:
                auto-update:
                    - "On"
                    - "Off"
        - name: show
          description: Get integration runtime node.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --node-name=!: The integration runtime node name.
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
        - name: delete
          description: Delete integration runtime node.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --node-name=!: The integration runtime node name.
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
            -y, --yes=: Do not prompt for confirmation.
        - name: get-ip-address
          description: Get integration runtime node IP address.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --node-name=!: The integration runtime node name.
            --subscription=: Name or ID of subscription.
            --workspace-name=: The workspace name.
            -g, --resource-group=: Name of resource group.
            -n, --name=: The integration runtime name.
    - name: kql-script
      description: Manage script with kusto
      commands:
        - name: list
          description: List KQL scripts.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The name of the workspace
        - name: export
          description: Export KQL scripts.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --output-folder=!: The name of the output folder
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The name of the workspace
            -n, --name=: The name of the KQL script.
        - name: import
          description: Creates a KQL script.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --kusto-database-name=: The name of the Kusto database.
            --kusto-pool-name=: The name of the Kusto pool.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The name of the workspace
            -f, --file=!: The KQL query file path
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the KQL script.
        - name: create
          description: Creates a KQL script.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --kusto-database-name=: The name of the Kusto database.
            --kusto-pool-name=: The name of the Kusto pool.
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The name of the workspace
            -f, --file=!: The KQL query file path
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the KQL script.
        - name: show
          description: Gets a KQL script.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The name of the workspace
            -n, --name=!: The name of the KQL script.
        - name: wait
          description: Place the CLI in a waiting state until a condition of a KQL script is met.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --created=: wait until created with 'provisioningState' at 'Succeeded'
            --custom=: Wait until the condition satisfies a custom JMESPath query.
            --deleted=: wait until deleted
            --exists=: wait until the resource exists
            --interval=: polling interval in seconds
            --subscription=: Name or ID of subscription.
            --timeout=: maximum wait in seconds
            --updated=: wait until updated with provisioningState at 'Succeeded'
            --workspace-name=!: The name of the workspace
            -n, --name=!: The name of the KQL script.
        - name: delete
          description: Deletes a KQL script
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --no-wait=: Do not wait for the long-running operation to finish.
            --subscription=: Name or ID of subscription.
            --workspace-name=!: The name of the workspace
            -n, --name=!: The name of the KQL script.
            -y, --yes=: Do not prompt for confirmation.
    - name: kusto
      description: Manage synapse kusto
      commands:
        - name: database-principal-assignment
          description: Manage kusto pool database principal assignment with synapse
          commands:
            - name: delete
              description: Deletes a Kusto pool principalAssignment.
              flags:
                --database-name=: The name of the database in the Kusto pool.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --kusto-pool-name=: The name of the Kusto pool.
                --no-wait=: Do not wait for the long-running operation to finish.
                --principal-assignment-name=: The name of the Kusto principalAssignment.
                --subscription=: Name or ID of subscription.
                --workspace-name=: The name of the workspace
                -g, --resource-group=: Name of resource group.
                -y, --yes=: Do not prompt for confirmation.
            - name: wait
              description: Place the CLI in a waiting state until a condition of the synapse kusto database-principal-assignment is met.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --created=: wait until created with 'provisioningState' at 'Succeeded'
                --custom=: Wait until the condition satisfies a custom JMESPath query.
                --database-name=: The name of the database in the Kusto pool.
                --deleted=: wait until deleted
                --exists=: wait until the resource exists
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --interval=: polling interval in seconds
                --kusto-pool-name=: The name of the Kusto pool.
                --principal-assignment-name=: The name of the Kusto principalAssignment.
                --subscription=: Name or ID of subscription.
                --timeout=: maximum wait in seconds
                --updated=: wait until updated with provisioningState at 'Succeeded'
                --workspace-name=: The name of the workspace
                -g, --resource-group=: Name of resource group.
            - name: update
              description: Update a Kusto pool database principalAssignment.
              flags:
                --add=:
                    description: Add an object to a list of objects by specifying a path and key value pairs.
                    nargs: -1
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --database-name=: The name of the database in the Kusto pool.
                --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --kusto-pool-name=: The name of the Kusto pool.
                --no-wait=: Do not wait for the long-running operation to finish.
                --principal-assignment-name=: The name of the Kusto principalAssignment.
                --principal-id=: The principal ID assigned to the database principal.
                --principal-type=: Principal type.
                --remove=:
                    description: Remove a property or an element from a list.
                    nargs: -1
                --role=: Database principal role.
                --set=:
                    description: Update an object by specifying a property path and value to set.
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --tenant-id=: The tenant id of the principal
                --workspace-name=: The name of the workspace
                -g, --resource-group=: Name of resource group.
              completion:
                flag:
                    principal-type:
                        - App
                        - Group
                        - User
                    role:
                        - Admin
                        - Ingestor
                        - Monitor
                        - User
                        - UnrestrictedViewer
                        - Viewer
            - name: create
              description: Creates a Kusto pool database principalAssignment.
              flags:
                --database-name=!: The name of the database in the Kusto pool.
                --kusto-pool-name=!: The name of the Kusto pool.
                --no-wait=: Do not wait for the long-running operation to finish.
                --principal-assignment-name=!: The name of the Kusto principalAssignment.
                --principal-id=: The principal ID assigned to the database principal.
                --principal-type=: Principal type.
                --role=: Database principal role.
                --subscription=: Name or ID of subscription.
                --tenant-id=: The tenant id of the principal
                --workspace-name=!: The name of the workspace
                -g, --resource-group=!: Name of resource group.
              completion:
                flag:
                    principal-type:
                        - App
                        - Group
                        - User
                    role:
                        - Admin
                        - Ingestor
                        - Monitor
                        - User
                        - UnrestrictedViewer
                        - Viewer
            - name: show
              description: Gets a Kusto pool database principalAssignment.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --database-name=: The name of the database in the Kusto pool.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --kusto-pool-name=: The name of the Kusto pool.
                --principal-assignment-name=: The name of the Kusto principalAssignment.
                --subscription=: Name or ID of subscription.
                --workspace-name=: The name of the workspace
                -g, --resource-group=: Name of resource group.
            - name: list
