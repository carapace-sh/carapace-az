# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: redis
description: Manage dedicated Redis caches for your Azure applications.
commands:
    - name: access-policy
      commands:
        - name: update
          description: Update an Access Policy of the Redis Cache
          flags:
            --access-policy-name=!: The name of the access policy that is being assigned
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --permissions=!: Permissions for the access policy.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Redis cache.
        - name: list
          description: Gets the list of access policies associated with this redis cache.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
        - name: delete
          description: Deletes the access policy from a redis cache.
          flags:
            --access-policy-name=!: The name of the access policy that is being assigned
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Redis cache.
        - name: create
          description: Add an Access Policy to the Redis Cache
          flags:
            --access-policy-name=!: The name of the access policy that is being assigned
            --permissions=!: Permissions for the access policy.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
        - name: show
          description: Gets the detailed information about an access policy of a redis cache.
          flags:
            --access-policy-name=!: The name of the access policy that is being assigned
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Redis cache.
    - name: access-policy-assignment
      commands:
        - name: create
          description: Add an Access Policy Assignment (Redis User) to the Redis Cache
          flags:
            --access-policy-name=!: The name of the access policy that is being assigned
            --object-id-alias=!: User friendly name for object id.
            --object-id=!: Object Id to assign access policy to
            --policy-assignment-name=!: The name of the access policy assignment
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
        - name: show
          description: Gets the list of assignments for an access policy of a redis cache.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --policy-assignment-name=!: The name of the access policy assignment
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Redis cache.
        - name: list
          description: Gets the list of access policy assignments associated with this redis cache.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
        - name: update
          description: Update an Access Policy Assignment (Redis User) of the Redis Cache
          flags:
            --access-policy-name=!: The name of the access policy that is being assigned
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --object-id-alias=!: User friendly name for object id.
            --object-id=!: Object Id to assign access policy to
            --policy-assignment-name=!: The name of the access policy assignment
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Redis cache.
        - name: delete
          description: Deletes the access policy assignment from a redis cache.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --policy-assignment-name=!: The name of the access policy assignment
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Redis cache.
    - name: create
      description: Create new Redis Cache instance.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --disable-access-keys=:
            description: Authentication to Redis through access keys is disabled when set as true
            nargs: -1
        --enable-non-ssl-port=: If specified, then the non-ssl redis server port (6379) will be enabled.
        --mi-system-assigned=: Flag to specify system assigned identity
        --mi-user-assigned=:
            description: One or more space separated resource IDs of user assigned identities
            nargs: -1
        --minimum-tls-version=: Specifies the TLS version required by clients to connect to cache
        --redis-configuration=: JSON encoded configuration settings.
        --redis-version=: Redis version.
        --replicas-per-master=: The number of replicas to be created per master.
        --shard-count=: The number of shards to be created on a Premium Cluster Cache.
        --sku=!: Type of Redis cache.
        --static-ip=: Specify a static ip if required for the VNET.
        --subnet-id=: The full resource ID of a subnet in a virtual network to deploy the redis cache in.
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        --tenant-settings=:
            description: Space-separated tenant settings in key[=value] format
            nargs: -1
        --update-channel=: Specifies the update channel for the monthly Redis updates your Redis Cache will receive.
        --vm-size=!: Size of Redis cache to deploy.
        --zonal-allocation-policy=: Specifies how availability zones are allocated to the Redis cache.
        -g, --resource-group=!: Name of resource group.
        -l, --location=!: Location.
        -n, --name=!: Name of the Redis cache.
        -z, --zones=:
            description: Space-separated list of availability zones into which to provision the resource.
            nargs: -1
      completion:
        flag:
            disable-access-keys:
                - "true"
                - "false"
            minimum-tls-version:
                - "1.0"
                - "1.1"
                - "1.2"
            sku:
                - Basic
                - Standard
                - Premium
            update-channel:
                - Stable
                - Preview
            vm-size:
                - c0
                - c1
                - c2
                - c3
                - c4
                - c5
                - c6
                - p1
                - p2
                - p3
                - p4
                - p5
            zonal-allocation-policy:
                - Automatic
                - UserDefined
                - NoZones
    - name: delete
      description: Deletes a Redis cache.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the Redis cache.
        -y, --yes=: Do not prompt for confirmation.
    - name: export
      description: Export data stored in a Redis cache.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --container=!: SAS url for container where data needs to be exported to
        --file-format=: Format of the blob (Currently rdb is the only supported format, with other formats expected in the future)
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --preferred-data-archive-auth-method=: Preferred auth method to communicate to storage account used for data archive, default value is SAS
        --prefix=!: Prefix to use for exported files
        --storage-subscription-id=: SubscriptionId of the storage account
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the Redis cache.
      completion:
        flag:
            preferred-data-archive-auth-method:
                - SAS
                - ManagedIdentity
    - name: firewall-rules
      commands:
        - name: show
          description: Gets a single firewall rule in a specified redis cache.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --rule-name=!: The name of the firewall rule.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Redis cache.
        - name: delete
          description: Deletes a single firewall rule in a specified redis cache.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --rule-name=!: The name of the firewall rule.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Redis cache.
        - name: list
          description: Gets all firewall rules in the specified redis cache.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
        - name: update
          description: Update a redis cache firewall rule.
          flags:
            --end-ip=!: Highest IP address included in the range.
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --rule-name=!: The name of the firewall rule.
            --start-ip=!: Lowest IP address included in the range.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Redis cache.
        - name: create
          description: Create a redis cache firewall rule.
          flags:
            --end-ip=!: Highest IP address included in the range.
            --rule-name=!: The name of the firewall rule.
            --start-ip=!: Lowest IP address included in the range.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
    - name: flush
      description: Deletes all of the keys in a cache.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the Redis cache.
        -y, --yes=: Do not prompt for confirmation.
    - name: force-reboot
      description: Reboot specified Redis node(s).
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --reboot-type=!: Which Redis node(s) to reboot.
        --shard-id=: If clustering is enabled, the ID of the shard to be rebooted.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the Redis cache.
      completion:
        flag:
            reboot-type:
                - PrimaryNode
                - SecondaryNode
                - AllNodes
    - name: identity
      commands:
        - name: remove
          description: Remove the identity already assigned for Azure cache for Redis.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --mi-system-assigned=: Flag to specify system assigned identity
            --mi-user-assigned=:
                description: One or more space separated resource IDs of user assigned identities
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Redis cache.
        - name: show
          description: Show the identity assigned for Azure cache for Redis.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Redis cache.
        - name: assign
          description: Assign identity for Azure cache for Redis.
          flags:
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --mi-system-assigned=: Flag to specify system assigned identity
            --mi-user-assigned=:
                description: One or more space separated resource IDs of user assigned identities
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: Name of the Redis cache.
    - name: import
      description: Import data into a Redis cache.
      flags:
        --file-format=: Format of the blob (Currently rdb is the only supported format, with other formats expected in the future)
        --files=!:
            description: SAS url for blobs that needs to be imported
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --preferred-data-archive-auth-method=: Preferred auth method to communicate to storage account used for data archive, default value is SAS
        --storage-subscription-id=: SubscriptionId of the storage account
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the Redis cache.
      completion:
        flag:
            preferred-data-archive-auth-method:
                - SAS
                - ManagedIdentity
    - name: import-method
      description: Import data into Redis cache.
      flags:
        --file-format=: Format of the blob (Currently rdb is the only supported format, with other formats expected in the future)
        --files=!:
            description: SAS url for blobs that needs to be imported
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --preferred-data-archive-auth-method=: Preferred auth method to communicate to storage account used for data archive, default value is SAS
        --storage-subscription-id=: SubscriptionId of the storage account
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the Redis cache.
      completion:
        flag:
            preferred-data-archive-auth-method:
                - SAS
                - ManagedIdentity
    - name: list
      description: List Redis Caches.
      flags:
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: list-keys
      description: Retrieve a Redis cache's access keys.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the Redis cache.
    - name: patch-schedule
      commands:
        - name: show
          description: Gets the patching schedule of a redis cache.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
        - name: create
          description: Create patching schedule for Redis cache.
          flags:
            --schedule-entries=!: List of Patch schedule entries.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
        - name: delete
          description: Deletes the patching schedule of a redis cache.
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
        - name: update
          description: Update the patching schedule for Redis cache.
          flags:
            --schedule-entries=!: List of Patch schedule entries.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
    - name: regenerate-keys
      description: Regenerate Redis cache's access keys.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --key-type=!: The Redis access key to regenerate.
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the Redis cache.
      completion:
        flag:
            key-type:
                - Primary
                - Secondary
    - name: server-link
      commands:
        - name: show
          description: Gets the detailed information about a linked server of a redis cache (requires Premium SKU).
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --linked-server-name=!: Name of the linked redis cache
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
        - name: list
          description: Gets the list of linked servers associated with this redis cache (requires Premium SKU).
          flags:
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
        - name: create
          description: Adds a server link to the Redis cache (requires Premium SKU).
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --replication-role=!: Role of the redis cache to be linked
            --server-to-link=!: Resource ID or name of the redis cache to be linked
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
          completion:
            flag:
                replication-role:
                    - Primary
                    - Secondary
        - name: delete
          description: Deletes the linked server from a redis cache (requires Premium SKU).
          flags:
            --linked-server-name=!: Name of the linked redis cache
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: Name of the Redis cache.
    - name: show
      description: Gets a Redis cache (resource description).
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the Redis cache.
    - name: update
      description: Update a Redis cache.
      flags:
        --add=:
            description: Add an object to a list of objects by specifying a path and key value pairs.
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --no-wait=:
            description: Specify as false to wait for result of long running operation
            nargs: -1
        --remove=:
            description: Remove a property or an element from a list.
            nargs: -1
        --set=:
            description: Update an object by specifying a property path and value to set.
            nargs: -1
        --sku=: Type of Redis cache.
        --subscription=: Name or ID of subscription.
        --vm-size=: Size of Redis cache to deploy.
        -g, --resource-group=: Name of resource group.
        -n, --name=: Name of the Redis cache.
      completion:
        flag:
            no-wait:
                - "true"
                - "false"
            sku:
                - Basic
                - Standard
                - Premium
            vm-size:
                - c0
                - c1
                - c2
                - c3
                - c4
                - c5
                - c6
                - p1
                - p2
                - p3
                - p4
                - p5
