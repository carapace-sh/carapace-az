# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: functionapp
description: Manage function apps. To install the Azure Functions Core tools see https://github.com/Azure/azure-functions-core-tools
commands:
    - name: config
      commands:
        - name: set
          description: Set an existing function app's configuration.
          flags:
            --__MAX_REPLICAS=:
                description: ==SUPPRESS==
                nargs: -1
            --__MIN_REPLICAS=:
                description: ==SUPPRESS==
                nargs: -1
            --__WINDOWS_FX_VERSION=:
                description: ==SUPPRESS==
                nargs: -1
            --always-on=:
                description: ensure web app gets loaded all the time, rather unloaded after been idle.
                nargs: -1
            --auto-heal-enabled=:
                description: enable or disable auto heal
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ftps-state=: Set the Ftps state value for an app.
            --generic-configurations=:
                description: Provide site configuration list in a format of either `key=value` pair or `@<json_file>`.
                nargs: -1
            --http20-enabled=:
                description: configures a web site to allow clients to connect over http2.0.
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --java-container-version=: The version of the java container, e.g., '8.0.23' for Tomcat
            --java-container=: The java container, e.g., Tomcat, Jetty
            --java-version=: The version used to run your web app if using Java, e.g., '1.7' for Java 7, '1.8' for Java 8
            --linux-fx-version=: The runtime stack used for your linux-based webapp, e.g., "RUBY|2.5.5", "NODE|12LTS", "PHP|7.2", "DOTNETCORE|2.1".
            --min-tls-version=: The minimum version of TLS required for SSL requests, e.g., '1.0', '1.1', '1.2'
            --net-framework-version=: The version used to run your web app if using .NET Framework, e.g., 'v4.0' for .NET 4.6 and 'v3.0' for .NET 3.5
            --number-of-workers=: The number of workers to be allocated.
            --php-version=: The version used to run your web app if using PHP, e.g., 5.5, 5.6, 7.0
            --powershell-version=: The version used to run your function app if using PowerShell, e.g., 7.2
            --prewarmed-instance-count=: Number of pre-warmed instances a function app has
            --python-version=: The version used to run your web app if using Python, e.g., 2.7, 3.4
            --remote-debugging-enabled=:
                description: enable or disable remote debugging
                nargs: -1
            --startup-file=: The startup file for linux hosted web apps, e.g. 'process.json' for Node.js web
            --subscription=: Name or ID of subscription.
            --use-32bit-worker-process=:
                description: use 32 bits worker process or not
                nargs: -1
            --vnet-route-all-enabled=:
                description: Configure regional VNet integration to route all traffic to the VNet.
                nargs: -1
            --web-sockets-enabled=:
                description: enable or disable web sockets
                nargs: -1
            -g, --resource-group=: Name of resource group.
            -n, --name=: name of the function app
            -s, --slot=: the name of the slot.
          completion:
            flag:
                always-on:
                    - "true"
                    - "false"
                auto-heal-enabled:
                    - "true"
                    - "false"
                ftps-state:
                    - AllAllowed
                    - FtpsOnly
                    - Disabled
                http20-enabled:
                    - "true"
                    - "false"
                remote-debugging-enabled:
                    - "true"
                    - "false"
                use-32bit-worker-process:
                    - "true"
                    - "false"
                vnet-route-all-enabled:
                    - "true"
                    - "false"
                web-sockets-enabled:
                    - "true"
                    - "false"
        - name: container
          commands:
            - name: show
              description: Get details of a function app's container settings.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app
                -s, --slot=: the name of the slot.
            - name: set
              description: Set an existing function app's container settings.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --cpu=: Required CPU in cores from 0.5 to 2.0.
                --dapr-app-id=: The Dapr application identifier.
                --dapr-app-port=: The port Dapr uses to communicate to the application.
                --dapr-enable-api-logging=:
                    description: Enable/Disable API logging for the Dapr sidecar.
                    nargs: -1
                --dapr-http-max-request-size=: Max size of request body http and grpc servers in MB to handle uploading of large files.
                --dapr-http-read-buffer-size=: Max size of http header read buffer in KB to handle when sending multi-KB headers.
                --dapr-log-level=: The log level for the Dapr sidecar
                --enable-dapr=:
                    description: Enable/Disable Dapr for a function app on an Azure Container App environment
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --max-replicas=: The maximum number of replicas when create function app on container app
                --memory=: Required momory from 1.0 to 4.0 ending with Gi e.g. 1.0Gi,
                --min-replicas=: The minimum number of replicas when create function app on container app
                --subscription=: Name or ID of subscription.
                --workload-profile-name=: The name of the workload profile to run the app on.
                -c, --image=: the container custom image name and optionally the tag name (e.g., `<registry-name>/<image-name>:<tag>`)
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app
                -p, --registry-password=: the container registry server password
                -r, --registry-server=: the container registry server url
                -s, --slot=: the name of the slot.
                -u, --registry-username=: the container registry server username
              completion:
                flag:
                    dapr-enable-api-logging:
                        - "true"
                        - "false"
                    dapr-log-level:
                        - debug
                        - error
                        - info
                        - warn
                    enable-dapr:
                        - "true"
                        - "false"
            - name: delete
              description: Delete an existing function app's container settings.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app
                -s, --slot=: the name of the slot.
        - name: appsettings
          commands:
            - name: set
              description: Update a function app's settings.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --settings=:
                    description: space-separated app settings in a format of `<name>=<value>`
                    nargs: -1
                --slot-settings=:
                    description: space-separated slot app settings in a format of `<name>=<value>`
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app
                -s, --slot=: the name of the slot.
            - name: list
              description: Show settings for a function app.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: name of the function app.
                -s, --slot=: the name of the slot.
            - name: delete
              description: Delete a function app's settings.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --setting-names=!:
                    description: space-separated app setting names
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app
                -s, --slot=: the name of the slot.
        - name: ssl
          commands:
            - name: unbind
              description: Unbind an SSL certificate from a function app.
              flags:
                --certificate-thumbprint=!: The ssl cert thumbprint
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --hostname=: The custom domain name.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app
                -s, --slot=: the name of the slot.
            - name: upload
              description: Upload an SSL certificate to a function app.
              flags:
                --certificate-file=!: The filepath for the .pfx file
                --certificate-name=: The name of the certificate.
                --certificate-password=!: The ssl cert password
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app
                -s, --slot=: The name of the slot.
            - name: bind
              description: Bind an SSL certificate to a function app.
              flags:
                --certificate-thumbprint=!: The ssl cert thumbprint
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --hostname=: The custom domain name.
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --ssl-type=!: The ssl cert type
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app
                -s, --slot=: the name of the slot.
              completion:
                flag:
                    ssl-type:
                        - SNI
                        - IP
            - name: import
              description: Import an SSL certificate to a function app from Key Vault.
              flags:
                --certificate-name=: The name of the certificate.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --key-vault-certificate-name=!: The name of the certificate in Key Vault
                --key-vault=!: The name or resource ID of the Key Vault
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app
            - name: create
              description: Create a Managed Certificate for a hostname in a function app.
              flags:
                --certificate-name=: The name of the certificate.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --hostname=!: The custom domain name
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
                -n, --name=!: Name of the web app.
                -s, --slot=: the name of the slot.
            - name: list
              description: List SSL certificates for a function app.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: show
              description: Show the details of an SSL certificate for a function app.
              flags:
                --certificate-name=!: The name of the certificate.
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
            - name: delete
              description: Delete an SSL certificate from a function app.
              flags:
                --certificate-thumbprint=!: The ssl cert thumbprint
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=!: Name of resource group.
        - name: access-restriction
          commands:
            - name: set
              description: Sets if SCM site is using the same restrictions as the main site.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --default-action=: Configure default action for main site
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --scm-default-action=: Configure default action for scm site
                --subscription=: Name or ID of subscription.
                --use-same-restrictions-for-scm-site=:
                    description: Use same access restrictions for scm site
                    nargs: -1
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app.
                -s, --slot=: the name of the slot.
              completion:
                flag:
                    default-action:
                        - Allow
                        - Deny
                    scm-default-action:
                        - Allow
                        - Deny
                    use-same-restrictions-for-scm-site:
                        - "true"
                        - "false"
            - name: show
              description: Show Access Restriction settings for functionapp.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app.
                -s, --slot=: the name of the slot.
            - name: add
              description: Adds an Access Restriction to the function app
              flags:
                --action=: Allow or deny access
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --description=: Description of the access restriction rule
                --http-headers=:
                    description: space-separated http headers in a format of `<name>=<value>`
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --ip-address=: IP address or CIDR range (optional comma separated list of up to 8 ranges)
                --scm-site=:
                    description: True if access restrictions is added for scm site
                    nargs: -1
                --service-tag=: Service Tag (optional comma separated list of up to 8 tags)
                --subnet=: Subnet name (requires vNet name) or subnet resource id
                --subscription=: Name or ID of subscription.
                --vnet-name=: vNet name
                --vnet-resource-group=: Resource group of virtual network (default is web app resource group)
                -g, --resource-group=: Name of resource group.
                -i, --ignore-missing-endpoint=:
                    description: Create access restriction rule with checking if the subnet has Microsoft.Web service endpoint enabled
                    nargs: -1
                -k, --skip-service-tag-validation=:
                    description: Skip validating public service tags
                    nargs: -1
                -n, --name=: name of the function app.
                -p, --priority=!: Priority of the access restriction rule
                -r, --rule-name=: Name of the access restriction rule to add
                -s, --slot=: the name of the slot.
              completion:
                flag:
                    action:
                        - Allow
                        - Deny
                    ignore-missing-endpoint:
                        - "true"
                        - "false"
                    scm-site:
                        - "true"
                        - "false"
                    skip-service-tag-validation:
                        - "true"
                        - "false"
            - name: remove
              description: Removes an Access Restriction from the functionapp.
              flags:
                --action=: Allow or deny access
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --ip-address=: IP address or CIDR range (optional comma separated list of up to 8 ranges)
                --scm-site=:
                    description: True if access restriction should be removed from scm site
                    nargs: -1
                --service-tag=: Service Tag (optional comma separated list of up to 8 tags)
                --subnet=: Subnet name (requires vNet name) or subnet resource id
                --subscription=: Name or ID of subscription.
                --vnet-name=: vNet name
                -g, --resource-group=: Name of resource group.
                -k, --skip-service-tag-validation=:
                    description: Skip validating public service tags
                    nargs: -1
                -n, --name=: name of the function app.
                -r, --rule-name=: Name of the access restriction to remove
                -s, --slot=: the name of the slot.
              completion:
                flag:
                    action:
                        - Allow
                        - Deny
                    scm-site:
                        - "true"
                        - "false"
                    skip-service-tag-validation:
                        - "true"
                        - "false"
        - name: hostname
          commands:
            - name: get-external-ip
              description: Get the external-facing IP address for a function app.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app.
            - name: delete
              description: Unbind a hostname from a function app.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --hostname=: hostname assigned to the site, such as custom domains
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app.
                -s, --slot=: the name of the slot.
            - name: add
              description: Bind a hostname to a function app.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --hostname=: hostname assigned to the site, such as custom domains
                --ids=:
                    description: One or more resource IDs (space-delimited).
                    nargs: -1
                --subscription=: Name or ID of subscription.
                -g, --resource-group=: Name of resource group.
                -n, --name=: name of the function app.
                -s, --slot=: the name of the slot.
            - name: list
              description: List all hostname bindings for a function app.
              flags:
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --subscription=: Name or ID of subscription.
                --webapp-name=!: name of the web app.
                -g, --resource-group=!: Name of resource group.
                -s, --slot=: the name of the slot.
        - name: show
          description: Get the details of an existing function app's configuration.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --ids=:
                description: One or more resource IDs (space-delimited).
                nargs: -1
            --subscription=: Name or ID of subscription.
            -g, --resource-group=: Name of resource group.
            -n, --name=: name of the function app
            -s, --slot=: the name of the slot.
    - name: connection
      commands:
        - name: create
          commands:
            - name: cognitiveservices
              description: Create a functionapp connection to cognitiveservices.
              flags:
                --__APP=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__APPINSIGHTS=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__CLUSTER=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__CONFIG_STORE=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__DATABASE=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__DEPLOYMENT=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__ENABLE_APPCONFIG_EXTENSION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__ENABLE_CSI=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__FABRIC_SQL_DB_UUID=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__FABRIC_WORKSPACE_UUID=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__GRAPH=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__KEY_SPACE=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__NAMESPACE=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__NEW_ADDON=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__PRIVATE_ENDPOINT=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SCOPE=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SECRET_AUTH_INFO=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SERVER=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SERVICE_ENDPOINT=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SIGNALR=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SLOT=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SPRING=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__STORE_IN_CONNECTION_STRING=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__TABLE=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__TARGET_APP_NAME=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__VAULT=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__WEBPUBSUB=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__WORKLOAD_IDENTITY_AUTH_INFO=:
                    description: ==SUPPRESS==
                    nargs: -1
                --account=: Name of the cognitive services account.
                --appconfig-id=: The app configuration id to store configuration
                --client-type=: The client type used on the functionapp
                --cmd=:
                    description: ==SUPPRESS==
                    nargs: -1
                --connection=: Name of the functionapp connection.
                --connstr-props=:
                    description: The additional connection string properties used to build connection string.
                    nargs: -1
                --customized-keys=:
                    description: The customized keys used to change default configuration names.
                    nargs: -1
                --no-wait=: Do not wait for the long-running operation to finish.
                --opt-out=:
                    description: Whether to disable some configuration steps.
                    nargs: -1
                --secret=:
                    description: The secret auth info
                    nargs: -1
                --service-principal=:
                    description: The service principal auth info
                    nargs: -1
                --source-id=: The resource id of a functionapp.
                --subscription=: Name or ID of subscription.
                --system-identity=:
                    description: The system assigned identity auth info
                    nargs: -1
                --target-id=: The resource id of target service.
                --target-resource-group=: The resource group which contains the cognitive services.
                --user-identity=:
                    description: The user assigned identity auth info
                    nargs: -1
                --vault-id=: The id of key vault to store secret value
                -g, --resource-group=: The resource group which contains the function app.
                -n, --name=: Name of the function app.
              completion:
                flag:
                    client-type:
                        - dotnet
                        - python
                        - none
                    opt-out:
                        - publicnetwork
                        - configinfo
                        - auth
            - name: appconfig
              description: Create a functionapp connection to appconfig.
              flags:
                --__ACCOUNT=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__APP=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__APPINSIGHTS=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__CLUSTER=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__DATABASE=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__DEPLOYMENT=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__ENABLE_APPCONFIG_EXTENSION=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__ENABLE_CSI=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__FABRIC_SQL_DB_UUID=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__FABRIC_WORKSPACE_UUID=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__GRAPH=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__KEY_SPACE=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__NAMESPACE=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__NEW_ADDON=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SCOPE=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SECRET_AUTH_INFO=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SERVER=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SERVICE_ENDPOINT=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SIGNALR=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SLOT=:
                    description: ==SUPPRESS==
                    nargs: -1
                --__SPRING=:
                    description: ==SUPPRESS==
