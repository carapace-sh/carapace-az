# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upgrade
description: upgrade
commands:
    - name: upgrade
      flags:
        --all=:
            description: Enable updating extensions as well.
            nargs: -1
        --allow-preview-extensions=:
            description: Include preview packages for extension installation, if exists
            nargs: -1
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        -y, --yes=: Do not prompt for checking release notes.
      completion:
        flag:
            all:
                - "true"
                - "false"
            allow-preview-extensions:
                - "true"
                - "false"
