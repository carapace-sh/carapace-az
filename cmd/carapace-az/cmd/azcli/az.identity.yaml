# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: identity
description: Managed Identities
commands:
    - name: create
      description: Create Identities.
      flags:
        --subscription=: Name or ID of subscription.
        --tags=:
            description: 'space-separated tags: key[=value] [key[=value] ...].'
            nargs: -1
        -g, --resource-group=!: Name of resource group.
        -l, --location=: Location.
        -n, --name=!: The name of the identity resource.
    - name: delete
      description: Deletes the identity.
      flags:
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the identity resource.
    - name: federated-credential
      description: Manage federated identity credentials under user assigned identities.
      commands:
        - name: update
          description: Update a federated identity credential under an existing user assigned identity.
          flags:
            --audiences=:
                description: The aud value in the token sent to Azure for getting the user-assigned managed identity token.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --identity-name=!: The name of the identity resource.
            --issuer=: The openId connect metadata URL of the issuer of the identity provider that Azure AD would use in the token exchange protocol for validating tokens before issuing a token as the user-assigned managed identity.
            --subject=: The sub value in the token sent to Azure AD for getting the user-assigned managed identity token.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the federated identity credential resource.
        - name: list
          description: List all federated identity credentials under an existing user assigned identity.
          flags:
            --identity-name=!: The name of the identity resource.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
        - name: show
          description: Show a federated identity credential under an existing user assigned identity.
          flags:
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --identity-name=!: The name of the identity resource.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the federated identity credential resource.
        - name: create
          description: Create a federated identity credential under an existing user assigned identity.
          flags:
            --audiences=:
                description: The aud value in the token sent to Azure for getting the user-assigned managed identity token.
                nargs: -1
            --cmd=:
                description: ==SUPPRESS==
                nargs: -1
            --identity-name=!: The name of the identity resource.
            --issuer=: The openId connect metadata URL of the issuer of the identity provider that Azure AD would use in the token exchange protocol for validating tokens before issuing a token as the user-assigned managed identity.
            --subject=: The sub value in the token sent to Azure AD for getting the user-assigned managed identity token.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the federated identity credential resource.
        - name: delete
          description: Delete a federated identity credential under an existing user assigned identity.
          flags:
            --identity-name=!: The name of the identity resource.
            --subscription=: Name or ID of subscription.
            -g, --resource-group=!: Name of resource group.
            -n, --name=!: The name of the federated identity credential resource.
            -y, --yes=: Do not prompt for confirmation.
    - name: list
      description: List Managed Identities.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
    - name: list-operations
      description: Lists available operations for the Microsoft.ManagedIdentity provider.
      flags:
        --subscription=: Name or ID of subscription.
    - name: list-resources
      description: List the associated resources for the identity.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the identity resource.
    - name: show
      description: Gets the identity.
      flags:
        --cmd=:
            description: ==SUPPRESS==
            nargs: -1
        --ids=:
            description: One or more resource IDs (space-delimited).
            nargs: -1
        --subscription=: Name or ID of subscription.
        -g, --resource-group=: Name of resource group.
        -n, --name=: The name of the identity resource.
