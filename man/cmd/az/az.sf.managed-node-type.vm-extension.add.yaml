# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add an extension to the node type.
flags:
    --auto-upgrade-minor-version=:
        description: Indicates whether the extension should use a newer minor version if one is available at deployment time.
        nargs: -1
    --extension-name=!: extension name.
    --extension-type=!: Specifies the type of the extension; an example is "CustomScriptExtension".
    --force-update-tag=: If a value is provided and is different from the previous value, the extension handler will be forced to update even if the extension configuration has not changed.
    --protected-setting=: The extension can contain either protectedSettings or protectedSettingsFromKeyVault or no protected settings at all.
    --provision-after-extension=: Collection of extension names after which this extension needs to be provisioned.
    --publisher=!: The name of the extension handler publisher.
    --setting=: Json formatted public settings for the extension.
    --subscription=: Name or ID of subscription.
    --type-handler-version=!: Specifies the version of the script handler.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
    -n, --name=!: node type name.
completion:
    flag:
        auto-upgrade-minor-version:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: |-
            Acquiring an Azure Policy token automatically for this resource operation.

            Default value: True

            Accepted values: false, true
        auto-upgrade-minor-version: Indicates whether the extension should use a newer minor version if one is available at deployment time. Once deployed, however, the extension will not upgrade minor versions unless redeployed, even with this property set to true.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        extension-name: Extension name.
        extension-type: Specifies the type of the extension; an example is "CustomScriptExtension". --name --node-type-name -n Node type name.
        force-update-tag: If a value is provided and is different from the previous value, the extension handler will be forced to update even if the extension configuration has not changed.
        protected-setting: The extension can contain either protectedSettings or protectedSettingsFromKeyVault or no protected settings at all. --provision-after --provision-after-extension Collection of extension names after which this extension needs to be provisioned.
        publisher: The name of the extension handler publisher.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        setting: Json formatted public settings for the extension.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type-handler-version: Specifies the version of the script handler.
examples:
    Add bg extension.: az sf managed-node-type vm-extension add -g testRG -c testCluster -n snt --extension-name csetest --publisher Microsoft.Compute --extension-type BGInfo --type-handler-version 2.1 --auto-upgrade-minor-version
