# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates security automation logic app action.
flags:
    --logic-app-resource-id=!: The triggered Logic App Azure Resource ID.
    --subscription=: Name or ID of subscription.
    --uri=!: The Logic App trigger URI endpoint (it will not be included in any response)
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        logic-app-resource-id: The triggered Logic App Azure Resource ID. This can also reside on other subscriptions, given that you have permissions to trigger the Logic App.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        uri: The Logic App trigger URI endpoint (it will not be included in any response).
examples:
    Creates security automation logic app action.: az security automation-action-logic-app create --logic-app-resource-id '/subscriptions/03b601f1-7eca-4496-8f8d-355219eee254/resourceGroups/sample-rg/providers/Microsoft.Logic/workflows/LA' --uri 'https://ms.portal.azure.com/'
