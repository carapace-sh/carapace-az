# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a DevOps Configuration.
flags:
    --authorization-code=: Sets one-time OAuth code to exchange for refresh and access tokens.
    --auto-discovery=: AutoDiscovery states.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --inventory-list=:
        description: List of top-level inventory to select when AutoDiscovery is disabled.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The security connector name.
completion:
    flag:
        auto-discovery:
            - Disabled
            - Enabled
            - NotApplicable
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        authorization-code: Sets one-time OAuth code to exchange for refresh and access tokens. Optional if connector was created by the same identity.
        auto-discovery: |-
            AutoDiscovery states.

            Accepted values: Disabled, Enabled, NotApplicable
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        inventory-list: List of top-level inventory to select when AutoDiscovery is disabled. This field is ignored when AutoDiscovery is enabled.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Disable AutoDiscovery: az security security-connectors devops update --name myConnector --resource-group myResourceGroup --auto-discovery Disabled
    Disable AutoDiscovery and select only specific organizations: az security security-connectors devops update --name myConnector --resource-group myResourceGroup --auto-discovery Disabled --top-level-inventory-list org1,org2
    Enable AutoDiscovery: az security security-connectors devops update --name myConnector --resource-group myResourceGroup --auto-discovery Enabled
