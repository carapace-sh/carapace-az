# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows a security sub assessment.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --assessed-resource-id=: The target resource for this assessment
    --assessment-name=!: Name of the assessment resource
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
