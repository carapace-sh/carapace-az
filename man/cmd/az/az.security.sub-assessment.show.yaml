# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows a security sub assessment.
flags:
    --assessed-resource-id=: The target resource for this assessment
    --assessment-name=!: Name of the assessment resource
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        assessed-resource-id: The target resource for this assessment.
        assessment-name: Name of the assessment resource.
        name: Name of the resource to be fetched.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a security sub assessment.: az security sub-assessment show --assessed-resource-id '/subscriptions/f8b197db-3b2b-4404-a3a3-0dfec293d0d0/resourceGroups/rg1/providers/Microsoft.Compute/virtualMachines/vm1' --assessment-name '4fb6c0a0-1137-42c7-a1c7-4bd37c91de8d' -n 'd7c4d9ec-227c-4fb3-acf9-25fdd97c1bf1'
