# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show the registration definition details.
flags:
    --definition=!: Guid of the registration definition.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        definition: Guid of the registration definition.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the registration definition given its fully qualified resource id.: az managedservices definition show --definition /subscriptions/39033314-9b39-4c7b-84fd-0e26e55f15dc/providers/Microsoft.ManagedServices/registrationDefinitions/1d693e4f-9e79-433a-b3a2-afce1f8b61ec
    Show the registration definition given its identifier under the default subscription scope.: az managedservices definition show --definition af8772a0-fd9c-4ddc-8ad0-7d4b3913d7dd
