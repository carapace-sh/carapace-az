# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-configuration
description: List source configurations of a webapp connection.
flags:
    --connection=: Name of the webapp connection.
    --id=: The resource id of the connection.
    --slot=: The name of the slot.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group which contains the webapp.
    -n, --name=: Name of the webapp.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        connection: Name of the webapp connection.
        id: The resource id of the connection. ['--resource-group', '--name', '--connection'] are required if '--id' is not specified.
        name: Name of the webapp. Required if '--id' is not specified.None.
        resource-group: The resource group which contains the webapp. Required if '--id' is not specified.None.
        slot: The name of the slot. Default to the production slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List a connection's source configurations by connection id: az webapp connection list-configuration --id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.Web/sites/{site}/providers/Microsoft.ServiceLinker/linkers/{linker}
    List a connection's source configurations by connection name: az webapp connection list-configuration -g WebAppRG -n MyWebApp --connection MyConnection
    List a connection's source configurations interactively: az webapp connection list-configuration
