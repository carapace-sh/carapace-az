# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: export
description: Export data stored in a Redis cache.
flags:
    --container=!: SAS url for container where data needs to be exported to
    --file-format=: Format of the blob (Currently rdb is the only supported format, with other formats expected in the future)
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --preferred-data-archive-auth-method=: Preferred auth method to communicate to storage account used for data archive, default value is SAS
    --prefix=!: Prefix to use for exported files
    --storage-subscription-id=: SubscriptionId of the storage account
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Redis cache.
completion:
    flag:
        preferred-data-archive-auth-method:
            - SAS
            - ManagedIdentity
documentation:
    flag:
        acquire-policy-token: |-
            Acquiring an Azure Policy token automatically for this resource operation.

            Accepted values: ManagedIdentity, SAS
        change-reference: The related change reference ID for this resource operation.
        container: SAS url for container where data needs to be exported to.
        file-format: Format of the blob (Currently rdb is the only supported format, with other formats expected in the future).
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the Redis cache.
        prefix: Prefix to use for exported files.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Use managed identity to export cache data: az redis export -n testCacheName -g testResourceGroup --prefix examplePrefix --container containerUrl  --preferred-data-archive-auth-method ManagedIdentity --storage-subscription-id 1a6574ss-ddad-1111-a111-8d756312d1dd
