# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a service namespace.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --alternate-name=: Alternate name for namespace
    --capacity=: Messaging units for your service bus premium namespace.
    --connections=:
        description: List of private endpoint connections.
        nargs: -1
    --disable-local-auth=:
        description: This property disables SAS authentication for the Service Bus namespace.
        nargs: -1
    --encryption=:
        description: Properties of BYOK Encryption description  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --identity=:
        description: Properties of BYOK Identity description  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --locations=:
        description: A list of regions where replicas of the namespace are maintained.
        nargs: -1
    --max-lag=: The maximum acceptable lag for data replication operations from the primary replica to a quorum of secondary replicas.
    --minimum-tls-version=: The minimum TLS version for the cluster to support, e.g. '1.2'
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --premium-partitions=: The number of partitions of a Service Bus namespace.
    --public-network-access=: This determines if traffic is allowed over public network.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku=: Name of this SKU.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --tier=: The billing tier of this particular SKU.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The namespace name
completion:
    flag:
        disable-local-auth:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        minimum-tls-version:
            - "1.0"
            - "1.1"
            - "1.2"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        public-network-access:
            - Disabled
            - Enabled
            - SecuredByPerimeter
        sku:
            - Basic
            - Premium
            - Standard
        tier:
            - Basic
            - Premium
            - Standard
documentation:
    command: Update a service namespace. Once created, this namespace's resource manifest is immutable. This operation is idempotent.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        alternate-name: Alternate name for namespace.
        capacity: Messaging units for your service bus premium namespace. Valid capacities are {1, 2, 4, 8, 16} multiples of your properties.premiumMessagingPartitions setting. For example, If properties.premiumMessagingPartitions is 1 then possible capacity values are 1, 2, 4, 8, and 16. If properties.premiumMessagingPartitions is 4 then possible capacity values are 4, 8, 16, 32 and 64.
        change-reference: The related change reference ID for this resource operation.
        connections: List of private endpoint connections.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        disable-local-auth: |-
            This property disables SAS authentication for the Service Bus namespace.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        encryption: Properties of BYOK Encryption description  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        identity: Properties of BYOK Identity description  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        locations: A list of regions where replicas of the namespace are maintained.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        max-lag: The maximum acceptable lag for data replication operations from the primary replica to a quorum of secondary replicas.  When the lag exceeds the configured amount, operations on the primary replica will be failed. The allowed values are 0 and 5 minutes to 1 day.
        minimum-tls-version: |-
            The minimum TLS version for the cluster to support, e.g. '1.2'.

            Accepted values: 1.0, 1.1, 1.2
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        premium-partitions: The number of partitions of a Service Bus namespace. This property is only applicable to Premium SKU namespaces. The default value is 1 and possible values are 1, 2 and 4
        public-network-access: |-
            This determines if traffic is allowed over public network. By default it is enabled.

            Accepted values: Disabled, Enabled, SecuredByPerimeter
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        sku: |-
            Name of this SKU.

            Accepted values: Basic, Premium, Standard
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        tier: |-
            The billing tier of this particular SKU.

            Accepted values: Basic, Premium, Standard
examples:
    Updates a Service Bus Namespace: |-
        az servicebus namespace update --resource-group myresourcegroup --name mynamespace --tags tag=value
        az servicebus namespace update --name mynamespace --resource-group myresourcegroup --sku Basic
