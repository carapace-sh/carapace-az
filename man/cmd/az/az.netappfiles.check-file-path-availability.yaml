# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: check-file-path-availability
description: Check if a file path is available.
flags:
    --availability-zone=: The Azure Resource logical availability zone which is used within zone mapping lookup for the subscription and region.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --name=!: File path to verify.
    --subnet-id=!: The Azure Resource URI for a delegated subnet.
    --subscription=: Name or ID of subscription.
    -l, --location=: Location.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        availability-zone: The Azure Resource logical availability zone which is used within zone mapping lookup for the subscription and region. The lookup will retrieve the physical zone where volume is placed.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: File path to verify.
        subnet-id: The Azure Resource URI for a delegated subnet. Must have the delegation Microsoft.NetApp/volumes.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    CheckFilePathAvailability: az netappfiles check-file-path-availability --location eastus --name my-exact-filepth --subnet-id /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myRP/providers/Microsoft.Network/virtualNetworks/testvnet3/subnets/testsubnet3
