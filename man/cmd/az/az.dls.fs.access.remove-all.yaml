# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove-all
description: Remove the access control list for a file or folder.
documentation:
    flag:
        default-acl: A switch that, if specified, indicates that the remove ACL operation should remove the default ACL of the folder. Otherwise the regular ACL is removed.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        path: The path in the specified Data Lake Store account where the action should take place. In the format '/folder/file.txt', where the first '/' after the DNS indicates the root of the file system.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --default-acl=: A switch that, if specified, indicates that the remove ACL operation should remove the default ACL of the folder.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --path=!: The path in the specified Data Lake Store account where the action should take place.
    --subscription=: Name or ID of subscription.
    -n, --account=: Name of the Data Lake Store account.
