# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove a rule from the export policy for a volume by rule index.
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --rule-index=!: Order index
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: The name of the NetApp account
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the volume
    -p, --pool-name=!: The name of the capacity pool
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Remove a rule from the export policy for a volume by rule index. The current rules can be obtained by performing the subgroup list command.
    flag:
        account-name: The name of the NetApp account. --name --volume-name -n -v The name of the volume.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        pool-name: The name of the capacity pool.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule-index: Order index.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Remove an export policy rule from an ANF volume: az netappfiles volume export-policy remove -g mygroup --account-name myaccname --pool-name mypoolname --name myvolname --rule-index 4
