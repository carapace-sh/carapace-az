# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the DNSSEC configuration on a DNS zone.
flags:
    --if-match=: The etag of the DNSSEC configuration.
    --if-none-match=: Set to '*' to allow this DNSSEC configuration to be created, but to prevent updating existing DNSSEC configuration.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -z, --zone-name=!: Name of the DNS zone.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        if-match: The etag of the DNSSEC configuration. Omit this value to always overwrite the DNSSEC configuration. Specify the last-seen etag value to prevent accidentally overwriting any concurrent changes.
        if-none-match: Set to '*' to allow this DNSSEC configuration to be created, but to prevent updating existing DNSSEC configuration. Other values will be ignored.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        zone-name: Name of the DNS zone.
examples:
    Enable DNSSEC on a zone.: az network dns dnssec-config create -g MyResourceGroup -z www.mysite.com
