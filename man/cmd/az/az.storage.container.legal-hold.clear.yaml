# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: clear
description: Clear legal hold tags.
documentation:
    flag:
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT.'
        allow-protected-append-writes-all: When enabled, new blocks can be written to both Append and Block Blobs while maintaining legal hold protection and compliance. Only new blocks can be added and any existing blocks cannot be modified or deleted.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Space-separated tags. Each tag should be 3 to 23 alphanumeric characters and is normalized to lower case
flags:
    --account-name=!: Storage account name.
    --allow-protected-append-writes-all=:
        description: When enabled, new blocks can be written to both Append and Block Blobs while maintaining legal hold protection and compliance.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=!:
        description: Space-separated tags.
        nargs: -1
    -c, --container-name=!: The container name.
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        allow-protected-append-writes-all:
            - "true"
            - "false"
