# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: decrypt
description: Decrypt a single block of encrypted data.
flags:
    --aad=: Optional data that is authenticated but not encrypted.
    --data-type=: The type of the original data.
    --hsm-name=: Name of the HSM.
    --id=: Id of the key.
    --iv=: The initialization vector used during encryption.
    --subscription=: Name or ID of subscription.
    --tag=: The authentication tag generated during encryption.
    --value=!: The value to be decrypted, which should be the result of "az keyvault encrypt"
    --vault-name=: Name of the Vault.
    -a, --algorithm=!: Algorithm identifier
    -n, --name=: Name of the key.
    -v, --version=: The key version.
completion:
    flag:
        algorithm:
            - RSA-OAEP
            - RSA-OAEP-256
            - RSA1_5
            - A128GCM
            - A192GCM
            - A256GCM
            - A128CBC
            - A192CBC
            - A256CBC
            - A128CBCPAD
            - A192CBCPAD
            - A256CBCPAD
        data-type:
            - base64
            - plaintext
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        aad: Optional data that is authenticated but not encrypted. For use with AES-GCM decryption.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        algorithm: |-
            Algorithm identifier.

            Accepted values: A128CBC, A128CBCPAD, A128GCM, A192CBC, A192CBCPAD, A192GCM, A256CBC, A256CBCPAD, A256GCM, RSA-OAEP, RSA-OAEP-256, RSA1_5
        change-reference: The related change reference ID for this resource operation.
        data-type: |-
            The type of the original data.

            Default value: base64

            Accepted values: base64, plaintext
        hsm-name: Name of the HSM. (--hsm-name and --vault-name are mutually exclusive, please specify just one of them).
        id: Id of the key. If specified all other 'Id' arguments should be omitted.
        iv: The initialization vector used during encryption. Required for AES decryption.
        name: Name of the key. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tag: The authentication tag generated during encryption. Required for only AES-GCM decryption.
        value: The value to be decrypted, which should be the result of "az keyvault encrypt".
        vault-name: Name of the Vault.
        version: The key version. If omitted, uses the latest version.
examples:
    Decrypt value(Base64 encoded string returned by encrypt command) with MHSM's key using AES-GCM and get result as plaintext.: |-
        az keyvault key decrypt --name mykey --hsm-name myhsm --algorithm A256GCM --value "N5w02jS77xg536Ddzv/xPWQ=" --data-type plaintext
        --aad "101112131415161718191a1b1c1d1e1f" --iv "727b26f78e55cf4cd8d34216" --tag "f7207d02cead35a77a1c7e5f8af959e9"
    ? Decrypt value(Base64 encoded string returned by encrypt command) with vault's key using RSA-OAEP and get result as base64 encoded.
    : az keyvault key decrypt --name mykey --vault-name myvault --algorithm RSA-OAEP --data-type base64 --value ""
