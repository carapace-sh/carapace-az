# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upsert_scope
description: Update an alerts suppression rule with scope element.
flags:
    --any-of=: A list of strings to scope the suppression rule by.
    --contains-substring=: The string to scope the suppression rule by.
    --field=!: Entity name.
    --rule-name=!: The unique name of the alerts suppression rule.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        any-of: A list of strings to scope the suppression rule by.
        change-reference: The related change reference ID for this resource operation.
        contains-substring: The string to scope the suppression rule by.
        field: Entity name.
        rule-name: The unique name of the alerts suppression rule.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add "entities.host.dnsdomain" scope to an alerts suppression rule.: az security alerts-suppression-rule upsert_scope --field "entities.process.commandline" --contains-substring "example" --rule-name RuleName
