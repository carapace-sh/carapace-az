# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: decompile
description: Attempt to decompile an ARM template file to a Bicep file.
flags:
    --force=: Allows overwriting the output file if it exists.
    --subscription=: Name or ID of subscription.
    -f, --file=!: The path to the ARM template to decompile in the file system.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        file: The path to the ARM template to decompile in the file system.
        force: Allows overwriting the output file if it exists.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Decompile an ARM template file and overwrite existing Bicep file.: az bicep decompile --file {json_template_file} --force
    Decompile an ARM template file.: az bicep decompile --file {json_template_file}
