# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a server.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        enable-public-network: Set whether public network access to server is allowed or not. When false,only connections made through Private Links can reach this server.
        identity-type: Type of Identity to be used. Possible values are SystemAsssigned,UserAssigned, SystemAssigned,UserAssigned and None.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the Azure SQL Server. You can configure the default using `az configure --defaults sql-server=<name>`
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        restrict-outbound-network-access: Set whether outbound network access to server is restricted or not. When true,the outbound connections from the server will be restricted.
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --federated-client-id=: The federated client id used in cross tenant CMK scenario.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --minimal-tls-version=: The minimal TLS version enforced by the sql server for inbound connections.
    --no-wait=: Do not wait for the long-running operation to finish.
    --primary-user-assigned-identity-id=: The ID of the primary user managed identity.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -a, --user-assigned-identity-id=:
        description: Generate and assign an User Managed Identity(UMI) for this server.
        nargs: -1
    -e, --enable-public-network=:
        description: Set whether public network access to server is allowed or not.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -i, --assign_identity=: Generate and assign an Azure Active Directory Identity for this server for use with key management services like Azure KeyVault.
    -k, --key-id=: The key vault URI for encryption.
    -n, --name=: Name of the Azure SQL Server.
    -p, --admin-password=: The administrator login password.
    -r, --restrict-outbound-network-access=:
        description: Set whether outbound network access to server is restricted or not.
        nargs: -1
    -t, --identity-type=: Type of Identity to be used.
completion:
    flag:
        enable-public-network:
            - "true"
            - "false"
        identity-type:
            - SystemAssigned
            - UserAssigned
            - SystemAssigned,UserAssigned
            - None
        minimal-tls-version:
            - "1.0"
            - "1.1"
            - "1.2"
            - "1.3"
        restrict-outbound-network-access:
            - "true"
            - "false"
