# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: keyvault
description: Preview the expected configurations of local connection to keyvault.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --client-type=: The client type used on the connection
    --service-principal=:
        description: The service principal auth info
        nargs: -1
    --subscription=: Name or ID of subscription.
    --user-account=:
        description: The local user account auth info
        nargs: -1
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - springBoot
            - none
