# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore-azurewl
description: Restore backed up Azure Workloads in a Recovery services vault to another registered container or to the same container.
flags:
    --recovery-config=!: Specify the recovery configuration of a backed up item.
    --rehydration-duration=: Set the maximum time, in days (between 10-30, both inclusive) for which the recovery point stays in hydrated state.
    --rehydration-priority=: The type of priority to be maintained while rehydrating a recovery point
    --subscription=: Name or ID of subscription.
    --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
    --use-secondary-region=: Use this flag to restore from a recoverypoint in secondary region.
    -g, --resource-group=!: Name of resource group.
    -v, --vault-name=!: Name of the Recovery services vault.
completion:
    flag:
        rehydration-priority:
            - Standard
            - High
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        recovery-config: Specify the recovery configuration of a backed up item. The configuration object can be obtained from 'backup recoveryconfig show' command.
        rehydration-duration: |-
            Set the maximum time, in days (between 10-30, both inclusive) for which the recovery point stays in hydrated state.

            Default value: 15
        rehydration-priority: |-
            The type of priority to be maintained while rehydrating a recovery point.

            Accepted values: High, Standard
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tenant-id: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
        use-secondary-region: Use this flag to restore from a recoverypoint in secondary region.
        vault-name: Name of the Recovery services vault.
examples:
    Restore backed up Azure Workloads in a Recovery services vault to another registered container or to the same container.: az backup restore restore-azurewl --resource-group MyResourceGroup --vault-name MyVault --recovery-config MyRecoveryConfig
