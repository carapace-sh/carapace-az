# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates an ipv6 firewall rule.
flags:
    --end-ipv6-address=: The end IPv6 address of the firewall rule.
    --start-ipv6-address=: The start IPv6 address of the firewall rule.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the IPv6 firewall rule.
    -s, --server=!: Name of the Azure SQL Server.
documentation:
    command: Create an ipv6 firewall rule.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        end-ipv6-address: The end IPv6 address of the firewall rule. Must be IPv6 format.
        name: The name of the IPv6 firewall rule.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        start-ipv6-address: The start IPv6 address of the firewall rule. Must be IPv6 format.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create an ipv6 firewall rule: az sql server ipv6-firewall-rule create -g mygroup -s myserver -n myrule --start-ipv6-address 9a41:a145:2a80:6c8d:4628:a1b3:5812:3283 --end-ipv6-address 9a41:a145:2a80:6c8d:4628:a1b3:5812:3283
