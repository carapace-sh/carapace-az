# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-deleted
description: Show properties of a deleted, but not yet purged App Configuration store.
flags:
    --subscription=: Name or ID of subscription.
    -l, --location=: Location of the deleted App Configuration store.
    -n, --name=!: Name of the App Configuration store.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: Location of the deleted App Configuration store.
        name: Name of the App Configuration store. You can configure the default name using ``` az configure --defaults app_configuration_store=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show properties of a deleted App Configuration store named 'sample-app-configuration'.: az appconfig show-deleted --name sample-app-configuration
