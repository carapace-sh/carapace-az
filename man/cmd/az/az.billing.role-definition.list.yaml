# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the role definitions for a billing account.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --invoice-section-name=: The ID that uniquely identifies an invoice section.
    --profile-name=: The ID that uniquely identifies a billing profile.
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        Command group 'billing role-definition' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        invoice-section-name: The ID that uniquely identifies an invoice section.
        profile-name: The ID that uniquely identifies a billing profile.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List the role definitions for a billing profile.: az billing role-definition list --account-name "{billingAccountName}" --profile-name "{billingProfileName}"
    List the role definitions for an invoice section.: az billing role-definition list --account-name "{billingAccountName}" --profile-name "{billingProfileName}" --invoice-section-name "{invoiceSectionName}"
    Lists the role definitions for a billing account: az billing role-definition list --account-name "{billingAccountName}"
