# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an existing Azure Cosmos DB Sql Role Definition
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Cosmosdb account name.
    -b, --body=!: Role Definition body with Id (Optional for create), DataActions or Permissions, Type (Default is CustomRole), and AssignableScopes.
    -g, --resource-group=!: Name of resource group.
documentation:
    command: Update a SQL role definition under an Azure Cosmos DB account.
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        body: |
            Role Definition body with Id (Optional for create), DataActions or Permissions, Type (Default is CustomRole), and AssignableScopes.  You can enter it as a string or as a file, e.g., --body @rdbody-file.json or --body "{ \"Id\": \"be79875a-2cc4-40d5-8958-566017875b39\", \"RoleName\": \"My Read Write Role\", \"Type\": \"CustomRole\", \"AssignableScopes\": [ \"/\" ], \"DataActions\": [ \"Microsoft.DocumentDB/databaseAccounts/sqlDatabases/containers/items/create\", \"Microsoft.DocumentDB/databaseAccounts/sqlDatabases/containers/items/read\" ]}"
        change-reference: The related change reference ID for this resource operation.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a SQL role definition under an Azure Cosmos DB account.: az cosmosdb sql role definition update --account-name MyAccount --resource-group MyResourceGroup --body @role-definition.json
