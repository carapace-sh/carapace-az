# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add an API permission
flags:
    --api-permissions=!:
        description: Space-separated list of {id}={type}.
        nargs: -1
    --api=!: requiredResourceAccess.resourceAppId - The unique identifier for the resource that the application requires access to.
    --id=!: identifier uri, application id, or object id
documentation:
    command: Add an API permission.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api: requiredResourceAccess.resourceAppId - The unique identifier for the resource that the application requires access to. This should be equal to the appId declared on the target resource application.
        api-permissions: 'Space-separated list of {id}={type}. {id} is resourceAccess.id - The unique identifier for one of the oauth2PermissionScopes or appRole instances that the resource application exposes. {type} is resourceAccess.type - Specifies whether the id property references an oauth2PermissionScopes or an appRole. The possible values are: Scope (for OAuth 2.0 permission scopes) or Role (for app roles).'
        change-reference: The related change reference ID for this resource operation.
        id: Identifier uri, application id, or object id.
examples:
    Add Microsoft Graph application permission Application.ReadWrite.All: az ad app permission add --id {appId} --api 00000003-0000-0000-c000-000000000000 --api-permissions 1bfefb4e-e0b5-418b-a88f-73c46d2cc8e9=Role
    Add Microsoft Graph delegated permission User.Read: az ad app permission add --id {appId} --api 00000003-0000-0000-c000-000000000000 --api-permissions e1fe6dd8-ba31-4d61-89e7-88639da4683d=Scope
