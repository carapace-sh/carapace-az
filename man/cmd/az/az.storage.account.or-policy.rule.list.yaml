# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all the rules in the specified Object Replication Service Policy.
documentation:
    flag:
        policy-id: The ID of object replication policy or "default" if the policy ID is unknown. Policy Id will be auto-generated when setting on destination account. Required when setting on source account.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --policy-id=!: The ID of object replication policy or "default" if the policy ID is unknown.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
