# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: generate-sas
description: Generate a shared access signature for the storage account.
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY'
        blob-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with `az storage account show`. Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT'
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING'
        https-only: Only permit requests made with the HTTPS protocol. If omitted, requests from both the HTTP and HTTPS protocol are permitted.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        ip: Specifies the IP address or range of IP addresses from which to accept requests. Supports only IPv4 style addresses.
        permissions: 'The permissions the SAS grants. Allowed values: (a)dd (c)reate (d)elete (f)ilter_by_tags (i)set_immutability_policy (l)ist (p)rocess (r)ead (t)ag (u)pdate (w)rite (x)delete_previous_version (y)permanent_delete. Can be combined.'
        resource-types: 'The resource types the SAS is applicable for. Allowed values: (s)ervice (c)ontainer (o)bject. Can be combined.'
        services: 'The storage services the SAS is applicable for. Allowed values: (b)lob (f)ile (q)ueue (t)able. Can be combined.'
        start: Specifies the UTC datetime (Y-m-d'T'H:M'Z') at which the SAS becomes valid. Defaults to the time of the request.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-key=: Storage account key.
    --account-name=: The storage account name.
    --blob-endpoint=: Storage data service endpoint.
    --connection-string=: Storage account connection string.
    --encryption-scope=: A predefined encryption scope used to encrypt the data on the service.
    --expiry=!: Specifies the UTC datetime (Y-m-d'T'H:M'Z') at which the SAS becomes invalid.
    --https-only=: Only permit requests made with the HTTPS protocol.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ip=: Specifies the IP address or range of IP addresses from which to accept requests.
    --permissions=!: The permissions the SAS grants.
    --resource-types=!: The resource types the SAS is applicable for.
    --services=!: The storage services the SAS is applicable for.
    --start=: Specifies the UTC datetime (Y-m-d'T'H:M'Z') at which the SAS becomes valid.
    --subscription=: Name or ID of subscription.
