# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates an Azure Cosmos DB Mongo Role Definition
flags:
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Cosmosdb account name.
    -b, --body=!: Role Definition body with Id (Optional for create), Type (Default is CustomRole), DatabaseName, Privileges, Roles.
    -g, --resource-group=!: Name of resource group.
documentation:
    command: Create a Mongo DB role definition under an Azure Cosmos DB account.
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        body: |
            Role Definition body with Id (Optional for create), Type (Default is CustomRole), DatabaseName, Privileges, Roles.  You can enter it as a string or as a file, e.g., --body @mongo-role_definition-body-file.json or --body "{\"Id\": \"be79875a-2cc4-40d5-8958-566017875b39\",\"RoleName\": \"MyRWRole\",\"Type\": \"CustomRole\"\"DatabaseName\": \"MyDb\",\"Privileges\": [ {\"Resource\": {\"Db\": \"MyDB\",\"Collection\": \"MyCol\"},\"Actions\": [\"insert\",\"find\"]}],\"Roles\": [ {\"Role\": \"myInheritedRole\",\"Db\": \"MyTestDb\"}]}"
        change-reference: The related change reference ID for this resource operation.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a Mongo DB role definition under an Azure Cosmos DB account using a JSON file.: az cosmosdb mongodb role definition create --account-name MyAccount --resource-group MyResourceGroup --body @mongo-role-definition.json
    Create a Mongo DB role definition under an Azure Cosmos DB account using a JSON string.: |-
        az cosmosdb mongodb role definition create --account-name MyAccount --resource-group MyResourceGroup --body '{
          "Id": "MyDB.My_Read_Only_Role",
          "RoleName": "My_Read_Only_Role",
          "Type": "CustomRole",
          "DatabaseName": "MyDB",
          "Privileges": [{
            "Resource": {
                "Db": "MyDB",
                "Collection": "MyCol"
              },
              "Actions": [
                "insert",
                "find"
              ]
          }],
          "Roles": [
            {
              "Role": "myInheritedRole",
              "Db": "MyTestDb"
            }
          ]
        }'
