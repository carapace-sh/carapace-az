# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all attestations for a resource.
flags:
    --filter=: OData filter expression.
    --resource-id=: Resource ID.
    --subscription=: Name or ID of subscription.
    --top=: Maximum number of records to return.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        filter: OData filter expression. --resource --resource-id Resource ID.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        top: Maximum number of records to return.
examples:
    List all attestations that has the policy assignment id of myPolicyAssignment: az policy attestation list --filter "PolicyAssignmentId eq '/subscriptions/35ee058e-5fa0-414c-8145-3ebb8d09b6e2/providers/microsoft.authorization/policyassignments/b101830944f246d8a14088c5'"
    List all policy attestations at subscription scope: az policy attestation list
    List the top two policy attestations at resource group scope: az policy attestation list -g myRg --top 2
