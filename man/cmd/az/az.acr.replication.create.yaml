# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a replicated region for an Azure Container Registry.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        name: The name of the replication. Default to the location name.
        region-endpoint-enabled: 'Allow routing to this replication. Requests will not be routed to a disabled replication. Data syncing will continue regardless of the region endpoint status. Default: true.'
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        zone-redundancy: Indicates whether or not zone redundancy should be enabled for this registry or replication. For more information, such as supported locations, please visit https://aka.ms/acr/az. Zone-redundancy cannot be updated. Defaults to 'Disabled'.
flags:
    --region-endpoint-enabled=:
        description: Allow routing to this replication.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --zone-redundancy=: Indicates whether or not zone redundancy should be enabled for this registry or replication.
    -g, --resource-group=: Name of resource group.
    -l, --location=!: Location.
    -n, --name=: The name of the replication.
    -r, --registry=!: The name of the container registry.
completion:
    flag:
        region-endpoint-enabled:
            - "true"
            - "false"
        zone-redundancy:
            - Enabled
            - Disabled
