# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes the workspace settings in your subscription - this will make the security events on the subscription be reported to the default workspace
flags:
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
documentation:
    command: Deletes the workspace settings in your subscription - this will make the security events on the subscription be reported to the default workspace.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the resource to be fetched.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    ? Deletes the workspace settings in your subscription - this will make the security events on the subscription be reported to the default workspace
    : az security workspace-setting delete -n default
