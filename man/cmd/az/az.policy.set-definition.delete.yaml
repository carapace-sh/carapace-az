# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a policy set definition.
flags:
    --management-group=: The name of the management group of the policy [set] definition.
    --subscription=: The subscription id of the policy [set] definition.
    -n, --name=!: The policy set definition name.
documentation:
    command: Breaking change
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        management-group: The name of the management group of the policy [set] definition. This parameter is required if your policy set is scoped to a management group.
        name: The name of the policy set definition.
examples:
    Delete a policy set definition: az policy set-definition delete --management-group myMg --name MyPolicySetDefinition
