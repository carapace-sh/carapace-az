# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List Azure Managed Cassandra Clusters by resource group and subscription.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    command: List the Managed Cassandra Clusters in a ResourceGroup and Subscription. If the ResourceGroup is not specified all the clusters in this Subscription are returned.
    flag:
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all Managed Cassandra Clusters in a given Subscription and ResourceGroup.: az managed-cassandra cluster list --resource-group MyResourceGroup
    List all Managed Cassandra Clusters in a given Subscription.: az managed-cassandra cluster list
