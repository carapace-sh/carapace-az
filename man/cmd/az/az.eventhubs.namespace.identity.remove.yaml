# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove System or User or System,User assigned identities from a namespace
flags:
    --namespace-name=!: Name of the Namespace
    --subscription=: Name or ID of subscription.
    --system-assigned=:
        description: System Assigned Identity
        nargs: -1
    --user-assigned=:
        description: User Assigned Identity
        nargs: -1
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        system-assigned:
            - "true"
            - "false"
documentation:
    command: Remove System or User or System,User assigned identities from a namespace.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        namespace-name: Name of the Namespace.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-assigned: |-
            System Assigned Identity.

            Accepted values: false, true
        user-assigned: User Assigned Identity.
examples:
    Remove system assigned and a user assigned identity from a namespace. (give a list of identity id's for --user-assigned): az eventhubs namespace identity remove --namespace-name mynamespace -g MyResourceGroup --system-assigned --user-assigned /subscriptions/{subscriptionId}}/resourceGroups/{resourcegroup}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/MSIName
