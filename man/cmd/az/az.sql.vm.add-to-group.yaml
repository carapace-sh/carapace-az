# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add-to-group
description: Adds a SQL virtual machine to a group.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -b, --bootstrap-acc-pwd=: Password for the cluster bootstrap account if provided in the SQL virtual machine group.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the SQL virtual machine.
    -p, --operator-acc-pwd=: Password for the cluster operator account provided in the SQL virtual machine group.
    -r, --sqlvm-group=!: Name or resource ID of the SQL virtual machine group.
    -s, --service-acc-pwd=: Password for the SQL service account provided in the SQL virtual machine group.
documentation:
    command: Adds SQL virtual machine to a SQL virtual machine group.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        bootstrap-acc-pwd: Password for the cluster bootstrap account if provided in the SQL virtual machine group.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the SQL virtual machine.
        operator-acc-pwd: Password for the cluster operator account provided in the SQL virtual machine group.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-acc-pwd: Password for the SQL service account provided in the SQL virtual machine group.
        sqlvm-group: Name or resource ID of the SQL virtual machine group. If only name provided, SQL virtual machine group should be in the same resource group of the SQL virtual machine.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add SQL virtual machine to a group.: az sql vm add-to-group -n sqlvm -g myresourcegroup --sqlvm-group sqlvmgroup --bootstrap-acc-pwd {bootstrappassword} --operator-acc-pwd {operatorpassword} --service-acc-pwd {servicepassword}
