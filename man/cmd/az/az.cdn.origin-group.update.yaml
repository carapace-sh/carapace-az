# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a new origin group within the specified endpoint.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        formatted-origins: The source of the content being delivered via CDN within given origin group.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        health-probe-settings: Health probe settings to the origin that is used to determine the health of the origin.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        response-based-origin-error-detection-settings: The JSON object that contains the properties to determine origin health using real requests/responses. This property is currently not supported.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        traffic-restoration-time-to-healed-or-new-endpoints-in-minutes: Time in minutes to shift the traffic to the endpoint gradually when an unhealthy endpoint comes healthy or a new endpoint is added. Default is 10 mins. This property is currently not supported.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --endpoint-name=: Name of the endpoint under the profile which is unique globally.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --formatted-origins=:
        description: The source of the content being delivered via CDN within given origin group.
        nargs: -1
    --health-probe-settings=:
        description: Health probe settings to the origin that is used to determine the health of the origin.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --origins=: The origins load balanced by this origin group, as a comma-separated list of origin names or origin resource IDs.
    --probe-interval=: The frequency to perform health probes in seconds.
    --probe-method=: The request method to use for health probes.
    --probe-path=: The path relative to the origin that is used to determine the health of the origin.
    --probe-protocol=: The protocol to use for health probes.
    --profile-name=: Name of the CDN profile which is unique within the resource group.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --response-based-origin-error-detection-settings=:
        description: The JSON object that contains the properties to determine origin health using real requests/responses.
        nargs: -1
    --response-error-detection-error-types=: The list of Http status code ranges that are considered as server errors for origin and it is marked as unhealthy.
    --response-error-detection-failover-threshold=: The percentage of failed requests in the sample where failover should trigger.
    --response-error-detection-status-code-ranges=: Type of response errors for real user requests for which origin will be deemed unhealthy
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --traffic-restoration-time-to-healed-or-new-endpoints-in-minutes=: Time in minutes to shift the traffic to the endpoint gradually when an unhealthy endpoint comes healthy or a new endpoint is added.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the origin group which is unique within the endpoint.
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
