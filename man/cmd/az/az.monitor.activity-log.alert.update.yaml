# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a new activity log alert or update an existing one.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        all-of: The list of Activity Log Alert rule conditions.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        condition: |-
            The condition that will cause the alert rule to activate. The format is FIELD=VALUE[ and FIELD=VALUE...]
                    The possible values for the field are 'resourceId', 'category', 'caller',
                    'level', 'operationName', 'resourceGroup', 'resourceProvider', 'status',
                    'subStatus', 'resourceType', or anything beginning with 'properties'.
                      Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        enabled: Indicates whether this Activity Log Alert rule is enabled. If an Activity Log Alert rule is not enabled, then none of its actions will be activated.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: The tags of the resource.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --all-of=:
        description: The list of Activity Log Alert rule conditions.
        nargs: -1
    --description=: A description of this Activity Log Alert rule.
    --enabled=:
        description: Indicates whether this Activity Log Alert rule is enabled.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: The tags of the resource.
        nargs: -1
    -c, --condition=:
        description: The condition that will cause the alert rule to activate.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the activity log alert.
completion:
    flag:
        enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
