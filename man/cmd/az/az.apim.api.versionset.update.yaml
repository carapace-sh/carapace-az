# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates the details of the Api VersionSet specified by its identifier.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --description=: Description of API Version Set.
    --display-name=: Required.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --if-match=: ETag of the Entity.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --version-header-name=: Name of HTTP header parameter that indicates the API Version if versioningScheme is set to `header`.
    --version-query-name=: Name of query parameter that indicates the API Version if versioningScheme is set to `query`.
    --version-set-id=!: A resource identifier for the related ApiVersionSet.
    --versioning-scheme=: Required.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        change-reference: The related change reference ID for this resource operation.
        description: Description of API Version Set.
        display-name: Required. Name of API Version Set.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        if-match: ETag of the Entity.
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        version-header-name: Name of HTTP header parameter that indicates the API Version if versioningScheme is set to ``` header ``` .
        version-query-name: Name of query parameter that indicates the API Version if versioningScheme is set to ``` query ``` .
        version-set-id: A resource identifier for the related ApiVersionSet.
        versioning-scheme: 'Required. An value that determines where the API Version identifer will be located in a HTTP request. Possible values include: ''Segment'', ''Query'', ''Header''.'
examples:
    Updates the description, display-name of the Api VersionSet specified by its identifier.: az apim api versionset update --resource-group MyResourceGroup --service-name MyServiceName --version-set-id MyVersionSetId --display-name MyNewDisplayName --description MyNewDescription
    Updates the version schema of the Api VersionSet specified by its identifier.: az apim api versionset update --resource-group MyResourceGroup --service-name MyServiceName --version-set-id MyVersionSetId --versioning-scheme "Query" --version-query-name MyNewQueryName
