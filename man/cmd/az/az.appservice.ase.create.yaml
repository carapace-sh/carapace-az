# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create app service environment.
documentation:
    flag:
        force-network-security-group: Override network security group for subnet. Applies to ASEv2 only.
        force-route-table: Override route table for subnet. Applies to ASEv2 only.
        front-end-scale-factor: Scale of front ends to app service plan instance ratio. Applies to ASEv2 only.
        front-end-sku: Size of front end servers. Applies to ASEv2 only.
        ignore-network-security-group: Configure network security group manually. Applies to ASEv2 only.
        ignore-route-table: Configure route table manually. Applies to ASEv2 only.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        os-preference: Determine if app service environment should start with Linux workers. Applies to ASEv2 only.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subnet: Name or ID of existing subnet. To create vnet and/or subnet                    use `az network vnet [subnet] create`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vnet-name: Name of the vNet. Mandatory if only subnet name is specified.
        zone-redundant: Configure App Service Environment as Zone Redundant. Applies to ASEv3 only.
flags:
    --force-network-security-group=:
        description: Override network security group for subnet.
        nargs: -1
    --force-route-table=:
        description: Override route table for subnet.
        nargs: -1
    --front-end-scale-factor=: Scale of front ends to app service plan instance ratio.
    --front-end-sku=: Size of front end servers.
    --ignore-network-security-group=:
        description: Configure network security group manually.
        nargs: -1
    --ignore-route-table=:
        description: Configure route table manually.
        nargs: -1
    --ignore-subnet-size-validation=:
        description: Do not check if subnet is sized according to recommendations.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --os-preference=: Determine if app service environment should start with Linux workers.
    --subnet=!: Name or ID of existing subnet.
    --subscription=: Name or ID of subscription.
    --virtual-ip-type=: Specify if app service environment should be accessible from internet
    --vnet-name=: Name of the vNet.
    --zone-redundant=:
        description: Configure App Service Environment as Zone Redundant.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -k, --kind=: Specify App Service Environment version
    -l, --location=: Location.
    -n, --name=!: Name of the app service environment
completion:
    flag:
        force-network-security-group:
            - "true"
            - "false"
        force-route-table:
            - "true"
            - "false"
        front-end-sku:
            - I1
            - I2
            - I3
        ignore-network-security-group:
            - "true"
            - "false"
        ignore-route-table:
            - "true"
            - "false"
        ignore-subnet-size-validation:
            - "true"
            - "false"
        kind:
            - ASEv2
            - ASEv3
        os-preference:
            - Windows
            - Linux
        virtual-ip-type:
            - Internal
            - External
        zone-redundant:
            - "true"
            - "false"
