# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a managed certificate.
flags:
    --hostname=!: The custom domain name.
    --subscription=: Name or ID of subscription.
    -c, --certificate-name=: Name of the managed certificate which should be unique within the Container Apps environment.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the Container Apps environment.
    -v, --validation-method=!: Validation method of custom domain ownership.
completion:
    flag:
        validation-method:
            - HTTP
            - CNAME
            - TXT
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        certificate-name: Name of the managed certificate which should be unique within the Container Apps environment.
        change-reference: The related change reference ID for this resource operation.
        hostname: The custom domain name.
        name: Name of the Container Apps environment.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        validation-method: |-
            Validation method of custom domain ownership.

            Accepted values: CNAME, HTTP, TXT
examples:
    Create a managed certificate.: az containerapp env certificate create -g MyResourceGroup --name MyEnvironment --certificate-name MyCertificate --hostname MyHostname --validation-method CNAME
