# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Manage MACsec configuration of an ExpressRoute Link.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --admin-state=:
        description: Enable/Disable administrative state of an ExpressRoute Link.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=: Resource ID.
    --macsec-cak-secret-identifier=: The connectivity association key (CAK) ID that stored in the KeyVault.
    --macsec-cipher=: Cipher Method.
    --macsec-ckn-secret-identifier=: The connectivity key name (CKN) that stored in the KeyVault.
    --macsec-sci-state=: Sci mode.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --port-name=!: ExpressRoute port name.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The link name of the ExpressRoute Port.
completion:
    flag:
        admin-state:
            - Disabled
            - Enabled
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        macsec-cipher:
            - GcmAes128
            - GcmAes256
            - GcmAesXpn128
            - GcmAesXpn256
        macsec-sci-state:
            - Disabled
            - Enabled
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        admin-state: |-
            Enable/Disable administrative state of an ExpressRoute Link.

            Accepted values: Disabled, Enabled
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: Resource ID.
        macsec-cak-secret-identifier: The connectivity association key (CAK) ID that stored in the KeyVault.
        macsec-cipher: |-
            Cipher Method.

            Accepted values: GcmAes128, GcmAes256, GcmAesXpn128, GcmAesXpn256
        macsec-ckn-secret-identifier: The connectivity key name (CKN) that stored in the KeyVault.
        macsec-sci-state: |-
            Sci mode.

            Accepted values: Disabled, Enabled
        name: The link name of the ExpressRoute Port.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        port-name: ExpressRoute port name.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Enable MACsec on ExpressRoute Direct Ports once at a time.: az network express-route port link update --resource-group MyResourceGroup --port-name MyExpressRoutePort --name link1 --macsec-ckn-secret-identifier MacSecCKNSecretID --macsec-cak-secret-identifier MacSecCAKSecretID --macsec-cipher GcmAes128
    Enable administrative state of an ExpressRoute Link.: az network express-route port link update --resource-group MyResourceGroup --port-name MyExpressRoutePort --name link2 --admin-state Enabled
