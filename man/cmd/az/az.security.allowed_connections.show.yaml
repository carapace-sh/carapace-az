# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: List all possible traffic between resources for the subscription and location, based on connection type.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        name: Name of the resource to be fetched.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get all possible traffic between resources for the subscription and location, based on connection type.: az security allowed_connections show --name Internal --resource-group mygroup
