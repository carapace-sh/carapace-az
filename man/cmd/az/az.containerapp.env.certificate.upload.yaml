# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upload
description: Add or update a certificate.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --show-prompt=: Show prompt to upload an existing certificate.
    --subscription=: Name or ID of subscription.
    -c, --certificate-name=: Name of the certificate which should be unique within the Container Apps environment.
    -f, --certificate-file=!: The filepath of the .pfx or .pem file
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location of resource.
    -n, --name=: Name of the Container Apps environment.
    -p, --password=: The certificate file password
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        certificate-file: The filepath of the .pfx or .pem file.
        certificate-name: Name of the certificate which should be unique within the Container Apps environment.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location of resource. Examples: eastus2, northeurope.'
        name: Name of the Container Apps environment.
        password: The certificate file password.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        show-prompt: |-
            Show prompt to upload an existing certificate.

            Default value: False
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add or update a certificate from azure key vault using managed identity.: az containerapp env certificate upload -g MyResourceGroup --name MyEnvironment --akv-url akvSecretUrl --identity system
    Add or update a certificate with a user-provided certificate name.: az containerapp env certificate upload -g MyResourceGroup --name MyEnvironment --certificate-file MyFilepath --certificate-name MyCertificateName
    Add or update a certificate.: az containerapp env certificate upload -g MyResourceGroup --name MyEnvironment --certificate-file MyFilepath
