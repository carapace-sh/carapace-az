# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new firewall rule for a flexible server.
documentation:
    flag:
        end-ip-address: 'The end IP address of the firewall rule. Must be IPv4 format. Use value ''0.0.0.0'' to represent all Azure-internal IP addresses. '
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        rule-name: 'The name of the firewall rule. If name is omitted, default name will be chosen for firewall name. The firewall rule name can only contain 0-9, a-z, A-Z, ''-'' and ''_''. Additionally, the name of the firewall rule must be at least 1 character and no more than 80 characters in length. '
        start-ip-address: 'The start IP address of the firewall rule. Must be IPv4 format. Use value ''0.0.0.0'' to represent all Azure-internal IP addresses. '
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --end-ip-address=: The end IP address of the firewall rule.
    --start-ip-address=: The start IP address of the firewall rule.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the server.
    -r, --rule-name=: The name of the firewall rule.
