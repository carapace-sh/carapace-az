# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets the setting with the specified name.
flags:
    --hsm-name=: Name of the HSM.
    --id=: Full URI of the HSM.
    --subscription=: Name or ID of subscription.
    -n, --name=!: Name of the setting.
documentation:
    command: Get specific setting associated with the managed HSM.
    flag:
        hsm-name: Name of the HSM.
        id: Full URI of the HSM. If specified all other 'Id' arguments should be omitted.
        name: Name of the setting.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add "AllowKeyManagementOperationsThroughARM" setting of the managed HSM.: az keyvault setting show --name AllowKeyManagementOperationsThroughARM --hsm-name myhsm
