# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates or create an alerts suppression rule.
flags:
    --alert-type=!: Type of the alert to automatically suppress.
    --comment=: Any comment regarding the rule.
    --expiration-date-utc=: Expiration date of the rule, if value is not provided or provided as null this field will default to the maximum allowed expiration date.
    --reason=!: The reason for dismissing the alert.
    --rule-name=!: The unique name of the alerts suppression rule.
    --state=!: Possible states of the rule.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        alert-type: Type of the alert to automatically suppress. For all alert types, use "*".
        change-reference: The related change reference ID for this resource operation.
        comment: Any comment regarding the rule.
        expiration-date-utc: Expiration date of the rule, if value is not provided or provided as null this field will default to the maximum allowed expiration date.
        reason: The reason for dismissing the alert.
        rule-name: The unique name of the alerts suppression rule.
        state: Possible states of the rule. Possible values are "Enabled" and "Disabled".
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create suppression rule with entities.: az security alerts-suppression-rule update --rule-name RuleName --alert-type "Test" --reason "Other" --comment "Test comment" --state "Enabled"
