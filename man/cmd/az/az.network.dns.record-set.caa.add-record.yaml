# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add-record
description: Add a CAA record.
flags:
    --flags=!: Integer flags for the record.
    --if-none-match=: Create the record set only if it does not already exist.
    --subscription=: Name or ID of subscription.
    --tag=!: Record tag
    --ttl=: Record set TTL (time-to-live)
    --value=!: Value of the CAA record.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -z, --zone-name=!: The name of the zone.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        flags: Integer flags for the record.
        if-none-match: Create the record set only if it does not already exist.
        record-set-name: The name of the record set relative to the zone. Creates a new record set if one does not exist.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tag: Record tag.
        ttl: |-
            Record set TTL (time-to-live).

            Default value: 3600
        value: Value of the CAA record.
        zone-name: The name of the zone.
examples:
    Add a CAA record.: |-
        az network dns record-set caa add-record -g MyResourceGroup -z www.mysite.com \
            -n MyRecordSet --flags 0 --tag "issue" --value "ca.contoso.com"
