# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new share under the specified account as described by request body.
flags:
    --access-tier=: Access tier for specific share.
    --account-name=!: The name of the storage account within the specified resource group.
    --bursting-max-mibps=: The maximum paid bursting bandwidth for the share, in mebibytes per second.
    --enabled-protocols=: The authentication protocol that is used for the file share.
    --metadata=:
        description: A name-value pair to associate with the share as metadata.
        nargs: -1
    --paid-bursting-enabled=:
        description: Indicates whether paid bursting is enabled for the share.
        nargs: -1
    --paid-bursting-max-iops=: The maximum paid bursting IOPS for the share.
    --provisioned-bandwidth=: The provisioned bandwidth of the share, in mebibytes per second.
    --provisioned-iops=: The provisioned IOPS of the share.
    --root-squash=: Reduction of the access rights for the remote superuser.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the file share within the specified storage account.
    -q, --quota=: The provisioned size of the share, in gibibytes.
completion:
    flag:
        access-tier:
            - Cool
            - Hot
            - Premium
            - TransactionOptimized
        enabled-protocols:
            - NFS
            - SMB
        paid-bursting-enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        root-squash:
            - AllSquash
            - NoRootSquash
            - RootSquash
documentation:
    command: Create a new share under the specified account as described by request body. The share resource includes metadata and properties for that share. It does not include a list of the files contained by the share.
    flag:
        access-tier: |-
            Access tier for specific share. GpV2 account can choose between TransactionOptimized (default), Hot, and Cool. FileStorage account can choose Premium.

            Accepted values: Cool, Hot, Premium, TransactionOptimized
        account-name: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        bursting-max-mibps: The maximum paid bursting bandwidth for the share, in mebibytes per second. This property is only for file shares created under Files Provisioned v1 SSD account type. The maximum allowed value is 10340 which is the maximum allowed bandwidth for a share.
        change-reference: The related change reference ID for this resource operation.
        enabled-protocols: |-
            The authentication protocol that is used for the file share. NFS protocol will be                                    only available for premium file shares (file shares in the FileStorage account type). Can only be specified when creating a share.

            Accepted values: NFS, SMB
        metadata: A name-value pair to associate with the share as metadata.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the file share within the specified storage account. File share names must be between 3 and 63 characters in length and use numbers, lower-case letters and dash (-) only. Every dash (-) character must be immediately preceded and followed by a letter or number.
        paid-bursting-enabled: |-
            Indicates whether paid bursting is enabled for the share. This property is only for file shares created under Files Provisioned v1 SSD account type.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        paid-bursting-max-iops: The maximum paid bursting IOPS for the share. This property is only for file shares created under Files Provisioned v1 SSD account type. The maximum allowed value is 102400 which is the maximum allowed IOPS for a share.
        provisioned-bandwidth: The provisioned bandwidth of the share, in mebibytes per second. This property is only for file shares created under Files Provisioned v2 account type. Please refer to the GetFileServiceUsage API response for the minimum and maximum allowed value for provisioned bandwidth.
        provisioned-iops: The provisioned IOPS of the share. This property is only for file shares created under Files Provisioned v2 account type. Please refer to the GetFileServiceUsage API response for the minimum and maximum allowed value for provisioned IOPS.
        quota: The provisioned size of the share, in gibibytes. Must be greater than 0, and less than or equal to 5TB (5120). For Large File Shares, the maximum size is 102400. For file shares created under Files Provisioned v2 account type, please refer to the GetFileServiceUsage API response for the minimum and maximum allowed provisioned storage size.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        root-squash: |-
            Reduction of the access rights for the remote superuser. The property is for NFS share only. The default is NoRootSquash.

            Accepted values: AllSquash, NoRootSquash, RootSquash
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    ? Create a new Azure file share 'myfileshare' under the storage account 'mystorageaccount' which enables provisionedv2 in resource group 'MyResourceGroup'.
    : |-
        az storage account create -g res3376 --name sto328 --sku StandardV2_LRS --kind FileStorage
        az storage share-rm create --storage-account sto328  -g res3376  -n share1 --provisioned-bandwidth-mibps 60 --provisioned-iops 500
    ? Create a new Azure file share 'myfileshare' with metadata and quota as 10 GB under the storage     account 'mystorageaccount'(account name) in resource group 'MyResourceGroup'.
    : az storage share-rm create -g MyResourceGroup --storage-account mystorageaccount --name myfileshare --quota 10 --metadata key1=value1 key2=value2
    ? Create a new Azure file share 'myfileshare' with metadata and quota as 10 GB under the storage account 'mystorageaccount' (account id).
    : az storage share-rm create --storage-account mystorageaccount --name myfileshare --quota 10 --metadata key1=value1 key2=value2
    ? Create a new Azure file share 'myfileshare' with metadata and quota as 6000 GB under the storage account 'mystorageaccount'(account name) which enables large file share in resource group 'MyResourceGroup'.
    : |-
        az storage account update -g MyResourceGroup --name mystorageaccount --enable-large-file-share
        az storage share-rm create -g MyResourceGroup --storage-account mystorageaccount --name myfileshare --quota 6000 --metadata key1=value1 key2=value2
