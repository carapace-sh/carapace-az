# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates your automatic provisioning settings on the subscription.
flags:
    --auto-provision=!: Automatic provisioning toggle.
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auto-provision: Automatic provisioning toggle. possible values are "On" or "Off".
        change-reference: The related change reference ID for this resource operation.
        name: Name of the resource to be fetched.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Turns off automatic provisioning on the subscription.: az security auto-provisioning-setting update -n "default" --auto-provision "Off"
    Turns on automatic provisioning on the subscription.: az security auto-provisioning-setting update -n "default" --auto-provision "On"
    Updates your automatic provisioning settings on the subscription. (autogenerated): az security auto-provisioning-setting update --auto-provision "Off" --name "default" --subscription MySubscription
