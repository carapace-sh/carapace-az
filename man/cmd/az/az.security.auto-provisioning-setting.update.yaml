# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates your automatic provisioning settings on the subscription.
documentation:
    flag:
        auto-provision: Automatic provisioning toggle. possible values are "On" or "Off"
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --auto-provision=!: Automatic provisioning toggle.
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
