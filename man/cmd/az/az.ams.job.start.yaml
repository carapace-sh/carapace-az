# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: start
description: Start a job.
documentation:
    flag:
        base-uri: Base uri for http job input. It will be concatenated with provided file names. If no base uri is given, then the provided file list is assumed to be fully qualified uris.
        correlation-data: Space-separated correlation data in 'key[=value]' format. This customer provided data will be returned in Job and JobOutput state events.
        files: Space-separated list of files. It can be used to tell the service to only use the files specified from the input asset.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        label: A label that is assigned to a Job Input that is used to satisfy a reference used in the Transform. For example, a Transform can be authored to take an image file with the label 'xyz' and apply it as an overlay onto the input video before it is encoded. When submitting a Job, exactly one of the JobInputs should be the image file, and it should have the label 'xyz'.
        output-assets: 'Space-separated assets in ''assetName=label'' format. An asset without label can be sent like this: ''assetName='''
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --base-uri=: Base uri for http job input.
    --correlation-data=:
        description: Space-separated correlation data in 'key[=value]' format.
        nargs: -1
    --description=: The job description.
    --files=:
        description: Space-separated list of files.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --input-asset-name=: The name of the input asset.
    --label=: A label that is assigned to a Job Input that is used to satisfy a reference used in the Transform.
    --output-assets=!:
        description: Space-separated assets in 'assetName=label' format.
        nargs: -1
    --priority=: The priority with which the job should be processed.
    --subscription=: Name or ID of subscription.
    -a, --account-name=: The name of the Azure Media Services account.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the job.
    -t, --transform-name=: The name of the transform.
completion:
    flag:
        priority:
            - Low
            - Normal
            - High
