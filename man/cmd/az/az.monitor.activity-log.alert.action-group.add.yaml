# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add action groups to this activity log alert rule.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --reset=:
        description: Remove all the existing action groups before add new conditions.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --strict=:
        description: Fails the command if an action group to be added will change existing webhook properties.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -a, --action-group=!:
        description: The names or the resource ids of the action groups to be added.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the activity log alert.
    -w, --webhook-properties=:
        description: Space-separated webhook properties in 'key[=value]' format.
        nargs: -1
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        reset:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        strict:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Add action groups to this activity log alert rule. It can also be used to overwrite existing webhook properties of particular action groups.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        action-group: The names or the resource ids of the action groups to be added.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        reset: |-
            Remove all the existing action groups before add new conditions.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        strict: |-
            Fails the command if an action group to be added will change existing webhook properties.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        webhook-properties: |-
            Space-separated webhook properties in 'key[=value]' format. These properties are associated with the action groups added in this command.
                      For any webhook receiver in these action group, these data are appended to the webhook
                      payload. To attach different webhook properties to different action groups, add the
                      action groups in separate update-action commands.
                        Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Add an action group and specify webhook properties.: |-
        az monitor activity-log alert action-group add -n AlertName -g ResourceGroup \
        --action /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/microsoft.insight
        s/actionGroups/{ActionGroup} \
        --webhook-properties usage=test owner=jane
    Add new action groups but prevent the command from accidently overwrite existing webhook properties: |-
        az monitor activity-log alert action-group add -n AlertName -g ResourceGroup --strict \
        --action-group ResourceIDList
    Overwite an existing action group's webhook properties.: |-
        az monitor activity-log alert action-group add -n AlertName -g ResourceGroup \
        -a /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/microsoft.insights/acti
        onGroups/{ActionGroup} \
        --webhook-properties usage=test owner=john
    Remove webhook properties from an existing action group.: |-
        az monitor activity-log alert action-group add -n AlertName -g ResourceGroup \
        -a /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/microsoft.insights/acti
        onGroups/{ActionGroup}
