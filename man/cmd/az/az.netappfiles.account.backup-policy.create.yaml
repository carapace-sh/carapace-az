# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a backup policy for Netapp Account
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    -a, --account-name=!: The name of the NetApp account
    -b, --name=!: Backup policy Name which uniquely identify backup policy.
    -d, --daily-backups=: Daily backups count to keep
    -e, --enabled=:
        description: The property to decide policy is enabled or not
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    -m, --monthly-backups=: Monthly backups count to keep
    -w, --weekly-backups=: Weekly backups count to keep
completion:
    flag:
        enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Create a backup policy for Netapp Account.
    flag:
        account-name: The name of the NetApp account. --backup-policy-name --name -b -n Backup policy Name which uniquely identify backup policy.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        daily-backups: Daily backups count to keep.
        enabled: |-
            The property to decide policy is enabled or not.

            Default value: True

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        location: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
        monthly-backups: Monthly backups count to keep.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        weekly-backups: Weekly backups count to keep.
examples:
    Create an ANF backup policy: az netappfiles account backup-policy create -g mygroup --account-name myaccountname --backup-policy-name mybackuppolicyname -l westus2 --daily-backups 1 --enabled true
