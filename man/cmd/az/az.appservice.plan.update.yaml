documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        async-scaling-enabled: |-
            Enables async scaling for the app service plan. Set to "true" to create an async operation if there are insufficient workers to scale synchronously. The SKU must be Dedicated.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        default-identity: Accept system or user assigned identity separated. Use '[system]' to refer system assigned identity, or a resource id to refer user assigned identity.
        elastic-scale: |-
            Enable or disable automatic scaling. Set to "true" to enable elastic scale for this plan, or "false" to disable elastic scale for this plan. The SKU must be a Premium V2 SKU (P1V2, P2V2, P3V2) or a Premium V3 SKU (P1V3, P2V3, P3V3).

            Accepted values: false, true
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        install-script: Install script configurations. Provide key-value pairs for ``` name=<name> source-uri=<uri> type=<type> ``` .
        max-elastic-worker-count: Maximum number of instances that the plan can scale out to. The plan must be an elastic scale plan.
        name: The name of the app service plan.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        number-of-workers: |-
            Number of workers to be allocated. Use this to scale out/in (add or remove instances), e.g. --number-of-workers 3.

            Default value: 1
        rdp-enabled: |-
            Enable RDP. Requires is-custom-mode to be true.

            Accepted values: false, true
        registry-adapter: Registry adapter configurations. Provide key-value pairs for ``` registry-key=<key> type=<type> secret-uri=<uri> ``` .
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        sku: |-
            SKU of the app service plan. Use this to scale up/down (change machine size), e.g. --sku P1v3.

            Accepted values: B1, B2, B3, D1, F1, FREE, I1MV2, I1V2, I2MV2, I2V2, I3MV2, I3V2, I4MV2, I4V2, I5MV2, I5V2, I6V2, P0V3, P0V4, P1MV3, P1MV4, P1V2, P1V3, P1V4, P2MV3, P2MV4, P2V2, P2V3, P2V4, P3MV3, P3MV4, P3V2, P3V3, P3V4, P4MV3, P4MV4, P5MV3, P5MV4, S1, S2, S3, SHARED, WS1, WS2, WS3
        storage-mount: Storage mount configurations. Provide key-value pairs for ``` name=<name> source=<source> type=<type> destination-path=<path> credentials-secret-uri=<uri> ``` .
        subnet: Name or resource ID of the pre-existing subnet to have the app service plan join. The --vnet is argument also needed if specifying subnet by name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vnet: Name or resource ID of the regional virtual network. If there are multiple vnets of the same name across different resource groups, use vnet resource id to specify which vnet to use. If vnet name is used, by default, the vnet in the same resource group as the webapp will be used. Must be used with --subnet argument.
examples:
    Update an app service plan. (autogenerated): az appservice plan update --name MyAppServicePlan --resource-group MyResourceGroup --sku F1
