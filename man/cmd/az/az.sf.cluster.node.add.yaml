# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add nodes to a node type in a cluster.
flags:
    --node-type=!: the Node type name.
    --number-of-nodes-to-add=!: number of nodes to add.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        node-type: The Node type name. --nodes-to-add --number-of-nodes-to-add Number of nodes to add.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add 2 'nt1' nodes to a cluster.: az sf cluster node add -g group-name -c cluster1 --number-of-nodes-to-add 2 --node-type 'nt1'
