# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create or update a service principal and configure its access to an Azure Media Services account.
flags:
    --new-sp-name=: The new app name or app URI to update the RBAC with.
    --role=: The role of the service principal.
    --subscription=: Name or ID of subscription.
    --xml=: Enables xml output format.
    --years=: Number of years for which the secret will be valid.
    -a, --account-name=!: The name of the Azure Media Services account.
    -g, --resource-group=!: Name of resource group.
    -n, --name=: The app name or app URI to associate the RBAC with.
    -p, --password=: The friendly name of the password.
documentation:
    flag:
        account-name: The name of the Azure Media Services account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The app name or app URI to associate the RBAC with. If not present, a default name like '{amsaccountname}-access-sp' will be generated.
        new-sp-name: The new app name or app URI to update the RBAC with.
        password: The friendly name of the password. The actual password will be an autogenerated strong password which will be displayed after the command runs.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        role: The role of the service principal.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        xml: |-
            Enables xml output format.

            Default value: False
        years: 'Number of years for which the secret will be valid. Default: 1 year.'
examples:
    ? Create a service principal with password and configure its access to an Azure Media Services account. Output will be in xml format.
    : az ams account sp create -a myAmsAccount -g myRG -n mySpName --password mySecret --role Owner --xml
    Update a service principal with a new role and new name.: az ams account sp create -a myAmsAccount -g myRG -n mySpName --new-sp-name myNewSpName --role newRole
