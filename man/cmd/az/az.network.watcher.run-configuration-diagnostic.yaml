# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: run-configuration-diagnostic
description: Run a configuration diagnostic on a target resource.
flags:
    --destination=: Traffic destination.
    --direction=: Direction of the traffic.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --parent=: Parent path, e.g., virtualMachineScaleSets/vmss1.
    --port=: Traffic destination port.
    --protocol=: Protocol to be verified on.
    --queries=:
        description: JSON list of queries to use.
        nargs: -1
    --resource=!: Name or ID of the target resource to diagnose.
    --source=: Traffic source.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of the resource group the target resource is in.
    -t, --resource-type=: Resource type.
completion:
    flag:
        direction:
            - Inbound
            - Outbound
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - TCP
            - UDP
        resource-type:
            - applicationGateways
            - networkInterfaces
            - virtualMachines
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        destination: Traffic destination. Accepted values are '*', IP address/CIDR, or Service Tag.
        direction: |-
            Direction of the traffic.

            Accepted values: Inbound, Outbound
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        parent: Parent path, e.g., virtualMachineScaleSets/vmss1.
        port: Traffic destination port. Accepted values are '*', port number (3389) or port range (80-100).
        protocol: |-
            Protocol to be verified on.

            Accepted values: TCP, UDP
        queries: JSON list of queries to use. Use ``` @{path} ``` to load from a file.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource: Name or ID of the target resource to diagnose. If an ID is given, other resource arguments should not be given.
        resource-group: Name of the resource group the target resource is in.
        resource-type: |-
            Resource type.

            Accepted values: applicationGateways, networkInterfaces, virtualMachines
        source: Traffic source. Accepted values are '*', IP address/CIDR, or Service Tag.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Run configuration diagnostic on a VM with a single query.: az network watcher run-configuration-diagnostic --resource {VM_ID} --direction Inbound --protocol TCP --source 12.11.12.14 --destination 10.1.1.4 --port 12100
    Run configuration diagnostic on a VM with multiple queries.: 'az network watcher run-configuration-diagnostic --resource {VM_ID} --queries ''[{"direction": "Inbound", "protocol": "TCP", "source": "12.11.12.14", "destination": "10.1.1.4", "destinationPort": "12100"}, {"direction": "Inbound", "protocol": "TCP", "source": "12.11.12.0/32", "destination": "10.1.1.4", "destinationPort": "12100"}, {"direction": "Outbound", "protocol": "TCP", "source": "12.11.12.14", "destination": "10.1.1.4", "destinationPort": "12100"}]'''
