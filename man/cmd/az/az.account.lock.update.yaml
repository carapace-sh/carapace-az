# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Allows updates to the lock-type(level) and the notes of the lock
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --notes=: Notes about this lock.
    -n, --name=: Name of the lock
    -t, --lock-type=: The type of lock restriction.
completion:
    flag:
        lock-type:
            - CanNotDelete
            - ReadOnly
documentation:
    command: Update a subscription lock.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
        lock-type: |-
            The type of lock restriction.

            Accepted values: CanNotDelete, ReadOnly
        name: Name of the lock.
        notes: Notes about this lock.
examples:
    Update a subscription lock with new notes and type: az account lock update --name lockName --notes newNotesHere --lock-type CanNotDelete
