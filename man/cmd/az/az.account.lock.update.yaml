# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Allows updates to the lock-type(level) and the notes of the lock
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --notes=: Notes about this lock.
    -n, --name=: Name of the lock
    -t, --lock-type=: The type of lock restriction.
completion:
    flag:
        lock-type:
            - CanNotDelete
            - ReadOnly
