# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an existing environment.
documentation:
    flag:
        artifact-source-name: 'Name of the artifact source in the lab.  Values from: az lab artifact-source list.'
        parameters: Path to the parameters of the azure resource manager template. JSON encoded list of parameters.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: The tags of the resource.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --arm-template=!: Name or ID of the ARM template in the lab.
    --artifact-source-name=: Name of the artifact source in the lab.
    --lab-name=!: The name of the lab.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --parameters=: Path to the parameters of the azure resource manager template.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: The tags of the resource.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the environment.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
