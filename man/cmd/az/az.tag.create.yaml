# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create tags on a specific resource.
flags:
    --resource-id=: The resource identifier for the tagged entity.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -n, --name=: The tag name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The name of the tag to create.
        resource-id: The resource identifier for the entity being tagged. A resource, a resource group or a subscription may be tagged.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a tag in the subscription.: az tag create --name MyTag
    Create or update the entire set of tags on a resource group.: az tag create --resource-id /subscriptions/{sub-id}/resourcegroups/{rg} --tags Dept=Finance Status=Normal
    Create or update the entire set of tags on a resource.: az tag create --resource-id /subscriptions/{sub-id}/resourcegroups/{rg}/providers/Microsoft.Compute/virtualMachines/{vmName} --tags Dept=Finance Status=Normal
    Create or update the entire set of tags on a subscription.: az tag create --resource-id /subscriptions/{subId} --tags Dept=Finance Status=Normal
