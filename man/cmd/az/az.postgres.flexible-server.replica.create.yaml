# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a read replica for a server.
documentation:
    flag:
        address-prefixes: The IP address prefix to use when creating a new virtual network in CIDR format. Default value is 10.0.0.0/16.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        private-dns-zone: This parameter only applies for a server with private access. The name or id of new or existing private dns zone. You can use the private dns zone from same resource group, different resource group, or different subscription. If you want to use a zone from different resource group or subscription, please provide resource Id. CLI creates a new private dns zone within the same resource group as virtual network if not provided by users.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        sku-name: 'The name of the compute SKU. Follows the convention Standard_{VM name}. Examples: Standard_B1ms'
        storage-size: The storage capacity of the server. Minimum is 32 GiB and max is 16 TiB.
        subnet: Name or resource ID of a new or existing subnet. If you want to use a subnet from different resource group or subscription, please provide resource ID instead of name. Please note that the subnet will be delegated to flexibleServers. After delegation, this subnet cannot be used for any other type of Azure resources.
        subnet-prefixes: The subnet IP address prefix to use when creating a new subnet in CIDR format. Default value is 10.0.0.0/24.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tier: 'Compute tier of the server. Accepted values: Burstable, GeneralPurpose, MemoryOptimized '
        vnet: Name or ID of a new or existing virtual network. If you want to use a vnet from different resource group or subscription, please provide a resource ID. The name must be between 2 to 64 characters. The name must begin with a letter or number, end with a letter, number or underscore, and may contain only letters, numbers, underscores, periods, or hyphens.
flags:
    --address-prefixes=: The IP address prefix to use when creating a new virtual network in CIDR format.
    --identity=: The name or resource ID of the user assigned identity for data encryption.
    --key=: The resource ID of the primary keyvault key for data encryption.
    --no-wait=: Do not wait for the long-running operation to finish.
    --performance-tier=: Performance tier of the server.
    --private-dns-zone=: This parameter only applies for a server with private access.
    --replica-name=!: The name of the server to restore to.
    --sku-name=: The name of the compute SKU.
    --source-server=!: The name or resource ID of the source server to restore from.
    --storage-size=: The storage capacity of the server.
    --subnet-prefixes=: The subnet IP address prefix to use when creating a new subnet in CIDR format.
    --subnet=: Name or resource ID of a new or existing subnet.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tier=: Compute tier of the server.
    --vnet=: Name or ID of a new or existing virtual network.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -y, --yes=: Do not prompt for confirmation.
    -z, --zone=: Availability zone into which to provision the resource.
