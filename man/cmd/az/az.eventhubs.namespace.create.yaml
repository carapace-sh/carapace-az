# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates the EventHubs Namespace
flags:
    --alternate-name=: Alternate name specified when alias and namespace names are same.
    --capacity=: Capacity for Sku
    --cluster-arm-id=: Cluster ARM ID of the Namespace
    --disable-local-auth=:
        description: A boolean value that indicates whether SAS authentication is enabled/disabled for the Event Hubs
        nargs: -1
    --enable-auto-inflate=:
        description: A boolean value that indicates whether AutoInflate is enabled for eventhub namespace.
        nargs: -1
    --enable-kafka=:
        description: A boolean value that indicates whether Kafka is enabled for eventhub namespace.
        nargs: -1
    --encryption-config=:
        description: List of KeyVaultProperties objects.
        nargs: -1
    --geo-data-replication-config=:
        description: A list of regions where replicas of the namespace are maintained Object
        nargs: -1
    --infra-encryption=:
        description: A boolean value that indicates whether Infrastructure Encryption (Double Encryption) is enabled/disabled
        nargs: -1
    --max-replication-lag-duration-in-seconds=: The maximum acceptable lag for data replication operations from the primary replica to a quorum of secondary replicas
    --maximum-throughput-units=: Upper limit of throughput units when AutoInflate is enabled, vaule should be within 0 to 20 throughput units.
    --mi-system-assigned=:
        description: Enable System Assigned Identity
        nargs: -1
    --mi-user-assigned=:
        description: List of User Assigned Identity ids.
        nargs: -1
    --minimum-tls-version=: The minimum TLS version for the cluster to support, e.g. 1.2
    --public-network-access=: This determines if traffic is allowed over public network.
    --sku=: Namespace SKU.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --zone-redundant=:
        description: Enabling this property creates a Standard EventHubs Namespace in regions supported availability zones
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of Namespace
completion:
    flag:
        disable-local-auth:
            - "true"
            - "false"
        enable-auto-inflate:
            - "true"
            - "false"
        enable-kafka:
            - "true"
            - "false"
        infra-encryption:
            - "true"
            - "false"
        mi-system-assigned:
            - "true"
            - "false"
        minimum-tls-version:
            - "1.0"
            - "1.1"
            - "1.2"
        public-network-access:
            - Enabled
            - Disabled
        sku:
            - Basic
            - Standard
            - Premium
        zone-redundant:
            - "true"
            - "false"
documentation:
    command: Creates the EventHubs Namespace.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        alternate-name: Alternate name specified when alias and namespace names are same.
        capacity: Capacity for Sku.
        change-reference: The related change reference ID for this resource operation.
        cluster-arm-id: Cluster ARM ID of the Namespace.
        disable-local-auth: |-
            A boolean value that indicates whether SAS authentication is enabled/disabled for the Event Hubs.

            Accepted values: false, true
        enable-auto-inflate: |-
            A boolean value that indicates whether AutoInflate is enabled for eventhub namespace.

            Accepted values: false, true
        enable-kafka: |-
            A boolean value that indicates whether Kafka is enabled for eventhub namespace.

            Accepted values: false, true
        encryption-config: List of KeyVaultProperties objects. --geo-data-replication-config --replica-config A list of regions where replicas of the namespace are maintained Object.
        infra-encryption: |-
            A boolean value that indicates whether Infrastructure Encryption (Double Encryption) is enabled/disabled.

            Accepted values: false, true
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` . --max-lag --max-replication-lag-duration-in-seconds The maximum acceptable lag for data replication operations from the primary replica to a quorum of secondary replicas.'
        maximum-throughput-units: Upper limit of throughput units when AutoInflate is enabled, vaule should be within 0 to 20 throughput units. ( 0 if AutoInflateEnabled = true).
        mi-system-assigned: |-
            Enable System Assigned Identity.

            Default value: False

            Accepted values: false, true
        mi-user-assigned: |-
            List of User Assigned Identity ids.

            Accepted values: 1.0, 1.1, 1.2

            Accepted values: Disabled, Enabled
        name: Name of Namespace.
        public-network-access: This determines if traffic is allowed over public network. By default it is enabled. If value is SecuredByPerimeter then Inbound and Outbound communication is controlled by the network security perimeter and profile' access rules.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: |-
            Namespace SKU.

            Default value: Standard

            Accepted values: Basic, Premium, Standard
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        zone-redundant: |-
            Enabling this property creates a Standard EventHubs Namespace in regions supported availability zones.

            Accepted values: false, true
examples:
    Create a new namespace with Identity and Encryption enabled.: az eventhubs namespace create --resource-group myresourcegroup --name mynamespace --location westus --sku Premium --mi-user-assigned /subscriptions/{subscriptionId}/resourceGroups/{resourcegroup}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/MSIName --encryption-config key-name=key1 key-vault-uri=https://mykeyvault.vault.azure.net/ user-assigned-identity=/subscriptions/{subscriptionId}}/resourceGroups/{resourcegroup}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/MSIName --encryption-config key-name=key1 key-vault-uri=https://mykeyvault.vault.azure.net/ user-assigned-identity=/subscriptions/{subscriptionId}}/resourceGroups/{resourcegroup}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/MSIName
    Creates a new namespace.: az eventhubs namespace create --resource-group myresourcegroup --name mynamespace --location westus --tags tag1=value1 tag2=value2 --sku Standard --enable-auto-inflate --maximum-throughput-units 20
