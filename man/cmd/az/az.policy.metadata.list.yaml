# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List policy metadata resources.
flags:
    --subscription=: Name or ID of subscription.
    --top=: Maximum number of records to return.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        top: Maximum number of records to return.
examples:
    Get all policy metadata resources.: az policy metadata list
    Get policy metadata resources, limit the output to 5 resources.: az policy metadata list --top 5
