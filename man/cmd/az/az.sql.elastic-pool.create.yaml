# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates an elastic pool.
flags:
    --db-dtu-max=: The maximum capacity (in DTUs or vcores) any one database can consume.
    --db-dtu-min=: The minumum capacity (in DTUs or vcores) each database is guaranteed.
    --license-type=: The license type to apply for this elastic pool.
    --max-size=: The max storage size.
    --no-wait=: Do not wait for the long-running operation to finish.
    --preferred-enclave-type=: The preferred enclave type for the Azure SQL Elastic Pool.
    --read-replicas=: The number of high availability replicas to provision for the database.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -c, --capacity=: The capacity component of the sku in integer number of DTUs or vcores.
    -e, --tier=: The edition component of the sku.
    -f, --family=: The compute generation component of the sku (for vcore skus only).
    -g, --resource-group=!: Name of resource group.
    -m, --maint-config-id=: Specified maintenance configuration id or name for this resource.
    -n, --name=!: The name of the elastic pool.
    -s, --server=!: Name of the Azure SQL Server.
    -z, --zone-redundant=:
        description: Specifies whether to enable zone redundancy.
        nargs: -1
completion:
    flag:
        license-type:
            - LicenseIncluded
            - BasePrice
        preferred-enclave-type:
            - Default
            - VBS
        zone-redundant:
            - "true"
            - "false"
documentation:
    command: Create an elastic pool.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        family: 'The compute generation component of the sku (for vcore skus only). Allowed values include: Gen4, Gen5.'
        license-type: |-
            The license type to apply for this elastic pool.

            Accepted values: BasePrice, LicenseIncluded
        maint-config-id: Specified maintenance configuration id or name for this resource. --max-size --storage The max storage size. If no unit is specified, defaults to bytes (B).
        max-size: The max storage size. If no unit is specified, defaults to bytes (B).
        name: The name of the elastic pool.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        preferred-enclave-type: |-
            The preferred enclave type for the Azure SQL Elastic Pool. Allowed values include: Default, VBS.

            Accepted values: Default, VBS
        read-replicas: The number of high availability replicas to provision for the database. Only settable for Hyperscale edition.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tier: 'The edition component of the sku. Allowed values include: Basic, Standard, Premium, GeneralPurpose, BusinessCritical.'
        zone-redundant: |-
            Specifies whether to enable zone redundancy. Default is true if no value is specified.

            Accepted values: false, true
examples:
    Create a Standard 100 DTU elastic pool.: az sql elastic-pool create -g mygroup -s myserver -n mydb -e Standard -c 100
    Create an elastic pool with GeneralPurpose edition, Gen4 hardware and 1 vcore.: az sql elastic-pool create -g mygroup -s myserver -n mydb -e GeneralPurpose -f Gen4 -c 1
    Create an elastic pool with Hyperscale edition, Gen5 hardware, 4 vcore and 2 high availability replicas.: az sql elastic-pool create -g mygroup -s myserver -n mydb -e Hyperscale -f Gen5 -c 4 --ha-replicas 2
    Create an elastic pool with VBS enclave.: az sql elastic-pool create -g mygroup -s myserver -n mydb --preferred-enclave-type VBS
    Create elastic pool with zone redundancy enabled: az sql elastic-pool create -g mygroup -s myserver -n mypool -z
    Create elastic pool with zone redundancy explicitly disabled: az sql elastic-pool create -g mygroup -s myserver -n mypool -z false
