# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a connected registry for an Azure Container Registry.
documentation:
    flag:
        add-client-tokens: Client tokens to be added. Use the format "--add-client-tokens [TOKEN_NAME1 TOKEN_NAME2 ...]" per token id.
        add-notifications: List of artifact pattern to be added to notifications list. Use the format "--add-notifications [PATTERN1 PATTERN2 ...]".
        audit-logs-enabled: Indicate whether audit log synchronization is enabled. It is enabled by default.
        log-level: Set the log level for logging on the instance. Accepted log levels are Debug, Information, Warning, Error, and None.
        name: Name for the connected registry. Name must be between 5 to 40 character long, start with a letter and contain only alphanumeric characters (including ‘_’ or ‘-’). Name must be unique under the Cloud ACR hierarchy.
        registry: The login server of the Cloud ACR registry. Must be the FQDN to support also Azure Stack.
        remove-client-tokens: Client tokens to be removed. Use the format "--remove-client-tokens [TOKEN_NAME1 TOKEN_NAME2 ...]" per token id.
        remove-notifications: List of artifact pattern to be removed from notifications list. Use the format "--remove-notifications [PATTERN1 PATTERN2 ...]".
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        sync-message-ttl: Determine how long the sync messages will be kept in the cloud. Uses ISO 8601 duration format.
        sync-schedule: Optional parameter to define the sync schedule. Uses cron expression to determine the schedule. If not specified, the instance is considered always online and attempts to sync every minute.
        sync-window: Used to determine the schedule duration. Uses ISO 8601 duration format.
flags:
    --add-client-tokens=:
        description: Client tokens to be added.
        nargs: -1
    --add-notifications=:
        description: List of artifact pattern to be added to notifications list.
        nargs: -1
    --audit-logs-enabled=:
        description: Indicate whether audit log synchronization is enabled.
        nargs: -1
    --log-level=: Set the log level for logging on the instance.
    --remove-client-tokens=:
        description: Client tokens to be removed.
        nargs: -1
    --remove-notifications=:
        description: List of artifact pattern to be removed from notifications list.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --sync-message-ttl=: Determine how long the sync messages will be kept in the cloud.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name for the connected registry.
    -r, --registry=!: The login server of the Cloud ACR registry.
    -s, --sync-schedule=: Optional parameter to define the sync schedule.
    -w, --sync-window=: Used to determine the schedule duration.
completion:
    flag:
        audit-logs-enabled:
            - "true"
            - "false"
