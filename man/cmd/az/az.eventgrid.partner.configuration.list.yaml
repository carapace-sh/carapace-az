# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List available partner configurations.
flags:
    --odata-query=: The OData query used for filtering the list results.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        odata-query: 'The OData query used for filtering the list results. Filtering is currently allowed on the Name property only. The supported operations include: CONTAINS, eq (for equal), ne (for not equal), AND, OR and NOT.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all partner configurations in a resource group.: az eventgrid partner configuration list -g rg1
    List all partner configurations in the current Azure subscription except the partner configuration with name "name1": az eventgrid partner configuration list --odata-query "NOT (name eq 'name1')"
    List all partner configurations in the current Azure subscription whose name contains the pattern "XYZ": az eventgrid partner configuration list --odata-query "Contains(name, 'XYZ')"
    List all partner configurations in the current Azure subscription.: az eventgrid partner configuration list
