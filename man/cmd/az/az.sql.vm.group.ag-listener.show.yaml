# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets an availability group listener.
flags:
    --expand=:
        description: Get the SQLIaaSExtension configuration settings.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the availability group listener.
    -r, --group-name=!: Name of the SQL virtual machine group.
completion:
    flag:
        expand:
            - '*'
            - AssessmentSettings
            - AutoBackupSettings
            - AutoPatchingSettings
            - KeyVaultCredentialSettings
            - ServerConfigurationsManagementSettings
documentation:
    flag:
        expand: |-
            Get the SQLIaaSExtension configuration settings. To view all settings, use *. To select only a few, the settings must be space-separated.

            Accepted values: *, AssessmentSettings, AutoBackupSettings, AutoPatchingSettings, KeyVaultCredentialSettings, ServerConfigurationsManagementSettings
        group-name: Name of the SQL virtual machine group.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the availability group listener.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
