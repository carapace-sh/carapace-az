# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get details on VMs within a VMSS.
flags:
    --instance-id=: VM instance ID.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Scale set name.
    -u, --include-user-data=: Include the user data properties in the query result.
documentation:
    flag:
        include-user-data: |-
            Include the user data properties in the query result.

            Default value: False
        instance-id: VM instance ID. If missing, show the VMSS.
        name: Scale set name. You can configure the default using ``` az configure --defaults vmss=<name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get details on VMs within a VMSS. (autogenerated): az vmss show --name MyScaleSet --resource-group MyResourceGroup
