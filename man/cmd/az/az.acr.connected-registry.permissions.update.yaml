# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Add and remove repository permissions accross all the necessary connected registry sync scope maps.
flags:
    --add=:
        description: repository permissions to be added to the targeted connected registry and it's ancestors sync scope maps.
        nargs: -1
    --remove=:
        description: repository permissions to be removed from the targeted connected registry and it's succesors sync scope maps.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name for the connected registry.
    -r, --registry=!: The login server of the Cloud ACR registry.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: Repository permissions to be added to the targeted connected registry and it's ancestors sync scope maps. Use the format "--add [REPO1 REPO2 ...]" per flag. Valid actions are ['content/delete', 'content/read', 'content/write', 'metadata/read', 'metadata/write'].
        change-reference: The related change reference ID for this resource operation.
        name: Name for the connected registry. Name must be between 5 to 40 character long, start with a letter and contain only alphanumeric characters (including ‘_’ or ‘-’). Name must be unique under the Cloud ACR hierarchy.
        registry: The login server of the Cloud ACR registry. Must be the FQDN to support also Azure Stack.
        remove: Repository permissions to be removed from the targeted connected registry and it's succesors sync scope maps. Use the format "--remove [REPO1 REPO2 ...]" per flag. Valid actions are ['content/delete', 'content/read', 'content/write', 'metadata/read', 'metadata/write'].
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    ? Add permissions to synchronize images from 'repo1' and 'repo2' to the connected registry 'myconnectedregistry' and its ancestors.
    : az acr connected-registry permissions update -r mycloudregistry -n myconnectedregistry --add repo1 repo2
    Remove permissions to synchronize 'repo1' images and adds permissions for 'repo2' images.: az acr connected-registry permissions update -r mycloudregistry -n myconnectedregistry --remove repo1 --add repo2
    ? Remove permissions to synchronize images from 'repo1' and 'repo2' to the connected registry 'myconnectedregistry' and its descendants.
    : az acr connected-registry permissions update -r mycloudregistry -n myconnectedregistry --remove repo1 repo2
