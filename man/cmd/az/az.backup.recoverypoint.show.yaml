# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows details of a particular recovery point.
flags:
    --backup-management-type=: Specify the backup management type.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --use-secondary-region=: Use this flag to show recoverypoints in secondary region.
    --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
    -c, --container-name=: Name of the backup container.
    -g, --resource-group=: Name of resource group.
    -i, --item-name=: Name of the backed up item.
    -n, --name=: Name of the recovery point.
    -v, --vault-name=: Name of the Recovery services vault.
completion:
    flag:
        backup-management-type:
            - AzureIaasVM
            - AzureStorage
            - AzureWorkload
        workload-type:
            - VM
            - AzureFileShare
            - SAPHANA
            - MSSQL
            - SAPHanaDatabase
            - SQLDataBase
documentation:
    flag:
        backup-management-type: |-
            Specify the backup management type. Define how Azure Backup manages the backup of entities within the ARM resource. For eg: AzureWorkloads refers to workloads installed within Azure VMs, AzureStorage refers to entities within Storage account. Required only if friendly name is used as Container name.

            Accepted values: AzureIaasVM, AzureStorage, AzureWorkload
        container-name: Name of the backup container. Accepts 'Name' or 'FriendlyName' from the output of az backup container list command. If 'FriendlyName' is passed then BackupManagementType is required.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        item-name: Name of the backed up item.
        name: Name of the recovery point. You can use the backup recovery point list command to get the name of a backed up item.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        use-secondary-region: Use this flag to show recoverypoints in secondary region.
        vault-name: Name of the Recovery services vault.
        workload-type: |-
            Specify the type of applications within the Resource which should be discovered and protected by Azure Backup. 'MSSQL' and 'SQLDataBase' can be used interchangeably for SQL in Azure VM, as can 'SAPHANA' and 'SAPHanaDatabase' for SAP HANA in Azure VM.

            Accepted values: AzureFileShare, MSSQL, SAPASE, SAPAseDatabase, SAPHANA, SAPHanaDBInstance, SAPHanaDatabase, SQLDataBase, VM
examples:
    Shows details of a particular recovery point. (autogenerated): az backup recoverypoint show --container-name MyContainer --backup-management-type AzureIaasVM --item-name MyItem --name MyRecoveryPoint --resource-group MyResourceGroup --vault-name MyVault
