# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets information about the specified Compute Node.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --node-id=!: The ID of the Compute Node that you want to get information about.
    --pool-id=!: The ID of the Pool that contains the Compute Node.
    --select=:
        description: An OData $select clause.
        nargs: -1
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        node-id: The ID of the Compute Node that you want to get information about. Required.
        pool-id: The ID of the Pool that contains the Compute Node. Required.
        select: An OData $select clause.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
