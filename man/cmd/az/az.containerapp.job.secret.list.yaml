# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the secrets of a container app job.
flags:
    --show-values=: Show the secret values.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the container app job for which the secret needs to be retrieved.
documentation:
    flag:
        name: The name of the container app job for which the secret needs to be retrieved.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        show-values: |-
            Show the secret values.

            Default value: False
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List the secrets of a container app job.: az containerapp job secret list -n my-containerapp-job -g MyResourceGroup
