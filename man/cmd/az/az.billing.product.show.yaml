# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get a product by ID.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies a product.
documentation:
    command: |-
        Command group 'billing product' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account. --name --product-name -n The ID that uniquely identifies a product.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Shgow a product information: az billing product show --account-name "{billingAccountName}" --name "{productName}"
