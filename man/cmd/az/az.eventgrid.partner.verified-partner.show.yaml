# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get a verified partner.
flags:
    --subscription=: Name or ID of subscription.
    --verified-partner-name=!: Name of the verified partner.
documentation:
    command: Get the details of a verified partner.
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        verified-partner-name: Name of the verified partner.
examples:
    Show the details of a partner verified partner.: az eventgrid partner verified-partner show --verified-partner-name verifiedpartner1
