# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details for a VM image available in the Azure Marketplace.
flags:
    --edge-zone=: The name of edge zone.
    --subscription=: Name or ID of subscription.
    --urn=: URN, in format of 'publisher:offer:sku:version' or 'publisher:offer:sku:edge_zone:version'.
    --version=: image sku's version
    -f, --offer=: image offer
    -l, --location=: Location.
    -p, --publisher=: image publisher
    -s, --sku=: image sku
documentation:
    flag:
        edge-zone: The name of edge zone.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        offer: Image offer.
        publisher: Image publisher.
        sku: Image sku.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        urn: URN, in format of 'publisher:offer:sku:version' or 'publisher:offer:sku:edge_zone:version'. If specified, other argument values can be omitted.
        version: Image sku's version.
examples:
    Get the details for a VM image available in the Azure Marketplace. (autogenerated): az vm image show --location westus --urn publisher:offer:sku:version
    Show information for the latest available CentOS image from OpenLogic.: |-
        latest=$(az vm image list -p OpenLogic -s 7.3 --all --query \
            "[?offer=='CentOS'].version" -o tsv | sort -u | tail -n 1)
        az vm image show -l westus -f CentOS -p OpenLogic --sku 7.3 --version ${latest}
