# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add existing NICs to a VM.
documentation:
    flag:
        primary-nic: Name or ID of the primary NIC. If missing, the first NIC in the list will be the primary.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-name: The name of the Virtual Machine. You can configure the default using `az configure --defaults vm=<name>`
flags:
    --nics=!:
        description: Names or IDs of NICs.
        nargs: -1
    --primary-nic=: Name or ID of the primary NIC.
    --subscription=: Name or ID of subscription.
    --vm-name=!: The name of the Virtual Machine.
    -g, --resource-group=!: Name of resource group.
