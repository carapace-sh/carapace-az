# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists the files in a Task's directory on its Compute Node.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --filter=: An OData $filter clause.
    --job-id=!: The ID of the Job that contains the Task.
    --recursive=:
        description: Whether to list children of the Task directory.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --task-id=!: The ID of the Task whose files you want to list.
completion:
    flag:
        recursive:
            - "true"
            - "false"
documentation:
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        filter: An OData $filter clause. For more information on constructing this filter,see https://learn.microsoft.com/rest/api/batchservice/odata-filters-in-batch .
        job-id: The ID of the Job that contains the Task. Required.
        recursive: |-
            Whether to list children of the Task directory. This parameter can be used in combination with the filter parameter to list specific type of files.

            Accepted values: false, true
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        task-id: The ID of the Task whose files you want to list. Required.
