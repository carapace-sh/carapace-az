# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets the existing immutability policy along with the corresponding ETag in response headers and body.
flags:
    --account-name=!: The name of the storage account within the specified resource group.
    --if-match=: The entity state (ETag) version of the immutability policy to update must be returned to the server for all update operations.
    --subscription=: Name or ID of subscription.
    -c, --container-name=!: The container name.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        account-name: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only. Required.
        container-name: The container name.
        if-match: The entity state (ETag) version of the immutability policy to update must be returned to the server for all update operations. The ETag value must include the leading and trailing double quotes as returned by the service. Default value is None.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
