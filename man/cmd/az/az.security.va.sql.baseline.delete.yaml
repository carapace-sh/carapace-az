# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete Sql Vulnerability Assessment rule baseline.
flags:
    --agent-id=: Provide the ID of the agent on the scanned machine, for On-Premise resources only
    --database-name=!: The name of the scanned database
    --rule-id=!: The ID of the scanned rule.
    --server-name=!: The name of the scanned server
    --subscription=: Name or ID of subscription.
    --vm-name=: Provide the name of the machine, for On-Premise resources only
    --vm-resource-id=!: Resource ID of the scanned machine.
    --vm-uuid=: Provide the UUID of the scanned machine, for On-Premise resources only
    --workspace-id=!: The ID of the workspace connected to the scanned machine
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        agent-id: Provide the ID of the agent on the scanned machine, for On-Premise resources only.
        change-reference: The related change reference ID for this resource operation.
        database-name: The name of the scanned database.
        rule-id: 'The ID of the scanned rule. Format: "VAXXXX", where XXXX indicates the number of the rule.'
        server-name: The name of the scanned server.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-name: Provide the name of the machine, for On-Premise resources only.
        vm-resource-id: Resource ID of the scanned machine. For On-Premise machines, please provide your workspace resource ID.
        vm-uuid: Provide the UUID of the scanned machine, for On-Premise resources only.
        workspace-id: The ID of the workspace connected to the scanned machine.
examples:
    Delete Sql Vulnerability Assessment rule baseline on an Azure virtual machine.: az security va sql baseline delete --vm-resource-id subscriptions/MySubscription/ResourceGroups/MyResourceGroup/Providers/Microsoft.Compute/VirtualMachines/MyVmName --workspace-id 00000000-0000-0000-0000-000000000000 --server-name MyServerName --database-name MyDbName --rule-id VA9999
    Delete Sql Vulnerability Assessment rule baseline on an On-Premise machine.: az security va sql baseline delete --vm-resource-id subscriptions/MySubscription/ResourceGroups/MyResourceGroup/Providers/Microsoft.OperationalInsights/Workspaces/MyWorkspaceName --workspace-id 00000000-0000-0000-0000-000000000000 --server-name MyServerName --database-name MyDbName --vm-name MyVmName --agent-id MyAgentId --vm-uuid MyVmUUID --rule-id VA9999
