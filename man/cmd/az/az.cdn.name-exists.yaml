# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: name-exists
description: Check the availability of a resource name.
flags:
    --name=!: The resource name to validate.
    --subscription=: Name or ID of subscription.
    --type=: The type of the resource whose name is to be validated.
completion:
    flag:
        type:
            - Microsoft.Cdn/Profiles/AfdEndpoints
            - Microsoft.Cdn/Profiles/Endpoints
documentation:
    command: Check the availability of a resource name. This is needed for resources where name is globally unique, such as a CDN endpoint.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The resource name to validate.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: The type of the resource whose name is to be validated.
examples:
    Check whether the resource name contoso is available or not.: az cdn name-exists --name contoso
