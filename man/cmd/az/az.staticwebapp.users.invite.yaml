# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: invite
description: Create invitation link for specified user to the static app.
documentation:
    flag:
        invitation-expiration-in-hours: This value sets when the link will expire in hours. The maximum is 168 (7 days).
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        roles: Comma-separated default or user-defined role names. Roles that can be assigned to a user are comma separated and case-insensitive (at most 50 roles up to 25 characters each and restricted to 0-9,A-Z,a-z, and _). Define roles in routes.json during root directory of your GitHub repo.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-details: Email for AAD, Facebook, and Google. Account name (handle) for GitHub and Twitter.
flags:
    --authentication-provider=!: Authentication provider of the user identity such as AAD, Facebook, GitHub, Google, Twitter.
    --domain=!: A domain added to the static app in quotes.
    --invitation-expiration-in-hours=!: This value sets when the link will expire in hours.
    --roles=!: Comma-separated default or user-defined role names.
    --subscription=: Name or ID of subscription.
    --user-details=!: Email for AAD, Facebook, and Google.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name of the static site
