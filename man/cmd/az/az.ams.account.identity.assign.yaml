# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: assign
description: Assign a managed identity to an Azure Media Services account.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --system-assigned=:
        description: Set the system managed identity on the media services account.
        nargs: -1
    --user-assigned=:
        description: Set the user managed identities on the media services account.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the resource.
completion:
    flag:
        system-assigned:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the resource.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-assigned: |-
            Set the system managed identity on the media services account.

            Default value: False

            Accepted values: false, true
        user-assigned: Set the user managed identities on the media services account.
examples:
    Assign a system managed identity to an Azure Media Services account.: az ams account identity assign -n myAmsAccount -g myRG --system-assigned
    Assign a user managed identity to an Azure Media Services account.: az ams account identity assign -n myAmsAccount -g myRG --user-assigned myUserId
