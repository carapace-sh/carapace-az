# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a data warehouse.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --filter=: An OData filter expression that filters elements in the collection.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --max-size=: The max storage size.
    --no-wait=: Do not wait for the long-running operation to finish.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --service-objective=: The service objective of the data warehouse.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the data warehouse.
    -s, --server=: Name of the Azure SQL Server.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        change-reference: The related change reference ID for this resource operation.
        filter: An OData filter expression that filters elements in the collection. Default value is None.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        max-size: The max storage size. If no unit is specified, defaults to bytes (B).
        name: Name of the data warehouse.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        service-objective: 'The service objective of the data warehouse. For example: DW100, DW1000c.'
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a data warehouse. (autogenerated): az sql dw update --name MyDataWarehouse --resource-group MyResourceGroup --server myserver --service-objective S1
