# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-attributes
description: Change a key's properties (not its cryptographic material).
documentation:
    flag:
        hsm-name: Name of the HSM. (--hsm-name and --vault-name are mutually exclusive, please specify just one of them)
        id: Id of the key. If specified all other 'Id' arguments should be omitted.
        immutable: Mark a release policy as immutable. An immutable release policy cannot be changed or updated after being marked immutable. Release policies are mutable by default.
        name: Name of the key. Required if --id is not specified.
        policy: The policy rules under which the key can be exported. Policy definition as JSON, or a path to a file containing JSON policy definition.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        version: The key version. If omitted, uses the latest version.
flags:
    --enabled=:
        description: Enable the key.
        nargs: -1
    --expires=: Expiration UTC datetime  (Y-m-d'T'H:M:S'Z').
    --hsm-name=: Name of the HSM.
    --id=: Id of the key.
    --immutable=:
        description: Mark a release policy as immutable.
        nargs: -1
    --not-before=: Key not usable before the provided UTC datetime  (Y-m-d'T'H:M:S'Z').
    --ops=:
        description: Space-separated list of permitted JSON web key operations.
        nargs: -1
    --policy=: The policy rules under which the key can be exported.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vault-name=: Name of the Vault.
    -n, --name=: Name of the key.
    -v, --version=: The key version.
completion:
    flag:
        enabled:
            - "true"
            - "false"
        immutable:
            - "true"
            - "false"
        ops:
            - encrypt
            - decrypt
            - sign
            - verify
            - wrapKey
            - unwrapKey
            - import
            - export
