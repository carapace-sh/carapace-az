# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-shared
description: List VM Image definitions in a gallery shared directly to your subscription or tenant
flags:
    --gallery-unique-name=: The unique name of the Shared Gallery.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --marker=: A string value that identifies the portion of the list of containers to be returned with the next listing operation.
    --shared-to=: The query parameter to decide what shared galleries to fetch when doing listing operations.
    --show-next-marker=: Show nextMarker in result when specified.
    --subscription=: Name or ID of subscription.
    -l, --location=: Location.
completion:
    flag:
        shared-to:
            - tenant
documentation:
    command: List VM Image definitions in a gallery shared directly to your subscription or tenant.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        gallery-unique-name: The unique name of the Shared Gallery.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        marker: A string value that identifies the portion of the list of containers to be returned with the next listing operation. The operation returns the NextMarker value within the response body if the listing operation did not return all containers remaining to be listed with the current page. If specified, this generator will begin returning results from the point where the previous generator stopped.
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in ```
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        shared-to: |-
            The query parameter to decide what shared galleries to fetch when doing listing operations. If not specified, list by subscription id.

            Accepted values: tenant
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List an image definition in a gallery shared directly to your subscription in the given location.: az sig image-definition list-shared --gallery-unique-name galleryUniqueName --location myLocation
    List an image definition in a gallery shared directly to your tenant in the given location.: az sig image-definition list-shared --gallery-unique-name galleryUniqueName --location myLocation --shared-to tenant
