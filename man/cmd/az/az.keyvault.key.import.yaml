# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: import
description: Import a private key.
documentation:
    flag:
        byok-file: BYOK file containing the key to be imported. Must not be password protected.
        byok-string: BYOK string containing the key to be imported. Must not be password protected.
        exportable: Whether the private key can be exported. To create key with release policy, "exportable" must be true and caller must have "export" permission.
        hsm-name: Name of the HSM. (--hsm-name and --vault-name are mutually exclusive, please specify just one of them)
        id: Id of the key. If specified all other 'Id' arguments should be omitted.
        immutable: Mark a release policy as immutable. An immutable release policy cannot be changed or updated after being marked immutable. Release policies are mutable by default.
        name: Name of the key. Required if --id is not specified.
        policy: The policy rules under which the key can be exported. Policy definition as JSON, or a path to a file containing JSON policy definition.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --byok-file=: BYOK file containing the key to be imported.
    --byok-string=: BYOK string containing the key to be imported.
    --curve=: The curve name of the key to import (only for BYOK).
    --default-cvm-policy=: Use default policy under which the key can be exported for CVM disk encryption.
    --disabled=:
        description: Create key in disabled state.
        nargs: -1
    --expires=: Expiration UTC datetime  (Y-m-d'T'H:M:S'Z').
    --exportable=:
        description: Whether the private key can be exported.
        nargs: -1
    --hsm-name=: Name of the HSM.
    --id=: Id of the key.
    --immutable=:
        description: Mark a release policy as immutable.
        nargs: -1
    --kty=: The type of key to import (only for BYOK).
    --not-before=: Key not usable before the provided UTC datetime  (Y-m-d'T'H:M:S'Z').
    --ops=:
        description: Space-separated list of permitted JSON web key operations.
        nargs: -1
    --pem-file=: PEM file containing the key to be imported.
    --pem-password=: Password of PEM file.
    --pem-string=: PEM string containing the key to be imported.
    --policy=: The policy rules under which the key can be exported.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vault-name=: Name of the Vault.
    -n, --name=: Name of the key.
    -p, --protection=: Specifies the type of key protection.
completion:
    flag:
        curve:
            - P-256
            - P-384
            - P-521
            - P-256K
        disabled:
            - "true"
            - "false"
        exportable:
            - "true"
            - "false"
        immutable:
            - "true"
            - "false"
        kty:
            - EC
            - RSA
            - oct
        ops:
            - encrypt
            - decrypt
            - sign
            - verify
            - wrapKey
            - unwrapKey
            - import
            - export
        protection:
            - software
            - hsm
