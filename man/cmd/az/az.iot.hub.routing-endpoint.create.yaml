# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Add an endpoint to your IoT Hub.
documentation:
    flag:
        auth-type: Authentication type for the endpoint. The default is keyBased.
        batch-frequency: Request batch frequency in seconds. The maximum amount of time that can elapse before data is written to a blob, between 60 and 720 seconds.
        chunk-size: Request chunk size in megabytes(MB). The maximum size of blobs, between 10 and 500 MB.
        encoding: Encoding format for the container. The default is AVRO. Note that this field is applicable only for blob container endpoints.
        file-name-format: File name format for the blob. The file name format must contain {iothub}, {partition}, {YYYY}, {MM}, {DD}, {HH} and {mm} fields. All parameters are mandatory but can be reordered with or without delimiters.
        identity: Use a system-assigned or user-assigned managed identity for endpoint authentication. Use "[system]" to refer to the system-assigned identity or a resource ID to refer to a user-assigned identity. If you use --auth-type without this parameter, system-assigned managed identity is assumed.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --auth-type=: Authentication type for the endpoint.
    --container-name=: Name of the storage container.
    --encoding=: Encoding format for the container.
    --endpoint-uri=: The uri of the endpoint resource.
    --entity-path=: The entity path of the endpoint resource.
    --file-name-format=: File name format for the blob.
    --hub-name=!: IoT Hub name.
    --identity=: Use a system-assigned or user-assigned managed identity for endpoint authentication.
    --subscription=: Name or ID of subscription.
    -b, --batch-frequency=: Request batch frequency in seconds.
    -c, --connection-string=: Connection string of the Routing Endpoint.
    -g, --resource-group=: Name of resource group.
    -n, --endpoint-name=!: Name of the Routing Endpoint.
    -r, --endpoint-resource-group=!: Resource group of the Endpoint resoure.
    -s, --endpoint-subscription-id=!: SubscriptionId of the Endpoint resource.
    -t, --endpoint-type=!: Type of the Routing Endpoint.
    -w, --chunk-size=: Request chunk size in megabytes(MB).
completion:
    flag:
        auth-type:
            - keyBased
            - identityBased
        encoding:
            - json
            - avro
        endpoint-type:
            - eventhub
            - servicebusqueue
            - servicebustopic
            - azurestoragecontainer
