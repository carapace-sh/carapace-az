# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Container Apps environment.
flags:
    --custom-domain-certificate-file=: The filepath of the certificate file (.pfx or .pem) for the environment's custom domain.
    --custom-domain-certificate-password=: The certificate file password for the environment's custom domain.
    --custom-domain-dns-suffix=: The DNS suffix for the environment's custom domain.
    --dapr-instrumentation-key=: Application Insights instrumentation key used by Dapr to export Service to Service communication telemetry
    --docker-bridge-cidr=: CIDR notation IP range assigned to the Docker bridge.
    --enable-mtls=:
        description: Boolean indicating if mTLS peer authentication is enabled for the environment.
        nargs: -1
    --enable-peer-to-peer-encryption=:
        description: Boolean indicating whether the peer-to-peer traffic encryption is enabled for the environment.
        nargs: -1
    --internal-only=:
        description: Boolean indicating the environment only has an internal load balancer.
        nargs: -1
    --logs-destination=: Logs destination.
    --logs-workspace-id=: Workspace ID of the Log Analytics workspace to send diagnostics logs to.
    --logs-workspace-key=: Log Analytics workspace key to configure your Log Analytics workspace.
    --no-wait=: Do not wait for the long-running operation to finish.
    --platform-reserved-cidr=: IP range in CIDR notation that can be reserved for environment infrastructure IP addresses.
    --platform-reserved-dns-ip=: An IP address from the IP range defined by Platform Reserved CIDR that will be reserved for the internal DNS server.
    --storage-account=: Name or resource ID of the storage account used for Azure Monitor.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -d, --dapr-connection-string=: Application Insights connection string used by Dapr to export service to service communication telemetry.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location of resource.
    -n, --name=!: Name of the Container Apps environment.
    -s, --infrastructure-subnet-resource-id=: Resource ID of a subnet for infrastructure components and user app containers.
    -w, --enable-workload-profiles=:
        description: Boolean indicating if the environment is enabled to have workload profiles
        nargs: -1
    -z, --zone-redundant=: Enable zone redundancy on the environment.
completion:
    flag:
        enable-mtls:
            - "true"
            - "false"
        enable-peer-to-peer-encryption:
            - "true"
            - "false"
        enable-workload-profiles:
            - "true"
            - "false"
        internal-only:
            - "true"
            - "false"
        logs-destination:
            - log-analytics
            - azure-monitor
            - none
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        custom-domain-certificate-file: The filepath of the certificate file (.pfx or .pem) for the environment's custom domain. To manage certificates for container apps, use `az containerapp env certificate`.
        dapr-connection-string: Application Insights connection string used by Dapr to export service to service communication telemetry.
        docker-bridge-cidr: CIDR notation IP range assigned to the Docker bridge. It must not overlap with any Subnet IP ranges or the IP range defined in Platform Reserved CIDR, if defined
        enable-dedicated-gpu: |-
            Boolean indicating if the environment is enabled to have dedicated gpu.

            Default value: False

            Accepted values: false, true
        enable-mtls: |-
            Boolean indicating if mTLS peer authentication is enabled for the environment.

            Accepted values: false, true
        enable-peer-to-peer-encryption: |-
            Boolean indicating whether the peer-to-peer traffic encryption is enabled for the environment.

            Accepted values: false, true
        enable-workload-profiles: |-
            Boolean indicating if the environment is enabled to have workload profiles.

            Default value: True

            Accepted values: false, true
        environment-mode: Mode of the environment.
        infrastructure-resource-group: Name for resource group that will contain infrastructure resources. If not provided, a resource group name will be generated.
        infrastructure-subnet-resource-id: Resource ID of a subnet for infrastructure components and user app containers.
        internal-only: |-
            Boolean indicating the environment only has an internal load balancer. These environments do not have a public static IP resource, therefore must provide infrastructureSubnetResourceId if enabling this property.

            Default value: False

            Accepted values: false, true
        location: 'Location of resource. Examples: eastus2, northeurope.'
        logs-destination: |-
            Logs destination.

            Default value: log-analytics

            Accepted values: azure-monitor, log-analytics, none
        logs-dynamic-json-columns: |-
            Boolean indicating whether to parse json string log into dynamic json columns. Only work for destination log-analytics.

            Default value: False

            Accepted values: false, true
        logs-workspace-id: Workspace ID of the Log Analytics workspace to send diagnostics logs to. Only works with logs destination "log-analytics". You can use "az monitor log-analytics workspace create" to create one. Extra billing may apply.
        logs-workspace-key: Log Analytics workspace key to configure your Log Analytics workspace. Only works with logs destination "log-analytics". You can use "az monitor log-analytics workspace get-shared-keys" to retrieve the key.
        mi-system-assigned: |-
            Boolean indicating whether to assign system-assigned identity.

            Default value: False
        mi-user-assigned: Space-separated user identities to be assigned.
        name: Name of the Container Apps environment.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        platform-reserved-cidr: IP range in CIDR notation that can be reserved for environment infrastructure IP addresses. It must not overlap with any other Subnet IP ranges.
        platform-reserved-dns-ip: An IP address from the IP range defined by Platform Reserved CIDR that will be reserved for the internal DNS server.
        public-network-access: |-
            Allow or block all public traffic.

            Accepted values: Disabled, Enabled
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        storage-account: Name or resource ID of the storage account used for Azure Monitor. If this value is provided, Azure Monitor Diagnostic Settings will be created automatically.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        zone-redundant: |-
            Enable zone redundancy on the environment. Cannot be used without --infrastructure-subnet-resource-id. If used with --location, the subnet's location must match.

            Default value: False
examples:
    Create a zone-redundant environment: |-
        az containerapp env create -n MyContainerappEnvironment -g MyResourceGroup \
            --location eastus2 --zone-redundant
    Create an environment in consumption-only mode (no workload profiles).: |-
        az containerapp env create -n MyContainerappEnvironment -g MyResourceGroup \
            --location eastus2 --environment-mode ConsumptionOnly
    Create an environment with an auto-generated Log Analytics workspace.: |-
        az containerapp env create -n MyContainerappEnvironment -g MyResourceGroup \
            --location eastus2
    Create an environment with an existing Log Analytics workspace.: |-
        az containerapp env create -n MyContainerappEnvironment -g MyResourceGroup \
            --logs-workspace-id myLogsWorkspaceID \
            --logs-workspace-key myLogsWorkspaceKey \
            --location eastus2
    Create an environment with system assigned and user assigned identity.: |-
        az containerapp env create -n MyContainerappEnvironment -g MyResourceGroup \
            --location eastus2 --mi-system-assigned --mi-user-assigned MyUserIdentityResourceId
    Create an environment with workload profiles enabled (default mode).: |-
        az containerapp env create -n MyContainerappEnvironment -g MyResourceGroup \
            --location eastus2 --environment-mode WorkloadProfiles
    Create an environment with workload profiles enabled.: |-
        az containerapp env create -n MyContainerappEnvironment -g MyResourceGroup \
            --location eastus2 --enable-workload-profiles
    Create an environment without workload profiles enabled.: |-
        az containerapp env create -n MyContainerappEnvironment -g MyResourceGroup \
            --location eastus2 --enable-workload-profiles false
