# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a customer managed security assessment type.
flags:
    --description=!: Detailed string that will help users to understand the assessment and how it is calculated
    --display-name=!: Human readable title for this object
    --remediation-description=: Detailed string that will help users to understand the different ways to mitigate or fix the security issue
    --severity=!: Indicates the importance of the security risk if the assessment is unhealthy
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: Detailed string that will help users to understand the assessment and how it is calculated.
        display-name: Human readable title for this object.
        name: Name of the resource to be fetched.
        remediation-description: Detailed string that will help users to understand the different ways to mitigate or fix the security issue.
        severity: Indicates the importance of the security risk if the assessment is unhealthy.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Creates a security assessment type.: az security assessment-metadata create -n "4fb6c0a0-1137-42c7-a1c7-4bd37c91de8d" --display-name  "Resource should be secured" --severity "high" --description "The resource should be secured according to my company security policy"
