# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the properties of a VM.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --additional-scheduled-events=:
        description: The configuration parameter used while creating event grid and resource graph scheduled event setting.
        nargs: -1
    --capacity-reservation-group=: The ID or name of the capacity reservation group that is used to allocate.
    --disk-caching=:
        description: Use singular value to apply across, or specify individual disks, e.g. 'os=ReadWrite 0=None 1=ReadOnly' should enable update os disk and 2 data disks
        nargs: -1
    --disk-controller-type=: Specify the disk controller type configured for the VM or VMSS.
    --enable-hibernation=:
        description: The flag that enable or disable hibernation capability on the VM.
        nargs: -1
    --enable-proxy-agent=:
        description: Specify whether proxy agent feature should be enabled on the virtual machine or virtual machine scale set.
        nargs: -1
    --enable-secure-boot=:
        description: Enable secure boot.
        nargs: -1
    --enable-user-reboot-scheduled-events=:
        description: The configuration parameter used while publishing scheduled events additional publishing targets.
        nargs: -1
    --enable-user-redeploy-scheduled-events=:
        description: The configuration parameter used while creating user initiated redeploy scheduled event setting creation.
        nargs: -1
    --enable-vtpm=:
        description: Enable vTPM.
        nargs: -1
    --ephemeral-os-disk-placement=: Only applicable when used with `--size`.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --host-group=: Name or resource ID of the dedicated host group that the VM will reside in.
    --host=: Resource ID of the dedicated host that the VM will reside in.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --license-type=: Specifies that the Windows image or disk was licensed on-premises.
    --max-price=: The maximum price (in US Dollars) you are willing to pay for a Spot VM/VMSS.
    --no-wait=: Do not wait for the long-running operation to finish.
    --os-disk=: Managed OS disk ID or name to swap to
    --ppg=: The name or ID of the proximity placement group the VM should be associated with.
    --priority=: Priority.
    --proxy-agent-mode=: Specify the mode that proxy agent will execute on if the feature is enabled.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --security-type=: Specify the security type of the virtual machine.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --size=: The new size of the virtual machine.
    --subscription=: Name or ID of subscription.
    --ultra-ssd-enabled=:
        description: Enables or disables the capability to have 1 or more managed data disks with UltraSSD_LRS storage account
        nargs: -1
    --user-data=: UserData for the VM.
    --v-cpus-available=: Specify the number of vCPUs available
    --v-cpus-per-core=: Specify the ratio of vCPU to physical core.
    --workspace=: Name or ID of Log Analytics Workspace.
    --write-accelerator=:
        description: enable/disable disk write accelerator.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Virtual Machine.
completion:
    flag:
        additional-scheduled-events:
            - "true"
            - "false"
        disk-controller-type:
            - SCSI
            - NVMe
        enable-hibernation:
            - "true"
            - "false"
        enable-proxy-agent:
            - "true"
            - "false"
        enable-secure-boot:
            - "true"
            - "false"
        enable-user-reboot-scheduled-events:
            - "true"
            - "false"
        enable-user-redeploy-scheduled-events:
            - "true"
            - "false"
        enable-vtpm:
            - "true"
            - "false"
        ephemeral-os-disk-placement:
            - CacheDisk
            - ResourceDisk
            - NvmeDisk
        license-type:
            - Windows_Server
            - Windows_Client
            - RHEL_BYOS
            - SLES_BYOS
            - RHEL_BASE
            - RHEL_SAPAPPS
            - RHEL_SAPHA
            - RHEL_EUS
            - RHEL_BASESAPAPPS
            - RHEL_BASESAPHA
            - SLES_STANDARD
            - SLES
            - SLES_SAP
            - SLES_HPC
            - None
            - RHEL_ELS_6
            - UBUNTU_PRO
            - UBUNTU
        priority:
            - Regular
            - Low
            - Spot
        proxy-agent-mode:
            - Audit
            - Enforce
        security-type:
            - TrustedLaunch
            - Standard
        ultra-ssd-enabled:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |+
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []

            Accepted values: false, true

        capacity-reservation-group: The ID or name of the capacity reservation group that is used to allocate. Pass in "None" to disassociate the capacity reservation group. Please note that if you want to delete a VM/VMSS that has been associated with capacity reservation group, you need to disassociate the capacity reservation group first.
        change-reference: The related change reference ID for this resource operation.
        disk-caching: Use singular value to apply across, or specify individual disks, e.g. 'os=ReadWrite 0=None 1=ReadOnly' should enable update os disk and 2 data disks.
        disk-controller-type: |-
            Specify the disk controller type configured for the VM or VMSS.

            Accepted values: NVMe, SCSI
        enable-hibernation: |-
            The flag that enable or disable hibernation capability on the VM.

            Accepted values: false, true
        enable-proxy-agent: |+
            Specify whether metadata security protoco (proxy agent) feature should be enabled on the virtual machine or virtual machine scale set.

            Accepted values: false, true

        enable-secure-boot: |-
            Enable secure boot.

            Accepted values: false, true
        enable-vtpm: |-
            Enable vTPM.

            Accepted values: false, true
        ephemeral-os-disk-placement: Only applicable when used with `--size`. Allows you to choose the Ephemeral OS disk provisioning location.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        host: Resource ID of the dedicated host that the VM will reside in. --host and --host-group can't be used together. You should deallocate the VM before update, and start the VM after update. Please check out help for more examples.
        host-group: Name or resource ID of the dedicated host group that the VM will reside in. --host and --host-group can't be used together. You should deallocate the VM before update, and start the VM after update. Please check out help for more examples.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        imds-mode: |-
            Specify the mode that proxy agent will execute on if the feature is enabled.

            Accepted values: Audit, Enforce
        key-incarnation-id: Increase the value of this property allows user to reset the key used for securing communication channel between guest and host.
        license-type: |-
            Specifies that the Windows image or disk was licensed on-premises. To enable Azure Hybrid Benefit for Windows Server, use 'Windows_Server'. To enable Multi-tenant Hosting Rights for Windows 10, use 'Windows_Client'. For more information see the Azure Windows VM online docs.

            Accepted values: None, RHEL_BASE, RHEL_BASESAPAPPS, RHEL_BASESAPHA, RHEL_BYOS, RHEL_ELS_6, RHEL_EUS, RHEL_SAPAPPS, RHEL_SAPHA, SLES, SLES_BYOS, SLES_HPC, SLES_SAP, SLES_STANDARD, UBUNTU, UBUNTU_PRO, Windows_Client, Windows_Server
        max-price: The maximum price (in US Dollars) you are willing to pay for a Spot VM/VMSS. -1 indicates that the Spot VM/VMSS should not be evicted for price reasons.
        name: The name of the Virtual Machine. You can configure the default using ``` az configure --defaults vm=<name> ``` .
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        os-disk: Managed OS disk ID or name to swap to.
        ppg: The name or ID of the proximity placement group the VM should be associated with.
        priority: |-
            Priority. Use 'Spot' to run short-lived workloads in a cost-effective way. 'Low' enum will be deprecated in the future. Please use 'Spot' to deploy Azure spot VM and/or VMSS. Default to Regular.

            Accepted values: Low, Regular, Spot
        proxy-agent-mode: |-
            Option '--proxy-agent-mode' has been deprecated and will be removed in a future release. Use '--wire-server-mode' instead. Specify the mode that proxy agent will execute on if the feature is enabled.

            Accepted values: Audit, Enforce
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        security-type: |-
            Specify the security type of the virtual machine. The value Standard can be used if subscription has feature flag UseStandardSecurityType registered under Microsoft.Compute namespace. Refer to https://learn.microsoft.com/en-us/azure/azure-resource-manager/management/preview-features for steps to enable required feature.

            Accepted values: ConfidentialVM, Standard, TrustedLaunch
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        size: |-
            ``` . Allows you to choose the Ephemeral OS disk provisioning location.

            Accepted values: CacheDisk, NvmeDisk, ResourceDisk
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        ultra-ssd-enabled: |-
            Enables or disables the capability to have 1 or more managed data disks with UltraSSD_LRS storage account.

            Accepted values: false, true
        user-data: UserData for the VM. It can be passed in as file or string. If empty string is passed in, the existing value will be deleted.
        v-cpus-available: Specify the number of vCPUs available.
        v-cpus-per-core: Specify the ratio of vCPU to physical core. Setting this property to 1 also means that hyper-threading is disabled. --wire-server-access-control-profile-reference-id --wire-server-profile-id Specify the access control profile version resource id of wire server.
        wire-server-mode: |-
            Specify the mode that proxy agent will execute on if the feature is enabled.

            Accepted values: Audit, Enforce
        workspace: Name or ID of Log Analytics Workspace. If you specify the workspace through its name, the workspace should be in the same resource group with the vm, otherwise a new workspace will be created.
        write-accelerator: Enable/disable disk write accelerator. Use singular value 'true/false' to apply across, or specify individual disks, e.g.'os=true 1=true 2=true' for os disk and data disks with lun of 1 & 2.
        zone: Availability zone into which to provision the resource.
        zone-movement: |-
            Indicates if zone movement is enabled. By default isEnabled is set to false i.e VM can't be moved from one zone to another.

            Accepted values: false, true
examples:
    Add a new non-primary NIC to a VM.: az vm update -n name -g group --add networkProfile.networkInterfaces primary=false id={NIC_ID}
    Add an existing VM to a dedicated host: |-
        az vm deallocate -n name -g group
        az vm update -n name -g group --host my-host
        az vm start -n name -g group
    Add an existing VM to a dedicated host group: |-
        az vm deallocate -n name -g group
        az vm update -n name -g group --host-group my-host-group
        az vm start -n name -g group
    Add or update a tag.: az vm update -n name -g group --set tags.tagName=tagValue
    Remove a tag.: az vm update -n name -g group --remove tags.tagName
    Remove the fourth NIC from a VM.: az vm update -n name -g group --remove networkProfile.networkInterfaces 3
    Set the primary NIC of a VM.: az vm update -n name -g group --set networkProfile.networkInterfaces[1].primary=false networkProfile.networkInterfaces[0].primary=true
