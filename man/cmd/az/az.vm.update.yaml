# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the properties of a VM.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        capacity-reservation-group: The ID or name of the capacity reservation group that is used to allocate. Pass in "None" to disassociate the capacity reservation group. Please note that if you want to delete a VM/VMSS that has been associated with capacity reservation group, you need to disassociate the capacity reservation group first.
        ephemeral-os-disk-placement: Only applicable when used with `--size`. Allows you to choose the Ephemeral OS disk provisioning location.
        host: Resource ID of the dedicated host that the VM will reside in. --host and --host-group can't be used together. You should deallocate the VM before update, and start the VM after update. Please check out help for more examples.
        host-group: Name or resource ID of the dedicated host group that the VM will reside in. --host and --host-group can't be used together. You should deallocate the VM before update, and start the VM after update. Please check out help for more examples.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        license-type: Specifies that the Windows image or disk was licensed on-premises. To enable Azure Hybrid Benefit for Windows Server, use 'Windows_Server'. To enable Multi-tenant Hosting Rights for Windows 10, use 'Windows_Client'. For more information see the Azure Windows VM online docs.
        max-price: The maximum price (in US Dollars) you are willing to pay for a Spot VM/VMSS. -1 indicates that the Spot VM/VMSS should not be evicted for price reasons
        name: The name of the Virtual Machine. You can configure the default using `az configure --defaults vm=<name>`
        priority: Priority. Use 'Spot' to run short-lived workloads in a cost-effective way. 'Low' enum will be deprecated in the future. Please use 'Spot' to deploy Azure spot VM and/or VMSS. Default to Regular.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        size: The new size of the virtual machine. See https://azure.microsoft.com/pricing/details/virtual-machines/ for size info.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-data: UserData for the VM. It can be passed in as file or string. If empty string is passed in, the existing value will be deleted.
        v-cpus-per-core: Specify the ratio of vCPU to physical core. Setting this property to 1 also means that hyper-threading is disabled.
        workspace: Name or ID of Log Analytics Workspace. If you specify the workspace through its name, the workspace should be in the same resource group with the vm, otherwise a new workspace will be created.
        write-accelerator: enable/disable disk write accelerator. Use singular value 'true/false' to apply across, or specify individual disks, e.g.'os=true 1=true 2=true' for os disk and data disks with lun of 1 & 2
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --additional-scheduled-events=:
        description: The configuration parameter used while creating event grid and resource graph scheduled event setting.
        nargs: -1
    --capacity-reservation-group=: The ID or name of the capacity reservation group that is used to allocate.
    --disk-caching=:
        description: Use singular value to apply across, or specify individual disks, e.g. 'os=ReadWrite 0=None 1=ReadOnly' should enable update os disk and 2 data disks
        nargs: -1
    --disk-controller-type=: Specify the disk controller type configured for the VM or VMSS.
    --enable-hibernation=:
        description: The flag that enable or disable hibernation capability on the VM.
        nargs: -1
    --enable-proxy-agent=:
        description: Specify whether proxy agent feature should be enabled on the virtual machine or virtual machine scale set.
        nargs: -1
    --enable-secure-boot=:
        description: Enable secure boot.
        nargs: -1
    --enable-user-reboot-scheduled-events=:
        description: The configuration parameter used while publishing scheduled events additional publishing targets.
        nargs: -1
    --enable-user-redeploy-scheduled-events=:
        description: The configuration parameter used while creating user initiated redeploy scheduled event setting creation.
        nargs: -1
    --enable-vtpm=:
        description: Enable vTPM.
        nargs: -1
    --ephemeral-os-disk-placement=: Only applicable when used with `--size`.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --host-group=: Name or resource ID of the dedicated host group that the VM will reside in.
    --host=: Resource ID of the dedicated host that the VM will reside in.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --license-type=: Specifies that the Windows image or disk was licensed on-premises.
    --max-price=: The maximum price (in US Dollars) you are willing to pay for a Spot VM/VMSS.
    --no-wait=: Do not wait for the long-running operation to finish.
    --os-disk=: Managed OS disk ID or name to swap to
    --ppg=: The name or ID of the proximity placement group the VM should be associated with.
    --priority=: Priority.
    --proxy-agent-mode=: Specify the mode that proxy agent will execute on if the feature is enabled.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --security-type=: Specify the security type of the virtual machine.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --size=: The new size of the virtual machine.
    --subscription=: Name or ID of subscription.
    --ultra-ssd-enabled=:
        description: Enables or disables the capability to have 1 or more managed data disks with UltraSSD_LRS storage account
        nargs: -1
    --user-data=: UserData for the VM.
    --v-cpus-available=: Specify the number of vCPUs available
    --v-cpus-per-core=: Specify the ratio of vCPU to physical core.
    --workspace=: Name or ID of Log Analytics Workspace.
    --write-accelerator=:
        description: enable/disable disk write accelerator.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Virtual Machine.
completion:
    flag:
        additional-scheduled-events:
            - "true"
            - "false"
        disk-controller-type:
            - SCSI
            - NVMe
        enable-hibernation:
            - "true"
            - "false"
        enable-proxy-agent:
            - "true"
            - "false"
        enable-secure-boot:
            - "true"
            - "false"
        enable-user-reboot-scheduled-events:
            - "true"
            - "false"
        enable-user-redeploy-scheduled-events:
            - "true"
            - "false"
        enable-vtpm:
            - "true"
            - "false"
        ephemeral-os-disk-placement:
            - CacheDisk
            - ResourceDisk
            - NvmeDisk
        license-type:
            - Windows_Server
            - Windows_Client
            - RHEL_BYOS
            - SLES_BYOS
            - RHEL_BASE
            - RHEL_SAPAPPS
            - RHEL_SAPHA
            - RHEL_EUS
            - RHEL_BASESAPAPPS
            - RHEL_BASESAPHA
            - SLES_STANDARD
            - SLES
            - SLES_SAP
            - SLES_HPC
            - None
            - RHEL_ELS_6
            - UBUNTU_PRO
            - UBUNTU
        priority:
            - Regular
            - Low
            - Spot
        proxy-agent-mode:
            - Audit
            - Enforce
        security-type:
            - TrustedLaunch
            - Standard
        ultra-ssd-enabled:
            - "true"
            - "false"
