# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates an Azure Cosmos DB Sql Role Assignment
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Cosmosdb account name.
    -d, --role-definition-id=: Unique ID of the Role Definition that this Role Assignment refers to.
    -g, --resource-group=!: Name of resource group.
    -i, --role-assignment-id=!: Optional for Create.
    -n, --role-definition-name=: Unique Name of the Role Definition that this Role Assignment refers to.
    -p, --principal-id=: AAD Object ID of the principal to which this Role Assignment is being granted.
    -s, --scope=: Data plane resource path at which this Role Assignment is being granted.
documentation:
    command: Update a SQL role assignment under an Azure Cosmos DB account.
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        principal-id: AAD Object ID of the principal to which this Role Assignment is being granted.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        role-assignment-id: Optional for Create. Unique ID for the Role Assignment. If not provided, a new GUID will be used.
        role-definition-id: Unique ID of the Role Definition that this Role Assignment refers to.
        role-definition-name: Unique Name of the Role Definition that this Role Assignment refers to. Eg. 'Contoso Reader Role'.
        scope: Data plane resource path at which this Role Assignment is being granted.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a SQL role assignment under an Azure Cosmos DB account.: |-
        az cosmosdb sql role assignment update --account-name MyAccount --resource-group MyResourceGroup \
          --role-assignment-id cb8ed2d7-2371-4e3c-bd31-6cc1560e84f8 \
          --role-definition-id updated-role-definition-id
