# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an existing Recovery Services vault.
documentation:
    flag:
        cross-region-restore-flag: 'Set cross-region-restore feature state for a Recovery Services Vault. Default: False.'
        cross-subscription-restore-state: Use this parameter to configure cross subscription restore settings for the vault. By default, the property is "Enabled" for the vault.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        immutability-state: Use this parameter to configure immutability settings for the vault. By default, immutability is "Disabled" for the vault. "Unlocked" means that immutability is enabled for the vault and can be reversed. "Locked" means that immutability is enabled for the vault and cannot be reversed.
        public-network-access: Use this property to specify whether public network access for the vault should be enabled or disabled. It is enabled by default. For setting up private endpoints, it has to be disabled.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --backup-storage-redundancy=: Set backup storage properties for a Recovery Services vault.
    --classic-alerts=: Use this property to specify whether backup alerts from the classic solution should be received.
    --cross-region-restore-flag=: Set cross-region-restore feature state for a Recovery Services Vault.
    --cross-subscription-restore-state=: Use this parameter to configure cross subscription restore settings for the vault.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --immutability-state=: Use this parameter to configure immutability settings for the vault.
    --job-failure-alerts=: Use this property to specify whether built-in Azure Monitor alerts should be received for every job failure.
    --public-network-access=: Use this property to specify whether public network access for the vault should be enabled or disabled.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Recovery services vault.
completion:
    flag:
        backup-storage-redundancy:
            - GeoRedundant
            - LocallyRedundant
            - ZoneRedundant
        classic-alerts:
            - Enable
            - Disable
        cross-region-restore-flag:
            - Enabled
            - Disabled
        cross-subscription-restore-state:
            - Enable
            - Disable
            - PermanentlyDisable
        immutability-state:
            - Disabled
            - Locked
            - Unlocked
        job-failure-alerts:
            - Enable
            - Disable
        public-network-access:
            - Enable
            - Disable
