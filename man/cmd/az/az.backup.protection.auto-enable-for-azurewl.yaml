# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: auto-enable-for-azurewl
description: Automatically protect all existing unprotected DBs and any DB which will be added later with the given policy.
documentation:
    flag:
        protectable-item-type: Specify the type of items within the Resource which should be discovered and protected by Azure Backup. 'HANAInstance' and 'SAPHanaSystem' can be used interchangeably.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workload-type: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup. 'MSSQL' and 'SQLDataBase' can be used interchangeably for SQL in Azure VM, as can 'SAPHANA' and 'SAPHanaDatabase' for SAP HANA in Azure VM.
flags:
    --protectable-item-name=!: Specify the resource name to be protected by Azure Backup service.
    --protectable-item-type=!: Specify the type of items within the Resource which should be discovered and protected by Azure Backup.
    --server-name=!: Parent Server name of the item.
    --subscription=: Name or ID of subscription.
    --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
    -g, --resource-group=!: Name of resource group.
    -p, --policy-name=!: Name of the backup policy.
    -v, --vault-name=!: Name of the Recovery services vault.
completion:
    flag:
        protectable-item-type:
            - SQLAG
            - SQLInstance
            - SQLDatabase
            - HANAInstance
            - SAPHanaDatabase
            - SAPHanaSystem
        workload-type:
            - VM
            - AzureFileShare
            - SAPHANA
            - MSSQL
            - SAPHanaDatabase
            - SQLDataBase
