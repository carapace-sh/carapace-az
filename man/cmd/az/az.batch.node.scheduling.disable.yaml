# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: disable
description: Disables Task scheduling on the specified Compute Node.
documentation:
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT'
        json-file: A file containing the parameters specification in JSON (formatted to match the respective REST API body). If this parameter is specified, all 'Parameters Arguments' are ignored.
        node-disable-scheduling-option: 'What to do with currently running Tasks when disabling Task scheduling on the Compute Node. The default value is requeue. Known values are: "requeue", "terminate", and "taskcompletion".'
        node-id: The ID of the Compute Node on which you want to disable Task scheduling. Required.
        pool-id: The ID of the Pool that contains the Compute Node. Required.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --json-file=: A file containing the parameters specification in JSON (formatted to match the respective REST API body).
    --node-disable-scheduling-option=: What to do with currently running Tasks when disabling Task scheduling on the Compute Node.
    --node-id=!: The ID of the Compute Node on which you want to disable Task scheduling.
    --pool-id=!: The ID of the Pool that contains the Compute Node.
    --subscription=: Name or ID of subscription.
