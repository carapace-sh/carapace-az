# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: invoke-command
description: Invokes a command in Azure Managed Cassandra Cluster host
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --arguments=:
        description: The key="value" of arguments for the command.
        nargs: -1
    --cassandra-stop-start=:
        description: If true, stops cassandra before executing the command and then start it again.
        nargs: -1
    --command-name=!: The command which should be run
    --host=!: IP address of the cassandra host to run the command on
    --no-wait=: Do not wait for the long-running operation to finish.
    --readwrite=:
        description: If true, allows the command to *write* to the cassandra directory, otherwise read-only.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Cluster Name
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        cassandra-stop-start:
            - "true"
            - "false"
        readwrite:
            - "true"
            - "false"
