# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: invoke-command
description: Invokes a command in Azure Managed Cassandra Cluster host
flags:
    --arguments=:
        description: The key="value" of arguments for the command.
        nargs: -1
    --cassandra-stop-start=:
        description: If true, stops cassandra before executing the command and then start it again.
        nargs: -1
    --command-name=!: The command which should be run
    --host=!: IP address of the cassandra host to run the command on
    --no-wait=: Do not wait for the long-running operation to finish.
    --readwrite=:
        description: If true, allows the command to *write* to the cassandra directory, otherwise read-only.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Cluster Name
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        cassandra-stop-start:
            - "true"
            - "false"
        readwrite:
            - "true"
            - "false"
documentation:
    command: Invoke a command like nodetool for cassandra maintenance.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        arguments: The key="value" of arguments for the command.
        cassandra-stop-start: |-
            If true, stops cassandra before executing the command and then start it again.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Cluster Name.
        command-name: The command which should be run.
        host: IP address of the cassandra host to run the command on.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        readwrite: |-
            If true, allows the command to write to the cassandra directory, otherwise read-only.

            Accepted values: false, true
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    This command runs nodetool with these arguments in a host node of the cluster.: az managed-cassandra cluster invoke-command --resource-group MyResourceGroup --cluster-name MyCluster --host "10.0.1.12" --command-name "nodetool" --arguments arg1="value1" arg2="value2" arg3="value3"
