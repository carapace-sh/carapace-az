# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the properties of a Vault.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --bypass=: Bypass traffic for space-separated uses.
    --default-action=: Default action to apply when no rule matches.
    --enable-purge-protection=:
        description: Property specifying whether protection against purge is enabled for this vault/managed HSM pool.
        nargs: -1
    --enable-rbac-authorization=:
        description: Property that controls how data actions are authorized.
        nargs: -1
    --enabled-for-deployment=:
        description: '[Vault Only] Property to specify whether Azure Virtual Machines are permitted to retrieve certificates stored as secrets from the key vault.'
        nargs: -1
    --enabled-for-disk-encryption=:
        description: '[Vault Only] Property to specify whether Azure Disk Encryption is permitted to retrieve secrets from the vault and unwrap keys.'
        nargs: -1
    --enabled-for-template-deployment=:
        description: '[Vault Only] Property to specify whether Azure Resource Manager is permitted to retrieve secrets from the key vault.'
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --no-wait=: Do not wait for the long-running operation to finish.
    --public-network-access=: Control permission for data plane traffic coming from public networks while private endpoint is enabled
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --retention-days=: Soft delete data retention days.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Proceed only if Key Vault belongs to the specified resource group.
    -n, --name=!: Name of the Vault.
completion:
    flag:
        bypass:
            - AzureServices
            - None
        default-action:
            - Allow
            - Deny
        enable-purge-protection:
            - "true"
            - "false"
        enable-rbac-authorization:
            - "true"
            - "false"
        enabled-for-deployment:
            - "true"
            - "false"
        enabled-for-disk-encryption:
            - "true"
            - "false"
        enabled-for-template-deployment:
            - "true"
            - "false"
        public-network-access:
            - Enabled
            - Disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        bypass: |-
            Bypass traffic for space-separated uses.

            Accepted values: AzureServices, None
        change-reference: The related change reference ID for this resource operation.
        default-action: |-
            Default action to apply when no rule matches.

            Accepted values: Allow, Deny
        enable-purge-protection: |-
            Property specifying whether protection against purge is enabled for this vault/managed HSM pool. Setting this property to true activates protection against purge for this vault/managed HSM pool and its content - only the Key Vault/Managed HSM service may initiate a hard, irrecoverable deletion. The setting is effective only if soft delete is also enabled. Enabling this functionality is irreversible.

            Accepted values: false, true
        enable-rbac-authorization: |-
            Property that controls how data actions are authorized. When true, the key vault will use Role Based Access Control (RBAC) for authorization of data actions, and the access policies specified in vault properties will be ignored. When false, the key vault will use the access policies specified in vault properties, and any policy stored on Azure Resource Manager will be ignored. If null or not specified, the vault is created with the default value of true. Note that management actions are always authorized with RBAC.

            Accepted values: false, true
        enabled-for-deployment: |-
            [Vault Only] Property to specify whether Azure Virtual Machines are permitted to retrieve certificates stored as secrets from the key vault.

            Accepted values: false, true
        enabled-for-disk-encryption: |-
            [Vault Only] Property to specify whether Azure Disk Encryption is permitted to retrieve secrets from the vault and unwrap keys.

            Accepted values: false, true
        enabled-for-template-deployment: |-
            [Vault Only] Property to specify whether Azure Resource Manager is permitted to retrieve secrets from the key vault.

            Accepted values: false, true
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        name: Name of the Vault.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        public-network-access: |-
            Control permission for data plane traffic coming from public networks while private endpoint is enabled.

            Accepted values: Disabled, Enabled
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group.
        retention-days: Soft delete data retention days. It accepts >=7 and <=90.
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update the properties of a Vault. (autogenerated): az keyvault update --enabled-for-disk-encryption true --name MyKeyVault --resource-group MyResourceGroup
