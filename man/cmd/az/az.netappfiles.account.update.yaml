# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the specified NetApp account within the resource group
flags:
    --active-directories=:
        description: Active Directories  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --key-name=: The name of KeyVault key.
    --key-source=: The encryption keySource (provider).
    --keyvault-resource-id=: The resource ID of KeyVault.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    --type=: Type of managed service identity (where both SystemAssigned and UserAssigned types are allowed).
    -a, --name=: The name of the NetApp account
    -g, --resource-group=: Name of resource group.
    -u, --user-assigned-identity=: The ARM resource identifier of the user assigned identity used to authenticate with key vault.
    -v, --key-vault-uri=: The Uri of KeyVault.
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        key-source:
            - Microsoft.KeyVault
            - Microsoft.NetApp
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        type:
            - None
            - SystemAssigned
            - SystemAssigned,UserAssigned
            - UserAssigned
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        active-directories: Active Directories  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        encryption-identity: Identity used to authenticate to KeyVault. Applicable if keySource is 'Microsoft.KeyVault'.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        federated-client-id: ClientId of the multi-tenant AAD Application. Used to access cross-tenant keyvaults.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes

            Accepted values: None, SystemAssigned, SystemAssigned,UserAssigned, UserAssigned
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        key-name: The name of KeyVault key.
        key-source: |-
            The encryption keySource (provider). Possible values (case-insensitive):  Microsoft.NetApp, Microsoft.KeyVault.

            Accepted values: Microsoft.KeyVault, Microsoft.NetApp
        key-vault-uri: The Uri of KeyVault.
        nfs-v4-id-domain: Domain for NFSv4 user ID mapping. This property will be set for all NetApp accounts in the subscription and region and only affect non ldap NFSv4 volumes.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        user-assigned-identity: The ARM resource identifier of the user assigned identity used to authenticate with key vault. Applicable if identity.type has 'UserAssigned'. It should match key of identity.userAssignedIdentities.
examples:
    Update an ANF account enabling CMK encryption: az netappfiles account update -g mygroup -a myname --key-source Microsoft.KeyVault --key-name cmkKey --key-vault-uri https://mykvuri.vault.azure.net/ --keyvault-resource-id myKeyVaultResourceId --identity-type UserAssigned --user-assigned-identity '/subscriptions/xxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourcegroups/myrg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/anf-mi'
    Update the tags of an ANF account: az netappfiles account update -g mygroup --name myname --tags testtag2=mytagb
