# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all containers under the specified storage account.
flags:
    --include-deleted=: Include soft deleted containers when specified.
    --storage-account=!: The name or ID of the storage account.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        include-deleted: Include soft deleted containers when specified.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        storage-account: The name or ID of the storage account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all containers under the specified storage account(account id).: az storage container-rm list --storage-account myaccountid
    List all containers under the specified storage account, including deleted ones.: az storage container-rm list --storage-account myaccount --include-deleted
    List all containers under the specified storage account.: az storage container-rm list --storage-account myaccount
