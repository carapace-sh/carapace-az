# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: backup
description: Request that a backup of the specified key be downloaded to the client.
documentation:
    flag:
        hsm-name: Name of the HSM. (--hsm-name and --vault-name are mutually exclusive, please specify just one of them)
        id: Id of the key. If specified all other 'Id' arguments should be omitted.
        name: Name of the key. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --hsm-name=: Name of the HSM.
    --id=: Id of the key.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Vault.
    -f, --file=!: Local file path in which to store key backup.
    -n, --name=: Name of the key.
