# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a scoped resource for a private link scope resource.
flags:
    --linked-resource=: ARM resource ID of the linked resource.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --scope-name=!: Name of the Azure Monitor Private Link Scope.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the assigned resource.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: |-
        Command group 'az monitor private-link-scope scoped-resource' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        linked-resource: ARM resource ID of the linked resource. It should be one of log analytics workspace or application insights component.
        name: Name of the assigned resource.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scope-name: Name of the Azure Monitor Private Link Scope.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a scoped resource for a private link scope resource.: az monitor private-link-scope scoped-resource create -g MyResourceGroup -n MyName --linked-resource MyID --scope-name MyScope
