# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: attach
description: Attach a managed persistent disk to a VM.
flags:
    --caching=: Disk caching policy
    --disk-ids=:
        description: The disk IDs of the managed disk (space-delimited).
        nargs: -1
    --disks=:
        description: One or more names or IDs of the managed disk (space-delimited).
        nargs: -1
    --enable-write-accelerator=: enable write accelerator
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --lun=: 0-based logical unit number (LUN).
    --new=: create a new disk
    --sku=: Underlying storage SKU
    --subscription=: Name or ID of subscription.
    --vm-name=!: The name of the Virtual Machine.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name or ID of the managed disk
    -z, --size-gb=: size in GB.
completion:
    flag:
        caching:
            - None
            - ReadOnly
            - ReadWrite
        sku:
            - Standard_LRS
            - Premium_LRS
            - StandardSSD_LRS
            - UltraSSD_LRS
            - Premium_ZRS
            - StandardSSD_ZRS
            - PremiumV2_LRS
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        caching: |-
            Disk caching policy.

            Accepted values: None, ReadOnly, ReadWrite
        change-reference: The related change reference ID for this resource operation.
        disk-ids: The disk IDs of the managed disk (space-delimited).
        disks: One or more names or IDs of the managed disk (space-delimited).
        enable-write-accelerator: |-
            Enable write accelerator.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        lun: 0-based logical unit number (LUN). Max value depends on the Virtual Machine size.
        name: The name or ID of the managed disk.
        new: |-
            Create a new disk.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        size-gb: 'size in GB. Max size: 4095 GB (certain preview disks can be larger).'
        sku: |-
            Underlying storage SKU.

            Accepted values: PremiumV2_LRS, Premium_LRS, Premium_ZRS, StandardSSD_LRS, StandardSSD_ZRS, Standard_LRS, UltraSSD_LRS
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-name: The name of the Virtual Machine. You can configure the default using ``` az configure --defaults vm=<name> ``` .
examples:
    Attach a managed persistent disk to a VM. (autogenerated): az vm disk attach --name $diskId --new --resource-group MyResourceGroup --size-gb 128 --sku Standard_LRS --vm-name MyVm
    Attach a new default sized (1023 GB) managed data disk to a VM.: az vm disk attach -g MyResourceGroup --vm-name MyVm --name disk_name --new
    Attach multiple managed disks to a VM.: az vm disk attach --vm-name MyVm --resource-group MyResourceGroup --sku Standard_LRS --disks diskId1 diskId2 diskId3
