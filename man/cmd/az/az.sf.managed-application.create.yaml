# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new managed application on an Azure Service Fabric managed cluster.
flags:
    --name=!: Specify the application name.
    --package-url=: Specify the url of the application package sfpkg file.
    --parameters=:
        description: Specify the application parameters as key/value pairs.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --type-name=!: Specify the application type name.
    --version=!: Specify the application type version.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        package-url: Specify the url of the application package sfpkg file.
        parameters: 'Specify the application parameters as key/value pairs. These parameters must exist in the application manifest. for example: --application-parameters param1=value1 param2=value2'
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create application "testApp" and app type version using the package url provided.: |-
        az sf managed-application create -g testRG -c testCluster --application-name testApp --application-type-name TestAppType \
          --application-type-version v1 --package-url "https://sftestapp.blob.core.windows.net/sftestapp/testApp_1.0.sfpkg" \
            --application-parameters key0=value0
    ? Create managed application "testApp" with parameters. The application type "TestAppType" version "v1" should already exist in the cluster, and the application parameters should be defined in the application manifest.
    : |-
        az sf managed-application create -g testRG -c testCluster --application-name testApp --application-type-name TestAppType \
          --application-type-version v1 --application-parameters key0=value0 --tags key1=value1
