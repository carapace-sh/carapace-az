# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new managed application.
flags:
    --kind=!: the managed application kind.
    --parameters=: JSON formatted string or a path to a file with such content
    --plan-name=: the managed application package plan name
    --plan-product=: the managed application package plan product
    --plan-publisher=: the managed application package plan publisher
    --plan-version=: the managed application package plan version
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -d, --managedapp-definition-id=: the full qualified managed application definition id
    -g, --resource-group=!: the resource group of the managed application
    -l, --location=: the managed application location
    -m, --managed-rg-id=!: the resource group managed by the managed application
    -n, --name=!: the managed application name
documentation:
    command: Create a managed application.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        kind: The managed application kind. can be marketplace or servicecatalog.
        location: The managed application location.
        managed-rg-id: The resource group managed by the managed application.
        managedapp-definition-id: The full qualified managed application definition id.
        name: The managed application name.
        parameters: JSON formatted string or a path to a file with such content.
        plan-name: The managed application package plan name.
        plan-product: The managed application package plan product.
        plan-publisher: The managed application package plan publisher.
        plan-version: The managed application package plan version.
        resource-group: The resource group of the managed application.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    ? Create a managed application of kind 'MarketPlace'. This requires a valid plan, containing details about existing marketplace package like plan name, version, publisher and product.
    : |-
        az managedapp create -g MyResourceGroup -n MyManagedApp -l westcentralus --kind MarketPlace \
            -m "/subscriptions/{SubID}/resourceGroups/{ManagedResourceGroup}" \
            --plan-name ContosoAppliance --plan-version "1.0" --plan-product "contoso-appliance" --plan-publisher Contoso
    Create a managed application of kind 'ServiceCatalog'. This requires a valid managed application definition ID.: |-
        az managedapp create -g MyResourceGroup -n MyManagedApp -l westcentralus --kind ServiceCatalog \
            -m "/subscriptions/{SubID}/resourceGroups/{ManagedResourceGroup}" \
            -d "/subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Solutions/applianceDefinitions/{ApplianceDefinition}"
