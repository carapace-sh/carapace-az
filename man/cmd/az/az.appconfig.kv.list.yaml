# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List key-values.
flags:
    --all=: List all items.
    --auth-mode=: This parameter can be used for indicating how a data operation is to be authorized.
    --connection-string=: Combination of access key and endpoint of the App Configuration store.
    --datetime=: 'Format: "YYYY-MM-DDThh:mm:ss["Z"/±hh:mm].'
    --endpoint=: If auth mode is "login", provide endpoint URL of the App Configuration store.
    --fields=:
        description: Space-separated customized output fields.
        nargs: -1
    --key=: If no key specified, return all keys by default.
    --label=: If no label specified, list all labels.
    --resolve-keyvault=:
        description: Resolve the content of key vault reference.
        nargs: -1
    --snapshot=: List all keys in a given snapshot of the App Configuration store.
    --subscription=: Name or ID of subscription.
    -n, --name=: Name of the App Configuration store.
    -t, --top=: Maximum number of items to return.
completion:
    flag:
        auth-mode:
            - login
            - key
        fields:
            - key
            - value
            - label
            - content_type
            - etag
            - tags
            - locked
            - last_modified
        resolve-keyvault:
            - "true"
            - "false"
documentation:
    flag:
        all: |-
            List all items.

            Default value: False
        auth-mode: This parameter can be used for indicating how a data operation is to be authorized. If the auth mode is "key", provide connection string or store name and your account access keys will be retrieved for authorization. If the auth mode is "login", provide the `--endpoint` or `--name` and your "az login" credentials will be used for authorization. You can configure the default auth mode using `az configure --defaults appconfig_auth_mode=<auth_mode>`. For more information, see https://learn.microsoft.com/azure/azure-app-configuration/concept-enable-rbac
        connection-string: Combination of access key and endpoint of the App Configuration store. Can be found using 'az appconfig credential list'. Users can preset it using ``` az configure --defaults appconfig_connection_string=<connection_string> ``` or environment variable with the name AZURE_APPCONFIG_CONNECTION_STRING.
        datetime: 'Format: "YYYY-MM-DDThh:mm:ss["Z"/±hh:mm]. If no time zone or offset specified, use UTC by default.'
        endpoint: If auth mode is "login" or "anonymous", provide endpoint URL of the App Configuration store. The endpoint can be retrieved using "az appconfig show" command. You can configure the default endpoint using ``` az configure --defaults appconfig_endpoint=<endpoint> ``` .
        fields: |-
            Space-separated customized output fields.

            Accepted values: content_type, etag, key, label, last_modified, locked, tags, value
        key: If no key specified, return all keys by default. Support star sign as filters, for instance abc* means keys with abc as prefix.
        label: If no label specified, list all labels. Support star sign as filters, for instance abc* means labels with abc as prefix. Use '\0' for null label.
        name: |-
            ``` and your "az login" credentials will be used for authorization. If the auth mode is "anonymous", provide the --endpoint that will be used for authorization. Anonymous mode is intended for custom endpoints only, such as the App Configuration emulator. You can configure the default auth mode using ``` az configure --defaults appconfig_auth_mode=<auth_mode> ``` . For more information, see https://learn.microsoft.com/azure/azure-app-configuration/concept-enable-rbac .

            Default value: key

            Accepted values: anonymous, key, login
        resolve-keyvault: |-
            Resolve the content of key vault reference. This argument should NOT be specified along with --fields. Instead use --query for customized query.

            Default value: False

            Accepted values: false, true
        resolve-snapshot-references: |-
            Resolve snapshot references and return the referenced snapshots' key-values.

            Default value: False

            Accepted values: false, true
        snapshot: List all keys in a given snapshot of the App Configuration store. If no snapshot is specified, the keys currently in the store are listed.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'If no tags are specified, return all key-values with any tags. Support space-separated tags: key[=value] [key[=value] ...].'
        top: Maximum number of items to return. Must be a positive integer. Default to 100.
examples:
    List a specific key for any label start with v1. using connection string.: az appconfig kv list --key color --connection-string Endpoint=https://contoso.azconfig.io;Id=xxx;Secret=xxx --label v1.*
    List all key-values in a given snapshot of the app configuration store.: az appconfig kv list --connection-string Endpoint=https://contoso.azconfig.io;Id=xxx;Secret=xxx --snapshot MySnapshot
    List all key-values with all labels using your 'az login' credentials.: az appconfig kv list --endpoint https://myappconfiguration.azconfig.io --auth-mode login
    List all key-values with null label.: az appconfig kv list -n MyAppConfiguration --label \0
    List all key-values with specific tags: az appconfig kv list -n MyAppConfiguration --tags tag1=value1 tag2=value2
    List all key-values with tag name "tag1" with empty value: az appconfig kv list -n MyAppConfiguration --tags tag1=
    List all key-values with tag name "tag1" with null value: az appconfig kv list -n MyAppConfiguration --tags tag1=\0
    List all key-values within a snapshot referenced by the key "MySnapshotRef".: az appconfig kv list -n MyAppConfiguration --key MySnapshotRef --resolve-snapshot-references
    List all keys with any labels and query only key, value and tags.: az appconfig kv list --connection-string Endpoint=https://contoso.azconfig.io;Id=xxx;Secret=xxx --fields key value tags --datetime "2019-05-01T11:24:12Z"
    List content of key vault reference with key prefix 'KVRef_' and only select key and value.: az appconfig kv list -n MyAppConfiguration --key "KVRef_*" --resolve-keyvault --query "[*].{key:key, value:value}"
    List key-values with multiple labels.: az appconfig kv list --label test,prod,\0 -n MyAppConfiguration
