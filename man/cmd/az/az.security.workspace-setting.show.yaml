# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows the workspace settings in your subscription - these settings let you control which workspace will hold your security data
flags:
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
documentation:
    command: Shows the workspace settings in your subscription - these settings let you control which workspace will hold your security data.
    flag:
        name: Name of the resource to be fetched.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Shows the workspace settings in your subscription - these settings let you control which workspace will hold your security data: az security workspace-setting show -n default
