# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-runtimes
description: List available built-in stacks which can be used for web apps.
flags:
    --linux=: list runtime stacks for linux based web apps
    --os=: limit the output to just windows or linux runtimes
    --show-runtime-details=: show detailed versions of runtime stacks
    --subscription=: Name or ID of subscription.
completion:
    flag:
        os:
            - linux
            - windows
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        runtime: Limit the output to a specific runtime family.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        support: 'Filter by support lifecycle status. Default: supported.'
