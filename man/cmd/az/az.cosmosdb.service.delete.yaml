# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes service with the given serviceName.
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Name of the Cosmos DB database account.
    -g, --resource-group-name=!: Name of the resource group of the database account.
    -n, --name=!: Service Name.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: |-
        Command group 'cosmosdb service' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: Name of the Cosmos DB database account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Service Name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group-name: Name of the resource group of the database account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete the cosmosdb materialized views builder service resource.: az cosmosdb service delete --resource-group MyResourceGroup --account-name MyAccount --name "MaterializedViewsBuilder"
    Delete the given cosmosdb service resource.: az cosmosdb service delete --resource-group MyResourceGroup --account-name MyAccount --name "sqlDedicatedGateway"
