# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes an API Schema.
flags:
    --api-id=!: API identifier.
    --if-match=: ETag of the Entity.
    --no-wait=: Do not wait for the long-running operation to finish.
    --schema-id=!: Schema identifier.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: Delete an API Management API Schema.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        change-reference: The related change reference ID for this resource operation.
        if-match: ETag of the Entity.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        schema-id: Schema identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        service-name: The name of the API Management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    delete a API Schema.: az apim api schema delete --service-name MyApim -g MyResourceGroup --api-id MyApi --schema-id schemaId
