# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a registration definition.
flags:
    --definition-id=: Guid of the registration definition.
    --description=: Description of the registration definition.
    --name=!: Name of the registration definition.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --plan-name=: The plan name.
    --plan-product=: The product code.
    --plan-publisher=: The publisher ID.
    --plan-version=: The plan's version.
    --principal-id=!: The principal id.
    --role-definition-id=!: The role definition id.
    --subscription=: Name or ID of subscription.
    --tenant-id=!: Id of the managedBy tenant.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        definition-id: Guid of the registration definition.
        description: Description of the registration definition.
        name: Name of the registration definition.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        plan-name: The plan name.
        plan-product: The product code.
        plan-publisher: The publisher ID.
        plan-version: The plan's version.
        principal-id: The principal id.
        role-definition-id: The role definition id.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tenant-id: Id of the managedBy tenant.
examples:
    Create a registration definition under the default subscription scope with the required parameters.: az managedservices definition create --name mydef --tenant-id dab3375b-6197-4a15-a44b-16c41faa91d7 --principal-id b6f6c88a-5b7a-455e-ba40-ce146d4d3671 --role-definition-id ccdd72a7-3385-48ef-bd42-f606fba81ae7
