# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add an OWASP CRS exclusion rule to the WAF policy managed rules.
documentation:
    flag:
        index: Index of exclusion. If no index is provided, the default behavior is `append`.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        rule-sets: The managed rule sets that are associated with the exclusion.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --index=: Index of exclusion.
    --match-operator=!: When match-variable is a collection, operate on the selector to specify which elements in the collection this exclusion applies to.
    --match-variable=!: Variable to be excluded.
    --policy-name=!: Name of the web application firewall policy.
    --rule-sets=:
        description: The managed rule sets that are associated with the exclusion.
        nargs: -1
    --selector=!: When match-variable is a collection, operator used to specify which elements in the collection this exclusion applies to.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        match-operator:
            - Contains
            - EndsWith
            - Equals
            - EqualsAny
            - StartsWith
        match-variable:
            - RequestArgKeys
            - RequestArgNames
            - RequestArgValues
            - RequestCookieKeys
            - RequestCookieNames
            - RequestCookieValues
            - RequestHeaderKeys
            - RequestHeaderNames
            - RequestHeaderValues
