# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets the RUs per second of the Cassandra table under an existing Azure Cosmos DB database account with the provided name.
flags:
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Cosmosdb account name.
    -g, --resource-group=!: Name of resource group.
    -k, --keyspace-name=!: Keyspace name
    -n, --name=!: Table name
documentation:
    command: Get the throughput of the Cassandra table under an Azure Cosmos DB Cassandra keyspace.
    flag:
        account-name: Cosmosdb account name.
        keyspace-name: Keyspace name.
        name: Table name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get the throughput of the Cassandra table under an Azure Cosmos DB Cassandra keyspace. (autogenerated): az cosmosdb cassandra table throughput show --account-name MyAccount --keyspace-name MyKeyspace --name MyTable --resource-group MyResourceGroup
