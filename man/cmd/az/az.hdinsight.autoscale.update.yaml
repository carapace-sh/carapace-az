# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the Autoscale configuration.
flags:
    --cluster-name=!: The name of the cluster.
    --max-workernode-count=: The max workernode count for Load-based atuoscale.
    --min-workernode-count=: The minimal workernode count for Load-based atuoscale.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --timezone=: The timezone for schedule autoscale type.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: The name of the cluster.
        max-workernode-count: The max workernode count for Load-based atuoscale.
        min-workernode-count: The minimal workernode count for Load-based atuoscale.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timezone: The timezone for schedule autoscale type. Values from ``` az hdinsight autoscale list-timezones ``` .
examples:
    Update Load-based Autoscale related configuration.: az hdinsight autoscale update --resource-group MyResourceGroup --cluster-name MyCluster --max-workernode-count 5
    Update Schedule-based Autoscale related configuration.: az hdinsight autoscale update --resource-group MyResourceGroup --cluster-name MyCluster --timezone "China Standard Time"
