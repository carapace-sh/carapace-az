# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Build a metric alert rule dimension.
flags:
    --operator=: Dimension operator.
    --subscription=: Name or ID of subscription.
    -n, --name=!: Name of the dimension.
    -v, --value=!:
        description: The values to apply on the operation.
        nargs: -1
completion:
    flag:
        operator:
            - Include
            - Exclude
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: |-
            The related change reference ID for this resource operation.

            Default value: Include

            Accepted values: Exclude, Include
        name: Name of the dimension.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        value: The values to apply on the operation.
examples:
    Build a metric alert rule dimension.: $dim = az monitor metrics alert dimension create -n dimName --op Include -v GetBlob PutBlob
