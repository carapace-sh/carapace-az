# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Updates the properties of the specified Job Schedule.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --allow-task-preemption=: Whether Tasks in this job can be preempted by other high priority jobs.
    --do-not-run-after=: A time after which no Job will be created under this Job Schedule.
    --do-not-run-until=: The earliest time at which any Job may be created under this Job Schedule.
    --if-match=: An ETag value associated with the version of the resource known to the client.
    --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
    --if-none-match=: An ETag value associated with the version of the resource known to the client.
    --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
    --job-manager-task-application-package-references=:
        description: A list of Application Packages that the Batch service will deploy to the Compute Node before running the command line.Application Packages are downloaded and deployed to a shared directory, not the Task working directory.
        nargs: -1
    --job-manager-task-command-line=: The command line of the Job Manager Task.
    --job-manager-task-environment-settings=:
        description: A list of environment variable settings for the Job Manager Task.
        nargs: -1
    --job-manager-task-id=: A string that uniquely identifies the Job Manager Task within the Job.
    --job-manager-task-resource-files=:
        description: A list of files that the Batch service will download to the Compute Node before running the command line.
        nargs: -1
    --job-max-task-retry-count=: The maximum number of times each Task may be retried.
    --job-max-wall-clock-time=: The maximum elapsed time that the Job may run, measured from the time the Job is created.
    --job-metadata=:
        description: A list of name-value pairs associated with each Job created under this schedule as metadata.
        nargs: -1
    --job-schedule-id=!: The ID of the Job Schedule to update.
    --json-file=: A file containing the job schedule specification in JSON (formatted to match the respective REST API body).
    --max-parallel-tasks=: The maximum number of tasks that can be executed in parallel for the job.
    --metadata=:
        description: A list of name-value pairs associated with the Job Schedule as metadata.
        nargs: -1
    --on-all-tasks-complete=: The action the Batch service should take when all Tasks in a Job created under this schedule are in the completed state.
    --pool-id=: The ID of an existing Pool.
    --priority=: The priority of Jobs created under this schedule.
    --recurrence-interval=: The time interval between the start times of two successive Jobs under the Job Schedule.
    --required-slots=: The number of scheduling slots that the Task requires to run.
    --start-window=: The time interval, starting from the time at which the schedule indicates a Job should be created, within which a Job must be created.
    --subscription=: Name or ID of subscription.
    --uses-task-dependencies=: Whether Tasks in the Job can define dependencies on each other.
documentation:
    command: Update the properties of a job schedule.
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allow-task-preemption: Whether Tasks in this job can be preempted by other high priority jobs. If the value is set to True, other high priority jobs submitted to the system will take precedence and will be able requeue tasks from this job. You can update a job's allowTaskPreemption after it has been created using the update job API. True if flag present.
        change-reference: The related change reference ID for this resource operation.
        do-not-run-after: A time after which no Job will be created under this Job Schedule. The schedule will move to the completed state as soon as this deadline is past and there is no active Job under this Job Schedule. If you do not specify a doNotRunAfter time, and you are creating a recurring Job Schedule, the Job Schedule will remain active until you explicitly terminate it. Expected format is an ISO-8601 timestamp.
        do-not-run-until: The earliest time at which any Job may be created under this Job Schedule. If you do not specify a doNotRunUntil time, the schedule becomes ready to create Jobs immediately. Expected format is an ISO-8601 timestamp.
        if-match: An ETag value associated with the version of the resource known to the client. The operation will be performed only if the resource's current ETag on the service exactly matches the value specified by the client.
        if-modified-since: A timestamp indicating the last modified time of the resource known to the client. The operation will be performed only if the resource on the service has been modified since the specified time.
        if-none-match: An ETag value associated with the version of the resource known to the client. The operation will be performed only if the resource's current ETag on the service does not match the value specified by the client.
        if-unmodified-since: A timestamp indicating the last modified time of the resource known to the client. The operation will be performed only if the resource on the service has been modified since the specified time.
        job-manager-task-application-package-references: A list of Application Packages that the Batch service will deploy to the Compute Node before running the command line.Application Packages are downloaded and deployed to a shared directory, not the Task working directory. Therefore, if a referenced Application Package is already on the Compute Node, and is up to date, then it is not re-downloaded; the existing copy on the Compute Node is used. If a referenced Application Package cannot be installed, for example because the package has been deleted or because download failed, the Task fails. Space-separated application IDs with optional version in 'id[#version]' format.
        job-manager-task-command-line: The command line of the Job Manager Task. The command line does not run under a shell, and therefore cannot take advantage of shell features such as environment variable expansion. If you want to take advantage of such features, you should invoke the shell in the command line, for example using "cmd /c MyCommand" in Windows or "/bin/sh -c MyCommand" in Linux. If the command line refers to file paths, it should use a relative path (relative to the Task working directory), or use the Batch provided environment variable ( https://docs.microsoft.com/en-us/azure/batch/batch-compute-node-environment-variables ). Required.
        job-manager-task-environment-settings: A list of environment variable settings for the Job Manager Task. Space-separated values in 'key=value' format.
        job-manager-task-id: A string that uniquely identifies the Job Manager Task within the Job. The ID can contain any combination of alphanumeric characters including hyphens and underscores and cannot contain more than 64 characters. Required.
        job-manager-task-resource-files: A list of files that the Batch service will download to the Compute Node before running the command line. Files listed under this element are located in the Task's working directory. There is a maximum size for the list of resource files.  When the max size is exceeded, the request will fail and the response error code will be RequestEntityTooLarge. If this occurs, the collection of ResourceFiles must be reduced in size. This can be achieved using .zip files, Application Packages, or Docker Containers. Space-separated resource references in filename=httpurl format.
        job-max-task-retry-count: The maximum number of times each Task may be retried. The Batch service retries a Task if its exit code is nonzero. Note that this value specifically controls the number of retries. The Batch service will try each Task once, and may then retry up to this limit. For example, if the maximum retry count is 3, Batch tries a Task up to 4 times (one initial try and 3 retries). If the maximum retry count is 0, the Batch service does not retry Tasks. If the maximum retry count is -1, the Batch service retries Tasks without limit. The default value is 0 (no retries).
        job-max-wall-clock-time: The maximum elapsed time that the Job may run, measured from the time the Job is created. If the Job does not complete within the time limit, the Batch service terminates it and any Tasks that are still running. In this case, the termination reason will be MaxWallClockTimeExpiry. If this property is not specified, there is no time limit on how long the Job may run. Expected format is an ISO-8601 duration.
        job-metadata: A list of name-value pairs associated with each Job created under this schedule as metadata. The Batch service does not assign any meaning to metadata; it is solely for the use of user code. Space-separated values in 'key=value' format.
        job-schedule-id: The ID of the Job Schedule to update. Required.
        json-file: A file containing the job schedule specification in JSON (formatted to match the respective REST API body). If this parameter is specified, all 'Job Schedule Arguments' are ignored.
        max-parallel-tasks: The maximum number of tasks that can be executed in parallel for the job. The value of maxParallelTasks must be -1 or greater than 0 if specified. If not specified, the default value is -1, which means there's no limit to the number of tasks that can be run at once. You can update a job's maxParallelTasks after it has been created using the update job API.
        metadata: A list of name-value pairs associated with the Job Schedule as metadata. If you do not specify this element, existing metadata is left unchanged. Space-separated values in 'key=value' format.
        on-all-tasks-complete: 'The action the Batch service should take when all Tasks in a Job created under this schedule are in the completed state. Note that if a Job contains no Tasks, then all Tasks are considered complete. This option is therefore most commonly used with a Job Manager task; if you want to use automatic Job termination without a Job Manager, you should initially set onAllTasksComplete to noaction and update the Job properties to set onAllTasksComplete to terminatejob once you have finished adding Tasks. The default is noaction. Known values are: "noaction" and "terminatejob".'
        pool-id: The ID of an existing Pool. All the Tasks of the Job will run on the specified Pool. You must ensure that the Pool referenced by this property exists. If the Pool does not exist at the time the Batch service tries to schedule a Job, no Tasks for the Job will run until you create a Pool with that id. Note that the Batch service will not reject the Job request; it will simply not run Tasks until the Pool exists. You must specify either the Pool ID or the auto Pool specification, but not both.
        priority: The priority of Jobs created under this schedule. Priority values can range from -1000 to 1000, with -1000 being the lowest priority and 1000 being the highest priority. The default value is 0. This priority is used as the default for all Jobs under the Job Schedule. You can update a Job's priority after it has been created using by using the update Job API.
        recurrence-interval: 'The time interval between the start times of two successive Jobs under the Job Schedule. A Job Schedule can have at most one active Job under it at any given time. Because a Job Schedule can have at most one active Job under it at any given time, if it is time to create a new Job under a Job Schedule, but the previous Job is still running, the Batch service will not create the new Job until the previous Job finishes. If the previous Job does not finish within the startWindow period of the new recurrenceInterval, then no new Job will be scheduled for that interval. For recurring Jobs, you should normally specify a jobManagerTask in the jobSpecification. If you do not use jobManagerTask, you will need an external process to monitor when Jobs are created, add Tasks to the Jobs and terminate the Jobs ready for the next recurrence. The default is that the schedule does not recur: one Job is created, within the startWindow after the doNotRunUntil time, and the schedule is complete as soon as that Job finishes. The minimum value is 1 minute. If you specify a lower value, the Batch service rejects the schedule with an error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). Expected format is an ISO-8601 duration.'
        required-slots: The number of scheduling slots that the Task requires to run. The default is 1. A Task can only be scheduled to run on a compute node if the node has enough free scheduling slots available. For multi-instance Tasks, this property is not supported and must not be specified.
        start-window: The time interval, starting from the time at which the schedule indicates a Job should be created, within which a Job must be created. If a Job is not created within the startWindow interval, then the 'opportunity' is lost; no Job will be created until the next recurrence of the schedule. If the schedule is recurring, and the startWindow is longer than the recurrence interval, then this is equivalent to an infinite startWindow, because the Job that is 'due' in one recurrenceInterval is not carried forward into the next recurrence interval. The default is infinite. The minimum value is 1 minute. If you specify a lower value, the Batch service rejects the schedule with an error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). Expected format is an ISO-8601 duration.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        uses-task-dependencies: Whether Tasks in the Job can define dependencies on each other. The default is false. True if flag present.
