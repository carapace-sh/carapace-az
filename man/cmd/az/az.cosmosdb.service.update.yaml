# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a cosmosdb service resource.
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --size=: Instance Size.
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Name of the Cosmos DB database account.
    -c, --count=!: Instance Count.
    -g, --resource-group-name=!: Name of the resource group of the database account.
    -n, --name=!: Service Name.
documentation:
    command: |-
        Command group 'cosmosdb service' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: Name of the Cosmos DB database account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        count: Instance Count.
        kind: Service kind.
        name: Service Name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group-name: Name of the resource group of the database account.
        size: 'Instance Size. Possible values are: Cosmos.D4s, Cosmos.D8s, Cosmos.D16s etc.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a cosmosdb materialized views builder service resource.: az cosmosdb service update --resource-group MyResourceGroup --account-name MyAccount --name "MaterializedViewsBuilder" --kind "MaterializedViewsBuilder" --count 3
    Update a cosmosdb service resource.: az cosmosdb service update --resource-group MyResourceGroup --account-name MyAccount --name "sqlDedicatedGateway" --kind "SqlDedicatedGateway" --count 3
