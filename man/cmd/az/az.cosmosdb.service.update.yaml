# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a cosmosdb service resource.
documentation:
    flag:
        size: 'Instance Size. Possible values are: Cosmos.D4s, Cosmos.D8s, Cosmos.D16s etc'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --size=: Instance Size.
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Name of the Cosmos DB database account.
    -c, --count=!: Instance Count.
    -g, --resource-group-name=!: Name of the resource group of the database account.
    -n, --name=!: Service Name.
