# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: deallocate
description: Deallocate a VM so that computing resources are no longer allocated (charges no longer apply).
flags:
    --hibernate=:
        description: Optional parameter to hibernate a virtual machine.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Virtual Machine.
completion:
    flag:
        hibernate:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Deallocate a VM so that computing resources are no longer allocated (charges no longer apply). The status will change from 'Stopped' to 'Stopped (Deallocated)'.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        hibernate: Optional parameter to hibernate a virtual machine. (Feature in Preview)
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Virtual Machine. You can configure the default using `az configure --defaults vm=<name>`
        no-wait: Do not wait for the long-running operation to finish.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Deallocate a VM.: az vm deallocate --name MyVm --no-wait --resource-group MyResourceGroup
    Deallocate, generalize, and capture a stopped virtual machine.: |-
        az vm deallocate -g MyResourceGroup -n MyVm
        az vm generalize -g MyResourceGroup -n MyVm
        az vm capture -g MyResourceGroup -n MyVm --vhd-name-prefix MyPrefix
    Deallocate, generalize, and capture multiple stopped virtual machines.: |-
        az vm deallocate --ids vms_ids
        az vm generalize --ids vms_ids
        az vm capture --ids vms_ids --vhd-name-prefix MyPrefix
