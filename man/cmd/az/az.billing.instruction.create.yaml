# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an instruction.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --amount=: The amount budgeted for this billing instruction.
    --creation-date=: The date this billing instruction was created.
    --end-date=: The date this billing instruction is no longer in effect.
    --profile-name=!: The ID that uniquely identifies a billing profile.
    --start-date=: The date this billing instruction goes into effect.
    --subscription=: Name or ID of subscription.
    -n, --name=!: Instruction Name.
documentation:
    command: |-
        Command group 'billing instruction' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        amount: The amount budgeted for this billing instruction.
        change-reference: The related change reference ID for this resource operation.
        creation-date: The date this billing instruction was created.
        end-date: The date this billing instruction is no longer in effect.
        name: Instruction Name.
        profile-name: The ID that uniquely identifies a billing profile.
        start-date: The date this billing instruction goes into effect.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create an instruction: az billing instruction create --account-name "{billingAccountName}" --profile-name "{billingProfileName}" --name "{instructionName}" --amount 5000 --end-date "2020-12-30T21:26:47.997Z" --start-date "2019-12-30T21:26:47.997Z"
