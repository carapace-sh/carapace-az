# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a network security rule to a managed cluster.
flags:
    --access=: Allows or denies network traffic
    --description=: Network security rule description
    --dest-addr-prefixes=:
        description: CIDR or destination IP ranges.
        nargs: -1
    --dest-port-ranges=:
        description: A single or space separated list of destination port ranges
        nargs: -1
    --direction=: Network security rule direction
    --name=: Network security rule name
    --priority=: Integer that shows priority for rule
    --protocol=: Network protocol
    --source-addr-prefixes=:
        description: The CIDR or source IP ranges.
        nargs: -1
    --source-port-ranges=:
        description: A single or space separated list of source port ranges
        nargs: -1
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
completion:
    flag:
        access:
            - allow
            - deny
        direction:
            - inbound
            - outbound
        protocol:
            - tcp
            - https
            - http
            - udp
            - icmp
            - ah
            - esp
            - any
documentation:
    flag:
        access: |-
            Allows or denies network traffic.

            Accepted values: allow, deny
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        description: Network security rule description.
        dest-addr-prefix: The destination address prefix. CIDR or destination IP range. Asterisk '*' can also be used to match all source IPs. Default tags such as 'VirtualNetwork', 'AzureLoadBalancer' and 'Internet' can also be used.
        dest-addr-prefixes: CIDR or destination IP ranges. A single or space separated list of destination address prefixes.
        dest-port-range: The destination port or range. Integer or range between 0 and 65535. Asterisk '*' can also be used to match all ports.
        dest-port-ranges: A single or space separated list of destination port ranges.
        direction: |-
            Network security rule direction.

            Accepted values: inbound, outbound
        name: Network security rule name.
        priority: Integer that shows priority for rule.
        protocol: |-
            Network protocol.

            Accepted values: ah, any, esp, http, https, icmp, tcp, udp
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source-addr-prefix: The CIDR or source IP range. Asterisk '*' can also be used to match all source IPs. Default tags such as 'VirtualNetwork', 'AzureLoadBalancer' and 'Internet' can also be used. If this is an ingress rule, specifies where network traffic originates from.
        source-addr-prefixes: The CIDR or source IP ranges. A single or space separated list of source address prefixes.
        source-port-range: The source port or range. Integer or range between 0 and 65535. Asterisk '*' can also be used to match all ports.
        source-port-ranges: A single or space separated list of source port ranges.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add network security rule with multiple source and destination address prefixes.: az sf managed-cluster network-security-rule add -g testRG -c testCluster --name 'network security rule name' --access allow --description 'network security rule description' --direction inbound --protocol tcp --priority 1200           --source-port-ranges 1-1000 --dest-port-ranges 1-65535 --source-addr-prefixes 167.220.242.0/27 167.220.0.0/23 131.107.132.16/28 167.220.81.128/26 --dest-addr-prefixes 194.69.104.0/25 194.69.119.64/26 167.220.249.128/26 255.255.255.255/32
    Add network security rule with single source and destination address prefix.: az sf managed-cluster network-security-rule add -g testRG -c testCluster --name 'network security rule name' --access deny --description 'network security rule description' --direction inbound --protocol any --priority 1300           --source-port-range * --dest-port-ranges 19000 19080 --source-addr-prefix Internet --dest-addr-prefix *
