# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all of the jobs or job schedule in a Batch account.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: The Batch account key.
    --account-name=: The Batch account name.
    --expand=:
        description: An OData $expand clause.
        nargs: -1
    --filter=: An OData $filter clause.
    --job-schedule-id=: The ID of the job schedule from which you want to get a list of jobs.
    --select=:
        description: An OData $select clause.
        nargs: -1
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'The Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'The Batch account name. Only needed Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        expand: An OData $expand clause.
        filter: An OData $filter clause. For more information on constructing this filter,see https://learn.microsoft.com/rest/api/batchservice/odata-filters-in-batch .
        job-schedule-id: The ID of the job schedule from which you want to get a list of jobs. If omitted, lists all jobs in the account.
        select: An OData $select clause.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all of the job schedule in a Batch account: az batch job list --job-schedule-id jobschedule1
    List all of the jobs in a Batch account: az batch job list
