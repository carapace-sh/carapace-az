# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the parameters of a track.
flags:
    --asset-name=!: The asset name
    --display-name=: The display name of the text track on a video player.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --language-code=: The RFC5646 language code for the text track.
    --no-wait=: Do not wait for the long-running operation to finish.
    --player-visibility=: When PlayerVisibility is set to "Visible", the text track will be present in the DASH manifest or HLS playlist when requested by a client.
    --subscription=: Name or ID of subscription.
    --track-name=!: The name of the track.
    -a, --account-name=: The name of the Azure Media Services account.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        account-name: The name of the Azure Media Services account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        asset-name: The asset name.
        change-reference: The related change reference ID for this resource operation.
        display-name: The display name of the text track on a video player. In HLS, this maps to the NAME attribute of EXT-X-MEDIA.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        language-code: The RFC5646 language code for the text track.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        player-visibility: 'When PlayerVisibility is set to "Visible", the text track will be present in the DASH manifest or HLS playlist when requested by a client. When the PlayerVisibility is set to "Hidden", the text will not be available to the client. The default value is "Visible". Possible values include: "Hidden", "Visible".'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        track-name: The name of the track.
