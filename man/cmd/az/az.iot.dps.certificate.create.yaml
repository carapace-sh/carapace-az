# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create/upload a certficate to an Azure IoT Hub Device Provisioning Service instance.
flags:
    --dps-name=!: IoT Hub Device Provisioning Service name
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --certificate-name=!: A friendly name for the certificate.
    -p, --path=!: The path to the file containing the certificate.
    -v, --verified=:
        description: A boolean indicating whether or not the certificate is verified.
        nargs: -1
completion:
    flag:
        verified:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        dps-name: IoT Hub Device Provisioning Service name.
        path: The path to the file containing the certificate.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        verified: |-
            A boolean indicating whether or not the certificate is verified.

            Accepted values: false, true
examples:
    Upload a CA certificate PEM file to an Azure IoT Hub Device Provisioning Service instance.: az iot dps certificate create --dps-name MyDps --resource-group MyResourceGroup --name MyCertificate --path /certificates/Certificate.pem
    Upload a verified CA certificate CER file to an Azure IoT Hub Device Provisioning Service.instance: az iot dps certificate create --dps-name MyDps --resource-group MyResourceGroup --name MyCertificate --path /certificates/Certificate.cer --verified
