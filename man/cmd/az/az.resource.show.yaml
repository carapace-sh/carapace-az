# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of a resource.
flags:
    --api-version=: The api version of the resource (omit for the latest stable version)
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --include-response-body=:
        description: Use if the default command output doesn't capture all of the property data.
        nargs: -1
    --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
    --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
    --resource-type=: 'The resource type (Ex: ''resC'').'
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The resource name.
    -v, --latest-include-preview=: Indicate that the latest api-version will be used regardless of whether it is preview version (like 2020-01-01-preview) or not.
completion:
    flag:
        include-response-body:
            - "true"
            - "false"
documentation:
    flag:
        api-version: The api version of the resource (omit for the latest stable version).
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
        include-response-body: |-
            Use if the default command output doesn't capture all of the property data.

            Default value: False

            Accepted values: false, true
        latest-include-preview: |-
            Indicate that the latest api-version will be used regardless of whether it is preview version (like 2020-01-01-preview) or not. For example, if the supported api-version of resource provider is 2020-01-01-preview and 2019-01-01: when passing in this parameter it will take the latest version 2020-01-01-preview, otherwise it will take the latest stable version 2019-01-01 without passing in this parameter.

            Default value: False
        name: 'The resource name. (Ex: myC).'
        namespace: 'Provider namespace (Ex: ''Microsoft.Provider'').'
        parent: 'The parent path (Ex: ''resA/myA/resB/myB'').'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'The resource type (Ex: ''resC''). Can also accept namespace/type format (Ex: ''Microsoft.Provider/resC'').'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show a subnet using a resource identifier.: az resource show --ids /subscriptions/0b1f6471-1bf0-4dda-aec3-111111111111/resourceGroups/MyResourceGroup/providers/Microsoft.Network/virtualNetworks/MyVnet/subnets/MySubnet
    Show a subnet.: az resource show -g MyResourceGroup -n MySubnet --namespace Microsoft.Network --parent virtualnetworks/MyVnet --resource-type subnets
    Show a virtual machine resource named 'MyVm' by using the latest api-version whether this version is a preview version.: az resource show -g MyResourceGroup -n MyVm --resource-type "Microsoft.Compute/virtualMachines" --latest-include-preview
    Show a virtual machine resource named 'MyVm'.: az resource show -g MyResourceGroup -n MyVm --resource-type "Microsoft.Compute/virtualMachines"
    Show a web app using a resource identifier.: az resource show --ids /subscriptions/0b1f6471-1bf0-4dda-aec3-111111111111/resourceGroups/MyResourceGroup/providers/Microsoft.Web/sites/MyWebapp
    Show an application gateway path rule.: az resource show -g MyResourceGroup --namespace Microsoft.Network --parent applicationGateways/ag1/urlPathMaps/map1 --resource-type pathRules -n rule1
