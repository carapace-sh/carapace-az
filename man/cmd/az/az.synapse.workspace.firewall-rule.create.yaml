# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a firewall rule.
flags:
    --end-ip-address=!: The end IP address of the firewall rule.
    --no-wait=: Do not wait for the long-running operation to finish.
    --start-ip-address=!: The start IP address of the firewall rule.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The IP firewall rule name
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        end-ip-address: The end IP address of the firewall rule. Must be IPv4 format. Must be greater than or equal to startIpAddress.
        name: The IP firewall rule name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        start-ip-address: The start IP address of the firewall rule. Must be IPv4 format.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    Create a firewall rule.: |-
        az synapse workspace firewall-rule create --name allowAll --workspace-name testsynapseworkspace \
        --resource-group rg --start-ip-address 0.0.0.0 --end-ip-address 255.255.255.255
