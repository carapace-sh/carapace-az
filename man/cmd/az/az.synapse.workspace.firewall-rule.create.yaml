# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a firewall rule.
documentation:
    flag:
        end-ip-address: The end IP address of the firewall rule. Must be IPv4 format. Must be greater than or equal to startIpAddress.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        start-ip-address: The start IP address of the firewall rule. Must be IPv4 format.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --end-ip-address=!: The end IP address of the firewall rule.
    --no-wait=: Do not wait for the long-running operation to finish.
    --start-ip-address=!: The start IP address of the firewall rule.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The IP firewall rule name
