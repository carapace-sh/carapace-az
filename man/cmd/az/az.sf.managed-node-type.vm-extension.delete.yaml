# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete an extension to the node type.
flags:
    --extension-name=!: extension name.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
    -n, --name=!: node type name.
documentation:
    command: Delete an extension from the node type.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        extension-name: Extension name. --name --node-type-name -n Node type name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Delete extension by name.: az sf managed-node-type vm-extension delete -g testRG -c testCluster -n snt --extension-name csetest
