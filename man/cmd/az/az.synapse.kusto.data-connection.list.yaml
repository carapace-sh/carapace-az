# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Returns the list of data connections of the given Kusto pool database.
flags:
    --database-name=!: The name of the database in the Kusto pool.
    --kusto-pool-name=!: The name of the Kusto pool.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The name of the workspace
    -g, --resource-group=!: Name of resource group.
documentation:
    command: Experimental
    flag:
        database-name: The name of the database in the Kusto pool.
        kusto-pool-name: The name of the Kusto pool.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The name of the workspace.
examples:
    KustoPoolDataConnectionsListByDatabase: az synapse kusto data-connection list --database-name "KustoDatabase8" --kusto-pool-name "kustoclusterrptest4" --resource-group "kustorptest" --workspace-name "synapseWorkspaceName"
