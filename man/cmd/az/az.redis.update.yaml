# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a Redis cache.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Specify as false to wait for result of long running operation
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku=: Type of Redis cache.
    --subscription=: Name or ID of subscription.
    --vm-size=: Size of Redis cache to deploy.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Redis cache.
completion:
    flag:
        no-wait:
            - "true"
            - "false"
        sku:
            - Basic
            - Standard
            - Premium
        vm-size:
            - c0
            - c1
            - c2
            - c3
            - c4
            - c5
            - c6
            - p1
            - p2
            - p3
            - p4
            - p5
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        force-string: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the Redis cache.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        sku: Type of Redis cache.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-size: Size of Redis cache to deploy. Basic and Standard Cache sizes start with C. Premium Cache sizes start with P.
examples:
    Configure the RDB back up enabled data persistence for already created Premium Azure Cache for Redis: az redis update --name MyRedisCache --resource-group MyResourceGroup --set "redisConfiguration.rdb-storage-connection-string"="BlobEndpoint=https//..." "redisConfiguration.rdb-backup-enabled"="true" "redisConfiguration.rdb-backup-frequency"="15" "redisConfiguration.rdb-backup-max-snapshot-count"="1"
    Disable access keys authentication for Redis.: az redis update --name MyRedisCache --resource-group MyResourceGroup --set "disableAccessKeyAuthentication=true"
    Disable the RDB back up data persistence for Premium Azure Cache for Redis: az redis update --name MyRedisCache --resource-group MyResourceGroup --set "redisConfiguration.rdb-backup-enabled"="false"
    Scale an Azure Cache for Redis Instance - Enable Clustering.: az redis update --name MyRedisCache --resource-group MyResourceGroup --set shardCount=1
    Scale an Azure Cache for Redis Instance - Update to different size (An example to scale from c0 to c1).: az redis update --name MyRedisCache --resource-group MyResourceGroup --set "sku.capacity"="2"
    Scale an Azure Cache for Redis Instance - Update to different tier (From Basic to Standard or Standard to Premium).: az redis update --name MyRedisCache --resource-group MyResourceGroup --set "sku.name"="Premium" "sku.capacity"="1" "sku.family"="P"
    Scale an Azure Cache for Redis Instance in/out using Redis Cluster.: az redis update --name MyRedisCache --resource-group MyResourceGroup --set shardCount=2
    Update the maxmemory-policy for your Azure Cache for Redis named MyRedisCache: az redis update --name MyRedisCache --resource-group MyResourceGroup --set "redisConfiguration.maxmemory-policy"="allkeys-lru"
    Updating a non zone redundant cache to zone redundant cache using automatic zonal allocation policy.: az redis update --name MyRedisCache --resource-group MyResourceGroup --set "zonalAllocationPolicy=Automatic"
