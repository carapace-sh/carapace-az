# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates an availability group listener
documentation:
    flag:
        ag-name: Name of the availability group. Please refer to https://learn.microsoft.com/sql/database-engine/availability-groups/windows/use-the-availability-group-wizard-sql-server-management-studio?view=sql-server-2017 to create and availability group
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vnet-name: Name of the virtual network. Provide only if name of the subnet has been provided.
flags:
    --subscription=: Name or ID of subscription.
    --vnet-name=: Name of the virtual network.
    -a, --ag-name=!: Name of the availability group.
    -b, --load-balancer=!: Name or resource ID of the load balancer.
    -c, --public-ip=: Name or resource ID of the public IP.
    -e, --probe-port=!: Probe port.
    -g, --resource-group=!: Name of resource group.
    -i, --ip-address=!: Private IP address bound to the availability group listener.
    -n, --name=!: Name of the availability group listener.
    -p, --port=: Listener port.
    -q, --sqlvms=!:
        description: Space-separated list of SQL virtual machine instance name or resource IDs that are enrolled into the availability group.
        nargs: -1
    -r, --group-name=!: Name of the SQL virtual machine group.
    -u, --subnet=!: The name or resource id of the subnet to include in the private IP.
