# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a DB (with 'Default' create mode.)
flags:
    --auto-pause-delay=: Time in minutes after which database is automatically paused.
    --availability-zone=: Availability zone
    --backup-storage-redundancy=: Backup storage redundancy used to store backups.
    --catalog-collation=: Collation of the metadata catalog.
    --collation=: The collation of the database.
    --compute-model=: The compute model of the database.
    --elastic-pool=: The name or resource id of the elastic pool to create the database in.
    --encryption-protector-auto-rotation=:
        description: Specifies the database encryption protector key auto rotation flag.
        nargs: -1
    --encryption-protector=: Specifies the Azure key vault key to be used as database encryption protector key.
    --federated-client-id=: The federated client id for the SQL Database.
    --free-limit-exhaustion-behavior=: 'Specifies the behavior when monthly free limits are exhausted for the free database.AutoPause: The database will be auto paused upon exhaustion of free limits for remainder of the month.BillForUsage: The database will continue to be online upon exhaustion of free limitsand any overage will be billed.'
    --keys=:
        description: The list of AKV keys for the SQL Database.
        nargs: -1
    --ledger-on=:
        description: Create a ledger database, in which the integrity of all data is protected by the ledger feature.
        nargs: -1
    --license-type=: The license type to apply for this database.``LicenseIncluded`` if you need a license, or ``BasePrice``if you have a license and are eligible for the Azure HybridBenefit.
    --max-size=: The max storage size.
    --min-capacity=: Minimal capacity that database will always have allocated, if not paused
    --no-wait=: Do not wait for the long-running operation to finish.
    --preferred-enclave-type=: Specifies type of enclave for this resource.
    --read-replicas=: The number of high availability replicas to provision for the database.
    --read-scale=: If enabled, connections that have application intent set to readonly in their connection string may be routed to a readonly secondary replica.
    --sample-name=: The name of the sample schema to apply when creating thisdatabase.
    --service-objective=: The service objective for the new database.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --use-free-limit=:
        description: Whether or not the database uses free monthly limits.
        nargs: -1
    --user-assigned-identity-id=:
        description: The list of user assigned identity for the SQL Database.
        nargs: -1
    -c, --capacity=: The capacity component of the sku in integer number of DTUs or vcores.
    -e, --tier=: The edition component of the sku.
    -f, --family=: The compute generation component of the sku (for vcore skus only).
    -g, --resource-group=!: Name of resource group.
    -i, --assign-identity=:
        description: Assign identity for database.
        nargs: -1
    -m, --maint-config-id=: Specified maintenance configuration id or name for this resource.
    -n, --name=!: Name of the Azure SQL Database.
    -s, --server=!: Name of the Azure SQL Server.
    -y, --yes=: Do not prompt for confirmation.
    -z, --zone-redundant=:
        description: Specifies whether to enable zone redundancy.
        nargs: -1
completion:
    flag:
        assign-identity:
            - "true"
            - "false"
        catalog-collation:
            - DATABASE_DEFAULT
            - SQL_Latin1_General_CP1_CI_AS
        compute-model:
            - Provisioned
            - Serverless
        encryption-protector-auto-rotation:
            - "true"
            - "false"
        free-limit-exhaustion-behavior:
            - AutoPause
            - BillOverUsage
        ledger-on:
            - Enabled
            - Disabled
        license-type:
            - LicenseIncluded
            - BasePrice
        preferred-enclave-type:
            - Default
            - VBS
        read-scale:
            - Enabled
            - Disabled
        sample-name:
            - AdventureWorksLT
        use-free-limit:
            - "true"
            - "false"
        zone-redundant:
            - "true"
            - "false"
documentation:
    command: Create a database.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        assign-identity: |-
            Assign identity for database.

            Accepted values: false, true
        auto-pause-delay: Time in minutes after which database is automatically paused. A value of -1 means that automatic pause is disabled.
        availability-zone: 'Availability zone. --backup-storage-redundancy --bsr Backup storage redundancy used to store backups. Allowed values include: Local, Zone, Geo, GeoZone.'
        backup-storage-redundancy: 'Backup storage redundancy used to store backups. Allowed values include: Local, Zone, Geo, GeoZone.'
        capacity: The capacity component of the sku in integer number of DTUs or vcores.
        catalog-collation: |-
            Collation of the metadata catalog.

            Accepted values: DATABASE_DEFAULT, SQL_Latin1_General_CP1_CI_AS
        change-reference: The related change reference ID for this resource operation.
        collation: The collation of the database.
        compute-model: |-
            The compute model of the database.

            Accepted values: Provisioned, Serverless
        elastic-pool: The name or resource id of the elastic pool to create the database in.
        encryption-protector: |-
            Specifies the Azure key vault key to be used as database encryption protector key. --encryption-protector-auto-rotation --epauto Specifies the database encryption protector key auto rotation flag. Can be either true, false or null.

            Accepted values: false, true

            Accepted values: AutoPause, BillOverUsage
        encryption-protector-auto-rotation: Specifies the database encryption protector key auto rotation flag. Can be either true, false or null.
        family: 'The compute generation component of the sku (for vcore skus only). Allowed values include: Gen4, Gen5.'
        federated-client-id: |-
            The federated client id for the SQL Database. It is used for cross tenant CMK scenario. --free-limit --use-free-limit Whether or not the database uses free monthly limits. Allowed on one database in a subscription.

            Accepted values: false, true
        keys: The list of AKV keys for the SQL Database.
        ledger-on: |-
            Create a ledger database, in which the integrity of all data is protected by the ledger feature. All tables in the ledger database must be ledger tables. Note: the value of this property cannot be changed after the database has been created.

            Accepted values: Disabled, Enabled
        license-type: |-
            The license type to apply for this database. ``` LicenseIncluded ``` if you need a license, or ``` BasePrice ``` if you have a license and are eligible for the Azure HybridBenefit.

            Accepted values: BasePrice, LicenseIncluded
        maint-config-id: Specified maintenance configuration id or name for this resource.
        max-size: The max storage size. If no unit is specified, defaults to bytes (B).
        min-capacity: Minimal capacity that database will always have allocated, if not paused.
        name: Name of the Azure SQL Database.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        preferred-enclave-type: |-
            Specifies type of enclave for this resource.

            Accepted values: Default, VBS
        read-replicas: The number of high availability replicas to provision for the database. Only settable for Hyperscale edition.
        read-scale: |-
            If enabled, connections that have application intent set to readonly in their connection string may be routed to a readonly secondary replica. This property is only settable for Premium and Business Critical databases.

            Accepted values: Disabled, Enabled
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sample-name: |-
            The name of the sample schema to apply when creating thisdatabase.

            Accepted values: AdventureWorksLT
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        service-objective: 'The service objective for the new database. For example: Basic, S0, P1, GP_Gen4_1, GP_S_Gen5_8, BC_Gen5_2, HS_Gen5_32.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags. --umi --user-assigned-identity-id The list of user assigned identity for the SQL Database.'
        tier: 'The edition component of the sku. Allowed values include: Basic, Standard, Premium, GeneralPurpose, BusinessCritical, Hyperscale.'
        use-free-limit: Whether or not the database uses free monthly limits. Allowed on one database in a subscription.
        "yes": Do not prompt for confirmation.
        zone-redundant: |-
            Specifies whether to enable zone redundancy. Default is true if no value is specified.

            Accepted values: false, true
examples:
    Create a GeneralPurpose Gen5 2 vcore serverless database with auto pause delay of 120 minutes: az sql db create -g mygroup -s myserver -n mydb -e GeneralPurpose -f Gen5 -c 2 --compute-model Serverless --auto-pause-delay 120
    Create a GeneralPurpose database with locally redundant backup storage: az sql db create -g mygroup -s myserver -n mydb -e GeneralPurpose --backup-storage-redundancy Local
    Create a Hyperscale Gen5 2 vcore database with 2 read replicas: az sql db create -g mygroup -s myserver -n mydb -e Hyperscale -f Gen5 -c 2 --read-replicas 2
    Create a Standard S0 database.: az sql db create -g mygroup -s myserver -n mydb --service-objective S0
    Create a database with GeneralPurpose edition, Gen4 hardware and 1 vcore: az sql db create -g mygroup -s myserver -n mydb -e GeneralPurpose -f Gen4 -c 1
    Create a database with VBS enclave enabled.: az sql db create -g mygroup -s myserver -n mydb --preferred-enclave-type VBS
    Create a database with free limit applied: az sql db create -g mygroup -s myserver -n mydb -e GeneralPurpose -f Gen5 -c 2 --compute-model Serverless --use-free-limit --free-limit-exhaustion-behavior AutoPause
    Create a database with zone redundancy enabled: az sql db create -g mygroup -s myserver -n mydb -z
    Create a database with zone redundancy explicitly disabled: az sql db create -g mygroup -s myserver -n mydb -z false
