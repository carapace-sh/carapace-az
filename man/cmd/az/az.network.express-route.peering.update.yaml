# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update peering settings of an ExpressRoute circuit.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --advertised-public-prefixes=:
        description: Space-separated list of prefixes to be advertised through the BGP peering.
        nargs: -1
    --circuit-name=: ExpressRoute circuit name.
    --customer-asn=: Autonomous system number of the customer.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ip-version=: The IP version to update Microsoft Peering settings for.
    --legacy-mode=: Integer representing the legacy mode of the peering.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --peer-asn=: Autonomous system number of the customer/connectivity provider.
    --primary-peer-subnet=: /30(ipv4) or /126(ipv6) subnet used to configure IP addresses for primary interface.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --route-filter=: Name or ID of a route filter to apply to the peering settings.
    --routing-registry-name=: Internet Routing Registry / Regional Internet Registry.
    --secondary-peer-subnet=: /30(ipv4) or /126(ipv6) subnet used to configure IP addresses for secondary interface.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --shared-key=: Key for generating an MD5 for the BGP session.
    --subscription=: Name or ID of subscription.
    --vlan-id=: Identifier used to identify the customer.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the peering.
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        routing-registry-name:
            - ARIN
            - APNIC
            - AFRINIC
            - LACNIC
            - RIPENCC
            - RADB
            - ALTDB
            - LEVEL3
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        advertised-public-prefixes: Space-separated list of prefixes to be advertised through the BGP peering.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        circuit-name: ExpressRoute circuit name.
        customer-asn: Autonomous system number of the customer.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        ip-version: |-
            The IP version to update Microsoft Peering settings for. Allowed values: IPv4, IPv6. Default: IPv4.

            Default value: IPv4
        legacy-mode: Integer representing the legacy mode of the peering.
        name: The name of the peering.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        peer-asn: Autonomous system number of the customer/connectivity provider.
        primary-peer-subnet: /30(ipv4) or /126(ipv6) subnet used to configure IP addresses for primary interface.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        route-filter: Name or ID of a route filter to apply to the peering settings.
        routing-registry-name: |-
            Internet Routing Registry / Regional Internet Registry. Allowed values: AFRINIC, ALTDB, APNIC, ARIN, LACNIC, LEVEL3, RADB, RIPENCC.

            Accepted values: AFRINIC, ALTDB, APNIC, ARIN, LACNIC, LEVEL3, RADB, RIPENCC
        secondary-peer-subnet: /30(ipv4) or /126(ipv6) subnet used to configure IP addresses for secondary interface.
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        shared-key: Key for generating an MD5 for the BGP session.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vlan-id: Identifier used to identify the customer.
examples:
    Add IPv6 Microsoft Peering settings to existing IPv4 config.: az network express-route peering update -g MyResourceGroup --circuit-name MyCircuit --ip-version ipv6 --primary-peer-subnet 2002:db00::/126 --secondary-peer-subnet 2003:db00::/126 --advertised-public-prefixes 2002:db00::/126
    Update peering settings of an ExpressRoute circuit. (autogenerated): az network express-route peering update --circuit-name MyCircuit --name MyPeering --peer-asn 10002 --primary-peer-subnet 2002:db00::/126 --resource-group MyResourceGroup --secondary-peer-subnet 2003:db00::/126 --shared-key Abc123 --vlan-id 103
