# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Get information about IP Addresses, Hostname for all machines in an agentpool
flags:
    --cluster-name=!: Name of the managed cluster
    --nodepool-name=!: Name of the agentpool of a managed cluster
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    command: Get information about IP Addresses, Hostname for all machines in an agentpool.
    flag:
        cluster-name: Name of the managed cluster.
        nodepool-name: Name of the agentpool of a managed cluster.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get information about IP Addresses, Hostname, Availability Zones for all machines in an agentpool: az aks machine list  --resource-group <rg> --cluster-name <clusterName> --nodepool-name <apName>
    List the details for all machines in an agentpool: az aks machine list --resource-group <resourceGroupName> --cluster-name <clusterName> --nodepool-name <apName>
