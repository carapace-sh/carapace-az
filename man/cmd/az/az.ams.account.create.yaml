# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Azure Media Services account.
flags:
    --default-action=: The behavior for IP access control in Key Delivery.
    --disable-public-network=: Set this flag to disable public network access for resources under the Media Services account.
    --ip-allow-list=:
        description: The IP allow list for access control in Key Delivery.
        nargs: -1
    --mi-system-assigned=:
        description: Set the system managed identity on the media services account.
        nargs: -1
    --mi-user-assigned=:
        description: Set the user managed identities on the media services account.
        nargs: -1
    --storage-account=!: The name or resource ID of the primary storage account to attach to the Azure Media Services account.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of the resource.
completion:
    flag:
        mi-system-assigned:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        default-action: 'The behavior for IP access control in Key Delivery. Allowed values: Allow,Deny.'
        disable-public-network: |-
            Set this flag to disable public network access for resources under the Media Services account. If not set public network access will be enabled.

            Default value: False
        ip-allow-list: The IP allow list for access control in Key Delivery. If the default action is set to Allow, the IP allow list must be empty.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        mi-system-assigned: |-
            Set the system managed identity on the media services account.

            Default value: False

            Accepted values: false, true
        mi-user-assigned: Set the user managed identities on the media services account.
        name: The name of the resource.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        storage-account: The name or resource ID of the primary storage account to attach to the Azure Media Services account. The storage account MUST be in the same Azure subscription as the Media Services account. It is strongly recommended that the storage account be in the same resource group as the Media Services account. Blob only accounts are not allowed as primary.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create an Azure Media Services account.: az ams account create -n ams -g rg --storage-account mystorage -l westus
