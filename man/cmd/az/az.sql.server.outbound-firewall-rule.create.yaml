# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a new outbound firewall rule.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --outbound-rule-fqdn=!: The allowed FQDN for the outbound firewall rule.
    -s, --server=!: Name of the Azure SQL Server.
documentation:
    command: Create a new outbound firewall rule.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        outbound-rule-fqdn: The allowed FQDN for the outbound firewall rule.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a new outbound firewall rule: az sql server outbound-firewall-rule create -g mygroup -s myserver --outbound-rule-fqdn allowedFQDN
