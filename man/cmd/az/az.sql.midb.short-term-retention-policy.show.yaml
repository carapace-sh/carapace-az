# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets short term retention for database
flags:
    --deleted-time=: If specified, shows retention days for a deleted database, instead of an existing database.Must match the deleted time of a deleted database on the source Managed Instance.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --managed-instance=: Name of the Azure SQL Managed Instance.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Azure SQL Managed Database.
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        deleted-time: If specified, shows retention days for a deleted database, instead of an existing database.Must match the deleted time of a deleted database on the source Managed Instance.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Azure SQL Managed Database.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show backup short term retention for dropped managed database.: az sql midb short-term-retention-policy show -g mygroup --mi myinstance -n mymanageddb --deleted-time "2018-05-20T05:34:22"
    Shows backup short term retention for live managed database.: az sql midb short-term-retention-policy show -g mygroup --mi myinstance -n mymanageddb
