# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reschedule
description: Reschedule the ongoing planned maintenance of a flexible server.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --start-time=!: The new start time of the rescheduled maintenance.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Resource Group Name of the server.
    -m, --maintenance-name=!: The name of the maintenance.
    -s, --server-name=: The name of the server.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        maintenance-name: The name of the maintenance.
        resource-group: Resource Group Name of the server.
        server-name: The name of the server.
        start-time: |-
            The new start time of the rescheduled maintenance.

            Default value: 2026-06-30T11:12:40+00:00
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    ? reschedule a existing maintenance '_T9Q-TS8' of the server 'testserver' under resource gruop 'testgroup' to a new start time 'UTC 20240601 09:00:00'
    : az mysql flexible-server maintenance reschedule --resource-group testgroup --server-name testserver --maintenance-name _T9Q-TS8 --start-time 2024-06-01T09:00:00Z
