# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an API Management API.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --api-id=!: API identifier.
    --api-type=: The type of the API.
    --description=: Description of the API.
    --display-name=: API name.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --if-match=: ETag of the Entity.
    --no-wait=: Do not wait for the long-running operation to finish.
    --path=: Required.
    --protocols=:
        description: Describes on which protocols the operations in this API can be invoked.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --service-url=: Absolute URL of the backend service implementing this API.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription-key-header-name=: Specifies the subscription key header name.
    --subscription-key-query-param-name=: Specifies the subscription key query string parameter name.
    --subscription-required=:
        description: If true, the API requires a subscription key on requests.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
completion:
    flag:
        api-type:
            - http
            - soap
            - websocket
            - graphql
        protocols:
            - http
            - https
            - ws
            - wss
        subscription-required:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        api-id: Unique name of the api to be created. API revision identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        api-type: |-
            The type of the API.

            Accepted values: graphql, http, soap, websocket
        change-reference: The related change reference ID for this resource operation.
        description: Description of the API. May include HTML formatting tags.
        display-name: API name. Must be 1 to 300 characters long.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        if-match: ETag of the Entity. Not required when creating an entity, but required when updating an entity. Default value is None.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        path: Required. Relative URL uniquely identifying this API and all of its resource paths within the API Management service instance.
        protocols: |-
            Describes on which protocols the operations in this API can be invoked.

            Accepted values: http, https, ws, wss
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        service-url: Absolute URL of the backend service implementing this API. Cannot be more than 2000 characters long.
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        subscription-key-header-name: Specifies the subscription key header name.
        subscription-key-query-param-name: Specifies the subscription key query string parameter name.
        subscription-required: |-
            If true, the API requires a subscription key on requests.

            Accepted values: false, true
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a basic API.: az apim api update --service-name MyApim -g MyResourceGroup --api-id MyApi --description foo
