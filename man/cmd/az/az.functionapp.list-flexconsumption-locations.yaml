# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-flexconsumption-locations
description: List available locations for running function apps on the Flex Consumption plan.
flags:
    --runtime=: limit the output to just the specified runtime
    --show-details=:
        description: Include the runtime details of the regions.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --zone-redundant=:
        description: Filter the list to return only locations which support zone redundancy.
        nargs: -1
completion:
    flag:
        show-details:
            - "true"
            - "false"
        zone-redundant:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        runtime: Limit the output to just the specified runtime.
        show-details: Include the runtime details of the regions.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        zone-redundant: Filter the list to return only locations which support zone redundancy.
