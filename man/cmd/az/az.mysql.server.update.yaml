# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a server.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --assign-identity=: Generate and assign an Microsoft Entra Identity for this server for use with key management services like Azure KeyVault.
    --auto-grow=: Enable or disable autogrow of the storage.
    --backup-retention=: The number of days a backup is retained.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --minimal-tls-version=: Set the minimal TLS version for connections to server when SSL is enabled.
    --public-network-access=: Enable or disable public network access to server.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku-name=: The name of the sku.
    --ssl-enforcement=: Enable or disable ssl enforcement for connections to server.
    --storage-size=: The storage capacity of the server (unit is megabytes).
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the server.
    -p, --admin-password=: The password of the administrator.
completion:
    flag:
        auto-grow:
            - Enabled
            - Disabled
        minimal-tls-version:
            - TLS1_0
            - TLS1_1
            - TLS1_2
            - TLSEnforcementDisabled
        ssl-enforcement:
            - Enabled
            - Disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        admin-password: 'The password of the administrator. Minimum 8 characters and maximum 128 characters. Password must contain characters from three of the following categories: English uppercase letters, English lowercase letters, numbers, and non-alphanumeric characters.'
        assign-identity: |-
            Generate and assign an Microsoft Entra Identity for this server for use with key management services like Azure KeyVault.

            Default value: False
        auto-grow: |-
            Enable or disable autogrow of the storage. Default value is Enabled.

            Accepted values: Disabled, Enabled
        backup-retention: The number of days a backup is retained. Range of 7 to 35 days. Default is 7 days.
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        minimal-tls-version: |-
            Set the minimal TLS version for connections to server when SSL is enabled. Default is TLSEnforcementDisabled.

            Accepted values: TLS1_0, TLS1_1, TLS1_2, TLSEnforcementDisabled
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        public-network-access: 'Enable or disable public network access to server. When disabled, only connections made through Private Links can reach this server. Allowed values are : `Enabled`, `Disabled`, `all`, `0.0.0.0`, `<SingleIP>`, `<StartIP-DestinationIP>`. Default is `Enabled`.'
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        sku-name: 'The name of the sku. Follows the convention {pricing tier}_{compute generation}_{vCores} in shorthand. Examples: B_Gen5_1, GP_Gen5_4, MO_Gen5_16.'
        ssl-enforcement: |-
            Enable or disable ssl enforcement for connections to server. Default is Enabled.

            Accepted values: Disabled, Enabled
        storage-size: The storage capacity of the server (unit is megabytes). Minimum 5120 and increases in 1024 increments. Default is 5120.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Update a server's sku.: az mysql server update -g testgroup -n testsvrnew --sku-name GP_Gen5_4
    Update a server's tags.: az mysql server update -g testgroup -n testsvrnew --tags "k1=v1" "k2=v2"
    Update a server. (autogenerated): az mysql server update --name testsvrnew --resource-group testgroup --ssl-enforcement Enabled --minimal-tls-version TLS1_0
