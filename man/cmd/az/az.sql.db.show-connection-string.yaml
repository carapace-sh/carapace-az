# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-connection-string
description: Builds a SQL connection string for a specified client provider.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        server: Name of the Azure SQL Server. You can configure the default using `az configure --defaults sql-server=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -a, --auth-type=: Type of authentication.
    -c, --client=!: Type of client connection provider.
    -n, --name=: Name of the Azure SQL Database.
    -s, --server=: Name of the Azure SQL Server.
completion:
    flag:
        auth-type:
            - SqlPassword
            - ADPassword
            - ADIntegrated
        client:
            - ado.net
            - sqlcmd
            - jdbc
            - php_pdo
            - php
            - odbc
