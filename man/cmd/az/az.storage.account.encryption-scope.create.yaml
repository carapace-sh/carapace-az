# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an encryption scope within storage account.
flags:
    --account-name=!: The storage account name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -i, --require-infrastructure-encryption=:
        description: A boolean indicating whether or not the service applies a secondary layer of encryption with platform managed keys for data at rest.
        nargs: -1
    -n, --name=!: The name of the encryption scope within the specified storage account.
    -s, --key-source=: The provider for the encryption scope.
    -u, --key-uri=: The object identifier for a key vault key object.
completion:
    flag:
        key-source:
            - Microsoft.Storage
            - Microsoft.KeyVault
        require-infrastructure-encryption:
            - "true"
            - "false"
documentation:
    flag:
        account-name: The storage account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        key-source: |-
            The provider for the encryption scope.

            Default value: Microsoft.Storage

            Accepted values: Microsoft.KeyVault, Microsoft.Storage
        key-uri: The object identifier for a key vault key object. When applied, the encryption scope will use the key referenced by the identifier to enable customer-managed key support on this encryption scope.
        name: The name of the encryption scope within the specified storage account.
        require-infrastructure-encryption: |-
            A boolean indicating whether or not the service applies a secondary layer of encryption with platform managed keys for data at rest.

            Accepted values: false, true
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create an encryption scope within storage account based on Microsoft.KeyVault key source.: az storage account encryption-scope create --name myencryption -s Microsoft.KeyVault -u "https://vaultname.vault.azure.net/keys/keyname/1f7fa7edc99f4cdf82b5b5f32f2a50a7" --account-name mystorageaccount -g MyResourceGroup
    Create an encryption scope within storage account based on Microsoft.Storage key source.: az storage account encryption-scope create --name myencryption -s Microsoft.Storage --account-name mystorageaccount -g MyResourceGroup
    Create an encryption scope within storage account. (autogenerated): az storage account encryption-scope create --account-name mystorageaccount --key-source Microsoft.Storage --name myencryption --resource-group MyResourceGroup --subscription mysubscription
