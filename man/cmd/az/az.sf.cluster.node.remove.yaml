# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove nodes from a node type in a cluster.
flags:
    --node-type=!: the Node type name.
    --number-of-nodes-to-remove=!: number of nodes to remove.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        node-type: The Node type name. --nodes-to-remove --number-of-nodes-to-remove Number of nodes to remove.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Remove 2 'nt1' nodes from a cluster.: az sf cluster node remove -g group-name -c cluster1 --node-type 'nt1' --number-of-nodes-to-remove 2
