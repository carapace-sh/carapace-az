# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets a KQL script.
flags:
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The name of the workspace
    -n, --name=!: The name of the KQL script.
documentation:
    flag:
        name: The name of the KQL script.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The name of the workspace.
examples:
    KustoScriptsGet: az synapse kql-script show --workspace-name "kustoWorkspaceName" --name "kustoScript1"
