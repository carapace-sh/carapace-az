# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove one or more Encryption properties from a namespace.
flags:
    --encryption-config=!:
        description: List of KeyVaultProperties objects.
        nargs: -1
    --namespace-name=!: Name of the Namespace
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        encryption-config: List of KeyVaultProperties objects.
        namespace-name: Name of the Namespace.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Remove encryption properties for a namespace that has User Assigned Identity already enabled: az eventhubs namespace encryption remove --namespace-name mynamespace -g MyResourceGroup --encryption-config key-name=key1 key-vault-uri=https://mykeyvault.vault.azure.net/ user-assigned-identity=/subscriptions/{subscriptionId}}/resourceGroups/{resourcegroup}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/MSIName
