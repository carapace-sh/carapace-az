# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a public IP prefix resource.
documentation:
    flag:
        custom-ip-prefix-name: A custom prefix from which the public prefix derived. If you'd like to cross subscription, please use Resource ID instead.
        ip-tags: The list of tags associated with the public IP prefix in 'TYPE=VAL' format.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        version: 'IP address type.  Allowed values: IPv4, IPv6.'
        zone: 'Space-separated list of availability zones into which to provision the resource.  Allowed values: 1, 2, 3.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
flags:
    --custom-ip-prefix-name=: A custom prefix from which the public prefix derived.
    --edge-zone=: The name of edge zone.
    --ip-tags=:
        description: The list of tags associated with the public IP prefix in 'TYPE=VAL' format.
        nargs: -1
    --length=: Length of the prefix (i.e. `XX.XX.XX.XX/<Length>`).
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tier=: Tier of a public IP prefix SKU.
    --version=: IP address type.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of the public IP prefix.
    -z, --zone=:
        description: Space-separated list of availability zones into which to provision the resource.
        nargs: -1
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        tier:
            - Global
            - Regional
        version:
            - IPv4
            - IPv6
