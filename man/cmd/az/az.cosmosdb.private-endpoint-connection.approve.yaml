# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: approve
description: Approve a private endpoint connection request for Azure Cosmos DB.
flags:
    --description=: Comments for the approve operation.
    --id=: The ID of the private endpoint connection associated with Azure Cosmos DB.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -a, --account-name=: Name of the Cosmos DB database account.
    -g, --resource-group=: The resource group name of specified Cosmos DB account.
    -n, --name=: The name of the private endpoint connection associated with Azure Cosmos DB.
documentation:
    command: Approve the specified private endpoint connection associated with Azure Cosmos DB.
    flag:
        account-name: Name of the Cosmos DB database account. Required if --connection-id is not specified.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: Comments for the approve operation.
        id: The ID of the private endpoint connection associated with Azure Cosmos DB. If specified --account-name --resource-group/-g and --name/-n, this should be omitted.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the private endpoint connection associated with Azure Cosmos DB. Required if --connection-id is not specified.
        resource-group: The resource group name of specified Cosmos DB account. Required if --connection-id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Approve the specified private endpoint connection associated with Azure Cosmos DB.: az cosmosdb private-endpoint-connection approve --account-name MyAccount --name MyPrivateEndpoint --resource-group MyResourceGroup --description "Approved"
