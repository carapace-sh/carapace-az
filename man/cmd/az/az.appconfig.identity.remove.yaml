# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove managed identities for an App Configuration store.
flags:
    --identities=:
        description: Accept system-assigned or user-assigned managed identities separated by spaces.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name of the App Configuration store.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        identities: Accept system-assigned or user-assigned managed identities separated by spaces. Use '[system]' to refer to system-assigned managed identity, '[all]' for all managed identities or a resource ID to refer user-assigned managed identity. If this argument is not provided or this argument is provided without any value, system-assigned managed identity will be removed by default.
        name: Name of the App Configuration store. You can configure the default name using ``` az configure --defaults app_configuration_store=<name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Remove a user assigned identity from a App Configuration store.: az appconfig identity remove -g MyResourceGroup -n MyAppConfiguration --identities "/subscriptions/<SUBSCRIPTON ID>/resourcegroups/<RESOURCEGROUP>/providers/Microsoft.ManagedIdentity/userAssignedIdentities/myUserAssignedIdentity"
    Remove all identities from an App Configuration store.: az appconfig identity remove -g MyResourceGroup -n MyAppConfiguration --identities [all]
    Remove the system-assigned identity from a App Configuration store.: az appconfig identity remove -g MyResourceGroup -n MyAppConfiguration
