# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: run
description: Queues a quick run providing streamed logs for an Azure Container Registry.
flags:
    --agent-pool=: The name of the agent pool.
    --auth-mode=: Auth mode of the source registry.
    --log-template=: 'The repository and tag template for run log artifact using the format: ''log/repo:tag'' (e.g., ''acr/logs:{{.Run.ID}}'').'
    --no-format=: Indicates whether the logs should be displayed in raw format
    --no-logs=: Do not show logs after successfully queuing the build.
    --no-wait=: Do not wait for the run to complete and return immediately after queuing the run.
    --platform=: The platform where build/task is run, Eg, 'windows' and 'linux'.
    --set-secret=: Secret value in '--set name[=value]' format.
    --set=: Value in 'name[=value]' format.
    --subscription=: Name or ID of subscription.
    --timeout=: The timeout in seconds.
    --values=: The task values file path relative to the source context.
    -f, --file=: The task template/definition file path relative to the source context.
    -g, --resource-group=: Name of resource group.
    -r, --registry=!: The name of the container registry.
completion:
    flag:
        auth-mode:
            - None
            - Default
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        agent-pool: The name of the agent pool.
        auth-mode: Auth mode of the source registry.
        change-reference: The related change reference ID for this resource operation.
        cmd: Commands to execute. This also supports additional docker run parameters ( https://docs.docker.com/engine/reference/commandline/run/ ) or even other docker commands ( https://docs.docker.com/engine/reference/commandline/docker/ ).
        file: The task template/definition file path relative to the source context. It can be '-' to pipe a file from the standard input.
        log-template: 'The repository and tag template for run log artifact using the format: ''log/repo:tag'' (e.g., ''acr/logs:{{.Run.ID}}''). Only applicable to CMK enabled registry.'
        no-format: Indicates whether the logs should be displayed in raw format.
        no-logs: Do not show logs after successfully queuing the build.
        no-wait: Do not wait for the run to complete and return immediately after queuing the run.
        platform: The platform where build/task is run, Eg, 'windows' and 'linux'. When it's used in build commands, it also can be specified in 'os/arch/variant' format for the resulting image. Eg, linux/arm/v7. The 'arch' and 'variant' parts are optional.
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: Value in 'name[=value]' format. Multiples supported by passing --set multiple times.
        set-secret: Secret value in '--set name[=value]' format. Multiples supported by passing --set multiple times.
        source-acr-auth-id: Assign the identity used for source registry login. Use '[caller]' for caller identity.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: The timeout in seconds.
        values: The task values file path relative to the source context. <SOURCE_LOCATION> The local source code directory path (e.g., './src'), or the URL to a git repository (e.g., 'https://github.com/Azure-Samples/acr-build-helloworld-node.git'), or a remote tarball (e.g., 'http://server/context.tar.gz'), or the repository of an OCI artifact in an Azure container registry (e.g., 'oci://myregistry.azurecr.io/myartifact:mytag'). If '/dev/null' is specified, the value will be set to None and ignored.
examples:
    Queue a local context, pushed to ACR with streaming logs.: az acr run -r myregistry -f bash-echo.yaml ./workspace
    Queue a remote OCI Artifact context and runs the task.: az acr run -r myregistry oci://myregistry.azurecr.io/myartifact:mytag -f hello-world.yaml
    Queue a remote git context with streaming logs and runs the task on Linux platform.: az acr run -r myregistry https://github.com/Azure-Samples/acr-tasks.git -f build-hello-world.yaml --platform linux
    Queue a remote git context with streaming logs.: az acr run -r myregistry https://github.com/Azure-Samples/acr-tasks.git -f hello-world.yaml
    ? Queue a run to execute a container command in an ABAC-based Repository Permission enabled registry and use the caller's Entra identity to authenticate with the source registry.
    : az acr run -r myregistry --cmd '$Registry/myimage' /dev/null --source-acr-auth-id [caller]
    Queue a run to execute a container command.: az acr run -r myregistry --cmd '$Registry/myimage' /dev/null
    Queue a run to execute the tasks passed through the pipe.: cat task.yaml | az acr run -r myregistry -f - /dev/null
    ? Queue a run with the task definition from the standard input. Either 'Ctrl + Z'(Windows) or 'Ctrl + D'(Linux) terminates the input stream.
    : az acr run -r myregistry -f - /dev/null
