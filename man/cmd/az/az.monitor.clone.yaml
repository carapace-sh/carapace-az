# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: clone
description: Clone metrics alert rules from one resource to another resource.
flags:
    --always-clone=: If this argument is applied, all monitor settings would be cloned instead of expanding its scope.
    --source-resource=!: Resource ID of the source resource.
    --subscription=: Name or ID of subscription.
    --target-resource=!: Resource ID of the target resource.
    -t, --types=:
        description: List of types of monitor settings which would be cloned.
        nargs: -1
completion:
    flag:
        types:
            - metricsAlert
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        always-clone: |-
            If this argument is applied, all monitor settings would be cloned instead of expanding its scope.

            Default value: False
        change-reference: The related change reference ID for this resource operation.
        source-resource: Resource ID of the source resource.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-resource: Resource ID of the target resource.
        types: |-
            List of types of monitor settings which would be cloned.

            Default value: ['metricsAlert']

            Accepted values: metricsAlert
examples:
    Clone the metric alert settings from one VM to another: az monitor clone --source-resource /subscriptions/{subscriptionID}/resourceGroups/Space1999/providers/Microsoft.Compute/virtualMachines/vm1 --target-resource /subscriptions/{subscriptionID}/resourceGroups/Space1999/providers/Microsoft.Compute/virtualMachines/vm2
