# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: build-params
description: Build .bicepparam file.
flags:
    --no-restore=: When set, builds the .bicepparam file without restoring external modules.
    --outdir=: When set, saves the output at the specified directory.
    --outfile=: When set, saves the output as the specified file path.
    --stdout=: When set, prints all output to stdout instead of corresponding files.
    --subscription=: Name or ID of subscription.
    -f, --file=!: The path to the .bicepparam file to build in the file system.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        file: The path to the .bicepparam file to build in the file system.
        no-restore: When set, builds the .bicepparam file without restoring external modules.
        outdir: When set, saves the output at the specified directory.
        outfile: When set, saves the output as the specified file path.
        stdout: When set, prints all output to stdout instead of corresponding files.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Build a .bicepparam file and print all output to stdout.: az bicep build-params --file {bicepparam_file} --stdout
    Build a .bicepparam file and save the result to the specified file.: az bicep build-params --file {bicepparam_file} --outfile {out_file}
    Build a .bicepparam file.: az bicep build-params --file {bicepparam_file}
