# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a frontend IP address.
flags:
    --gateway-name=!: Name of the application gateway.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --private-ip-address=: Static private IP address to use.
    --public-ip-address=: Name or ID of the public IP address.
    --subnet=: Name or ID of the subnet.
    --subscription=: Name or ID of subscription.
    --vnet-name=: Name of the virtual network corresponding to the subnet.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the frontend IP configuration.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        gateway-name: Name of the application gateway.
        name: Name of the frontend IP configuration.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        private-ip-address: Static private IP address to use.
        public-ip-address: Name or ID of the public IP address.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subnet: Name or ID of the subnet. If using Name, you need to provide `--vnet-name` as well.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vnet-name: Name of the virtual network corresponding to the subnet.
examples:
    Create a frontend IP address with subnet.: az network application-gateway frontend-ip create --gateway-name MyAppGateway --name MyFrontendIp --private-ip-address 10.10.10.50 --resource-group MyResourceGroup --subnet MySubnet --vnet-name MyVnet
    Create a frontend IP address.: az network application-gateway frontend-ip create -g MyResourceGroup --gateway-name MyAppGateway -n MyFrontendIp --public-ip-address MyPublicIpAddress
