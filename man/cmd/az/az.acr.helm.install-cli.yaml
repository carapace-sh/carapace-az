# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: install-cli
description: Install Helm command-line tool.
flags:
    --client-version=: The target Helm CLI version.
    --install-location=: Path at which to install Helm CLI (Existing one at the same path will be overwritten)
    --subscription=: Name or ID of subscription.
    -y, --yes=: Agree to the license of Helm, and do not prompt for confirmation.
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        client-version: |-
            The target Helm CLI version. (Attention: Currently, Helm 3 does not work with "az acr helm" commands).

            Default value: 2.16.3
        install-location: |-
            Path at which to install Helm CLI (Existing one at the same path will be overwritten).

            Default value: ~\.azure-helm\helm.exe
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Agree to the license of Helm, and do not prompt for confirmation.

            Default value: False
examples:
    Install a specified version of Helm CLI to a specified location: az acr helm install-cli --client-version x.x.x --install-location /folder/filename
    Install a specified version of Helm CLI to the default location: az acr helm install-cli --client-version x.x.x
    Install the default version of Helm CLI to a specified location: az acr helm install-cli --install-location /folder/filename
    Install the default version of Helm CLI to the default location: az acr helm install-cli
