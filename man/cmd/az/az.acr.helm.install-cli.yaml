# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: install-cli
description: Install Helm command-line tool.
documentation:
    flag:
        client-version: 'The target Helm CLI version. (Attention: Currently, Helm 3 does not work with "az acr helm" commands) '
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --client-version=: The target Helm CLI version.
    --install-location=: Path at which to install Helm CLI (Existing one at the same path will be overwritten)
    --subscription=: Name or ID of subscription.
    -y, --yes=: Agree to the license of Helm, and do not prompt for confirmation.
