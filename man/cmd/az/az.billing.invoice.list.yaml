# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the invoices for a subscription.
flags:
    --account-name=: The ID that uniquely identifies a billing account.
    --period-end-date=!: The end date to fetch the invoices.
    --period-start-date=!: The start date to fetch the invoices.
    --profile-name=: The ID that uniquely identifies a billing profile.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        account-name: The ID that uniquely identifies a billing account.
        period-end-date: The end date to fetch the invoices. The date should be specified in YYYY-MM-DD format.
        period-start-date: The start date to fetch the invoices. The date should be specified in YYYY-MM-DD format.
        profile-name: The ID that uniquely identifies a billing profile.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List invoices by billing account and profile name with default properties: az billing invoice list --account-name "{billingAccountName}" --profile-name "{billingProfileName}" --period-end-date "2018-06-30" --period-start-date "2018-01-01"
    List invoices by billing account and profile name with expanded properties: az billing invoice list --account-name "{billingAccountName}" --profile-name "{billingProfileName}" --period-end-date "2018-06-30" --period-start-date "2018-01-01"
