# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: logs
description: Show logs for a particular run.
flags:
    --no-format=: Indicates whether the logs should be displayed in raw format
    --run-id=: The unique run identifier.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the task.
    -r, --registry=!: The name of the container registry.
    -t, --image=: The name of the image.
documentation:
    command: Show logs for a particular run. If no run-id is supplied, show logs for the last created run.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        image: The name of the image. May include a tag in the format 'name:tag' or digest in the format 'name@digest'.
        name: The name of the task.
        no-format: |-
            Indicates whether the logs should be displayed in raw format.

            Default value: False
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        run-id: The unique run identifier.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show logs for a particular run.: az acr task logs -r myregistry --run-id runId
    Show logs for the last created run in the registry that built the image 'hello-world'.: az acr task logs -r myregistry --image hello-world
    Show logs for the last created run in the registry, filtered by task.: az acr task logs -r myregistry -n MyTask
    Show logs for the last created run in the registry.: az acr task logs -r myregistry
