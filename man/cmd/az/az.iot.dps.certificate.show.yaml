# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show information about a particular certificate in an Azure IoT Hub Device Provisioning Service instance.
flags:
    --dps-name=!: IoT Hub Device Provisioning Service name
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --certificate-name=!: A friendly name for the certificate.
documentation:
    flag:
        dps-name: IoT Hub Device Provisioning Service name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show details about MyCertificate in an Azure IoT Hub Device Provisioning Service instance: az iot dps certificate show --dps-name MyDps --resource-group MyResourceGroup --name MyCertificate
    Show information about a particular Azure IoT Hub Device Provisioning Service certificate. (autogenerated): az iot dps certificate show --certificate-name MyCertificate --dps-name MyDps --resource-group MyResourceGroup --subscription MySubscription
