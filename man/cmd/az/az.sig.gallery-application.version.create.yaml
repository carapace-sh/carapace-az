# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a gallery application version.
documentation:
    flag:
        config-file-name: Optional. The name to assign the downloaded config file on the VM. This is limited to 4096 characters. If not specified, the config file will be named the Gallery Application name appended with "_config".
        default-file-link: Optional. The default configuration link of the artifact, must be a readable storage page blob.
        end-of-life-date: The end of life date of the gallery image version. This property can be used for decommissioning purposes. This property is updatable.
        install-command: Required. The path and arguments to install the gallery application. This is limited to 4096 characters.
        package-file-link: Required. The mediaLink of the artifact, must be a readable storage page blob.
        package-file-name: Optional. The name to assign the downloaded package file on the VM. This is limited to 4096 characters. If not specified, the package file will be named the same as the Gallery Application name.
        remove-command: Required. The path and arguments to remove the gallery application. This is limited to 4096 characters.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        target-regions: The target regions where the Image Version is going to be replicated to. This property is updatable.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        update-command: Optional. The path and arguments to update the gallery application. If not present, then update operation will invoke remove command on the previous version and install command on the current version of the gallery application. This is limited to 4096 characters.
flags:
    --application-name=!: The name of the gallery application.
    --config-file-name=: Optional.
    --default-file-link=: Optional.
    --end-of-life-date=: The end of life date of the gallery image version.
    --exclude-from=:
        description: If set to true, Virtual Machines deployed from the latest version of the Image Definition won't use this Image Version.
        nargs: -1
    --install-command=!: Required.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --package-file-link=!: Required.
    --package-file-name=: Optional.
    --remove-command=!: Required.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --target-regions=:
        description: The target regions where the Image Version is going to be replicated to.
        nargs: -1
    --update-command=: Optional.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Resource location  When not specified, the location of the resource group will be used.
    -n, --name=!: The name of the gallery application version.
    -r, --gallery-name=!: Gallery name.
completion:
    flag:
        exclude-from:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
