# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a resource-level lock.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
    --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
    --resource-type=: 'The resource type (Ex: ''resC'').'
    --resource=: If an ID is given, other resource arguments should not be given.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the lock
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
        name: Name of the lock.
        namespace: 'Provider namespace (Ex: ''Microsoft.Provider'').'
        parent: 'The parent path (Ex: ''resA/myA/resB/myB'').'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'The resource type (Ex: ''resC''). Can also accept namespace/type format (Ex: ''Microsoft.Provider/resC'').'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Delete a resource level lock: az resource lock delete --name lockName -g MyResourceGroup --resource myvnet --resource-type Microsoft.Network/virtualNetworks
    Delete a resource level lock on a vnet using a vnet id.: az resource lock delete -n lockName --resource /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VMName}
    Delete a resource-level lock. (autogenerated): az resource lock delete --ids /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Web/sites/{WebApp}
