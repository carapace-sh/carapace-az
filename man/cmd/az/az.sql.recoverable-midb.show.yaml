# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets a recoverable managed database.
flags:
    --mi=!: The name of the managed instance.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --database-name=!: The id of recoverable database from geo-replicated instance
documentation:
    command: Get recoverable managed database.
    flag:
        database-name: The id of recoverable database from geo-replicated instance. --instance-name --mi The name of the managed instance. Required.
        mi: The name of the managed instance. Required.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get recoverable managed database: az sql recoverable-midb show -g mygroup --mi myinstance -n mymanageddb
