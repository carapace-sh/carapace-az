# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create PrivateEndpointConnections of service namespace.
flags:
    --description=: Description of the connection state.
    --namespace-name=!: The namespace name
    --provisioning-state=: Provisioning state of the Private Endpoint Connection.
    --status=: Status of the connection.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The PrivateEndpointConnection name
completion:
    flag:
        provisioning-state:
            - Canceled
            - Creating
            - Deleting
            - Failed
            - Succeeded
            - Updating
        status:
            - Approved
            - Disconnected
            - Pending
            - Rejected
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: Description of the connection state.
        namespace-name: The namespace name.
        provisioning-state: |-
            Provisioning state of the Private Endpoint Connection.

            Accepted values: Canceled, Creating, Deleting, Failed, Succeeded, Updating
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        status: |-
            Status of the connection.

            Accepted values: Approved, Disconnected, Pending, Rejected
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
