# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete specified deployment stack from management group scope
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --action-on-unmanage=!: Defines what happens to resources that are no longer managed after the stack is updated or deleted.
    --bypass-stack-out-of-sync-error=:
        description: Flag to bypass service errors that indicate the stack resource list is not correctly synchronized.
        nargs: -1
    --id=: The deployment stack resource id.
    --subscription=: Name or ID of subscription.
    --yes=: Do not prompt for confirmation
    -m, --management-group-id=!: The management group id to create stack at.
    -n, --name=: The deployment stack name
completion:
    flag:
        action-on-unmanage:
            - deleteAll
            - deleteResources
            - detachAll
        bypass-stack-out-of-sync-error:
            - "true"
            - "false"
