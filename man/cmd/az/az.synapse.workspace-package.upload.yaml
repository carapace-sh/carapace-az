# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upload
description: Upload a local workspace package file to an Azure Synapse workspace.
flags:
    --no-progress=: Include this flag to disable progress reporting for the command.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -f, --package=!: Specifies a local file path for a file to upload as workspace package.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        no-progress: |-
            Include this flag to disable progress reporting for the command.

            Default value: False
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    Upload a local workspace package file to an Azure Synapse workspace.: |-
        az synapse workspace-package upload --workspace-name testsynapseworkspace \
          --package C:/package.jar
