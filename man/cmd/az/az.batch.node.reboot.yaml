# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reboot
description: Restarts the specified Compute Node.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --json-file=: A file containing the parameters specification in JSON (formatted to match the respective REST API body).
    --node-id=!: The ID of the Compute Node that you want to restart.
    --node-reboot-option=: When to reboot the Compute Node and what to do with currently running Tasks.
    --pool-id=!: The ID of the Pool that contains the Compute Node.
    --subscription=: Name or ID of subscription.
documentation:
    command: Reboot a Batch compute node.
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        json-file: A file containing the parameters specification in JSON (formatted to match the respective REST API body). If this parameter is specified, all 'Parameters Arguments' are ignored.
        node-id: The ID of the Compute Node that you want to restart. Required.
        node-reboot-option: 'When to reboot the Compute Node and what to do with currently running Tasks. The default value is requeue. Known values are: "requeue", "terminate", "taskcompletion", and "retaineddata".'
        pool-id: The ID of the Pool that contains the Compute Node. Required.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Reboot the node and requeue tasks.: az batch node reboot --pool-id pool1 --node-id node1
    Reboot the node when tasks complete.: az batch node reboot --pool-id pool1 --node-id node1 --node-reboot-option taskcompletion
