# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates the failover group.
flags:
    --add-db=:
        description: List of databases to add to Failover Group
        nargs: -1
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --failover-policy=: The failover policy of the Failover Group
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --grace-period=: Interval in hours before automatic failover is initiated if an outage occurs on the primary server.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --remove-db=:
        description: List of databases to remove from Failover Group
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --secondary-type=: Databases secondary type on partner server
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the Failover Group
    -s, --server=: Name of the Azure SQL Server.
completion:
    flag:
        failover-policy:
            - Automatic
            - Manual
        secondary-type:
            - Geo
            - Standby
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        add-db: List of databases to add to Failover Group.
        change-reference: The related change reference ID for this resource operation.
        failover-policy: |-
            The failover policy of the Failover Group.

            Accepted values: Automatic, Manual
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        grace-period: Interval in hours before automatic failover is initiated if an outage occurs on the primary server. This indicates that Azure SQL Database will not initiate automatic failover before the grace period expires. Please note that failover operation with --allow-data-loss option might cause data loss due to the nature of asynchronous synchronization.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Failover Group.
        partner-server-ids: The list of partner server resource id's of the Failover Group.
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        remove-db: List of databases to remove from Failover Group.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        ro-endpoint-target: The resource id of the read only endpoint target server.
        ro-failover-policy: |-
            The policy of the read only endpoint of the Failover Group.

            Accepted values: Disabled, Enabled
        secondary-type: |-
            Databases secondary type on partner server.

            Accepted values: Geo, Standby
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
