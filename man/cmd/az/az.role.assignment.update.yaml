# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an existing role assignment for a user, group, or service principal.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --role-assignment=!: Description of an existing role assignment as JSON, or a path to a file containing a JSON description.
    --subscription=: Name or ID of subscription.
