# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-sub-definitions
description: List the metric definitions for the subscription.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --metricnamespace=: Metric namespace where the metrics you want reside.
    --region=!: The region where the metrics you want reside.
    --subscription=: Name or ID of subscription.
