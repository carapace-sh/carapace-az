# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a file server.
documentation:
    flag:
        caching-type: Caching type for premium disks. If not provided via command line or in configuration file, no caching will be used.
        config-file: A path to a json file containing file server create parameters (json representation of azure.mgmt.batchai.models.FileServerCreateParameters). Note, parameters given via command line will overwrite parameters specified in the configuration file.
        resource-group: Name of resource group. You can configure a default value by setting up default workspace using `az batchai workspace set-default`.
        ssh-key: Optional SSH public key value or path. If ommited and no password specified, default SSH key (~/.ssh/id_rsa.pub) will be used.
        subnet: ARM ID of a virtual network subnet to put the file server in. If not provided via command line or in the configuration file, Batch AI will create a new virtual network and subnet under your subscription.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-name: Name of admin user account to be created on NFS node. If the value is not provided and no user configuration is provided in the config file, current user's name will be used.
        workspace: Name or ARM ID of the workspace. You can configure default workspace using `az batchai workspace set-default`
flags:
    --caching-type=: Caching type for premium disks.
    --disk-count=: Number of disks.
    --disk-size=: Disk size in Gb.
    --generate-ssh-keys=: Generate SSH public and private key files in ~/.ssh directory (if missing).
    --no-wait=: Do not wait for the long-running operation to finish.
    --storage-sku=: The sku of storage account to persist VM.
    --subnet=: ARM ID of a virtual network subnet to put the file server in.
    --subscription=: Name or ID of subscription.
    -f, --config-file=: A path to a json file containing file server create parameters (json representation of azure.mgmt.batchai.models.FileServerCreateParameters).
    -g, --resource-group=!: Name of resource group.
    -k, --ssh-key=: Optional SSH public key value or path.
    -n, --name=!: Name of file server.
    -p, --password=: Optional password for the admin user created on the NFS node.
    -s, --vm-size=: VM size.
    -u, --user-name=: Name of admin user account to be created on NFS node.
    -w, --workspace=!: Name or ARM ID of the workspace.
completion:
    flag:
        caching-type:
            - none
            - readonly
            - readwrite
        storage-sku:
            - Premium_LRS
            - Standard_LRS
