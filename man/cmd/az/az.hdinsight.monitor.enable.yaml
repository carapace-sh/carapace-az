# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable
description: Enable the Classic Azure Monitor logs integration on an HDInsight cluster.
documentation:
    flag:
        no-validation-timeout: Permit timeout error during argument validation phase. If omitted, validation timeout error will be permitted.
        primary-key: The certificate for the Log Analytics workspace. Required when workspace ID is provided.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --no-validation-timeout=: Permit timeout error during argument validation phase.
    --primary-key=: The certificate for the Log Analytics workspace.
    --subscription=: Name or ID of subscription.
    --workspace=!: The name, resource ID or workspace ID of Log Analytics workspace.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the cluster.
