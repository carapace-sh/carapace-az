# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: get
description: Get a configuration.
flags:
    --local=: Include local configuration.
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        local: |-
            Include local configuration. Scan from the working directory up to the root drive, then the global configuration and return the first occurrence.

            Default value: False
examples:
    Get all configurations.: az config get
    Get configurations in `core` section.: az config get core
    Get the configuration of key `core.no_color`.: az config get core.no_color
