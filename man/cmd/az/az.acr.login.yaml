# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: login
description: Log in to an Azure Container Registry through the Docker CLI.
flags:
    --subscription=: Name or ID of subscription.
    --suffix=: The tenant suffix in registry login server.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
    -p, --password=: The password used to log into a container registry
    -t, --expose-token=: Expose access token instead of automatically logging in through Docker CLI
    -u, --username=: The username used to log into a container registry
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        endpoint: Log in to a specific regional endpoint of the container registry. Specify the region name (e.g., eastus, westus2). Only applicable when regional endpoints are enabled.
        expose-token: |-
            Expose refresh token instead of automatically logging in through Docker CLI.

            Default value: False
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        password: The password used to log into a container registry.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        suffix: The tenant suffix in registry login server. You may specify '--suffix tenant' if your registry login server is in the format 'registry-tenant.azurecr.io'. Applicable if you're accessing the registry from a different subscription or you have permission to access images but not the permission to manage the registry resource.
        username: The username used to log into a container registry.
examples:
    Get an Azure Container Registry access token: az acr login -n myregistry --expose-token
    ? Log in to a specific regional endpoint of an Azure Container Registry. Requires regional endpoints to be enabled on the registry.
    : az acr login -n myregistry --endpoint eastus
    Log in to an Azure Container Registry: az acr login -n myregistry
