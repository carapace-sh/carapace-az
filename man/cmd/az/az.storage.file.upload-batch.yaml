# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upload-batch
description: Upload local files to Azure Storage File Share in batch
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit'
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING'
        destination-path: The directory where the source data is copied to. If omitted, data is copied to the root directory.
        disallow-trailing-dot: If true, the trailing dot will be trimmed from the target URI. Default to False
        dryrun: List the files and blobs to be uploaded. No actual data transfer will occur.
        file-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with `az storage account show`. Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT'
        max-connections: The maximum number of parallel connections to use. Default value is 1.
        metadata: Metadata in space-separated key=value pairs. This overwrites any existing metadata.
        pattern: The pattern used for file globbing. The supported patterns are '*', '?', '[seq]', and '[!seq]'. For more information, please refer to https://docs.python.org/3/library/fnmatch.html.
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_SAS_TOKEN'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --connection-string=: Storage account connection string.
    --content-cache-control=: The cache control string.
    --content-disposition=: Conveys additional information about how to process the response payload, and can also be used to attach additional metadata.
    --content-encoding=: The content encoding type.
    --content-language=: The content language.
    --content-md5=: The content's MD5 hash.
    --content-type=: The content MIME type.
    --destination-path=: The directory where the source data is copied to.
    --disallow-trailing-dot=:
        description: If true, the trailing dot will be trimmed from the target URI.
        nargs: -1
    --dryrun=: List the files and blobs to be uploaded.
    --file-endpoint=: Storage data service endpoint.
    --max-connections=: The maximum number of parallel connections to use.
    --metadata=:
        description: Metadata in space-separated key=value pairs.
        nargs: -1
    --no-progress=: Include this flag to disable progress reporting for the command.
    --pattern=: The pattern used for file globbing.
    --sas-token=: A Shared Access Signature (SAS).
    --subscription=: Name or ID of subscription.
    --validate-content=: If set, calculates an MD5 hash for each range of the file for validation.
    -d, --destination=!: ""
    -s, --source=!: ""
completion:
    flag:
        disallow-trailing-dot:
            - "true"
            - "false"
