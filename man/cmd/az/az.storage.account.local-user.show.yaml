# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the local user of the storage account by username.
flags:
    --account-name=!: The storage account name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --user-name=!: The name of local user.
documentation:
    command: Show info for a local user.
    flag:
        account-name: The storage account name. --name --user-name -n The name of local user. The username must contain lowercase letters and numbers only. It must be unique only within the storage account.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-name: The name of local user. The username must contain lowercase letters and numbers only. It must be unique only within the storage account.
examples:
    Show info for a local-user: az storage account local-user show --account-name {account-name} -g {resource-group} -n {username}
