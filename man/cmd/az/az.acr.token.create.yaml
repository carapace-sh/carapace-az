# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a token associated with a scope map for an Azure Container Registry.
flags:
    --expiration-in-days=: Number of days for which the credentials will be valid.
    --expiration=: UTC time for which the credentials will be valid.
    --gateway=:
        description: gateway permissions.
        nargs: -1
    --no-passwords=:
        description: Do not generate passwords during token creation.
        nargs: -1
    --repository=:
        description: repository permissions.
        nargs: -1
    --scope-map=: The name of the scope map with pre-configured repository permissions.
    --status=: The status of the token
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the token.
    -r, --registry=!: The name of the container registry.
completion:
    flag:
        no-passwords:
            - "true"
            - "false"
        status:
            - enabled
            - disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        expiration: UTC time for which the credentials will be valid. In the format of %Y-%m-%dT%H:%M:%SZ, e.g. 2025-12-31T12:59:59Z.
        expiration-in-days: Number of days for which the credentials will be valid. If not specified, the expiration will default to the max value "9999-12-31T23:59:59.999999+00:00".
        gateway: Gateway permissions. Use the format "--gateway GATEWAY [ACTION1 ACTION2 ...]" per flag. Valid actions are ['config/read', 'config/write', 'message/read', 'message/write'].
        name: The name of the token.
        no-passwords: |-
            Do not generate passwords during token creation. You can generate the passwords after the token is created by using ``` az acr token credentials generate ``` command.

            Accepted values: false, true
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        repository: Repository permissions. Use the format "--repository REPO [ACTION1 ACTION2 ...]" per flag. Valid actions are ['content/delete', 'content/read', 'content/write', 'metadata/read', 'metadata/write'].
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scope-map: The name of the scope map with pre-configured repository permissions. Use "--repository" and/or "--gateway" if you would like CLI to configure one for you.
        status: |-
            The status of the token.

            Default value: enabled

            Accepted values: disabled, enabled
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a token in disabled status.: az acr token create -n MyToken -r myregistry --scope-map MyScopeMap --status disabled
    Create a token which has read permissions on hello-world repository.: az acr token create -n myToken -r myregistry --repository hello-world content/read metadata/read
    Create a token with repository permissions defined in the scope map 'MyScopeMap'.: az acr token create -n MyToken -r myregistry --scope-map MyScopeMap
    Create a token without credentials and with all gateway permissions.: |-
        az acr token create -n myToken -r myregistry --repository hello-world content/read
          --gateway registry config/read config/write message/read message/write --no-passwords
