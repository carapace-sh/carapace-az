# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Check parameters are provided correctly, then call _create_role_assignment.
flags:
    --assignee-object-id=: Use this parameter instead of '--assignee' to bypass Graph API invocation in case of insufficient privileges.
    --assignee-principal-type=: use with --assignee-object-id to avoid errors caused by propagation latency in Microsoft Graph
    --assignee=: represent a user, group, or service principal.
    --condition-version=: Version of the condition syntax.
    --condition=: Condition under which the user can be granted permission.
    --description=: Description of role assignment.
    --role=!: role name or id
    --scope=!: scope at which the role assignment or definition applies to, e.g., /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, or /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM
    --subscription=: Name or ID of subscription.
    -n, --name=: A GUID for the role assignment.
completion:
    flag:
        assignee-principal-type:
            - User
            - Group
            - ServicePrincipal
            - ForeignGroup
documentation:
    command: Create a new role assignment for a user, group, or service principal.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        assignee: 'Represent a user, group, or service principal. supported format: object id, user sign-in name, or service principal name.'
        assignee-object-id: Use this parameter instead of '--assignee' to bypass Graph API invocation in case of insufficient privileges. This parameter only works with object ids for users, groups, service principals, and managed identities. For managed identities use the principal id. For service principals, use the object id and not the app id.
        assignee-principal-type: |-
            Use with --assignee-object-id to avoid errors caused by propagation latency in Microsoft Graph.

            Accepted values: ForeignGroup, Group, ServicePrincipal, User
        change-reference: The related change reference ID for this resource operation.
        condition: Condition under which the user can be granted permission.
        condition-version: Version of the condition syntax. If --condition is specified without --condition-version, default to 2.0.
        description: Description of role assignment.
        name: A GUID for the role assignment. It must be unique and different for each role assignment. If omitted, a new GUID is generated.
        role: Role name or id.
        scope: Scope at which the role assignment or definition applies to, e.g., /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, or /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create role assignment for an assignee with description and condition.: az role assignment create --role Owner --scope /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyResourceGroup/providers/Microsoft.Storage/storageAccounts/MyStorageAccount --assignee "John.Doe@Contoso.com" --description "Role assignment foo to check on bar" --condition "@Resource[Microsoft.Storage/storageAccounts/blobServices/containers:Name] stringEquals 'foo'" --condition-version "2.0"
    Create role assignment to grant the specified assignee the Reader role on an Azure virtual machine.: az role assignment create --assignee sp_name --role Reader --scope /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyResourceGroup/providers/Microsoft.Compute/virtualMachines/MyVm
    Create role assignment with your own assignment name.: az role assignment create --assignee-object-id 00000000-0000-0000-0000-000000000000 --assignee-principal-type ServicePrincipal --role Reader --scope /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyResourceGroup --name 00000000-0000-0000-0000-000000000000
