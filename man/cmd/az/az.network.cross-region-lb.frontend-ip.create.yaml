# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a frontend IP address.
flags:
    --lb-name=!: The load balancer name.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --public-ip-address=: Name or ID of the existing public IP to associate with the configuration.
    --public-ip-prefix=: Name or ID of a public IP prefix.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the frontend IP configuration.
    -z, --zone=:
        description: A list of availability zones denoting the IP allocated for the resource needs to come from.
        nargs: -1
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        lb-name: The load balancer name.
        name: The name of the frontend IP configuration.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        public-ip-address: Name or ID of the existing public IP to associate with the configuration.
        public-ip-prefix: Name or ID of a public IP prefix.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        zone: A list of availability zones denoting the IP allocated for the resource needs to come from.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Create a frontend ip address for a public load balancer.: az network cross-region-lb frontend-ip create -g MyResourceGroup --lb-name MyLb -n MyFrontendIp --public-ip-address MyFrontendIp
