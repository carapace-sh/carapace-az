# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new security policy within the specified profile.
flags:
    --domains=!:
        description: The domains to associate with the WAF policy.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
    --subscription=: Name or ID of subscription.
    --waf-policy=!: The ID of Front Door WAF policy.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the security policy under the profile.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        domains: The domains to associate with the WAF policy. Could either be the ID of an endpoint(default domain will be used in that case) or ID of a custom domain.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more. --name --security-policy-name -n Name of the security policy under the profile.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        profile-name: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        waf-policy: The ID of Front Door WAF policy.
examples:
    Creates a security policy to apply the specified WAF policy to an endpoint's default domain and a custom domain.: az afd security-policy create -g group --profile-name profile --security-policy-name sp1 --domains /subscriptions/sub1/resourcegroups/rg1/providers/Microsoft.Cdn/profiles/profile1/afdEndpoints/endpoint1 /subscriptions/sub1/resourcegroups/rg1/providers/Microsoft.Cdn/profiles/profile1/customDomains/customDomain1 --waf-policy /subscriptions/sub1/resourcegroups/rg1/providers/Microsoft.Network/frontdoorwebapplicationfirewallpolicies/waf1
