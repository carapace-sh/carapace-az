# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: redis-enterprise
description: Create a Service Connector local connection to redis-enterprise.
documentation:
    flag:
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        database: Name of the redis enterprise database. Required if '--target-id' is not specified.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        server: Name of the redis enterprise server. Required if '--target-id' is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-id: The resource id of target service. Required if ['--target-resource-group', '--server', '--database'] are not specified.
        target-resource-group: The resource group which contains the redis server. Required if '--target-id' is not specified.
flags:
    --client-type=: The client type used on the connection
    --connection=: Name of the connection.
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --database=: Name of the redis enterprise database.
    --no-wait=: Do not wait for the long-running operation to finish.
    --secret=:
        description: The secret auth info
        nargs: -1
    --server=: Name of the redis enterprise server.
    --subscription=: Name or ID of subscription.
    --target-id=: The resource id of target service.
    --target-resource-group=: The resource group which contains the redis server.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - go
            - springBoot
            - none
