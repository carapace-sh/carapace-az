# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists the account keys for the specified Cognitive Services account.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: cognitive service account name
documentation:
    command: Manage Azure Cognitive Services accounts.
    flag:
        name: Cognitive service account name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get current resource keys.: az cognitiveservices account keys list --name myresource -g cognitive-services-resource-group
    Manage Azure Cognitive Services accounts. (autogenerated): az cognitiveservices account keys list --name myresource --resource-group cognitive-services-resource-group --subscription MySubscription
