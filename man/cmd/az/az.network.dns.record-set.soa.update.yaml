# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update properties of an SOA record.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --if-none-match=: Create the record set only if it does not already exist.
    --subscription=: Name or ID of subscription.
    -e, --email=: Email address.
    -f, --refresh-time=: Refresh value (seconds).
    -g, --resource-group=!: Name of resource group.
    -m, --minimum-ttl=: Minimum TTL (time-to-live, seconds).
    -r, --retry-time=: Retry time (seconds).
    -s, --serial-number=: Serial number.
    -t, --host=: Host name.
    -x, --expire-time=: Expire time (seconds).
    -z, --zone-name=!: The name of the zone.
