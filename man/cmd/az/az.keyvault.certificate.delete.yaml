# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete all versions of a certificate.
documentation:
    flag:
        id: Id of the certificate. If specified all other 'Id' arguments should be omitted.
        name: Name of the certificate. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Key Vault. Required if --id is not specified
flags:
    --id=: Id of the certificate.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Key Vault.
    -n, --name=: Name of the certificate.
