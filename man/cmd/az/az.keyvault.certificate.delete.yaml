# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete all versions of a certificate.
flags:
    --id=: Id of the certificate.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Key Vault.
    -n, --name=: Name of the certificate.
documentation:
    command: |-
        Warning! If you have soft-delete protection enabled on this key vault, this certificate will be moved to the soft deleted state. You will not be able to create a certificate with the same name within this key vault until the certificate has been purged from the soft-deleted state. Please see the following documentation for additional guidance.
        https://learn.microsoft.com/azure/key-vault/general/soft-delete-overview
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        id: Id of the certificate. If specified all other 'Id' arguments should be omitted.
        name: Name of the certificate. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Key Vault. Required if --id is not specified.
