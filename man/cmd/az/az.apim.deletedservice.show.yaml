# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get specific soft-deleted Api Management Service.
flags:
    --subscription=: Name or ID of subscription.
    -l, --location=!: Location.
    -n, --service-name=!: The name of the soft deleted API Management service instance.
documentation:
    command: Get soft-deleted Api Management service instances available for undelete by name.
    flag:
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        service-name: The name of the soft deleted API Management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a soft-deleted services with its name.: az apim deletedservice show --service-name MyApim --location westus
