# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: assign
description: Enable managed service identity on a VMSS.
flags:
    --identities=:
        description: Space-separated identities to assign.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --role=: Role name or id the system assigned identity will have.
    --scope=: Scope that the system assigned identity can access.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Scale set name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        identities: 'Space-separated identities to assign. Use ''[system]'' to refer to the system assigned identity. Default: ''[system]''.'
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Scale set name. You can configure the default using ``` az configure --defaults vmss=<name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        role: Role name or id the system assigned identity will have.
        scope: 'Scope that the system assigned identity can access. '
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Enable managed service identity on a VMSS. (autogenerated): az vmss identity assign --identities readerId writerId --name MyVmss --resource-group MyResourceGroup
    Enable system assigned identity and a user assigned identity on a VMSS with the 'Owner' role.: az vmss identity assign -g MyResourceGroup -n MyVmss --role Owner --identities [system] myAssignedId --scope /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyResourceGroup
    Enable system assigned identity on a VMSS with the 'Owner' role.: az vmss identity assign -g MyResourceGroup -n MyVmss --role Owner --scope /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyResourceGroup
