# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get a billing account by its ID.
flags:
    --expand=: May be used to expand the soldTo, invoice sections and billing profiles.
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies a billing account.
documentation:
    command: |-
        Command group 'billing account' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        expand: May be used to expand the soldTo, invoice sections and billing profiles.
        name: The ID that uniquely identifies a billing account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show an billing acount with default properties: az billing account show --name "{billingAccountName}"
    Show an billing acount with expanded properties: az billing account show --expand "soldTo,billingProfiles,billingProfiles/invoiceSections" --name "{billingAccountName}"
