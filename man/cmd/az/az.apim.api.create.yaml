# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a new API.
flags:
    --api-id=!: API identifier.
    --api-type=: The type of the API.
    --authorization-scope=: Specifies the OAuth operations scope.
    --authorization-server-id=: Specifies the OAuth authorization server ID.
    --bearer-token-sending-methods=:
        description: Specifies the sending methods for bearer token.
        nargs: -1
    --description=: Description of the API.
    --display-name=!: API name.
    --no-wait=: Do not wait for the long-running operation to finish.
    --open-id-provider-id=: Specifies the openid in the authentication setting.
    --path=!: Required.
    --protocols=:
        description: Describes on which protocols the operations in this API can be invoked.
        nargs: -1
    --service-url=: Absolute URL of the backend service implementing this API.
    --subscription-key-header-name=: Specifies the subscription key header name.
    --subscription-key-query-param-name=: Specifies the subscription key query string parameter name.
    --subscription-key-required=: Specifies whether subscription key is required during call to this API, true - API is included into closed products only, false - API is included into open products alone, null - there is a mix of products.
    --subscription-required=:
        description: If true, the API requires a subscription key on requests.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
completion:
    flag:
        api-type:
            - http
            - soap
            - websocket
            - graphql
        protocols:
            - http
            - https
            - ws
            - wss
        subscription-required:
            - "true"
            - "false"
documentation:
    command: Create an API Management API.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api-id: Unique name of the api to be created. API revision identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        api-type: |-
            The type of the API.

            Accepted values: graphql, http, soap, websocket
        authorization-scope: Specifies the OAuth operations scope.
        authorization-server-id: Specifies the OAuth authorization server ID.
        bearer-token-sending-methods: Specifies the sending methods for bearer token.
        change-reference: The related change reference ID for this resource operation.
        description: Description of the API. May include HTML formatting tags.
        display-name: API name. Must be 1 to 300 characters long.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        open-id-provider-id: Specifies the openid in the authentication setting.
        path: Required. Relative URL uniquely identifying this API and all of its resource paths within the API Management service instance.
        protocols: |-
            Describes on which protocols the operations in this API can be invoked.

            Accepted values: http, https, ws, wss
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        service-url: Absolute URL of the backend service implementing this API. Cannot be more than 2000 characters long.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        subscription-key-header-name: Specifies the subscription key header name.
        subscription-key-query-param-name: Specifies the subscription key query string parameter name.
        subscription-key-required: Specifies whether subscription key is required during call to this API, true - API is included into closed products only, false - API is included into open products alone, null - there is a mix of products.
        subscription-required: |-
            If true, the API requires a subscription key on requests.

            Default value: False

            Accepted values: false, true
examples:
    Create a basic API.: az apim api create --service-name MyApim -g MyResourceGroup --api-id MyApi --path '/myapi' --display-name 'My API'
