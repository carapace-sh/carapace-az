# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of a service principal.
flags:
    --id=!: service principal name, or object id
documentation:
    flag:
        id: Service principal name, or object id.
examples:
    Get the details of a service principal with appId.: az ad sp show --id 00000000-0000-0000-0000-000000000000
    Get the details of a service principal with id.: az ad sp show --id 00000000-0000-0000-0000-000000000000
    Get the details of a service principal with identifier URI.: az ad sp show --id api://myapp
