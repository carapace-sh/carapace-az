# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a workspace settings in your subscription - these settings let you control which workspace will hold your security data
flags:
    --subscription=: Name or ID of subscription.
    --target-workspace=!: An ID of the workspace resource that will hold the security data
    -n, --name=!: name of the resource to be fetched
documentation:
    command: Creates a workspace settings in your subscription - these settings let you control which workspace will hold your security data.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the resource to be fetched.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-workspace: An ID of the workspace resource that will hold the security data.
examples:
    Creates a workspace settings in your subscription - these settings let you control which workspace will hold your security data: az security workspace-setting create -n default --target-workspace '/subscriptions/20ff7fc3-e762-44dd-bd96-b71116dcdc23/resourceGroups/myRg/providers/Microsoft.OperationalInsights/workspaces/myWorkspace'
