# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get an agreement by ID.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --expand=: May be used to expand the participants.
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies an agreement.
documentation:
    command: |-
        Command group 'billing agreement' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        expand: May be used to expand the participants.
        name: The ID that uniquely identifies an agreement.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show an agreement by billing account and its name: az billing agreement show --name "{agreementName}" --account-name "{billingAccountName}"
