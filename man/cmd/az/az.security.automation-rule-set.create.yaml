# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates security automation rule set.
flags:
    --rules=: A rule which is evaluated upon event interception.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        rules: A rule which is evaluated upon event interception. The rule is configured by comparing a specific value from the event model to an expected value. This comparison is done by using one of the supported operators set.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Creates security automation rule set.: az security automation-rule-set create
