# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable
description: Enable disk encryption on the OS disk and/or data disks.
flags:
    --aad-client-cert-thumbprint=: Thumbprint of the AAD app certificate with permissions to write secrets to the key vault.
    --aad-client-id=: Client ID of an AAD app with permissions to write secrets to the key vault.
    --aad-client-secret=: Client secret of the AAD app with permissions to write secrets to the key vault.
    --disk-encryption-keyvault=!: Name or ID of the key vault where the generated encryption key will be placed.
    --encrypt-format-all=: Encrypts-formats data disks instead of encrypting them.
    --encryption-identity=: Resource Id of the user managed identity which can be used for Azure disk encryption
    --force=: continue by ignoring client side validation errors
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --key-encryption-algorithm=: ""
    --key-encryption-key=: Key vault key name or URL used to encrypt the disk encryption key.
    --key-encryption-keyvault=: Name or ID of the key vault containing the key encryption key used to encrypt the disk encryption key.
    --subscription=: Name or ID of subscription.
    --volume-type=: Type of volume that the encryption operation is performed on
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Virtual Machine.
completion:
    flag:
        volume-type:
            - DATA
            - OS
            - ALL
documentation:
    command: Enable disk encryption on the OS disk and/or data disks. Encrypt mounted disks.
    flag:
        aad-client-cert-thumbprint: Thumbprint of the AAD app certificate with permissions to write secrets to the key vault.
        aad-client-id: Client ID of an AAD app with permissions to write secrets to the key vault.
        aad-client-secret: Client secret of the AAD app with permissions to write secrets to the key vault.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        disk-encryption-keyvault: Name or ID of the key vault where the generated encryption key will be placed.
        encrypt-format-all: |-
            Encrypts-formats data disks instead of encrypting them. Encrypt-formatting is a lot faster than in-place encryption but wipes out the partition getting encrypt-formatted. (Only supported for Linux virtual machines.).

            Default value: False
        encryption-identity: Resource Id of the user managed identity which can be used for Azure disk encryption.
        force: |-
            Continue by ignoring client side validation errors.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        key-encryption-algorithm: 'Default value: RSA-OAEP'
        key-encryption-key: Key vault key name or URL used to encrypt the disk encryption key.
        key-encryption-keyvault: Name or ID of the key vault containing the key encryption key used to encrypt the disk encryption key. If missing, CLI will use `--disk-encryption-keyvault`.
        name: The name of the Virtual Machine. You can configure the default using ``` az configure --defaults vm=<name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        volume-type: |-
            Type of volume that the encryption operation is performed on.

            Accepted values: ALL, DATA, OS
examples:
    Add support for using managed identity to authenticate to customer's keyvault for ADE operation: az vm encryption enable --disk-encryption-keyvault MyVault --name MyVm --resource-group MyResourceGroup --encryption-identity EncryptionIdentity
    Enable disk encryption on the OS disk and/or data disks. Encrypt mounted disks. (autogenerated): az vm encryption enable --disk-encryption-keyvault MyVault --name MyVm --resource-group MyResourceGroup --volume-type DATA
    encrypt a VM using a key vault in the same resource group: az vm encryption enable -g MyResourceGroup -n MyVm --disk-encryption-keyvault MyVault
