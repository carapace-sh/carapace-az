# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable-addons
description: Enable Kubernetes addons.
flags:
    --ampls-resource-id=: Resource ID of Azure Monitor Private Link scope for Monitoring Addon.
    --appgw-id=: Resource Id of an existing Application Gateway to use with AGIC.
    --appgw-name=: Name of the application gateway to create/use in the node resource group.
    --appgw-subnet-cidr=: Subnet CIDR to use for a new subnet created to deploy the Application Gateway.
    --appgw-subnet-id=: Resource Id of an existing Subnet used to deploy the Application Gateway.
    --appgw-watch-namespace=: Specify the namespace, which AGIC should watch.
    --data-collection-settings=: Path to JSON file containing data collection settings for Monitoring addon.
    --enable-high-log-scale-mode=:
        description: Enable High Log Scale Mode for Container Logs.
        nargs: -1
    --enable-msi-auth-for-monitoring=:
        description: Enable Managed Identity Auth for Monitoring addon.
        nargs: -1
    --enable-secret-rotation=: Enable secret rotation.
    --enable-sgxquotehelper=: Enable SGX quote helper for confcom addon.
    --enable-syslog=:
        description: Enable syslog data collection for Monitoring addon
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --rotation-poll-interval=: Set interval of rotation poll.
    --subscription=: Name or ID of subscription.
    --workspace-resource-id=: The resource ID of an existing Log Analytics Workspace to use for storing monitoring data.
    -a, --addons=!: ""
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the managed cluster.
    -s, --subnet-name=: Name of an existing subnet to use with the virtual-node add-on.
completion:
    flag:
        enable-high-log-scale-mode:
            - "true"
            - "false"
        enable-msi-auth-for-monitoring:
            - "true"
            - "false"
        enable-syslog:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        addons: Enable the Kubernetes addons in a comma-separated list.
        aks-custom-headers: Send custom headers. When specified, format should be Key1=Value1,Key2=Value2.
        ampls-resource-id: Resource ID of Azure Monitor Private Link scope for Monitoring Addon.
        appgw-id: Resource Id of an existing Application Gateway to use with AGIC. Use with ingress-azure addon.
        appgw-name: Name of the application gateway to create/use in the node resource group. Use with ingress-azure addon.
        appgw-subnet-cidr: Subnet CIDR to use for a new subnet created to deploy the Application Gateway. Use with ingress-azure addon.
        appgw-subnet-id: Resource Id of an existing Subnet used to deploy the Application Gateway. Use with ingress-azure addon.
        appgw-watch-namespace: Specify the namespace, which AGIC should watch. This could be a single string value, or a comma-separated list of namespaces. Use with ingress-azure addon.
        change-reference: The related change reference ID for this resource operation.
        data-collection-settings: Path to JSON file containing data collection settings for Monitoring addon.
        dns-zone-resource-ids: A comma separated list of resource IDs of the DNS zone resource to use with the App Routing addon.
        enable-high-log-scale-mode: Enable High Log Scale Mode for Container Logs. Auto-enabled when --enable-container-network-logs is specified.
        enable-msi-auth-for-monitoring: Send monitoring data to Log Analytics using the cluster's assigned identity (instead of the Log Analytics Workspace's shared key).
        enable-secret-rotation: Enable secret rotation. Use with azure-keyvault-secrets-provider addon.
        enable-sgxquotehelper: Enable SGX quote helper for confcom addon.
        enable-syslog: Enable syslog data collection for Monitoring addon.
        name: Name of the managed cluster.
        no-wait: Do not wait for the long-running operation to finish.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rotation-poll-interval: Set interval of rotation poll. Use with azure-keyvault-secrets-provider addon.
        subnet-name: Name of an existing subnet to use with the virtual-node add-on.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-resource-id: The resource ID of an existing Log Analytics Workspace to use for storing monitoring data.
examples:
    Enable Kubernetes addons. (autogenerated): az aks enable-addons --addons virtual-node --name MyManagedCluster --resource-group MyResourceGroup --subnet-name VirtualNodeSubnet
    Enable ingress-appgw addon with subnet prefix.: az aks enable-addons --name MyManagedCluster --resource-group MyResourceGroup --addons ingress-appgw --appgw-subnet-cidr 10.2.0.0/16 --appgw-name gateway
    Enable open-service-mesh addon.: az aks enable-addons --name MyManagedCluster --resource-group MyResourceGroup --addons open-service-mesh
