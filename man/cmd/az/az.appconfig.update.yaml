# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an App Configuration store.
flags:
    --arm-auth-mode=: The authentication mode for accessing the App Configuration Store via ARM.
    --disable-local-auth=:
        description: Disable all authentication methods other than AAD authentication.
        nargs: -1
    --enable-arm-private-network-access=:
        description: Enable access to the App Configuration store via ARM Private Link if resource is restricted to private network access.
        nargs: -1
    --encryption-key-name=: The name of the KeyVault key.
    --encryption-key-vault=: The URI of the KeyVault.
    --encryption-key-version=: The version of the KeyVault key.
    --identity-client-id=: Client ID of the managed identity with wrap and unwrap access to encryption key.
    --sku=: The sku of the App Configuration store
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -e, --enable-public-network=:
        description: When true, requests coming from public networks have permission to access this store while private endpoint is enabled.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name of the App Configuration store.
    -p, --enable-purge-protection=:
        description: Property specifying whether protection against purge is enabled for this App Configuration store.
        nargs: -1
completion:
    flag:
        arm-auth-mode:
            - local
            - pass-through
        disable-local-auth:
            - "true"
            - "false"
        enable-arm-private-network-access:
            - "true"
            - "false"
        enable-public-network:
            - "true"
            - "false"
        enable-purge-protection:
            - "true"
            - "false"
        sku:
            - Free
            - Premium
            - Standard
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        appinsights-resource: Resource ID of the Application Insights resource to link with this App Configuration store.
        arm-auth-mode: The authentication mode for accessing the App Configuration Store via ARM. 'pass-through' (Recommended) uses Microsoft Entra ID to access the store via ARM with proper authorization.'local' uses access keys for authentication. This requires access keys to be enabled.
        azure-front-door-profile: Resource ID of an Azure Front Door profile to link to this App Configuration store. Pass "" to unlink a Front Door profile.
        change-reference: The related change reference ID for this resource operation.
        disable-local-auth: Disable all authentication methods other than AAD authentication.
        enable-arm-private-network-access: Enable access to the App Configuration store via ARM Private Link if resource is restricted to private network access. Requires Pass-through ARM authentication mode.
        enable-public-network: Argument 'enable_public_network' has been deprecated and will be removed in a future release. Use '--public-network-access' instead. When true, requests coming from public networks have permission to access this store while private endpoint is enabled. When false, only requests made through Private Links can reach this store.
        enable-purge-protection: Property specifying whether protection against purge is enabled for this App Configuration store. Setting this property to true activates protection against purge for this App Configuration store and its contents. Enabling this functionality is irreversible.
        encryption-key-name: The name of the KeyVault key.
        encryption-key-vault: The URI of the KeyVault.
        encryption-key-version: The version of the KeyVault key. Use the latest version by default.
        identity-client-id: Client ID of the managed identity with wrap and unwrap access to encryption key. Use system-assigned managed identity by default.
        kv-revision-retention-period: Duration in seconds to retain key-value revisions in the App Configuration store. For Free and Developer sku stores, revisions can be retained for a maximum of 7 days (604,800s); for Standard and Premium sku stores, up to 30 days (2,592,000s). Only Non-Free tiers can update this value. If specified, retention period must be at least 1 hour (3600s).
        name: Name of the App Configuration store. You can configure the default name using ``` az configure --defaults app_configuration_store=<name> ``` .
        public-network-access: 'Control permission for data plane traffic coming from public networks. Possible values include: Disabled, Enabled, SecuredByPerimeter. NOTE: The SecuredByPerimeter mode is currently in preview.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: The sku of the App Configuration store.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Enable customer encryption key with system assigned identity: az appconfig update -g MyResourceGroup -n MyAppConfiguration --encryption-key-name myKey --encryption-key-version keyVersion --encryption-key-vault https://keyVaultName.vault.azure.net
    Link an Application Insights resource to an App Configuration store for telemetry collection.: az appconfig update -g MyResourceGroup -n MyAppConfiguration --appinsights-resource /subscriptions/<SUBSCRIPTIONID>/resourceGroups/<RESOURCEGROUP>/providers/microsoft.insights/components/MyAppInsights
    Remove customer encryption key: az appconfig update -g MyResourceGroup -n MyAppConfiguration --encryption-key-name ""
    Unlink Application Insights from an App Configuration store.: az appconfig update -g MyResourceGroup -n MyAppConfiguration --appinsights-resource ""
    Update an App Configuration store to enable public network access and disable local auth.: az appconfig update -g MyResourceGroup -n MyAppConfiguration --enable-public-network true --disable-local-auth true
    Update an App Configuration store to link an Azure Front Door profile.: az appconfig update -g MyResourceGroup -n MyAppConfiguration --azure-front-door-profile /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCEGROUP>/providers/Microsoft.Cdn/profiles/<PROFILE_NAME>
    ? Update an App Configuration store to set ARM authentication mode set to Pass-through and enable private network access via ARM Private Link.
    : az appconfig update -g MyResourceGroup -n MyAppConfiguration --arm-auth-mode pass-through --enable-arm-private-network-access true
    Update an App Configuration store to set ARM authentication mode set to Pass-through.: az appconfig update -g MyResourceGroup -n MyAppConfiguration --arm-auth-mode pass-through
    Update an App Configuration store to set a key-value revision retention period of one day (in seconds).: az appconfig update -g MyResourceGroup -n MyAppConfiguration --kv-revision-retention-period 86400
    Update an App Configuration store to unlink an Azure Front Door profile.: az appconfig update -g MyResourceGroup -n MyAppConfiguration --azure-front-door-profile ""
    Update tags of an App Configuration store: az appconfig update -g MyResourceGroup -n MyAppConfiguration --tags key1=value1 key2=value2
    Upgrade sku of an App Configuration store to the premium tier: az appconfig update -g MyResourceGroup -n MyAppConfiguration --sku Premium
    Upgrade sku of an App Configuration store to the standard tier: az appconfig update -g MyResourceGroup -n MyAppConfiguration --sku Standard
