# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Sets backup related properties of the Recovery Services vault.
documentation:
    flag:
        cross-region-restore-flag: 'Set cross-region-restore feature state for a Recovery Services Vault. Default: False.'
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --backup-storage-redundancy=: Set backup storage properties for a Recovery Services vault.
    --classic-alerts=: Use this property to specify whether backup alerts from the classic solution should be received.
    --cross-region-restore-flag=: Set cross-region-restore feature state for a Recovery Services Vault.
    --hybrid-backup-security-features=: Use this field to set the security features for hybrid backups in a Recovery Services Vault.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --job-failure-alerts=: Use this property to specify whether built-in Azure Monitor alerts should be received for every job failure.
    --soft-delete-duration=: Set soft-delete retention duration time in days for a Recovery Services Vault.
    --soft-delete-feature-state=: Set soft-delete feature state for a Recovery Services Vault.
    --subscription=: Name or ID of subscription.
    --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Recovery services vault.
completion:
    flag:
        backup-storage-redundancy:
            - GeoRedundant
            - LocallyRedundant
            - ZoneRedundant
        classic-alerts:
            - Enable
            - Disable
        cross-region-restore-flag:
            - "True"
            - "False"
        hybrid-backup-security-features:
            - Enable
            - Disable
        job-failure-alerts:
            - Enable
            - Disable
        soft-delete-feature-state:
            - Enable
            - Disable
            - AlwaysOn
