# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List traffic manager endpoints.
flags:
    --profile-name=!: Name of parent profile.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -t, --type=: Endpoint type.
completion:
    flag:
        type:
            - azureEndpoints
            - externalEndpoints
            - nestedEndpoints
documentation:
    flag:
        profile-name: Name of parent profile.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: |-
            Endpoint type.

            Accepted values: azureEndpoints, externalEndpoints, nestedEndpoints
examples:
    List traffic manager endpoints.: az network traffic-manager endpoint list -g MyResourceGroup --profile-name MyTmProfile
