# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: The properties related to the auto-storage account.
documentation:
    flag:
        encryption-key-identifier: Part of the encryption configuration for the Batch account. Full path to the versioned secret. Example https://mykeyvault.vault.azure.net/keys/testkey/6e34a81fef704045975661e297a4c053.
        encryption-key-source: Part of the encryption configuration for the Batch account. Type of the key source. Can be either Microsoft.Batch or Microsoft.KeyVault
        public-network-access: The network access type for accessing Azure Batch account. Values can either be enabled or disabled.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --encryption-key-identifier=: Part of the encryption configuration for the Batch account.
    --encryption-key-source=: Part of the encryption configuration for the Batch account.
    --keyvault=: The KeyVault name or resource ID to be used for an account with a pool allocation mode of 'User Subscription'.
    --mi-system-assigned=: Set the system managed identity on the batch services account.
    --mi-user-assigned=: Resource ID of the user assigned identity for the batch services account.
    --no-wait=: Do not wait for the long-running operation to finish.
    --public-network-access=: The network access type for accessing Azure Batch account.
    --storage-account=: The storage account name or resource ID to be used for auto storage.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Space-separated tags in 'key[=value]' format.
        nargs: -1
    -g, --resource-group=!: Name of the resource group
    -l, --location=!: The region in which to create the account.
    -n, --name=!: Name of the Batch account.
completion:
    flag:
        encryption-key-source:
            - Microsoft.Batch
            - Microsoft.KeyVault
        public-network-access:
            - Enabled
            - Disabled
