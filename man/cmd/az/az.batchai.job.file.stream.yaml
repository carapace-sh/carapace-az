# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: stream
description: Stream the content of a file (similar to 'tail -f').
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --subscription=: Name or ID of subscription.
    -d, --output-directory-id=: The Id of the job's output directory (as specified by "id" element in outputDirectories collection in the job create parameters).
    -e, --experiment=!: Name of experiment.
    -f, --file-name=!: The name of the file to stream.
    -g, --resource-group=!: Name of resource group.
    -j, --job=!: Name of job.
    -p, --path=: Relative path in the given output directory.
    -w, --workspace=!: Name of workspace.
