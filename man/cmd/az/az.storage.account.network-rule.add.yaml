# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a network rule.
flags:
    --action=: The action of virtual network rule.
    --ip-address=:
        description: IPv4 address or CIDR range.
        nargs: -1
    --resource-id=: The resource id to add in network rule.
    --subnet=: Name or ID of subnet.
    --subscription=: Name or ID of subscription.
    --tenant-id=: The tenant id to add in network rule.
    --vnet-name=: Name of a virtual network.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
documentation:
    flag:
        account-name: The storage account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        action: |-
            The action of virtual network rule. Possible value is Allow.

            Default value: Allow
        change-reference: The related change reference ID for this resource operation.
        ip-address: 'IPv4 address or CIDR range. Can supply a list: --ip-address ip1 [ip2]...'
        ipv6-address: 'IPv6 address or CIDR range. Can supply a list: --ipv6-address ip1 [ip2]...'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-id: The resource id to add in network rule.
        subnet: Name or ID of subnet. If name is supplied, `--vnet-name` must be supplied.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tenant-id: The tenant id to add in network rule.
        vnet-name: Name of a virtual network.
examples:
    Create a rule to allow a specific address-range.: az storage account network-rule add -g myRg --account-name mystorageaccount --ip-address 23.45.1.0/24
    Create a rule to allow access for a subnet in another resource group.: az storage account network-rule add -g myRg --account-name mystorageaccount  --subnet $subnetId
    Create a rule to allow access for a subnet.: az storage account network-rule add -g myRg --account-name mystorageaccount --vnet-name myvnet --subnet mysubnet
