# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a network rule.
documentation:
    flag:
        action: The action of virtual network rule. Possible value is Allow.
        ip-address: 'IPv4 address or CIDR range. Can supply a list: --ip-address ip1 [ip2]...'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subnet: Name or ID of subnet. If name is supplied, `--vnet-name` must be supplied.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --action=: The action of virtual network rule.
    --ip-address=:
        description: IPv4 address or CIDR range.
        nargs: -1
    --resource-id=: The resource id to add in network rule.
    --subnet=: Name or ID of subnet.
    --subscription=: Name or ID of subscription.
    --tenant-id=: The tenant id to add in network rule.
    --vnet-name=: Name of a virtual network.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
