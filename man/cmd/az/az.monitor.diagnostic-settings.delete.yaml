# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes existing diagnostic settings for the specified resource.
documentation:
    flag:
        name: The name of the diagnostic setting. Required.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        resource-type: 'Target resource type. Can also accept namespace/type format (Ex: ''Microsoft.Compute/virtualMachines'')'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --resource-namespace=: Target resource provider namespace.
    --resource-parent=: Target resource parent path, if applicable.
    --resource-type=: Target resource type.
    --resource=!: Name or ID of the target resource.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the diagnostic setting.
