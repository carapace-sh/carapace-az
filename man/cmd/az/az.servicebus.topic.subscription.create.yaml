# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a topic subscription.
flags:
    --auto-delete-on-idle=: ISO 8061 timeSpan idle interval after which the topic is automatically deleted.
    --client-id=: Indicates the Client ID of the application that created the client-affine subscription.
    --default-message-time-to-live=: ISO 8061 Default message timespan to live value.
    --enable-batched-operations=:
        description: Value that indicates whether server-side batched operations are enabled.
        nargs: -1
    --enable-session=:
        description: A value that indicates whether the queue supports the concept of sessions.
        nargs: -1
    --forward-dead-lettered-messages-to=: Queue/Topic name to forward the Dead Letter message
    --forward-to=: Queue/Topic name to forward the messages
    --is-client-affine=:
        description: Value that indicates whether the subscription has an affinity to the client id.
        nargs: -1
    --is-durable=:
        description: For client-affine subscriptions, this value indicates whether the subscription is durable or not.
        nargs: -1
    --is-shared=:
        description: For client-affine subscriptions, this value indicates whether the subscription is shared or not.
        nargs: -1
    --lock-duration=: ISO 8061 lock duration timespan for the subscription.
    --max-delivery-count=: Number of maximum deliveries.
    --message-expiration=:
        description: A value that indicates whether this queue has dead letter support when a message expires.
        nargs: -1
    --namespace-name=!: The namespace name
    --status=: Enumerates the possible values for the status of a messaging entity.
    --subscription=: Name or ID of subscription.
    --topic-name=!: The topic name.
    -d, --duplicate-detection-history-time-window=: ISO 8601 timeSpan structure that defines the duration of the duplicate detection history.
    -f, --dead-letter-on-filter-exceptions=:
        description: Value that indicates whether a subscription has dead letter support on filter evaluation exceptions.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The subscription name.
completion:
    flag:
        dead-letter-on-filter-exceptions:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-batched-operations:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-session:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        is-client-affine:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        is-durable:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        is-shared:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        message-expiration:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        status:
            - Active
            - Creating
            - Deleting
            - Disabled
            - ReceiveDisabled
            - Renaming
            - Restoring
            - SendDisabled
            - Unknown
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auto-delete-on-idle: ISO 8061 timeSpan idle interval after which the topic is automatically deleted. The minimum duration is 5 minutes.
        change-reference: The related change reference ID for this resource operation.
        client-id: Indicates the Client ID of the application that created the client-affine subscription.
        dead-letter-on-filter-exceptions: |-
            Value that indicates whether a subscription has dead letter support on filter evaluation exceptions.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        default-message-time-to-live: ISO 8061 Default message timespan to live value. This is the duration after which the message expires, starting from when the message is sent to Service Bus. This is the default value used when TimeToLive is not set on a message itself.
        duplicate-detection-history-time-window: ISO 8601 timeSpan structure that defines the duration of the duplicate detection history. The default value is 10 minutes.
        enable-batched-operations: |
            Value that indicates whether server-side batched operations are enabled.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        enable-session: |-
            A value that indicates whether the queue supports the concept of sessions.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        forward-dead-lettered-messages-to: Queue/Topic name to forward the Dead Letter message.
        forward-to: Queue/Topic name to forward the messages.
        is-client-affine: |-
            Value that indicates whether the subscription has an affinity to the client id.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        is-durable: |-
            For client-affine subscriptions, this value indicates whether the subscription is durable or not.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        is-shared: |-
            For client-affine subscriptions, this value indicates whether the subscription is shared or not.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        lock-duration: ISO 8061 lock duration timespan for the subscription. The default value is 1 minute.
        max-delivery-count: Number of maximum deliveries.
        namespace-name: The namespace name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        status: |-
            Enumerates the possible values for the status of a messaging entity.

            Accepted values: Active, Creating, Deleting, Disabled, ReceiveDisabled, Renaming, Restoring, SendDisabled, Unknown
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        topic-name: The topic name.
