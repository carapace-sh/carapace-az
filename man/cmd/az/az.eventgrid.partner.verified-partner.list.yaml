# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List available verified partners.
flags:
    --odata-query=: The OData query used for filtering the list results.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        odata-query: 'The OData query used for filtering the list results. Filtering is currently allowed on the Name property only. The supported operations include: CONTAINS, eq (for equal), ne (for not equal), AND, OR and NOT.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all verified partners in the current tenant.: az eventgrid partner verified-partner list
