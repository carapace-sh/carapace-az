# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore a soft-deleted artifact and tag in an Azure Container Registry.
flags:
    --subscription=: Name or ID of subscription.
    --suffix=: The tenant suffix in registry login server.
    -d, --digest=: The digest of the manifest such as 'sha256@abc123'.
    -f, --force=: Overwrite the existing tag.
    -n, --name=: The name of the artifact.
    -p, --password=: The password used to log into a container registry
    -r, --registry=: The name of the container registry.
    -u, --username=: The username used to log into a container registry
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: |-
        Command group 'acr manifest' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        digest: The digest of the manifest such as 'sha256@abc123'.
        force: |-
            Overwrite the existing tag.

            Default value: False
        name: The name of the artifact. May include a tag in the format 'name:tag'.
        password: The password used to log into a container registry.
        registry: The name of the container registry. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        suffix: The tenant suffix in registry login server. You may specify '--suffix tenant' if your registry login server is in the format 'registry-tenant.azurecr.io'. Applicable if you're accessing the registry from a different subscription or you have permission to access images but not the permission to manage the registry resource.
        username: The username used to log into a container registry.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Restore the manifest matching digest 'sha256:abc123' with tag 'latest' in the repository 'hello-world'.: az acr manifest restore myregistry.azurecr.io/hello-world:latest -d sha256:abc123
    Restore the most recently deleted manifest associated with the tag 'latest' in the repository 'hello-world'.: az acr manifest restore myregistry.azurecr.io/hello-world:latest
