# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: start
description: Start a log replay restore.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --last-backup-name=: The name of the last backup to restore.
    --managed-instance=: Name of the Azure SQL Managed Instance.
    --no-wait=: Do not wait for the long-running operation to finish.
    --storage-identity=: The storage container identity to use.
    --storage-sas=!: The authorization Sas token to access storage container where backups are.
    --storage-uri=!: The URI of the storage container where backups are.
    --subscription=: Name or ID of subscription.
    -a, --auto-complete=: The flag that in usage with last_backup_name automatically completes log replay servise.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Azure SQL Managed Database.
completion:
    flag:
        storage-identity:
            - ManagedIdentity
            - SharedAccessSignature
documentation:
    command: Start Log Replay service on specified database.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auto-complete: |-
            The flag that in usage with last_backup_name automatically completes log replay servise.

            Default value: False
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Azure SQL Managed Database.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: |-
            Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .

            Accepted values: ManagedIdentity, SharedAccessSignature
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Start Log Replay service with auto complete option.: az sql midb log-replay start -g mygroup --mi myinstance -n mymanageddb -a --last-bn "backup.bak" --storage-uri "https://test.blob.core.windows.net/testing" --storage-sas "sv=2019-02-02&ss=b&srt=sco&sp=rl&se=2023-12-02T00:09:14Z&st=2019-11-25T16:09:14Z&spr=https&sig=92kAe4QYmXaht%2Fgjocqwerqwer41s%3D"
    Start Log Replay service without auto complete option.: az sql midb log-replay start -g mygroup --mi myinstance -n mymanageddb --storage-uri "https://test.blob.core.windows.net/testing" --storage-sas "sv=2019-02-02&ss=b&srt=sco&sp=rl&se=2023-12-02T00:09:14Z&st=2019-11-25T16:09:14Z&spr=https&sig=92kAe4QYmXaht%2Fgjocqwerqwer41s%3D"
