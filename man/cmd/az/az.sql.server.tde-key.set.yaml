# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Updates a server encryption protector.
documentation:
    flag:
        auto-rotation-enabled: The key auto rotation opt in status. Can be either true or false.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        kid: The Azure Key Vault key identifier of the server key. An example key identifier is "https://YourVaultName.vault.azure.net/keys/YourKeyName/01234567890123456789012345678901"
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        server: Name of the Azure SQL Server. You can configure the default using `az configure --defaults sql-server=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --auto-rotation-enabled=:
        description: The key auto rotation opt in status.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -k, --kid=: The Azure Key Vault key identifier of the server key.
    -s, --server=: Name of the Azure SQL Server.
    -t, --server-key-type=!: The type of the server key
completion:
    flag:
        auto-rotation-enabled:
            - "true"
            - "false"
        server-key-type:
            - ServiceManaged
            - AzureKeyVault
