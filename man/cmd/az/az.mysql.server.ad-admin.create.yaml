# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Sets a server's AD admin.
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -i, --object-id=: The unique ID of the Microsoft Entra administrator.
    -s, --server-name=!: Name of the server.
    -u, --display-name=: Display name of the Microsoft Entra administrator user or group.
documentation:
    command: Create an Active Directory administrator for MySQL server.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        display-name: Display name of the Microsoft Entra administrator user or group.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        object-id: The unique ID of the Microsoft Entra administrator.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create Active Directory Administrator username@domain.com in the server testsvr.: az mysql server ad-admin create --server-name testsvr -g testgroup --display-name username@domain.com --object-id 1FCD6583-267B-4484-BF9B-507E4B62DE79
