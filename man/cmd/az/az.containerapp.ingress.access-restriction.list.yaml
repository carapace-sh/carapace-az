# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List IP access restrictions for a container app.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Containerapp.
documentation:
    flag:
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List IP access restrictions.: az containerapp ingress access-restriction list -n my-containerapp -g MyResourceGroup
