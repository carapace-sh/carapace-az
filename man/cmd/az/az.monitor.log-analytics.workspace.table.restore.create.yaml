# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Log Analytics workspace restore logs table.
flags:
    --end-restore-time=!:
        description: Datetime format.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --restore-source-table=!: The table to restore data from.
    --start-restore-time=!:
        description: Datetime format.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --workspace-name=!: Name of the Log Analytics Workspace.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the table.
documentation:
    command: Create a Log Analytics workspace restore logs table. The table name needs to end with '_RST'.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        end-restore-time: 'Datetime format. Format: date (yyyy-mm-dd) time (hh:mm:ss.xxxxx) timezone (+/-hh:mm).'
        name: Name of the table. The table name needs to end with _RST.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restore-source-table: The table to restore data from.
        start-restore-time: 'Datetime format. Format: date (yyyy-mm-dd) time (hh:mm:ss.xxxxx) timezone (+/-hh:mm).'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: Name of the Log Analytics Workspace.
examples:
    Create a Log Analytics workspace restore logs table.: az monitor log-analytics workspace table restore create --resource-group MyResourceGroup --workspace-name MyWorkspace -n MyTable_RST --start-restore-time "Sat, 28 Aug 2021 05:29:18 GMT" --end-restore-time "Sat, 28 Aug 2021 08:29:18 GMT" --restore-source-table MyTable
