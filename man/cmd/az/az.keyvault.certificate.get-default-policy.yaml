# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: get-default-policy
description: Get a default certificate policy to be used with `az keyvault certificate create`
flags:
    --scaffold=: create a fully formed policy structure with default values
    --subscription=: Name or ID of subscription.
documentation:
    command: Get the default policy for self-signed certificates.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        scaffold: |-
            Create a fully formed policy structure with default values.

            Default value: False
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a self-signed certificate with the default policy: |-
        az keyvault certificate create --vault-name vaultname -n cert1 \
          -p "$(az keyvault certificate get-default-policy)"
