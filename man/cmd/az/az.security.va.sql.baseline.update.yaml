# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update Sql Vulnerability Assessment rule baseline.
documentation:
    flag:
        baseline: 'Baseline records to be set. The following example will set a baseline with two records: --baseline line1_w1 line1_w2 line1_w3 --baseline line2_w1 line2_w2 line2_w3'
        rule-id: 'The ID of the scanned rule. Format: "VAXXXX", where XXXX indicates the number of the rule'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-resource-id: Resource ID of the scanned machine. For On-Premise machines, please provide your workspace resource ID
flags:
    --agent-id=: Provide the ID of the agent on the scanned machine, for On-Premise resources only
    --database-name=!: The name of the scanned database
    --latest=:
        description: Use this argument without parameters to set baseline upon latest scan results
        nargs: -1
    --rule-id=!: The ID of the scanned rule.
    --server-name=!: The name of the scanned server
    --subscription=: Name or ID of subscription.
    --vm-name=: Provide the name of the machine, for On-Premise resources only
    --vm-resource-id=!: Resource ID of the scanned machine.
    --vm-uuid=: Provide the UUID of the scanned machine, for On-Premise resources only
    --workspace-id=!: The ID of the workspace connected to the scanned machine
    -b, --baseline=:
        description: Baseline records to be set.
        nargs: -1
completion:
    flag:
        latest:
            - "true"
            - "false"
