# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: initialize
description: Trigger the discovery of any unprotected items of the given workload type in the given container.
flags:
    --subscription=: Name or ID of subscription.
    --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
    -c, --container-name=!: Name of the backup container.
    -g, --resource-group=!: Name of resource group.
    -v, --vault-name=!: Name of the Recovery services vault.
completion:
    flag:
        workload-type:
            - MSSQL
            - SAPHANA
            - SAPASE
            - SAPHanaDatabase
            - SQLDataBase
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        container-name: Name of the backup container. Accepts 'Name' or 'FriendlyName' from the output of az backup container list command. If 'FriendlyName' is passed then BackupManagementType is required.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Recovery services vault.
        workload-type: |-
            Specify the type of applications within the Resource which should be discovered and protected by Azure Backup. 'MSSQL' and 'SQLDataBase' can be used interchangeably for SQL in Azure VM, as can 'SAPHANA' and 'SAPHanaDatabase' for SAP HANA in Azure VM.

            Accepted values: MSSQL, SAPASE, SAPAseDatabase, SAPHANA, SAPHanaDBInstance, SAPHanaDatabase, SQLDataBase
examples:
    ? Trigger the discovery of any unprotected items of the given workload type in the given container. Use this command to manually discover new DBs and proceed to protect them.
    : az backup protectable-item initialize --resource-group MyResourceGroup --vault-name MyVault --workload-type MSSQL --container-name MyContainer
