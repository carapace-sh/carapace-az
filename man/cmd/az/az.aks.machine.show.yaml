# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show IP Addresses, Hostname for a specific machine in an agentpool for a managedcluster.
flags:
    --cluster-name=!: Name of the managed cluster
    --machine-name=!: Name of the machine in the agentpool of a managed cluster
    --nodepool-name=!: Name of the agentpool of a managed cluster
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        cluster-name: Name of the managed cluster.
        machine-name: Name of the machine in the agentpool of a managed cluster.
        nodepool-name: Name of the agentpool of a managed cluster.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the details of a specific machine in an agentpool of a managedcluster.: az aks machine show --resource-group <resourceGroupName> --cluster-name <clusterName> --nodepool-name <apName> --machine-name <machineName>
