# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates a Maps Account.
documentation:
    flag:
        disable-local-auth: Allows toggle functionality on Azure Policy to disable Azure Maps local authentication support. This will disable Shared Keys authentication from any usage.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        user-identities: 'The list of user identities associated with the resource. The user identity dictionary key references will be ARM resource ids in the form: ''/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}''. Expected value: json-string/@json-file.'
flags:
    --disable-local-auth=:
        description: Allows toggle functionality on Azure Policy to disable Azure Maps local authentication support.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --kind=: Get or Set Kind property.
    --linked-resources=:
        description: Sets the resources to be used for Managed Identities based operations for the Map account resource.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --type=: The identity type.
    --user-identities=: The list of user identities associated with the resource.
    -g, --resource-group=: Resource group name
    -n, --name=: The name of the maps account
    -s, --sku=!: The name of the SKU, in standard format (such as S0).
completion:
    flag:
        disable-local-auth:
            - "true"
            - "false"
        kind:
            - Gen1
            - Gen2
        sku:
            - S0
            - S1
            - G2
        type:
            - SystemAssigned
            - UserAssigned
            - SystemAssigned, UserAssigned
            - None
