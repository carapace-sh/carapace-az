# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a read replica for a server.
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --sku-name=: The name of the sku.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the server.
    -s, --source-server=!: The name or resource ID of the master server to the create replica for.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: 'Location. Values from: ``` az account list-locations ``` . If not provided, the create replica will be in the same location as the master server.'
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku-name: 'The name of the sku. Follows the convention {pricing tier}_{compute generation}_{vCores} in shorthand. Examples: B_Gen5_1, GP_Gen5_4, MO_Gen5_16.'
        source-server: The name or resource ID of the master server to the create replica for.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a read replica 'testreplsvr' for 'testsvr'.: az mysql server replica create -n testreplsvr -g testgroup -s testsvr
    Create a read replica 'testreplsvr' for 'testsvr2', where 'testreplsvr' is in a different resource group.: |-
        az mysql server replica create -n testreplsvr -g testgroup \
            -s "/subscriptions/${SubID}/resourceGroups/${ResourceGroup}/providers/Microsoft.DBforMySQL/servers/testsvr2"
