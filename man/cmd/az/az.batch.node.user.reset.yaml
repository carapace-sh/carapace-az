# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reset
description: Updates the password and expiration time of a user Account on the specified Compute Node.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --expiry-time=: The time at which the Account should expire.
    --json-file=: A file containing the content specification in JSON (formatted to match the respective REST API body).
    --node-id=!: The ID of the machine on which you want to update a user Account.
    --password=: The password of the Account.
    --pool-id=!: The ID of the Pool that contains the Compute Node.
    --ssh-public-key=: The SSH public key that can be used for remote login to the Compute Node.
    --subscription=: Name or ID of subscription.
    --user-name=!: The name of the user Account to update.
documentation:
    command: Update the properties of a user account on a Batch compute node. Unspecified properties which can be updated are reset to their defaults.
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        expiry-time: The time at which the Account should expire. If omitted, the default is 1 day from the current time. For Linux Compute Nodes, the expiryTime has a precision up to a day. Expected format is an ISO-8601 timestamp.
        json-file: A file containing the content specification in JSON (formatted to match the respective REST API body). If this parameter is specified, all 'Content Arguments' are ignored.
        node-id: The ID of the machine on which you want to update a user Account. Required.
        password: The password of the Account. The password is required for Windows Compute Nodes (those created with 'virtualMachineConfiguration' using a Windows Image reference). For Linux Compute Nodes, the password can optionally be specified along with the sshPublicKey property. If omitted, any existing password is removed.
        pool-id: The ID of the Pool that contains the Compute Node. Required.
        ssh-public-key: The SSH public key that can be used for remote login to the Compute Node. The public key should be compatible with OpenSSH encoding and should be base 64 encoded. This property can be specified only for Linux Compute Nodes. If this is specified for a Windows Compute Node, then the Batch service rejects the request; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). If omitted, any existing SSH public key is removed.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-name: The name of the user Account to update. Required.
examples:
    Set a new SSH public key on an existing user and reset all other properties to their defaults.: az batch node user reset --pool-id pool1 --node-id node1 --user-name example_user --ssh-public-key new_public_key
