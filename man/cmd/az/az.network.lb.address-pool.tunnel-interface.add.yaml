# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add one tunnel interface into the load balance tunnel interface pool.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --address-pool=!: The name of the backend address pool.
    --identifier=!: Identifier of gateway load balancer tunnel interface.
    --index=: Index of the tunnel interfaces to change.
    --lb-name=!: The name of the load balancer.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --port=: Port of gateway load balancer tunnel interface.
    --protocol=!: Protocol of gateway load balancer tunnel interface.
    --subscription=: Name or ID of subscription.
    --type=!: Traffic type of gateway load balancer tunnel interface.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - Native
            - None
            - VXLAN
        type:
            - External
            - Internal
            - None
