# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a subvolume in the path or clones the subvolume mentioned in the parentPath
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --parent-path=: parent path to the subvolume
    --path=: Path to the subvolume
    --size=: Truncate subvolume to the provided size in bytes
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: The name of the NetApp account
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the subvolume.
    -p, --pool-name=!: The name of the capacity pool
    -v, --volume-name=!: The name of the volume
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Create a subvolume in the path or clones the subvolume mentioned in the parentPath.
    flag:
        account-name: The name of the NetApp account. --name --subvolume-name -n The name of the subvolume.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        parent-path: Parent path to the subvolume.
        path: Path to the subvolume.
        pool-name: The name of the capacity pool.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        size: Truncate subvolume to the provided size in bytes.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        volume-name: The name of the volume.
examples:
    Create a ANF subvolume: az netappfiles subvolume create -g mygroup --account-name myaccountname  --pool-name mypoolname --volume-name myvolumename --subvolume-name mysubvolumename
