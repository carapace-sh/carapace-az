# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show details of a private link resource in the specified IoT Central application.
documentation:
    flag:
        group-id: Name of the private link resource. If provided, --name and --type must be provided too
        name: Name of the resource. If provided, --type and --resource-group must be provided too
        resource-group: Name of resource group. If provided, --name and --type must be provided too
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --group-id=: Name of the private link resource.
    --id=: ID of the resource
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the resource.
