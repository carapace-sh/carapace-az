# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show details of a private link resource in the specified IoT Central application.
flags:
    --group-id=: Name of the private link resource.
    --id=: ID of the resource
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the resource.
documentation:
    flag:
        group-id: Name of the private link resource. If provided, --name and --type must be provided too.
        id: ID of the resource.
        name: Name of the resource. If provided, --type and --resource-group must be provided too.
        resource-group: Name of resource group. If provided, --name and --type must be provided too.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show details of the  private link resources in the IoT Central application given a connection id: az iot central app private-link-resource show --id PrivateLinkResourceID
    ? Show details of the private link resources in the IoT Central application given the resource group application name and group id.
    : az iot central app private-link-resource show -g MyResourceGroup --n my-iotc-app --group-id iotApp
