# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a policy exemption.
flags:
    --scope=: Scope to which this policy exemption applies.
    -g, --resource-group=: the resource group where the policy will be applied
    -n, --name=!: Name of the policy exemption.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The name of the policy exemption.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scope: The scope of the policy assignment.
examples:
    Delete a policy exemption: az policy exemption delete --name MyPolicyExemption --resource-group "myResourceGroup"
