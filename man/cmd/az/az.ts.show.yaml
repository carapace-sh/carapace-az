# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the specified template spec or template spec version.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the template spec.
    -s, --template-spec=: The template spec resource id.
    -v, --version=: The template spec version.
documentation:
    flag:
        name: The name of the template spec.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        template-spec: The template spec resource id.
        version: The template spec version.
examples:
    Show the specified template spec or template spec version based on the resource ID.: az ts show --template-spec resourceID
    Show the specified template spec version.: az ts show -g testrg --name TemplateSpecName --version VersionName
    Show the specified template spec.: az ts show -g testrg --name TemplateSpecName
