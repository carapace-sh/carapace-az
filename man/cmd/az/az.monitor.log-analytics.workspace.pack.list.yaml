# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all the intelligence packs possible and whether they are enabled or disabled for a given workspace.
flags:
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The name of the workspace.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The name of the workspace.
examples:
    List all the intelligence packs possible and whether they are enabled or disabled for a given workspace.: az monitor log-analytics workspace pack list --resource-group MyResourceGroup --workspace-name MyWorkspace
