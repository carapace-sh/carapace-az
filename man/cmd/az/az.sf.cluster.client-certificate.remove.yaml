# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove client certificates or subject names used for authentication.
flags:
    --certificate-common-name=: client certificate common name.
    --certificate-issuer-thumbprint=: client certificate issuer thumbprint.
    --client-certificate-common-names=: JSON encoded parameters configuration.
    --subscription=: Name or ID of subscription.
    --thumbprints=:
        description: A single or Space-separated list of client certificate thumbprint(s) to be remove.
        nargs: -1
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        client-certificate-common-names: 'JSON encoded parameters configuration. Use @{file} to load from a file. For example: [{"certificateCommonName": "test.com","certificateIssuerThumbprint": "22B4AE296B504E512DF880A77A2CAE20200FF922"}]'
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        thumbprints: A single or Space-separated list of client certificate thumbprint(s) to be remove.
examples:
    Remove a client certificate by thumbprint.: az sf cluster client-certificate remove -g group-name -c cluster1 --thumbprint '5F3660C715EBBDA31DB1FFDCF508302348DE8E7A'
