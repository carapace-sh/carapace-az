# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a column's sensitivity classification.
flags:
    --column=!: The name of column.
    --information-type=!: The information type.
    --label=!: The label name.
    --schema=!: The name of schema.
    --subscription=: Name or ID of subscription.
    --table=!: The name of table.
    --workspace-name=!: The workspace name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The SQL pool name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        column: The name of column.
        information-type: The information type.
        label: The label name.
        name: The SQL pool name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        schema: The name of schema.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        table: The name of table.
        workspace-name: The workspace name.
examples:
    Create sensitivity classification for a given column.: |-
        az synapse sql pool classification create --name sqlpool --workspace-name testsynapseworkspace \
        --resource-group rg --schema dbo --table mytable --column mycolumn \
        --information-type Name --label "Confidential - GDPR"
