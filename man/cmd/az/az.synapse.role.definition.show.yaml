# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get role definition by role id/name.
flags:
    --role=!: The role name/id that is assigned to the principal.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
documentation:
    flag:
        role: The role name/id that is assigned to the principal.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    Get role definition by role id.: |-
        az synapse role definition show --workspace-name testsynapseworkspace \
        --role 00000000-0000-0000-0000-000000000000
    Get role definition by role name.: |-
        az synapse role definition show --workspace-name testsynapseworkspace \
        --role "Synapse SQL Administrator"
