# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an DS record set.
flags:
    --if-match=: The etag of the record set.
    --if-none-match=: Set to '*' to allow a new record set to be created, but to prevent updating an existing record set.
    --metadata=:
        description: The metadata attached to the record set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --target-resource=: ID of an Azure resource from which the DNS resource value is taken.
    --tm-profile=: A reference to an Azure Traffic Manager Profile resource from where the DNS resource value is taken.
    --ttl=: The TTL (time-to-live) of the records in the record set.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the record set, relative to the name of the zone.
    -z, --zone-name=!: The name of the DNS zone (without a terminating dot).
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        if-match: The etag of the record set. Omit this value to always overwrite the current record set. Specify the last-seen etag value to prevent accidentally overwriting any concurrent changes.
        if-none-match: Set to '*' to allow a new record set to be created, but to prevent updating an existing record set. Other values will be ignored.
        metadata: The metadata attached to the record set.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the record set, relative to the name of the zone.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-resource: ID of an Azure resource from which the DNS resource value is taken. --tm-profile --traffic-management-profile Experimental A reference to an Azure Traffic Manager Profile resource from where the DNS resource value is taken.
        ttl: |-
            The TTL (time-to-live) of the records in the record set.

            Default value: 3600
        zone-name: The name of the DNS zone (without a terminating dot).
examples:
    Create an DS record set.: az network dns record-set ds create -g MyResourceGroup -z www.mysite.com -n MyRecordSet --metadata owner=WebTeam
