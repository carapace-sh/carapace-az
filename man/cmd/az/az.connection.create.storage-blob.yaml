# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: storage-blob
description: Create a Service Connector local connection to storage-blob.
flags:
    --account=: Name of the storage account.
    --client-type=: The client type used on the connection
    --connection=: Name of the connection.
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --secret=:
        description: The secret auth info
        nargs: -1
    --service-principal=:
        description: The service principal auth info
        nargs: -1
    --subscription=: Name or ID of subscription.
    --target-id=: The resource id of target service.
    --target-resource-group=: The resource group which contains the storage account.
    --user-account=:
        description: The local user account auth info
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - springBoot
            - none
documentation:
    flag:
        account: Name of the storage account. Required if '--target-id' is not specified.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        client-type: |-
            The client type used on the connection.

            Accepted values: dotnet, dotnet-internal, java, nodejs, none, python, springBoot
        connection: Name of the connection.
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        secret: 'The secret auth info. Usage: --secret.'
        service-principal: 'The service principal auth info. Usage: --service-principal client-id=XX secret=XX client-id      : Required. Client id of the service principal. object-id      : Optional. Object id of the service principal (Enterprise Application). secret         : Required. Secret of the service principal.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-id: The resource id of target service. Required if ['--target-resource-group', '--account'] are not specified. --target-resource-group --tg The resource group which contains the storage account. Required if '--target-id' is not specified.
        target-resource-group: The resource group which contains the storage account. Required if '--target-id' is not specified.
        user-account: 'The user account auth info. Usage: --user-account object-id=XX object-id              : Optional. Object id of current login user. It will be set automatically if not provided.'
examples:
    Create a connection from local to storage-blob interactively: az connection create storage-blob -g resourceGroup
    Create a connection from local to storage-blob with resource id: az connection create storage-blob -g resourceGroup --target-id /subscriptions/{subscription}/resourceGroups/{target_resource_group}/providers/Microsoft.Storage/storageAccounts/{account}/blobServices/default --secret
    Create a connection from local to storage-blob with resource name: az connection create storage-blob -g resourceGroup --tg StorageRG --account MyAccount --secret
