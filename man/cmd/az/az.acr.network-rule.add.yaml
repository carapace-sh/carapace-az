# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a network rule.
flags:
    --ip-address=: IPv4 address or CIDR range.
    --subnet=: Name or ID of subnet.
    --subscription=: Name or ID of subscription.
    --vnet-name=: Name of a virtual network.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ip-address: IPv4/IPv6 address or CIDR range.
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subnet: Name or ID of subnet. If name is supplied, `--vnet-name` must be supplied.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add a rule to allow access for a specific IP address-range.: az acr network-rule add -n myregistry --ip-address 23.45.1.0/24
    Add a rule to allow access for a specific virtual network.: az acr network-rule add -n myregistry --subnet $subnetId
