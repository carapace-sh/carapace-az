# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the billing profiles that a user has access to.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --expand=: May be used to expand the invoice sections.
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        Command group 'billing profile' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        expand: May be used to expand the invoice sections.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List billing profiles with default properties: az billing profile list --account-name "{billingAccountName}"
    List billing profiles with desired expanded properties: az billing profile list --expand "invoiceSections" --account-name "{billingAccountName}"
