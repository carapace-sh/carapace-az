# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a service principal's password or certificate credentials
flags:
    --cert=: Operate on certificate credentials
    --id=!: service principal name, or object id
    --key-id=!: credential key id
documentation:
    command: Delete a service principal's password or certificate credentials.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        cert: |-
            Operate on certificate credentials.

            Default value: False
        change-reference: The related change reference ID for this resource operation.
        id: Service principal name, or object id.
        key-id: Credential key id.
examples:
    Delete a service principal's certificate credential: az ad sp credential delete --id 00000000-0000-0000-0000-000000000000 --key-id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx --cert
    Delete a service principal's password credential: az ad sp credential delete --id 00000000-0000-0000-0000-000000000000 --key-id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
