# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an existing Azure Cosmos DB database account.
flags:
    --analytical-storage-schema-type=: Schema type for analytical storage.
    --backup-interval=: the frequency(in minutes) with which backups are taken (only for accounts with periodic mode backups)
    --backup-policy-type=: The type of backup policy of the account to create
    --backup-redundancy=: The redundancy type of the backup Storage account
    --backup-retention=: the time(in hours) for which each backup is retained (only for accounts with periodic mode backups)
    --capabilities=:
        description: set custom capabilities on the Cosmos DB database account.
        nargs: -1
    --continuous-tier=: The tier of Continuous backup
    --default-consistency-level=: default consistency level of the Cosmos DB database account
    --default-identity=: The primary identity to access key vault in CMK related features.
    --disable-key-based-metadata-write-access=:
        description: Disable write operations on metadata resources (databases, containers, throughput) via account keys
        nargs: -1
    --enable-analytical-storage=:
        description: Flag to enable log storage on the account.
        nargs: -1
    --enable-automatic-failover=:
        description: Enables automatic failover of the write region in the rare event that the region is unavailable due to an outage.
        nargs: -1
    --enable-burst-capacity=:
        description: Flag to enable burst capacity on the account.
        nargs: -1
    --enable-multiple-write-locations=:
        description: Enable Multiple Write Locations
        nargs: -1
    --enable-partition-merge=:
        description: Flag to enable partition merge on the account.
        nargs: -1
    --enable-prpp-autoscale=:
        description: Enable or disable PerRegionPerPartitionAutoscale.
        nargs: -1
    --enable-virtual-network=:
        description: Enables virtual network on the Cosmos DB database account
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ip-range-filter=:
        description: firewall support.
        nargs: -1
    --key-uri=: The URI of the key vault
    --locations=:
        description: Add a location to the Cosmos DB database account
        nargs: -1
    --max-interval=: when used with Bounded Staleness consistency, this value represents the time amount of staleness (in seconds) tolerated.
    --max-staleness-prefix=: when used with Bounded Staleness consistency, this value represents the number of stale requests tolerated.
    --minimal-tls-version=: Indicates the minimum allowed TLS version
    --network-acl-bypass=: Flag to enable or disable Network Acl Bypass.
    --server-version=: Valid only for MongoDB accounts.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --virtual-network-rules=:
        description: ACL's for virtual network
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -i, --network-acl-bypass-resource-ids=:
        description: List of Resource Ids to allow Network Acl Bypass.
        nargs: -1
    -n, --name=: Name of the Cosmos DB database account
    -p, --public-network-access=: Sets public network access in server to either Enabled, Disabled, or SecuredByPerimeter.
completion:
    flag:
        analytical-storage-schema-type:
            - WellDefined
            - FullFidelity
        backup-policy-type:
            - Periodic
            - Continuous
        backup-redundancy:
            - Geo
            - Local
            - Zone
        continuous-tier:
            - Continuous7Days
            - Continuous30Days
        default-consistency-level:
            - Eventual
            - Session
            - BoundedStaleness
            - Strong
            - ConsistentPrefix
        disable-key-based-metadata-write-access:
            - "true"
            - "false"
        enable-analytical-storage:
            - "true"
            - "false"
        enable-automatic-failover:
            - "true"
            - "false"
        enable-burst-capacity:
            - "true"
            - "false"
        enable-multiple-write-locations:
            - "true"
            - "false"
        enable-partition-merge:
            - "true"
            - "false"
        enable-prpp-autoscale:
            - "true"
            - "false"
        enable-virtual-network:
            - "true"
            - "false"
        minimal-tls-version:
            - Tls
            - Tls11
            - Tls12
        network-acl-bypass:
            - None
            - AzureServices
        public-network-access:
            - ENABLED
            - DISABLED
            - SECUREDBYPERIMETER
        server-version:
            - "3.2"
            - "3.6"
            - "4.0"
            - "4.2"
            - "5.0"
            - "6.0"
            - "7.0"
documentation:
    command: Update an Azure Cosmos DB database account.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-interval: The frequency(in minutes) with which backups are taken (only for accounts with periodic mode backups).
        backup-policy-type: The type of backup policy of the account to create.
        backup-redundancy: The redundancy type of the backup Storage account.
        backup-retention: The time(in hours) for which each backup is retained (only for accounts with periodic mode backups).
        capabilities: Set custom capabilities on the Cosmos DB database account.
        capacity-mode: CapacityMode of the account.
        change-reference: The related change reference ID for this resource operation.
        continuous-tier: The tier of Continuous backup.
        default-consistency-level: Default consistency level of the Cosmos DB database account.
        default-identity: The primary identity to access key vault in CMK related features. e.g. 'FirstPartyIdentity', 'SystemAssignedIdentity' and more. User-assigned identities are specified in format ``` UserAssignedIdentity=<resource ID of the user-assigned identity> ``` .
        default-priority-level: Default Priority Level of Request if not specified.
        disable-key-based-metadata-write-access: Disable write operations on metadata resources (databases, containers, throughput) via account keys.
        disable-local-auth: Disable key-based authentication on the Cosmos DB account.
        enable-analytical-storage: Flag to enable log storage on the account.
        enable-automatic-failover: Enables automatic failover of the write region in the rare event that the region is unavailable due to an outage. Automatic failover will result in a new write region for the account and is chosen based on the failover priorities configured for the account.
        enable-burst-capacity: 'Flag to Enable/Disable burst capacity feature. Usage:    --enable-burst-capacity true Default:  false The accepted values for the enable-burst-capacity are true and false.'
        enable-multiple-write-locations: Enable Multiple Write Locations.
        enable-partition-merge: Flag to enable partition merge on the account.
        enable-pbe: Flag to enable priority based execution on the account.
        enable-prpp-autoscale: 'Flag to Enable/Disable burst capacity feature. Usage:    --enable-prpp-autoscale true Default:  false The accepted values for the --enable-prpp-autoscale are true and false.'
        enable-virtual-network: Enables virtual network on the Cosmos DB database account.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        ip-range-filter: Firewall support. Specifies the set of IP addresses or IP address ranges in CIDR form to be included as the allowed list of client IPs for a given database account. IP addresses/ranges must be comma-separated and must not contain any spaces.
        key-uri: The URI of the key vault.
        locations: 'Add a location to the Cosmos DB database account. Usage:          --locations KEY=VALUE [KEY=VALUE ...] Required Keys:  regionName, failoverPriority Optional Key:   isZoneRedundant Default:        single region account in the location of the specified resource group. Failover priority values are 0 for write regions and greater than 0 for read regions. A failover priority value must be unique and less than the total number of regions. Multiple locations can be specified by using more than one ```'
        max-interval: When used with Bounded Staleness consistency, this value represents the time amount of staleness (in seconds) tolerated. Accepted range for this value is 5 - 86400.
        max-staleness-prefix: When used with Bounded Staleness consistency, this value represents the number of stale requests tolerated. Accepted range for this value is 10 - 2,147,483,647.
        minimal-tls-version: 'Indicate the minimum allowed TLS version. Usage:    --minimal-tls-version TLSVersion Default:  Tls, except for Cassandra and Mongo APIs, which only work with Tls12 The accepted values for the minimal TLS version are ''Tls'', ''Tls11'', and ''Tls12'', which correspond to the TLS versions 1.0, 1.1, and 1.2.'
        name: Name of the Cosmos DB database account.
        network-acl-bypass: Flag to enable or disable Network Acl Bypass.
        network-acl-bypass-resource-ids: List of Resource Ids to allow Network Acl Bypass.
        public-network-access: Sets public network access in server to either Enabled, Disabled, or SecuredByPerimeter.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-version: Valid only for MongoDB accounts.
        soft-delete-config: 'Soft delete configuration for the account, as a JSON string or a path to a JSON file, e.g. --soft-delete-config @soft-delete-config.json . Supported keys: softDeletionEnabled (bool), softDeleteRetentionPeriodInMinutes (int) and minMinutesBeforePermanentDeletionAllowed (int).'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        virtual-network-rules: ACL's for virtual network.
examples:
    Configure soft deletion on the account from a JSON file.: az cosmosdb update --name MyCosmosDBDatabaseAccount --resource-group MyResourceGroup --soft-delete-config @soft-delete-config.json
    Creates a new Azure Cosmos DB database account with two regions. UK South is zone redundant.: az cosmosdb update -n myaccount -g mygroup --locations regionName=eastus failoverPriority=0 isZoneRedundant=False --locations regionName=uksouth failoverPriority=1 isZoneRedundant=True --enable-multiple-write-locations --network-acl-bypass AzureServices --network-acl-bypass-resource-ids /subscriptions/subId/resourceGroups/rgName/providers/Microsoft.Synapse/workspaces/wsName
    Enable soft deletion on the account with a 1440 minutes (24 hours) retention period.: az cosmosdb update --name MyCosmosDBDatabaseAccount --resource-group MyResourceGroup --soft-delete-config '{"softDeletionEnabled":true,"softDeleteRetentionPeriodInMinutes":1440,"minMinutesBeforePermanentDeletionAllowed":60}'
    Update an Azure Cosmos DB database account to enable materialized views.: az cosmosdb update --name MyCosmosDBDatabaseAccount --resource-group MyResourceGroup --enable-materialized-views true
    Update an Azure Cosmos DB database account. (autogenerated): az cosmosdb update --capabilities EnableGremlin --name MyCosmosDBDatabaseAccount --resource-group MyResourceGroup
