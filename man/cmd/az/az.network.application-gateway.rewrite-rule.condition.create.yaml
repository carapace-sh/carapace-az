# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a rewrite rule condition.
flags:
    --gateway-name=!: Name of the application gateway.
    --ignore-case=:
        description: Make comparison case-insensitive.
        nargs: -1
    --negate=:
        description: Check the negation of the condition.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --pattern=: Pattern, either fixed string or regular expression, that evaluates the truthfulness of the condition.
    --rule-name=!: Name of the rewrite rule.
    --rule-set-name=!: Name of the rewrite rule set.
    --subscription=: Name or ID of subscription.
    --variable=!: Variable whose value is being evaluated.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        ignore-case:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        negate:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        gateway-name: Name of the application gateway.
        ignore-case: |-
            Make comparison case-insensitive.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        negate: |-
            Check the negation of the condition.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        pattern: Pattern, either fixed string or regular expression, that evaluates the truthfulness of the condition.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule-name: Name of the rewrite rule.
        rule-set-name: Name of the rewrite rule set.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        variable: 'Variable whose value is being evaluated. Values from: ``` az network application-gateway rewrite-rule condition list-server-variables ``` (prefix headers needed).'
examples:
    Create a rewrite rule.: az network application-gateway rewrite-rule condition create -g MyResourceGroup --gateway-name MyGateway --rule-set-name MyRuleSet --rule-name MyRule --variable MyVariable --pattern "^Bearer" --ignore-case false --negate
