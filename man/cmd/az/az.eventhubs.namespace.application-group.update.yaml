# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an ApplicationGroup for a Namespace.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --is-enabled=:
        description: Determines if Application Group is allowed to create connection with namespace or not.
        nargs: -1
    --namespace-name=: The Namespace name
    --policies=:
        description: List of group policies that define the behavior of application group.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The Application Group name
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        is-enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        is-enabled: |-
            Determines if Application Group is allowed to create connection with namespace or not. Once the isEnabled is set to false, all the existing connections of application group gets dropped and no new connections will be allowed.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        name: 'The Application Group name '
        namespace-name: The Namespace name.
        policies: List of group policies that define the behavior of application group. The policies can support resource governance scenarios such as limiting ingress or egress traffic.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
