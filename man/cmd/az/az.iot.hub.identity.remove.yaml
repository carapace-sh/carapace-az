# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove managed identities from an IoT Hub
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --system-assigned=:
        description: Remove a system-assigned managed identity from this hub.
        nargs: -1
    --user-assigned=:
        description: Remove user-assigned managed identities from this hub.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: IoT Hub name.
completion:
    flag:
        system-assigned:
            - "true"
            - "false"
documentation:
    command: Remove managed identities from an IoT Hub.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: IoT Hub name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-assigned: Remove user-assigned managed identities from this hub. Accept space-separated list of identity resource IDs.
examples:
    Remove a system-assigned managed identity from an IoT Hub.: az iot hub identity remove --name MyIoTHub --resource-group MyResourceGroup --system-assigned
    Remove a user-assigned managed identity from an IoT Hub: az iot hub identity remove --name MyIoTHub --resource-group MyResourceGroup --user-assigned {resourceId}
    Remove all identities from an IoT Hub.: az iot hub identity remove --name MyIoTHub --resource-group MyResourceGroup --system-assigned --user-assigned
