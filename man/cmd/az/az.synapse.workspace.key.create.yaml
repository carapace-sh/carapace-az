# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a workspace's key.
flags:
    --key-identifier=!: The Key Vault Url of the workspace encryption key.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The workspace customer-managed key display name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        key-identifier: 'The Key Vault Url of the workspace encryption key. should be in the format of: https://{keyvaultname}.vault.azure.net/keys/{keyname}.'
        name: The workspace customer-managed key display name. All existing keys can be found using /"az synapse workspace key list/" cmdlet.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    Create a workspace's key.: |-
        az synapse workspace key create --name newkey --workspace-name testsynapseworkspace \
        --resource-group rg --key-identifier https://{keyvaultname}.vault.azure.net/keys/{keyname}
