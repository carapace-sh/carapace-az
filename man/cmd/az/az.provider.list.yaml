# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets all resource providers for a subscription.
flags:
    --expand=: The properties to include in the results.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        expand: The properties to include in the results. For example, use &$expand=metadata in the query string to retrieve resource provider metadata. To include property aliases in response, use $expand=resourceTypes/aliases. Default value is None.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Display all resource types for the network resource provider.: az provider list --query "[?namespace=='Microsoft.Network'].resourceTypes[].resourceType"
