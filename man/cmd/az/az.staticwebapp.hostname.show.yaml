# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get details for a staticwebapp custom domain.
flags:
    --hostname=!: custom hostname such as www.example.com. Only support sub domain in preview.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the static site
documentation:
    command: Get details for a staticwebapp custom domain. Can be used to fetch validation token for TXT domain validation (see example).
    flag:
        hostname: Custom hostname such as ``` www.example.com ``` . Only support sub domain in preview.
        name: Name of the static site.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Fetch the validation token (if generated) for TXT validation: az staticwebapp hostname show -n MyStaticAppName -g MyResourceGroup --hostname example.com --query "validationToken"
    Show all custom domain details for a particular hostname: az staticwebapp hostname show -n MyStaticAppName -g MyResourceGroup --hostname example.com
