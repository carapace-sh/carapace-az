# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: promote
description: Stop replication of a read replica and promote it to an independent server or as a primary server.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --promote-mode=: Whether to promote read replica to an independent server or promote it as a primary server.
    --promote-option=: Whether to sync data before promoting read replica or promote as soon as possible.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the server.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        promote-mode:
            - standalone
            - switchover
        promote-option:
            - planned
            - forced
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        promote-mode: |-
            Whether to promote read replica to an independent server or promote it as a primary server.

            Default value: standalone

            Accepted values: standalone, switchover
        promote-option: |-
            Whether to sync data before promoting read replica or promote as soon as possible.

            Default value: planned

            Accepted values: forced, planned
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Stop replication to 'testreplica' and promote it a standalone read/write server with forced data sync.: az postgres flexible-server replica promote -g testgroup -n testreplica --promote-mode standalone --promote-option forced
    Stop replication to 'testreplica' and promote it a standalone read/write server.: az postgres flexible-server replica promote -g testgroup -n testreplica
    ? Stop replication to 'testreplica' and promote it to primary server with planned data sync.       The replica you are promoting must have the reader virtual endpoint assigned, or you will receive an error on promotion.
    : az postgres flexible-server replica promote -g testgroup -n testreplica --promote-mode switchover --promote-option planned
