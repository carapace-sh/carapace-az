# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: promote
description: Stop replication of a read replica and promote it to an independent server or as a primary server.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --promote-mode=: Whether to promote read replica to an independent server or promote it as a primary server.
    --promote-option=: Whether to sync data before promoting read replica or promote as soon as possible.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the server.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        promote-mode:
            - standalone
            - switchover
        promote-option:
            - planned
            - forced
