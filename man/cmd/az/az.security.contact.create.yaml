# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a security contact.
documentation:
    flag:
        alert-notifications: Defines whether to send email notifications about new security alerts  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        notifications-by-role: Defines whether to send email notifications from Microsoft Defender for Cloud to persons with specific RBAC roles on the subscription.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --alert-notifications=:
        description: Defines whether to send email notifications about new security alerts  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --emails=: List of email addresses which will get notifications from Microsoft Defender for Cloud by the configurations defined in this security contact.
    --notifications-by-role=:
        description: Defines whether to send email notifications from Microsoft Defender for Cloud to persons with specific RBAC roles on the subscription.
        nargs: -1
    --phone=: The security contact's phone number
    --subscription=: Name or ID of subscription.
    -n, --name=!: Name of the security contact object
