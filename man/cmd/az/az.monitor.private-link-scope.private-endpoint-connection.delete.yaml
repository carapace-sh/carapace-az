# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a private endpoint connection of a private link scope resource.
flags:
    --id=: ID of the private endpoint connection associated with the private link scope.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --scope-name=: Name of the Azure Monitor Private Link Scope.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the private endpoint connection associated with the private link scope.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: |-
        Command group 'az monitor private-link-scope private-endpoint-connection' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        id: ID of the private endpoint connection associated with the private link scope. Values from ``` az monitor private-link-scope show ``` .
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the private endpoint connection associated with the private link scope.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scope-name: Name of the Azure Monitor Private Link Scope.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete a private endpoint connection of a private link scope resource.: az monitor private-link-scope private-endpoint-connection delete -n MyName -g MyResourceGroup --scope-name MyScope
