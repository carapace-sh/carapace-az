# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a new Named Value.
documentation:
    flag:
        display-name: Required. Unique name of NamedValue. It may contain only letters, digits, period, dash, and underscore characters.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        secret: Determines whether the value is a secret and should be encrypted or not. Default value is false.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        value: Required. Value of the NamedValue. Can contain policy expressions. It may not be empty or consist only of whitespace. This property will not be filled on GET operations! Use /listSecrets POST request to get the value.
flags:
    --display-name=!: Required.
    --if-match=: ETag of the Entity.
    --named-value-id=!: Identifier of the NamedValue.
    --no-wait=: Do not wait for the long-running operation to finish.
    --secret=:
        description: Determines whether the value is a secret and should be encrypted or not.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --value=: Required.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
completion:
    flag:
        secret:
            - "true"
            - "false"
