# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show capacity reservation.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --subscription=: Name or ID of subscription.
    -c, --capacity-reservation-group=!: The name of the capacity reservation group.
    -g, --resource-group=!: Name of resource group.
    -i, --instance-view=: Retrieve a snapshot of the runtime properties of the capacity reservation that is managed by the platform and can change outside of control plane operations.
    -n, --capacity-reservation-name=!: The name of the capacity reservation.
