# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show capacity reservation.
flags:
    --subscription=: Name or ID of subscription.
    -c, --capacity-reservation-group=!: The name of the capacity reservation group.
    -g, --resource-group=!: Name of resource group.
    -i, --instance-view=: Retrieve a snapshot of the runtime properties of the capacity reservation that is managed by the platform and can change outside of control plane operations.
    -n, --capacity-reservation-name=!: The name of the capacity reservation.
documentation:
    command: Retrieve information about the capacity reservation.
    flag:
        capacity-reservation-group: The name of the capacity reservation group.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        instance-view: |-
            Retrieve a snapshot of the runtime properties of the capacity reservation that is managed by the platform and can change outside of control plane operations.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a capacity reservation containing the instance views.: az capacity reservation show -c ReservationGroupName -n ReservationName -g MyResourceGroup --instance-view
    Get a capacity reservation.: az capacity reservation show -c ReservationGroupName -n ReservationName -g MyResourceGroup
