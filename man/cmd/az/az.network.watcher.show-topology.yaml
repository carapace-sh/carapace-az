# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-topology
description: Get the network topology of a resource group, virtual network or subnet.
flags:
    --subnet=: Name or ID of the subnet to target.
    --subscription=: Name or ID of subscription.
    --vnet=: Name or ID of the virtual network to target.
    -g, --resource-group=: Name of the target resource group to perform topology on.
    -l, --location=: Location.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: Location. Defaults to the location of the target resource group. Topology information is only shown for resources within the target resource group that are within the specified region.
        resource-group: Name of the target resource group to perform topology on.
        subnet: Name or ID of the subnet to target. If name is used, --vnet NAME must also be supplied.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vnet: Name or ID of the virtual network to target.
examples:
    Use show-topology to get the topology of resources within a resource group.: az network watcher show-topology -g MyResourceGroup
