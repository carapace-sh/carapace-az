# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-topology
description: Get the network topology of a resource group, virtual network or subnet.
documentation:
    flag:
        location: Location. Defaults to the location of the target resource group. Topology information is only shown for resources within the target resource group that are within the specified region.
        subnet: Name or ID of the subnet to target. If name is used, --vnet NAME must also be supplied.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --subnet=: Name or ID of the subnet to target.
    --subscription=: Name or ID of subscription.
    --vnet=: Name or ID of the virtual network to target.
    -g, --resource-group=: Name of the target resource group to perform topology on.
    -l, --location=: Location.
