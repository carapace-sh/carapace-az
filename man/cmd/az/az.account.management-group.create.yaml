# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new management group.
flags:
    --no-register=: Skip registration for resource provider Microsoft.Management
    -d, --display-name=: ""
    -n, --name=!: ""
    -p, --parent=: ""
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        display-name: Sets the display name of the management group. If null, the group name is set as the display name.
        name: Name of the management group.
        no-register: |-
            Skip registration for resource provider Microsoft.Management.

            Default value: False
        parent: Sets the parent of the management group. Can be the fully qualified id or the name of the management group. If null, the root tenant group is set as the parent.
examples:
    Create a new management group with a specific display name and parent.: az account management-group create --name GroupName --display-name DisplayName --parent ParentId/ParentName
    Create a new management group with a specific display name.: az account management-group create --name GroupName --display-name DisplayName
    Create a new management group with a specific parent.: az account management-group create --name GroupName --parent ParentId/ParentName
    Create a new management group.: az account management-group create --name GroupName
