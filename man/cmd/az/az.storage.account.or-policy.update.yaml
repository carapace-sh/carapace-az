# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update Object Replication Service Policy properties for storage account.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --policy-id=: The ID of object replication policy or "default" if the policy ID is unknown.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -d, --destination-account=: The destination storage account name or resource Id.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
    -p, --policy=: The object replication policy definition between two storage accounts, in JSON format.
    -s, --source-account=: The source storage account name or resource Id.
documentation:
    flag:
        account-name: The storage account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        change-reference: The related change reference ID for this resource operation.
        destination-account: The destination storage account name or resource Id. Apply --account-name value as destination account when there is no destination account provided in --policy and --destination-account.
        enable-metrics: |-
            Indicates whether object replication metrics feature is enabled for the policy.

            Accepted values: false, true
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        policy: The object replication policy definition between two storage accounts, in JSON format. Multiple rules can be defined in one policy.
        policy-id: The ID of object replication policy or "default" if the policy ID is unknown. Policy Id will be auto-generated when setting on destination account. Required when setting on source account.
        priority-replication: |-
            Indicates whether object replication priority replication feature is enabled for the policy.

            Accepted values: false, true
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        source-account: The source storage account name or resource Id. Required when no --policy provided.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags-replication: |-
            Indicates whether object replication tags replication feature is enabled for the policy.

            Accepted values: false, true
examples:
    Update Object Replication Service Policy through json file.: az storage account or-policy update -g ResourceGroupName -n StorageAccountName -p @policy.json
    Update source storage account in Object Replication Service Policy.: az storage account or-policy update -g ResourceGroupName -n StorageAccountName --source-account newSourceAccount --policy-id "04344ea7-aa3c-4846-bfb9-e908e32d3bf8"
