# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create PrivateEndpointConnections of service namespace.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --description=: Description of the connection state.
    --namespace-name=!: The Namespace name
    --provisioning-state=: Provisioning state of the Private Endpoint Connection.
    --status=: Status of the connection.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The PrivateEndpointConnection name
completion:
    flag:
        provisioning-state:
            - Canceled
            - Creating
            - Deleting
            - Failed
            - Succeeded
            - Updating
        status:
            - Approved
            - Disconnected
            - Pending
            - Rejected
