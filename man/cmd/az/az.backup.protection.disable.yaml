# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: disable
description: Stop protecting a backed up item.
flags:
    --backup-management-type=: Specify the backup management type.
    --delete-backup-data=:
        description: Option to delete existing backed up data in the Recovery services vault.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --retain-recovery-points-as-per-policy=:
        description: Switch parameter that specifies that existing recovery points should be retained for the duration specified by the backup policy
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
    --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
    -c, --container-name=: Name of the backup container.
    -g, --resource-group=: Name of resource group.
    -i, --item-name=: Name of the backed up item.
    -v, --vault-name=: Name of the Recovery services vault.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        backup-management-type:
            - AzureIaasVM
            - AzureStorage
            - AzureWorkload
        delete-backup-data:
            - "true"
            - "false"
        retain-recovery-points-as-per-policy:
            - "true"
            - "false"
        workload-type:
            - VM
            - AzureFileShare
            - SAPHANA
            - MSSQL
            - SAPHanaDatabase
            - SQLDataBase
documentation:
    command: Stop protecting a backed up item. Can retain the backed up data forever or choose to delete it.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-management-type: |-
            Specify the backup management type. Define how Azure Backup manages the backup of entities within the ARM resource. For eg: AzureWorkloads refers to workloads installed within Azure VMs, AzureStorage refers to entities within Storage account. Required only if friendly name is used as Container name.

            Accepted values: AzureIaasVM, AzureStorage, AzureWorkload
        change-reference: The related change reference ID for this resource operation.
        container-name: Name of the backup container. Accepts 'Name' or 'FriendlyName' from the output of az backup container list command. If 'FriendlyName' is passed then BackupManagementType is required.
        delete-backup-data: |-
            Option to delete existing backed up data in the Recovery services vault.

            Default value: False

            Accepted values: false, true
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        item-name: Name of the backed up item.
        resource-group: |-
            Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .

            Default value: False

            Accepted values: false, true
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tenant-id: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
        vault-name: Name of the Recovery services vault.
        workload-type: |-
            Specify the type of applications within the Resource which should be discovered and protected by Azure Backup. 'MSSQL' and 'SQLDataBase' can be used interchangeably for SQL in Azure VM, as can 'SAPHANA' and 'SAPHanaDatabase' for SAP HANA in Azure VM.

            Accepted values: AzureFileShare, MSSQL, SAPASE, SAPAseDatabase, SAPHANA, SAPHanaDBInstance, SAPHanaDatabase, SQLDataBase, VM
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Stop protecting a backed up item. Can retain the backed up data forever or choose to delete it. (autogenerated): az backup protection disable --container-name MyContainer --backup-management-type AzureIaasVM --delete-backup-data false --item-name MyItem --resource-group MyResourceGroup --vault-name MyVault --yes
