# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Service Bus queue.
flags:
    --auto-delete-on-idle=: ISO 8061 timeSpan idle interval after which the queue is automatically deleted.
    --default-message-time-to-live=: ISO 8601 default message timespan to live value.
    --duplicate-detection=:
        description: A value indicating if this queue requires duplicate detection.
        nargs: -1
    --enable-batched-operations=:
        description: Value that indicates whether server-side batched operations are enabled.
        nargs: -1
    --enable-express=:
        description: A value that indicates whether Express Entities are enabled.
        nargs: -1
    --enable-partitioning=:
        description: A value that indicates whether the queue is to be partitioned across multiple message brokers.
        nargs: -1
    --enable-session=:
        description: A value that indicates whether the queue supports the concept of sessions.
        nargs: -1
    --forward-dead-lettered-messages-to=: Queue/Topic name to forward the Dead Letter message
    --forward-to=: Queue/Topic name to forward the messages
    --lock-duration=: ISO 8601 timespan duration of a peek-lock; that is, the amount of time that the message is locked for other receivers.
    --max-delivery-count=: The maximum delivery count.
    --max-message-size=: Maximum size (in KB) of the message payload that can be accepted by the topic.
    --max-size=: The maximum capacity of the queue, denoted in megabytes, signifies the volume of memory assigned to the queue.
    --message-expiration=:
        description: A value that indicates whether this queue has dead letter support when a message expires.
        nargs: -1
    --namespace-name=!: The namespace name
    --status=: Enumerates the possible values for the status of a messaging entity.
    --subscription=: Name or ID of subscription.
    -d, --duplicate-detection-history-time-window=: ISO 8601 timeSpan structure that defines the duration of the duplicate detection history.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The queue name.
completion:
    flag:
        duplicate-detection:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-batched-operations:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-express:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-partitioning:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-session:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        message-expiration:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        status:
            - Active
            - Creating
            - Deleting
            - Disabled
            - ReceiveDisabled
            - Renaming
            - Restoring
            - SendDisabled
            - Unknown
documentation:
    command: Create a Service Bus queue. This operation is idempotent.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auto-delete-on-idle: ISO 8061 timeSpan idle interval after which the queue is automatically deleted. The minimum duration is 5 minutes.
        change-reference: The related change reference ID for this resource operation.
        default-message-time-to-live: |-
            ISO 8601 default message timespan to live value. This is the duration after which the message expires, starting from when the message is sent to Service Bus. This is the default value used when TimeToLive is not set on a message itself.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        duplicate-detection-history-time-window: ISO 8601 timeSpan structure that defines the duration of the duplicate detection history. The default value is 10 minutes.
        enable-batched-operations: |
            Value that indicates whether server-side batched operations are enabled.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        enable-express: |-
            A value that indicates whether Express Entities are enabled. An express queue holds a message in memory temporarily before writing it to persistent storage.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        enable-partitioning: |-
            A value that indicates whether the queue is to be partitioned across multiple message brokers.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        enable-session: |-
            A value that indicates whether the queue supports the concept of sessions.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        forward-dead-lettered-messages-to: Queue/Topic name to forward the Dead Letter message.
        forward-to: Queue/Topic name to forward the messages.
        lock-duration: ISO 8601 timespan duration of a peek-lock; that is, the amount of time that the message is locked for other receivers. The maximum value for LockDuration is 5 minutes; the default value is 1 minute.
        max-delivery-count: The maximum delivery count. A message is automatically deadlettered after this number of deliveries. default value is 10.
        max-message-size: Maximum size (in KB) of the message payload that can be accepted by the topic. This property is only used in Premium today and default is 1024.
        max-size: The maximum capacity of the queue, denoted in megabytes, signifies the volume of memory assigned to the queue. The permissible values for this parameter are 1024, 2048, 3072, 4096, and 5120 megabytes. By default, the system assigns a capacity of 1024 megabytes. If the ‘enable-partition’ setting is set to true, the specified queue size will be amplified by a factor of 16.
        namespace-name: The namespace name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        status: |-
            Enumerates the possible values for the status of a messaging entity.

            Accepted values: Active, Creating, Deleting, Disabled, ReceiveDisabled, Renaming, Restoring, SendDisabled, Unknown
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
