# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List available flexible servers.
flags:
    --show-cluster=: Only show elastic clusters.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        show-cluster: Only show elastic clusters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all PostgreSQL flexible servers in a resource group in table format.: az postgres flexible-server list --resource-group testGroup --output table
    List all PostgreSQL flexible servers in a resource group.: az postgres flexible-server list --resource-group testgroup
    List all PostgreSQL flexible servers in a subscription.: az postgres flexible-server list
