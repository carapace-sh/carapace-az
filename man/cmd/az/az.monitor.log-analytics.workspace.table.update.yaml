# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the properties of a Log Analytics workspace table.
documentation:
    flag:
        plan: 'The table plan. Possible values include: "Basic", "Analytics".'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --columns=:
        description: A list of table custom columns.Extracts multiple space-separated columns in column_name=column_type format
        nargs: -1
    --description=: Table description.
    --no-wait=: Do not wait for the long-running operation to finish.
    --plan=: The table plan.
    --retention-time=: The table retention in days, between 4 and 730. Setting this property to -1 will default to the workspace retention.
    --subscription=: Name or ID of subscription.
    --total-retention-time=: The table total retention in days, between 4 and 2556. Setting this property to -1 will default to table retention.
    --workspace-name=!: Name of the Log Analytics Workspace.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the table.
completion:
    flag:
        plan:
            - Basic
            - Analytics
