# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a managed instance.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --authentication-metadata=: Preferred metadata to use for authentication of synced on-prem users.
    --backup-storage-redundancy=: Backup storage redundancy used to store backups.
    --database-format=: Managed Instance database format specific to the SQL.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --gpv2=:
        description: Whether or not this is a GPv2 variant of General Purpose edition.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --instance-pool-name=: Name of the Instance Pool where managed instance will be placed.
    --iops=: The storage iops of the managed instance.
    --license-type=: The license type to apply for this managed instance.
    --minimal-tls-version=: The minimal TLS version enforced by the managed instance for inbound connections.
    --no-wait=: Do not wait for the long-running operation to finish.
    --pricing-model=: Managed Instance pricing model.
    --primary-user-assigned-identity-id=: The ID of the primary user managed identity.
    --proxy-override=: The connection type used for connecting to the instance.
    --public-data-endpoint-enabled=:
        description: Whether or not the public data endpoint is enabled for the instance.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --service-principal-type=: Service Principal type to be used for this Managed Instance.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --storage=: The storage size of the managed instance.
    --subnet=: Name or ID of the subnet that allows access to an Azure Sql Managed Instance.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vnet-name=: The virtual network name
    -a, --user-assigned-identity-id=:
        description: Generate and assign an User Managed Identity(UMI) for this server.
        nargs: -1
    -c, --capacity=: The capacity of the managed instance in integer number of vcores.
    -e, --tier=: The edition component of the sku.
    -f, --family=: The compute generation component of the sku.
    -g, --resource-group=: Name of resource group.
    -i, --assign-identity=: Generate and assign an Azure Active Directory Identity for this managed instance for use with key management services like Azure KeyVault.
    -k, --key-id=: The key vault URI for encryption.
    -m, --maint-config-id=: Change maintenance configuration for this managed instance.
    -n, --name=: The managed instance name
    -p, --admin-password=: The administrator login password (required formanaged instance creation).
    -t, --identity-type=: Type of Identity to be used.
    -y, --yes=: Do not prompt for confirmation.
    -z, --zone-redundant=:
        description: Specifies whether to enable zone redundancy.
        nargs: -1
completion:
    flag:
        authentication-metadata:
            - AzureAD
            - Windows
            - Paired
        database-format:
            - AlwaysUpToDate
            - SQLServer2022
        gpv2:
            - "true"
            - "false"
        identity-type:
            - SystemAssigned
            - UserAssigned
            - SystemAssigned,UserAssigned
            - None
        license-type:
            - LicenseIncluded
            - BasePrice
        minimal-tls-version:
            - None
            - "1.0"
            - "1.1"
            - "1.2"
        pricing-model:
            - Regular
            - Freemium
        proxy-override:
            - Default
            - Redirect
            - Proxy
        public-data-endpoint-enabled:
            - "true"
            - "false"
        service-principal-type:
            - SystemAssigned
            - None
        zone-redundant:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        admin-password: |-
            The administrator login password (required formanaged instance creation). --am --authentication-metadata Preferred metadata to use for authentication of synced on-prem users. Default is AzureAD.

            Accepted values: AzureAD, Paired, Windows
        assign-identity: |-
            Generate and assign an Azure Active Directory Identity for this managed instance for use with key management services like Azure KeyVault. If identity is already assigned - do nothing.

            Default value: False
        authentication-metadata: Preferred metadata to use for authentication of synced on-prem users. Default is AzureAD.
        backup-storage-redundancy: 'Backup storage redundancy used to store backups. Allowed values include: Local, Zone, Geo, GeoZone.'
        capacity: The capacity of the managed instance in integer number of vcores.
        change-reference: The related change reference ID for this resource operation.
        database-format: |-
            Managed Instance database format specific to the SQL. Allowed values include: AlwaysUpToDate, SQLServer2022.

            Accepted values: AlwaysUpToDate, SQLServer2022, SQLServer2025
        family: 'The compute generation component of the sku. Allowed values include: Gen4, Gen5.'
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        gpv2: |-
            Whether or not this is a GPv2 variant of General Purpose edition.

            Accepted values: false, true
        identity-type: |-
            Type of Identity to be used. Possible values are SystemAsssigned,UserAssigned, SystemAssignedUserAssigned and None.

            Accepted values: None, SystemAssigned, SystemAssigned,UserAssigned, UserAssigned
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        instance-pool-name: Name of the Instance Pool where managed instance will be placed.
        iops: The storage iops of the managed instance. Storage iops can be specified in increments of 1.
        key-id: The key vault URI for encryption.
        license-type: |-
            The license type to apply for this managed instance.

            Accepted values: BasePrice, LicenseIncluded
        maint-config-id: Change maintenance configuration for this managed instance.
        memory: The memory size of the managed instance. Memory size must be specified in GB.
        minimal-tls-version: |-
            The minimal TLS version enforced by the managed instance for inbound connections.

            Accepted values: 1.0, 1.1, 1.2, None
        name: The managed instance name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        pricing-model: |-
            Managed Instance pricing model. Allowed values include: Regular, Freemium.

            Accepted values: Freemium, Regular
        proxy-override: |-
            The connection type used for connecting to the instance.

            Accepted values: Default, Proxy, Redirect
        public-data-endpoint-enabled: |-
            Whether or not the public data endpoint is enabled for the instance.

            Accepted values: false, true
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-principal-type: |-
            Service Principal type to be used for this Managed Instance. Possible values are SystemAssigned and None.

            Accepted values: None, SystemAssigned
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        storage: The storage size of the managed instance. Storage size must be specified in increments of 32 GB.
        subnet: Name or ID of the subnet that allows access to an Azure Sql Managed Instance. If subnet name is provided, --vnet-name must be provided.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tier: 'The edition component of the sku. Allowed values include: GeneralPurpose, BusinessCritical.'
        user-assigned-identity-id: Generate and assign an User Managed Identity(UMI) for this server.
        vnet-name: The virtual network name.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
        zone-redundant: |-
            Specifies whether to enable zone redundancy. Default is true if no value is specified.

            Accepted values: false, true
examples:
    Add or update a tag.: az sql mi update -g mygroup -n myinstance --set tags.tagName=tagValue
    Enable zone redundancy on a managed instance: az sql mi update -g mygroup -n myinstance -z
    Move managed instance out of instance pool: az sql mi update -g mygroup -n myinstance --remove instancePoolId --capacity vcorecapacity
    Move managed instance to another subnet: az sql mi update -g myResourceGroup -n myServer -i \ --subnet /subscriptions/xxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup/providers/Microsoft.Network/virtualNetworks/myvnet/subnets/mysubnet \
    Move managed instance to instance pool: az sql mi update -g mygroup -n myinstance --instance-pool-name myinstancepool
    Remove a tag.: az sql mi update -g mygroup -n myinstance --remove tags.tagName
    Remove maintenance configuration from managed instance: az sql mi update -g mygroup -n myinstance -m SQL_Default
    Update a managed instance with Service Principal: az sql mi update -g mygroup -n myinstance --service-principal-type SystemAssigned
    Update a managed instance with User Managed Identies and Identity Type is SystemAssigned,UserAssigned.: az sql mi update -g myResourceGroup -n myServer -i \ --user-assigned-identity-id /subscriptions/xxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup/providers/Microsoft.ManagedIdentity/userAssignedIdentities/testumi \ --identity-type SystemAssigned,UserAssigned --pid /subscriptions/xxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup/providers/Microsoft.ManagedIdentity/userAssignedIdentities/testumi
    Update a managed instance with User Managed Identies and Identity Type is UserAssigned: az sql mi update -g myResourceGroup -n myServer -i \ --user-assigned-identity-id /subscriptions/xxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup/providers/Microsoft.ManagedIdentity/userAssignedIdentities/testumi \ --identity-type UserAssigned --pid /subscriptions/xxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup/providers/Microsoft.ManagedIdentity/userAssignedIdentities/testumi
    Update a managed instance with maintenance configuration: az sql mi update -g mygroup -n myinstance -m SQL_{Region}_{MaintenanceConfigName}
    Update a managed instance. (autogenerated): az sql mi update --name myinstance --public-data-endpoint-enabled true --resource-group mygroup --subscription MySubscription
    Update managed instance to GPv2 with specified IOPS limit: az sql mi update -g mygroup -n myinstance -e GeneralPurpose --gpv2 true --iops 3000
    Update managed instance to use Windows authentication metadata mode: az sql mi update -g mygroup -n myinstance --am Windows
    Update managed instance to use a specified memory size in GB: az sql mi update -g mygroup -n myinstance -e GeneralPurpose --memory 40
    Update mi backup storage redundancy: az sql mi update -g mygroup -n myinstance --bsr Local
    Update mi database format and pricing model: az sql mi update -g mygroup -n myinstance --database-format AlwaysUpToDate --pricing-model Regular
    Update mi edition and hardware family: az sql mi update -g mygroup -n myinstance --tier GeneralPurpose --family Gen5
    Updates a mi with specified parameters and with identity: az sql mi update -g mygroup -n myinstance -i -p mypassword --license-type mylicensetype --capacity vcorecapacity --storage storagesize
