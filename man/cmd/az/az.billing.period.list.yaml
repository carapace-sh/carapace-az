# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the available billing periods for a subscription in reverse chronological order.
flags:
    --filter=: May be used to filter billing periods by billingPeriodEndDate.
    --max-items=: Total number of items to return in the command's output.
    --next-token=: Token to specify where to start paginating.
    --skiptoken=: Skiptoken is only used if a previous operation returned a partial result.
    --subscription=: Name or ID of subscription.
    --top=: May be used to limit the number of results to the most recent N billing periods.
documentation:
    flag:
        filter: May be used to filter billing periods by billingPeriodEndDate. The filter supports 'eq', 'lt', 'gt', 'le', 'ge', and 'and'. It does not currently support 'ne', 'or', or 'not'.
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        skiptoken: Skiptoken is only used if a previous operation returned a partial result. If a previous response contains a nextLink element, the value of the nextLink element will include a skiptoken parameter that specifies a starting point to use for subsequent calls.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        top: May be used to limit the number of results to the most recent N billing periods.
