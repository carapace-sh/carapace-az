# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: CDN endpoint is the entity within a CDN profile containing configuration information such as origin, protocol, content caching and delivery behavior.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --order=: The order in which the rules are applied for the endpoint.
    --profile-name=: Name of the CDN profile which is unique within the resource group.
    --rule-name=: Name of the rule.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the CDN endpoint.
documentation:
    command: |-
        Command group 'cdn endpoint rule' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the CDN endpoint.
        order: The order in which the rules are applied for the endpoint. Possible values {0,1,2,3,………}. A rule with a lower order will be applied before one with a higher order. Rule with order 0 is a special rule. It does not require any condition and actions listed in it will always be applied.
        profile-name: Name of the CDN profile which is unique within the resource group.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule-name: Name of the rule.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Remove the global rule.: az cdn endpoint rule remove -g group -n endpoint --profile-name profile --rule-name Global
    Remove the rule with the order 4.: az cdn endpoint rule remove -g group -n endpoint --profile-name profile --order 4
