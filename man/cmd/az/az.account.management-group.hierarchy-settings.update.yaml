# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the hierarchy settings defined at the Management Group level.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    -m, --default-management-group=: ""
    -n, --name=!: ""
    -r, --require-authorization-for-group-creation=: ""
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        change-reference: The related change reference ID for this resource operation.
        default-management-group: Set the default Management Group under which new subscriptions get added in this tenant. Default setting is the Root Management Group.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        name: Name of the management group.
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        require-authorization-for-group-creation: Indicate whether RBAC access is required upon group creation under the root Management Group. True means user will require Microsoft.Management/managementGroups/write action on the root Management Group. Default setting is false.
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
examples:
    Create hierarchy settings defined at the Management Group level.: az account management-group hierarchy-settings update --name GroupName
    ? Require user to have Microsoft.Management/managementGroups/write access on the Root to create new Management Groups under the Root.
    : az account management-group hierarchy-settings update --name GroupName -r True
    Set the default Management Group new Subscriptions get placed under.: az account management-group hierarchy-settings update --name GroupName -m /providers/Microsoft.Management/managementGroups/DefaultGroup
    Update both hierarchy settings.: az account management-group hierarchy-settings update --name GroupName -m /providers/Microsoft.Management/managementGroups/DefaultGroup -r True
