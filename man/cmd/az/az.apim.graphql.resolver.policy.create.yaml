# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a new Resolver policy.
flags:
    --api-id=!: API identifier.
    --policy-format=: Format of the policyContent.
    --resolver-id=!: Resolver identifier within a GraphQL API.
    --subscription=: Name or ID of subscription.
    --value-path=!: Contents of the Policy as defined by the format.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    command: Create or updates policy configuration for the GraphQL API Resolver level.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        change-reference: The related change reference ID for this resource operation.
        policy-format: Format of the policyContent.
        resolver-id: Resolver identifier within a GraphQL API. Must be unique in the current API Management service instance.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        value-path: Contents of the Policy as defined by the format.
examples:
    Create a resolver policy.: az apim graphql resolver policy create --service-name MyApim -g MyResourceGroup --api-id MyApi --resolver-id MyResolverId --policy-format xml --value-path 'path to xml file'
