# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Retrieves the properties of an existing Azure Cosmos DB SQL Role Assignment with the given Id.
flags:
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Cosmosdb account name.
    -g, --resource-group=!: Name of resource group.
    -i, --role-assignment-id=!: Optional for Create.
documentation:
    command: Show the properties of a SQL role assignment under an Azure Cosmos DB account.
    flag:
        account-name: Cosmosdb account name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        role-assignment-id: Optional for Create. Unique ID for the Role Assignment. If not provided, a new GUID will be used.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the properties of a SQL role assignment under an Azure Cosmos DB account.: az cosmosdb sql role assignment show --account-name MyAccount --resource-group MyResourceGroup --role-assignment-id cb8ed2d7-2371-4e3c-bd31-6cc1560e84f8
