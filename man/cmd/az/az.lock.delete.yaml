# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a lock.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
    --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
    --resource-type=: 'The resource type (Ex: ''resC'').'
    --resource=: Name or ID of the resource being locked.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the lock
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
        name: Name of the lock.
        namespace: 'Provider namespace (Ex: ''Microsoft.Provider'').'
        parent: 'The parent path (Ex: ''resA/myA/resB/myB''). --resource --resource-name Name or ID of the resource being locked. If an ID is given, other resource arguments should not be given.'
        resource: Name or ID of the resource being locked. If an ID is given, other resource arguments should not be given.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'The resource type (Ex: ''resC''). Can also accept namespace/type format (Ex: ''Microsoft.Provider/resC'').'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Delete a resource group level lock: az lock delete --name lockName --resource-group group
    Delete a resource level lock: az lock delete --name lockName --resource-group group --resource resourceName --resource-type resourceType
    Delete a subscription level lock: az lock delete --name lockName
