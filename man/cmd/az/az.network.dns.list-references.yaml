# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-references
description: Returns the DNS records specified by the referencing targetResourceIds.
flags:
    --parameters=:
        description: A space-separated list of resource IDs for which referencing dns records need to be queried.
        nargs: -1
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        parameters: A space-separated list of resource IDs for which referencing dns records need to be queried.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Returns the DNS records specified by the referencing targetResourceIds.: az network dns list-references --parameters "/subscriptions/**921/resourceGroups/MyResourceGroup/providers/Microsoft.Network/trafficManagerProfiles/MyTrafficManager"
