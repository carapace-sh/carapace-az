# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore-azurefiles
description: Restore backed up Azure files within a file-share to the same file-share or another file-share in registered storage accounts.
documentation:
    flag:
        container-name: Name of the backup container. Accepts 'Name' or 'FriendlyName' from the output of az backup container list command. If 'FriendlyName' is passed then BackupManagementType is required.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        source-file-path: The absolute path of the file, to be restored within the file share, as a string. This path is the same path used in the 'az storage file download' or 'az storage file show' CLI commands.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-folder: Destination folder to which content will be restored. To restore content to root , leave the folder name empty
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --resolve-conflict=!: Instruction if there's a conflict with the restored data.
    --restore-mode=!: Specify the restore mode.
    --source-file-path=:
        description: The absolute path of the file, to be restored within the file share, as a string.
        nargs: -1
    --source-file-type=: Specify the source file type to be selected
    --subscription=: Name or ID of subscription.
    --target-file-share=: Destination file share to which content will be restored
    --target-folder=: Destination folder to which content will be restored.
    --target-storage-account=: Destination storage account to which content will be restored
    --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
    -c, --container-name=: Name of the backup container.
    -g, --resource-group=: Name of resource group.
    -i, --item-name=: Name of the backed up item.
    -r, --rp-name=: Name of the recovery point.
    -v, --vault-name=: Name of the Recovery services vault.
completion:
    flag:
        resolve-conflict:
            - Overwrite
            - Skip
        restore-mode:
            - OriginalLocation
            - AlternateLocation
        source-file-type:
            - File
            - Directory
