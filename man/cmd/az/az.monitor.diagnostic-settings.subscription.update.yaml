# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update subscription diagnostic settings for the specified resource.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        event-hub-name: The name of the event hub. If none is specified, the default event hub will be selected.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        logs: JSON encoded list of logs settings. Use '@{file}' to load from a file.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        service-bus-rule: The service bus rule ID of the service bus namespace in which you would like to have Event Hubs created for streaming the Activity Log. The rule ID is of the format '{service bus resourceID}/authorizationrules/{key name}'.
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --event-hub-auth-rule=: The resource Id for the event hub authorization rule.
    --event-hub-name=: The name of the event hub.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --logs=:
        description: JSON encoded list of logs settings.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --service-bus-rule=: The service bus rule ID of the service bus namespace in which you would like to have Event Hubs created for streaming the Activity Log.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --storage-account=: The resource id of the storage account to which you would like to send the Activity Log.
    --subscription=: Name or ID of subscription.
    --workspace=: The resource id of the log analytics workspace.
    -l, --location=: Location of the resource
    -n, --name=: The name of the diagnostic setting.
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
