# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a Kusto Kusto Pool.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        if-match: The ETag of the Kusto Pool. Omit this value to always overwrite the current Kusto Pool. Specify the last-seen ETag value to prevent accidentally overwriting concurrent changes.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --enable-purge=:
        description: A boolean value that indicates if the purge operations are enabled.
        nargs: -1
    --enable-streaming-ingest=:
        description: A boolean value that indicates if the streaming ingest is enabled.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --if-match=: The ETag of the Kusto Pool.
    --no-wait=: Do not wait for the long-running operation to finish.
    --optimized-autoscale=:
        description: Optimized auto scale definition.
        nargs: -1
    --sku=:
        description: The SKU of the kusto pool.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --workspace-name=: The name of the workspace
    --workspace-uid=: The workspace unique identifier.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Kusto pool.
completion:
    flag:
        enable-purge:
            - "true"
            - "false"
        enable-streaming-ingest:
            - "true"
            - "false"
