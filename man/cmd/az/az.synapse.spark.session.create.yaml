# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Spark session.
flags:
    --configuration=: The configuration of Spark session.
    --executor-size=!: The executor size
    --executors=!: The number of executors.
    --reference-files=:
        description: Additional files used for reference in the main definition file.
        nargs: -1
    --spark-pool-name=!: The name of the Spark pool.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --workspace-name=!: The name of the workspace.
    -n, --name=!: The Spark session name.
completion:
    flag:
        executor-size:
            - Small
            - Medium
            - Large
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        configuration: The configuration of Spark session.
        executor-size: |-
            The executor size.

            Accepted values: Large, Medium, Small
        executors: The number of executors.
        name: The Spark session name.
        reference-files: Additional files used for reference in the main definition file.
        spark-pool-name: The name of the Spark pool.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        workspace-name: The name of the workspace.
examples:
    Create a Spark session.: |-
        az synapse spark session create --name testsession  --workspace-name testsynapseworkspace \
        --spark-pool-name testsparkpool --executor-size Small --executors 4
