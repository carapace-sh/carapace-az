# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Spark session.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --configuration=: The configuration of Spark session.
    --executor-size=!: The executor size
    --executors=!: The number of executors.
    --reference-files=:
        description: Additional files used for reference in the main definition file.
        nargs: -1
    --spark-pool-name=!: The name of the Spark pool.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --workspace-name=!: The name of the workspace.
    -n, --name=!: The Spark session name.
completion:
    flag:
        executor-size:
            - Small
            - Medium
            - Large
