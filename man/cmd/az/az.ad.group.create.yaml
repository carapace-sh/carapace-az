# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a group.
flags:
    --description=: Group description
    --display-name=!: object's display name or its prefix
    --force=:
        description: always create a new group instead of updating the one with same display and mail nickname
        nargs: -1
    --mail-nickname=!: Mail nickname
completion:
    flag:
        force:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: Group description.
        display-name: Object's display name or its prefix.
        force: |-
            Always create a new group instead of updating the one with same display and mail nickname.

            Accepted values: false, true
        mail-nickname: Mail nickname.
examples:
    Create a group in the directory. (autogenerated): az ad group create --display-name MyDisplay --mail-nickname MyDisplay
