# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore a deleted web app.
flags:
    --deleted-id=!: Resource ID of the deleted web app
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --restore-content-only=: restore only deleted files without web app settings
    --subscription=: Name or ID of subscription.
    --target-app-svc-plan=: The app service plan for the new azure web app.
    -g, --resource-group=: Name of resource group.
    -n, --name=: name of the web app to restore the deleted content to
    -s, --slot=: slot to restore the deleted content to
documentation:
    command: |-
        Command group 'webapp deleted' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        deleted-id: Resource ID of the deleted web app.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the web app to restore the deleted content to.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restore-content-only: Restore only deleted files without web app settings.
        slot: Slot to restore the deleted content to.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-app-svc-plan: The app service plan for the new azure web app.
examples:
    Restore a deleted app to the Staging slot of MySite.: az webapp deleted restore -g MyResourceGroup -n MySite -s Staging --deleted-id /subscriptions/00000000-0000-0000-0000-000000000000/providers/Microsoft.Web/locations/location/deletedSites/1234
    Restore a deleted app to the app MySite. Do not restore the deleted app's settings.: az webapp deleted restore -g MyResourceGroup -n MySite --deleted-id /subscriptions/00000000-0000-0000-0000-000000000000/providers/Microsoft.Web/locations/location/deletedSites/1234 --restore-content-only
    Restore a deleted web app. (autogenerated): az webapp deleted restore --deleted-id /subscriptions/00000000-0000-0000-0000-000000000000/providers/Microsoft.Web/deletedSites/1234 --name MySite --resource-group MyResourceGroup --subscription MySubscription
