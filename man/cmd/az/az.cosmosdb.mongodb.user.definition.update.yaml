# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an existing Azure Cosmos DB Mongo User Definition
flags:
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Cosmosdb account name.
    -b, --body=!: User Definition body with Id (Optional for create), UserName, Password, DatabaseName, CustomData, Mechanisms, Roles.
    -g, --resource-group=!: Name of resource group.
documentation:
    command: Update a MongoDb user definition under an Azure Cosmos DB account.
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        body: |
            User Definition body with Id (Optional for create), UserName, Password, DatabaseName, CustomData, Mechanisms, Roles.  You can enter it as a string or as a file, e.g., --body @mongo-user_definition-body-file.json or --body "{\"Id\": \"be79875a-2cc4-40d5-8958-566017875b39\",\"UserName\": \"MyUserName\",\"Password\": \"MyPass\",\"CustomData\": \"MyCustomData\",\"Mechanisms\": \"SCRAM-SHA-256\"\"DatabaseName\": \"MyDb\",\"Roles\": [ {\"Role\": \"myReadRole\",\"Db\": \"MyDb\"}]}"
        change-reference: The related change reference ID for this resource operation.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a MongoDb user definition under an Azure Cosmos DB account.: az cosmosdb mongodb user definition update --account-name MyAccount --resource-group MyResourceGroup --body @mongo-user-definition.json
