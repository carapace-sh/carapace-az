# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List container apps.
flags:
    --environment=: Name or resource ID of the container app's environment.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        environment: Name or resource ID of the container app's environment.
        environment-type: Type of environment.
        kind: Filter by kind. Use 'functionapp' to list only Azure Functions on Container Apps.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List Azure Functions on Container Apps only.: az containerapp list --kind functionapp
    List container apps by environment type.: az containerapp list --environment-type connected
    List container apps by resource group.: az containerapp list -g MyResourceGroup
    List container apps in the current subscription.: az containerapp list
