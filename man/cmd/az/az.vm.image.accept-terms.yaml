# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: accept-terms
description: Accept Azure Marketplace term so that the image can be used to create VMs
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        urn: URN, in format of 'publisher:offer:sku:version' or 'publisher:offer:sku:edge_zone:version'. If specified, other argument values can be omitted
flags:
    --plan=: image billing plan
    --subscription=: Name or ID of subscription.
    --urn=: URN, in format of 'publisher:offer:sku:version' or 'publisher:offer:sku:edge_zone:version'.
    -f, --offer=: image offer
    -p, --publisher=: image publisher
