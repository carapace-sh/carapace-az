# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: accept-terms
description: Accept Azure Marketplace term so that the image can be used to create VMs
flags:
    --plan=: image billing plan
    --subscription=: Name or ID of subscription.
    --urn=: URN, in format of 'publisher:offer:sku:version' or 'publisher:offer:sku:edge_zone:version'.
    -f, --offer=: image offer
    -p, --publisher=: image publisher
documentation:
    command: This command has been deprecated and will be removed in version '3.0.0'. Use 'az vm image terms accept' instead.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        offer: Image offer.
        plan: Image billing plan.
        publisher: Image publisher.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        urn: URN, in format of 'publisher:offer:sku:version' or 'publisher:offer:sku:edge_zone:version'. If specified, other argument values can be omitted.
examples:
    Accept Azure Marketplace term so that the image can be used to create VMs. (autogenerated): az vm image accept-terms --urn publisher:offer:sku:version
