# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new service on an Azure Service Fabric cluster.
documentation:
    flag:
        application: 'Specify the name of the service. The application name must be a prefix of the service name, for example: appName~serviceName'
        default-move-cost: Specify the default cost for a move. Higher costs make it less likely that the Cluster Resource Manager will move the replica when trying to balance the cluster.
        instance-count: Specify the instance count for the stateless service. If -1 is used, it means it will run on all the nodes.
        name: 'Specify the name of the service. The application name must be a prefix of the service name, for example: appName~serviceName'
        partition-scheme: Specify what partition scheme to use. Singleton partitions are typically used when the service does not require any additional routing. UniformInt64 means that each partition owns a range of int64 keys. Named is usually for services with data that can be bucketed, within a bounded set. Some common examples of data fields used as named partition keys would be regions, postal codes, customer groups, or other business boundaries.
        resource-group: Specify the resource group name. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --application=!: Specify the name of the service.
    --default-move-cost=: Specify the default cost for a move.
    --instance-count=: Specify the instance count for the stateless service.
    --min-replica-set-size=: Specify the min replica set size for the stateful service.
    --name=!: Specify the name of the service.
    --partition-scheme=: Specify what partition scheme to use.
    --service-type=!: Specify the service type name of the application, it should exist in the application manifest.
    --state=!: Specify if the service is stateless or stateful.
    --subscription=: Name or ID of subscription.
    --target-replica-set-size=: Specify the target replica set size for the stateful service.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
completion:
    flag:
        default-move-cost:
            - Zero
            - Low
            - Medium
            - High
        partition-scheme:
            - singleton
            - uniformInt64
            - named
        state:
            - stateless
            - stateful
