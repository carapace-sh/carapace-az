# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List policy exemptions.
flags:
    --scope=: Scope to which this policy exemption applies.
    -g, --resource-group=: the resource group where the policy will be applied
    -i, --disable-scope-strict-match=: Include policy exemptions either inherited from parent scope or at child scope.
documentation:
    command: Retrieve all applicable policy exemptions.
    flag:
        disable-scope-strict-match: |-
            Include policy exemptions either inherited from parent scopes or at child scopes.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        filter: Filter list results.
        management-group: The management group.
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in ```
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        resource-group: The resource group.
        scope: Scope at which to list applicable policy exemptions. If scope is not provided, the scope will be the implied or specified subscription.
examples:
    List policy exemptions that apply to a management group: az policy exemption list --management-group DevOrg --filter atScopeAndBelow()
    List policy exemptions that apply to a resource group: az policy exemption list --resource-group TestResourceGroup
    List policy exemptions that apply to a subscription: az policy exemption list
