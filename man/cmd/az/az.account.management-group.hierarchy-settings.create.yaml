# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create hierarchy settings defined at the Management Group level.
flags:
    -m, --default-management-group=: ""
    -n, --name=!: ""
    -r, --require-authorization-for-group-creation=: ""
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        default-management-group: Set the default Management Group under which new subscriptions get added in this tenant. Default setting is the Root Management Group.
        name: Name of the management group.
        require-authorization-for-group-creation: Indicate whether RBAC access is required upon group creation under the root Management Group. True means user will require Microsoft.Management/managementGroups/write action on the root Management Group. Default setting is false.
examples:
    Create hierarchy settings defined at the Management Group level.: az account management-group hierarchy-settings create --name GroupName
    ? Require user to have Microsoft.Management/managementGroups/write access on the Root to create new Management Groups under the Root.
    : az account management-group hierarchy-settings create --name GroupName -r True
    Set the default Management Group new Subscriptions get placed under.: az account management-group hierarchy-settings create --name GroupName -m /providers/Microsoft.Management/managementGroups/DefaultGroup
    Update both hierarchy settings.: az account management-group hierarchy-settings create --name GroupName -m /providers/Microsoft.Management/managementGroups/DefaultGroup -r True
