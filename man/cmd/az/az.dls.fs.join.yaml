# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: join
description: Join files in a Data Lake Store account into one file.
flags:
    --destination-path=!: The destination path in the Data Lake Store account.
    --force=: Indicates that, if the destination file already exists, it should be overwritten
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --source-paths=!:
        description: The list of files in the specified Data Lake Store account to join.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -n, --account=: Name of the Data Lake Store account.
documentation:
    command: |-
        Command group 'dls' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account: Name of the Data Lake Store account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        destination-path: The destination path in the Data Lake Store account.
        force: |-
            Indicates that, if the destination file already exists, it should be overwritten.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        source-paths: The space-separated list of files in the Data Lake Store account to join.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
