# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: submit
description: Submit a Spark job.
flags:
    --archives=:
        description: The array of archives.
        nargs: -1
    --arguments=:
        description: 'Optional arguments to the job (Note: please use storage URIs for file arguments).'
        nargs: -1
    --configuration=: The configuration of Spark job.
    --executor-size=!: The executor size
    --executors=!: The number of executors.
    --language=: The Spark job language.
    --main-class-name=: The fully-qualified identifier or the main class that is in the main definition file.
    --main-definition-file=!: The main file used for the job.
    --python-files=:
        description: The array of files used for refenence in the main python definition file.
        nargs: -1
    --reference-files=:
        description: Additional files used for reference in the main definition file.
        nargs: -1
    --spark-pool-name=!: The name of the Spark pool.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --workspace-name=!: The name of the workspace.
    -n, --name=!: The Spark job name.
completion:
    flag:
        executor-size:
            - Small
            - Medium
            - Large
        language:
            - Spark
            - Scala
            - PySpark
            - Python
            - SparkDotNet
            - CSharp
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        archives: The array of archives.
        arguments: 'Optional arguments to the job (Note: please use storage URIs for file arguments).'
        change-reference: The related change reference ID for this resource operation.
        configuration: The configuration of Spark job.
        executor-size: |-
            The executor size.

            Accepted values: Large, Medium, Small
        executors: The number of executors.
        language: |-
            The Spark job language.

            Default value: Scala

            Accepted values: CSharp, PySpark, Python, Scala, Spark, SparkDotNet
        main-class-name: The fully-qualified identifier or the main class that is in the main definition file.
        main-definition-file: The main file used for the job.
        name: The Spark job name.
        python-files: The array of files used for refenence in the main python definition file.  Examples include custom whl files and custom python files.  May pass multiple files such as ``` az synapse spark job sumbit <other_args> --python_files abfss://file1 abss://file2 ``` .
        reference-files: Additional files used for reference in the main definition file.
        spark-pool-name: The name of the Spark pool.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        workspace-name: The name of the workspace.
examples:
    Submit a Java Spark job.: |-
        az synapse spark job submit --name WordCount_Java --workspace-name testsynapseworkspace \
        --spark-pool-name testsparkpool \
        --main-definition-file abfss://testfilesystem@testadlsgen2.dfs.core.windows.net/samples/java/wordcount/wordcount.jar \
        --main-class-name WordCount \
        --arguments abfss://testfilesystem@testadlsgen2.dfs.core.windows.net/samples/java/wordcount/shakespeare.txt \
        abfss://testfilesystem@testadlsgen2.dfs.core.windows.net/samples/java/wordcount/result/ \
        --executors 2 --executor-size Small
