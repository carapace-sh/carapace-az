# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List resource groups, optionally filtered by a tag.
flags:
    --subscription=: Name or ID of subscription.
    --tag=:
        description: a single tag in 'key[=value]' format.
        nargs: -1
documentation:
    command: List resource groups.
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tag: a single tag in 'key[=value]' format. Use '' to clear existing tags.
examples:
    List all resource groups located in the West US region.: az group list --query "[?location=='westus']"
