# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable-ingress-gateway
description: Enable an Azure Service Mesh ingress gateway.
flags:
    --ingress-gateway-type=!: Specify the type of ingress gateway.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the managed cluster.
completion:
    flag:
        ingress-gateway-type:
            - External
            - Internal
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ingress-gateway-type: |-
            Specify the type of ingress gateway. Allowed values are "External" which is backed by a load balancer with an external IP address; "Internal" which is backed by a load balancer with an internal IP address.

            Accepted values: External, Internal
        name: Name of the managed cluster.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Enable an internal ingress gateway.: az aks mesh enable-ingress-gateway --resource-group MyResourceGroup --name MyManagedCluster --ingress-gateway-type Internal
