# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: CDN endpoint is the entity within a CDN profile containing configuration information such as origin, protocol, content caching and delivery behavior.
flags:
    --action-name=!: 'The name of the action for the delivery rule: https://learn.microsoft.com/en-us/azure/cdn/cdn-standard-rules-engine-actions'
    --cache-behavior=: Caching behavior for the requests.
    --cache-duration=: The duration for which the content needs to be cached.
    --custom-fragment=: Fragment to add to the redirect URL.
    --custom-hostname=: Host to redirect.
    --custom-path=: The full path to redirect.
    --custom-querystring=: The set of query strings to be placed in the redirect URL.
    --destination=: The destination path to be used in the rewrite.
    --header-action=: Header action for the requests.
    --header-name=: Name of the header to modify.
    --header-value=: Value of the header.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --match-values=:
        description: Match values of the match condition.
        nargs: -1
    --match-variable=: 'Name of the match condition: https://learn.microsoft.com/en-us/azure/cdn/cdn-standard-rules-engine-match-conditions'
    --negate-condition=:
        description: If true, negates the condition
        nargs: -1
    --operator=: Operator of the match condition.
    --order=!: The order in which the rules are applied for the endpoint.
    --origin-group=: Name or ID of the OriginGroup that would override the default OriginGroup
    --preserve-unmatched-path=:
        description: If True, the remaining path after the source                pattern will be appended to the new destination path.
        nargs: -1
    --profile-name=: Name of the CDN profile which is unique within the resource group.
    --query-parameters=: Query parameters to include or exclude (comma separated).
    --query-string-behavior=: Query string behavior for the requests.
    --redirect-protocol=: Protocol to use for the redirect.
    --redirect-type=: The redirect type the rule will use when redirecting traffic.
    --rule-name=: Name of the rule.
    --selector=: Selector of the match condition.
    --source-pattern=: A request URI pattern that identifies the type of requests that may be rewritten.
    --subscription=: Name or ID of subscription.
    --transform=:
        description: Transform to apply before matching.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the CDN endpoint.
completion:
    flag:
        action-name:
            - CacheExpiration
            - CacheKeyQueryString
            - ModifyRequestHeader
            - ModifyResponseHeader
            - OriginGroupOverride
            - UrlRedirect
            - UrlRewrite
        cache-behavior:
            - BypassCache
            - Override
            - SetIfMissing
        header-action:
            - Append
            - Overwrite
            - Delete
        match-variable:
            - ClientPort
            - Cookies
            - HostName
            - HttpVersion
            - IsDevice
            - PostArgs
            - QueryString
            - RemoteAddress
            - RequestBody
            - RequestHeader
            - RequestMethod
            - RequestScheme
            - RequestUri
            - ServerPort
            - SocketAddr
            - SslProtocol
            - UrlFileExtension
            - UrlFileName
            - UrlPath
        negate-condition:
            - "true"
            - "false"
        preserve-unmatched-path:
            - "true"
            - "false"
        query-string-behavior:
            - Include
            - IncludeAll
            - Exclude
            - ExcludeAll
        redirect-protocol:
            - MatchRequest
            - Http
            - Https
        redirect-type:
            - Moved
            - Found
            - TemporaryRedirect
            - PermanentRedirect
        transform:
            - Lowercase
            - Uppercase
documentation:
    command: |-
        Command group 'cdn endpoint rule' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        action-name: |-
            The name of the action for the delivery rule: https://learn.microsoft.com/en-us/azure/cdn/cdn-standard-rules-engine-actions .

            Accepted values: CacheExpiration, CacheKeyQueryString, ModifyRequestHeader, ModifyResponseHeader, OriginGroupOverride, UrlRedirect, UrlRewrite
        cache-behavior: |-
            Caching behavior for the requests.

            Accepted values: BypassCache, Override, SetIfMissing
        cache-duration: The duration for which the content needs to be cached.                Allowed format is hh:mm:ss.xxxxxx.
        change-reference: The related change reference ID for this resource operation.
        custom-fragment: Fragment to add to the redirect URL.
        custom-hostname: Host to redirect.                Leave empty to use the incoming host as the destination host.
        custom-path: The full path to redirect. Path cannot be empty and must start with /.                Leave empty to use the incoming path as destination path.
        custom-querystring: The set of query strings to be placed in the redirect URL.                leave empty to preserve the incoming query string.
        destination: The destination path to be used in the rewrite.
        header-action: |-
            Header action for the requests.

            Accepted values: Append, Delete, Overwrite
        header-name: Name of the header to modify.
        header-value: Value of the header.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        match-values: Match values of the match condition. e.g, space separated values "GET" "HTTP".
        match-variable: |-
            Name of the match condition: https://learn.microsoft.com/en-us/azure/cdn/cdn-standard-rules-engine-match-conditions .

            Accepted values: ClientPort, Cookies, HostName, HttpVersion, IsDevice, PostArgs, QueryString, RemoteAddress, RequestBody, RequestHeader, RequestMethod, RequestScheme, RequestUri, ServerPort, SocketAddr, SslProtocol, UrlFileExtension, UrlFileName, UrlPath
        name: Name of the CDN endpoint.
        negate-condition: |-
            If true, negates the condition.

            Accepted values: false, true
        operator: Operator of the match condition.
        order: The order in which the rules are applied for the endpoint. Possible values {0,1,2,3,………}. A rule with a lower order will be applied before one with a higher order. Rule with order 0 is a special rule. It does not require any condition and actions listed in it will always be applied.
        origin-group: Name or ID of the OriginGroup that would override the default OriginGroup.
        preserve-unmatched-path: |-
            If True, the remaining path after the source                pattern will be appended to the new destination path.

            Accepted values: false, true
        profile-name: Name of the CDN profile which is unique within the resource group.
        query-parameters: Query parameters to include or exclude (comma separated).
        query-string-behavior: |-
            Query string behavior for the requests.

            Accepted values: Exclude, ExcludeAll, Include, IncludeAll
        redirect-protocol: |-
            Protocol to use for the redirect.

            Accepted values: Http, Https, MatchRequest
        redirect-type: |-
            The redirect type the rule will use when redirecting traffic.

            Accepted values: Found, Moved, PermanentRedirect, TemporaryRedirect
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule-name: Name of the rule, only required for Microsoft SKU.
        selector: Selector of the match condition.
        source-pattern: A request URI pattern that identifies the type of requests that may be rewritten.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        transform: |-
            Transform to apply before matching.

            Accepted values: Lowercase, Uppercase
examples:
    Create a global rule to disable caching.: az cdn endpoint rule add -g group -n endpoint --profile-name profile --order 0 --rule-name global --action-name CacheExpiration --cache-behavior BypassCache
    Create a rule for http to https redirect.: az cdn endpoint rule add -g group -n endpoint --profile-name profile --order 1 --rule-name "redirect" --match-variable RequestScheme --operator Equal --match-values HTTP --action-name "UrlRedirect" --redirect-protocol Https --redirect-type Moved
    Create a rule to distribute requests with "/test1" in its URL path to origin group with name "origingroup1".: az cdn endpoint rule add -g group -n endpoint --profile-name profile --order 1 --rule-name "origin-group-override" --match-variable UrlPath --operator Contains --match-values /test1 --action-name "OriginGroupOverride" --origin-group origingroup1
