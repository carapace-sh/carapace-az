# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create NetworkRuleSet for a Namespace.
documentation:
    flag:
        ip-rules: List of IpRules  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        public-network-access: This determines if traffic is allowed over public network. By default it is enabled.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        virtual-network-rules: List VirtualNetwork Rules  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --default-action=: Default Action for Network Rule Set
    --ip-rules=:
        description: List of IpRules  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --namespace-name=!: The namespace name
    --public-network-access=: This determines if traffic is allowed over public network.
    --subscription=: Name or ID of subscription.
    --virtual-network-rules=:
        description: List VirtualNetwork Rules  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -t, --enable-trusted-service-access=:
        description: Value that indicates whether Trusted Service Access is Enabled or not.
        nargs: -1
completion:
    flag:
        default-action:
            - Allow
            - Deny
        enable-trusted-service-access:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        public-network-access:
            - Disabled
            - Enabled
