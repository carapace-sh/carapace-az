# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Kusto pool.
flags:
    --enable-purge=:
        description: A boolean value that indicates if the purge operations are enabled.
        nargs: -1
    --enable-streaming-ingest=:
        description: A boolean value that indicates if the streaming ingest is enabled.
        nargs: -1
    --if-match=: The ETag of the Kusto Pool.
    --if-none-match=: Set to '*' to allow a new Kusto Pool to be created, but to prevent updating an existing Kusto Pool.
    --no-wait=: Do not wait for the long-running operation to finish.
    --optimized-autoscale=:
        description: Optimized auto scale definition.
        nargs: -1
    --sku=!:
        description: The SKU of the kusto pool.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --workspace-name=!: The name of the workspace
    --workspace-uid=: The workspace unique identifier.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of the Kusto pool.
completion:
    flag:
        enable-purge:
            - "true"
            - "false"
        enable-streaming-ingest:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        enable-purge: |
            A boolean value that indicates if the purge operations are enabled.

            Accepted values: false, true
        if-match: The ETag of the Kusto Pool. Omit this value to always overwrite the current Kusto Pool. Specify the last-seen ETag value to prevent accidentally overwriting concurrent changes.
        if-none-match: Set to '*' to allow a new Kusto Pool to be created, but to prevent updating an existing Kusto Pool. Other values will result in a 412 Pre-condition Failed response.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        optimized-autoscale: 'Optimized auto scale definition. Usage: --optimized-autoscale version=XX is-enabled=XX minimum=XX maximum=XX version: Required. The version of the template defined, for instance 1. is-enabled: Required. A boolean value that indicate if the optimized autoscale feature is enabled or not. minimum: Required. Minimum allowed instances count. maximum: Required. Maximum allowed instances count.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: 'The SKU of the kusto pool. Usage: --sku name=XX capacity=XX size=XX name: Required. SKU name. capacity: The number of instances of the cluster. size: Required. SKU size.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        workspace-name: The name of the workspace.
        workspace-uid: The workspace unique identifier.
examples:
    kustoPoolsCreateOrUpdate: az synapse kusto pool create --name "kustoclusterrptest4" --location "westus" --enable-purge true --enable-streaming-ingest true --workspace-uid "11111111-2222-3333-444444444444" --sku name="Storage optimized" capacity=2 size="Medium" --resource-group "kustorptest" --workspace-name "synapseWorkspaceName"
