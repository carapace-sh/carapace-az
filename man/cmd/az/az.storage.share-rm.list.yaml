# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all shares.
flags:
    --account-name=!: The name of the storage account within the specified resource group.
    --filter=: Optional.
    --include-deleted=:
        description: Include soft deleted file shares when specified.
        nargs: -1
    --include-snapshot=:
        description: Include file share snapshots when specified.
        nargs: -1
    --max-items=: Total number of items to return in the command's output.
    --maxpagesize=: Optional.
    --next-token=: Token to specify where to start paginating.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        include-deleted:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        include-snapshot:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        account-name: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only.
        filter: Optional. When specified, only share names starting with the filter will be listed.
        include-deleted: |-
            Include soft deleted file shares when specified.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        include-snapshot: |-
            Include file share snapshots when specified.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
        maxpagesize: Optional. Specified maximum number of shares that can be included in the list.
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all file shares include deleted under the storage account 'mystorageaccount' .: az storage share-rm list --storage-account mystorageaccount --include-deleted
    List all file shares include its all snapshots and deleted file shares under the storage account 'mystorageaccount': az storage share-rm list --storage-account mystorageaccount --include-deleted --include-snapshot
    List all file shares include its all snapshots under the storage account 'mystorageaccount': az storage share-rm list --storage-account mystorageaccount --include-snapshot
    List the Azure file shares under the storage account 'mystorageaccount' (account id).: az storage share-rm list --storage-account mystorageaccount
    List the Azure file shares under the storage account 'mystorageaccount' (account name) in resource group 'MyResourceGroup'.: az storage share-rm list -g MyResourceGroup --storage-account mystorageaccount
