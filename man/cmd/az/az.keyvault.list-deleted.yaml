# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-deleted
description: Get information about the deleted Vaults or HSMs in a subscription.
documentation:
    flag:
        resource-type: When --resource-type is not present the command will list all deleted Vaults and HSMs. Possible values for --resource-type are vault and hsm.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --resource-type=: When --resource-type is not present the command will list all deleted Vaults and HSMs.
    --subscription=: Name or ID of subscription.
