# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a Pool to the specified Account.
flags:
    --accelerated-networking=:
        description: Whether this pool should enable accelerated networking.
        nargs: -1
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --application-package-references=:
        description: The list of Packages to be installed on each Compute Node in the Pool.
        nargs: -1
    --auto-scale-formula=: A formula for the desired number of Compute Nodes in the Pool.
    --defer-os-rolling-upgrade=:
        description: Defer OS upgrades on the TVMs if they are running tasks.
        nargs: -1
    --disable-auto-rollback=:
        description: Whether OS image rollback feature should be disabled.
        nargs: -1
    --disk-encryption-targets=: A space separated list of DiskEncryptionTargets.
    --enable-auto-os-upgrade=:
        description: Indicates whether OS upgrades should automatically be applied to scale set instances in a rolling fashion when a newer version of the OS image becomes available.
        nargs: -1
    --enable-cross-zone-upgrade=:
        description: Allow VMSS to ignore AZ boundaries when constructing upgrade batches.
        nargs: -1
    --enable-inter-node-communication=: Whether the Pool permits direct communication between Compute Nodes.
    --enable-secure-boot=:
        description: Enable secure boot
        nargs: -1
    --enable-vtpm=:
        description: Enable vTPM
        nargs: -1
    --enable-write-accel=:
        description: Specify whether writeAccelerator should be enabled or disabled on the disk.
        nargs: -1
    --encryption-at-host=:
        description: This property can be used by user in the request to enable or disable the Host Encryption for the virtual machine or virtual machine scale set.
        nargs: -1
    --id=: A string that uniquely identifies the Pool within the Account.
    --image=: OS image reference.
    --json-file=: The file containing pool create properties parameter specification in JSON(formatted to match REST API request body).
    --max-batch-instance-percent=: The maximum percent of total virtual machine instances that will be upgraded simultaneously by the rolling upgrade in one batch.
    --max-unhealthy-instance-percent=: The maximum percentage of the total virtual machine instances in the scale set that can be simultaneously unhealthy, either as a result of being upgraded, or by being found in an unhealthy state by the virtual machine health checks before the rolling upgrade aborts.
    --max-unhealthy-upgraded-instance-percent=: The maximum percentage of upgraded virtual machine instances that can be found to be in an unhealthy state.
    --metadata=:
        description: A list of name-value pairs associated with the Pool as metadata.
        nargs: -1
    --node-agent-sku-id=: The SKU of the Batch Compute Node agent to be provisioned on Compute Nodes in the Pool.
    --os-disk-caching=: Specify the caching requirements.
    --os-disk-size=: The initial disk size in GB when creating new OS disk.
    --pause-time-between-batches=: The wait time between completing the update for all virtual machines in one batch and starting the next batch.
    --placement=: Specifies the ephemeral disk placement for operating system disk for all VMs in the pool.
    --policy=: Node placement Policy type on Batch Pools.
    --prioritize-unhealthy-instances=:
        description: Upgrade all unhealthy instances in a scale set before any healthy instances.
        nargs: -1
    --resize-timeout=: The timeout for allocation of Compute Nodes to the Pool.
    --resource-tags=: User is able to specify resource tags for the pool.
    --rollback-failed-instances-on-policy-breach=:
        description: Rollback failed instances to previous model if the Rolling Upgrade policy is violated.
        nargs: -1
    --security-type=: Specify the SecurityType of the virtual machine.
    --start-task-command-line=: The command line of the StartTask.
    --start-task-environment-settings=:
        description: A list of environment variable settings for the StartTask.
        nargs: -1
    --start-task-max-task-retry-count=: The maximum number of times the Task may be retried.
    --start-task-resource-files=:
        description: A list of files that the Batch service will download to the Compute Node before running the command line.
        nargs: -1
    --start-task-wait-for-success=: Whether the Batch service should wait for the StartTask to complete successfully (that is, to exit with exit code 0) before scheduling any Tasks on the Compute Node.
    --storage-account-type=: The storage account type for managed disk
    --subscription=: Name or ID of subscription.
    --target-communication=: The desired node communication mode for the pool.
    --target-dedicated-nodes=: The desired number of dedicated Compute Nodes in the Pool.
    --target-low-priority-nodes=: The desired number of Spot/Low-priority Compute Nodes in the Pool.
    --targets=:
        description: The list of disk targets Batch Service will encrypt on the compute node.
        nargs: -1
    --task-slots-per-node=: The number of task slots that can be used to run concurrent tasks on a single compute node in the pool.
    --upgrade-policy-mode=: The mode of the pool OS upgrade.
    --use-rolling-upgrade-policy=:
        description: Indicates whether rolling upgrade policy should be used during Auto OS Upgrade.
        nargs: -1
    --vm-size=: The size of virtual machines in the Pool.
completion:
    flag:
        accelerated-networking:
            - "true"
            - "false"
        defer-os-rolling-upgrade:
            - "true"
            - "false"
        disable-auto-rollback:
            - "true"
            - "false"
        enable-auto-os-upgrade:
            - "true"
            - "false"
        enable-cross-zone-upgrade:
            - "true"
            - "false"
        enable-secure-boot:
            - "true"
            - "false"
        enable-vtpm:
            - "true"
            - "false"
        enable-write-accel:
            - "true"
            - "false"
        encryption-at-host:
            - "true"
            - "false"
        os-disk-caching:
            - none
            - readonly
            - readwrite
        prioritize-unhealthy-instances:
            - "true"
            - "false"
        rollback-failed-instances-on-policy-breach:
            - "true"
            - "false"
        storage-account-type:
            - standard_lrs
            - premium_lrs
            - standardssd_lrs
        target-communication:
            - default
            - classic
            - simplified
        use-rolling-upgrade-policy:
            - "true"
            - "false"
documentation:
    command: Create a Batch pool in an account. When creating a pool, choose arguments from either Cloud Services Configuration or Virtual Machine Configuration.
    flag:
        accelerated-networking: |-
            Whether this pool should enable accelerated networking. Accelerated networking enables single root I/O virtualization (SR-IOV) to a VM, which may lead to improved networking performance. For more details, see: https://learn.microsoft.com/azure/virtual-network/accelerated-networking-overview . Set true to enable.

            Accepted values: false, true
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        application-package-references: 'The list of Packages to be installed on each Compute Node in the Pool. When creating a pool, the package''s application ID must be fully qualified (/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Batch/batchAccounts/{accountName}/applications/{applicationName}).  # pylint: disable=line-too-long Changes to Package references affect all new Nodes joining the Pool, but do not affect Compute Nodes that are already in the Pool until they are rebooted or reimaged. There is a maximum of 10 Package references on any given Pool. Space-separated application IDs with optional version in ''id[#version]'' format.'
        auto-scale-formula: A formula for the desired number of Compute Nodes in the Pool. This property must not be specified if enableAutoScale is set to false. It is required if enableAutoScale is set to true. The formula is checked for validity before the Pool is created. If the formula is not valid, the Batch service rejects the request with detailed error information. For more information about specifying this formula, see 'Automatically scale Compute Nodes in an Azure Batch Pool' ( https://azure.microsoft.com/documentation/articles/batch-automatic-scaling/ ).
        change-reference: The related change reference ID for this resource operation.
        defer-os-rolling-upgrade: |-
            Defer OS upgrades on the TVMs if they are running tasks. True if flag present.

            Accepted values: false, true
        disable-auto-rollback: |-
            Whether OS image rollback feature should be disabled. True if flag present.

            Accepted values: false, true
        disk-encryption-targets: A space separated list of DiskEncryptionTargets. current possible values include OsDisk and TemporaryDisk.
        enable-auto-os-upgrade: |-
            Indicates whether OS upgrades should automatically be applied to scale set instances in a rolling fashion when a newer version of the OS image becomes available. :code: ``` <br /> ``` :code: ``` <br /> ``` If this is set to true for Windows based pools, ``` WindowsConfiguration.enableAutomaticUpdates <https://learn.microsoft.com/en-us/rest/api/batchservice/pool/add?tabs=HTTP#windowsconfiguration> ``` _ cannot be set to true. True if flag present.

            Accepted values: false, true
        enable-cross-zone-upgrade: |-
            Allow VMSS to ignore AZ boundaries when constructing upgrade batches. Take into consideration the Update Domain and maxBatchInstancePercent to determine the batch size. This field is able to be set to true or false only when using NodePlacementConfiguration as Zonal. True if flag present.

            Accepted values: false, true
        enable-inter-node-communication: Whether the Pool permits direct communication between Compute Nodes. Enabling inter-node communication limits the maximum size of the Pool due to deployment restrictions on the Compute Nodes of the Pool. This may result in the Pool not reaching its desired size. The default value is false. True if flag present.
        enable-secure-boot: |-
            Enable secure boot.

            Accepted values: false, true
        enable-vtpm: |-
            Enable vTPM.

            Accepted values: false, true
        enable-write-accel: |-
            Specify whether writeAccelerator should be enabled or disabled on the disk.

            Accepted values: false, true
        encryption-at-host: |-
            This property can be used by user in the request to enable or disable the Host Encryption for the virtual machine or virtual machine scale set. This will enable the encryption for all the disks including Resource/Temp disk at host itself. The default behavior is: The Encryption at host will be disabled unless this property is set to true for the resource.

            Accepted values: false, true
        id: A string that uniquely identifies the Pool within the Account. The ID can contain any combination of alphanumeric characters including hyphens and underscores, and cannot contain more than 64 characters. The ID is case-preserving and case-insensitive (that is, you may not have two Pool IDs within an Account that differ only by case). Required.
        image: 'OS image reference. This can be either ''publisher:offer:sku[:version]'' format, or a fully qualified ARM image id of the form ''/subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Compute/images/{imageName}''. If ''publisher:offer:sku[:version]'' format, version is optional and if omitted latest will be used. Valid values can be retrieved via ''az batch pool supported-images list''. For example: ''MicrosoftWindowsServer:WindowsServer:2012-R2-Datacenter:latest''.'
        json-file: The file containing pool create properties parameter specification in JSON(formatted to match REST API request body). If this parameter is specified, all 'Pool Create Properties Parameter Arguments' are ignored.  See https://learn.microsoft.com/rest/api/batchservice/pools/create-pool?tabs=HTTP#request-body .
        max-batch-instance-percent: The maximum percent of total virtual machine instances that will be upgraded simultaneously by the rolling upgrade in one batch. As this is a maximum, unhealthy instances in previous or future batches can cause the percentage of instances in a batch to decrease to ensure higher reliability. The value of this field should be between 5 and 100, inclusive. If both maxBatchInstancePercent and maxUnhealthyInstancePercent are assigned with value, the value of maxBatchInstancePercent should not be more than maxUnhealthyInstancePercent.
        max-unhealthy-instance-percent: The maximum percentage of the total virtual machine instances in the scale set that can be simultaneously unhealthy, either as a result of being upgraded, or by being found in an unhealthy state by the virtual machine health checks before the rolling upgrade aborts. This constraint will be checked prior to starting any batch. The value of this field should be between 5 and 100, inclusive. If both maxBatchInstancePercent and maxUnhealthyInstancePercent are assigned with value, the value of maxBatchInstancePercent should not be more than maxUnhealthyInstancePercent.
        max-unhealthy-upgraded-instance-percent: The maximum percentage of upgraded virtual machine instances that can be found to be in an unhealthy state. This check will happen after each batch is upgraded. If this percentage is ever exceeded, the rolling update aborts. The value of this field should be between 0 and 100, inclusive.
        metadata: A list of name-value pairs associated with the Pool as metadata. The Batch service does not assign any meaning to metadata; it is solely for the use of user code. Space-separated values in 'key=value' format.
        node-agent-sku-id: The SKU of the Batch Compute Node agent to be provisioned on Compute Nodes in the Pool. The Batch Compute Node agent is a program that runs on each Compute Node in the Pool, and provides the command-and-control interface between the Compute Node and the Batch service. There are different implementations of the Compute Node agent, known as SKUs, for different operating systems. You must specify a Compute Node agent SKU which matches the selected Image reference. To get the list of supported Compute Node agent SKUs along with their list of verified Image references, see the 'List supported Compute Node agent SKUs' operation. Required.
        os-disk-caching: |-
            Specify the caching requirements. Possible values are: None, ReadOnly, ReadWrite. The default values are: None for Standard storage. ReadOnly for Premium storage.

            Accepted values: none, readonly, readwrite
        os-disk-size: The initial disk size in GB when creating new OS disk.
        pause-time-between-batches: The wait time between completing the update for all virtual machines in one batch and starting the next batch. The time duration should be specified in ISO 8601 format.. Expected format is an ISO-8601 duration.
        placement: Specifies the ephemeral disk placement for operating system disk for all VMs in the pool. This property can be used by user in the request to choose the location e.g., cache disk space for Ephemeral OS disk provisioning. For more information on Ephemeral OS disk size requirements, please refer to Ephemeral OS disk size requirements for Windows VMs at https://docs.microsoft.com/en-us/azure/virtual-machines/windows/ephemeral-os-disks#size-requirements and Linux VMs at https://docs.microsoft.com/en-us/azure/virtual-machines/linux/ephemeral-os-disks#size-requirements . "cachedisk".
        policy: 'Node placement Policy type on Batch Pools. Allocation policy used by Batch Service to provision the nodes. If not specified, Batch will use the regional policy. Known values are: "regional" and "zonal".'
        prioritize-unhealthy-instances: |-
            Upgrade all unhealthy instances in a scale set before any healthy instances. True if flag present.

            Accepted values: false, true
        resize-timeout: The timeout for allocation of Compute Nodes to the Pool. This timeout applies only to manual scaling; it has no effect when enableAutoScale is set to true. The default value is 15 minutes. The minimum value is 5 minutes. If you specify a value less than 5 minutes, the Batch service returns an error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). Expected format is an ISO-8601 duration.
        resource-tags: The user-specified tags associated with the pool. The user-defined tags to be associated with the Azure Batch Pool. When specified, these tags are propagated to the backing Azure resources associated with the pool. This property can only be specified when the Batch account was created with the poolAllocationMode property set to 'UserSubscription'. Space-separated values in 'key=value' format.
        rollback-failed-instances-on-policy-breach: |-
            Rollback failed instances to previous model if the Rolling Upgrade policy is violated. True if flag present.

            Accepted values: false, true
        security-type: 'Specify the SecurityType of the virtual machine. It has to be set to any specified value to enable UefiSettings. The default behavior is: UefiSettings will not be enabled unless this property is set.'
        start-task-command-line: The command line of the StartTask. The command line does not run under a shell, and therefore cannot take advantage of shell features such as environment variable expansion. If you want to take advantage of such features, you should invoke the shell in the command line, for example using "cmd /c MyCommand" in Windows or "/bin/sh -c MyCommand" in Linux. If the command line refers to file paths, it should use a relative path (relative to the Task working directory), or use the Batch provided environment variable ( https://docs.microsoft.com/en-us/azure/batch/batch-compute-node-environment-variables ). Required.
        start-task-environment-settings: A list of environment variable settings for the StartTask. Space-separated values in 'key=value' format.
        start-task-max-task-retry-count: The maximum number of times the Task may be retried. The Batch service retries a Task if its exit code is nonzero. Note that this value specifically controls the number of retries. The Batch service will try the Task once, and may then retry up to this limit. For example, if the maximum retry count is 3, Batch tries the Task up to 4 times (one initial try and 3 retries). If the maximum retry count is 0, the Batch service does not retry the Task. If the maximum retry count is -1, the Batch service retries the Task without limit, however this is not recommended for a start task or any task. The default value is 0 (no retries).
        start-task-resource-files: A list of files that the Batch service will download to the Compute Node before running the command line.  There is a maximum size for the list of resource files. When the max size is exceeded, the request will fail and the response error code will be RequestEntityTooLarge. If this occurs, the collection of ResourceFiles must be reduced in size. This can be achieved using .zip files, Application Packages, or Docker Containers. Files listed under this element are located in the Task's working directory. Space-separated resource references in filename=httpurl format.
        start-task-wait-for-success: Whether the Batch service should wait for the StartTask to complete successfully (that is, to exit with exit code 0) before scheduling any Tasks on the Compute Node. If true and the StartTask fails on a Node, the Batch service retries the StartTask up to its maximum retry count (maxTaskRetryCount). If the Task has still not completed successfully after all retries, then the Batch service marks the Node unusable, and will not schedule Tasks to it. This condition can be detected via the Compute Node state and failure info details. If false, the Batch service will not wait for the StartTask to complete. In this case, other Tasks can start executing on the Compute Node while the StartTask is still running; and even if the StartTask fails, new Tasks will continue to be scheduled on the Compute Node. The default is true. True if flag present.
        storage-account-type: |-
            The storage account type for managed disk.

            Accepted values: premium_lrs, standard_lrs, standardssd_lrs
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-communication: The desired node communication mode for the pool. If this element is present, it replaces the existing targetNodeCommunicationMode configured on the Pool. If omitted, any existing metadata is left unchanged.
        target-dedicated-nodes: The desired number of dedicated Compute Nodes in the Pool. This property must not be specified if enableAutoScale is set to true. If enableAutoScale is set to false, then you must set either targetDedicatedNodes, targetLowPriorityNodes, or both.
        target-low-priority-nodes: The desired number of Spot/Low-priority Compute Nodes in the Pool. This property must not be specified if enableAutoScale is set to true. If enableAutoScale is set to false, then you must set either targetDedicatedNodes, targetLowPriorityNodes, or both.
        targets: The list of disk targets Batch Service will encrypt on the compute node. If omitted, no disks on the compute nodes in the pool will be encrypted. On Linux pool, only "TemporaryDisk" is supported; on Windows pool, "OsDisk" and "TemporaryDisk" must be specified. Space seperated target disks to be encrypted. Values can either be OsDisk or TemporaryDisk.
        task-slots-per-node: The number of task slots that can be used to run concurrent tasks on a single compute node in the pool. The default value is 1. The maximum value is the smaller of 4 times the number of cores of the vmSize of the pool or 256.
        upgrade-policy-mode: The mode of the pool OS upgrade.
        use-rolling-upgrade-policy: |-
            Indicates whether rolling upgrade policy should be used during Auto OS Upgrade. Auto OS Upgrade will fallback to the default policy if no policy is defined on the VMSS. True if flag present.

            Accepted values: false, true
        vm-size: The size of virtual machines in the Pool. All virtual machines in a Pool are the same size. For information about available VM sizes for Pools using Images from the Virtual Machines Marketplace (pools created with virtualMachineConfiguration), see Sizes for Virtual Machines (Linux) ( https://azure.microsoft.com/documentation/articles/virtual-machines-linux-sizes/ ) or Sizes for Virtual Machines (Windows) ( https://azure.microsoft.com/documentation/articles/virtual-machines-windows-sizes/ ). Batch supports all Azure VM sizes except STANDARD_A0 and those with premium storage (STANDARD_GS, STANDARD_DS, and STANDARD_DSV2 series). Required.
examples:
    ? Create a Batch pool in an account. When creating a pool, choose arguments from either Cloud Services Configuration or Virtual Machine Configuration.
    : az batch pool create --json-file batch-pool-create.json --account-name clibatch --account-key BatchAccountKey
