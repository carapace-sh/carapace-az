# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an inbound NAT address pool.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        backend-port: The port used for internal connections on the endpoint. Acceptable values are between 1 and 65535.
        enable-tcp-reset: Receive bidirectional TCP Reset on TCP flow idle timeout or unexpected connection termination. This element is only used when the protocol is set to TCP.
        floating-ip: Configures a virtual machine's endpoint for the floating IP capability required to configure a SQL AlwaysOn Availability Group. This setting is required when using the SQL AlwaysOn Availability Groups in SQL server. This setting can't be changed after you create the endpoint.
        frontend-port-range-end: The last port number in the range of external ports that will be used to provide Inbound Nat to NICs associated with a load balancer. Acceptable values range between 1 and 65535.
        frontend-port-range-start: The first port number in the range of external ports that will be used to provide Inbound Nat to NICs associated with a load balancer. Acceptable values range between 1 and 65534.
        idle-timeout: The timeout for the TCP idle connection. The value can be set between 4 and 30 minutes. The default value is 4 minutes. This element is only used when the protocol is set to TCP.
        name: The name of the resource that is unique within the set of inbound NAT pools used by the load balancer. This name can be used to access the resource.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --backend-port=: The port used for internal connections on the endpoint.
    --enable-tcp-reset=:
        description: Receive bidirectional TCP Reset on TCP flow idle timeout or unexpected connection termination.
        nargs: -1
    --floating-ip=:
        description: Configures a virtual machine's endpoint for the floating IP capability required to configure a SQL AlwaysOn Availability Group.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --frontend-ip=: The name or ID of the frontend IP configuration.
    --frontend-port-range-end=: The last port number in the range of external ports that will be used to provide Inbound Nat to NICs associated with a load balancer.
    --frontend-port-range-start=: The first port number in the range of external ports that will be used to provide Inbound Nat to NICs associated with a load balancer.
    --idle-timeout=: The timeout for the TCP idle connection.
    --lb-name=!: The load balancer name.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --protocol=: The reference to the transport protocol used by the inbound NAT pool.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the resource that is unique within the set of inbound NAT pools used by the load balancer.
completion:
    flag:
        enable-tcp-reset:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        floating-ip:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - All
            - Tcp
            - Udp
