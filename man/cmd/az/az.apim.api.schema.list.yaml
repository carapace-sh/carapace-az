# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Get the schema configuration at the API level.
flags:
    --api-id=!: API identifier.
    --filter-display-name=: Filter of APIs by displayName.
    --skip=: Number of records to skip.
    --subscription=: Name or ID of subscription.
    --top=: Number of records to return.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    command: List API Management API schema's.
    flag:
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        filter-display-name: Filter of APIs by displayName.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        skip: Number of records to skip.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        top: Number of records to return.
examples:
    Get list of schema's associated with an api id.: az apim api schema list --service-name MyApim -g MyResourceGroup --api-id MyApi
