# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List certificates for an environment.
documentation:
    flag:
        location: 'Location of resource. Examples: eastus2, northeurope'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --subscription=: Name or ID of subscription.
    -c, --certificate=: Name or resource id of the certificate.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location of resource.
    -m, --managed-certificates-only=: List managed certificates only.
    -n, --name=!: Name of the Container Apps environment.
    -p, --private-key-certificates-only=: List private-key certificates only.
    -t, --thumbprint=: Thumbprint of the certificate.
