# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List certificates for an environment.
flags:
    --subscription=: Name or ID of subscription.
    -c, --certificate=: Name or resource id of the certificate.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location of resource.
    -m, --managed-certificates-only=: List managed certificates only.
    -n, --name=!: Name of the Container Apps environment.
    -p, --private-key-certificates-only=: List private-key certificates only.
    -t, --thumbprint=: Thumbprint of the certificate.
documentation:
    flag:
        certificate: Name or resource id of the certificate.
        location: 'Location of resource. Examples: eastus2, northeurope.'
        managed-certificates-only: |-
            List managed certificates only.

            Default value: False
        name: Name of the Container Apps environment.
        private-key-certificates-only: |-
            List private-key certificates only.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        thumbprint: Thumbprint of the certificate.
examples:
    List certificates by certificate name.: az containerapp env certificate list -g MyResourceGroup --name MyEnvironment --certificate MyCertificateName
    List certificates by certificate thumbprint.: az containerapp env certificate list -g MyResourceGroup --name MyEnvironment --thumbprint MyCertificateThumbprint
    List certificates for an environment.: az containerapp env certificate list -g MyResourceGroup --name MyEnvironment
    List managed certificates for an environment.: az containerapp env certificate list -g MyResourceGroup --name MyEnvironment --managed-certificates-only
    List private key certificates for an environment.: az containerapp env certificate list -g MyResourceGroup --name MyEnvironment --private-key-certificates-only
    Show a certificate by certificate id.: az containerapp env certificate list -g MyResourceGroup --name MyEnvironment --certificate MyCertificateId
