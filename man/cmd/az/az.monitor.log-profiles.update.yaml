# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a log profile in Azure Monitoring REST API.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        categories: 'Space-separated categories of the logs. These categories are created as is convenient to the user. Some values are: ''Write'', ''Delete'', and/or ''Action.''  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        days: the number of days for the retention in days. A value of 0 will retain the events indefinitely.
        enabled: 'Whether the retention policy is enabled.  Allowed values: false, true.'
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        locations: Space-separated list of regions for which Activity Log events should be stored.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        service-bus-rule-id: 'The service bus rule ID of the service bus namespace in which you would like to have Event Hubs created for streaming the Activity Log. The rule ID is of the format: ''{service bus resource ID}/authorizationrules/{key name}''.'
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --categories=:
        description: Space-separated categories of the logs.
        nargs: -1
    --days=: the number of days for the retention in days.
    --enabled=:
        description: Whether the retention policy is enabled.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --locations=:
        description: Space-separated list of regions for which Activity Log events should be stored.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --service-bus-rule-id=: The service bus rule ID of the service bus namespace in which you would like to have Event Hubs created for streaming the Activity Log.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --storage-account-id=: the resource id of the storage account to which you would like to send the Activity Log.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -n, --name=: The name of the log profile.
completion:
    flag:
        enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
