# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: move
description: Move a particular recovery point of a backed up item from one tier to another tier.
flags:
    --backup-management-type=: Specify the backup management type.
    --destination-tier=!: The destination/target tier to which a particular recovery point has to be moved.
    --source-tier=!: The source tier from which a particular recovery point has to be moved.
    --subscription=: Name or ID of subscription.
    --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
    -c, --container-name=!: Name of the backup container.
    -g, --resource-group=!: Name of resource group.
    -i, --item-name=!: Name of the backed up item.
    -n, --name=!: Name of the recovery point.
    -v, --vault-name=!: Name of the Recovery services vault.
completion:
    flag:
        backup-management-type:
            - AzureIaasVM
            - AzureStorage
            - AzureWorkload
        destination-tier:
            - VaultArchive
        source-tier:
            - VaultStandard
        workload-type:
            - VM
            - AzureFileShare
            - SAPHANA
            - MSSQL
            - SAPHanaDatabase
            - SQLDataBase
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-management-type: |-
            Specify the backup management type. Define how Azure Backup manages the backup of entities within the ARM resource. For eg: AzureWorkloads refers to workloads installed within Azure VMs, AzureStorage refers to entities within Storage account. Required only if friendly name is used as Container name.

            Accepted values: AzureIaasVM, AzureStorage, AzureWorkload
        change-reference: The related change reference ID for this resource operation.
        container-name: Name of the backup container. Accepts 'Name' or 'FriendlyName' from the output of az backup container list command. If 'FriendlyName' is passed then BackupManagementType is required.
        destination-tier: |-
            The destination/target tier to which a particular recovery point has to be moved.

            Accepted values: VaultArchive
        item-name: Name of the backed up item.
        name: Name of the recovery point.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source-tier: |-
            The source tier from which a particular recovery point has to be moved.

            Accepted values: VaultStandard
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Recovery services vault.
        workload-type: |-
            Specify the type of applications within the Resource which should be discovered and protected by Azure Backup. 'MSSQL' and 'SQLDataBase' can be used interchangeably for SQL in Azure VM, as can 'SAPHANA' and 'SAPHanaDatabase' for SAP HANA in Azure VM.

            Accepted values: AzureFileShare, MSSQL, SAPASE, SAPAseDatabase, SAPHANA, SAPHanaDBInstance, SAPHanaDatabase, SQLDataBase, VM
examples:
    Move a particular recovery point of a backed up item.: az backup recoverypoint move --container-name MyContainer --backup-management-type AzureIaasVM --item-name MyItem --resource-group MyResourceGroup --vault-name MyVault --name RpId --source-tier SourceTier --destination-tier DestinationTier
