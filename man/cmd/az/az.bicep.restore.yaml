# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore external modules for a bicep file.
flags:
    --force=: Allows overwriting the cached external modules.
    --subscription=: Name or ID of subscription.
    -f, --file=!: The path to the Bicep file to restore external modules for.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        file: The path to the Bicep file to restore external modules for.
        force: Allows overwriting the cached external modules.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Restore external modules and overwrite cached external modules.: az bicep restore --file {bicep_file} --force
    Restore external modules.: az bicep restore --file {bicep_file}
