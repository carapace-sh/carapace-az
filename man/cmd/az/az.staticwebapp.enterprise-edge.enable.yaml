# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable
description: Enable the Azure Front Door CDN for a static webapp.
documentation:
    flag:
        no-register: 'Don''t try to register the Microsoft.CDN provider. Registration can be done manually with: az provider register --wait --namespace Microsoft.CDN. For more details, please review the documentation available at https://go.microsoft.com/fwlink/?linkid=2184995 .'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --no-register=: Don't try to register the Microsoft.CDN provider.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the static site
