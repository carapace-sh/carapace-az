# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all the orders related to a Data Box Edge/Data Box Gateway device.
flags:
    --subscription=: Name or ID of subscription.
    -d, --device-name=!: The device name.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        device-name: The order details of a device.
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in ```
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all the orders related to a Data Box Edge/Data Box Gateway device.: az databoxedge order list --device-name testedgedevice --resource-group GroupForEdgeAutomation
