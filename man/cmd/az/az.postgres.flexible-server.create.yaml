# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a PostgreSQL flexible server.
documentation:
    flag:
        address-prefixes: The IP address prefix to use when creating a new virtual network in CIDR format. Default value is 10.0.0.0/16.
        admin-password: 'The password of the administrator. Minimum 8 characters and maximum 128 characters. Password must contain characters from three of the following categories: English uppercase letters, English lowercase letters, numbers, and non-alphanumeric characters.'
        admin-user: 'Administrator username for the server. Once set, it cannot be changed. '
        backup-identity: The name or resource ID of the geo backup user identity for data encryption. The identity needs to be in the same region as the backup region.
        backup-key: The resource ID of the geo backup keyvault key for data encryption. The key needs to be in the same region as the backup region.
        backup-retention: The number of days a backup is retained. Range of 7 to 35 days. Default is 7 days.
        cluster-option: Cluster option for the server. Servers are for workloads that can fit on one node. Elastic clusters provides schema- and row-based sharding on a database. Default value is Server.
        create-default-database: Enable or disable the creation of default database flexibleserverdb. Default value is Enabled.
        iops: Value of IOPS in (operations/sec) to be allocated for this server. This value can only be updated if flexible server is using Premium SSD v2 Disks.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        node-count: The number of nodes for elastic cluster. Range of 1 to 10. Default is 2 nodes.
        private-dns-zone: This parameter only applies for a server with private access. The name or id of new or existing private dns zone. You can use the private dns zone from same resource group, different resource group, or different subscription. If you want to use a zone from different resource group or subscription, please provide resource Id. CLI creates a new private dns zone within the same resource group as virtual network if not provided by users.
        public-access: 'Determines the public access. Enter single or range of IP addresses to be included in the allowed list of IPs. IP address ranges must be dash-separated and not contain any spaces. Specifying 0.0.0.0 allows public access from any resources deployed within Azure to access your server. Setting it to "None" sets the server in public access mode but does not create a firewall rule. Acceptable values are ''Disabled'', ''Enabled'', ''All'', ''None'',''{startIP}'' and ''{startIP}-{destinationIP}'' where startIP and destinationIP ranges from 0.0.0.0 to 255.255.255.255. '
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        sku-name: 'The name of the compute SKU. Follows the convention Standard_{VM name}. Examples: Standard_B1ms'
        storage-auto-grow: Enable or disable autogrow of the storage. Default value is Enabled.
        storage-size: The storage capacity of the server. Minimum is 32 GiB and max is 16 TiB.
        storage-type: Storage type for the server. Allowed values are Premium_LRS and PremiumV2_LRS. Default value is Premium_LRS.Must set iops and throughput if using PremiumV2_LRS.
        subnet: Name or resource ID of a new or existing subnet. If you want to use a subnet from different resource group or subscription, please provide resource ID instead of name. Please note that the subnet will be delegated to flexibleServers. After delegation, this subnet cannot be used for any other type of Azure resources.
        subnet-prefixes: The subnet IP address prefix to use when creating a new subnet in CIDR format. Default value is 10.0.0.0/24.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        throughput: Storage throughput in (MB/sec) for the server. This value can only be updated if flexible server is using Premium SSD v2 Disks.
        tier: 'Compute tier of the server. Accepted values: Burstable, GeneralPurpose, MemoryOptimized '
        vnet: Name or ID of a new or existing virtual network. If you want to use a vnet from different resource group or subscription, please provide a resource ID. The name must be between 2 to 64 characters. The name must begin with a letter or number, end with a letter, number or underscore, and may contain only letters, numbers, underscores, periods, or hyphens.
flags:
    --active-directory-auth=: Whether Microsoft Entra authentication is enabled.
    --address-prefixes=: The IP address prefix to use when creating a new virtual network in CIDR format.
    --backup-identity=: The name or resource ID of the geo backup user identity for data encryption.
    --backup-key=: The resource ID of the geo backup keyvault key for data encryption.
    --backup-retention=: The number of days a backup is retained.
    --cluster-option=: Cluster option for the server.
    --geo-redundant-backup=: Whether or not geo redundant backup is enabled.
    --high-availability=: Enable (ZoneRedundant or SameZone) or disable high availability feature.
    --identity=: The name or resource ID of the user assigned identity for data encryption.
    --iops=: Value of IOPS in (operations/sec) to be allocated for this server.
    --key=: The resource ID of the primary keyvault key for data encryption.
    --microsoft-entra-auth=: Whether Microsoft Entra authentication is enabled.
    --node-count=: The number of nodes for elastic cluster.
    --password-auth=: Whether password authentication is enabled.
    --performance-tier=: Performance tier of the server.
    --private-dns-zone=: This parameter only applies for a server with private access.
    --public-access=: Determines the public access.
    --sku-name=: The name of the compute SKU.
    --standby-zone=: The availability zone information of the standby server when high availability is enabled.
    --storage-auto-grow=: Enable or disable autogrow of the storage.
    --storage-size=: The storage capacity of the server.
    --storage-type=: Storage type for the server.
    --subnet-prefixes=: The subnet IP address prefix to use when creating a new subnet in CIDR format.
    --subnet=: Name or resource ID of a new or existing subnet.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --throughput=: Storage throughput in (MB/sec) for the server.
    --tier=: Compute tier of the server.
    --version=: Server major version.
    --vnet=: Name or ID of a new or existing virtual network.
    -c, --create-default-database=: Enable or disable the creation of default database flexibleserverdb.
    -d, --database-name=: The name of the database to be created when provisioning the database server
    -g, --resource-group=: Name of resource group.
    -i, --admin-object-id=: The unique ID of the Microsoft Entra administrator.
    -l, --location=: Location.
    -m, --admin-display-name=: Display name of the Microsoft Entra administrator user or group.
    -n, --name=: Name of the server.
    -p, --admin-password=: The password of the administrator.
    -t, --admin-type=: Type of the Microsoft Entra administrator.
    -u, --admin-user=: Administrator username for the server.
    -y, --yes=: Do not prompt for confirmation.
    -z, --zone=: Availability zone into which to provision the resource.
completion:
    flag:
        active-directory-auth:
            - Enabled
            - Disabled
        admin-type:
            - User
            - Group
            - ServicePrincipal
            - Unknown
        cluster-option:
            - Server
            - ElasticCluster
        create-default-database:
            - Enabled
            - Disabled
        geo-redundant-backup:
            - Enabled
            - Disabled
        high-availability:
            - ZoneRedundant
            - SameZone
            - Disabled
        microsoft-entra-auth:
            - Enabled
            - Disabled
        password-auth:
            - Enabled
            - Disabled
        storage-auto-grow:
            - Enabled
            - Disabled
        storage-type:
            - PremiumV2_LRS
            - Premium_LRS
