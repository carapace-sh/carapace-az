# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a PostgreSQL flexible server.
flags:
    --active-directory-auth=: Whether Microsoft Entra authentication is enabled.
    --address-prefixes=: The IP address prefix to use when creating a new virtual network in CIDR format.
    --backup-identity=: The name or resource ID of the geo backup user identity for data encryption.
    --backup-key=: The resource ID of the geo backup keyvault key for data encryption.
    --backup-retention=: The number of days a backup is retained.
    --cluster-option=: Cluster option for the server.
    --geo-redundant-backup=: Whether or not geo redundant backup is enabled.
    --high-availability=: Enable (ZoneRedundant or SameZone) or disable high availability feature.
    --identity=: The name or resource ID of the user assigned identity for data encryption.
    --iops=: Value of IOPS in (operations/sec) to be allocated for this server.
    --key=: The resource ID of the primary keyvault key for data encryption.
    --microsoft-entra-auth=: Whether Microsoft Entra authentication is enabled.
    --node-count=: The number of nodes for elastic cluster.
    --password-auth=: Whether password authentication is enabled.
    --performance-tier=: Performance tier of the server.
    --private-dns-zone=: This parameter only applies for a server with private access.
    --public-access=: Determines the public access.
    --sku-name=: The name of the compute SKU.
    --standby-zone=: The availability zone information of the standby server when high availability is enabled.
    --storage-auto-grow=: Enable or disable autogrow of the storage.
    --storage-size=: The storage capacity of the server.
    --storage-type=: Storage type for the server.
    --subnet-prefixes=: The subnet IP address prefix to use when creating a new subnet in CIDR format.
    --subnet=: Name or resource ID of a new or existing subnet.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --throughput=: Storage throughput in (MB/sec) for the server.
    --tier=: Compute tier of the server.
    --version=: Server major version.
    --vnet=: Name or ID of a new or existing virtual network.
    -c, --create-default-database=: Enable or disable the creation of default database flexibleserverdb.
    -d, --database-name=: The name of the database to be created when provisioning the database server
    -g, --resource-group=: Name of resource group.
    -i, --admin-object-id=: The unique ID of the Microsoft Entra administrator.
    -l, --location=: Location.
    -m, --admin-display-name=: Display name of the Microsoft Entra administrator user or group.
    -n, --name=: Name of the server.
    -p, --admin-password=: The password of the administrator.
    -t, --admin-type=: Type of the Microsoft Entra administrator.
    -u, --admin-user=: Administrator username for the server.
    -y, --yes=: Do not prompt for confirmation.
    -z, --zone=: Availability zone into which to provision the resource.
completion:
    flag:
        active-directory-auth:
            - Enabled
            - Disabled
        admin-type:
            - User
            - Group
            - ServicePrincipal
            - Unknown
        cluster-option:
            - Server
            - ElasticCluster
        create-default-database:
            - Enabled
            - Disabled
        geo-redundant-backup:
            - Enabled
            - Disabled
        high-availability:
            - ZoneRedundant
            - SameZone
            - Disabled
        microsoft-entra-auth:
            - Enabled
            - Disabled
        password-auth:
            - Enabled
            - Disabled
        storage-auto-grow:
            - Enabled
            - Disabled
        storage-type:
            - PremiumV2_LRS
            - Premium_LRS
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        address-prefixes: The IP address prefix to use when creating a new virtual network in CIDR format. Default value is 10.0.0.0/16.
        admin-display-name: Display name of the Microsoft Entra administrator user or group.
        admin-object-id: The unique identifier of the Microsoft Entra administrator.
        admin-password: 'The password of the administrator. Minimum 8 characters and maximum 128 characters. Password must contain characters from three of the following categories: English uppercase letters, English lowercase letters, numbers, and non-alphanumeric characters.'
        admin-type: |-
            Type of the Microsoft Entra administrator.

            Accepted values: Group, ServicePrincipal, Unknown, User
        admin-user: |-
            Administrator username for the server. Once set, it cannot be changed.

            Default value: shoddygrouse1
        allow-same-zone: |-
            Allow primary and standby in the same zone when multi-zone capacity is unavailable.

            Default value: False
        backup-identity: The name or resource identifier of the geo backup user identity for data encryption. The identity needs to be in the same region as the backup region.
        backup-key: The resource identifier of the geo backup keyvault key for data encryption. The key needs to be in the same region as the backup region.
        backup-retention: |-
            The number of days a backup is retained. Range of 7 to 35 days. Default is 7 days.

            Default value: 7
        change-reference: The related change reference ID for this resource operation.
        cluster-option: Cluster option for the server. Servers are for workloads that can fit on one node. Elastic clusters provides schema- and row-based sharding on a database. Default value is Server.
        create-default-database: Enable or disable the creation of default database flexibleserverdb. Default value is Enabled.
        database-name: The default database name for an elastic cluster. Only applicable when --node-count is present.
        geo-redundant-backup: |-
            Whether or not geo redundant backup is enabled.

            Default value: Disabled

            Accepted values: Disabled, Enabled
        identity: The name or resource identifier of the user assigned identity for data encryption.
        iops: Value of IOPS in (operations/sec) to be allocated for this server. This value can only be updated if flexible server is using Premium SSD v2 Disks.
        key: The resource identifier of the primary keyvault key for data encryption.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        microsoft-entra-auth: |-
            Whether Microsoft Entra authentication is enabled.

            Default value: Disabled

            Accepted values: Disabled, Enabled
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        node-count: The number of nodes for elastic cluster. Range of 1 to 10. Default is 2 nodes.
        password-auth: |-
            Whether password authentication is enabled.

            Default value: Enabled

            Accepted values: Disabled, Enabled
        performance-tier: Performance tier of the server.
        private-dns-zone: This parameter only applies for a server with private access. The name or id of new or existing private dns zone. You can use the private dns zone from same resource group, different resource group, or different subscription. If you want to use a zone from different resource group or subscription, please provide resource Id. CLI creates a new private dns zone within the same resource group as virtual network if not provided by users.
        public-access: 'Determines the public access. Enter single or range of IP addresses to be included in the allowed list of IPs. IP address ranges must be dash-separated and not contain any spaces. Specifying 0.0.0.0 allows public access from any resources deployed within Azure to access your server. Setting it to "None" sets the server in public access mode but does not create a firewall rule. Acceptable values are ''Disabled'', ''Enabled'', ''All'', ''None'',''{startIP}'' and ''{startIP}-{destinationIP}'' where startIP and destinationIP ranges from 0.0.0.0 to 255.255.255.255. '
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku-name: 'The name of the compute SKU. Follows the convention Standard_{VM name}. Examples: Standard_B1ms.'
        standby-zone: The availability zone information of the standby server when high availability is enabled.
        storage-auto-grow: |-
            Enable or disable autogrow of the storage. Default value is Disabled.

            Default value: Disabled

            Accepted values: Disabled, Enabled
        storage-size: |-
            The storage capacity of the server. Minimum is 32 GiB and max is 16 TiB.

            Default value: 128
        storage-type: |-
            Storage type for the server. Allowed values are Premium_LRS and PremiumV2_LRS. Default value is Premium_LRS. Must set --iops and --throughput if using PremiumV2_LRS.

            Accepted values: PremiumV2_LRS, Premium_LRS
        subnet: Name or resource ID of a new or existing subnet. If you want to use a subnet from different resource group or subscription, please provide resource ID instead of name. Please note that the subnet will be delegated to flexibleServers. After delegation, this subnet cannot be used for any other type of Azure resources.
        subnet-prefixes: The subnet IP address prefix to use when creating a new subnet in CIDR format. Default value is 10.0.0.0/24.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        throughput: Storage throughput in (MB/sec) for the server. This value can only be updated if flexible server is using Premium SSD v2 Disks.
        tier: |-
            Compute tier of the server. Accepted values: Burstable, GeneralPurpose, MemoryOptimized.

            Default value: GeneralPurpose
        version: Server major version.
        vnet: Name or identifier of an existing virtual network. If you want to use a vnet from a different resource group or subscription, please provide a resource identifier. The name must be between 2 to 64 characters. The name must begin with a letter or number, end with a letter, number or underscore, and may contain only letters, numbers, underscores, periods, or hyphens.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
        zonal-resiliency: |-
            Enable or disable high availability feature.

            Default value: Disabled

            Accepted values: Disabled, Enabled
        zone: Availability zone into which to provision the resource.
examples:
    Create a PostgreSQL flexible server using Premium SSD v2 Disks.: |-
        # set storage type to "PremiumV2_LRS" and provide values for Storage size (in GiB), IOPS (operations/sec), and Throughput (MB/sec).
        az postgres flexible-server create --location testlocation --resource-group testgroup \
            --name testserver --admin-user testusername --admin-password testpassword \
            --sku-name Standard_B1ms --tier GeneralPurpose --storage-type PremiumV2_LRS --storage-size 128 --iops 3000 --throughput 125
    Create a PostgreSQL flexible server using existing network resources in a different resource group / subscription.: |-
        az postgres flexible-server create --resource-group testgroup \
           --name testserver --location testLocation \
          --subnet /subscriptions/{subscriptionId2}/resourceGroups/{resourceGroup2}/providers/Microsoft.Network/virtualNetworks/testvnet/subnets/testsubnet \
          --private-dns-zone /subscriptions/{subscriptionId2}/resourceGroups/{resourceGroup2}/providers/Microsoft.Network/privateDnsZones/testdns.postgres.database.azure.com
    ? Create a PostgreSQL flexible server using existing network resources in the same resource group. The provided subnet and private DNS zone must already exist.
    : |-
        # create vnet
        az network vnet create --resource-group testgroup --name testvnet --location testlocation --address-prefixes 172.0.0.0/16
        # create subnet
        az network vnet subnet create --resource-group testgroup --vnet-name testvnet --address-prefixes 172.0.0.0/24 --name testsubnet
        # create private dns zone
        az network private-dns zone create -g testgroup -n testdns.private.postgres.database.azure.com
        az postgres flexible-server create --resource-group testgroup \
          --name testserver --location testlocation \
          --subnet /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Network/virtualNetworks/testvnet/subnets/testsubnet \
          --private-dns-zone /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Network/privateDnsZones/testdns.postgres.database.azure.com\
        az postgres flexible-server create --resource-group testGroup --name testserver \
          --vnet testVnet --subnet testSubnet --location testLocation \
          --private-dns-zone /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Network/privateDnsZones/testdns.postgres.database.azure.com
    ? Create a PostgreSQL flexible server using existing subnet and private DNS zone resource identifiers. The subnet and DNS zone can be in different subscriptions or resource groups.
    : |-
        az postgres flexible-server create \
          --resource-group testgroup --name testserver \
          --subnet /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNet}/subnets/{Subnet} \
          --private-dns-zone /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Network/privateDnsZones/testdns.private.postgres.database.azure.com
    Create a PostgreSQL flexible server with Microsoft Entra auth as well as password auth.: |-
        # create flexible server with aad auth and password auth enabled
        az postgres flexible-server create -g testgroup -n testserver --location testlocation \
          --microsoft-entra-auth Enabled
    Create a PostgreSQL flexible server with Microsoft Entra auth only and primary administrator specified.: |-
        # create flexible server with aad only auth and password auth disabled with primary administrator specified
        az postgres flexible-server create -g testgroup -n testserver --location testlocation \
          --microsoft-entra-auth Enabled --password-auth Disabled \
          --admin-object-id 00000000-0000-0000-0000-000000000000 --admin-display-name john@contoso.com --admin-type User
    Create a PostgreSQL flexible server with custom parameters: |-
        az postgres flexible-server create --location testlocation --resource-group testgroup \
          --name testserver --admin-user testusername --admin-password testpassword \
          --sku-name Standard_D2s_v3 --tier GeneralPurpose --public-access 153.24.26.117 --storage-size 128 \
          --tags "key=value" --version 18 --zonal-resiliency Enabled --zone 1 \
          --standby-zone 3
    Create a PostgreSQL flexible server with data encryption for geo-rundundant backup enabled server.: |-
        # create keyvault
        az keyvault create -g testgroup -n testvault --location testlocation \
          --enable-purge-protection true
        # create key in keyvault and save its key identifier
        keyIdentifier=$(az keyvault key create --name testkey -p software \
          --vault-name testvault --query key.kid -o tsv)
        # create identity and save its principalId
        identityPrincipalId=$(az identity create -g testgroup --name testidentity \
          --location testlocation --query principalId -o tsv)
        # add testIdentity as an access policy with key permissions 'Wrap Key', 'Unwrap Key', 'Get' and 'List' inside testVault
        az keyvault set-policy -g testgroup -n testvault --object-id $identityPrincipalId \
          --key-permissions wrapKey unwrapKey get list
        # create keyvault in geo-paired region
        az keyvault create -g testgroup -n geovault --location geoPairedLocation \
          --enable-purge-protection true
        # create key in keyvault and save its key identifier
        geoKeyIdentifier=$(az keyvault key create --name geokey -p software \
          --vault-name geovault --query key.kid -o tsv)
        # create identity in geo-raired location and save its principalId
        geoIdentityPrincipalId=$(az identity create -g testgroup --name geoidentity \
          --location geoPairedLocation --query principalId -o tsv)
        # add testIdentity as an access policy with key permissions 'Wrap Key', 'Unwrap Key', 'Get' and 'List' inside testVault
        az keyvault set-policy -g testgroup -n geovault --object-id $geoIdentityPrincipalId \
          --key-permissions wrapKey unwrapKey get list
        # create flexible server with data encryption enabled for geo-backup Enabled server
        az postgres flexible-server create -g testgroup -n testserver --location testlocation --geo-redundant-backup Enabled \
          --key $keyIdentifier --identity testidentity --backup-key $geoKeyIdentifier --backup-identity geoidentity
    Create a PostgreSQL flexible server with data encryption.: |-
        # create keyvault
        az keyvault create -g testgroup -n testvault --location testlocation \
          --enable-purge-protection true
        # create key in keyvault and save its key identifier
        keyIdentifier=$(az keyvault key create --name testkey -p software \
          --vault-name testvault --query key.kid -o tsv)
        # create identity and save its principalId
        identityPrincipalId=$(az identity create -g testgroup --name testidentity \
          --location testlocation --query principalId -o tsv)
        # add testIdentity as an access policy with key permissions 'Wrap Key', 'Unwrap Key', 'Get' and 'List' inside testVault
        az keyvault set-policy -g testgroup -n testvault --object-id $identityPrincipalId \
          --key-permissions wrapKey unwrapKey get list
        # create flexible server with data encryption enabled
        az postgres flexible-server create -g testgroup -n testserver --location testlocation \
          --key $keyIdentifier --identity testidentity
    ? Create a PostgreSQL flexible server with default parameters and public access enabled by default.       Resource group, server name, username, password, and default database will be created by CLI
    : az postgres flexible-server create
    Create a PostgreSQL flexible server with private access using existing virtual network, subnet and private DNS zone names.: az postgres flexible-server create --resource-group testgroup --name testserver --vnet testvnet --subnet testsubnet --private-dns-zone testdns.private.postgres.database.azure.com
    ? Create a PostgreSQL flexible server with public access and add the range of IP address to have access to this server. The --public-access parameter can be 'Disabled', 'Enabled', 'All', 'None', <startIpAddress>, or <startIpAddress>-<endIpAddress>
    : az postgres flexible-server create --resource-group testgroup --name testserver --public-access 125.23.54.31-125.23.54.35
    ? Create a PostgreSQL flexible server with public access, geo-redundant backup enabled and add the range of IP address to have access to this server. The --public-access parameter can be 'All', 'None', <startIpAddress>, or <startIpAddress>-<endIpAddress>
    : az postgres flexible-server create --resource-group testgroup --name testserver --geo-redundant-backup Enabled --public-access 125.23.54.31-125.23.54.35
    Create elastic cluster with node count of 5.: az postgres flexible-server create -g testGroup -n testCluster --location testLocation --node-count 5
    ? Create flexible server with custom storage performance tier. Accepted values "P4", "P6", "P10", "P15", "P20", "P30", \ "P40", "P50", "P60", "P70", "P80". Actual allowed values depend on the --storage-size selection for flexible server creation. \ Default value for storage performance tier depends on the --storage-size selected for flexible server creation.
    : az postgres flexible-server create -g testgroup -n testserver --location testlocation --performance-tier P15
    ? Create flexible server with storage auto-grow as Enabled. Accepted values Enabled / Disabled. Default value for storage auto-grow is "Disabled".
    : az postgres flexible-server create -g testgroup -n testserver --location testlocation --storage-auto-grow Enabled
    ? Create server with high availability feature enabled that allows primary and standby in the same zone when multi-zone capacity is unavailable.
    : az postgres flexible-server create -g testgroup -n testserver --location testlocation --zonal-resiliency Enabled --allow-same-zone
