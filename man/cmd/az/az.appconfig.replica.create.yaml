# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new replica of an App Configuration store.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -l, --location=!: Location at which to create the replica.
    -n, --name=!: Name of the replica of the App Configuration store.
    -s, --store-name=!: Name of the App Configuration store.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: Location at which to create the replica.
        name: Name of the replica of the App Configuration store.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        store-name: Name of the App Configuration store. You can configure the default name using ``` az configure --defaults app_configuration_store=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a new replica of an App Configuration store at a location.: az appconfig replica create --store-name MyAppConfiguration --name MyReplicaName --location westus
