# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an empty AAAA record set.
flags:
    --metadata=:
        description: Metadata attached to the record set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --ttl=: Record set TTL (time-to-live).
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the record set, relative to the name of the zone.
    -z, --zone-name=!: Name of the Private DNS zone (without a terminating dot).
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        metadata: Metadata attached to the record set.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: Name of the record set, relative to the name of the zone.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        ttl: |-
            Record set TTL (time-to-live).

            Default value: 3600
        zone-name: Name of the Private DNS zone (without a terminating dot).
examples:
    Create an empty AAAA record set.: az network private-dns record-set aaaa create -g MyResourceGroup -z www.mysite.com -n MyRecordSet
