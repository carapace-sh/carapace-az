# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new v4 SDK bot.
documentation:
    flag:
        app-type: 'Microsoft App Type for the bot. Possible values include: "UserAssignedMSI", "SingleTenant", "MultiTenant".'
        display-name: The display name of the bot. If not specified, defaults to the name of the bot.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        name: The resource name of the bot. Bot name must be between 4 and 42 characters in length. Bot name can only have the following characters -, a - z, A - Z, 0 - 9, and _.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --app-type=!: Microsoft App Type for the bot.
    --appid=!: The Microsoft account ID (MSA ID) to be used with the bot.
    --cmk-key-vault-key-url=: The key vault key url to enable Customer Managed Keys encryption
    --display-name=: The display name of the bot.
    --msi-resource-id=: Microsoft App Managed Identity Resource Id for the bot.
    --sku=: The Sku of the bot.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tenant-id=: Microsoft App Tenant Id for the bot.
    -d, --description=: The description of the bot.
    -e, --endpoint=: The messaging endpoint of the bot.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The resource name of the bot.
completion:
    flag:
        sku:
            - F0
            - S1
