# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the workload profiles from a Container Apps environment
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Container App environment
documentation:
    command: List the workload profiles from a Container Apps environment.
    flag:
        name: The name of the Container App environment.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List the workload profiles from a Container Apps environment: az containerapp env workload-profile list -g MyResourceGroup -n MyEnvironment
