# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a policy set definition.
flags:
    --definition-groups=: JSON formatted string or a path to a file or uri containing policy definition groups.
    --definitions=!: JSON formatted string or a path to a file or uri containing definitions.
    --description=: Description of policy set definition.
    --display-name=: Display name of policy set definition.
    --management-group=: The name of the management group of the policy [set] definition.
    --metadata=:
        description: Metadata in space-separated key=value pairs.
        nargs: -1
    --params=: JSON formatted string or a path to a file or uri with parameter definitions.
    --subscription=: The subscription id of the policy [set] definition.
    -n, --name=!: Name of the new policy set definition.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        definition-groups: The metadata describing groups of policy definition references within the policy set definition.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        definitions: An array of policy definition references.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        description: Policy set definition description.
        display-name: The display name of the policy set definition.
        management-group: The name of the management group of the policy [set] definition. This parameter is required if your policy set is scoped to a management group.
        metadata: The policy set definition metadata.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the policy set definition.
        params: The policy set definition parameter definitions.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        version: The policy set definition version.
examples:
    Create a policy set definition: 'az policy set-definition create -n readOnlyStorage --definitions ''[ { ''policyDefinitionId'': ''/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyDefinitions/{policyDefinitionName}'' } ]'''
    Create a policy set definition in a subscription: 'az policy set-definition create -n readOnlyStorage --subscription {subscriptionName} --definitions "[ { ''policyDefinitionId'': ''/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyDefinitions/{policyDefinitionName}'' } ]"'
    Create a policy set definition with parameters: 'az policy set-definition create -n readOnlyStorage --definitions "[ { ''policyDefinitionId'': ''/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyDefinitions/{policyDefinitionName}'', ''parameters'': { ''storageSku'': { ''value'': ''[parameters(\''requiredSku\'')]'' } } }]" --params "{ ''requiredSku'': { ''type'': ''String'' } }"'
    Create a policy set definition with policy definition groups: 'az policy set-definition create -n computeRequirements --definitions "[ { ''policyDefinitionId '': ''/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyDefinitions/storagePolicy'', ''groupNames'': [ ''CostSaving'', ''Organizational'' ] }, { ''policyDefinitionId'': ''/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyDefinitions/tagPolicy'', ''groupNames'': [ ''Organizational'' ] } ]" --definition-groups "[{ ''name'': ''CostSaving'' }, { ''name'': ''Organizational'' } ]"'
