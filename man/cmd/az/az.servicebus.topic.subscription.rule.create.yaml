# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the ServiceBus Rule for Subscription
flags:
    --action-compatibility-level=: This property is reserved for future use.
    --action-sql-expression=: Action SQL expression.
    --content-type=: Content type of message.
    --correlation-filter-property=:
        description: dictionary object for custom filters
        nargs: -1
    --correlation-id=: Identifier of correlation.
    --enable-action-preprocessing=:
        description: A boolean value that indicates whether the rule action requires preprocessing.
        nargs: -1
    --enable-correlation-preprocessing=:
        description: A boolean value that indicates whether the rule action requires preprocessing.
        nargs: -1
    --enable-sql-preprocessing=:
        description: A boolean value that indicates whether the rule action requires preprocessing.
        nargs: -1
    --filter-sql-expression=: SQL expression.
    --filter-type=: Rule Filter types
    --label=: Application specific label.
    --message-id=: Identifier of message.
    --namespace-name=!: Name of Namespace
    --no-wait=: Do not wait for the long-running operation to finish.
    --reply-to-session-id=: Session identifier to reply to.
    --reply-to=: Address of the queue to reply to.
    --session-id=: Session identifier
    --subscription-name=!: Name of Subscription
    --subscription=: Name or ID of subscription.
    --to=: Address to send to.
    --topic-name=!: Name of Topic
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of Rule
completion:
    flag:
        enable-action-preprocessing:
            - "true"
            - "false"
        enable-correlation-preprocessing:
            - "true"
            - "false"
        enable-sql-preprocessing:
            - "true"
            - "false"
        filter-type:
            - SqlFilter
            - CorrelationFilter
documentation:
    command: Create the ServiceBus Rule for Subscription.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        action-compatibility-level: This property is reserved for future use. An integer value showing the compatibility level, currently hard-coded to 20.
        action-sql-expression: Action SQL expression.
        change-reference: The related change reference ID for this resource operation.
        content-type: Content type of message.
        correlation-id: Identifier of correlation.
        enable-action-preprocessing: |-
            A boolean value that indicates whether the rule action requires preprocessing.

            Accepted values: false, true
        enable-correlation-preprocessing: |-
            A boolean value that indicates whether the rule action requires preprocessing.

            Accepted values: false, true
        enable-sql-preprocessing: |-
            A boolean value that indicates whether the rule action requires preprocessing.

            Accepted values: false, true
        filter-sql-expression: SQL expression. e.g. myproperty=test.
        filter-type: |-
            Rule Filter types.

            Accepted values: CorrelationFilter, SqlFilter
        label: Application specific label.
        message-id: Identifier of message.
        name: Name of Rule.
        namespace-name: Name of Namespace.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        reply-to: Address of the queue to reply to.
        reply-to-session-id: Session identifier to reply to.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        session-id: Session identifier.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        subscription-name: Name of Subscription.
        to: Address to send to.
        topic-name: Name of Topic.
examples:
    Create Rule.: az servicebus topic subscription rule create --resource-group myresourcegroup --namespace-name mynamespace --topic-name mytopic --subscription-name mysubscription --name myrule --filter-sql-expression myproperty=myvalue
