# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: assign
description: Assign managed identity to a container app.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --system-assigned=: Boolean indicating whether to assign system-assigned identity.
    --user-assigned=:
        description: Space-separated user identities.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Containerapp.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-assigned: |-
            Boolean indicating whether to assign system-assigned identity.

            Default value: False
        user-assigned: Space-separated user identities.
examples:
    Assign system and user identity.: az containerapp identity assign -n my-containerapp -g MyResourceGroup --system-assigned --user-assigned myUserIdentityResourceId
    Assign system identity.: az containerapp identity assign -n my-containerapp -g MyResourceGroup --system-assigned
    Assign user identity (from a different resource group than the containerapp).: az containerapp identity assign -n my-containerapp -g MyResourceGroup --user-assigned myUserIdentityResourceId
    Assign user identity.: az containerapp identity assign -n my-containerapp -g MyResourceGroup --user-assigned myUserIdentityName
