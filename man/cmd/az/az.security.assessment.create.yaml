# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a customer managed security assessment.
flags:
    --additional-data=: Data that is attached to the assessment result for better investigations or status clarity
    --assessed-resource-id=: The target resource for this assessment
    --status-cause=: Programmatic code for the cause of the assessment result
    --status-code=!: Programmatic code for the result of the assessment.
    --status-description=: Human readable description of the cause of the assessment result
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        additional-data: Data that is attached to the assessment result for better investigations or status clarity.
        assessed-resource-id: The target resource for this assessment.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the resource to be fetched.
        status-cause: Programmatic code for the cause of the assessment result.
        status-code: Programmatic code for the result of the assessment. can be "Healthy", "Unhealthy" or "NotApplicable".
        status-description: Human readable description of the cause of the assessment result.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Creates a security assessment.: az security assessment create -n '4fb6c0a0-1137-42c7-a1c7-4bd37c91de8d' --status-code  'unhealthy'
