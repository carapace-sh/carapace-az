# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restores an existing or deleted SQL pool (i.e. create with 'Restore' or 'PointInTimeRestore' create mode.)
flags:
    --deleted-time=: If specified, restore from a deleted database instead of from an existing database.
    --dest-name=!: Name of the sql pool that will be created as the restore destination.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --performance-level=: The performance level.
    --storage-type=: The Storage Account Type.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --workspace-name=: The workspace name.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The SQL pool name.
    -t, --time=: The point in time of the source database that will be restored to create the new database.
completion:
    flag:
        storage-type:
            - GRS
            - LRS
documentation:
    command: Create a new SQL pool by restoring from a backup.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        deleted-time: 'If specified, restore from a deleted database instead of from an existing database. Must match the deleted time of a deleted database in the same server. Either --time or --deleted-time (or both) must be specified. Time should be in following format: "YYYY-MM-DDTHH:MM:SS".'
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The SQL pool name.
        performance-level: The performance level.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        storage-type: |-
            The Storage Account Type.

            Accepted values: GRS, LRS
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        time: 'The point in time of the source database that will be restored to create the new database. Must be greater than or equal to the source database''s earliestRestoreDate value. Either --time or --deleted-time (or both) must be specified. Time should be in following format: "YYYY-MM-DDTHH:MM:SS".'
        workspace-name: The workspace name.
examples:
    Create a new SQL pool by restoring an existing SQL pool's restore point.: |-
        az synapse sql pool restore --name sqlpool --workspace-name testsynapseworkspace --resource-group rg \
        --dest-name newsqlpool --time 2020-11-25T02:47:37
