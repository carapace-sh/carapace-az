# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an EventHub schema group.
flags:
    --group-properties=:
        description: dictionary object for SchemaGroup group properties  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --namespace-name=!: The Namespace name
    --schema-compatibility=: Compatibility of Schema.
    --schema-type=: Type of Schema.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The Schema Group name
completion:
    flag:
        schema-compatibility:
            - Backward
            - Forward
            - None
        schema-type:
            - Avro
            - Unknown
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        group-properties: dictionary object for SchemaGroup group properties  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: 'The Schema Group name '
        namespace-name: The Namespace name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        schema-compatibility: |-
            Compatibility of Schema.

            Accepted values: Backward, Forward, None
        schema-type: |-
            Type of Schema.

            Accepted values: Avro, Unknown
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
