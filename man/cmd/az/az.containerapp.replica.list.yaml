# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List a container app revision's replica
flags:
    --revision=: The name of the container app revision.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Containerapp.
documentation:
    command: List a container app revision's replica.
    flag:
        name: The name of the Containerapp.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        revision: The name of the container app revision. Defaults to the latest revision.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List a container app's replicas in a particular revision: az containerapp replica list -n my-containerapp -g MyResourceGroup --revision MyRevision
    List a container app's replicas in the latest revision: az containerapp replica list -n my-containerapp -g MyResourceGroup
