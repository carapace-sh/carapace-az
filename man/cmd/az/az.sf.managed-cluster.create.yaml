# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Delete a managed cluster.
flags:
    --admin-password=!: Admin password used for the virtual machines.
    --admin-user-name=: Admin user used for the virtual machines.
    --client-cert-common-name=: Client certificate common name.
    --client-cert-is-admin=:
        description: Client authentication type.
        nargs: -1
    --client-cert-issuer-thumbprint=:
        description: Space-separated list of issuer thumbprints.
        nargs: -1
    --client-cert-thumbprint=: Client certificate thumbprint.
    --client-connection-port=: Port used for client connections to the cluster.
    --cluster-code-version=: Cluster service fabric code version.
    --cluster-upgrade-cadence=: 'The upgrade mode of the cluster when new Service Fabric runtime version is available Wave0: Cluster upgrade starts immediately after a new version is rolled out.'
    --cluster-upgrade-mode=: 'The upgrade mode of the cluster when new Service Fabric runtime version is available Automatic: The cluster will be automatically upgraded to the latest Service Fabric runtime version, upgrade_cadence will determine when the upgrade starts after the new version becomes available.Manual: The cluster will not be automatically upgraded to the latest Service Fabric runtime version.'
    --dns-name=: Cluster's dns name.
    --gateway-connection-port=: Port used for http connections to the cluster.
    --sku=: 'Cluster''s Sku, the options are Basic: it will have a minimum of 3 seed nodes and only allows 1 node type and Standard: it will have a minimum of 5 seed nodes and allows multiple node types.'
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
    -l, --location=: Location.
completion:
    flag:
        client-cert-is-admin:
            - "true"
            - "false"
        cluster-upgrade-cadence:
            - Wave0
            - Wave1
            - Wave2
        cluster-upgrade-mode:
            - Automatic
            - Manual
documentation:
    command: Create a managed cluster.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        admin-password: Admin password used for the virtual machines.
        admin-user-name: |-
            Admin user used for the virtual machines.

            Default value: vmadmin

            Accepted values: false, true
        change-reference: |-
            The related change reference ID for this resource operation.

            Default value: 19000

            Accepted values: Wave0, Wave1, Wave2

            Accepted values: Automatic, Manual
        cluster-code-version: Cluster service fabric code version. Only use if upgrade mode is Manual.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        cluster-upgrade-cadence: 'The upgrade mode of the cluster when new Service Fabric runtime version is available Wave0: Cluster upgrade starts immediately after a new version is rolled out. Recommended for Test/Dev clusters.Wave1: Cluster upgrade starts 7 days after a new version is rolled out. Recommended for Pre-prod clusters.Wave2: Cluster upgrade starts 14 days after a new version is rolled out. Recommended for Production clusters.'
        cluster-upgrade-mode: 'The upgrade mode of the cluster when new Service Fabric runtime version is available Automatic: The cluster will be automatically upgraded to the latest Service Fabric runtime version, upgrade_cadence will determine when the upgrade starts after the new version becomes available.Manual: The cluster will not be automatically upgraded to the latest Service Fabric runtime version. The cluster is upgraded by setting the code_version property in the cluster resource.'
        dns-name: |-
            Cluster's dns name. --gateway-connection-port --gateway-port Port used for http connections to the cluster.

            Default value: 19080
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: |-
            Cluster's Sku, the options are Basic: it will have a minimum of 3 seed nodes and only allows 1 node type and Standard: it will have a minimum of 5 seed nodes and allows multiple node types.

            Default value: Basic
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create cluster with standard sku and client cert by common name.: az sf managed-cluster create -g testRG -c testCluster -l eastus2 --cert-common-name Contoso.com --cert-issuer-thumbprint XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX --cert-is-admin --admin-password PassTest123@ --sku Standard
    Create cluster with standard sku and client cert by thumbprint.: az sf managed-cluster create -g testRG -c testCluster -l eastus2 --cert-thumbprint XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX --cert-is-admin --admin-password PassTest123@ --sku Standard
