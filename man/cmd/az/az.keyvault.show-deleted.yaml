# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-deleted
description: Show details of a deleted Vault or HSM.
flags:
    --hsm-name=: Name of the deleted HSM.
    --subscription=: Name or ID of subscription.
    -l, --location=: Location of the deleted Vault or HSM
    -n, --name=: Name of the deleted Vault.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        hsm-name: Name of the deleted HSM. (--hsm-name and --name/-n are mutually exclusive, please specify just one of them).
        location: Location of the deleted Vault or HSM.
        name: Name of the deleted Vault.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show details of a deleted key vault.: az keyvault show-deleted --name MyKeyVault
