# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a MySQL database.
flags:
    --charset=: The charset of the database
    --collation=: The collation of the database
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the database
    -s, --server-name=!: Name of the server.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        charset: The charset of the database.
        collation: The collation of the database.
        name: The name of the database.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create database 'testdb' in server 'testsvr' with a given character set and collation rules.: az mysql db create -g testgroup -s testsvr -n testdb --charset {valid_charset} --collation {valid_collation}
    Create database 'testdb' in the server 'testsvr' with the default parameters.: az mysql db create -g testgroup -s testsvr -n testdb
