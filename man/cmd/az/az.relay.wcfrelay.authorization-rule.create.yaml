# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create Authorization Rule for the given Relay Service WCF Relay.
flags:
    --namespace-name=!: Name of Namespace.
    --relay-name=!: Name of WCF Relay.
    --rights=:
        description: The rights associated with the rule.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of WCF Relay Authorization Rule.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of WCF Relay Authorization Rule.
        namespace-name: Name of Namespace.
        relay-name: Name of WCF Relay.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rights: The rights associated with the rule.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create Authorization Rule for WCF Relay: az relay wcfrelay authorization-rule create --resource-group myresourcegroup --namespace- name mynamespace --relay-name myrelay --name myauthorule --rights Listen
