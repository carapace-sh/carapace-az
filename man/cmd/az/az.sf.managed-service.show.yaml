# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets a Service Fabric managed service resource.
flags:
    --application=!: Specify the name of the service.
    --name=!: Specify the name of the service.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    command: Get a service.
    flag:
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name. --name --service-name Specify the name of the service.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the properties of a managed service on an Azure Service Fabric managed cluster.: az sf managed-service show -g testRG -c testCluster --application-name testApp --service-name testService
