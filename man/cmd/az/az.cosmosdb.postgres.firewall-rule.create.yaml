# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new cluster firewall rule or updates an existing cluster firewall rule.
flags:
    --cluster-name=!: The name of the cluster.
    --end-ip-address=!: The end IP address of the cluster firewall rule.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --start-ip-address=!: The start IP address of the cluster firewall rule.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the cluster firewall rule.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: The name of the cluster.
        end-ip-address: The end IP address of the cluster firewall rule. Must be IPv4 format.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        start-ip-address: The start IP address of the cluster firewall rule. Must be IPv4 format.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a firewall rule of the cluster: az cosmosdb postgres firewall-rule create -n "rule1" --start-ip-address "0.0.0.0" --end-ip-address "255.255.255.255" --cluster-name "test-cluster" -g "testGroup" --subscription "ffffffff-ffff-ffff-ffff-ffffffffffff"
