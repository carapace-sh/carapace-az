# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update encryption properties of a Recovery Services Vault.
flags:
    --encryption-key-id=!: The encryption key id you want to use for encryption
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --infrastructure-encryption=: Use this parameter to enable/disable infrastructure encryption.
    --mi-system-assigned=: Provide this flag to use system assigned identity for encryption.
    --mi-user-assigned=: UserAssigned Identity Id to be used for CMK encryption, this will be applicable for encryption using userassigned identity
    --subscription=: Name or ID of subscription.
    --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Recovery services vault.
completion:
    flag:
        infrastructure-encryption:
            - Enabled
            - Disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        encryption-key-id: The encryption key id you want to use for encryption.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        infrastructure-encryption: |-
            Use this parameter to enable/disable infrastructure encryption. This must be set when configuring encryption of the vault for the first time. Once enabled/disabled, infrastructure encryption setting cannot be changed. Default value: Disabled. Allowed values: Enabled, Disabled.

            Accepted values: Disabled, Enabled
        mi-system-assigned: Provide this flag to use system assigned identity for encryption.
        mi-user-assigned: UserAssigned Identity Id to be used for CMK encryption, this will be applicable for encryption using userassigned identity.
        name: Name of the Recovery services vault.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tenant-id: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
examples:
    Update encryption properties to use system assigned identity of a Recovery Services Vault.: az backup vault encryption update --encryption-key-id MyEncryptionKeyId --mi-system-assigned --resource-group MyResourceGroup --name MyVault
    Update encryption properties to use user assigned identity of a Recovery Services Vault.: az backup vault encryption update --encryption-key-id MyEncryptionKeyId --mi-user-assigned MyUserAssignedIdentityId --resource-group MyResourceGroup --name MyVault
