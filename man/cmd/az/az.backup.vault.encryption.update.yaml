# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update encryption properties of a Recovery Services Vault.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        infrastructure-encryption: 'Use this parameter to enable/disable infrastructure encryption. This must be set when configuring encryption of the vault for the first time. Once enabled/disabled, infrastructure encryption setting cannot be changed. Default value: Disabled. Allowed values: Enabled, Disabled'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --encryption-key-id=!: The encryption key id you want to use for encryption
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --infrastructure-encryption=: Use this parameter to enable/disable infrastructure encryption.
    --mi-system-assigned=: Provide this flag to use system assigned identity for encryption.
    --mi-user-assigned=: UserAssigned Identity Id to be used for CMK encryption, this will be applicable for encryption using userassigned identity
    --subscription=: Name or ID of subscription.
    --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Recovery services vault.
completion:
    flag:
        infrastructure-encryption:
            - Enabled
            - Disabled
