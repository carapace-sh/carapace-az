# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a load balancing rule.
flags:
    --backend-pool-name=: ID or name of the backend address pools.
    --backend-port=!: The port used for internal connections on the endpoint.
    --floating-ip=:
        description: Configures a virtual machine's endpoint for the floating IP capability required to configure a SQL AlwaysOn Availability Group.
        nargs: -1
    --frontend-ip=: The name of ID of the frontend IP configuration.
    --frontend-port=!: The port for the external endpoint.
    --lb-name=!: The load balancer name.
    --load-distribution=: The load distribution policy for this rule.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --probe=: The ID or Name of an existing probe to associate with this rule.
    --protocol=!: The reference to the transport protocol used by the load balancing rule.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the load balancing rule.
completion:
    flag:
        floating-ip:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        load-distribution:
            - Default
            - SourceIP
            - SourceIPProtocol
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - All
            - Tcp
            - Udp
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backend-pool-name: ID or name of the backend address pools. If only one exists, omit to use as default.
        backend-port: The port used for internal connections on the endpoint. Acceptable values are between 0 and 65535. Note that value 0 enables "Any Port".
        change-reference: |-
            The related change reference ID for this resource operation.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        floating-ip: Configures a virtual machine's endpoint for the floating IP capability required to configure a SQL AlwaysOn Availability Group. This setting is required when using the SQL AlwaysOn Availability Groups in SQL server. This setting can't be changed after you create the endpoint.
        frontend-port: The port for the external endpoint. Port numbers for each rule must be unique within the Load Balancer. Acceptable values are between 0 and 65534. Note that value 0 enables "Any Port".
        lb-name: The load balancer name.
        load-distribution: |-
            The load distribution policy for this rule.

            Default value: Default

            Accepted values: Default, SourceIP, SourceIPProtocol
        name: The name of the load balancing rule.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        protocol: |-
            The reference to the transport protocol used by the load balancing rule.

            Accepted values: All, Tcp, Udp
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    ? Create a load balancing rule that assigns a front-facing IP configuration and port to an address pool and port with the floating ip feature.
    : az network cross-region-lb rule create -g MyResourceGroup --lb-name MyLb -n MyLbRule --protocol Tcp --frontend-ip-name MyFrontEndIp --frontend-port 80 --backend-pool-name MyAddressPool --backend-port 80 --floating-ip true
    Create a load balancing rule that assigns a front-facing IP configuration and port to an address pool and port.: az network cross-region-lb rule create -g MyResourceGroup --lb-name MyLb -n MyLbRule --protocol Tcp --frontend-ip-name MyFrontEndIp --frontend-port 80 --backend-pool-name MyAddressPool --backend-port 80
    ? Create an HA ports load balancing rule that assigns a frontend IP and port to use all available backend IPs in a pool on the same port.
    : az network cross-region-lb rule create -g MyResourceGroup --lb-name MyLb -n MyHAPortsRule --protocol All --frontend-port 0 --backend-port 0 --frontend-ip-name MyFrontendIp --backend-pool-name MyAddressPool
