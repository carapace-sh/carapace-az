# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes a Service Fabric node type.
flags:
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
    -n, --name=!: node type name.
documentation:
    command: Delete node type from a cluster.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name. --name --node-type-name -n Node type name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Delete cluster.: az sf managed-node-type delete -g testRG -c testCluster -n snt
