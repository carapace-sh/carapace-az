# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove an address pool of an IP configuration.
flags:
    --address-pool=!: The name or ID of an existing backend address pool.
    --gateway-name=: The name of an application gateway containing the address pool (Omit if supplying an address pool ID).
    --lb-name=: The name of the load balancer containing the address pool (Omit if supplying an address pool ID).
    --nic-name=!: The network interface (NIC).
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --ip-config-name=!: The name of the IP configuration.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        address-pool: The name or ID of an existing backend address pool.
        change-reference: The related change reference ID for this resource operation.
        gateway-name: The name of an application gateway containing the address pool (Omit if supplying an address pool ID).
        ip-config-name: The name of the IP configuration.
        lb-name: The name of the load balancer containing the address pool (Omit if supplying an address pool ID).
        nic-name: The network interface (NIC).
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Remove an address pool of an IP configuration.: |-
        az network nic ip-config address-pool remove -g MyResourceGroup --nic-name MyNic \
            -n MyIpConfig --address-pool MyAddressPool
    Remove an address pool of an IP configuration. (autogenerated): az network nic ip-config address-pool remove --address-pool MyAddressPool --ip-config-name MyIpConfig --lb-name MyLb --nic-name MyNic --resource-group MyResourceGroup
