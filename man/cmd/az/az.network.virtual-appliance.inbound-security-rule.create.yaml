# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the specified Network Virtual Appliance Inbound Security Rules.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        rule-type: Rule Type. This should be either AutoExpire or Permanent. Auto Expire Rule only creates NSG rules. Permanent Rule creates NSG rule and SLB LB Rule.
        rules: List of allowed rules.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --id=: Resource ID.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --nva-name=!: The name of the Network Virtual Appliance.
    --rule-type=: Rule Type.
    --rules=:
        description: List of allowed rules.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of security rule collection.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        rule-type:
            - AutoExpire
            - Permanent
