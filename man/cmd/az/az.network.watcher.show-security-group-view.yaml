# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-security-group-view
description: Get detailed security information on a VM for the currently configured network security group.
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --vm=!: Name or ID of the VM to target.
    -g, --resource-group=: Name of the resource group the target VM is in.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of the resource group the target VM is in.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm: Name or ID of the VM to target. If the name of the VM is provided, the `--resource-group` is required.
examples:
    Get the network security group information for the specified VM.: az network watcher show-security-group-view -g MyResourceGroup --vm MyVm
