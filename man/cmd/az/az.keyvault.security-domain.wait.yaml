# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: wait
description: Place the CLI in a waiting state until HSM security domain operation is finished.
flags:
    --hsm-name=: Name of the HSM.
    --id=: Full URI of the HSM.
    --subscription=: Name or ID of subscription.
    --target-operation=: Target operation that needs waiting.
completion:
    flag:
        target-operation:
            - download
            - upload
            - restore_blob
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        hsm-name: Name of the HSM. Can be omitted if --id is specified.
        id: Full URI of the HSM.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-operation: |-
            Target operation that needs waiting.

            Default value: upload

            Accepted values: download, restore_blob, upload
examples:
    Pause CLI until the security domain operation is finished.: az keyvault security-domain wait --hsm-name MyHSM
