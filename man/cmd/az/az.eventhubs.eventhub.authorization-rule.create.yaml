# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an AuthorizationRule for the specified Event Hub.
flags:
    --eventhub-name=!: The Event Hub name
    --namespace-name=!: The Namespace name
    --rights=:
        description: The rights associated with the rule.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The authorization rule name.
documentation:
    command: Create an AuthorizationRule for the specified Event Hub. Creation/update of the AuthorizationRule will take a few seconds to take effect.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        eventhub-name: The Event Hub name.
        namespace-name: The Namespace name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rights: The rights associated with the rule.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Creates Authorizationrule for the given Eventhub: az eventhub authorization-rule create --resource-group myresourcegroup --namespace-name mynamespace --eventhub-name myeventhub --name myauthorule --rights Listen
