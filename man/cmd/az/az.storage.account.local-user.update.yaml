# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update properties for a local user.
flags:
    --account-name=!: The storage account name.
    --has-shared-key=:
        description: Indicates whether shared key exists.
        nargs: -1
    --has-ssh-key=:
        description: Indicates whether ssh key exists.
        nargs: -1
    --has-ssh-password=:
        description: Indicates whether ssh password exists.
        nargs: -1
    --home-directory=: The home directory.
    --permission-scope=:
        description: 'The permission scope argument list which includes the permissions, service, and resource_name.The permissions can be a combination of the below possible values: Read(r), Write (w), Delete (d), List (l), and Create (c).'
        nargs: -1
    --ssh-authorized-key=:
        description: SSH authorized keys for SFTP.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --user-name=!: The name of local user.
completion:
    flag:
        has-shared-key:
            - "true"
            - "false"
        has-ssh-key:
            - "true"
            - "false"
        has-ssh-password:
            - "true"
            - "false"
documentation:
    flag:
        account-name: The storage account name. --name --user-name -n The name of local user. The username must contain lowercase letters and numbers only. It must be unique only within the storage account.
        acquire-policy-token: |-
            Acquiring an Azure Policy token automatically for this resource operation.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        extended-groups: Supplementary group membership. Only applicable for local users enabled for NFSv3 access.
        group-id: An identifier for associating a group of users.
        has-shared-key: |-
            Indicates whether shared key exists. Set it to false to remove existing shared key.

            Accepted values: false, true
        has-ssh-key: |-
            Indicates whether ssh key exists. Set it to false to remove existing SSH key.

            Accepted values: false, true
        has-ssh-password: |-
            Indicates whether ssh password exists. Set it to false to remove existing SSH password.

            Accepted values: false, true
        home-directory: The home directory.
        permission-scope: 'The permission scope argument list which includes the permissions, service, and resource_name.The permissions can be a combination of the below possible values: Read(r), Write (w), Delete (d), List (l), and Create (c). The service has possible values: blob, file. The resource-name is the container name or the file share name. Example: --permission-scope permissions=r service=blob resource-name=container1Can specify multiple permission scopes: --permission-scope permissions=rw service=blob resource-name=container1--permission-scope permissions=rwd service=file resource-name=share2.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        ssh-authorized-key: 'SSH authorized keys for SFTP. Includes an optional description and key. The key is the base64 encoded SSH public key , with format: ``` <keyType> <keyData> ``` e.g. ssh-rsa AAAABBBB.Example: --ssh_authorized_key description=description key="ssh-rsa AAAABBBB"or --ssh_authorized_key key="ssh-rsa AAAABBBB".'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-name: The name of local user. The username must contain lowercase letters and numbers only. It must be unique only within the storage account.
examples:
    Update a local-user with one permission scopes and no ssh-key: az storage account local-user update --account-name {account-name} -g {resource-group} -n {username} --permission-scope permissions=rw service=file resource-name=share2 --has-ssh-key false --group-id 2 --allow-acl-authorization false --extended-groups 3 4
