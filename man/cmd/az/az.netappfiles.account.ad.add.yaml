# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add an active directory to the account
documentation:
    flag:
        ad-name: Name of the active directory machine. This optional parameter is used only while creating kerberos volume
        administrators: Users to be added to the Built-in Administrators active directory group. A list of unique usernames without domain specifier  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        backup-operators: Users to be added to the Built-in Backup Operator active directory group. A list of unique usernames without domain specifier  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        kdc-ip: kdc server IP address for the active directory machine. This optional parameter is used only while creating kerberos volume.
        ldap-search-scope: LDAP Search scope options  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        preferred-servers-for-ldap-client: Comma separated list of IPv4 addresses of preferred servers for LDAP client. At most two comma separated IPv4 addresses can be passed.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        security-operators: Domain Users in the Active directory to be given SeSecurityPrivilege privilege (Needed for SMB Continuously available shares for SQL). A list of unique usernames without domain specifier  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        smb-server-name: NetBIOS name of the SMB server. This name will be registered as a computer account in the AD and used to mount volumes
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --active-directory-id=: Id of the Active Directory
    --ad-name=: Name of the active directory machine.
    --administrators=:
        description: Users to be added to the Built-in Administrators active directory group.
        nargs: -1
    --aes-encryption=:
        description: If enabled, AES encryption will be enabled for SMB communication.
        nargs: -1
    --allow-local-ldap-users=:
        description: If enabled, NFS client local users can also (in addition to LDAP users) access the NFS volumes.
        nargs: -1
    --backup-operators=:
        description: Users to be added to the Built-in Backup Operator active directory group.
        nargs: -1
    --dns=: Comma separated list of DNS server IP addresses (IPv4 only) for the Active Directory domain
    --domain=: Name of the Active Directory domain
    --encrypt-dc-conn=:
        description: If enabled, Traffic between the SMB server to Domain Controller (DC) will be encrypted.
        nargs: -1
    --kdc-ip=: kdc server IP address for the active directory machine.
    --ldap-over-tls=:
        description: Specifies whether or not the LDAP traffic needs to be secured via TLS.
        nargs: -1
    --ldap-search-scope=:
        description: LDAP Search scope options  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --ldap-signing=:
        description: Specifies whether or not the LDAP traffic needs to be signed.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --organizational-unit=: The Organizational Unit (OU) within the Windows Active Directory
    --password=: Plain text password of Active Directory domain administrator, value is masked in the response
    --security-operators=:
        description: Domain Users in the Active directory to be given SeSecurityPrivilege privilege (Needed for SMB Continuously available shares for SQL).
        nargs: -1
    --server-root-ca-cert=: When LDAP over SSL/TLS is enabled, the LDAP client is required to have base64 encoded Active Directory Certificate Service's self-signed root CA certificate, this optional parameter is used only for dual protocol with LDAP user-mapping volumes.
    --site=: The Active Directory site the service will limit Domain Controller discovery to
    --smb-server-name=: NetBIOS name of the SMB server.
    --subscription=: Name or ID of subscription.
    --username=: A domain user account with permission to create machine accounts
    -a, --name=!: The name of the NetApp account
    -g, --resource-group=!: Name of resource group.
    -p, --preferred-servers-for-ldap-client=: Comma separated list of IPv4 addresses of preferred servers for LDAP client.
completion:
    flag:
        aes-encryption:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        allow-local-ldap-users:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        encrypt-dc-conn:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        ldap-over-tls:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        ldap-signing:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
