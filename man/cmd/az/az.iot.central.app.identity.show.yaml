# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show the identity properties of an IoT Central application
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: IoT Central application name.
documentation:
    command: Show the identity properties of an IoT Central application.
    flag:
        name: IoT Central application name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show identity properties of an IoT Central application: az iot central app identity show --name my-iotc-app --resource-group MyResourceGroup
