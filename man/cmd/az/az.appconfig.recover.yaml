# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: recover
description: Recover a previously deleted, but not yet purged App Configuration store.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Resource group of the deleted App Configuration store.
    -l, --location=: Location of the deleted App Configuration store.
    -n, --name=!: Name of the App Configuration store.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: Location of the deleted App Configuration store. Can be viewed using command ``` az appconfig show-deleted ``` .
        name: Name of the App Configuration store. You can configure the default name using ``` az configure --defaults app_configuration_store=<name> ``` .
        resource-group: Resource group of the deleted App Configuration store.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Recover a deleted App Configuration store named 'sample-app-configuration'.: az appconfig recover --name sample-app-configuration
