# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a certificate issuer record.
flags:
    --account-id=: The issuer account id/username/etc.
    --disabled=:
        description: Set issuer to disabled state.
        nargs: -1
    --issuer-name=!: Certificate issuer name.
    --organization-id=: The organization id.
    --password=: The issuer account password/secret/etc.
    --provider-name=!: The certificate provider name.
    --subscription=: Name or ID of subscription.
    --vault-name=!: Name of the Vault.
completion:
    flag:
        disabled:
            - "true"
            - "false"
documentation:
    flag:
        account-id: The issuer account id/username/etc.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        disabled: |-
            Set issuer to disabled state.

            Accepted values: false, true
        issuer-name: Certificate issuer name.
        organization-id: The organization id.
        password: The issuer account password/secret/etc.
        provider-name: The certificate provider name. Must be registered with your tenant ID and in your region.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Vault.
examples:
    Create a certificate issuer in a Key Vault by specifying vault name, issuer name, and provider. (autogenerated): az keyvault certificate issuer create --vault-name cli-mock-kv-ct-is --issuer-name issuer1 --provider Test
