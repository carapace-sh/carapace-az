# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create Authorization Rule for given Relay Service Hybrid Connection.
flags:
    --hybrid-connection-name=!: Name of Hybrid Connection.
    --namespace-name=!: Name of Namespace.
    --rights=:
        description: Space-separated list of Authorization rule rights.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of Hybrid Connection Authorization Rule.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        hybrid-connection-name: Name of Hybrid Connection.
        name: Name of Hybrid Connection Authorization Rule.
        namespace-name: Name of Namespace.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rights: 'Space-separated list of Authorization rule rights. Allowed values: Listen, Manage, Send.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create Authorization Rule for given Relay Service Hybrid Connection: az relay hyco authorization-rule create --resource-group myresourcegroup --namespace-name mynamespace --hybrid-connection-name myhyco --name myauthorule --rights Send Listen
