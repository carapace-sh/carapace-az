# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: attach
description: Attach an unmanaged persistent disk to a VM.
flags:
    --caching=: Disk caching policy
    --lun=: 0-based logical unit number (LUN).
    --new=: Create a new disk.
    --subscription=: Name or ID of subscription.
    --vhd-uri=: Virtual hard disk URI.
    --vm-name=!: The name of the Virtual Machine.
    -g, --resource-group=!: Name of resource group.
    -n, --name=: The data disk name.
    -z, --size-gb=: size in GB.
completion:
    flag:
        caching:
            - None
            - ReadOnly
            - ReadWrite
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        caching: |-
            Disk caching policy.

            Accepted values: None, ReadOnly, ReadWrite
        change-reference: The related change reference ID for this resource operation.
        lun: 0-based logical unit number (LUN). Max value depends on the Virtual Machine size.
        name: The data disk name.
        new: |-
            Create a new disk.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        size-gb: |-
            Size in GB. Max size: 4095 GB (certain preview disks can be larger).

            Default value: 1023
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vhd-uri: 'Virtual hard disk URI. For example: ``` https://mystorage.blob.core.windows.net/vhds/d1.vhd ``` .'
        vm-name: The name of the Virtual Machine. You can configure the default using ``` az configure --defaults vm=<name> ``` .
examples:
    Attach a new default sized (1023 GB) unmanaged data disk to a VM.: az vm unmanaged-disk attach -g MyResourceGroup --vm-name MyVm --new
    Attach an existing data disk to a VM as unmanaged.: |-
        az vm unmanaged-disk attach -g MyResourceGroup --vm-name MyVm --name MyDataDisk \
            --vhd-uri https://mystorage.blob.core.windows.net/vhds/d1.vhd
    Attach an unmanaged persistent disk to a VM. (autogenerated): az vm unmanaged-disk attach --name MyDataDisk --new --resource-group MyResourceGroup --size-gb 50 --vm-name MyVm
