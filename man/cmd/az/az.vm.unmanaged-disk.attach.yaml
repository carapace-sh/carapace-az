# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: attach
description: Attach an unmanaged persistent disk to a VM.
documentation:
    flag:
        lun: 0-based logical unit number (LUN). Max value depends on the Virtual Machine size.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        size-gb: 'size in GB. Max size: 4095 GB (certain preview disks can be larger).'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vhd-uri: 'Virtual hard disk URI. For example: https://mystorage.blob.core.windows.net/vhds/d1.vhd'
        vm-name: The name of the Virtual Machine. You can configure the default using `az configure --defaults vm=<name>`
flags:
    --caching=: Disk caching policy
    --lun=: 0-based logical unit number (LUN).
    --new=: Create a new disk.
    --subscription=: Name or ID of subscription.
    --vhd-uri=: Virtual hard disk URI.
    --vm-name=!: The name of the Virtual Machine.
    -g, --resource-group=!: Name of resource group.
    -n, --name=: The data disk name.
    -z, --size-gb=: size in GB.
completion:
    flag:
        caching:
            - None
            - ReadOnly
            - ReadWrite
