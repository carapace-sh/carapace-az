# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show a policy exemption.
flags:
    --scope=: Scope to which this policy exemption applies.
    -g, --resource-group=: the resource group where the policy will be applied
    -n, --name=!: Name of the policy exemption.
documentation:
    command: Retrieve a policy exemption.
    flag:
        name: The name of the policy exemption.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scope: The scope of the policy assignment.
examples:
    Show a policy exemption: az policy exemption show --name MyPolicyExemption --resource-group "myResourceGroup"
