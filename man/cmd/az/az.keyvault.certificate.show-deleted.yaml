# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-deleted
description: Get a deleted certificate.
documentation:
    flag:
        id: The recovery id of the certificate. If specified all other 'Id' arguments should be omitted.
        name: Name of the certificate. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Vault. Required if --id is not specified.
flags:
    --id=: The recovery id of the certificate.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Vault.
    -n, --name=: Name of the certificate.
