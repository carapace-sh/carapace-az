# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: validate
description: Validate a backend for a static web app
flags:
    --backend-region=: Region of the backend resource.
    --backend-resource-id=!: Resource ID of the backend to link.
    --environment-name=: Name of the environment of static site
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the static site
documentation:
    command: Validate a backend for a static web app.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backend-region: Region of the backend resource.
        backend-resource-id: Resource ID of the backend to link.
        change-reference: The related change reference ID for this resource operation.
        environment-name: |-
            Name of the environment of static site.

            Default value: default
        name: Name of the static site.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Validate a backend for a static web app: az staticwebapp backends validate -n MyStaticAppName -g MyResourceGroup --backend-resource-id "/subscriptions/<subscription-id>/resourceGroups/<resource-group>/providers/<resource-provider>/<resource-type>/<backend-name>" --backend-region MyBackendRegion
    Validate a backend for a static web app environment: az staticwebapp backends validate -n MyStaticAppName -g MyResourceGroup --environment-name MyEnvironmentName --backend-resource-id "/subscriptions/<subscription-id>/resourceGroups/<resource-group>/providers/<resource-provider>/<resource-type>/<backend-name>" --backend-region MyBackendRegion
