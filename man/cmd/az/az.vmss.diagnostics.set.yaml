# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Enable diagnostics on a VMSS.
flags:
    --no-auto-upgrade-minor-version=:
        description: If set, the extension service will not automatically pick or upgrade to the latest minor version, even if the extension is redeployed.
        nargs: -1
    --protected-settings=: json string or a file path containing private configurations such as storage account keys, etc.
    --settings=!: json string or a file path, which defines data to be collected.
    --subscription=: Name or ID of subscription.
    --version=: version of the diagnostics extension.
    --vmss-name=!: Scale set name
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        no-auto-upgrade-minor-version:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        no-auto-upgrade: |-
            Option '--no-auto-upgrade' has been deprecated and will be removed in a future release. Use '--no-auto-upgrade-minor-version' instead. If set, the extension service will not automatically pick or upgrade to the latest minor version, even if the extension is redeployed.

            Default value: False

            Accepted values: false, true
        no-auto-upgrade-minor-version: |-
            If set, the extension service will not automatically pick or upgrade to the latest minor version, even if the extension is redeployed.

            Default value: False

            Accepted values: false, true
        protected-settings: Json string or a file path containing private configurations such as storage account keys, etc.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        settings: Json string or a file path, which defines data to be collected.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        version: Version of the diagnostics extension. Will use the latest if not specfied.
        vmss-name: Scale set name.
examples:
    Enable diagnostics on a VMSS. (autogenerated): 'az vmss diagnostics set --protected-settings {protected-settings} --resource-group MyResourceGroup --settings ''{"commandToExecute": "echo testing"}'' --vmss-name MyVmss'
