# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show all attributes of a key-value.
flags:
    --auth-mode=: This parameter can be used for indicating how a data operation is to be authorized.
    --connection-string=: Combination of access key and endpoint of the App Configuration store.
    --datetime=: 'Format: "YYYY-MM-DDThh:mm:ss["Z"/±hh:mm].'
    --endpoint=: If auth mode is "login", provide endpoint URL of the App Configuration store.
    --key=!: Key to be showed.
    --label=: If no label specified, show entry with null label.
    --subscription=: Name or ID of subscription.
    -n, --name=: Name of the App Configuration store.
completion:
    flag:
        auth-mode:
            - login
            - key
documentation:
    flag:
        auth-mode: This parameter can be used for indicating how a data operation is to be authorized. If the auth mode is "key", provide connection string or store name and your account access keys will be retrieved for authorization. If the auth mode is "login", provide the `--endpoint` or `--name` and your "az login" credentials will be used for authorization. You can configure the default auth mode using `az configure --defaults appconfig_auth_mode=<auth_mode>`. For more information, see https://learn.microsoft.com/azure/azure-app-configuration/concept-enable-rbac
        connection-string: Combination of access key and endpoint of the App Configuration store. Can be found using 'az appconfig credential list'. Users can preset it using ``` az configure --defaults appconfig_connection_string=<connection_string> ``` or environment variable with the name AZURE_APPCONFIG_CONNECTION_STRING.
        datetime: 'Format: "YYYY-MM-DDThh:mm:ss["Z"/±hh:mm]. If no time zone or offset specified, use UTC by default.'
        endpoint: If auth mode is "login" or "anonymous", provide endpoint URL of the App Configuration store. The endpoint can be retrieved using "az appconfig show" command. You can configure the default endpoint using ``` az configure --defaults appconfig_endpoint=<endpoint> ``` .
        key: Key to be showed.
        label: If no label specified, show entry with null label. Filtering is not supported.
        name: |-
            ``` and your "az login" credentials will be used for authorization. If the auth mode is "anonymous", provide the --endpoint that will be used for authorization. Anonymous mode is intended for custom endpoints only, such as the App Configuration emulator. You can configure the default auth mode using ``` az configure --defaults appconfig_auth_mode=<auth_mode> ``` . For more information, see https://learn.microsoft.com/azure/azure-app-configuration/concept-enable-rbac .

            Default value: key

            Accepted values: anonymous, key, login
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show a key-value using App Configuration store name with a specific label and datetime: az appconfig kv show -n MyAppConfiguration --key color --label MyLabel --datetime "2019-05-01T11:24:12Z"
    Show a key-value using connection string with label: az appconfig kv show --connection-string Endpoint=https://contoso.azconfig.io;Id=xxx;Secret=xxx --key color --label MyLabel
    Show a key-value using your 'az login' credentials.: az appconfig kv show --key color --auth-mode login --endpoint https://myappconfiguration.azconfig.io
