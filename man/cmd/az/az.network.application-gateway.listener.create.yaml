# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a listener.
flags:
    --frontend-ip=: Name or ID of the frontend IP configuration.
    --frontend-port=!: Name or ID of the frontend port.
    --gateway-name=!: Name of the application gateway.
    --host-names=:
        description: List of Server Name Indications(SNI) for TLS Multi-site Listener that allows special wildcard characters as well.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --ssl-cert=: Name or ID of the SSL certificate to use.
    --ssl-profile-id=: Name or ID of the SSL profile to use.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the listener.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        frontend-ip: Name or ID of the frontend IP configuration. If only one exists, omit to use as default.
        frontend-port: Name or ID of the frontend port.
        gateway-name: Name of the application gateway.
        host-names: List of Server Name Indications(SNI) for TLS Multi-site Listener that allows special wildcard characters as well.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: Name of the listener.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        ssl-cert: Name or ID of the SSL certificate to use.
        ssl-profile-id: Name or ID of the SSL profile to use.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a listener.: az network application-gateway listener create -g MyResourceGroup --gateway-name MyAppGateway --frontend-port MyFrontendPort -n MyListener --frontend-ip MyAppGatewayPublicIp
