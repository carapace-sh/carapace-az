# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add-record
description: Add an NS record.
documentation:
    flag:
        record-set-name: The name of the record set relative to the zone. Creates a new record set if one does not exist.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
flags:
    --if-none-match=: Create the record set only if it does not already exist.
    --ttl=: Record set TTL (time-to-live)
    -d, --nsdname=!: Name server domain name.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -s, --subscriptionid=: Subscription id to add name server record
    -z, --zone-name=!: The name of the zone.
