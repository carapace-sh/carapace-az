# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable
description: Enables ledger storage target
flags:
    --endpoint=!: The endpoint of a digest storage, which can be either an Azure Blob storage or a ledger in Azure Confidential Ledger.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Azure SQL Database.
    -s, --server=: Name of the Azure SQL Server.
documentation:
    command: Enable uploading ledger digests to an Azure Storage account or to Azure Confidential Ledger. If uploading ledger digests is already enabled, the cmdlet resets the digest storage endpoint to a new value.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        endpoint: The endpoint of a digest storage, which can be either an Azure Blob storage or a ledger in Azure Confidential Ledger.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the Azure SQL Database.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Enable uploading ledger digests to an Azure Blob storage.: az sql db ledger-digest-uploads enable --name mydb --resource-group MyResourceGroup --server myserver --endpoint https://mystorage.blob.core.windows.net
