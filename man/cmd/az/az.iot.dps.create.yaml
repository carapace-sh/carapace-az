# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Azure IoT Hub Device Provisioning Service instance.
flags:
    --enforce-data-residency=:
        description: Enforce data residency for this IoT Hub Device Provisioning Service by disabling cross geo-pair disaster recovery.
        nargs: -1
    --sku=: Pricing tier for the IoT Hub Device Provisioning Service.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --unit=: Units in your IoT Hub Device Provisioning Service.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location of your IoT Hub Device Provisioning Service.
    -n, --name=!: IoT Hub Device Provisioning Service name
completion:
    flag:
        enforce-data-residency:
            - "true"
            - "false"
        sku:
            - S1
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: |-
            The related change reference ID for this resource operation.

            Accepted values: false, true
        enforce-data-residency: Enforce data residency for this IoT Hub Device Provisioning Service by disabling cross geo-pair disaster recovery. This property is immutable once set on the resource. Only available in select regions. Learn more at https://aka.ms/dpsdr
        location: Location of your IoT Hub Device Provisioning Service. Default is the location of target resource group.
        mi-system-assigned: |-
            Enable system-assigned managed identity for this provisioning service.

            Accepted values: false, true
        mi-user-assigned: Enable user-assigned managed identities for this provisioning service. Accepts space-separated list of identity resource IDs. --ns-id --ns-resource-id Device Registry namespace resource ID to link to this provisioning service.
        name: IoT Hub Device Provisioning Service name.
        ns-identity-id: User-managed identity resource ID to access Device Registry namespace.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: |-
            Pricing tier for the IoT Hub Device Provisioning Service.

            Default value: S1

            Accepted values: S1
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        unit: |-
            Units in your IoT Hub Device Provisioning Service.

            Default value: 1
examples:
    ? Create an Azure IoT Hub Device Provisioning Service with data residency enforced. This will disable cross-region disaster recovery.
    : az iot dps create --name MyDps --resource-group MyResourceGroup --edr
    Create an Azure IoT Hub Device Provisioning Service with system identity and Device Registry namespace properties: az iot dps create --name MyDps --resource-group MyResourceGroup --mi-system-assigned --ns-resource-id NamespaceResourceId
    Create an Azure IoT Hub Device Provisioning Service with the standard pricing tier S1, in the 'eastus' region.: az iot dps create --name MyDps --resource-group MyResourceGroup --location eastus
    Create an Azure IoT Hub Device Provisioning Service with the standard pricing tier S1, in the region of the resource group.: az iot dps create --name MyDps --resource-group MyResourceGroup
    Create an Azure IoT Hub Device Provisioning Service with user-managed identity and Device Registry namespace properties: az iot dps create --name MyDps --resource-group MyResourceGroup --mi-user-assigned IdentityResourceId --ns-resource-id NamespaceResourceId --ns-identity-id IdentityResourceId
