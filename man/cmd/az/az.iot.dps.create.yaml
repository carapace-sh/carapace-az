# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Azure IoT Hub Device Provisioning Service instance.
documentation:
    flag:
        enforce-data-residency: Enforce data residency for this IoT Hub Device Provisioning Service by disabling cross geo-pair disaster recovery. This property is immutable once set on the resource. Only available in select regions. Learn more at https://aka.ms/dpsdr
        location: Location of your IoT Hub Device Provisioning Service. Default is the location of target resource group.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --enforce-data-residency=:
        description: Enforce data residency for this IoT Hub Device Provisioning Service by disabling cross geo-pair disaster recovery.
        nargs: -1
    --sku=: Pricing tier for the IoT Hub Device Provisioning Service.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --unit=: Units in your IoT Hub Device Provisioning Service.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location of your IoT Hub Device Provisioning Service.
    -n, --name=!: IoT Hub Device Provisioning Service name
completion:
    flag:
        enforce-data-residency:
            - "true"
            - "false"
        sku:
            - S1
