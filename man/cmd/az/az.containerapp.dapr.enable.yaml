# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable
description: Enable Dapr for a container app.
flags:
    --dapr-app-id=: The Dapr application identifier.
    --dapr-app-port=: The port Dapr uses to talk to the application.
    --dapr-app-protocol=: The protocol Dapr uses to talk to the application.
    --dapr-enable-api-logging=: Enable API logging for the Dapr sidecar.
    --dapr-http-max-request-size=: Increase max size of request body http and grpc servers parameter in MB to handle uploading of big files.
    --dapr-http-read-buffer-size=: Dapr max size of http header read buffer in KB to handle when sending multi-KB headers..
    --dapr-log-level=: Set the log level for the Dapr sidecar.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Containerapp.
completion:
    flag:
        dapr-app-protocol:
            - http
            - grpc
        dapr-log-level:
            - info
            - debug
            - warn
            - error
documentation:
    command: Enable Dapr for a container app. Updates existing values.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: |-
            The related change reference ID for this resource operation.

            Default value: False
        dapr-app-id: The Dapr application identifier.
        dapr-app-port: The port Dapr uses to talk to the application.
        dapr-app-protocol: |-
            The protocol Dapr uses to talk to the application.

            Accepted values: grpc, http
        dapr-log-level: |-
            Set the log level for the Dapr sidecar.

            Accepted values: debug, error, info, warn
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Enable Dapr for a container app.: az containerapp dapr enable -n my-containerapp -g MyResourceGroup --dapr-app-id my-app-id --dapr-app-port 8080
