# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all private endpoint connections associated with a HSM.
flags:
    --hsm-name=!: Name of the HSM.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Proceed only if Key Vault belongs to the specified resource group.
documentation:
    flag:
        hsm-name: Name of the HSM.
        resource-group: Name of resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all private endpoint connections associated with a HSM using hsm name.: az keyvault private-endpoint-connection list -g myrg --hsm-name myhsm
