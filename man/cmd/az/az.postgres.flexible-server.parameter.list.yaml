# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all the configurations in a given server.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -s, --server-name=!: Name of the server.
documentation:
    command: List the parameter values for a flexible server.
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List the parameter values for a flexible server in table format.: az postgres flexible-server parameter list --resource-group testgroup --server-name servername --output table
    List the parameter values for a flexible server.: az postgres flexible-server parameter list --resource-group testgroup --server-name servername
