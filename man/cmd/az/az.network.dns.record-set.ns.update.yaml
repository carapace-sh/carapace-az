# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an NS record set.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --if-match=: Etag of the record set.
    --if-none-match=: Set to `*` to allow a new record set to be created, but to prevent updating an existing record set.
    --metadata=:
        description: Metadata in space-separated key=value pairs.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --target-resource=: ID of an Azure resource from which the DNS resource value is taken.
    --tm-profile=: A reference to an Azure Traffic Manager Profile resource from where the DNS resource value is taken.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the record set, relative to the name of the zone.
    -z, --zone-name=: Name of the DNS zone.
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        if-match: Etag of the record set. Omit this value to always overwrite the current record set. Specify the last-seen etag value to prevent accidentally overwriting any concurrent changes.
        if-none-match: Set to ``` * ``` to allow a new record set to be created, but to prevent updating an existing record set. Other values will be ignored.
        metadata: Metadata in space-separated key=value pairs. This overwrites any existing metadata.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: Name of the record set, relative to the name of the zone.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-resource: ID of an Azure resource from which the DNS resource value is taken. --tm-profile --traffic-management-profile Experimental A reference to an Azure Traffic Manager Profile resource from where the DNS resource value is taken.
        zone-name: Name of the DNS zone.
examples:
    Update an NS record set.: az network dns record-set ns update -g MyResourceGroup -z www.mysite.com -n MyRecordSet --metadata owner=WebTeam
