# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new link between resources.
flags:
    --link=!: Fully-qualified resource ID of the resource link.
    --notes=: Notes for the link.
    --subscription=: Name or ID of subscription.
    --target=!: Fully-qualified resource ID of the resource link target.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        link: 'Fully-qualified resource ID of the resource link. Format: /subscriptions/{SubID}/resourceGroups/{ResourceGroupID}/providers/{ProviderNamespace}/{ResourceType}/{ResourceName}/providers/Microsoft.Resources/links/{LinkName}.'
        notes: Notes for the link.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target: Fully-qualified resource ID of the resource link target.
examples:
    Create a link from {SourceID} to {ResourceID} with notes: az resource link create --link {SourceID} --target {ResourceID} --notes "SourceID depends on ResourceID"
