# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all deployment stacks in management group
flags:
    --subscription=: Name or ID of subscription.
    -m, --management-group-id=!: The management group id to create stack at.
documentation:
    command: List all deployment stacks in management group.
    flag:
        management-group-id: The management group id to create stack at.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all stacks: az stack mg list --management-group-id myMg
