# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List role definitions.
flags:
    --is-built-in=:
        description: Is a Synapse Built-In Role or not.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
completion:
    flag:
        is-built-in:
            - "true"
            - "false"
documentation:
    flag:
        is-built-in: |-
            Is a Synapse Built-In Role or not.

            Accepted values: false, true
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    List role definitions built-in by Synapse.: az synapse role definition list --workspace-name testsynapseworkspace --is-built-in True
    List role definitions.: az synapse role definition list --workspace-name testsynapseworkspace
