# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the details of Azure resource consumption, either as an invoice or within a billing period.
flags:
    --max-items=: Total number of items to return in the command's output.
    --next-token=: Token to specify where to start paginating.
    --subscription=: Name or ID of subscription.
    -a, --include-additional-properties=:
        description: Include additional properties in the usages.
        nargs: -1
    -e, --end-date=: End date (YYYY-MM-DD in UTC).
    -m, --include-meter-details=:
        description: Include meter details in the usages.
        nargs: -1
    -p, --billing-period-name=: Name of the billing period to get the usage details that associate with.
    -s, --start-date=: Start date (YYYY-MM-DD in UTC).
    -t, --top=: Maximum number of items to return.
documentation:
    command: |-
        Command group 'consumption' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        billing-period-name: Name of the billing period to get the usage details that associate with.
        end-date: End date (YYYY-MM-DD in UTC). If specified, also requires --start-date.
        include-additional-properties: Include additional properties in the usages.
        include-meter-details: Include meter details in the usages.
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        start-date: Start date (YYYY-MM-DD in UTC). If specified, also requires --end-date.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        top: 'Maximum number of items to return. Value range: 1-1000.'
