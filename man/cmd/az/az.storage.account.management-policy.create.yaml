# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the data policy rules associated with the specified storage account.
flags:
    --account-name=!: The name of the storage account within the specified resource group.
    --policy=!: The Storage Account ManagementPolicies Rules, in JSON format.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        account-name: The name of the storage account within the specified resource group.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        policy: 'The Storage Account ManagementPolicies Rules, in JSON format. See more details in: https://learn.microsoft.com/azure/storage/common/storage-lifecycle-managment-concepts .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create the data policy rules associated with the specified storage account. (autogenerated): az storage account management-policy create --account-name myaccount --policy @policy.json --resource-group myresourcegroup
