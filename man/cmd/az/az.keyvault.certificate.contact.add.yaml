# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a contact to the specified vault to receive notifications of certificate operations.
flags:
    --email=!: Contact e-mail address.
    --name=: Full contact name.
    --phone=: Contact phone number.
    --subscription=: Name or ID of subscription.
    --vault-name=!: Name of the Vault.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        email: Contact e-mail address. Must be unique.
        name: Full contact name.
        phone: Contact phone number.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Vault.
examples:
    Add a certificate contact with the specified email to the Key Vault. (autogenerated): az keyvault certificate contact add --vault-name cli-mock-kv-ct-co --email other@contoso.com
