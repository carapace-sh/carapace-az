# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an option from an existing content key policy.
flags:
    --add-alt-token-key-type=: The type of the token key to be used for the alternate verification key.
    --add-alt-token-key=: Creates an alternate token key with either a string (for symmetric key) or a filepath to a certificate (x509) or public key (rsa).
    --ask=: The key that must be used as FairPlay Application Secret Key, which is a 32 character hex string.
    --audience=: The audience for the token.
    --fair-play-pfx-password=: The password encrypting FairPlay certificate in PKCS 12 (pfx) format.
    --fair-play-pfx=: The filepath to a FairPlay certificate file in PKCS 12 (pfx) format (including private key).
    --fp-playback-duration-seconds=: Playback duration
    --fp-storage-duration-seconds=: Storage duration
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --issuer=: The token issuer.
    --open-id-connect-discovery-document=: The OpenID connect discovery document.
    --play-ready-template=: JSON PlayReady license template.
    --policy-option-id=!: The content key policy option identifier.
    --policy-option-name=: The content key policy option name.
    --rental-and-lease-key-type=: The rental and lease key type.
    --rental-duration=: The rental duration.
    --subscription=: Name or ID of subscription.
    --token-claims=:
        description: Space-separated required token claims in '[key=value]' format.
        nargs: -1
    --token-key-type=: The type of the token key to be used for the primary verification key.
    --token-key=: Either a string (for symmetric key) or a filepath to a certificate (x509) or public key (rsa).
    --token-type=: The type of token.
    --widevine-template=: JSON Widevine license template.
    -a, --account-name=: The name of the Azure Media Services account.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The content key policy name.
documentation:
    flag:
        account-name: The name of the Azure Media Services account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add-alt-token-key: Creates an alternate token key with either a string (for symmetric key) or a filepath to a certificate (x509) or public key (rsa). Must be used in conjunction with --add-alt-token-key-type.
        add-alt-token-key-type: 'The type of the token key to be used for the alternate verification key. Allowed values: Symmetric, RSA, X509.'
        ask: The key that must be used as FairPlay Application Secret Key, which is a 32 character hex string.
        audience: The audience for the token.
        change-reference: The related change reference ID for this resource operation.
        fair-play-pfx: The filepath to a FairPlay certificate file in PKCS 12 (pfx) format (including private key).
        fair-play-pfx-password: The password encrypting FairPlay certificate in PKCS 12 (pfx) format.
        fp-playback-duration-seconds: Playback duration.
        fp-storage-duration-seconds: Storage duration.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        issuer: The token issuer.
        name: The content key policy name.
        open-id-connect-discovery-document: The OpenID connect discovery document.
        play-ready-template: JSON PlayReady license template. Use @{file} to load from a file.
        policy-option-id: The content key policy option identifier. This value can be obtained from "policyOptionId" property by running a show operation on a content key policy resource.
        policy-option-name: The content key policy option name.
        rental-and-lease-key-type: 'The rental and lease key type. Available values: Undefined, DualExpiry, PersistentUnlimited, PersistentLimited.'
        rental-duration: The rental duration. Must be greater than or equal to 0.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        token-claims: Space-separated required token claims in '[key=value]' format.
        token-key: Either a string (for symmetric key) or a filepath to a certificate (x509) or public key (rsa). Must be used in conjunction with --token-key-type.
        token-key-type: 'The type of the token key to be used for the primary verification key. Allowed values: Symmetric, RSA, X509.'
        token-type: 'The type of token. Allowed values: Jwt, Swt.'
        widevine-template: JSON Widevine license template. Use @{file} to load from a file.
examples:
    Update an existing content-key-policy by adding an alternate token key to an existing option.: az ams content-key-policy option update -n contentKeyPolicyName -g resourceGroup -a amsAccount --policy-option-id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx --add-alt-token-key tokenKey --add-alt-token-key-type Symmetric
