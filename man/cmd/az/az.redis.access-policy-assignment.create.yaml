# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Add an Access Policy Assignment (Redis User) to the Redis Cache
flags:
    --access-policy-name=!: The name of the access policy that is being assigned
    --object-id-alias=!: User friendly name for object id.
    --object-id=!: Object Id to assign access policy to
    --policy-assignment-name=!: The name of the access policy assignment
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the Redis cache.
documentation:
    command: Add an Access Policy Assignment (Redis User) to the Redis Cache.
    flag:
        access-policy-name: The name of the access policy that is being assigned.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the Redis cache.
        object-id: Object Id to assign access policy to.
        object-id-alias: User friendly name for object id. Also represents username for token based authentication.
        policy-assignment-name: The name of the access policy assignment.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Configure Redis User for role based access control: az redis access-policy-assignment create -g testResourceGroup -n testCacheName --object-id 932b5c60-66e4-4fbf-b8b0-xxxxxxxxxxxx --object-id-alias testAlias --access-policy-name testAccessPolicy --policy-assignment-name testAccessPolicyAssignment
