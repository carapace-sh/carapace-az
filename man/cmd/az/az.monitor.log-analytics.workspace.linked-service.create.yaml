# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a linked service.
documentation:
    flag:
        name: 'Name of the linkedServices resource. Supported values: cluster, automation.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        resource-id: The resource id of the resource that will be linked to the workspace. This should be used for linking resources which require read access
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        write-access-resource-id: The resource id of the resource that will be linked to the workspace. This should be used for linking resources which require write access
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --resource-id=: The resource id of the resource that will be linked to the workspace.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    --workspace-name=!: The name of the workspace.
    --write-access-resource-id=: The resource id of the resource that will be linked to the workspace.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the linkedServices resource.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
