# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a linked service.
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --resource-id=: The resource id of the resource that will be linked to the workspace.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    --workspace-name=!: The name of the workspace.
    --write-access-resource-id=: The resource id of the resource that will be linked to the workspace.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the linkedServices resource.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: 'Name of the linkedServices resource. Supported values: cluster, automation.'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-id: The resource id of the resource that will be linked to the workspace. This should be used for linking resources which require read access.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        workspace-name: The name of the workspace.
        write-access-resource-id: The resource id of the resource that will be linked to the workspace. This should be used for linking resources which require write access.
examples:
    Create a linked service.: az monitor log-analytics workspace linked-service create -g MyResourceGroup -n cluster --workspace-name MyWorkspace --write-access-resource-id /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyResourceGroup/providers/Microsoft.OperationalInsights/clusters/MyCluster
