# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a managed service correlation scheme.
flags:
    --application=!: Specify the name of the service.
    --correlated-service-name=!: Specify the Arm Resource ID of the service that the correlation relationship is established with.
    --name=!: Specify the name of the service.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name. --correlated-name --correlated-service-name Specify the Arm Resource ID of the service that the correlation relationship is established with. --name --service-name Specify the name of the service.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Delete managed service correlation scheme.: |-
        az sf managed-service correlation-scheme delete -g testRG -c testCluster --application-name testApp --service-name testService \
          --correlated-service-name "/subscriptions/00000000-0000-0000-0000-000000000000/resourcegroups/testRg/providers/Microsoft.ServiceFabric/managedclusters/testCluster/applications/testApp/services/testService2"
