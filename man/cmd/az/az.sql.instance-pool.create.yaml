# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a new instance pool
flags:
    --license-type=: The license type to apply for this instance pool.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subnet=!: Name or ID of the subnet that allows access to an Instance Pool.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vnet-name=: The virtual network name
    -c, --capacity=!: Capacity of the instance pool in vcores.
    -e, --tier=!: The edition component of the sku.
    -f, --family=!: The compute generation component of the sku.
    -g, --resource-group=!: Name of resource group.
    -l, --location=!: Location.
    -m, --maint-config-id=: Assign maintenance configuration to this managed instance.
    -n, --name=!: Instance Pool Name
completion:
    flag:
        license-type:
            - LicenseIncluded
            - BasePrice
documentation:
    command: |-
        Command group 'sql instance-pool' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        capacity: Capacity of the instance pool in vcores.
        change-reference: The related change reference ID for this resource operation.
        family: 'The compute generation component of the sku. Allowed value: Gen5.'
        license-type: |-
            The license type to apply for this instance pool.

            Accepted values: BasePrice, LicenseIncluded
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        maint-config-id: Assign maintenance configuration to this managed instance.
        name: Instance Pool Name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subnet: Name or ID of the subnet that allows access to an Instance Pool. If subnet name is provided, --vnet-name must be provided.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tier: 'The edition component of the sku. Allowed value: GeneralPurpose.'
        vnet-name: The virtual network name.
examples:
    Example to create an instance pool (include --no-wait in the end to get an asynchronous experience): az sql instance-pool create -g resource_group_name -n instance_pool_name -l location --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} --license-type LicenseIncluded --capacity 8 -e GeneralPurpose -f Gen5 -m SQL_{Region}_{MaintenanceConfigName} --no-wait
    Example to create an instance pool with subnet name and vnet-name: az sql instance-pool create --license-type LicenseIncluded -l northcentralus -n myinstancepool -c 8 -e GeneralPurpose -f Gen5 -g billingPools --subnet mysubnetname --vnet-name myvnetname
