# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a new instance pool
documentation:
    flag:
        family: 'The compute generation component of the sku. Allowed value: Gen5'
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subnet: Name or ID of the subnet that allows access to an Instance Pool. If subnet name is provided, --vnet-name must be provided.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tier: 'The edition component of the sku. Allowed value: GeneralPurpose.'
flags:
    --license-type=: The license type to apply for this instance pool.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subnet=!: Name or ID of the subnet that allows access to an Instance Pool.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vnet-name=: The virtual network name
    -c, --capacity=!: Capacity of the instance pool in vcores.
    -e, --tier=!: The edition component of the sku.
    -f, --family=!: The compute generation component of the sku.
    -g, --resource-group=!: Name of resource group.
    -l, --location=!: Location.
    -m, --maint-config-id=: Assign maintenance configuration to this managed instance.
    -n, --name=!: Instance Pool Name
completion:
    flag:
        license-type:
            - LicenseIncluded
            - BasePrice
