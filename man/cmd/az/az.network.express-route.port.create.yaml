# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an ExpressRoute port.
flags:
    --bandwidth=:
        description: Bandwidth of the circuit.
        nargs: -1
    --billing-type=: The billing type of the ExpressRoutePort resource.
    --encapsulation=: Encapsulation method on physical ports.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --peering-location=: The name of the peering location that the port is mapped to physically.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: ExpressRoute port name.
completion:
    flag:
        billing-type:
            - MeteredData
            - UnlimitedData
        encapsulation:
            - Dot1Q
            - QinQ
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        bandwidth: 'Bandwidth of the circuit. Usage: INT {Mbps,Gbps}. Defaults to Mbps.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        billing-type: |-
            The billing type of the ExpressRoutePort resource.

            Accepted values: MeteredData, UnlimitedData
        change-reference: The related change reference ID for this resource operation.
        encapsulation: |-
            Encapsulation method on physical ports.  Allowed values: Dot1Q, QinQ.

            Accepted values: Dot1Q, QinQ
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: ExpressRoute port name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        peering-location: The name of the peering location that the port is mapped to physically.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
examples:
    Create an ExpressRoute port. (autogenerated): az network express-route port create --bandwidth 200 --encapsulation Dot1Q --location westus2 --name MyExpressRoutePort --peering-location westus --resource-group MyResourceGroup
