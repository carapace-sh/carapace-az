# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: export
description: Gets the details of the API specified by its identifier in the format specified
documentation:
    flag:
        api-id: 'API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number. Regex pattern: ^[^*#&+:<>?]+$'
        resource-group: The name of the resource group. The name is case insensitive.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --api-id=!: API identifier.
    --export-format=!: Specify the format of the exporting API.
    --subscription=: Name or ID of subscription.
    -f, --file-path=: File path specified to export the API.
    -g, --resource-group=!: The name of the resource group.
    -n, --service-name=!: The name of the api management service instance
completion:
    flag:
        export-format:
            - WadlFile
            - SwaggerFile
            - OpenApiYamlFile
            - OpenApiJsonFile
            - WsdlFile
            - WadlUrl
            - SwaggerUrl
            - OpenApiYamlUrl
            - OpenApiJsonUrl
            - WsdlUrl
