# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: export
description: Gets the details of the API specified by its identifier in the format specified
flags:
    --api-id=!: API identifier.
    --export-format=!: Specify the format of the exporting API.
    --subscription=: Name or ID of subscription.
    -f, --file-path=: File path specified to export the API.
    -g, --resource-group=!: The name of the resource group.
    -n, --service-name=!: The name of the api management service instance
completion:
    flag:
        export-format:
            - WadlFile
            - SwaggerFile
            - OpenApiYamlFile
            - OpenApiJsonFile
            - WsdlFile
            - WadlUrl
            - SwaggerUrl
            - OpenApiYamlUrl
            - OpenApiJsonUrl
            - WsdlUrl
documentation:
    command: Export an API Management API.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api-id: |-
            API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number. Regex pattern: ^[^*#&+:<>?]+$.

            Accepted values: OpenApiJsonFile, OpenApiJsonUrl, OpenApiYamlFile, OpenApiYamlUrl, SwaggerFile, SwaggerUrl, WadlFile, WadlUrl, WsdlFile, WsdlUrl
        change-reference: The related change reference ID for this resource operation.
        file-path: File path specified to export the API.
        resource-group: The name of the resource group. The name is case insensitive.
        service-name: The name of the api management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Export an API Management API to a file or returns a response containing a link of the export.: az apim api export -g MyResourceGroup --service-name MyApim --api-id MyApi --export-format OpenApiJson --file-path path
