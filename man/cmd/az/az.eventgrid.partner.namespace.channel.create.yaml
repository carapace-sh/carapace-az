# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new channel for a partner namespace.
flags:
    --activation-expiration-date=: Date or datetime in UTC ISO 8601 format (e.g., '2022-02-17T01:59:59+00:00' or '2022-02-17') after which the channel and corresponding partner topic would expire and get auto deleted.
    --azure-active-directory-application-id-or-uri=: The Azure Active Directory Application ID or URI to get the access token that will be included as the bearer token in delivery requests.
    --azure-active-directory-tenant-id=: The Azure Active Directory Tenant ID to get the access token that will be included as the bearer token in delivery requests.
    --channel-type=!: The type of the event channel which represents the  direction flow of events.
    --destination-rg=!: Azure Resource Group of the subscriber requesting the creation of the channel resource by the publisher.
    --destination-sub-id=!: Azure subscription Id of the subscriber requesting the creation of the channel resource by the publisher.
    --endpoint-service-context=: Endpoint context associated with this partner destination.
    --endpoint-url=: The URL that represents the endpoint of the partner destination.
    --event-type-kind=: The kind of event type used.
    --inline-event-type=:
        description: Add inline event type info.
        nargs: -1
    --message-for-activation=: Context or helpful message that can be used during the approval process.
    --partner-destination-name=: Name of the partner destination.
    --partner-namespace-name=!: Name of the partner namespace.
    --partner-topic-name=: Name of the partner topic.
    --partner-topic-source=: The identifier of the resource that forms the partner source of the events.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the channel.
completion:
    flag:
        channel-type:
            - PartnerTopic
            - PartnerDestination
        event-type-kind:
            - inline
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        activation-expiration-date: Date or datetime in UTC ISO 8601 format (e.g., '2022-02-17T01:59:59+00:00' or '2022-02-17') after which the channel and corresponding partner topic would expire and get auto deleted. If this time is not specified, the expiration date is set to seven days by default.
        change-reference: The related change reference ID for this resource operation.
        channel-type: |-
            The type of the event channel which represents the  direction flow of events.

            Accepted values: PartnerDestination, PartnerTopic
        destination-rg: Azure Resource Group of the subscriber requesting the creation of the channel resource by the publisher. The corresponding partner resource (either partner topic or partner destination) associated with the channel resource will be created under this resource group.
        destination-sub-id: Azure subscription Id of the subscriber requesting the creation of the channel resource by the publisher. The corresponding partner resource (either partner topic or partner destination) associated with the channel resource will be created under this Azure subscription.
        endpoint-url: The URL that represents the endpoint of the partner destination.
        event-type-kind: |-
            The kind of event type used.

            Accepted values: inline
        inline-event-type: '``` argument. Usage:       --inline-event-type KEY [description={description}] [documentation-url={url}] [data-schema-url={url}] Example:     --inline-event-type event1 description="My inline event type." documentation-url=https://www.microsoft.com data-schema-url=https://www.microsoft.com.'
        message-for-activation: Context or helpful message that can be used during the approval process. --partner-destination-name --pr-dest-n Name of the partner destination.
        name: Name of the channel.
        partner-namespace-name: Name of the partner namespace.
        partner-topic-name: Name of the partner topic.
        partner-topic-source: The identifier of the resource that forms the partner source of the events. This represents a unique resource in the partner's resource model.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a new channel of type PartnerDestination with inline event types.: |-
        az eventgrid partner namespace channel create -g rg1 --name channel1 \
          --channel-type PartnerDestination --partner-namespace-name namespace1 \
          --partner-destination-name destination1 --destination-sub-id e14e31c8-0ce7-4ff5-be5b-dd2b2a3f3535 --destination-rg rg2
    Create a new channel of type PartnerTopic with inline event types.: |-
        az eventgrid partner namespace channel create -g rg1 --name channel1 \
          --channel-type PartnerTopic --partner-namespace-name namespace1 \
          --partner-topic-name topic1 \
           --destination-sub-id e14e31c8-0ce7-4ff5-be5b-dd2b2a3f3535 --destination-rg rg2 \
          --partner-topic-source /subscriptions/1b3b4501-23b9-4790-c31b-ddbd88d72123/resourceGroups/rg2/providers/Microsoft.Storage/storageAccounts/stgaccountname \
          --inline-event-type eventkey1 description="My event type." \
          --inline-event-type eventkey2 description="My second event type."
