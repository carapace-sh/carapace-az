# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: download
description: Get URL to download invoice
flags:
    --account-name=: The ID that uniquely identifies a billing account
    --download-token=: The download token with document source and document ID
    --download-urls=:
        description: Space-separated list of download urls for individual
        nargs: -1
    --invoice-name=: The ID that uniquely identifies an invoice
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        download-token: The download token with document source and document ID.
        download-urls: Space-separated list of download urls for individual.
        invoice-name: The ID that uniquely identifies an invoice.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a URL to download an invoice.: az billing invoice download --invoice-name "{invoiceName}" --download-token "{downloadToken}"
    ? Get a URL to download an invoice. The operation is supported for billing accounts with agreement type Microsoft Partner Agreement or Microsoft Customer Agreement.
    : az billing invoice download --account-name "{billingAccountName}" --invoice-name "{invoiceName}" --download-token "{downloadToken}"
    ? Get a URL to download an multiple invoices documents (invoice pdf, tax receipts, credit notes) as a zip file. The operation is supported for billing accounts with agreement type Microsoft Partner Agreement or Microsoft Customer Agreement.
    : az billing invoice download --account-name "{billingAccountName}" --download-urls "{ListOfDownloadURLs}"
    Get a URL to download multiple invoices documents (invoice pdf, tax receipts, credit notes) as a zip file.: az billing invoice download --download-urls "{ListOfDownloadURLs}"
