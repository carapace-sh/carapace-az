# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Set the active cloud.
flags:
    --profile=: Profile to use for this cloud
    -n, --name=!: Name of a registered cloud
completion:
    flag:
        profile:
            - latest
            - 2017-03-09-profile
            - 2018-03-01-hybrid
            - 2019-03-01-hybrid
            - 2020-09-01-hybrid
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of a registered cloud.
        profile: 'Profile to use for this cloud. The azure stack profiles ``` 2017-03-09-profile ``` ``` 2018-03-01-hybrid ``` ``` 2019-03-01-hybrid ``` and ``` 2020-09-01-hybrid ``` have been deprecated and removed. To continue using Azure Stack, please install the Azure CLI ``` 2.66.* ``` (LTS) version. For more details, refer to: https://learn.microsoft.com/en-us/cli/azure/whats-new-overview#important-notice-for-azure-stack-hub-customers .'
examples:
    Set the active cloud. (autogenerated): az cloud set --name MyRegisteredCloud
