# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete tags on a specific resource.
flags:
    --resource-id=: The resource identifier for the tagged entity.
    --subscription=: Name or ID of subscription.
    -n, --name=: The tag name.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The name of the tag to be deleted.
        resource-id: The resource identifier for the entity being tagged. A resource, a resource group or a subscription may be tagged.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": Do not prompt for confirmation.
examples:
    Delete a predefined tag from the subscription not associated with a resource or having no tag values.: az tag delete --name MyTag
    Delete the entire set of tags on a resource group.: az tag delete --resource-id /subscriptions/{sub-id}/resourcegroups/{rg}
    Delete the entire set of tags on a resource. (Even using --name along with --resource-id to specify a single tag): az tag delete --resource-id /subscriptions/{sub-id}/resourcegroups/{rg}/providers/Microsoft.Compute/virtualMachines/{vmName}
    Delete the entire set of tags on a subscription.: az tag delete --resource-id /subscriptions/{sub-id}
