# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Update a new delivery rule within the specified rule set.
flags:
    --actions=:
        description: A list of actions that are executed when all the conditions of a rule are satisfied.
        nargs: -1
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --conditions=:
        description: A list of conditions that must be matched for the actions to be executed  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --match-processing-behavior=: If this rule is a match should the rules engine continue running the remaining rules or stop.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --order=: The order in which the rules are applied for the endpoint.
    --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --rule-set-name=: Name of the rule set under the profile.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the delivery rule which is unique within the endpoint.
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        match-processing-behavior:
            - Continue
            - Stop
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
