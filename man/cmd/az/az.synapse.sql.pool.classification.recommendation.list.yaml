# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets sensitivity labels of a given SQL pool.
flags:
    --filter=: An OData filter expression that filters elements in the collection.
    --included-disabled=:
        description: Indicates whether the result should include disabled recommendations
        nargs: -1
    --skip-token=: An OData query option to indicate how many elements to skip in the collection.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The SQL pool name.
completion:
    flag:
        included-disabled:
            - "true"
            - "false"
documentation:
    command: List the recommended sensitivity classifications of a given SQL pool.
    flag:
        filter: An OData filter expression that filters elements in the collection. Default value is None.
        included-disabled: |-
            Indicates whether the result should include disabled recommendations.

            Accepted values: false, true
        name: The SQL pool name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        skip-token: An OData query option to indicate how many elements to skip in the collection. Default value is None.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    List the recommended sensitivity classifications of a given SQL pool.: |-
        az synapse sql pool classification recommendation list --name sqlpool --workspace-name testsynapseworkspace \
        --resource-group rg
