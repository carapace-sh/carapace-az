# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a test group along with new-added/existing endpoint and test configuration to a connection monitor.
documentation:
    flag:
        disable: 'Value indicating whether test group is disabled. false is  default.  Allowed values: false, true.'
        endpoint-dest-name: The name of the destination of connection monitor endpoint. If you are creating a V2 Connection Monitor, it's required.
        endpoint-source-name: The name of the source of connection monitor endpoint. If you are creating a V2 Connection Monitor, it's required.
        endpoint-source-resource-id: Resource ID of the source of connection monitor endpoint. If endpoint is intended to used as source, this option is required.
        frequency: 'The frequency of test evaluation, in seconds.  Default: 60.'
        http-path: The path component of the URI. For instance, "/dir1/dir2".
        http-valid-status-codes: Space-separated list of HTTP status codes to consider successful. For instance, '2xx 301-304 418'  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        https-prefer: 'Value indicating whether HTTPS is preferred over HTTP in cases where the choice is not explicit.  Allowed values: false, true.'
        icmp-disable-trace-route: 'Value indicating whether path evaluation with trace route should be disabled. false is default.  Allowed values: false, true.'
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        preferred-ip-version: The preferred IP version to use in test evaluation. The connection monitor may choose to use a different version depending on other parameters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tcp-disable-trace-route: 'Value indicating whether path evaluation with trace route should be disabled. false is default. Allowed values: false, true.'
        test-config-name: The name of the connection monitor test configuration. If you are creating a V2 Connection Monitor, it's required.
flags:
    --connection-monitor=!: Connection monitor name.
    --disable=:
        description: Value indicating whether test group is disabled.
        nargs: -1
    --endpoint-dest-address=: Address of the destination of connection monitor endpoint (IP or domain name)
    --endpoint-dest-name=!: The name of the destination of connection monitor endpoint.
    --endpoint-dest-resource-id=: Resource ID of the destination of connection monitor endpoint.
    --endpoint-source-address=: Address of the source of connection monitor endpoint (IP or domain name).
    --endpoint-source-name=!: The name of the source of connection monitor endpoint.
    --endpoint-source-resource-id=: Resource ID of the source of connection monitor endpoint.
    --frequency=: The frequency of test evaluation, in seconds.
    --http-method=: The HTTP method to use.
    --http-path=: The path component of the URI.
    --http-port=: The port to connect to.
    --http-valid-status-codes=:
        description: Space-separated list of HTTP status codes to consider successful.
        nargs: -1
    --https-prefer=:
        description: Value indicating whether HTTPS is preferred over HTTP in cases where the choice is not explicit.
        nargs: -1
    --icmp-disable-trace-route=:
        description: Value indicating whether path evaluation with trace route should be disabled.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --preferred-ip-version=: The preferred IP version to use in test evaluation.
    --protocol=: The protocol to use in test evaluation.
    --subscription=: Name or ID of subscription.
    --tcp-disable-trace-route=:
        description: Value indicating whether path evaluation with trace route should be disabled.
        nargs: -1
    --tcp-port=: The port to connect to.
    --test-config-name=!: The name of the connection monitor test configuration.
    --threshold-failed-percent=: The maximum percentage of failed checks permitted for a test to evaluate as successful.
    --threshold-round-trip-time=: The maximum round-trip time in milliseconds permitted for a test to evaluate as successful.
    -l, --location=!: Location.
    -n, --name=!: The name of the connection monitor test group.
completion:
    flag:
        disable:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        http-method:
            - Get
            - Post
        https-prefer:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        icmp-disable-trace-route:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        preferred-ip-version:
            - IPv4
            - IPv6
        protocol:
            - Http
            - Icmp
            - Tcp
        tcp-disable-trace-route:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
