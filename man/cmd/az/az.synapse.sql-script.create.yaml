# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create or update a SQL script.
flags:
    --additional-properties=: The SQL script additional properties
    --description=: The SQL script description
    --folder-name=: The folder that this SQL script is in.
    --no-wait=: Do not wait for the long-running operation to finish.
    --result-limit=: The SQL query results limit.
    --sql-database-name=: The SQL database name
    --sql-pool-name=: The SQL pool name
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -f, --file=!: The SQL query file path
    -n, --name=!: The SQL script name
completion:
    flag:
        result-limit:
            - "5000"
            - "-1"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        additional-properties: The SQL script additional properties.
        change-reference: The related change reference ID for this resource operation.
        description: The SQL script description.
        file: The SQL query file path.
        folder-name: 'The folder that this SQL script is in. If not specified, this SQL script will appear at the root level. Eg: folder/subfolder1.'
        name: The SQL script name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        result-limit: |-
            The SQL query results limit. Default is 5000. '-1' is no limit.

            Default value: 5000

            Accepted values: -1, 5000
        sql-database-name: The SQL database name.
        sql-pool-name: The SQL pool name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    Create a SQL script.: |-
        az synapse sql-script create --workspace-name testsynapseworkspace \
          --name testsqlscriptname \
          --file 'path/test.sql'
