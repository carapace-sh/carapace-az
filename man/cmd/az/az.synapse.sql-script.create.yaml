# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create or update a SQL script.
documentation:
    flag:
        folder-name: 'The folder that this SQL script is in. If not specified, this SQL script will appear at the root level. Eg: folder/subfolder1'
        result-limit: The SQL query results limit. Default is 5000. '-1' is no limit.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --additional-properties=: The SQL script additional properties
    --description=: The SQL script description
    --folder-name=: The folder that this SQL script is in.
    --no-wait=: Do not wait for the long-running operation to finish.
    --result-limit=: The SQL query results limit.
    --sql-database-name=: The SQL database name
    --sql-pool-name=: The SQL pool name
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -f, --file=!: The SQL query file path
    -n, --name=!: The SQL script name
completion:
    flag:
        result-limit:
            - "5000"
            - "-1"
