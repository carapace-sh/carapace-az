# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a federated identity credential under an existing user assigned identity.
flags:
    --audiences=:
        description: The aud value in the token sent to Azure for getting the user-assigned managed identity token.
        nargs: -1
    --identity-name=!: The name of the identity resource.
    --issuer=: The openId connect metadata URL of the issuer of the identity provider that Azure AD would use in the token exchange protocol for validating tokens before issuing a token as the user-assigned managed identity.
    --subject=: The sub value in the token sent to Azure AD for getting the user-assigned managed identity token.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the federated identity credential resource.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        audiences: The aud value in the token sent to Azure for getting the user-assigned managed identity token. The value configured in the federated credential and the one in the incoming token must exactly match for Azure to issue the access token.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        identity-name: The name of the identity resource.
        issuer: The openId connect metadata URL of the issuer of the identity provider that Azure AD would use in the token exchange protocol for validating tokens before issuing a token as the user-assigned managed identity.
        name: The name of the federated identity credential resource.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subject: The sub value in the token sent to Azure AD for getting the user-assigned managed identity token. The value configured in the federated credential and the one in the incoming token must exactly match for Azure AD to issue the access token. Either 'subject' or 'claimsMatchingExpression' must be defined, but not both.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a federated identity credential under a specific user assigned identity using claimsMatchingExpression.: az identity federated-credential update --identity-name myIdentityName --name myFicName --resource-group myResourceGroup --issuer myIssuer --claims-matching-expression-version 1 --claims-matching-expression-value "claims['sub'] eq 'foo'" --audiences myAudiences
    Update a federated identity credential under a specific user assigned identity using subject.: az identity federated-credential update --identity-name myIdentityName --name myFicName --resource-group myResourceGroup --issuer myIssuer --subject mySubject --audiences myAudiences
