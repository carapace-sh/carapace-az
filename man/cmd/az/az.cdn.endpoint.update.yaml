# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an existing CDN endpoint with the specified endpoint name under the specified subscription, resource group and profile.
flags:
    --content-types-to-compress=:
        description: List of content types on which compression applies.
        nargs: -1
    --default-origin-group=: The origin group to use for origins not explicitly included in an origin group.
    --delivery-policy=:
        description: A policy that specifies the delivery rules to be used for an endpoint.
        nargs: -1
    --enable-compression=:
        description: If compression is enabled, content will be served as compressed if user requests for a compressed version.
        nargs: -1
    --geo-filters=:
        description: List of rules defining the user's geo access within a CDN endpoint.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-http=:
        description: Disable HTTP traffic.Indicates whether HTTP traffic is not allowed on the endpoint.
        nargs: -1
    --no-https=:
        description: Indicates whether HTTPS traffic is not allowed on the endpoint.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --optimization-type=: Specifies what scenario the customer wants this CDN endpoint to optimize for, e.g. Download, Media services.
    --origin-host-header=: The host header value sent to the origin with each request.
    --origin-path=: A directory path on the origin that CDN can use to retrieve content from, e.g. contoso.cloudapp.net/originpath.
    --probe-path=: Path to a file hosted on the origin which helps accelerate delivery of the dynamic content and calculate the most optimal routes for the CDN.
    --profile-name=: Name of the CDN profile which is unique within the resource group.
    --query-string-caching-behavior=: Defines how CDN caches requests that include query strings.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Endpoint tags.
        nargs: -1
    --url-signing-keys=:
        description: List of keys used to validate the signed URL hashes.
        nargs: -1
    --web-application-firewall-policy-link=:
        description: Defines the Web Application Firewall policy for the endpoint (if applicable)  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the endpoint under the profile which is unique globally.
completion:
    flag:
        enable-compression:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-http:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-https:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        optimization-type:
            - DynamicSiteAcceleration
            - GeneralMediaStreaming
            - GeneralWebDelivery
            - LargeFileDownload
            - VideoOnDemandMediaStreaming
        query-string-caching-behavior:
            - BypassCaching
            - IgnoreQueryString
            - NotSet
            - UseQueryString
documentation:
    command: Update an existing CDN endpoint with the specified endpoint name under the specified subscription, resource group and profile. Only tags can be updated after creating an endpoint. To update origins, use the Update Origin operation. To update origin groups, use the Update Origin group operation. To update custom domains, use the Update Custom Domain operation.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        content-types-to-compress: List of content types on which compression applies. The value should be a valid MIME type.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        default-origin-group: The origin group to use for origins not explicitly included in an origin group. Can be specified as a resource ID or the name of an origin group of this endpoint.
        delivery-policy: A policy that specifies the delivery rules to be used for an endpoint.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        enable-compression: |-
            If compression is enabled, content will be served as compressed if user requests for a compressed version. Content won't be compressed on CDN when requested content is smaller than 1 byte or larger than 1 MB.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        geo-filters: List of rules defining the user's geo access within a CDN endpoint. Each geo filter defines an access rule to a specified path or content, e.g. block APAC for path /pictures/  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        no-http: |-
            Disable HTTP traffic.Indicates whether HTTP traffic is not allowed on the endpoint. Default is to allow HTTP traffic.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        no-https: |-
            Indicates whether HTTPS traffic is not allowed on the endpoint. Default is to allow HTTPS traffic.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        optimization-type: |-
            Specifies what scenario the customer wants this CDN endpoint to optimize for, e.g. Download, Media services. With this information, CDN can apply scenario driven optimization.

            Accepted values: DynamicSiteAcceleration, GeneralMediaStreaming, GeneralWebDelivery, LargeFileDownload, VideoOnDemandMediaStreaming
        origin-host-header: The host header value sent to the origin with each request. This property at Endpoint is only allowed when endpoint uses single origin and can be overridden by the same property specified at origin.If you leave this blank, the request hostname determines this value. Azure CDN origins, such as Web Apps, Blob Storage, and Cloud Services require this host header value to match the origin hostname by default.
        origin-path: A directory path on the origin that CDN can use to retrieve content from, e.g. contoso.cloudapp.net/originpath.
        probe-path: Path to a file hosted on the origin which helps accelerate delivery of the dynamic content and calculate the most optimal routes for the CDN. This is relative to the origin path. This property is only relevant when using a single origin.
        profile-name: Name of the CDN profile which is unique within the resource group.
        query-string-caching-behavior: |-
            Defines how CDN caches requests that include query strings. You can ignore any query strings when caching, bypass caching to prevent requests that contain query strings from being cached, or cache every request with a unique URL.

            Accepted values: BypassCaching, IgnoreQueryString, NotSet, UseQueryString
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Endpoint tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        url-signing-keys: List of keys used to validate the signed URL hashes.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        web-application-firewall-policy-link: Defines the Web Application Firewall policy for the endpoint (if applicable)  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Enable content compression for an endpoint.: az cdn endpoint update -g group -n endpoint --profile-name profile --enable-compression
    Turn off HTTP traffic for an endpoint.: az cdn endpoint update -g group -n endpoint --profile-name profile --no-http
