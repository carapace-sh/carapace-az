# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create or update an unlocked immutability policy.
documentation:
    flag:
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT.'
        allow-protected-append-writes: This property can only be changed for unlocked time-based retention policies. When enabled, new blocks can be written to an append blob while maintaining immutability protection and compliance. Only new blocks can be added and any existing blocks cannot be modified or deleted. This property cannot be changed with ExtendImmutabilityPolicy API.
        allow-protected-append-writes-all: This property can only be changed for unlocked time-based retention policies. When enabled, new blocks can be written to both 'Append and Block Blobs' while maintaining immutability protection and compliance. Only new blocks can be added and any existing blocks cannot be modified or deleted. This property cannot be changed with ExtendImmutabilityPolicy API. The 'allowProtectedAppendWrites' and 'allowProtectedAppendWritesAll' properties are mutually exclusive.
        if-match: An ETag value, or the wildcard character (*). Specify this header to perform the operation only if the resource's ETag matches the value specified.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-name=!: Storage account name.
    --allow-protected-append-writes-all=:
        description: This property can only be changed for unlocked time-based retention policies.
        nargs: -1
    --if-match=: An ETag value, or the wildcard character (*).
    --period=: The immutability period for the blobs in the container since the policy creation, in days.
    --subscription=: Name or ID of subscription.
    -c, --container-name=!: The container name.
    -g, --resource-group=: Name of resource group.
    -w, --allow-protected-append-writes=:
        description: This property can only be changed for unlocked time-based retention policies.
        nargs: -1
completion:
    flag:
        allow-protected-append-writes:
            - "true"
            - "false"
        allow-protected-append-writes-all:
            - "true"
            - "false"
