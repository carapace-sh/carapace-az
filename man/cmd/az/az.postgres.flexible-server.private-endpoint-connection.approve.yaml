# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: approve
description: Approve a private endpoint connection request for a server.
flags:
    --description=!: Comments for approve operation.
    --id=: The ID of the private endpoint connection associated with the Server.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the private endpoint connection associated with the Server.
    -s, --server-name=: Name of the Server.
documentation:
    command: Approve the specified private endpoint connection associated with a PostgreSQL flexible server.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: Comments for approve operation.
        id: The identifier of the private endpoint connection associated with the Server. If specified --server-name/-s and --name/-n, this should be omitted.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the private endpoint connection associated with the Server. Required if --id is not specified.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the Server. Required if --id is not specified
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Approve a private endpoint connection associated with a PostgreSQL flexible server.: az postgres flexible-server private-endpoint-connection approve -g testgroup -s testsvr         -n pec-connection.40e3d3a8-7d8f-41eb-8462-1cd05bc3e33b         --description "Approve connection"
