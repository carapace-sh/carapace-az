# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets the private link resources that need to be created for a storage account.
flags:
    --account-name=!: The name of the storage account within the specified resource group.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only. Required.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get the private link resources that need to be created for a storage account.: az storage account private-link-resource list --account-name mystorageaccount -g MyResourceGroup
