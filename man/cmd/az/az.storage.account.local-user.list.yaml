# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the local users associated with the storage account.
flags:
    --account-name=!: The storage account name.
    --filter=: Optional.
    --include=: Optional, when specified, will list local users enabled for the specific protocol.
    --maxpagesize=: Optional, specifies the maximum number of local users that will be included in the list response.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    command: List local users for a storage account.
    flag:
        account-name: The storage account name.
        filter: Optional. When specified, only local user names starting with the filter will be listed. Default value is None.
        include: |-
            When specified, will list local users enabled for the specific protocol. Lists all users by default. Default value is None.

            Accepted values: nfsv3
        maxpagesize: Optional, specifies the maximum number of local users that will be included in the list response. Default value is None.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List local-user for a storage account: az storage account local-user list --account-name {account-name} -g {resource-group}
    List local-user for a storage account with name starting with test and only returning 3 results: az storage account local-user list --account-name {account-name} -g {resource-group} --filter "startswith(name, test)" --maxpagesize 3
