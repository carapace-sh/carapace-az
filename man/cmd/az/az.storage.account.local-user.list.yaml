# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the local users associated with the storage account.
documentation:
    flag:
        filter: Optional. When specified, only local user names starting with the filter will be listed. Default value is None.
        include: Optional, when specified, will list local users enabled for the specific protocol. Lists all users by default. "nfsv3" Default value is None.
        maxpagesize: Optional, specifies the maximum number of local users that will be included in the list response. Default value is None.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-name=!: The storage account name.
    --filter=: Optional.
    --include=: Optional, when specified, will list local users enabled for the specific protocol.
    --maxpagesize=: Optional, specifies the maximum number of local users that will be included in the list response.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
