# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable-https
description: Enable HTTPS for a custom domain.
flags:
    --endpoint-name=!: Name of the parent endpoint.
    --min-tls-version=: The minimum TLS version required for the custom domain.
    --profile-name=!: Name of the parent profile.
    --subscription=: Name or ID of subscription.
    --user-cert-group-name=: The resource group of the KeyVault certificate
    --user-cert-protocol-type=: The protocol type of the certificate.
    --user-cert-secret-name=: The secret name of the KeyVault certificate
    --user-cert-secret-version=: The secret version of the KeyVault certificate, If not specified, the "Latest" version will always been used and the deployed certificate will be automatically rotated to the latest version when a newer version of the certificate is available.
    --user-cert-subscription-id=: The subscription id of the KeyVault certificate
    --user-cert-vault-name=: The vault name of the KeyVault certificate
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Resource name of the custom domain.
completion:
    flag:
        min-tls-version:
            - none
            - "1.0"
            - "1.2"
        user-cert-protocol-type:
            - sni
            - ip
documentation:
    command: Enable HTTPS for a custom domain. The resource name of the custom domain could be obtained using "az cdn custom-domain list".
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        endpoint-name: Name of the parent endpoint.
        min-tls-version: |-
            The minimum TLS version required for the custom domain.

            Accepted values: 1.0, 1.2, none
        name: Resource name of the custom domain.
        profile-name: Name of the parent profile.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-cert-group-name: The resource group of the KeyVault certificate.
        user-cert-protocol-type: |-
            The protocol type of the certificate.

            Accepted values: ip, sni
        user-cert-secret-name: The secret name of the KeyVault certificate.
        user-cert-secret-version: The secret version of the KeyVault certificate, If not specified, the "Latest" version will always been used and the deployed certificate will be automatically rotated to the latest version when a newer version of the certificate is available.
        user-cert-subscription-id: The subscription id of the KeyVault certificate.
        user-cert-vault-name: The vault name of the KeyVault certificate.
examples:
    Enable HTTPS for custom domain with resource name customdomain1 using a CDN-managed certificate: az cdn custom-domain enable-https -g group --profile-name profile --endpoint-name endpoint -n customdomain1
    ? Enable HTTPS for custom domain with resource name customdomain1 using a CDN-managed certificate and set the minimum TLS version to 1.2
    : az cdn custom-domain enable-https -g group --profile-name profile --endpoint-name endpoint -n customdomain1 --min-tls-version 1.2
