# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a container in a storage account.
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --auth-mode=: The mode in which to run the command.
    --blob-endpoint=: Storage data service endpoint.
    --connection-string=: Storage account connection string.
    --fail-on-exist=: Throw an exception if the container already exists.
    --metadata=:
        description: Metadata in space-separated key=value pairs.
        nargs: -1
    --public-access=: Specifies whether data in the container may be accessed publicly.
    --sas-token=: A Shared Access Signature (SAS).
    --subscription=: Name or ID of subscription.
    --timeout=: Request timeout in seconds.
    -d, --default-encryption-scope=: Default the container to use specified encryption scope for all writes.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The container name.
    -p, --prevent-encryption-scope-override=:
        description: Block override of encryption scope from the container default.
        nargs: -1
completion:
    flag:
        auth-mode:
            - login
            - key
        prevent-encryption-scope-override:
            - "true"
            - "false"
        public-access:
            - "off"
            - blob
            - container
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY.'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auth-mode: |-
            The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE.

            Accepted values: key, login
        blob-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with ``` az storage account show ``` . Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT.'
        change-reference: The related change reference ID for this resource operation.
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING.'
        default-encryption-scope: Default the container to use specified encryption scope for all writes.
        fail-on-exist: |-
            Throw an exception if the container already exists.

            Default value: False
        metadata: Metadata in space-separated key=value pairs. This overwrites any existing metadata.
        name: The container name.
        prevent-encryption-scope-override: |-
            Block override of encryption scope from the container default.

            Accepted values: false, true
        public-access: |-
            Specifies whether data in the container may be accessed publicly.

            Accepted values: blob, container, off
        resource-group: Argument 'resource_group_name' has been deprecated and will be removed in a future release. Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_SAS_TOKEN.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: Request timeout in seconds. Applies to each call to the service.
examples:
    Create a storage container in a PartitionedDNS enabled storage account.: az storage container create --account-name mystorageaccount --name mystoragecontainer --account-key "enter-your-storage_account-key" --blob-endpoint "https://mystorageaccount.z3.blob.storage.azure.net/"
    Create a storage container in a storage account and allow public read access for blobs.: az storage container create -n mystoragecontainer --public-access blob
    Create a storage container in a storage account and return an error if the container already exists.: az storage container create -n mystoragecontainer --fail-on-exist
    Create a storage container in a storage account.: az storage container create -n mystoragecontainer
