# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: query-by-workspace
description: Query pipeline runs in the workspace based on input filter conditions.
flags:
    --continuation-token=: The continuation token for getting the next page of results.
    --filters=:
        description: List of filters.
        nargs: -1
    --last-updated-after=!: The time at or after which the run event was updated in 'ISO 8601' format.
    --last-updated-before=!: The time at or before which the run event was updated in 'ISO 8601' format.
    --order-by=:
        description: List of OrderBy option.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        continuation-token: The continuation token for getting the next page of results. Null for first page.
        filters: List of filters.
        last-updated-after: The time at or after which the run event was updated in 'ISO 8601' format.
        last-updated-before: The time at or before which the run event was updated in 'ISO 8601' format.
        order-by: List of OrderBy option.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    Query pipeline runs in the workspace based on input filter conditions.: |-
        az synapse pipeline-run query-by-workspace --workspace-name testsynapseworkspace --filters \
          operand="PipelineName" operator="Equals" values="testpipeline" --last-updated-after "2020-09-03T00:36:44.3345758Z" \
          --last-updated-before "2020-09-03T00:49:48.3686473Z"
