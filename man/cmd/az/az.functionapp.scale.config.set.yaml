# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Update an existing function app's scale configuration.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --instance-memory=: The instance memory size in MB.
    --maximum-instance-count=: The maximum number of instances.
    --subscription=: Name or ID of subscription.
    --trigger-settings=:
        description: space-separated settings for the trigger type in the format `<name>=<value>`
        nargs: -1
    --trigger-type=: The type of trigger.
    -g, --resource-group=: Name of resource group.
    -n, --name=: name of the function app
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        instance-memory: The instance memory size in MB.
        maximum-instance-count: The maximum number of instances.
        name: Name of the function app.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        trigger-settings: Space-separated settings for the trigger type in the format ``` <name>=<value> ``` .
        trigger-type: The type of trigger.
examples:
    Set the function app's instance memory configuration.: az functionapp scale config set --name MyFunctionApp --resource-group MyResourceGroup --instance-memory 2048
    Set the function app's maximum instance count configuration.: az functionapp scale config set --name MyFunctionApp --resource-group MyResourceGroup --maximum-instance-count 5
    Set the function app's trigger configuration.: az functionapp scale config set --name MyFunctionApp --resource-group MyResourceGroup --trigger-type http --trigger-settings perInstanceConcurrency=1
