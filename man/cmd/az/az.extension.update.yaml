# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an extension.
flags:
    --allow-preview=:
        description: Include preview packages for extension installation, if exists
        nargs: -1
    --pip-extra-index-urls=:
        description: Space-separated list of extra URLs of package indexes to use.
        nargs: -1
    --pip-proxy=: Proxy for pip to use for extension dependencies in the form of [user:passwd@]proxy.server:port
    -n, --name=!: Name of extension
completion:
    flag:
        allow-preview:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allow-preview: |-
            Include preview packages for extension installation, if exists.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        name: Name of extension.
        pip-extra-index-urls: Space-separated list of extra URLs of package indexes to use. This should point to a repository compliant with PEP 503 (the simple repository API) or a local directory laid out in the same format.
        pip-proxy: Proxy for pip to use for extension dependencies in the form of [user:passwd@]proxy.server:port.
examples:
    Update an extension by name: az extension update --name anextension
    Update an extension by name and use pip proxy for dependencies: az extension update --name anextension --pip-proxy https://user:pass@proxy.server:8080
