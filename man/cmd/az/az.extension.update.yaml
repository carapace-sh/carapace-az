# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an extension.
documentation:
    flag:
        pip-extra-index-urls: Space-separated list of extra URLs of package indexes to use. This should point to a repository compliant with PEP 503 (the simple repository API) or a local directory laid out in the same format.
flags:
    --allow-preview=:
        description: Include preview packages for extension installation, if exists
        nargs: -1
    --pip-extra-index-urls=:
        description: Space-separated list of extra URLs of package indexes to use.
        nargs: -1
    --pip-proxy=: Proxy for pip to use for extension dependencies in the form of [user:passwd@]proxy.server:port
    -n, --name=!: Name of extension
completion:
    flag:
        allow-preview:
            - "true"
            - "false"
