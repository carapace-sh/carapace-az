# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: creates or updates an API Schema.
documentation:
    flag:
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        resource-type: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        schema-id: Schema identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        schema-type: Schema content type. Must be a valid media type used in a Content-Type header as defined in the RFC 2616. Media type of the schema document (e.g. application/json, application/xml).
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --api-id=!: API identifier.
    --no-wait=: Do not wait for the long-running operation to finish.
    --resource-type=: The type of the resource.
    --schema-content=: Json escaped string defining the document representing the Schema
    --schema-id=!: Schema identifier.
    --schema-name=: The name of the schema resource.
    --schema-path=: File path specified to import schema of the API.
    --schema-type=!: Schema content type.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
