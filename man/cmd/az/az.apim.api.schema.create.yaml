# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: creates or updates an API Schema.
flags:
    --api-id=!: API identifier.
    --no-wait=: Do not wait for the long-running operation to finish.
    --resource-type=: The type of the resource.
    --schema-content=: Json escaped string defining the document representing the Schema
    --schema-id=!: Schema identifier.
    --schema-name=: The name of the schema resource.
    --schema-path=: File path specified to import schema of the API.
    --schema-type=!: Schema content type.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    command: Create an API Management API Schema.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api-id: Unique name of the api for which schema needs to be created. API revision identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        change-reference: The related change reference ID for this resource operation.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        schema-content: Json escaped string defining the document representing the Schema. Specify either --schema-path or --schema-content not both.
        schema-id: Schema identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        schema-name: The name of the schema resource.
        schema-path: File path specified to import schema of the API. Specify either --schema-path or --schema-content not both.
        schema-type: Schema type  (e.g. application/json, application/vnd.ms-azure-apim.graphql.schema). Must be a valid media type used in a Content-Type header as defined in the RFC 2616. Media type of the schema document.
        service-name: The name of the API Management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a API Schema.: az apim api schema create --service-name MyApim -g MyResourceGroup --api-id MyApi --schema-id schemaId --schema-type schemaType --schema-path schemaFilePath
