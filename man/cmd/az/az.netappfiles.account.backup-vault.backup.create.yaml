# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a backup under the Backup Vault
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        use-existing-snapshot: Manual backup an already existing snapshot. This will always be false for scheduled backups and true/false for manual backups
flags:
    --label=: Label for backup
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --snapshot-name=: The name of the snapshot
    --subscription=: Name or ID of subscription.
    --use-existing-snapshot=:
        description: Manual backup an already existing snapshot.
        nargs: -1
    --volume-resource-id=!: ResourceId used to identify the Volume
    -a, --account-name=!: The name of the NetApp account
    -b, --name=!: The name of the backup
    -g, --resource-group=!: Name of resource group.
    -v, --backup-vault-name=!: The name of the Backup Vault
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        use-existing-snapshot:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
