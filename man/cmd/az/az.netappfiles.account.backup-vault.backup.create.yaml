# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a backup under the Backup Vault
flags:
    --label=: Label for backup
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --snapshot-name=: The name of the snapshot
    --subscription=: Name or ID of subscription.
    --use-existing-snapshot=:
        description: Manual backup an already existing snapshot.
        nargs: -1
    --volume-resource-id=!: ResourceId used to identify the Volume
    -a, --account-name=!: The name of the NetApp account
    -b, --name=!: The name of the backup
    -g, --resource-group=!: Name of resource group.
    -v, --backup-vault-name=!: The name of the Backup Vault
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        use-existing-snapshot:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: |-
        Command group 'az netappfiles account backup-vault backup' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The name of the NetApp account. --backup-name --name -b -n The name of the backup.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-vault-name: The name of the Backup Vault.
        change-reference: The related change reference ID for this resource operation.
        label: Label for backup.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        snapshot-name: The name of the snapshot.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        use-existing-snapshot: |-
            Manual backup an already existing snapshot. This will always be false for scheduled backups and true/false for manual backups.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        volume-resource-id: ResourceId used to identify the Volume.
