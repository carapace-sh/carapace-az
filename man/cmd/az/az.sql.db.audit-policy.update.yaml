# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a database's auditing policy.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        event-hub: The name of the event hub. If none is specified when providing event_hub_authorization_rule_id, the default event hub will be selected.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        server: Name of the Azure SQL Server. You can configure the default using `az configure --defaults sql-server=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --actions=:
        description: 'List of actions and action groups to audit.These are space seperated values.Example: --actions FAILED_DATABASE_AUTHENTICATION_GROUP BATCH_COMPLETED_GROUP'
        nargs: -1
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --blob-storage-target-state=: Indicate whether blob storage is a destination for audit records.
    --event-hub-authorization-rule-id=: The resource Id for the event hub authorization rule.
    --event-hub-target-state=: Indicate whether event hub is a destination for audit records.
    --event-hub=: The name of the event hub.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --log-analytics-target-state=: Indicate whether log analytics is a destination for audit records.
    --log-analytics-workspace-resource-id=: The workspace ID (resource ID of a Log Analytics workspace) for a Log Analytics workspace to which you would like to send Audit Logs.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --retention-days=: The number of days to retain audit logs.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --state=: Auditing policy state
    --storage-account=: Name of the storage account.
    --storage-endpoint=: The storage account endpoint.
    --storage-key=: Access key for the storage account.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Azure SQL Database.
    -s, --server=: Name of the Azure SQL Server.
completion:
    flag:
        blob-storage-target-state:
            - Enabled
            - Disabled
        event-hub-target-state:
            - Enabled
            - Disabled
        log-analytics-target-state:
            - Enabled
            - Disabled
        state:
            - Enabled
            - Disabled
