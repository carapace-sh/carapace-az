# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a role assignment for the caller on a billing account.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --invoice-section-name=: The ID that uniquely identifies an invoice section.
    --profile-name=: The ID that uniquely identifies a billing profile.
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies a role assignment.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: |-
        Command group 'billing role-assignment' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        invoice-section-name: The ID that uniquely identifies an invoice section.
        name: The ID that uniquely identifies a role assignment.
        profile-name: The ID that uniquely identifies a billing profile.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    InvoiceSectionRoleAssignmentDelete: az billing role-assignment delete --account-name "{billingAccountName}" --profile-name "{billingProfileName}" --name "{billingRoleAssignmentName}" --invoice-section-name "{invoiceSectionName}"
