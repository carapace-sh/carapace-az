# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes the specified private endpoint connection associated with the storage account.
flags:
    --account-name=: The storage account name.
    --id=: The ID of the private endpoint connection associated with the Storage Account.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group name of specified storage account.
    -n, --name=: The name of the private endpoint connection associated with the Storage Account.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: |-
        Command group 'storage account private-endpoint-connection' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The storage account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        id: The ID of the private endpoint connection associated with the Storage Account. You can get it using ``` az storage account show ``` .
        name: The name of the private endpoint connection associated with the Storage Account.
        resource-group: The resource group name of specified storage account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete a private endpoint connection request for storage account by ID.: |-
        id = (az storage account show -n mystorageaccount --query "privateEndpointConnections[0].id")
        az storage account private-endpoint-connection delete --id $id
    Delete a private endpoint connection request for storage account using account name and connection name.: |-
        name = (az storage account show -n mystorageaccount --query "privateEndpointConnections[0].name")
        az storage account private-endpoint-connection delete -g myRg --account-name mystorageaccount --name $name
