# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows a regulatory compliance details state for selected standard.
flags:
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        name: Name of the resource to be fetched.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get regulatory compliance standard details.: az security regulatory-compliance-standards show -n 'Azure-CIS-1.1.0'
