# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add an IP configuration to a private link to scale up its capability.
documentation:
    flag:
        ip-address: Static private IP address of a subnet for private link. If omitting, a dynamic one will be created.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --gateway-name=!: Name of the application gateway.
    --ip-address=: Static private IP address of a subnet for private link.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --primary=:
        description: Whether the IP configuration is primary or not.
        nargs: -1
    --private-link=!: Name of private link.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the private IP for private link.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        primary:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
