# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a probe in the load balancer.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        path: The URI used for requesting health status from the VM. Path is required if a protocol is set to http. Otherwise, it is not allowed.
        port: The port for communicating the probe. Possible values range from 1 to 65535, inclusive.
        probe-threshold: The number of consecutive successful or failed probes in order to allow or deny traffic from being delivered to this endpoint. It is currently in preview and is not recommended for production workloads. For most scenarios, we recommend maintaining the default value of 1 by not specifying the value of the property.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --interval=: The interval, in seconds, for how frequently to probe the endpoint for health status.
    --lb-name=!: The load balancer name.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --path=: The URI used for requesting health status from the VM.
    --port=: The port for communicating the probe.
    --probe-threshold=: The number of consecutive successful or failed probes in order to allow or deny traffic from being delivered to this endpoint.
    --protocol=: The protocol of the end point.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --threshold=: The number of consecutive probe failures before an instance is deemed unhealthy.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the probe.
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - Http
            - Https
            - Tcp
