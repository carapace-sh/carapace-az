# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a PrivateLinkAssociation.
flags:
    --subscription=: Name or ID of subscription.
    -a, --public-network-access=!: restrict traffic to private link
    -m, --management-group-id=!: The management group id.
    -n, --name=!: The name of the private link association
    -p, --privatelink=!: The name of the private link
completion:
    flag:
        public-network-access:
            - enabled
            - disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        management-group-id: The management group id.
        name: The name of the private link association.
        privatelink: The name of the private link.
        public-network-access: |-
            Restrict traffic to private link.

            Accepted values: disabled, enabled
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a PrivateLinkAssociation.: az private-link association create --management-group-id TestMG --name testPLA --privatelink testPL --public-network-access enabled
