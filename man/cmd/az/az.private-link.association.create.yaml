# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a PrivateLinkAssociation.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --subscription=: Name or ID of subscription.
    -a, --public-network-access=!: restrict traffic to private link
    -m, --management-group-id=!: The management group id.
    -n, --name=!: The name of the private link association
    -p, --privatelink=!: The name of the private link
completion:
    flag:
        public-network-access:
            - enabled
            - disabled
