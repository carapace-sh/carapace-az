# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a virtual endpoint.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -m, --members=!: The read replicas the virtual endpoints point to.
    -n, --name=: Name of the virtual endpoint.
    -s, --server-name=: Name of the server.
    -t, --endpoint-type=!: Virtual Endpoints offer two distinct types of connection points.
completion:
    flag:
        endpoint-type:
            - ReadWrite
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        endpoint-type: |-
            Virtual Endpoints offer two distinct types of connection points. Writer endpoint (Read/Write), this endpoint always points to the current primary server. Read-only endpoint, This endpoint can point to either a read replica or primary server.

            Accepted values: ReadWrite
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        members: 'The read replicas the virtual endpoints point to. '
        name: Name of the virtual endpoint. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a virtual endpoint.: az postgres flexible-server virtual-endpoint update --resource-group testgroup --server-name testserver --name test-virtual-endpoint --endpoint-type ReadWrite --members testReplica1
