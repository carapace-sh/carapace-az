# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates an Azure Managed Cassandra Cluster
flags:
    --authentication-method=: Authentication mode can be None or Cassandra.
    --cassandra-version=: The version of Cassandra chosen.
    --client-certificates=:
        description: If specified, enables client certificate authentication to the Cassandra API.
        nargs: -1
    --external-seed-nodes=:
        description: A list of ip addresses of the seed nodes of on-premise data centers.
        nargs: -1
    --hours-between-backups=: The number of hours between backup attempts.
    --identity-type=: Type of identity used for Customer Managed Disk Key.
    --no-wait=: Do not wait for the long-running operation to finish.
    --repair-enabled=:
        description: Enables automatic repair.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -c, --cluster-name=!: Cluster Name
    -e, --external-gossip-certificates=:
        description: A list of certificates that the managed cassandra data center's should accept.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        authentication-method:
            - None
            - Cassandra
        identity-type:
            - None
            - SystemAssigned
        repair-enabled:
            - "true"
            - "false"
documentation:
    command: Update a Managed Cassandra Cluster.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        authentication-method: |-
            Authentication mode can be None, Cassandra or Ldap. If None, no authentication will be required to connect to the Cassandra API. If Cassandra, then passwords will be used. Ldap is in preview.

            Accepted values: Cassandra, Ldap, None
        cassandra-version: The version of Cassandra chosen.
        change-reference: The related change reference ID for this resource operation.
        client-certificates: If specified, enables client certificate authentication to the Cassandra API.
        cluster-name: Cluster Name.
        cluster-type: |-
            Type of the cluster, can be Production or NonProduction. If set to Production, operations on cluster might have restrictions.

            Accepted values: NonProduction, Production
        extensions: 'A set of extensions that will be effective on the cluster. It will replace the entire set of extensions with new set. Use "" to remove all. Now Available: cassandra-lucene-index.'
        external-gossip-certificates: A list of certificates that the managed cassandra data center's should accept.
        external-seed-nodes: A list of ip addresses of the seed nodes of on-premise data centers.
        hours-between-backups: The number of hours between backup attempts.
        identity-type: |-
            Type of identity used for Customer Managed Disk Key.

            Accepted values: None, SystemAssigned
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        repair-enabled: |-
            Enables automatic repair.

            Accepted values: false, true
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Update External Gossip Certificates of a given cluster. Certs can be passed in as strings or the file locations.: az managed-cassandra cluster update --resource-group MyResourceGroup --cluster-name MyCluster --external-gossip-certificates C:/MyFolder/test.pem BeginCert-MLXCF-EndCert
    Update External Seed Nodes of a given cluster.: az managed-cassandra cluster update --resource-group MyResourceGroup --cluster-name MyCluster --external-seed-nodes 127.0.0.1 127.0.0.2
