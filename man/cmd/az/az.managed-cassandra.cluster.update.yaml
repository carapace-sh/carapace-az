# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates an Azure Managed Cassandra Cluster
documentation:
    flag:
        authentication-method: Authentication mode can be None or Cassandra. If None, no authentication will be required to connect to the Cassandra API. If Cassandra, then passwords will be used.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --authentication-method=: Authentication mode can be None or Cassandra.
    --cassandra-version=: The version of Cassandra chosen.
    --client-certificates=:
        description: If specified, enables client certificate authentication to the Cassandra API.
        nargs: -1
    --external-seed-nodes=:
        description: A list of ip addresses of the seed nodes of on-premise data centers.
        nargs: -1
    --hours-between-backups=: The number of hours between backup attempts.
    --identity-type=: Type of identity used for Customer Managed Disk Key.
    --no-wait=: Do not wait for the long-running operation to finish.
    --repair-enabled=:
        description: Enables automatic repair.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -c, --cluster-name=!: Cluster Name
    -e, --external-gossip-certificates=:
        description: A list of certificates that the managed cassandra data center's should accept.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        authentication-method:
            - None
            - Cassandra
        identity-type:
            - None
            - SystemAssigned
        repair-enabled:
            - "true"
            - "false"
