# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates an Azure Managed Cassandra DataCenter
flags:
    --disk-capacity=: Number of disk used for data centers.
    --disk-sku=: Disk SKU used for data centers.
    --no-wait=: Do not wait for the long-running operation to finish.
    --sku=: Virtual Machine SKU used for data centers.
    --subscription=: Name or ID of subscription.
    -b, --base64-encoded-cassandra-yaml-fragment=: This is a Base64 encoded yaml file that is a subset of cassandra.yaml.
    -c, --cluster-name=!: Cluster Name
    -d, --data-center-name=!: Datacenter Name
    -g, --resource-group=!: Name of resource group.
    -k, --managed-disk-customer-key-uri=: Key uri to use for encryption of managed disks.
    -l, --data-center-location=!: Azure Location of the Datacenter
    -n, --node-count=!: The number of Cassandra virtual machines in this data center.
    -p, --backup-storage-customer-key-uri=: Indicates the Key Uri of the customer key to use for encryption of the backup storage account.
    -s, --delegated-subnet-id=!: The resource id of a subnet where ip addresses of the Cassandra virtual machines will be allocated.
    -z, --availability-zone=:
        description: If the data center haves Availability Zone feature, apply it to the Virtual Machine ScaleSet that host the data center virtual machines.
        nargs: -1
completion:
    flag:
        availability-zone:
            - "true"
            - "false"
documentation:
    command: Create a Datacenter in an Azure Managed Cassandra Cluster.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        availability-zone: |-
            If the data center haves Availability Zone feature, apply it to the Virtual Machine ScaleSet that host the data center virtual machines.

            Accepted values: false, true
        backup-storage-customer-key-uri: Indicates the Key Uri of the customer key to use for encryption of the backup storage account.
        base64-encoded-cassandra-yaml-fragment: This is a Base64 encoded yaml file that is a subset of cassandra.yaml.  Supported fields will be honored and others will be ignored.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Cluster Name.
        data-center-location: Azure Location of the Datacenter.
        data-center-name: Datacenter Name.
        delegated-subnet-id: The resource id of a subnet where ip addresses of the Cassandra virtual machines will be allocated. This must be in the same region as data_center_location.
        disk-capacity: Number of disk used for data centers. Default value is 4.
        disk-sku: Disk SKU used for data centers. Default value is P30.
        ldap-search-base-dn: Distinguished name of the object to start the recursive search of users from.
        ldap-search-filter: Template to use for searching. Defaults to (cn=%s) where %s will be replaced by the username used to login. While using this parameter from Windows Powershell (not Windows CommandPrompt or Linux) there is a known issue with escaping special characters, so pass as """(cn=%s)""" instead.
        ldap-server-certs: LDAP server certificate. It should have subject alternative name(SAN) DNS Name entry matching the hostname of the LDAP server.
        ldap-server-hostname: Hostname of the LDAP server.
        ldap-server-port: Port of the LDAP server. Defaults to 636.
        ldap-service-user-dn: Distinguished name of the look up user account, who can look up user details on authentication.
        ldap-svc-user-pwd: Password of the look up user.
        managed-disk-customer-key-uri: Key uri to use for encryption of managed disks. Ensure the system assigned identity of the cluster has been assigned appropriate permissions(key get/wrap/unwrap permissions) on the key.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        node-count: The number of Cassandra virtual machines in this data center. The minimum value is 3.
        private-endpoint-ip-address: This is the IP address of the private Endpoint NIC, to be used in cases of VPN based cassandra datacenters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: Virtual Machine SKU used for data centers. Default value is Standard_DS14_v2.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a Managed Cassandra Datacenter in a Cassandra Cluster. Each datacenter should atleast have 3 nodes.: |-
        az managed-cassandra datacenter create \
        --resource-group MyResourceGroup \
        --cluster-name MyCluster \
        --data-center-name MyDataCenter \
        --data-center-location westus2 \
        --node-count 3 \
        --delegated-subnet-id /subscriptions/94d9b402-77b4-4049-b4c1-947bc6b7729b/resourceGroups/My-vnet/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet
