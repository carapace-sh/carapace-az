# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Azure Cognitive Services account.
flags:
    --api-properties=:
        description: Api properties in JSON format or a=b c=d format.
        nargs: -1
    --assign-identity=: Generate and assign an Azure Active Directory Identity for this account.
    --custom-domain=: User domain assigned to the account.
    --encryption=: The encryption properties for this resource, in JSON format.
    --kind=!: the API name of cognitive services account
    --sku=!: Name of the Sku of Cognitive Services account/deployment
    --storage=: The storage accounts for this resource, in JSON array format.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --yes=: Do not prompt for terms confirmation
    -g, --resource-group=!: Name of resource group.
    -l, --location=!: Location.
    -n, --name=!: cognitive service account name
documentation:
    command: Manage Azure Cognitive Services accounts.
    flag:
        acquire-policy-token: |-
            Acquiring an Azure Policy token automatically for this resource operation.

            Accepted values: false, true
        api-properties: Api properties in JSON format or a=b c=d format. Some cognitive services (i.e. QnA Maker) require extra api properties to create the account.
        assign-identity: |-
            Generate and assign an Azure Active Directory Identity for this account.

            Default value: False
        change-reference: The related change reference ID for this resource operation.
        custom-domain: User domain assigned to the account. Name is the CNAME source.
        encryption: The encryption properties for this resource, in JSON format.
        kind: |-
            The API name of cognitive services account.

            Value from: az cognitiveservices account list-kinds
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Cognitive service account name.
        resource-group: |-
            Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` . --sku --sku-name Name of the Sku of Cognitive Services account/deployment.

            Value from: az cognitiveservices account list-skus
        storage: The storage accounts for this resource, in JSON array format.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        "yes": Do not prompt for terms confirmation.
examples:
    Create a Text Analytics Cognitive Services account in West Europe without confirmation required and use customer owned storage.: |-
        az cognitiveservices account create -n myresource -g myResourceGroup --assign-identity --kind TextAnalytics --sku S -l WestEurope --yes
            --storage '[
            {
              "resourceId": "/subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup/providers/Microsoft.Storage/storageAccounts/myStorageAccount"
            }
          ]'
    ? Create a Text Analytics Cognitive Services account in West Europe without confirmation required and user Customer-managed encryption.
    : |-
        az cognitiveservices account create -n myresource -g myResourceGroup --assign-identity --kind TextAnalytics --sku S -l WestEurope --yes
            --encryption '{
              "keySource": "Microsoft.KeyVault",
              "keyVaultProperties": {
                "keyName": "KeyName",
                "keyVersion": "secretVersion",
                "keyVaultUri": "https://issue23056kv.vault.azure.net/"
              }
            }'
    Create an S0 face API Cognitive Services account in West Europe without confirmation required.: az cognitiveservices account create -n myresource -g myResourceGroup --kind Face --sku S0 -l WestEurope --yes
    Manage Azure Cognitive Services accounts. (autogenerated): az cognitiveservices account create --kind Face --location WestEurope --name myresource --resource-group myResourceGroup --sku S0 --subscription MySubscription --yes
