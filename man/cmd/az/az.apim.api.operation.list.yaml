# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List a collection of the operations for the specified API.
flags:
    --api-id=!: API identifier.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    flag:
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List a collection of the operations for the specified API.: az apim api operation list --resource-group MyResourceGroup --service-name MyServiceName --api-id MyApiId
