# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: check-name
description: Check that the given name is valid and is not already in use.
documentation:
    flag:
        resource-type: 'Type of resource. '
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --resource-type=: Type of resource.
    --subscription=: Name or ID of subscription.
    -n, --name=!: The name of the HSM within the specified resource group
completion:
    flag:
        resource-type:
            - hsm
