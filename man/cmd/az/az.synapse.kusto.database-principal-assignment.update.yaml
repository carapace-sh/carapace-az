# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a Kusto pool database principalAssignment.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --database-name=: The name of the database in the Kusto pool.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --kusto-pool-name=: The name of the Kusto pool.
    --no-wait=: Do not wait for the long-running operation to finish.
    --principal-assignment-name=: The name of the Kusto principalAssignment.
    --principal-id=: The principal ID assigned to the database principal.
    --principal-type=: Principal type.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --role=: Database principal role.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tenant-id=: The tenant id of the principal
    --workspace-name=: The name of the workspace
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        principal-type:
            - App
            - Group
            - User
        role:
            - Admin
            - Ingestor
            - Monitor
            - User
            - UnrestrictedViewer
            - Viewer
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        change-reference: The related change reference ID for this resource operation.
        database-name: The name of the database in the Kusto pool.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        kusto-pool-name: The name of the Kusto pool.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        principal-assignment-name: The name of the Kusto principalAssignment.
        principal-id: The principal ID assigned to the database principal. It can be a user email, application ID, or security group name.
        principal-type: |-
            Principal type.

            Accepted values: App, Group, User
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        role: |-
            Database principal role.

            Accepted values: Admin, Ingestor, Monitor, UnrestrictedViewer, User, Viewer
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tenant-id: The tenant id of the principal.
        workspace-name: The name of the workspace.
