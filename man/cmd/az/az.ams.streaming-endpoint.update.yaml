# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the details of a streaming endpoint.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --cdn-profile=: The CDN profile name.
    --cdn-provider=: The CDN provider name.
    --client-access-policy=: The XML representing the clientaccesspolicy data used by Microsoft Silverlight and Adobe Flash.
    --cross-domain-policy=: The XML representing the crossdomain data used by Silverlight.
    --custom-host-names=:
        description: Space-separated list of custom host names for the streaming endpoint.
        nargs: -1
    --description=: The streaming endpoint description.
    --disable-cdn=: Use this flag to disable CDN for the streaming endpoint.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ips=:
        description: Space-separated IP addresses for access control.
        nargs: -1
    --max-cache-age=: Max cache age.
    --no-wait=: Do not wait for the long-running operation to finish.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -a, --account-name=: The name of the Azure Media Services account.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the streaming endpoint.
documentation:
    flag:
        account-name: The name of the Azure Media Services account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        cdn-profile: The CDN profile name.
        cdn-provider: 'The CDN provider name. Allowed values: StandardVerizon, PremiumVerizon, StandardAkamai.'
        change-reference: The related change reference ID for this resource operation.
        client-access-policy: The XML representing the clientaccesspolicy data used by Microsoft Silverlight and Adobe Flash. Use @{file} to load from a file. For further information about the XML structure please refer to documentation on https://learn.microsoft.com/rest/api/media/operations/crosssiteaccesspolicies .
        cross-domain-policy: The XML representing the crossdomain data used by Silverlight. Use @{file} to load from a file. For further information about the XML structure please refer to documentation on https://learn.microsoft.com/rest/api/media/operations/crosssiteaccesspolicies .
        custom-host-names: Space-separated list of custom host names for the streaming endpoint. Use "" to clear existing list.
        description: The streaming endpoint description.
        disable-cdn: Use this flag to disable CDN for the streaming endpoint.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        ips: Space-separated IP addresses for access control. Allowed IP addresses can be specified as either a single IP address (e.g. "10.0.0.1") or as an IP range using an IP address and a CIDR subnet mask (e.g. "10.0.0.1/22"). Use "" to clear existing list. If no IP addresses are specified any IP address will be allowed.
        max-cache-age: Max cache age.
        name: The name of the streaming endpoint.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
