# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an application gateway.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        custom-error-pages: Space-separated list of custom error pages in `STATUS_CODE=URL` format.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        identity: The identity of the application gateway, if configured.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        ssl-profiles: SSL profiles of the application gateway resource. For default limits, see [Application Gateway limits](https://learn.microsoft.com/azure/azure-subscription-service-limits#application-gateway-limits).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --capacity=: Number of instances to use with the application gateway.
    --custom-error-pages=:
        description: Space-separated list of custom error pages in `STATUS_CODE=URL` format.
        nargs: -1
    --family=: Family of an application gateway SKU.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --http2=:
        description: Use HTTP2 for the application gateway
        nargs: -1
    --identity=:
        description: The identity of the application gateway, if configured.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --max-capacity=: Upper bound on the number of application gateway instances.
    --min-capacity=: Lower bound on the number of application gateway instances.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku=: Name of an application gateway SKU.
    --ssl-profiles=:
        description: SSL profiles of the application gateway resource.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the application gateway.
completion:
    flag:
        family:
            - Generation_1
            - Generation_2
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        http2:
            - Enabled
            - Disabled
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        sku:
            - Basic
            - Standard_Large
            - Standard_Medium
            - Standard_Small
            - Standard_v2
            - WAF_Large
            - WAF_Medium
            - WAF_v2
