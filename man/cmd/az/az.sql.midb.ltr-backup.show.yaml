# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets the requested long term retention backup.
documentation:
    flag:
        backup-id: 'The resource id of the backups. Use ''az sql midb ltr-backup show'' or ''az sql midb ltr-backup list'' for backup id. If provided, other arguments are not required. '
        name: The name of the LTR backup. Use 'az sql midb ltr-backup show' or 'az sql midb ltr-backup list' for backup name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --backup-id=: The resource id of the backups.
    --managed-instance=: Name of the Azure SQL Managed Instance.
    --subscription=: Name or ID of subscription.
    -d, --database=: The name of the Azure SQL Managed Database.
    -l, --location=: The location of the desired backup(s).
    -n, --name=: The name of the LTR backup.
