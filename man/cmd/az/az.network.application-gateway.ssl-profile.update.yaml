# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update SSL profile of the application gateway.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        cipher-suites: SSL cipher suites to be enabled in the specified order to application gateway.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        disabled-protocols: Space-separated list of protocols to disable.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        trusted-client-certificates: Array of references to application gateway trusted client certificates.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --cipher-suites=:
        description: SSL cipher suites to be enabled in the specified order to application gateway.
        nargs: -1
    --client-auth-configuration=:
        description: Client authentication configuration of the application gateway resource.
        nargs: -1
    --disabled-protocols=:
        description: Space-separated list of protocols to disable.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --gateway-name=!: Name of the application gateway.
    --min-protocol-version=: Minimum version of SSL protocol to be supported on application gateway.
    --name=!: Name of the SSL profile.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --policy-name=: Name of SSL policy.
    --policy-type=: Type of SSL policy.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --trusted-client-certificates=:
        description: Array of references to application gateway trusted client certificates.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        client-auth-configuration:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        min-protocol-version:
            - TLSv1_0
            - TLSv1_1
            - TLSv1_2
            - TLSv1_3
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        policy-name:
            - AppGwSslPolicy20150501
            - AppGwSslPolicy20170401
            - AppGwSslPolicy20170401S
            - AppGwSslPolicy20220101
            - AppGwSslPolicy20220101S
        policy-type:
            - Custom
            - CustomV2
            - Predefined
