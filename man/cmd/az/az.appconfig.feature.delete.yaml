# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete feature flag.
flags:
    --auth-mode=: This parameter can be used for indicating how a data operation is to be authorized.
    --connection-string=: Combination of access key and endpoint of the App Configuration store.
    --endpoint=: If auth mode is "login", provide endpoint URL of the App Configuration store.
    --feature=: Name of the feature to be deleted.
    --key=: Key of the feature flag.
    --label=: If no label specified, delete the feature flag with null label by default.
    --subscription=: Name or ID of subscription.
    -n, --name=: Name of the App Configuration store.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        auth-mode:
            - login
            - key
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auth-mode: This parameter can be used for indicating how a data operation is to be authorized. If the auth mode is "key", provide connection string or store name and your account access keys will be retrieved for authorization. If the auth mode is "login", provide the `--endpoint` or `--name` and your "az login" credentials will be used for authorization. You can configure the default auth mode using `az configure --defaults appconfig_auth_mode=<auth_mode>`. For more information, see https://learn.microsoft.com/azure/azure-app-configuration/concept-enable-rbac
        change-reference: The related change reference ID for this resource operation.
        connection-string: Combination of access key and endpoint of the App Configuration store. Can be found using 'az appconfig credential list'. Users can preset it using ``` az configure --defaults appconfig_connection_string=<connection_string> ``` or environment variable with the name AZURE_APPCONFIG_CONNECTION_STRING.
        endpoint: If auth mode is "login" or "anonymous", provide endpoint URL of the App Configuration store. The endpoint can be retrieved using "az appconfig show" command. You can configure the default endpoint using ``` az configure --defaults appconfig_endpoint=<endpoint> ``` .
        feature: Name of the feature to be deleted. If the feature flag key is different from the default key, provide the `--key` argument instead. Support star sign as filters, for instance * means all features and abc* means features with abc as prefix. Comma separated features are not supported. Please provide escaped string if your feature name contains comma.
        key: Key of the feature flag. Key must start with the ".appconfig.featureflag/" prefix. Key cannot contain the "%" character. If both key and feature arguments are provided, only key will be used. Support star sign as filters, for instance ".appconfig.featureflag/*" means all features and ".appconfig.featureflag/abc*" means features with abc as prefix. Comma separated features are not supported. Please provide escaped string if your feature name contains comma.
        label: If no label specified, delete the feature flag with null label by default. Support star sign as filters, for instance * means all labels and abc* means labels with abc as prefix.
        name: |-
            ``` and your "az login" credentials will be used for authorization. If the auth mode is "anonymous", provide the --endpoint that will be used for authorization. Anonymous mode is intended for custom endpoints only, such as the App Configuration emulator. You can configure the default auth mode using ``` az configure --defaults appconfig_auth_mode=<auth_mode> ``` . For more information, see https://learn.microsoft.com/azure/azure-app-configuration/concept-enable-rbac .

            Default value: key

            Accepted values: anonymous, key, login
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'If no tags are specified, delete all feature flags with any tags. Support space-separated tags: key[=value] [key[=value] ...].'
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete a feature using App Configuration store endpoint and your 'az login' credentials.: az appconfig feature delete --endpoint https://myappconfiguration.azconfig.io --feature color --auth-mode login
    Delete a feature using App Configuration store name without confirmation.: az appconfig feature delete -n MyAppConfiguration --feature color --label MyLabel --yes
    Delete a feature using connection string.: az appconfig feature delete --connection-string Endpoint=https://contoso.azconfig.io;Id=xxx;Secret=xxx --feature color --label MyLabel
    Delete a feature whose name is "Beta" but key is ".appconfig.featureflag/MyApp1:Beta" with tags "tag1=value1" and "tag2=value2".: az appconfig feature delete -n MyAppConfiguration --key .appconfig.featureflag/MyApp1:Beta --tags tag1=value1 tag2=value2 --yes
    Delete a feature whose name is "Beta" but key is ".appconfig.featureflag/MyApp1:Beta".: az appconfig feature delete -n MyAppConfiguration --key .appconfig.featureflag/MyApp1:Beta --yes
