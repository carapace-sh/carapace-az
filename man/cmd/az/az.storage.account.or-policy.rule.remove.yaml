# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove the specified rule from the specified Object Replication Service Policy.
flags:
    --policy-id=!: The ID of object replication policy or "default" if the policy ID is unknown.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
    -r, --rule-id=!: Rule Id is auto-generated for each new rule on destination account.
documentation:
    flag:
        account-name: The storage account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        policy-id: The ID of object replication policy or "default" if the policy ID is unknown. Policy Id will be auto-generated when setting on destination account. Required when setting on source account.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule-id: Rule Id is auto-generated for each new rule on destination account. It is required for put policy on source account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Remove the specified rule from the specified Object Replication Service Policy.: az storage account or-policy rule remove -g ResourceGroupName -n StorageAccountName --policy-id "04344ea7-aa3c-4846-bfb9-e908e32d3bf8" --rule-id "78746d86-d3b7-4397-a99c-0837e6741332"
