# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: postgres
description: Create a functionapp connection to postgres.
flags:
    --appconfig-id=: The app configuration id to store configuration
    --client-type=: The client type used on the functionapp
    --connection=: Name of the functionapp connection.
    --connstr-props=:
        description: The additional connection string properties used to build connection string.
        nargs: -1
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --database=: Name of postgres database.
    --new=:
        description: Indicates whether to create a new postgres when creating the functionapp connection
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --opt-out=:
        description: Whether to disable some configuration steps.
        nargs: -1
    --private-endpoint=:
        description: Connect target service by private endpoint.
        nargs: -1
    --secret=:
        description: The secret auth info
        nargs: -1
    --server=: Name of postgres server.
    --service-endpoint=:
        description: Connect target service by service endpoint.
        nargs: -1
    --service-principal=:
        description: The service principal auth info
        nargs: -1
    --source-id=: The resource id of a functionapp.
    --subscription=: Name or ID of subscription.
    --system-identity=:
        description: The system assigned identity auth info
        nargs: -1
    --target-id=: The resource id of target service.
    --target-resource-group=: The resource group which contains the postgres service.
    --user-identity=:
        description: The user assigned identity auth info
        nargs: -1
    --vault-id=: The id of key vault to store secret value
    -g, --resource-group=: The resource group which contains the function app.
    -n, --name=: Name of the function app.
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - go
            - php
            - ruby
            - django
            - springBoot
            - none
        new:
            - "true"
            - "false"
        opt-out:
            - publicnetwork
            - configinfo
            - auth
        private-endpoint:
            - "true"
            - "false"
        service-endpoint:
            - "true"
            - "false"
documentation:
    command: This command has been deprecated and will be removed in a future release.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        appconfig-id: The app configuration id to store configuration.
        change-reference: The related change reference ID for this resource operation.
        client-type: |-
            The client type used on the functionapp.

            Accepted values: django, dotnet, dotnet-internal, go, java, nodejs, none, php, python, ruby, springBoot
        connection: Name of the functionapp connection.
        connstr-props: The additional connection string properties used to build connection string.
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        database: Name of postgres database. Required if '--target-id' is not specified.
        name: Name of the function app. Required if '--source-id' is not specified.None.
        new: |-
            Indicates whether to create a new postgres when creating the functionapp connection.

            Default value: False

            Accepted values: false, true
        no-recreate: |-
            Skip executing creation operation when no updates to an existing connection.

            Default value: False

            Accepted values: false, true
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        opt-out: |-
            Whether to disable some configuration steps. Use configinfo to disbale configuration information changes on source. Use publicnetwork to disable public network access configuration.Use auth to skip auth configuration such as enabling managed identity and granting RBAC roles.

            Accepted values: auth, configinfo, publicnetwork
        private-endpoint: |-
            Connect target service by private endpoint. The private endpoint in source virtual network must be created ahead.

            Accepted values: false, true
        resource-group: The resource group which contains the function app. Required if '--source-id' is not specified.None.
        secret: 'The secret auth info. Usage: --secret name=XX secret=XX --secret name=XX secret-uri=XX --secret name=XX secret-name=XX name    : Required. Username or account name for secret auth. secret  : One of ``` <secret, secret-uri, secret-name> ``` is required. Password or account key for secret auth. secret-uri  : One of ``` <secret, secret-uri, secret-name> ``` is required. Keyvault secret uri which stores password. secret-name : One of ``` <secret, secret-uri, secret-name> ``` is required. Keyvault secret name which stores password. It''s for AKS only.'
        server: Name of postgres server. Required if '--target-id' is not specified.
        service-endpoint: |-
            Connect target service by service endpoint. Source resource must be in the VNet and target SKU must support service endpoint feature.

            Accepted values: false, true
        service-principal: 'The service principal auth info. Usage: --service-principal client-id=XX secret=XX client-id      : Required. Client id of the service principal. object-id      : Optional. Object id of the service principal (Enterprise Application). secret         : Required. Secret of the service principal.'
        source-id: The resource id of a functionapp. Required if ['--resource-group', '--name'] are not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-identity: 'The flag to use system assigned identity auth info. No additional parameters are needed. Usage: --system-identity.'
        target-id: The resource id of target service. Required if ['--target-resource-group', '--server', '--database'] are not specified. --target-resource-group --tg The resource group which contains the postgres service. Required if '--target-id' is not specified.
        target-resource-group: The resource group which contains the postgres service. Required if '--target-id' is not specified.
        user-identity: 'The user assigned identity auth info. Usage: --user-identity client-id=XX subs-id=XX client-id      : Required. Client id of the user assigned identity. subs-id        : Required. Subscription id of the user assigned identity.'
        vault-id: The id of key vault to store secret value.
examples:
    Create a connection between functionapp and postgres interactively: az functionapp connection create postgres
    Create a connection between functionapp and postgres with resource id: az functionapp connection create postgres --source-id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.Web/sites/{site} --target-id /subscriptions/{subscription}/resourceGroups/{target_resource_group}/providers/Microsoft.DBforPostgreSQL/servers/{server}/databases/{database} --secret name=XX secret=XX
    Create a connection between functionapp and postgres with resource name: az functionapp connection create postgres -g FuncAppRG -n MyFunctionApp --tg PostgresRG --server MyServer --database MyDB --secret name=XX secret=XX
    Create a new postgres and connect functionapp to it: az functionapp connection create postgres --source-id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.Web/sites/{site} --new
    Create a new postgres and connect functionapp to it interactively: az functionapp connection create postgres --new
