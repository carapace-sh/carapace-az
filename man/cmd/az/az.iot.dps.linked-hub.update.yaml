# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a linked IoT hub in an Azure IoT Hub Device Provisioning Service instance.
flags:
    --allocation-weight=: Allocation weight of the IoT hub.
    --apply-allocation-policy=:
        description: A boolean indicating whether to apply allocation policy to the Iot hub.
        nargs: -1
    --dps-name=!: IoT Hub Device Provisioning Service name
    --linked-hub=!: Host name of linked IoT Hub.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        apply-allocation-policy:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allocation-weight: Allocation weight of the IoT hub.
        apply-allocation-policy: |-
            A boolean indicating whether to apply allocation policy to the Iot hub.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        dps-name: IoT Hub Device Provisioning Service name.
        linked-hub: Host name of linked IoT Hub.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update linked IoT hub 'MyLinkedHub.azure-devices.net' in an Azure IoT Hub Device Provisioning Service: az iot dps linked-hub update --dps-name MyDps --resource-group MyResourceGroup --linked-hub MyLinkedHub.azure-devices.net --allocation-weight 10 --apply-allocation-policy True
