# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets a Service Fabric managed application type version resource.
flags:
    --name=!: Specify the application type name.
    --subscription=: Name or ID of subscription.
    --version=!: Specify the application type version.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    command: Show the properties of a managed application type version on an Azure Service Fabric managed cluster.
    flag:
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the properties of a managed application type version on an Azure Service Fabric managed cluster.: az sf managed-application-type version show -g testRG -c testCluster --application-type-name CalcServiceApp --version 1.0
