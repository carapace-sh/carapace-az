# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Allows updates to the lock-type(level) and the notes of the lock
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --notes=: Notes about this lock.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the lock
    -t, --lock-type=: The type of lock restriction.
completion:
    flag:
        lock-type:
            - CanNotDelete
            - ReadOnly
documentation:
    command: Update a resource group lock.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
        lock-type: |-
            The type of lock restriction.

            Accepted values: CanNotDelete, ReadOnly
        name: Name of the lock.
        notes: Notes about this lock.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a resource group lock with new notes and type: az group lock update --name lockName -g MyResourceGroup --notes newNotesHere --lock-type CanNotDelete
