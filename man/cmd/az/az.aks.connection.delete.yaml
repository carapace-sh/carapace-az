# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a aks connection.
flags:
    --connection=: Name of the aks connection.
    --id=: The resource id of the connection.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group which contains the managed cluster.
    -n, --name=: Name of the managed cluster.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: |-
        Command group 'aks connection' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        connection: Name of the aks connection.
        id: The resource id of the connection. ['--resource-group', '--name', '--connection'] are required if '--id' is not specified.
        name: Name of the managed cluster. Required if '--id' is not specified.None.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: The resource group which contains the managed cluster. Required if '--id' is not specified.None.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete a aks connection by connection id: az aks connection delete --id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.Web/sites/{site}/providers/Microsoft.ServiceLinker/linkers/{linker}
    Delete a aks connection by connection name: az aks connection delete -g ClusterRG -n MyCluster --connection MyConnection
    Delete a aks connection interactively: az aks connection delete
