# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a traffic manager endpoint.
flags:
    --always-serve=: If Always Serve is enabled, probing for endpoint health will be disabled and endpoints will be included in the traffic routing method.
    --custom-headers=:
        description: Space-separated list of custom headers in KEY=VALUE format.
        nargs: -1
    --endpoint-location=: Location of the external or nested endpoints when using the 'Performance' routing method.
    --endpoint-monitor-status=: The monitoring status of the endpoint.
    --endpoint-status=: The status of the endpoint.
    --geo-mapping=:
        description: Space-separated list of country/region codes mapped to this endpoint when using the 'Geographic' routing method.
        nargs: -1
    --min-child-endpoints=: The minimum number of endpoints that must be available in the child profile for the parent profile to be considered available.
    --min-child-ipv4=: The minimum number of IPv4 (DNS record type A) endpoints that must be available in the child profile in order for the parent profile to be considered available.
    --min-child-ipv6=: The minimum number of IPv6 (DNS record type AAAA) endpoints that must be available in the child profile in order for the parent profile to be considered available.
    --priority=: Priority of the endpoint when using the 'Priority' traffic routing method.
    --profile-name=!: Name of parent profile.
    --subnets=:
        description: Space-separated list of subnet CIDR prefixes (10.0.0.0/24) or subnet ranges (10.0.0.0-11.0.0.0).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --target-resource-id=: The Azure Resource URI of the endpoint.
    --target=: Fully-qualified DNS name of the endpoint.
    --weight=: Weight of the endpoint when using the 'Weighted' traffic routing method.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Endpoint name.
    -t, --type=!: Endpoint type.
completion:
    flag:
        always-serve:
            - Enabled
            - Disabled
        endpoint-status:
            - Enabled
            - Disabled
        type:
            - azureEndpoints
            - externalEndpoints
            - nestedEndpoints
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        always-serve: |-
            If Always Serve is enabled, probing for endpoint health will be disabled and endpoints will be included in the traffic routing method.

            Accepted values: Disabled, Enabled
        change-reference: The related change reference ID for this resource operation.
        custom-headers: Space-separated list of custom headers in KEY=VALUE format.
        endpoint-location: Location of the external or nested endpoints when using the 'Performance' routing method.
        endpoint-monitor-status: The monitoring status of the endpoint.
        endpoint-status: |-
            The status of the endpoint. If enabled the endpoint is probed for endpoint health and included in the traffic routing method.

            Accepted values: Disabled, Enabled
        geo-mapping: |-
            Space-separated list of country/region codes mapped to this endpoint when using the 'Geographic' routing method.

            Value from: az network traffic-manager endpoint show-geographic-hierarchy
        min-child-endpoints: The minimum number of endpoints that must be available in the child profile for the parent profile to be considered available. Only applicable to an endpoint of type 'NestedEndpoints'.
        min-child-ipv4: The minimum number of IPv4 (DNS record type A) endpoints that must be available in the child profile in order for the parent profile to be considered available. Only applicable to endpoint of type 'NestedEndpoints'.
        min-child-ipv6: The minimum number of IPv6 (DNS record type AAAA) endpoints that must be available in the child profile in order for the parent profile to be considered available. Only applicable to endpoint of type 'NestedEndpoints'.
        name: Endpoint name.
        priority: Priority of the endpoint when using the 'Priority' traffic routing method. Values range from 1 to 1000, with lower values representing higher priority.
        profile-name: Name of parent profile.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subnets: Space-separated list of subnet CIDR prefixes (10.0.0.0/24) or subnet ranges (10.0.0.0-11.0.0.0).
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target: Fully-qualified DNS name of the endpoint.
        target-resource-id: The Azure Resource URI of the endpoint. Not applicable for endpoints of type 'ExternalEndpoints'.
        type: |-
            Endpoint type.

            Accepted values: azureEndpoints, externalEndpoints, nestedEndpoints
        weight: Weight of the endpoint when using the 'Weighted' traffic routing method. Values range from 1 to 1000.
examples:
    Create an endpoint for a performance profile to point to an Azure Web App endpoint.: |-
        az network traffic-manager endpoint create -g MyResourceGroup --profile-name MyTmProfile \
            -n MyEndpoint --type azureEndpoints --target-resource-id $MyWebApp1Id --endpoint-status enabled
