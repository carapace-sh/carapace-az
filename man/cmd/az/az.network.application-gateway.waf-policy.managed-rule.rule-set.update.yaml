# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update (Override) existing rule set of a WAF policy managed rules.
flags:
    --group-name=: The name of the web application firewall rule set group.
    --policy-name=!: The name of the web application firewall policy.
    --rule=:
        description: List of rules that will be disabled.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --type=!: The type of the web application firewall rule set.
    --version=!: The version of the web application firewall rule set type.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        type:
            - Microsoft_BotManagerRuleSet
            - OWASP
        version:
            - "0.1"
            - "1.0"
            - "1.1"
            - "2.1"
            - 2.2.9
            - "3.0"
            - "3.1"
            - "3.2"
documentation:
    command: |-
        Manage rules of a WAF policy. If --group-name and --rules are provided, override existing rules. If --group-name is provided, clear all rules under a certain rule group. If neither of them are provided, update rule set and clear all rules under itself. For rule set and rules, please visit:
        https://learn.microsoft.com/azure/web-application-firewall/ag/application-gateway-crs-rulegroups-rules
        .
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        group-name: The name of the web application firewall rule set group.
        policy-name: The name of the web application firewall policy.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule: 'The rule that will be disabled. If none specified, all rules in the group will be disabled. If provided, --group-name must be provided too. Usage: --rule rule-id=MyID state=MyState action=MyAction sensitivity=MySensitivity Allowed values for sensitivity: High, Medium, Low, None Multiple rules can be specified by using more than one ```'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: |-
            The type of the web application firewall rule set.

            Accepted values: Microsoft_BotManagerRuleSet, Microsoft_DefaultRuleSet, Microsoft_HTTPDDoSRuleSet, OWASP
        version: The version of the web application firewall rule set type. 0.1, 1.0, and 1.1 are used for Microsoft_BotManagerRuleSet.
examples:
    Override rules under rule group EQUEST-921-PROTOCOL-ATTACK: az network application-gateway waf-policy managed-rule rule-set update --policy-name MyPolicy -g MyResourceGroup --type OWASP --version 3.1 --group-name REQUEST-921-PROTOCOL-ATTACK --rule rule-id=921130 --rule rule-id=921160
    Update the OWASP protocol version from 3.1 to 3.0 which will clear the old rules: az network application-gateway waf-policy managed-rule rule-set update --policy-name MyPolicy -g MyResourceGroup --type OWASP --version 3.0
