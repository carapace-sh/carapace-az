# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a custom OAuth service provider.
documentation:
    flag:
        name: The resource name of the bot. Bot name must be between 4 and 42 characters in length. Bot name can only have the following characters -, a - z, A - Z, 0 - 9, and _.
        parameters: 'Parameter values for service provider parameters. Usage: --parameters key=value key1=value1.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        service: Name of the service provider. For a list of all service providers, use `az bot connection listserviceproviders`.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --client-id=!: Client ID associated with the service provider setting.
    --client-secret=!: Client secret associated with the service provider setting.
    --parameters=:
        description: Parameter values for service provider parameters.
        nargs: -1
    --provider-scope-string=!: The scope string associated with the service provider setting.The string should be delimited as needed for the service provider.
    --service=!: Name of the service provider.
    --subscription=: Name or ID of subscription.
    -c, --setting-name=!: Name of the oauth connection setting.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The resource name of the bot.
