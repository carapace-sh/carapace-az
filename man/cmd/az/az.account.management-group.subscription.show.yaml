# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show the details of a subscription under a known management group.
flags:
    -n, --name=!: ""
    -s, --subscription=!: Name or ID of subscription.
documentation:
    flag:
        name: Name of the management group.
examples:
    Show the details of a subscription under a known management group.: az account management-group subscription show --name GroupName --subscription Subscription
