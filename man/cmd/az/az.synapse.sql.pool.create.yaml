# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a SQL pool.
flags:
    --collation=: Collation defines the rules that sort and compare data, and cannot be changed after SQL pool creation.
    --no-wait=: Do not wait for the long-running operation to finish.
    --performance-level=!: The performance level.
    --storage-type=: The Storage Account Type.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --workspace-name=!: The workspace name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The SQL pool name.
completion:
    flag:
        storage-type:
            - GRS
            - LRS
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        collation: Collation defines the rules that sort and compare data, and cannot be changed after SQL pool creation. The default collation is "SQL_Latin1_General_CP1_CI_AS".
        name: The SQL pool name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        performance-level: The performance level.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        storage-type: |-
            The Storage Account Type.

            Accepted values: GRS, LRS
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        workspace-name: The workspace name.
examples:
    Create a SQL pool.: |-
        az synapse sql pool create --name sqlpool --performance-level "DW1000c" \
        --workspace-name testsynapseworkspace --resource-group rg --collation "SQL_Latin1_General_CP1_CS_AS"
