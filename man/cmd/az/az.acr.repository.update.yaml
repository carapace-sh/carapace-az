# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the attributes of a repository or image in an Azure Container Registry.
documentation:
    flag:
        image: The name of the image. May include a tag in the format 'name:tag' or digest in the format 'name@digest'.
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        suffix: The tenant suffix in registry login server. You may specify '--suffix tenant' if your registry login server is in the format 'registry-tenant.azurecr.io'. Applicable if you're accessing the registry from a different subscription or you have permission to access images but not the permission to manage the registry resource.
flags:
    --delete-enabled=:
        description: Indicates whether delete operation is allowed.
        nargs: -1
    --list-enabled=:
        description: Indicates whether this item shows in list operation results.
        nargs: -1
    --read-enabled=:
        description: Indicates whether read operation is allowed.
        nargs: -1
    --repository=: The name of the repository.
    --subscription=: Name or ID of subscription.
    --suffix=: The tenant suffix in registry login server.
    --write-enabled=:
        description: Indicates whether write or delete operation is allowed.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
    -p, --password=: The password used to log into a container registry
    -t, --image=: The name of the image.
    -u, --username=: The username used to log into a container registry
completion:
    flag:
        delete-enabled:
            - "true"
            - "false"
        list-enabled:
            - "true"
            - "false"
        read-enabled:
            - "true"
            - "false"
        write-enabled:
            - "true"
            - "false"
