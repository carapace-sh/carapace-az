# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the attributes of a repository or image in an Azure Container Registry.
flags:
    --delete-enabled=:
        description: Indicates whether delete operation is allowed.
        nargs: -1
    --list-enabled=:
        description: Indicates whether this item shows in list operation results.
        nargs: -1
    --read-enabled=:
        description: Indicates whether read operation is allowed.
        nargs: -1
    --repository=: The name of the repository.
    --subscription=: Name or ID of subscription.
    --suffix=: The tenant suffix in registry login server.
    --write-enabled=:
        description: Indicates whether write or delete operation is allowed.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
    -p, --password=: The password used to log into a container registry
    -t, --image=: The name of the image.
    -u, --username=: The username used to log into a container registry
completion:
    flag:
        delete-enabled:
            - "true"
            - "false"
        list-enabled:
            - "true"
            - "false"
        read-enabled:
            - "true"
            - "false"
        write-enabled:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        delete-enabled: |-
            Indicates whether delete operation is allowed.

            Accepted values: false, true
        image: The name of the image. May include a tag in the format 'name:tag' or digest in the format 'name@digest'.
        list-enabled: |-
            Indicates whether this item shows in list operation results.

            Accepted values: false, true
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        password: The password used to log into a container registry.
        read-enabled: |-
            Indicates whether read operation is allowed.

            Accepted values: false, true
        repository: The name of the repository.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        suffix: The tenant suffix in registry login server. You may specify '--suffix tenant' if your registry login server is in the format 'registry-tenant.azurecr.io'. Applicable if you're accessing the registry from a different subscription or you have permission to access images but not the permission to manage the registry resource.
        username: The username used to log into a container registry.
        write-enabled: |-
            Indicates whether write or delete operation is allowed.

            Accepted values: false, true
examples:
    Update the attributes of the image referenced by digest 'hello-world@sha256:abc123' to disable write operation.: az acr repository update -n myregistry --image hello-world@sha256:abc123 --write-enabled false
    Update the attributes of the image referenced by tag 'hello-world:latest' to disable write operation.: az acr repository update -n myregistry --image hello-world:latest --write-enabled false
    Update the attributes of the repository 'hello-world' to disable write operation.: az acr repository update -n myregistry --repository hello-world --write-enabled false
