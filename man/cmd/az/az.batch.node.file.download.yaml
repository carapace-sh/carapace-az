# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: download
description: Returns the content of the specified Compute Node file.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --destination=!: The path to the destination file or directory.
    --end-range=: The byte range to be retrieved.
    --file-path=!: The path to the file or directory that you want to delete.
    --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
    --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
    --node-id=!: The ID of the Compute Node from which you want to delete the file.
    --pool-id=!: The ID of the Pool that contains the Compute Node.
    --start-range=: The byte range to be retrieved.
    --subscription=: Name or ID of subscription.
documentation:
    command: Download the content of the a node file.
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        destination: The path to the destination file or directory.
        end-range: The byte range to be retrieved. If not set the file will be retrieved to the end.
        file-path: The path to the file or directory that you want to delete. Required.
        if-modified-since: A timestamp indicating the last modified time of the resource known to the client. The operation will be performed only if the resource on the service has been modified since the specified time.
        if-unmodified-since: A timestamp indicating the last modified time of the resource known to the client. The operation will be performed only if the resource on the service has been modified since the specified time.
        node-id: The ID of the Compute Node from which you want to delete the file. Required.
        pool-id: The ID of the Pool that contains the Compute Node. Required.
        start-range: The byte range to be retrieved. If not set the file will be retrieved from the beginning.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
