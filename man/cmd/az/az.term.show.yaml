# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get marketplace terms.
flags:
    --plan=!: Plan identifier string of image being deployed.
    --product=!: Offeridentifier string of image being deployed.
    --publisher=!: Publisher identifier string of image being deployed.
    --subscription=: Name or ID of subscription.
documentation:
    command: Experimental
    flag:
        plan: Plan identifier string of image being deployed.
        product: Offeridentifier string of image being deployed.
        publisher: Publisher identifier string of image being deployed.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get marketeplace terms.: az term show --product "windows-data-science-vm" --plan "windows2016" --publisher "microsoft-ads"
