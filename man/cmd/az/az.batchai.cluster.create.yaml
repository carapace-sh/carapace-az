# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a cluster.
documentation:
    flag:
        afs-mount-path: Relative mount path for Azure File share. The file share will be available at `$AZ_BATCHAI_MOUNT_ROOT/<relative_mount_path>` folder.
        afs-name: Name of Azure File Share to be mounted on each cluster node. Must be used in conjunction with --storage-account-name. Multiple shares can be mounted using configuration file (see --config-file option).
        bfs-mount-path: Relative mount path for Azure Storage container. The container will be available at `$AZ_BATCHAI_MOUNT_ROOT/<relative_mount_path>` folder.
        bfs-name: Name of Azure Storage container to be mounted on each cluster node. Must be used in conjunction with --storage-account-name. Multiple containers can be mounted using configuration file (see --config-file option).
        custom-image: ARM ID of a virtual machine image to be used for nodes creation. Note, you need to provide --image containing information about the base image used for this image creation.
        image: Operation system image for cluster nodes. The value may contain an alias (UbuntuLTS, UbuntuDSVM) or specify image details in the form "publisher:offer:sku:version". If image configuration is not provided via command line or configuration file, Batch AI will choose default OS image
        nfs: Name or ARM ID of a file server to be mounted on each cluster node. You need to provide full ARM ID if the file server belongs to a different workspace. Multiple NFS can be mounted using configuration file (see --config-file option).
        nfs-mount-path: Relative mount path for NFS. The NFS will be available at `$AZ_BATCHAI_MOUNT_ROOT/<relative_mount_path>` folder.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        setup-task: A command line which should be executed on each compute node when it's got allocated or rebooted. The task is executed in a bash subshell under root account.
        setup-task-output: Directory path to store where setup-task's logs. Note, Batch AI will create several helper directories under this path. The created directories are reported as stdOutErrPathSuffix by 'az cluster show' command.
        ssh-key: Optional SSH public key value or path. If ommited and no password specified, default SSH key (~/.ssh/id_rsa.pub) will be used.
        storage-account-key: Storage account key. Required if the storage account belongs to a different subscription. Can be specified using AZURE_BATCHAI_STORAGE_KEY environment variable.
        storage-account-name: Storage account name for Azure File Shares and/or Azure Storage Containers to be mounted on each cluster node. Can be specified using AZURE_BATCHAI_STORAGE_ACCOUNT environment variable.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target: Number of nodes which should be allocated immediately after cluster creation. If the cluster is in auto-scale mode, BatchAI can change the number of nodes later based on number of running and queued jobs.
        use-auto-storage: If provided, the command will create a storage account in a new or existing resource group named "batchaiautostorage". It will also create Azure File Share with name "batchaishare", Azure Blob Container with name "batchaicontainer". The File Share and Blob Container will be mounted on each cluster node at $AZ_BATCHAI_MOUNT_ROOT/autoafs and $AZ_BATCHAI_MOUNT_ROOT/autobfs. If the resource group already exists and contains an approapriate storage account belonging to the same region as cluster, this command will reuse existing storage account.
        user-name: Name of admin user account to be created on each compute node. If the value is not provided and no user configuration is provided in the config file, current user's name will be used.
flags:
    --afs-mount-path=: Relative mount path for Azure File share.
    --afs-name=: Name of Azure File Share to be mounted on each cluster node.
    --bfs-mount-path=: Relative mount path for Azure Storage container.
    --bfs-name=: Name of Azure Storage container to be mounted on each cluster node.
    --custom-image=: ARM ID of a virtual machine image to be used for nodes creation.
    --generate-ssh-keys=: Generate SSH public and private key files in ~/.ssh directory (if missing).
    --max=: Max nodes count for the auto-scale cluster.
    --min=: Min nodes count for the auto-scale cluster.
    --nfs-mount-path=: Relative mount path for NFS.
    --nfs=: Name or ARM ID of a file server to be mounted on each cluster node.
    --setup-task-output=: Directory path to store where setup-task's logs.
    --setup-task=: A command line which should be executed on each compute node when it's got allocated or rebooted.
    --storage-account-key=: Storage account key.
    --storage-account-name=: Storage account name for Azure File Shares and/or Azure Storage Containers to be mounted on each cluster node.
    --subnet=: ARM ID of a virtual network subnet to put the cluster in.
    --subscription=: Name or ID of subscription.
    --use-auto-storage=: If provided, the command will create a storage account in a new or existing resource group named "batchaiautostorage".
    --vm-priority=: VM priority.
    -f, --config-file=: A path to a json file containing cluster create parameters (json representation of azure.mgmt.batchai.models.ClusterCreateParameters).
    -g, --resource-group=!: Name of resource group.
    -i, --image=: Operation system image for cluster nodes.
    -k, --ssh-key=: Optional SSH public key value or path.
    -n, --name=!: Name of cluster.
    -p, --password=: Optional password for the admin user account to be created on each compute node.
    -s, --vm-size=: VM size for cluster nodes (e.g. Standard_NC6 for 1 GPU node)
    -t, --target=: Number of nodes which should be allocated immediately after cluster creation.
    -u, --user-name=: Name of admin user account to be created on each compute node.
    -w, --workspace=!: Name of workspace.
completion:
    flag:
        vm-priority:
            - dedicated
            - lowpriority
