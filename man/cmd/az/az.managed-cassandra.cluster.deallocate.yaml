# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: deallocate
description: Deallocate Azure Managed Cassandra Cluster
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Cluster Name
    -g, --resource-group=!: Name of resource group.
documentation:
    command: Deallocate the Managed Cassandra Cluster and Associated Data Centers. Deallocation will deallocate the host virtual machine of this cluster, and reserved the data disk. This won't do anything on an already deallocated cluster. Use Start to restart the cluster.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Cluster Name.
        force: |-
            Force to deallocate the cluster.

            Default value: false
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    This command deallocates this cluster.: az managed-cassandra cluster deallocate --resource-group MyResourceGroup --cluster-name MyCluster
