# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update-metadata
description: Update the manifest metadata of an artifact in an Azure Container Registry.
flags:
    --delete-enabled=:
        description: Indicate whether delete operation is allowed.
        nargs: -1
    --list-enabled=:
        description: Indicate whether this item shows in list operation results.
        nargs: -1
    --read-enabled=:
        description: Indicate whether read operation is allowed.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --suffix=: The tenant suffix in registry login server.
    --write-enabled=:
        description: Indicate whether write or delete operation is allowed.
        nargs: -1
    -n, --name=: The name of the artifact.
    -p, --password=: The password used to log into a container registry
    -r, --registry=: The name of the container registry.
    -u, --username=: The username used to log into a container registry
completion:
    flag:
        delete-enabled:
            - "true"
            - "false"
        list-enabled:
            - "true"
            - "false"
        read-enabled:
            - "true"
            - "false"
        write-enabled:
            - "true"
            - "false"
documentation:
    command: |-
        Command group 'acr manifest' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        delete-enabled: |-
            Indicate whether delete operation is allowed.

            Accepted values: false, true
        list-enabled: |-
            Indicate whether this item shows in list operation results.

            Accepted values: false, true
        name: The name of the artifact. May include a tag in the format 'name:tag' or digest in the format 'name@digest'.
        password: The password used to log into a container registry.
        read-enabled: |-
            Indicate whether read operation is allowed.

            Accepted values: false, true
        registry: The name of the container registry. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        suffix: The tenant suffix in registry login server. You may specify '--suffix tenant' if your registry login server is in the format 'registry-tenant.azurecr.io'. Applicable if you're accessing the registry from a different subscription or you have permission to access images but not the permission to manage the registry resource.
        username: The username used to log into a container registry.
        write-enabled: |-
            Indicate whether write or delete operation is allowed.

            Accepted values: false, true
examples:
    Update the metadata of the artifact referenced by digest 'hello-world@sha256:abc123'.: az acr manifest update-metadata -r myregistry -n hello-world@sha256:abc123 --write-enabled false
    Update the metadata of the tag 'hello-world:latest'.: az acr manifest update-metadata myregistry.azurecr.io/hello-world:latest --write-enabled false
