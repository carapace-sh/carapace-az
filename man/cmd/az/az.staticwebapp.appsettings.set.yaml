# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Add to or change the app settings of the static app.
flags:
    --environment-name=: Name of the environment of static site
    --setting-names=!:
        description: Space-separated app settings in 'key=value' format.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name of the static site
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        environment-name: Name of the environment of static site.
        name: Name of the static site.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        setting-names: 'Space-separated app settings in ''key=value'' format. '
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add to or change the app settings of the static app environment.: az staticwebapp appsettings set -n MyStaticAppName --setting-names key1=val1 key2=val2 --environment-name MyEnvironmentName
    Add to or change the app settings of the static app.: az staticwebapp appsettings set -n MyStaticAppName --setting-names key1=val1 key2=val2
