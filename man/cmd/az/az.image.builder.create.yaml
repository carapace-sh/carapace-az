# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an image builder template.
flags:
    --build-timeout=: The Maximum duration to wait while building the image template, in minutes.
    --build-vm-identities=:
        description: Optional configuration of the virtual network to use to deploy the build virtual machine in.
        nargs: -1
    --checksum=: The SHA256 checksum of the Red Hat ISO image
    --defer=:
        description: Temporarily store the object in the local cache instead of sending to Azure.
        nargs: -1
    --identity=:
        description: List of user assigned identities (name or ID, space delimited) of the image template.
        nargs: -1
    --image-template=: Local path or URL to an image template file.
    --managed-image-destinations=:
        description: Managed image output distributor information.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --os-disk-size=: Size of the OS disk in GB.
    --proxy-vm-size=: Size of the virtual machine used to build, customize and capture images (Standard_D1_v2 for Gen1 images and Standard_D2ds_v4 for Gen2 images).
    --scripts=:
        description: Space-separated list of shell or powershell scripts to customize the image with.
        nargs: -1
    --shared-image-destinations=:
        description: Shared image gallery (sig) output distributor information.
        nargs: -1
    --staging-resource-group=: The staging resource group id in the same subscription as the image template that will be used to build the image.
    --subnet=: Name or ID of subnet to deploy the build virtual machine
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --validator=:
        description: The type of validation you want to use on the Image.
        nargs: -1
    --vm-size=: Size of the virtual machine used to build, customize and capture images.
    --vnet=: Name of VNET to deploy the build virtual machine.
    -g, --resource-group=!: Name of resource group.
    -i, --image-source=: The base image to customize.
    -l, --location=: Location.
    -n, --name=!: The name of the image template.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        build-timeout: The Maximum duration to wait while building the image template, in minutes. Default is 60.
        build-vm-identities: Optional configuration of the virtual network to use to deploy the build virtual machine in. Omit if no specific virtual network needs to be used.
        change-reference: The related change reference ID for this resource operation.
        checksum: The SHA256 checksum of the Red Hat ISO image.
        defer: Temporarily store the object in the local cache instead of sending to Azure. Use ``` az cache ``` commands to view/clear.
        identity: List of user assigned identities (name or ID, space delimited) of the image template.
        image-source: |-
            The base image to customize. Must be a valid platform image URN, platform image alias, Red Hat ISO image URI, managed image name/ID, or shared image version ID.

            Value from: az vm image list, az vm image show
        image-template: 'Local path or URL to an image template file. When using --image-template, all other parameters are ignored except -g and -n. Reference: https://learn.microsoft.com/azure/virtual-machines/linux/image-builder-json .'
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        managed-image-destinations: Managed image output distributor information. Space-separated list of key-value pairs. E.g "image_1=westus2 image_2=westus". Each key is the name or resource ID of the managed image to be created. Each value is the location of the image.
        name: The name of the image template.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        os-disk-size: Size of the OS disk in GB. Omit or specify 0 to use Azure's default OS disk size.
        proxy-vm-size: Size of the virtual machine used to build, customize and capture images (Standard_D1_v2 for Gen1 images and Standard_D2ds_v4 for Gen2 images).
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scripts: 'Space-separated list of shell or powershell scripts to customize the image with. Each script must be a publicly accessible URL. Infers type of script from file extension (''.sh'' or''.ps1'') or from source type. More more customizer options and flexibility, see: ''az image template customizer add''.'
        shared-image-destinations: Shared image gallery (sig) output distributor information. Space-separated list of key-value pairs. E.g "my_gallery_1/image_def_1=eastus,westus  my_gallery_2/image_def_2=uksouth,canadaeast,francesouth." Each key is the sig image definition ID or sig gallery name and sig image definition delimited by a "/". Each value is a comma-delimited list of replica locations.
        staging-resource-group: The staging resource group id in the same subscription as the image template that will be used to build the image.
        subnet: Name or ID of subnet to deploy the build virtual machine.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        validator: The type of validation you want to use on the Image. For example, "Shell" can be shell validation.
        vm-size: Size of the virtual machine used to build, customize and capture images. Omit or specify empty string to use the default (Standard_D1_v2).
        vnet: Name of VNET to deploy the build virtual machine. You should only specify it when subnet is a name.
examples:
    ? '[Advanced] Create an image template with multiple customizers and distributors using the CLI''s object cache via --defer. Supports features such as: customizer and output names, powershell exit codes, inline scripts, windows restart, file customizers, artifact tags and vhd output distributors.'
    : |-
        script="https://my-script-url.com/customize_script.ps1"
        imagesource="MicrosoftWindowsServer:WindowsServer:2019-Datacenter:2019.0.20190214"
        # create and update template object in local cli cache. Defers put request to ARM
        # Cache object ttl set via az configure.
        az image builder create --image-source $imagesource -n myTemplate \
            -g myGroup --scripts $script --identity myIdentity --defer
        # add customizers
        az image builder customizer add -n myTemplate -g myGroup  \
            --customizer-name myPwshScript --exit-codes 0 1 --inline-script \
            "mkdir c:\buildActions" "echo Azure-Image-Builder-Was-Here \
             > c:\buildActions\Output.txt" --type powershell --defer
        az image builder customizer add -n myTemplate -g myGroup \
            --customizer-name myFileCustomizer --type file \
            --file-source "https://my-file-source.net/file.txt"  \
            --dest-path "c:\buildArtifacts\file.txt" --defer
        # add distributors
        az image builder output add -n myTemplate -g myGroup --is-vhd \
            --output-name myWinImageVhd --artifact-tags "is_vhd=True" --defer
        az image builder output add -n myTemplate -g myGroup \
            --output-name myWinImageManaged --managed-image winImage \
            --managed-image-location eastus \
            --artifact-tags "is_vhd=False" --defer
        # Stop deferring put request to ARM. Create the template from the object cache.
        # Cache object will be deleted.
        az image builder update -n myTemplate -g myGroup
    ? Create an image builder template from an Ubuntu2204 image. Distribute it as a managed image and a shared image gallery image version. Specify the staging resource group id as the image template that will be used to build the image.
    : |-
        scripts="https://my-script-url.net/customize_script.sh"
        imagesource="Canonical:0001-com-ubuntu-server-jammy:22_04-lts-gen2:latest"
        az image builder create --image-source $imagesource -n myTemplate -g myGroup \
            --scripts $scripts --managed-image-destinations image_1=westus \
            --shared-image-destinations my_shared_gallery/linux_image_def=westus,brazilsouth \
            --identity myIdentity --staging-resource-group myStagingResourceGroup
    Create an image builder template using an image template file.: az image builder create -g my-group -n myTemplate --image-template filename
