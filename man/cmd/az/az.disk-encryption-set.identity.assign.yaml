# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: assign
description: Add managed identities to an existing disk encryption set.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --system-assigned=:
        description: Provide this flag to use system assigned identity.
        nargs: -1
    --user-assigned=:
        description: User Assigned Identity ids to be used for disk encryption set.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of disk encryption set.
completion:
    flag:
        system-assigned:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-assigned: |-
            Provide this flag to use system assigned identity.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        user-assigned: User Assigned Identity ids to be used for disk encryption set. Accepts using the argument without any value.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Add a system assigned managed identity to an existing disk encryption set.: az disk-encryption-set identity assign --name MyDiskEncryptionSet --resource-group MyResourceGroup --system-assigned
    Add a user assigned managed identity to an existing disk encryption set.: az disk-encryption-set identity assign --name MyDiskEncryptionSet --resource-group MyResourceGroup --user-assigned MyAssignedId
    Add system assigned identity and a user assigned managed identity to an existing disk encryption set.: az disk-encryption-set identity assign --name MyDiskEncryptionSet --resource-group MyResourceGroup --system-assigned --user-assigned MyAssignedId
