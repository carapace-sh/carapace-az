# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of a rewrite rule condition.
flags:
    --gateway-name=!: Name of the application gateway.
    --rule-name=!: Name of the rewrite rule.
    --rule-set-name=!: Name of the rewrite rule set.
    --subscription=: Name or ID of subscription.
    --variable=!: Variable whose value is being evaluated.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        gateway-name: Name of the application gateway.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule-name: Name of the rewrite rule.
        rule-set-name: Name of the rewrite rule set.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        variable: 'Variable whose value is being evaluated. Values from: ``` az network application-gateway rewrite-rule condition list-server-variables ``` (prefix headers needed).'
examples:
    Get the details of a rewrite rule condition.: az network application-gateway rewrite-rule condition show -g MyResourceGroup --gateway-name MyGateway --rule-set-name MyRuleSet --rule-name MyRule --variable MyVariable
