# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: complete
description: Completes managed database move/copy operation
flags:
    --dest-mi=!: Name of the managed instance to copy the managed database to.
    --dest-resource-group=: Name of the resource group to copy the managed database to.
    --dest-subscription-id=: Id of the subscription to move the managed database to.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --managed-instance=: Name of the Azure SQL Managed Instance.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Azure SQL Managed Database.
documentation:
    command: Complete managed database copy operation.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        dest-mi: Name of the managed instance to copy the managed database to.
        dest-resource-group: Name of the resource group to copy the managed database to. If unspecified, defaults to the origin resource group.
        dest-subscription-id: Id of the subscription to move the managed database to. If unspecified, defaults to the origin subscription id.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Azure SQL Managed Database.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Complete copy operation inside same resource group.: az sql midb copy complete --name mydb --resource-group MyResourceGroup --managed-instance MyInstance --dest-mi DestinationInstance
    Complete cross resource group copy operation.: az sql midb copy complete --name mydb --resource-group MyResourceGroup --managed-instance MyInstance --dest-mi DestinationInstance --dest-rg DestinationResourceGroup
    Complete cross subscription copy operation.: az sql midb copy complete --name mydb --resource-group MyResourceGroup --managed-instance MyInstance --dest-mi DestinationInstance --dest-rg DestinationResourceGroup --dest-sub-id DestinationSubscriptionId
