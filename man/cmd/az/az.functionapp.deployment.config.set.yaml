# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Update an existing function app's deployment configuration.
flags:
    --deployment-storage-auth-type=: The deployment storage account authentication type.
    --deployment-storage-auth-value=: The deployment storage account authentication value.
    --deployment-storage-container-name=: The deployment storage account container name.
    --deployment-storage-name=: The deployment storage account name.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: name of the function app
completion:
    flag:
        deployment-storage-auth-type:
            - SystemAssignedIdentity
            - UserAssignedIdentity
            - StorageAccountConnectionString
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: |-
            The related change reference ID for this resource operation.

            Accepted values: StorageAccountConnectionString, SystemAssignedIdentity, UserAssignedIdentity
        deployment-storage-auth-value: The deployment storage account authentication value. For the user-assigned managed identity authentication type, this should be the user assigned identity resource id. For the storage account connection string authentication type, this should be the name of the app setting that will contain the storage account connection string. For the system assigned managed-identity authentication type, this parameter is not applicable and should be left empty.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the function app.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Set the function app's deployment storage authentication method.: az functionapp deployment config set --name MyFunctionApp --resource-group MyResourceGroup --deployment-storage-auth-type userAssignedIdentity --deployment-storage-auth-value myAssignedId
    Set the function app's deployment storage.: az functionapp deployment config set --name MyFunctionApp --resource-group MyResourceGroup --deployment-storage-name MyStorageAccount --deployment-storage-container-name MyStorageContainer
