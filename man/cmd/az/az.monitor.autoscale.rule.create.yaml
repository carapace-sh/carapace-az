# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Add a new autoscale rule.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        resource-type: 'Target resource type. Can also accept namespace/type format (Ex: ''Microsoft.Compute/virtualMachines'')'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timegrain: |
            The way metrics are polled across instances.
flags:
    --autoscale-name=!: Name of the autoscale settings.
    --condition=!:
        description: Condition on which to scale.
        nargs: -1
    --cooldown=: The number of minutes that must elapse before another scaling event can occur.
    --profile-name=: Name of the autoscale profile.
    --resource-namespace=: Target resource provider namespace.
    --resource-parent=: Target resource parent path, if applicable.
    --resource-type=: Target resource type.
    --resource=: Name or ID of the target resource.
    --scale=!:
        description: The direction and amount to scale.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --timegrain=:
        description: The way metrics are polled across instances.
        nargs: -1
    -g, --resource-group=: Name of resource group.
