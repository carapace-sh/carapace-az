# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Add a new autoscale rule.
flags:
    --autoscale-name=!: Name of the autoscale settings.
    --condition=!:
        description: Condition on which to scale.
        nargs: -1
    --cooldown=: The number of minutes that must elapse before another scaling event can occur.
    --profile-name=: Name of the autoscale profile.
    --resource-namespace=: Target resource provider namespace.
    --resource-parent=: Target resource parent path, if applicable.
    --resource-type=: Target resource type.
    --resource=: Name or ID of the target resource.
    --scale=!:
        description: The direction and amount to scale.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --timegrain=:
        description: The way metrics are polled across instances.
        nargs: -1
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        autoscale-name: Name of the autoscale settings.
        change-reference: The related change reference ID for this resource operation.
        condition: 'The condition which triggers the scaling action. Usage:  --condition ["NAMESPACE"] METRIC {==,!=,>,>=,<,<=} THRESHOLD {avg,min,max,total,count} PERIOD [where DIMENSION {==,!=} VALUE [or VALUE ...] [and   DIMENSION {==,!=} VALUE [or VALUE ...] ...]] Dimensions can be queried by adding the ''where'' keyword and multiple dimensions can be queried by combining them with the ''and'' keyword. Values for METRIC and appropriate THRESHOLD values can be obtained from the ``` az monitor metric ``` command. Format of PERIOD is "##h##m##s".'
        cooldown: |-
            The number of minutes that must elapse before another scaling event can occur.

            Default value: 5
        profile-name: |-
            Name of the autoscale profile.

            Default value: default
        resource: Name or ID of the target resource.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-namespace: Target resource provider namespace.
        resource-parent: Target resource parent path, if applicable.
        resource-type: 'Target resource type. Can also accept namespace/type format (Ex: ''Microsoft.Compute/virtualMachines'').'
        scale: 'The direction and amount to scale. Usage:          --scale {to,in,out} VAL[%] Fixed Count:    --scale to 5 In by Count:    --scale in 2 Out by Percent: --scale out 10%.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timegrain: |-
            The way metrics are polled across instances. The form of the timegrain is {avg,min,max,sum} VALUE. Values can be obtained from the ``` az monitor metric ``` command. Format of VALUE is "##h##m##s".

            Default value: avg 1m
examples:
    ? Create autoscale settings via a guest vm metric enabled from diagnostic extensions. You can use counterSpecifier field retrieved from 'az vmss diagnostics get-default-config' in the `--condition`.
    : az monitor autoscale rule create -g {myrg} --autoscale-name test --scale out 1 --condition "/builtin/memory/percentavailablememory > 80 total 5m"
    Scale down 50% when the CPU Percentage across instances is less than 25 averaged over 15 minutes.: |-
        az monitor autoscale rule create -g {myrg} --autoscale-name {myvmss} \
          --scale in 50% --condition "Percentage CPU < 25 avg 15m"
    Scale to 5 instances when the CPU Percentage across instances is greater than 75 averaged over 10 minutes.: |-
        az monitor autoscale rule create -g {myrg} --autoscale-name {myvmss} \
          --scale to 5 --condition "Percentage CPU > 75 avg 10m"
    Scale up 2 instances when the CPU Percentage across instances is greater than 75 averaged over 5 minutes.: |-
        az monitor autoscale rule create -g {myrg} --autoscale-name {myvmss} \
          --scale out 2 --condition "Percentage CPU > 75 avg 5m"
