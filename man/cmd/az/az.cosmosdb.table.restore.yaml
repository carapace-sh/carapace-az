# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore a deleted table within the same account.
flags:
    --disable-ttl=: Flag to restore with TTL disabled
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Cosmosdb account name.
    -g, --resource-group=!: Name of resource group.
    -n, --table-name=!: Name of the CosmosDB Table name
    -t, --restore-timestamp=: The timestamp to which the Table needs to be restored to.
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        disable-ttl: 'Flag to restore with TTL disabled. Usage:          --disable-ttl True Default: false.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restore-timestamp: The timestamp to which the Table needs to be restored to.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        table-name: Name of the CosmosDB Table name.
examples:
    Restore a deleted table within the same account.: az cosmosdb table restore --resource-group resource_group --account-name database_account_name --table-name name_of_table_needs_to_be_restored --restore-timestamp 2020-07-13T16:03:41+0000
