# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete all linked storage accounts with specific data source type for log analytics workspace.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --type=: Data source type for the linked storage account.
    -g, --resource-group=: Name of resource group.
    -n, --workspace-name=: The name of the workspace.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        type:
            - Alerts
            - AzureWatson
            - CustomLogs
            - Ingestion
            - Query
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: |-
            The related change reference ID for this resource operation.

            Accepted values: Alerts, AzureWatson, CustomLogs, Ingestion, Query
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The name of the workspace.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete all linked storage accounts with a specific type for a log analytics workspace: az monitor log-analytics workspace linked-storage delete --type AzureWatson -g MyResourceGroup --workspace-name MyWorkspace
