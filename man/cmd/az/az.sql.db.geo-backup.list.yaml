# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets the geo redundant backups for a server
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Retrieves all requested geo-redundant backups under this resource group.
    -s, --server-name=: Retrieves all requested geo-redundant backups under this server.
documentation:
    command: Gets a list of recoverable databases.
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Retrieves all requested geo-redundant backups under this resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Gets a list of recoverable databases.: az sql db geo-backup list -s myserver -g mygroup
