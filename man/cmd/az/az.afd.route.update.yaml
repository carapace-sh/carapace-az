# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a new route with the specified route name under the specified subscription, resource group, profile, and AzureFrontDoor endpoint.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --content-types-to-compress=:
        description: List of content types on which compression applies.
        nargs: -1
    --custom-domains=:
        description: Custom domains referenced by this endpoint.
        nargs: -1
    --enable-caching=:
        description: Indicates whether caching is enabled on that route.
        nargs: -1
    --enable-compression=:
        description: Indicates whether content compression is enabled on AzureFrontDoor.
        nargs: -1
    --enabled-state=: Whether to enable use of this rule.
    --endpoint-name=: Name of the endpoint under the profile which is unique globally.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --forwarding-protocol=: Protocol this rule will use when forwarding traffic to backends.
    --https-redirect=: Whether to automatically redirect HTTP traffic to HTTPS traffic.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --link-to-default-domain=: whether this route will be linked to the default endpoint domain.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --origin-group=: Name or ID of the origin group to be associated with.
    --origin-path=: A directory path on the origin that AzureFrontDoor can use to retrieve content from, e.g. contoso.cloudapp.net/originpath.
    --patterns-to-match=:
        description: The route patterns of the rule.
        nargs: -1
    --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
    --query-parameters=:
        description: Query parameters to include or exclude.
        nargs: -1
    --query-string-caching-behavior=: Defines how Frontdoor caches requests that include query strings.You can ignore any query strings when caching, ignore specific query strings,cache every request with a unique URL, or cache specific query strings
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --rule-sets=:
        description: Collection of ID or name of rule set referenced by the route.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --supported-protocols=:
        description: List of supported protocols for this route.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the routing rule.
completion:
    flag:
        enable-caching:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-compression:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enabled-state:
            - Disabled
            - Enabled
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        forwarding-protocol:
            - HttpOnly
            - HttpsOnly
            - MatchRequest
        https-redirect:
            - Disabled
            - Enabled
        link-to-default-domain:
            - Disabled
            - Enabled
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        content-types-to-compress: List of content types on which compression applies.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        custom-domains: Custom domains referenced by this endpoint.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        enable-caching: |-
            Indicates whether caching is enabled on that route.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        enable-compression: |-
            Indicates whether content compression is enabled on AzureFrontDoor. Default value is false.If compression is enabled, content will be served as compressed if user requests for a compressed version.Content won't be compressed on AzureFrontDoorwhen requested content is smaller than 8 MB or larger than 1 KB.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        enabled-state: |-
            Whether to enable use of this rule. Permitted values are 'Enabled' or 'Disabled'.

            Accepted values: Disabled, Enabled
        endpoint-name: Name of the endpoint under the profile which is unique globally.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        forwarding-protocol: |-
            Protocol this rule will use when forwarding traffic to backends.

            Accepted values: HttpOnly, HttpsOnly, MatchRequest
        https-redirect: |-
            Whether to automatically redirect HTTP traffic to HTTPS traffic. Note that this is a easy way to set up this rule and it will be the first rule that gets executed.

            Accepted values: Disabled, Enabled
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        link-to-default-domain: |-
            Whether this route will be linked to the default endpoint domain.

            Accepted values: Disabled, Enabled
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        origin-group: Name or ID of the origin group to be associated with.
        origin-path: A directory path on the origin that AzureFrontDoor can use to retrieve content from, e.g. contoso.cloudapp.net/originpath.
        patterns-to-match: The route patterns of the rule.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        profile-name: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
        query-parameters: Query parameters to include or exclude.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        query-string-caching-behavior: Defines how Frontdoor caches requests that include query strings.You can ignore any query strings when caching, ignore specific query strings,cache every request with a unique URL, or cache specific query strings.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule-sets: Collection of ID or name of rule set referenced by the route.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        supported-protocols: List of supported protocols for this route.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Update a route to accept both Http and Https requests and redirect all trafic to use Https.: az afd route update -g group --endpoint-name endpoint1 --profile-name profile --route-name route1 --supported-protocols Http Https --https-redirect Enabled
    Update a route's compression settings to enable compression for the specified content types.: az afd route update -g group --endpoint-name endpoint1 --profile-name profile --route-name route1 --query-string-caching-behavior IgnoreQueryString --enable-compression true --content-types-to-compress text/javascript text/plain
    Update a route's rule sets settings to customize the route behavior.: az afd route update -g group --endpoint-name endpoint1 --profile-name profile --route-name route1 --rule-sets ruleset1 rulseset2
