# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a rule for a URL path map.
flags:
    --address-pool=: Name or ID of the backend address pool to use with the created rule.
    --gateway-name=!: Name of the application gateway.
    --http-settings=: Name or ID of the HTTP settings to use with the created rule.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --path-map-name=!: Name of the URL path map.
    --paths=!:
        description: Space-separated list of paths to associate with the rule.
        nargs: -1
    --redirect-config=: Name or ID of the redirect configuration to use with the created rule.
    --rewrite-rule-set=: Name or ID of the rewrite rule set.
    --subscription=: Name or ID of subscription.
    --waf-policy=: Name or ID of a web application firewall policy resource.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the rule for a URL path map.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        address-pool: Name or ID of the backend address pool to use with the created rule.
        change-reference: The related change reference ID for this resource operation.
        gateway-name: Name of the application gateway.
        http-settings: Name or ID of the HTTP settings to use with the created rule.
        name: Name of the rule for a URL path map.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        path-map-name: Name of the URL path map.
        paths: Space-separated list of paths to associate with the rule. Valid paths start and end with "/", e.g, "/bar/".  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        redirect-config: Name or ID of the redirect configuration to use with the created rule.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rewrite-rule-set: Name or ID of the rewrite rule set. If not specified, the default for the map will be used.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        waf-policy: Name or ID of a web application firewall policy resource.
examples:
    Create a rule for a URL path map.: az network application-gateway url-path-map rule create -g MyResourceGroup --gateway-name MyAppGateway -n MyUrlPathMapRule2 --path-map-name MyUrlPathMap --paths /mypath2/* --address-pool MyAddressPool --http-settings MyHttpSettings
