# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the Network access control of SignalR Service.
documentation:
    flag:
        allow: 'The allowed virtual network rule. Space-separeted list of scope to assign. Allowed values: ClientConnection, ServerConnection, RESTAPI'
        deny: 'The denied virtual network rule. Space-separeted list of scope to assign. Allowed values: ClientConnection, ServerConnection, RESTAPI'
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --allow=:
        description: The allowed virtual network rule.
        nargs: -1
    --connection-name=:
        description: Space-separeted list of private endpoint connection name.
        nargs: -1
    --deny=:
        description: The denied virtual network rule.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --public-network=:
        description: Set rules for public network.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of signalr service.
completion:
    flag:
        public-network:
            - "true"
            - "false"
