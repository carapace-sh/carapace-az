# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a node pool to the managed Kubernetes cluster.
flags:
    --aks-custom-headers=: Comma-separated key-value pairs to specify custom headers.
    --allowed-host-ports=:
        description: Expose host ports on the node pool.
        nargs: -1
    --asg-ids=:
        description: The IDs of the application security groups to which the node pool's network interface should belong.
        nargs: -1
    --cluster-name=!: The cluster name.
    --crg-id=: The crg id used to associate the new nodepool with the existed Capacity Reservation Group resource.
    --disable-windows-outbound-nat=: Disable Windows OutboundNAT on Windows agent node pool.
    --drain-timeout=: When nodes are drain how many minutes to wait for all pods to be evicted
    --enable-encryption-at-host=: Enable EncryptionAtHost, default value is false.
    --enable-fips-image=: Use FIPS-enabled OS on agent nodes.
    --enable-node-public-ip=: Enable VMSS node public IP.
    --enable-secure-boot=: Enable Secure Boot on agent node pool.
    --enable-ultra-ssd=: Enable UltraSSD, default value is false.
    --enable-vtpm=: Enable vTPM on agent node pool.
    --eviction-policy=: The eviction policy of the Spot node pool.
    --gpu-instance-profile=: GPU instance profile to partition multi-gpu Nvidia GPUs.
    --host-group-id=: The fully qualified dedicated host group id used to provision agent node pool.
    --if-match=: The value provided will be compared to the ETag of the agentpool, if it matches the operation will proceed.
    --if-none-match=: Set to '*' to allow a new agentpool to be created, but to prevent updating an existing agentpool.
    --kubelet-config=: Path to JSON file containing Kubelet configurations for agent nodes.
    --labels=:
        description: The node labels for the node pool.
        nargs: -1
    --linux-os-config=: Path to JSON file containing OS configurations for Linux agent nodes.
    --max-count=: Maximum nodes count used for autoscaler, when "--enable-cluster-autoscaler" specified.
    --max-surge=: Extra nodes used to speed upgrade.
    --message-of-the-day=: Path to a file containing the desired message of the day.
    --min-count=: Minimum nodes count used for autoscaler, when "--enable-cluster-autoscaler" specified.
    --mode=: The mode for a node pool which defines a node pool's primary function.
    --no-wait=: Do not wait for the long-running operation to finish.
    --node-osdisk-size=: Size in GiB of the OS disk for each node in the agent pool.
    --node-osdisk-type=: OS disk type to be used for machines in a given agent pool.
    --node-public-ip-prefix-id=: Public IP prefix ID used to assign public IPs to VMSS nodes.
    --node-public-ip-tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --node-soak-duration=: The amount of time (in minutes) to wait after draining a node and before reimaging it and moving on to next node.
    --node-taints=: The node taints for the node pool.
    --os-sku=: The OS SKU of the agent node pool.
    --os-type=: The OS Type.
    --pod-subnet-id=: The Resource Id of a subnet in an existing VNet into which to assign pods in the cluster (requires azure network-plugin).
    --ppg=: The ID of a PPG.
    --priority=: The priority of the node pool.
    --scale-down-mode=: Describe how VMs are added to or removed from nodepools.
    --snapshot-id=: The source snapshot id used to create this nodepool.
    --spot-max-price=: It can only be set when --priority is Spot.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vnet-subnet-id=: The Resource Id of a subnet in an existing VNet into which to deploy the cluster.
    -c, --node-count=: ""
    -e, --enable-cluster-autoscaler=: ""
    -g, --resource-group=!: Name of resource group.
    -k, --kubernetes-version=: ""
    -m, --max-pods=: ""
    -n, --nodepool-name=!: The node pool name.
    -s, --node-vm-size=: ""
    -z, --zones=:
        description: Space-separated list of availability zones where agent nodes will be placed.
        nargs: -1
completion:
    flag:
        eviction-policy:
            - Delete
            - Deallocate
        gpu-instance-profile:
            - MIG1g
            - MIG2g
            - MIG3g
            - MIG4g
            - MIG7g
        mode:
            - System
            - User
        node-osdisk-type:
            - Managed
            - Ephemeral
        os-sku:
            - AzureLinux
            - Ubuntu
            - CBLMariner
            - Mariner
            - Windows2019
            - Windows2022
        priority:
            - Regular
            - Spot
        scale-down-mode:
            - Delete
            - Deallocate
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        aks-custom-headers: Send custom headers. When specified, format should be Key1=Value1,Key2=Value2.
        allowed-host-ports: Expose host ports on the node pool. When specified, format should be a comma-separated list of ranges with protocol, eg. 80/TCP,443/TCP,4000-5000/TCP. Must use VMSS agent pool type.
        asg-ids: The IDs of the application security groups to which the node pool's network interface should belong. When specified, format should be a comma-separated list of IDs. Must use VMSS agent pool type.
        batch-soak-duration: Wait time (in minutes) after draining a batch of nodes before proceeding to the next batch. Default is 15 minutes. Only for blue-green upgrades.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: The cluster name. --name --nodepool-name -n The node pool name.
        crg-id: The crg-id used to associate the new nodepool with the existed Capacity Reservation Group resource. Must use VMSS agent pool type.
        disable-windows-outbound-nat: |-
            Disable Windows OutboundNAT on Windows agent node pool. Must use VMSS agent pool type.

            Default value: False
        drain-batch-size: Number or percentage of nodes to drain per batch during blue-green upgrades. Accepts an integer (e.g. '5') or percentage (e.g. '50%'). Default is 10%. Specifies how many nodes to drain in each batch during a blue-green upgrade. Must be a non-zero value, either as an integer (e.g. '5') or a percentage (e.g. '50%') of the total blue nodes at the start of the upgrade. Fractional nodes are rounded up. For more details and best practices, see https://learn.microsoft.com/en-us/azure/aks/upgrade-cluster .
        drain-timeout: When nodes are drain how many minutes to wait for all pods to be evicted.
        drain-timeout-bg: Timeout (in minutes) to evict pods and gracefully terminate per node during blue-green upgrades. Default is 30 minutes. Maximum time (in minutes) to wait for pod eviction and graceful termination per node during blue-green upgrades. Honors pod disruption budgets. If exceeded, the upgrade fails. Default is 30 minutes.
        driver-type: |-
            Specify the type of GPU driver to install when creating Windows agent pools. Valid values are "GRID" and "CUDA". If not provided, AKS selects the driver based on system compatibility. This option cannot be changed once the AgentPool has been created. The default is system selected.

            Accepted values: CUDA, GRID
        enable-artifact-streaming: |-
            Enable artifact streaming for VirtualMachineScaleSets managed by a node pool, to speed up the cold-start of containers on a node through on-demand image loading. This option is only valid for Linux nodepools. To use this feature, container images must also enable artifact streaming on ACR. If not specified, the default is false.

            Default value: False
        enable-cluster-autoscaler: |-
            Enable cluster autoscaler. Must use VMSS agent pool type.

            Default value: False
        enable-encryption-at-host: |-
            Enable EncryptionAtHost, default value is false.

            Default value: False
        enable-fips-image: |-
            Use FIPS-enabled OS on agent nodes.

            Default value: False
        enable-managed-gpu: |-
            Enable the Managed GPU experience, which installs additional components like DCGM metrics for monitoring on top of the GPU driver. For more details, visit aka.ms/aks/managed-gpu.

            Default value: False

            Accepted values: false, true
        enable-node-public-ip: |
            Enable VMSS node public IP. Must use VMSS agent pool type.

            Default value: False
        enable-secure-boot: |-
            Enable Secure Boot on agent node pool. Must use VMSS or VMs agent pool type.

            Default value: False
        enable-ultra-ssd: |-
            Enable UltraSSD on agent node pool. Must use VMSS agent pool type.

            Default value: False
        enable-vtpm: |-
            Enable vTPM on agent node pool. Must use VMSS or VMs agent pool type.

            Default value: False
        eviction-policy: |-
            The eviction policy of the Spot node pool. It can only be set when --priority is Spot.

            Default value: Delete

            Accepted values: Deallocate, Delete
        final-soak-duration: Wait time (in minutes) after all old nodes are drained before removing them. Default is 60 minutes. Only for blue-green upgrades.
        gateway-prefix-size: The size of Public IPPrefix attached to the Gateway-mode node pool. The node pool must be in Gateway mode.
        gpu-driver: |-
            Whether to install driver for GPU node pool. Possible values are "Install" or "None". Default is "Install".

            Accepted values: Install, None
        gpu-instance-profile: |-
            GPU instance profile to partition multi-gpu Nvidia GPUs.

            Accepted values: MIG1g, MIG2g, MIG3g, MIG4g, MIG7g
        gpu-mig-strategy: |-
            Specify the MIG (Multi-Instance GPU) strategy for managed MIG support. Valid values are "Single" and "Mixed". When not specified, managed MIG is disabled.

            Accepted values: Mixed, Single
        host-group-id: (PREVIEW) The fully qualified dedicated host group id used to provision agent node pool. Must use VMSS agent pool type.
        if-match: The value provided will be compared to the ETag of the agentpool, if it matches the operation will proceed. If it does not match, the request will be rejected to prevent accidental overwrites. This must not be specified when creating a new agentpool.
        if-none-match: Set to '*' to allow a new agentpool to be created, but to prevent updating an existing agentpool. Other values will be ignored.
        kubelet-config: Path to JSON file containing Kubelet configurations for agent nodes. https://aka.ms/aks/custom-node-config .
        kubernetes-version: |-
            Version of Kubernetes to use for creating the cluster, such as "1.7.12" or "1.8.7".

            Value from: `az aks get-versions`
        labels: The node labels for the node pool. See https://aka.ms/node-labels for syntax of labels.
        linux-os-config: Path to JSON file containing OS configurations for Linux agent nodes. https://aka.ms/aks/custom-node-config .
        localdns-config: Set the localDNS Profile for a nodepool with a JSON config file.
        max-blocked-nodes: The maximum number or percentage of extra nodes that are allowed to be blocked in the agent pool during an upgrade when undrainable node behavior is Cordon. When specified, it represents the number or percent used, eg. 1 or 5%.
        max-count: Maximum nodes count used for autoscaler, when "--enable-cluster-autoscaler" specified. Please specify the value in the range of [0, 1000] for user nodepool, and [1,1000] for system nodepool.
        max-pods: |-
            The maximum number of pods deployable to a node. If not specified, defaults based on network-plugin. 30 for "azure", 110 for "kubenet", or 250 for "none".

            Default value: 0
        max-surge: Extra nodes used to speed upgrade. When specified, it represents the number or percent used, eg. 5 or 33%.
        max-unavailable: The maximum number or percentage of nodes that can be simultaneously unavailable during upgrade. When specified, it represents the number or percent used, eg. 1 or 5%.
        message-of-the-day: Path to a file containing the desired message of the day. Only valid for linux nodes. Will be written to /etc/motd.
        min-count: Minimum nodes count used for autoscaler, when "--enable-cluster-autoscaler" specified. Please specify the value in the range of [0, 1000] for user nodepool, and [1,1000] for system nodepool.
        mode: |-
            The mode for a node pool which defines a node pool's primary function. If set as "System", AKS prefers system pods scheduling to node pools with mode ``` System ``` . If set as "ManagedSystem", all other properties except name and mode will be reset and managed by AKS. Learn more at https://aka.ms/aks/nodepool/mode .

            Default value: User

            Accepted values: Gateway, Machines, ManagedSystem, System, User
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        node-count: |-
            Number of nodes in the Kubernetes agent pool. After creating a cluster, you can change the size of its node pool with ``` az aks scale ``` .

            Default value: 3
        node-osdisk-size: |-
            Size in GiB of the OS disk for each node in the agent pool. Minimum 30 GiB.

            Default value: 0
        node-osdisk-type: |-
            OS disk type to be used for machines in a given agent pool. Defaults to 'Ephemeral' when possible in conjunction with VM size and OS disk size. May not be changed for this pool after creation. ('Ephemeral' or 'Managed').

            Accepted values: Ephemeral, Managed
        node-public-ip-prefix-id: Public IP prefix ID used to assign public IPs to VMSS nodes. Must use VMSS agent pool type.
        node-public-ip-prefix-ids: Comma-separated list of public IP prefix resource IDs for dual-stack node public IPs (IPv4 and/or IPv6). At most one IPv4 and one IPv6 prefix may be specified. Automatically enables --enable-node-public-ip. Cannot be used with --node-public-ip-prefix-id. Requires the NodePublicIPv6PrefixPreview feature flag.
        node-public-ip-tags: The ipTags of the node public IPs. Must use VMSS agent pool type.
        node-soak-duration: The amount of time (in minutes) to wait after draining a node and before reimaging it and moving on to next node.
        node-taints: The node taints for the node pool.
        node-vm-size: Size of Virtual Machines to create as Kubernetes nodes. If the user does not specify one, server will select a default VM size for her/him.
        os-sku: |-
            The os-sku of the agent node pool. Ubuntu, Ubuntu2204, Ubuntu2404, CBLMariner, AzureLinux, AzureLinux3, AzureLinuxOSGuard, AzureLinux3OSGuard, AzureContainerLinux, or Flatcar when os-type is Linux, default is Ubuntu if not set; Windows2019, Windows2022, Windows2025, or WindowsAnnual when os-type is Windows, the current default is Windows2022 if not set.

            Accepted values: AzureContainerLinux, AzureLinux, AzureLinux3, AzureLinux3OSGuard, AzureLinuxOSGuard, CBLMariner, Flatcar, Mariner, Ubuntu, Ubuntu2204, Ubuntu2404, Windows2019, Windows2022, Windows2025, WindowsAnnual
        os-type: The OS Type. Linux or Windows. Windows not supported yet for "VirtualMachines" VM set type. --pis-id --prepared-image-specification-id The resource ID of the prepared image specification to use for provisioning nodes in the node pool.
        pod-ip-allocation-mode: |-
            Set the ip allocation mode for how Pod IPs from the Azure Pod Subnet are allocated to the nodes in the AKS cluster. The choice is between dynamic batches of individual IPs or static allocation of a set of CIDR blocks. Accepted Values are "DynamicIndividual" or "StaticBlock". Used together with the "azure" network plugin. Requires --pod-subnet-id.

            Accepted values: DynamicIndividual, StaticBlock
        pod-subnet-id: The Resource Id of a subnet in an existing VNet into which to assign pods in the cluster (requires azure network-plugin).
        ppg: The ID of a PPG. Must use VMSS agent pool type.
        priority: |-
            The priority of the node pool.

            Default value: Regular

            Accepted values: Regular, Spot
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scale-down-mode: |-
            Describes how VMs are added to or removed from nodepools.

            Default value: Delete

            Accepted values: Deallocate, Delete
        snapshot-id: The source snapshot id used to create this nodepool. Must use VMSS agent pool type.
        spot-max-price: |-
            It can only be set when --priority is Spot. Specify the maximum price you are willing to pay in US Dollars. Possible values are any decimal value greater than zero or -1 which indicates default price to be up-to on-demand. It can only include up to 5 decimal places.

            Default value: nan
        ssh-access: |-
            Configure SSH setting for the node pool. Use "disabled" to disable SSH access, "localuser" to enable SSH access using private key.

            Default value: localuser

            Accepted values: disabled, entraid, localuser
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        undrainable-node-behavior: |-
            Define the behavior for undrainable nodes during upgrade. The value should be "Cordon" or "Schedule". The default value is "Schedule".

            Default value: Schedule
        upgrade-strategy: |-
            Upgrade strategy for the node pool. Allowed values are "Rolling" or "BlueGreen". Default is "Rolling".

            Accepted values: BlueGreen, Rolling
        vm-set-type: Agent pool vm set type. VirtualMachineScaleSets or AvailabilitySet or VirtualMachines. Defaults to 'VirtualMachineScaleSets'.
        vm-sizes: Comma-separated list of VM sizes. Valid for VirtualMachines node pool only. If ```
        vnet-subnet-id: The Resource Id of a subnet in an existing VNet into which to deploy the cluster.
        workload-runtime: |-
            Set the workload runtime. Azure provides a different workload-runtime to enable Kata supported workloads in your nodepools. The following values can be specified: "KataVmIsolation" for Kata.

            Accepted values: KataVmIsolation
        zones: Availability zones where agent nodes will be placed. Also, to install agent nodes to more than one zone you need to pass zone numbers separated by blanks.  For example -  To have all 3 zones, you are expected to enter ``` --zones 1 2 3 ``` .
examples:
    Create a node pool with blue-green upgrade strategy and default parameters: az aks nodepool add -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster --upgrade-strategy BlueGreen
    Create a nodepool cluster with a specific OS SKU: az aks nodepool add -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster --os-sku Ubuntu
    Create a nodepool in an existing AKS cluster with ephemeral os enabled.: az aks nodepool add -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster --node-osdisk-type Ephemeral --node-osdisk-size 48
    Create a nodepool of type VirtualMachines: az aks nodepool add -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster --vm-set-type VirtualMachines --vm-sizes "Standard_D4s_v3,Standard_D8s_v3" --node-count 3
    Create a nodepool which can run wasm workloads.: az aks nodepool add -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster  --workload-runtime WasmWasi
    Create a nodepool with EncryptionAtHost enabled.: az aks nodepool add -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster --enable-encryption-at-host
    Create a nodepool with FIPS-enabled OS: az aks nodepool add -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster --enable-fips-image
    Create a nodepool with KataVmIsolation enabled.: az aks nodepool add -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster --os-sku AzureLinux --vm-size Standard_D4s_v3 --workload-runtime KataVmIsolation --node-count 1
    Create a nodepool with ManagedSystem mode: az aks nodepool add -g MyResourceGroup -n managedsystem1 --cluster-name MyManagedCluster --mode ManagedSystem
    Create a nodepool with UltraSSD enabled.: az aks nodepool add -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster --enable-ultra-ssd
    Create a nodepool with a specific os-sku: az aks nodepool add -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster  --os-sku Ubuntu
    Create a nodepool with ip allocation mode set to "StaticBlock" and using a pod subnet ID: az aks nodepool add -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster  --os-sku Ubuntu --pod-subnet-id /subscriptions/00000/resourceGroups/AnotherResourceGroup/providers/Microsoft.Network/virtualNetworks/MyVnet/subnets/MySubnet --pod-ip-allocation-mode StaticBlock
    create a kubernetes cluster with a snapshot id.: az aks nodepool add -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster --kubernetes-version 1.20.9 --snapshot-id "/subscriptions/00000/resourceGroups/AnotherResourceGroup/providers/Microsoft.ContainerService/snapshots/mysnapshot1"
    create a nodepool in an existing AKS cluster with host group id: az aks nodepool add -g MyResourceGroup -n MyNodePool --cluster-name MyMC --host-group-id /subscriptions/00000/resourceGroups/AnotherResourceGroup/providers/Microsoft.ContainerService/hostGroups/myHostGroup --node-vm-size VMSize
    create a nodepool of type VirtualMachines: az aks nodepool add -g MyResourceGroup -n MyNodePool --cluster-name MyMC --vm-set-type VirtualMachines --vm-sizes "VMSize1,VMSize2" --node-count 3
    create a nodepool with a Capacity Reservation Group(CRG) ID.: az aks nodepool add -g MyResourceGroup -n MyNodePool --cluster-name MyMC --node-vm-size VMSize --crg-id "/subscriptions/SubID/resourceGroups/ResourceGroupName/providers/Microsoft.ContainerService/CapacityReservationGroups/MyCRGID"
