# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: transitiontocmk
description: Transitions all volumes in a VNet to a different encryption key source (Microsoft-managed key or Azure Key Vault).
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --private-endpoint-id=: Identifier of the private endpoint to reach the Azure Key Vault
    --subscription=: Name or ID of subscription.
    --virtual-network-id=: Identifier for the virtual network
    -a, --account-name=: The name of the NetApp account
    -g, --resource-group=: Name of resource group.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Transitions all volumes in a VNet to a different encryption key source (Microsoft-managed key or Azure Key Vault). Operation fails if targeted volumes share encryption sibling set with volumes from another account.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        private-endpoint-id: Identifier of the private endpoint to reach the Azure Key Vault.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        virtual-network-id: Identifier for the virtual network.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Accounts_TransitionEncryptionKey: az netappfiles account transitiontocmk --resource-group myRG --account-name account1 --virtual-network-id /subscriptions/D633CC2E-722B-4AE1-B636-BBD9E4C60ED9/resourceGroups/myRG/providers/Microsoft.Network/virtualNetworks/vnet1 --private-endpoint-id /subscriptions/D633CC2E-722B-4AE1-B636-BBD9E4C60ED9/resourceGroups/myRG/providers/Microsoft.Network/privateEndpoints/privip1
