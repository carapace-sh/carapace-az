# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get a spark job definition.
flags:
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -n, --name=!: The spark job definition name
documentation:
    flag:
        name: The spark job definition name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    Get a spark job definition.: |-
        az synapse spark-job-definition show --workspace-name testsynapseworkspace \
          --name testsjdname
