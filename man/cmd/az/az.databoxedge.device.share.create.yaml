# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create share on the device.
flags:
    --access-protocol=!: Access protocol to be used by the share.
    --azure-container-info=:
        description: Azure container mapping for the share.
        nargs: -1
    --client-access-rights=:
        description: List of IP addresses and corresponding access rights on the share(required for NFS protocol).
        nargs: -1
    --data-policy=: Data policy of the share.
    --description=: Description for the share.
    --device-name=!: The device name.
    --monitoring-status=!: Current monitoring status of the share.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --refresh-details=:
        description: Details of the refresh job on this share.
        nargs: -1
    --share-status=!: Current status of the share.
    --subscription=: Name or ID of subscription.
    --user-access-rights=:
        description: Mapping of users and corresponding access rights on the share (required for SMB protocol).
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The share name.
completion:
    flag:
        access-protocol:
            - NFS
            - SMB
        data-policy:
            - Cloud
            - Local
        monitoring-status:
            - Disabled
            - Enabled
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        share-status:
            - NeedsAttention
            - OK
            - Offline
            - Unknown
            - Updating
documentation:
    flag:
        access-protocol: |-
            Access protocol to be used by the share.

            Accepted values: NFS, SMB
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        azure-container-info: Azure container mapping for the share.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        client-access-rights: List of IP addresses and corresponding access rights on the share(required for NFS protocol).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        data-policy: |-
            Data policy of the share.

            Accepted values: Cloud, Local
        description: Description for the share.
        device-name: The device name.
        monitoring-status: |-
            Current monitoring status of the share.

            Accepted values: Disabled, Enabled
        name: The share name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        refresh-details: Details of the refresh job on this share.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        share-status: |-
            Current status of the share.

            Accepted values: NeedsAttention, OK, Offline, Unknown, Updating
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-access-rights: Mapping of users and corresponding access rights on the share (required for SMB protocol).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Create share: az databoxedge device share create -g rg -n share-name --device-name name --access-protocol NFS --monitoring-status Enabled --share-status OK --azure-container-info '{containerName:testContainer,dataFormat:BlockBlob,storageAccountCredentialId:/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/resourcegroup/providers/Microsoft.DataBoxEdge/dataBoxEdgeDevices/testedgedevice/storageAccountCredentials/accountname}'
