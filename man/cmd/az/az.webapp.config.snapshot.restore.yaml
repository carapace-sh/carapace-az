# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore a web app snapshot.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --restore-content-only=: Restore the web app files without restoring the settings.
    --source-name=: Name of the web app to retrieve snapshot from.
    --source-resource-group=: Name of the resource group to retrieve snapshot from.
    --source-slot=: Name of the web app slot to retrieve snapshot from.
    --subscription=: Name or ID of subscription.
    --time=!: Timestamp of the snapshot to restore.
    -g, --resource-group=: Name of resource group.
    -n, --name=: name of the web app.
    -s, --slot=: The name of the slot.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the web app. If left unspecified, a name will be randomly generated. You can configure the default using ``` az configure --defaults web=<name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restore-content-only: |-
            Restore the web app files without restoring the settings.

            Default value: False
        slot: The name of the slot.
        source-name: Name of the web app to retrieve snapshot from.
        source-resource-group: Name of the resource group to retrieve snapshot from.
        source-slot: Name of the web app slot to retrieve snapshot from.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        time: Timestamp of the snapshot to restore.
examples:
    ? Restore a snapshot of web app SourceApp to web app TargetApp. Use --restore-content-only to not restore app settings. Overwrites TargetApp's files.
    : az webapp config snapshot restore -g TargetResourceGroup -n TargetApp --source-name SourceApp --source-resource-group OriginalResourceGroup --time 2018-12-11T23:34:16.8388367 --restore-content-only
    Restore web app files from a snapshot. Overwrites the web app's current files and settings.: az webapp config snapshot restore -g MyResourceGroup -n MySite --time 2018-12-11T23:34:16.8388367
