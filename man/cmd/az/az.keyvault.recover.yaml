# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: recover
description: Recover a Vault or HSM.
flags:
    --hsm-name=: Name of the deleted HSM.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Resource group of the deleted Vault or HSM
    -l, --location=: Location of the deleted Vault or HSM
    -n, --name=: Name of the deleted Vault.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        hsm-name: Name of the deleted HSM. (--hsm-name and --name/-n are mutually exclusive, please specify just one of them).
        location: Location of the deleted Vault or HSM.
        name: Name of the deleted Vault.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Resource group of the deleted Vault or HSM.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Recover a key vault. (autogenerated): az keyvault recover --location westus2 --name MyKeyVault --resource-group MyResourceGroup
