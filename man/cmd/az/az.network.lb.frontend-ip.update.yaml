# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a frontend IP address.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --gateway-lb=: The reference to gateway load balancer frontend IP.
    --lb-name=!: The load balancer name.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --private-ip-address=: Static private IP address to associate with the configuration.
    --private-ipv=: Whether the specific ipconfiguration is IPv4 or IPv6.
    --public-ip-address=: Name or ID of the existing public IP to associate with the configuration.
    --public-ip-prefix=: Name or ID of a public IP prefix.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subnet=: Resource ID.
    --subscription=: Name or ID of subscription.
    --vnet-name=: The virtual network (VNet) associated with the subnet (Omit if supplying a subnet id).
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the frontend IP configuration.
    -z, --zone=:
        description: A list of availability zones denoting the IP allocated for the resource needs to come from.
        nargs: -1
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        private-ipv:
            - IPv4
            - IPv6
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        gateway-lb: The reference to gateway load balancer frontend IP.
        lb-name: The load balancer name.
        name: The name of the frontend IP configuration.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        private-ip-address: |-
            Static private IP address to associate with the configuration.

            Accepted values: IPv4, IPv6
        private-ipv: Whether the specific ipconfiguration is IPv4 or IPv6. Default is taken as IPv4.
        public-ip-address: Name or ID of the existing public IP to associate with the configuration.
        public-ip-prefix: Name or ID of a public IP prefix.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subnet: Resource ID.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vnet-name: The virtual network (VNet) associated with the subnet (Omit if supplying a subnet id).
        zone: A list of availability zones denoting the IP allocated for the resource needs to come from.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Update the frontend IP address of a public load balancer.: az network lb frontend-ip update -g MyResourceGroup --lb-name MyLb -n MyFrontendIp --public-ip-address MyNewPublicIp
    Update the frontend IP address of an internal load balancer.: az network lb frontend-ip update -g MyResourceGroup --lb-name MyLb -n MyFrontendIp --private-ip-address 10.10.10.50
