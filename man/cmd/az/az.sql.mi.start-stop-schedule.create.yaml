# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the managed instance's Start/Stop schedule.
flags:
    --description=: The description of the schedule.
    --mi=!: The name of the managed instance.
    --schedule-list=:
        description: Schedule list.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --timezone-id=: The time zone of the schedule.
    -g, --resource-group=!: Name of the resource group.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: The description of the schedule.
        resource-group: Name of the resource group.
        schedule-list: Schedule list.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timezone-id: |-
            The time zone of the schedule.

            Default value: UTC
examples:
    Create schedule for managed instance.: az sql mi start-stop-schedule create --mi miName -g resourceGroup --subscription subscriptionId --schedule-list "[{'startDay':'Monday','startTime':'10:00 AM','stopDay':'Monday','stopTime':'12:00 AM'}]"
