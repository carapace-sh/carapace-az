# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the DirectLine Channel on a bot with only v3 protocol enabled.
flags:
    --add-disabled=:
        description: Add the channel in a disabled state.
        nargs: -1
    --disablev1=:
        description: If true, v1 protocol will be disabled on the channel
        nargs: -1
    --disablev3=:
        description: If true, v3 protocol will be disabled on the channel.
        nargs: -1
    --enable-enhanced-auth=:
        description: If true, enables enhanced authentication features.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --trusted-origins=:
        description: Space separated Trusted Origins URLs (must use HTTPS) e.g. --trusted-origins https://mybotsite1.azurewebsites.net https://mybotsite2.azurewebsites.net
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The resource name of the bot.
    -s, --site-name=: Name of the Directline channel site.
completion:
    flag:
        add-disabled:
            - "true"
            - "false"
        disablev1:
            - "true"
            - "false"
        disablev3:
            - "true"
            - "false"
        enable-enhanced-auth:
            - "true"
            - "false"
documentation:
    command: |-
        Command group 'bot directline' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add-disabled: |-
            Add the channel in a disabled state.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        disablev1: |-
            If true, v1 protocol will be disabled on the channel.

            Accepted values: false, true
        disablev3: |-
            If true, v3 protocol will be disabled on the channel.

            Accepted values: false, true
        enable-enhanced-auth: |-
            If true, enables enhanced authentication features. Must be true for --trusted-origins parameters to work.

            Default value: False

            Accepted values: false, true
        location: |-
            Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .

            Default value: global
        name: The resource name of the bot. Bot name must be between 4 and 42 characters in length. Bot name can only have the following characters -, a - z, A - Z, 0 - 9, and _.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        site-name: |-
            Name of the Directline channel site.

            Default value: Default Site
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        trusted-origins: Space separated Trusted Origins URLs (must use HTTPS) e.g. --trusted-origins https://mybotsite1.azurewebsites.net https://mybotsite2.azurewebsites.net .
examples:
    Create the DirectLine Channel for a bot.: az bot directline create -n botName -g MyResourceGroup --disablev1
