# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: failover
description: Failover request can be triggered for a storage account in case of availability issues.
flags:
    --failover-type=: The parameter is set to 'Planned' to indicate whether a Planned failover is requested
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The storage account name.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: |-
            The related change reference ID for this resource operation.

            Accepted values: Planned, Unplanned
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The storage account name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": Do not prompt for confirmation.
examples:
    Failover a storage account without waiting for complete.: |-
        az storage account failover -n mystorageaccount -g MyResourceGroup --no-wait
        az storage account show -n mystorageaccount --expand geoReplicationStats
    Planned Failover a storage account.: az storage account failover -n mystorageaccount -g MyResourceGroup --failover-type Planned
    Unplanned Failover a storage account.: az storage account failover -n mystorageaccount -g MyResourceGroup
