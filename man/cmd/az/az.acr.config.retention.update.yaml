# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update retention policy for an Azure Container Registry.
flags:
    --days=: 'The number of days to retain an untagged manifest after which it gets purged (Range: 0 to 365).'
    --status=: Indicates whether retention policy is enabled.
    --subscription=: Name or ID of subscription.
    --type=!: The type of retention policy.
    -g, --resource-group=: Name of resource group.
    -r, --registry=!: The name of the container registry.
completion:
    flag:
        status:
            - enabled
            - disabled
        type:
            - UntaggedManifests
documentation:
    command: |-
        Command group 'acr config retention' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        days: |-
            The number of days to retain an untagged manifest after which it gets purged (Range: 0 to 365). Value "0" will delete untagged manifests immediately.

            Default value: 7
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        status: |-
            Indicates whether retention policy is enabled.

            Accepted values: disabled, enabled
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: |-
            The type of retention policy.

            Accepted values: UntaggedManifests
examples:
    Enable retention policy for an Azure Container Registry to delete a manifest as soon as it gets untagged.: az acr config retention update -r myregistry --status Enabled --days 0 --type UntaggedManifests
    Enable retention policy for an Azure Container Registry to delete an untagged manifest after 30 days.: az acr config retention update -r myregistry --status Enabled --days 30 --type UntaggedManifests
