# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: This implementation eschews the source and target connection details and the database list.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        source-platform: |
            The type of server for the source database. The supported types are: SQL, PostgreSQL, MySQL.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-platform: |
            The type of service for the target database. The supported types are: SQLDB, AzureDbForPostgreSQL, AzureDbForMySQL.
flags:
    --service-name=!: The name of the Service.
    --source-platform=!: The type of server for the source database.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: A space-delimited list of tags in "tag1[=value1]" format.
        nargs: -1
    --target-platform=!: The type of service for the target database.
    -g, --resource-group=!: Name of resource group.
    -l, --location=!: Location.
    -n, --name=!: The name of the Project.
