# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: This implementation eschews the source and target connection details and the database list.
flags:
    --service-name=!: The name of the Service.
    --source-platform=!: The type of server for the source database.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: A space-delimited list of tags in "tag1[=value1]" format.
        nargs: -1
    --target-platform=!: The type of service for the target database.
    -g, --resource-group=!: Name of resource group.
    -l, --location=!: Location.
    -n, --name=!: The name of the Project.
documentation:
    command: Create a migration project which can contain multiple tasks.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: The name of the Project. DMS Project is a logical grouping that encompasses source database connection, target database connection and a list of databases to migrate.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the Service. DMS Service is an Azure instance that performs database migrations.
        source-platform: 'The type of server for the source database. The supported types are: SQL, PostgreSQL, MongoDB.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: A space-delimited list of tags in "tag1[=value1]" format.
        target-platform: |
            The type of service for the target database. The supported types are: SQLDB, AzureDbForPostgreSQL, AzureDbForMySQL.
examples:
    Create a MySQL to AzureDbForMySQL project for a DMS instance.: az dms project create -n mysqlproject -g myresourcegroup --service-name mydms --source-platform MySQL --target-platform AzureDbForMySQL --tags tagName1=tagValue1 tagWithNoValue
    Create a PostgreSql to AzureDbForPostgreSql project for a DMS instance.: az dms project create -l westus -n pgproject -g myresourcegroup --service-name mydms --source-platform PostgreSQL --target-platform AzureDbForPostgreSQL --tags tagName1=tagValue1 tagWithNoValue
    Create a SQL to SQLDB project for a DMS instance.: az dms project create -l westus -n sqlproject -g myresourcegroup --service-name mydms --source-platform SQL --target-platform SQLDB --tags tagName1=tagValue1 tagWithNoValue
