# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: open-port
description: Opens a VM to inbound traffic on specified ports.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        nsg-name: The name of the network security group to create if one does not exist. Ignored if an NSG already exists.
        port: 'The port or port range (ex: 80-100) to open inbound traffic to. Use ''*'' to allow traffic to all ports. Use comma separated values to specify more than one port or port range.'
        priority: Rule priority, between 100 (highest priority) and 4096 (lowest priority). Must be unique for each rule in the collection.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --apply-to-subnet=: Allow inbound traffic on the subnet instead of the NIC
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --nsg-name=: The name of the network security group to create if one does not exist.
    --port=!: 'The port or port range (ex: 80-100) to open inbound traffic to.'
    --priority=: Rule priority, between 100 (highest priority) and 4096 (lowest priority).
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the virtual machine to open inbound traffic on.
