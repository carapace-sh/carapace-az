# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: start
description: Copies an incremental copy of a blob asynchronously.
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --auth-mode=: The mode in which to run the command.
    --connection-string=: Storage account connection string.
    --destination-if-match=: An ETag value, or the wildcard character (*).
    --destination-if-modified-since=: Commence only if modified since supplied UTC datetime (Y-m-d'T'H:M'Z')
    --destination-if-none-match=: An ETag value, or the wildcard character (*).
    --destination-if-unmodified-since=: Commence only if unmodified since supplied UTC datetime (Y-m-d'T'H:M'Z')
    --destination-lease-id=: The lease ID specified for this header must match the lease ID of the destination blob.
    --metadata=:
        description: Metadata in space-separated key=value pairs.
        nargs: -1
    --sas-token=: A Shared Access Signature (SAS).
    --source-account-key=: The storage account key of the source blob.
    --source-account-name=: The storage account name of the source blob.
    --source-blob=: The blob name for the source storage account.
    --source-container=: The container name for the source storage account.
    --source-lease-id=: Specify this to perform the Copy Blob operation only if the lease ID given matches the active lease ID of the source blob.
    --source-sas=: The shared access signature for the source storage account.
    --source-snapshot=: The blob snapshot for the source storage account.
    --subscription=: Name or ID of subscription.
    --timeout=: Request timeout in seconds.
    -b, --destination-blob=!: Name of the destination blob.
    -c, --destination-container=!: The container name.
    -u, --source-uri=: A URL of up to 2 KB in length that specifies an Azure page blob.
completion:
    flag:
        auth-mode:
            - login
            - key
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY.'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auth-mode: |-
            The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE.

            Accepted values: key, login
        blob-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with ``` az storage account show ``` . Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT.'
        change-reference: The related change reference ID for this resource operation.
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING.'
        destination-blob: Name of the destination blob. If the exists, it will be overwritten.
        destination-container: The container name.
        destination-if-match: ' An ETag value, or the wildcard character (*). Specify an ETag value for this conditional header to copy the blob only if the specified ETag value matches the ETag value for an existing destination blob. If the ETag for the destination blob does not match the ETag specified for If-Match, the Blob service returns status code 412 (Precondition Failed).'
        destination-if-modified-since: Commence only if modified since supplied UTC datetime (Y-m-d'T'H:M'Z').
        destination-if-none-match: ' An ETag value, or the wildcard character (*). Specify an ETag value for this conditional header to copy the blob only if the specified ETag value does not match the ETag value for the destination blob. Specify the wildcard character (*) to perform the operation only if the destination blob does not exist. If the specified condition isn''t met, the Blob service returns status code 412 (Precondition Failed).'
        destination-if-unmodified-since: Commence only if unmodified since supplied UTC datetime (Y-m-d'T'H:M'Z').
        destination-lease-id: ' The lease ID specified for this header must match the lease ID of the destination blob. If the request does not include the lease ID or it is not valid, the operation fails with status code 412 (Precondition Failed).'
        metadata: Metadata in space-separated key=value pairs. This overwrites any existing metadata.
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_SAS_TOKEN.'
        source-account-key: The storage account key of the source blob.
        source-account-name: The storage account name of the source blob.
        source-blob: The blob name for the source storage account.
        source-container: The container name for the source storage account.
        source-lease-id: ' Specify this to perform the Copy Blob operation only if the lease ID given matches the active lease ID of the source blob.'
        source-sas: The shared access signature for the source storage account.
        source-snapshot: The blob snapshot for the source storage account.
        source-uri: 'A URL of up to 2 KB in length that specifies an Azure page blob. The value should be URL-encoded as it would appear in a request URI. The copy source must be a snapshot and include a valid SAS token or be public. Example: ``` https://myaccount.blob.core.windows.net/mycontainer/myblob?snapshot=<DateTime>&sastoken ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: Request timeout in seconds. Applies to each call to the service.
examples:
    Copies an incremental copy of a blob asynchronously. (autogenerated): az storage blob incremental-copy start --account-key 00000000 --account-name MyAccount --destination-blob MyDestinationBlob --destination-container MyDestinationContainer --source-account-key MySourceKey --source-account-name MySourceAccount --source-blob MyBlob --source-container MySourceContainer --source-snapshot MySnapshot
    Copy an incremental copy of a blob asynchronously. (autogenerated): az storage blob incremental-copy start --connection-string myconnectionstring --destination-blob mydestinationblob --destination-container MyDestinationContainer --source-uri https://storage.blob.core.windows.net/photos
    Upload all files that end with .py unless blob exists and has been modified since given date.: az storage blob incremental-copy start --source-container MySourceContainer --source-blob MyBlob --source-account-name MySourceAccount --source-account-key MySourceKey --source-snapshot MySnapshot --destination-container MyDestinationContainer --destination-blob MyDestinationBlob
