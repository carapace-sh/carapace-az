# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a cross-region load balancer.
flags:
    --backend-pool-name=: The name of the backend address pool.
    --frontend-ip-name=: The name of the frontend IP configuration.
    --frontend-ip-zone=: used to create internal facing Load balancer
    --no-wait=: Do not wait for the long-running operation to finish.
    --public-ip-address-allocation=: IP allocation method.
    --public-ip-address=: Name or ID of the public IP address, or '' for none.
    --public-ip-dns-name=: Globally unique DNS name for a new public IP.
    --public-ip-zone=: used to created a new public ip for the load balancer, a.k.a public facing Load balancer
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --validate=: Generate and validate the ARM template without creating any resources.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The load balancer name.
completion:
    flag:
        public-ip-address-allocation:
            - Static
            - Dynamic
documentation:
    flag:
        acquire-policy-token: |-
            Acquiring an Azure Policy token automatically for this resource operation.

            Accepted values: Dynamic, Static
        backend-pool-name: The name of the backend address pool.
        change-reference: The related change reference ID for this resource operation.
        frontend-ip-name: |-
            The name of the frontend IP configuration.

            Default value: LoadBalancerFrontEnd
        frontend-ip-zone: Used to create internal facing Load balancer.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: The load balancer name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        public-ip-address: Name or ID of the public IP address, or '' for none. Uses existing resource if available or will create a new resource with defaults if omitted.
        public-ip-dns-name: Globally unique DNS name for a new public IP.
        public-ip-zone: Used to created a new public ip for the load balancer, a.k.a public facing Load balancer.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        validate: |-
            Generate and validate the ARM template without creating any resources.

            Default value: False
examples:
    Create a basic load balancer.: az network cross-region-lb create -g MyResourceGroup -n MyLb
