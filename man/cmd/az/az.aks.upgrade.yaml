# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upgrade
description: Upgrade a managed Kubernetes cluster to a newer version.
flags:
    --control-plane-only=: Upgrade the cluster control plane only.
    --disable-force-upgrade=: Disable forceUpgrade cluster upgrade settings override.
    --enable-force-upgrade=: Enable forceUpgrade cluster upgrade settings override.
    --if-match=: The value provided will be compared to the ETag of the managed cluster, if it matches the operation will proceed.
    --if-none-match=: Set to '*' to allow a new cluster to be created, but to prevent updating an existing cluster.
    --k8s-support-plan=: Choose from "KubernetesOfficial" or "AKSLongTermSupport", with "AKSLongTermSupport" you get 1 extra year of CVE patchs.
    --no-wait=: Do not wait for the long-running operation to finish.
    --node-image-only=: Only upgrade node image for agent pools.
    --subscription=: Name or ID of subscription.
    --tier=: Specify SKU tier for managed clusters.
    --upgrade-override-until=: Until when the cluster upgradeSettings overrides are effective.
    -g, --resource-group=!: Name of resource group.
    -k, --kubernetes-version=: ""
    -n, --name=!: Name of the managed cluster.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        k8s-support-plan:
            - KubernetesOfficial
            - AKSLongTermSupport
        tier:
            - free
            - standard
            - premium
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        aks-custom-headers: Send custom headers. When specified, format should be Key1=Value1,Key2=Value2.
        change-reference: The related change reference ID for this resource operation.
        cluster-snapshot-id: The source cluster snapshot id is used to upgrade existing cluster.
        control-plane-only: |-
            Upgrade the cluster control plane only. If not specified, both control plane AND all node pools will be upgraded.

            Default value: False
        disable-force-upgrade: |-
            Disable forceUpgrade cluster upgrade settings override.

            Default value: False
        enable-force-upgrade: |-
            Enable forceUpgrade cluster upgrade settings override.

            Default value: False
        if-match: The value provided will be compared to the ETag of the managed cluster, if it matches the operation will proceed. If it does not match, the request will be rejected to prevent accidental overwrites. This must not be specified when creating a new cluster.
        if-none-match: Set to '*' to allow a new cluster to be created, but to prevent updating an existing cluster. Other values will be ignored.
        k8s-support-plan: |-
            Choose from "KubernetesOfficial" or "AKSLongTermSupport". With "AKSLongTermSupport" you get 1 extra year of CVE patches.

            Accepted values: AKSLongTermSupport, KubernetesOfficial
        kubernetes-version: |-
            Version of Kubernetes to upgrade the cluster to, such as "1.11.12".

            Value from: `az aks get-upgrades`
        name: Name of the managed cluster.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        node-image-only: |-
            Only upgrade node image for agent pools.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tier: |-
            Specify SKU tier for managed clusters. '--tier standard' enables a standard managed cluster service with a financially backed SLA. '--tier free' does not have a financially backed SLA. '--tier premium' is required for '--k8s-support-plan AKSLongTermSupport'.

            Accepted values: free, premium, standard
        upgrade-override-until: Until when the cluster upgradeSettings overrides are effective. It needs to be in a valid date-time format that's within the next 30 days. For example, 2023-04-01T13:00:00Z. Note that if --force-upgrade is set to true and --upgrade-override-until is not set, by default it will be set to 3 days from now.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Upgrade a existing managed cluster to a managed cluster snapshot.: az aks upgrade -g MyResourceGroup -n MyManagedCluster --cluster-snapshot-id "/subscriptions/00000/resourceGroups/AnotherResourceGroup/providers/Microsoft.ContainerService/managedclustersnapshots/mysnapshot1"
    Upgrade a managed Kubernetes cluster to a newer version. (autogenerated): az aks upgrade --kubernetes-version 1.12.6 --name MyManagedCluster --resource-group MyResourceGroup
