# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates security automation rule.
flags:
    --expected-value=!: The expected value
    --operator=!: A valid comparer operator to use.
    --property-j-path=!: The JPath of the entity model property that should be checked
    --property-type=!: The data type of the compared operands (string, integer, floating point number or a boolean [true/false]]
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        expected-value: The expected value.
        operator: A valid comparer operator to use. A case-insensitive comparison will be applied for String PropertyType.
        property-j-path: The JPath of the entity model property that should be checked.
        property-type: The data type of the compared operands (string, integer, floating point number or a boolean [true/false]].
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Creates security automation rule.: az security automation-rule create --expected-value 'High' --operator 'Equals' --property-j-path 'properties.metadata.severity' --property-type 'string'
