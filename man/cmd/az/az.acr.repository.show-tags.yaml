# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-tags
description: Show tags for a repository in an Azure Container Registry.
flags:
    --detail=: Show detailed information.
    --orderby=: Order the items in the results.
    --repository=!: The name of the repository.
    --subscription=: Name or ID of subscription.
    --suffix=: The tenant suffix in registry login server.
    --top=: Limit the number of items in the results.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
    -p, --password=: The password used to log into a container registry
    -u, --username=: The username used to log into a container registry
completion:
    flag:
        orderby:
            - time_asc
            - time_desc
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        detail: |-
            Show detailed information.

            Default value: False
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        orderby: |-
            Order the items in the results. Default to alphabetical order of names.

            Accepted values: time_asc, time_desc
        password: The password used to log into a container registry.
        repository: The name of the repository.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        suffix: The tenant suffix in registry login server. You may specify '--suffix tenant' if your registry login server is in the format 'registry-tenant.azurecr.io'. Applicable if you're accessing the registry from a different subscription or you have permission to access images but not the permission to manage the registry resource.
        top: Limit the number of items in the results.
        username: The username used to log into a container registry.
examples:
    Show tags of a repository in an Azure Container Registry.: az acr repository show-tags -n myregistry --repository MyRepository
    Show the detailed information of tags of a repository in an Azure Container Registry.: az acr repository show-tags -n myregistry --repository MyRepository --detail
    Show the detailed information of the latest 10 tags ordered by timestamp of a repository in an Azure Container Registry.: az acr repository show-tags -n myregistry --repository MyRepository --top 10 --orderby time_desc --detail
