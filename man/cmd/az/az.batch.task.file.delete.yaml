# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes the specified Task file from the Compute Node where the Task ran.
documentation:
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT'
        file-path: The path to the Task file that you want to get the content of. Required.
        job-id: The ID of the Job that contains the Task. Required.
        recursive: Whether to delete children of a directory. If the filePath parameter represents a directory instead of a file, you can set recursive to true to delete the directory and all of the files and subdirectories in it. If recursive is false then the directory must be empty or deletion will fail. Default value is None.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        task-id: The ID of the Task whose file you want to retrieve. Required.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --file-path=!: The path to the Task file that you want to get the content of.
    --job-id=!: The ID of the Job that contains the Task.
    --recursive=:
        description: Whether to delete children of a directory.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --task-id=!: The ID of the Task whose file you want to retrieve.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        recursive:
            - "true"
            - "false"
