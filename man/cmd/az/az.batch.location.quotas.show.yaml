# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets the Batch service quotas for the specified subscription at the given location.
flags:
    --subscription=: Name or ID of subscription.
    -l, --location=!: The region for which to display the Batch service quotas.
documentation:
    flag:
        location: The region for which to display the Batch service quotas.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
