# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows a regulatory compliance details state for selected standard.
flags:
    --standard-name=!: The compliance standard name
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        name: Name of the resource to be fetched.
        standard-name: The compliance standard name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get selected regulatory compliance control details and state.: az security regulatory-compliance-controls show --standard-name 'Azure-CIS-1.1.0' -n '1.1'
