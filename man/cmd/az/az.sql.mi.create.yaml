# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a managed instance.
flags:
    --authentication-metadata=: Preferred metadata to use for authentication of synced on-prem users.
    --backup-storage-redundancy=: Backup storage redundancy used to store backups.
    --collation=: The collation of the managed instance.
    --database-format=: Managed Instance database format specific to the SQL.
    --dns-zone-partner=: The resource id of the partner Managed Instance to inherit DnsZone property from for Managed Instance creation.
    --enable-ad-only-auth=: Enable Azure Active Directory Only Authentication for this server.
    --external-admin-name=: Display name of the Azure AD administrator user, group or application.
    --external-admin-principal-type=: User, Group or Application
    --external-admin-sid=: The unique ID of the Azure AD administrator.
    --gpv2=:
        description: Whether or not this is a GPv2 variant of General Purpose edition.
        nargs: -1
    --instance-pool-name=: Name of the Instance Pool where managed instance will be placed.
    --iops=: The storage iops of the managed instance.
    --license-type=: The license type to apply for this managed instance.
    --minimal-tls-version=: The minimal TLS version enforced by the managed instance for inbound connections.
    --no-wait=: Do not wait for the long-running operation to finish.
    --pricing-model=: Managed Instance pricing model.
    --primary-user-assigned-identity-id=: The ID of the primary user managed identity.
    --proxy-override=: The connection type used for connecting to the instance.
    --public-data-endpoint-enabled=:
        description: Whether or not the public data endpoint is enabled for the instance.
        nargs: -1
    --service-principal-type=: Service Principal type to be used for this Managed Instance.
    --storage=: The storage size of the managed instance.
    --subnet=!: Name or ID of the subnet that allows access to an Azure Sql Managed Instance.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --timezone-id=: The time zone id for the instance to set.
    --vnet-name=: The virtual network name
    -a, --user-assigned-identity-id=:
        description: Generate and assign an User Managed Identity(UMI) for this server.
        nargs: -1
    -c, --capacity=: The capacity of the managed instance in integer number of vcores.
    -e, --tier=: The edition component of the sku.
    -f, --family=: The compute generation component of the sku.
    -g, --resource-group=!: Name of resource group.
    -i, --assign-identity=: Generate and assign an Azure Active Directory Identity for this managed instance for use with key management services like Azure KeyVault.
    -k, --key-id=: The key vault URI for encryption.
    -l, --location=: Location.
    -m, --maint-config-id=: Assign maintenance configuration to this managed instance.
    -n, --name=!: The managed instance name
    -p, --admin-password=: The administrator login password (required formanaged instance creation).
    -t, --identity-type=: Type of Identity to be used.
    -u, --admin-user=: Administrator username for the managed instance.
    -y, --yes=: Do not prompt for confirmation.
    -z, --zone-redundant=:
        description: Specifies whether to enable zone redundancy.
        nargs: -1
completion:
    flag:
        authentication-metadata:
            - AzureAD
            - Windows
            - Paired
        database-format:
            - AlwaysUpToDate
            - SQLServer2022
        gpv2:
            - "true"
            - "false"
        identity-type:
            - SystemAssigned
            - UserAssigned
            - SystemAssigned,UserAssigned
            - None
        license-type:
            - LicenseIncluded
            - BasePrice
        minimal-tls-version:
            - None
            - "1.0"
            - "1.1"
            - "1.2"
        pricing-model:
            - Regular
            - Freemium
        proxy-override:
            - Default
            - Redirect
            - Proxy
        public-data-endpoint-enabled:
            - "true"
            - "false"
        service-principal-type:
            - SystemAssigned
            - None
        zone-redundant:
            - "true"
            - "false"
documentation:
    command: Create a managed instance.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        admin-password: The administrator login password (required formanaged instance creation).
        admin-user: |-
            Administrator username for the managed instance. Canonly be specified when the managed instance is beingcreated (and is required for creation). --am --authentication-metadata Preferred metadata to use for authentication of synced on-prem users. Default is AzureAD.

            Accepted values: AzureAD, Paired, Windows
        assign-identity: |-
            Generate and assign an Azure Active Directory Identity for this managed instance for use with key management services like Azure KeyVault.

            Default value: False
        authentication-metadata: Preferred metadata to use for authentication of synced on-prem users. Default is AzureAD.
        backup-storage-redundancy: 'Backup storage redundancy used to store backups. Allowed values include: Local, Zone, Geo, GeoZone.'
        capacity: The capacity of the managed instance in integer number of vcores.
        change-reference: The related change reference ID for this resource operation.
        collation: The collation of the managed instance.
        database-format: |-
            Managed Instance database format specific to the SQL. Allowed values include: AlwaysUpToDate, SQLServer2022.

            Accepted values: AlwaysUpToDate, SQLServer2022, SQLServer2025
        dns-zone-partner: 'The resource id of the partner Managed Instance to inherit DnsZone property from for Managed Instance creation. --edition --tier -e The edition component of the sku. Allowed values include: GeneralPurpose, BusinessCritical.'
        enable-ad-only-auth: |-
            Enable Azure Active Directory Only Authentication for this server.

            Default value: False
        external-admin-name: Display name of the Azure AD administrator user, group or application.
        external-admin-principal-type: User, Group or Application.
        external-admin-sid: The unique ID of the Azure AD administrator. Object Id for User or Group, Client Id for Applications.
        family: 'The compute generation component of the sku. Allowed values include: Gen4, Gen5.'
        gpv2: |-
            Whether or not this is a GPv2 variant of General Purpose edition.

            Accepted values: false, true
        identity-type: |-
            Type of Identity to be used. Possible values are SystemAsssigned,UserAssigned, SystemAssignedUserAssigned and None.

            Accepted values: None, SystemAssigned, SystemAssigned,UserAssigned, UserAssigned
        instance-pool-name: Name of the Instance Pool where managed instance will be placed.
        iops: The storage iops of the managed instance. Storage iops can be specified in increments of 1.
        key-id: The key vault URI for encryption.
        license-type: |-
            The license type to apply for this managed instance.

            Accepted values: BasePrice, LicenseIncluded
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        maint-config-id: Assign maintenance configuration to this managed instance.
        memory: The memory size of the managed instance. Memory size must be specified in GB.
        minimal-tls-version: |-
            The minimal TLS version enforced by the managed instance for inbound connections.

            Accepted values: 1.0, 1.1, 1.2, None
        name: The managed instance name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        pricing-model: |-
            Managed Instance pricing model. Allowed values include: Regular, Freemium.

            Accepted values: Freemium, Regular
        proxy-override: |-
            The connection type used for connecting to the instance.

            Accepted values: Default, Proxy, Redirect
        public-data-endpoint-enabled: |-
            Whether or not the public data endpoint is enabled for the instance.

            Accepted values: false, true
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-principal-type: |-
            Service Principal type to be used for this Managed Instance. Possible values are SystemAssigned and None.

            Accepted values: None, SystemAssigned
        storage: The storage size of the managed instance. Storage size must be specified in increments of 32 GB.
        subnet: Name or ID of the subnet that allows access to an Azure Sql Managed Instance. If subnet name is provided, --vnet-name must be provided.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tier: 'The edition component of the sku. Allowed values include: GeneralPurpose, BusinessCritical.'
        timezone-id: The time zone id for the instance to set. A list of time zone ids is exposed through the sys.time_zone_info (Transact-SQL) view.
        user-assigned-identity-id: Generate and assign an User Managed Identity(UMI) for this server.
        vnet-name: The virtual network name.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
        zone-redundant: |-
            Specifies whether to enable zone redundancy. Default is true if no value is specified.

            Accepted values: false, true
examples:
    Create GPv2 managed instance with specified IOPS limit: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} -e GeneralPurpose --gpv2 true -f Gen8IH -c 4 --storage 256GB --iops 3000
    Create a managed instance with Service Principal enabled: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} --service-principal-type SystemAssigned
    Create a managed instance with maintenance configuration: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} -m SQL_{Region}_{MaintenanceConfigName}
    Create a managed instance with minimal set of parameters: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName}
    Create a managed instance with specified parameters and with identity: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --license-type LicenseIncluded --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} --capacity 8 --storage 32GB --edition GeneralPurpose --family Gen5
    Create a managed instance without SQL Admin, with AAD admin and AD Only enabled: az sql mi create --enable-ad-only-auth --external-admin-principal-type User --external-admin-name myUserName --external-admin-sid c5e964e2-6bb2-2222-1111-3b16ec0e1234 -g myResourceGroup -n miName --subnet /subscriptions/78975f9f-2222-1111-1111-29c42ac70000/resourceGroups/myResourceGroup/providers/Microsoft.Network/virtualNetworks/vnet-test/subnets/ManagedInstance
    ? Create a managed instance without SQL Admin, with AD admin, AD Only enabled, User ManagedIdenties and Identity Type is SystemAssigned,UserAssigned.
    : az sql mi create --enable-ad-only-auth --external-admin-principal-type User --external-admin-name myUserName \ --external-admin-sid c5e964e2-6bb2-1111-1111-3b16ec0e1234 -g myResourceGroup -n myServer -i \ --user-assigned-identity-id /subscriptions/xxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup/providers/Microsoft.ManagedIdentity/userAssignedIdentities/testumi \ --identity-type SystemAssigned,UserAssigned --pid /subscriptions/xxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup/providers/Microsoft.ManagedIdentity/userAssignedIdentities/testumi \ --subnet /subscriptions/78975f9f-2222-1111-1111-29c42ac70000/resourceGroups/myResourceGroup/providers/Microsoft.Network/virtualNetworks/vnet-test/subnets/ManagedInstance
    ? Create a managed instance without SQL Admin, with AD admin, AD Only enabled, User ManagedIdenties and Identity Type is UserAssigned.
    : az sql mi create --enable-ad-only-auth --external-admin-principal-type User --external-admin-name myUserName \ --external-admin-sid c5e964e2-6bb2-1111-1111-3b16ec0e1234 -g myResourceGroup -n myServer -i \ --user-assigned-identity-id /subscriptions/xxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup/providers/Microsoft.ManagedIdentity/userAssignedIdentities/testumi \ --identity-type UserAssigned --pid /subscriptions/xxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup/providers/Microsoft.ManagedIdentity/userAssignedIdentities/testumi \ --subnet /subscriptions/78975f9f-2222-1111-1111-29c42ac70000/resourceGroups/myResourceGroup/providers/Microsoft.Network/virtualNetworks/vnet-test/subnets/ManagedInstance
    Create managed instance which uses Windows authentication metadata mode: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} --am Windows
    Create managed instance with database format and pricing model: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} --database-format AlwaysUpToDate --pricing-model Regular
    Create managed instance with dns zone partner: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} --dns-zone-partner dns
    Create managed instance with enabled zone redundancy: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} -z
    Create managed instance with instance pool name: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} --instance-pool-name myinstancepool
    Create managed instance with specified memory size in GB: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} -e GeneralPurpose --gpv2 true -f Gen8IM -c 4 --storage 256GB --iops 3000 --memory 40
    Create managed instance with specified parameters and backup storage redundancy specified: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --license-type LicenseIncluded --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} --capacity 8 --storage 32GB --edition GeneralPurpose --family Gen5 --backup-storage-redundancy Local
    Create managed instance with specified parameters and tags: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --license-type LicenseIncluded --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} --capacity 8 --storage 32GB --edition GeneralPurpose --family Gen5 --tags tagName1=tagValue1 tagName2=tagValue2
    Create managed instance with zone redundancy explicitly disabled: az sql mi create -g mygroup -n myinstance -l mylocation -i -u myusername -p mypassword --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/{VNETName}/subnets/{SubnetName} -z false
