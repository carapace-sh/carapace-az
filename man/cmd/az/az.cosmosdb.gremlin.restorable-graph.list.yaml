# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Show the event feed of all mutations done on all the Azure Cosmos DB Gremlin graphs under a specific database.
flags:
    --subscription=: Name or ID of subscription.
    -d, --database-rid=!: Rid of the gremlin database
    -e, --end-time=: End time of restorable Gremlin graph event feed
    -i, --instance-id=!: InstanceId of the Account
    -l, --location=!: Location
    -s, --start-time=: Start time of restorable Gremlin graph event feed
documentation:
    command: |-
        Command group 'cosmosdb gremlin restorable-graph' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        database-rid: Rid of the gremlin database.
        end-time: End time of restorable Gremlin graph event feed.
        instance-id: InstanceId of the Account.
        location: Location.
        start-time: Start time of restorable Gremlin graph event feed.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
