# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a user.
flags:
    --account-enabled=:
        description: enable the user account
        nargs: -1
    --display-name=: object's display name or its prefix
    --force-change-password-next-sign-in=:
        description: If the user must change her password on the next login.
        nargs: -1
    --id=!: The object ID or principal name of the user for which to get information
    --mail-nickname=: mail alias.
    --password=: user password
completion:
    flag:
        account-enabled:
            - "true"
            - "false"
        force-change-password-next-sign-in:
            - "true"
            - "false"
documentation:
    flag:
        account-enabled: |-
            Enable the user account.

            Accepted values: false, true
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        display-name: Object's display name or its prefix.
        force-change-password-next-sign-in: |-
            If the user must change her password on the next login.

            Accepted values: false, true
        id: The object ID or principal name of the user for which to get information.
        mail-nickname: Mail alias. Defaults to user principal name.
        password: User password.
examples:
    Update a user.: az ad user update --id myuser@contoso.com --display-name username2
