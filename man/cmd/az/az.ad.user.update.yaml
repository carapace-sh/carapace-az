# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a user.
documentation:
    flag:
        mail-nickname: mail alias. Defaults to user principal name
flags:
    --account-enabled=:
        description: enable the user account
        nargs: -1
    --display-name=: object's display name or its prefix
    --force-change-password-next-sign-in=:
        description: If the user must change her password on the next login.
        nargs: -1
    --id=!: The object ID or principal name of the user for which to get information
    --mail-nickname=: mail alias.
    --password=: user password
completion:
    flag:
        account-enabled:
            - "true"
            - "false"
        force-change-password-next-sign-in:
            - "true"
            - "false"
