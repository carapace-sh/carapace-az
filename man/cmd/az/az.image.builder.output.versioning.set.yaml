# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Set the image builder output versioner of an image builder template.
flags:
    --defer=:
        description: Temporarily store the object in the local cache instead of sending to Azure.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --major=: Major version for the generated version number.
    --output-name=!: Name of the image builder run output.
    --scheme=!: Version numbering scheme to be used.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the image template.
completion:
    flag:
        scheme:
            - Latest
            - Source
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        defer: Temporarily store the object in the local cache instead of sending to Azure. Use ``` az cache ``` commands to view/clear.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        major: Major version for the generated version number. Determine what is "latest" based on versions with this value as the major version. -1 is equivalent to leaving it unset.
        name: The name of the image template.
        output-name: Name of the image builder run output.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scheme: |-
            Version numbering scheme to be used.

            Accepted values: Latest, Source
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Set the image builder output versioner generating version number based on version number of source image.: az image builder output versioning set -n MyTemplate -g MyResourceGroup --output-name MyVhdImage --scheme Source --defer
    Set the image builder output versioner generating version number that will be latest based on existing version numbers.: az image builder output versioning set -n MyTemplate -g MyResourceGroup --output-name MyVhdImage --scheme Latest --defer
    Set the image builder output versioner generating version number that will be latest based on specified major version.: az image builder output versioning set -n MyTemplate -g MyResourceGroup --output-name MyVhdImage --scheme Latest --major 1 --defer
