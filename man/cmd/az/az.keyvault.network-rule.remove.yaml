# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove a network rule from the network ACLs for a Key Vault.
documentation:
    flag:
        ip-address: 'IPv4 address or CIDR range. Can supply a list: --ip-address ip1 [ip2]...'
        subnet: Name or ID of subnet. If name is supplied, `--vnet-name` must be supplied.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --ip-address=:
        description: IPv4 address or CIDR range.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --subnet=: Name or ID of subnet.
    --subscription=: Name or ID of subscription.
    --vnet-name=: Name of a virtual network.
    -g, --resource-group=: Proceed only if Key Vault belongs to the specified resource group.
    -n, --name=!: Name of the Vault.
