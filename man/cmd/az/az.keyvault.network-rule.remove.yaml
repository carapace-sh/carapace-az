# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove a network rule from the network ACLs for a Key Vault.
flags:
    --ip-address=:
        description: IPv4 address or CIDR range.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --subnet=: Name or ID of subnet.
    --subscription=: Name or ID of subscription.
    --vnet-name=: Name of a virtual network.
    -g, --resource-group=: Proceed only if Key Vault belongs to the specified resource group.
    -n, --name=!: Name of the Vault.
documentation:
    command: Remove a network rule from the network ACLs for a Key Vault or a Managed HSM.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        hsm-name: Name of the HSM. (--hsm-name and --name/-n are mutually exclusive, please specify just one of them).
        ip-address: 'IPv4 address or CIDR range. Can supply a list: --ip-address ip1 [ip2]...'
        name: Name of the Vault.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group.
        subnet: Name or ID of subnet. If name is supplied, `--vnet-name` must be supplied.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vnet-name: Name of a virtual network.
examples:
    Remove a specific IP address to the network access rules of a Key Vault in a specified resource group.: az keyvault network-rule remove --ip-address 1.2.3.4 --name cli-mock-kv-nr --resource-group cli_mock_keyvault_network_rule
