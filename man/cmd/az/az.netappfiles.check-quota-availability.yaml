# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: check-quota-availability
description: Check if a quota is available.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --name=!: Name of the resource to verify.
    --subscription=: Name or ID of subscription.
    --type=!: Resource type used for verification.
    -g, --resource-group=!: Resource group name.
    -l, --location=: Location.
completion:
    flag:
        type:
            - Microsoft.NetApp/netAppAccounts
            - Microsoft.NetApp/netAppAccounts/capacityPools
            - Microsoft.NetApp/netAppAccounts/capacityPools/volumes
            - Microsoft.NetApp/netAppAccounts/capacityPools/volumes/snapshots
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Name of the resource to verify.
        resource-group: Resource group name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: |-
            Resource type used for verification.

            Accepted values: Microsoft.NetApp/netAppAccounts, Microsoft.NetApp/netAppAccounts/backupVaults/backups, Microsoft.NetApp/netAppAccounts/capacityPools, Microsoft.NetApp/netAppAccounts/capacityPools/volumes, Microsoft.NetApp/netAppAccounts/capacityPools/volumes/backups, Microsoft.NetApp/netAppAccounts/capacityPools/volumes/snapshots
