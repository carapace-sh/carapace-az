# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove user asigned managed identites from the server.
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --identity=!:
        description: Space-separated names or ID's of identities.
        nargs: -1
    -s, --server-name=!: Name of the server.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        identity: Space-separated names or ID's of identities.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Remove identity 'test-identity' from server 'testsvr'.: az mysql flexible-server identity remove -g testgroup -s testsvr --identity test-identity
