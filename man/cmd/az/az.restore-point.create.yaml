# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the restore point.
documentation:
    flag:
        consistency-mode: Consistency mode of the restore point. Can be specified in the input while creating a restore point. For now, only CrashConsistent is accepted as a valid input. Please refer to https://aka.ms/RestorePoints for more details.
        exclude-disks: List of disk resource ids that the customer wishes to exclude from the restore point. If no disks are specified, all disks will be included.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --collection-name=!: The name of the restore point collection.
    --consistency-mode=: Consistency mode of the restore point.
    --data-disk-restore-point-encryption-set=:
        description: Customer managed data disk encryption set resource id
        nargs: -1
    --data-disk-restore-point-encryption-type=:
        description: The type of key used to encrypt the data of the data disk restore point.
        nargs: -1
    --exclude-disks=:
        description: List of disk resource ids that the customer wishes to exclude from the restore point.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --os-restore-point-encryption-set=: Customer managed OS disk encryption set resource id
    --os-restore-point-encryption-type=: The type of key used to encrypt the data of the OS disk restore point.
    --source-data-disk-resource=:
        description: Resource Id of the source data disk
        nargs: -1
    --source-os-resource=: Resource Id of the source OS disk
    --source-restore-point=: Resource Id of the source restore point from which a copy needs to be created
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the restore point.
completion:
    flag:
        consistency-mode:
            - CrashConsistent
            - FileSystemConsistent
            - ApplicationConsistent
        data-disk-restore-point-encryption-type:
            - EncryptionAtRestWithPlatformKey
            - EncryptionAtRestWithCustomerKey
            - EncryptionAtRestWithPlatformAndCustomerKeys
        os-restore-point-encryption-type:
            - EncryptionAtRestWithPlatformKey
            - EncryptionAtRestWithCustomerKey
            - EncryptionAtRestWithPlatformAndCustomerKeys
