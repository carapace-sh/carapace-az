# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a monitored Azure DevOps repository resource.
documentation:
    flag:
        actionable-remediation: Configuration payload for PR Annotations.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --actionable-remediation=:
        description: Configuration payload for PR Annotations.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --org-name=!: The Azure DevOps organization name.
    --project-name=!: The project name.
    --repo-name=!: The repository name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The security connector name.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
