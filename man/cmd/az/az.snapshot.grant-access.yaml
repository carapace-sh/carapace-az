# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: grant-access
description: Grant read access to a snapshot.
flags:
    --access=: Access level.
    --duration-in-seconds=!: Time duration in seconds until the SAS access expires.
    --file-format=: Used to specify the file format when making request for SAS on a VHDX file format snapshot
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the snapshot that is being created.
completion:
    flag:
        access:
            - Read
            - Write
        file-format:
            - VHD
            - VHDX
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        duration-in-seconds: Time duration in seconds until the SAS access expires.
        file-format: Used to specify the file format when making request for SAS on a VHDX file format snapshot.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the snapshot that is being created. The name can't be changed after the snapshot is created. Supported characters for the name are a-z, A-Z, 0-9, _ and -. The max name length is 80 characters.
        no-wait: Do not wait for the long-running operation to finish.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Grant read access to a snapshot with specifying the file format.: az snapshot grant-access --duration-in-seconds 3600 --name MySnapshot --resource-group MyResourceGroup --file-format VHDX
    Grant read access to a snapshot.: az snapshot grant-access --duration-in-seconds 3600 --name MySnapshot --resource-group MyResourceGroup
