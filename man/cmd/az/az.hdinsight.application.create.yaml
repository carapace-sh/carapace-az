# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an application for a HDInsight cluster.
documentation:
    flag:
        disable-gateway-auth: 'Indicates whether to disable gateway authentication. Default is to enable gateway authentication. Default: false. '
        edgenode-size: 'The size of the node. See also: https://learn.microsoft.com/azure/hdinsight/hdinsight-hadoop-provision-linux-clusters#configure-cluster-size'
        no-validation-timeout: Permit timeout error during argument validation phase. If omitted, validation timeout error will be permitted.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subnet: The name or ID of subnet. If name is supplied, `--vnet-name` must be supplied.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --access-mode=: The access mode for the application.
    --cluster-name=!: The name of the cluster.
    --destination-port=: The destination port to connect to.
    --disable-gateway-auth=:
        description: Indicates whether to disable gateway authentication.
        nargs: -1
    --edgenode-size=: The size of the node.
    --marketplace-id=: The marketplace identifier.
    --no-validation-timeout=: Permit timeout error during argument validation phase.
    --script-action-name=!: The name of the script action.
    --script-parameters=: The parameters for the script.
    --script-uri=!: The URI to the script.
    --sub-domain-suffix=: The subdomain suffix of the application.
    --subnet=: The name or ID of subnet.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vnet-name=: The name of a virtual network.
    -K, --ssh-public-key=: SSH public key for the cluster nodes.
    -P, --ssh-password=: SSH password for the cluster nodes.
    -U, --ssh-user=: SSH username for the cluster nodes.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The constant value for the application name.
    -t, --type=: The application type.
completion:
    flag:
        disable-gateway-auth:
            - "true"
            - "false"
        type:
            - CustomApplication
            - RServer
