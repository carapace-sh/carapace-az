# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets the details of the private endpoint connection to the search service in the given resource group.
flags:
    --service-name=!: The name of the search service.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --private-endpoint-connection-name=!: The name of the private endpoint connection to the Azure Cognitive Search service with the specified resource group.
documentation:
    flag:
        private-endpoint-connection-name: The name of the private endpoint connection to the Azure Cognitive Search service with the specified resource group. Required.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the search service.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
