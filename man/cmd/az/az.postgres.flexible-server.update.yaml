# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a flexible server.
flags:
    --active-directory-auth=: Whether Microsoft Entra authentication is enabled.
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --backup-identity=: The name or resource ID of the geo backup user identity for data encryption.
    --backup-key=: The resource ID of the geo backup keyvault key for data encryption.
    --backup-retention=: The number of days a backup is retained.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --high-availability=: Enable (ZoneRedundant or SameZone) or disable high availability feature.
    --identity=: The name or resource ID of the user assigned identity for data encryption.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --iops=: Value of IOPS in (operations/sec) to be allocated for this server.
    --key=: The resource ID of the primary keyvault key for data encryption.
    --maintenance-window=: Period of time (UTC) designated for maintenance.
    --microsoft-entra-auth=: Whether Microsoft Entra authentication is enabled.
    --node-count=: The number of nodes for elastic cluster.
    --password-auth=: Whether password authentication is enabled.
    --performance-tier=: Performance tier of the server.
    --private-dns-zone=: This parameter only applies for a server with private access.
    --public-access=: Enable or disable the public access on a server.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku-name=: The name of the compute SKU.
    --standby-zone=: The availability zone information of the standby server when high availability is enabled.
    --storage-auto-grow=: Enable or disable autogrow of the storage.
    --storage-size=: The storage capacity of the server.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --throughput=: Storage throughput in (MB/sec) for the server.
    --tier=: Compute tier of the server.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the server.
    -p, --admin-password=: The password of the administrator.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        active-directory-auth:
            - Enabled
            - Disabled
        high-availability:
            - ZoneRedundant
            - SameZone
            - Disabled
        microsoft-entra-auth:
            - Enabled
            - Disabled
        password-auth:
            - Enabled
            - Disabled
        public-access:
            - Enabled
            - Disabled
        storage-auto-grow:
            - Enabled
            - Disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        admin-password: 'The password of the administrator. Minimum 8 characters and maximum 128 characters. Password must contain characters from three of the following categories: English uppercase letters, English lowercase letters, numbers, and non-alphanumeric characters.'
        allow-same-zone: |-
            Allow primary and standby in the same zone when multi-zone capacity is unavailable.

            Default value: False
        backup-identity: The name or resource identifier of the geo backup user identity for data encryption. The identity needs to be in the same region as the backup region.
        backup-key: The resource identifier of the geo backup keyvault key for data encryption. The key needs to be in the same region as the backup region.
        backup-retention: The number of days a backup is retained. Range of 7 to 35 days. Default is 7 days.
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        identity: The name or resource identifier of the user assigned identity for data encryption.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        iops: Value of IOPS in (operations/sec) to be allocated for this server. This value can only be updated if flexible server is using Premium SSD v2 Disks.
        key: The resource identifier of the primary keyvault key for data encryption.
        maintenance-window: 'Period of time (UTC) designated for maintenance. Examples: "Sun:23:30" to schedule on Sunday, 11:30pm UTC. To set back to default pass in "Disabled".'
        microsoft-entra-auth: |-
            Whether Microsoft Entra authentication is enabled.

            Accepted values: Disabled, Enabled
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        node-count: The number of nodes for elastic cluster. Range of 1 to 10.
        password-auth: |-
            Whether password authentication is enabled.

            Accepted values: Disabled, Enabled
        performance-tier: Performance tier of the server.
        private-dns-zone: This parameter only applies for a server with private access. The name or id of new or existing private dns zone. You can use the private dns zone from same resource group, different resource group, or different subscription. If you want to use a zone from different resource group or subscription, please provide resource Id. CLI creates a new private dns zone within the same resource group as virtual network if not provided by users.
        public-access: |-
            Enable or disable the public access on a server.

            Accepted values: Disabled, Enabled
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        sku-name: 'The name of the compute SKU. Follows the convention Standard_{VM name}. Examples: Standard_B1ms.'
        standby-zone: The availability zone information of the standby server when high availability is enabled.
        storage-auto-grow: |-
            Enable or disable autogrow of the storage. Default value is Disabled.

            Accepted values: Disabled, Enabled
        storage-size: The storage capacity of the server. Minimum is 32 GiB and max is 16 TiB.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        throughput: Storage throughput in (MB/sec) for the server. This value can only be updated if flexible server is using Premium SSD v2 Disks.
        tier: 'Compute tier of the server. Accepted values: Burstable, GeneralPurpose, MemoryOptimized '
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
        zonal-resiliency: |-
            Enable or disable high availability feature.

            Accepted values: Disabled, Enabled
examples:
    ? Change key/identity for data encryption. Data encryption cannot be enabled post server creation, this will only update the key/identity.
    : |-
        # get key identifier of the existing key
        newKeyIdentifier=$(az keyvault key show --vault-name testVault --name testKey \
          --query key.kid -o tsv)
        # update server with new key/identity
        az postgres flexible-server update --resource-group testgroup --name testserver \
          --key $newKeyIdentifier --identity newIdentity
    Reset password: az postgres flexible-server update --resource-group testgroup --name testserver -p password123
    Update a flexible server to enable Microsoft Entra auth for password auth enabled server: az postgres flexible-server update --resource-group testgroup --name testserver --microsoft-entra-auth Enabled
    ? Update a flexible server to update private DNS zone for a VNET enabled server, using private DNS zone in the different resource group and subscription. Private DNS zone will be linked to the VNET if not already linked.
    : az postgres flexible-server update --resource-group testgroup --name testserver --private-dns-zone /subscriptions/{subscriptionId2}/resourceGroups/{resourceGroup2}/providers/Microsoft.Network/privateDnsZones/testDNS.postgres.database.azure.com
    ? Update a flexible server to update private DNS zone for a VNET enabled server, using private DNS zone in the same resource group and subscription. Private DNS zone will be created Private DNS zone will be linked to the VNET if not already linked.
    : az postgres flexible-server update --resource-group testgroup --name testserver --private-dns-zone testDNS2.postgres.database.azure.com
    Update a flexible server's cluster size by scaling up node count. Must be an elastic cluster.: az postgres flexible-server update --resource-group testGroup --name testcluster --node-count 6
    Update a flexible server's sku, using local context for server and resource group.: az postgres flexible-server update --sku-name Standard_D4s_v3
    Update a flexible server's storage to enable / disable storage auto-grow.: az postgres flexible-server update --resource-group testgroup --name testserver --storage-auto-grow Enabled
    Update a flexible server's storage to set IOPS (operations/sec). Server must be using Premium SSD v2 Disks.: az postgres flexible-server update --resource-group testgroup --name testserver --iops 3000
    Update a flexible server's storage to set Throughput (MB/sec). Server must be using Premium SSD v2 Disks.: az postgres flexible-server update --resource-group testGroup --name testserver --throughput 125
    Update a flexible server's storage to set custom storage performance tier.: az postgres flexible-server update --resource-group testgroup --name testserver --performance-tier P15
    Update a server's tags.: az postgres flexible-server update --resource-group testgroup --name testserver --tags "k1=v1" "k2=v2"
