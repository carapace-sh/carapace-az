# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List web apps.
flags:
    --show-details=: Include detailed site configuration of listed web apps in output
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        show-details: |-
            Include detailed site configuration of listed web apps in output.

            Default value: False
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all running web apps.: az webapp list --query "[?state=='Running']"
    List all web apps in MyResourceGroup.: az webapp list --resource-group MyResourceGroup
    List default host name and state for all web apps.: 'az webapp list --query "[].{hostName: defaultHostName, state: state}"'
