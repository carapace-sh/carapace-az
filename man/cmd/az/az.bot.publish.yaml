# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: publish
description: Publish to a bot's associated app service.
flags:
    --code-dir=: The directory to upload bot code from.
    --keep-node-modules=:
        description: Keep node_modules folder and do not run `npm install` on the App Service.
        nargs: -1
    --proj-file-path=: Path to the start up project file name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The resource name of the bot.
    -t, --timeout=: Configurable timeout in seconds for checking the status of deployment.
    -v, --version=: The Microsoft Bot Builder SDK version of the bot.
completion:
    flag:
        keep-node-modules:
            - "true"
            - "false"
documentation:
    command: 'This command is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        code-dir: The directory to upload bot code from.
        keep-node-modules: Keep node_modules folder and do not run ``` npm install ``` on the App Service. This can greatly speed up publish commands for Node.js SDK bots.
        name: The resource name of the bot. Bot name must be between 4 and 42 characters in length. Bot name can only have the following characters -, a - z, A - Z, 0 - 9, and _.
        proj-file-path: Path to the start up project file name. (E.g. "./EchoBotWithCounter.csproj").
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: Configurable timeout in seconds for checking the status of deployment.
        version: The Microsoft Bot Builder SDK version of the bot.
examples:
    Publish source code to your Azure App, from within the bot code folder: az bot publish -n botName -g MyResourceGroup
