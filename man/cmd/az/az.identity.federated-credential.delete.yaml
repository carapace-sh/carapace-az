# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a federated identity credential under an existing user assigned identity.
flags:
    --identity-name=!: The name of the identity resource.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the federated identity credential resource.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        identity-name: The name of the identity resource.
        name: The name of the federated identity credential resource.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete a federated identity credential under a specific user assigned identity.: az identity federated-credential delete --name myFicName --identity-name myIdentityName --resource-group myResourceGroup
