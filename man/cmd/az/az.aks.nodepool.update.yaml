# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a node pool properties.
flags:
    --aks-custom-headers=: Comma-separated key-value pairs to specify custom headers.
    --allowed-host-ports=:
        description: Expose host ports on the node pool.
        nargs: -1
    --asg-ids=:
        description: The IDs of the application security groups to which the node pool's network interface should belong.
        nargs: -1
    --cluster-name=!: The cluster name.
    --disable-fips-image=: Switch to use non-FIPS-enabled OS on agent nodes.
    --disable-secure-boot=: Disable Secure Boot on on an existing Trusted Launch enabled agent node pool.
    --disable-vtpm=: Disable vTPM on an existing Trusted Launch enabled agent node pool.
    --drain-timeout=: When nodes are drain how many minutes to wait for all pods to be evicted
    --enable-fips-image=: Switch to use FIPS-enabled OS on agent nodes.
    --enable-secure-boot=: Enable Secure Boot on an existing Trusted Launch enabled agent node pool.
    --enable-vtpm=: Enable vTPM on an existing Trusted Launch enabled agent node pool.
    --if-match=: The value provided will be compared to the ETag of the node pool, if it matches the operation will proceed.
    --if-none-match=: Set to '*' to allow a new node pool to be created, but to prevent updating an existing node pool.
    --labels=:
        description: The node labels for the node pool.
        nargs: -1
    --max-count=: Maximum nodes count used for autoscaler, when "--enable-cluster-autoscaler" specified.
    --max-surge=: Extra nodes used to speed upgrade.
    --min-count=: Minimum nodes count used for autoscaler, when "--enable-cluster-autoscaler" specified.
    --mode=: The mode for a node pool which defines a node pool's primary function.
    --no-wait=: Do not wait for the long-running operation to finish.
    --node-soak-duration=: The amount of time (in minutes) to wait after draining a node and before reimaging it and moving on to next node.
    --node-taints=: The node taints for the node pool.
    --os-sku=: The os-sku of the agent node pool.
    --scale-down-mode=: Describe how VMs are added to or removed from nodepools.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -d, --disable-cluster-autoscaler=: ""
    -e, --enable-cluster-autoscaler=: ""
    -g, --resource-group=!: Name of resource group.
    -n, --nodepool-name=!: The node pool name.
    -u, --update-cluster-autoscaler=: ""
completion:
    flag:
        mode:
            - System
            - User
        os-sku:
            - AzureLinux
            - CBLMariner
            - Mariner
        scale-down-mode:
            - Delete
            - Deallocate
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        aks-custom-headers: Send custom headers. When specified, format should be Key1=Value1,Key2=Value2.
        allowed-host-ports: Expose host ports on the node pool. When specified, format should be a comma-separated list of ranges with protocol, eg. 80/TCP,443/TCP,4000-5000/TCP. Must use VMSS agent pool type.
        asg-ids: The IDs of the application security groups to which the node pool's network interface should belong. When specified, format should be a comma-separated list of IDs. Must use VMSS agent pool type.
        batch-soak-duration: Wait time (in minutes) after draining a batch of nodes before proceeding to the next batch. Default is 15 minutes. Only for blue-green upgrades.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: The cluster name. --name --nodepool-name -n The node pool name.
        crg-id: The Capacity Reservation Group (CRG) ID used to associate the existing nodepool with the existing Capacity Reservation Group resource.
        disable-artifact-streaming: |-
            Disable artifact streaming for VirtualMachineScaleSets managed by a Linux node pool.

            Default value: False
        disable-cluster-autoscaler: |-
            Disable cluster autoscaler. For VirtualMachines pools, converts all autoscale profiles back to manual scale profiles.

            Default value: False
        disable-fips-image: |-
            Switch to use non-FIPS-enabled OS on agent nodes.

            Default value: False
        disable-secure-boot: |-
            Disable Secure Boot on on an existing Trusted Launch enabled agent node pool.

            Default value: False
        disable-vtpm: |-
            Disable vTPM on an existing Trusted Launch enabled agent node pool.

            Default value: False
        drain-batch-size: 'Number or percentage of nodes to drain per batch during blue-green upgrades. Accepts an integer (e.g. ''5'') or percentage (e.g. ''50%''). Default is 10%. Specifies how many nodes to drain in each batch during a blue-green upgrade. Must be a non-zero value, either as an integer (e.g. ''5'') or a percentage (e.g. ''50%'') of the total blue nodes at the start of the upgrade. Fractional nodes are rounded up. For more details and best practices, see: https://learn.microsoft.com/en-us/azure/aks/upgrade-cluster .'
        drain-timeout: When nodes are drain how many minutes to wait for all pods to be evicted.
        drain-timeout-bg: Timeout (in minutes) to evict pods and gracefully terminate per node during blue-green upgrades. Default is 30 minutes. Maximum time (in minutes) to wait for pod eviction and graceful termination per node during blue-green upgrades. Honors pod disruption budgets. If exceeded, the upgrade fails. Default is 30 minutes.
        enable-artifact-streaming: |-
            Enable artifact streaming for VirtualMachineScaleSets managed by a Linux node pool, to speed up the cold-start of containers on a node through on-demand image loading. To use this feature, container images must also enable artifact streaming on ACR. If not specified, the default is false.

            Default value: False
        enable-cluster-autoscaler: |-
            Enable cluster autoscaler. For VMSS pools, enables autoscaler on the pool. For VirtualMachines pools, converts all manual scale profiles to autoscale profiles using the same min/max counts.

            Default value: False
        enable-fips-image: |-
            Switch to use FIPS-enabled OS on agent nodes.

            Default value: False
        enable-managed-gpu: |-
            Enable the Managed GPU experience, which installs additional components like DCGM metrics for monitoring on top of the GPU driver. For more details, visit aka.ms/aks/managed-gpu.

            Default value: False

            Accepted values: false, true
        enable-secure-boot: |-
            Enable Secure Boot on an existing Trusted Launch enabled agent node pool. Must use VMSS or VMs agent pool type.

            Default value: False
        enable-vtpm: |-
            Enable vTPM on an existing Trusted Launch enabled agent node pool. Must use VMSS or VMs agent pool type.

            Default value: False
        final-soak-duration: Wait time (in minutes) after all old nodes are drained before removing them. Default is 60 minutes. Only for blue-green upgrades.
        gpu-driver: |-
            Whether to install driver for GPU node pool. Possible values are "Install" or "None".

            Accepted values: Install, None
        gpu-mig-strategy: |-
            Specify the GPU Multi-Instance GPU (MIG) strategy. Allowed values: Single, Mixed.

            Accepted values: Mixed, Single
        if-match: The value provided will be compared to the ETag of the node pool, if it matches the operation will proceed. If it does not match, the request will be rejected to prevent accidental overwrites. This must not be specified when creating a new agentpool.
        if-none-match: Set to '*' to allow a new node pool to be created, but to prevent updating an existing node pool. Other values will be ignored.
        labels: The node labels for the node pool. See https://aka.ms/node-labels for syntax of labels.
        localdns-config: Set the localDNS Profile for a nodepool with a JSON config file.
        max-blocked-nodes: The maximum number or percentage of extra nodes that are allowed to be blocked in the agent pool during an upgrade when undrainable node behavior is Cordon. When specified, it represents the number or percent used, eg. 1 or 5%.
        max-count: Maximum nodes count used for autoscaler, when "--enable-cluster-autoscaler" specified. Please specify the value in the range of [0, 1000] for user nodepool, and [1,1000] for system nodepool.
        max-surge: Extra nodes used to speed upgrade. When specified, it represents the number or percent used, eg. 5 or 33%.
        max-unavailable: The maximum number or percentage of nodes that can be simultaneously unavailable during upgrade. When specified, it represents the number or percent used, eg. 1 or 5%.
        min-count: Minimum nodes count used for autoscaler, when "--enable-cluster-autoscaler" specified. Please specify the value in the range of [0, 1000] for user nodepool, and [1,1000] for system nodepool.
        mode: |-
            The mode for a node pool which defines a node pool's primary function. If set as "System", AKS prefers system pods scheduling to node pools with mode ``` System ``` . If set as "ManagedSystem", all other properties except name and mode will be rejected and managed by AKS. Learn more at https://aka.ms/aks/nodepool/mode .

            Accepted values: Gateway, Machines, ManagedSystem, System, User
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        node-soak-duration: The amount of time (in minutes) to wait after draining a node and before reimaging it and moving on to next node.
        node-taints: The node taints for the node pool. You can update the existing node taint of a nodepool or create a new node taint for a nodepool. Pass the empty string ``` "" ``` to remove all taints.
        node-vm-size: VM size for Kubernetes nodes. For VMSS pools, changing this triggers a rolling upgrade to replace nodes with the new size (preview). For VirtualMachines pools, only configurable when updating autoscale settings.
        os-sku: |-
            The os-sku of the agent node pool.

            Accepted values: AzureContainerLinux, AzureLinux, AzureLinux3, AzureLinux3OSGuard, AzureLinuxOSGuard, Flatcar, Ubuntu, Ubuntu2204, Ubuntu2404
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scale-down-mode: |-
            Describes how VMs are added to or removed from nodepools.

            Accepted values: Deallocate, Delete
        ssh-access: |-
            Update SSH setting for the node pool. Use "disabled" to disable SSH access, "localuser" to enable SSH access using private key.

            Accepted values: disabled, entraid, localuser
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        undrainable-node-behavior: Define the behavior for undrainable nodes during upgrade. The value should be "Cordon" or "Schedule". The default value is "Schedule".
        update-cluster-autoscaler: |-
            Update min-count or max-count for cluster autoscaler. Not supported for VirtualMachines pools; use 'az aks nodepool auto-scale update' instead.

            Default value: False
        upgrade-strategy: |-
            Upgrade strategy for the node pool. Allowed values are "Rolling" or "BlueGreen". Default is "Rolling".

            Accepted values: BlueGreen, Rolling
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Change a node pool to system mode: az aks nodepool update --mode System -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster
    Disable cluster-autoscaler for an existing cluster: az aks nodepool update --disable-cluster-autoscaler -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster
    Enable cluster-autoscaler within node count range [1,5]: az aks nodepool update --enable-cluster-autoscaler --min-count 1 --max-count 5 -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster
    Reconcile the nodepool back to its current state.: az aks nodepool update -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster
    Resize VM size for a VMSS node pool (preview, requires AFEC registration): az aks nodepool update -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster --node-vm-size Standard_D4s_v3
    Update a node pool with blue-green upgrade settings: az aks nodepool update -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster --drain-batch-size 50% --drain-timeout-bg 5 --batch-soak-duration 10 --final-soak-duration 10
    Update a nodepool with a Capacity Reservation Group(CRG) ID.: az aks nodepool update -g MyResourceGroup -n MyNodePool --cluster-name MyMC --node-vm-size VMSize --crg-id "/subscriptions/SubID/resourceGroups/ResourceGroupName/providers/Microsoft.Compute/CapacityReservationGroups/MyCRGID"
    Update cluster autoscaler vm size, min-count and max-count for virtual machines node pool: az aks nodepool update -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster --update-cluster-autoscaler --node-vm-size "Standard_D2s_v3" --min-count 2 --max-count 4
    Update min-count or max-count for cluster autoscaler.: az aks nodepool update --update-cluster-autoscaler --min-count 1 --max-count 10 -g MyResourceGroup -n nodepool1 --cluster-name MyManagedCluster
