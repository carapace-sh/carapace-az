# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: link
description: Link an Azure Function to a static webapp.
flags:
    --environment-name=: Name of the environment of static site
    --force=: Force the function link even if the function is already linked to a static webapp.
    --function-resource-id=!: Resource ID of the functionapp to link.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the static site
documentation:
    command: Link an Azure Function to a static webapp. Also known as "Bring your own Functions." Only one Azure Functions app is available to a single static web app. Static webapp SKU must be "Standard" or "Dedicated".
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        environment-name: Name of the environment of static site.
        force: |-
            Force the function link even if the function is already linked to a static webapp. May be needed if the function was previously linked to a static webapp.

            Default value: False
        function-resource-id: Resource ID of the functionapp to link. Can be retrieved with 'az functionapp --query id'.
        name: Name of the static site.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Link a function to a static webapp: az staticwebapp functions link -n MyStaticAppName -g MyResourceGroup --function-resource-id "/subscriptions/<subscription-id>/resourceGroups/<resource-group>/providers/Microsoft.Web/sites/<function-name>"
