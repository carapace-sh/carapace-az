# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: link
description: Link an Azure Function to a static webapp.
documentation:
    flag:
        force: Force the function link even if the function is already linked to a static webapp. May be needed if the function was previously linked to a static webapp.
        function-resource-id: Resource ID of the functionapp to link. Can be retrieved with 'az functionapp --query id'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --environment-name=: Name of the environment of static site
    --force=: Force the function link even if the function is already linked to a static webapp.
    --function-resource-id=!: Resource ID of the functionapp to link.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the static site
