# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: unlink
description: Unlink backend from a static web app
flags:
    --environment-name=: Name of the environment of static site
    --remove-backend-auth=: If set to true, removes the identity provider configured on the backend during the linking process.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the static site
documentation:
    command: Unlink backend from a static web app.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        environment-name: |-
            Name of the environment of static site.

            Default value: default
        name: Name of the static site.
        remove-backend-auth: |-
            If set to true, removes the identity provider configured on the backend during the linking process.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Unlink backend from static web app environment and remove auth config from backend.: az staticwebapp backends unlink -n MyStaticAppName -g MyResourceGroup --environment-name MyEnvironmentName --remove-backend-auth
    Unlink static app backends.: az staticwebapp backends unlink -n MyStaticAppName -g MyResourceGroup
