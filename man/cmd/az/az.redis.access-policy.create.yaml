# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Add an Access Policy to the Redis Cache
flags:
    --access-policy-name=!: The name of the access policy that is being assigned
    --permissions=!: Permissions for the access policy.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the Redis cache.
documentation:
    command: Add an Access Policy to the Redis Cache.
    flag:
        access-policy-name: The name of the access policy that is being assigned.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the Redis cache.
        permissions: Permissions for the access policy. Learn how to configure permissions at https://aka.ms/redis/AADPreRequisites .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a custom Access Policy with the given permissions: az redis access-policy create -g testResourceGroup -n testCacheName --access-policy-name testAccessPolicy --permissions "+get +hget"
