# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a probe in the load balance.
flags:
    --interval=: The interval, in seconds, for how frequently to probe the endpoint for health status.
    --lb-name=!: The load balancer name.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --path=: The URI used for requesting health status from the VM.
    --port=!: The port for communicating the probe.
    --probe-threshold=: The number of consecutive successful or failed probes in order to allow or deny traffic from being delivered to this endpoint.
    --protocol=!: The protocol of the end point.
    --subscription=: Name or ID of subscription.
    --threshold=: The number of consecutive probe failures before an instance is deemed unhealthy.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the probe.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - Http
            - Https
            - Tcp
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        lb-name: The load balancer name.
        name: The name of the probe.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        path: The URI used for requesting health status from the VM. Path is required if a protocol is set to http. Otherwise, it is not allowed.
        port: The port for communicating the probe. Possible values range from 1 to 65535, inclusive.
        probe-threshold: The number of consecutive successful or failed probes in order to allow or deny traffic from being delivered to this endpoint. It is currently in preview and is not recommended for production workloads. For most scenarios, we recommend maintaining the default value of 1 by not specifying the value of the property.
        protocol: |-
            The protocol of the end point.

            Accepted values: Http, Https, Tcp
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a probe on a load balancer over HTTP and port 80.: az network lb probe create -g MyResourceGroup --lb-name MyLb -n MyProbe --protocol http --port 80 --path /
    Create a probe on a load balancer over TCP on port 443.: az network lb probe create -g MyResourceGroup --lb-name MyLb -n MyProbe --protocol tcp --port 443
