# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the agreements for a billing account.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --expand=: May be used to expand the participants.
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        Command group 'billing agreement' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        expand: May be used to expand the participants.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List agreements by billing account: az billing agreement list --account-name "{billingAccountName}"
