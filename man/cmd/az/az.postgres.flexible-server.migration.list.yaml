# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the migrations of a flexible server.
documentation:
    flag:
        filter: 'Indicate whether all the migrations or just the Active migrations are returned. Valid values are: Active and All.'
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --filter=: Indicate whether all the migrations or just the Active migrations are returned.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Resource Group Name of the migration target server.
    -n, --name=!: Name of the server.
completion:
    flag:
        filter:
            - Active
            - All
