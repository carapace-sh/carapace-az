# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the migrations of a flexible server.
flags:
    --filter=: Indicate whether all the migrations or just the Active migrations are returned.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Resource Group Name of the migration target server.
    -n, --name=!: Name of the server.
completion:
    flag:
        filter:
            - Active
            - All
documentation:
    flag:
        filter: |-
            Indicate whether all the migrations or just the Active migrations are returned. Valid values are: Active and All.

            Default value: Active

            Accepted values: Active, All
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Migration target server name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all (Active/Completed) migrations of a target flexible server.: az postgres flexible-server migration list --subscription xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx --resource-group testGroup --server-name testserver --filter All
    List the currently active migrations of a target flexible server.: az postgres flexible-server migration list --subscription xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx --resource-group testGroup --server-name testserver --filter Active
