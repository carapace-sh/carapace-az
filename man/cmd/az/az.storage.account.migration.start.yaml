# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: start
description: Account Migration request can be triggered for a storage account to change its redundancy level.
documentation:
    flag:
        account-name: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-name=: The name of the storage account within the specified resource group.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --name=: current value is 'default' for customer initiated migration
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --sku=!: Target sku name for the account
    --subscription=: Name or ID of subscription.
    --type=: SrpAccountMigrationType in ARM contract which is 'accountMigrations'
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        sku:
            - Premium_LRS
            - Premium_ZRS
            - Standard_GRS
            - Standard_GZRS
            - Standard_LRS
            - Standard_RAGRS
            - Standard_RAGZRS
            - Standard_ZRS
