# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: start
description: Account Migration request can be triggered for a storage account to change its redundancy level.
flags:
    --account-name=: The name of the storage account within the specified resource group.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --name=: current value is 'default' for customer initiated migration
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --sku=!: Target sku name for the account
    --subscription=: Name or ID of subscription.
    --type=: SrpAccountMigrationType in ARM contract which is 'accountMigrations'
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        sku:
            - Premium_LRS
            - Premium_ZRS
            - Standard_GRS
            - Standard_GZRS
            - Standard_LRS
            - Standard_RAGRS
            - Standard_RAGZRS
            - Standard_ZRS
documentation:
    command: Account Migration request can be triggered for a storage account to change its redundancy level. The migration updates the non-zonal redundant storage account to a zonal redundant account or vice-versa in order to have better reliability and availability. Zone-redundant storage (ZRS) replicates your storage account synchronously across three Azure availability zones in the primary region.
    flag:
        account-name: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Current value is 'default' for customer initiated migration.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: SrpAccountMigrationType in ARM contract which is 'accountMigrations'.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    migration start: az storage account migration start --account-name "storage_account_name" -g "resource_group_name" --sku Standard_ZRS --name default --no-wait
