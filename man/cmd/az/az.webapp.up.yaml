# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: up
description: Create a webapp and deploy code from a local workspace to the app.
documentation:
    flag:
        app-service-environment: name or resource ID of the (pre-existing) App Service Environment to deploy to. Requires an Isolated V2 sku
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        launch-browser: Launch the created app using the default browser. This is not supported in Azure Cloud Shell.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        name: name of the web app. If left unspecified, a name will be randomly generated. You can configure the default using `az configure --defaults web=<name>`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --basic-auth=: Enable or disable basic auth.
    --dryrun=: show summary of the create and deploy operation instead of executing it
    --enable-kudu-warmup=:
        description: If true, kudu will be warmed up before performing deployment for a linux webapp.
        nargs: -1
    --html=: Ignore app detection and deploy as an html app
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --logs=: Configure default logging required to enable viewing log stream immediately after launching the webapp
    --os-type=: Set the OS type for the app to be created.
    --sku=: The pricing tiers, e.g., F1(Free), D1(Shared), B1(Basic Small), B2(Basic Medium), B3(Basic Large), S1(Standard Small), P1V2(Premium V2 Small), P2V2(Premium V2 Medium), P3V2(Premium V2 Large), P0V3(Premium V3 Extra Small), P1V3(Premium V3 Small), P2V3(Premium V3 Medium), P3V3(Premium V3 Large), P1MV3(Premium Memory Optimized V3 Small), P2MV3(Premium Memory Optimized V3 Medium), P3MV3(Premium Memory Optimized V3 Large), P4MV3(Premium Memory Optimized V3 Extra Large), P5MV3(Premium Memory Optimized V3 Extra Extra Large), I1 (Isolated Small), I2 (Isolated Medium), I3 (Isolated Large), I1V2 (Isolated V2 I1V2), I2V2 (Isolated V2 I2V2), I3V2 (Isolated V2 I3V2), I4V2 (Isolated V2 I4V2), I5V2 (Isolated V2 I5V2), I6V2 (Isolated V2 I6V2), I1MV2 (Isolated Memory Optimized V2 I1MV2), I2MV2 (Isolated Memory Optimized V2 I2MV2), I3MV2 (Isolated Memory Optimized V2 I3MV2), I4MV2 (Isolated Memory Optimized V2 I4MV2), I5MV2 (Isolated Memory Optimized V2 I5MV2), WS1 (Logic Apps Workflow Standard 1), WS2 (Logic Apps Workflow Standard 2), WS3 (Logic Apps Workflow Standard 3)
    --subscription=: Name or ID of subscription.
    --track-status=:
        description: If true, web app startup status during deployment will be tracked for linux web apps.
        nargs: -1
    -b, --launch-browser=: Launch the created app using the default browser.
    -e, --app-service-environment=: name or resource ID of the (pre-existing) App Service Environment to deploy to.
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
    -n, --name=: name of the web app.
    -p, --plan=: name of the app service plan associated with the webapp
    -r, --runtime=: canonicalized web runtime in the format of Framework:Version, e.g. "PHP:7.2".Use `az webapp list-runtimes` for available list.
completion:
    flag:
        basic-auth:
            - Enabled
            - Disabled
        enable-kudu-warmup:
            - "true"
            - "false"
        os-type:
            - Windows
            - Linux
        sku:
            - F1
            - FREE
            - D1
            - SHARED
            - B1
            - B2
            - B3
            - S1
            - S2
            - S3
            - P1V2
            - P2V2
            - P3V2
            - P0V3
            - P1V3
            - P2V3
            - P3V3
            - P1MV3
            - P2MV3
            - P3MV3
            - P4MV3
            - P5MV3
            - I1
            - I2
            - I3
            - I1V2
            - I2V2
            - I3V2
            - I4V2
            - I5V2
            - I6V2
            - I1MV2
            - I2MV2
            - I3MV2
            - I4MV2
            - I5MV2
            - WS1
            - WS2
            - WS3
        track-status:
            - "true"
            - "false"
