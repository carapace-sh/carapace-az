# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a product.
documentation:
    flag:
        approval-required: whether subscription approval is required. If false, new subscriptions will be approved automatically enabling developers to call the product’s APIs immediately after subscribing. If true, administrators must manually approve the subscription before the developer can use any of the product’s APIs. Can be present only if subscriptionRequired property is present and has a value of false.
        description: Product description. May include HTML formatting tags.
        legal-terms: Product terms of use. Developers trying to subscribe to the product will be presented and required to accept these terms before they can complete the subscription process.
        product-id: Product identifier. Must be unique in the current API Management service instance.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        state: 'whether product is published or not. Published products are discoverable by users of developer portal. Non published products are visible only to administrators. Default state of Product is notPublished. Possible values include: ''notPublished'', ''published'''
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        subscriptions-limit: Whether the number of subscriptions a user can have to this product at the same time. Set to null or omit to allow unlimited per user subscriptions. Can be present only if subscriptionRequired property is present and has a value of false.
flags:
    --approval-required=:
        description: whether subscription approval is required.
        nargs: -1
    --description=: Product description.
    --legal-terms=: Product terms of use.
    --no-wait=: Do not wait for the long-running operation to finish.
    --product-id=: Product identifier.
    --product-name=!: Product name.
    --state=: whether product is published or not.
    --subscription=: Name or ID of subscription.
    --subscriptions-limit=: Whether the number of subscriptions a user can have to this product at the same time.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the api management service instance
    -s, --subscription-required=:
        description: Whether a product subscription is required for accessing APIs included in this product.
        nargs: -1
completion:
    flag:
        approval-required:
            - "true"
            - "false"
        state:
            - notPublished
            - published
        subscription-required:
            - "true"
            - "false"
