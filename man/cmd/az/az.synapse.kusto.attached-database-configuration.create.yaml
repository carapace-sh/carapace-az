# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an attached database configuration.
flags:
    --attached-database-configuration-name=!: The name of the attached database configuration.
    --database-name=: The name of the database which you would like to attach, use * if you want to follow all current and future databases.
    --default-principals-modification-kind=: The default principals modification kind
    --kusto-pool-name=!: The name of the Kusto pool.
    --kusto-pool-resource-id=: The resource id of the kusto pool where the databases you would like to attach reside.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --table-level-sharing-properties=:
        description: Table level sharing specifications
        nargs: -1
    --workspace-name=!: The name of the workspace
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
completion:
    flag:
        default-principals-modification-kind:
            - Union
            - Replace
            - None
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        attached-database-configuration-name: The name of the attached database configuration.
        change-reference: The related change reference ID for this resource operation.
        database-name: The name of the database which you would like to attach, use * if you want to follow all current and future databases.
        default-principals-modification-kind: |-
            The default principals modification kind.

            Accepted values: None, Replace, Union
        kusto-pool-name: The name of the Kusto pool.
        kusto-pool-resource-id: The resource id of the kusto pool where the databases you would like to attach reside.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        table-level-sharing-properties: 'Table level sharing specifications. Usage: --table-level-sharing-properties tables-to-include=XX tables-to-exclude=XX external-tables-to-include=XX external-tables-to-exclude=XX materialized-views-to-include=XX materialized-views-to-exclude=XX tables-to-include: List of tables to include in the follower database tables-to-exclude: List of tables to exclude from the follower database external-tables-to-include: List of external tables to include in the follower database external-tables-to-exclude: List of external tables exclude from the follower database materialized-views-to-include: List of materialized views to include in the follower database materialized-views-to-exclude: List of materialized views exclude from the follower database.'
        workspace-name: The name of the workspace.
examples:
    KustoPoolAttachedDatabaseConfigurationsCreateOrUpdate: az synapse kusto attached-database-configuration create --attached-database-configuration-name "attachedDatabaseConfigurations1" --kusto-pool-name "kustoclusterrptest4" --location "westus" --kusto-pool-resource-id "/subscriptions/12345678-1234-1234-1234-123456789098/resourceGroups/kustorptest/providers/Microsoft.Synapse/Workspaces/kustorptest/KustoPools/kustoclusterrptest4" --database-name "kustodatabase" --default-principals-modification-kind "Union" --table-level-sharing-properties external-tables-to-exclude="ExternalTable2" external-tables-to-include="ExternalTable1" materialized-views-to-exclude="MaterializedViewTable2" materialized-views-to-include="MaterializedViewTable1" tables-to-exclude="Table2" tables-to-include="Table1" --resource-group "kustorptest" --workspace-name "kustorptest"
