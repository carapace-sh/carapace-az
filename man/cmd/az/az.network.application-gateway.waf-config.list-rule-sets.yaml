# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-rule-sets
description: Get information on available WAF rule sets, rule groups, and rule IDs.
documentation:
    flag:
        group: |
            List rules for the specified rule group. Use `*` to list rules for all groups. Omit to suppress listing individual rules.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: Rule set type to list. Omit to list all types.
        version: Rule set version to list. Omit to list all versions.
flags:
    --group=: List rules for the specified rule group.
    --subscription=: Name or ID of subscription.
    --type=: Rule set type to list.
    --version=: Rule set version to list.
