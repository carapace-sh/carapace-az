# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-rule-sets
description: Get information on available WAF rule sets, rule groups, and rule IDs.
flags:
    --group=: List rules for the specified rule group.
    --subscription=: Name or ID of subscription.
    --type=: Rule set type to list.
    --version=: Rule set version to list.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        group: List rules for the specified rule group. Use ``` * ``` to list rules for all groups. Omit to suppress listing individual rules.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: Rule set type to list. Omit to list all types.
        version: Rule set version to list. Omit to list all versions.
examples:
    List available rule groups in OWASP type rule sets.: az network application-gateway waf-config list-rule-sets --type OWASP
    List available rules in table format.: az network application-gateway waf-config list-rule-sets -o table
    List available rules in the `crs_35_bad_robots` rule group.: az network application-gateway waf-config list-rule-sets --group crs_35_bad_robots
    List available rules in the OWASP 3.0 rule set.: az network application-gateway waf-config list-rule-sets --group '*' --type OWASP --version 3.0
