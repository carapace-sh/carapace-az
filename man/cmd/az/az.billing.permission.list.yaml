# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the billing permissions the caller has on a billing account.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --customer-name=: The ID that uniquely identifies a customer.
    --invoice-section-name=: The ID that uniquely identifies an invoice section.
    --profile-name=: The ID that uniquely identifies a billing profile.
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        Command group 'billing permission' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        customer-name: The ID that uniquely identifies a customer.
        invoice-section-name: The ID that uniquely identifies an invoice section.
        profile-name: The ID that uniquely identifies a billing profile.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List permission by invoice section scope: az billing permission list --account-name "{billingAccountName}" --profile-name "{billingProfileName}" --invoice-section-name "{invoiceSectionName}"
    List permissions by billing account scope: az billing permission list --account-name "{billingAccountName}"
    List permissions by billing profile scope: az billing permission list --account-name "{billingAccountName}" --profile-name "{billingProfileName}"
    List permissions by customer scope: az billing permission list --account-name "{billingAccountName}" --customer-name "{customerName}"
