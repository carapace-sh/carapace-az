# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: move
description: Move a file or folder in a Data Lake Store account.
flags:
    --destination-path=!: The destination path in the Data Lake Store account.
    --force=: Indicates that, if the destination file or folder already exists, it should be overwritten and replaced with the file or folder being moved.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --source-path=!: The file or folder to move.
    --subscription=: Name or ID of subscription.
    -n, --account=: Name of the Data Lake Store account.
documentation:
    command: |-
        Command group 'dls' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account: Name of the Data Lake Store account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        destination-path: The destination path in the Data Lake Store account.
        force: |-
            Indicates that, if the destination file or folder already exists, it should be overwritten and replaced with the file or folder being moved.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        source-path: The file or folder to move.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Move a file or folder in a Data Lake Store account. (autogenerated): az dls fs move --account {account} --destination-path {destination-path} --source-path {source-path}
