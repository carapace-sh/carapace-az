# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the Skype Channel on a bot.
flags:
    --add-disabled=:
        description: Add the channel in a disabled state.
        nargs: -1
    --calling-web-hook=: The calling web hook to use on Skype.
    --enable-calling=:
        description: Enable calling on Skype.
        nargs: -1
    --enable-groups=:
        description: Enable groups on Skype.
        nargs: -1
    --enable-media-cards=:
        description: Enable media cards on Skype.
        nargs: -1
    --enable-messaging=:
        description: Enable messaging on Skype.
        nargs: -1
    --enable-screen-sharing=:
        description: Enable screen sharing on Skype.
        nargs: -1
    --enable-video=:
        description: Enable video on Skype.
        nargs: -1
    --groups-mode=: select groups mode on Skype.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The resource name of the bot.
completion:
    flag:
        add-disabled:
            - "true"
            - "false"
        enable-calling:
            - "true"
            - "false"
        enable-groups:
            - "true"
            - "false"
        enable-media-cards:
            - "true"
            - "false"
        enable-messaging:
            - "true"
            - "false"
        enable-screen-sharing:
            - "true"
            - "false"
        enable-video:
            - "true"
            - "false"
documentation:
    command: |-
        Command group 'bot skype' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add-disabled: |-
            Add the channel in a disabled state.

            Accepted values: false, true
        calling-web-hook: The calling web hook to use on Skype.
        change-reference: The related change reference ID for this resource operation.
        enable-calling: |-
            Enable calling on Skype.

            Accepted values: false, true
        enable-groups: |-
            Enable groups on Skype.

            Accepted values: false, true
        enable-media-cards: |-
            Enable media cards on Skype.

            Accepted values: false, true
        enable-messaging: |-
            Enable messaging on Skype.

            Accepted values: false, true
        enable-screen-sharing: |-
            Enable screen sharing on Skype.

            Accepted values: false, true
        enable-video: |-
            Enable video on Skype.

            Accepted values: false, true
        groups-mode: Select groups mode on Skype.
        location: |-
            Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .

            Default value: global
        name: The resource name of the bot. Bot name must be between 4 and 42 characters in length. Bot name can only have the following characters -, a - z, A - Z, 0 - 9, and _.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create the Skype Channel for a bot with messaging and screen sharing enabled: |-
        az bot skype create -n botName -g MyResourceGroup --enable-messaging
        --enable-screen-sharing
