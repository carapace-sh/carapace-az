# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-log-chain
description: List the start and end points of the unbroken log chain(s) of the given backup item.
flags:
    --backup-management-type=: Specify the backup management type.
    --end-date=: The end date of the range in UTC (d-m-Y).
    --start-date=: The start date of the range in UTC (d-m-Y).
    --subscription=: Name or ID of subscription.
    --use-secondary-region=: Use this flag to list recoverypoints in secondary region.
    --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
    -c, --container-name=!: Name of the backup container.
    -g, --resource-group=!: Name of resource group.
    -i, --item-name=!: Name of the backed up item.
    -v, --vault-name=!: Name of the Recovery services vault.
completion:
    flag:
        backup-management-type:
            - AzureIaasVM
            - AzureStorage
            - AzureWorkload
        workload-type:
            - VM
            - AzureFileShare
            - SAPHANA
            - MSSQL
            - SAPHanaDatabase
            - SQLDataBase
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-management-type: |-
            Specify the backup management type. Define how Azure Backup manages the backup of entities within the ARM resource. For eg: AzureWorkloads refers to workloads installed within Azure VMs, AzureStorage refers to entities within Storage account. Required only if friendly name is used as Container name.

            Accepted values: AzureIaasVM, AzureStorage, AzureWorkload
        change-reference: The related change reference ID for this resource operation.
        container-name: Name of the backup container. Accepts 'Name' or 'FriendlyName' from the output of az backup container list command. If 'FriendlyName' is passed then BackupManagementType is required.
        end-date: The end date of the range in UTC (d-m-Y).
        item-name: Name of the backed up item.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        start-date: The start date of the range in UTC (d-m-Y).
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        use-secondary-region: Use this flag to list recoverypoints in secondary region.
        vault-name: Name of the Recovery services vault.
        workload-type: |-
            Specify the type of applications within the Resource which should be discovered and protected by Azure Backup. 'MSSQL' and 'SQLDataBase' can be used interchangeably for SQL in Azure VM, as can 'SAPHANA' and 'SAPHanaDatabase' for SAP HANA in Azure VM.

            Accepted values: AzureFileShare, MSSQL, SAPASE, SAPAseDatabase, SAPHANA, SAPHanaDBInstance, SAPHanaDatabase, SQLDataBase, VM
examples:
    ? List the start and end points of the unbroken log chain(s) of the given backup item. Use it to determine whether the point-in-time, to which the user wants the DB to be restored, is valid or not.
    : az backup recoverypoint show-log-chain --container-name MyContainer --backup-management-type AzureWorkload --item-name MyItem --resource-group MyResourceGroup --vault-name MyVault
