# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the consumer key and consumer secret for the Twitter identity provider.
flags:
    --consumer-key=: The OAuth 1.0a consumer key of the Twitter application used for sign-in.
    --consumer-secret-name=: The consumer secret name that contains the app secret.
    --consumer-secret=: The consumer secret.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Containerapp.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        consumer-key: The OAuth 1.0a consumer key of the Twitter application used for sign-in.
        consumer-secret: The consumer secret. --consumer-secret-name --secret-name The consumer secret name that contains the app secret.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Update the consumer key and consumer secret for the Twitter identity provider.: |-
        az containerapp auth twitter update  -g myResourceGroup --name my-containerapp \
          --consumer-key my-client-id --consumer-secret very_secret_password
