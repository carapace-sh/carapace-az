# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: check-name-availability
description: Checks availability of a cluster name.
flags:
    --name=!: Cluster name to verify.
    --subscription=: Name or ID of subscription.
    --type=!: Resource type used for verification.
completion:
    flag:
        type:
            - Microsoft.DBforPostgreSQL/serverGroupsv2
documentation:
    command: Checks availability of a cluster name. Cluster names should be globally unique; at least 3 characters and at most 40 characters long; they must only contain lowercase letters, numbers, and hyphens; and must not start or end with a hyphen.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Cluster name to verify.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: |-
            Resource type used for verification.

            Accepted values: Microsoft.DBforPostgreSQL/serverGroupsv2
