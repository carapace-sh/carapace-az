# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists servers in a resource group or subscription
flags:
    --expand-ad-admin=: Expand the Active Directory Administrator for the server.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    command: List available managed instances.
    flag:
        expand-ad-admin: |-
            Expand the Active Directory Administrator for the server.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all managed instances in a resource group.: az sql mi list -g mygroup
    List all managed instances in the current subscription.: az sql mi list
