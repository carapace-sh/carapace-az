# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all the sitecontainers for a linux webapp
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the linux webapp
    -s, --slot=: Name of the web app slot.
documentation:
    command: List all the sitecontainers for a linux webapp.
    flag:
        name: Name of the linux webapp.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: Name of the web app slot. Default to the productions slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all the sitecontainers for a linux webapp: az webapp sitecontainers list --name MyWebApp --resource-group MyResourceGroup
