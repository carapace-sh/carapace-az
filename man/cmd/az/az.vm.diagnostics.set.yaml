# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Configure the Azure VM diagnostics extension.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        version: version of the diagnostics extension. Will use the latest if not specfied
        vm-name: The name of the Virtual Machine. You can configure the default using `az configure --defaults vm=<name>`
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-auto-upgrade-minor-version=:
        description: If set, the extension service will not automatically pick or upgrade to the latest minor version, even if the extension is redeployed.
        nargs: -1
    --protected-settings=: json string or a file path containing private configurations such as storage account keys, etc.
    --settings=!: json string or a file path, which defines data to be collected.
    --subscription=: Name or ID of subscription.
    --version=: version of the diagnostics extension.
    --vm-name=: The name of the Virtual Machine.
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        no-auto-upgrade-minor-version:
            - "true"
            - "false"
