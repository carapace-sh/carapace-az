# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: push
description: Push a helm chart package to an Azure Container Registry.
flags:
    --force=: Overwrite the existing chart package.
    --subscription=: Name or ID of subscription.
    --suffix=: The tenant suffix in registry login server.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
    -p, --password=: The password used to log into a container registry
    -u, --username=: The username used to log into a container registry
documentation:
    command: This command is implicitly deprecated because command group 'acr helm' is deprecated and will be removed in a future release. Use 'Helm v3 commands' instead.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        force: |-
            Overwrite the existing chart package.

            Default value: False
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        password: The password used to log into a container registry.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        suffix: The tenant suffix in registry login server. You may specify '--suffix tenant' if your registry login server is in the format 'registry-tenant.azurecr.io'. Applicable if you're accessing the registry from a different subscription or you have permission to access images but not the permission to manage the registry resource.
        username: The username used to log into a container registry. <CHART_PACKAGE> The helm chart package.
examples:
    Push a chart package to an Azure Container Registry: az acr helm push -n myregistry mychart-0.3.2.tgz
    Push a chart package to an Azure Container Registry, overwriting the existing one.: az acr helm push -n myregistry mychart-0.3.2.tgz --force
