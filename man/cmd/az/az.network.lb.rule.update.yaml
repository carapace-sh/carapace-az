# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a load balancing rule.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        backend-pools-name: List of ID or name of the backend address pools. Multiple pools are only supported by Gateway SKU load balancer.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        backend-port: The port used for internal connections on the endpoint. Acceptable values are between 0 and 65535. Note that value 0 enables "Any Port".
        enable-tcp-reset: Receive bidirectional TCP Reset on TCP flow idle timeout or unexpected connection termination. This element is only used when the protocol is set to TCP.
        floating-ip: Configures a virtual machine's endpoint for the floating IP capability required to configure a SQL AlwaysOn Availability Group. This setting is required when using the SQL AlwaysOn Availability Groups in SQL server. This setting can't be changed after you create the endpoint.
        frontend-port: The port for the external endpoint. Port numbers for each rule must be unique within the Load Balancer. Acceptable values are between 0 and 65534. Note that value 0 enables "Any Port".
        idle-timeout: The timeout for the TCP idle connection. The value can be set between 4 and 30 minutes. The default value is 4 minutes. This element is only used when the protocol is set to TCP.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --backend-pools-name=:
        description: List of ID or name of the backend address pools.
        nargs: -1
    --backend-port=: The port used for internal connections on the endpoint.
    --disable-outbound-snat=:
        description: Configures SNAT for the VMs in the backend pool to use the publicIP address specified in the frontend of the load balancing rule.
        nargs: -1
    --enable-tcp-reset=:
        description: Receive bidirectional TCP Reset on TCP flow idle timeout or unexpected connection termination.
        nargs: -1
    --floating-ip=:
        description: Configures a virtual machine's endpoint for the floating IP capability required to configure a SQL AlwaysOn Availability Group.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --frontend-ip=: The name of ID of the frontend IP configuration.
    --frontend-port=: The port for the external endpoint.
    --idle-timeout=: The timeout for the TCP idle connection.
    --lb-name=!: The load balancer name.
    --load-distribution=: The load distribution policy for this rule.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --probe=: The ID or Name of an existing probe to associate with this rule.
    --protocol=: The reference to the transport protocol used by the load balancing rule.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the load balancing rule.
completion:
    flag:
        disable-outbound-snat:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-tcp-reset:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        floating-ip:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        load-distribution:
            - Default
            - SourceIP
            - SourceIPProtocol
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - All
            - Tcp
            - Udp
