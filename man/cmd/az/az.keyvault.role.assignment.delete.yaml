# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a role assignment.
flags:
    --assignee-object-id=: Use this parameter instead of '--assignee' to bypass graph permission issues.
    --assignee=: represent a user, group, or service principal.
    --hsm-name=: Name of the HSM.
    --id=: Full URI of the HSM.
    --ids=:
        description: space-separated role assignment ids
        nargs: -1
    --role=: role name or id
    --scope=: scope at which the role assignment or definition applies to, e.g., "/" or "/keys" or "/keys/{keyname}"
    --subscription=: Name or ID of subscription.
    -n, --name=: Name of the role assignment.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        assignee: 'Represent a user, group, or service principal. supported format: object id, user sign-in name, or service principal name.'
        assignee-object-id: Use this parameter instead of '--assignee' to bypass graph permission issues. This parameter only works with object ids for users, groups, service principals, and managed identities. For managed identities use the principal id. For service principals, use the object id and not the app id.
        change-reference: The related change reference ID for this resource operation.
        hsm-name: Name of the HSM.
        id: Full URI of the HSM. If specified all other 'Id' arguments should be omitted.
        ids: Space-separated role assignment ids.
        name: Name of the role assignment.
        role: Role name or id.
        scope: Scope at which the role assignment or definition applies to, e.g., "/" or "/keys" or "/keys/{keyname}".
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
