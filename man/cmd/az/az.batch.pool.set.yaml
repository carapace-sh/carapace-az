# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Updates the properties of the specified Pool.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --application-package-references=:
        description: A list of Packages to be installed on each Compute Node in the Pool.
        nargs: -1
    --if-match=: An ETag value associated with the version of the resource known to the client.
    --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
    --if-none-match=: An ETag value associated with the version of the resource known to the client.
    --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
    --json-file=: A file containing the pool specification in JSON (formatted to match the respective REST API body).
    --metadata=:
        description: A list of name-value pairs associated with the Pool as metadata.
        nargs: -1
    --pool-id=!: The ID of the Pool to get.
    --start-task-command-line=: The command line of the StartTask.
    --start-task-environment-settings=:
        description: A list of environment variable settings for the StartTask.
        nargs: -1
    --start-task-max-task-retry-count=: The maximum number of times the Task may be retried.
    --start-task-resource-files=:
        description: A list of files that the Batch service will download to the Compute Node before running the command line.
        nargs: -1
    --start-task-wait-for-success=: Whether the Batch service should wait for the StartTask to complete successfully (that is, to exit with exit code 0) before scheduling any Tasks on the Compute Node.
    --subscription=: Name or ID of subscription.
    --target-communication=: The desired node communication mode for the pool.
completion:
    flag:
        target-communication:
            - default
            - classic
            - simplified
documentation:
    command: Update the properties of a Batch pool. Updating a property in a subgroup will reset the unspecified properties of that group.
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        application-package-references: A list of Packages to be installed on each Compute Node in the Pool. Changes to Package references affect all new Nodes joining the Pool, but do not affect Compute Nodes that are already in the Pool until they are rebooted or reimaged. If this element is present, it replaces any existing Package references. If you specify an empty collection, then all Package references are removed from the Pool. If omitted, any existing Package references are left unchanged. Space-separated application IDs with optional version in 'id[#version]' format.
        change-reference: The related change reference ID for this resource operation.
        if-match: An ETag value associated with the version of the resource known to the client. The operation will be performed only if the resource's current ETag on the service exactly matches the value specified by the client.
        if-modified-since: A timestamp indicating the last modified time of the resource known to the client. The operation will be performed only if the resource on the service has been modified since the specified time.
        if-none-match: An ETag value associated with the version of the resource known to the client. The operation will be performed only if the resource's current ETag on the service does not match the value specified by the client.
        if-unmodified-since: A timestamp indicating the last modified time of the resource known to the client. The operation will be performed only if the resource on the service has been modified since the specified time.
        json-file: A file containing the pool specification in JSON (formatted to match the respective REST API body). If this parameter is specified, all 'Pool Arguments' are ignored.
        metadata: A list of name-value pairs associated with the Pool as metadata. If this element is present, it replaces any existing metadata configured on the Pool. If you specify an empty collection, any metadata is removed from the Pool. If omitted, any existing metadata is left unchanged. Space-separated values in 'key=value' format.
        pool-id: The ID of the Pool to get. Required.
        start-task-command-line: The command line of the StartTask. The command line does not run under a shell, and therefore cannot take advantage of shell features such as environment variable expansion. If you want to take advantage of such features, you should invoke the shell in the command line, for example using "cmd /c MyCommand" in Windows or "/bin/sh -c MyCommand" in Linux. If the command line refers to file paths, it should use a relative path (relative to the Task working directory), or use the Batch provided environment variable ( https://docs.microsoft.com/en-us/azure/batch/batch-compute-node-environment-variables ). Required.
        start-task-environment-settings: A list of environment variable settings for the StartTask. Space-separated values in 'key=value' format.
        start-task-max-task-retry-count: The maximum number of times the Task may be retried. The Batch service retries a Task if its exit code is nonzero. Note that this value specifically controls the number of retries. The Batch service will try the Task once, and may then retry up to this limit. For example, if the maximum retry count is 3, Batch tries the Task up to 4 times (one initial try and 3 retries). If the maximum retry count is 0, the Batch service does not retry the Task. If the maximum retry count is -1, the Batch service retries the Task without limit, however this is not recommended for a start task or any task. The default value is 0 (no retries).
        start-task-resource-files: A list of files that the Batch service will download to the Compute Node before running the command line.  There is a maximum size for the list of resource files. When the max size is exceeded, the request will fail and the response error code will be RequestEntityTooLarge. If this occurs, the collection of ResourceFiles must be reduced in size. This can be achieved using .zip files, Application Packages, or Docker Containers. Files listed under this element are located in the Task's working directory. Space-separated resource references in filename=httpurl format.
        start-task-wait-for-success: Whether the Batch service should wait for the StartTask to complete successfully (that is, to exit with exit code 0) before scheduling any Tasks on the Compute Node. If true and the StartTask fails on a Node, the Batch service retries the StartTask up to its maximum retry count (maxTaskRetryCount). If the Task has still not completed successfully after all retries, then the Batch service marks the Node unusable, and will not schedule Tasks to it. This condition can be detected via the Compute Node state and failure info details. If false, the Batch service will not wait for the StartTask to complete. In this case, other Tasks can start executing on the Compute Node while the StartTask is still running; and even if the StartTask fails, new Tasks will continue to be scheduled on the Compute Node. The default is true. True if flag present.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-communication: The desired node communication mode for the pool. If this element is present, it replaces the existing targetNodeCommunicationMode configured on the Pool. If omitted, any existing metadata is left unchanged.
