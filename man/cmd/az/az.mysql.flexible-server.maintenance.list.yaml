# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all of the maintenances of a flexible server.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Resource Group Name of the server.
    -s, --server-name=!: The name of the server.
documentation:
    flag:
        resource-group: Resource Group Name of the server.
        server-name: The name of the server.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all of the maintenances of mysql flexible server 'testserver' under resource group 'testgroup'.: az mysql flexible-server maintenance list --resource-group testgroup --server-name testserver
