# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a service endpoint policy definition.
flags:
    --description=: Description of the policy definition.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --policy-name=!: Name of the service endpoint policy.
    --service-resources=:
        description: Space-separated list of service resources the definition applies to.
        nargs: -1
    --service=: Service name the policy definition applies to.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the service endpoint policy definition.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: Description of the policy definition.
        name: Name of the service endpoint policy definition.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        policy-name: Name of the service endpoint policy.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service: 'Service name the policy definition applies to.  Values from: ``` az network service-endpoint list ``` .'
        service-resources: Space-separated list of service resources the definition applies to.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a service endpoint policy definition.: az network service-endpoint policy-definition create -g MyResourceGroup --policy-name MyPolicy -n MyPolicyDefinition --service Microsoft.Storage --description "Test Def" --service-resources MyServiceResources
