# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a probe.
flags:
    --from-http-settings=:
        description: Whether to use host header from HTTP settings.
        nargs: -1
    --from-settings=:
        description: Whether to use host header from settings.
        nargs: -1
    --gateway-name=!: Name of the application gateway.
    --host=: Name of the host to send the probe.
    --interval=: Time interval in seconds between consecutive probes.
    --match-body=: Body that must be contained in the health response.
    --match-status-codes=:
        description: Space-separated list of allowed ranges of healthy status codes for the health response.
        nargs: -1
    --min-servers=: Minimum number of servers that are always marked healthy.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --path=: Relative path of probe.
    --port=: Custom port which will be used for probing the backend servers.
    --protocol=: Protocol used for the probe.
    --subscription=: Name or ID of subscription.
    --threshold=: Number of failed probes after which the back end server is marked down.
    --timeout=: Probe timeout in seconds.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the probe.
completion:
    flag:
        from-http-settings:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        from-settings:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - Http
            - Https
            - Tcp
            - Tls
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        enable-proxy-header: |+
            Whether to send Proxy Protocol header along with the Health Probe over TCP or TLS protocol. Default value is false.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes

        from-settings: Whether to use host header from settings. Pick hostname from settings is currently not supported, now only support false.
        gateway-name: Name of the application gateway.
        host: Name of the host to send the probe.
        interval: |-
            Time interval in seconds between consecutive probes.

            Default value: 30
        match-body: Body that must be contained in the health response.
        match-status-codes: Space-separated list of allowed ranges of healthy status codes for the health response.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        min-servers: Minimum number of servers that are always marked healthy.
        name: Name of the probe.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        path: Relative path of probe. Valid path starts from "/". Probe is sent to ``` <Protocol>://<host>:<port><path> ``` .
        port: Custom port which will be used for probing the backend servers. The valid value ranges from 1 to 65535. In case not set, port from http settings will be used. This property is valid for Standard_v2 and WAF_v2 only.
        protocol: |-
            Protocol used for the probe.

            Accepted values: Http, Https, Tcp, Tls
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        threshold: |-
            Number of failed probes after which the back end server is marked down.

            Default value: 8
        timeout: |-
            Probe timeout in seconds.

            Default value: 120
examples:
    Create an application gateway probe.: az network application-gateway probe create -g MyResourceGroup --gateway-name MyAppGateway -n MyProbe --protocol https --host 127.0.0.1 --path ProbePath
