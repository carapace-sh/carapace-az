# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: execute
description: Execute script actions on the specified HDInsight cluster.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        roles: A space-delimited list of roles (nodes) where the script will be executed. Valid roles are headnode, workernode, zookeepernode, edgenode.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --cluster-name=!: The name of the cluster.
    --persist-on-success=: If the scripts needs to be persisted.
    --roles=!:
        description: A space-delimited list of roles (nodes) where the script will be executed.
        nargs: -1
    --script-parameters=: The parameters for the script.
    --script-uri=!: The URI to the script.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the script action.
