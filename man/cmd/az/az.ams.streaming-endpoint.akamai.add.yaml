# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add an AkamaiAccessControl to an existing streaming endpoint.
flags:
    --base64-key=: Base64-encoded authentication key that will be used by the CDN.
    --expiration=: The ISO 8601 DateTime value that specifies when the Akamai authentication expires.
    --identifier=: The identifier for the authentication key.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -a, --account-name=: The name of the Azure Media Services account.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the streaming endpoint.
documentation:
    flag:
        account-name: The name of the Azure Media Services account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        base64-key: Base64-encoded authentication key that will be used by the CDN. The authentication key provided by Akamai is an ASCII encoded string, and must be converted to bytes and then base64 encoded.
        change-reference: The related change reference ID for this resource operation.
        expiration: The ISO 8601 DateTime value that specifies when the Akamai authentication expires.
        identifier: The identifier for the authentication key. This is the nonce provided by Akamai.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the streaming endpoint.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add an AkamaiAccessControl to an existing streaming endpoint.: az ams streaming-endpoint akamai add -g rg -a ams -n myendpoint --identifier id1 --expiration xxxT16:00:00-08:00 --base64-key dGVzdGlkMQ==
