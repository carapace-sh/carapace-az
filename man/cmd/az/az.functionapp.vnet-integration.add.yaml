# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a regional virtual network integration to a functionapp
flags:
    --skip-delegation-check=:
        description: Skip check if you do not have permission or the VNet is in another subscription.
        nargs: -1
    --subnet=!: The name or resource ID of the subnet
    --subscription=: Name or ID of subscription.
    --vnet=!: The name or resource ID of the Vnet
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: name of the function app.
    -s, --slot=: The name of the slot.
completion:
    flag:
        skip-delegation-check:
            - "true"
            - "false"
documentation:
    command: Add a regional virtual network integration to a functionapp.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the function app.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        skip-delegation-check: |-
            Skip check if you do not have permission or the VNet is in another subscription.

            Default value: False

            Accepted values: false, true
        slot: The name of the slot. Default to the productions slot if not specified.
        subnet: The name or resource ID of the subnet.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vnet: The name or resource ID of the Vnet.
examples:
    Add a regional virtual network integration to a functionapp: az functionapp vnet-integration add -g MyResourceGroup -n MyFunctionapp --vnet MyVnetName --subnet MySubnetName -s [slot]
    Add a regional virtual network integration to a functionapp using subnet resource id: az functionapp vnet-integration add -g MyResourceGroup -n MyFunctionapp --vnet MyVnetName --subnet '/subscriptions/[sub id]/resourceGroups/[MyResourceGroup]/providers/Microsoft.Network/virtualNetworks/[MyVnetName]/subnets/MySubnetName' -s [slot]
    Add a regional virtual network integration to a functionapp using vnet resource id: az functionapp vnet-integration add -g MyResourceGroup -n MyFunctionapp --vnet '/subscriptions/[sub id]/resourceGroups/[MyResourceGroup]/providers/Microsoft.Network/virtualNetworks/[MyVnetName]' --subnet MySubnetName -s [slot]
