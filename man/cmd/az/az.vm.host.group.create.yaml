# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a dedicated host group.
flags:
    --automatic-placement=:
        description: Specify whether virtual machines or virtual machine scale sets can be placed automatically on the dedicated host group.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --ultra-ssd-enabled=:
        description: Enable a capability to have UltraSSD Enabled Virtual Machines on Dedicated Hosts of the Dedicated Host Group.
        nargs: -1
    -c, --platform-fault-domain-count=!: Number of fault domains that the host group can span.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the Dedicated Host Group
    -z, --zone=: Availability zone into which to provision the resource.
completion:
    flag:
        automatic-placement:
            - "true"
            - "false"
        ultra-ssd-enabled:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        automatic-placement: |-
            Specify whether virtual machines or virtual machine scale sets can be placed automatically on the dedicated host group. Automatic placement means resources are allocated on dedicated hosts, that are chosen by Azure, under the dedicated host group. The value is defaulted to false when not provided.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` . Otherwise, location will default to the resource group''s location.'
        name: Name of the Dedicated Host Group.
        platform-fault-domain-count: Number of fault domains that the host group can span.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        ultra-ssd-enabled: |-
            Enable a capability to have UltraSSD Enabled Virtual Machines on Dedicated Hosts of the Dedicated Host Group.

            Accepted values: false, true
        zone: Availability zone into which to provision the resource.
examples:
    Create a dedicated host group. (autogenerated): az vm host group create --name MyDedicatedHostGroup --platform-fault-domain-count 2 --resource-group MyResourceGroup
