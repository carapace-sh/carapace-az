# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Service Bus Namespace
documentation:
    flag:
        capacity: Number of message units. This property is only applicable to namespaces of Premium SKU
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        premium-messaging-partitions: The number of partitions of a Service Bus namespace. This property is only applicable to Premium SKU namespaces. The default value is 1 and possible values are 1, 2 and 4
        public-network-access: This determines if traffic is allowed over public network. By default it is enabled. If value is SecuredByPerimeter then Inbound and Outbound communication is controlled by the network security perimeter and profile' access rules.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --alternate-name=: Alternate name specified when alias and namespace names are same.
    --capacity=: Number of message units.
    --disable-local-auth=:
        description: A boolean value that indicates whether SAS authentication is enabled/disabled for the Service Bus
        nargs: -1
    --encryption-config=:
        description: List of KeyVaultProperties objects.
        nargs: -1
    --geo-data-replication-config=:
        description: A list of regions where replicas of the namespace are maintained Object
        nargs: -1
    --infra-encryption=:
        description: A boolean value that indicates whether Infrastructure Encryption (Double Encryption)
        nargs: -1
    --max-replication-lag-duration-in-seconds=: The maximum acceptable lag for data replication operations from the primary replica to a quorum of secondary replicas
    --mi-system-assigned=:
        description: Enable System Assigned Identity
        nargs: -1
    --mi-user-assigned=:
        description: List of User Assigned Identity ids.
        nargs: -1
    --minimum-tls-version=: The minimum TLS version for the cluster to support, e.g. 1.2
    --no-wait=: Do not wait for the long-running operation to finish.
    --premium-messaging-partitions=: The number of partitions of a Service Bus namespace.
    --public-network-access=: This determines if traffic is allowed over public network.
    --sku=: Namespace SKU.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --zone-redundant=:
        description: Enabling this property creates a ServiceBus Zone Redundant Namespace in regions supported availability zones
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of Namespace
completion:
    flag:
        capacity:
            - "1"
            - "2"
            - "4"
            - "8"
            - "16"
        disable-local-auth:
            - "true"
            - "false"
        infra-encryption:
            - "true"
            - "false"
        mi-system-assigned:
            - "true"
            - "false"
        minimum-tls-version:
            - "1.0"
            - "1.1"
            - "1.2"
        public-network-access:
            - Enabled
            - Disabled
        sku:
            - Basic
            - Standard
            - Premium
        zone-redundant:
            - "true"
            - "false"
