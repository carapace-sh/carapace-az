# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new migration workflow for a flexible server.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        migration-option: Supported Migration Option. Default is ValidateAndMigrate.
        properties: Request properties. Use double or no quotes to pass in json filepath as argument.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --migration-mode=: Either offline or online(with CDC) migration
    --migration-name=: Name of the migration.
    --migration-option=: Supported Migration Option.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -b, --properties=!: Request properties.
    -g, --resource-group=!: Resource Group Name of the migration target server.
    -l, --location=: Location.
    -n, --name=!: Migration target server name.
completion:
    flag:
        migration-mode:
            - offline
            - online
        migration-option:
            - Validate
            - ValidateAndMigrate
            - Migrate
