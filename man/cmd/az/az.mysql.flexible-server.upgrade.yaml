# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upgrade
description: Upgrade the major version of a flexible server.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the server.
    -v, --version=!: Server major version.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        version:
            - "8"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        version: |-
            Server major version.

            Accepted values: 8, 8.4
        "yes": Do not prompt for confirmation.
examples:
    Upgrade server 'testsvr' to MySQL major version 8.: |-
        # make sure that sql_mode only contains values allowed in new version, for example:
        az mysql flexible-server parameter set -g testgroup -s testsvr -n sql_mode \
          -v "ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO"
        # upgrade server to MySQL major version 8.
        az mysql flexible-server upgrade -g testgroup -n testsvr -v 8
