# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Azure Cosmos DB MongoDB collection
flags:
    --analytical-storage-ttl=: Analytical TTL, when analytical storage is enabled.
    --idx=: 'Indexes, you can enter it as a string or as a file, e.g., --idx @indexes-file.json or --idx "[{\"key\": {\"keys\": [\"_ts\"]},\"options\": {\"expireAfterSeconds\": 1000}}, {\"key\": {\"keys\": [\"user_id\", \"user_address\"]}, \"options\": {\"unique\": \"true\"}}]"'
    --max-throughput=: The maximum throughput resource can scale to (RU/s).
    --shard=: Sharding key path.
    --subscription=: Name or ID of subscription.
    --throughput=: The throughput of MongoDB collection (RU/s).
    -a, --account-name=!: Cosmosdb account name.
    -d, --database-name=!: Database name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Collection name
documentation:
    command: Create an MongoDB collection under an Azure Cosmos DB MongoDB database.
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        analytical-storage-ttl: Analytical TTL, when analytical storage is enabled.
        change-reference: The related change reference ID for this resource operation.
        database-name: Database name.
        idx: |
            Indexes, you can enter it as a string or as a file, e.g., --idx @indexes-file.json or --idx "[{\"key\": {\"keys\": [\"_ts\"]},\"options\": {\"expireAfterSeconds\": 1000}}, {\"key\": {\"keys\": [\"user_id\", \"user_address\"]}, \"options\": {\"unique\": \"true\"}}]"
        max-throughput: The maximum throughput resource can scale to (RU/s). Provided when the resource is autoscale enabled. The minimum value can be 4000 (RU/s).
        name: Collection name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        shard: Sharding key path.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        throughput: The throughput of MongoDB collection (RU/s). Default value is 400. Omit this parameter if the database has shared throughput unless the collection should have dedicated throughput.
examples:
    Create an Azure Cosmos DB MongoDB collection.: az cosmosdb mongodb collection create -g MyResourceGroup -a MyAccount -d MyDatabase -n MyCollection --shard "ShardingKey" --idx @indexes-file.json --throughput "500"
