# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a resource policy remediation.
flags:
    --definition-reference-id=: Policy definition reference ID inside the policy set definition.
    --location-filters=:
        description: 'Space separated list of resource locations that should be remediated (Ex: centralus westeurope).'
        nargs: -1
    --namespace=: 'Provider namespace (Ex: Microsoft.Provider).'
    --parent=: 'The parent path (Ex: resourceTypeA/nameA/resourceTypeB/nameB).'
    --resource-discovery-mode=: The way resources to remediate are discovered.
    --resource-type=: 'Resource type (Ex: resourceTypeC).'
    --resource=: Resource ID or resource name.
    --subscription=: Name or ID of subscription.
    -a, --policy-assignment=!: Name or resource ID of the policy assignment.
    -g, --resource-group=: Name of resource group.
    -m, --management-group=: Name of management group.
    -n, --name=!: Name of the remediation.
completion:
    flag:
        resource-discovery-mode:
            - ExistingNonCompliant
            - ReEvaluateCompliance
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        definition-reference-id: Policy definition reference ID inside the policy set definition. Only required when the policy assignment is assigning a policy set definition.
        location-filters: 'Space separated list of resource locations that should be remediated (Ex: centralus westeurope).'
        management-group: Name of management group.
        name: Name of the remediation.
        namespace: 'Provider namespace (Ex: Microsoft.Provider).'
        parent: 'The parent path (Ex: resourceTypeA/nameA/resourceTypeB/nameB).'
        policy-assignment: Name or resource ID of the policy assignment.
        resource: Resource ID or resource name. If a name is given, please provide the resource group and other relevant resource id arguments.
        resource-discovery-mode: |-
            The way resources to remediate are discovered. Defaults to ExistingNonCompliant if not specified.

            Accepted values: ExistingNonCompliant, ReEvaluateCompliance
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'Resource type (Ex: resourceTypeC).'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a remediation at management group scope for specific resource locations: az policy remediation create -m myMg -n myRemediation --policy-assignment eeb18edc813c42d0ad5a9eab --location-filters eastus westeurope
    Create a remediation at resource group scope for a policy assignment: az policy remediation create -g myRg -n myRemediation --policy-assignment eeb18edc813c42d0ad5a9eab
    Create a remediation at resource group scope for a policy assignment using the policy assignment resource ID: az policy remediation create -g myRg -n myRemediation --policy-assignment "/subscriptions/fff10b27-fff3-fff5-fff8-fffbe01e86a5/providers/Microsoft.Authorization/policyAssignments/myPa"
    Create a remediation at subscription scope for a policy set assignment: az policy remediation create -n myRemediation --policy-assignment eeb18edc813c42d0ad5a9eab --definition-reference-id auditVMPolicyReference
    Create a remediation for a specific resource using the resource ID: az policy remediation create --resource "/subscriptions/fff10b27-fff3-fff5-fff8-fffbe01e86a5/resourceGroups/myRg/providers/Microsoft.Compute/virtualMachines/myVm" -n myRemediation --policy-assignment eeb18edc813c42d0ad5a9eab
    Create a remediation that will re-evaluate compliance before remediating: az policy remediation create -g myRg -n myRemediation --policy-assignment eeb18edc813c42d0ad5a9eab --resource-discovery-mode ReEvaluateCompliance
