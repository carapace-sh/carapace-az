# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all deployment stacks in resource group
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: The resource group where the deployment stack exists
documentation:
    command: List all deployment stacks in resource group.
    flag:
        resource-group: The resource group where the deployment stack exists.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all stacks in resource group: az stack group list --resource-group ResourceGroup
