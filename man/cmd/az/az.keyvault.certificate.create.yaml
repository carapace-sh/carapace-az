# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Key Vault certificate.
documentation:
    flag:
        policy: JSON encoded policy definition. Use @{file} to load from a file(e.g. @my_policy.json).
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        validity: Number of months the certificate is valid for. Overrides the value specified with --policy/-p
flags:
    --disabled=:
        description: Create certificate in disabled state.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --validity=: Number of months the certificate is valid for.
    --vault-name=!: Name of the Vault.
    -n, --name=!: Name of the certificate.
    -p, --policy=!: JSON encoded policy definition.
completion:
    flag:
        disabled:
            - "true"
            - "false"
