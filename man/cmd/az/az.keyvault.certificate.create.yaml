# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Key Vault certificate.
flags:
    --disabled=:
        description: Create certificate in disabled state.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --validity=: Number of months the certificate is valid for.
    --vault-name=!: Name of the Vault.
    -n, --name=!: Name of the certificate.
    -p, --policy=!: JSON encoded policy definition.
completion:
    flag:
        disabled:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        disabled: |-
            Create certificate in disabled state.

            Accepted values: false, true
        name: Name of the certificate.
        policy: JSON encoded policy definition. Use @{file} to load from a file(e.g. @my_policy.json) .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        validity: Number of months the certificate is valid for. Overrides the value specified with --policy/-p.
        vault-name: Name of the Vault.
examples:
    Create a self-signed certificate with the default policy and add it to a virtual machine.: |-
        az keyvault certificate create --vault-name vaultname -n cert1 \
          -p "$(az keyvault certificate get-default-policy)"
        secrets=$(az keyvault secret list-versions --vault-name vaultname \
          -n cert1 --query "[?attributes.enabled].id" -o tsv)
        vm_secrets=$(az vm secret format -s "$secrets")
        az vm create -g group-name -n vm-name --admin-username deploy  \
          --image Debian11 --secrets "$vm_secrets"
