# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List a container app's revisions.
flags:
    --all=: Show inactive revisions.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Containerapp.
documentation:
    flag:
        all: |-
            Show inactive revisions.

            Default value: False
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List a container app's revisions.: az containerapp revision list -n my-containerapp -g MyResourceGroup
