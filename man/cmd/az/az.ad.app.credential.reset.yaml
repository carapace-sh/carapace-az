# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reset
description: Reset an application's password or certificate credentials
documentation:
    flag:
        cert: Certificate to use for credentials. When used with `--keyvault,`, indicates the name of the cert to use or create. Otherwise, supply a PEM or DER formatted public certificate string. Use `@{path}` to load from a file. Do not include the private key.
        create-cert: Create a self-signed certificate to use for the credential. Only the current OS user has read/write permission to this certificate. Use with `--keyvault` to create the certificate in Key Vault. Otherwise, a certificate will be created locally.
        years: 'Number of years for which the credentials will be valid. Default: 1 year'
flags:
    --append=: Append the new credential instead of overwriting.
    --cert=: Certificate to use for credentials.
    --create-cert=: Create a self-signed certificate to use for the credential.
    --display-name=: Friendly name for the credential.
    --end-date=: Finer grain of expiry time if '--years' is insufficient, e.g. '2020-12-31T11:59:59+00:00' or '2299-12-31'
    --id=!: identifier uri, application id, or object id
    --keyvault=: Name or ID of a KeyVault to use for creating or retrieving certificates.
    --years=: Number of years for which the credentials will be valid.
