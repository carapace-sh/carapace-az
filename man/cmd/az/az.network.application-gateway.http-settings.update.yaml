# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update HTTP settings.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --affinity-cookie-name=: Name used for the affinity cookie.
    --auth-certs=:
        description: Space-separated list of authentication certificates (Names and IDs) to associate with the HTTP settings.
        nargs: -1
    --connection-draining-timeout=: Time in seconds after a backend server is removed during which on open connection remains active.
    --cookie-based-affinity=:
        description: Enable or disable cookie-based affinity.
        nargs: -1
    --enable-probe=:
        description: Whether the probe is enabled.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --gateway-name=!: Name of the application gateway.
    --host-name-from-backend-pool=:
        description: Whether to pick host header should be picked from the host name of the backend server.
        nargs: -1
    --host-name=: Host header sent to the backend servers.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --path=: Path that will prefix all HTTP requests.
    --port=: Number of the destination port on the backend.
    --probe=: Name or ID of the probe to associate with the HTTP settings.
    --protocol=: Protocol used to communicate with the backend.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --root-certs=:
        description: Space-separated list of trusted root certificates (Names and IDs) to associate with the HTTP settings.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --timeout=: Request timeout in seconds.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the backend http settings.
completion:
    flag:
        cookie-based-affinity:
            - Disabled
            - Enabled
        enable-probe:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        host-name-from-backend-pool:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - Http
            - Https
            - Tcp
            - Tls
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        affinity-cookie-name: Name used for the affinity cookie.
        auth-certs: Space-separated list of authentication certificates (Names and IDs) to associate with the HTTP settings.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        connection-draining-timeout: Time in seconds after a backend server is removed during which on open connection remains active. Range from 0 (Disabled) to 3600.
        cookie-based-affinity: |-
            Enable or disable cookie-based affinity.

            Accepted values: Disabled, Enabled

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        enable-probe: |-
            Whether the probe is enabled.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        gateway-name: Name of the application gateway.
        host-name: Host header sent to the backend servers.
        host-name-from-backend-pool: |-
            Whether to pick host header should be picked from the host name of the backend server.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        name: Name of the backend http settings.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        path: Path that will prefix all HTTP requests.
        port: Number of the destination port on the backend.
        probe: Name or ID of the probe to associate with the HTTP settings.
        protocol: |-
            Protocol used to communicate with the backend.

            Accepted values: Http, Https, Tcp, Tls
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        root-certs: Space-separated list of trusted root certificates (Names and IDs) to associate with the HTTP settings. `--host-name` or `--host-name-from-backend-pool` is required when this field is set.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        sni-name: Specify an SNI value to match the common name of the certificate on the backend. By default, the application gateway uses the incoming request’s host header as the SNI. Default value is null.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: |-
            Request timeout in seconds. --validate-cert-ce --validate-cert-chain-and-expiry Verify or skip both chain and expiry validations of the certificate on the backend server. Default is set to true.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        validate-sni: |-
            When enabled, verifies if the Common Name of the certificate provided by the backend server matches the Server Name Indication (SNI) value. Default value is true.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
examples:
    Update HTTP settings to use a new probe.: az network application-gateway http-settings update -g MyResourceGroup --gateway-name MyAppGateway -n MyHttpSettings --probe MyNewProbe
