# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists managed database copy operations
flags:
    --dest-mi=: Name of the target managed instance to show copy operations for.
    --dest-resource-group=: Name of the target resource group to show copy operations for.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --managed-instance=: Name of the source managed instance.
    --only-latest-per-database=: Flag that only shows latest copy operation per managed database.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of the source resource group.
    -n, --name=: The name of the Azure SQL Managed Database.
documentation:
    command: List managed database copy operations.
    flag:
        dest-mi: Name of the target managed instance to show copy operations for. --dest-resource-group --dest-rg Name of the target resource group to show copy operations for.
        ids: |-
            One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.

            Default value: False
        name: The name of the Azure SQL Managed Database.
        resource-group: Name of the source resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all copy operation from given resource group and managed instance into specific destination managed instance.: az sql midb copy list --resource-group MyResourceGroup --managed-instance MyInstance --dest-mi DestinationInstance
    List all copy operations for specific managed database from given resource group and managed instance.: az sql midb copy list --name mydb --resource-group MyResourceGroup --managed-instance MyInstance
    List all copy operations from given resource group and managed instance.: az sql midb copy list --resource-group MyResourceGroup --managed-instance MyInstance
    List latest copy operation for specific managed database from given resource group and managed instance.: az sql midb copy list --name mydb --resource-group MyResourceGroup --managed-instance MyInstance --latest
