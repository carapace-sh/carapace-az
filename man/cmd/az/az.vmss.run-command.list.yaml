# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: The operation to get all run commands of an instance in Virtual Machine Scaleset.
flags:
    --expand=: The expand expression to apply on the operation.
    --instance-id=!: The instance ID of the virtual machine.
    --subscription=: Name or ID of subscription.
    --vmss-name=!: The name of the VM scale set.
    -g, --resource-group=!: Name of resource group.
documentation:
    command: List operation to get all run commands of an instance in Virtual Machine Scaleset.
    flag:
        expand: The expand expression to apply on the operation.
        instance-id: The instance of the VM.
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in ```
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vmss-name: The name of the VirtualMachineScaleSet.
examples:
    List run commands in Vmss instance.: az vmss run-command list --resource-group "myResourceGroup" --vmss-name "myVMSS" --instance-id "0"
