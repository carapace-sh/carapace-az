# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a SignalR Service.
documentation:
    flag:
        allowed-origins: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345). To allow all, use "*"'
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        sku: 'The sku name of the signalr service. Allowed values: Premium_P1, Standard_S1, Free_F1'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --default-action=: Default action to apply when no rule matches.
    --enable-message-logs=:
        description: The switch for messaging logs which signalr service will generate or not
        nargs: -1
    --service-mode=: The service mode which signalr service will be working on
    --sku=!: The sku name of the signalr service.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --unit-count=: The number of signalr service unit count
    -a, --allowed-origins=:
        description: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345).'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of signalr service.
completion:
    flag:
        default-action:
            - Allow
            - Deny
        enable-message-logs:
            - "true"
            - "false"
        service-mode:
            - Default
            - Serverless
            - Classic
