# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of a webapp connection.
flags:
    --connection=: Name of the webapp connection.
    --id=: The resource id of the connection.
    --slot=: The name of the slot.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group which contains the webapp.
    -n, --name=: Name of the webapp.
documentation:
    flag:
        connection: Name of the webapp connection.
        id: The resource id of the connection. ['--resource-group', '--name', '--connection'] are required if '--id' is not specified.
        name: Name of the webapp. Required if '--id' is not specified.None.
        resource-group: The resource group which contains the webapp. Required if '--id' is not specified.None.
        slot: The name of the slot. Default to the production slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a connection by connection id: az webapp connection show --id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.Web/sites/{site}/providers/Microsoft.ServiceLinker/linkers/{linker}
    Get a connection by connection name: az webapp connection show -g WebAppRG -n MyWebApp --connection MyConnection
    Get a connection interactively: az webapp connection show
