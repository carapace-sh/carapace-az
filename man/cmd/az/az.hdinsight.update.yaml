# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the tags or identity of the specified HDInsight cluster.
flags:
    --assign-identity-type=: The type of identity used for the cluster.
    --assign-identity=:
        description: The name or ID of user assigned identity.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the cluster.
documentation:
    command: Update the tags or identity of the specified HDInsight cluster. Setting the identity property will override the existing identity configuration of the cluster.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        assign-identity: The name or ID of user assigned identity. Skip this field when assign_identity_type is SystemAssigned.
        assign-identity-type: 'The type of identity used for the cluster. Allowed values: ``` None ``` , ``` SystemAssigned ``` , ``` SystemAssigned,UserAssigned ``` , ``` UserAssigned ``` .'
        change-reference: The related change reference ID for this resource operation.
        name: The name of the cluster.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Update SystemAssigned manage identity.: az hdinsight update --name MyCluster --resource-group rg --assign-identity-type SystemAssigned
    Update manage identity with SystemAssigned,UserAssigned msi.: az hdinsight update --name MyCluster --resource-group rg --assign-identity-type "SystemAssigned,UserAssigned" --assign-identity MyMsi1
    Update manage identity with multiple UserAssigned msi.: az hdinsight update --name MyCluster --resource-group rg --assign-identity-type UserAssigned --assign-identity MyMsi1 MyMsi2
    Update manage identity with single UserAssigned msi.: az hdinsight update --name MyCluster --resource-group rg --assign-identity-type UserAssigned --assign-identity MyMsi
    Update the tags.: az hdinsight update --name MyCluster --resource-group rg --tags key=value
