# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of an event subscription of a domain.
flags:
    --domain-name=!: Name of the domain.
    --include-full-endpoint-url=:
        description: Specify to indicate whether the full endpoint URL should be returned.
        nargs: -1
    --include-static-delivery-attribute-secret=:
        description: Indicate whether any static delivery attribute secrets should be returned.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the event subscription.
completion:
    flag:
        include-full-endpoint-url:
            - "true"
            - "false"
        include-static-delivery-attribute-secret:
            - "true"
            - "false"
documentation:
    flag:
        domain-name: Name of the domain.
        include-full-endpoint-url: Specify to indicate whether the full endpoint URL should be returned. True if flag present.
        include-static-delivery-attribute-secret: Indicate whether any static delivery attribute secrets should be returned. True if flag present.
        name: Name of the event subscription.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the details of an event subscription for an Event Grid domain include any static delivery attribute secrets.: |-
        az eventgrid domain event-subscription show --name es1 \
             -g rg1 --domain-name domain1 --include-attrib-secret
    Show the details of an event subscription for an Event Grid domain.: |-
        az eventgrid domain event-subscription show --name es1 \
             -g rg1 --domain-name domain1
