# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a public IP address.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --allocation-method=: IP address allocation method.
    --ddos-protection-plan=: Name or ID of a DDoS protection plan associated with the public IP.
    --dns-name-scope=: The domain name label scope.
    --dns-name=: Globally unique DNS entry.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --idle-timeout=: Idle timeout in minutes.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ip-tags=:
        description: Space-separated list of IP tags in `TYPE=VAL` format.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --protection-mode=: The DDoS protection mode of the public IP
    --public-ip-prefix=: Name or ID of a public IP prefix.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --reverse-fqdn=: Reverse FQDN (fully qualified domain name).
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku=: Name of a public IP address SKU.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --version=: IP address type.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the public IP address.
completion:
    flag:
        allocation-method:
            - Dynamic
            - Static
        dns-name-scope:
            - NoReuse
            - ResourceGroupReuse
            - SubscriptionReuse
            - TenantReuse
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protection-mode:
            - Disabled
            - Enabled
            - VirtualNetworkInherited
        sku:
            - Basic
            - Standard
        version:
            - IPv4
            - IPv6
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        allocation-method: |-
            IP address allocation method.

            Accepted values: Dynamic, Static
        change-reference: |-
            The related change reference ID for this resource operation.

            Accepted values: Disabled, Enabled, VirtualNetworkInherited
        ddos-protection-plan: Name or ID of a DDoS protection plan associated with the public IP. Can only be set if `--protection-mode` is Enabled.
        dns-name: Globally unique DNS entry.
        dns-name-scope: |-
            The domain name label scope. If a domain name label and a domain name label scope are specified, an A DNS record is created for the public IP in the Microsoft Azure DNS system with a hashed value includes in FQDN.

            Accepted values: NoReuse, ResourceGroupReuse, SubscriptionReuse, TenantReuse
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        idle-timeout: Idle timeout in minutes.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        ip-tags: Space-separated list of IP tags in ``` TYPE=VAL ``` format.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the public IP address.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        protection-mode: '``` is Enabled.'
        public-ip-prefix: Name or ID of a public IP prefix.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        reverse-fqdn: Reverse FQDN (fully qualified domain name).
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        sku: |-
            Name of a public IP address SKU.

            Accepted values: Basic, Standard, StandardV2
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        version: |-
            IP address type.

            Default value: IPv4

            Accepted values: IPv4, IPv6
examples:
    Detach a DDoS protection plan in a public IP resource.: az network public-ip update -g MyResourceGroup -n MyIP --protection-mode Disabled --ddos-protection-plan null
    Update a public IP resource with a DNS name label and static allocation.: az network public-ip update -g MyResourceGroup -n MyIp --dns-name MyLabel --allocation-method Static
