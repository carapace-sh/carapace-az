# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Update a function app's settings.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --settings=:
        description: space-separated app settings in a format of `<name>=<value>`
        nargs: -1
    --slot-settings=:
        description: space-separated slot app settings in a format of `<name>=<value>`
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: name of the function app
    -s, --slot=: the name of the slot.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the function app.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        settings: Space-separated appsettings in KEY=VALUE format. Use @{file} to load from a file.
        slot: The name of the slot. Default to the productions slot if not specified.
        slot-settings: Space-separated appsettings in KEY=VALUE format. Use @{file} to load from a file. Given setting are added to the configuration and marked as Deployment slot setting by default.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Set using both key-value pair and a json file with more settings.: az functionapp config appsettings set -g MyResourceGroup -n MyUniqueApp --settings mySetting=value @moreSettings.json
    Update a function app's settings.: az functionapp config appsettings set --name MyFunctionApp --resource-group MyResourceGroup --settings foo=bar AzureWebJobsStorage=$storageConnectionString
