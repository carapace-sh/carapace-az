# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add Encryption properties to a namespace.
flags:
    --encryption-config=!:
        description: List of KeyVaultProperties objects.
        nargs: -1
    --infra-encryption=:
        description: A boolean value that indicates whether Infrastructure Encryption (Double Encryption) is enabled/disabled
        nargs: -1
    --namespace-name=!: Name of the Namespace
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        infra-encryption:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        encryption-config: List of KeyVaultProperties objects.
        infra-encryption: |-
            A boolean value that indicates whether Infrastructure Encryption (Double Encryption) is enabled/disabled.

            Accepted values: false, true
        namespace-name: Name of the Namespace.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Set 2 different encryption properties for a namespace that has User Assigned Identity already enabled: az eventhubs namespace encryption add --namespace-name mynamespace -g MyResourceGroup --encryption-config key-name=key1 key-vault-uri=https://mykeyvault.vault.azure.net/ user-assigned-identity=/subscriptions/{subscriptionId}}/resourceGroups/{resourcegroup}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/MSIName --encryption-config key-name=key1 key-vault-uri=https://mykeyvault.vault.azure.net/ user-assigned-identity=/subscriptions/{subscriptionId}}/resourceGroups/{resourcegroup}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/MSIName2
