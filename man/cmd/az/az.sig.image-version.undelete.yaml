# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: undelete
description: Restore soft deleted Image Version
documentation:
    flag:
        gallery-image-version: Gallery image version in semantic version pattern. The allowed characters are digit and period. Digits must be within the range of a 32-bit integer, e.g. `<MajorVersion>.<MinorVersion>.<Patch>`
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --allow-replicated-location-deletion=:
        description: Indicate whether or not removing this gallery image version from replicated regions is allowed.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -e, --gallery-image-version=!: Gallery image version in semantic version pattern.
    -g, --resource-group=!: Name of resource group.
    -i, --gallery-image-definition=!: gallery image definition
    -l, --location=: Location.
    -r, --gallery-name=!: gallery name
completion:
    flag:
        allow-replicated-location-deletion:
            - "true"
            - "false"
