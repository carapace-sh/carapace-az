# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a DDoS protection plan.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vnets=:
        description: Space-separated list of VNets (name or IDs) to associate with the plan.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the DDoS protection plan.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the DDoS protection plan.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        vnets: Space-separated list of VNets (name or IDs) to associate with the plan. This parameter can only be used if all the VNets are within the same subscription as the DDoS protection plan. If this is not the case, set the protection plan on the VNet directly using the ``` az network vnet update ``` command.
examples:
    Add a Vnet to a DDoS protection plan in the same subscription.: az network ddos-protection update -g MyResourceGroup -n MyDdosPlan --vnets MyVnet
    Update a DDoS protection plan. (autogenerated): az network ddos-protection update --name MyDdosPlan --tags foo=boo --resource-group MyResourceGroup
