# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: lint
description: Lint a Bicep file.
flags:
    --diagnostics-format=: Set diagnostics format.
    --no-restore=: When set, generates the parameters file without restoring external modules.
    --subscription=: Name or ID of subscription.
    -f, --file=!: The path to the Bicep module file to lint in the file system.
completion:
    flag:
        diagnostics-format:
            - default
            - sarif
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        diagnostics-format: |-
            Set diagnostics format.

            Accepted values: default, sarif
        file: The path to the Bicep module file to lint in the file system.
        no-restore: When set, generates the parameters file without restoring external modules.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Lint a Bicep file with specified diagnostics format. Valid values are ( default | sarif ).: az bicep lint --file {bicep_file} --diagnostics-format {diagnostics_format}
    Lint a Bicep file without restoring external modules.: az bicep lint --file {bicep_file} --no-restore
    Lint a Bicep file.: az bicep lint --file {bicep_file}
