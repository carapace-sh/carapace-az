# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: lint
description: Lint a Bicep file.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --diagnostics-format=: Set diagnostics format.
    --no-restore=: When set, generates the parameters file without restoring external modules.
    --subscription=: Name or ID of subscription.
    -f, --file=!: The path to the Bicep module file to lint in the file system.
completion:
    flag:
        diagnostics-format:
            - default
            - sarif
