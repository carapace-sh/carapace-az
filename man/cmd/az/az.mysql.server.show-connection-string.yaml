# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-connection-string
description: Show the connection strings for a MySQL server database.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -d, --database-name=: The name of a database.
    -p, --admin-password=: The login password of the administrator.
    -s, --server-name=: Name of the server.
    -u, --admin-user=: The login username of the administrator.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        admin-password: |-
            The login password of the administrator.

            Default value: {password}
        admin-user: |-
            The login username of the administrator.

            Default value: {username}
        change-reference: The related change reference ID for this resource operation.
        database-name: |-
            The name of a database.

            Default value: {database}
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        server-name: |-
            Name of the server.

            Default value: {server}
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show connection strings for cmd and programming languages.: az mysql server show-connection-string -s testServer -u username -p password -d databasename
