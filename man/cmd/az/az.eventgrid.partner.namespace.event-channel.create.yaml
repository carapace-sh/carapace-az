# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an event channel under a partner namespace.
flags:
    --activation-expiration-date=: Date or datetime in UTC ISO 8601 format (e.g., '2022-02-17T01:59:59+00:00' or '2022-02-17') after which the event channel and corresponding partner topic would expire and get auto deleted.
    --destination-rg=!: Azure Resource Group of the subscriber requesting the creation of the channel resource by the publisher.
    --destination-sub-id=!: Azure subscription Id of the subscriber requesting the creation of the channel resource by the publisher.
    --destination-topic-name=!: Name of the partner topic associated with the event channel.
    --partner-namespace-name=!: Name of the partner namespace.
    --partner-topic-description=: Friendly description of the corresponding partner topic.
    --publisher-filter=:
        description: A publisher filter that is used to enable filtering of events based on a specific event property.
        nargs: -1
    --source=!: The identifier of the resource that forms the partner source of the events.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the event channel.
documentation:
    command: This command is implicitly deprecated because command group 'eventgrid partner namespace event-channel' is deprecated and will be removed in a future release.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        activation-expiration-date: Date or datetime in UTC ISO 8601 format (e.g., '2022-02-17T01:59:59+00:00' or '2022-02-17') after which the event channel and corresponding partner topic would expire and get auto deleted. If this time is not specified, the expiration date is set to seven days by default.
        change-reference: The related change reference ID for this resource operation.
        destination-rg: Azure Resource Group of the subscriber requesting the creation of the channel resource by the publisher. The corresponding partner resource (either partner topic or partner destination) associated with the channel resource will be created under this resource group.
        destination-sub-id: Azure subscription Id of the subscriber requesting the creation of the channel resource by the publisher. The corresponding partner resource (either partner topic or partner destination) associated with the channel resource will be created under this Azure subscription.
        destination-topic-name: Name of the partner topic associated with the event channel.
        name: Name of the event channel.
        partner-namespace-name: Name of the partner namespace.
        partner-topic-description: Friendly description of the corresponding partner topic. This will be helpful to remove any ambiguity of the origin of creation of the partner topic for the customer.
        publisher-filter: 'Argument ''publisher_filter'' has been deprecated and will be removed in a future release. A publisher filter that is used to enable filtering of events based on a specific event property. This set of filters that are specified by the publisher in order to determine which events to be received by the subscriber. Usage:                     --publisher-filter KEY[.INNERKEY] FILTEROPERATOR VALUE [VALUE ...] StringIn:                  --publisher-filter data.Color StringIn Blue Red Orange Yellow StringNotIn:               --publisher-filter data.Color StringNotIn Blue Red Orange Yellow StringContains:            --publisher-filter subject StringContains Blue Red StringBeginsWith:          --publisher-filter subject StringBeginsWith Blue Red StringEndsWith:            --publisher-filter subject StringEndsWith img png jpg NumberIn:                  --publisher-filter data.property1 NumberIn 5 10 20 NumberNotIn:               --publisher-filter data.property2 NumberNotIn 100 200 300 NumberLessThan:            --publisher-filter data.property3 NumberLessThan 100 NumberLessThanOrEquals:    --publisher-filter data.property2 NumberLessThanOrEquals 100 NumberGreaterThan:         --publisher-filter data.property3 NumberGreaterThan 100 NumberGreaterThanOrEquals: --publisher-filter data.property2 NumberGreaterThanOrEquals 100 BoolEquals:                --publisher-filter data.property3 BoolEquals true Multiple publisher filters can be specified by using more than one ```'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source: The identifier of the resource that forms the partner source of the events. This represents a unique resource in the partner's resource model.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a specific event channel with an activation expiration time and partner topic friendly description.: az eventgrid partner namespace event-channel create -g rg1 --partner-namespace-name partnernamespace1 -n eventChannelName1 --source SourceExample1 --destination-sub-id 61f7c265-374d-499e-866d-5f4cc302b888 --destination-rg rg2 --destination-topic-name topicName1 --activation-expiration-date '2020-05-20T10:00' --partner-topic-description 'This topic is created by Costoco corp on user behavior.'
    Create a specific event channel with publisher filters.: az eventgrid partner namespace event-channel create -g rg1 --partner-namespace-name partnernamespace1 -n eventChannelName1 --source SourceExample1 --destination-sub-id 61f7c265-374d-499e-866d-5f4cc302b888 --destination-rg rg2 --destination-topic-name topicName1 --publisher-filter data.key1 NumberIn 2 3 4 100 200 --publisher-filter data.key2 StringIn 2 3 4 100 200
    Create a specific event channel.: az eventgrid partner namespace event-channel create -g rg1 --partner-namespace-name partnernamespace1 -n eventChannelName1 --source SourceExample1 --destination-sub-id 61f7c265-374d-499e-866d-5f4cc302b888 --destination-rg rg2 --destination-topic-name topicName1
