# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an event channel under a partner namespace.
documentation:
    flag:
        activation-expiration-date: Date or datetime in UTC ISO 8601 format (e.g., '2022-02-17T01:59:59+00:00' or '2022-02-17') after which the event channel and corresponding partner topic would expire and get auto deleted. If this time is not specified, the expiration date is set to seven days by default.
        destination-rg: Azure Resource Group of the subscriber requesting the creation of the channel resource by the publisher. The corresponding partner resource (either partner topic or partner destination) associated with the channel resource will be created under this resource group.
        destination-sub-id: Azure subscription Id of the subscriber requesting the creation of the channel resource by the publisher. The corresponding partner resource (either partner topic or partner destination) associated with the channel resource will be created under this Azure subscription.
        partner-topic-description: Friendly description of the corresponding partner topic. This will be helpful to remove any ambiguity of the origin of creation of the partner topic for the customer.
        publisher-filter: A publisher filter that is used to enable filtering of events based on a specific event property. This set of filters that are specified by the publisher in order to determine which events to be received by the subscriber.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        source: The identifier of the resource that forms the partner source of the events. This represents a unique resource in the partner's resource model.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --activation-expiration-date=: Date or datetime in UTC ISO 8601 format (e.g., '2022-02-17T01:59:59+00:00' or '2022-02-17') after which the event channel and corresponding partner topic would expire and get auto deleted.
    --destination-rg=!: Azure Resource Group of the subscriber requesting the creation of the channel resource by the publisher.
    --destination-sub-id=!: Azure subscription Id of the subscriber requesting the creation of the channel resource by the publisher.
    --destination-topic-name=!: Name of the partner topic associated with the event channel.
    --partner-namespace-name=!: Name of the partner namespace.
    --partner-topic-description=: Friendly description of the corresponding partner topic.
    --publisher-filter=:
        description: A publisher filter that is used to enable filtering of events based on a specific event property.
        nargs: -1
    --source=!: The identifier of the resource that forms the partner source of the events.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the event channel.
