# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: eventhub
description: Create a webapp connection to eventhub.
documentation:
    flag:
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        name: Name of the webapp. Required if '--source-id' is not specified.None
        namespace: Name of the eventhub namespace. Required if '--target-id' is not specified.
        opt-out: Whether to disable some configuration steps. Use configinfo to disbale configuration information changes on source. Use publicnetwork to disable public network access configuration.Use auth to skip auth configuration such as enabling managed identity and granting RBAC roles.
        private-endpoint: Connect target service by private endpoint. The private endpoint in source virtual network must be created ahead.
        resource-group: The resource group which contains the webapp. Required if '--source-id' is not specified.None
        service-endpoint: Connect target service by service endpoint. Source resource must be in the VNet and target SKU must support service endpoint feature.
        slot: The name of the slot. Default to the production slot if not specified.
        source-id: The resource id of a webapp. Required if ['--resource-group', '--name'] are not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-id: The resource id of target service. Required if ['--target-resource-group', '--namespace'] are not specified.
        target-resource-group: The resource group which contains the eventhub. Required if '--target-id' is not specified.
flags:
    --appconfig-id=: The app configuration id to store configuration
    --client-type=: The client type used on the webapp
    --connection=: Name of the webapp connection.
    --connstr-props=:
        description: The additional connection string properties used to build connection string.
        nargs: -1
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --namespace=: Name of the eventhub namespace.
    --no-wait=: Do not wait for the long-running operation to finish.
    --opt-out=:
        description: Whether to disable some configuration steps.
        nargs: -1
    --private-endpoint=:
        description: Connect target service by private endpoint.
        nargs: -1
    --secret=:
        description: The secret auth info
        nargs: -1
    --service-endpoint=:
        description: Connect target service by service endpoint.
        nargs: -1
    --service-principal=:
        description: The service principal auth info
        nargs: -1
    --slot=: The name of the slot.
    --source-id=: The resource id of a webapp.
    --subscription=: Name or ID of subscription.
    --system-identity=:
        description: The system assigned identity auth info
        nargs: -1
    --target-id=: The resource id of target service.
    --target-resource-group=: The resource group which contains the eventhub.
    --user-identity=:
        description: The user assigned identity auth info
        nargs: -1
    --vault-id=: The id of key vault to store secret value
    -g, --resource-group=: The resource group which contains the webapp.
    -n, --name=: Name of the webapp.
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - go
            - springBoot
            - kafka-springBoot
            - none
        opt-out:
            - publicnetwork
            - configinfo
            - auth
        private-endpoint:
            - "true"
            - "false"
        service-endpoint:
            - "true"
            - "false"
