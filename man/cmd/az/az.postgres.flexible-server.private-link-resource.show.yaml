# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets a private link resource for a PostgreSQL flexible server.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -s, --server-name=: Name of the server.
documentation:
    command: Get private link  resource for a PostgreSQL flexible server.
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get the private link  resource for a flexible server in a different subscription.: az postgres flexible-server private-link-resource show --subscription testSubscription --resource-group testgroup --server-name testserver
    Get the private link  resource for a flexible server.: az postgres flexible-server private-link-resource show --resource-group testgroup --server-name testserver
    Get the private link resource for a flexible server using --ids parameter.: az postgres flexible-server private-link-resource show --ids /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/testgroup/providers/Microsoft.DBforPostgreSQL/flexibleServers/testserver
