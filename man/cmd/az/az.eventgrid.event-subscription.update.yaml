# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an event subscription.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --advanced-filter=:
        description: An advanced filter enables filtering of events based on a specific event property.
        nargs: -1
    --deadletter-endpoint=: The Azure resource ID of an Azure Storage blob container destination where EventGrid should deadletter undeliverable events for this event subscription.
    --deadletter-identity-endpoint=: The Azure resource ID of an Azure Storage blob container destination with identity where EventGrid should deadletter undeliverable events for this event subscription.
    --deadletter-identity=: The identity type of the deadletter destination resource.
    --delivery-attribute-mapping=:
        description: Add delivery attribute mapping to send additional information via HTTP headers when delivering events.
        nargs: -1
    --delivery-identity-endpoint-type=: The type of the destination endpoint with resource identity.
    --delivery-identity-endpoint=: Endpoint with identity where EventGrid should deliver events matching this event subscription.
    --delivery-identity=: The identity type of the delivery destination resource (e.g., storage queue, or eventhub).
    --enable-advanced-filtering-on-arrays=:
        description: Allows advanced filters to be evaluated against an array of values instead of expecting a singular value.
        nargs: -1
    --endpoint-type=: The type of the destination endpoint.
    --endpoint=: Endpoint where EventGrid should deliver events matching this event subscription.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --included-event-types=:
        description: A space-separated list of event types (e.g., Microsoft.Storage.BlobCreated and Microsoft.Storage.BlobDeleted).
        nargs: -1
    --labels=:
        description: A space-separated list of labels to associate with this event subscription.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --source-resource-id=: Fully qualified identifier of the source Azure resource.
    --storage-queue-msg-ttl=: Storage queue message time to live in seconds.
    --subject-begins-with=: An optional string to filter events for an event subscription based on a prefix.
    --subject-ends-with=: An optional string to filter events for an event subscription based on a suffix.
    --subscription=: Name or ID of subscription.
    -n, --name=!: Name of the event subscription.
completion:
    flag:
        deadletter-identity:
            - systemassigned
        delivery-identity:
            - systemassigned
        delivery-identity-endpoint-type:
            - webhook
            - eventhub
            - storagequeue
            - hybridconnection
            - servicebusqueue
            - servicebustopic
            - azurefunction
        enable-advanced-filtering-on-arrays:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        advanced-filter: 'An advanced filter enables filtering of events based on a specific event property. Usage:                     --advanced-filter KEY[.INNERKEY] FILTEROPERATOR VALUE [VALUE ...] StringIn:                  --advanced-filter data.Color StringIn Blue Red Orange Yellow StringNotIn:               --advanced-filter data.Color StringNotIn Blue Red Orange Yellow StringContains:            --advanced-filter subject StringContains Blue Red StringNotContains:         --advanced-filter subject StringNotContains Blue Red StringBeginsWith:          --advanced-filter subject StringBeginsWith Blue Red StringNotBeginsWith:       --advanced-filter subject StringNotBeginsWith Blue Red StringEndsWith:            --advanced-filter subject StringEndsWith img png jpg StringNotEndsWith:         --advanced-filter subject StringNotEndsWith img png jpg NumberIn:                  --advanced-filter data.property1 NumberIn 5 10 20 NumberInRange              --advanced-filter data.property1 NumberInRange 5,10 20,30 40,50 NumberNotIn:               --advanced-filter data.property2 NumberNotIn 100 200 300 NumberNotInRange:          --advanced-filter data.property2 NumberNotInRange 100,110 200,210 300,310 NumberLessThan:            --advanced-filter data.property3 NumberLessThan 100 NumberLessThanOrEquals:    --advanced-filter data.property2 NumberLessThanOrEquals 100 NumberGreaterThan:         --advanced-filter data.property3 NumberGreaterThan 100 NumberGreaterThanOrEquals: --advanced-filter data.property2 NumberGreaterThanOrEquals 100 BoolEquals:                --advanced-filter data.property3 BoolEquals true IsNullOrUndefined:         --advanced-filter data.property3 IsNullOrUndefined IsNotNull:                 --advanced-filter data.property3 IsNotNull Multiple advanced filters can be specified by using more than one ```'
        change-reference: The related change reference ID for this resource operation.
        deadletter-endpoint: The Azure resource ID of an Azure Storage blob container destination where EventGrid should deadletter undeliverable events for this event subscription.
        deadletter-identity: |-
            The identity type of the deadletter destination resource.

            Accepted values: systemassigned
        deadletter-identity-endpoint: The Azure resource ID of an Azure Storage blob container destination with identity where EventGrid should deadletter undeliverable events for this event subscription.
        delivery-attribute-mapping: '``` argument. Usage:                        --delivery-attribute-mapping attribute-name attribute-type attribute-value [attribute-is-secret] Static Attribute Mapping:     --delivery-attribute-mapping somename static somevalue Static Attribute Mapping:     --delivery-attribute-mapping somename static somevalue false Static Attribute Mapping:     --delivery-attribute-mapping somename static somevalue true Dynamic Attribute Mapping:    --delivery-attribute-mapping somename dynamic somevalue Both Static and Dynamic:      --delivery-attribute-mapping somename dynamic somevalue --delivery-attribute-mapping somename2 static somevalue.'
        delivery-identity: |-
            The identity type of the delivery destination resource (e.g., storage queue, or eventhub).

            Accepted values: systemassigned
        delivery-identity-endpoint: Endpoint with identity where EventGrid should deliver events matching this event subscription. For webhook endpoint type, this should be the corresponding webhook URL. For other endpoint types, this should be the Azure resource identifier of the endpoint.
        delivery-identity-endpoint-type: |-
            The type of the destination endpoint with resource identity.

            Accepted values: azurefunction, eventhub, hybridconnection, servicebusqueue, servicebustopic, storagequeue, webhook

            Accepted values: false, true
        endpoint: Endpoint where EventGrid should deliver events matching this event subscription. For webhook endpoint type, this should be the corresponding webhook URL. For other endpoint types, this should be the Azure resource identifier of the endpoint. It is expected that the destination endpoint to be already created and available for use before executing any Event Grid command.
        endpoint-type: |-
            The type of the destination endpoint.

            Default value: webhook
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        included-event-types: A space-separated list of event types (e.g., Microsoft.Storage.BlobCreated and Microsoft.Storage.BlobDeleted). In order to subscribe to all default event types, do not specify any value for this argument. For event grid topics, event types are customer defined. For Azure events, e.g., Storage Accounts, IoT Hub, etc., you can query their event types using this CLI command 'az eventgrid topic-type list-event-types'.
        labels: A space-separated list of labels to associate with this event subscription. --qttl --storage-queue-msg-ttl Storage queue message time to live in seconds.
        name: Name of the event subscription.
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        source-resource-id: 'Fully qualified identifier of the Azure resource whose event subscription needs to be updated. Usage:                      --source-resource-id Azure-Resource-ID For Azure subscription:     --source-resource-id /subscriptions/{SubID} For resource group:         --source-resource-id /subscriptions/{SubID}/resourceGroups/rg1 For EventGrid topic:        --source-resource-id /subscriptions/{SubID}/resourceGroups/rg1/providers/Microsoft.EventGrid/topics/t1 For storage account:        --source-resource-id /subscriptions/{SubID}/resourceGroups/rg1/providers/Microsoft.Storage/storageaccounts/sa1 For EventGrid domain:       --source-resource-id /subscriptions/{SubID}/resourceGroups/rg1/providers/Microsoft.EventGrid/domains/d1 For EventGrid domain topic: --source-resource-id /subscriptions/{SubID}/resourceGroups/rg1/providers/Microsoft.EventGrid/domains/d1/topics/t1.'
        subject-begins-with: An optional string to filter events for an event subscription based on a prefix. Wildcard characters are not supported.
        subject-ends-with: An optional string to filter events for an event subscription based on a suffix. Wildcard characters are not supported.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update an event subscription for a resource group to specify a new endpoint and a new subject-ends-with filter.: |-
        az eventgrid event-subscription update --name es3 \
            --source-resource-id /subscriptions/{SubID}/resourceGroups/{RG} \
            --subject-ends-with .png \
            --endpoint https://contoso.azurewebsites.net/api/f1?code=code
    Update an event subscription for a storage account to include message ttl set to 5 mins.: |-
        az eventgrid event-subscription update --name es2 \
            --source-resource-id "/subscriptions/{SubID}/resourceGroups/{RG}/providers/Microsoft.Storage/storageaccounts/kalsegblob" \
            --storage-queue-msg-ttl 300
    Update an event subscription for a storage account to specify a new list of included event types.: |-
        az eventgrid event-subscription update --name es3 \
            --source-resource-id "/subscriptions/{SubID}/resourceGroups/{RG}/providers/microsoft.storage/storageaccounts/kalsegblob" \
            --included-event-types Microsoft.Storage.BlobCreated Microsoft.Storage.BlobDeleted
    Update an event subscription for a storage account, to include a deadletter destination.: |-
        az eventgrid event-subscription update --name es2 \
            --source-resource-id "/subscriptions/{SubID}/resourceGroups/{RG}/providers/Microsoft.Storage/storageaccounts/kalsegblob" \
            --deadletter-endpoint /subscriptions/{SubID}/resourceGroups/TestRG/providers/Microsoft.Storage/storageAccounts/sa1/blobServices/default/containers/blobcontainer1
    Update an event subscription for a storage account, using advanced filters.: |-
        az eventgrid event-subscription update --name es3 \
            --source-resource-id "/subscriptions/{SubID}/resourceGroups/{RG}/providers/Microsoft.Storage/storageaccounts/s1" \
            --endpoint https://contoso.azurewebsites.net/api/f1?code=code
            --advanced-filter data.blobType StringIn BlockBlob
            --advanced-filter data.url StringBeginsWith https://myaccount.blob.core.windows.net
    Update an event subscription for an Azure subscription to specify a new subject-ends-with filter.: |-
        az eventgrid event-subscription update --name es2 \
            --source-resource-id /subscriptions/{SubID} \
            --subject-ends-with .jpg
    Update an event subscription for an Event Grid topic to specify a new endpoint.: |-
        az eventgrid event-subscription update --name es1 \
            --source-resource-id /subscriptions/{SubID}/resourceGroups/{RG}/providers/Microsoft.EventGrid/topics/topic1 \
            --endpoint https://contoso.azurewebsites.net/api/f1?code=code
    Update an event subscription with advanced filtering enabled on arrays: |-
        az eventgrid event-subscription update --name es2 \
            --source-resource-id "/subscriptions/{SubID}/resourceGroups/{RG}/providers/Microsoft.Storage/storageaccounts/kalsegblob" \
            --enable-advanced-filtering-on-arrays true
