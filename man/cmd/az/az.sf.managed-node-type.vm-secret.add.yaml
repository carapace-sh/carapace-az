# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a secret to the node type.
documentation:
    flag:
        certificate-store: Specifies the certificate store on the Virtual Machine to which the certificate should be added. The specified certificate store is implicitly in the LocalMachine account.
        certificate-url: 'This is the URL of a certificate that has been uploaded to Key Vault as a secret. For adding a secret to the Key Vault, see [Add a key or secret to the key vault](https://learn.microsoft.com/azure/key-vault/key-vault-get-started/#add). In this case, your certificate needs to be It is the Base64 encoding of the following JSON Object which is encoded in UTF-8: `<br><br> {<br>  "data":"<Base64-encoded-certificate>",<br>  "dataType":"pfx",<br>  "password":"<pfx-file-password>"<br>}/`'
        resource-group: Specify the resource group name. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --certificate-store=!: Specifies the certificate store on the Virtual Machine to which the certificate should be added.
    --certificate-url=!: This is the URL of a certificate that has been uploaded to Key Vault as a secret.
    --source-vault-id=!: Key Vault resource id containing the certificates.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
    -n, --name=!: node type name.
