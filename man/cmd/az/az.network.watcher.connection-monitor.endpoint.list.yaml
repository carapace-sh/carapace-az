# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all endpoints from a connection monitor.
flags:
    --connection-monitor=!: Connection monitor name.
    --subscription=: Name or ID of subscription.
    -l, --location=!: Location.
documentation:
    command: |-
        Command group 'az network watcher connection-monitor endpoint' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        connection-monitor: Connection monitor name.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all endpoints from a connection monitor.: az network watcher connection-monitor endpoint list --connection-monitor MyConnectionMonitor --location westus2
