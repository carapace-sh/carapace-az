# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the flow log configuration of a network security group.
documentation:
    flag:
        location: Location to identify the exclusive Network Watcher under a region. Only one Network Watcher can be existed per subscription and region.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --nsg=: Name or ID of the network security group.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location to identify the exclusive Network Watcher under a region.
    -n, --name=: The name of the flow logger
