# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates the details of the operation in the API specified by its identifier.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --api-id=!: API identifier.
    --description=: Description of the operation.
    --display-name=: Required.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --if-match=: ETag of the Entity.
    --method=: Required.
    --operation-id=!: Operation identifier within an API.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --url-template=: Relative URL template identifying the target resource for this operation.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        change-reference: The related change reference ID for this resource operation.
        description: Description of the operation. May include HTML formatting tags.
        display-name: Required. Operation Name.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        if-match: ETag of the Entity.
        method: Required. A Valid HTTP Operation Method. Typical Http Methods like GET, PUT, POST but not limited by only them.
        operation-id: Operation identifier within an API. Must be unique in the current API Management service instance.
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        url-template: Relative URL template identifying the target resource for this operation. May include parameters.
examples:
    Updates method, displayname, description of the operation in the API specified by its identifier.: az apim api operation update --resource-group MyResourceGroup --service-name MyServiceName --api-id MyApiId --operation-id MyOperationId --method "PUT" --display-name NewDisplayName --description NewDescription
