# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Create a workload profile in a Container Apps environment
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workload-profile-type: The type of workload profile to add to this environment. Run `az containerapp env workload-profile list-supported -l <region>` to check the options for your region.
flags:
    --max-nodes=: The maximum node count for the workload profile
    --min-nodes=: The minimum node count for the workload profile
    --subscription=: Name or ID of subscription.
    --workload-profile-type=: The type of workload profile to add to this environment.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Container App environment
    -w, --workload-profile-name=!: The friendly name for the workload profile
