# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists all of the applications in the specified account.
flags:
    --maxresults=: The maximum number of items to return in the response.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of the resource group
    -n, --name=!: Name of the Batch account.
documentation:
    flag:
        maxresults: The maximum number of items to return in the response. Default value is None.
        name: Name of the Batch account.
        resource-group: Name of the resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
