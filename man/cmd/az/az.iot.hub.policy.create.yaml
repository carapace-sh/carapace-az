# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new shared access policy in an IoT hub.
documentation:
    flag:
        permissions: 'Permissions of shared access policy. Use space-separated list for multiple permissions. Possible values: RegistryRead, RegistryWrite, ServiceConnect, DeviceConnect'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --hub-name=!: IoT Hub name.
    --permissions=!:
        description: Permissions of shared access policy.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Shared access policy name.
