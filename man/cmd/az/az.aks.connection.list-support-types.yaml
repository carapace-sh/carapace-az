# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-support-types
description: List client types and auth types supported by aks connections.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --subscription=: Name or ID of subscription.
    -t, --target-type=: The target resource type
completion:
    flag:
        target-type:
            - postgres
            - postgres-flexible
            - mysql
            - mysql-flexible
            - sql
            - redis
            - redis-enterprise
            - cosmos-cassandra
            - cosmos-gremlin
            - cosmos-mongo
            - cosmos-table
            - cosmos-sql
            - storage-blob
            - storage-queue
            - storage-file
            - storage-table
            - keyvault
            - appconfig
            - eventhub
            - servicebus
            - signalr
            - webpubsub
            - confluent-cloud
            - app-insights
            - cognitiveservices
            - neon-postgres
