# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-key
description: set the key that all apps in an appservice plan use to connect to the hybrid-connections in that appservice plan
flags:
    --hybrid-connection=!: Hybrid connection name
    --key-type=!: Which key (primary or secondary) should be used
    --namespace=!: Hybrid connection namespace
    --plan=!: AppService plan
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    command: Set the key that all apps in an appservice plan use to connect to the hybrid-connections in that appservice plan.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        hybrid-connection: Hybrid connection name.
        key-type: Which key (primary or secondary) should be used.
        namespace: Hybrid connection namespace.
        plan: AppService plan.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    set the key that all apps in an appservice plan use to connect to the hybrid-connections in that appservice plan: az appservice hybrid-connection set-key -g MyResourceGroup --plan MyAppServicePlan --namespace [HybridConectionNamespace] --hybrid-connection [HybridConnectionName] --key-type ["primary"/"secondary"]
