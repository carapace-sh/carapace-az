# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a data connection.
documentation:
    flag:
        data-format: The data format of the message. Optionally the data format can be added to each message.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        mapping-rule-name: The mapping rule to be used to ingest the data. Optionally the mapping information can be added to each message.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        table-name: The table where the data should be ingested. Optionally the table information can be added to each message.
flags:
    --compression=: The event hub messages compression type
    --consumer-group=: The event hub consumer group.
    --data-connection-name=!: The name of the data connection.
    --data-format=: The data format of the message.
    --database-name=!: The name of the database in the Kusto pool.
    --event-hub-resource-id=: The resource ID of the event hub to be used to create a data connection.
    --event-system-properties=:
        description: System properties of the event hub
        nargs: -1
    --kusto-pool-name=!: The name of the Kusto pool.
    --managed-identity-resource-id=: The resource ID of a managed identity (system or user assigned) to be used to authenticate with event hub.
    --mapping-rule-name=: The mapping rule to be used to ingest the data.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --table-name=: The table where the data should be ingested.
    --workspace-name=!: The name of the workspace
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
completion:
    flag:
        compression:
            - None
            - GZip
        data-format:
            - MULTIJSON
            - JSON
            - CSV
            - TSV
            - SCSV
            - SOHSV
            - PSV
            - TXT
            - RAW
            - SINGLEJSON
            - AVRO
            - TSVE
            - PARQUET
            - ORC
            - APACHEAVRO
            - W3CLOGFILE
