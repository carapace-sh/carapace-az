# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a data connection.
flags:
    --compression=: The event hub messages compression type
    --consumer-group=: The event hub consumer group.
    --data-connection-name=!: The name of the data connection.
    --data-format=: The data format of the message.
    --database-name=!: The name of the database in the Kusto pool.
    --event-hub-resource-id=: The resource ID of the event hub to be used to create a data connection.
    --event-system-properties=:
        description: System properties of the event hub
        nargs: -1
    --kusto-pool-name=!: The name of the Kusto pool.
    --managed-identity-resource-id=: The resource ID of a managed identity (system or user assigned) to be used to authenticate with event hub.
    --mapping-rule-name=: The mapping rule to be used to ingest the data.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --table-name=: The table where the data should be ingested.
    --workspace-name=!: The name of the workspace
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
completion:
    flag:
        compression:
            - None
            - GZip
        data-format:
            - MULTIJSON
            - JSON
            - CSV
            - TSV
            - SCSV
            - SOHSV
            - PSV
            - TXT
            - RAW
            - SINGLEJSON
            - AVRO
            - TSVE
            - PARQUET
            - ORC
            - APACHEAVRO
            - W3CLOGFILE
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        compression: |-
            The event hub messages compression type.

            Accepted values: GZip, None
        consumer-group: The event hub consumer group.
        data-connection-name: The name of the data connection.
        data-format: |-
            The data format of the message. Optionally the data format can be added to each message.

            Accepted values: APACHEAVRO, AVRO, CSV, JSON, MULTIJSON, ORC, PARQUET, PSV, RAW, SCSV, SINGLEJSON, SOHSV, TSV, TSVE, TXT, W3CLOGFILE
        database-name: The name of the database in the Kusto pool.
        event-hub-resource-id: The resource ID of the event hub to be used to create a data connection.
        event-system-properties: System properties of the event hub.
        kusto-pool-name: The name of the Kusto pool.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        managed-identity-resource-id: The resource ID of a managed identity (system or user assigned) to be used to authenticate with event hub.
        mapping-rule-name: The mapping rule to be used to ingest the data. Optionally the mapping information can be added to each message.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        table-name: The table where the data should be ingested. Optionally the table information can be added to each message.
        workspace-name: The name of the workspace.
examples:
    KustoPoolDataConnectionsCreateOrUpdate.json: az synapse kusto data-connection event-hub create --data-connection-name "DataConnections8" --database-name "KustoDatabase8" --kusto-pool-name "kustoclusterrptest4" --location "westus" --consumer-group "testConsumerGroup1" --event-hub-resource-id "/subscriptions/12345678-1234-1234-1234-123456789098/resourceGroups/kustorptest/providers/Microsoft.EventHub/namespaces/eventhubTestns1/eventhubs/eventhubTest1" --resource-group "kustorptest" --workspace-name "synapseWorkspaceName"
