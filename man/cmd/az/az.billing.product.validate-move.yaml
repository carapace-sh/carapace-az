# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: validate-move
description: Validate if a product's charges can be moved to a new invoice section.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --destination-invoice-section-id=: The destination invoice section id.
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies a product.
documentation:
    command: |-
        Command group 'billing product' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account. --name --product-name -n The ID that uniquely identifies a product.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        destination-invoice-section-id: The destination invoice section id.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Validate if a product's charges can be moved to a new invoice section: az billing product validate-move --account-name "{billingAccountName}" --destination-invoice-section-id "/providers/Microsoft.Billing/billingAccounts/{billingAccountName}/billingProfiles/{billingProfileName}/invoiceSections/{newInvoiceSectionName}" --name "{productName}"
