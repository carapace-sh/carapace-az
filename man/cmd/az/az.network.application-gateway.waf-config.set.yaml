# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Update the firewall configuration of a web application.
flags:
    --disabled-rule-groups=:
        description: Space-separated list of rule groups to disable.
        nargs: -1
    --disabled-rules=:
        description: Space-separated list of rule IDs to disable.
        nargs: -1
    --enabled=!: Specify whether the application firewall is enabled.
    --exclusion=:
        description: Add an exclusion expression to the WAF check.
        nargs: -1
    --file-upload-limit=: File upload size limit in MB.
    --firewall-mode=: Web application firewall mode.
    --gateway-name=: Name of the application gateway.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --max-request-body-size=: Max request body size in KB.
    --no-wait=: Do not wait for the long-running operation to finish.
    --request-body-check=:
        description: Allow WAF to check the request body.
        nargs: -1
    --rule-set-type=: Rule set type.
    --rule-set-version=: Rule set version.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        enabled:
            - "true"
            - "false"
        firewall-mode:
            - detection
            - prevention
        request-body-check:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        disabled-rule-groups: Space-separated list of rule groups to disable. To disable individual rules, use `--disabled-rules`.
        disabled-rules: |-
            Space-separated list of rule IDs to disable.

            Value from: az network application-gateway waf-config list-rule-sets
        enabled: |-
            Specify whether the application firewall is enabled.

            Accepted values: false, true
        exclusion: 'Add an exclusion expression to the WAF check. Usage:   --exclusion VARIABLE OPERATOR VALUE Multiple exclusions can be specified by using more than one ```'
        file-upload-limit: File upload size limit in MB.
        firewall-mode: |-
            Web application firewall mode.

            Default value: detection

            Accepted values: detection, prevention
        gateway-name: Name of the application gateway.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        max-request-body-size: Max request body size in KB.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        request-body-check: |-
            Allow WAF to check the request body.

            Accepted values: false, true
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule-set-type: |-
            Rule set type.

            Default value: OWASP

            Value from: az network application-gateway waf-config list-rule-sets
        rule-set-version: |-
            Rule set version.

            Value from: az network application-gateway waf-config list-rule-sets
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Configure WAF on an application gateway in detection mode with default values: az network application-gateway waf-config set -g MyResourceGroup --gateway-name MyAppGateway --enabled true --firewall-mode Detection --rule-set-version 3.0
    Configure WAF on an application gateway with exclusions.: az network application-gateway waf-config set -g MyResourceGroup --gateway-name MyAppGateway --enabled true --firewall-mode Detection --rule-set-version 3.0 --exclusion "RequestHeaderNames StartsWith x-header" --exclusion "RequestArgNames Equals IgnoreThis"
    Disable rules for validation of request body parsing and SQL injection.: az network application-gateway waf-config set -g MyResourceGroup --gateway-name MyAppGateway --enabled true --rule-set-type OWASP --rule-set-version 3.0 --disabled-rule-groups REQUEST-942-APPLICATION-ATTACK-SQLI --disabled-rules 920130 920140
