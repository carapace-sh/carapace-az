# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a snapshot.
flags:
    --accelerated-network=:
        description: Customers can set on Managed Disks or Snapshots to enable the accelerated networking if the OS disk image support.
        nargs: -1
    --architecture=: CPU architecture.
    --bandwidth-copy-speed=: If this field is set on a snapshot and createOption is CopyStart, the snapshot will be copied at a quicker speed.
    --copy-start=:
        description: Create snapshot by using a deep copy process, where the resource creation is considered complete only after all data has been copied from the source.
        nargs: -1
    --disk-access=: Name or ID of the disk access resource for using private endpoints on disks.
    --disk-encryption-set=: Name or ID of disk encryption set that is used to encrypt the disk.
    --edge-zone=: The name of edge zone.
    --elastic-san-resource-id=: This is the ARM id of the source elastic san volume snapshot.
    --encryption-type=: Encryption type.
    --for-upload=:
        description: Create the snapshot for uploading blobs later on through storage commands.
        nargs: -1
    --hyper-v-generation=: The hypervisor generation of the Virtual Machine.
    --incremental=:
        description: Whether a snapshot is incremental.
        nargs: -1
    --network-access-policy=: Policy for accessing the disk via network.
    --no-wait=: Do not wait for the long-running operation to finish.
    --public-network-access=: Customers can set on Managed Disks or Snapshots to control the export policy on the disk.
    --sku=: ""
    --source-storage-account-id=: used when source blob is in a different subscription
    --source=: source to create the disk/snapshot from, including unmanaged blob uri, managed disk id or name, or snapshot id or name
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of the snapshot
    -z, --size-gb=: size in GB.
completion:
    flag:
        accelerated-network:
            - "true"
            - "false"
        architecture:
            - x64
            - Arm64
        bandwidth-copy-speed:
            - None
            - Enhanced
        copy-start:
            - "true"
            - "false"
        encryption-type:
            - EncryptionAtRestWithPlatformKey
            - EncryptionAtRestWithCustomerKey
            - EncryptionAtRestWithPlatformAndCustomerKeys
        for-upload:
            - "true"
            - "false"
        hyper-v-generation:
            - V1
            - V2
        incremental:
            - "true"
            - "false"
        network-access-policy:
            - AllowAll
            - AllowPrivate
            - DenyAll
        public-network-access:
            - Disabled
            - Enabled
        sku:
            - Standard_LRS
            - Premium_LRS
            - Standard_ZRS
documentation:
    flag:
        accelerated-network: Customers can set on Managed Disks or Snapshots to enable the accelerated networking if the OS disk image support.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        architecture: CPU architecture.
        bandwidth-copy-speed: If this field is set on a snapshot and createOption is CopyStart, the snapshot will be copied at a quicker speed.
        change-reference: The related change reference ID for this resource operation.
        copy-start: Create snapshot by using a deep copy process, where the resource creation is considered complete only after all data has been copied from the source.
        disk-access: Name or ID of the disk access resource for using private endpoints on disks.
        disk-encryption-set: Name or ID of disk encryption set that is used to encrypt the disk.
        edge-zone: The name of edge zone. --elastic-san-id --elastic-san-resource-id This is the ARM id of the source elastic san volume snapshot.
        encryption-type: 'Encryption type. EncryptionAtRestWithPlatformKey: Disk is encrypted with XStore managed key at rest. It is the default encryption type. EncryptionAtRestWithCustomerKey: Disk is encrypted with Customer managed key at rest.'
        for-upload: Create the snapshot for uploading blobs later on through storage commands. Run "az snapshot grant-access --access-level Write" to retrieve the snapshot's SAS token.
        hyper-v-generation: The hypervisor generation of the Virtual Machine. Applicable to OS disks only.
        incremental: Whether a snapshot is incremental. Incremental snapshots on the same disk occupy less space than full snapshots and can be diffed.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` . If location is not specified and no default location specified, location will be automatically set as same as the resource group.'
        name: The name of the snapshot.
        network-access-policy: Policy for accessing the disk via network.
        no-wait: Do not wait for the long-running operation to finish.
        public-network-access: Customers can set on Managed Disks or Snapshots to control the export policy on the disk.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        size-gb: 'size in GB. Max size: 4095 GB (certain preview disks can be larger).'
        source: Source to create the disk/snapshot from, including unmanaged blob uri, managed disk id or name, or snapshot id or name.
        source-storage-account-id: Used when source blob is in a different subscription.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a snapshot and associate it with a disk access resource.: az snapshot create -g MyResourceGroup -n MySnapshot --size-gb 10 --network-access-policy AllowPrivate --disk-access MyDiskAccessID
    Create a snapshot by copying an existing disk in the same resource group.: az snapshot create -g MyResourceGroup -n MySnapshot2 --source MyDisk
    Create a snapshot by importing from a blob uri.: az snapshot create -g MyResourceGroup -n MySnapshot --source https://vhd1234.blob.core.windows.net/vhds/osdisk1234.vhd
    Create a snapshot from an existing disk in another resource group.: az snapshot create -g MyResourceGroup -n MySnapshot2 --source "/subscriptions/00000/resourceGroups/AnotherResourceGroup/providers/Microsoft.Compute/disks/MyDisk"
    Create an empty snapshot.: az snapshot create -g MyResourceGroup -n MySnapshot --size-gb 10
