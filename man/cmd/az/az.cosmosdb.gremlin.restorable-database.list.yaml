# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Show the event feed of all mutations done on all the Azure Cosmos DB Gremlin databases under the restorable account.
flags:
    --subscription=: Name or ID of subscription.
    -i, --instance-id=!: InstanceId of the Account
    -l, --location=!: Location
documentation:
    command: |-
        Command group 'cosmosdb gremlin restorable-database' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        instance-id: InstanceId of the Account.
        location: Location.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
