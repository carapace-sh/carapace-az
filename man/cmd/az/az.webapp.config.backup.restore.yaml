# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore a web app from a backup.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        slot: the name of the slot. Default to the productions slot if not specified
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-name: The name to use for the restored web app. If unspecified, will default to the name that was used when the backup was created
flags:
    --backup-name=!: Name of the backup to restore
    --container-url=!: URL with SAS token to the blob storage container
    --db-connection-string=: Connection string for the database in the backup
    --db-name=: Name of the database in the backup
    --db-type=: Type of database in the backup
    --ignore-hostname-conflict=: Ignores custom hostnames stored in the backup
    --overwrite=: Overwrite the source web app, if --target-name is not specified
    --subscription=: Name or ID of subscription.
    --target-name=: The name to use for the restored web app.
    -g, --resource-group=!: Name of resource group.
    -n, --webapp-name=!: The name of the web app
    -s, --slot=: the name of the slot.
completion:
    flag:
        db-type:
            - SqlAzure
            - MySql
            - LocalMySql
            - PostgreSql
