# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the properties of a Product.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --auto-renew=: Indicates whether auto renewal is turned on or off for a product.
    --billing-frequency=: The frequency at which the product will be billed.
    --status=: The current status of the product.
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies a product.
completion:
    flag:
        auto-renew:
            - "Off"
            - "On"
        billing-frequency:
            - OneTime
            - Monthly
            - UsageBased
        status:
            - Active
            - Inactive
            - PastDue
            - Expiring
            - Expired
            - Disabled
            - Cancelled
            - AutoRenew
documentation:
    command: |-
        Command group 'billing product' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account. --name --product-name -n The ID that uniquely identifies a product.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auto-renew: |-
            Indicates whether auto renewal is turned on or off for a product.

            Accepted values: Off, On
        billing-frequency: |-
            The frequency at which the product will be billed.

            Accepted values: Monthly, OneTime, UsageBased
        change-reference: The related change reference ID for this resource operation.
        status: |-
            The current status of the product.

            Accepted values: Active, AutoRenew, Cancelled, Disabled, Expired, Expiring, Inactive, PastDue
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update properties of a product: az billing product update --account-name "{billingAccountName}" --auto-renew "Off" --name "{productName}"
