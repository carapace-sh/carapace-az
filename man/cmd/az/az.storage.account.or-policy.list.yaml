# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the object replication policies associated with the storage account.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
documentation:
    command: List Object Replication Service Policies associated with the specified storage account.
    flag:
        account-name: The storage account name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List Object Replication Service Policies associated with the specified storage account.: az storage account or-policy list -g ResourceGroupName -n StorageAccountName
