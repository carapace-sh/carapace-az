# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Appends an application group policy to the existing policy.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --namespace-name=: Name of Namespace
    --subscription=: Name or ID of subscription.
    --throttling-policy-config=!:
        description: List of Throttling Policy Objects
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of Application Group
documentation:
    command: Appends an application group policy to the existing policy. This cmdlet can be used to append one or more throttling policies.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of Application Group.
        namespace-name: Name of Namespace.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Append 2 throttling policies to an application group. Maximum allowed throttling policies is 4.: az eventhubs namespace application-group policy add --namespace-name mynamespace -g MyResourceGroup --name myAppGroup --throttling-policy-config name=policy1 metric-id=OutgoingMessages rate-limit-threshold=10500 --throttling-policy-config name=policy2 metric-id=IncomingBytes rate-limit-threshold=20000
