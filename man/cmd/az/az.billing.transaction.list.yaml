# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the transactions for an invoice.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --invoice-name=!: The ID that uniquely identifies an invoice.
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        Command group 'billing transaction' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        invoice-name: The ID that uniquely identifies an invoice.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List transactions by invoice: az billing transaction list --account-name "{billingAccountName}" --invoice-name "{invoiceName}"
