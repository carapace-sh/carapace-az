# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove-record
description: Remove a NAPTR record from its record set.
flags:
    --flags=!: The flags specific to DDDS applications.
    --keep-empty-record-set=: Keep the empty record set if the last record is removed.
    --order=!: The order in which the NAPTR records MUST be processed in order to accurately represent the ordered list of rules.
    --preference=!: The preference specifies the order in which NAPTR records with equal "order" values should be processed, low numbers being processed before high numbers.
    --regexp=!: The regular expression that the DDDS application uses to convert an input value into an output value.
    --replacement=!: The replacement is a fully qualified domain name (FQDN) of the next domain name that you want the DDDS application to submit a DNS query for.
    --services=!: The services specific to DDDS applications.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -z, --zone-name=!: The name of the zone.
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        flags: The flags specific to DDDS applications. Values currently defined in RFC 3404 are uppercase and lowercase letters "A", "P", "S", and "U", and the empty string, "". Enclose Flags in quotation marks.
        keep-empty-record-set: |-
            Keep the empty record set if the last record is removed.

            Default value: False
        order: 'The order in which the NAPTR records MUST be processed in order to accurately represent the ordered list of rules. The ordering is from lowest to highest. Valid values: 0-65535.'
        preference: 'The preference specifies the order in which NAPTR records with equal "order" values should be processed, low numbers being processed before high numbers. Valid values: 0-65535.'
        record-set-name: The name of the record set relative to the zone.
        regexp: 'The regular expression that the DDDS application uses to convert an input value into an output value. For example: an IP phone system might use a regular expression to convert a phone number that is entered by a user into a SIP URI. Enclose the regular expression in quotation marks. Specify either a value for "regexp" or a value for "replacement".'
        replacement: The replacement is a fully qualified domain name (FQDN) of the next domain name that you want the DDDS application to submit a DNS query for. The DDDS application replaces the input value with the value specified for replacement. Specify either a value for "regexp" or a value for "replacement". If you specify a value for "regexp", specify a dot (.) for "replacement".
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        services: The services specific to DDDS applications. Enclose Services in quotation marks.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        zone-name: The name of the zone.
examples:
    Remove an NAPTR record from its record set.: |-
        az network dns record-set naptr remove-record -g MyResourceGroup -z www.mysite.com \
            -n MyRecordSet --flags "U" --order 10 --preference 20 --services "E2U+sip" --regexp "!^.*$!sip:customer-service@example.com!" --replacement .
