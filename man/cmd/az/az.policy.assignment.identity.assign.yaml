# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: assign
description: Add a system assigned identity or a user assigned identity to a policy assignment.
flags:
    --identity-scope=: Scope that the system assigned identity can access
    --role=: Role name or id that will be assigned to the managed identity
    --scope=: Scope at which this policy assignment subcommand applies.
    --subscription=: Name or ID of subscription.
    --system-assigned=: Provide this flag to use system assigned identity for policy assignment.
    --user-assigned=: UserAssigned Identity Id to be used for policy assignment.
    -g, --resource-group=: the resource group where the policy will be applied
    -n, --name=!: Name of the policy assignment.
documentation:
    command: Breaking change
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        identity-scope: Scope that the system assigned identity can access. --mi-system-assigned --system-assigned Set the system managed identity.
        name: The name of the policy assignment.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        role: Role name or id that will be assigned to the managed identity.
        scope: Scope at which this policy assignment subcommand applies. Defaults to current context subscription.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-assigned: Provide this flag to use system assigned identity for policy assignment. Check out help for more examples
        user-assigned: UserAssigned Identity Id to be used for policy assignment. Check out help for more examples
examples:
    Add a system assigned managed identity to a policy assignment: az policy assignment identity assign --system-assigned -g MyResourceGroup -n MyPolicyAssignment
    Add a system assigned managed identity to a policy assignment and grant it the Contributor role for a resource group: az policy assignment identity assign --system-assigned -g MyResourceGroup -n MyPolicyAssignment --role Contributor --identity-scope /subscriptions/{subscriptionId}/resourceGroups/MyResourceGroup
    Add a user assigned managed identity to a policy assignment: az policy assignment identity assign --user-assigned MyAssignedId -g MyResourceGroup -n MyPolicyAssignment
