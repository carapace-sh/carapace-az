# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: assign
description: Add a system assigned identity or a user assigned identity to a policy assignment.
documentation:
    flag:
        scope: Scope at which this policy assignment subcommand applies. Defaults to current context subscription.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-assigned: Provide this flag to use system assigned identity for policy assignment. Check out help for more examples
        user-assigned: UserAssigned Identity Id to be used for policy assignment. Check out help for more examples
flags:
    --identity-scope=: Scope that the system assigned identity can access
    --role=: Role name or id that will be assigned to the managed identity
    --scope=: Scope at which this policy assignment subcommand applies.
    --subscription=: Name or ID of subscription.
    --system-assigned=: Provide this flag to use system assigned identity for policy assignment.
    --user-assigned=: UserAssigned Identity Id to be used for policy assignment.
    -g, --resource-group=: the resource group where the policy will be applied
    -n, --name=!: Name of the policy assignment.
