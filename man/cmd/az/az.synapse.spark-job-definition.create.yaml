# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a spark job definition.
flags:
    --file=!: Properties may be supplied from a JSON file using the `@{path}` syntax or a JSON string.
    --folder-path=: The folder that this spark job definition is in.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -n, --name=!: The spark job definition name
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        file: Properties may be supplied from a JSON file using the ``` @{path} ``` syntax or a JSON string.
        folder-path: 'The folder that this spark job definition is in. If not specified, it will appear at the root level. Eg: folder/subfolder1.'
        name: The spark job definition name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    ? Create a spark job definition. Pay attention to add "@" at the front of the file path as the best practice for complex arguments like JSON string.
    : |-
        az synapse spark-job-definition create --workspace-name testsynapseworkspace \
          --name testsjdname --file @"path/test.json" --folder-path 'folder/subfolder'
