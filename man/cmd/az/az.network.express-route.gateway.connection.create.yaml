# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an ExpressRoute gateway connection.
flags:
    --associated-route-table=: The resource id of route table associated with this routing configuration.
    --authorization-key=: Authorization key to establish the connection.
    --circuit-name=: ExpressRoute circuit name.
    --gateway-name=!: ExpressRoute gateway name.
    --inbound-route-map=:
        description: The resource id of the RouteMap associated with this RoutingConfiguration for inbound learned routes.
        nargs: -1
    --internet-security=:
        description: Enable internet security.
        nargs: -1
    --labels=:
        description: Space-separated list of labels for propagated route tables.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --outbound-route-map=:
        description: The resource id of theRouteMap associated with this RoutingConfiguration for outbound advertised routes.
        nargs: -1
    --peering=: Name or ID of an ExpressRoute peering.
    --propagated-route-tables=:
        description: Space-separated list of resource id of propagated route tables.
        nargs: -1
    --routing-weight=: Routing weight associated with the connection.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: ExpressRoute connection name.
completion:
    flag:
        internet-security:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        authorization-key: Authorization key to establish the connection.
        change-reference: The related change reference ID for this resource operation.
        circuit-name: ExpressRoute circuit name.
        gateway-name: ExpressRoute gateway name.
        inbound-route-map: The resource id of the RouteMap associated with this RoutingConfiguration for inbound learned routes.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        internet-security: |-
            Enable internet security. A virtual hub can have the ability to propagate a learned default route to this ExpressRoute connection. This ref https://review.learn.microsoft.com/en-us/azure/virtual-wan/effective-routes-virtual-hub?branch=pr-en-us-91866#aboutdefaultroute might be helpful. Allowed values: false, true.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        labels: Space-separated list of labels for propagated route tables.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: ExpressRoute connection name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        outbound-route-map: The resource id of theRouteMap associated with this RoutingConfiguration for outbound advertised routes.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        peering: Name or ID of an ExpressRoute peering.
        propagated-route-tables: Space-separated list of resource id of propagated route tables.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        routing-weight: Routing weight associated with the connection.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create an ExpressRoute gateway connection.: az network express-route gateway connection create --gateway-name MyGateway -n MyExpressRouteConnection -g MyResourceGroup --peering /subscriptions/MySub/resourceGroups/MyResourceGroup/providers/Microsoft.Network/expressRouteCircuits/MyCircuit/peerings/AzurePrivatePeering --associated-route-table /MySub/resourceGroups/MyResourceGroup/providers/Microsoft.Network/virtualHubs/MyHub/hubRouteTables/MyRouteTable1 --propagated-route-tables [/MySub/resourceGroups/MyResourceGroup/providers/Microsoft.Network/virtualHubs/MyHub/hubRouteTables/MyRouteTable1,/MySub/resourceGroups/MyResourceGroup/providers/Microsoft.Network/virtualHubs/MyHub/hubRouteTables/MyRouteTable2] --labels [label1,label2]
    Create an ExpressRoute gateway connection. (autogenerated): az network express-route gateway connection create --gateway-name MyGateway --name MyExpressRouteConnection --peering /subscriptions/MySub/resourceGroups/MyResourceGroup/provi ders/Microsoft.Network/expressRouteCircuits/MyCircuit/peerings/AzurePrivatePeering --resource-group MyResourceGroup
