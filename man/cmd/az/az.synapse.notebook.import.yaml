# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: import
description: Import a notebook.
documentation:
    flag:
        folder-path: 'The folder that this notebook is in. If not specified, this notebook will appear at the root level. Eg: folder/subfolder1'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --executor-count=: Number of executors to be allocated in the specified Spark pool for the job.
    --executor-size=: Number of core and memory to be used for executors allocated in the specified Spark pool for the job.
    --file=!: Properties may be supplied from a JSON file using the `@{path}` syntax or a JSON string.
    --folder-path=: The folder that this notebook is in.
    --no-wait=: Do not wait for the long-running operation to finish.
    --spark-pool-name=: The name of the Spark pool.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -n, --name=!: The notebook name.
completion:
    flag:
        executor-size:
            - Small
            - Medium
            - Large
