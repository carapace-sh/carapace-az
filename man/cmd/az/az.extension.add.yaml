# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add an extension.
flags:
    --allow-preview=:
        description: Include preview packages for extension installation, if exists
        nargs: -1
    --pip-extra-index-urls=:
        description: Space-separated list of extra URLs of package indexes to use.
        nargs: -1
    --pip-proxy=: Proxy for pip to use for extension dependencies in the form of [user:passwd@]proxy.server:port
    --system=: Use a system directory for the extension.
    --upgrade=: Update the extension if already installed, otherwise just install the extension.
    --version=: The specific version of an extension
    -n, --name=: Name of extension
    -s, --source=: Filepath or URL to an extension
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        allow-preview:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allow-preview: |-
            Include preview packages for extension installation, if exists.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        name: Name of extension.
        pip-extra-index-urls: Space-separated list of extra URLs of package indexes to use. This should point to a repository compliant with PEP 503 (the simple repository API) or a local directory laid out in the same format.
        pip-proxy: Proxy for pip to use for extension dependencies in the form of [user:passwd@]proxy.server:port.
        source: Filepath or URL to an extension.
        system: Use a system directory for the extension. Default path is azure-cli-extensions folder under the CLI running python environment lib path, configurable by environment variable AZURE_EXTENSION_SYS_DIR. On Windows, you may need to open your shell as Administrator to run with the right permission.
        upgrade: Update the extension if already installed, otherwise just install the extension.
        version: |-
            The specific version of an extension.

            Default value: latest
        "yes": Do not prompt for confirmation.
examples:
    Add a specific version of extension: az extension add --name anextension --version 1.0.0
    Add extension by name: az extension add --name anextension
    Add extension from URL: az extension add --source https://contoso.com/anextension-0.0.1-py2.py3-none-any.whl
    Add extension from local disk: az extension add --source ~/anextension-0.0.1-py2.py3-none-any.whl
    Add extension from local disk and use pip proxy for dependencies: az extension add --source ~/anextension-0.0.1-py2.py3-none-any.whl --pip-proxy https://user:pass@proxy.server:8080
    Add extension to system directory: az extension add --name anextension --system
    Upgrade the extension if already installed: az extension add --upgrade --name anextension
