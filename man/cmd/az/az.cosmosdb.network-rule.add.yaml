# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Adds a virtual network rule to an existing Cosmos DB database account
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ignore-missing-endpoint=:
        description: Create firewall rule before the virtual network has vnet service endpoint enabled.
        nargs: -1
    --subnet=!: Name or ID of the subnet
    --subscription=: Name or ID of subscription.
    --vnet-name=: The name of the VNET, which must be provided in conjunction with the name of the subnet
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Cosmos DB database account
completion:
    flag:
        ignore-missing-endpoint:
            - "true"
            - "false"
documentation:
    command: Adds a virtual network rule to an existing Cosmos DB database account.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: |-
            One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.

            Default value: False

            Accepted values: false, true
        name: Name of the Cosmos DB database account.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subnet: Name or ID of the subnet.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
