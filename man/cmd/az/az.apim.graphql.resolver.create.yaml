# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a new Resolver.
documentation:
    flag:
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        description: Description of the resolver. May include HTML formatting tags.
        path: Resolver identifier within a GraphQL API. Must be unique in the current API Management service instance.
        resolver-id: Resolver identifier within a GraphQL API. Must be unique in the current API Management service instance.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --api-id=!: API identifier.
    --description=: Description of the resolver.
    --display-name=!: Resolver Name.
    --path=!: Resolver identifier within a GraphQL API.
    --resolver-id=!: Resolver identifier within a GraphQL API.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
