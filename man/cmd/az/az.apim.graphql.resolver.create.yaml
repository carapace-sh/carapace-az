# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a new Resolver.
flags:
    --api-id=!: API identifier.
    --description=: Description of the resolver.
    --display-name=!: Resolver Name.
    --path=!: Resolver identifier within a GraphQL API.
    --resolver-id=!: Resolver identifier within a GraphQL API.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    command: Create a new resolver in the GraphQL API or updates an existing one.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        change-reference: The related change reference ID for this resource operation.
        description: Description of the resolver. May include HTML formatting tags.
        display-name: Resolver Name.
        path: Resolver identifier within a GraphQL API. Must be unique in the current API Management service instance.
        resolver-id: Resolver identifier within a GraphQL API. Must be unique in the current API Management service instance.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a new resolver.: az apim graphql resolver create --service-name MyApim -g MyResourceGroup --api-id MyApi --resolver-id MyResolverId --display-name "Query-allFamilies" --path "Query/allFamilies" --description "A GraphQL Resolver example"
