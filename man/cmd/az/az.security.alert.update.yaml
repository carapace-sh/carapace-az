# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates a security alert status.
flags:
    --status=!: target status of the alert.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -l, --location=!: location of the resource
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: Location of the resource.
        name: Name of the resource to be fetched.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        status: Target status of the alert. possible values are "dismiss", "activate", "resolve" and "inprogress".
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Activate a security alert on a resource group scope.: az security alert update -g "myRg" --location "centralus" -n "alertName" --status "activate"
    Activate a security alert on a subscritpion scope.: az security alert update --location "centralus" -n "alertName" --status "activate"
    Change security alert status to "InProgress" on a resource group scope.: az security alert update -g "myRg" --location "centralus" -n "alertName" --status "inprogress"
    Change security alert status to "InProgress" on a subscritpion scope.: az security alert update --location "centralus" -n "alertName" --status "inprogress"
    Dismiss a security alert on a resource group scope.: az security alert update -g "myRg" --location "centralus" -n "alertName" --status "dismiss"
    Dismiss a security alert on a subscription scope.: az security alert update --location "centralus" -n "alertName" --status "dismiss"
    Resolve a security alert on a resource group scope.: az security alert update -g "myRg" --location "centralus" -n "alertName" --status "resolve"
    Resolve a security alert on a subscritpion scope.: az security alert update --location "centralus" -n "alertName" --status "resolve"
