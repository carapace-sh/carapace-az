# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: patch
description: Update a resource by PATCH request.
flags:
    --api-version=: The api version of the resource (omit for the latest stable version)
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --is-full-object=: Indicate that the properties object includes other options such as location, tags, sku, and/or plan.
    --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
    --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
    --resource-type=: 'The resource type (Ex: ''resC'').'
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The resource name.
    -p, --properties=!: A JSON-formatted string containing resource properties.
    -v, --latest-include-preview=: Indicate that the latest api-version will be used regardless of whether it is preview version (like 2020-01-01-preview) or not.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api-version: The api version of the resource (omit for the latest stable version).
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
        is-full-object: Indicate that the properties object includes other options such as location, tags, sku, and/or plan.
        latest-include-preview: 'Indicate that the latest api-version will be used regardless of whether it is preview version (like 2020-01-01-preview) or not. For example, if the supported api-version of resource provider is 2020-01-01-preview and 2019-01-01: when passing in this parameter it will take the latest version 2020-01-01-preview, otherwise it will take the latest stable version 2019-01-01 without passing in this parameter.'
        name: 'The resource name. (Ex: myC).'
        namespace: 'Provider namespace (Ex: ''Microsoft.Provider'').'
        parent: 'The parent path (Ex: ''resA/myA/resB/myB'').'
        properties: A JSON-formatted string containing resource properties.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'The resource type (Ex: ''resC''). Can also accept namespace/type format (Ex: ''Microsoft.Provider/resC'').'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a resource by using JSON configuration from a file.: |-
        az resource patch --name MyResource --resource-group MyResourceGroup --resource-type Microsoft.web/sites \
          --is-full-object --properties @jsonConfigFile
    Update a webapp by using the latest api-version whether this version is a preview version.: |-
        az resource patch --ids /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Web/sites/{WebApp} \
          --latest-include-preview --is-full-object --properties "{ \"tags\": { \"key\": \"value\" } }"
    Update an API app by providing a JSON configuration.: |-
        az resource patch --name MyApiApp --resource-group MyResourceGroup --resource-type Microsoft.web/sites \
            --is-full-object --properties "{ \"kind\": \"api\", \"properties\": { \"serverFarmId\": \
                    \"/subscriptions/{SubID}/resourcegroups/{ResourceGroup} \
                        /providers/Microsoft.Web/serverfarms/{ServicePlan}\" } }"
