# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get a customer by its ID.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --expand=: May be used to expand enabledAzurePlans and resellers
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies a customer.
documentation:
    command: |-
        Command group 'billing customer' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account. --customer-name --name -n The ID that uniquely identifies a customer.
        expand: May be used to expand enabledAzurePlans and resellers.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show a customer with default properties: az billing customer show --account-name "{billingAccountName}" --name "{customerName}"
    Show a customer with desired expanded properties: az billing customer show --expand "enabledAzurePlans,resellers" --account-name "{billingAccountName}" --name "{customerName}"
