# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: invoke-action
description: Invokes the provided action on an existing resource.
flags:
    --action=!: The action that will be invoked on the specified resource
    --api-version=: The api version of the resource (omit for the latest stable version)
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
    --no-wait=: do not wait for the long-running operation to finish
    --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
    --request-body=: JSON encoded parameter arguments for the action that will be passed along in the post request body.
    --resource-type=: 'The resource type (Ex: ''resC'').'
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The resource name.
    -v, --latest-include-preview=: Indicate that the latest api-version will be used regardless of whether it is preview version (like 2020-01-01-preview) or not.
documentation:
    command: Invoke an action on the resource.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        action: The action that will be invoked on the specified resource.
        api-version: The api version of the resource (omit for the latest stable version).
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
        latest-include-preview: |-
            Indicate that the latest api-version will be used regardless of whether it is preview version (like 2020-01-01-preview) or not. For example, if the supported api-version of resource provider is 2020-01-01-preview and 2019-01-01: when passing in this parameter it will take the latest version 2020-01-01-preview, otherwise it will take the latest stable version 2019-01-01 without passing in this parameter.

            Default value: False
        name: 'The resource name. (Ex: myC).'
        namespace: 'Provider namespace (Ex: ''Microsoft.Provider'').'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        parent: 'The parent path (Ex: ''resA/myA/resB/myB'').'
        request-body: JSON encoded parameter arguments for the action that will be passed along in the post request body. Use @{file} to load from a file.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'The resource type (Ex: ''resC''). Can also accept namespace/type format (Ex: ''Microsoft.Provider/resC'').'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Capture information for a stopped vm.: |-
        az resource invoke-action --action capture \
          --ids /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/ \
            Microsoft.Compute/virtualMachines/{VMName} \
          --request-body "{ \"vhdPrefix\": \"myPrefix\", \"destinationContainerName\": \
            \"myContainer\", \"overwriteVhds\": true }"
    Invoke an action on the resource. (autogenerated): az resource invoke-action --action capture --name MyResource --resource-group MyResourceGroup --resource-type Microsoft.web/sites
    Power-off a vm, specified by Id.: |-
        az resource invoke-action --action powerOff \
          --ids /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Compute/virtualMachines/{VMName}
