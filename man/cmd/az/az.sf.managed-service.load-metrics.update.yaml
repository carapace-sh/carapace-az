# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a managed service.
documentation:
    flag:
        default-load: Specify the default amount of load, as a number, that this service creates for this metric. Used only for Stateless services.
        primary-default-load: Specify the default amount of load, as a number, that this service creates for this metric when it is a Primary replica. Used only for Stateful services.
        resource-group: Specify the resource group name. You can configure the default group using `az configure --defaults group=<name>`
        secondary-default-load: Specify the default amount of load, as a number, that this service creates for this metric when it is a Secondary replica. Used only for Stateful services.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --application=!: Specify the name of the service.
    --default-load=: Specify the default amount of load, as a number, that this service creates for this metric.
    --metric-name=!: Specify the name of the metric.
    --name=!: Specify the name of the service.
    --primary-default-load=: Specify the default amount of load, as a number, that this service creates for this metric when it is a Primary replica.
    --secondary-default-load=: Specify the default amount of load, as a number, that this service creates for this metric when it is a Secondary replica.
    --subscription=: Name or ID of subscription.
    --weight=: Specify the service load metric relative weight, compared to other metrics configured for this service, as a number.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
