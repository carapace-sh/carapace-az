# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an existing bot.
documentation:
    flag:
        app-insights-api-key: Azure Application Insights API Key used to read bot analytics data. Provide a key if you want to view analytics about your bot in the Analytics blade.
        app-insights-app-id: Azure Application Insights Application ID used to read bot analytics data. Provide an Id if you want to view analytics about your bot in the Analytics blade.
        app-insights-key: Azure Application Insights Key used to write bot analytics data. Provide a key if you want to receive bot analytics.
        endpoint: The new endpoint of the bot. Must start with "https://"
        icon-url: Icon URL for bot avatar. Accepts PNG files with file size limit of 30KB.
        name: The resource name of the bot. Bot name must be between 4 and 42 characters in length. Bot name can only have the following characters -, a - z, A - Z, 0 - 9, and _.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --app-insights-api-key=: Azure Application Insights API Key used to read bot analytics data.
    --app-insights-app-id=: Azure Application Insights Application ID used to read bot analytics data.
    --app-insights-key=: Azure Application Insights Key used to write bot analytics data.
    --cmk-key-vault-key-url=: The key vault key url to enable Customer Managed Keys encryption
    --cmk-off=: Set encryption to Microsoft-Managed Keys
    --description=: The bot's new description.
    --icon-url=: Icon URL for bot avatar.
    --sku=: The Sku of the bot.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -d, --display-name=: The bot's new display name.
    -e, --endpoint=: The new endpoint of the bot.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The resource name of the bot.
completion:
    flag:
        sku:
            - F0
            - S1
