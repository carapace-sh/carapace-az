# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of Azure Marketplace image terms.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        urn: URN, in the format of 'publisher:offer:sku:version'. If specified, other argument values can be omitted
flags:
    --plan=: Image billing plan
    --subscription=: Name or ID of subscription.
    --urn=: URN, in the format of 'publisher:offer:sku:version'.
    -f, --offer=: Image offer
    -p, --publisher=: Image publisher
