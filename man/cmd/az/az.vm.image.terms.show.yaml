# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of Azure Marketplace image terms.
flags:
    --plan=: Image billing plan
    --subscription=: Name or ID of subscription.
    --urn=: URN, in the format of 'publisher:offer:sku:version'.
    -f, --offer=: Image offer
    -p, --publisher=: Image publisher
documentation:
    flag:
        offer: Image offer.
        plan: Image billing plan.
        publisher: Image publisher.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        urn: URN, in the format of 'publisher:offer:sku:version'. If specified, other argument values can be omitted.
examples:
    Get the details of Azure Marketplace image terms.: az vm image terms show --urn publisher:offer:sku:version
