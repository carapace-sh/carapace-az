# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show past environment logs and/or print logs in real time (with the --follow parameter)
flags:
    --follow=:
        description: Print logs in real time if present.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tail=: The number of past logs to print (0-300)
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Container Apps environment.
completion:
    flag:
        follow:
            - "true"
            - "false"
documentation:
    command: Show past environment logs and/or print logs in real time (with the --follow parameter).
    flag:
        follow: |-
            Print logs in real time if present.

            Default value: False

            Accepted values: false, true
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the Container Apps environment.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tail: |-
            The number of past logs to print (0-300).

            Default value: 20
examples:
    Fetch 30 lines of past logs logs from an environment and print logs as they come in: az containerapp env logs show -n MyEnvironment -g MyResourceGroup --follow --tail 30
    Fetch the past 20 lines of logs from an app and return: az containerapp env logs show -n MyEnvironment -g MyResourceGroup
