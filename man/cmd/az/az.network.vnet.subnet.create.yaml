# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a subnet and associate an existing NSG and route table.
documentation:
    flag:
        address-prefixes: Space-separated list of address prefixes in CIDR format.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        default-outbound-access: Set this property to false to disable default outbound connectivity for all VMs in the subnet. This property can only be set at the time of subnet creation and cannot be updated for an existing subnet.
        delegations: Space-separated list of services to whom the subnet should be delegated, e.g., Microsoft.Sql/servers.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        disable-private-endpoint-network-policies: Disable private endpoint network policies on the subnet. Please note that it will be replaced by `--private-endpoint-network-policies` soon.
        disable-private-link-service-network-policies: Disable private link service network policies on the subnet. Please note that it will be replaced by `--private-link-service-network-policies` soon.
        endpoints: An array of service endpoints.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        service-endpoint-policy: Space-separated list of names or IDs of service endpoint policies to apply.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        service-endpoints: 'Space-separated list of services allowed private access to this subnet. Values from: az network vnet list-endpoint-services.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        sharing-scope: Set this property to Tenant to allow sharing subnet with other subscriptions in your AAD tenant. This property can only be set if defaultOutboundAccess is set to false, both properties can only be set if subnet is empty.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --address-prefixes=:
        description: Space-separated list of address prefixes in CIDR format.
        nargs: -1
    --default-outbound-access=:
        description: Set this property to false to disable default outbound connectivity for all VMs in the subnet.
        nargs: -1
    --delegations=:
        description: Space-separated list of services to whom the subnet should be delegated, e.g., Microsoft.Sql/servers.
        nargs: -1
    --disable-private-endpoint-network-policies=:
        description: Disable private endpoint network policies on the subnet.
        nargs: -1
    --disable-private-link-service-network-policies=:
        description: Disable private link service network policies on the subnet.
        nargs: -1
    --endpoints=:
        description: An array of service endpoints.
        nargs: -1
    --nat-gateway=: Name or ID of a NAT gateway to attach.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --nsg=: Name or ID of a network security group (NSG).
    --ple-network-policies=: Manage network policies for private endpoint.
    --pls-network-policies=: Manage network policy for private link service.
    --route-table=: Name or ID of a route table to associate with the subnet.
    --service-endpoint-policy=:
        description: Space-separated list of names or IDs of service endpoint policies to apply.
        nargs: -1
    --service-endpoints=:
        description: Space-separated list of services allowed private access to this subnet.
        nargs: -1
    --sharing-scope=: Set this property to Tenant to allow sharing subnet with other subscriptions in your AAD tenant.
    --subscription=: Name or ID of subscription.
    --vnet-name=!: The virtual network (VNet) name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The subnet name.
completion:
    flag:
        default-outbound-access:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        disable-private-endpoint-network-policies:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        disable-private-link-service-network-policies:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        ple-network-policies:
            - Disabled
            - Enabled
            - NetworkSecurityGroupEnabled
            - RouteTableEnabled
        pls-network-policies:
            - Disabled
            - Enabled
        sharing-scope:
            - DelegatedServices
            - Tenant
