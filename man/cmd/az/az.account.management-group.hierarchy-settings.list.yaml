# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Get all the hierarchy settings defined at the Management Group level.
flags:
    -n, --name=!: ""
documentation:
    flag:
        name: Name of the management group.
examples:
    Get all hierarchy settings defined at the Management Group level.: az account management-group hierarchy-settings list --name GroupName
