# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-editions
description: Gets database capabilities and optionally applies the specified filters.
documentation:
    flag:
        dtu: Number of DTUs to search for. If unspecified, all DTU sizes are shown.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        service-objective: Service objective to search for. If unspecified, all service objectives are shown.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tier: Edition to search for. If unspecified, all editions are shown.
        vcores: Number of vcores to search for. If unspecified, all vcore sizes are shown.
flags:
    --dtu=: Number of DTUs to search for.
    --service-objective=: Service objective to search for.
    --subscription=: Name or ID of subscription.
    --vcores=: Number of vcores to search for.
    -a, --available=: If specified, show only results that are available in the specified region.
    -d, --show-details=:
        description: List of additional details to include in output.
        nargs: -1
    -e, --tier=: Edition to search for.
    -l, --location=!: Location.
completion:
    flag:
        show-details:
            - max-size
