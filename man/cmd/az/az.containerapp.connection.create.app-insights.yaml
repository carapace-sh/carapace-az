# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: app-insights
description: Create a containerapp connection to app-insights.
flags:
    --app-insights=: Name of the app insights.
    --appconfig-id=: The app configuration id to store configuration
    --client-type=: The client type used on the containerapp
    --connection=: Name of the containerapp connection.
    --connstr-props=:
        description: The additional connection string properties used to build connection string.
        nargs: -1
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --opt-out=:
        description: Whether to disable some configuration steps.
        nargs: -1
    --secret=:
        description: The secret auth info
        nargs: -1
    --source-id=: The resource id of a containerapp.
    --subscription=: Name or ID of subscription.
    --target-id=: The resource id of target service.
    --target-resource-group=: The resource group which contains the app insights.
    --vault-id=: The id of key vault to store secret value
    -c, --container=: The container where the connection information will be saved (as environment variables).
    -g, --resource-group=: The resource group which contains the container app.
    -n, --name=: Name of the container app.
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - go
            - none
        opt-out:
            - publicnetwork
            - configinfo
            - auth
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        app-insights: Name of the app insights. Required if '--target-id' is not specified.
        appconfig-id: The app configuration id to store configuration.
        change-reference: The related change reference ID for this resource operation.
        client-type: |-
            The client type used on the containerapp.

            Accepted values: dotnet, dotnet-internal, go, java, nodejs, none, python
        connection: Name of the containerapp connection.
        connstr-props: The additional connection string properties used to build connection string.
        container: The container where the connection information will be saved (as environment variables).
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        name: Name of the container app. Required if '--source-id' is not specified.None.
        no-recreate: |-
            Skip executing creation operation when no updates to an existing connection.

            Default value: False

            Accepted values: false, true
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        opt-out: |-
            Whether to disable some configuration steps. Use configinfo to disbale configuration information changes on source. Use publicnetwork to disable public network access configuration.Use auth to skip auth configuration such as enabling managed identity and granting RBAC roles.

            Accepted values: auth, configinfo, publicnetwork
        resource-group: The resource group which contains the container app. Required if '--source-id' is not specified.None.
        secret: 'The secret auth info. Usage: --secret.'
        source-id: The resource id of a containerapp. Required if ['--resource-group', '--name'] are not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-id: The resource id of target service. Required if ['--target-resource-group', '--app-insights'] are not specified. --target-resource-group --tg The resource group which contains the app insights. Required if '--target-id' is not specified.
        target-resource-group: The resource group which contains the app insights. Required if '--target-id' is not specified.
        vault-id: The id of key vault to store secret value.
examples:
    Create a connection between containerapp and app-insights interactively: az containerapp connection create app-insights
    Create a connection between containerapp and app-insights with resource id: az containerapp connection create app-insights --source-id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.App/containerApps/{app} --target-id /subscriptions/{subscription}/resourceGroups/{target_resource_group}/providers/microsoft.insights/components/{appinsights} --secret
    Create a connection between containerapp and app-insights with resource name: az containerapp connection create app-insights -g ContainerAppRG -n MyContainerApp --tg AppInsightsRG --app-insights MyAppInsights --secret
