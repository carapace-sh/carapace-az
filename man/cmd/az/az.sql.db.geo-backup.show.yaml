# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets a recoverable database
flags:
    --expand-keys=:
        description: Expand the AKV keys for the database.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --keys-filter=: Expand the AKV keys for the database.
    --subscription=: Name or ID of subscription.
    -d, --database-name=: retrieves a requested geo-redundant backup under this database.
    -g, --resource-group=: Retrieves a requested geo-redundant backup under this resource group.
    -s, --server-name=: Retrieves a requested geo-redundant backup under this server.
completion:
    flag:
        expand-keys:
            - "true"
            - "false"
documentation:
    command: Gets a recoverable database, which is a resource representing a database's geo backup.
    flag:
        expand-keys: |-
            Expand the AKV keys for the database.

            Default value: False

            Accepted values: false, true
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        keys-filter: Expand the AKV keys for the database.
        resource-group: Retrieves a requested geo-redundant backup under this resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Gets a recoverable database, which represents a database's geo backup.: az sql db geo-backup show --server myserver --database mydb --resource-group mygroup
