# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: search
description: Search a list of queries defined within a log analytics query pack according to given search properties.
flags:
    --categories=:
        description: The related categories for the function.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --include-body=:
        description: Whether or not to return the body of each applicable query.
        nargs: -1
    --query-pack-name=: The name of the log analytics query pack.
    --resource-types=:
        description: The related resource types for the function.
        nargs: -1
    --solutions=:
        description: The related Log Analytics solutions for the function.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Tags associated with the query.
        nargs: -1
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        include-body:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: |-
        Command group 'az monitor log-analytics query-pack query' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        categories: The related categories for the function.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        include-body: |-
            Whether or not to return the body of each applicable query. If false, only return the query information.  Default: true.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        query-pack-name: The name of the log analytics query pack.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-types: The related resource types for the function.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        solutions: The related Log Analytics solutions for the function.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Tags associated with the query.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Search queries in a query pack: az monitor log-analytics query-pack query search -g resourceGroupName --query-pack-name queryPackName --categories network --resource-types microsoft.insights/autoscalesettings --solutions networkmonitoring --tags version="[v2021-12-01]"
    Search queries in a query pack without query body content: az monitor log-analytics query-pack query search -g resourceGroupName --query-pack-name queryPackName --categories network --resource-types microsoft.insights/autoscalesettings --solutions networkmonitoring --tags version="[v2021-12-01]" --include-body false
