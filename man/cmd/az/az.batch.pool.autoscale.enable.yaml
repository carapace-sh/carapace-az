# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable
description: Enables automatic scaling for a Pool.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --auto-scale-evaluation-interval=: The time interval at which to automatically adjust the Pool size according to the autoscale formula.
    --auto-scale-formula=: The formula for the desired number of Compute Nodes in the Pool.
    --if-match=: An ETag value associated with the version of the resource known to the client.
    --if-modified-since=: A timestamp indicating the last modified time of the resource known to the client.
    --if-none-match=: An ETag value associated with the version of the resource known to the client.
    --if-unmodified-since=: A timestamp indicating the last modified time of the resource known to the client.
    --pool-id=!: The ID of the Pool to get.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auto-scale-evaluation-interval: The time interval at which to automatically adjust the Pool size according to the autoscale formula. The default value is 15 minutes. The minimum and maximum value are 5 minutes and 168 hours respectively. If you specify a value less than 5 minutes or greater than 168 hours, the Batch service rejects the request with an invalid property value error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). If you specify a new interval, then the existing autoscale evaluation schedule will be stopped and a new autoscale evaluation schedule will be started, with its starting time being the time when this request was issued.
        auto-scale-formula: The formula for the desired number of Compute Nodes in the Pool. The formula is checked for validity before it is applied to the Pool. If the formula is not valid, the Batch service rejects the request with detailed error information. For more information about specifying this formula, see Automatically scale Compute Nodes in an Azure Batch Pool ( https://learn.microsoft.com/azure/batch/batch-automatic-scaling ).
        change-reference: The related change reference ID for this resource operation.
        if-match: An ETag value associated with the version of the resource known to the client. The operation will be performed only if the resource's current ETag on the service exactly matches the value specified by the client.
        if-modified-since: A timestamp indicating the last modified time of the resource known to the client. The operation will be performed only if the resource on the service has been modified since the specified time.
        if-none-match: An ETag value associated with the version of the resource known to the client. The operation will be performed only if the resource's current ETag on the service does not match the value specified by the client.
        if-unmodified-since: A timestamp indicating the last modified time of the resource known to the client. The operation will be performed only if the resource on the service has been modified since the specified time.
        pool-id: The ID of the Pool to get. Required.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
