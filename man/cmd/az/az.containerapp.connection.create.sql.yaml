# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: sql
description: Create a containerapp connection to sql.
flags:
    --appconfig-id=: The app configuration id to store configuration
    --client-type=: The client type used on the containerapp
    --connection=: Name of the containerapp connection.
    --connstr-props=:
        description: The additional connection string properties used to build connection string.
        nargs: -1
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --database=: Name of the sql database.
    --no-wait=: Do not wait for the long-running operation to finish.
    --opt-out=:
        description: Whether to disable some configuration steps.
        nargs: -1
    --private-endpoint=:
        description: Connect target service by private endpoint.
        nargs: -1
    --secret=:
        description: The secret auth info
        nargs: -1
    --server=: Name of the sql server.
    --service-endpoint=:
        description: Connect target service by service endpoint.
        nargs: -1
    --service-principal=:
        description: The service principal auth info
        nargs: -1
    --source-id=: The resource id of a containerapp.
    --subscription=: Name or ID of subscription.
    --system-identity=:
        description: The system assigned identity auth info
        nargs: -1
    --target-id=: The resource id of target service.
    --target-resource-group=: The resource group which contains the sql server.
    --user-identity=:
        description: The user assigned identity auth info
        nargs: -1
    --vault-id=: The id of key vault to store secret value
    -c, --container=: The container where the connection information will be saved (as environment variables).
    -g, --resource-group=: The resource group which contains the container app.
    -n, --name=: Name of the container app.
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - go
            - php
            - ruby
            - django
            - springBoot
            - none
        opt-out:
            - publicnetwork
            - configinfo
            - auth
        private-endpoint:
            - "true"
            - "false"
        service-endpoint:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        appconfig-id: The app configuration id to store configuration.
        change-reference: The related change reference ID for this resource operation.
        client-type: |-
            The client type used on the containerapp.

            Accepted values: django, dotnet, dotnet-internal, go, java, nodejs, none, php, python, ruby, springBoot
        connection: Name of the containerapp connection.
        connstr-props: The additional connection string properties used to build connection string.
        container: The container where the connection information will be saved (as environment variables).
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        database: Name of the sql database. Required if '--target-id' is not specified.
        name: Name of the container app. Required if '--source-id' is not specified.None.
        new: |-
            Deleting existing users with the same name before creating a new user in database.

            Default value: False
        no-recreate: |-
            Skip executing creation operation when no updates to an existing connection.

            Default value: False

            Accepted values: false, true
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        opt-out: |-
            Whether to disable some configuration steps. Use configinfo to disbale configuration information changes on source. Use publicnetwork to disable public network access configuration.Use auth to skip auth configuration such as enabling managed identity and granting RBAC roles.

            Accepted values: auth, configinfo, publicnetwork
        private-endpoint: |-
            Connect target service by private endpoint. The private endpoint in source virtual network must be created ahead.

            Accepted values: false, true
        resource-group: The resource group which contains the container app. Required if '--source-id' is not specified.None.
        secret: 'The secret auth info. Usage: --secret name=XX secret=XX --secret name=XX secret-uri=XX --secret name=XX secret-name=XX name    : Required. Username or account name for secret auth. secret  : One of ``` <secret, secret-uri, secret-name> ``` is required. Password or account key for secret auth. secret-uri  : One of ``` <secret, secret-uri, secret-name> ``` is required. Keyvault secret uri which stores password. secret-name : One of ``` <secret, secret-uri, secret-name> ``` is required. Keyvault secret name which stores password. It''s for AKS only.'
        server: Name of the sql server. Required if '--target-id' is not specified.
        service-endpoint: |-
            Connect target service by service endpoint. Source resource must be in the VNet and target SKU must support service endpoint feature.

            Accepted values: false, true
        service-principal: 'The service principal auth info. Usage: --service-principal client-id=XX secret=XX client-id      : Required. Client id of the service principal. object-id      : Optional. Object id of the service principal (Enterprise Application). secret         : Required. Secret of the service principal.'
        source-id: The resource id of a containerapp. Required if ['--resource-group', '--name'] are not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-identity: 'The flag to use system assigned identity auth info. No additional parameters are needed. Usage: --system-identity.'
        target-id: The resource id of target service. Required if ['--target-resource-group', '--server', '--database'] are not specified. --target-resource-group --tg The resource group which contains the sql server. Required if '--target-id' is not specified.
        target-resource-group: The resource group which contains the sql server. Required if '--target-id' is not specified.
        user-identity: 'The user assigned identity auth info. Usage: --user-identity client-id=XX subs-id=XX client-id      : Required. Client id of the user assigned identity. subs-id        : Required. Subscription id of the user assigned identity.'
        vault-id: The id of key vault to store secret value.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Create a connection between containerapp and sql interactively: az containerapp connection create sql
    Create a connection between containerapp and sql with resource id: az containerapp connection create sql --source-id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.App/containerApps/{app} --target-id /subscriptions/{subscription}/resourceGroups/{target_resource_group}/providers/Microsoft.Sql/servers/{server}/databases/{database} --secret name=XX secret=XX
    Create a connection between containerapp and sql with resource name: az containerapp connection create sql -g ContainerAppRG -n MyContainerApp --tg SqlRG --server MyServer --database MyDB --secret name=XX secret=XX
