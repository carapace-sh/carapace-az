# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: get-settings
description: Retrieve information required to activate a connected registry, and creates or rotates the sync token credentials.
flags:
    --generate-password=: Select which password you want to generate, and it is required to retrieve the password from the sync token.
    --parent-protocol=!: Specify the protocol used to communicate with its parent.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name for the connected registry.
    -r, --registry=!: The login server of the Cloud ACR registry.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        generate-password:
            - "1"
            - "2"
        parent-protocol:
            - http
            - https
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        generate-password: |-
            Select which password you want to generate, and it is required to retrieve the password from the sync token.

            Accepted values: 1, 2
        name: Name for the connected registry. Name must be between 5 to 40 character long, start with a letter and contain only alphanumeric characters (including ‘_’ or ‘-’). Name must be unique under the Cloud ACR hierarchy.
        parent-protocol: |-
            Specify the protocol used to communicate with its parent.

            Accepted values: http, https
        registry: The login server of the Cloud ACR registry. Must be the FQDN to support also Azure Stack.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    ? Generate a new sync token password 1 or rotates the password if it already exists, and gets the settings information required to install a connected registry.
    : az acr connected-registry get-settings -r mycloudregistry -n myconnectedregistry --generate-password 1 --parent-protocol https
    Get the settings information required to install a connected registry without the password.: az acr connected-registry get-settings -r mycloudregistry -n myconnectedregistry --parent-protocol http
