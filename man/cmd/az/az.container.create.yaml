# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a container group.
flags:
    --acr-identity=: The identity with access to the container registry
    --add-capabilities=:
        description: A List of security context capabilities to be added
        nargs: -1
    --allow-escalation=: Allow whether a process can gain more privileges than its parent process.
    --assign-identity=:
        description: Space-separated list of assigned identities.
        nargs: -1
    --azure-file-volume-account-key=: The storage account access key used to access the Azure File share
    --azure-file-volume-account-name=: The name of the storage account that contains the Azure File share
    --azure-file-volume-mount-path=: The path within the container where the azure file volume should be mounted.
    --azure-file-volume-share-name=: The name of the Azure File share to be mounted as a volume
    --cce-policy=: The CCE policy for the confidential container group
    --command-line=: The command line to run when the container is started, e.g. '/bin/bash -c myscript.sh'
    --config-map=:
        description: A list of config map key-value pairs for the container.
        nargs: -1
    --container-group-profile-id=: The reference container group profile ARM resource id.
    --container-group-profile-revision=: The reference container group profile revision.
    --cpu=: The required number of CPU cores of the containers, accurate to one decimal place
    --dns-name-label=: The dns name label for container group with public IP
    --drop-capabilities=:
        description: A List of security context capabilities to be dropped
        nargs: -1
    --fail-container-group-create-on-reuse-failure=: The flag indicating whether to fail the container group creation if the standby pool reuse failed.
    --gitrepo-dir=: The target directory path in the git repository.
    --gitrepo-mount-path=: The path within the container where the git repo volume should be mounted.
    --gitrepo-revision=: The commit hash for the specified revision
    --gitrepo-url=: The URL of a git repository to be mounted as a volume
    --image=: The container image name
    --ip-address=: The IP address type of the container group
    --log-analytics-workspace-key=: The Log Analytics workspace key.
    --log-analytics-workspace=: The Log Analytics workspace name or id.
    --memory=: The required memory of the containers in GB, accurate to one decimal place
    --no-wait=: Do not wait for the long-running operation to finish.
    --os-type=: The OS type of the containers
    --ports=:
        description: A list of ports to open.
        nargs: -1
    --priority=: The priority of the container group
    --privileged=: The flag to determine if the container permissions is elevated to Privileged
    --protocol=: The network protocol to use
    --registry-login-server=: The container image registry login server
    --registry-password=: The password to log in container image registry server
    --registry-username=: The username to log in container image registry server
    --restart-policy=: Restart policy for all containers within the container group
    --role=: Role name or id the system assigned identity will have
    --run-as-group=: Set the User UID for the container
    --run-as-user=: Set the User GID for the container
    --scope=: Scope that the system assigned identity can access
    --seccomp-profile=: A base64 encoded string containing the contents of the JSON in the seccomp profile
    --secrets-mount-path=: The path within the container where the secrets volume should be mounted.
    --secrets=:
        description: space-separated secrets in 'key=value' format.
        nargs: -1
    --secure-environment-variables=:
        description: A list of secure environment variable for the container.
        nargs: -1
    --sku=: The SKU of the container group
    --standby-pool-profile-id=: The standby pool profile ARM resource id from which the container will be reused.
    --subnet-address-prefix=: The subnet IP address prefix to use when creating a new VNET in CIDR format.
    --subnet=: The name of the subnet when creating a new VNET or referencing an existing one.
    --subscription=: Name or ID of subscription.
    --vnet-address-prefix=: The IP address prefix to use when creating a new VNET in CIDR format.
    --vnet-name=: The name of the VNET when creating a new one or referencing an existing one.
    --vnet=: The name of the VNET when creating a new one or referencing an existing one.
    --zone=: The zone to place the container group.
    -e, --environment-variables=:
        description: A list of environment variable for the container.
        nargs: -1
    -f, --file=: The path to the input file.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=: The name of the container group
completion:
    flag:
        ip-address:
            - Public
            - Private
        os-type:
            - Windows
            - Linux
        protocol:
            - TCP
            - UDP
        restart-policy:
            - Always
            - OnFailure
            - Never
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        acr-identity: The identity with access to the container registry.
        add-capabilities: A List of security context capabilities to be added.
        allow-escalation: Allow whether a process can gain more privileges than its parent process.
        assign-identity: Space-separated list of assigned identities. Assigned identities are either user assigned identities (resource IDs) and / or the system assigned identity ('[system]'). See examples for more info.
        azure-file-volume-account-key: The storage account access key used to access the Azure File share.
        azure-file-volume-account-name: The name of the storage account that contains the Azure File share.
        azure-file-volume-mount-path: The path within the container where the azure file volume should be mounted. Must not contain colon ':'.
        azure-file-volume-share-name: The name of the Azure File share to be mounted as a volume.
        cce-policy: The CCE policy for the confidential container group.
        change-reference: The related change reference ID for this resource operation.
        command-line: The command line to run when the container is started, e.g. '/bin/bash -c myscript.sh'.
        config-map: A list of config map key-value pairs for the container. Space-separated values in 'key=value' format.
        container-group-profile-id: The reference container group profile ARM resource id.
        container-group-profile-revision: The reference container group profile revision.
        cpu: The required number of CPU cores of the containers, accurate to one decimal place.
        dns-name-label: The dns name label for container group with public IP.
        drop-capabilities: A List of security context capabilities to be dropped.
        environment-variables: A list of environment variable for the container. Space-separated values in 'key=value' format.
        fail-container-group-create-on-reuse-failure: The flag indicating whether to fail the container group creation if the standby pool reuse failed.
        file: The path to the input file.
        gitrepo-dir: The target directory path in the git repository. Must not contain '..'.
        gitrepo-mount-path: The path within the container where the git repo volume should be mounted. Must not contain colon ':'.
        gitrepo-revision: The commit hash for the specified revision.
        gitrepo-url: The URL of a git repository to be mounted as a volume.
        image: The container image name.
        ip-address: The IP address type of the container group.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        log-analytics-workspace: The Log Analytics workspace name or id. Use the current subscription or use --subscription flag to set the desired subscription.
        log-analytics-workspace-key: The Log Analytics workspace key.
        memory: The required memory of the containers in GB, accurate to one decimal place.
        name: The name of the container group.
        no-wait: Do not wait for the long-running operation to finish.
        os-type: The OS type of the containers.
        ports: A list of ports to open. Space-separated list of ports.
        priority: The priority of the container group.
        privileged: The flag to determine if the container permissions is elevated to Privileged.
        protocol: The network protocol to use.
        registry-login-server: The container image registry login server.
        registry-password: The password to log in container image registry server.
        registry-username: The username to log in container image registry server.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restart-policy: Restart policy for all containers within the container group.
        role: Role name or id the system assigned identity will have.
        run-as-group: Set the User UID for the container.
        run-as-user: Set the User GID for the container.
        scope: Scope that the system assigned identity can access.
        seccomp-profile: A base64 encoded string containing the contents of the JSON in the seccomp profile.
        secrets: Space-separated secrets in 'key=value' format.
        secrets-mount-path: The path within the container where the secrets volume should be mounted. Must not contain colon ':'.
        secure-environment-variables: A list of secure environment variable for the container. Space-separated values in 'key=value' format.
        sku: The SKU of the container group.
        standby-pool-profile-id: The standby pool profile ARM resource id from which the container will be reused.
        subnet: The name of the subnet when creating a new VNET or referencing an existing one. Can also reference an existing subnet by ID.
        subnet-address-prefix: The subnet IP address prefix to use when creating a new VNET in CIDR format.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vnet: The name of the VNET when creating a new one or referencing an existing one. Can also reference an existing vnet by ID. This allows using vnets from other resource groups.
        vnet-address-prefix: The IP address prefix to use when creating a new VNET in CIDR format.
        zone: The zone to place the container group.
examples:
    Create a container group using Log Analytics from a workspace name.: az container create -g MyResourceGroup --name myapp --log-analytics-workspace myworkspace
    Create a container group with a system assigned identity.: az container create -g MyResourceGroup --name myapp --image myimage:latest --assign-identity
    ? Create a container group with a system assigned identity. The group will have a 'Contributor' role with access to a storage account.
    : az container create -g MyResourceGroup --name myapp --image myimage:latest --assign-identity --scope /subscriptions/99999999-1bf0-4dda-aec3-cb9272f09590/MyResourceGroup/myRG/providers/Microsoft.Storage/storageAccounts/storage1
    Create a container group with a user assigned identity.: az container create -g MyResourceGroup --name myapp --image myimage:latest --assign-identity  /subscriptions/mySubscriptionId/resourcegroups/myRG/providers/Microsoft.ManagedIdentity/userAssignedIdentities/myID
    Create a container group with both system and user assigned identity.: az container create -g MyResourceGroup --name myapp --image myimage:latest --assign-identity [system] /subscriptions/mySubscriptionId/resourcegroups/myRG/providers/Microsoft.ManagedIdentity/userAssignedIdentities/myID
    Create a container in a container group that invokes a script upon start.: az container create -g MyResourceGroup --name myapp --image myimage:latest --command-line "/bin/sh -c '/path to/myscript.sh'"
    Create a container in a container group that mounts a git repo as volume.: az container create -g MyResourceGroup --name myapp --image myimage:latest --command-line "cat /mnt/gitrepo" --gitrepo-url https://github.com/user/myrepo.git --gitrepo-dir ./dir1 --gitrepo-mount-path /mnt/gitrepo
    Create a container in a container group that mounts an Azure File share as volume.: az container create -g MyResourceGroup --name myapp --image myimage:latest --command-line "cat /mnt/azfile/myfile" --azure-file-volume-share-name myshare --azure-file-volume-account-name mystorageaccount --azure-file-volume-account-key mystoragekey --azure-file-volume-mount-path /mnt/azfile
    Create a container in a container group that runs Windows, with 2 cores and 3.5Gb of memory.: az container create -g MyResourceGroup --name mywinapp --image winappimage:latest --os-type Windows --cpu 2 --memory 3.5
    Create a container in a container group that runs a command and stop the container afterwards.: az container create -g MyResourceGroup --name myapp --image myimage:latest --command-line "echo hello" --restart-policy Never
    Create a container in a container group using a yaml file.: az container create -g MyResourceGroup -f containerGroup.yaml
    Create a container in a container group using container image from Azure Container Registry.: az container create -g MyResourceGroup --name myapp --image myAcrRegistry.azurecr.io/myimage:latest --registry-password password
    Create a container in a container group with 1 core and 1Gb of memory.: az container create -g MyResourceGroup --name myapp --image myimage:latest --cpu 1 --memory 1
    Create a container in a container group with environment variables.: az container create -g MyResourceGroup --name myapp --image myimage:latest --environment-variables key1=value1 key2=value2
    Create a container in a container group with public IP address, ports and DNS name label.: az container create -g MyResourceGroup --name myapp --image myimage:latest --ports 80 443 --dns-name-label contoso
