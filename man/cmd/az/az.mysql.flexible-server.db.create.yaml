# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a MySQL database on a flexible server.
flags:
    --charset=: The charset of the database.
    --collation=: The collation of the database.
    --subscription=: Name or ID of subscription.
    -d, --database-name=: The name of the database to be created when provisioning the database server
    -g, --resource-group=!: Name of resource group.
    -s, --server-name=!: Name of the server.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        charset: The charset of the database. The default value is UTF8.
        collation: The collation of the database.
        database-name: The name of the database to be created when provisioning the database server.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create database 'testDatabase' in the flexible server 'testserver' with a given character set and collation rules.: az mysql flexible-server db create --resource-group testGroup --server-name testserver --database-name testDatabase --charset validCharset --collation validCollation
    Create database 'testDatabase' in the flexible server 'testserver' with default charset utf8 and collation utf8_general_cis.: az mysql flexible-server db create --resource-group testGroup --server-name testserver --database-name testDatabase
