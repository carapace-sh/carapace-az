# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes the specified file from the Compute Node.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --file-path=!: The path to the file or directory.
    --node-id=!: The ID of the Compute Node.
    --pool-id=!: The ID of the Pool that contains the Compute Node.
    --recursive=:
        description: Whether to delete children of a directory.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        recursive:
            - "true"
            - "false"
documentation:
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        file-path: The path to the file or directory. Required.
        node-id: The ID of the Compute Node. Required.
        pool-id: The ID of the Pool that contains the Compute Node. Required.
        recursive: |-
            Whether to delete children of a directory. If the filePath parameter represents a directory instead of a file, you can set recursive to true to delete the directory and all of the files and subdirectories in it. If recursive is false then the directory must be empty or deletion will fail. Default value is None.

            Accepted values: false, true
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
