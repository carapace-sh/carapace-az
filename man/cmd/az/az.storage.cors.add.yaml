# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a CORS rule to a storage account.
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name. Environment variable: AZURE_STORAGE_KEY'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit'
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING'
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name. Environment variable: AZURE_STORAGE_SAS_TOKEN'
        services: |
            The storage service(s) to add rules to. Allowed options are: (b)lob, (f)ile, (q)ueue, (t)able. Can be combined.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: Request timeout in seconds. Applies to each call to the service.
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --allowed-headers=:
        description: Space-separated list of response headers allowed to be part of the cross-origin request.
        nargs: -1
    --connection-string=: Storage account connection string.
    --exposed-headers=:
        description: Space-separated list of response headers to expose to CORS clients.
        nargs: -1
    --max-age=: The maximum number of seconds the client/browser should cache a preflight response.
    --methods=!:
        description: Space-separated list of HTTP methods allowed to be executed by the origin.
        nargs: -1
    --origins=!:
        description: Space-separated list of origin domains that will be allowed via CORS, or '*' to allow all domains.
        nargs: -1
    --sas-token=: A Shared Access Signature (SAS).
    --services=!: The storage service(s) to add rules to.
    --subscription=: Name or ID of subscription.
    --timeout=: Request timeout in seconds.
