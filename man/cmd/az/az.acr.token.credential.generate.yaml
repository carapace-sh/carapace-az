# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: generate
description: Generate or replace one or both passwords of a token for an Azure Container Registry.
documentation:
    flag:
        expiration: UTC time for which the credentials will be valid. In the format of %Y-%m-%dT%H:%M:%SZ, e.g. 2025-12-31T12:59:59Z
        expiration-in-days: Number of days for which the credentials will be valid. If not specified, the expiration will default to the max value "9999-12-31T23:59:59.999999+00:00"
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --expiration-in-days=: Number of days for which the credentials will be valid.
    --expiration=: UTC time for which the credentials will be valid.
    --password1=: Flag indicating if password1 should be generated.
    --password2=: Flag indicating if password2 should be generated.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the token.
    -r, --registry=!: The name of the container registry.
