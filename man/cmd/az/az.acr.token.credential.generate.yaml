# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: generate
description: Generate or replace one or both passwords of a token for an Azure Container Registry.
flags:
    --expiration-in-days=: Number of days for which the credentials will be valid.
    --expiration=: UTC time for which the credentials will be valid.
    --password1=: Flag indicating if password1 should be generated.
    --password2=: Flag indicating if password2 should be generated.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the token.
    -r, --registry=!: The name of the container registry.
documentation:
    command: |-
        Generate or replace one or both passwords of a token for an Azure Container Registry. For using token and password to access a container registry, see
        https://aka.ms/acr/repo-permissions
        .
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        expiration: UTC time for which the credentials will be valid. In the format of %Y-%m-%dT%H:%M:%SZ, e.g. 2025-12-31T12:59:59Z.
        expiration-in-days: Number of days for which the credentials will be valid. If not specified, the expiration will default to the max value "9999-12-31T23:59:59.999999+00:00".
        name: The name of the token.
        password1: |-
            Flag indicating if password1 should be generated.

            Default value: False
        password2: |-
            Flag indicating if password2 should be generated.

            Default value: False
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Generate password1 for the token 'MyToken', with an expiration of 30 days.: az acr token credential generate -n MyToken -r myregistry --password1 --days 30
