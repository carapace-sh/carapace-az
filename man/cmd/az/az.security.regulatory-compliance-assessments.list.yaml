# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Get details and state of assessments mapped to selected regulatory compliance control.
flags:
    --control-name=!: The compliance control name
    --standard-name=!: The compliance standard name
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        control-name: The compliance control name.
        standard-name: The compliance standard name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get state of mapped assessments.: az security regulatory-compliance-assessments list --standard-name 'Azure-CIS-1.1.0' --control-name '1.1'
