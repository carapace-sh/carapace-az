# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add validate to an existing image builder template.
documentation:
    flag:
        defer: Temporarily store the object in the local cache instead of sending to Azure. Use `az cache` commands to view/clear.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        source-validation-only: If this parameter is set to true, the image specified in the 'source' section will directly be validated. No separate build will be run to generate and then validate a customized image.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --continue-distribute-on-failure=:
        description: If validation fails and this parameter is set to false, output image(s) will not be distributed.
        nargs: -1
    --defer=:
        description: Temporarily store the object in the local cache instead of sending to Azure.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --source-validation-only=:
        description: If this parameter is set to true, the image specified in the 'source' section will directly be validated.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the image template.
completion:
    flag:
        continue-distribute-on-failure:
            - "true"
            - "false"
        source-validation-only:
            - "true"
            - "false"
