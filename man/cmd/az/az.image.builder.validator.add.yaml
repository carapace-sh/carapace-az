# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add validate to an existing image builder template.
flags:
    --continue-distribute-on-failure=:
        description: If validation fails and this parameter is set to false, output image(s) will not be distributed.
        nargs: -1
    --defer=:
        description: Temporarily store the object in the local cache instead of sending to Azure.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --source-validation-only=:
        description: If this parameter is set to true, the image specified in the 'source' section will directly be validated.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the image template.
completion:
    flag:
        continue-distribute-on-failure:
            - "true"
            - "false"
        source-validation-only:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: |-
            The related change reference ID for this resource operation.

            Default value: False

            Accepted values: false, true
        defer: Temporarily store the object in the local cache instead of sending to Azure. Use ``` az cache ``` commands to view/clear.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the image template.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source-validation-only: |-
            If this parameter is set to true, the image specified in the 'source' section will directly be validated. No separate build will be run to generate and then validate a customized image.

            Default value: False

            Accepted values: false, true
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    ? Add validate with continue distribute on failure set to true. If not specified, the default value of continue distribute on failure is false. If validation fails and this field is set to false, output image(s) will not be distributed.
    : az image builder validator add -n myTemplate -g myGroup --continue-distribute-on-failure true --defer
    Add validate with source validation only and continue distribute on failure set to false.: az image builder validator add -n myTemplate -g myGroup --defer
    ? Add validate with source validation only set to true. If not specified, the default value of source validation only is false. If this field is set to true, the image specified in the source section will directly be validated.
    : az image builder validator add -n myTemplate -g myGroup --source-validation-only true --defer
