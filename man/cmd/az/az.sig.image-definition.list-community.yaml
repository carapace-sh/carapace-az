# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-community
description: List VM Image definitions in a gallery community
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        marker: A string value that identifies the portion of the list of containers to be returned with the next listing operation. The operation returns the NextMarker value within the response body if the listing operation did not return all containers remaining to be listed with the current page. If specified, this generator will begin returning results from the point where the previous generator stopped.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --marker=: A string value that identifies the portion of the list of containers to be returned with the next listing operation.
    --public-gallery-name=: The public name of community gallery.
    --show-next-marker=: Show nextMarker in result when specified.
    --subscription=: Name or ID of subscription.
    -l, --location=: Location.
