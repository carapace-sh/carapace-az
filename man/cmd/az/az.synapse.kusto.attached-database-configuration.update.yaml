# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an attached database configuration.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --attached-database-configuration-name=: The name of the attached database configuration.
    --database-name=: The name of the database which you would like to attach, use * if you want to follow all current and future databases.
    --default-principals-modification-kind=: The default principals modification kind
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --kusto-pool-name=: The name of the Kusto pool.
    --kusto-pool-resource-id=: The resource id of the kusto pool where the databases you would like to attach reside.
    --no-wait=: Do not wait for the long-running operation to finish.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --table-level-sharing-properties=:
        description: Table level sharing specifications
        nargs: -1
    --workspace-name=: The name of the workspace
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
completion:
    flag:
        default-principals-modification-kind:
            - Union
            - Replace
            - None
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        attached-database-configuration-name: The name of the attached database configuration.
        change-reference: The related change reference ID for this resource operation.
        database-name: The name of the database which you would like to attach, use * if you want to follow all current and future databases.
        default-principals-modification-kind: |-
            The default principals modification kind.

            Accepted values: None, Replace, Union
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        kusto-pool-name: The name of the Kusto pool.
        kusto-pool-resource-id: The resource id of the kusto pool where the databases you would like to attach reside.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        table-level-sharing-properties: 'Table level sharing specifications. Usage: --table-level-sharing-properties tables-to-include=XX tables-to-exclude=XX external-tables-to-include=XX external-tables-to-exclude=XX materialized-views-to-include=XX materialized-views-to-exclude=XX tables-to-include: List of tables to include in the follower database tables-to-exclude: List of tables to exclude from the follower database external-tables-to-include: List of external tables to include in the follower database external-tables-to-exclude: List of external tables exclude from the follower database materialized-views-to-include: List of materialized views to include in the follower database materialized-views-to-exclude: List of materialized views exclude from the follower database.'
        workspace-name: The name of the workspace.
