# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show Blob Inventory Policy properties associated with the specified storage account.
flags:
    --account-name=!: The name of the storage account within the specified resource group.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    command: |-
        Command group 'storage account blob-inventory-policy' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show Blob Inventory Policy properties associated with the specified storage account without prompt.: az storage account blob-inventory-policy show -g ResourceGroupName --account-name storageAccountName
