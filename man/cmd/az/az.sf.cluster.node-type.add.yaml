# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a new node type to a cluster.
flags:
    --capacity=!: The capacity tag applied to nodes in the node type.
    --durability-level=: durability level.
    --node-type=!: the Node type name.
    --subscription=: Name or ID of subscription.
    --vm-password=!: The password of the Vm
    --vm-sku=: VM Sku
    --vm-tier=: VM tier.
    --vm-user-name=!: The user name for logging to Vm.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
completion:
    flag:
        durability-level:
            - Bronze
            - Silver
            - Gold
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        capacity: The capacity tag applied to nodes in the node type. The cluster resource manager uses these tags to understand how much capacity a node has.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        durability-level: |-
            Durability level.

            Default value: Bronze

            Accepted values: Bronze, Gold, Silver
        node-type: The Node type name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-password: The password of the Vm.
        vm-sku: |-
            VM Sku.

            Default value: Standard_D2_V2
        vm-tier: |-
            VM tier.

            Default value: Standard
        vm-user-name: The user name for logging to Vm. Default will be adminuser.
examples:
    Add a new node type to a cluster.: az sf cluster node-type add -g group-name -c cluster1 --node-type 'n2' --capacity 5 --vm-user-name 'adminName' --vm-password testPassword0
