# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Get the list of policy configuration at the GraphQL API Resolver level.
flags:
    --api-id=!: API identifier.
    --resolver-id=!: Resolver identifier within a GraphQL API.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    flag:
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        resolver-id: Resolver identifier within a GraphQL API. Must be unique in the current API Management service instance.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get list of policy configuration.: az apim graphql resolver policy list --service-name MyApim -g MyResourceGroup --api-id MyApi --resolver-id MyResolverId
