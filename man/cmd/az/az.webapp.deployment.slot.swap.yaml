# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: swap
description: Swap deployment slots for a web app.
flags:
    --action=: swap types.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --preserve-vnet=:
        description: preserve Virtual Network to the slot during swap, default to 'true'
        nargs: -1
    --subscription=: Name or ID of subscription.
    --target-slot=: target slot to swap, default to 'production'
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the webapp
    -s, --slot=!: the name of the slot
completion:
    flag:
        action:
            - swap
            - preview
            - reset
        preserve-vnet:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        action: |-
            Swap types. use 'preview' to apply target slot's settings on the source slot first; use 'swap' to complete it; use 'reset' to reset the swap.

            Default value: swap

            Accepted values: preview, reset, swap
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the webapp.
        preserve-vnet: |-
            Preserve Virtual Network to the slot during swap, default to 'true'.

            Accepted values: false, true
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: The name of the slot.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-slot: Target slot to swap, default to 'production'.
examples:
    Swap a staging slot into production for the MyUniqueApp web app.: |-
        az webapp deployment slot swap  -g MyResourceGroup -n MyUniqueApp --slot staging \
            --target-slot production
