# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get specified deployment stack from resource group scope
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --id=: The deployment stack resource id.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group where the deployment stack exists
    -n, --name=: The deployment stack name
