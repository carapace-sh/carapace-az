# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get specified deployment stack from resource group scope
flags:
    --id=: The deployment stack resource id.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group where the deployment stack exists
    -n, --name=: The deployment stack name
documentation:
    command: Get specified deployment stack from resource group scope.
    flag:
        id: The deployment stack resource id.
        name: The deployment stack name.
        resource-group: The resource group where the deployment stack exists.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get stack by name.: az stack group show --name StackName --resource-group ResourceGroup
    Get stack by stack resource id.: az stack group show --id /subscriptions/111111111111/resourceGroups/ResourceGroup/providers/Microsoft.Resources/deploymentStacks/StackName
