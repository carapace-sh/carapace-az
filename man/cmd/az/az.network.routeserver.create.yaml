# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a route server.
flags:
    --auto-scale-config=:
        description: VirtualHub Router autoscale configuration.
        nargs: -1
    --hosted-subnet=!: ID of a subnet where route server would be deployed
    --hub-routing-preference=: Routing preference of the route server.
    --public-ip-address=!: Name or ID of the public IP address.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the route server.
completion:
    flag:
        hub-routing-preference:
            - ASPath
            - ExpressRoute
            - VpnGateway
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auto-scale-config: 'VirtualHub Router autoscale configuration. Use space-separated property=value [property=value ...]. Supported properties: min-capacity: The minimum number of scale units for VirtualHub Router.'
        change-reference: The related change reference ID for this resource operation.
        hosted-subnet: ID of a subnet where route server would be deployed.
        hub-routing-preference: |-
            Routing preference of the route server.

            Accepted values: ASPath, ExpressRoute, VpnGateway
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Name of the route server.
        public-ip-address: Name or ID of the public IP address.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a route server.: az network routeserver create --resource-group myresourcegroup --name myrouteserver --hosted-subnet my_subnet_id --public-ip-address my_public_ip
