# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete product.
flags:
    --delete-subscriptions=: Delete existing subscriptions associated with the product or not.
    --if-match=: ETag of the Entity.
    --no-wait=: Do not wait for the long-running operation to finish.
    --product-id=!: Product identifier.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the api management service instance
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        delete-subscriptions: Delete existing subscriptions associated with the product or not.
        if-match: ETag of the Entity.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        product-id: Product identifier. Must be unique in the current API Management service instance.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the api management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete product with all subscriptions to this product.: az apim product delete --resource-group MyResourceGroup  --service-name MyServiceName --product-id MyProductID --delete-subscriptions true
