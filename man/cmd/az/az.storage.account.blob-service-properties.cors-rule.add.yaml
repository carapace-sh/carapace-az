# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a CORS rule for a storage account.
flags:
    --allowed-headers=:
        description: Space-separated list of headers allowed to be part of the cross-origin request
        nargs: -1
    --exposed-headers=:
        description: Space-separated list of response headers to expose to CORS clients
        nargs: -1
    --max-age=!: The number of seconds that the client/browser should cache a preflight response
    --methods=!:
        description: Space-separated list of HTTP verbs (methods) allowed to be executed by the origin
        nargs: -1
    --origins=!:
        description: Space-separated list of origin domains that will be allowed via CORS, or "*" to allow all domains
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
documentation:
    flag:
        account-name: The storage account name. --allowed-methods --methods Space-separated list of HTTP verbs (methods) allowed to be executed by the origin. --allowed-origins --origins Space-separated list of origin domains that will be allowed via CORS, or "*" to allow all domains. --max-age --max-age-in-seconds The number of seconds that the client/browser should cache a preflight response.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allowed-headers: |-
            Space-separated list of headers allowed to be part of the cross-origin request.

            Default value: []
        change-reference: The related change reference ID for this resource operation.
        exposed-headers: |-
            Space-separated list of response headers to expose to CORS clients.

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add a CORS rule for a storage account: az storage account blob-service-properties cors-rule add --account-name mystorageaccount --resource-group myresourcegroup --allowed-origins "http://*.contoso.com" --allowed-methods PUT GET --max-age 200
