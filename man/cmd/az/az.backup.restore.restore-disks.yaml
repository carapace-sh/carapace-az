# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore-disks
description: Restore disks of the backed VM from the specified recovery point.
flags:
    --disk-access-option=: Specify the disk access option for target disks.
    --disk-encryption-set-id=: The disk encryption set id is used for encrypting restored disks.
    --diskslist=:
        description: List of disks to be excluded or included.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --mi-system-assigned=: Use this flag to specify whether a system-assigned managed identity should be used for the restore operation.
    --mi-user-assigned=: ARM ID of the user-assigned managed identity to use for the restore operation.
    --rehydration-duration=: Set the maximum time, in days (between 10-30, both inclusive) for which the recovery point stays in hydrated state.
    --rehydration-priority=: The type of priority to be maintained while rehydrating a recovery point
    --restore-as-unmanaged-disks=:
        description: Use this flag to specify to restore as unmanaged disks
        nargs: -1
    --restore-mode=: Specify the restore mode.
    --restore-only-osdisk=:
        description: Use this flag to restore only OS disks of a backed up VM.
        nargs: -1
    --restore-to-edge-zone=:
        description: Switch parameter to indicate edge zone VM restore.
        nargs: -1
    --restore-to-staging-storage-account=:
        description: Use this flag when you want disks to be restored to the staging storage account using the --storage-account parameter.
        nargs: -1
    --storage-account-resource-group=: Name of the resource group which contains the storage account.
    --storage-account=!: Name or ID of the staging storage account.
    --subscription=: Name or ID of subscription.
    --target-disk-access-id=: Specify the target disk access ID when --disk-access-option is set to EnablePrivateAccessForAllDisks
    --target-subnet-name=: Name of the subnet in which the target VM should be created, in the case of Alternate Location restore a new VM
    --target-subscription-id=: ID of the subscription to which the resource should be restored
    --target-vm-name=: Name of the VM to which the data should be restored, in the case of Alternate Location restore to a new VM.
    --target-vnet-name=: Name of the VNet in which the target VM should be created, in the case of Alternate Location restore to a new VM.
    --target-vnet-resource-group=: Name of the resource group which contains the target VNet, in the case of Alternate Location restore to a new VM.
    --target-zone=: A primary region currently can have three Azure availability zones.
    --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
    --use-secondary-region=: Use this flag to restore from a recoverypoint in secondary region.
    -c, --container-name=: Name of the backup container.
    -g, --resource-group=: Name of resource group.
    -i, --item-name=: Name of the backed up item.
    -r, --rp-name=: Name of the recovery point.
    -t, --target-resource-group=: Use this to specify the target resource group in which the restored disks will be saved
    -v, --vault-name=: Name of the Recovery services vault.
completion:
    flag:
        disk-access-option:
            - EnablePrivateAccessForAllDisks
            - EnablePublicAccessForAllDisks
            - SameAsOnSourceDisks
        rehydration-priority:
            - Standard
            - High
        restore-as-unmanaged-disks:
            - "true"
            - "false"
        restore-mode:
            - OriginalLocation
            - AlternateLocation
        restore-only-osdisk:
            - "true"
            - "false"
        restore-to-edge-zone:
            - "true"
            - "false"
        restore-to-staging-storage-account:
            - "true"
            - "false"
        target-zone:
            - "1"
            - "2"
            - "3"
            - NoZone
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        container-name: Name of the backup container. Accepts 'Name' or 'FriendlyName' from the output of az backup container list command. If 'FriendlyName' is passed then BackupManagementType is required.
        cvm-os-des-id: Disk encryption set ID for the OS disk of confidential VMs. This is used to encrypt the OS disk during restore.
        disk-access-option: |-
            Specify the disk access option for target disks.

            Accepted values: EnablePrivateAccessForAllDisks, EnablePublicAccessForAllDisks, SameAsOnSourceDisks
        disk-encryption-set-id: The disk encryption set id is used for encrypting restored disks. Please ensure access to disk encryption set id that is specified here.
        diskslist: List of disks to be excluded or included.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        item-name: Name of the backed up item.
        mi-system-assigned: Use this flag to specify whether a system-assigned managed identity should be used for the restore operation. MI option is not applicable for restoring unmanaged disks.
        mi-user-assigned: ARM ID of the user-assigned managed identity to use for the restore operation. Specify a value for this parameter if you do not want to use a system-assigned MI for restoring the backup item.
        rehydration-duration: |-
            Set the maximum time, in days (between 10-30, both inclusive) for which the recovery point stays in hydrated state.

            Default value: 15
        rehydration-priority: |-
            The type of priority to be maintained while rehydrating a recovery point.

            Accepted values: High, Standard
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restore-as-unmanaged-disks: |-
            Use this flag to specify to restore as unmanaged disks.

            Accepted values: false, true
        restore-mode: |-
            Specify the restore mode.

            Default value: AlternateLocation

            Accepted values: AlternateLocation, OriginalLocation
        restore-only-osdisk: |-
            Use this flag to restore only OS disks of a backed up VM.

            Accepted values: false, true
        restore-to-edge-zone: |-
            Switch parameter to indicate edge zone VM restore. This parameter can't be used in cross region and cross subscription restore scenarios.

            Accepted values: false, true
        restore-to-staging-storage-account: |-
            Use this flag when you want disks to be restored to the staging storage account using the --storage-account parameter. When not specified, disks will be restored to their original storage accounts. Default: false.

            Accepted values: false, true
        rp-name: Name of the recovery point.
        storage-account: Name or ID of the staging storage account. The VM configuration will be restored to this storage account. See the help for --restore-to-staging-storage-account parameter for more info. The ID might be needed for cross-region restores where the storage account and vault are not on the same resource group. In order to get the ID, use the storage account show command as specified here ( https://learn.microsoft.com/en-us/azure/storage/common/storage-account-get-info?tabs=azure-cli#get-the-resource-id-for-a-storage-account ).
        storage-account-resource-group: Name of the resource group which contains the storage account. Default value will be same as --resource-group if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-disk-access-id: Specify the target disk access ID when --disk-access-option is set to EnablePrivateAccessForAllDisks.
        target-resource-group: Use this to specify the target resource group in which the restored disks will be saved.
        target-subnet-name: Name of the subnet in which the target VM should be created, in the case of Alternate Location restore a new VM.
        target-subscription-id: ID of the subscription to which the resource should be restored.
        target-vm-name: Name of the VM to which the data should be restored, in the case of Alternate Location restore to a new VM.
        target-vnet-name: Name of the VNet in which the target VM should be created, in the case of Alternate Location restore to a new VM.
        target-vnet-resource-group: Name of the resource group which contains the target VNet, in the case of Alternate Location restore to a new VM.
        target-zone: |-
            A primary region currently can have three Azure availability zones. Use this argument to specify the target zone number while doing Cross Zonal Restore.

            Accepted values: 1, 2, 3, NoZone
        tenant-id: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
        use-secondary-region: Use this flag to restore from a recoverypoint in secondary region.
        vault-name: Name of the Recovery services vault.
examples:
    Restore disks of the backed VM from the specified recovery point. (autogenerated): az backup restore restore-disks --container-name MyContainer --item-name MyItem --resource-group MyResourceGroup --rp-name MyRp --storage-account mystorageaccount --vault-name MyVault
