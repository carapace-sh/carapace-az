# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore blobs in the specified blob ranges.
documentation:
    flag:
        blob-range: 'Blob ranges to restore. You need to two values to specify start_range and end_range for each blob range, e.g. -r blob1 blob2. Note: Empty means account start as start range value, and means account end for end range.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
    -r, --blob-range=:
        description: Blob ranges to restore.
        nargs: -1
    -t, --time-to-restore=!: Restore blob to the specified time, which should be UTC datetime in (Y-m-d'T'H:M:S'Z').
