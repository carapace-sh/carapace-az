# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore blobs in the specified blob ranges.
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
    -r, --blob-range=:
        description: Blob ranges to restore.
        nargs: -1
    -t, --time-to-restore=!: Restore blob to the specified time, which should be UTC datetime in (Y-m-d'T'H:M:S'Z').
documentation:
    flag:
        account-name: The storage account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        blob-range: 'Blob ranges to restore. You need to two values to specify start_range and end_range for each blob range, e.g. -r blob1 blob2. Note: Empty means account start as start range value, and means account end for end range.'
        change-reference: The related change reference ID for this resource operation.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        time-to-restore: Restore blob to the specified time, which should be UTC datetime in (Y-m-d'T'H:M:S'Z').
examples:
    Restore blobs in the specified blob range without wait and query blob restore status with 'az storage account show'.: |-
        time=`date -u -d "30 minutes" '+%Y-%m-%dT%H:%MZ'`
        az storage blob restore --account-name mystorageaccount -g MyResourceGroup -t $time -r container0/blob1 container0/blob2 --no-wait
    Restore blobs in the specified blob range.: |-
        time=`date -u -d "30 minutes" '+%Y-%m-%dT%H:%MZ'`
        az storage blob restore --account-name mystorageaccount -g MyResourceGroup -t $time -r container0/blob1 container0/blob2
    Restore blobs in the specified blob ranges from account start to account end.: az storage blob restore --account-name mystorageaccount -g MyResourceGroup -t 2020-02-27T03:59:59Z -r "" ""
    ? Restore blobs in two specified blob ranges. For examples, (container1/blob1, container2/blob2) and (container2/blob3..container2/blob4).
    : az storage blob restore --account-name mystorageaccount -g MyResourceGroup -t 2020-02-27T03:59:59Z -r container1/blob1 container2/blob2 -r container2/blob3 container2/blob4
