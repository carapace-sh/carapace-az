# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: list of all possible traffic between resources for the subscription.
flags:
    --subscription=: Name or ID of subscription.
documentation:
    command: List of all possible traffic between resources for the subscription.
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get possible traffic between resources at the subscription level.: az security allowed_connections list
