# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore a backed up key to a Vault or HSM.
flags:
    --backup-folder=: Name of the blob container which contains the backup
    --blob-container-name=: Name of Blob Container.
    --hsm-name=: Name of the HSM.
    --id=: Full URI of the Vault or HSM.
    --no-wait=: Do not wait for the long-running operation to finish.
    --storage-account-name=: Name of Azure Storage Account.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Vault.
    -f, --file=: Local key backup from which to restore key.
    -n, --name=: Name of the key.
    -t, --storage-container-SAS-token=: The SAS token pointing to an Azure Blob storage container
    -u, --storage-resource-uri=: Azure Blob storage container Uri.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-folder: Name of the blob container which contains the backup.
        blob-container-name: Name of Blob Container.
        change-reference: The related change reference ID for this resource operation.
        file: Local key backup from which to restore key.
        hsm-name: Name of the HSM. Can be omitted if --id is specified.
        id: Full URI of the Vault or HSM. If specified all other 'Id' arguments should be omitted.
        name: Name of the key. (Only for restoring from storage account).
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        storage-account-name: Name of Azure Storage Account.
        storage-container-SAS-token: The SAS token pointing to an Azure Blob storage container.
        storage-resource-uri: Azure Blob storage container Uri. If specified, all other 'Storage Id' arguments should be omitted.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Vault.
