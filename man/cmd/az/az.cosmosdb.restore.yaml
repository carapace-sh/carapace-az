# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Create a new Azure Cosmos DB database account by restoring from an existing database account.
flags:
    --assign-identity=:
        description: Assign system or user assigned identities separated by spaces.
        nargs: -1
    --databases-to-restore=:
        description: Add a database and its collection names to restore
        nargs: -1
    --default-identity=: The primary identity to access key vault in CMK related features.
    --gremlin-databases-to-restore=:
        description: Add a gremlin database and its graph names to restore
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tables-to-restore=:
        description: Add table names to restore
        nargs: -1
    -a, --account-name=!: Name of the source Cosmos DB database account for the restore
    -d, --disable-ttl=:
        description: Enable or disable restoring with ttl disabled.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=!: The location of the source account from which restore is triggered.
    -n, --target-database-account-name=!: Name of the new target Cosmos DB database account after the restore
    -p, --public-network-access=: Sets public network access in server to either Enabled or Disabled.
    -t, --restore-timestamp=!: The timestamp to which the account has to be restored to.
completion:
    flag:
        disable-ttl:
            - "true"
            - "false"
        public-network-access:
            - ENABLED
            - DISABLED
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: Name of the source Cosmos DB database account for the restore.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        assign-identity: Assign system or user assigned identities separated by spaces. Use '[system]' to refer system assigned identity.
        change-reference: The related change reference ID for this resource operation.
        databases-to-restore: 'Add a database and its collection names to restore. Usage:          --databases-to-restore name=DatabaseName collections=collection1 [collection2 ...] Multiple databases can be specified by using more than one ```'
        default-identity: The primary identity to access key vault in CMK related features. e.g. 'FirstPartyIdentity', 'SystemAssignedIdentity' and more.
        disable-local-auth: |-
            Flag to disable local authentication and ensure only MSI and AAD can be used exclusively for authentication.

            Accepted values: false, true
        disable-ttl: |-
            Enable or disable restoring with ttl disabled.

            Accepted values: false, true
        gremlin-databases-to-restore: 'Add a gremlin database and its graph names to restore. Usage:          --gremlin-databases-to-restore name=DatabaseName graphs=graph1 [graph2 ...].'
        location: This is the write region of the restored account. This is also the location of the source account where its backups are located if source_backup_location is not provided.
        public-network-access: |-
            Sets public network access in server to either Enabled or Disabled.

            Accepted values: DISABLED, ENABLED
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restore-timestamp: The timestamp to which the account has to be restored to.
        source-backup-location: This is the location of the source account where backups are located. Provide this value if the source and target are in different locations.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tables-to-restore: 'Add table names to restore. Usage:          --tables-to-restore table1 [table2 ...].'
        target-database-account-name: Name of the new target Cosmos DB database account after the restore.
examples:
    ? Create a new Azure Cosmos DB Gremlin database account by restoring only the selected databases or graphs from an existing database account.
    : az cosmosdb restore -g MyResourceGroup --target-database-account-name MyRestoredCosmosDBDatabaseAccount --account-name MySourceAccount --restore-timestamp 2020-07-13T16:03:41+0000 --location westus --gremlin-databases-to-restore name=graphdb1 graphs=graph1 graph2
    ? Create a new Azure Cosmos DB Sql or MongoDB database account by restoring only the selected databases and collections from an existing database account.
    : az cosmosdb restore -g MyResourceGroup --target-database-account-name MyRestoredCosmosDBDatabaseAccount --account-name MySourceAccount --restore-timestamp 2020-07-13T16:03:41+0000 --location westus --databases-to-restore name=MyDB1 collections=collection1 collection2 --databases-to-restore name=MyDB2 collections=collection3 collection4
    Create a new Azure Cosmos DB Table database account by restoring only the selected tables from an existing database account.: az cosmosdb restore -g MyResourceGroup --target-database-account-name MyRestoredCosmosDBDatabaseAccount --account-name MySourceAccount --restore-timestamp 2020-07-13T16:03:41+0000 --location westus --tables-to-restore table1,table2
    Create a new Azure Cosmos DB Table database account by restoring with Time-To-Live disabled.: az cosmosdb restore -g MyResourceGroup --target-database-account-name MyRestoredCosmosDBDatabaseAccount --account-name MySourceAccount --restore-timestamp 2020-07-13T16:03:41+0000 --location westus --disable-ttl True
    Create a new Azure Cosmos DB database account by restoring from an existing database account.: az cosmosdb restore --target-database-account-name MyRestoredCosmosDBDatabaseAccount --account-name MySourceAccount --restore-timestamp 2020-07-13T16:03:41+0000 -g MyResourceGroup --location westus
