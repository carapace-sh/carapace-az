# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: renew
description: Regenerate login credentials for an Azure Container Registry.
flags:
    --password-name=!: The name of password to regenerate
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
completion:
    flag:
        password-name:
            - password
            - password2
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        password-name: |-
            The name of password to regenerate.

            Accepted values: password, password2
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Regenerate login credentials for an Azure Container Registry. (autogenerated): az acr credential renew --name myregistry --password-name password --resource-group MyResourceGroup
    Renew the second password for an Azure Container Registry.: az acr credential renew -n myregistry --password-name password2
