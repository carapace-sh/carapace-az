# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List application federated identity credentials.
flags:
    --id=!: Application's appId, identifierUri, or id (formerly known as objectId)
documentation:
    flag:
        id: Application's appId, identifierUri, or id (formerly known as objectId).
examples:
    List application federated identity credentials.: az ad app federated-credential list --id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
