# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Toggle status of Advanced Threat Protection for a storage account.
flags:
    --is-enabled=!:
        description: Enable or disable Advanced Threat Protection for a received storage or Cosmos DB account.
        nargs: -1
    --storage-account=!: Name of an existing Storage account.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        is-enabled:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        is-enabled: |-
            Enable or disable Advanced Threat Protection for a received storage or Cosmos DB account.

            Accepted values: false, true
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        storage-account: Name of an existing Storage account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Disable Advanced Threat Protection for a storage account on a subscription scope.: az security atp storage update --resource-group MyResourceGroup --storage-account MyStorageAccount --is-enabled false
    Enable Advanced Threat Protection for a storage account on a subscription scope.: az security atp storage update --resource-group MyResourceGroup --storage-account MyStorageAccount --is-enabled true
