# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Get usages for the requested subscription.
documentation:
    flag:
        filter: An OData filter expression that describes a subset of usages to return. The supported parameter is name.value (name of the metric, can have an or of multiple names). Default value is None.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --filter=: An OData filter expression that describes a subset of usages to return.
    --subscription=: Name or ID of subscription.
    -l, --location=!: Location.
