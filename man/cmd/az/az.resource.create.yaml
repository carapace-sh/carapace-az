# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: create a resource.
flags:
    --api-version=: The api version of the resource (omit for the latest stable version)
    --id=:
        description: Resource ID.
        nargs: -1
    --is-full-object=: Indicate that the properties object includes other options such as location, tags, sku, and/or plan.
    --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
    --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
    --resource-type=: 'The resource type (Ex: ''resC'').'
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
    -n, --name=: The resource name.
    -p, --properties=!: A JSON-formatted string containing resource properties.
    -v, --latest-include-preview=: Indicate that the latest api-version will be used regardless of whether it is preview version (like 2020-01-01-preview) or not.
documentation:
    command: Create a resource.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api-version: The api version of the resource (omit for the latest stable version).
        change-reference: The related change reference ID for this resource operation.
        id: Resource ID.
        is-full-object: Indicate that the properties object includes other options such as location, tags, sku, and/or plan.
        latest-include-preview: 'Indicate that the latest api-version will be used regardless of whether it is preview version (like 2020-01-01-preview) or not. For example, if the supported api-version of resource provider is 2020-01-01-preview and 2019-01-01: when passing in this parameter it will take the latest version 2020-01-01-preview, otherwise it will take the latest stable version 2019-01-01 without passing in this parameter.'
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: 'The resource name. (Ex: myC).'
        namespace: 'Provider namespace (Ex: ''Microsoft.Provider'').'
        parent: 'The parent path (Ex: ''resA/myA/resB/myB'').'
        properties: A JSON-formatted string containing resource properties.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'The resource type (Ex: ''resC''). Can also accept namespace/type format (Ex: ''Microsoft.Provider/resC'').'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a resource by loading JSON configuration from a file.: az resource create -g myRG -n myApiApp --resource-type Microsoft.web/sites --is-full-object --properties @jsonConfigFile
    Create a resource by using the latest api-version whether this version is a preview version.: az resource create -g myRG -n myApiApp --resource-type Microsoft.web/sites --is-full-object --properties @jsonConfigFile --latest-include-preview
    Create a site extension to a web app: |-
        az resource create -g myRG --api-version "2018-02-01" \
            --name "{sitename+slot}/siteextensions/Contrast.NetCore.Azure.SiteExtension"  \
                --resource-type Microsoft.Web/sites/siteextensions --is-full-object \
                    --properties "{ \"id\": \"Contrast.NetCore.Azure.SiteExtension\", \
                        \"location\": \"West US\", \"version\": \"1.9.0\" }"
    Create a web app with the minimum required configuration information.: |-
        az resource create -g myRG -n myWeb --resource-type Microsoft.web/sites \
            --properties "{ \"serverFarmId\":\"/subscriptions/{SubID}/resourcegroups/ \
                {ResourceGroup}/providers/Microsoft.Web/serverfarms/{ServicePlan}\" }"
    Create an API app by providing a full JSON configuration.: |-
        az resource create -g myRG -n myApiApp --resource-type Microsoft.web/sites \
            --is-full-object --properties "{ \"kind\": \"api\", \"location\": \
                \"West US\", \"properties\": { \"serverFarmId\": \
                    \"/subscriptions/{SubID}/resourcegroups/{ResourceGroup} \
                        /providers/Microsoft.Web/serverfarms/{ServicePlan}\" } }"
