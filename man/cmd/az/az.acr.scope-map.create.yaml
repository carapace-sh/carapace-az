# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a scope map for an Azure Container Registry.
documentation:
    flag:
        description: Description for the scope map. Maximum 256 characters are allowed.
        gateway: gateway permissions. Use the format "--gateway GATEWAY [ACTION1 ACTION2 ...]" per flag. Valid actions are ['config/read', 'config/write', 'message/read', 'message/write']
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        repository: repository permissions. Use the format "--repository REPO [ACTION1 ACTION2 ...]" per flag. Valid actions are ['content/delete', 'content/read', 'content/write', 'metadata/read', 'metadata/write']
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --description=: Description for the scope map.
    --gateway=:
        description: gateway permissions.
        nargs: -1
    --repository=:
        description: repository permissions.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the scope map.
    -r, --registry=!: The name of the container registry.
