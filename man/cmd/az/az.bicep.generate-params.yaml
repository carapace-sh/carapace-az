# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: generate-params
description: Generate parameters file for a Bicep file.
flags:
    --include-params=: Set include params.
    --no-restore=: When set, generates the parameters file without restoring external modules.
    --outdir=: When set, saves the output at the specified directory.
    --outfile=: When set, saves the output as the specified file path.
    --output-format=: Set output format.
    --stdout=: When set, prints all output to stdout instead of corresponding files.
    --subscription=: Name or ID of subscription.
    -f, --file=!: The path to the Bicep file to generate the parameters file from in the file system.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        file: The path to the Bicep file to generate the parameters file from in the file system.
        include-params: Set include params. Valid values are ( all | RequiredOnly ).
        no-restore: When set, generates the parameters file without restoring external modules.
        outdir: When set, saves the output at the specified directory.
        outfile: When set, saves the output as the specified file path.
        output-format: Set output format. Valid values are ( json | bicepparam ).
        stdout: When set, prints all output to stdout instead of corresponding files.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Generate parameters file for a Bicep file and print all output to stdout.: az bicep generate-params --file {bicep_file} --stdout
    Generate parameters file for a Bicep file and save the result to the specified directory.: az bicep generate-params --file {bicep_file} --outdir {out_dir}
    Generate parameters file for a Bicep file and save the result to the specified file.: az bicep generate-params --file {bicep_file} --outfile {out_file}
    Generate parameters file for a Bicep file with specified output format. Valid values are ( json | bicepparam ).: az bicep generate-params --file {bicep_file} --output-format {output_format} --include-params {include_params}
    Generate parameters file for a Bicep file without restoring external modules.: az bicep generate-params --file {bicep_file} --no-restore
    Generate parameters file for a Bicep file.: az bicep generate-params --file {bicep_file}
