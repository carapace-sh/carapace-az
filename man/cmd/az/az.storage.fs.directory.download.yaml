# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: download
description: Download files from the directory in ADLS Gen2 file system to a local file path.
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name. Environment variable: AZURE_STORAGE_KEY'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit'
        auth-mode: 'The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE'
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING'
        recursive: Recursively download files. If enabled, all the files including the files in subdirectories will be downloaded.
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name. Environment variable: AZURE_STORAGE_SAS_TOKEN'
        source-path: The download source directory path. It should be an absolute path to file system.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --auth-mode=: The mode in which to run the command.
    --connection-string=: Storage account connection string.
    --sas-token=: A Shared Access Signature (SAS).
    --subscription=: Name or ID of subscription.
    -d, --destination-path=!: The destination local directory path to download.
    -f, --file-system=!: The download source file system.
    -r, --recursive=: Recursively download files.
    -s, --source-path=: The download source directory path.
completion:
    flag:
        auth-mode:
            - login
            - key
