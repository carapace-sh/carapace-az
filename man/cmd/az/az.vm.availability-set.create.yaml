# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Azure Availability Set.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        platform-update-domain-count: Update Domain count. If unspecified, the server will pick the most optimal number like 5.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --additional-scheduled-events=:
        description: The configuration parameter used while creating event grid and resource graph scheduled event setting.
        nargs: -1
    --enable-user-reboot-scheduled-events=:
        description: The configuration parameter used while publishing scheduled events additional publishing targets.
        nargs: -1
    --enable-user-redeploy-scheduled-events=:
        description: The configuration parameter used while creating user initiated redeploy scheduled event setting creation.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --platform-fault-domain-count=: Fault Domain count.
    --platform-update-domain-count=: Update Domain count.
    --ppg=: The name or ID of the proximity placement group the availability set should be associated with.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --unmanaged=: contained VMs should use unmanaged disks
    --validate=: Generate and validate the ARM template without creating any resources.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the availability set
completion:
    flag:
        additional-scheduled-events:
            - "true"
            - "false"
        enable-user-reboot-scheduled-events:
            - "true"
            - "false"
        enable-user-redeploy-scheduled-events:
            - "true"
            - "false"
