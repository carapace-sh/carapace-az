# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an event hub consumer group.
flags:
    --event-hub-name=: Event hub endpoint name.
    --hub-name=!: IoT Hub name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Event hub consumer group name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        event-hub-name: |-
            Event hub endpoint name.

            Default value: events
        hub-name: IoT Hub name.
        name: Event hub consumer group name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a consumer group 'cg1' in the default event hub endpoint.: az iot hub consumer-group create --hub-name MyIotHub --name cg1
    Create a consumer group `cg1` in the operation monitoring event hub endpoint `operationsMonitoringEvents`.: az iot hub consumer-group create --hub-name MyIotHub --event-hub-name operationsMonitoringEvents --name cg1
