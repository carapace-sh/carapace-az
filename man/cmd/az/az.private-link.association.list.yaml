# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Get a private link association for a management group scope.
flags:
    --subscription=: Name or ID of subscription.
    -m, --management-group-id=!: The management group id.
documentation:
    flag:
        management-group-id: The management group id.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a private link association for a management group scope.: az private-link association list --management-group-id TestMG
