# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove managed identities from an existing batch account.
flags:
    --subscription=: Name or ID of subscription.
    --system-assigned=: Provide this flag to use system assigned identity for batch accounts.
    --user-assigned=:
        description: User Assigned Identity ids to be used for batch account.
        nargs: -1
    -g, --resource-group=!: Name of the resource group.
    -n, --name=!: Name of the batch account to show.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the batch account to show. If not specified will display currently set account.
        resource-group: Name of the resource group. If not specified will display currently set account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-assigned: Provide this flag to use system assigned identity for batch accounts. Check out help for more examples.
        user-assigned: User Assigned Identity ids to be used for batch account. Check out help for more examples.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Remove a system assigned managed identity from an existing batch account.: az batch account identity remove --name MyBatchAccount --resource-group MyResourceGroup --system-assigned
    Remove a user assigned managed identity from an existing batch account.: az batch account identity remove --name MyBatchAccount --resource-group MyResourceGroup --user-assigned MyAssignedId
    Remove all user assigned managed identities from an existing batch account.: az batch account identity remove --name MyBatchAccount --resource-group MyResourceGroup --user-assigned
