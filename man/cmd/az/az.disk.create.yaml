# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a managed disk.
documentation:
    flag:
        disk-iops-read-only: The total number of IOPS that will be allowed across all VMs mounting the shared disk as ReadOnly. One operation can transfer between 4k and 256k bytes
        disk-iops-read-write: The number of IOPS allowed for this disk. Only settable for UltraSSD disks. One operation can transfer between 4k and 256k bytes
        disk-mbps-read-only: The total throughput (MBps) that will be allowed across all VMs mounting the shared disk as ReadOnly. MBps means millions of bytes per second - MB here uses the ISO notation, of powers of 10
        disk-mbps-read-write: The bandwidth allowed for this disk. Only settable for UltraSSD disks. MBps means millions of bytes per second with ISO notation of powers of 10
        enable-bursting: Enable on-demand bursting beyond the provisioned performance target of the disk. On-demand bursting is disabled by default, and it does not apply to Ultra disks.
        encryption-type: 'Encryption type. EncryptionAtRestWithPlatformKey: Disk is encrypted with XStore managed key at rest. It is the default encryption type. EncryptionAtRestWithCustomerKey: Disk is encrypted with Customer managed key at rest.'
        for-upload: Create the disk for uploading blobs. Replaced by "--upload-type Upload"
        gallery-image-reference: ID of the Compute, Shared or Community Gallery image version from which to create a disk. For details about valid format, please refer to the help sample
        gallery-image-reference-lun: If the disk is created from an image's data disk, this is an index that indicates which of the data disks in the image to use. For OS disks, this field is null
        hyper-v-generation: The hypervisor generation of the Virtual Machine. Applicable to OS disks only.
        image-reference-lun: If the disk is created from an image's data disk, this is an index that indicates which of the data disks in the image to use. For OS disks, this field is null
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`. If location is not specified and no default location specified, location will be automatically set as same as the resource group.'
        logical-sector-size: Logical sector size in bytes for Ultra disks. Supported values are 512 ad 4096. 4096 is the default.
        max-shares: The maximum number of VMs that can attach to the disk at the same time. Value greater than one indicates a disk that can be mounted on multiple VMs at the same time
        optimized-for-frequent-attach: Setting this property to true improves reliability and performance of data disks that are frequently (more than 5 times a day) by detached from one virtual machine and attached to another. This property should not be set for disks that are not detached and attached frequently as it causes the disks to not align with the fault domain of the virtual machine.
        performance-plus: Set this flag to true to get a boost on the performance target of the disk deployed. This flag can only be set on disk creation time and cannot be disabled after enabled
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        security-type: The security type of the VM. Applicable for OS disks only.
        size-gb: 'size in GB. Max size: 4095 GB (certain preview disks can be larger).'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tier: 'Performance tier of the disk (e.g, P4, S10) as described here: https://azure.microsoft.com/pricing/details/managed-disks/. Does not apply to Ultra disks.'
        upload-size-bytes: 'The size (in bytes) of the contents of the upload including the VHD footer. Min value: 20972032. Max value: 35183298347520. This parameter is required if --upload-type is specified'
        upload-type: Create the disk for upload scenario. 'Upload' is for Standard disk only upload. 'UploadWithSecurityData' is for OS Disk upload along with VM Guest State. Please note the 'UploadWithSecurityData' is not valid for data disk upload, it only to be used for OS Disk upload at present.
flags:
    --accelerated-network=:
        description: Customers can set on Managed Disks or Snapshots to enable the accelerated networking if the OS disk image support.
        nargs: -1
    --architecture=: CPU architecture.
    --data-access-auth-mode=: Specify the auth mode when exporting or uploading to a disk or snapshot.
    --disk-access=: Name or ID of the disk access resource for using private endpoints on disks.
    --disk-encryption-set=: Name or ID of disk encryption set that is used to encrypt the disk.
    --disk-iops-read-only=: The total number of IOPS that will be allowed across all VMs mounting the shared disk as ReadOnly.
    --disk-iops-read-write=: The number of IOPS allowed for this disk.
    --disk-mbps-read-only=: The total throughput (MBps) that will be allowed across all VMs mounting the shared disk as ReadOnly.
    --disk-mbps-read-write=: The bandwidth allowed for this disk.
    --edge-zone=: The name of edge zone.
    --enable-bursting=:
        description: Enable on-demand bursting beyond the provisioned performance target of the disk.
        nargs: -1
    --encryption-type=: Encryption type.
    --for-upload=:
        description: Create the disk for uploading blobs.
        nargs: -1
    --gallery-image-reference-lun=: If the disk is created from an image's data disk, this is an index that indicates which of the data disks in the image to use.
    --gallery-image-reference=: ID of the Compute, Shared or Community Gallery image version from which to create a disk.
    --hyper-v-generation=: The hypervisor generation of the Virtual Machine.
    --image-reference-lun=: If the disk is created from an image's data disk, this is an index that indicates which of the data disks in the image to use.
    --image-reference=: ID or URN (publisher:offer:sku:version) of the image from which to create a disk
    --logical-sector-size=: Logical sector size in bytes for Ultra disks.
    --max-shares=: The maximum number of VMs that can attach to the disk at the same time.
    --network-access-policy=: Policy for accessing the disk via network.
    --no-wait=: Do not wait for the long-running operation to finish.
    --optimized-for-frequent-attach=:
        description: Setting this property to true improves reliability and performance of data disks that are frequently (more than 5 times a day) by detached from one virtual machine and attached to another.
        nargs: -1
    --os-type=: The Operating System type of the Disk.
    --performance-plus=:
        description: Set this flag to true to get a boost on the performance target of the disk deployed.
        nargs: -1
    --public-network-access=: Customers can set on Managed Disks or Snapshots to control the export policy on the disk.
    --secure-vm-disk-encryption-set=: Name or ID of disk encryption set created with ConfidentialVmEncryptedWithCustomerKey encryption type.
    --security-data-uri=: Please specify the blob URI of VHD to be imported into VM guest state
    --security-type=: The security type of the VM.
    --sku=: Underlying storage SKU
    --source-storage-account-id=: used when source blob is in a different subscription
    --source=: source to create the disk/snapshot from, including unmanaged blob uri, managed disk id or name, or snapshot id or name
    --subscription=: Name or ID of subscription.
    --support-hibernation=:
        description: Indicate the OS on a disk supports hibernation.
        nargs: -1
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tier=: 'Performance tier of the disk (e.g, P4, S10) as described here: https://azure.microsoft.com/pricing/details/managed-disks/.'
    --upload-size-bytes=: The size (in bytes) of the contents of the upload including the VHD footer.
    --upload-type=: Create the disk for upload scenario.
    --zone=: Availability zone into which to provision the resource.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of the managed disk
    -z, --size-gb=: size in GB.
completion:
    flag:
        accelerated-network:
            - "true"
            - "false"
        architecture:
            - x64
            - Arm64
        data-access-auth-mode:
            - AzureActiveDirectory
            - None
        enable-bursting:
            - "true"
            - "false"
        encryption-type:
            - EncryptionAtRestWithPlatformKey
            - EncryptionAtRestWithCustomerKey
            - EncryptionAtRestWithPlatformAndCustomerKeys
        for-upload:
            - "true"
            - "false"
        hyper-v-generation:
            - V1
            - V2
        network-access-policy:
            - AllowAll
            - AllowPrivate
            - DenyAll
        optimized-for-frequent-attach:
            - "true"
            - "false"
        os-type:
            - Windows
            - Linux
        performance-plus:
            - "true"
            - "false"
        public-network-access:
            - Disabled
            - Enabled
        security-type:
            - TrustedLaunch
            - ConfidentialVM_VMGuestStateOnlyEncryptedWithPlatformKey
            - ConfidentialVM_DiskEncryptedWithPlatformKey
            - ConfidentialVM_DiskEncryptedWithCustomerKey
            - Standard
        sku:
            - Standard_LRS
            - Premium_LRS
            - StandardSSD_LRS
            - UltraSSD_LRS
            - Premium_ZRS
            - StandardSSD_ZRS
            - PremiumV2_LRS
        support-hibernation:
            - "true"
            - "false"
        upload-type:
            - Upload
            - UploadWithSecurityData
