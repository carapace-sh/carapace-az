# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List containers in a storage account.
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --auth-mode=: The mode in which to run the command.
    --blob-endpoint=: Storage data service endpoint.
    --connection-string=: Storage account connection string.
    --include-deleted=:
        description: Specify that deleted containers to be returned in the response.
        nargs: -1
    --include-metadata=:
        description: Specify that container metadata to be returned in the response.
        nargs: -1
    --marker=: A string value that identifies the portion of the list of containers to be returned with the next listing operation.
    --num-results=: Specify the maximum number to return.
    --prefix=: Filter the results to return only blobs whose name begins with the specified prefix.
    --sas-token=: A Shared Access Signature (SAS).
    --show-next-marker=: Show nextMarker in result when specified.
    --subscription=: Name or ID of subscription.
    --timeout=: Request timeout in seconds.
completion:
    flag:
        auth-mode:
            - login
            - key
        include-deleted:
            - "true"
            - "false"
        include-metadata:
            - "true"
            - "false"
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY.'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit.'
        auth-mode: |-
            The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE.

            Accepted values: key, login
        blob-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with ``` az storage account show ``` . Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT.'
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING.'
        include-deleted: |-
            Specify that deleted containers to be returned in the response. This is for container restore enabled account. The default value is ``` False ``` .

            Default value: False

            Accepted values: false, true
        include-metadata: |-
            Specify that container metadata to be returned in the response.

            Default value: False

            Accepted values: false, true
        marker: A string value that identifies the portion of the list of containers to be returned with the next listing operation. The operation returns the NextMarker value within the response body if the listing operation did not return all containers remaining to be listed with the current page. If specified, this generator will begin returning results from the point where the previous generator stopped.
        num-results: |-
            Specify the maximum number to return. If the request does not specify num_results, or specifies a value greater than 5000, the server will return up to 5000 items. Note that if the listing operation crosses a partition boundary, then the service will return a continuation token for retrieving the remaining of the results. Provide "*" to return all.

            Default value: 5000
        prefix: Filter the results to return only blobs whose name begins with the specified prefix.
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_SAS_TOKEN.'
        show-next-marker: Show nextMarker in result when specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: Request timeout in seconds. Applies to each call to the service.
examples:
    List containers in a storage account.: az storage container list
    List soft deleted containers in a storage account.: az storage container list --include-deleted
