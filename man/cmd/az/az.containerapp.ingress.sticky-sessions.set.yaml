# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Configure Sticky session for a container app.
flags:
    --affinity=!: Whether the affinity for the container app is Sticky or None.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Containerapp.
completion:
    flag:
        affinity:
            - sticky
            - none
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        affinity: |-
            Whether the affinity for the container app is Sticky or None.

            Accepted values: none, sticky
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Set affinity to none for a container app.: az containerapp ingress sticky-sessions set -n my-containerapp -g MyResourceGroup --affinity none
    Set affinity to sticky for a container app.: az containerapp ingress sticky-sessions set -n my-containerapp -g MyResourceGroup --affinity sticky
