# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get SSL predefined policy with the specified policy name.
flags:
    --subscription=: Name or ID of subscription.
    -n, --name=!: Name of SSL predefined policy.
documentation:
    flag:
        name: Name of SSL predefined policy.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get SSL predefined policy with the specified policy name.: az network application-gateway ssl-policy predefined show -n AppGwSslPolicy20170401
