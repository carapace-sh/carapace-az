# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show details of a Vault or HSM.
flags:
    --hsm-name=: Name of the HSM.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Proceed only if Key Vault belongs to the specified resource group.
    -n, --name=: Name of the Vault.
documentation:
    flag:
        hsm-name: Name of the HSM. (--hsm-name and --name/-n are mutually exclusive, please specify just one of them).
        name: Name of the Vault.
        resource-group: Name of resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show details of a key vault. (autogenerated): az keyvault show --name MyKeyVault
