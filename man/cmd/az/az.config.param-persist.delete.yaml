# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete parameter persistence data.
flags:
    --all=: Clear all parameter persistence data.
    --purge=: Delete parameter persistence file from working directory.
    --recursive=: Indicate this is recursive delete of parameter persistence.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        all: |-
            Clear all parameter persistence data. Either positional name argument  or --all can be specified.

            Default value: False
        change-reference: The related change reference ID for this resource operation.
        purge: |-
            Delete parameter persistence file from working directory. Only available when --all is specified.

            Default value: False
        recursive: |-
            Indicate this is recursive delete of parameter persistence. Only available when --all is specified.

            Default value: False
        "yes": |-
            Do not prompt for confirmation. Only available when --all is specified.

            Default value: False
examples:
    Clear all parameter persistence data: az config param-persist delete --all
    Delete parameter persistence file: az config param-persist delete --all --purge
    Delete parameter persistence file recursively: az config param-persist delete --all --purge --recursive
    Delete resource_group_name from parameter persistence: az config param-persist delete resource_group_name
