# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a private endpoint ip configuration.
flags:
    --endpoint-name=!: Name of the private endpoint.
    --group-id=: The ID of a group obtained from the remote resource that this private endpoint should connect to.
    --member-name=: The member name of a group obtained from the remote resource that this private endpoint should connect to.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --private-ip-address=: A private ip address obtained from the private endpoint's subnet.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the ip configuration.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        endpoint-name: Name of the private endpoint.
        group-id: The ID of a group obtained from the remote resource that this private endpoint should connect to.
        member-name: The member name of a group obtained from the remote resource that this private endpoint should connect to.
        name: Name of the ip configuration.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        private-ip-address: A private ip address obtained from the private endpoint's subnet.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add a private endpoint ip configuration.: az network private-endpoint ip-config add --endpoint-name MyPE -g MyRG -n MyIpConfig --group-id MyGroup --member-name MyMember --private-ip-address MyPrivateIPAddress
