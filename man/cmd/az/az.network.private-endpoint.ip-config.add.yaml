# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a private endpoint ip configuration.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --endpoint-name=!: Name of the private endpoint.
    --group-id=: The ID of a group obtained from the remote resource that this private endpoint should connect to.
    --member-name=: The member name of a group obtained from the remote resource that this private endpoint should connect to.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --private-ip-address=: A private ip address obtained from the private endpoint's subnet.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the ip configuration.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
