# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: move
description: Moves resources from one resource group to another(can be under different subscription)
flags:
    --destination-group=!: the destination resource group name
    --destination-subscription-id=: the destination subscription identifier
    --ids=!:
        description: the space-separated resource ids to be moved
        nargs: -1
    --subscription=: Name or ID of subscription.
documentation:
    command: Move resources from one resource group to another (can be under different subscription).
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        destination-group: The destination resource group name.
        destination-subscription-id: The destination subscription identifier.
        ids: The space-separated resource ids to be moved.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Move multiple resources to the destination resource group under the destination subscription: az resource move --destination-group ResourceGroup --destination-subscription-id SubscriptionId --ids "ResourceId1" "ResourceId2" "ResourceId3"
