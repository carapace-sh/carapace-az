# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upgrade
description: Upgrade the node pool in a managed Kubernetes cluster.
documentation:
    flag:
        if-match: The value provided will be compared to the ETag of the node pool, if it matches the operation will proceed. If it does not match, the request will be rejected to prevent accidental overwrites. This must not be specified when creating a new agentpool. For upgrade node image version requests this will be ignored.
        if-none-match: Set to '*' to allow a new node pool to be created, but to prevent updating an existing node pool. Other values will be ignored.
        max-surge: Extra nodes used to speed upgrade. When specified, it represents the number or percent used, eg. 5 or 33% (mutually exclusive with "--node-image-only". See "az aks nodepool update --max-surge" to update max surge before upgrading with "--node-image-only")
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --aks-custom-headers=: Comma-separated key-value pairs to specify custom headers.
    --cluster-name=!: The cluster name.
    --drain-timeout=: When nodes are drain how long to wait for all pods to be evicted
    --if-match=: The value provided will be compared to the ETag of the node pool, if it matches the operation will proceed.
    --if-none-match=: Set to '*' to allow a new node pool to be created, but to prevent updating an existing node pool.
    --max-surge=: Extra nodes used to speed upgrade.
    --no-wait=: Do not wait for the long-running operation to finish.
    --node-image-only=: Only upgrade agent pool's node image.
    --node-soak-duration=: The amount of time (in minutes) to wait after draining a node and before reimaging it and moving on to next node.
    --snapshot-id=: The source snapshot id used to upgrade this nodepool.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -k, --kubernetes-version=: ""
    -n, --nodepool-name=!: The node pool name.
    -y, --yes=: Do not prompt for confirmation.
