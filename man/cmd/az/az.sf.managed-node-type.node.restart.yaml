# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restart
description: Restart nodes of a node type.
documentation:
    flag:
        force: Using this flag will force the operation even if service fabric is unable to disable the nodes. Use with caution as this might cause data loss if stateful workloads are running on the node.
        resource-group: Specify the resource group name. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --force=:
        description: Using this flag will force the operation even if service fabric is unable to disable the nodes.
        nargs: -1
    --node-name=!:
        description: list of target nodes to perform the operation.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
    -n, --name=!: node type name.
completion:
    flag:
        force:
            - "true"
            - "false"
