# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: backup
description: Backs up the specified secret.
documentation:
    flag:
        id: Id of the secret. If specified all other 'Id' arguments should be omitted.
        name: Name of the secret. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Key Vault. Required if --id is not specified
flags:
    --id=: Id of the secret.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Key Vault.
    -f, --file=!: File to receive the secret contents.
    -n, --name=: Name of the secret.
