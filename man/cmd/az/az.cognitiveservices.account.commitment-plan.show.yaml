# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets the specified commitmentPlans associated with the Cognitive Services account.
flags:
    --commitment-plan-name=!: Cognitive Services account commitment plan name
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: cognitive service account name
documentation:
    command: Show a commitment plan from Azure Cognitive Services account.
    flag:
        commitment-plan-name: Cognitive Services account commitment plan name.
        name: Cognitive service account name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show a commitment plan from Azure Cognitive Services account.: az cognitiveservices account commitment-plan show -g yuanyang-test-sdk -n yytest-ta --commitment-plan-name "plan"
