# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a VMSS.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        capacity-reservation-group: The ID or name of the capacity reservation group that is used to allocate. Pass in "None" to disassociate the capacity reservation group. Please note that if you want to delete a VM/VMSS that has been associated with capacity reservation group, you need to disassociate the capacity reservation group first.
        ephemeral-os-disk: Allow you to specify the ephemeral disk settings for the operating system disk. Specify it to false to set ephemeral disk setting as empty and migrate it to non ephemeral
        ephemeral-os-disk-placement: Only applicable when used with `--vm-sku`. Allows you to choose the Ephemeral OS disk provisioning location.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        instance-id: Update the VM instance with this ID. If missing, update the VMSS.
        license-type: Specifies that the Windows image or disk was licensed on-premises. To enable Azure Hybrid Benefit for Windows Server, use 'Windows_Server'. To enable Multi-tenant Hosting Rights for Windows 10, use 'Windows_Client'. For more information see the Azure Windows VM online docs.
        max-batch-instance-percent: 'The maximum percent of total virtual machine instances that will be upgraded simultaneously by the rolling upgrade in one batch. Default: 20%'
        max-price: The maximum price (in US Dollars) you are willing to pay for a Spot VM/VMSS. -1 indicates that the Spot VM/VMSS should not be evicted for price reasons
        max-unhealthy-instance-percent: 'The maximum percentage of the total virtual machine instances in the scale set that can be simultaneously unhealthy. Default: 20%'
        max-unhealthy-upgraded-instance-percent: 'The maximum percentage of upgraded virtual machine instances that can be found to be in an unhealthy state. Default: 20%'
        name: Scale set name. You can configure the default using `az configure --defaults vmss=<name>`
        pause-time-between-batches: 'The wait time between completing the update for all virtual machines in one batch and starting the next batch. Default: 0 seconds'
        priority: Priority. Use 'Spot' to run short-lived workloads in a cost-effective way. 'Low' enum will be deprecated in the future. Please use 'Spot' to deploy Azure spot VM and/or VMSS. Default to Regular.
        regular-priority-count: The base number of regular priority VMs that will be created in this scale set as it scales out. Must be greater than 0.
        regular-priority-percentage: The percentage of VM instances, after the base regular priority count has been reached, that are expected to use regular priority. Must be between 0 and 100.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        security-posture-reference-exclude-extensions: List of virtual machine extensions to exclude when applying the Security Posture. Either a Json string or a file path is acceptable. Please refer to https://docs.microsoft.com/rest/api/compute/virtualmachinescalesets/get#virtualmachineextension for the data format.
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        skuprofile-vmsizes: A list of VM sizes in the scale set. See https://azure.microsoft.com/pricing/details/virtual-machines/ for size info.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-data: UserData for the virtual machines in the scale set. It can be passed in as file or string. If empty string is passed in, the existing value will be deleted.
        v-cpus-per-core: Specify the ratio of vCPU to physical core. Setting this property to 1 also means that hyper-threading is disabled.
        vm-sku: The new size of the virtual machine instances in the scale set. Default to "Standard_DS1_v2". See https://azure.microsoft.com/pricing/details/virtual-machines/ for size info.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --additional-scheduled-events=:
        description: The configuration parameter used while creating event grid and resource graph scheduled event setting.
        nargs: -1
    --automatic-repairs-action=: Type of repair action that will be used for repairing unhealthy virtual machines in the scale set.
    --automatic-repairs-grace-period=: The amount of time (in minutes, between 30 and 90) for which automatic repairs are suspended due to a state change on VM.
    --capacity-reservation-group=: The ID or name of the capacity reservation group that is used to allocate.
    --custom-data=: Custom init script file or text (cloud-init, cloud-config, etc..)
    --disk-controller-type=: Specify the disk controller type configured for the VM or VMSS.
    --enable-auto-os-upgrade=:
        description: Indicate whether OS upgrades should automatically be applied to scale set instances in a rolling fashion when a newer version of the OS image becomes available.
        nargs: -1
    --enable-automatic-repairs=:
        description: Enable automatic repairs
        nargs: -1
    --enable-cross-zone-upgrade=:
        description: Set this Boolean property will allow VMSS to ignore AZ boundaries when constructing upgrade batches, and only consider Update Domain and maxBatchInstancePercent to determine the batch size
        nargs: -1
    --enable-hibernation=:
        description: The flag that enable or disable hibernation capability on the VMSS.
        nargs: -1
    --enable-osimage-notification=:
        description: Specify whether the OS Image Scheduled event is enabled or disabled.
        nargs: -1
    --enable-proxy-agent=:
        description: Specify whether proxy agent feature should be enabled on the virtual machine or virtual machine scale set.
        nargs: -1
    --enable-resilient-creation=:
        description: Automatically recover customers from OS Provisioning Timeout and VM Start Timeout errors experienced during a VM Create operation by deleting and recreating the affected VM.
        nargs: -1
    --enable-resilient-deletion=:
        description: Retry VM Delete requests asynchronously in the event of a failed delete operation.
        nargs: -1
    --enable-secure-boot=:
        description: Enable secure boot.
        nargs: -1
    --enable-spot-restore=:
        description: Enable the Spot-Try-Restore feature where evicted VMSS SPOT instances will be tried to be restored opportunistically based on capacity availability and pricing constraints
        nargs: -1
    --enable-terminate-notification=:
        description: Enable terminate notification
        nargs: -1
    --enable-user-reboot-scheduled-events=:
        description: The configuration parameter used while publishing scheduled events additional publishing targets.
        nargs: -1
    --enable-user-redeploy-scheduled-events=:
        description: The configuration parameter used while creating user initiated redeploy scheduled event setting creation.
        nargs: -1
    --enable-vtpm=:
        description: Enable vTPM.
        nargs: -1
    --ephemeral-os-disk-option=: Specify the ephemeral disk settings for operating system disk.
    --ephemeral-os-disk-placement=: Only applicable when used with `--vm-sku`.
    --ephemeral-os-disk=:
        description: Allow you to specify the ephemeral disk settings for the operating system disk.
        nargs: -1
    --force-deletion=: This property allow you to specify if virtual machines chosen for removal have to be force deleted when a virtual machine scale set is being scaled-in.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --instance-id=: Update the VM instance with this ID.
    --license-type=: Specifies that the Windows image or disk was licensed on-premises.
    --max-batch-instance-percent=: The maximum percent of total virtual machine instances that will be upgraded simultaneously by the rolling upgrade in one batch.
    --max-price=: The maximum price (in US Dollars) you are willing to pay for a Spot VM/VMSS.
    --max-surge=:
        description: Specify it to create new virtual machines to upgrade the scale set, rather than updating the existing virtual machines.
        nargs: -1
    --max-unhealthy-instance-percent=: The maximum percentage of the total virtual machine instances in the scale set that can be simultaneously unhealthy.
    --max-unhealthy-upgraded-instance-percent=: The maximum percentage of upgraded virtual machine instances that can be found to be in an unhealthy state.
    --no-wait=: Do not wait for the long-running operation to finish.
    --pause-time-between-batches=: The wait time between completing the update for all virtual machines in one batch and starting the next batch.
    --ppg=: The name or ID of the proximity placement group the VMSS should be associated with.
    --prioritize-unhealthy-instances=:
        description: Set this Boolean property will lead to all unhealthy instances in a scale set getting upgraded before any healthy instances
        nargs: -1
    --priority=: Priority.
    --protect-from-scale-in=:
        description: Protect the VM instance from scale-in operations.
        nargs: -1
    --protect-from-scale-set-actions=:
        description: Protect the VM instance from scale set actions (including scale-in).
        nargs: -1
    --proxy-agent-mode=: Specify the mode that proxy agent will execute on if the feature is enabled.
    --regular-priority-count=: The base number of regular priority VMs that will be created in this scale set as it scales out.
    --regular-priority-percentage=: The percentage of VM instances, after the base regular priority count has been reached, that are expected to use regular priority.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --scale-in-policy=:
        description: Specify the scale-in policy (space delimited) that decides which virtual machines are chosen for removal when a Virtual Machine Scale Set is scaled-in.
        nargs: -1
    --security-posture-reference-exclude-extensions=:
        description: List of virtual machine extensions to exclude when applying the Security Posture.
        nargs: -1
    --security-posture-reference-id=: The security posture reference id in the form of /CommunityGalleries/{communityGalleryName}/securityPostures/{securityPostureName}/versions/{major.minor.patch}|{major.*}|latest
    --security-posture-reference-is-overridable=:
        description: Whether the security posture can be overridden by the user.
        nargs: -1
    --security-type=: Specify the security type of the virtual machine scale set.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --skuprofile-allocation-strategy=: Allocation strategy for vm sizes in SKU profile.
    --skuprofile-vmsizes=:
        description: A list of VM sizes in the scale set.
        nargs: -1
    --spot-restore-timeout=: Timeout value expressed as an ISO 8601 time duration after which the platform will not try to restore the VMSS SPOT instances
    --subscription=: Name or ID of subscription.
    --terminate-notification-time=: Length of time (in minutes, between 5 and 15) a notification to be sent to the VM on the instance metadata server till the VM gets deleted
    --ultra-ssd-enabled=:
        description: Enables or disables the capability to have 1 or more managed data disks with UltraSSD_LRS storage account
        nargs: -1
    --upgrade-policy-mode=: Specify the mode of an upgrade to virtual machines in the scale set.
    --user-data=: UserData for the virtual machines in the scale set.
    --v-cpus-available=: Specify the number of vCPUs available
    --v-cpus-per-core=: Specify the ratio of vCPU to physical core.
    --vm-sku=: The new size of the virtual machine instances in the scale set.
    --zone-balance=:
        description: Whether to force strictly even Virtual Machine distribution cross x-zones in case there is zone outage.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Scale set name.
    -z, --zones=:
        description: Space-separated list of availability zones into which to provision the resource.
        nargs: -1
completion:
    flag:
        additional-scheduled-events:
            - "true"
            - "false"
        automatic-repairs-action:
            - Replace
            - Restart
            - Reimage
        disk-controller-type:
            - SCSI
            - NVMe
        enable-auto-os-upgrade:
            - "true"
            - "false"
        enable-automatic-repairs:
            - "true"
            - "false"
        enable-cross-zone-upgrade:
            - "true"
            - "false"
        enable-hibernation:
            - "true"
            - "false"
        enable-osimage-notification:
            - "true"
            - "false"
        enable-proxy-agent:
            - "true"
            - "false"
        enable-resilient-creation:
            - "true"
            - "false"
        enable-resilient-deletion:
            - "true"
            - "false"
        enable-secure-boot:
            - "true"
            - "false"
        enable-spot-restore:
            - "true"
            - "false"
        enable-terminate-notification:
            - "true"
            - "false"
        enable-user-reboot-scheduled-events:
            - "true"
            - "false"
        enable-user-redeploy-scheduled-events:
            - "true"
            - "false"
        enable-vtpm:
            - "true"
            - "false"
        ephemeral-os-disk:
            - "true"
            - "false"
        ephemeral-os-disk-option:
            - Local
        ephemeral-os-disk-placement:
            - CacheDisk
            - ResourceDisk
            - NvmeDisk
        license-type:
            - Windows_Server
            - Windows_Client
            - RHEL_BYOS
            - SLES_BYOS
            - RHEL_BASE
            - RHEL_SAPAPPS
            - RHEL_SAPHA
            - RHEL_EUS
            - RHEL_BASESAPAPPS
            - RHEL_BASESAPHA
            - SLES_STANDARD
            - SLES
            - SLES_SAP
            - SLES_HPC
            - None
            - RHEL_ELS_6
            - UBUNTU_PRO
            - UBUNTU
        max-surge:
            - "true"
            - "false"
        prioritize-unhealthy-instances:
            - "true"
            - "false"
        priority:
            - Regular
            - Low
            - Spot
        protect-from-scale-in:
            - "true"
            - "false"
        protect-from-scale-set-actions:
            - "true"
            - "false"
        proxy-agent-mode:
            - Audit
            - Enforce
        scale-in-policy:
            - Default
            - OldestVM
            - NewestVM
        security-posture-reference-is-overridable:
            - "true"
            - "false"
        security-type:
            - TrustedLaunch
            - Standard
        skuprofile-allocation-strategy:
            - LowestPrice
            - CapacityOptimized
        ultra-ssd-enabled:
            - "true"
            - "false"
        upgrade-policy-mode:
            - Automatic
            - Manual
            - Rolling
        zone-balance:
            - "true"
            - "false"
