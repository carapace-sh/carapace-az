# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a redirect configuration.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --gateway-name=!: Name of the application gateway.
    --include-path=:
        description: Whether to include path in the redirected url.
        nargs: -1
    --include-query-string=:
        description: Whether to include query string in the redirected url.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --target-listener=: Name or ID of the HTTP listener to redirect the request to.
    --target-url=: URL to redirect the request to.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the redirect configuration.
    -t, --type=!: HTTP redirection type.
completion:
    flag:
        include-path:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        include-query-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        type:
            - Found
            - Permanent
            - SeeOther
            - Temporary
