# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List policy events.
flags:
    --apply=: Apply expression for aggregations using OData notation.
    --filter=: Filter expression using OData notation.
    --from=: ISO 8601 formatted timestamp specifying the start time of the interval to query.
    --namespace=: 'Provider namespace (Ex: Microsoft.Provider).'
    --order-by=: Ordering expression using OData notation.
    --parent=: 'The parent path (Ex: resourceTypeA/nameA/resourceTypeB/nameB).'
    --resource-type=: 'Resource type (Ex: resourceTypeC).'
    --resource=: Resource ID or resource name.
    --select=: Select expression using OData notation.
    --subscription=: Name or ID of subscription.
    --to=: ISO 8601 formatted timestamp specifying the end time of the interval to query.
    --top=: Maximum number of records to return.
    -a, --policy-assignment=: Name of policy assignment.
    -d, --policy-definition=: Name of policy definition.
    -g, --resource-group=: Name of resource group.
    -m, --management-group=: Name of management group.
    -s, --policy-set-definition=: Name of policy set definition.
documentation:
    flag:
        apply: Apply expression for aggregations using OData notation.
        filter: Filter expression using OData notation.
        from: ISO 8601 formatted timestamp specifying the start time of the interval to query.
        management-group: Name of management group.
        namespace: 'Provider namespace (Ex: Microsoft.Provider).'
        order-by: Ordering expression using OData notation.
        parent: 'The parent path (Ex: resourceTypeA/nameA/resourceTypeB/nameB).'
        policy-assignment: Name of policy assignment.
        policy-definition: Name of policy definition.
        policy-set-definition: Name of policy set definition.
        resource: Resource ID or resource name. If a name is given, please provide the resource group and other relevant resource id arguments.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'Resource type (Ex: resourceTypeC).'
        select: Select expression using OData notation.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        to: ISO 8601 formatted timestamp specifying the end time of the interval to query.
        top: Maximum number of records to return.
examples:
    Get number of policy events in current subscription.: az policy event list --apply "aggregate($count as numberOfRecords)"
    Get policy events at current subscription scope created in the last day.: az policy event list
    Get policy events at management group scope.: az policy event list -m "myMg"
    Get policy events at resource group scope in current subscription.: az policy event list -g "myRg"
    Get policy events for a nested resource using resource name.: az policy event list --resource "myRule1" --namespace "Microsoft.Network" --resource-type "securityRules" --parent "networkSecurityGroups/mysecuritygroup1" -g "myresourcegroup"
    Get policy events for a policy assignment in current subscription.: az policy event list -a "ddd8ef92e3714a5ea3d208c1"
    Get policy events for a policy assignment in the specified resource group in current subscription.: az policy event list -g "myRg" -a "ddd8ef92e3714a5ea3d208c1"
    Get policy events for a policy definition in current subscription.: az policy event list -d "fff69973-fff8-fff5-fffc-fffbe7c9d698"
    Get policy events for a policy set definition in current subscription.: az policy event list -s "fff58873-fff8-fff5-fffc-fffbe7c9d697"
    Get policy events for a resource using resource ID.: az policy event list --resource "/subscriptions/fff10b27-fff3-fff5-fff8-fffbe01e86a5/resourceGroups/myResourceGroup /providers/Microsoft.EventHub/namespaces/myns1/eventhubs/eh1/consumergroups/cg1"
    Get policy events for a resource using resource name.: az policy event list --resource "myKeyVault" --namespace "Microsoft.KeyVault" --resource-type "vaults" -g "myresourcegroup"
    Get policy events in current subscription aggregating results based on some properties specifying multiple groupings.: az policy event list --apply "groupby((policyAssignmentId, policyDefinitionId, resourceId))/groupby((policyAssignmentId, policyDefinitionId), aggregate($count as numResourcesWithEvents))"
    Get policy events in current subscription aggregating results based on some properties.: az policy event list --apply "groupby((policyAssignmentId, policyDefinitionId, policyDefinitionAction, resourceId), aggregate($count as numEvents))"
    Get policy events in current subscription during a custom time interval.: az policy event list --from "2018-03-08T00:00:00Z" --to "2018-03-15T00:00:00Z"
    Get policy events in current subscription filtering results based on some property values.: az policy event list --filter "(policyDefinitionAction eq 'deny' or policyDefinitionAction eq 'audit') and resourceLocation ne 'eastus'"
    Get policy events in current subscription grouping results based on some properties.: az policy event list --apply "groupby((policyAssignmentName, resourceId))"
    Get top 5 policy events in current subscription, selecting a subset of properties and customizing ordering.: az policy event list --top 5 --order-by "timestamp desc, policyAssignmentName asc" --select "timestamp, resourceId, policyAssignmentId, policySetDefinitionId, policyDefinitionId"
