# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create and start a migration task.
flags:
    --database-options-json=!: Database and table information.
    --enable-data-integrity-validation=: For SQL only.
    --enable-query-analysis-validation=: For SQL only.
    --enable-schema-validation=: For SQL only.
    --project-name=!: The name of the Project.
    --service-name=!: The name of the Service.
    --source-connection-json=!: The connection information to the source server.
    --subscription=: Name or ID of subscription.
    --target-connection-json=!: The connection information to the target server.
    --task-type=: The type of data movement the task will support.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Task.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        database-options-json: 'Database and table information. This can be either a JSON-formatted string or the location to a file containing the JSON object. See example below for the format. For SQL we support per table migrations. To use this, specify the tables names in the ''table_map'' as below. You can also set the source as read only. [ { "name": "source database", "target_database_name": "target database", "make_source_db_read_only": false|true, "table_map": { "schema.SourceTableName1": "schema.TargetTableName1", "schema.SourceTableName2": "schema.TargetTableName2", ...n } }, ...n ] For PostgreSQL, the format of the database options JSON object. [ { "name": "source database", "target_database_name": "target database", // Used for manipulating the underlying migration engine. // Only provide if instructed to do so or if you really know what you are doing. "migrationSetting": { "setting1": "value1", ...n }, // Used for manipulating the underlying migration engine. // Only provide if instructed to do so or if you really know what you are doing. "sourceSetting": { "setting1": "value1", ...n }, // Used for manipulating the underlying migration engine. // Only provide if instructed to do so or if you really know what you are doing. "targetSetting": { "setting1": "value1", ...n }, // Optional parameter to list tables that you want included in the migration. "selectedTables": [ "schemaName1.tableName1", ...n ] }, ...n ] For MySQL, the format of the database options JSON object. { // Details of mapped schemas that needs to be migrated. Multiple schemas can be migrated at a time. "selected_databases":[ // database/schema 1 details { "name": "sourceSchema1", "target_database_name": "targetSchema1", // Table mapping from source to target schemas [Optional] // Don''t add it if all tables of this database needs to be migrated "table_map": { "sourceSchema1.table1": "targetSchema1.table1", "sourceSchema1.table2": "targetSchema1.table2", "sourceSchema1.table3": "targetSchema1.table3", ..n } // the below items are only necessary for selective schema migration // optional, migrates schema for the following tables ''tables_to_migrate_schema'': { "sourceSchema1.table2": "targetSchema1.table2", "sourceSchema1.table3": "targetSchema1.table3" }, // optional, migrates the enumerated views ''selected_views'': [ ''sourceSchema1.view1'' ], // optional, migrates the enumerated triggers ''selected_triggers'': [ ''sourceSchema1.on_table1_updated'' ], // optional, migrates the enumerated routines ''selected_routines'': [ ''sourceSchema1.build_report'' ], // optional, migrates the enumerated events ''selected_events'': [ ''sourceSchema1.nightly_maintenance'' ], // Optional. If true, DMS will migrate the source database schema to the target. "select_database_for_schema_migration": "true|false" }, ...n ], ``` // Used for manipulating the underlying migration engine. [Optional] // Only provide if instructed to do so or if you really know what you are doing. "migration_level_settings": { // Optional setting that configures the maximum number of parallel reads on tables located on the source database. "DesiredRangesCount": "4", // Optional setting that configures that size of the largest batch that will be committed to the target server. "MaxBatchSizeKb": "4096", // Optional setting that configures the minimum number of rows in each batch written to the target. "MinBatchRows": null, // Optional setting that configures the number of databases that will be prepared for migration in parallel. "PrepareDatabaseForBulkImportTaskCount": null, // Optional setting that configures the number of tables that will be prepared for migration in parallel. "PrepareTableForBulkImportTaskCount": null, // Optional setting that configures the number of threads available to read ranges on the source. "QueryTableDataRangeTaskCount": "8", // Optional setting that configures the number of threads available to write batches to the target. "WriteDataRangeBatchTaskCount": "12", // Optional setting that configures how much memory will be used to cache batches in memory before reads on the source are throttled. "MaxBatchCacheSizeMb": null, // Optional setting that configures the amount of available memory at which point reads on the source will be throttled. "ThrottleQueryTableDataRangeTaskAtAvailableMemoryMb": null, // Optional setting that configures the number of batches cached in memory that will trigger read throttling on the source. "ThrottleQueryTableDataRangeTaskAtBatchCount": 36, // Optional setting that configures the delay between updates of result objects in Azure Table Storage. "DelayProgressUpdatesInStorageInterval": "00:00:30", }, // Optional setting to migrate the full server. "migrate_full_server": "true|false", // Optional setting to set the source server read only. "make_source_server_read_only": "true|false", // Optional setting to enable consistent backup. True by default for the sync migration, unless lockless is enabled. "enable_consistent_backup": "true|false", // Optional setting to enable lockless snapshot. "enable_consistent_backup_without_locks": "true|false", // Optional. If true, all view definitions will be migrated in the selected databases. "migrate_all_views": "true|false", // Optional. If true, all trigger definitions will be migrated in the selected databases. "migrate_all_triggers": "true|false", // Optional. If true, all event definitions will be migrated in the selected databases. "migrate_all_events": "true|false", // Optional. If true, all stored proc definitions will be migrated in the selected databases. "migrate_all_routines": "true|false", // Optional. If true, all table''s schemas will be migrated. "migrate_all_tables_schema": "true|false", // Optional. If true, all users/grants will be migrated. "migrate_user_system_tables": "true|false", // Binlog position to start the migration from. Only applicable for the ReplicateChanges migration. "binlog_info": { "filename": "binlog.0004523", "position": 283287 } ``` }.'
        enable-data-integrity-validation: |-
            For SQL only. Whether to perform a checksum based data integrity validation between source and target for the selected database and tables.

            Default value: False
        enable-query-analysis-validation: |-
            For SQL only. Whether to perform a quick and intelligent query analysis by retrieving queries from the source database and executing them in the target. The result will have execution statistics for executions in source and target databases for the extracted queries.

            Default value: False
        enable-schema-validation: |-
            For SQL only. Whether to compare the schema information between source and target.

            Default value: False
        name: The name of the Task. A DMS Project Task is the activity that performs migration related work. There could be multiple Tasks associated with a Project.
        project-name: The name of the Project. DMS Project is a logical grouping that encompasses source database connection, target database connection and a list of databases to migrate.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the Service. DMS Service is an Azure instance that performs database migrations.
        source-connection-json: 'The connection information to the source server. This can be either a JSON-formatted string or the location to a file containing the JSON object. See examples below for the format. The format of the connection JSON object for SQL connections. { "userName": "user name",    // if this is missing or null, you will be prompted "password": null,           // if this is missing or null (highly recommended) you will be prompted "dataSource": "server name[,port]", "authentication": "SqlAuthentication|WindowsAuthentication", "encryptConnection": true,      // highly recommended to leave as true "trustServerCertificate": false  // highly recommended to leave as false } The format of the connection JSON object for PostgreSQL connections. { "userName": "user name",    // if this is missing or null, you will be prompted "password": null,           // if this is missing or null (highly recommended) you will be prompted "serverName": "server name", "databaseName": "database name", // if this is missing, it will default to the ''postgres'' database "port": 5432,                // if this is missing, it will default to 5432 "encryptConnection": true,      // highly recommended to leave as true "trustServerCertificate": false  // highly recommended to leave as false } The format of the connection JSON object for MySQL connections. { "userName": "user name",    // if this is missing or null, you will be prompted "password": null,           // if this is missing or null (highly recommended) you will be prompted "serverName": "server name", "port": 3306,               // if this is missing, it will default to 3306 "encryptConnection": true,  // highly recommended to leave as true "trustServerCertificate": false  // highly recommended to leave as false }.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-connection-json: |
            The connection information to the target server. This can be either a JSON-formatted string or the location to a file containing the JSON object. See 'source-connection-json' for examples of connection formats.
        task-type: 'The type of data movement the task will support. The supported types are: OnlineMigration, OfflineMigration. If not provided, will default to OfflineMigration for SQL, MongoDB and OnlineMigration for PostgreSQL.'
        validate-only: |-
            For MongoDB to Cosmos DB only. Whether to run validation only and NOT run migration. It is mandatory to run a 'validate only' task before attempting an actual migration. Once the validation is complete, pass the name of this 'validate only' task to a new task's 'validated task name' argument.

            Default value: False
        validated-task-name: (For MongoDB to Cosmos DB only) When running a migration it is neceaary to pass in the name of a previously run 'validate only' task.
examples:
    Create and start a SQL Task which performs all validation checks.: az dms project task create --database-options-json C:\CliFiles\databaseOptions.json -n mytask --project-name myproject -g myresourcegroup --service-name mydms --source-connection-json C:\CliFiles\sourceConnection.json --target-connection-json C:\CliFiles\targetConnection.json --enable-data-integrity-validation --enable-query-analysis-validation --enable-schema-validation --task-type offlinemigration
    Create and start a SQL Task which performs no validation checks.: 'az dms project task create --database-options-json C:\CliFiles\databaseOptions.json -n mytask --project-name myproject -g myresourcegroup --service-name mydms --source-connection-json ''{''dataSource'': ''myserver'', ''authentication'': ''SqlAuthentication'', ''encryptConnection'': ''true'', ''trustServerCertificate'': ''true''}'' --target-connection-json C:\CliFiles\targetConnection.json --task-type offlinemigration'
    Create and start a SQL task which performs all validation checks.: az dms project task create --task-type OfflineMigration --database-options-json "C:\CLI Files\databaseOptions.json" -n mytask --project-name myproject -g myresourcegroup --service-name mydms --source-connection-json "C:\CLI Files\sourceConnection.json" --target-connection-json "C:\CLI Files\targetConnection.json" --enable-data-integrity-validation --enable-query-analysis-validation --enable-schema-validation
    Create and start an offline SQL migration task. For a SQL migration, this will perform no validation checks.: 'az dms project task create --task-type OfflineMigration --database-options-json "C:\CLI Files\databaseOptions.json" -n mytask --project-name myproject -g myresourcegroup --service-name mydms --source-connection-json "{''dataSource'': ''myserver'', ''authentication'': ''SqlAuthentication'', ''encryptConnection'': ''true'', ''trustServerCertificate'': ''true''}" --target-connection-json "C:\CLI Files\targetConnection.json"'
