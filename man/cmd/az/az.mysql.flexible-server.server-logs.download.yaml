# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: download
description: Download log files.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!:
        description: Space-separated list of log filenames on the server to download.
        nargs: -1
    -s, --server-name=!: Name of the server.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Space-separated list of log filenames on the server to download.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Download log files f1 and f2 to the current directory from the server 'testsvr'.: az mysql flexible-server server-logs download -g testgroup -s testsvr -n f1.log f2.log
