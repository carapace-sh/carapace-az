# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: assign
description: Assign managed identities to an IoT Central application
flags:
    --subscription=: Name or ID of subscription.
    --system-assigned=: Provide this flag to refer to the system-assigned identity.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: IoT Central application name.
documentation:
    command: Assign managed identities to an IoT Central application.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: IoT Central application name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-assigned: |-
            Provide this flag to refer to the system-assigned identity.

            Default value: False
examples:
    Assign a system-assigned managed identity to an IoT Central application.: az iot central app identity assign --name my-iotc-app --resource-group MyResourceGroup --system-assigned
