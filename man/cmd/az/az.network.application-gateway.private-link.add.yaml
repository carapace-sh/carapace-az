# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a new private link with a default IP configuration and associate it with an existing frontend IP.
flags:
    --frontend-ip=!: Frontend IP that the private link will associate to.
    --gateway-name=!: Name of the application gateway.
    --ip-address=: Static private IP address of a subnet for private link.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --primary=:
        description: Whether the IP configuration is primary or not.
        nargs: -1
    --subnet-prefix=: CIDR prefix to use when creating a new subnet.
    --subnet=!: Name or ID of a subnet within the same vnet of an application gateway.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the private link configuration.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        primary:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        frontend-ip: Frontend IP that the private link will associate to.
        gateway-name: Name of the application gateway.
        ip-address: Static private IP address of a subnet for private link. If omitting, a dynamic one will be created.
        name: Name of the private link configuration.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        primary: |-
            Whether the IP configuration is primary or not.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subnet: Name or ID of a subnet within the same vnet of an application gateway.
        subnet-prefix: CIDR prefix to use when creating a new subnet.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add one private link.: az network application-gateway private-link add -g MyResourceGroup --gateway-name MyGateway --name MyPrivateLink --frontend-ip MyFrontendIP --subnet MySubnet --subnet-prefix MyPrefix
