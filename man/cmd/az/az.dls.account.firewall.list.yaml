# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists the Data Lake Store firewall rules within the specified Data Lake Store account.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
    -n, --account=: Name of the Data Lake Store account.
documentation:
    command: |-
        Command group 'dls' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account: Name of the Data Lake Store account.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Lists firewall rules in a Data Lake Store account. (autogenerated): az dls account firewall list --account mydatalakestoragegen1 --subscription MySubscription
