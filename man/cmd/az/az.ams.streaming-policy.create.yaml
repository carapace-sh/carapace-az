# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a streaming policy.
documentation:
    flag:
        cbcs-clear-tracks: The JSON representing which tracks should not be encrypted. Use @{file} to load from a file. For further information about the JSON structure please refer to swagger documentation on https://learn.microsoft.com/rest/api/media/streamingpolicies/create#trackselection
        cbcs-fair-play-template: The custom license acquisition URL template for a customer service to deliver keys to end users. Not needed when using Azure Media Services for issuing keys.
        cbcs-key-to-track-mappings: The JSON representing a list of StreamingPolicyContentKey. Use @{file} to load from a file. For further information about the JSON structure please refer to swagger documentation on https://learn.microsoft.com/rest/api/media/streamingpolicies/create#streamingpolicycontentkey
        cbcs-play-ready-template: The custom license acquisition URL template for a customer service to deliver keys to end users. Not needed when using Azure Media Services for issuing keys.
        cbcs-protocols: 'Space-separated list of enabled protocols for Common Encryption CBCS. Allowed values: Download, Dash, HLS, SmoothStreaming.'
        cbcs-widevine-template: The custom license acquisition URL template for a customer service to deliver keys to end users. Not needed when using Azure Media Services for issuing keys.
        cenc-clear-tracks: The JSON representing which tracks should not be encrypted. Use @{file} to load from a file. For further information about the JSON structure please refer to swagger documentation on https://learn.microsoft.com/rest/api/media/streamingpolicies/create#trackselection
        cenc-disable-play-ready: If specified, no PlayReady cenc DRM will be configured. If --cenc-disable-play-ready is set, --cenc-disable-widevine cannot also be set.
        cenc-disable-widevine: If specified, no Widevine cenc DRM will be configured. If --cenc-disable-widevine is set, --cenc-disable-play-ready cannot also be set.
        cenc-key-to-track-mappings: The JSON representing a list of StreamingPolicyContentKey. Use @{file} to load from a file. For further information about the JSON structure please refer to swagger documentation on https://learn.microsoft.com/rest/api/media/streamingpolicies/create#streamingpolicycontentkey
        cenc-play-ready-template: The custom license acquisition URL template for a customer service to deliver keys to end users. Not needed when using Azure Media Services for issuing keys.
        cenc-protocols: 'Space-separated list of enabled protocols for Common Encryption CENC. Allowed values: Download, Dash, HLS, SmoothStreaming.'
        cenc-widevine-template: The custom license acquisition URL template for a customer service to deliver keys to end users. Not needed when using Azure Media Services for issuing keys.
        envelope-clear-tracks: The JSON representing which tracks should not be encrypted. Use @{file} to load from a file. For further information about the JSON structure please refer to swagger documentation on https://learn.microsoft.com/rest/api/media/streamingpolicies/create#trackselection
        envelope-key-to-track-mappings: The JSON representing a list of StreamingPolicyContentKey. Use @{file} to load from a file. For further information about the JSON structure please refer to swagger documentation on https://learn.microsoft.com/rest/api/media/streamingpolicies/create#streamingpolicycontentkey
        envelope-protocols: 'Space-separated list of enabled protocols for Envelope Encryption. Allowed values: Download, Dash, HLS, SmoothStreaming.'
        no-encryption-protocols: 'Space-separated list of enabled protocols for NoEncryption. Allowed values: Download, Dash, HLS, SmoothStreaming.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --cbcs-clear-tracks=: The JSON representing which tracks should not be encrypted.
    --cbcs-default-key-label=: Label to specify Default Content Key for an encryption scheme.
    --cbcs-default-key-policy-name=: Policy used by Default Content Key.
    --cbcs-fair-play-allow-persistent-license=:
        description: Allows the license to be persistent or not.
        nargs: -1
    --cbcs-fair-play-template=: The custom license acquisition URL template for a customer service to deliver keys to end users.
    --cbcs-key-to-track-mappings=: The JSON representing a list of StreamingPolicyContentKey.
    --cbcs-play-ready-attributes=: Custom attributes for PlayReady.
    --cbcs-play-ready-template=: The custom license acquisition URL template for a customer service to deliver keys to end users.
    --cbcs-protocols=:
        description: Space-separated list of enabled protocols for Common Encryption CBCS.
        nargs: -1
    --cbcs-widevine-template=: The custom license acquisition URL template for a customer service to deliver keys to end users.
    --cenc-clear-tracks=: The JSON representing which tracks should not be encrypted.
    --cenc-default-key-label=: Label to specify Default Content Key for an encryption scheme.
    --cenc-default-key-policy-name=: Policy used by Default Content Key.
    --cenc-disable-play-ready=:
        description: If specified, no PlayReady cenc DRM will be configured.
        nargs: -1
    --cenc-disable-widevine=:
        description: If specified, no Widevine cenc DRM will be configured.
        nargs: -1
    --cenc-key-to-track-mappings=: The JSON representing a list of StreamingPolicyContentKey.
    --cenc-play-ready-attributes=: Custom attributes for PlayReady.
    --cenc-play-ready-template=: The custom license acquisition URL template for a customer service to deliver keys to end users.
    --cenc-protocols=:
        description: Space-separated list of enabled protocols for Common Encryption CENC.
        nargs: -1
    --cenc-widevine-template=: The custom license acquisition URL template for a customer service to deliver keys to end users.
    --default-content-key-policy-name=: Default Content Key used by current streaming policy.
    --envelope-clear-tracks=: The JSON representing which tracks should not be encrypted.
    --envelope-default-key-label=: Label used to specify Content Key when creating a streaming locator.
    --envelope-default-key-policy-name=: Policy used by Default Key.
    --envelope-key-to-track-mappings=: The JSON representing a list of StreamingPolicyContentKey.
    --envelope-protocols=:
        description: Space-separated list of enabled protocols for Envelope Encryption.
        nargs: -1
    --envelope-template=: The KeyAcquistionUrlTemplate is used to point to user specified service to delivery content keys.
    --no-encryption-protocols=:
        description: Space-separated list of enabled protocols for NoEncryption.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: The name of the Azure Media Services account.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the streaming policy.
completion:
    flag:
        cbcs-fair-play-allow-persistent-license:
            - "true"
            - "false"
        cenc-disable-play-ready:
            - "true"
            - "false"
        cenc-disable-widevine:
            - "true"
            - "false"
