# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a virtual network gateway.
flags:
    --aad-audience=: The AADAudience ID of the VirtualNetworkGateway.
    --aad-issuer=: The AAD Issuer URI of the VirtualNetworkGateway.
    --aad-tenant=: The AAD Tenant URI of the VirtualNetworkGateway.
    --address-prefixes=:
        description: Space-separated list of CIDR prefixes representing the address space for the P2S Vpnclient.
        nargs: -1
    --allow-remote-vnet-traffic=:
        description: Configure this gateway to accept traffic from other Azure Virtual Networks.
        nargs: -1
    --allow-vwan-traffic=:
        description: Configures this gateway to accept traffic from remote Virtual WAN networks.
        nargs: -1
    --asn=: Autonomous System Number to use for the BGP settings.
    --bgp-peering-address=: IP address to use for BGP peering.
    --client-protocol=:
        description: Protocols to use for connecting.
        nargs: -1
    --custom-routes=:
        description: Space-separated list of CIDR prefixes representing the custom routes address space specified by the customer for VpnClient.
        nargs: -1
    --edge-zone-vnet-id=: The Extended vnet resource id of the local gateway.
    --edge-zone=: The name of edge zone.
    --enable-private-ip=:
        description: Whether private IP needs to be enabled on this gateway for connections or not.
        nargs: -1
    --gateway-default-site=: Name or ID of a local network gateway representing a local network site with default routes.
    --gateway-type=: The gateway type.
    --max-scale-unit=: Maximum scale units for auto-scale configuration.
    --min-scale-unit=: Minimum scale units for auto-scale configuration.
    --nat-rules=:
        description: VirtualNetworkGatewayNatRule Resource.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --peer-weight=: Weight (0-100) added to routes learned through BGP peering.
    --public-ip-addresses=:
        description: Specify a single public IP (name or ID) for an active-standby gateway.
        nargs: -1
    --radius-secret=: Radius secret to use for authentication.
    --radius-server=: Radius server address to connect to.
    --resiliency-model=: Indicates if the Express Route Gateway has resiliency model of MultiHomed or SingleHomed
    --root-cert-data=: Base64 contents of the root certificate file or file path.
    --root-cert-name=: Root certificate name.
    --sku=: VNet gateway SKU.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vnet=!: Name or ID of an existing virtual network which has a subnet named 'GatewaySubnet'.
    --vpn-auth-type=:
        description: VPN authentication types enabled for the virtual network gateway.
        nargs: -1
    --vpn-gateway-generation=: The generation for the virtual network gateway.
    --vpn-type=: VPN routing type.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the VNet gateway.
completion:
    flag:
        allow-remote-vnet-traffic:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        allow-vwan-traffic:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-private-ip:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        gateway-type:
            - ExpressRoute
            - LocalGateway
            - Vpn
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        resiliency-model:
            - MultiHomed
            - SingleHomed
        sku:
            - Basic
            - ErGw1AZ
            - ErGw2AZ
            - ErGw3AZ
            - ErGwScale
            - HighPerformance
            - Standard
            - UltraPerformance
            - VpnGw1
            - VpnGw1AZ
            - VpnGw2
            - VpnGw2AZ
            - VpnGw3
            - VpnGw3AZ
            - VpnGw4
            - VpnGw4AZ
            - VpnGw5
            - VpnGw5AZ
        vpn-gateway-generation:
            - Generation1
            - Generation2
            - None
        vpn-type:
            - PolicyBased
            - RouteBased
documentation:
    flag:
        aad-audience: The AADAudience ID of the VirtualNetworkGateway.
        aad-issuer: The AAD Issuer URI of the VirtualNetworkGateway.
        aad-tenant: The AAD Tenant URI of the VirtualNetworkGateway.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        address-prefix: '``` .'
        address-prefixes: 'Space-separated list of CIDR prefixes representing the address space for the P2S Vpnclient.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.  Singular flags: `--address-prefix`.'
        allow-remote-vnet-traffic: |-
            Configure this gateway to accept traffic from other Azure Virtual Networks. This configuration does not support connectivity to Azure Virtual WAN.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        allow-vwan-traffic: |-
            Configures this gateway to accept traffic from remote Virtual WAN networks.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        asn: Autonomous System Number to use for the BGP settings.
        bgp-peering-address: IP address to use for BGP peering.
        change-reference: The related change reference ID for this resource operation.
        client-protocol: 'Protocols to use for connecting.  Allowed values: IkeV2, OpenVPN, SSTP.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        custom-routes: Space-separated list of CIDR prefixes representing the custom routes address space specified by the customer for VpnClient.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        edge-zone: The name of edge zone.
        edge-zone-vnet-id: |-
            The Extended vnet resource id of the local gateway. --enable-high-bandwidth --enable-high-bandwidth-vpn-gateway To enable Advanced Connectivity feature for VPN gateway.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        enable-private-ip: |-
            Whether private IP needs to be enabled on this gateway for connections or not.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        gateway-default-site: Name or ID of a local network gateway representing a local network site with default routes.
        gateway-type: |-
            The gateway type.

            Default value: Vpn

            Accepted values: ExpressRoute, LocalGateway, Vpn
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        max-scale-unit: Maximum scale units for auto-scale configuration. --mi-system-assigned --system-assigned Set the system managed identity.
        min-scale-unit: 'Minimum scale units for auto-scale configuration. --nat-rule --nat-rules VirtualNetworkGatewayNatRule Resource.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.  Singular flags: ```'
        name: Name of the VNet gateway.
        nat-rule: '``` .'
        nat-rules: 'VirtualNetworkGatewayNatRule Resource.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.  Singular flags: `--nat-rule`.'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        peer-weight: Weight (0-100) added to routes learned through BGP peering.
        public-ip-addresses: Specify a single public IP (name or ID) for an active-standby gateway. Specify two space-separated public IPs for an active-active gateway.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        radius-secret: Radius secret to use for authentication.
        radius-server: Radius server address to connect to.
        resiliency-model: |-
            Indicates if the Express Route Gateway has resiliency model of MultiHomed or SingleHomed.

            Accepted values: MultiHomed, SingleHomed
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        root-cert-data: Base64 contents of the root certificate file or file path.
        root-cert-name: Root certificate name.
        sku: |-
            VNet gateway SKU.

            Default value: Basic

            Accepted values: Basic, ErGw1AZ, ErGw2AZ, ErGw3AZ, ErGwScale, HighPerformance, Standard, UltraPerformance, VpnGw1, VpnGw1AZ, VpnGw2, VpnGw2AZ, VpnGw3, VpnGw3AZ, VpnGw4, VpnGw4AZ, VpnGw5, VpnGw5AZ
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        vnet: Name or ID of an existing virtual network which has a subnet named 'GatewaySubnet'.
        vpn-auth-type: VPN authentication types enabled for the virtual network gateway.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        vpn-gateway-generation: |-
            The generation for the virtual network gateway. vpn_gateway_generation should not be provided if gateway_type is not Vpn.

            Accepted values: Generation1, Generation2, None
        vpn-type: |-
            VPN routing type.

            Default value: RouteBased

            Accepted values: PolicyBased, RouteBased
examples:
    Create a basic virtual network gateway for site-to-site connectivity.: az network vnet-gateway create -g MyResourceGroup -n MyVnetGateway --public-ip-address MyGatewayIp --vnet MyVnet --gateway-type Vpn --sku VpnGw1 --vpn-type RouteBased --no-wait
    ? Create a basic virtual network gateway that provides point-to-site connectivity with a RADIUS secret that matches what is configured on a RADIUS server.
    : az network vnet-gateway create -g MyResourceGroup -n MyVnetGateway --public-ip-address MyGatewayIp --vnet MyVnet --gateway-type Vpn --sku VpnGw1 --vpn-type RouteBased --address-prefixes 40.1.0.0/24 --client-protocol IkeV2 SSTP --radius-secret 111_aaa --radius-server 30.1.1.15 --vpn-gateway-generation Generation1
    Create a basic virtual network gateway with multi authentication: az network vnet-gateway create -g MyResourceGroup -n MyVnetGateway --public-ip-address MyGatewayIp --vnet MyVnet --gateway-type Vpn --sku VpnGw1 --vpn-type RouteBased --address-prefixes 40.1.0.0/24 --client-protocol OpenVPN --radius-secret 111_aaa --radius-server 30.1.1.15 --aad-issuer https://sts.windows.net/00000-000000-00000-0000-000/ --aad-tenant https://login.microsoftonline.com/000 --aad-audience 0000-000 --root-cert-name root-cert --root-cert-data "root-cert.cer" --vpn-auth-type AAD Certificate Radius
    Create a virtual network gateway.: az network vnet-gateway create --gateway-type Vpn --location westus2 --name MyVnetGateway --no-wait --public-ip-addresses myVGPublicIPAddress --resource-group MyResourceGroup --sku Basic --vnet MyVnet --vpn-type PolicyBased
