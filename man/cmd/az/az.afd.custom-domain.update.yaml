# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a new domain within the specified profile.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --azure-dns-zone=: ID of the Azure DNS zone.
    --certificate-type=: Defines the source of the SSL certificate.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --minimum-tls-version=: TLS protocol version that will be used for Https
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --secret=: Resource reference to the secret.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the domain under the profile which is unique globally.
completion:
    flag:
        certificate-type:
            - AzureFirstPartyManagedCertificate
            - CustomerCertificate
            - ManagedCertificate
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        minimum-tls-version:
            - TLS10
            - TLS12
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        azure-dns-zone: ID of the Azure DNS zone.
        certificate-type: |-
            Defines the source of the SSL certificate.

            Accepted values: AzureFirstPartyManagedCertificate, CustomerCertificate, ManagedCertificate
        change-reference: The related change reference ID for this resource operation.
        cipher-suite-set-type: |-
            Cipher suite set type that will be used for Https.

            Accepted values: Customized, TLS10_2019, TLS12_2022, TLS12_2023
        customized-cipher-suite-set: Customized cipher suites object that will be used for Https when cipherSuiteSetType is Customized.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        minimum-tls-version: |-
            TLS protocol version that will be used for Https.

            Accepted values: TLS10, TLS12, TLS13
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        profile-name: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        secret: Resource reference to the secret. ie. subs/rg/profile/secret.
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update the custom domain's certificate type to AFD managed certificate.: az afd custom-domain update -g group --custom-domain-name customDomain --profile-name profile --certificate-type ManagedCertificate
    Update the custom domain's supported minimum TLS version.: az afd custom-domain update -g group --custom-domain-name customDomain --profile-name profile --minimum-tls-version TLS12
