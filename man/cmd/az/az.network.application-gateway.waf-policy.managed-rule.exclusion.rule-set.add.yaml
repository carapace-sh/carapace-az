# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a managed rule set to an exclusion.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        rule-ids: List of rules that will be disabled. If provided, --group-name must be provided too.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        version: The version of the web application firewall rule set type. 0.1, 1.0, and 1.1 are used for Microsoft_BotManagerRuleSet.
flags:
    --group-name=: The managed rule group for exclusion.
    --match-variable=!: The variable to be excluded.
    --policy-name=!: The name of the web application firewall policy.
    --rule-ids=:
        description: List of rules that will be disabled.
        nargs: -1
    --selector-match-operator=!: When matchVariable is a collection, operate on the selector to specify which elements in the collection this exclusion applies to.
    --selector=!: When matchVariable is a collection, operator used to specify which elements in the collection this exclusion applies to.
    --subscription=: Name or ID of subscription.
    --type=!: The type of the web application firewall rule set.
    --version=!: The version of the web application firewall rule set type.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        match-variable:
            - RequestHeaderNames
            - RequestCookieNames
            - RequestArgNames
            - RequestHeaderKeys
            - RequestHeaderValues
            - RequestCookieKeys
            - RequestCookieValues
            - RequestArgKeys
            - RequestArgValues
        selector-match-operator:
            - Equals
            - Contains
            - StartsWith
            - EndsWith
            - EqualsAny
        type:
            - Microsoft_BotManagerRuleSet
            - OWASP
        version:
            - "0.1"
            - "1.0"
            - "1.1"
            - "2.1"
            - 2.2.9
            - "3.0"
            - "3.1"
            - "3.2"
