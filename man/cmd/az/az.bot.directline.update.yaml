# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the DirectLine Channel on a bot with only v3 protocol enabled.
documentation:
    flag:
        enable-enhanced-auth: If true, enables enhanced authentication features. Must be true for --trusted-origins parameters to work.
        name: The resource name of the bot. Bot name must be between 4 and 42 characters in length. Bot name can only have the following characters -, a - z, A - Z, 0 - 9, and _.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --add-disabled=:
        description: Add the channel in a disabled state.
        nargs: -1
    --disablev1=:
        description: If true, v1 protocol will be disabled on the channel
        nargs: -1
    --disablev3=:
        description: If true, v3 protocol will be disabled on the channel.
        nargs: -1
    --enable-enhanced-auth=:
        description: If true, enables enhanced authentication features.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --trusted-origins=:
        description: Space separated Trusted Origins URLs (must use HTTPS) e.g. --trusted-origins https://mybotsite1.azurewebsites.net https://mybotsite2.azurewebsites.net
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The resource name of the bot.
    -s, --site-name=: Name of the Directline channel site.
completion:
    flag:
        add-disabled:
            - "true"
            - "false"
        disablev1:
            - "true"
            - "false"
        disablev3:
            - "true"
            - "false"
        enable-enhanced-auth:
            - "true"
            - "false"
