# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Set an existing function app's configuration.
documentation:
    flag:
        always-on: ensure web app gets loaded all the time, rather unloaded after been idle. Recommended when you have continuous web jobs running
        ftps-state: Set the Ftps state value for an app. Default value is 'AllAllowed'.
        generic-configurations: Provide site configuration list in a format of either `key=value` pair or `@<json_file>`. PowerShell and Windows Command Prompt users should use a JSON file to provide these configurations to avoid compatibility issues with escape characters.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        linux-fx-version: The runtime stack used for your linux-based webapp, e.g., "RUBY|2.5.5", "NODE|12LTS", "PHP|7.2", "DOTNETCORE|2.1". See https://aka.ms/linux-stacks for more info.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        slot: the name of the slot. Default to the productions slot if not specified
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --always-on=:
        description: ensure web app gets loaded all the time, rather unloaded after been idle.
        nargs: -1
    --auto-heal-enabled=:
        description: enable or disable auto heal
        nargs: -1
    --ftps-state=: Set the Ftps state value for an app.
    --generic-configurations=:
        description: Provide site configuration list in a format of either `key=value` pair or `@<json_file>`.
        nargs: -1
    --http20-enabled=:
        description: configures a web site to allow clients to connect over http2.0.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --java-container-version=: The version of the java container, e.g., '8.0.23' for Tomcat
    --java-container=: The java container, e.g., Tomcat, Jetty
    --java-version=: The version used to run your web app if using Java, e.g., '1.7' for Java 7, '1.8' for Java 8
    --linux-fx-version=: The runtime stack used for your linux-based webapp, e.g., "RUBY|2.5.5", "NODE|12LTS", "PHP|7.2", "DOTNETCORE|2.1".
    --min-tls-version=: The minimum version of TLS required for SSL requests, e.g., '1.0', '1.1', '1.2'
    --net-framework-version=: The version used to run your web app if using .NET Framework, e.g., 'v4.0' for .NET 4.6 and 'v3.0' for .NET 3.5
    --number-of-workers=: The number of workers to be allocated.
    --php-version=: The version used to run your web app if using PHP, e.g., 5.5, 5.6, 7.0
    --powershell-version=: The version used to run your function app if using PowerShell, e.g., 7.2
    --prewarmed-instance-count=: Number of pre-warmed instances a function app has
    --python-version=: The version used to run your web app if using Python, e.g., 2.7, 3.4
    --remote-debugging-enabled=:
        description: enable or disable remote debugging
        nargs: -1
    --startup-file=: The startup file for linux hosted web apps, e.g. 'process.json' for Node.js web
    --subscription=: Name or ID of subscription.
    --use-32bit-worker-process=:
        description: use 32 bits worker process or not
        nargs: -1
    --vnet-route-all-enabled=:
        description: Configure regional VNet integration to route all traffic to the VNet.
        nargs: -1
    --web-sockets-enabled=:
        description: enable or disable web sockets
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: name of the function app
    -s, --slot=: the name of the slot.
completion:
    flag:
        always-on:
            - "true"
            - "false"
        auto-heal-enabled:
            - "true"
            - "false"
        ftps-state:
            - AllAllowed
            - FtpsOnly
            - Disabled
        http20-enabled:
            - "true"
            - "false"
        remote-debugging-enabled:
            - "true"
            - "false"
        use-32bit-worker-process:
            - "true"
            - "false"
        vnet-route-all-enabled:
            - "true"
            - "false"
        web-sockets-enabled:
            - "true"
            - "false"
