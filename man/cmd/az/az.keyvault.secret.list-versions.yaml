# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-versions
description: List properties of all versions of a secret, excluding their values.
documentation:
    flag:
        id: Id of the secret. If specified all other 'Id' arguments should be omitted.
        maxresults: Maximum number of results to return in a page. If not specified, the service will return up to 25 results.
        name: Name of the secret. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Key Vault. Required if --id is not specified
flags:
    --id=: Id of the secret.
    --maxresults=: Maximum number of results to return in a page.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Key Vault.
    -n, --name=: Name of the secret.
