# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show a deployment operation at management group.
flags:
    --operation-ids=!:
        description: A list of operation ids to show
        nargs: -1
    --subscription=: Name or ID of subscription.
    -m, --management-group-id=!: The management group id.
    -n, --name=!: The deployment name.
documentation:
    flag:
        management-group-id: The management group id.
        name: The deployment name.
        operation-ids: A list of operation ids to show.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
