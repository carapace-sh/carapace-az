# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a policy set definition.
flags:
    --definition-groups=: JSON formatted string or a path to a file or uri containing policy definition groups.
    --definitions=: JSON formatted string or a path to a file or uri containing definitions.
    --description=: Description of policy set definition.
    --display-name=: Display name of policy set definition.
    --management-group=: The name of the management group of the policy [set] definition.
    --metadata=:
        description: Metadata in space-separated key=value pairs.
        nargs: -1
    --params=: JSON formatted string or a path to a file or uri with parameter definitions.
    --subscription=: The subscription id of the policy [set] definition.
    -n, --name=!: The policy set definition name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        definition-groups: The metadata describing groups of policy definition references within the policy set definition.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        definitions: An array of policy definition references.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        description: Policy set definition description.
        display-name: The display name of the policy set definition.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        management-group: The name of the management group of the policy [set] definition. This parameter is required if your policy set is scoped to a management group.
        metadata: The policy set definition metadata.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the policy set definition.
        params: The policy set definition parameter definitions.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        version: The policy set definition version.
examples:
    Update a policy set definition: 'az policy set-definition update --definitions ''[ { ''policyDefinitionId'': ''/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyDefinitions/storagePolicy'' } ]'' --name MyPolicySetDefinition'
    Update the groups and definitions within a policy set definition: 'az policy set-definition update -n computeRequirements --definitions "[ { ''policyDefinitionId'': ''/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyDefinitions/storagePolicy'', ''groupNames'': [ ''CostSaving'', ''Organizational'' ] }, { ''policyDefinitionId'': ''/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyDefinitions/tagPolicy'', ''groupNames'': [ ''Organizational'' ] } ]" --definition-groups "[{ ''name'': ''CostSaving'' }, { ''name'': ''Organizational'' } ]"'
