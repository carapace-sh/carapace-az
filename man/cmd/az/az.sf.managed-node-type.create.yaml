# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create node type on a managed cluster.
documentation:
    flag:
        capacity: 'Capacity tags applied to the nodes in the node type as key/value pairs, the cluster resource manager uses these tags to understand how much resource a node has. Updating this will override the current values.for example: --capacity ClientConnections=65536 param2=value2'
        disk-type: 'Managed data disk type. IOPS and throughput are given by the disk size, to see more information go to https://learn.microsoft.com/azure/virtual-machines/disks-types. Default StandardSSD_LRSStandard_LRS: Standard HDD locally redundant storage. Best for backup, non-critical, and infrequent access.StandardSSD_LRS: Standard SSD locally redundant storage. Best for web servers, lightly used enterprise applications and dev/test.Premium_LRS: Premium SSD locally redundant storage. Best for production and performance sensitive workloads.'
        placement-property: 'Placement tags applied to nodes in the node type as key/value pairs, which can be used to indicate where certain services (workload) should run. Updating this will override the current values.for example: --placement-property NodeColor=Green SomeProperty=5'
        primary: Specify if the node type is primary. On this node type will run system services. Only one node type should be marked as primary. Primary node type cannot be deleted or changed for existing clusters.
        resource-group: Specify the resource group name. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-image-version: 'The version of the Azure Virtual Machines Marketplace image. '
        vm-size: The size of virtual machines in the pool. All virtual machines in a pool are the same size.
flags:
    --application-end-port=: Application End port of a range of ports.
    --application-start-port=: Application start port of a range of ports.
    --capacity=:
        description: Capacity tags applied to the nodes in the node type as key/value pairs, the cluster resource manager uses these tags to understand how much resource a node has.
        nargs: -1
    --disk-size=: Disk size for each vm in the node type in GBs.
    --disk-type=: Managed data disk type.
    --ephemeral-end-port=: Ephemeral end port of a range of ports.
    --ephemeral-start-port=: Ephemeral start port of a range of ports.
    --instance-count=!: essage = "The number of nodes in the node type.
    --is-stateless=:
        description: Indicates if the node type can only host Stateless workloads.
        nargs: -1
    --multiple-placement-groups=:
        description: Indicates if scale set associated with the node type can be composed of multiple placement groups.
        nargs: -1
    --placement-property=:
        description: Placement tags applied to nodes in the node type as key/value pairs, which can be used to indicate where certain services (workload) should run.
        nargs: -1
    --primary=:
        description: Specify if the node type is primary.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --vm-image-offer=: The offer type of the Azure Virtual Machines Marketplace image.
    --vm-image-publisher=: The publisher of the Azure Virtual Machines Marketplace image.
    --vm-image-sku=: The SKU of the Azure Virtual Machines Marketplace image.
    --vm-image-version=: The version of the Azure Virtual Machines Marketplace image.
    --vm-size=: The size of virtual machines in the pool.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
    -n, --name=!: node type name.
completion:
    flag:
        disk-type:
            - Standard_LRS
            - StandardSSD_LRS
            - Premium_LRS
        is-stateless:
            - "true"
            - "false"
        multiple-placement-groups:
            - "true"
            - "false"
        primary:
            - "true"
            - "false"
