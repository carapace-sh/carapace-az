# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get a pipeline run by its run ID.
flags:
    --run-id=!: The pipeline run identifier.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
documentation:
    flag:
        run-id: The pipeline run identifier.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    Get a pipeline run by its run ID.: |-
        az synapse pipeline-run show --workspace-name testsynapseworkspace \
          --run-id "2f7fdb90-5df1-4b8e-ac2f-064cfa58202b"
