# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete an application's password or certificate credentials
flags:
    --cert=: Operate on certificate credentials
    --id=!: identifier uri, application id, or object id
    --key-id=!: credential key id
documentation:
    command: Delete an application's password or certificate credentials.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        cert: |-
            Operate on certificate credentials.

            Default value: False
        change-reference: The related change reference ID for this resource operation.
        id: Identifier uri, application id, or object id.
        key-id: Credential key id.
examples:
    Delete an application's certificate credentials: az ad app credential delete --id 00000000-0000-0000-0000-000000000000 --key-id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx --cert
    Delete an application's password credentials: az ad app credential delete --id 00000000-0000-0000-0000-000000000000 --key-id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
