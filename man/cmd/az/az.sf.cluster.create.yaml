# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new Azure Service Fabric cluster.
flags:
    --certificate-file=: The existing certificate file path for the primary cluster certificate.
    --certificate-output-folder=: The folder of the new certificate file to be created.
    --certificate-password=: The password of the certificate file.
    --certificate-subject-name=: The subject name of the certificate to be created.
    --parameter-file=: The path to the template parameter file.
    --secret-identifier=: The existing Azure key vault secret URL
    --subscription=: Name or ID of subscription.
    --template-file=: The path to the template file.
    --vault-name=: Azure key vault name, it not given it will be the cluster resource group name
    --vault-rg=: Key vault resource group name, if not given it will be cluster resource group name
    --vm-os=: The Operating System of the VMs that make up the cluster.
    --vm-password=: The password of the Vm
    --vm-sku=: VM Sku
    --vm-user-name=: The user name for logging to Vm.
    -c, --cluster-name=: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
    -l, --location=: Location.
    -s, --cluster-size=: The number of nodes in the cluster.
completion:
    flag:
        vm-os:
            - WindowsServer2012R2Datacenter
            - WindowsServer2016Datacenter
            - WindowsServer2016DatacenterwithContainers
            - UbuntuServer1604
            - WindowsServer1709
            - WindowsServer1709withContainers
            - WindowsServer1803withContainers
            - WindowsServer1809withContainers
            - WindowsServer2019Datacenter
            - WindowsServer2019DatacenterwithContainers
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        certificate-file: The existing certificate file path for the primary cluster certificate.
        certificate-password: The password of the certificate file.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        cluster-size: The number of nodes in the cluster. Default are 5 nodes.
        location: |-
            Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` . --os --vm-os The Operating System of the VMs that make up the cluster.

            Default value: WindowsServer2016Datacenter

            Accepted values: UbuntuServer1604, WindowsServer1709, WindowsServer1709withContainers, WindowsServer1803withContainers, WindowsServer1809withContainers, WindowsServer2012R2Datacenter, WindowsServer2016Datacenter, WindowsServer2016DatacenterwithContainers, WindowsServer2019Datacenter, WindowsServer2019DatacenterwithContainers
        parameter-file: The path to the template parameter file.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        secret-identifier: The existing Azure key vault secret URL.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        template-file: The path to the template file.
        vault-name: Azure key vault name, if not given it will be the cluster resource group name.
        vault-rg: Key vault resource group name, if not given it will be cluster resource group name.
        vm-password: The password of the Vm.
        vm-sku: VM Sku.
        vm-user-name: The user name for logging to Vm. Default will be adminuser.
examples:
    Create a cluster with a given size and self-signed certificate that is downloaded locally.: az sf cluster create -g group-name -c cluster1 -l westus --cluster-size 4 --vm-password Password#1234 --certificate-output-folder MyCertificates --certificate-subject-name cluster1
    Use a keyvault certificate and custom template to deploy a cluster.: |-
        az sf cluster create -g group-name -c cluster1 -l westus --template-file template.json \
            --parameter-file parameter.json --secret-identifier https://{KeyVault}.vault.azure.net:443/secrets/{MyCertificate}
