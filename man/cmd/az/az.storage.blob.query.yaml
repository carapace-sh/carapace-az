# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: query
description: Enable users to select/project on blob or blob snapshot data by providing simple query expressions.
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit'
        auth-mode: 'The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE'
        blob-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with `az storage account show`. Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT'
        blob-url: The full endpoint URL to the Blob, including SAS token and snapshot if used. This could be either the primary endpoint, or the secondary endpoint depending on the current `location_mode`.
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING'
        if-match: An ETag value, or the wildcard character (*). Specify this header to perform the operation only if the resource's ETag matches the value specified.
        if-none-match: An ETag value, or the wildcard character (*). Specify this header to perform the operation only if the resource's ETag does not match the value specified. Specify the wildcard character (*) to perform the operation only if the resource does not exist, and fail the operation if it does exist.
        in-escape-char: The string used as an escape character. Default to empty.
        in-has-header: Whether the blob data includes headers in the first line. The default value is False, meaning that the data will be returned inclusive of the first line. If set to True, the data will be returned exclusive of the first line.
        input-format: Serialization type of the data currently stored in the blob. The default is to treat the blob data as CSV data formatted in the default dialect.The blob data will be reformatted according to that profile when blob format is specified. If you choose `json`, please specify `Output Json Text Configuration Arguments` accordingly; If you choose `csv`, please specify `Output Delimited Text Configuration Arguments`.
        out-escape-char: The string used as an escape character. Default to empty.
        out-has-header: Whether the blob data includes headers in the first line. The default value is False, meaning that the data will be returned inclusive of the first line. If set to True, the data will be returned exclusive of the first line.
        output-format: Output serialization type for the data stream. By default the data will be returned as it is represented in the blob. By providing an output format, the blob data will be reformatted according to that profile. If you choose `json`, please specify `Output Json Text Configuration Arguments` accordingly; If you choose `csv`, please specify `Output Delimited Text Configuration Arguments`.
        query-expression: The query expression in SQL. The maximum size of the query expression is 256KiB. For more information about the expression syntax, please see https://learn.microsoft.com/azure/storage/blobs/query-acceleration-sql-reference
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_SAS_TOKEN'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: Request timeout in seconds. Applies to each call to the service.
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --auth-mode=: The mode in which to run the command.
    --blob-endpoint=: Storage data service endpoint.
    --blob-url=: The full endpoint URL to the Blob, including SAS token and snapshot if used.
    --connection-string=: Storage account connection string.
    --if-match=: An ETag value, or the wildcard character (*).
    --if-modified-since=: Commence only if modified since supplied UTC datetime (Y-m-d'T'H:M'Z')
    --if-none-match=: An ETag value, or the wildcard character (*).
    --if-unmodified-since=: Commence only if unmodified since supplied UTC datetime (Y-m-d'T'H:M'Z')
    --in-column-separator=: The string used to separate columns.
    --in-escape-char=: The string used as an escape character.
    --in-has-header=: Whether the blob data includes headers in the first line.
    --in-line-separator=: The string used to separate records.
    --in-quote-char=: The string used to quote a specific field.
    --in-record-separator=: The string used to separate records.
    --input-format=: Serialization type of the data currently stored in the blob.
    --lease-id=: Required if the blob has an active lease.
    --out-column-separator=: The string used to separate columns.
    --out-escape-char=: The string used as an escape character.
    --out-has-header=: Whether the blob data includes headers in the first line.
    --out-line-separator=: The string used to separate records.
    --out-quote-char=: The string used to quote a specific field.
    --out-record-separator=: The string used to separate records.
    --output-format=: Output serialization type for the data stream.
    --query-expression=!: The query expression in SQL.
    --result-file=: Specify the file path to save result.
    --sas-token=: A Shared Access Signature (SAS).
    --subscription=: Name or ID of subscription.
    --tags-condition=: Specify a SQL where clause on blob tags to operate only on blobs with a matching value.
    --timeout=: Request timeout in seconds.
    -c, --container-name=: The container name.
    -n, --name=: The blob name.
completion:
    flag:
        auth-mode:
            - login
            - key
        input-format:
            - csv
            - json
        output-format:
            - csv
            - json
