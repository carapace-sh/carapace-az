# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a route in IoT Hub.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --endpoint-name=!: Name of the routing endpoint.
    --hub-name=!: IoT Hub name.
    --subscription=: Name or ID of subscription.
    -c, --condition=: Condition that is evaluated to apply the routing rule.
    -e, --enabled=:
        description: A boolean indicating whether to enable route to the Iot hub.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --route-name=!: Name of the Route.
    -s, --source-type=!: Source of the route.
completion:
    flag:
        enabled:
            - "true"
            - "false"
        source-type:
            - invalid
            - devicemessages
            - twinchangeevents
            - devicelifecycleevents
            - devicejoblifecycleevents
            - digitaltwinchangeevents
            - deviceconnectionstateevents
