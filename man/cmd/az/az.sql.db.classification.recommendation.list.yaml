# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets the sensitivity labels of a given database.
flags:
    --filter=: An OData filter expression that filters elements in the collection.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --include-disabled-recommendations=: Specifies whether to include disabled recommendations or not.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Azure SQL Database.
    -s, --server=: Name of the Azure SQL Server.
documentation:
    command: List the recommended sensitivity classifications of a given database.
    flag:
        filter: An OData filter expression that filters elements in the collection. Default value is None.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        include-disabled-recommendations: Specifies whether to include disabled recommendations or not. Default value is None.
        name: Name of the Azure SQL Database.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List the recommended sensitivity classifications of a given database.: az sql db classification recommendation list -g mygroup -s myserver -n mydb
