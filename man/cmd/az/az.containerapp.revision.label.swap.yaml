# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: swap
description: Swap a revision label between two revisions with associated traffic weights.
documentation:
    flag:
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --source=!: Source label to be swapped.
    --subscription=: Name or ID of subscription.
    --target=!: Target label to be swapped to.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Containerapp.
