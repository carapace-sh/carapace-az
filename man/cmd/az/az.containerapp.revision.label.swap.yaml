# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: swap
description: Swap a revision label between two revisions with associated traffic weights.
flags:
    --source=!: Source label to be swapped.
    --subscription=: Name or ID of subscription.
    --target=!: Target label to be swapped to.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Containerapp.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source: Source label to be swapped.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target: Target label to be swapped to.
examples:
    Swap a revision label between two revisions.: az containerapp revision label swap -n my-containerapp -g MyResourceGroup --source myLabel1 --target myLabel2
