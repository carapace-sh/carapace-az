# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists all of the private endpoint connections in the specified account.
documentation:
    flag:
        account-name: The name of the Batch account. Required.
        maxresults: The maximum number of items to return in the response. Default value is None.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-name=!: The name of the Batch account.
    --maxresults=: The maximum number of items to return in the response.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of the resource group
