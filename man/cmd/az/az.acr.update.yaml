# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an Azure Container Registry.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        allow-exports: Configure exportPolicy to allow/disallow artifacts from being exported from this registry. Artifacts can be exported via import or transfer operations. For more information, please visit https://aka.ms/acr/export-policy.
        allow-trusted-services: Allow trusted Azure Services to access network restricted registries. For more information, please visit https://aka.ms/acr/trusted-services.
        default-action: Default action to apply when no rule matches. Only applicable to Premium SKU.
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --admin-enabled=:
        description: Indicates whether the admin user is enabled
        nargs: -1
    --allow-exports=:
        description: Configure exportPolicy to allow/disallow artifacts from being exported from this registry.
        nargs: -1
    --allow-metadata-search=:
        description: Enable or disable the metadata-search feature for the registry.
        nargs: -1
    --allow-trusted-services=:
        description: Allow trusted Azure Services to access network restricted registries.
        nargs: -1
    --anonymous-pull-enabled=:
        description: Enable registry-wide pull from unauthenticated clients
        nargs: -1
    --data-endpoint-enabled=:
        description: Enable dedicated data endpoint for client firewall configuration
        nargs: -1
    --default-action=: Default action to apply when no rule matches.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --public-network-enabled=:
        description: Allow public network access for the container registry.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku=: The SKU of the container registry
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
completion:
    flag:
        admin-enabled:
            - "true"
            - "false"
        allow-exports:
            - "true"
            - "false"
        allow-metadata-search:
            - "true"
            - "false"
        allow-trusted-services:
            - "true"
            - "false"
        anonymous-pull-enabled:
            - "true"
            - "false"
        data-endpoint-enabled:
            - "true"
            - "false"
        default-action:
            - Allow
            - Deny
        public-network-enabled:
            - "true"
            - "false"
        sku:
            - Basic
            - Standard
            - Premium
