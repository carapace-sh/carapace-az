# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List group owners.
flags:
    -g, --group=!: group's object id or display name(prefix also works if there is a unique match)
documentation:
    flag:
        group: Group's object id or display name(prefix also works if there is a unique match).
examples:
    List group owners. (autogenerated): az ad group owner list --group MyGroupDisplayName
