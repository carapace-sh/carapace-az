# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new SSH public key resource.
documentation:
    flag:
        encryption-type: 'The encryption type of the SSH keys to be generated. '
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        public-key: SSH public key used to authenticate to a virtual machine through ssh. If this property is not initially provided when the resource is created, the publicKey property will be populated when generateKeyPair is called. If the public key is provided upon resource creation, the provided public key needs to be at least 2048-bit and in ssh-rsa format.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --encryption-type=: The encryption type of the SSH keys to be generated.
    --public-key=: SSH public key used to authenticate to a virtual machine through ssh.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of the SSH public key.
completion:
    flag:
        encryption-type:
            - RSA
            - Ed25519
