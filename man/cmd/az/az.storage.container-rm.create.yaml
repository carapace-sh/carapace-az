# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new container under the specified storage account.
flags:
    --deny-encryption-scope-override=:
        description: Block override of encryption scope from the container default.
        nargs: -1
    --enable-vlw=:
        description: The object level immutability property of the container.
        nargs: -1
    --fail-on-exist=: Throw an exception if the container already exists.
    --metadata=:
        description: Metadata in space-separated key=value pairs.
        nargs: -1
    --public-access=: Specify whether data in the container may be accessed publicly.
    --root-squash=: Enable NFSv3 squash on blob container.
    --storage-account=!: The name or ID of the storage account.
    --subscription=: Name or ID of subscription.
    -d, --default-encryption-scope=: Default the container to use specified encryption scope for all writes.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The container name.
completion:
    flag:
        deny-encryption-scope-override:
            - "true"
            - "false"
        enable-vlw:
            - "true"
            - "false"
        public-access:
            - "off"
            - blob
            - container
        root-squash:
            - NoRootSquash
            - RootSquash
            - AllSquash
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        default-encryption-scope: |-
            Default the container to use specified encryption scope for all writes.

            Accepted values: false, true
        enable-vlw: |-
            The object level immutability property of the container. The property is immutable and can only be set to true at the container creation time. Existing containers must undergo a migration process.

            Accepted values: false, true
        fail-on-exist: |-
            Throw an exception if the container already exists.

            Default value: False
        metadata: Metadata in space-separated key=value pairs. This overwrites any existing metadata.
        name: The container name.
        public-access: |-
            Specify whether data in the container may be accessed publicly.

            Accepted values: blob, container, off
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        root-squash: |-
            Enable NFSv3 squash on blob container.

            Accepted values: AllSquash, NoRootSquash, RootSquash
        storage-account: The name or ID of the storage account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a new container under the specified storage account.: az storage container-rm create --storage-account myaccount --name mycontainer
    Create a new container with metadata and public-access as blob under the specified storage account(account id).: az storage container-rm create --storage-account myaccountid --name mycontainer --public-access blob --metada key1=value1 key2=value2
