# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a bandwidth schedule.
flags:
    --days=!:
        description: The days of the week when this schedule is applicable.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --rate-in-mbps=!: The bandwidth rate in Mbps.
    --start=!: The start time of the schedule in UTC.
    --stop=!: The stop time of the schedule in UTC.
    --subscription=: Name or ID of subscription.
    -d, --device-name=!: The device name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The bandwidth schedule name which needs to be added/updated.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        days: The days of the week when this schedule is applicable.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        device-name: The device name.
        name: The bandwidth schedule name which needs to be added/updated.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        rate-in-mbps: The bandwidth rate in Mbps.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        start: The start time of the schedule in UTC.
        stop: The stop time of the schedule in UTC.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a bandwidth schedule.: az databoxedge bandwidth-schedule create --name "bandwidth-1" --device-name "testedgedevice" --days "Sunday" "Monday" --rate-in-mbps 100 --start "0:0:0" --stop "13:59:0" --resource-group "GroupForEdgeAutomation"
