# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a policy assignment
flags:
    --assign-identity=:
        description: Assigns a system assigned identity to the policy assignment.
        nargs: -1
    --description=: Description of the policy assignment.
    --display-name=: Display name of the policy assignment.
    --identity-scope=: Scope that the system assigned identity can access
    --mi-system-assigned=: Provide this flag to use system assigned identity for policy assignment.
    --mi-user-assigned=: UserAssigned Identity Id to be used for policy assignment.
    --not-scopes=: Space-separated scopes where the policy assignment does not apply.
    --policy=: Name or id of the policy definition.
    --role=: Role name or id that will be assigned to the managed identity
    --scope=: Scope at which this policy assignment subcommand applies.
    --subscription=: Name or ID of subscription.
    -d, --policy-set-definition=: Name or id of the policy set definition.
    -e, --enforcement-mode=: Enforcement mode of the policy assignment, e.g.
    -g, --resource-group=: the resource group where the policy will be applied
    -l, --location=: The location of the policy assignment.
    -n, --name=: Name of the new policy assignment.
    -p, --params=: JSON formatted string or a path to a file or uri with parameter values of the policy rule.
    -s, --sku=: policy sku.
completion:
    flag:
        enforcement-mode:
            - Default
            - DoNotEnforce
        sku:
            - free
            - standard
documentation:
    command: Create a policy assignment.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        assign-identity: Assigns a system assigned identity to the policy assignment. This argument will be deprecated, please use --mi-system-assigned instead
        change-reference: The related change reference ID for this resource operation.
        definition-version: The policy version to assign.
        description: Policy assignment description.
        display-name: The display name of the policy assignment.
        enforcement-mode: Enforcement mode of the policy assignment, e.g. Default, DoNotEnforce. Please visit https://aka.ms/azure-policyAssignment-enforcement-mode for more information.
        identity-scope: Scope that the system assigned identity can access.
        location: The location of the policy assignment. Only required when utilizing managed identity.
        metadata: The policy assignment metadata.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        mi-system-assigned: Provide this flag to use system assigned identity for policy assignment. Check out help for more examples
        mi-user-assigned: UserAssigned Identity Id to be used for policy assignment. Check out help for more examples
        name: The name of the policy assignment.
        non-compliance-messages: The messages that describe why a resource is non-compliant with the policy.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        not-scopes: The policy assignment excluded scopes.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        overrides: The policy override.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        params: The parameter values for the assigned policy rule.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        policy: Name or id of the policy definition. If not provided, a policy set definition parameter must be provided.
        policy-set-definition: Name or id of the policy set definition. If not provided, a policy definition parameter must be provided.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-selectors: The resource selectors list to filter policies by resource properties.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        role: Role name or id that will be assigned to the managed identity.
        scope: Scope at which this policy assignment subcommand applies. Defaults to current context subscription.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a resource policy assignment and provide rule parameter values: 'az Create a resource policy assignment and provide rule parameter values policy assignment create --policy {policyName} -p "{ ''allowedLocations'': { ''value'': [ ''australiaeast'', ''eastus'', ''japaneast'' ] } }"'
    Create a resource policy assignment at scope: 'az policy assignment create --scope "/providers/Microsoft.Management/managementGroups/{managementGroupName}" --policy {policyName} -p "{ ''allowedLocations'': { ''value'': [ ''australiaeast'', ''eastus'', ''japaneast'' ] } }"'
    Create a resource policy assignment with a system assigned identity: az policy assignment create --name myPolicy --policy {policyName} --mi-system-assigned --location eastus
    Create a resource policy assignment with a system assigned identity with Contributor role access to the subscription: az policy assignment create --name myPolicy --policy {policyName} --mi-system-assigned --identity-scope /subscriptions/{subscriptionId} --role Contributor --location eastus
    Create a resource policy assignment with a user assigned identity: az policy assignment create --name myPolicy --policy {policyName} -g MyResourceGroup --mi-user-assigned myAssignedId --location westus
    Create a resource policy assignment with an enforcement mode: az policy assignment create --name myPolicy --policy {policyName} --enforcement-mode DoNotEnforce
