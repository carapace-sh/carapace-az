# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all recovery points of a backed up item.
documentation:
    flag:
        backup-management-type: 'Specify the backup management type. Define how Azure Backup manages the backup of entities within the ARM resource. For eg: AzureWorkloads refers to workloads installed within Azure VMs, AzureStorage refers to entities within Storage account. Required only if friendly name is used as Container name.'
        container-name: Name of the backup container. Accepts 'Name' or 'FriendlyName' from the output of az backup container list command. If 'FriendlyName' is passed then BackupManagementType is required.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-tier: ' The destination/target tier to which a particular recovery point has to be moved.'
        tier: ' Provide ''tier'' parameter to filter recovery points.'
        workload-type: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup. 'MSSQL' and 'SQLDataBase' can be used interchangeably for SQL in Azure VM, as can 'SAPHANA' and 'SAPHanaDatabase' for SAP HANA in Azure VM.
flags:
    --backup-management-type=: Specify the backup management type.
    --end-date=: The end date of the range in UTC (d-m-Y).
    --is-ready-for-move=:
        description: Use this flag to retrieve the recoverypoints that are ready to be moved to destination-tier.
        nargs: -1
    --recommended-for-archive=: Use this flag to retrieve recommended archivable recoverypoints.
    --start-date=: The start date of the range in UTC (d-m-Y).
    --subscription=: Name or ID of subscription.
    --target-tier=: The destination/target tier to which a particular recovery point has to be moved.
    --tier=: Provide 'tier' parameter to filter recovery points.
    --use-secondary-region=: Use this flag to list recoverypoints in secondary region.
    --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
    -c, --container-name=!: Name of the backup container.
    -g, --resource-group=!: Name of resource group.
    -i, --item-name=!: Name of the backed up item.
    -v, --vault-name=!: Name of the Recovery services vault.
completion:
    flag:
        backup-management-type:
            - AzureIaasVM
            - AzureStorage
            - AzureWorkload
        is-ready-for-move:
            - "true"
            - "false"
        target-tier:
            - VaultArchive
        tier:
            - VaultStandard
            - Snapshot
            - VaultArchive
            - VaultStandardRehydrated
            - SnapshotAndVaultStandard
            - SnapshotAndVaultArchive
        workload-type:
            - VM
            - AzureFileShare
            - SAPHANA
            - MSSQL
            - SAPHanaDatabase
            - SQLDataBase
