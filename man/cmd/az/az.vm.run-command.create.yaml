# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: The operation to create the run command.
documentation:
    flag:
        async-execution: Optional. If set to true, provisioning will complete as soon as the script starts and will not wait for script to complete.
        command-id: Specify a command id of predefined script. All command ids can be listed using "list" command.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        protected-parameters: Set custom parameters in a name-value pair. These parameters will be encrypted during transmission and will not be logged.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        run-as-password: 'Password if needed for using run-as-user parameter. It will be encrypted and not logged. '
        run-as-user: By default script process runs under system/root user. Specify custom user to host the process.
        script-uri: 'Contain a uri to the script to execute on the VM. Uri can be any link accessible from the VM or a storage blob without SAS. If subscription has access to the storage blob, then SAS will be auto-generated. '
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --async-execution=:
        description: Optional.
        nargs: -1
    --command-id=: Specify a command id of predefined script.
    --error-blob-uri=: Specify the Azure storage blob where script error stream will be uploaded.
    --name=!: The name of the virtual machine run command.
    --no-wait=: Do not wait for the long-running operation to finish.
    --output-blob-uri=: Specify the Azure storage blob (SAS URI) where script output stream will be uploaded.
    --parameters=:
        description: Set custom parameters in a name-value pair.
        nargs: -1
    --protected-parameters=:
        description: Set custom parameters in a name-value pair.
        nargs: -1
    --run-as-password=: Password if needed for using run-as-user parameter.
    --run-as-user=: By default script process runs under system/root user.
    --script-uri=: Contain a uri to the script to execute on the VM.
    --script=: Contain the powershell or bash script to execute on the VM.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --timeout-in-seconds=: The timeout in seconds to execute the run command.
    --vm-name=!: The name of the virtual machine
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
completion:
    flag:
        async-execution:
            - "true"
            - "false"
