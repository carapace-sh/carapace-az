# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the entire set of tags on a specific resource.
documentation:
    flag:
        resource-id: The resource identifier for the tagged entity. A resource, a resource group or a subscription may be tagged.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --resource-id=: The resource identifier for the tagged entity.
    --subscription=: Name or ID of subscription.
