# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the entire set of tags on a specific resource.
flags:
    --resource-id=: The resource identifier for the tagged entity.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        resource-id: The resource identifier for the entity being tagged. A resource, a resource group or a subscription may be tagged.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List the entire set of tags on a resource group.: az tag list --resource-id /subscriptions/{sub-id}/resourcegroups/{rg}
    List the entire set of tags on a resource.: az tag list --resource-id /subscriptions/{sub-id}/resourcegroups/{rg}/providers/Microsoft.Compute/virtualMachines/{vmName}
    List the entire set of tags on a subscription.: az tag list --resource-id /subscriptions/{sub-id}
