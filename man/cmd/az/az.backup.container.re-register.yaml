# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: re-register
description: Reset the registration details for a given container.
flags:
    --backup-management-type=: Specify the backup management type.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
    -c, --container-name=: Name of the backup container.
    -g, --resource-group=: Name of resource group.
    -v, --vault-name=: Name of the Recovery services vault.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        backup-management-type:
            - AzureIaasVM
            - AzureStorage
            - AzureWorkload
        workload-type:
            - MSSQL
            - SAPHANA
            - SAPASE
            - SAPHanaDatabase
            - SQLDataBase
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-management-type: |-
            Specify the backup management type. Define how Azure Backup manages the backup of entities within the ARM resource. For eg: AzureWorkloads refers to workloads installed within Azure VMs, AzureStorage refers to entities within Storage account. Required only if friendly name is used as Container name.

            Default value: AzureWorkload

            Accepted values: AzureIaasVM, AzureStorage, AzureWorkload
        change-reference: The related change reference ID for this resource operation.
        container-name: Name of the backup container. Accepts 'Name' or 'FriendlyName' from the output of az backup container list command. If 'FriendlyName' is passed then BackupManagementType is required.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Recovery services vault.
        workload-type: |-
            Specify the type of applications within the Resource which should be discovered and protected by Azure Backup. 'MSSQL' and 'SQLDataBase' can be used interchangeably for SQL in Azure VM, as can 'SAPHANA' and 'SAPHanaDatabase' for SAP HANA in Azure VM.

            Accepted values: MSSQL, SAPASE, SAPAseDatabase, SAPHANA, SAPHanaDBInstance, SAPHanaDatabase, SQLDataBase
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    ? Reset the registration details for a given container. To be used only in error scenarios as specified here (https://learn.microsoft.com/azure/backup/backup-sql-server-azure-troubleshoot#re-registration-failures). Understand the failure symptoms and causes before attempting re-registration.
    : az backup container re-register --resource-group MyResourceGroup --vault-name MyVault --container-name MyContainer --workload-type MSSQL --backup-management-type AzureWorkload --yes
