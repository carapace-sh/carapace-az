# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: renew
description: Regenerate either the primary or secondary key for use with the Maps APIs.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --key=!: Whether the operation refers to the primary or secondary key
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Resource group name
    -n, --name=!: The name of the maps account
completion:
    flag:
        key:
            - primary
            - secondary
