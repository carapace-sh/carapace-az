# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: renew
description: Regenerate either the primary or secondary key for use with the Maps APIs.
flags:
    --key=!: Whether the operation refers to the primary or secondary key
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Resource group name
    -n, --name=!: The name of the maps account
completion:
    flag:
        key:
            - primary
            - secondary
documentation:
    command: Regenerate either the primary or secondary key for use with the Maps APIs. The old key will stop working immediately.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        key: |-
            Whether the operation refers to the primary or secondary key.

            Accepted values: primary, secondary
        resource-group: Resource group name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Renew: az maps account keys renew --name "myMapsAccount" --key "primary" --resource-group "myResourceGroup"
