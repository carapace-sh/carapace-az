# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates an application package record.
flags:
    --application-name=!: The name of the application.
    --package-file=!: The path of the application package in zip format
    --subscription=: Name or ID of subscription.
    --version-name=!: The version name of the application.
    -g, --resource-group=!: Name of the resource group
    -n, --name=!: Name of the Batch account.
documentation:
    command: Create a Batch application package record and activate it.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        application-name: The name of the application.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the Batch account.
        package-file: The path of the application package in zip format.
        resource-group: Name of the resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        version-name: The version name of the application.
examples:
    Create a Batch application package record and activate it.: az batch application package create -g rg -n batch --application-name myapp --version 1.0 --package-file PackageFilePath
