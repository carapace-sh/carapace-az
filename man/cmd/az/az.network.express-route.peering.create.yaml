# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create peering settings for an ExpressRoute circuit.
documentation:
    flag:
        advertised-public-prefixes: Space-separated list of prefixes to be advertised through the BGP peering.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ip-version: 'The IP version to update Microsoft Peering settings for. Allowed values: IPv4, IPv6. Default: IPv4.'
        peering-type: 'BGP peering type for the circuit.  Allowed values: AzurePrivatePeering, AzurePublicPeering, MicrosoftPeering.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        routing-registry-name: 'Internet Routing Registry / Regional Internet Registry. Allowed values: AFRINIC, ALTDB, APNIC, ARIN, LACNIC, LEVEL3, RADB, RIPENCC.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --advertised-public-prefixes=:
        description: Space-separated list of prefixes to be advertised through the BGP peering.
        nargs: -1
    --circuit-name=!: ExpressRoute circuit name.
    --customer-asn=: Autonomous system number of the customer.
    --ip-version=: The IP version to update Microsoft Peering settings for.
    --legacy-mode=: Integer representing the legacy mode of the peering.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --peer-asn=: Autonomous system number of the customer/connectivity provider.
    --peering-type=: BGP peering type for the circuit.
    --primary-peer-subnet=: /30(ipv4) or /126(ipv6) subnet used to configure IP addresses for primary interface.
    --route-filter=: Name or ID of a route filter to apply to the peering settings.
    --routing-registry-name=: Internet Routing Registry / Regional Internet Registry.
    --secondary-peer-subnet=: /30(ipv4) or /126(ipv6) subnet used to configure IP addresses for secondary interface.
    --shared-key=: Key for generating an MD5 for the BGP session.
    --subscription=: Name or ID of subscription.
    --vlan-id=: Identifier used to identify the customer.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        peering-type:
            - AzurePrivatePeering
            - AzurePublicPeering
            - MicrosoftPeering
        routing-registry-name:
            - ARIN
            - APNIC
            - AFRINIC
            - LACNIC
            - RIPENCC
            - RADB
            - ALTDB
            - LEVEL3
