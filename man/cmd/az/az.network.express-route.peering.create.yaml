# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create peering settings for an ExpressRoute circuit.
flags:
    --advertised-public-prefixes=:
        description: Space-separated list of prefixes to be advertised through the BGP peering.
        nargs: -1
    --circuit-name=!: ExpressRoute circuit name.
    --customer-asn=: Autonomous system number of the customer.
    --ip-version=: The IP version to update Microsoft Peering settings for.
    --legacy-mode=: Integer representing the legacy mode of the peering.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --peer-asn=: Autonomous system number of the customer/connectivity provider.
    --peering-type=: BGP peering type for the circuit.
    --primary-peer-subnet=: /30(ipv4) or /126(ipv6) subnet used to configure IP addresses for primary interface.
    --route-filter=: Name or ID of a route filter to apply to the peering settings.
    --routing-registry-name=: Internet Routing Registry / Regional Internet Registry.
    --secondary-peer-subnet=: /30(ipv4) or /126(ipv6) subnet used to configure IP addresses for secondary interface.
    --shared-key=: Key for generating an MD5 for the BGP session.
    --subscription=: Name or ID of subscription.
    --vlan-id=: Identifier used to identify the customer.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        peering-type:
            - AzurePrivatePeering
            - AzurePublicPeering
            - MicrosoftPeering
        routing-registry-name:
            - ARIN
            - APNIC
            - AFRINIC
            - LACNIC
            - RIPENCC
            - RADB
            - ALTDB
            - LEVEL3
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        advertised-public-prefixes: Space-separated list of prefixes to be advertised through the BGP peering.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        circuit-name: ExpressRoute circuit name.
        customer-asn: Autonomous system number of the customer.
        ip-version: |-
            The IP version to update Microsoft Peering settings for. Allowed values: IPv4, IPv6. Default: IPv4.

            Default value: IPv4
        legacy-mode: Integer representing the legacy mode of the peering.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        peer-asn: Autonomous system number of the customer/connectivity provider.
        peering-type: |-
            BGP peering type for the circuit.  Allowed values: AzurePrivatePeering, AzurePublicPeering, MicrosoftPeering.

            Accepted values: AzurePrivatePeering, AzurePublicPeering, MicrosoftPeering
        primary-peer-subnet: /30(ipv4) or /126(ipv6) subnet used to configure IP addresses for primary interface.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        route-filter: Name or ID of a route filter to apply to the peering settings.
        routing-registry-name: |-
            Internet Routing Registry / Regional Internet Registry. Allowed values: AFRINIC, ALTDB, APNIC, ARIN, LACNIC, LEVEL3, RADB, RIPENCC.

            Accepted values: AFRINIC, ALTDB, APNIC, ARIN, LACNIC, LEVEL3, RADB, RIPENCC
        secondary-peer-subnet: /30(ipv4) or /126(ipv6) subnet used to configure IP addresses for secondary interface.
        shared-key: Key for generating an MD5 for the BGP session.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vlan-id: Identifier used to identify the customer.
examples:
    Create Microsoft Peering settings with IPv4 configuration.: az network express-route peering create -g MyResourceGroup --circuit-name MyCircuit --peering-type MicrosoftPeering --peer-asn 10002 --vlan-id 103 --primary-peer-subnet 101.0.0.0/30 --secondary-peer-subnet 102.0.0.0/30 --advertised-public-prefixes 101.0.0.0/30
    Create Microsoft Peering settings with IPv6 configuration.: az network express-route peering create -g MyResourceGroup --circuit-name MyCircuit --peering-type AzurePrivatePeering --peer-asn 10002 --vlan-id 103 --ip-version ipv6 --primary-peer-subnet 2002:db00::/126 --secondary-peer-subnet 2003:db00::/126
    Create peering settings for an ExpressRoute circuit. (autogenerated): az network express-route peering create --circuit-name MyCircuit --peer-asn 10002 --peering-type AzurePublicPeering --primary-peer-subnet 101.0.0.0/30 --resource-group MyResourceGroup --secondary-peer-subnet 102.0.0.0/30 --shared-key Abc123 --vlan-id 103
