# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: spot-placement-recommender
description: Generate placement scores for Spot VM skus.
documentation:
    flag:
        desired-locations: The desired regions  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        desired-sizes: The desired resource SKUs.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --availability-zones=:
        description: Defines if the scope is zonal or regional.
        nargs: -1
    --desired-count=!: Desired instance count per region/zone based on the scope.
    --desired-locations=!:
        description: The desired regions  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --desired-sizes=!:
        description: The desired resource SKUs.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -l, --location=: the Azure region where the recommendation will be generated
completion:
    flag:
        availability-zones:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
