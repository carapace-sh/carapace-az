# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: import
description: Import a new API
documentation:
    flag:
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        api-revision: Describes the Revision of the Api. If no value is provided, default revision 1 is created.
        api-version: Describes the Version of the Api. If you add a version to a non-versioned API, an Original version will be automatically created and will respond on the default URL
        description: Description of the API. May include HTML formatting tags.
        path: Required. Relative URL uniquely identifying this API and all of its resource paths within the API Management service instance.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        service-url: Absolute URL of the backend service implementing this API. Cannot be more than 2000 characters long.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --api-id=: API identifier.
    --api-revision=: Describes the Revision of the Api.
    --api-type=: The type of the API.
    --api-version-set-id=: Describes the Version Set to be used with the API
    --api-version=: Describes the Version of the Api.
    --description=: Description of the API.
    --display-name=: Display name of this API.
    --no-wait=: Do not wait for the long-running operation to finish.
    --path=!: Required.
    --protocols=:
        description: Describes on which protocols(one or more) the operations in this API can be invoked.
        nargs: -1
    --service-url=: Absolute URL of the backend service implementing this API.
    --soap-api-type=: The type of API when file format is WSDL.
    --specification-format=!: Specify the format of the imported API.
    --specification-path=: File path specified to import the API.
    --specification-url=: Url specified to import the API.
    --subscription-key-header-name=: Specifies the subscription key header name.
    --subscription-key-query-param-name=: Specifies the subscription key query string parameter name.
    --subscription-required=:
        description: If true, the API requires a subscription key on requests.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --wsdl-endpoint-name=: Local name of WSDL Endpoint (port) to be imported.
    --wsdl-service-name=: Local name of WSDL Service to be imported.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the api management service instance
completion:
    flag:
        api-type:
            - http
            - soap
            - websocket
            - graphql
        protocols:
            - http
            - https
            - ws
            - wss
        specification-format:
            - Wadl
            - Swagger
            - OpenApi
            - OpenApiJson
            - Wsdl
            - GraphQL
        subscription-required:
            - "true"
            - "false"
