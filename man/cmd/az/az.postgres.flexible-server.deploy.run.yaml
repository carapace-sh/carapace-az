# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: run
description: Run an existing workflow in your github repository
documentation:
    flag:
        branch: The name of the branch you want upload github action file. The default will be your current branch.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --action-name=!: The name of the github action
    --branch=!: The name of the branch you want upload github action file.
    --subscription=: Name or ID of subscription.
