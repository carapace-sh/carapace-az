# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: run
description: Run an existing workflow in your github repository
flags:
    --action-name=!: The name of the github action
    --branch=!: The name of the branch you want upload github action file.
    --subscription=: Name or ID of subscription.
documentation:
    command: Run an existing workflow in your github repository.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        action-name: The name of the github action.
        branch: The name of the branch you want upload github action file. The default will be your current branch.
        change-reference: The related change reference ID for this resource operation.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Run an existing workflow in your github repository: az postgres flexible-server deploy run --action-name testaction --branch userbranch
