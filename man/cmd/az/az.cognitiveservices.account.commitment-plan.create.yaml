# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a commitment plan for Azure Cognitive Services account.
flags:
    --auto-renew=!:
        description: A boolean indicating whether to apply auto renew.
        nargs: -1
    --commitment-plan-name=!: Cognitive Services account commitment plan name
    --current-count=: Cognitive Services account commitment plan current commitment period count.
    --current-tier=: Cognitive Services account commitment plan current commitment period tier.
    --hosting-model=!: Cognitive Services account hosting model
    --next-count=: Cognitive Services account commitment plan next commitment period count.
    --next-tier=: Cognitive Services account commitment plan next commitment period tier.
    --plan-type=!: Cognitive Services account commitment plan type
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: cognitive service account name
completion:
    flag:
        auto-renew:
            - "true"
            - "false"
        hosting-model:
            - Web
            - ConnectedContainer
            - DisconnectedContainer
            - ProvisionedWeb
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auto-renew: |-
            A boolean indicating whether to apply auto renew.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        commitment-plan-name: Cognitive Services account commitment plan name.
        current-count: Cognitive Services account commitment plan current commitment period count.
        current-tier: Cognitive Services account commitment plan current commitment period tier.
        hosting-model: |-
            Cognitive Services account hosting model.

            Accepted values: ConnectedContainer, DisconnectedContainer, ProvisionedWeb, Web
        name: Cognitive service account name.
        next-count: Cognitive Services account commitment plan next commitment period count.
        next-tier: Cognitive Services account commitment plan next commitment period tier.
        plan-type: Cognitive Services account commitment plan type.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a commitment plan for Azure Cognitive Services account.: az cognitiveservices account commitment-plan create -g yuanyang-test-sdk -n yytest-ta --commitment-plan-name "plan" --hosting-model "Web" --plan-type "TA" --auto-renew false --current-tier "T1" --next-tier "T2"
