# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a Data Lake Store account.
documentation:
    flag:
        encryption-type: Indicates what type of encryption to provision the account with. By default, encryption is ServiceManaged. If no encryption is desired, it must be explicitly set with the --disable-encryption flag.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --default-group=: Name of the default group to give permissions to for freshly created files and folders in the Data Lake Store account.
    --disable-encryption=: Indicates that the account will not have any form of encryption applied to it.
    --encryption-type=: Indicates what type of encryption to provision the account with.
    --key-name=: Key name for the user-assigned encryption type.
    --key-vault-id=: Key vault for the user-assigned encryption type.
    --key-version=: Key version for the user-assigned encryption type.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tier=: The desired commitment tier for this account to use.
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
    -n, --account=!: Name of the Data Lake Store account.
completion:
    flag:
        encryption-type:
            - UserManaged
            - ServiceManaged
        tier:
            - Consumption
            - Commitment_1TB
            - Commitment_10TB
            - Commitment_100TB
            - Commitment_500TB
            - Commitment_1PB
            - Commitment_5PB
