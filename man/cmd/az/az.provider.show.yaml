# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets the specified resource provider.
documentation:
    flag:
        expand: The $expand query parameter. For example, to include property aliases in response, use $expand=resourceTypes/aliases. Default value is None.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --expand=: The $expand query parameter.
    --subscription=: Name or ID of subscription.
    -n, --namespace=!: the resource namespace, aka 'provider'
