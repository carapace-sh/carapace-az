# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: get-sas-urls
description: Lists storage container URLs with shared access signatures (SAS) for uploading and downloading Asset content.
flags:
    --expiry=: Specifies the UTC datetime (Y-m-d'T'H:M:S'Z') at which the SAS becomes invalid.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --permissions=: The permissions to set on the SAS URL.
    --subscription=: Name or ID of subscription.
    -a, --account-name=: The name of the Azure Media Services account.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the asset.
completion:
    flag:
        permissions:
            - Read
            - ReadWrite
            - ReadWriteDelete
documentation:
    command: Lists storage container URLs with shared access signatures (SAS) for uploading and downloading Asset content. The signatures are derived from the storage account keys.
    flag:
        account-name: The name of the Azure Media Services account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        expiry: |-
            Specifies the UTC datetime (Y-m-d'T'H:M:S'Z') at which the SAS becomes invalid. This must be less than 24 hours from the current time.

            Default value: 2026-07-01 10:12:39.948390
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the asset.
        permissions: |-
            The permissions to set on the SAS URL.

            Default value: Read

            Accepted values: Read, ReadWrite, ReadWriteDelete
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
