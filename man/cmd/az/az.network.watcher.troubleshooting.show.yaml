# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the results of the last troubleshooting operation.
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --resource=!: Name or ID of the resource to troubleshoot.
    --subscription=: Name or ID of subscription.
    --watcher-rg=: Name of the resource group the watcher is in.
    -g, --resource-group=: Name of resource group.
    -t, --resource-type=: The resource type.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        resource-type:
            - vnetGateway
            - vpnConnection
documentation:
    flag:
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource: Name or ID of the resource to troubleshoot.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: |-
            The resource type.

            Accepted values: vnetGateway, vpnConnection
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        watcher-rg: Name of the resource group the watcher is in.
examples:
    Show the results or status of a troubleshooting operation for a Vnet Gateway.: az network watcher troubleshooting show -g MyResourceGroup --resource MyVnetGateway --resource-type vnetGateway
