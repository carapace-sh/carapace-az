# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows a single aggregated recommendation of yours IoT Security solution.
flags:
    --solution-name=!: Name of the IoT Security solution
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        name: Name of the resource to be fetched.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        solution-name: Name of the IoT Security solution.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get an IoT Security solution aggregated recommendation.: az security iot-recommendations show --solution-name 'IoT-Hub1' --resource-group 'rg1' --name 'IoT_PermissiveFirewallPolicy'
