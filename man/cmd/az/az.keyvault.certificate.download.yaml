# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: download
description: Download a certificate from a KeyVault.
documentation:
    flag:
        encoding: Encoding of the certificate. DER will create a binary DER formatted x509 certificate, and PEM will create a base64 PEM x509 certificate.
        id: Id of the certificate. If specified all other 'Id' arguments should be omitted.
        name: Name of the certificate. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Key Vault. Required if --id is not specified
        version: The certificate version. If omitted, uses the latest version.
flags:
    --id=: Id of the certificate.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Key Vault.
    -e, --encoding=: Encoding of the certificate.
    -f, --file=!: File to receive the binary certificate contents.
    -n, --name=: Name of the certificate.
    -v, --version=: The certificate version.
completion:
    flag:
        encoding:
            - PEM
            - DER
