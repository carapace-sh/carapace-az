# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a policy exemption.
flags:
    --description=: Description of policy exemption.
    --display-name=: Display name of the policy exemption.
    --expires-on=: The expiration date and time (in UTC ISO 8601 format yyyy-MM-ddTHH:mm:ssZ) of the policy exemption.
    --metadata=:
        description: Metadata in space-separated key=value pairs.
        nargs: -1
    --scope=: Scope to which this policy exemption applies.
    -a, --policy-assignment=: The referenced policy assignment Id for the policy exemption.
    -e, --exemption-category=: The policy exemption category of the policy exemption
    -g, --resource-group=: the resource group where the policy will be applied
    -n, --name=!: Name of the new policy exemption.
    -r, --policy-definition-reference-ids=:
        description: The policy definition reference ids to exempt in the initiative (policy set).
        nargs: -1
completion:
    flag:
        exemption-category:
            - Waiver
            - Mitigated
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        assignment-scope-validation: |-
            The assignment scope validation.

            Default value: Default

            Accepted values: Default, DoNotValidate
        change-reference: The related change reference ID for this resource operation.
        description: Policy exemption description.
        display-name: The display name of the policy exemption.
        exemption-category: |-
            The policy exemption category.

            Accepted values: Mitigated, Waiver
        expires-on: Breaking change The expiration date and time.
        metadata: The policy exemption metadata.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the policy exemption.
        policy-assignment: The policy assignment to exempt.
        policy-definition-reference-ids: The policy definition reference IDs.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-selectors: The resource selectors list to filter policies by resource properties.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        scope: The scope of the policy assignment.
examples:
    Create a policy exemption in a management group: az policy exemption create -n exemptTestVM --policy-assignment "/providers/Microsoft.Management/managementGroups/{managementGroupName}/providers/Microsoft.Authorization/policyAssignments/limitVMSku" --exemption-category "Waiver" --scope "/providers/Microsoft.Management/managementGroups/{managementGroupName}"
    Create a policy exemption in default subscription: az policy exemption create -n exemptTestVM --policy-assignment "/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyAssignments/limitVMSku" --exemption-category "Waiver"
    Create a policy exemption in the resource group: az policy exemption create -n exemptTestVM --policy-assignment "/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyAssignments/limitVMSku" --exemption-category "Waiver" --resource-group "myResourceGroup"
