# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a certificate from the Container Apps environment.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -c, --certificate=: Name or resource id of the certificate.
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location of resource.
    -n, --name=: Name of the Container Apps environment.
    -t, --thumbprint=: Thumbprint of the certificate.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        certificate: Name or resource id of the certificate.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location of resource. Examples: eastus2, northeurope.'
        name: Name of the Container Apps environment.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        thumbprint: Thumbprint of the certificate.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete a certificate from the Container Apps environment by certificate id: az containerapp env certificate delete -g MyResourceGroup --name MyEnvironment --certificate MyCertificateId
    Delete a certificate from the Container Apps environment by certificate name: az containerapp env certificate delete -g MyResourceGroup --name MyEnvironment --certificate MyCertificateName
    Delete all certificates that have a matching thumbprint from the Container Apps environment: az containerapp env certificate delete -g MyResourceGroup --name MyEnvironment --thumbprint MyCertificateThumbprint
