# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore an API Management service to the configured storage account
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --backup-name=!: The name of the backup file to restore.
    --no-wait=: Do not wait for the long-running operation to finish.
    --storage-account-container=!: The name of the storage account container used to retrieve the backup from.
    --storage-account-key=!: The access key of the storage account used to retrieve the backup from.
    --storage-account-name=!: The name of the storage account used to retrieve the backup from.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the api management service instance
