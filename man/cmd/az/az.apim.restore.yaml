# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore an API Management service to the configured storage account
flags:
    --backup-name=!: The name of the backup file to restore.
    --no-wait=: Do not wait for the long-running operation to finish.
    --storage-account-container=!: The name of the storage account container used to retrieve the backup from.
    --storage-account-key=!: The access key of the storage account used to retrieve the backup from.
    --storage-account-name=!: The name of the storage account used to retrieve the backup from.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the api management service instance
documentation:
    command: Restores a backup of an API Management service created using the ApiManagementService_Backup operation on the current service. This is a long running operation and could take several minutes to complete.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-name: The name of the backup file to restore. --container-name --storage-account-container The name of the storage account container used to retrieve the backup from.
        change-reference: The related change reference ID for this resource operation.
        name: The name of the api management service instance.
        no-wait: Do not wait for the long-running operation to finish.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        storage-account-key: The access key of the storage account used to retrieve the backup from.
        storage-account-name: The name of the storage account used to retrieve the backup from.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Restores a backup of the API Management service instance: az apim restore --name MyApim -g MyResourceGroup --backup-name myBackup              --storage-account-name mystorageaccount --storage-account-container backups              --storage-account-key Ay2ZbdxLnD4OJPT29F6jLPkB6KynOzx85YCObhrw==
