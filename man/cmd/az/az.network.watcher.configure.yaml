# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: configure
description: Configure the Network Watcher service for different regions.
flags:
    --enabled=:
        description: Enabled status of Network Watcher in the specified regions.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -l, --locations=!:
        description: Location.
        nargs: -1
completion:
    flag:
        enabled:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        enabled: |-
            Enabled status of Network Watcher in the specified regions.

            Accepted values: false, true
        locations: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. Required when enabling new regions. When a previously disabled region is enabled to use Network Watcher, a Network Watcher resource will be created in this resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Configure Network Watcher for the West US region.: az network watcher configure -g NetworkWatcherRG  -l westus --enabled true
