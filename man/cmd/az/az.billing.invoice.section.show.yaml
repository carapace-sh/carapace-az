# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get an invoice section by its ID.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --profile-name=!: The ID that uniquely identifies a billing profile.
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies an invoice section.
documentation:
    command: |-
        Command group 'billing invoice section' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account. --invoice-section-name --name -n The ID that uniquely identifies an invoice section.
        profile-name: The ID that uniquely identifies a billing profile.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show an invoice section: az billing invoice section show --account-name "{billingAccountName}" --profile-name "{billingProfileName}" --name "{invoiceSectionName}"
