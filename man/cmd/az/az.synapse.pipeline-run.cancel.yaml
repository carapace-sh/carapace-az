# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: cancel
description: Cancel a pipeline run by its run ID.
flags:
    --is-recursive=:
        description: If true, cancel all the Child pipelines that are triggered by the current pipeline.
        nargs: -1
    --run-id=!: The pipeline run identifier.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        is-recursive:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        is-recursive: |-
            If true, cancel all the Child pipelines that are triggered by the current pipeline.

            Accepted values: false, true
        run-id: The pipeline run identifier.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Cancel a pipeline run by its run ID.: |-
        az synapse pipeline-run cancel --workspace-name testsynapseworkspace \
          --run-id "16ac5348-ff82-4f95-a80d-638c1d47b721"
