# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: cancel
description: Cancel a pipeline run by its run ID.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --is-recursive=:
        description: If true, cancel all the Child pipelines that are triggered by the current pipeline.
        nargs: -1
    --run-id=!: The pipeline run identifier.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        is-recursive:
            - "true"
            - "false"
