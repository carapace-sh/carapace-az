# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: build
description: Build a Bicep file.
flags:
    --no-restore=: When set, builds the bicep file without restoring external modules.
    --outdir=: When set, saves the output at the specified directory.
    --outfile=: When set, saves the output as the specified file path.
    --stdout=: When set, prints all output to stdout instead of corresponding files.
    --subscription=: Name or ID of subscription.
    -f, --file=!: The path to the Bicep file to build in the file system.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        file: The path to the Bicep file to build in the file system.
        no-restore: When set, builds the bicep file without restoring external modules.
        outdir: When set, saves the output at the specified directory.
        outfile: When set, saves the output as the specified file path.
        stdout: When set, prints all output to stdout instead of corresponding files.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Build a Bicep file and print all output to stdout.: az bicep build --file {bicep_file} --stdout
    Build a Bicep file and save the result to the specified directory.: az bicep build --file {bicep_file} --outdir {out_dir}
    Build a Bicep file and save the result to the specified file.: az bicep build --file {bicep_file} --outfile {out_file}
    Build a Bicep file without restoring external modules.: az bicep build --file {bicep_file} --no-restore
    Build a Bicep file.: az bicep build --file {bicep_file}
