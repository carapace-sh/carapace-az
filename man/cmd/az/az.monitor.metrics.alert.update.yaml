# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a metric-based alert rule.
flags:
    --add-actions=:
        description: Add an action group and optional webhook properties to fire when the alert is triggered.
        nargs: -1
    --add-conditions=:
        description: Add a condition which triggers the rule.
        nargs: -1
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --auto-mitigate=:
        description: Automatically resolve the alert.
        nargs: -1
    --description=: Free-text description of the rule.
    --enabled=:
        description: Whether the metric alert rule is enabled.
        nargs: -1
    --evaluation-frequency=: Frequency with which to evaluate the rule in `##h##m##s` format.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --remove-actions=:
        description: Space-separated list of action group names to remove.
        nargs: -1
    --remove-conditions=:
        description: Space-separated list of condition names to remove.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --scopes=:
        description: Space-separated list of scopes the rule applies to.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --severity=: Severity of the alert from 0 (critical) to 4 (verbose).
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --window-size=: Time over which to aggregate metrics in `##h##m##s` format.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the alert rule.
completion:
    flag:
        auto-mitigate:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        add-action: '``` argument.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        add-actions: |-
            Add an action group and optional webhook properties to fire when the alert is triggered.

            Usage: --add-action ACTION_GROUP_NAME_OR_ID [KEY=VAL [KEY=VAL ...]]

            Multiple action groups can be specified by using more than one `--add-action` argument.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        add-condition: '``` argument.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        add-conditions: |-
            Add a condition which triggers the rule.

            Usage: --add-condition {avg,min,max,total,count} [NAMESPACE.]METRIC
            [{=,!=,>,>=,<,<=} THRESHOLD]
            [{>,><,<} dynamic SENSITIVITY VIOLATIONS of EVALUATIONS [since DATETIME]]
            [where DIMENSION {includes,excludes} VALUE [or VALUE ...]
            [and   DIMENSION {includes,excludes} VALUE [or VALUE ...] ...]]

            Sensitivity can be 'low', 'medium', 'high'.

            Violations can be the number of violations to trigger an alert. It should be smaller or equal to evaluation.

            Evaluations can be the number of evaluation periods for dynamic threshold.

            Datetime can be the date from which to start learning the metric historical data and calculate the dynamic thresholds (in ISO8601 format).

            Dimensions can be queried by adding the 'where' keyword and multiple dimensions can be queried by combining them with the 'and' keyword.

            Values for METRIC, DIMENSION and appropriate THRESHOLD values can be obtained from `az monitor metrics list-definitions` command.

            Due to server limitation, when an alert rule contains multiple criterias, the use of dimensions is limited to one value per dimension within each criterion.

            Multiple conditions can be specified by using more than one `--add-condition` argument.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        auto-mitigate: |-
            Automatically resolve the alert.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        change-reference: The related change reference ID for this resource operation.
        description: Free-text description of the rule.
        enabled: |-
            Whether the metric alert rule is enabled.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        evaluation-frequency: 'Frequency with which to evaluate the rule in ``` ##h##m##s ``` format.'
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the alert rule.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        remove-actions: Space-separated list of action group names to remove.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remove-conditions: Space-separated list of condition names to remove.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scopes: Space-separated list of scopes the rule applies to. The resources specified in this parameter must be of the same type and exist in the same location.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        severity: Severity of the alert from 0 (critical) to 4 (verbose).
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        window-size: 'Time over which to aggregate metrics in ``` ##h##m##s ``` format.'
examples:
    Disable/Enable a metric-based alert rule.: az monitor metrics alert update --enabled false --name MyAlertRule --resource-group MyResourceGroup
