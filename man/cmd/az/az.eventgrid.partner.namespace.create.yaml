# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a partner namespace.
flags:
    --partner-registration-id=!: The fully qualified ARM Id of the partner registration that should be associated with this partner namespace.
    --partner-topic-routing-mode=: This determines if events published to this partner namespace should use the source attribute in the event payload or use the channel name in the header when matching to the partner topic.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the partner namespace.
completion:
    flag:
        partner-topic-routing-mode:
            - SourceEventAttribute
            - ChannelNameHeader
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: |-
            Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` . --partner-topic-routing-mode --route-mode This determines if events published to this partner namespace should use the source attribute in the event payload or use the channel name in the header when matching to the partner topic. If none is specified, source attribute routing will be used to match the partner topic.

            Default value: SourceEventAttribute

            Accepted values: ChannelNameHeader, SourceEventAttribute
        name: Name of the partner namespace.
        partner-registration-id: 'The fully qualified ARM Id of the partner registration that should be associated with this partner namespace. This takes the following format: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.EventGrid/partnerRegistrations/{partnerRegistrationName}.'
        partner-topic-routing-mode: This determines if events published to this partner namespace should use the source attribute in the event payload or use the channel name in the header when matching to the partner topic. If none is specified, source attribute routing will be used to match the partner topic.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a new partner namespace.: az eventgrid partner namespace create -g rg1 --name namespaceName1 -l westus2 --partner-registration-id 795c9f2f-6d2d-42ff-a570-42fd3043192c
