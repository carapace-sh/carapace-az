# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes a resource group.
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -f, --force-deletion-types=: The resource types you want to force delete.
    -n, --name=!: Name of resource group.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        force-deletion-types:
            - Microsoft.Compute/virtualMachines
            - Microsoft.Compute/virtualMachineScaleSets
            - Microsoft.Databricks/workspaces
documentation:
    command: Delete a resource group.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        force-deletion-types: The resource types you want to force delete.
        name: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        no-wait: Do not wait for the long-running operation to finish.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": Do not prompt for confirmation.
examples:
    Delete a resource group.: az group delete -n MyResourceGroup
    Force delete all the Virtual Machines in a resource group.: az group delete -n MyResourceGroup --force-deletion-types Microsoft.Compute/virtualMachines
