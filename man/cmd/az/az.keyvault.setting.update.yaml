# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update specific setting associated with the managed HSM.
documentation:
    flag:
        id: Full URI of the HSM. If specified all other 'Id' arguments should be omitted.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --hsm-name=: Name of the HSM.
    --id=: Full URI of the HSM.
    --setting-type=: Type of the setting value.
    --subscription=: Name or ID of subscription.
    --value=!: Value of the setting.
    -n, --name=!: Name of the setting.
completion:
    flag:
        setting-type:
            - boolean
            - string
