# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update specific setting associated with the managed HSM.
flags:
    --hsm-name=: Name of the HSM.
    --id=: Full URI of the HSM.
    --setting-type=: Type of the setting value.
    --subscription=: Name or ID of subscription.
    --value=!: Value of the setting.
    -n, --name=!: Name of the setting.
completion:
    flag:
        setting-type:
            - boolean
            - string
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        hsm-name: Name of the HSM.
        id: |-
            Full URI of the HSM. If specified all other 'Id' arguments should be omitted.

            Accepted values: boolean, string
        name: Name of the setting.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        value: Value of the setting.
examples:
    Allow key management operations through ARM for the managed HSM.: az keyvault setting update --name AllowKeyManagementOperationsThroughARM --value true --type boolean --hsm-name myhsm
