# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the properties of a managed Cassandra data center.
flags:
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Cluster Name
    -d, --data-center-name=!: Datacenter Name
    -g, --resource-group=!: Name of resource group.
documentation:
    command: Get a Managed Cassandra DataCenter Resource.
    flag:
        cluster-name: Cluster Name.
        data-center-name: Datacenter Name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    ? Gets a Managed Cassandra Datacenter Resource. ProvisioningState tells the state of this datacenter. If the datacenter does not exist a NotFound response is returned.
    : az managed-cassandra datacenter show --resource-group MyResourceGroup --cluster-name MyCluster --data-center-name MyDataCenter
