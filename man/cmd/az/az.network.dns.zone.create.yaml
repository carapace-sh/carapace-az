# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a DNS zone.
flags:
    --if-none-match=: Only create a DNS zone if one doesn't exist that matches the given name.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the zone.
    -p, --parent-name=: Specify if parent zone exists for this zone and delegation for the child zone in the parent is to be added.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        if-none-match: |-
            Only create a DNS zone if one doesn't exist that matches the given name.

            Default value: False
        name: The name of the zone.
        parent-name: Specify if parent zone exists for this zone and delegation for the child zone in the parent is to be added.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a DNS zone using a fully qualified domain name.: az network dns zone create -g MyResourceGroup -n www.mysite.com
    Create a DNS zone with delegation in the parent in different subscription: az network dns zone create -g MyResourceGroup -n books.mysite.com -p "/subscriptions/**67e2/resourceGroups/OtherRg/providers/Microsoft.Network/dnszones/mysite.com"
    Create a DNS zone with delegation in the parent within the same subscription and resource group: az network dns zone create -g MyResourceGroup -n books.mysite.com -p mysite.com
