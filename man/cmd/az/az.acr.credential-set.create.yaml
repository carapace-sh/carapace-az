# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a credential set.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -l, --login-server=!: The login server address of the upstream registry such as 'docker.io'
    -n, --name=!: The name of the credential set.
    -p, --password-id=!: The Azure Key Vault secret ID of the secret containing the password to the upstream registry.
    -r, --registry=!: The name of the container registry.
    -u, --username-id=!: The Azure Key Vault secret ID of the secret containing the username to the upstream registry.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        login-server: The login server address of the upstream registry such as 'docker.io'.
        name: The name of the credential set.
        password-id: The Azure Key Vault secret ID of the secret containing the password to the upstream registry.
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        username-id: The Azure Key Vault secret ID of the secret containing the username to the upstream registry.
examples:
    Create a credential set.: az acr credential-set create -r myregistry -n MyDockerHubCredSet -l docker.io -u https://MyKeyvault.vault.azure.net/secrets/usernamesecret -p https://MyKeyvault.vault.azure.net/secrets/passwordsecret
