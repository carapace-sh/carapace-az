# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get a Spark session.
flags:
    --livy-id=!: The id of the Spark session job.
    --spark-pool-name=!: The name of the Spark pool.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The name of the workspace.
documentation:
    flag:
        livy-id: The id of the Spark session job.
        spark-pool-name: The name of the Spark pool.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The name of the workspace.
examples:
    Get a Spark session.: az synapse spark session show --livy-id 1 --workspace-name testsynapseworkspace --spark-pool-name testsparkpool
