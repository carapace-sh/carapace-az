# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a lock.
documentation:
    flag:
        resource: Name or ID of the resource being locked. If an ID is given, other resource arguments should not be given.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        resource-type: 'The resource type (Ex: ''resC''). Can also accept namespace/type format (Ex: ''Microsoft.Provider/resC'')'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
    --notes=: Notes about this lock.
    --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
    --resource-type=: 'The resource type (Ex: ''resC'').'
    --resource=: Name or ID of the resource being locked.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name of the lock
    -t, --lock-type=!: The type of lock restriction.
completion:
    flag:
        lock-type:
            - CanNotDelete
            - ReadOnly
