# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a lock.
flags:
    --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
    --notes=: Notes about this lock.
    --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
    --resource-type=: 'The resource type (Ex: ''resC'').'
    --resource=: Name or ID of the resource being locked.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name of the lock
    -t, --lock-type=!: The type of lock restriction.
completion:
    flag:
        lock-type:
            - CanNotDelete
            - ReadOnly
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        lock-type: |-
            The type of lock restriction.

            Accepted values: CanNotDelete, ReadOnly
        name: Name of the lock.
        namespace: 'Provider namespace (Ex: ''Microsoft.Provider'').'
        notes: Notes about this lock.
        parent: 'The parent path (Ex: ''resA/myA/resB/myB''). --resource --resource-name Name or ID of the resource being locked. If an ID is given, other resource arguments should not be given.'
        resource: Name or ID of the resource being locked. If an ID is given, other resource arguments should not be given.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'The resource type (Ex: ''resC''). Can also accept namespace/type format (Ex: ''Microsoft.Provider/resC'').'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a read-only resource group level lock.: az lock create --name lockName --resource-group group --lock-type ReadOnly
    Create a read-only resource level lock on a subnet resource with a specific parent.: |-
        az lock create --name lockName --resource-group group --lock-type ReadOnly --resource-type \
            Microsoft.Network/subnets --parent virtualNetworks/myVnet --resource mySubnet
    Create a read-only resource level lock on a vnet resource.: |-
        az lock create --name lockName --resource-group group --lock-type ReadOnly --resource-type \
            Microsoft.Network/virtualNetworks --resource myVnet
    Create a read-only subscription level lock.: az lock create --name lockName --lock-type ReadOnly
