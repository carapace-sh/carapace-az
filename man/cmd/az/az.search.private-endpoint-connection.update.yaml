# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an existing private endpoint connection in a Search service in the given resource group.
flags:
    --actions-required=!: Custom 'actions required' message when updating the private endpoint connection resource.
    --description=!: Custom description when updating the private endpoint connection resource.
    --service-name=!: The name of the search service.
    --status=!: The updated status of the private endpoint connection resource.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: 'Name of the private endpoint connection resource; for example: {the name of the private endpoint resource}.{guid}.'
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        actions-required: Custom 'actions required' message when updating the private endpoint connection resource.
        change-reference: The related change reference ID for this resource operation.
        description: Custom description when updating the private endpoint connection resource.
        name: 'Name of the private endpoint connection resource; for example: {the name of the private endpoint resource}.{guid}.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the search service.
        status: 'The updated status of the private endpoint connection resource. Possible values include: "Pending", "Approved", "Rejected", "Disconnected".'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
