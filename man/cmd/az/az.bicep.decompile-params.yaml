# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: decompile-params
description: Decompile a parameters .json file to .bicepparam.
flags:
    --bicep-file=: Path to the bicep template file (relative to the .bicepparam file) that will be referenced in the using declaration.
    --outdir=: When set, saves the output at the specified directory.
    --outfile=: When set, saves the output as the specified file path.
    --stdout=: When set, prints all output to stdout instead of corresponding files.
    --subscription=: Name or ID of subscription.
    -f, --file=!: The path to the parameters file to build in the file system.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        bicep-file: Path to the bicep template file (relative to the .bicepparam file) that will be referenced in the using declaration.
        change-reference: The related change reference ID for this resource operation.
        file: The path to the parameters file to build in the file system.
        force: Allows overwriting the output file if it exists.
        outdir: When set, saves the output at the specified directory.
        outfile: When set, saves the output as the specified file path.
        stdout: When set, prints all output to stdout instead of corresponding files.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Attempts to decompile a parameters .json file to .bicepparam and overwrite existing output.: az bicep decompile-params --file {json_template_file} --force
    ? Attempts to decompile a parameters .json file to .bicepparam and print all output to stdout and save the result to the specified directory.
    : az bicep decompile-params --file {json_template_file} --outdir {out_dir}
    ? Attempts to decompile a parameters .json file to .bicepparam and print all output to stdout and save the result to the specified file.
    : az bicep decompile-params --file {json_template_file} --outfile {out_file}
    Attempts to decompile a parameters .json file to .bicepparam and print all output to stdout.: az bicep decompile-params --file {json_template_file} --stdout
    Attempts to decompile a parameters .json file to .bicepparam using the bicep file given.: az bicep decompile-params --file {json_template_file} --bicep-file {bicep_file}
    Attempts to decompile a parameters .json file to .bicepparam.: az bicep decompile-params --file {json_template_file}
