# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: wait
description: Place the CLI in a waiting state until a condition of the connection is met.
flags:
    --connection=: Name of the connection.
    --created=: wait until created with 'provisioningState' at 'Succeeded'
    --custom=: Wait until the condition satisfies a custom JMESPath query.
    --deleted=: wait until deleted
    --exists=: wait until the resource exists
    --id=: The id of connection.
    --interval=: polling interval in seconds
    --subscription=: Name or ID of subscription.
    --timeout=: maximum wait in seconds
    --updated=: wait until updated with provisioningState at 'Succeeded'
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        connection: Name of the connection.
        created: |-
            Wait until created with 'provisioningState' at 'Succeeded'.

            Default value: False
        custom: Wait until the condition satisfies a custom JMESPath query. E.g. provisioningState!='InProgress', instanceView.statuses[?code=='PowerState/running'].
        deleted: |-
            Wait until deleted.

            Default value: False
        exists: |-
            Wait until the resource exists.

            Default value: False
        id: The id of connection.
        interval: |-
            Polling interval in seconds.

            Default value: 30
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: |-
            Maximum wait in seconds.

            Default value: 3600
        updated: |-
            Wait until updated with provisioningState at 'Succeeded'.

            Default value: False
examples:
    Wait until the connection is successfully created.: az connection wait --id /subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/Microsoft.ServiceLinker/locations/{location}/connectors/{connectorName} --created
