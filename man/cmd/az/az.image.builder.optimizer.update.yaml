# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an optimizer from an existing image builder template.
flags:
    --defer=:
        description: Temporarily store the object in the local cache instead of sending to Azure.
        nargs: -1
    --enable-vm-boot=:
        description: If this parameter is set to true, VM boot time will be improved by optimizing the final customized image output.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the image template.
completion:
    flag:
        enable-vm-boot:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        defer: Temporarily store the object in the local cache instead of sending to Azure. Use ``` az cache ``` commands to view/clear.
        enable-vm-boot: |-
            If this parameter is set to true, VM boot time will be improved by optimizing the final customized image output.

            Accepted values: false, true
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the image template.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update an optimizer from an existing image builder template.: az image builder optimizer update -n myTemplate -g myGroup --enable-vm-boot true --defer
