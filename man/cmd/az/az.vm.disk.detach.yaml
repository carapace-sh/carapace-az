# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: detach
description: Detach a managed disk from a VM.
flags:
    --disk-ids=:
        description: The disk IDs of the managed disk (space-delimited).
        nargs: -1
    --force-detach=: Force detach managed data disks from a VM.
    --subscription=: Name or ID of subscription.
    --vm-name=!: The name of the Virtual Machine.
    -g, --resource-group=!: Name of resource group.
    -n, --name=: The data disk name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        disk-ids: The disk IDs of the managed disk (space-delimited).
        force-detach: Force detach managed data disks from a VM.
        name: The data disk name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-name: The name of the Virtual Machine. You can configure the default using ``` az configure --defaults vm=<name> ``` .
examples:
    Detach a data disk from a VM.: az vm disk detach -g MyResourceGroup --vm-name MyVm --name disk_name
    Force detach a data disk from a VM.: az vm disk detach -g MyResourceGroup --vm-name MyVm --name disk_name --force-detach
