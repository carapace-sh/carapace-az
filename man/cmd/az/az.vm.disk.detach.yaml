# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: detach
description: Detach a managed disk from a VM.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-name: The name of the Virtual Machine. You can configure the default using `az configure --defaults vm=<name>`
flags:
    --disk-ids=:
        description: The disk IDs of the managed disk (space-delimited).
        nargs: -1
    --force-detach=: Force detach managed data disks from a VM.
    --subscription=: Name or ID of subscription.
    --vm-name=!: The name of the Virtual Machine.
    -g, --resource-group=!: Name of resource group.
    -n, --name=: The data disk name.
