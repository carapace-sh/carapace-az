# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a logic app.
documentation:
    flag:
        app-insights: Name of the existing App Insights project to be added to the logic app. Must be in the same resource group.
        disable-app-insights: Disable creating application insights resource during logicapp create. No logs will be available.
        docker-registry-server-password: The container registry server password. Required for private registries.
        plan: name or resource id of the logicapp app service plan. Use 'appservice plan create' to get one. If using an App Service plan from a different resource group, the full resource id must be used and not the plan name.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        storage-account: Provide a string value of a Storage Account in the provided Resource Group. Or Resource ID of a Storage Account in a different Resource Group
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --app-insights-key=: Instrumentation key of App Insights to be added.
    --app-insights=: Name of the existing App Insights project to be added to the logic app.
    --disable-app-insights=:
        description: Disable creating application insights resource during logicapp create.
        nargs: -1
    --https-only=:
        description: Redirect all traffic made to an app using HTTP to HTTPS.
        nargs: -1
    --runtime-version=: The runtime version for logic app.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -b, --deployment-source-branch=: the branch to deploy
    -d, --docker-registry-server-user=: The container registry server username.
    -g, --resource-group=!: Name of resource group.
    -i, --deployment-container-image-name=: Container image name from container registry, e.g. publisher/image-name:tag
    -l, --deployment-local-git=: enable local git
    -n, --name=!: name of the new logic app
    -p, --plan=: name or resource id of the logicapp app service plan.
    -s, --storage-account=!: Provide a string value of a Storage Account in the provided Resource Group.
    -u, --deployment-source-url=: Git repository URL to link with manual integration
    -v, --functions-version=: The functions version for logic app.
    -w, --docker-registry-server-password=: The container registry server password.
completion:
    flag:
        disable-app-insights:
            - "true"
            - "false"
        functions-version:
            - "4"
        https-only:
            - "true"
            - "false"
        runtime-version:
            - ~14
            - ~16
            - ~18
