# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes a Service Fabric managed service resource.
flags:
    --application=!: Specify the name of the service.
    --name=!: Specify the name of the service.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    command: Delete a managed service.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name. --name --service-name Specify the name of the service.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Delete managed service.: az sf managed-service delete -g testRG -c testCluster --application-name testApp --service-name testService
