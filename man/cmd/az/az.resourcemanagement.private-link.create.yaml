# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a resource management group private link.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: The name of the resource group.
    -l, --location=!: the region to create the resource management private link
    -n, --name=!: The name of the resource management private link.
