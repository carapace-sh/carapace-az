# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a resource management group private link.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: The name of the resource group.
    -l, --location=!: the region to create the resource management private link
    -n, --name=!: The name of the resource management private link.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: The region to create the resource management private link.
        name: The name of the resource management private link.
        resource-group: The name of the resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a resource management group private link.: az resourcemanagement private-link create --resource-group testRG --name TestRMPL --location WestUS
