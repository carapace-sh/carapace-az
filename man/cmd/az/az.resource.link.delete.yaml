# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes a resource link with the specified ID.
flags:
    --link=!: Fully-qualified resource ID of the resource link.
    --subscription=: Name or ID of subscription.
documentation:
    command: Delete a link between resources.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        link: 'Fully-qualified resource ID of the resource link. Format: /subscriptions/{SubID}/resourceGroups/{ResourceGroupID}/providers/{ProviderNamespace}/{ResourceType}/{ResourceName}/providers/Microsoft.Resources/links/{LinkName}.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Delete link {LinkID}: az resource link delete --link {LinkID}
