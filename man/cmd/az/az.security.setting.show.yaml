# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get of different configurations in Microsoft Defender for Cloud
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -n, --name=: The name of the setting
completion:
    flag:
        name:
            - MCAS
            - Sentinel
            - WDATP
            - WDATP_EXCLUDE_LINUX_PUBLIC_PREVIEW
            - WDATP_UNIFIED_SOLUTION
documentation:
    command: Get of different configurations in Microsoft Defender for Cloud.
    flag:
        ids: |-
            One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.

            Accepted values: MCAS, Sentinel, WDATP, WDATP_EXCLUDE_LINUX_PUBLIC_PREVIEW, WDATP_UNIFIED_SOLUTION
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a security setting called "MCAS".: az security setting show -n "MCAS"
