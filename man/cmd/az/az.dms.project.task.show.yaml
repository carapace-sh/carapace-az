# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get task information.
flags:
    --expand=: Expand the response.
    --project-name=!: The name of the Project.
    --service-name=!: The name of the Service.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Task.
documentation:
    command: Show the details of a migration task. Use the "--expand" to get more details.
    flag:
        expand: Expand the response to provide more details. Use with "command" to see more details of the task. Use with "output" to see the results of the task's migration.
        name: The name of the Task.
        project-name: The name of the Project.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the Service.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the details of a migration task. Use the "--expand" to get more details. (autogenerated): az dms project task show --name MyTask --project-name MyProject --resource-group MyResourceGroup --service-name MyService
