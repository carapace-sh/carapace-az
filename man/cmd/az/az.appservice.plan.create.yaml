# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an app service plan.
flags:
    --hyper-v=: Host Windows Container Web App on Hyper-V worker.
    --is-linux=: host web app on Linux worker
    --no-wait=: Do not wait for the long-running operation to finish.
    --number-of-workers=: Number of workers to be allocated.
    --per-site-scaling=: Enable per-app scaling at the App Service plan level to allow for scaling an app independently from the App Service plan that hosts it.
    --sku=: The pricing tiers, e.g., F1(Free), D1(Shared), B1(Basic Small), B2(Basic Medium), B3(Basic Large), S1(Standard Small), P1V2(Premium V2 Small), P2V2(Premium V2 Medium), P3V2(Premium V2 Large), P0V3(Premium V3 Extra Small), P1V3(Premium V3 Small), P2V3(Premium V3 Medium), P3V3(Premium V3 Large), P1MV3(Premium Memory Optimized V3 Small), P2MV3(Premium Memory Optimized V3 Medium), P3MV3(Premium Memory Optimized V3 Large), P4MV3(Premium Memory Optimized V3 Extra Large), P5MV3(Premium Memory Optimized V3 Extra Extra Large), I1 (Isolated Small), I2 (Isolated Medium), I3 (Isolated Large), I1V2 (Isolated V2 I1V2), I2V2 (Isolated V2 I2V2), I3V2 (Isolated V2 I3V2), I4V2 (Isolated V2 I4V2), I5V2 (Isolated V2 I5V2), I6V2 (Isolated V2 I6V2), I1MV2 (Isolated Memory Optimized V2 I1MV2), I2MV2 (Isolated Memory Optimized V2 I2MV2), I3MV2 (Isolated Memory Optimized V2 I3MV2), I4MV2 (Isolated Memory Optimized V2 I4MV2), I5MV2 (Isolated Memory Optimized V2 I5MV2), WS1 (Logic Apps Workflow Standard 1), WS2 (Logic Apps Workflow Standard 2), WS3 (Logic Apps Workflow Standard 3)
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -e, --app-service-environment=: Name or ID of the app service environment.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the new app service plan
    -z, --zone-redundant=: Enable zone redundancy for high availability.
completion:
    flag:
        sku:
            - F1
            - FREE
            - D1
            - SHARED
            - B1
            - B2
            - B3
            - S1
            - S2
            - S3
            - P1V2
            - P2V2
            - P3V2
            - P0V3
            - P1V3
            - P2V3
            - P3V3
            - P1MV3
            - P2MV3
            - P3MV3
            - P4MV3
            - P5MV3
            - I1
            - I2
            - I3
            - I1V2
            - I2V2
            - I3V2
            - I4V2
            - I5V2
            - I6V2
            - I1MV2
            - I2MV2
            - I3MV2
            - I4MV2
            - I5MV2
            - WS1
            - WS2
            - WS3
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        app-service-environment: 'Name or ID of the app service environment. If you want to create the app service plan in different subscription than the app service environment, please use the resource ID for --app-service-environment parameter. '
        async-scaling-enabled: |-
            Enables async scaling for the app service plan. Set to "true" to create an async operation if there are insufficient workers to scale synchronously. The SKU must be Dedicated.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        default-identity: Accept system or user assigned identity separated. Use '[system]' to refer system assigned identity, or a resource id to refer user assigned identity.
        hyper-v: Host Windows Container Web App on Hyper-V worker.
        install-script: Install script configurations. Provide key-value pairs for ``` name=<name> source-uri=<uri> type=<type> ``` .
        is-linux: Host web app on Linux worker.
        is-managed-instance: Host web app on managed instance.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        mi-system-assigned: |-
            Enable system-assigned managed identity for this app service plan.

            Accepted values: false, true
        mi-user-assigned: Enable user-assigned managed identities for this app service plan. Accepts space-separated list of identity resource IDs.
        name: Name of the new app service plan.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        number-of-workers: |-
            Number of workers to be allocated.

            Default value: 1
        per-site-scaling: |-
            Enable per-app scaling at the App Service plan level to allow for scaling an app independently from the App Service plan that hosts it.

            Default value: False
        rdp-enabled: |-
            Enable RDP. Requires is-custom-mode to be true.

            Accepted values: false, true
        registry-adapter: Registry adapter configurations. Provide key-value pairs for ``` registry-key=<key> type=<type> secret-uri=<uri> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: |-
            The pricing tiers, e.g., F1(Free), D1(Shared), B1(Basic Small), B2(Basic Medium), B3(Basic Large), S1(Standard Small), P1V2(Premium V2 Small), P2V2(Premium V2 Medium), P3V2(Premium V2 Large), P0V3(Premium V3 Extra Small), P1V3(Premium V3 Small), P2V3(Premium V3 Medium), P3V3(Premium V3 Large), P1MV3(Premium Memory Optimized V3 Small), P2MV3(Premium Memory Optimized V3 Medium), P3MV3(Premium Memory Optimized V3 Large), P4MV3(Premium Memory Optimized V3 Extra Large), P5MV3(Premium Memory Optimized V3 Extra Extra Large), P0V4(Premium V4 Extra Small), P1V4(Premium V4 Small), P2V4(Premium V4 Medium), P3V4(Premium V4 Large), P1MV4(Premium Memory Optimized V4 Small), P2MV4(Premium Memory Optimized V4 Medium), P3MV4(Premium Memory Optimized V4 Large), P4MV4(Premium Memory Optimized V4 Extra Large), P5MV4(Premium Memory Optimized V4 Extra Extra Large), I1V2 (Isolated V2 I1V2), I2V2 (Isolated V2 I2V2), I3V2 (Isolated V2 I3V2), I4V2 (Isolated V2 I4V2), I5V2 (Isolated V2 I5V2), I6V2 (Isolated V2 I6V2), I1MV2 (Isolated Memory Optimized V2 I1MV2), I2MV2 (Isolated Memory Optimized V2 I2MV2), I3MV2 (Isolated Memory Optimized V2 I3MV2), I4MV2 (Isolated Memory Optimized V2 I4MV2), I5MV2 (Isolated Memory Optimized V2 I5MV2), WS1 (Logic Apps Workflow Standard 1), WS2 (Logic Apps Workflow Standard 2), WS3 (Logic Apps Workflow Standard 3).

            Accepted values: B1, B2, B3, D1, F1, FREE, I1MV2, I1V2, I2MV2, I2V2, I3MV2, I3V2, I4MV2, I4V2, I5MV2, I5V2, I6V2, P0V3, P0V4, P1MV3, P1MV4, P1V2, P1V3, P1V4, P2MV3, P2MV4, P2V2, P2V3, P2V4, P3MV3, P3MV4, P3V2, P3V3, P3V4, P4MV3, P4MV4, P5MV3, P5MV4, S1, S2, S3, SHARED, WS1, WS2, WS3
        storage-mount: Storage mount configurations. Provide key-value pairs for ``` name=<name> source=<source> type=<type> destination-path=<path> credentials-secret-uri=<uri> ``` .
        subnet: Name or resource ID of the pre-existing subnet to have the app service plan join. The --vnet is argument also needed if specifying subnet by name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        vnet: Name or resource ID of the regional virtual network. If there are multiple vnets of the same name across different resource groups, use vnet resource id to specify which vnet to use. If vnet name is used, by default, the vnet in the same resource group as the webapp will be used. Must be used with --subnet argument.
        zone-redundant: Enable zone redundancy for high availability. Cannot be changed after plan creation. Minimum instance count is 3.
examples:
    Create a Linux app service plan with four Linux workers.: az appservice plan create -g MyResourceGroup -n MyPlan --is-linux --number-of-workers 4 --sku P0V3
    Create a Linux app service plan.: az appservice plan create -g MyResourceGroup -n MyPlan --is-linux
    Create a Windows app service plan with a specific SKU.: az appservice plan create -g MyResourceGroup -n MyPlan --sku B1
    Create a Windows app service plan.: az appservice plan create -g MyResourceGroup -n MyPlan
    Create a Windows container app service plan.: az appservice plan create -g MyResourceGroup -n MyPlan --hyper-v --sku P1V3
    ? Create an app service plan for App Service Environment in different subscription and the resource group in different region than App Service Environment.
    : az appservice plan create -g MyResourceGroup -n MyPlan --app-service-environment '/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/test-rg/providers/Microsoft.Web/hostingEnvironments/test-ase' --sku I1V2 --location ase-region
    Create an app service plan for App Service Environment in different subscription.: az appservice plan create -g MyResourceGroup -n MyPlan --app-service-environment '/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/test-rg/providers/Microsoft.Web/hostingEnvironments/test-ase' --sku I1V2
    Create an app service plan for App Service Environment.: az appservice plan create -g MyResourceGroup -n MyPlan --app-service-environment MyAppServiceEnvironment --sku I1v2
