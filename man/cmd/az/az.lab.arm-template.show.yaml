# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show the details of an ARM template in a lab.
flags:
    --artifact-source-name=!: The name of the artifact source.
    --export-parameters=:
        description: Whether or not to export parameters template.
        nargs: -1
    --lab-name=!: The name of the lab.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the azure resource manager template.
completion:
    flag:
        export-parameters:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: |-
        Command group 'lab' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        artifact-source-name: The name of the artifact source.
        export-parameters: |-
            Whether or not to export parameters template.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        lab-name: The name of the lab.
        name: The name of the azure resource manager template.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
