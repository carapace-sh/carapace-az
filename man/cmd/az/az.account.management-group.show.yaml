# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of the management group.
flags:
    --no-register=: Skip registration for resource provider Microsoft.Management
    -e, --expand=: ""
    -n, --name=!: ""
    -r, --recurse=: ""
documentation:
    flag:
        expand: |-
            If given, lists the children in the first level of hierarchy.

            Default value: False
        name: Name of the management group (the last segment of the resource ID). Do not use display name.
        no-register: |-
            Skip registration for resource provider Microsoft.Management.

            Default value: False
        recurse: |-
            If given, lists the children in all levels of hierarchy.

            Default value: False
examples:
    Get a management group with children in all levels of hierarchy.: az account management-group show --name GroupName -e -r
    Get a management group with children in the first level of hierarchy.: az account management-group show --name GroupName -e
    Get a management group.: az account management-group show --name GroupName
