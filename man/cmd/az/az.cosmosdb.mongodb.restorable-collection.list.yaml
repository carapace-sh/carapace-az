# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Show the event feed of all mutations done on all the Azure Cosmos DB MongoDB collections under a specific database.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --subscription=: Name or ID of subscription.
    -d, --database-rid=!: Rid of the database
    -e, --end-time=: End time of restorable MongoDB collections event feed
    -i, --instance-id=!: InstanceId of the Account
    -l, --location=!: Location
    -s, --start-time=: Start time of restorable MongoDB collections event feed
