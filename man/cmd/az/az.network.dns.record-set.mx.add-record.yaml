# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add-record
description: Add an MX record.
flags:
    --if-none-match=: Create the record set only if it does not already exist.
    --subscription=: Name or ID of subscription.
    --ttl=: Record set TTL (time-to-live)
    -e, --exchange=!: Exchange metric.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -p, --preference=!: Preference metric.
    -z, --zone-name=!: The name of the zone.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        exchange: Exchange metric.
        if-none-match: Create the record set only if it does not already exist.
        preference: Preference metric.
        record-set-name: The name of the record set relative to the zone. Creates a new record set if one does not exist.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        ttl: |-
            Record set TTL (time-to-live).

            Default value: 3600
        zone-name: The name of the zone.
examples:
    Add an MX record.: |-
        az network dns record-set mx add-record -g MyResourceGroup -z www.mysite.com \
            -n MyRecordSet -e mail.mysite.com -p 10
