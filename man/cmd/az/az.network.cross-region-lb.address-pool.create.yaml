# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create load balancer backend address pool.
flags:
    --admin-state=: Default administrative state to backend addresses in `--backend-addresses`.
    --backend-addresses=:
        description: An array of backend addresses.
        nargs: -1
    --drain-period=: Amount of seconds Load Balancer waits for before sending RESET to client and backend address.
    --lb-name=!: The name of the load balancer.
    --location=: The location of the backend address pool.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --sync-mode=: Backend address synchronous mode for the backend pool
    --vnet-id=: A reference to a virtual network.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the backend address pool.
completion:
    flag:
        admin-state:
            - Down
            - None
            - Up
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        sync-mode:
            - Automatic
            - Manual
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        admin-state: Default administrative state to backend addresses in ```
        backend-address: '``` .'
        backend-addresses: 'An array of backend addresses.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.  Singular flags: `--backend-address`.'
        change-reference: The related change reference ID for this resource operation.
        lb-name: The name of the load balancer.
        location: The location of the backend address pool.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        sync-mode: |-
            Backend address synchronous mode for the backend pool.

            Accepted values: Automatic, Manual
        vnet-id: A reference to a virtual network.
examples:
    Create an address pool with several backend addresses using config file: az network cross-region-lb address-pool create -g MyResourceGroup --lb-name MyLb -n MyAddressPool --backend-addresses config_file.json
    Create an address pool with several backend addresses using shorthand syntax arguments.: az network cross-region-lb address-pool create -g MyResourceGroup --lb-name MyLb -n MyAddressPool --backend-addresses "[{name:addr1,frontend-ip-address:'/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/cli_test_lb_address_pool_addresses000001/providers/Microsoft.Network/loadBalancers/regional-lb/frontendIPConfigurations/fe-rlb1'},{name:addr2,frontend-ip-address:'/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/cli_test_lb_address_pool_addresses000001/providers/Microsoft.Network/loadBalancers/regional-lb/frontendIPConfigurations/fe-rlb2'}]"
    Create an address pool.: az network cross-region-lb address-pool create -g MyResourceGroup --lb-name MyLb -n MyAddressPool
