# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes a Service Fabric service resource.
documentation:
    flag:
        application-name: The name of the application resource. Required.
        name: 'Specify the name of the service. The application name must be a prefix of the service name, for example: appName~serviceName'
        resource-group: Specify the resource group name. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --application-name=!: The name of the application resource.
    --name=!: Specify the name of the service.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
