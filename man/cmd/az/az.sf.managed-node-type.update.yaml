# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update node type on a managed cluster.
documentation:
    flag:
        capacity: 'Capacity tags applied to the nodes in the node type as key/value pairs, the cluster resource manager uses these tags to understand how much resource a node has. Updating this will override the current values.for example: --capacity ClientConnections=65536 param2=value2'
        placement-property: 'Placement tags applied to nodes in the node type as key/value pairs, which can be used to indicate where certain services (workload) should run. Updating this will override the current values.for example: --placement-property NodeColor=Green SomeProperty=5'
        resource-group: Specify the resource group name. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --application-end-port=: Application End port of a range of ports.
    --application-start-port=: Application start port of a range of ports.
    --capacity=:
        description: Capacity tags applied to the nodes in the node type as key/value pairs, the cluster resource manager uses these tags to understand how much resource a node has.
        nargs: -1
    --ephemeral-end-port=: Ephemeral end port of a range of ports.
    --ephemeral-start-port=: Ephemeral start port of a range of ports.
    --instance-count=: essage = "The number of nodes in the node type.
    --placement-property=:
        description: Placement tags applied to nodes in the node type as key/value pairs, which can be used to indicate where certain services (workload) should run.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
    -n, --name=!: node type name.
