# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: postgres
description: Preview the expected configurations of local connection to postgres.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --client-type=: The client type used on the connection
    --secret=:
        description: The secret auth info
        nargs: -1
    --subscription=: Name or ID of subscription.
    --user-account=:
        description: The local user account auth info
        nargs: -1
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - go
            - php
            - ruby
            - django
            - springBoot
            - none
