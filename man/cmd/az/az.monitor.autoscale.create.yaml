# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create new autoscale settings.
documentation:
    flag:
        count: The numer of instances to use. If used with --min/max-count, the default number of instances to use.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        resource-type: 'Target resource type. Can also accept namespace/type format (Ex: ''Microsoft.Compute/virtualMachines'')'
        scale-look-ahead-time: The amount of time to specify by which instances are launched in advance. It must be between 1 minute and 60 minutes in ISO 8601 format (for example, 100 days would be P100D).
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --count=!: The numer of instances to use.
    --disabled=:
        description: Create the autoscale settings in a disabled state.
        nargs: -1
    --email-administrator=:
        description: Send email to subscription administrator on scaling.
        nargs: -1
    --email-coadministrators=:
        description: Send email to subscription co-administrators on scaling.
        nargs: -1
    --max-count=: The maximum number of instances.
    --min-count=: The minimum number of instances.
    --resource-namespace=: Target resource provider namespace.
    --resource-parent=: Target resource parent path, if applicable.
    --resource-type=: Target resource type.
    --resource=!: Name or ID of the target resource.
    --scale-look-ahead-time=: The amount of time to specify by which instances are launched in advance.
    --scale-mode=: The predictive autoscale mode
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -a, --action=:
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
    -n, --name=: Name of the autoscale settings.
completion:
    flag:
        disabled:
            - "true"
            - "false"
        email-administrator:
            - "true"
            - "false"
        email-coadministrators:
            - "true"
            - "false"
        scale-mode:
            - Disabled
            - ForecastOnly
            - Enabled
