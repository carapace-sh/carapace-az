# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create new autoscale settings.
flags:
    --count=!: The numer of instances to use.
    --disabled=:
        description: Create the autoscale settings in a disabled state.
        nargs: -1
    --email-administrator=:
        description: Send email to subscription administrator on scaling.
        nargs: -1
    --email-coadministrators=:
        description: Send email to subscription co-administrators on scaling.
        nargs: -1
    --max-count=: The maximum number of instances.
    --min-count=: The minimum number of instances.
    --resource-namespace=: Target resource provider namespace.
    --resource-parent=: Target resource parent path, if applicable.
    --resource-type=: Target resource type.
    --resource=!: Name or ID of the target resource.
    --scale-look-ahead-time=: The amount of time to specify by which instances are launched in advance.
    --scale-mode=: The predictive autoscale mode
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -a, --action=:
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
    -n, --name=: Name of the autoscale settings.
completion:
    flag:
        disabled:
            - "true"
            - "false"
        email-administrator:
            - "true"
            - "false"
        email-coadministrators:
            - "true"
            - "false"
        scale-mode:
            - Disabled
            - ForecastOnly
            - Enabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        action: 'Add an action to fire when a scaling event occurs. Usage:   --action TYPE KEY [ARG ...] Email:   --action email bob@contoso.com ann@contoso.com Webhook: --action webhook ``` https://www.contoso.com/alert ``` apiKey=value Webhook: --action webhook ``` https://www.contoso.com/alert?apiKey=value ``` Multiple actions can be specified by using more than one ```'
        change-reference: The related change reference ID for this resource operation.
        count: The numer of instances to use. If used with --min/max-count, the default number of instances to use.
        disabled: |-
            Create the autoscale settings in a disabled state.

            Accepted values: false, true
        email-administrator: |-
            Send email to subscription administrator on scaling.

            Accepted values: false, true
        email-coadministrators: |-
            Send email to subscription co-administrators on scaling.

            Accepted values: false, true
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        max-count: The maximum number of instances.
        min-count: The minimum number of instances.
        name: Name of the autoscale settings.
        resource: Name or ID of the target resource.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-namespace: Target resource provider namespace.
        resource-parent: Target resource parent path, if applicable.
        resource-type: 'Target resource type. Can also accept namespace/type format (Ex: ''Microsoft.Compute/virtualMachines'').'
        scale-look-ahead-time: The amount of time to specify by which instances are launched in advance. It must be between 1 minute and 60 minutes in ISO 8601 format (for example, 100 days would be P100D).
        scale-mode: |-
            The predictive autoscale mode.

            Accepted values: Disabled, Enabled, ForecastOnly
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create autoscale settings for exactly 4 instances.: az monitor autoscale create -g {myrg} --resource {resource-id} --count 4
    Create autoscale settings to scale between 2 and 5 instances (3 as default). Email the administrator when scaling occurs.: |-
        az monitor autoscale create -g {myrg} --resource {resource-id} --min-count 2 --max-count 5 \
          --count 3 --email-administrator
        az monitor autoscale rule create -g {myrg} --autoscale-name {resource-name} --scale out 1 \
          --condition "Percentage CPU > 75 avg 5m"
        az monitor autoscale rule create -g {myrg} --autoscale-name {resource-name} --scale in 1 \
          --condition "Percentage CPU < 25 avg 5m"
    Create new autoscale settings. (autogenerated): az monitor autoscale create --count 3 --max-count 5 --min-count 2 --name MyAutoscaleSettings --resource myScaleSet --resource-group MyResourceGroup --resource-type Microsoft.Compute/virtualMachineScaleSets
