# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-skus
description: Gets the list of Batch supported Virtual Machine VM sizes available at the given location.
flags:
    --filter=: OData filter expression.
    --maxresults=: The maximum number of items to return in the response.
    --subscription=: Name or ID of subscription.
    -l, --location=!: The region for which to display the available Batch VM SKUs.
documentation:
    command: List virtual machine SKUs available in a location.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        filter: OData filter expression. Valid properties for filtering are "familyName". Default value is None.
        location: The region for which to display the available Batch VM SKUs.
        maxresults: The maximum number of items to return in the response. Default value is None.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
