# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates an advanced threat protection setting.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --state=!: State of advanced threat protection setting.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -s, --server-name=: Name of the server.
completion:
    flag:
        state:
            - Enabled
            - Disabled
documentation:
    command: Updates advanced threat protection setting state for a flexible server.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        state: |-
            State of advanced threat protection setting.

            Accepted values: Disabled, Enabled
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Disable advanced threat protection setting for a PostgreSQL flexible server.: az postgres flexible-server advanced-threat-protection-setting update --resource-group testGroup --server-name testserver --state Disabled
    Enable advanced threat protection setting for a PostgreSQL flexible server.: az postgres flexible-server advanced-threat-protection-setting update --resource-group testGroup --server-name testserver --state Enabled
