# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: download
description: Download a key from a KeyVault.
flags:
    --hsm-name=: Name of the HSM.
    --id=: Id of the key.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Vault.
    -e, --encoding=: 'Encoding of the key, default: PEM'
    -f, --file=!: File to receive the key contents.
    -n, --name=: Name of the key.
    -v, --version=: The key version.
completion:
    flag:
        encoding:
            - PEM
            - DER
documentation:
    command: Download the public part of a stored key.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        encoding: |-
            Encoding of the key, default: PEM.

            Default value: PEM

            Accepted values: DER, PEM
        file: File to receive the key contents.
        hsm-name: Name of the HSM. (--hsm-name and --vault-name are mutually exclusive, please specify just one of them).
        id: Id of the key. If specified all other 'Id' arguments should be omitted.
        name: Name of the key. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Vault.
        version: The key version. If omitted, uses the latest version.
examples:
    Save the key with DER encoding.: az keyvault key download --vault-name MyKeyVault -n MyKey -e DER -f mykey.der
    Save the key with PEM encoding.: az keyvault key download --vault-name MyKeyVault -n MyKey -e PEM -f mykey.pem
