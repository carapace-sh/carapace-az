# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a data export rule for a given workspace.
documentation:
    flag:
        destination: The destination resource ID. It should be a storage account, an event hub namespace. If event hub namespace is provided without --event-hub-name, event hub would be created for each table automatically.
        event-hub-name: Optional. Allows to define an Event Hub name. Not applicable when destination is Storage Account.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tables: An array of tables to export.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --destination=!: The destination resource ID.
    --enable=:
        description: Active when enabled.
        nargs: -1
    --event-hub-name=: Optional.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The name of the workspace.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The data export rule name.
    -t, --tables=!:
        description: An array of tables to export.
        nargs: -1
completion:
    flag:
        enable:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
