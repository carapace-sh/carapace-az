# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable-for-vm
description: Start protecting a previously unprotected Azure VM as per the specified policy to a Recovery services vault.
flags:
    --disk-list-setting=: option to decide whether to include or exclude the disk or reset any previous settings to default behavior
    --diskslist=:
        description: List of disks to be excluded or included.
        nargs: -1
    --exclude-all-data-disks=:
        description: Option to specify to backup OS disk only.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --vm=!: Name or ID of the Virtual Machine to be protected.
    -g, --resource-group=!: Name of resource group.
    -p, --policy-name=!: Name of the backup policy.
    -v, --vault-name=!: Name of the Recovery services vault.
completion:
    flag:
        disk-list-setting:
            - include
            - exclude
        exclude-all-data-disks:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        disk-list-setting: |-
            Option to decide whether to include or exclude the disk or reset any previous settings to default behavior.

            Accepted values: exclude, include
        diskslist: List of disks to be excluded or included.
        exclude-all-data-disks: |-
            Option to specify to backup OS disk only.

            Accepted values: false, true
        policy-name: Name of the backup policy.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Recovery services vault.
        vm: Name or ID of the Virtual Machine to be protected.
examples:
    Start protecting a previously unprotected Azure VM as per the specified policy to a Recovery services vault using a Linux shell.: |-
        az backup protection enable-for-vm \
          --resource-group myResourceGroup \
          --vault-name myRecoveryServicesVault \
          --policy-name DefaultPolicy \
          --vm "$(az vm show -g VMResourceGroup -n MyVm --query id)"
    Start protecting a previously unprotected Azure VM as per the specified policy to a Recovery services vault. (autogenerated): az backup protection enable-for-vm --policy-name MyPolicy --resource-group MyResourceGroup --vault-name MyVault --vm myVM
