# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-deleted
description: Lists the currently-recoverable deleted certificates.
flags:
    --id=: Full URI of the Vault.
    --include-pending=:
        description: Specifies whether to include certificates which are not completely provisioned.
        nargs: -1
    --maxresults=: Maximum number of results to return in a page.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Key Vault.
completion:
    flag:
        include-pending:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        id: Full URI of the Vault. If specified all other 'Id' arguments should be omitted.
        include-pending: |-
            Specifies whether to include certificates which are not completely provisioned.

            Accepted values: false, true
        maxresults: Maximum number of results to return in a page. If not specified, the service will return up to 25 results.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Key Vault. Required if --id is not specified.
