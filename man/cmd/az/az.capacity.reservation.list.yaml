# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all of the capacity reservations in the specified capacity reservation group.
flags:
    --subscription=: Name or ID of subscription.
    -c, --capacity-reservation-group=!: The name of the capacity reservation group.
    -g, --resource-group=!: Name of resource group.
documentation:
    command: List all of the capacity reservations in the specified capacity reservation group. Use the nextLink property in the response to get the next page of capacity reservations.
    flag:
        capacity-reservation-group: The name of the capacity reservation group.
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in ```
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List capacity reservation.: az capacity reservation list -c ReservationGroupName -g MyResourceGroup
