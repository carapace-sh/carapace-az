# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a virtual network peering connection.
flags:
    --allow-forwarded-traffic=:
        description: Whether the forwarded traffic from the VMs in the local virtual network will be allowed/disallowed in remote virtual network.
        nargs: -1
    --allow-gateway-transit=:
        description: If gateway links can be used in remote virtual networking to link to this virtual network.
        nargs: -1
    --allow-vnet-access=:
        description: Whether the VMs in the local virtual network space would be able to access the VMs in remote virtual network space.
        nargs: -1
    --enable-only-ipv6=:
        description: Whether only Ipv6 address space is peered for subnet peering.
        nargs: -1
    --local-subnet-names=:
        description: List of local subnet names that are subnet peered with remote virtual network.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --peer-complete-vnets=:
        description: Whether complete virtual network address space is peered.
        nargs: -1
    --remote-subnet-names=:
        description: List of remote subnet names from remote virtual network that are subnet peered.
        nargs: -1
    --remote-vnet=!: Name or ID of the remote VNet.
    --subscription=: Name or ID of subscription.
    --use-remote-gateways=:
        description: Allows VNet to use the remote VNet's gateway.
        nargs: -1
    --vnet-name=!: The virtual network (VNet) name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the VNet peering.
completion:
    flag:
        allow-forwarded-traffic:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        allow-gateway-transit:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        allow-vnet-access:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-only-ipv6:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        peer-complete-vnets:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        use-remote-gateways:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allow-forwarded-traffic: |-
            Whether the forwarded traffic from the VMs in the local virtual network will be allowed/disallowed in remote virtual network.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        allow-gateway-transit: |-
            If gateway links can be used in remote virtual networking to link to this virtual network.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        allow-vnet-access: |-
            Whether the VMs in the local virtual network space would be able to access the VMs in remote virtual network space.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        change-reference: The related change reference ID for this resource operation.
        enable-only-ipv6: |-
            Whether only Ipv6 address space is peered for subnet peering.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        local-subnet-names: List of local subnet names that are subnet peered with remote virtual network.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the VNet peering.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        peer-complete-vnets: |-
            Whether complete virtual network address space is peered.

            Default value: True

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        remote-subnet-names: List of remote subnet names from remote virtual network that are subnet peered.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remote-vnet: Name or ID of the remote VNet.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        use-remote-gateways: |-
            Allows VNet to use the remote VNet's gateway. Remote VNet gateway must have --allow-gateway-transit enabled for remote peering. Only 1 peering can have this flag enabled. Cannot be set if the VNet already has a gateway.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        vnet-name: The virtual network (VNet) name.
examples:
    Create a peering connection between two virtual networks.: az network vnet peering create -g MyResourceGroup -n MyVnet1ToMyVnet2 --vnet-name MyVnet1 --remote-vnet MyVnet2Id --allow-vnet-access
