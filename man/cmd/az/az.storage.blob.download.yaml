# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: download
description: Download a blob to a file path.
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit'
        auth-mode: 'The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE'
        blob-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with `az storage account show`. Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT'
        blob-url: The full endpoint URL to the Blob, including SAS token and snapshot if used. This could be either the primary endpoint, or the secondary endpoint depending on the current `location_mode`.
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING'
        end-range: 'End of byte range to use for downloading a section of the blob. If end_range is given, start_range must be provided. The start_range and end_range params are inclusive. Ex: start_range=0, end_range=511 will download first 512 bytes of blob.'
        file: Path of file to write out to. If not specified, stdout will be used and max_connections will be set to 1.
        if-match: An ETag value, or the wildcard character (*). Specify this header to perform the operation only if the resource's ETag matches the value specified.
        if-none-match: An ETag value, or the wildcard character (*). Specify this header to perform the operation only if the resource's ETag does not match the value specified. Specify the wildcard character (*) to perform the operation only if the resource does not exist, and fail the operation if it does exist.
        open-mode: Mode to use when opening the file. Note that specifying append only open_mode prevents parallel download. So, max_connections must be set to 1 if this open_mode is used.
        overwrite: Overwrite an existing file when specified. Default value is true.
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_SAS_TOKEN'
        start-range: 'Start of byte range to use for downloading a section of the blob. If no end_range is given, all bytes after the start_range will be downloaded. The start_range and end_range params are inclusive. Ex: start_range=0, end_range=511 will download first 512 bytes of blob.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: Request timeout in seconds. Applies to each call to the service.
        validate-content: If true, calculates an MD5 hash for each chunk of the blob. The storage service checks the hash of the content that has arrived with the hash that was sent. This is primarily valuable for detecting bitflips on the wire if using http instead of https, as https (the default), will already validate. Note that this MD5 hash is not stored with the blob. Also note that if enabled, the memory-efficient algorithm will not be used because computing the MD5 hash requires buffering entire blocks, and doing so defeats the purpose of the memory-efficient algorithm.
        version-id: 'An optional blob version ID. This parameter is only for versioning enabled account. '
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --auth-mode=: The mode in which to run the command.
    --blob-endpoint=: Storage data service endpoint.
    --blob-url=: The full endpoint URL to the Blob, including SAS token and snapshot if used.
    --connection-string=: Storage account connection string.
    --end-range=: End of byte range to use for downloading a section of the blob.
    --if-match=: An ETag value, or the wildcard character (*).
    --if-modified-since=: Commence only if modified since supplied UTC datetime (Y-m-d'T'H:M'Z')
    --if-none-match=: An ETag value, or the wildcard character (*).
    --if-unmodified-since=: Commence only if unmodified since supplied UTC datetime (Y-m-d'T'H:M'Z')
    --lease-id=: Required if the blob has an active lease.
    --max-connections=: The number of parallel connections with which to download.
    --no-progress=: Include this flag to disable progress reporting for the command.
    --open-mode=: Mode to use when opening the file.
    --overwrite=:
        description: Overwrite an existing file when specified.
        nargs: -1
    --sas-token=: A Shared Access Signature (SAS).
    --snapshot=: The snapshot parameter is an opaque DateTime value that, when present, specifies the blob snapshot to retrieve.
    --start-range=: Start of byte range to use for downloading a section of the blob.
    --subscription=: Name or ID of subscription.
    --tags-condition=: Specify a SQL where clause on blob tags to operate only on blobs with a matching value.
    --timeout=: Request timeout in seconds.
    --validate-content=: If true, calculates an MD5 hash for each chunk of the blob.
    --version-id=: An optional blob version ID.
    -c, --container-name=: The container name.
    -f, --file=: Path of file to write out to.
    -n, --name=: The blob name.
completion:
    flag:
        auth-mode:
            - login
            - key
        overwrite:
            - "true"
            - "false"
