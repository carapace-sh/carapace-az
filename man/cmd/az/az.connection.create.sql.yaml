# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: sql
description: Create a Service Connector local connection to sql.
flags:
    --client-type=: The client type used on the connection
    --connection=: Name of the connection.
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --database=: Name of the sql database.
    --no-wait=: Do not wait for the long-running operation to finish.
    --secret=:
        description: The secret auth info
        nargs: -1
    --server=: Name of the sql server.
    --subscription=: Name or ID of subscription.
    --target-id=: The resource id of target service.
    --target-resource-group=: The resource group which contains the sql server.
    --user-account=:
        description: The local user account auth info
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - go
            - php
            - ruby
            - django
            - springBoot
            - none
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        client-type: |-
            The client type used on the connection.

            Accepted values: django, dotnet, dotnet-internal, go, java, nodejs, none, php, python, ruby, springBoot
        connection: Name of the connection.
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        database: Name of the sql database. Required if '--target-id' is not specified.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        new: |-
            Deleting existing users with the same name before creating a new user in database.

            Default value: False
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        secret: 'The secret auth info. Usage: --secret name=XX secret=XX --secret name=XX secret-uri=XX --secret name=XX secret-name=XX name    : Required. Username or account name for secret auth. secret  : Required. Password or account key for secret auth.'
        server: Name of the sql server. Required if '--target-id' is not specified.
        service-principal: 'The service principal auth info. Usage: --service-principal client-id=XX secret=XX client-id      : Required. Client id of the service principal. object-id      : Optional. Object id of the service principal (Enterprise Application). secret         : Required. Secret of the service principal.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-id: The resource id of target service. Required if ['--target-resource-group', '--server', '--database'] are not specified. --target-resource-group --tg The resource group which contains the sql server. Required if '--target-id' is not specified.
        target-resource-group: The resource group which contains the sql server. Required if '--target-id' is not specified.
        user-account: 'The user account auth info. Usage: --user-account object-id=XX object-id              : Optional. Object id of current login user. It will be set automatically if not provided.'
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Create a connection from local to sql interactively: az connection create sql -g resourceGroup
    Create a connection from local to sql with resource id: az connection create sql -g resourceGroup --target-id /subscriptions/{subscription}/resourceGroups/{target_resource_group}/providers/Microsoft.Sql/servers/{server}/databases/{database} --secret name=XX secret=XX
    Create a connection from local to sql with resource name: az connection create sql -g resourceGroup --tg SqlRG --server MyServer --database MyDB --secret name=XX secret=XX
