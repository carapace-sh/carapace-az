# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a new rule and updates an existing rule
documentation:
    flag:
        action-compatibility-level: This property is reserved for future use. An integer value showing the compatibility level, currently hard-coded to 20.
        action-sql-expression: SQL expression. e.g. MyProperty='ABC'
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        compatibility-level: This property is reserved for future use. An integer value showing the compatibility level, currently hard-coded to 20.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        properties: dictionary object for custom filters  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        sql-expression: The SQL expression. e.g. MyProperty='ABC'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --action-compatibility-level=: This property is reserved for future use.
    --action-preprocessing=:
        description: Value that indicates whether the rule action requires preprocessing.
        nargs: -1
    --action-sql-expression=: SQL expression.
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --compatibility-level=: This property is reserved for future use.
    --content-type=: Content type of the message.
    --correlation-id=: Identifier of the correlation.
    --filter-type=: Filter type that is evaluated against a BrokeredMessage.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --label=: Application specific label.
    --message-id=: Identifier of the message.
    --namespace-name=: The namespace name
    --properties=:
        description: dictionary object for custom filters  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --reply-to-session-id=: Session identifier to reply to.
    --reply-to=: Address of the queue to reply to.
    --requires-preprocessing=:
        description: Value that indicates whether the rule action requires preprocessing.
        nargs: -1
    --session-id=: Session identifier.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sql-expression=: The SQL expression.
    --subscription-name=: The subscription name.
    --subscription=: Name or ID of subscription.
    --to=: Address to send to.
    --topic-name=: The topic name.
    -f, --enable-sql-preprocessing=:
        description: Value that indicates whether the rule action requires preprocessing.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The rule name.
completion:
    flag:
        action-preprocessing:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-sql-preprocessing:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        filter-type:
            - CorrelationFilter
            - SqlFilter
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        requires-preprocessing:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
