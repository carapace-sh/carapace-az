# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates the instance failover group.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --failover-policy=: The failover policy of the Instance Failover Group
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --grace-period=: Interval in hours before automatic failover is initiated if an outage occurs on the primary server.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --secondary-type=: Intended usage of the secondary instance in the Failover Group.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -l, --location=!: Location.
    -n, --name=!: The name of the Instance Failover Group
completion:
    flag:
        failover-policy:
            - Automatic
            - Manual
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        change-reference: The related change reference ID for this resource operation.
        failover-policy: |-
            The failover policy of the Instance Failover Group.

            Accepted values: Automatic, Manual
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        grace-period: Interval in hours before automatic failover is initiated if an outage occurs on the primary server. This indicates that Azure SQL Database will not initiate automatic failover before the grace period expires. Please note that failover operation with --allow-data-loss option might cause data loss due to the nature of asynchronous synchronization.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: The name of the Instance Failover Group.
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        secondary-type: Intended usage of the secondary instance in the Failover Group. Standby indicates that the secondary instance will be used as a passive replica for disaster recovery only.
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
