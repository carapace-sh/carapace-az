# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Update the existing policy with the provided details.
flags:
    --backup-management-type=: Specify the backup management type.
    --fix-for-inconsistent-items=:
        description: Specify whether or not to retry Policy Update for failed items.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --policy=: JSON encoded policy definition.
    --subscription=: Name or ID of subscription.
    --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Policy.
    -v, --vault-name=: Name of the Recovery services vault.
    -y, --yes=: Skip confirmation when updating Standard to Enhanced Policies.
completion:
    flag:
        backup-management-type:
            - AzureIaasVM
            - AzureStorage
            - AzureWorkload
        fix-for-inconsistent-items:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-management-type: |-
            Specify the backup management type. Define how Azure Backup manages the backup of entities within the ARM resource. For eg: AzureWorkloads refers to workloads installed within Azure VMs, AzureStorage refers to entities within Storage account. Required only if friendly name is used as Container name.

            Accepted values: AzureIaasVM, AzureStorage, AzureWorkload
        change-reference: The related change reference ID for this resource operation.
        fix-for-inconsistent-items: |-
            Specify whether or not to retry Policy Update for failed items.

            Accepted values: false, true
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the Policy.
        policy: JSON encoded policy definition. Use the show command with JSON output to obtain a policy object. Modify the values using a file editor and pass the object.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tenant-id: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
        vault-name: Name of the Recovery services vault.
        "yes": |-
            Skip confirmation when updating Standard to Enhanced Policies.

            Default value: False
examples:
    Update the existing policy with the provided details. (autogenerated): az backup policy set --policy {policy} --resource-group MyResourceGroup --vault-name MyVault
