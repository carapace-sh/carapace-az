# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: migrate-vlw
description: This operation migrates a blob container from container level WORM to object level immutability enabled container.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --storage-account=: The name or ID of the storage account.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The container name.
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The container name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        storage-account: The name or ID of the storage account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Migrate a blob container from container level WORM to object level immutability enabled container without waiting.: |-
        az storage container-rm migrate-vlw -n mycontainer --storage-account myaccount -g myresourcegroup --no-wait
        az storage container-rm show -n mycontainer --storage-account myaccount -g myresourcegroup  --query immutableStorageWithVersioning.migrationState
    Migrate a blob container from container level WORM to object level immutability enabled container.: az storage container-rm migrate-vlw -n mycontainer --storage-account myaccount -g myresourcegroup
