# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: register
description: Register a provider.
flags:
    --accept-terms=: Accept market place terms and RP terms for RPaaS.
    --subscription=: Name or ID of subscription.
    --wait=: wait for the registration to finish
    -c, --consent-to-permissions=: A value indicating whether authorization is consented or not.
    -m, --management-group-id=: The management group id to register.
    -n, --namespace=!: the resource namespace, aka 'provider'
documentation:
    flag:
        accept-terms: Accept market place terms and RP terms for RPaaS. Required when registering RPs from RPaaS, such as 'Microsoft.Confluent' and 'Microsoft.Datadog'.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        consent-to-permissions: A value indicating whether authorization is consented or not.
        management-group-id: The management group id to register.
        namespace: The resource namespace, aka 'provider'.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        wait: Wait for the registration to finish.
examples:
    Register a management group.: az provider register --namespace Microsoft.Automation -m mgID
    Register a provider from RPaaS.: az provider register -n 'Microsoft.Confluent' --accept-terms
    Register a provider. (autogenerated): az provider register --namespace 'Microsoft.PolicyInsights'
