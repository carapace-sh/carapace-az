# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: register
description: Register a provider.
documentation:
    flag:
        accept-terms: Accept market place terms and RP terms for RPaaS. Required when registering RPs from RPaaS, such as 'Microsoft.Confluent' and 'Microsoft.Datadog'.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --accept-terms=: Accept market place terms and RP terms for RPaaS.
    --subscription=: Name or ID of subscription.
    --wait=: wait for the registration to finish
    -c, --consent-to-permissions=: A value indicating whether authorization is consented or not.
    -m, --management-group-id=: The management group id to register.
    -n, --namespace=!: the resource namespace, aka 'provider'
