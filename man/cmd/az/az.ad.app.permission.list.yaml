# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List API permissions the application has requested
flags:
    --id=!: identifier uri, application id, or object id of the associated application
documentation:
    command: List API permissions the application has requested.
    flag:
        id: Identifier uri, application id, or object id of the associated application.
examples:
    List the OAuth2 permissions for an application.: az ad app permission list --id e042ec79-34cd-498f-9d9f-1234234
