# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List unmanaged disks of a VM.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --vm-name=!: The name of the Virtual Machine.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-name: The name of the Virtual Machine. You can configure the default using `az configure --defaults vm=<name>`
examples:
    List the unmanaged disks attached to a VM.: az vm unmanaged-disk list -g MyResourceGroup --vm-name MyVm
    List unmanaged disks with names containing the string "data_disk".: |-
        az vm unmanaged-disk list -g MyResourceGroup --vm-name MyVm \
            --query "[?contains(name, 'data_disk')]" --output table
