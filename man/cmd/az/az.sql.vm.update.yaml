# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates the properties of a SQL virtual machine.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --agent-rg=: Resource group containing the AMA resources DCE and DCR.
    --assessment-day-of-week=: Day of the week to run assessment.
    --assessment-monthly-occurrence=: Occurrence of the DayOfWeek day within a month to schedule assessment.
    --assessment-start-time-local=: Time of the day in HH:mm format.
    --assessment-weekly-interval=: Number of weeks to schedule between 2 assessment runs.
    --backup-pwd=: Password for encryption on backup.
    --backup-schedule-type=: Backup schedule type.
    --backup-system-dbs=:
        description: Include system databases on backup.
        nargs: -1
    --connectivity-type=: SQL Server connectivity option.
    --credential-name=: Credential name
    --day-of-week=: Day of week to apply the patch on.
    --enable-assessment-schedule=:
        description: Enable or disable assessment Schedule.
        nargs: -1
    --enable-assessment=:
        description: Enable or disable assessment feature.
        nargs: -1
    --enable-auto-backup=:
        description: Enable or disable autobackup on SQL virtual machine.
        nargs: -1
    --enable-auto-patching=:
        description: Enable or disable autopatching on SQL virtual machine.
        nargs: -1
    --enable-encryption=:
        description: Enable encryption for backup on SQL virtual machine.
        nargs: -1
    --enable-key-vault-credential=:
        description: Enable or disable key vault credential setting.
        nargs: -1
    --enable-r-services=:
        description: Enable or disable R services (SQL 2016 onwards).
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --full-backup-duration=: Duration of the time window of a given day during which full backups can take place.
    --full-backup-frequency=: Frequency of full backups.
    --full-backup-start-hour=: Start time of a given day during which full backups can take place.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --image-sku=: SQL image sku.
    --key-vault=: Azure Key Vault url.
    --least-privilege-mode=: SQL IaaS Agent Least Privilege Mode.
    --log-backup-frequency=: Frequency of log backups.
    --maintenance-window-duration=: Duration of patching.
    --maintenance-window-start-hour=: Hour of the day when patching is initiated.
    --port=: SQL Server port.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --retention-period=: Retention period of backup.
    --sa-key=: Storage account key where backup will be taken to.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sp-name=: Service principal name to access key vault.
    --sp-secret=: Service principal name secret to access key vault.
    --sql-mgmt-type=: SQL Server management type.
    --sql-workload-type=: SQL Server workload type.
    --storage-account=: Storage account url where backup will be taken to.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --workspace-name=: Name of the Log Analytics workspace to associate with VM.
    --workspace-rg=: Resource group containing the Log Analytics workspace.
    --workspace-sub=: Subscription containing the Log Analytics workspace.
    -g, --resource-group=: Name of resource group.
    -i, --license-type=: SQL Server license type.
    -n, --name=: Name of the SQL virtual machine.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        assessment-day-of-week:
            - Monday
            - Tuesday
            - Wednesday
            - Thursday
            - Friday
            - Saturday
            - Sunday
        assessment-monthly-occurrence:
            - "1"
            - "2"
            - "3"
            - "4"
            - "-1"
        assessment-weekly-interval:
            - "1"
            - "2"
            - "3"
            - "4"
            - "5"
            - "6"
        backup-schedule-type:
            - Manual
            - Automated
        backup-system-dbs:
            - "true"
            - "false"
        connectivity-type:
            - LOCAL
            - PRIVATE
            - PUBLIC
        day-of-week:
            - Everyday
            - Monday
            - Tuesday
            - Wednesday
            - Thursday
            - Friday
            - Saturday
            - Sunday
        enable-assessment:
            - "true"
            - "false"
        enable-assessment-schedule:
            - "true"
            - "false"
        enable-auto-backup:
            - "true"
            - "false"
        enable-auto-patching:
            - "true"
            - "false"
        enable-encryption:
            - "true"
            - "false"
        enable-key-vault-credential:
            - "true"
            - "false"
        enable-r-services:
            - "true"
            - "false"
        full-backup-frequency:
            - Daily
            - Weekly
        image-sku:
            - Developer
            - Express
            - Standard
            - Enterprise
            - Web
        least-privilege-mode:
            - Enabled
            - NotSet
        license-type:
            - PAYG
            - AHUB
            - DR
        sql-mgmt-type:
            - Full
            - LightWeight
            - NoAgent
        sql-workload-type:
            - GENERAL
            - OLTP
            - DW
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        agent-rg: |-
            Resource group containing the AMA resources DCE and DCR.

            Accepted values: Friday, Monday, Saturday, Sunday, Thursday, Tuesday, Wednesday

            Accepted values: -1, 1, 2, 3, 4

            Accepted values: false, true

            Accepted values: 1, 2, 3, 4, 5, 6
        assessment-monthly-occurrence: Occurrence of the DayOfWeek day within a month to schedule assessment. Supports values 1,2,3,4 and -1. Use -1 for last DayOfWeek day of the month (for example - last Tuesday of the month).
        assessment-start-time-local: Time of the day in HH:mm format. Examples include 17:30, 05:13.
        assessment-weekly-interval: Number of weeks to schedule between 2 assessment runs. Supports value from 1-6.
        backup-pwd: Password for encryption on backup.
        backup-schedule-type: |-
            Backup schedule type.

            Accepted values: Automated, Manual
        backup-system-dbs: |-
            Include system databases on backup.

            Default value: False

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        connectivity-type: |-
            SQL Server connectivity option.

            Accepted values: LOCAL, PRIVATE, PUBLIC
        credential-name: Credential name.
        day-of-week: |-
            Day of week to apply the patch on.

            Accepted values: Everyday, Friday, Monday, Saturday, Sunday, Thursday, Tuesday, Wednesday
        enable-assessment: |-
            Enable or disable assessment feature. If any assessment settings provided, parameter automatically sets to true.

            Accepted values: false, true
        enable-assessment-schedule: Enable or disable assessment Schedule. If any assessment schedule settings provided, parameter automatically sets to true.
        enable-auto-backup: |-
            Enable or disable autobackup on SQL virtual machine. If any backup settings provided, parameter automatically sets to true.

            Accepted values: false, true
        enable-auto-patching: |-
            Enable or disable autopatching on SQL virtual machine. If any autopatching settings provided, parameter automatically sets to true.

            Accepted values: false, true
        enable-encryption: |-
            Enable encryption for backup on SQL virtual machine.

            Default value: False

            Accepted values: false, true
        enable-key-vault-credential: |-
            Enable or disable key vault credential setting. If any key vault settings provided, parameter automatically sets to true.

            Accepted values: false, true
        enable-r-services: |-
            Enable or disable R services (SQL 2016 onwards).

            Accepted values: false, true
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        full-backup-duration: Duration of the time window of a given day during which full backups can take place. 1-23 hours.
        full-backup-frequency: |-
            Frequency of full backups. In both cases, full backups begin during the next scheduled time window.

            Accepted values: Daily, Weekly
        full-backup-start-hour: Start time of a given day during which full backups can take place. 0-23 hours.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        image-sku: |-
            SQL image sku.

            Accepted values: Developer, Enterprise, Express, Standard, Web
        key-vault: Azure Key Vault url.
        least-privilege-mode: |-
            SQL IaaS Agent Least Privilege Mode. Updates from sysadmin to specific permissions used per feature.

            Accepted values: Enabled, NotSet
        license-type: |-
            SQL Server license type.

            Accepted values: AHUB, DR, PAYG
        log-backup-frequency: Frequency of log backups. 5-60 minutes.
        maintenance-window-duration: Duration of patching. 30-180 minutes.
        maintenance-window-start-hour: Hour of the day when patching is initiated. Local VM time 0-23 hours.
        name: Name of the SQL virtual machine.
        port: SQL Server port.
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        retention-period: Retention period of backup. 1-30 days.
        sa-key: Storage account key where backup will be taken to.
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        sp-name: Service principal name to access key vault.
        sp-secret: Service principal name secret to access key vault.
        sql-mgmt-type: |-
            Argument 'sql_management_mode' has been deprecated and will be removed in a future release. SQL Server management type. Updates from LightWeight to Full.

            Accepted values: Full, LightWeight, NoAgent
        sql-workload-type: |-
            SQL Server workload type.

            Accepted values: DW, GENERAL, OLTP
        storage-account: Storage account url where backup will be taken to.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        workspace-name: Name of the Log Analytics workspace to associate with VM.
        workspace-rg: Resource group containing the Log Analytics workspace.
        workspace-sub: Subscription containing the Log Analytics workspace.
        "yes": |-
            Argument 'prompt' has been deprecated and will be removed in a future release. Do not prompt for confirmation. Requires --sql-mgmt-type.

            Default value: True
examples:
    Add or update a tag.: az sql vm update -n sqlvm -g myresourcegroup --set tags.tagName=tagValue
    Disable SQL virtual machine auto backup settings.: az sql vm update -n sqlvm -g myresourcegroup --enable-auto-backup false
    Disable SQL virtual machine auto patching settings.: az sql vm update -n sqlvm -g myresourcegroup --enable-auto-patching false
    Remove a tag.: az sql vm update -n sqlvm -g myresourcegroup --remove tags.tagName
    Update SQL virtual machine auto backup settings.: az sql vm update -n sqlvm -g myresourcegroup --backup-schedule-type manual --full-backup-frequency Weekly --full-backup-start-hour 2 --full-backup-duration 2 --sa-key {storageKey} --storage-account 'https://storageacc.blob.core.windows.net/' --retention-period 30 --log-backup-frequency 60
    Update SQL virtual machine auto patching settings.: az sql vm update -n sqlvm -g myresourcegroup --day-of-week sunday --maintenance-window-duration 60 --maintenance-window-start-hour 2
    Update a SQL virtual machine billing tag to AHUB.: az sql vm update -n sqlvm -g myresourcegroup --license-type AHUB
    Update a SQL virtual machine billing tag to DR.: az sql vm update -n sqlvm -g myresourcegroup --license-type DR
    Update a SQL virtual machine manageability from LightWeight to Full.: az sql vm update -n sqlvm -g myresourcegroup --sql-mgmt-type Full
    Update a SQL virtual machine to disable SQL best practice assessment.: az sql vm update -n sqlvm -g myresourcegroup --enable-assessment false
    Update a SQL virtual machine to disable schedule for SQL best practice assessment.: az sql vm update -n sqlvm -g myresourcegroup --enable-assessment-schedule false
    ? Update a SQL virtual machine to enable SQL best practices assessment while associating with a Log Analytics Workspace in a different subscription
    : az sql vm update -n sqlvm -g myresourcegroup --enable-assessment true --workspace-name myLogAnalyticsWorkspace --workspace-rg myRg --workspace-sub myLogAnalyticsWorkspaceSubName --agent-rg myRg2
    ? Update a SQL virtual machine to enable SQL best practices assessment without setting a schedule for running assessment on-demand. Must provide Log Analytics workspace and a Resource group for deploying the Agent resources.
    : az sql vm update -n sqlvm -g myresourcegroup --enable-assessment true --workspace-name myLogAnalyticsWorkspace --workspace-rg myRg --agent-rg myRg2
    ? Update a SQL virtual machine to enable schedule with monthly occurrence for SQL best practice assessment while associating with a Log Analytics workspace and assigning a Resource group for the Agent resources.
    : az sql vm update -n sqlvm -g myresourcegroup --workspace-name myLogAnalyticsWorkspace --workspace-rg myRg --agent-rg myRg2 --assessment-monthly-occurrence 1 --assessment-day-of-week monday --assessment-start-time-local '19:30'
    ? Update a SQL virtual machine to enable schedule with weekly interval for SQL best practice assessment when VM is already associated with a Log Analytics workspace.
    : az sql vm update -n sqlvm -g myresourcegroup --assessment-weekly-interval 1 --assessment-day-of-week monday --assessment-start-time-local '19:30'
    Update a SQL virtual machine to least privilege mode.: az sql vm update -n sqlvm -g myresourcegroup --least-privilege-mode Enabled --sql-mgmt-type Full
    Update a SQL virtual machine with specific sku type.: az sql vm update -n sqlvm -g myresourcegroup --image-sku Enterprise
