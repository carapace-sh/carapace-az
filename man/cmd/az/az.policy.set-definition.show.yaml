# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show a policy set definition.
flags:
    --management-group=: The name of the management group of the policy [set] definition.
    --subscription=: The subscription id of the policy [set] definition.
    -n, --name=!: The policy set definition name.
documentation:
    command: Retrieve a policy set definition.
    flag:
        expand: Additional properties to include in output.
        management-group: The name of the management group of the policy [set] definition. This parameter is required if your policy set is scoped to a management group.
        name: The name of the policy set definition.
examples:
    Retrieve a policy set definition: az policy set-definition show --name CostManagement
    Retrieve a policy set definition at management group level: az policy set-definition show --management-group MyManagementGroup --name CostManagement
