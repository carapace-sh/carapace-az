# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a Kusto pool database principalAssignment.
documentation:
    flag:
        principal-id: The principal ID assigned to the database principal. It can be a user email, application ID, or security group name.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --database-name=!: The name of the database in the Kusto pool.
    --kusto-pool-name=!: The name of the Kusto pool.
    --no-wait=: Do not wait for the long-running operation to finish.
    --principal-assignment-name=!: The name of the Kusto principalAssignment.
    --principal-id=: The principal ID assigned to the database principal.
    --principal-type=: Principal type.
    --role=: Database principal role.
    --subscription=: Name or ID of subscription.
    --tenant-id=: The tenant id of the principal
    --workspace-name=!: The name of the workspace
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        principal-type:
            - App
            - Group
            - User
        role:
            - Admin
            - Ingestor
            - Monitor
            - User
            - UnrestrictedViewer
            - Viewer
