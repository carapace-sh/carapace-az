# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: assign
description: Assign managed identities to an IoT Hub
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-assigned: Assign user-assigned managed identities to this hub. Accept space-separated list of identity resource IDs.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --role=: Role to assign to the hub's system-assigned managed identity.
    --scopes=:
        description: Space separated list of scopes to assign the role (--role) for the system-assigned managed identity.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --system-assigned=:
        description: Assign a system-assigned managed identity to this hub.
        nargs: -1
    --user-assigned=:
        description: Assign user-assigned managed identities to this hub.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: IoT Hub name.
completion:
    flag:
        system-assigned:
            - "true"
            - "false"
