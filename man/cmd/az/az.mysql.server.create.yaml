# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a server.
flags:
    --assign-identity=: Generate and assign an Microsoft Entra Identity for this server for use with key management services like Azure KeyVault.
    --auto-grow=: Enable or disable autogrow of the storage.
    --backup-retention=: The number of days a backup is retained.
    --geo-redundant-backup=: Enable or disable geo-redundant backups.
    --minimal-tls-version=: Set the minimal TLS version for connections to server when SSL is enabled.
    --public-network-access=: Enable or disable public network access to server.
    --sku-name=: The name of the sku.
    --ssl-enforcement=: Enable or disable ssl enforcement for connections to server.
    --storage-size=: The storage capacity of the server (unit is megabytes).
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --version=: Server major version.
    -g, --resource-group=: Name of resource group.
    -i, --infrastructure-encryption=: Add an optional second layer of encryption for data using new encryption algorithm.
    -l, --location=: Location.
    -n, --name=: Name of the server.
    -p, --admin-password=: The password of the administrator.
    -u, --admin-user=: Administrator username for the server.
completion:
    flag:
        auto-grow:
            - Enabled
            - Disabled
        geo-redundant-backup:
            - Enabled
            - Disabled
        infrastructure-encryption:
            - Enabled
            - Disabled
        minimal-tls-version:
            - TLS1_0
            - TLS1_1
            - TLS1_2
            - TLSEnforcementDisabled
        ssl-enforcement:
            - Enabled
            - Disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        admin-password: 'The password of the administrator. Minimum 8 characters and maximum 128 characters. Password must contain characters from three of the following categories: English uppercase letters, English lowercase letters, numbers, and non-alphanumeric characters.'
        admin-user: |-
            Administrator username for the server. Once set, it cannot be changed.

            Default value: bubblypepper9
        assign-identity: |-
            Generate and assign an Microsoft Entra Identity for this server for use with key management services like Azure KeyVault.

            Default value: False
        auto-grow: |-
            Enable or disable autogrow of the storage. Default value is Enabled.

            Default value: Enabled

            Accepted values: Disabled, Enabled
        backup-retention: The number of days a backup is retained. Range of 7 to 35 days. Default is 7 days.
        change-reference: The related change reference ID for this resource operation.
        geo-redundant-backup: |-
            Enable or disable geo-redundant backups. Default value is Disabled. Not supported in Basic pricing tier.

            Accepted values: Disabled, Enabled
        infrastructure-encryption: |-
            Add an optional second layer of encryption for data using new encryption algorithm. Default value is Disabled.

            Accepted values: Disabled, Enabled
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        minimal-tls-version: |-
            Set the minimal TLS version for connections to server when SSL is enabled. Default is TLSEnforcementDisabled.

            Accepted values: TLS1_0, TLS1_1, TLS1_2, TLSEnforcementDisabled
        name: 'Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters. --public --public-network-access Enable or disable public network access to server. When disabled, only connections made through Private Links can reach this server. Allowed values are : ``` Enabled ``` , ``` Disabled ``` , ``` all ``` , ``` 0.0.0.0 ``` , ``` <SingleIP> ``` , ``` <StartIP-DestinationIP> ``` . Default is ``` Enabled ``` .'
        public-network-access: 'Enable or disable public network access to server. When disabled, only connections made through Private Links can reach this server. Allowed values are : `Enabled`, `Disabled`, `all`, `0.0.0.0`, `<SingleIP>`, `<StartIP-DestinationIP>`. Default is `Enabled`.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku-name: |-
            The name of the sku. Follows the convention {pricing tier} {compute generation} {vCores} in shorthand. Examples: B_Gen5_1, GP_Gen5_4, MO_Gen5_16.

            Default value: GP_Gen5_2
        ssl-enforcement: |-
            Enable or disable ssl enforcement for connections to server. Default is Enabled.

            Accepted values: Disabled, Enabled
        storage-size: |-
            The storage capacity of the server (unit is megabytes). Minimum 5120 and increases in 1024 increments. Default is 5120.

            Default value: 5120
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        version: Server major version.
examples:
    Create a MySQL server in North Europe with sku GP_Gen5_2 (General Purpose, Gen 5 hardware, 2 vCores).: |-
        az mysql server create -l northeurope -g testgroup -n testsvr -u username -p password \
            --sku-name GP_Gen5_2
    Create a MySQL server with all paramaters set.: |-
        az mysql server create -l northeurope -g testgroup -n testsvr -u username -p password \
            --sku-name B_Gen5_1 --ssl-enforcement Enabled --minimal-tls-version TLS1_0 --public-network-access Disabled \
            --backup-retention 10 --geo-redundant-backup Enabled --storage-size 51200 \
            --tags "key=value" --version 5.7
