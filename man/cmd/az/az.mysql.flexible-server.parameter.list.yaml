# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all the configurations in a given server.
flags:
    --keyword=: The keyword of the server configuration.
    --page-size=: The pageSize of the server configuration.
    --page=: The page of the server configuration.
    --subscription=: Name or ID of subscription.
    --tags=: The tags of the server configuration.
    -g, --resource-group=!: Name of resource group.
    -s, --server-name=!: Name of the server.
documentation:
    command: List the parameter values for a flexible server.
    flag:
        keyword: The keyword of the server configuration. Default value is None.
        page: The page of the server configuration. Default value is None.
        page-size: The pageSize of the server configuration. Default value is None.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: The tags of the server configuration. Default value is None.
examples:
    List the parameter values for a flexible server in table format.: az mysql flexible-server parameter list --resource-group testGroup --server-name testserver --output table
    List the parameter values for a flexible server.: az mysql flexible-server parameter list --resource-group testGroup --server-name testserver
