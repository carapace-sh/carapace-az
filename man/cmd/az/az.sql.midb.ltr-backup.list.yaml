# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists the long term retention backups for a specified location, instance, or database.
flags:
    --database-state=: '''All'', ''Live'', or ''Deleted''.'
    --managed-instance=: Name of the Azure SQL Managed Instance.
    --only-latest-per-database=: If true, will only return the latest backup for each database
    --subscription=: Name or ID of subscription.
    -d, --database=: The name of the Azure SQL Managed Database.
    -g, --resource-group=: Name of resource group.
    -l, --location=!: The location of the desired backup(s).
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        database: The name of the Azure SQL Managed Database. If specified (along with instance name), retrieves all requested backups under this database. --database-state --state 'All', 'Live', or 'Deleted'. Will fetch backups only from databases of specified state. If no state provied, defaults to 'All'. --latest --only-latest-per-database If true, will only return the latest backup for each database. --managed-instance --mi Name of the Azure SQL Managed Instance. If specified, retrieves all requested backups under this managed instance.
        database-state: '''All'', ''Live'', or ''Deleted''. Will fetch backups only from databases of specified state. If no state provied, defaults to ''All''.'
        location: The location of the desired backup(s).
        managed-instance: Name of the Azure SQL Managed Instance. If specified, retrieves all requested backups under this managed instance.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List long term retention backups for a location (list only the latest LTR backups, which belong to live databases).: az sql midb ltr-backup list -l southeastasia --database-state Live --only-latest-per-database
    List long term retention backups for a location (with resource group argument).: az sql midb ltr-backup list -l southeastasia -g mygroup
    List long term retention backups for a managed database.: az sql midb ltr-backup list -l southeastasia --mi myinstance -d mymanageddb
    List long term retention backups for a managed instance (list only the latest LTR backups, which belong to live databases).: az sql midb ltr-backup list -l southeastasia --mi myinstance --database-state Live --only-latest-per-database
    List long term retention backups for a managed instance (with resource group argument).: az sql midb ltr-backup list -l southeastasia -g mygroup --mi myinstance
