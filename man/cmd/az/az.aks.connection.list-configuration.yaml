# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-configuration
description: List source configurations of a aks connection.
flags:
    --connection=: Name of the aks connection.
    --id=: The resource id of the connection.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group which contains the managed cluster.
    -n, --name=: Name of the managed cluster.
documentation:
    command: |-
        Command group 'aks connection' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        connection: Name of the aks connection.
        id: The resource id of the connection. ['--resource-group', '--name', '--connection'] are required if '--id' is not specified.
        name: Name of the managed cluster. Required if '--id' is not specified.None.
        resource-group: The resource group which contains the managed cluster. Required if '--id' is not specified.None.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List a connection's source configurations by connection id: az aks connection list-configuration --id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.Web/sites/{site}/providers/Microsoft.ServiceLinker/linkers/{linker}
    List a connection's source configurations by connection name: az aks connection list-configuration -g ClusterRG -n MyCluster --connection MyConnection
    List a connection's source configurations interactively: az aks connection list-configuration
