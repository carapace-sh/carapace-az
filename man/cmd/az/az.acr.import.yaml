# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: import
description: Imports an image to an Azure Container Registry from another Container Registry.
documentation:
    flag:
        image: 'The name and tag of the image using the format: ''-t repo/image:tag''. Multiple tags are supported by passing -t multiple times.'
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        registry: The source Azure container registry. This can be name, login server or resource ID of the source registry.
        repository: The repository name for a manifest-only copy of images. Multiple copies supported by passing --repository multiple times.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        source: Source image name or fully qualified source containing the registry login server. If `--registry` is used, `--source` will always be interpreted as a source image, even if it contains the login server.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --force=: Overwrite the existing tag of the image to be imported.
    --no-wait=: Do not wait for the import to complete and return immediately after queuing the import.
    --repository=: The repository name for a manifest-only copy of images.
    --source=!: Source image name or fully qualified source containing the registry login server.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
    -p, --password=: The password of source container registry
    -r, --registry=: The source Azure container registry.
    -t, --image=: 'The name and tag of the image using the format: ''-t repo/image:tag''.'
    -u, --username=: The username of source container registry
