# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a capacity pool
documentation:
    flag:
        encryption-type: Encryption type of the capacity pool, set encryption type for data at rest for this pool and all volumes in it. This value can only be set when creating new pool.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        size: Provisioned size of the pool. Must be an integer number of tebibytes in multiples of 4
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --cool-access=:
        description: If enabled (true) the pool can contain cool Access enabled volumes.
        nargs: -1
    --encryption-type=: Encryption type of the capacity pool, set encryption type for data at rest for this pool and all volumes in it.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --qos-type=: The qos type of the pool
    --service-level=: serviceLevel
    --size=: Provisioned size of the pool.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    -a, --account-name=!: The name of the NetApp account
    -g, --resource-group=!: Name of resource group.
    -l, --location=: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    -n, --name=!: The name of the capacity pool
completion:
    flag:
        cool-access:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        encryption-type:
            - Double
            - Single
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        qos-type:
            - Auto
            - Manual
        service-level:
            - Premium
            - Standard
            - StandardZRS
            - Ultra
