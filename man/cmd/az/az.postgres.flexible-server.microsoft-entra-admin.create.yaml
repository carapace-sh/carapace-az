# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Microsoft Entra administrator.
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -i, --object-id=!: The unique ID of the Microsoft Entra administrator.
    -s, --server-name=!: Name of the server.
    -t, --type=: Type of the Microsoft Entra administrator.
    -u, --display-name=!: Display name of the Microsoft Entra administrator user or group.
completion:
    flag:
        type:
            - User
            - Group
            - ServicePrincipal
            - Unknown
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        display-name: Display name of the Microsoft Entra administrator user or group.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        object-id: The unique identifier of the Microsoft Entra administrator.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: |-
            Type of the Microsoft Entra administrator.

            Default value: User

            Accepted values: Group, ServicePrincipal, Unknown, User
examples:
    ? Create Microsoft Entra administrator with user 'john@contoso.com', administrator identifier '00000000-0000-0000-0000-000000000000' and type User.
    : az postgres flexible-server microsoft-entra-admin create -g testgroup -s testserver -u john@contoso.com -i 00000000-0000-0000-0000-000000000000 -t User
