# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a traffic manager profile.
flags:
    --custom-headers=:
        description: Space-separated list of NAME=VALUE pairs.
        nargs: -1
    --interval=: The interval in seconds at which health checks are conducted.
    --max-failures=: The number of consecutive failed health checks tolerated before an endpoint is considered degraded.
    --max-return=: Maximum number of endpoints to be returned for MultiValue routing type.
    --path=: Path to monitor.
    --port=: Port to monitor.
    --protocol=: Monitor protocol.
    --routing-method=!: Routing method.
    --status-code-ranges=:
        description: Space-separated list of status codes in MIN-MAX or VAL format.
        nargs: -1
    --status=: Status of the Traffic Manager profile.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --timeout=: The time in seconds allowed for endpoints to respond to a health check.
    --ttl=: DNS config time-to-live in seconds.
    --unique-dns-name=!: Relative DNS name for the traffic manager profile.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Traffic manager profile name
completion:
    flag:
        protocol:
            - HTTP
            - HTTPS
            - TCP
        routing-method:
            - Performance
            - Weighted
            - Priority
            - Geographic
            - Multivalue
            - Subnet
        status:
            - Enabled
            - Disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        custom-headers: Space-separated list of NAME=VALUE pairs.
        interval: The interval in seconds at which health checks are conducted.
        max-failures: The number of consecutive failed health checks tolerated before an endpoint is considered degraded.
        max-return: Maximum number of endpoints to be returned for MultiValue routing type.
        name: Traffic manager profile name.
        path: Path to monitor. Use ""('""' in PowerShell) for none.
        port: |-
            Port to monitor.

            Default value: 80
        protocol: |-
            Monitor protocol.

            Default value: HTTP

            Accepted values: HTTP, HTTPS, TCP
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        routing-method: |-
            Routing method.

            Accepted values: Geographic, Multivalue, Performance, Priority, Subnet, Weighted
        status: |-
            Status of the Traffic Manager profile.

            Default value: Enabled

            Accepted values: Disabled, Enabled
        status-code-ranges: Space-separated list of status codes in MIN-MAX or VAL format.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        timeout: The time in seconds allowed for endpoints to respond to a health check.
        ttl: |-
            DNS config time-to-live in seconds.

            Default value: 30
        unique-dns-name: Relative DNS name for the traffic manager profile. Resulting FQDN will be ``` <unique-dns-name>.trafficmanager.net ``` and must be globally unique.
examples:
    Create a traffic manager profile with performance routing.: |-
        az network traffic-manager profile create -g MyResourceGroup -n MyTmProfile --routing-method Performance \
            --unique-dns-name mywebapp --ttl 30 --protocol HTTP --port 80 --path "/"
