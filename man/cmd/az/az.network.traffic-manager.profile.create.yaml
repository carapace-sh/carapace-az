# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a traffic manager profile.
documentation:
    flag:
        path: Path to monitor. Use ""('""' in PowerShell) for none.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        unique-dns-name: Relative DNS name for the traffic manager profile. Resulting FQDN will be `<unique-dns-name>.trafficmanager.net` and must be globally unique.
flags:
    --custom-headers=:
        description: Space-separated list of NAME=VALUE pairs.
        nargs: -1
    --interval=: The interval in seconds at which health checks are conducted.
    --max-failures=: The number of consecutive failed health checks tolerated before an endpoint is considered degraded.
    --max-return=: Maximum number of endpoints to be returned for MultiValue routing type.
    --path=: Path to monitor.
    --port=: Port to monitor.
    --protocol=: Monitor protocol.
    --routing-method=!: Routing method.
    --status-code-ranges=:
        description: Space-separated list of status codes in MIN-MAX or VAL format.
        nargs: -1
    --status=: Status of the Traffic Manager profile.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --timeout=: The time in seconds allowed for endpoints to respond to a health check.
    --ttl=: DNS config time-to-live in seconds.
    --unique-dns-name=!: Relative DNS name for the traffic manager profile.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Traffic manager profile name
completion:
    flag:
        protocol:
            - HTTP
            - HTTPS
            - TCP
        routing-method:
            - Performance
            - Weighted
            - Priority
            - Geographic
            - Multivalue
            - Subnet
        status:
            - Enabled
            - Disabled
