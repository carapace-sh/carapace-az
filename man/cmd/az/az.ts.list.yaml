# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List template specs or template spec versions.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the template spec.
documentation:
    flag:
        name: The name of the template spec.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all template specs in current default subscription.: az ts list
    List all template specs in resource group.: az ts list -g MyResourceGroup
    List all template specs in specified subscription.: az ts list --subscription Subscription
    List all versions of parent template spec.: az ts list -g MyResourceGroup -n TemplateSpecName
