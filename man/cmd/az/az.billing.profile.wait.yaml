# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: wait
description: Place the CLI in a waiting state until a condition of the billing profile is met.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --created=: wait until created with 'provisioningState' at 'Succeeded'
    --custom=: Wait until the condition satisfies a custom JMESPath query.
    --deleted=: wait until deleted
    --exists=: wait until the resource exists
    --expand=: May be used to expand the invoice sections.
    --interval=: polling interval in seconds
    --subscription=: Name or ID of subscription.
    --timeout=: maximum wait in seconds
    --updated=: wait until updated with provisioningState at 'Succeeded'
    -n, --name=!: The ID that uniquely identifies a billing profile.
documentation:
    command: |-
        Command group 'billing profile' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        created: |-
            Wait until created with 'provisioningState' at 'Succeeded'.

            Default value: False
        custom: Wait until the condition satisfies a custom JMESPath query. E.g. provisioningState!='InProgress', instanceView.statuses[?code=='PowerState/running'].
        deleted: |-
            Wait until deleted.

            Default value: False
        exists: |-
            Wait until the resource exists.

            Default value: False
        expand: May be used to expand the invoice sections.
        interval: |-
            Polling interval in seconds.

            Default value: 30
        name: The ID that uniquely identifies a billing profile.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: |-
            Maximum wait in seconds.

            Default value: 3600
        updated: |-
            Wait until updated with provisioningState at 'Succeeded'.

            Default value: False
examples:
    Pause executing next line of CLI script until the billing profile is successfully created.: az billing profile wait --expand "invoiceSections" --account-name "{billingAccountName}" --name "{billingProfileName}" --created
    Pause executing next line of CLI script until the billing profile is successfully updated.: az billing profile wait --expand "invoiceSections" --account-name "{billingAccountName}" --name "{billingProfileName}" --updated
