# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a Vault or HSM.
documentation:
    flag:
        hsm-name: Name of the HSM. (--hsm-name and --name/-n are mutually exclusive, please specify just one of them)
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --hsm-name=: Name of the HSM.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Proceed only if Key Vault belongs to the specified resource group.
    -n, --name=: Name of the Vault.
