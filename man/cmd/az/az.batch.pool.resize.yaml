# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: resize
description: Parameters for changing the size of an Azure Batch Pool.
flags:
    --abort=: Stop the pool resize operation.
    --account-endpoint=: Batch service endpoint.
    --account-key=: The Batch account key.
    --account-name=: The Batch account name.
    --if-match=: The operation will be performed only if the resource's current ETag exactly matches the specified value.
    --if-modified-since=: The operation will be performed only if the resource has been modified since the specified timestamp.
    --if-none-match=: The operation will not be performed only if the resource's current ETag exactly matches the specified value.
    --if-unmodified-since=: The operation will not be performed only if the resource has been modified since the specified timestamp.
    --node-deallocation-option=: When nodes may be removed from the pool, if the pool size is decreasing.
    --pool-id=!: The ID of the pool.
    --resize-timeout=: The default value is 15 minutes.
    --subscription=: Name or ID of subscription.
    --target-dedicated-nodes=: The desired number of dedicated Compute Nodes in the Pool.
    --target-low-priority-nodes=: The desired number of Spot/Low-priority Compute Nodes in the Pool.
completion:
    flag:
        node-deallocation-option:
            - requeue
            - terminate
            - taskcompletion
            - retaineddata
documentation:
    command: Resize or stop resizing a Batch pool.
    flag:
        abort: |-
            Stop the pool resize operation.

            Default value: False
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'The Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'The Batch account name. Only needed Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        if-match: The operation will be performed only if the resource's current ETag exactly matches the specified value.
        if-modified-since: The operation will be performed only if the resource has been modified since the specified timestamp.
        if-none-match: The operation will not be performed only if the resource's current ETag exactly matches the specified value.
        if-unmodified-since: The operation will not be performed only if the resource has been modified since the specified timestamp.
        node-deallocation-option: |-
            When nodes may be removed from the pool, if the pool size is decreasing.

            Accepted values: requeue, retaineddata, taskcompletion, terminate
        pool-id: The ID of the pool.
        resize-timeout: The default value is 15 minutes. The minimum value is 5 minutes. If you specify a value less than 5 minutes, the Batch service returns an error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). ISO-8601 duration format.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-dedicated-nodes: The desired number of dedicated Compute Nodes in the Pool.
        target-low-priority-nodes: The desired number of Spot/Low-priority Compute Nodes in the Pool.
