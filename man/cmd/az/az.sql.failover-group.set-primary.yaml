# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-primary
description: Failover a failover group.
flags:
    --allow-data-loss=: Complete the failover even if doing so may result in data loss.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --try-planned-before-forced-failover=: Performs a planned failover as the first step, and if it fails for any reason, then initiates a forced failover with potential data loss.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the Failover Group
    -s, --server=: Name of the Azure SQL Server.
documentation:
    command: Set the primary of the failover group by failing over all databases from the current primary server.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allow-data-loss: |-
            Complete the failover even if doing so may result in data loss. This will allow the failover to proceed even if a primary database is unavailable.

            Default value: False
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Failover Group.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        try-planned-before-forced-failover: Performs a planned failover as the first step, and if it fails for any reason, then initiates a forced failover with potential data loss. This will allow the failover to proceed even if a primary database is unavailable.
examples:
    Set the primary of the failover group by failing over all databases from the current primary server. (autogenerated): az sql failover-group set-primary --name MyFailoverGroup --resource-group MyResourceGroup --server myserver
