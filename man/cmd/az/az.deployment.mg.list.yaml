# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List deployments at management group.
flags:
    --filter=: Filter expression using OData notation.
    --subscription=: Name or ID of subscription.
    -m, --management-group-id=!: The management group id.
documentation:
    flag:
        filter: Filter expression using OData notation. You can use --filter "provisioningState eq '{state}'" to filter provisioningState. To get more information, please visit https://learn.microsoft.com/rest/api/resources/deployments/listatsubscriptionscope#uri-parameters .
        management-group-id: The management group id.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List deployments at management group.: az deployment mg list -m testmg
