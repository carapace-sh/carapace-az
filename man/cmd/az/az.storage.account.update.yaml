# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the properties of a storage account.
flags:
    --access-tier=: Required for storage accounts where kind = BlobStorage.
    --account-type=: Specify the Active Directory account type for Azure Storage.
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --allow-blob-public-access=:
        description: Allow or disallow public access to all blobs or containers in the storage account.
        nargs: -1
    --assign-identity=: Generate and assign a new Storage Account Identity for this storage account for use with key management services like Azure KeyVault.
    --azure-storage-sid=: Specify the security identifier (SID) for Azure Storage.
    --bypass=:
        description: Bypass traffic for space-separated uses.
        nargs: -1
    --custom-domain=: User domain assigned to the storage account.
    --default-action=: Default action to apply when no rule matches.
    --domain-guid=: Specify the domain GUID.
    --domain-name=: Specify the primary domain that the AD DNS server is authoritative for.
    --domain-sid=: Specify the security identifier (SID).
    --enable-files-aadds=:
        description: Enable Azure Active Directory Domain Services authentication for Azure Files
        nargs: -1
    --enable-files-aadkerb=:
        description: Enable Azure Files Active Directory Domain Service Kerberos Authentication for the storage account
        nargs: -1
    --enable-files-adds=:
        description: Enable Azure Files Active Directory Domain Service Authentication for storage account.
        nargs: -1
    --enable-large-file-share=: Enable the capability to support large file shares with more than 5 TiB capacity for storage account.Once the property is enabled, the feature cannot be disabled.
    --enable-local-user=:
        description: Enable local user features.
        nargs: -1
    --enable-sftp=:
        description: Enable Secure File Transfer Protocol.
        nargs: -1
    --encryption-key-name=: The name of the KeyVault key.
    --encryption-key-source=: The default encryption key source
    --encryption-key-vault=: The Uri of the KeyVault.
    --encryption-key-version=: The version of the KeyVault key to use, which will opt out of implicit key rotation.
    --encryption-services=:
        description: Specifies which service(s) to encrypt.
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --forest-name=: Specify the Active Directory forest to get.
    --https-only=:
        description: Allows https traffic only to storage service.
        nargs: -1
    --identity-type=: The identity type.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --immutability-period-in-days=: The immutability period for the blobs in the container since the policy creation, in days.
    --immutability-state=: Defines the mode of the policy.
    --key-expiration-period-in-days=: Expiration period in days of the Key Policy assigned to the storage account
    --min-tls-version=: The minimum TLS version to be permitted on requests to storage.
    --net-bios-domain-name=: Specify the NetBIOS domain name.
    --public-network-access=: Enable or disable public network access to the storage account.
    --publish-internet-endpoints=:
        description: A boolean flag which indicates whether internet routing storage endpoints are to be published.
        nargs: -1
    --publish-microsoft-endpoints=:
        description: A boolean flag which indicates whether microsoft routing storage endpoints are to be published.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --routing-choice=: Routing Choice defines the kind of network routing opted by the user.
    --sam-account-name=: Specify the Active Directory SAMAccountName for Azure Storage.
    --sas-expiration-period=: Expiration period of the SAS Policy assigned to the storage account, DD.HH:MM:SS.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku=: Note that the SKU name cannot be updated to Standard_ZRS, Premium_LRS or Premium_ZRS, nor can accounts of those SKU names be updated to any other value
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --upgrade-to-storagev2=:
        description: Upgrade Storage Account Kind to StorageV2.
        nargs: -1
    --use-subdomain=: Specify whether to use indirect CNAME validation.
    --user-identity-id=: The key is the ARM resource identifier of the identity.
    -d, --default-share-permission=: Default share permission for users using Kerberos authentication if RBAC role is not assigned.
    -f, --key-vault-federated-client-id=: ClientId of the multi-tenant application to be used in conjunction with the user-assigned identity for cross-tenant customer-managed-keys server-side encryption on the storage account.
    -g, --resource-group=: Name of resource group.
    -k, --allow-shared-key-access=:
        description: Indicate whether the storage account permits requests to be authorized with the account access key via Shared Key.
        nargs: -1
    -n, --name=: The storage account name.
    -r, --allow-cross-tenant-replication=:
        description: Allow or disallow cross AAD tenant object replication.
        nargs: -1
    -u, --key-vault-user-identity-id=: Resource identifier of the UserAssigned identity to be associated with server-side encryption on the storage account.
    -w, --allow-protected-append-writes=:
        description: This property can only be changed for disabled and unlocked time-based retention policies.
        nargs: -1
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        access-tier:
            - Hot
            - Cool
            - Premium
            - Cold
        allow-blob-public-access:
            - "true"
            - "false"
        allow-cross-tenant-replication:
            - "true"
            - "false"
        allow-protected-append-writes:
            - "true"
            - "false"
        allow-shared-key-access:
            - "true"
            - "false"
        bypass:
            - None
            - Logging
            - Metrics
            - AzureServices
        default-action:
            - Allow
            - Deny
        default-share-permission:
            - None
            - StorageFileDataSmbShareReader
            - StorageFileDataSmbShareContributor
            - StorageFileDataSmbShareElevatedContributor
        enable-files-aadds:
            - "true"
            - "false"
        enable-files-aadkerb:
            - "true"
            - "false"
        enable-files-adds:
            - "true"
            - "false"
        enable-local-user:
            - "true"
            - "false"
        enable-sftp:
            - "true"
            - "false"
        encryption-key-source:
            - Microsoft.Storage
            - Microsoft.Keyvault
        encryption-services:
            - blob
            - file
            - table
            - queue
        https-only:
            - "true"
            - "false"
        identity-type:
            - None
            - SystemAssigned
            - UserAssigned
            - SystemAssigned,UserAssigned
        immutability-state:
            - Unlocked
            - Locked
            - Disabled
        min-tls-version:
            - TLS1_0
            - TLS1_1
            - TLS1_2
            - TLS1_3
        public-network-access:
            - Enabled
            - Disabled
            - SecuredByPerimeter
        publish-internet-endpoints:
            - "true"
            - "false"
        publish-microsoft-endpoints:
            - "true"
            - "false"
        routing-choice:
            - MicrosoftRouting
            - InternetRouting
        sku:
            - Standard_LRS
            - Standard_GRS
            - Standard_RAGRS
            - Standard_ZRS
            - Premium_LRS
            - Premium_ZRS
            - Standard_GZRS
            - Standard_RAGZRS
            - StandardV2_LRS
            - StandardV2_GRS
            - StandardV2_ZRS
            - StandardV2_GZRS
            - PremiumV2_LRS
            - PremiumV2_ZRS
        upgrade-to-storagev2:
            - "true"
            - "false"
        use-subdomain:
            - "true"
            - "false"
documentation:
    flag:
        access-tier: |-
            Required for storage accounts where kind = BlobStorage. The access tier is used for billing. The "Premium" access tier is the default value for premium block blobs storage account type and it cannot be changed for the premium block blobs storage account type.

            Accepted values: Cold, Cool, Hot, Premium, Smart
        account-type: |-
            Specify the Active Directory account type for Azure Storage.

            Accepted values: Computer, User
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []

            Accepted values: false, true
        allow-blob-public-access: |-
            Allow or disallow public access to all blobs or containers in the storage account. If not specified, the default value is false for new account to follow best security practices. When true, containers in the account may be configured for public access. Note that setting this property to true does not enable anonymous access to any data in the account. The additional step of configuring the public access setting for a container is required to enable anonymous access.

            Accepted values: false, true
        allow-cross-tenant-replication: |-
            Allow or disallow cross AAD tenant object replication. Set this property to true for new or existing accounts only if object replication policies will involve storage accounts in different AAD tenants. If not specified, the default value is false for new accounts to follow best security practices.

            Accepted values: false, true
        allow-protected-append-writes: This property can only be changed for disabled and unlocked time-based retention policies. When enabled, new blocks can be written to an append blob while maintaining immutability protection and compliance. Only new blocks can be added and any existing blocks cannot be modified or deleted.
        allow-shared-key-access: |-
            Indicate whether the storage account permits requests to be authorized with the account access key via Shared Key. If false, then all requests, including shared access signatures, must be authorized with Azure Active Directory (Azure AD). The default value is null, which is equivalent to true.

            Accepted values: false, true
        allowed-copy-scope: |-
            Restrict copy to and from Storage Accounts within an AAD tenant or with Private Links to the same VNet.

            Accepted values: AAD, All, PrivateLink
        assign-identity: |-
            Generate and assign a new Storage Account Identity for this storage account for use with key management services like Azure KeyVault.

            Default value: False
        azure-storage-sid: |-
            Specify the security identifier (SID) for Azure Storage. Required when --enable-files-adds is set to True.

            Accepted values: false, true
        bypass: |-
            Bypass traffic for space-separated uses.

            Accepted values: AzureServices, Logging, Metrics, None
        change-reference: The related change reference ID for this resource operation.
        custom-domain: User domain assigned to the storage account. Name is the CNAME source. Use "" to clear existing value.
        default-action: |-
            Default action to apply when no rule matches.

            Accepted values: Allow, Deny
        default-share-permission: |-
            Default share permission for users using Kerberos authentication if RBAC role is not assigned.

            Accepted values: None, StorageFileDataSmbShareContributor, StorageFileDataSmbShareElevatedContributor, StorageFileDataSmbShareReader
        domain-guid: Specify the domain GUID. Required when --enable-files-adds is set to True.
        domain-name: Specify the primary domain that the AD DNS server is authoritative for. Required when --enable-files-adds is set to True.
        domain-sid: Specify the security identifier (SID). Required when --enable-files-adds is set to True.
        enable-extended-groups: |-
            Enable extended group support with local users feature, if set to true.

            Accepted values: false, true
        enable-files-aadds: |-
            Enable Azure Active Directory Domain Services authentication for Azure Files.

            Accepted values: false, true
        enable-files-aadkerb: |-
            Enable Azure Files Active Directory Domain Service Kerberos Authentication for the storage account.

            Accepted values: false, true
        enable-files-adds: |-
            Enable Azure Files Active Directory Domain Service Authentication for storage account. When --enable-files-adds is set to true, Azure Active Directory Properties arguments must be provided.

            Accepted values: false, true
        enable-large-file-share: Enable the capability to support large file shares with more than 5 TiB capacity for storage account.Once the property is enabled, the feature cannot be disabled. Currently only supported for LRS and ZRS replication types, hence account conversions to geo-redundant accounts would not be possible. For more information, please refer to https://go.microsoft.com/fwlink/?linkid=2086047 .
        enable-local-user: |-
            Enable local user features.

            Accepted values: false, true
        enable-sftp: |-
            Enable Secure File Transfer Protocol.

            Accepted values: false, true
        enable-smb-oauth: |-
            Specifies if managed identities can access SMB shares using OAuth.

            Accepted values: false, true
        encryption-key-name: The name of the KeyVault key.
        encryption-key-source: |-
            The default encryption key source.

            Accepted values: Microsoft.Keyvault, Microsoft.Storage
        encryption-key-vault: The Uri of the KeyVault.
        encryption-key-version: The version of the KeyVault key to use, which will opt out of implicit key rotation. Please use "" to opt in key auto-rotation again.
        encryption-services: |-
            Specifies which service(s) to encrypt.

            Accepted values: blob, file, queue, table
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        forest-name: Specify the Active Directory forest to get. Required when --enable-files-adds is set to True.
        https-only: |-
            Allows https traffic only to storage service.

            Accepted values: false, true
        identity-type: |-
            The identity type.

            Accepted values: None, SystemAssigned, SystemAssigned,UserAssigned, UserAssigned
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        immutability-state: |-
            Defines the mode of the policy. Disabled state disables the policy, Unlocked state allows increase and decrease of immutability retention time and also allows toggling allow-protected-append-write property, Locked state only allows the increase of the immutability retention time. A policy can only be created in a Disabled or Unlocked state and can be toggled between the two states. Only a policy in an Unlocked state can transition to a Locked state which cannot be reverted.

            Accepted values: Disabled, Locked, Unlocked
        key-vault-federated-client-id: ClientId of the multi-tenant application to be used in conjunction with the user-assigned identity for cross-tenant customer-managed-keys server-side encryption on the storage account.
        key-vault-user-identity-id: Resource identifier of the UserAssigned identity to be associated with server-side encryption on the storage account.
        min-tls-version: |-
            The minimum TLS version to be permitted on requests to storage. TLS1_3 is not yet supported. Microsoft recommends setting MinimumTlsVersion to TLS1_2.

            Accepted values: TLS1_0, TLS1_1, TLS1_2, TLS1_3
        name: The storage account name.
        net-bios-domain-name: Specify the NetBIOS domain name. Required when --enable-files-adds is set to True.
        public-network-access: |-
            Enable or disable public network access to the storage account. Possible values include: ``` Enabled ``` or ``` Disabled ``` .

            Accepted values: Disabled, Enabled, SecuredByPerimeter
        publish-internet-endpoints: |-
            A boolean flag which indicates whether internet routing storage endpoints are to be published.

            Accepted values: false, true
        publish-ipv6-endpoint: |-
            A boolean flag which indicates whether IPv6 storage endpoints are to be published.

            Accepted values: false, true
        publish-microsoft-endpoints: |-
            A boolean flag which indicates whether microsoft routing storage endpoints are to be published.

            Accepted values: false, true
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        routing-choice: |-
            Routing Choice defines the kind of network routing opted by the user.

            Accepted values: InternetRouting, MicrosoftRouting
        sam-account-name: |-
            Specify the Active Directory SAMAccountName for Azure Storage.

            Accepted values: Block, Log
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        sku: |-
            Note that the SKU name cannot be updated to Standard_ZRS, Premium_LRS or Premium_ZRS, nor can accounts of those SKU names be updated to any other value.

            Accepted values: PremiumV2_LRS, PremiumV2_ZRS, Premium_LRS, Premium_ZRS, StandardV2_GRS, StandardV2_GZRS, StandardV2_LRS, StandardV2_ZRS, Standard_GRS, Standard_GZRS, Standard_LRS, Standard_RAGRS, Standard_RAGZRS, Standard_ZRS
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        upgrade-to-storagev2: |-
            Upgrade Storage Account Kind to StorageV2.

            Accepted values: false, true
        use-subdomain: |-
            Specify whether to use indirect CNAME validation.

            Accepted values: false, true
        user-identity-id: The key is the ARM resource identifier of the identity. Only 1 User Assigned identity is permitted here.
        "yes": Do not prompt for confirmation.
        zone-placement-policy: |-
            The availability zone pinning policy for the storage account.

            Accepted values: Any, None
        zones: Describes the available zones for the product where storage account resource can be created.
examples:
    Update the properties of a storage account. (autogenerated): az storage account update --default-action Allow --name MyStorageAccount --resource-group MyResourceGroup
    Use a user-assigned managed identity instead of system-assigned managed identity: az storage account update --name <storage-account-name> --resource-group <resource-group-name> --encryption-key-vault <keyvault-uri> --encryption-key-name <key-name-in-keyvault> --encryption-key-source Microsoft.Keyvault --key-vault-user-identity-id <user-assigned-identity-id> --identity-type UserAssigned --user-identity-id <user-assigned-identity-id>`
