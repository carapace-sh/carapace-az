# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the client id and client secret setting name for an existing custom OpenID Connect identity provider.
flags:
    --client-id=: The Client ID of the app used for login.
    --client-secret-name=: The app secret name that contains the client secret of the relying party application.
    --client-secret=: The client secret.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --openid-configuration=: The endpoint that contains all the configuration endpoints for the provider.
    --provider-name=!: The name of the custom OpenID Connect provider.
    --scopes=: A list of the scopes that should be requested while authenticating.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Containerapp.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        client-id: The Client ID of the app used for login.
        client-secret: The client secret.
        client-secret-name: The app secret name that contains the client secret of the relying party application.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        openid-configuration: The endpoint that contains all the configuration endpoints for the provider.
        provider-name: The name of the custom OpenID Connect provider.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scopes: A list of the scopes that should be requested while authenticating.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Update the client id and client secret setting name for an existing custom OpenID Connect identity provider.: |-
        az containerapp auth openid-connect update -g myResourceGroup --name my-containerapp \
          --provider-name myOpenIdConnectProvider --client-id my-client-id \
          --client-secret-name MY_SECRET_APP_SETTING
