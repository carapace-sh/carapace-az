# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: backup
description: back up an API Management service to the configured storage account
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --backup-name=!: The name of the backup file to create.
    --no-wait=: Do not wait for the long-running operation to finish.
    --storage-account-container=!: The name of the storage account container used to place the backup.
    --storage-account-key=!: The access key of the storage account used to place the backup.
    --storage-account-name=!: The name of the storage account used to place the backup.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the api management service instance
