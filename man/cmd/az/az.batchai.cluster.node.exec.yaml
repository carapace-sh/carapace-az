# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: exec
description: Executes a command line on a cluster's node with optional ports forwarding.
documentation:
    flag:
        address: Specifies that connections to the given TCP port or Unix socket on the local (client) host are to be forwarded to the given host and port, or Unix socket, on the remote side. e.g. -L 8080:localhost:8080
        exec: Optional command line to be executed on the node. If not provided, the command will perform ports forwarding only.
        node-id: ID of the node to forward the ports to. If not provided, the command will be executed on the first available node.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        ssh-private-key: Optional SSH private key path to establish SSH connection. If omitted, the default SSH private key will be used.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --exec=: Optional command line to be executed on the node.
    --subscription=: Name or ID of subscription.
    -L, --address=: Specifies that connections to the given TCP port or Unix socket on the local (client) host are to be forwarded to the given host and port, or Unix socket, on the remote side.
    -c, --cluster=!: Name of cluster.
    -g, --resource-group=!: Name of resource group.
    -k, --ssh-private-key=: Optional SSH private key path to establish SSH connection.
    -n, --node-id=: ID of the node to forward the ports to.
    -p, --password=: Optional password to establish SSH connection.
    -w, --workspace=!: Name of workspace.
