# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: recover
description: Recover a deleted secret to its latest version.
flags:
    --id=: The recovery id of the secret.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Vault.
    -n, --name=: Name of the secret.
documentation:
    command: Recovers the deleted secret to the latest version.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        id: The recovery id of the secret. If specified all other 'Id' arguments should be omitted.
        name: Name of the secret. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Vault. Required if --id is not specified.
