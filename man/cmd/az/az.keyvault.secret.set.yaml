# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Set a secret value.
documentation:
    flag:
        encoding: Source file encoding. The value is saved as a tag (`file-encoding=<val>`) and used during download to automatically encode the resulting file.
        file: Source file for secret. Use in conjunction with '--encoding'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        value: Plain text secret value. Cannot be used with '--file' or '--encoding'
flags:
    --description=: Description of the secret contents (e.g. password, connection string, etc)
    --disabled=:
        description: Create secret in disabled state.
        nargs: -1
    --expires=: Expiration UTC datetime (Y-m-d'T'H:M:S'Z').
    --not-before=: Secret not usable before the provided UTC datetime (Y-m-d'T'H:M:S'Z').
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --value=: Plain text secret value.
    --vault-name=!: Name of the Vault.
    -e, --encoding=: Source file encoding.
    -f, --file=: Source file for secret.
    -n, --name=!: Name of the secret.
completion:
    flag:
        disabled:
            - "true"
            - "false"
        encoding:
            - utf-8
            - utf-16le
            - utf-16be
            - ascii
            - base64
            - hex
