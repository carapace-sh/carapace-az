# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: validate
description: Validate permissions required to create a cluster.
flags:
    --client-id=: Client ID of cluster service principal.
    --client-secret=: Client secret of cluster service principal.
    --cluster-resource-group=: Resource group of cluster.
    --disk-encryption-set=: ResourceID of the DiskEncryptionSet to be used for master and worker VMs.
    --master-subnet=!: Name or ID of master vnet subnet.
    --pod-cidr=: CIDR of pod network.
    --service-cidr=: CIDR of service network.
    --subscription=: Name or ID of subscription.
    --version=: OpenShift version to use for cluster creation.
    --vnet-resource-group=: Name of vnet resource group.
    --vnet=: Name or ID of vnet.
    --worker-subnet=!: Name or ID of worker vnet subnet.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of cluster.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        client-id: Client ID of cluster service principal.
        client-secret: Client secret of cluster service principal.
        cluster-resource-group: Resource group of cluster.
        disk-encryption-set: ResourceID of the DiskEncryptionSet to be used for master and worker VMs. --enable-managed-identity --enable-mi Enable managed identity for this cluster.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        master-subnet: Name or ID of master vnet subnet.  If name is supplied, `--vnet` must be supplied.
        name: Name of cluster.
        pod-cidr: 'CIDR of pod network. Must be a minimum of /18 or larger. [Default: 10.128.0.0/14].'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-cidr: 'CIDR of service network. Must be a minimum of /18 or larger. [Default: 172.30.0.0/16].'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        version: OpenShift version to use for cluster creation.
        vnet: Name or ID of vnet.  If name is supplied, `--vnet-resource-group` must be supplied.
        vnet-resource-group: Name of vnet resource group.
        worker-subnet: Name or ID of worker vnet subnet.  If name is supplied, `--vnet` must be supplied.
examples:
    Validate permissions and OpenShift version: az aro validate --resource-group MyGroup --name MyName --vnet MyVnet --master-subnet MyMasterSubnet --worker-subnet MyWorkerSubnet --version X.Y.Z
    Validate permissions.: az aro validate --resource-group MyGroup --name MyName --vnet MyVnet --master-subnet MyMasterSubnet --worker-subnet MyWorkerSubnet
