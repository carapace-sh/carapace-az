# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-support-types
description: List client types and auth types supported by local connections.
flags:
    --subscription=: Name or ID of subscription.
    -t, --target-type=: The target resource type
completion:
    flag:
        target-type:
            - postgres
            - postgres-flexible
            - mysql
            - mysql-flexible
            - sql
            - redis
            - redis-enterprise
            - cosmos-cassandra
            - cosmos-gremlin
            - cosmos-mongo
            - cosmos-table
            - cosmos-sql
            - storage-blob
            - storage-queue
            - storage-file
            - storage-table
            - keyvault
            - appconfig
            - eventhub
            - servicebus
            - signalr
            - webpubsub
            - confluent-cloud
            - fabric-sql
            - app-insights
            - cognitiveservices
            - neon-postgres
            - containerapp
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-type: The target resource type.
examples:
    List all supported target resource types and auth types: az connection list-support-types -o table
    List supported auth types for a specific target resource type: az connection list-support-types --target-type storage-blob -o table
