# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates a firewall rule in a Data Lake Store account.
documentation:
    flag:
        end-ip-address: The end of the valid ip range for the firewall rule. This can be either ipv4 or ipv6. Start and End should be in the same protocol.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        start-ip-address: The start of the valid ip range for the firewall rule. This can be either ipv4 or ipv6. Start and End should be in the same protocol.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --end-ip-address=: The end of the valid ip range for the firewall rule.
    --firewall-rule-name=!: The name of the firewall rule.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --start-ip-address=: The start of the valid ip range for the firewall rule.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
    -n, --account=: Name of the Data Lake Store account.
