# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: generate-sas
description: Generate a SAS token for directory in ADLS Gen2 account.
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit'
        as-user: 'Indicates that this command return the SAS signed with the user delegation key. The expiry parameter and ''--auth-mode login'' are required if this argument is specified. '
        auth-mode: 'The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE'
        blob-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with `az storage account show`. Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT'
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING'
        expiry: Specifies the UTC datetime (Y-m-d'T'H:M'Z') at which the SAS becomes invalid. Do not use if a stored access policy is referenced with --policy-name that specifies this value.
        https-only: Only permit requests made with the HTTPS protocol. If omitted, requests from both the HTTP and HTTPS protocol are permitted.
        ip: Specifies the IP address or range of IP addresses from which to accept requests. Supports only IPv4 style addresses.
        permissions: 'The permissions the SAS grants. Allowed values: (a)dd (c)reate (d)elete (e)xecute (l)ist (m)ove (o)wnership (p)ermissions (r)ead (w)rite. Do not use if a stored access policy is referenced with --id that specifies this value. Can be combined.'
        start: Specifies the UTC datetime (Y-m-d'T'H:M'Z') at which the SAS becomes valid. Do not use if a stored access policy is referenced with --policy-name that specifies this value. Defaults to the time of the request.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --as-user=: Indicates that this command return the SAS signed with the user delegation key.
    --auth-mode=: The mode in which to run the command.
    --blob-endpoint=: Storage data service endpoint.
    --cache-control=: Response header value for Cache-Control when resource is accessedusing this shared access signature.
    --connection-string=: Storage account connection string.
    --content-disposition=: Response header value for Content-Disposition when resource is accessedusing this shared access signature.
    --content-encoding=: Response header value for Content-Encoding when resource is accessedusing this shared access signature.
    --content-language=: Response header value for Content-Language when resource is accessedusing this shared access signature.
    --content-type=: Response header value for Content-Type when resource is accessedusing this shared access signature.
    --encryption-scope=: Specify the encryption scope for a request made so that all write operations will be service encrypted.
    --expiry=: Specifies the UTC datetime (Y-m-d'T'H:M'Z') at which the SAS becomes invalid.
    --full-uri=: Indicate that this command return the full blob URI and the shared access signature token.
    --https-only=: Only permit requests made with the HTTPS protocol.
    --ip=: Specifies the IP address or range of IP addresses from which to accept requests.
    --permissions=: The permissions the SAS grants.
    --policy-name=: The name of a stored access policy.
    --start=: Specifies the UTC datetime (Y-m-d'T'H:M'Z') at which the SAS becomes valid.
    --subscription=: Name or ID of subscription.
    -f, --file-system=!: File system name (i.e. container name).
    -n, --name=!: The name of directory.
completion:
    flag:
        auth-mode:
            - login
            - key
