# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upload-batch
description: Upload workspace package files from a local directory to an Azure Synapse workspace.
flags:
    --no-progress=: Include this flag to disable progress reporting for the command.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -s, --source=!: The directory where the files to be uploaded are located.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        no-progress: |-
            Include this flag to disable progress reporting for the command.

            Default value: False
        source: The directory where the files to be uploaded are located.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    Upload workspace package files from a local directory to an Azure Synapse workspace.: |-
        az synapse workspace-package upload-batch --workspace-name testsynapseworkspace \
          --source C:/package
