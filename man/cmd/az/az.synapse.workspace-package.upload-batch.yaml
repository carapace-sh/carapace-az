# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upload-batch
description: Upload workspace package files from a local directory to an Azure Synapse workspace.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --no-progress=: Include this flag to disable progress reporting for the command.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -s, --source=!: The directory where the files to be uploaded are located.
