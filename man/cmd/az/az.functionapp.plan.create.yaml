# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an App Service Plan for an Azure Function.
flags:
    --is-linux=:
        description: host function app on Linux worker
        nargs: -1
    --max-burst=: The maximum number of elastic workers for the plan.
    --number-of-workers=: The number of workers for the app service plan.
    --sku=!: The SKU of the app service plan.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of the app service plan
    -z, --zone-redundant=: Enable zone redundancy for high availability.
completion:
    flag:
        is-linux:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        is-linux: |-
            Host function app on Linux worker.

            Accepted values: false, true
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        max-burst: The maximum number of elastic workers for the plan. --min-instances --number-of-workers The number of workers for the app service plan.
        name: The name of the app service plan.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: The SKU of the app service plan. e.g., F1(Free), D1(Shared), B1(Basic Small), B2(Basic Medium), B3(Basic Large), S1(Standard Small), P1V2(Premium V2 Small), I1 (Isolated Small), I2 (Isolated Medium), I3 (Isolated Large), K1 (Kubernetes).
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        zone-redundant: |-
            Enable zone redundancy for high availability. Cannot be changed after plan creation. Minimum instance count is 3.

            Default value: False
examples:
    Create a basic app service plan.: az functionapp plan create -g MyResourceGroup -n MyPlan --sku B1
    Create an App Service Plan for an Azure Function. (autogenerated): az functionapp plan create --location westus2 --name MyPlan --number-of-workers 1 --resource-group MyResourceGroup --sku B1
    Create an elastic premium app service plan with burst out capability up to 10 instances.: az functionapp plan create -g MyResourceGroup -n MyPlan --min-instances 1 --max-burst 10 --sku EP1
