# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the billed and unbilled transactions by billing account name for given start and end date.
documentation:
    flag:
        filter: May be used to filter by transaction type. The filter supports 'eq', 'lt', 'gt', 'le', 'ge', and 'and'. It does not currently support 'ne', 'or', or 'not'. Tag filter is a key value pair string where key and value are separated by a colon (:).
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        period-end-date: The end date to fetch the transactions. The date should be specified in MM-DD-YYYY format.
        period-start-date: The start date to fetch the transactions. The date should be specified in MM-DD-YYYY format.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --billing-account-name=!: The ID that uniquely identifies a billing account.
    --filter=: May be used to filter by transaction type.
    --max-items=: Total number of items to return in the command's output.
    --next-token=: Token to specify where to start paginating.
    --period-end-date=!: The end date to fetch the transactions.
    --period-start-date=!: The start date to fetch the transactions.
    --subscription=: Name or ID of subscription.
