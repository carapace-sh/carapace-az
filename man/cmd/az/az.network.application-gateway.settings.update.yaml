# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update settings.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --backend-pool-host-name=:
        description: Whether to use host name of the backend server as the host header.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --gateway-name=!: Name of the application gateway.
    --host-name=: Host header sent to the backend servers.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --port=: Number of the destination port on the backend.
    --probe=: Name or ID of the probe to associate with the settings.
    --protocol=: Protocol used to communicate with the backend.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --root-certs=:
        description: Space-separated list of trusted root certificates (Names and IDs) to associate with the HTTP settings.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --timeout=: Request timeout in seconds.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the backend settings.
completion:
    flag:
        backend-pool-host-name:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - Http
            - Https
            - Tcp
            - Tls
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        backend-pool-host-name: |-
            Whether to use host name of the backend server as the host header.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        change-reference: The related change reference ID for this resource operation.
        enable-l4-client-ip: |-
            Whether to send Proxy Protocol header to backend servers over TCP or TLS protocols. Default value is false.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        gateway-name: Name of the application gateway.
        host-name: Host header sent to the backend servers.
        name: Name of the backend settings.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        port: Number of the destination port on the backend.
        probe: Name or ID of the probe to associate with the settings.
        protocol: |-
            Protocol used to communicate with the backend.

            Accepted values: Http, Https, Tcp, Tls
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        root-certs: Space-separated list of trusted root certificates (Names and IDs) to associate with the HTTP settings. `--host-name` or `--backend-pool-host-name` is required when this field is set.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: Request timeout in seconds.
examples:
    Update settings to use a new probe.: az network application-gateway settings update -g MyResourceGroup --gateway-name MyAppGateway -n MySettings --probe MyNewProbe
