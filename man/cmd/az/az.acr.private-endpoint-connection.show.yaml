# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show details of a container registry's private endpoint connection
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the private endpoint connection
    -r, --registry-name=!: The name of the container registry.
documentation:
    command: Show details of a container registry's private endpoint connection.
    flag:
        name: The name of the private endpoint connection.
        registry-name: The name of the container registry. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
