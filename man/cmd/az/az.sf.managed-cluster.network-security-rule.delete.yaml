# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a network security rule to a managed cluster.
flags:
    --name=!: Network security rule name
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    command: Delete a network security rule from a managed cluster.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        name: Network security rule name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Delete network security rule.: az sf managed-cluster network-security-rule delete -g testRG -c testCluster --name 'network security rule name'
