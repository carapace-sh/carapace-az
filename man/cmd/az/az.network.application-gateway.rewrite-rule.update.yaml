# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a rewrite rule.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --conditions=:
        description: Conditions based on which the action set execution will be evaluated.
        nargs: -1
    --enable-reroute=:
        description: If set as true, it will re-evaluate the url path map provided in path based request routing rules using modified path.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --gateway-name=!: Name of the application gateway.
    --modified-path=: URL path for url rewrite.
    --modified-query-string=: Query string for url rewrite.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --request-header-configurations=:
        description: Request Header Actions in the Action Set.
        nargs: -1
    --request-headers=:
        description: Space-separated list of HEADER=VALUE pairs.
        nargs: -1
    --response-header-configurations=:
        description: Response Header Actions in the Action Set.
        nargs: -1
    --response-headers=:
        description: Space-separated list of HEADER=VALUE pairs.
        nargs: -1
    --rule-set-name=!: Name of the rewrite rule set.
    --sequence=: Determine the execution order of the rule in the rule set.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the rewrite rule.
completion:
    flag:
        enable-reroute:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        conditions: Conditions based on which the action set execution will be evaluated.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        enable-reroute: |-
            If set as true, it will re-evaluate the url path map provided in path based request routing rules using modified path.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        gateway-name: Name of the application gateway.
        modified-path: URL path for url rewrite.
        modified-query-string: Query string for url rewrite.
        name: Name of the rewrite rule.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        request-header-configurations: Request Header Actions in the Action Set.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        request-headers: 'Space-separated list of HEADER=VALUE pairs. Values from: ``` az network application-gateway rewrite-rule list-request-headers ``` .  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        response-header-configurations: Response Header Actions in the Action Set.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        response-headers: 'Space-separated list of HEADER=VALUE pairs. Values from: ``` az network application-gateway rewrite-rule list-response-headers ``` .  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        rule-set-name: Name of the rewrite rule set.
        sequence: Determine the execution order of the rule in the rule set.
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a rewrite rule.: az network application-gateway rewrite-rule update --gateway-name MyGateway --name MyRewriteRule --remove tags.foo --resource-group MyResourceGroup --rule-set-name MyRuleSet
