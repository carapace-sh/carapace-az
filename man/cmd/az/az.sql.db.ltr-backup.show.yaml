# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets a long term retention backup.
flags:
    --subscription=: Name or ID of subscription.
    -d, --database=!: Name of the Azure SQL Database.
    -l, --location=!: The location of the desired backups.
    -n, --name=!: The name of the LTR backup.
    -s, --server=!: Name of the Azure SQL Server.
documentation:
    command: Get a long term retention backup for a database.
    flag:
        database: Name of the Azure SQL Database. If specified (along with server name), retrieves all requested backups under this database.
        location: The location of the desired backups.
        name: The name of the LTR backup. Use 'az sql db ltr-backup show' or 'az sql db ltr-backup list' for backup name.
        server: Name of the Azure SQL Server. If specified, retrieves all requested backups under this server.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show long term retention backup for a database.: az sql db ltr-backup show -l southeastasia -s myserver -d mydb -n "3214b3fb-fba9-43e7-96a3-09e35ffcb336;132292152080000000;Hot"
