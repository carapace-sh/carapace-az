# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update CORS policy for a container app.
flags:
    --allow-credentials=:
        description: Whether the credential is allowed for the container app.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --max-age=:
        description: The maximum age of the allowed origin in seconds.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -a, --allowed-headers=:
        description: A list of allowed header(s) for the container app.
        nargs: -1
    -e, --expose-headers=:
        description: A list of expose header(s) for the container app.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -m, --allowed-methods=:
        description: A list of allowed method(s) for the container app.
        nargs: -1
    -n, --name=: The name of the Containerapp.
    -r, --allowed-origins=:
        description: A list of allowed origin(s) for the container app.
        nargs: -1
completion:
    flag:
        allow-credentials:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allow-credentials: |-
            Whether the credential is allowed for the container app.

            Accepted values: false, true
        allowed-headers: A list of allowed header(s) for the container app. Values are space-separated. Empty string to clear existing values.
        allowed-methods: A list of allowed method(s) for the container app. Values are space-separated. Empty string to clear existing values.
        allowed-origins: A list of allowed origin(s) for the container app. Values are space-separated. Empty string to clear existing values.
        change-reference: The related change reference ID for this resource operation.
        expose-headers: A list of expose header(s) for the container app. Values are space-separated. Empty string to clear existing values.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        max-age: The maximum age of the allowed origin in seconds. Only postive integer or empty string are allowed. Empty string resets max_age to null.
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update allowed origins and allowed methods for a container app while keeping other cors settings.: az containerapp ingress cors update -n my-containerapp -g MyResourceGroup --allowed-origins http://www.contoso.com https://www.contoso.com --allowed-methods GET POST
