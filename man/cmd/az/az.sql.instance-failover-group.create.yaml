# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a failover group.
flags:
    --failover-policy=: The failover policy of the Instance Failover Group
    --grace-period=: Interval in hours before automatic failover is initiated if an outage occurs on the primary server.
    --partner-mi=!: The name of the partner managed instance of a Instance Failover Group
    --partner-resource-group=!: The name of the resource group of the partner managed instance
    --secondary-type=: Intended usage of the secondary instance in the Failover Group.
    --source-mi=!: Name of the Azure SQL Managed Instance.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Instance Failover Group
completion:
    flag:
        failover-policy:
            - Automatic
            - Manual
documentation:
    command: Creates an instance failover group between two connected managed instances.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        failover-policy: |-
            The failover policy of the Instance Failover Group.

            Default value: Automatic

            Accepted values: Automatic, Manual
        grace-period: |-
            Interval in hours before automatic failover is initiated if an outage occurs on the primary server. This indicates that Azure SQL Database will not initiate automatic failover before the grace period expires. Please note that failover operation with --allow-data-loss option might cause data loss due to the nature of asynchronous synchronization.

            Default value: 1
        name: The name of the Instance Failover Group.
        partner-mi: The name of the partner managed instance of a Instance Failover Group.
        partner-resource-group: The name of the resource group of the partner managed instance.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        secondary-type: |-
            Intended usage of the secondary instance in the Failover Group. Standby indicates that the secondary instance will be used as a passive replica for disaster recovery only.

            Default value: Geo
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
