# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a database.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --auto-pause-delay=: Time in minutes after which database is automatically paused.
    --backup-storage-redundancy=: Backup storage redundancy used to store backups.
    --compute-model=: The compute model of the database.
    --elastic-pool=: The name or resource id of the elastic pool to move the database into.
    --encryption-protector-auto-rotation=:
        description: Specifies the database encryption protector key auto rotation flag.
        nargs: -1
    --encryption-protector=: Specifies the Azure key vault key to be used as database encryption protector key.
    --federated-client-id=: The federated client id for the SQL Database.
    --filter=: An OData filter expression that filters elements in the collection.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --free-limit-exhaustion-behavior=: 'Specifies the behavior when monthly free limits are exhausted for the free database.AutoPause: The database will be auto paused upon exhaustion of free limits for remainder of the month.BillForUsage: The database will continue to be online upon exhaustion of free limitsand any overage will be billed.'
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --keys-to-remove=:
        description: The list of AKV keys to remove from the SQL Database.
        nargs: -1
    --keys=:
        description: The list of AKV keys for the SQL Database.
        nargs: -1
    --manual-cutover=:
        description: Whether to do manual cutover during Update SLO.
        nargs: -1
    --max-size=: The new maximum size of the database expressed in bytes.
    --min-capacity=: Minimal capacity that database will always have allocated, if not paused
    --no-wait=: Do not wait for the long-running operation to finish.
    --perform-cutover=:
        description: Whether to perform cutover when updating database to Hyperscale tier is in progress.
        nargs: -1
    --preferred-enclave-type=: Specifies type of enclave for this resource.
    --read-replicas=: The number of high availability replicas to provision for the database.
    --read-scale=: If enabled, connections that have application intent set to readonly in their connection string may be routed to a readonly secondary replica.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --service-objective=: The name of the new service objective.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --use-free-limit=:
        description: Whether or not the database uses free monthly limits.
        nargs: -1
    --user-assigned-identity-id=:
        description: The list of user assigned identity for the SQL Database.
        nargs: -1
    -c, --capacity=: The capacity component of the sku in integer number of DTUs or vcores.
    -e, --tier=: The edition component of the sku.
    -f, --family=: The compute generation component of the sku (for vcore skus only).
    -g, --resource-group=: Name of resource group.
    -i, --assign-identity=:
        description: Assign identity for database.
        nargs: -1
    -m, --maint-config-id=: Specified maintenance configuration id or name for this resource.
    -n, --name=: Name of the Azure SQL Database.
    -s, --server=: Name of the Azure SQL Server.
    -z, --zone-redundant=:
        description: Specifies whether to enable zone redundancy.
        nargs: -1
completion:
    flag:
        assign-identity:
            - "true"
            - "false"
        compute-model:
            - Provisioned
            - Serverless
        encryption-protector-auto-rotation:
            - "true"
            - "false"
        free-limit-exhaustion-behavior:
            - AutoPause
            - BillOverUsage
        manual-cutover:
            - "true"
            - "false"
        perform-cutover:
            - "true"
            - "false"
        preferred-enclave-type:
            - Default
            - VBS
        read-scale:
            - Enabled
            - Disabled
        use-free-limit:
            - "true"
            - "false"
        zone-redundant:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        assign-identity: |-
            Assign identity for database.

            Default value: False

            Accepted values: false, true
        auto-pause-delay: Time in minutes after which database is automatically paused. A value of -1 means that automatic pause is disabled.
        backup-storage-redundancy: 'Backup storage redundancy used to store backups. Allowed values include: Local, Zone, Geo, GeoZone.'
        capacity: The capacity component of the sku in integer number of DTUs or vcores.
        change-reference: The related change reference ID for this resource operation.
        compute-model: |-
            The compute model of the database.

            Accepted values: Provisioned, Serverless
        elastic-pool: The name or resource id of the elastic pool to move the database into.
        encryption-protector: |-
            Specifies the Azure key vault key to be used as database encryption protector key. --encryption-protector-auto-rotation --epauto Specifies the database encryption protector key auto rotation flag. Can be either true, false or null.

            Accepted values: false, true

            Accepted values: AutoPause, BillOverUsage
        encryption-protector-auto-rotation: Specifies the database encryption protector key auto rotation flag. Can be either true, false or null.
        family: 'The compute generation component of the sku (for vcore skus only). Allowed values include: Gen4, Gen5.'
        federated-client-id: The federated client id for the SQL Database. It is used for cross tenant CMK scenario.
        filter: An OData filter expression that filters elements in the collection. Default value is None.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False

            Accepted values: false, true
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        keys: The list of AKV keys for the SQL Database.
        keys-to-remove: The list of AKV keys to remove from the SQL Database.
        maint-config-id: Specified maintenance configuration id or name for this resource.
        manual-cutover: |-
            Whether to do manual cutover during Update SLO. Allowed when updating database to Hyperscale tier.

            Accepted values: false, true
        max-size: The new maximum size of the database expressed in bytes.
        min-capacity: Minimal capacity that database will always have allocated, if not paused.
        name: Name of the Azure SQL Database.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        perform-cutover: |-
            Whether to perform cutover when updating database to Hyperscale tier is in progress.

            Accepted values: false, true
        preferred-enclave-type: |-
            Specifies type of enclave for this resource.

            Accepted values: Default, VBS
        read-replicas: The number of high availability replicas to provision for the database. Only settable for Hyperscale edition.
        read-scale: |-
            If enabled, connections that have application intent set to readonly in their connection string may be routed to a readonly secondary replica. This property is only settable for Premium and Business Critical databases.

            Accepted values: Disabled, Enabled
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        service-objective: The name of the new service objective. If this is a standalone db service objective and the db is currently in an elastic pool, then the db is removed from the pool.
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tier: 'The edition component of the sku. Allowed values include: Basic, Standard, Premium, GeneralPurpose, BusinessCritical, Hyperscale.'
        use-free-limit: Whether or not the database uses free monthly limits. Allowed on one database in a subscription.
        zone-redundant: |-
            Specifies whether to enable zone redundancy. Default is true if no value is specified.

            Accepted values: false, true
examples:
    Trigger cutover with perform cutover option when update database to Hyperscale edition is in progress: az sql db update -g mygroup -s myserver -n mydb --perform-cutover
    Update a database to GeneralPurpose edition, 4 vcores with Gen5 hardware: az sql db update -g mygroup -s myserver -n mydb --edition GeneralPurpose --capacity 4 --family Gen5
    Update a database to Hyperscale edition, 2 vcores with Gen5 hardware, with manual cutover option: az sql db update -g mygroup -s myserver -n mydb --edition Hyperscale --service-objective HS_Gen5_2 --manual-cutover
    ? Update a database to Standard edition, S0 performance level (10 DTU) by specifying DTU capacity. Note that GeneralPurpose allows a wider range of max size than Standard edition.
    : az sql db update -g mygroup -s myserver -n mydb --edition Standard --capacity 10 --max-size 250GB
    ? Update a database to Standard edition, S1 performance level (20 DTU) by specifying performance level name. Note that GeneralPurpose allows a wider range of max size than Standard edition.
    : az sql db update -g mygroup -s myserver -n mydb --edition Standard --service-objective S1 --max-size 250GB
    Update database to serverless compute model: az sql db update -g mygroup -s myserver -n mydb --edition GeneralPurpose --capacity 2 --family Gen5 --compute-model Serverless
    Update database with VBS enclave enabled.: az sql db update -g mygroup -s myserver -n mydb --preferred-enclave-type VBS
    Update database with increased max size: az sql db update -g mygroup -s myserver -n mydb --max-size 500GB
    Update database with locally redundant backup storage: az sql db update -g mygroup -s myserver -n mydb --backup-storage-redundancy Local
    Update database with zone redundancy enabled: az sql db update -g mygroup -s myserver -n mydb -z
    Update database with zone redundancy explicitly disabled: az sql db update -g mygroup -s myserver -n mydb -z false
    Update exhaustion behavior of free limit database to BillOverUsage: az sql db update -g mygroup -s myserver -n mydb --free-limit-exhaustion-behavior BillOverUsage
