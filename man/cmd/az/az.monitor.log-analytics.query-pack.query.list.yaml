# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List queries defined within a log analytics query pack.
flags:
    --include-body=:
        description: Whether or not to return the body of each applicable query.
        nargs: -1
    --query-pack-name=!: The name of the log analytics query pack.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        include-body:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: |-
        Command group 'az monitor log-analytics query-pack query' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        include-body: |-
            Whether or not to return the body of each applicable query. If false, only return the query information.  Default: true.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        query-pack-name: The name of the log analytics query pack.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List queries in a query pack: az monitor log-analytics query-pack query list -g resourceGroupName --query-pack-name queryPackName
    List queries in a query pack without query body content: az monitor log-analytics query-pack query list -g resourceGroupName --query-pack-name queryPackName --include-body false
