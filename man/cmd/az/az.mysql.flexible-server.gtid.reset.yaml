# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reset
description: Resets GTID on a server.
flags:
    --gtid-set=!: A GTID set is a set comprising one or more single GTIDs or ranges of GTIDs.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -s, --server-name=!: Name of the server.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        gtid-set: 'A GTID set is a set comprising one or more single GTIDs or ranges of GTIDs. A GTID is represented as a pair of coordinates, separated by a colon character (:), as shown: source_id:transaction_id.'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Resets GTID '3E11FA47-71CA-11E1-9E33-C80AA9429562:23' on server 'testsvr'.: az mysql flexible-server gtid reset -g testgroup -s testsvr --gtid-set 3E11FA47-71CA-11E1-9E33-C80AA9429562:23
