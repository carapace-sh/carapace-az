# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows supported regulatory compliance details and state for selected assessment.
flags:
    --control-name=!: The compliance control name
    --standard-name=!: The compliance standard name
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        control-name: The compliance control name.
        name: Name of the resource to be fetched.
        standard-name: The compliance standard name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get selected regulatory compliance control details and state.: az security regulatory-compliance-assessments show --standard-name 'Azure-CIS-1.1.0' --control-name '1.1' -n '94290b00-4d0c-d7b4-7cea-064a9554e681'
