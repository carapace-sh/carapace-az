# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows supported regulatory compliance details and state for selected assessment.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --control-name=!: The compliance control name
    --standard-name=!: The compliance standard name
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
