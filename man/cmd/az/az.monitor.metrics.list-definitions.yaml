# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-definitions
description: List the metric definitions for the resource.
flags:
    --namespace=: Namespace to query metric definitions for.
    --resource-namespace=: Target resource provider namespace.
    --resource-parent=: Target resource parent path, if applicable.
    --resource-type=: Target resource type.
    --resource=!: Name or ID of the target resource.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        namespace: |-
            Namespace to query metric definitions for.

            Value from: az monitor metrics list-namespaces
        resource: Name or ID of the target resource.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-namespace: Target resource provider namespace.
        resource-parent: Target resource parent path, if applicable.
        resource-type: 'Target resource type. Can also accept namespace/type format (Ex: ''Microsoft.Compute/virtualMachines'').'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List the metric definitions for the resource. (autogenerated): az monitor metrics list-definitions --resource /subscriptions/{subscriptionID}/resourceGroups/{resourceGroup}/Microsoft.Network/networkSecurityGroups/{resourceName}
