# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a local VPN gateway.
documentation:
    flag:
        address-prefixes: List of CIDR block prefixes representing the address space of the OnPremise VPN's subnet.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        gateway-ip-address: Gateway's public IP address. (e.g. 10.1.1.1).
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
flags:
    --address-prefixes=:
        description: List of CIDR block prefixes representing the address space of the OnPremise VPN's subnet.
        nargs: -1
    --asn=: Autonomous System Number to use for the BGP settings.
    --bgp-peering-address=: IP address from the OnPremise VPN's subnet to use for BGP peering.
    --gateway-ip-address=: Gateway's public IP address.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --peer-weight=: Weight (0-100) added to routes learned through BGP peering.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the local network gateway.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
