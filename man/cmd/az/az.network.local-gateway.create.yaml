# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a local VPN gateway.
flags:
    --address-prefixes=:
        description: List of CIDR block prefixes representing the address space of the OnPremise VPN's subnet.
        nargs: -1
    --asn=: Autonomous System Number to use for the BGP settings.
    --bgp-peering-address=: IP address from the OnPremise VPN's subnet to use for BGP peering.
    --gateway-ip-address=: Gateway's public IP address.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --peer-weight=: Weight (0-100) added to routes learned through BGP peering.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the local network gateway.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        address-prefixes: List of CIDR block prefixes representing the address space of the OnPremise VPN's subnet.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        asn: Autonomous System Number to use for the BGP settings.
        bgp-peering-address: IP address from the OnPremise VPN's subnet to use for BGP peering.
        change-reference: The related change reference ID for this resource operation.
        gateway-ip-address: Gateway's public IP address. (e.g. 10.1.1.1).
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Name of the local network gateway.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        peer-weight: Weight (0-100) added to routes learned through BGP peering.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
examples:
    Create a Local Network Gateway to represent your on-premises site.: az network local-gateway create -g MyResourceGroup -n MyLocalGateway --gateway-ip-address 23.99.221.164 --local-address-prefixes 10.0.0.0/24 20.0.0.0/24
