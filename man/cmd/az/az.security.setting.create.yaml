# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create settings about different configurations in Microsoft Defender for Cloud
documentation:
    flag:
        alert-sync-settings: Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        data-export-settings: Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --alert-sync-settings=:
        description: Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --data-export-settings=:
        description: Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -n, --name=!: The name of the setting
completion:
    flag:
        name:
            - MCAS
            - Sentinel
            - WDATP
            - WDATP_EXCLUDE_LINUX_PUBLIC_PREVIEW
            - WDATP_UNIFIED_SOLUTION
