# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-connection-string
description: Builds a SQL connection string for a specified client provider.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --workspace-name=: The workspace name.
    -a, --auth-type=: Type of authentication.
    -c, --client=!: Type of client connection provider.
    -n, --name=: The SQL pool name.
completion:
    flag:
        auth-type:
            - SqlPassword
            - ADPassword
            - ADIntegrated
        client:
            - ado.net
            - jdbc
            - php
            - odbc
            - php_pdo
documentation:
    command: Generate a connection string to a SQL pool.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auth-type: |-
            Type of authentication.

            Default value: SqlPassword

            Accepted values: ADIntegrated, ADPassword, SqlPassword
        change-reference: The related change reference ID for this resource operation.
        client: |-
            Type of client connection provider.

            Accepted values: ado.net, jdbc, odbc, php, php_pdo
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: |-
            The SQL pool name.

            Default value: <sql pool name>
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: |-
            The workspace name.

            Default value: <workspace name>
examples:
    Generate connection string for ado.net: az synapse sql pool show-connection-string --name sqlpool --workspace-name testsynapseworkspace -c ado.net
