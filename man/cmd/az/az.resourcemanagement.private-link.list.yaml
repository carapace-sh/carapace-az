# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Get all the resource management private links at scope.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The name of the resource group.
documentation:
    flag:
        resource-group: The name of the resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all resource management private links in a resource group.: az resourcemanagement private-link list --resource-group testRG
    List all resource management private links in a subscription.: az resourcemanagement private-link list
