# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add-record
description: Add a TXT record.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -v, --value=!:
        description: Space-separated list of text values which will be concatenated together.
        nargs: -1
    -z, --zone-name=!: The name of the Private DNS zone.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        record-set-name: The name of the record set relative to the zone. Creates a new record set if one does not exist.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        value: Space-separated list of text values which will be concatenated together.
        zone-name: The name of the Private DNS zone.
examples:
    Add a TXT record.: |-
        az network private-dns record-set txt add-record -g MyResourceGroup -z www.mysite.com \
            -n MyRecordSet -v Owner=WebTeam
