# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a custom registry login credential to the task
flags:
    --login-server=!: The login server of the custom registry.
    --subscription=: Name or ID of subscription.
    --use-identity=: The task managed identity used for the credential.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the task.
    -p, --password=: The password to login to the custom registry.
    -r, --registry=!: The name of the container registry.
    -u, --username=: The username to login to the custom registry.
documentation:
    command: Add a custom registry login credential to the task.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        login-server: The login server of the custom registry. For instance, 'myregistry.azurecr.io'.
        name: The name of the task.
        password: The password to login to the custom registry. This can be plain text or a key vault secret URI.
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        use-identity: The task managed identity used for the credential. Use '[system]' to refer to the system-assigned identity or a client id to refer to a user-assigned identity. Please see https://aka.ms/acr/tasks/cross-registry-authentication for more information.
        username: The username to login to the custom registry. This can be plain text or a key vault secret URI.
examples:
    Add a registry login credential to a task that uses only the task system-assigned identity to authenticate to the registry.: |-
        az acr task credential add -n taskname -r registryname --login-server myregistry.docker.io \
            --use-identity [system]
    ? Add a registry login credential to a task using a plain text username and key vault secret URI for the password and the default managed identity for the task if one exists.
    : |-
        az acr task credential add -n taskname -r registryname --login-server myregistry.docker.io \
            -u myusername -p https://mykeyvault.vault.azure.net/secrets/secretpassword
    ? Add a registry login credential to a task using a plain text username and key vault secret URI for the password and the task user-assigned identity given by its client id.
    : |-
        az acr task credential add -n taskname -r registryname --login-server myregistry.docker.io \
            -u myusername -p https://mykeyvault.vault.azure.net/secrets/secretpassword \
            --use-identity 00000000-0000-0000-0000-000000000000
    Add a registry login credential to a task using a plain text username and password.: |-
        az acr task credential add -n taskname -r registryname --login-server myregistry.docker.io \
            -u myusername -p mysecret
    ? Add a registry login credential to a task using key vault secret URIs for the username and password and a task user-assigned identity given by its client id.
    : |-
        az acr task credential add -n taskname -r registryname --login-server myregistry.docker.io \
            -u https://mykeyvault.vault.azure.net/secrets/secretusername -p https://mykeyvault.vault.azure.net/secrets/secretpassword \
            --use-identity 00000000-0000-0000-0000-000000000000
    ? Add a registry login credential to a task using key vault secret URIs for the username and password and the task system-assigned identity.
    : |-
        az acr task credential add -n taskname -r registryname --login-server myregistry.docker.io \
            -u https://mykeyvault.vault.azure.net/secrets/secretusername -p https://mykeyvault.vault.azure.net/secrets/secretpassword \
            --use-identity [system]
