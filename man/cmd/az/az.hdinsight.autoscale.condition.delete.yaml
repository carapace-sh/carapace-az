# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete schedule condition.
flags:
    --cluster-name=!: The name of the cluster.
    --index=!:
        description: The Space-separated list of condition indices which starts with 0 to delete.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: The name of the cluster.
        index: The Space-separated list of condition indices which starts with 0 to delete.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete a schedule condition.: az hdinsight autoscale condition delete --resource-group MyResourceGroup --cluster-name MyCluster --index 0
    Delete multiple schedule conditions.: az hdinsight autoscale condition delete --resource-group MyResourceGroup --cluster-name MyCluster --index 0 1
