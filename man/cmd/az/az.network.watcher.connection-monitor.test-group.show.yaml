# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show a test group of a connection monitor.
flags:
    --connection-monitor=!: Connection monitor name.
    --subscription=: Name or ID of subscription.
    -l, --location=!: Location.
    -n, --name=!: The name of the connection monitor test group.
documentation:
    command: |-
        Command group 'network watcher connection-monitor test-group' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        connection-monitor: Connection monitor name.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` . --name --test-group-name -n The name of the connection monitor test group.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show a test group of a connection monitor.: az network watcher connection-monitor test-group show --connection-monitor MyConnectionMonitor --location westus2 --name MyConnectionMonitorTestGroup --subscription MySubscription
