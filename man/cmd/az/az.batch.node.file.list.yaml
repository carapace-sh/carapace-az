# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists all of the files in Task directories on the specified Compute Node.
documentation:
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT'
        filter: An OData $filter clause. For more information on constructing this filter,see https://learn.microsoft.com/rest/api/batchservice/odata-filters-in-batch.
        node-id: The ID of the Compute Node whose files you want to list. Required.
        pool-id: The ID of the Pool that contains the Compute Node. Required.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --filter=: An OData $filter clause.
    --node-id=!: The ID of the Compute Node whose files you want to list.
    --pool-id=!: The ID of the Pool that contains the Compute Node.
    --recursive=:
        description: Whether to list children of a directory.
        nargs: -1
    --subscription=: Name or ID of subscription.
completion:
    flag:
        recursive:
            - "true"
            - "false"
