# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists deployments for a resource policy remediation.
documentation:
    flag:
        resource: Resource ID or resource name. If a name is given, please provide the resource group and other relevant resource id arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --namespace=: 'Provider namespace (Ex: Microsoft.Provider).'
    --parent=: 'The parent path (Ex: resourceTypeA/nameA/resourceTypeB/nameB).'
    --resource-type=: 'Resource type (Ex: resourceTypeC).'
    --resource=: Resource ID or resource name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -m, --management-group=: Name of management group.
    -n, --name=!: Name of the remediation.
