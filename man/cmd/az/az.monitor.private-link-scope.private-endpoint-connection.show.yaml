# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show a private endpoint connection of a private link scope resource.
flags:
    --id=: ID of the private endpoint connection associated with the private link scope.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --scope-name=: Name of the Azure Monitor Private Link Scope.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the private endpoint connection associated with the private link scope.
documentation:
    command: |-
        Command group 'az monitor private-link-scope private-endpoint-connection' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        id: ID of the private endpoint connection associated with the private link scope. Values from ``` az monitor private-link-scope show ``` .
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the private endpoint connection associated with the private link scope.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scope-name: Name of the Azure Monitor Private Link Scope.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show a private endpoint connection of a private link scope resource.: az monitor private-link-scope private-endpoint-connection show -n MyName -g MyResourceGroup --scope-name MyScope
