# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a Synapse workspace.
flags:
    --account-name=: GitHub account name used for the repository or Azure devops organization name
    --allowed-tenant-ids=:
        description: The approved Azure AD tenants which outbound data traffic allowed to.
        nargs: -1
    --collaboration-branch=: The branch name where you will collaborate with others and from which you will publish.
    --host-name=: If using github Enterprise Server, provide sever URL.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --key-name=: The workspace customer-managed key display name.
    --last-commit-id=: The last commit ID.
    --no-wait=: Do not wait for the long-running operation to finish.
    --project-name=: The project name to which you are connecting.
    --repository-name=: The name of the repository to which you are connecting.
    --repository-type=: The repository configuration type.
    --root-folder=: The name of the folder to the location of your Azure synapse JSON resources are imported.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tenant-id=: The tenant id used to connect Azure devops
    --uami-action=: Action must be specified when you add/remove/set user assigned managed identities for workspace.The supported actions are:Add,Remove,Set.Add means to add user assigned managed identities for workspace, Remove means to remove user assigned managed identities from workspace, Set can be used when you want to add and remove user assigned managed identities at the same time, current identities will be coverd by specified ones.
    --uami-id-in-encrypt=: User assigned identity resource Id used in Workspace Encryption
    --uami-id=:
        description: The list of User-assigned Managed Identity Id for workspace.
        nargs: -1
    --use-sami-in-encrypt=: Whether use System assigned identity in Workspace Encryption.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The workspace name.
    -p, --sql-admin-login-password=: The sql administrator login password.
completion:
    flag:
        repository-type:
            - AzureDevOpsGit
            - GitHub
        uami-action:
            - Add
            - Remove
            - Set
documentation:
    flag:
        account-name: GitHub account name used for the repository or Azure devops organization name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allowed-tenant-ids: The approved Azure AD tenants which outbound data traffic allowed to. The Azure AD tenant of the current user will be included by default. Use "" or '' ('""' in PowerShell) to disable all allowed tenant ids.
        change-reference: The related change reference ID for this resource operation.
        collaboration-branch: The branch name where you will collaborate with others and from which you will publish.
        host-name: If using github Enterprise Server, provide sever URL. Do not use this option with GitHub Enterprise Cloud.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        key-name: The workspace customer-managed key display name. All existing keys can be found using "az synapse workspace key list" cmdlet.
        last-commit-id: The last commit ID.
        name: The workspace name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        project-name: The project name to which you are connecting.
        repository-name: The name of the repository to which you are connecting.
        repository-type: |-
            The repository configuration type.

            Accepted values: AzureDevOpsGit, GitHub
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        root-folder: The name of the folder to the location of your Azure synapse JSON resources are imported. Default is /.
        sql-admin-login-password: The sql administrator login password.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tenant-id: The tenant id used to connect Azure devops.
        uami-action: |-
            Action must be specified when you add/remove/set user assigned managed identities for workspace.The supported actions are:Add,Remove,Set.Add means to add user assigned managed identities for workspace, Remove means to remove user assigned managed identities from workspace, Set can be used when you want to add and remove user assigned managed identities at the same time, current identities will be coverd by specified ones.

            Accepted values: Add, Remove, Set
        uami-id: The list of User-assigned Managed Identity Id for workspace.
        uami-id-in-encrypt: User assigned identity resource Id used in Workspace Encryption.
        use-sami-in-encrypt: Whether use System assigned identity in Workspace Encryption. If use uami, please set True.If not, set False.
examples:
    Update a Synapse workspace: |-
        az synapse workspace update --name fromcli4 --resource-group rg \
          --tags key1=value1
    Update a Synapse workspace, add user assigned managed identity: |-
        az synapse workspace update --name fromcli4 --resource-group rg \
        --uami-action Add --uami-id "{your-first-uami-resourceid}" "{your-second-uami-resourceid}"
    Update a Synapse workspace, remove user assigned managed identity: |-
        az synapse workspace update --name fromcli4 --resource-group rg \
        --uami-action Remove --uami-id "{your-first-uami-resourceid}" "{your-second-uami-resourceid}"
    Update a Synapse workspace, rewrite user assigned managed identity: |-
        az synapse workspace update --name fromcli4 --resource-group rg \
        --uami-action Set --uami-id "{your-first-uami-resourceid}" "{your-second-uami-resourceid}"
    Update a Synapse workspace, set workspace encryption uami: |-
        az synapse workspace update --name fromcli4 --resource-group rg \
        --uami-id-in-encrypt "{your-encrytion-uami-resourceid}" --use-sami-in-encrypt False
