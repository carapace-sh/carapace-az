# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: insert
description: Insert an entity into a table.
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --auth-mode=: The mode in which to run the command.
    --connection-string=: Storage account connection string.
    --if-exists=: Behavior when an entity already exists for the specified PartitionKey and RowKey.
    --sas-token=: A Shared Access Signature (SAS).
    --subscription=: Name or ID of subscription.
    --table-endpoint=: Storage data service endpoint.
    -e, --entity=!:
        description: Space-separated list of key=value pairs.
        nargs: -1
    -t, --table-name=!: The table name.
completion:
    flag:
        auth-mode:
            - login
            - key
        if-exists:
            - fail
            - merge
            - replace
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY.'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auth-mode: |-
            The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE.

            Accepted values: key, login
        change-reference: The related change reference ID for this resource operation.
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING.'
        entity: 'Space-separated list of key=value pairs. Must contain a PartitionKey and a RowKey. The PartitionKey and RowKey must be unique within the table, and may be up to 64Kb in size. If using an integer value as a key, convert it to a fixed-width string which can be canonically sorted. For example, convert the integer value 1 to the string value "0000001" to ensure proper sorting. To manually specify the value type, an additional key,value pair can be added in the format of ``` key@odata.type=<EdmType> ``` where ``` <EdmType> ``` can be from the following list: Edm.Binary, Edm.Int64, Edm.Guid, Edm.DateTime, Edm.String, Edm.Int32, Edm.Double, Edm.Boolean.'
        if-exists: |-
            Behavior when an entity already exists for the specified PartitionKey and RowKey.

            Default value: fail

            Accepted values: fail, merge, replace
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_SAS_TOKEN.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        table-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with ``` az storage account show ``` . Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT.'
        table-name: The name of the table to insert the entity into.
examples:
    Insert an entity into a table. (autogenerated): az storage entity insert --connection-string $connectionString --entity PartitionKey=AAA RowKey=BBB Content=ASDF2 --if-exists fail --table-name MyTable
    Insert an entity when specifying the odatatype.: az storage entity insert --connection-string $connectionString --entity PartitionKey=AAA RowKey=BBB Content=0152 Content@odata.type=Edm.String --if-exists merge --table-name MyTable
