# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create some linked storage accounts for log analytics workspace.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        storage-accounts: List of Name or ID of Azure Storage Account.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --storage-accounts=!:
        description: List of Name or ID of Azure Storage Account.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --type=!: Data source type for the linked storage account.
    -g, --resource-group=!: Name of resource group.
    -n, --workspace-name=!: The name of the workspace.
completion:
    flag:
        type:
            - Alerts
            - AzureWatson
            - CustomLogs
            - Ingestion
            - Query
