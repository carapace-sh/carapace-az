# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets a list of Adaptive Network Hardenings resources in scope of an extended resource.
flags:
    --resource-name=!: Name of the resource
    --resource-namespace=!: The Namespace of the resource
    --resource-type=!: The type of the resource
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-name: Name of the resource.
        resource-namespace: The Namespace of the resource.
        resource-type: The type of the resource.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Adaptive Network Hardenings - List By Extended Resource: az security adaptive_network_hardenings list --resource-group 'RG1' --resource-type 'virtualMachines' --resource-namespace 'Microsoft.Compute' --resource-name 'VM1'
