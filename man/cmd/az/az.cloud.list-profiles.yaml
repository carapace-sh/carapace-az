# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-profiles
description: List the supported profiles for a cloud.
flags:
    --show-all=: Show all available profiles supported in the CLI.
    -n, --name=: Name of a registered cloud.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: |-
            Name of a registered cloud.

            Default value: AzureCloud
        show-all: |-
            Show all available profiles supported in the CLI.

            Default value: False
