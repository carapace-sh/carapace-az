# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the properties for a container.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --metadata=:
        description: Metadata in space-separated key=value pairs.
        nargs: -1
    --public-access=: Specify whether data in the container may be accessed publicly.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --root-squash=: Enable NFSv3 squash on blob container.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --storage-account=: The name or ID of the storage account.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The container name.
completion:
    flag:
        public-access:
            - "off"
            - blob
            - container
        root-squash:
            - NoRootSquash
            - RootSquash
            - AllSquash
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        metadata: Metadata in space-separated key=value pairs. This overwrites any existing metadata.
        name: The container name.
        public-access: |-
            Specify whether data in the container may be accessed publicly.

            Accepted values: blob, container, off
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        root-squash: |-
            Enable NFSv3 squash on blob container.

            Accepted values: AllSquash, NoRootSquash, RootSquash
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        storage-account: The name or ID of the storage account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update the metadata for a container under the specified storage account(account id).: az storage container-rm update --storage-account myaccountid --name mycontainer --metadata newkey1=newvalue1 newkey2=newvalue2
    Update the public access level for a container by resource id.: az storage container-rm update --ids mycontainerid --public-access blob
    Update the public access level to 'blob' for a container under the specified storage account.: az storage container-rm update --storage-account myaccount --name mycontainer --public-access blob
