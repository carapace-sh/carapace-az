# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: invoke
description: Execute a specific run command on a Virtual Machine Scale Set instance.
flags:
    --command-id=!: The command id.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --instance-id=: Scale set VM instance id.
    --parameters=:
        description: space-separated parameters in the format of '[name=]value'
        nargs: -1
    --scripts=:
        description: Space-separated script lines.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Scale set name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        command-id: The command id. Use 'az vmss run-command list' to get the list
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        instance-id: Scale set VM instance id.
        name: Scale set name. You can configure the default using ``` az configure --defaults vmss=<name> ``` .
        parameters: Space-separated parameters in the format of '[name=]value'.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scripts: Space-separated script lines. Use @{file} to load script from a file.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Install nginx on a VMSS instance.: az vmss run-command invoke -g MyResourceGroup -n MyVMSS --command-id RunShellScript \ --instance-id 0 --scripts "sudo apt-get update && sudo apt-get install -y nginx"
    Invoke a run-command with parameters on a VMSS instance.: az vmss run-command invoke -g MyResourceGroup -n MyVMSS --command-id RunShellScript \ --instance-id 4 --scripts 'echo $1 $2' --parameters hello world
    'Invoke command on all VMSS instances using the VMSS instance resource IDs. Note: "@-" expands to stdin.': |-
        az vmss list-instances -n MyVMSS -g my-rg --query "[].id" --output tsv | \
        az vmss run-command invoke --scripts 'echo $1 $2' --parameters hello world  \
            --command-id RunShellScript --ids @-
    Run powershell script on a windows VMSS instance with parameters. Script supplied from file.: |-
        # script.ps1
        #   param(
        #       [string]$arg1,
        #       [string]$arg2
        #   )
        #   Write-Host This is a sample script with parameters $arg1 and $arg2
        az vmss run-command invoke  --command-id RunPowerShellScript --name win-vm -g my-resource-group \
            --scripts @script.ps1 --parameters "arg1=somefoo" "arg2=somebar" --instance-id 5
    Run powershell script on a windows VMSS instance with parameters. Script supplied inline. Be wary of single-quoting in CMD.exe.: |-
        az vmss run-command invoke  --command-id RunPowerShellScript --name win-vm -g my-resource-group \
            --scripts 'param([string]$arg1,[string]$arg2)' \
            'Write-Host This is a sample script with parameters $arg1 and $arg2' \
            --parameters 'arg1=somefoo' 'arg2=somebar' --instance-id 2
