# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Configure a new backup schedule for a web app.
documentation:
    flag:
        backup-name: Name of the backup. If unspecified, the backup will be named with the web app name and a timestamp
        frequency: How often to backup. Use a number followed by d or h, e.g. 5d = 5 days, 2h = 2 hours
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        retention: How many days to keep a backup before automatically deleting it. Set to 0 for indefinite retention
        slot: the name of the slot. Default to the productions slot if not specified
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --backup-name=: Name of the backup.
    --container-url=: URL with SAS token to the blob storage container
    --db-connection-string=: Connection string for the database in the backup
    --db-name=: Name of the database in the backup
    --db-type=: Type of database in the backup
    --frequency=: How often to backup.
    --retain-one=:
        description: Always keep one backup, regardless of how old it is
        nargs: -1
    --retention=: How many days to keep a backup before automatically deleting it.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --webapp-name=!: The name of the web app
    -s, --slot=: the name of the slot.
completion:
    flag:
        db-type:
            - SqlAzure
            - MySql
            - LocalMySql
            - PostgreSql
        retain-one:
            - "true"
            - "false"
