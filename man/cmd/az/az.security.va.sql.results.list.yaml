# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: View all Sql Vulnerability Assessment scan results.
flags:
    --agent-id=: Provide the ID of the agent on the scanned machine, for On-Premise resources only
    --database-name=!: The name of the scanned database
    --scan-id=!: The ID of the scan
    --server-name=!: The name of the scanned server
    --subscription=: Name or ID of subscription.
    --vm-name=: Provide the name of the machine, for On-Premise resources only
    --vm-resource-id=!: Resource ID of the scanned machine.
    --vm-uuid=: Provide the UUID of the scanned machine, for On-Premise resources only
    --workspace-id=!: The ID of the workspace connected to the scanned machine
documentation:
    flag:
        agent-id: Provide the ID of the agent on the scanned machine, for On-Premise resources only.
        database-name: The name of the scanned database.
        scan-id: The ID of the scan.
        server-name: The name of the scanned server.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-name: Provide the name of the machine, for On-Premise resources only.
        vm-resource-id: Resource ID of the scanned machine. For On-Premise machines, please provide your workspace resource ID.
        vm-uuid: Provide the UUID of the scanned machine, for On-Premise resources only.
        workspace-id: The ID of the workspace connected to the scanned machine.
examples:
    View all Sql Vulnerability Assessment scan results on an Azure virtual machine.: az security va sql results list --vm-resource-id subscriptions/MySubscription/ResourceGroups/MyResourceGroup/Providers/Microsoft.Compute/VirtualMachines/MyVmName --workspace-id 00000000-0000-0000-0000-000000000000 --server-name MyServerName --database-name MyDbName --scan-id MyScanId
    View all Sql Vulnerability Assessment scan results on an On-Premise machine.: az security va sql results list --vm-resource-id subscriptions/MySubscription/ResourceGroups/MyResourceGroup/Providers/Microsoft.OperationalInsights/Workspaces/MyWorkspaceName --workspace-id 00000000-0000-0000-0000-000000000000 --server-name MyServerName --database-name MyDbName --vm-name MyVmName --agent-id MyAgentId --vm-uuid MyVmUUID --scan-id MyScanId
