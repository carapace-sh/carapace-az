# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a fixed or recurring autoscale profile.
flags:
    --autoscale-name=!: Name of the autoscale settings.
    --copy-rules=: Name of an existing schedule from which to copy the scaling rules for the new schedule.
    --count=!: The numer of instances to use.
    --end=:
        description: End time.
        nargs: -1
    --max-count=: The maximum number of instances.
    --min-count=: The minimum number of instances.
    --start=:
        description: Start time.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --timezone=!: Timezone name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the autoscale profile.
    -r, --recurrence=:
        nargs: -1
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        autoscale-name: Name of the autoscale settings.
        change-reference: The related change reference ID for this resource operation.
        copy-rules: Name of an existing schedule from which to copy the scaling rules for the new schedule.
        count: The numer of instances to use. If used with --min/max-count, the default number of instances to use.
        end: 'When the autoscale profile ends. Format depends on the type of profile. Fixed:  --end yyyy-mm-dd [hh:mm:ss] Weekly: [--end hh:mm].'
        max-count: The maximum number of instances.
        min-count: The minimum number of instances.
        name: Name of the autoscale profile.
        recurrence: 'When the profile recurs. If omitted, a fixed (non-recurring) profile is created. Usage:     --recurrence {week} [ARG ARG ...] Weekly:    --recurrence week Sat Sun.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        start: 'When the autoscale profile begins. Format depends on the type of profile. Fixed:  --start yyyy-mm-dd [hh:mm:ss] Weekly: [--start hh:mm].'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timezone: |-
            Timezone name.

            Value from: az monitor autoscale profile list-timezones
examples:
    Create a fixed date profile, inheriting the default scaling rules but changing the capacity.: |-
        az monitor autoscale create -g {myrg} --resource {resource-id} --min-count 2 --count 3 \
          --max-count 5
        az monitor autoscale rule create -g {myrg} --autoscale-name {name} --scale out 1 \
          --condition "Percentage CPU > 75 avg 5m"
        az monitor autoscale rule create -g {myrg} --autoscale-name {name} --scale in 1 \
          --condition "Percentage CPU < 25 avg 5m"
        az monitor autoscale profile create -g {myrg} --autoscale-name {name} -n Christmas \
          --copy-rules default --min-count 3 --count 6 --max-count 10 --start 2018-12-24 \
          --end 2018-12-26 --timezone "Pacific Standard Time"
    Create a fixed or recurring autoscale profile. (autogenerated): az monitor autoscale profile create --autoscale-name MyAutoscale --count 2 --max-count 10 --min-count 1 --name Christmas --recurrence week sat sun --resource-group MyResourceGroup --start 2018-12-24 --subscription MySubscription --timezone "Pacific Standard Time"
    Create a recurring weekend profile, inheriting the default scaling rules but changing the capacity.: |-
        az monitor autoscale create -g {myrg} --resource {resource-id} --min-count 2 --count 3 \
          --max-count 5
        az monitor autoscale rule create -g {myrg} --autoscale-name {name} --scale out 1 \
          --condition "Percentage CPU > 75 avg 5m"
        az monitor autoscale rule create -g {myrg} --autoscale-name {name} --scale in 1 \
          --condition "Percentage CPU < 25 avg 5m"
        az monitor autoscale profile create -g {myrg} --autoscale-name {name} -n weeekend \
          --copy-rules default --min-count 1 --count 2 --max-count 2 \
          --recurrence week sat sun --timezone "Pacific Standard Time"
