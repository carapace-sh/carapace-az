# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create Authorization Rule for the given Relay Service Namespace.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        rights: 'Space-separated list of Authorization rule rights. Allowed values: Listen, Manage, Send.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --namespace-name=!: Name of Namespace.
    --rights=:
        description: Space-separated list of Authorization rule rights.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of Namespace Authorization Rule.
