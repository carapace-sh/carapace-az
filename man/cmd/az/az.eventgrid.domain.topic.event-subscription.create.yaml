# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new event subscription for a domain topic
flags:
    --advanced-filter=:
        description: An advanced filter enables filtering of events based on a specific event property.
        nargs: -1
    --azure-active-directory-application-id-or-uri=: The Azure Active Directory Application Id or Uri to get the access token that will be included as the bearer token in delivery requests.
    --azure-active-directory-tenant-id=: The Azure Active Directory Tenant Id to get the access token that will be included as the bearer token in delivery requests.
    --deadletter-endpoint=: The Azure resource ID of an Azure Storage blob container destination where EventGrid should deadletter undeliverable events for this event subscription.
    --domain-name=!: Name of the domain.
    --domain-topic-name=!: Name of the domain topic.
    --enable-advanced-filtering-on-arrays=:
        description: Allows advanced filters to be evaluated against an array of values instead of expecting a singular value.
        nargs: -1
    --endpoint-type=: The type of the destination endpoint.
    --endpoint=: Endpoint where EventGrid should deliver events matching this event subscription.
    --event-delivery-schema=: The schema in which events should be delivered for this event subscription.
    --event-ttl=: Event time to live (in minutes).
    --expiration-date=: Date or datetime (in UTC, e.g. '2018-11-30T11:59:59+00:00' or '2018-11-30') after which the event subscription would expire.
    --included-event-types=:
        description: A space-separated list of event types (e.g., Microsoft.Storage.BlobCreated and Microsoft.Storage.BlobDeleted).
        nargs: -1
    --labels=:
        description: A space-separated list of labels to associate with this event subscription.
        nargs: -1
    --max-delivery-attempts=: Maximum number of delivery attempts.
    --max-events-per-batch=: Maximum number of events in a batch.
    --preferred-batch-size-in-kilobytes=: Preferred batch size in kilobytes.
    --storage-queue-msg-ttl=: Storage queue message time to live in seconds.
    --subject-begins-with=: An optional string to filter events for an event subscription based on a prefix.
    --subject-case-sensitive=:
        description: Specify to indicate whether the subject fields should be compared in a case sensitive manner.
        nargs: -1
    --subject-ends-with=: An optional string to filter events for an event subscription based on a suffix.
    --subscription=: Name or ID of subscription.
    -d, --delivery-attribute-mapping=:
        description: Add delivery attribute mapping to send additional information via HTTP headers when delivering events.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the event subscription.
completion:
    flag:
        enable-advanced-filtering-on-arrays:
            - "true"
            - "false"
        endpoint-type:
            - webhook
            - eventhub
            - storagequeue
            - hybridconnection
            - servicebusqueue
            - servicebustopic
            - azurefunction
        event-delivery-schema:
            - eventgridschema
            - custominputschema
            - cloudeventschemav1_0
        subject-case-sensitive:
            - "true"
            - "false"
documentation:
    command: Create a new event subscription for a domain topic.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        advanced-filter: 'An advanced filter enables filtering of events based on a specific event property. Usage:                     --advanced-filter KEY[.INNERKEY] FILTEROPERATOR VALUE [VALUE ...] StringIn:                  --advanced-filter data.Color StringIn Blue Red Orange Yellow StringNotIn:               --advanced-filter data.Color StringNotIn Blue Red Orange Yellow StringContains:            --advanced-filter subject StringContains Blue Red StringNotContains:         --advanced-filter subject StringNotContains Blue Red StringBeginsWith:          --advanced-filter subject StringBeginsWith Blue Red StringNotBeginsWith:       --advanced-filter subject StringNotBeginsWith Blue Red StringEndsWith:            --advanced-filter subject StringEndsWith img png jpg StringNotEndsWith:         --advanced-filter subject StringNotEndsWith img png jpg NumberIn:                  --advanced-filter data.property1 NumberIn 5 10 20 NumberInRange              --advanced-filter data.property1 NumberInRange 5,10 20,30 40,50 NumberNotIn:               --advanced-filter data.property2 NumberNotIn 100 200 300 NumberNotInRange:          --advanced-filter data.property2 NumberNotInRange 100,110 200,210 300,310 NumberLessThan:            --advanced-filter data.property3 NumberLessThan 100 NumberLessThanOrEquals:    --advanced-filter data.property2 NumberLessThanOrEquals 100 NumberGreaterThan:         --advanced-filter data.property3 NumberGreaterThan 100 NumberGreaterThanOrEquals: --advanced-filter data.property2 NumberGreaterThanOrEquals 100 BoolEquals:                --advanced-filter data.property3 BoolEquals true IsNullOrUndefined:         --advanced-filter data.property3 IsNullOrUndefined IsNotNull:                 --advanced-filter data.property3 IsNotNull Multiple advanced filters can be specified by using more than one ```'
        azure-active-directory-application-id-or-uri: The Azure Active Directory Application Id or Uri to get the access token that will be included as the bearer token in delivery requests. Applicable only for webhook as a destination
        azure-active-directory-tenant-id: The Azure Active Directory Tenant Id to get the access token that will be included as the bearer token in delivery requests. Applicable only for webhook as a destination
        change-reference: The related change reference ID for this resource operation.
        deadletter-endpoint: 'The Azure resource ID of an Azure Storage blob container destination where EventGrid should deadletter undeliverable events for this event subscription. Example: --deadletter-endpoint /subscriptions/{SubID}/resourceGroups/rg1/providers/Microsoft.Storage/storageAccounts/sa1/blobServices/default/containers/containerName.'
        delivery-attribute-mapping: |-
            ``` argument. Usage:                        --delivery-attribute-mapping attribute-name attribute-type attribute-value [attribute-is-secret] Static Attribute Mapping:     --delivery-attribute-mapping somename static somevalue Static Attribute Mapping:     --delivery-attribute-mapping somename static somevalue false Static Attribute Mapping:     --delivery-attribute-mapping somename static somevalue true Dynamic Attribute Mapping:    --delivery-attribute-mapping somename dynamic somevalue Both Static and Dynamic:      --delivery-attribute-mapping somename dynamic somevalue --delivery-attribute-mapping somename2 static somevalue. --enable-advanced-filtering-on-arrays --enable-af-arr Allows advanced filters to be evaluated against an array of values instead of expecting a singular value.

            Accepted values: false, true
        domain-name: Name of the domain.
        domain-topic-name: Name of the domain topic.
        endpoint: Endpoint where EventGrid should deliver events matching this event subscription. For webhook endpoint type, this should be the corresponding webhook URL. For other endpoint types, this should be the Azure resource identifier of the endpoint. It is expected that the destination endpoint to be already created and available for use before executing any Event Grid command.
        endpoint-type: |-
            The type of the destination endpoint.

            Default value: webhook

            Accepted values: azurefunction, eventhub, hybridconnection, servicebusqueue, servicebustopic, storagequeue, webhook
        event-delivery-schema: |-
            The schema in which events should be delivered for this event subscription. By default, events will be delivered in the same schema in which they are published (based on the corresponding topic's input schema).

            Accepted values: cloudeventschemav1_0, custominputschema, eventgridschema
        event-ttl: |-
            Event time to live (in minutes). Must be a number between 1 and 1440.

            Default value: 1440
        expiration-date: Date or datetime (in UTC, e.g. '2018-11-30T11:59:59+00:00' or '2018-11-30') after which the event subscription would expire. By default, there is no expiration for the event subscription.
        included-event-types: A space-separated list of event types (e.g., Microsoft.Storage.BlobCreated and Microsoft.Storage.BlobDeleted). In order to subscribe to all default event types, do not specify any value for this argument. For event grid topics, event types are customer defined. For Azure events, e.g., Storage Accounts, IoT Hub, etc., you can query their event types using this CLI command 'az eventgrid topic-type list-event-types'.
        labels: A space-separated list of labels to associate with this event subscription.
        max-delivery-attempts: |-
            Maximum number of delivery attempts. Must be a number between 1 and 30.

            Default value: 30
        max-events-per-batch: Maximum number of events in a batch. Must be a number between 1 and 5000. --pref-batch-size-kb --preferred-batch-size-in-kilobytes Preferred batch size in kilobytes. Must be a number between 1 and 1024. --qttl --storage-queue-msg-ttl Storage queue message time to live in seconds.
        name: Name of the event subscription.
        preferred-batch-size-in-kilobytes: Preferred batch size in kilobytes. Must be a number between 1 and 1024.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subject-begins-with: An optional string to filter events for an event subscription based on a prefix. Wildcard characters are not supported.
        subject-case-sensitive: |-
            Specify to indicate whether the subject fields should be compared in a case sensitive manner. True if flag present.

            Default value: False

            Accepted values: false, true
        subject-ends-with: An optional string to filter events for an event subscription based on a suffix. Wildcard characters are not supported.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a new event subscription for an Event Grid domain topic and enable advanced filtering on arrays: |-
        az eventgrid domain topic event-subscription create -n es1 \
            -g rg1 --domain-name domain1 --domain-topic-name topic1 \
            --endpoint /subscriptions/{SubID}/resourceGroups/{RG}/providers/Microsoft.Web/sites/{functionappname}/functions/{functionname} --endpoint-type azurefunction \
            --enable-advanced-filtering-on-arrays true
    Create a new event subscription for an Event Grid domain topic using Storage Queue as destination with a ttl of 5 mins: |-
        az eventgrid domain topic event-subscription create -n es1 \
            -g rg1 --domain-name domain1 --domain-topic-name topic1 \
            --endpoint-type storagequeue \
            --endpoint /subscriptions/{SubID}/resourceGroups/TestRG/providers/Microsoft.Storage/storageAccounts/sa1/queueservices/default/queues/q1 \
            --storage-queue-msg-ttl 300
    Create a new event subscription for an Event Grid domain topic, using Azure Active Directory enabled Webhook as a destination.: |-
        az eventgrid domain topic event-subscription create --name es1 \
            -g rg1 --domain-name domain1 --domain-topic-name topic1 \
            --endpoint https://contoso.azurewebsites.net/api/f1?code=code
            --azure-active-directory-tenant-id azureactivedirectorytenantid
            --azure-active-directory-application-id-or-uri azureactivedirectoryapplicationidoruri
    Create a new event subscription for an Event Grid domain topic, using Azure Function as destination.: |-
        az eventgrid domain topic event-subscription create -n es1 \
            -g rg1 --domain-name domain1 --domain-topic-name topic1 \
            --endpoint /subscriptions/{SubID}/resourceGroups/{RG}/providers/Microsoft.Web/sites/{functionappname}/functions/{functionname} --endpoint-type azurefunction
    ? Create a new event subscription for an Event Grid domain topic, using default filters, and CloudEvent V 1.0 as the delivery schema.
    : |-
        az eventgrid domain topic event-subscription create -n es2 \
            -g rg1 --domain-name domain1 --domain-topic-name topic1 \
            --endpoint https://contoso.azurewebsites.net/api/f1?code=code \
            --event-delivery-schema cloudeventschemav1_0
    Create a new event subscription for an Event Grid domain topic, using default filters.: |-
        az eventgrid domain topic event-subscription create --name es1 \
            -g rg1 --domain-name domain1 --domain-topic-name topic1 \
            --endpoint https://contoso.azurewebsites.net/api/f1?code=code
    ? Create a new event subscription for an Event Grid domain topic, with a deadletter destination and custom retry policy of maximum 10 delivery attempts and an Event TTL of 2 hours (whichever happens earlier) and expiration date.
    : |-
        az eventgrid domain topic event-subscription create --name es2 \
            -g rg1 --domain-name domain1 --domain-topic-name topic1 \
            --endpoint https://contoso.azurewebsites.net/api/f1?code=code \
            --deadletter-endpoint /subscriptions/{SubID}/resourceGroups/TestRG/providers/Microsoft.Storage/storageAccounts/s2/blobServices/default/containers/blobcontainer1 \
            --max-delivery-attempts 10 --event-ttl 120 --expiration-date "2022-10-31"
    Create a new event subscription for an Event Grid domain topic, with a filter specifying a subject prefix.: |-
        az eventgrid domain topic event-subscription create --name es4 \
            -g rg1 --domain-name domain1 --domain-topic-name topic1 \
            --endpoint https://contoso.azurewebsites.net/api/f1?code=code \
            --subject-begins-with mysubject_prefix
