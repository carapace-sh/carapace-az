# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a flexible server.
flags:
    --accelerated-logs=: Enable or disable accelerated logs.
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --auto-scale-iops=: Enable or disable the auto scale iops.
    --backup-identity=: The name or resource ID of the geo backup user identity for data encryption.
    --backup-key=: The resource ID of the geo backup keyvault key for data encryption.
    --backup-retention=: The number of days a backup is retained.
    --disable-data-encryption=:
        description: Disable data encryption by removing key(s).
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --geo-redundant-backup=: Whether or not geo redundant backup is enabled.
    --high-availability=: Enable (ZoneRedundant or SameZone) or disable high availability feature.
    --identity=: The name or resource ID of the user assigned identity for data encryption.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --iops=: Number of IOPS to be allocated for this server.
    --key=: The resource ID of the primary keyvault key for data encryption.
    --maintenance-policy-patch-strategy=: The patch strategy of maintenance policy.
    --maintenance-window=: Period of time (UTC) designated for maintenance.
    --public-access=: Enable or disable the public access on a server.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --replication-role=: The replication role of the server.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku-name=: The name of the compute SKU.
    --standby-zone=: The availability zone information of the standby server when high availability is enabled.
    --storage-auto-grow=: Enable or disable autogrow of the storage.
    --storage-size=: The storage capacity of the server.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tier=: Compute tier of the server.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the server.
    -p, --admin-password=: The password of the administrator.
completion:
    flag:
        accelerated-logs:
            - Enabled
            - Disabled
        auto-scale-iops:
            - Enabled
            - Disabled
        disable-data-encryption:
            - "true"
            - "false"
        geo-redundant-backup:
            - Enabled
            - Disabled
        high-availability:
            - ZoneRedundant
            - SameZone
            - Disabled
        maintenance-policy-patch-strategy:
            - Regular
            - VirtualCanary
        public-access:
            - Enabled
            - Disabled
        storage-auto-grow:
            - Enabled
            - Disabled
documentation:
    flag:
        accelerated-logs: |-
            Enable or disable accelerated logs. Only support for Business Critical tier. Default value is Enabled.

            Accepted values: Disabled, Enabled
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        admin-password: 'The password of the administrator. Minimum 8 characters and maximum 128 characters. Password must contain characters from three of the following categories: English uppercase letters, English lowercase letters, numbers, and non-alphanumeric characters.'
        auto-scale-iops: |-
            Enable or disable the auto scale iops. Default value is Enabled.

            Accepted values: Disabled, Enabled
        backup-identity: The name or resource ID of the geo backup user identity for data encryption. The identity needs to be in the same region as the backup region.
        backup-interval: The interval between backups in hours. Accepted values are 24, 12 and 6. The default value is 24.
        backup-key: The resource ID of the geo backup keyvault key for data encryption. The key needs to be in the same region as the backup region.
        backup-retention: The number of days a backup is retained. Range of 1 to 35 days. Default is 7 days.
        change-reference: The related change reference ID for this resource operation.
        disable-data-encryption: |-
            Disable data encryption by removing key(s).

            Default value: False

            Accepted values: false, true
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        geo-redundant-backup: |-
            Whether or not geo redundant backup is enabled.

            Accepted values: Disabled, Enabled
        high-availability: |-
            Enable (ZoneRedundant or SameZone) or disable high availability feature.

            Accepted values: Disabled, SameZone, ZoneRedundant
        identity: The name or resource ID of the user assigned identity for data encryption.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        iops: Number of IOPS to be allocated for this server. You will get certain amount of free IOPS based on compute and storage provisioned. The default value for IOPS is free IOPS. To learn more about IOPS based on compute and storage, refer to IOPS in Azure Database for MySQL Flexible Server.
        key: |-
            The resource ID of the primary keyvault key for data encryption. --maintenance-policy-patch-strategy --patch-strategy The patch strategy of maintenance policy. Accepted values: Regular, VirtualCanary. Default value is Regular.

            Accepted values: Regular, VirtualCanary
        maintenance-policy-patch-strategy: 'The patch strategy of maintenance policy. Accepted values: Regular, VirtualCanary. Default value is Regular.'
        maintenance-window: 'Period of time (UTC) designated for maintenance. Examples: "Sun:23:30" to schedule on Sunday, 11:30pm UTC. To set back to default pass in "Disabled".'
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        public-access: |-
            Enable or disable the public access on a server.

            Accepted values: Disabled, Enabled
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        replication-role: The replication role of the server.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        sku-name: 'The name of the compute SKU. Follows the convention Standard_{VM name}. Examples: Standard_B1ms.'
        standby-zone: The availability zone information of the standby server when high availability is enabled.
        storage-auto-grow: |-
            Enable or disable autogrow of the storage. Default value is Enabled.

            Accepted values: Disabled, Enabled
        storage-size: The storage capacity of the server. Minimum is 32 GiB and max is 16 TiB.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tier: 'Compute tier of the server. Accepted values: Burstable, GeneralPurpose, MemoryOptimized '
examples:
    Disable data encryption for flexible server.: |-
        az mysql flexible-server update --resource-group testGroup --name testserver \
          --disable-data-encryption
    Set or change key and identity for data encryption.: |-
        # get key identifier of the existing key
        newKeyIdentifier=$(az keyvault key show --vault-name testVault --name testKey \
          --query key.kid -o tsv)
        # update server with new key/identity
        az mysql flexible-server update --resource-group testGroup --name testserver \
          --key $newKeyIdentifier --identity newIdentity
    Set or change key, identity, backup key and backup identity for data encryption with geo redundant backup.: |-
        # get key identifier of the existing key and backup key
        newKeyIdentifier=$(az keyvault key show --vault-name testVault --name testKey \
          --query key.kid -o tsv)
        newBackupKeyIdentifier=$(az keyvault key show --vault-name testBackupVault \
          --name testBackupKey --query key.kid -o tsv)
        # update server with new key/identity and backup key/identity
        az mysql flexible-server update --resource-group testGroup --name testserver \
          --key $newKeyIdentifier --identity newIdentity \
          --backup-key $newBackupKeyIdentifier --backup-identity newBackupIdentity
    Update a flexible server's sku, using local context for server and resource group.: az mysql flexible-server update --sku-name Standard_D4ds_v4 --tier GeneralPurpose
    Update a flexible server's tags.: az mysql flexible-server update --resource-group testGroup --name testserver --tags "k1=v1" "k2=v2"
