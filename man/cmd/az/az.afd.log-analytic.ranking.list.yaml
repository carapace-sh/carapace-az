name: list
description: Get log analytics ranking report for AFD profile
flags:
    --custom-domains=:
        description: The domains to be included.
        nargs: -1
    --date-time-begin=!: The start datetime.
    --date-time-end=!: The end datetime.
    --max-ranking=!: The maximum number of rows to return based on the ranking.
    --metrics=!:
        description: Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
    --rankings=!:
        description: Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    command: Get log analytics ranking report for AFD profile.
    flag:
        custom-domains: The domains to be included.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        date-time-begin: The start datetime.
        date-time-end: The end datetime.
        max-ranking: The maximum number of rows to return based on the ranking.
        metrics: Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        profile-name: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group. which is unique within the resource group.
        rankings: Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
