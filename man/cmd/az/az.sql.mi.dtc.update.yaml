# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update managed instance DTC settings.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --allow-inbound-enabled=:
        description: Allow Inbound traffic to managed instance DTC.
        nargs: -1
    --allow-outbound-enabled=:
        description: Allow Outbound traffic of managed instance DTC.
        nargs: -1
    --authentication=: Authentication type of managed instance DTC.
    --dtc-enabled=:
        description: Active status of managed instance DTC.
        nargs: -1
    --external-dns-suffixes=:
        description: External dns suffix search list of managed instance DTC.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --mi=: The name of the managed instance.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sna-lu-transactions=:
        description: Allow SNA LU 6.2 Transactions to managed instance DTC.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --xa-default-timeout=: Default timeout for XA Transactions (in seconds).
    --xa-max-timeout=: Maximum timeout for XA Transactions (in seconds).
    --xa-transactions=:
        description: Allow XA Transactions to managed instance DTC.
        nargs: -1
    -g, --resource-group=: Name of the resource group
completion:
    flag:
        allow-inbound-enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        allow-outbound-enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        dtc-enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        sna-lu-transactions:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        xa-transactions:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        allow-inbound-enabled: |-
            Allow Inbound traffic to managed instance DTC.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        allow-outbound-enabled: |-
            Allow Outbound traffic of managed instance DTC.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        authentication: Authentication type of managed instance DTC.
        change-reference: The related change reference ID for this resource operation.
        dtc-enabled: |-
            Active status of managed instance DTC.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        external-dns-suffixes: External dns suffix search list of managed instance DTC.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of the resource group.
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Allow XA transactions for managed instance DTC: az sql mi dtc update -g resourceGroup1 --mi managedInstance1 --xa-transactions-enabled true
    Enable DTC on a managed instance: |-
        az sql mi dtc update -g resourceGroup1 --mi managedInstance1 --dtc-enabled true
        az sql mi dtc update --ids /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup1/providers/Microsoft.Sql/managedInstances/ManagedInstance1/dtc/current --dtc-enabled true
