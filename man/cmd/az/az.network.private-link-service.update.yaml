# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a private link service.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        auto-approval: Space-separated list of subscription IDs to auto-approve.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        fqdns: Space-separated list of FQDNs.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        lb-frontend-ip-configs: Space-separated list of names or IDs of load balancer frontend IP configurations to link to. If names are used, also supply `--lb-name`.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        lb-name: Name of the load balancer to retrieve frontend IP configs from. Ignored if a frontend IP configuration ID is supplied.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        visibility: Space-separated list of subscription IDs for which the private link service is visible.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --auto-approval=:
        description: Space-separated list of subscription IDs to auto-approve.
        nargs: -1
    --destination-ip-address=: The destination IP address of the private link service.
    --enable-proxy-protocol=:
        description: Enable proxy protocol for private link service.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --fqdns=:
        description: Space-separated list of FQDNs.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --lb-frontend-ip-configs=:
        description: Space-separated list of names or IDs of load balancer frontend IP configurations to link to.
        nargs: -1
    --lb-name=: Name of the load balancer to retrieve frontend IP configs from.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --visibility=:
        description: Space-separated list of subscription IDs for which the private link service is visible.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the private link service.
completion:
    flag:
        enable-proxy-protocol:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
