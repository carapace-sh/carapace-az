# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reject
description: Reject a private endpoint connection request for eventhubs namespace.
flags:
    --description=: Comments for reject operation.
    --id=: The ID of the private endpoint connection associated with the EventHubs Namespace.
    --namespace-name=: The eventhubs namesapce name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group name of specified eventhubs namespace.
    -n, --name=: The name of the private endpoint connection associated with the EventHubs Namespace.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: Comments for reject operation.
        id: The ID of the private endpoint connection associated with the EventHubs Namespace. You can get it using ``` az eventhubs namespace show ``` .
        name: The name of the private endpoint connection associated with the EventHubs Namespace.
        namespace-name: The eventhubs namesapce name.
        resource-group: The resource group name of specified eventhubs namespace.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Reject a private endpoint connection request for eventhubs namespace by ID.: |-
        id = (az eventhubs namespace show -n mynamespace --query "privateEndpointConnections[0].id")
        az eventhubs namespace private-endpoint-connection reject --id $id
    Reject a private endpoint connection request for eventhubs namespace using namespace name and connection name.: |-
        name = (az eventhubs namespace show -n mynamespace --query "privateEndpointConnections[0].name")
        az eventhubs namespace private-endpoint-connection reject -g myRg --namespace-name mynamespace --name $name
