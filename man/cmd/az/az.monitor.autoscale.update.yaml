# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an autoscale setting.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        add-actions: |-
            Add an action to fire when a scaling event occurs.
                    Usage:   --add-action TYPE KEY [ARG ...]
                    Email:   --add-action email bob@contoso.com ann@contoso.com
                    Webhook: --add-action webhook https://www.contoso.com/alert apiKey=value
                    Webhook: --add-action webhook https://www.contoso.com/alert?apiKey=value
                    Multiple actions can be specified by using more than one `--add-action` argument.
                      Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        count: The numer of instances to use. If used with --min/max-count, the default number of instances to use.
        enabled: the enabled flag. Specifies whether automatic scaling is enabled for the resource. The default value is 'false'.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        remove-actions: |-
            Remove one or more actions.
                    Usage:   --remove-action TYPE KEY [KEY ...]
                    Email:   --remove-action email bob@contoso.com ann@contoso.com
                    Webhook: --remove-action webhook https://contoso.com/alert https://alerts.contoso.com.
                      Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        scale-look-ahead-time: the amount of time to specify by which instances are launched in advance. It must be between 1 minute and 60 minutes in ISO 8601 format (for example, 100 days would be P100D).
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Gets or sets a list of key value pairs that describe the resource. These tags can be used in viewing and grouping this resource (across resource groups). A maximum of 15 tags can be provided for a resource. Each tag must have a key no greater in length than 128 characters and a value no greater in length than 256 characters.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --count=: The numer of instances to use.
    --email-administrator=:
        description: Send email to subscription administrator on scaling.
        nargs: -1
    --email-coadministrators=:
        description: Send email to subscription co-administrators on scaling.
        nargs: -1
    --enabled=:
        description: the enabled flag.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --max-count=: The maximum number of instances.
    --min-count=: The minimum number of instances.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --scale-look-ahead-time=: the amount of time to specify by which instances are launched in advance.
    --scale-mode=: the predictive autoscale mode
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Gets or sets a list of key value pairs that describe the resource.
        nargs: -1
    -a, --add-actions=:
        description: Add an action to fire when a scaling event occurs.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The autoscale setting name.
    -r, --remove-actions=:
        description: Remove one or more actions.
        nargs: -1
completion:
    flag:
        email-administrator:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        email-coadministrators:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        scale-mode:
            - Disabled
            - Enabled
            - ForecastOnly
