# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a snapshot policy
flags:
    --daily-hour=: Indicates which hour in UTC timezone a snapshot should be taken
    --daily-minute=: Indicates which minute snapshot should be taken
    --hour=: Indicates which hour in UTC timezone a snapshot should be taken
    --minute=: Indicates which minute snapshot should be taken
    --monthly-days=: Indicates which days of the month snapshot should be taken.
    --monthly-minute=: Indicates which minute snapshot should be taken
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    --weekly-day=: Indicates which weekdays snapshot should be taken, accepts a comma separated list of week day names in english
    --weekly-hour=: Indicates which hour in UTC timezone a snapshot should be taken
    --weekly-minute=: Indicates which minute snapshot should be taken
    -a, --account-name=!: The name of the NetApp account
    -d, --daily-snapshots=: Daily snapshot count to keep
    -e, --enabled=:
        description: The property to decide policy is enabled or not
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    -m, --monthly-snapshots=: Monthly snapshot count to keep
    -n, --name=!: The name of the snapshot policy
    -u, --hourly-snapshots=: Hourly snapshot count to keep
    -w, --weekly-snapshots=: Weekly snapshot count to keep
completion:
    flag:
        enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Create a snapshot policy.
    flag:
        account-name: The name of the NetApp account. --name --snapshot-policy-name -n The name of the snapshot policy.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        daily-hour: Indicates which hour in UTC timezone a snapshot should be taken.
        daily-minute: Indicates which minute snapshot should be taken.
        enabled: |-
            The property to decide policy is enabled or not.

            Default value: True

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        hourly-snapshots: Hourly snapshot count to keep.
        location: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
        monthly-days: Indicates which days of the month snapshot should be taken. A comma delimited string.
        monthly-minute: Indicates which minute snapshot should be taken.
        monthly-snapshots: Monthly snapshot count to keep.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        weekly-day: Indicates which weekdays snapshot should be taken, accepts a comma separated list of week day names in english.
        weekly-hour: Indicates which hour in UTC timezone a snapshot should be taken.
        weekly-minute: Indicates which minute snapshot should be taken.
        weekly-snapshots: Weekly snapshot count to keep.
examples:
    Create an ANF snapshot policy: az netappfiles snapshot policy create -g mygroup --account-name myaccountname --snapshot-policy-name mysnapshotpolicyname -l westus2 --hourly-snapshots 1 --hourly-minute 5 --enabled true
