# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Adaptive Application Controls - Get
flags:
    --group-name=!: Name of an application control VM/server group
    --subscription=: Name or ID of subscription.
    -l, --location=: Location of the resource.
documentation:
    command: Adaptive Application Controls - Get.
    flag:
        group-name: Name of an application control VM/server group.
        location: Location of the resource. Possible values are "centralsus", "westeurope". Please use "list" operation to get all resources and locations.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a single application control VM/server group.: az security adaptive-application-controls show --group-name GROUP1 --location centralsus
