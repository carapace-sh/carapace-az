# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an application gateway WAF policy.
documentation:
    flag:
        custom-rules: The custom rules inside the policy.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        managed-rules: Describes the managedRules structure.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        policy-settings: The PolicySettings for policy.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        version: Version of the web application firewall rule set type. 0.1, 1.0, and 1.1 are used for Microsoft_BotManagerRuleSet
flags:
    --custom-rules=:
        description: The custom rules inside the policy.
        nargs: -1
    --managed-rules=:
        description: Describes the managedRules structure.
        nargs: -1
    --policy-settings=:
        description: The PolicySettings for policy.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --type=: Type of the web application firewall rule set.
    --version=: Version of the web application firewall rule set type.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the application gateway WAF policy.
completion:
    flag:
        type:
            - Microsoft_BotManagerRuleSet
            - Microsoft_DefaultRuleSet
            - OWASP
        version:
            - "0.1"
            - "1.0"
            - "1.1"
            - "2.1"
            - 2.2.9
            - "3.0"
            - "3.1"
            - "3.2"
