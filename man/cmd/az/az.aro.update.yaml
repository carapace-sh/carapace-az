# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a cluster.
flags:
    --client-id=: Client ID of cluster service principal.
    --client-secret=: Client secret of cluster service principal.
    --load-balancer-managed-outbound-ip-count=: The desired number of IPv4 outbound IPs created and managed by Azure for the cluster public load balancer.
    --no-wait=: Do not wait for the long-running operation to finish.
    --refresh-credentials=:
        description: Refresh cluster application credentials.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of cluster.
completion:
    flag:
        refresh-credentials:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        client-id: Client ID of cluster service principal.
        client-secret: Client secret of cluster service principal. --lb-ip-count --load-balancer-managed-outbound-ip-count The desired number of IPv4 outbound IPs created and managed by Azure for the cluster public load balancer.
        name: Name of cluster.
        no-wait: Do not wait for the long-running operation to finish.
        refresh-credentials: Refresh cluster application credentials.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        upgradeable-to: OpenShift version to upgrade to.
examples:
    Update a cluster.: az aro update --name MyCluster --resource-group MyResourceGroup
