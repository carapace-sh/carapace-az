# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the registry login credential for a task.
documentation:
    flag:
        login-server: The login server of the custom registry. For instance, 'myregistry.azurecr.io'.
        password: The password to login to the custom registry. This can be plain text or a key vault secret URI.
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        use-identity: The task managed identity used for the credential. Use '[system]' to refer to the system-assigned identity or a client id to refer to a user-assigned identity. Please see https://aka.ms/acr/tasks/cross-registry-authentication for more information.
        username: The username to login to the custom registry. This can be plain text or a key vault secret URI.
flags:
    --login-server=!: The login server of the custom registry.
    --subscription=: Name or ID of subscription.
    --use-identity=: The task managed identity used for the credential.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the task.
    -p, --password=: The password to login to the custom registry.
    -r, --registry=!: The name of the container registry.
    -u, --username=: The username to login to the custom registry.
