# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: test-connectivity
description: Test if a connection can be established between a Virtual Machine and a given endpoint.
documentation:
    flag:
        dest-resource: Name or ID of the resource to receive traffic. Currently only Virtual Machines are supported.
        headers: Space-separated list of headers in `KEY=VALUE` format.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        source-resource: Name or ID of the resource from which to originate traffic. Currently only Virtual Machines are supported.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        valid-status-codes: Space-separated list of HTTP status codes considered valid.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --dest-address=: IP address or URI at which to receive traffic.
    --dest-port=: Port number on which to receive traffic.
    --dest-resource=: Name or ID of the resource to receive traffic.
    --headers=:
        description: Space-separated list of headers in `KEY=VALUE` format.
        nargs: -1
    --method=: HTTP method to use.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --protocol=: Protocol to test on.
    --source-port=: Port number from which to originate traffic.
    --source-resource=!: Name or ID of the resource from which to originate traffic.
    --subscription=: Name or ID of subscription.
    --valid-status-codes=:
        description: Space-separated list of HTTP status codes considered valid.
        nargs: -1
    -g, --resource-group=: Name of the resource group the target resource is in.
completion:
    flag:
        method:
            - Get
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - Http
            - Https
            - Icmp
            - Tcp
