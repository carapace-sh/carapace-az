# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: break-file-locks
description: Break all the file locks on a volume
flags:
    --client-ip=: To clear file locks on a volume for a particular client
    --confirm=:
        description: break-file-locks could be a disruptive operation for application as locks on the volume will be broken, if want to process, set to true.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -a, --account-name=: The name of the NetApp account
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the volume
    -p, --pool-name=: The name of the capacity pool
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        confirm:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Break all the file locks on a volume.
    flag:
        account-name: The name of the NetApp account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        client-ip: |-
            To clear file locks on a volume for a particular client.

            Default value: True

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        pool-name: The name of the capacity pool.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Break all the file locks on the volume: az netappfiles volume break-file-locks -g mygroup --account-name myaccname --pool-name mypoolname --name myvolname
