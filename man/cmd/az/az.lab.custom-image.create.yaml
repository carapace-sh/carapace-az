# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an existing custom image.
documentation:
    flag:
        os-state: 'The current state of the virtual machine. For Windows virtual machines: NonSysprepped, SysprepRequested, SysprepApplied. For Linux virtual machines: NonDeprovisioned, DeprovisionRequested, DeprovisionApplied.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --author=: The author of the custom image.
    --description=: The description of the custom image.
    --lab-name=!: The name of the lab.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --os-state=!: The current state of the virtual machine.
    --os-type=!: Type of the OS on which the custom image is based.
    --source-vm-id=!: The resource ID of a virtual machine in the provided lab.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the custom image.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        os-type:
            - Windows
            - Linux
