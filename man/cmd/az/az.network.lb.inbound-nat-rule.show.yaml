# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of an inbound NAT rule.
flags:
    --lb-name=!: The load balancer name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the resource that is unique within the set of inbound NAT rules used by the load balancer.
documentation:
    flag:
        lb-name: The load balancer name.
        name: The name of the resource that is unique within the set of inbound NAT rules used by the load balancer.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get the details of an inbound NAT rule.: az network lb inbound-nat-rule show -g MyResourceGroup --lb-name MyLb -n MyNatRule
