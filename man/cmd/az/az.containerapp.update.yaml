# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a container app.
flags:
    --args=:
        description: A list of container startup command argument(s).
        nargs: -1
    --command=:
        description: A list of supported commands on the container that will executed during startup.
        nargs: -1
    --container-name=: Name of the container.
    --cpu=: Required CPU in cores from 0.25 - 2.0, e.g. 0.5
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --max-replicas=: The maximum number of replicas.
    --memory=: Required memory from 0.5 - 4.0 ending with "Gi", e.g. 1.0Gi
    --min-replicas=: The minimum number of replicas.
    --no-wait=: Do not wait for the long-running operation to finish.
    --remove-all-env-vars=: Remove all environment variable(s) from container..
    --remove-env-vars=:
        description: Remove environment variable(s) from container.
        nargs: -1
    --replace-env-vars=:
        description: Replace environment variable(s) in container.
        nargs: -1
    --revision-suffix=: User friendly suffix that is appended to the revision name
    --scale-rule-auth=:
        description: Scale rule auth parameters.
        nargs: -1
    --scale-rule-http-concurrency=: The maximum number of concurrent requests before scale out.
    --scale-rule-metadata=:
        description: Scale rule metadata.
        nargs: -1
    --scale-rule-name=: The name of the scale rule.
    --scale-rule-type=: The type of the scale rule.
    --secret-volume-mount=: Path to mount all secrets e.g. mnt/secrets
    --set-env-vars=:
        description: Add or update environment variable(s) in container.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --termination-grace-period=: Duration in seconds a replica is given to gracefully shut down before it is forcefully terminated.
    --yaml=: Path to a .yaml file with the configuration of a container app.
    -g, --resource-group=: Name of resource group.
    -i, --image=: Container image, e.g. publisher/image-name:tag.
    -n, --name=: The name of the Containerapp.
    -w, --workload-profile-name=: The friendly name for the workload profile
documentation:
    command: Update a container app. In multiple revisions mode, create a new revision based on the latest revision.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        args: A list of container startup command argument(s). Space-separated values e.g. "-c" "mycommand". Empty string to clear existing values.
        artifact: 'Local path to the application artifact for building the container image. See the supported artifacts here: https://aka.ms/SourceToCloudSupportedArtifacts .'
        bind: Space separated list of services, bindings or Java components to be connected to this app. e.g. SVC_NAME1[:BIND_NAME1] SVC_NAME2[:BIND_NAME2]...
        build-env-vars: A list of environment variable(s) for the build. Space-separated values in 'key=value' format.
        change-reference: The related change reference ID for this resource operation.
        command: A list of supported commands on the container that will executed during startup. Space-separated values e.g. "/bin/queue" "mycommand". Empty string to clear existing values.
        container-name: Name of the container.
        cpu: Required CPU in cores from 0.25 - 2.0, e.g. 0.5.
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        enable-java-agent: Boolean indicating whether to enable Java agent for the app. Only applicable for Java runtime.
        enable-java-metrics: Boolean indicating whether to enable Java metrics for the app. Only applicable for Java runtime.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        image: Container image, e.g. publisher/image-name:tag.
        max-inactive-revisions: Max inactive revisions a Container App can have.
        max-replicas: The maximum number of replicas.
        memory: Required memory from 0.5 - 4.0 ending with "Gi", e.g. 1.0Gi.
        min-replicas: The minimum number of replicas.
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        no-wait: Do not wait for the long-running operation to finish.
        remove-all-env-vars: Remove all environment variable(s) from container..
        remove-env-vars: Remove environment variable(s) from container. Space-separated environment variable names.
        replace-env-vars: Replace environment variable(s) in container. Other existing environment variables are removed. Space-separated values in 'key=value' format. If stored as a secret, value must start with 'secretref:' followed by the secret name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        revision-suffix: User friendly suffix that is appended to the revision name.
        revisions-mode: The active revisions mode for the container app.
        runtime: The runtime of the container app.
        scale-rule-auth: Scale rule auth parameters. Auth parameters must be in format "{triggerParameter}={secretRef} {triggerParameter}={secretRef} ...".
        scale-rule-http-concurrency: The maximum number of concurrent requests before scale out. Only supported for http and tcp scale rules.
        scale-rule-metadata: Scale rule metadata. Metadata must be in format "{key}={value} {key}={value} ...".
        scale-rule-type: 'The type of the scale rule. Default: http. For more information please visit https://learn.microsoft.com/azure/container-apps/scale-app#scale-triggers'
        secret-volume-mount: Path to mount all secrets e.g. mnt/secrets.
        set-env-vars: Add or update environment variable(s) in container. Existing environment variables are not modified. Space-separated values in 'key=value' format. If stored as a secret, value must start with 'secretref:' followed by the secret name.
        source: 'Local directory path containing the application source and Dockerfile for building the container image. Preview: If no Dockerfile is present, a container image is generated using buildpacks. If Docker is not running or buildpacks cannot be used, Oryx will be used to generate the image. See the supported Oryx runtimes here: https://aka.ms/SourceToCloudSupportedVersions .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags. --termination-grace-period --tgp Duration in seconds a replica is given to gracefully shut down before it is forcefully terminated. (Default: 30).'
        target-label: 'The label to apply to new revisions. Required for revisions-mode ''labels''. --termination-grace-period --tgp Duration in seconds a replica is given to gracefully shut down before it is forcefully terminated. (Default: 30).'
        termination-grace-period: 'Duration in seconds a replica is given to gracefully shut down before it is forcefully terminated. (Default: 30)'
        unbind: Space separated list of services, bindings or Java components to be removed from this app. e.g. BIND_NAME1...
        workload-profile-name: The friendly name for the workload profile.
        yaml: Path to a .yaml file with the configuration of a container app. All other parameters will be ignored. For an example, see https://learn.microsoft.com/azure/container-apps/azure-resource-manager-api-spec#examples .
examples:
    Update a Container App from the provided application source: az containerapp update -n my-containerapp -g MyResourceGroup --source .
    Update a container app to erase java enhancement capabilities, like java metrics, java agent, etc.: |-
        az containerapp update -n my-containerapp -g MyResourceGroup \
            --runtime generic
    Update a container app with a custom scale rule: |-
        az containerapp update -n myapp -g mygroup \
            --scale-rule-name my-custom-rule \
            --scale-rule-type my-custom-type \
            --scale-rule-metadata key=value key2=value2 \
            --scale-rule-auth triggerparam=secretref triggerparam=secretref
    Update a container app with an http scale rule: |-
        az containerapp update -n myapp -g mygroup \
            --scale-rule-name my-http-rule \
            --scale-rule-http-concurrency 50
    Update a container app with java agent enabled: |-
        az containerapp update -n my-containerapp -g MyResourceGroup \
            --enable-java-agent
    Update a container app with java metrics enabled: |-
        az containerapp update -n my-containerapp -g MyResourceGroup \
            --enable-java-metrics
    Update a container app's container image.: |-
        az containerapp update -n my-containerapp -g MyResourceGroup \
            --image myregistry.azurecr.io/my-app:v2.0
    Update a container app's resource requirements and scale limits.: |-
        az containerapp update -n my-containerapp -g MyResourceGroup \
            --cpu 0.5 --memory 1.0Gi \
            --min-replicas 4 --max-replicas 8
