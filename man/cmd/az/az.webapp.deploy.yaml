# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: deploy
description: Deploys a provided artifact to Azure Web Apps.
documentation:
    flag:
        async: If true, the artifact is deployed asynchronously. (The command will exit once the artifact is pushed to the web app.). Synchronous deployments are not yet supported when using "--src-url"
        clean: If true, cleans the target directory prior to deploying the file(s). Default value is determined based on artifact type.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        restart: If true, the web app will be restarted following the deployment. Set this to false if you are deploying multiple artifacts and do not want to restart the site on the earlier deployments.
        slot: The name of the slot. Default to the productions slot if not specified.
        src-path: 'Path of the artifact to be deployed. Ex: "myapp.zip" or "/myworkspace/apps/myapp.war"'
        src-url: 'URL of the artifact. The webapp will pull the artifact from this URL. Ex: "http://mysite.com/files/myapp.war?key=123"'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-path: 'Absolute path that the artifact should be deployed to. Defaults to "home/site/wwwroot/" Ex: "/home/site/deployments/tools/", "/home/site/scripts/startup-script.sh".'
        timeout: Timeout for the deployment operation in milliseconds. Ignored when using "--src-url" since synchronous deployments are not yet supported when using "--src-url"
flags:
    --async=:
        description: If true, the artifact is deployed asynchronously.
        nargs: -1
    --clean=:
        description: If true, cleans the target directory prior to deploying the file(s).
        nargs: -1
    --enable-kudu-warmup=:
        description: If true, kudu will be warmed up before performing deployment for a linux webapp.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ignore-stack=:
        description: If true, any stack-specific defaults are ignored.
        nargs: -1
    --restart=:
        description: If true, the web app will be restarted following the deployment.
        nargs: -1
    --src-path=: Path of the artifact to be deployed.
    --src-url=: URL of the artifact.
    --subscription=: Name or ID of subscription.
    --target-path=: Absolute path that the artifact should be deployed to.
    --timeout=: Timeout for the deployment operation in milliseconds.
    --track-status=:
        description: If true, web app startup status during deployment will be tracked for linux web apps.
        nargs: -1
    --type=: Used to override the type of artifact being deployed.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the webapp to deploy to.
    -s, --slot=: The name of the slot.
completion:
    flag:
        async:
            - "true"
            - "false"
        clean:
            - "true"
            - "false"
        enable-kudu-warmup:
            - "true"
            - "false"
        ignore-stack:
            - "true"
            - "false"
        restart:
            - "true"
            - "false"
        track-status:
            - "true"
            - "false"
        type:
            - war
            - jar
            - ear
            - lib
            - startup
            - static
            - zip
