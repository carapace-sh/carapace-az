# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Managed Instance link between Sql On-Prem and Sql Managed Instance.
flags:
    --databases=:
        description: Databases in the distributed availability group  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --failover-mode=: The link failover mode - can be Manual if intended to be used for two-way failover with a supported SQL Server, or None for one-way failover to Azure.
    --instance-ag-name=: Managed instance side availability group name
    --instance-link-role=: Managed instance side link role
    --mi=!: Name of the managed instance.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --partner-ag-name=: SQL server side availability group name
    --partner-endpoint=: SQL server side endpoint - IP or DNS resolvable name
    --seeding-mode=: Database seeding mode – can be Automatic (default), or Manual for supported scenarios.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Managed Instance link name.
completion:
    flag:
        failover-mode:
            - Manual
            - None
        instance-link-role:
            - Primary
            - Secondary
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        seeding-mode:
            - Automatic
            - Manual
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        databases: Databases in the distributed availability group  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        failover-mode: |-
            The link failover mode - can be Manual if intended to be used for two-way failover with a supported SQL Server, or None for one-way failover to Azure.

            Accepted values: Manual, None
        instance-link-role: |-
            Managed instance side link role.

            Accepted values: Primary, Secondary
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        partner-endpoint: SQL server side endpoint - IP or DNS resolvable name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        seeding-mode: |-
            Database seeding mode – can be Automatic (default), or Manual for supported scenarios.

            Default value: Automatic

            Accepted values: Automatic, Manual
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a Managed Instance link with minimal properties.: az sql mi link create -g testrg --mi testcl --name link1 --instance-ag-name instanceAg --partner-ag-name partnerAg --partner-endpoint TCP://SERVER:7022 --databases "[{database-name:testdb}]"
