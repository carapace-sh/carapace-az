# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get specified deployment stack from subscription scope
flags:
    --id=: The deployment stack resource id.
    --subscription=: Name or ID of subscription.
    -n, --name=: The deployment stack name
documentation:
    command: Get specified deployment stack from subscription scope.
    flag:
        id: The deployment stack resource id.
        name: The deployment stack name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get stack by name.: az stack sub show --name StackName
    Get stack by stack resource id.: az stack sub show --id /subscriptions/111111111111/providers/Microsoft.Resources/deploymentStacks/StackName
