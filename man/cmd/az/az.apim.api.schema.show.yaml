# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows details of an API Schema.
flags:
    --api-id=!: API identifier.
    --schema-id=!: Schema identifier.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    command: Show details of an API Management API Schema.
    flag:
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        schema-id: Schema identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        service-name: The name of the API Management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a API Schema.: az apim api schema show --service-name MyApim -g MyResourceGroup --api-id MyApi --schema-id schemaId
