# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show the backend address from the load balance backend address pool.
flags:
    --lb-name=!: The name of the load balancer.
    --pool-name=!: The name of the backend address pool.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the backend address.
documentation:
    flag:
        lb-name: The name of the load balancer.
        name: Name of the backend address.
        pool-name: The name of the backend address pool.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the backend address from the load balance backend address pool.: az network lb address-pool address show -g MyResourceGroup --lb-name MyLb --pool-name MyAddressPool -n MyAddress
