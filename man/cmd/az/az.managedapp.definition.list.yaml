# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists the managed application definitions in a resource group.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: the resource group of the managed application definition
documentation:
    command: List managed application definitions.
    flag:
        resource-group: The resource group of the managed application definition.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List managed application definitions. (autogenerated): az managedapp definition list --resource-group MyResourceGroup
