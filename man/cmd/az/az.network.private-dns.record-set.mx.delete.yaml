# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete an MX record set and all associated records.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --if-match=: ETag of the record set.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the record set, relative to the name of the zone.
    -y, --yes=: Do not prompt for confirmation.
    -z, --zone-name=: Name of the Private DNS zone (without a terminating dot).
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        if-match: ETag of the record set. Omit this value to always overwrite the current record set. Specify the last-seen ETag value to prevent accidentally overwriting any concurrent changes.
        name: Name of the record set, relative to the name of the zone.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
        zone-name: Name of the Private DNS zone (without a terminating dot).
examples:
    Delete an MX record set and all associated records.: az network private-dns record-set mx delete -g MyResourceGroup -z www.mysite.com -n MyRecordSet
