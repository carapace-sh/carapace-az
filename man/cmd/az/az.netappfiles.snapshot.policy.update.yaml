# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a snapshot policy
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --daily-hour=: Indicates which hour in UTC timezone a snapshot should be taken
    --daily-minute=: Indicates which minute snapshot should be taken
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --hour=: Indicates which hour in UTC timezone a snapshot should be taken
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --minute=: Indicates which minute snapshot should be taken
    --monthly-days=: Indicates which days of the month snapshot should be taken.
    --monthly-minute=: Indicates which minute snapshot should be taken
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    --weekly-day=: Indicates which weekdays snapshot should be taken, accepts a comma separated list of week day names in english
    --weekly-hour=: Indicates which hour in UTC timezone a snapshot should be taken
    --weekly-minute=: Indicates which minute snapshot should be taken
    -a, --account-name=: The name of the NetApp account
    -d, --daily-snapshots=: Daily snapshot count to keep
    -e, --enabled=:
        description: The property to decide policy is enabled or not
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -m, --monthly-snapshots=: Monthly snapshot count to keep
    -n, --name=: The name of the snapshot policy
    -u, --hourly-snapshots=: Hourly snapshot count to keep
    -w, --weekly-snapshots=: Weekly snapshot count to keep
completion:
    flag:
        enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Update a snapshot policy.
    flag:
        account-name: The name of the NetApp account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        daily-hour: Indicates which hour in UTC timezone a snapshot should be taken.
        daily-minute: Indicates which minute snapshot should be taken.
        enabled: |-
            The property to decide policy is enabled or not.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        hourly-snapshots: Hourly snapshot count to keep.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        monthly-days: Indicates which days of the month snapshot should be taken. A comma delimited string.
        monthly-minute: Indicates which minute snapshot should be taken.
        monthly-snapshots: Monthly snapshot count to keep.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        weekly-day: Indicates which weekdays snapshot should be taken, accepts a comma separated list of week day names in english.
        weekly-hour: Indicates which hour in UTC timezone a snapshot should be taken.
        weekly-minute: Indicates which minute snapshot should be taken.
        weekly-snapshots: Weekly snapshot count to keep.
examples:
    Update specific values for an ANF snapshot policy: az netappfiles snapshot policy update -g mygroup --account-name myaccountname --snapshot-policy-name mysnapshotpolicyname --daily-snapshots 1 --enabled false
