# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add one backend address into the load balance backend address pool.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --admin-state=: A list of administrative states which once set can override health probe so that Load Balancer will always forward new connections to backend, or deny new connections and reset existing connections.
    --frontend-ip=!: The frontend IP configuration ID of a regional load balance.
    --lb-name=!: The name of the load balancer.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --pool-name=!: The name of the backend address pool.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the backend address.
completion:
    flag:
        admin-state:
            - Down
            - None
            - Up
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
