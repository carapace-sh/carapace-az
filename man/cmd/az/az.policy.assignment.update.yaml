# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates a policy assignment
flags:
    --description=: Description of the policy assignment.
    --display-name=: Display name of the policy assignment.
    --not-scopes=: Space-separated scopes where the policy assignment does not apply.
    --scope=: Scope at which this policy assignment subcommand applies.
    --subscription=: Name or ID of subscription.
    -e, --enforcement-mode=: Enforcement mode of the policy assignment, e.g.
    -g, --resource-group=: the resource group where the policy will be applied
    -n, --name=: Name of the policy assignment.
    -p, --params=: JSON formatted string or a path to a file or uri with parameter values of the policy rule.
    -s, --sku=: policy sku.
completion:
    flag:
        enforcement-mode:
            - Default
            - DoNotEnforce
        sku:
            - free
            - standard
documentation:
    command: Update a policy assignment.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        definition-version: The policy version to assign.
        description: Policy assignment description.
        display-name: The display name of the policy assignment.
        enforcement-mode: Enforcement mode of the policy assignment, e.g. Default, DoNotEnforce. Please visit https://aka.ms/azure-policyAssignment-enforcement-mode for more information.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        location: The location of the policy assignment.
        metadata: The policy assignment metadata.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the policy assignment.
        non-compliance-messages: The messages that describe why a resource is non-compliant with the policy.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        not-scopes: The policy assignment excluded scopes.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        overrides: The policy property value override.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        params: The parameter values for the assigned policy rule.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        policy: The name or resource ID of the policy definition or policy set definition to be assigned.
        policy-set-definition: The policy definition or policy set definition to assign.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-selectors: The resource selectors list to filter policies by resource properties.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        scope: Scope at which this policy assignment subcommand applies. Defaults to current context subscription.
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a resource policy assignment's description: az policy assignment update --name myPolicy --description 'My policy description'
