# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the policies for a billing profile.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --customer-name=: The ID that uniquely identifies a customer
    --marketplace-purchases=: The policy that controls whether Azure marketplace purchases are allowed for a billing profile.
    --profile-name=: The ID that uniquely identifies a billing profile.
    --reservation-purchases=: The policy that controls whether Azure reservation purchases are allowed for a billing profile.
    --subscription=: Name or ID of subscription.
    --view-charges=: The policy that controls whether users with Azure RBAC access to a subscription can view its charges.
completion:
    flag:
        marketplace-purchases:
            - AllAllowed
            - OnlyFreeAllowed
            - NotAllowed
        reservation-purchases:
            - Allowed
            - NotAllowed
        view-charges:
            - Allowed
            - NotAllowed
documentation:
    command: |-
        Command group 'billing policy' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        customer-name: The ID that uniquely identifies a customer.
        marketplace-purchases: |-
            The policy that controls whether Azure marketplace purchases are allowed for a billing profile.

            Accepted values: AllAllowed, NotAllowed, OnlyFreeAllowed
        profile-name: The ID that uniquely identifies a billing profile.
        reservation-purchases: |-
            The policy that controls whether Azure reservation purchases are allowed for a billing profile.

            Accepted values: Allowed, NotAllowed
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        view-charges: |-
            The policy that controls whether users with Azure RBAC access to a subscription can view its charges.

            Accepted values: Allowed, NotAllowed
examples:
    Update the policy for a billing profile: az billing policy update --account-name "{billingAccountName}" --profile-name "{billingProfileName}" --marketplace-purchases "OnlyFreeAllowed" --reservation-purchases "NotAllowed" --view-charges "Allowed"
