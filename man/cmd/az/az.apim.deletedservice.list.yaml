# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List soft-deleted Api Management Service.
flags:
    --subscription=: Name or ID of subscription.
documentation:
    command: List all soft-deleted Api Management services instances available for undelete for the given subscription.
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all soft-deleted services in a subscription.: az apim deletedservice list
