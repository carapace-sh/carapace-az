# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: shows a security task (recommendation).
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: name of the resource to be fetched
documentation:
    command: Shows a security task (recommendation).
    flag:
        name: Name of the resource to be fetched.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a security task (recommendation) on a resource group scope.: az security task show -g "myRg" -n "taskName"
    Get a security task (recommendation) on a subscription scope.: az security task show -n "taskName"
