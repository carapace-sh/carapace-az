# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a security connector.
documentation:
    flag:
        environment-data: The security connector environment data.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        offerings: A collection of offerings for the security connector.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: A list of key value pairs that describe the resource.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --environment-data=:
        description: The security connector environment data.
        nargs: -1
    --environment-name=: The multi cloud resource's cloud name.
    --hierarchy-identifier=: The multi cloud resource identifier (account id in case of AWS connector, project number in case of GCP connector, GUID in case DevOps connector).
    --offerings=:
        description: A collection of offerings for the security connector.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: A list of key value pairs that describe the resource.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location where the resource is stored
    -n, --name=!: The security connector name.
completion:
    flag:
        environment-name:
            - AWS
            - Azure
            - AzureDevOps
            - GCP
            - GitLab
            - Github
