# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets the properties of a storage account’s Blob service, including properties for Storage Analytics and CORS (Cross-Origin Resource Sharing) rules.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
documentation:
    command: Show the properties of a storage account's blob service.
    flag:
        account-name: The storage account name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the properties of the storage account 'mystorageaccount' in resource group 'MyResourceGroup'.: az storage account blob-service-properties show -n mystorageaccount -g MyResourceGroup
