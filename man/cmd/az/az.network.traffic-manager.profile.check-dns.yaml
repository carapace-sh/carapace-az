# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: check-dns
description: Check the availability of a relative DNS name.
flags:
    --subscription=: Name or ID of subscription.
    --type=: The type of the resource.
    -n, --name=: DNS prefix to verify availability for.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: DNS prefix to verify availability for.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: |-
            The type of the resource.

            Default value: Microsoft.Network/trafficManagerProfiles
examples:
    Check the availability of 'mywebapp.trafficmanager.net' in Azure.: az network traffic-manager profile check-dns -n mywebapp
