# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: mysql
description: Create a Service Connector local connection to mysql.
flags:
    --client-type=: The client type used on the connection
    --connection=: Name of the connection.
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --database=: Name of the mysql database.
    --no-wait=: Do not wait for the long-running operation to finish.
    --secret=:
        description: The secret auth info
        nargs: -1
    --server=: Name of the mysql server.
    --subscription=: Name or ID of subscription.
    --target-id=: The resource id of target service.
    --target-resource-group=: The resource group which contains the mysql server.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - go
            - php
            - ruby
            - django
            - springBoot
            - none
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        client-type: |-
            The client type used on the connection.

            Accepted values: django, dotnet, dotnet-internal, go, java, nodejs, none, php, python, ruby, springBoot
        connection: Name of the connection.
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        database: Name of the mysql database. Required if '--target-id' is not specified.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        secret: 'The secret auth info. Usage: --secret name=XX secret=XX --secret name=XX secret-uri=XX --secret name=XX secret-name=XX name    : Required. Username or account name for secret auth. secret  : Required. Password or account key for secret auth.'
        server: Name of the mysql server. Required if '--target-id' is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-id: The resource id of target service. Required if ['--target-resource-group', '--server', '--database'] are not specified. --target-resource-group --tg The resource group which contains the mysql server. Required if '--target-id' is not specified.
        target-resource-group: The resource group which contains the mysql server. Required if '--target-id' is not specified.
examples:
    Create a connection from local to mysql interactively: az connection create mysql -g resourceGroup
    Create a connection from local to mysql with resource id: az connection create mysql -g resourceGroup --target-id /subscriptions/{subscription}/resourceGroups/{target_resource_group}/providers/Microsoft.DBForMySQL/servers/{server}/databases/{database} --secret name=XX secret=XX
    Create a connection from local to mysql with resource name: az connection create mysql -g resourceGroup --tg MysqlRG --server MyServer --database MyDB --secret name=XX secret=XX
