# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List policy set definitions.
flags:
    --management-group=: The name of the management group of the policy [set] definition.
    --subscription=: The subscription id of the policy [set] definition.
documentation:
    command: Retrieve policy set definitions.
    flag:
        expand: Additional properties to include in output.
        filter: Filter list results.
        management-group: The name of the management group of the policy [set] definition. This parameter is required if your policy set is scoped to a management group.
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in ```
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
examples:
    List policy set definitions: az policy set-definition list
    List policy set definitions at management group level: az policy set-definition list --management-group MyManagementGroup
