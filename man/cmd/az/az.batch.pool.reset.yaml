# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reset
description: Update the properties of a Batch pool.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: The Batch account key.
    --account-name=: The Batch account name.
    --application-package-references=:
        description: Required.
        nargs: -1
    --json-file=: The file containing pool update properties parameter specification in JSON(formatted to match REST API request body).
    --metadata=:
        description: Required.
        nargs: -1
    --pool-id=!: The ID of the pool to update.
    --start-task-command-line=: The command line of the start task.
    --start-task-environment-settings=:
        description: A list of environment variable settings for the start task.
        nargs: -1
    --start-task-max-task-retry-count=: The maximum number of times the task may be retried.
    --start-task-resource-files=:
        description: A list of files that the Batch service will download to the Compute Node before running the command line.
        nargs: -1
    --start-task-wait-for-success=: Whether the Batch service should wait for the start task to complete successfully (that is, to exit with exit code 0) before scheduling any tasks on the compute node.
    --subscription=: Name or ID of subscription.
    --target-communication=: The desired node communication mode for the pool.
completion:
    flag:
        target-communication:
            - default
            - classic
            - simplified
documentation:
    command: Update the properties of a Batch pool. Unspecified properties which can be updated are reset to their defaults.
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'The Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'The Batch account name. Only needed Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        application-package-references: Required. The list replaces any existing Application Package references on the Pool. Changes to Application Package references affect all new Compute Nodes joining the Pool, but do not affect Compute Nodes that are already in the Pool until they are rebooted or reimaged. There is a maximum of 10 Application Package references on any given Pool. If omitted, or if you specify an empty collection, any existing Application Packages references are removed from the Pool. A maximum of 10 references may be specified on a given Pool.
        change-reference: The related change reference ID for this resource operation.
        json-file: The file containing pool update properties parameter specification in JSON(formatted to match REST API request body). If this parameter is specified, all 'Pool Update Properties Parameter Arguments' are ignored.
        metadata: Required. This list replaces any existing metadataconfigured on the Pool. If omitted, or if you specify anempty collection, any existing metadata is removed from thePool.
        pool-id: The ID of the pool to update.
        start-task-command-line: The command line of the start task. The command line does not run under a shell, and therefore cannot take advantage of shell features such as environment variable expansion. If you want to take advantage of such features, you should invoke the shell in the command line, for example using "cmd /c MyCommand" in Windows or "/bin/sh -c MyCommand" in Linux.
        start-task-environment-settings: A list of environment variable settings for the start task. Space-separated values in 'key=value' format.
        start-task-max-task-retry-count: The maximum number of times the task may be retried.
        start-task-resource-files: A list of files that the Batch service will download to the Compute Node before running the command line. Files listed under this element are located in the Task's working directory. Space-separated resource references in filename=httpurl format.
        start-task-wait-for-success: Whether the Batch service should wait for the start task to complete successfully (that is, to exit with exit code 0) before scheduling any tasks on the compute node. True if flag present, otherwise defaults to False.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-communication: The desired node communication mode for the pool. If this element is present, it replaces the existing targetNodeCommunicationMode configured on the Pool. If omitted, any existing metadata is left unchanged.
