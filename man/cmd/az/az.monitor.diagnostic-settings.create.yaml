# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create diagnostic settings for the specified resource.
flags:
    --event-hub-rule=: Name or ID of the event hub authorization rule.
    --event-hub=: Name or ID an event hub.
    --export-to-resource-specific=:
        description: Indicate that the export to LA must be done to a resource specific table, a.k.a. dedicated or fixed schema table, as opposed to the default dynamic schema table called AzureDiagnostics.
        nargs: -1
    --logs=:
        description: JSON encoded list of logs settings.
        nargs: -1
    --marketplace-partner-id=: The full ARM resource ID of the Marketplace resource to which you would like to send Diagnostic Logs.
    --metrics=:
        description: The list of metric settings.
        nargs: -1
    --resource-namespace=: Target resource provider namespace.
    --resource-parent=: Target resource parent path, if applicable.
    --resource-type=: Target resource type.
    --resource=!: Name or ID of the target resource.
    --storage-account=: Name or ID of the storage account to send diagnostic logs to.
    --subscription=: Name or ID of subscription.
    --workspace=: Name or ID of the Log Analytics workspace to send diagnostic logs to.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the diagnostic setting.
completion:
    flag:
        export-to-resource-specific:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: |-
        Create diagnostic settings for the specified resource. For more information, visit:
        https://learn.microsoft.com/rest/api/monitor/diagnosticsettings/createorupdate#metricsettings
        .
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        event-hub: Name or ID an event hub. If none is specified, the default event hub will be selected.
        event-hub-rule: Name or ID of the event hub authorization rule.
        export-to-resource-specific: |-
            Indicate that the export to LA must be done to a resource specific table, a.k.a. dedicated or fixed schema table, as opposed to the default dynamic schema table called AzureDiagnostics. This argument is effective only when the argument --workspace is also given. Allowed values: false, true.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        logs: 'JSON encoded list of logs settings. Use ''@{file}'' to load from a file. For more information, visit: https://learn.microsoft.com/rest/api/monitor/diagnosticsettings/createorupdate#logsettings .  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        marketplace-partner-id: The full ARM resource ID of the Marketplace resource to which you would like to send Diagnostic Logs.
        metrics: The list of metric settings.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the diagnostic setting. Required.
        resource: Name or ID of the target resource.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-namespace: Target resource provider namespace.
        resource-parent: Target resource parent path, if applicable.
        resource-type: 'Target resource type. Can also accept namespace/type format (Ex: ''Microsoft.Compute/virtualMachines'').'
        storage-account: Name or ID of the storage account to send diagnostic logs to.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace: Name or ID of the Log Analytics workspace to send diagnostic logs to.
examples:
    Create diagnostic settings, retention here only applies when the target is a storage account.: az monitor diagnostic-settings create --resource {ID} -n {name} --storage-account {storageAccount} --logs "[{category:WorkflowRuntime,enabled:true,retention-policy:{enabled:false,days:0}}]" --metrics "[{category:WorkflowRuntime,enabled:true,retention-policy:{enabled:false,days:0}}]"
