# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: check-name
description: Checks if an Azure Container Registry name is valid and available for use.
flags:
    --subscription=: Name or ID of subscription.
    -n, --name=!: The name of the container registry.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        dnl-scope: |-
            Domain name label scope will add a hash to the resource name . The resulting login server name will be in the format ``` registry-name ``` - ``` hash ``` .azurecr-io. Default is Unsecure.

            Default value: Unsecure

            Accepted values: NoReuse, ResourceGroupReuse, SubscriptionReuse, TenantReuse, Unsecure
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Check if a registry name already exists.: az acr check-name -n doesthisnameexist
