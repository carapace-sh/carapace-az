# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a managed database.
flags:
    --collation=: 'The collation of the Azure SQL Managed Database collation to use, e.g.: SQL_Latin1_General_CP1_CI_AS or Latin1_General_100_CS_AS_SC'
    --ledger-on=:
        description: Create a ledger database, in which the integrity of all data is protected by the ledger feature.
        nargs: -1
    --managed-instance=!: Name of the Azure SQL Managed Instance.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Azure SQL Managed Database.
completion:
    flag:
        ledger-on:
            - Enabled
            - Disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        collation: 'The collation of the Azure SQL Managed Database collation to use, e.g.: SQL_Latin1_General_CP1_CI_AS or Latin1_General_100_CS_AS_SC.'
        ledger-on: |-
            Create a ledger database, in which the integrity of all data is protected by the ledger feature. All tables in the ledger database must be ledger tables. Note: the value of this property cannot be changed after the database has been created.

            Accepted values: Disabled, Enabled
        name: The name of the Azure SQL Managed Database.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a managed database with specified collation: az sql midb create -g mygroup --mi myinstance -n mymanageddb --collation Latin1_General_100_CS_AS_SC
