# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a new Event Hub as a nested resource within a Namespace.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --archive-name-format=: Blob naming convention for archive, e.g. {Namespace}/{EventHub}/{PartitionId}/{Year}/{Month}/{Day}/{Hour}/{Minute}/{Second}.
    --blob-container=: Blob container Name
    --capture-interval=: The time window allows you to set the frequency with which the capture to Azure Blobs will happen, value should between 60 to 900 seconds
    --capture-size-limit=: The size window defines the amount of data built up in your Event Hub before an capture operation, value should be between 10485760 to 524288000 bytes
    --cleanup-policy=: Enumerates the possible values for cleanup policy
    --destination-name=: Name for capture destination
    --enable-capture=:
        description: A value that indicates whether capture description is enabled.
        nargs: -1
    --encoding=: Enumerates the possible values for the encoding format of capture description.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --identity=:
        description: A value that indicates whether capture description is enabled.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --min-lag=: The minimum time a message will remain ineligible for compaction in the log.
    --namespace-name=: The Namespace name
    --partition-count=: Number of partitions created for the Event Hub, allowed values are from 1 to 32 partitions.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --retention-time=: Number of hours to retain the events for this Event Hub.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --skip-empty-archives=:
        description: A value that indicates whether to Skip Empty Archives
        nargs: -1
    --status=: Enumerates the possible values for the status of the Event Hub.
    --storage-account=: Resource id of the storage account to be used to create the blobs
    --subscription=: Name or ID of subscription.
    --timestamp-type=: Denotes the type of timestamp the message will hold.Two types of timestamp types - "AppendTime" and "CreateTime".
    --user-metadata=: Gets and Sets Metadata of User.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The Event Hub name
    -t, --tombstone-retention-time-in-hours=: Number of hours to retain the tombstone markers of a compacted Event Hub.
completion:
    flag:
        cleanup-policy:
            - Compact
            - Delete
            - DeleteOrCompact
        enable-capture:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        encoding:
            - Avro
            - AvroDeflate
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        skip-empty-archives:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        status:
            - Active
            - Creating
            - Deleting
            - Disabled
            - ReceiveDisabled
            - Renaming
            - Restoring
            - SendDisabled
            - Unknown
        timestamp-type:
            - Create
            - LogAppend
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        archive-name-format: Blob naming convention for archive, e.g. {Namespace}/{EventHub}/{PartitionId}/{Year}/{Month}/{Day}/{Hour}/{Minute}/{Second}. Here all the parameters (Namespace,EventHub .. etc) are mandatory irrespective of order.
        blob-container: Blob container Name.
        capture-interval: The time window allows you to set the frequency with which the capture to Azure Blobs will happen, value should between 60 to 900 seconds.
        capture-size-limit: The size window defines the amount of data built up in your Event Hub before an capture operation, value should be between 10485760 to 524288000 bytes.
        change-reference: The related change reference ID for this resource operation.
        cleanup-policy: |-
            Enumerates the possible values for cleanup policy.

            Accepted values: Compact, Delete, DeleteOrCompact
        destination-name: Name for capture destination.
        enable-capture: |-
            A value that indicates whether capture description is enabled.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        encoding: |-
            Enumerates the possible values for the encoding format of capture description. Note: 'AvroDeflate' will be deprecated in New API Version.

            Accepted values: Avro, AvroDeflate
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        identity: A value that indicates whether capture description is enabled.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        min-lag: The minimum time a message will remain ineligible for compaction in the log. This value is used when cleanupPolicy is Compact or DeleteOrCompact.
        namespace-name: The Namespace name.
        partition-count: Number of partitions created for the Event Hub, allowed values are from 1 to 32 partitions.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        retention-time: Number of hours to retain the events for this Event Hub. This value is only used when cleanupPolicy is Delete. If cleanupPolicy is Compaction the returned value of this property is Long.MaxValue
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        skip-empty-archives: |-
            A value that indicates whether to Skip Empty Archives.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        status: |-
            Enumerates the possible values for the status of the Event Hub.

            Accepted values: Active, Creating, Deleting, Disabled, ReceiveDisabled, Renaming, Restoring, SendDisabled, Unknown
        storage-account: Resource id of the storage account to be used to create the blobs.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timestamp-type: |-
            Denotes the type of timestamp the message will hold.Two types of timestamp types - "AppendTime" and "CreateTime". AppendTime refers the time in which message got appended inside broker log. CreateTime refers to the time in which the message was generated on source side and producers can set this timestamp while sending the message. Default value is AppendTime. If you are using AMQP protocol, CreateTime equals AppendTime and its behavior remains the same.

            Accepted values: Create, LogAppend
        tombstone-retention-time-in-hours: Number of hours to retain the tombstone markers of a compacted Event Hub. This value is only used when cleanupPolicy is Compaction. Consumer must complete reading the tombstone marker within this specified amount of time if consumer begins from starting offset to ensure they get a valid snapshot for the specific key described by the tombstone marker within the compacted Event Hub.
        user-metadata: Gets and Sets Metadata of User.
