# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-owner
description: Set the owner information for a file or folder in a Data Lake Store account.
flags:
    --group=: The group Azure Active Directory object ID or user principal name to set as the owning group.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --owner=: The user Azure Active Directory object ID or user principal name to set as the owner.
    --path=!: The path in the specified Data Lake Store account where the action should take place.
    --subscription=: Name or ID of subscription.
    -n, --account=: Name of the Data Lake Store account.
documentation:
    command: |-
        Command group 'dls' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account: Name of the Data Lake Store account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        group: The group Azure Active Directory object ID or user principal name to set as the owning group.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        owner: The user Azure Active Directory object ID or user principal name to set as the owner.
        path: The path in the specified Data Lake Store account where the action should take place. In the format '/folder/file.txt', where the first '/' after the DNS indicates the root of the file system.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
