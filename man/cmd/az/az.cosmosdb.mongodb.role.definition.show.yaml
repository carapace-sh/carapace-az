# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Retrieves the properties of an existing Azure Cosmos DB Mongo Role Definition with the given Id.
flags:
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Cosmosdb account name.
    -g, --resource-group=!: Name of resource group.
    -i, --id=!: Unique ID for the Mongo Role Definition.
documentation:
    command: Show the properties of a MongoDb role definition under an Azure Cosmos DB account.
    flag:
        account-name: Cosmosdb account name.
        id: Unique ID for the Mongo Role Definition.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the properties of a MongoDb role definition under an Azure Cosmos DB account.: az cosmosdb mongodb role definition show --account-name MyAccount --resource-group MyResourceGroup --id be79875a-2cc4-40d5-8958-566017875b39
