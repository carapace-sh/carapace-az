# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the properties of a billing subscription.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --cost-center=: The cost center applied to the subscription.
    --sku-id=: The sku ID of the Azure plan for the subscription.
    --subscription-billing-status=: The current billing status of the subscription.
    --subscription=: Name or ID of subscription.
completion:
    flag:
        subscription-billing-status:
            - Active
            - Inactive
            - Abandoned
            - Deleted
            - Warning
documentation:
    command: |-
        Command group 'billing subscription' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cost-center: The cost center applied to the subscription.
        sku-id: The sku ID of the Azure plan for the subscription.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        subscription-billing-status: |-
            The current billing status of the subscription.

            Accepted values: Abandoned, Active, Deleted, Inactive, Warning
examples:
    Update properties of a billing account: az billing subscription update --account-name "{billingAccountName}" --cost-center "ABC1234"
