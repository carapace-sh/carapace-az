# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List Content Key Policies.
flags:
    --filter=: Restricts the set of items returned.
    --orderby=: Specifies the key by which the result collection should be ordered.
    --subscription=: Name or ID of subscription.
    --top=: Specifies a non-negative integer n that limits the number of items returned from a collection.
    -a, --account-name=!: The name of the Azure Media Services account.
    -g, --resource-group=!: Name of resource group.
documentation:
    command: List all the content key policies within an Azure Media Services account.
    flag:
        account-name: The name of the Azure Media Services account.
        filter: Restricts the set of items returned.
        orderby: Specifies the key by which the result collection should be ordered.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        top: Specifies a non-negative integer n that limits the number of items returned from a collection. The service returns the number of available items up to but not greater than the specified value n.
examples:
    list the content key policies within an Azure Media Services account with a filter clause.: az ams content-key-policy list -a amsAccount -g resourceGroup --filter "properties/lastModified gt 2022-08-16 or properties/created lt 2022-08-17"
