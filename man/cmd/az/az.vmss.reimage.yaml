# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reimage
description: Reimage VMs within a VMSS.
flags:
    --force-update-os-disk-for-ephemeral=:
        description: Force update ephemeral OS disk for a virtual machine scale set VM.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --instance-ids=:
        description: Space-separated list of VM instance ID.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Scale set name.
completion:
    flag:
        force-update-os-disk-for-ephemeral:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: |-
            The related change reference ID for this resource operation.

            Accepted values: false, true
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        instance-ids: Space-separated list of VM instance ID. If missing, reimage all instances.
        name: Scale set name. You can configure the default using ``` az configure --defaults vmss=<name> ``` .
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Reimage a VM instance within a VMSS.: az vmss reimage --instance-ids 1 --name MyScaleSet --resource-group MyResourceGroup --subscription MySubscription
    Reimage a batch of VM instances within a VMSS.: az vmss reimage --instance-ids 1 2 3 --name MyScaleSet --resource-group MyResourceGroup --subscription MySubscription
    Reimage all the VM instances within a VMSS.: az vmss reimage --name MyScaleSet --resource-group MyResourceGroup --subscription MySubscription
