# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a virtual network link to the specified Private DNS zone.
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --resolution-policy=: The resolution policy on the virtual network link.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags for the virtual network link.
        nargs: -1
    -e, --registration-enabled=!:
        description: Specify if the link is registration enabled.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the virtual network link to the specified private DNS zone.
    -v, --virtual-network=!: Name or ID of the virtual network.
    -z, --zone-name=!: Name of the private DNS zone.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        registration-enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        resolution-policy:
            - Default
            - NxDomainRedirect
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the virtual network link to the specified private DNS zone.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        registration-enabled: |-
            Specify if the link is registration enabled.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resolution-policy: |-
            The resolution policy on the virtual network link. Only applicable for virtual network links to privatelink zones, and for A,AAAA,CNAME queries. When set to 'NxDomainRedirect', Azure DNS resolver falls back to public resolution if private dns query resolution results in non-existent domain response.

            Accepted values: Default, NxDomainRedirect
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags for the virtual network link.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        virtual-network: Name or ID of the virtual network.
        zone-name: Name of the private DNS zone.
examples:
    Create a virtual network link to the specified private DNS zone.: az network private-dns link vnet create -g MyResourceGroup -n MyLinkName -z www.mysite.com -v MyVirtualNetworkId -e False
