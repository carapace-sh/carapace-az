# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists managed database move operations
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --dest-mi=: Name of the target managed instance to show move operations for.
    --dest-resource-group=: Name of the target resource group to show move operations for.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --managed-instance=: Name of the source managed instance.
    --only-latest-per-database=: Flag that only shows latest move operation per managed database.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of the source resource group.
    -n, --name=: The name of the Azure SQL Managed Database.
