# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: verify
description: Verify a signature using the key that is stored in a Vault or HSM.
documentation:
    flag:
        hsm-name: Name of the HSM. (--hsm-name and --vault-name are mutually exclusive, please specify just one of them)
        id: Id of the key. If specified all other 'Id' arguments should be omitted.
        name: Name of the key. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        version: The key version. If omitted, uses the latest version.
flags:
    --digest=!: The value to sign
    --hsm-name=: Name of the HSM.
    --id=: Id of the key.
    --signature=!: signature to verify
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Vault.
    -a, --algorithm=!: Algorithm identifier
    -n, --name=: Name of the key.
    -v, --version=: The key version.
completion:
    flag:
        algorithm:
            - PS256
            - PS384
            - PS512
            - RS256
            - RS384
            - RS512
            - ES256
            - ES384
            - ES512
            - ES256K
