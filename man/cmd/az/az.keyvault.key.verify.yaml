# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: verify
description: Verify a signature using the key that is stored in a Vault or HSM.
flags:
    --digest=!: The value to sign
    --hsm-name=: Name of the HSM.
    --id=: Id of the key.
    --signature=!: signature to verify
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Vault.
    -a, --algorithm=!: Algorithm identifier
    -n, --name=: Name of the key.
    -v, --version=: The key version.
completion:
    flag:
        algorithm:
            - PS256
            - PS384
            - PS512
            - RS256
            - RS384
            - RS512
            - ES256
            - ES384
            - ES512
            - ES256K
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        algorithm: |-
            Algorithm identifier.

            Accepted values: ES256, ES256K, ES384, ES512, HS256, HS384, HS512, PS256, PS384, PS512, RS256, RS384, RS512
        change-reference: The related change reference ID for this resource operation.
        digest: The value to sign (base64 encoded).
        hsm-name: Name of the HSM. (--hsm-name and --vault-name are mutually exclusive, please specify just one of them).
        id: Id of the key. If specified all other 'Id' arguments should be omitted.
        name: Name of the key. Required if --id is not specified.
        signature: Signature to verify.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Vault.
        version: The key version. If omitted, uses the latest version.
examples:
    Verify a signature using keyvault's key.: az keyvault key verify --name mykey --vault-name myvault --algorithm RS256 --digest "rsBwZF/lPuOzdjBZN2E08FjMM3JHyXit0Xi2zN+wAZ8=" --signature XXXYYYZZZ
