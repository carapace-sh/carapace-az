# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a live event.
flags:
    --access-token=: A unique identifier for a stream.
    --alternative-media-id=: An Alternative Media Identifier associated with the StreamingLocator created for the preview.
    --auto-start=: The flag indicates if the resource should be automatically started on creation.
    --client-access-policy=: Filepath to the clientaccesspolicy.xml used by Microsoft Silverlight and Adobe Flash.
    --cross-domain-policy=: Filepath to the crossdomain.xml used by Microsoft Silverlight and Adobe Flash.
    --description=: The live event description.
    --encoding-type=: The encoding type for live event.
    --hostname-prefix=: When useStaticHostname is set to true, hostname_prefix specifies the first part of the hostname assigned to the live event preview and ingest endpoints.
    --ips=!:
        description: Space-separated IP addresses for access control.
        nargs: -1
    --key-frame-interval-duration=: ISO 8601 timespan duration of the key frame interval duration in seconds.
    --key-frame-interval=: Use an ISO 8601 time value between 0.5 to 20 seconds to specify the output fragment length for the video and audiotracks of an encoding live event.
    --no-wait=: Do not wait for the long-running operation to finish.
    --preset-name=: The encoding preset name.
    --preview-ips=:
        description: Space-separated IP addresses for access control.
        nargs: -1
    --preview-locator=: The identifier of the preview locator in Guid format.
    --stream-options=:
        description: The options to use for the LiveEvent.
        nargs: -1
    --streaming-policy-name=: The name of streaming policy used for the live event preview.
    --streaming-protocol=!: The streaming protocol for the live event.
    --stretch-mode=: Specifies how the input video will be resized to fit the desired output resolution(s).
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --transcription-lang=: Live transcription language for the live event.
    --use-static-hostname=: Specifies whether a static hostname would be assigned to the live event preview and ingest endpoints.
    -a, --account-name=!: The name of the Azure Media Services account.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the live event.
completion:
    flag:
        stream-options:
            - Default
            - LowLatency
            - LowLatencyV2
        streaming-protocol:
            - FragmentedMP4
            - RTMP
documentation:
    flag:
        access-token: A unique identifier for a stream. This can be specified at creation time but cannot be updated. If omitted, the service will generate a unique value.
        account-name: The name of the Azure Media Services account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        alternative-media-id: An Alternative Media Identifier associated with the StreamingLocator created for the preview. This value is specified at creation time and cannot be updated. The identifier can be used in the CustomLicenseAcquisitionUrlTemplate or the CustomKeyAcquisitionUrlTemplate of the StreamingPolicy specified in the StreamingPolicyName field.
        auto-start: |-
            The flag indicates if the resource should be automatically started on creation.

            Default value: False
        change-reference: The related change reference ID for this resource operation.
        client-access-policy: Filepath to the clientaccesspolicy.xml used by Microsoft Silverlight and Adobe Flash. Use @{file} to load from a file.
        cross-domain-policy: Filepath to the crossdomain.xml used by Microsoft Silverlight and Adobe Flash. Use @{file} to load from a file.
        description: The live event description.
        encoding-type: 'The encoding type for live event. This value is specified at creation time and cannot be updated. Allowed values: Premium1080p, None, Standard.'
        hostname-prefix: When useStaticHostname is set to true, hostname_prefix specifies the first part of the hostname assigned to the live event preview and ingest endpoints. The final hostname would be a combination of this prefix, the media service account name and a short code for the Azure Media Services data center.
        ips: Space-separated IP addresses for access control. Allowed IP addresses can be specified as either a single IP address (e.g. "10.0.0.1") or as an IP range using an IP address and a CIDR subnet mask (e.g. "10.0.0.1/22"). Use "" to clear existing list. Use "AllowAll" to allow all IP addresses. Allowing all IPs is not recommended for production environments.
        key-frame-interval: Use an ISO 8601 time value between 0.5 to 20 seconds to specify the output fragment length for the video and audiotracks of an encoding live event. For example, use PT2S to indicate 2 seconds. For the video track it also defines the key frame interval, or the length of a GoP (group of pictures). If this value is not set for anencoding live event, the fragment duration defaults to 2 seconds. The value cannot be set for pass-through live events.
        key-frame-interval-duration: ISO 8601 timespan duration of the key frame interval duration in seconds. The value should be an interger in the range of 1 (PT1S or 00:00:01) to 30 (PT30S or 00:00:30) seconds.
        name: The name of the live event.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        preset-name: The encoding preset name. This value is specified at creation time and cannot be updated.
        preview-ips: Space-separated IP addresses for access control. Allowed IP addresses can be specified as either a single IP address (e.g. "10.0.0.1") or as an IP range using an IP address and a CIDR subnet mask (e.g. "10.0.0.1/22"). Use "" to clear existing list. Use "AllowAll" to allow all IP addresses. Allowing all IPs is not recommended for production environments.
        preview-locator: The identifier of the preview locator in Guid format. Specifying this at creation time allows the caller to know the preview locator url before the event is created. If omitted, the service will generate a random identifier. This value cannot be updated once the live event is created.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        stream-options: |-
            The options to use for the LiveEvent. This value is specified at creation time and cannot be updated.

            Accepted values: Default, LowLatency, LowLatencyV2
        streaming-policy-name: The name of streaming policy used for the live event preview. This can be specified at creation time but cannot be updated.
        streaming-protocol: |-
            The streaming protocol for the live event. This value is specified at creation time and cannot be updated.

            Accepted values: FragmentedMP4, RTMP
        stretch-mode: 'Specifies how the input video will be resized to fit the desired output resolution(s). Default is None.  Allowed values: None, AutoSize, AutoFit.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        transcription-lang: 'Live transcription language for the live event. Allowed values: ca-ES, da-DK, de-DE, en-AU, en-CA, en-GB, en-IN, en-NZ, en-US, es-ES, es-MX, fi-FI, fr-CA, fr-FR, it-IT, nl-NL, pt-BR, pt-PT, sv-SE See https://go.microsoft.com/fwlink/?linkid=2133742 for more information about the live transcription feature.'
        use-static-hostname: |-
            Specifies whether a static hostname would be assigned to the live event preview and ingest endpoints. This value can only be updated if the live event is in Standby state. If hostname_prefix is not specified, the live event name will be used as the hostname prefix.

            Default value: False
examples:
    Create a live event.: az ams live-event create -a myAMS -n liveevent -g rg --ips AllowAll --streaming-protocol FragmentedMP4
