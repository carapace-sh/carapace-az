# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a Container Apps environment.
flags:
    --custom-domain-certificate-file=: The filepath of the certificate file (.pfx or .pem) for the environment's custom domain.
    --custom-domain-certificate-password=: The certificate file password for the environment's custom domain.
    --custom-domain-dns-suffix=: The DNS suffix for the environment's custom domain.
    --enable-mtls=:
        description: Boolean indicating if mTLS peer authentication is enabled for the environment.
        nargs: -1
    --enable-peer-to-peer-encryption=:
        description: Boolean indicating whether the peer-to-peer traffic encryption is enabled for the environment.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --logs-destination=: Logs destination.
    --logs-workspace-id=: Workspace ID of the Log Analytics workspace to send diagnostics logs to.
    --logs-workspace-key=: Log Analytics workspace key to configure your Log Analytics workspace.
    --max-nodes=: The maximum nodes for this workload profile, --workload-profile-name required
    --min-nodes=: The minimum nodes for this workload profile, --workload-profile-name required
    --no-wait=: Do not wait for the long-running operation to finish.
    --storage-account=: Name or resource ID of the storage account used for Azure Monitor.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --workload-profile-type=: The type of workload profile to add or update in this environment, --workload-profile-name required
    -d, --dapr-connection-string=: Application Insights connection string used by Dapr to export service to service communication telemetry.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Container Apps environment.
    -w, --workload-profile-name=: The friendly name for the workload profile
completion:
    flag:
        enable-mtls:
            - "true"
            - "false"
        enable-peer-to-peer-encryption:
            - "true"
            - "false"
        logs-destination:
            - log-analytics
            - azure-monitor
            - none
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        custom-domain-certificate-file: The filepath of the certificate file (.pfx or .pem) for the environment's custom domain. To manage certificates for container apps, use `az containerapp env certificate`.
        dapr-connection-string: Application Insights connection string used by Dapr to export service to service communication telemetry. Use "none" to remove it.
        enable-mtls: |-
            Boolean indicating if mTLS peer authentication is enabled for the environment.

            Accepted values: false, true
        enable-peer-to-peer-encryption: |-
            Boolean indicating whether the peer-to-peer traffic encryption is enabled for the environment.

            Accepted values: false, true
        environment-mode: Mode of the environment.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        logs-destination: |-
            Logs destination.

            Accepted values: azure-monitor, log-analytics, none
        logs-dynamic-json-columns: |-
            Boolean indicating whether to parse json string log into dynamic json columns. Only work for destination log-analytics.

            Accepted values: false, true
        logs-workspace-id: Workspace ID of the Log Analytics workspace to send diagnostics logs to. Only works with logs destination "log-analytics". You can use "az monitor log-analytics workspace create" to create one. Extra billing may apply.
        logs-workspace-key: Log Analytics workspace key to configure your Log Analytics workspace. Only works with logs destination "log-analytics". You can use "az monitor log-analytics workspace get-shared-keys" to retrieve the key.
        max-nodes: The maximum nodes for this workload profile, --workload-profile-name required.
        min-nodes: The minimum nodes for this workload profile, --workload-profile-name required.
        name: Name of the Container Apps environment.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        public-network-access: |-
            Allow or block all public traffic.

            Accepted values: Disabled, Enabled
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        storage-account: Name or resource ID of the storage account used for Azure Monitor. If this value is provided, Azure Monitor Diagnostic Settings will be created automatically.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        workload-profile-name: The friendly name for the workload profile.
        workload-profile-type: The type of workload profile to add or update in this environment, --workload-profile-name required.
examples:
    Update an environment's custom domain configuration.: |-
        az containerapp env update -n MyContainerappEnvironment -g MyResourceGroup \
            --dns-suffix my-suffix.net --certificate-file MyFilePath \
            --certificate-password MyCertPass
