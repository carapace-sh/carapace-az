# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get a single policy metadata resource.
flags:
    --subscription=: Name or ID of subscription.
    -n, --name=!: The name of the metadata resource.
documentation:
    flag:
        name: The name of the metadata resource.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get the policy metadata resource with the name 'ACF1000'.: az policy metadata show --name ACF1000
