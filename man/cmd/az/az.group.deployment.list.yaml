# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Get all the deployments for a resource group.
documentation:
    flag:
        filter: The filter to apply on the operation. For example, you can use $filter=provisioningState eq '{state}'. Default value is None.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        top: The number of results to get. If null is passed, returns all deployments. Default value is None.
flags:
    --filter=: The filter to apply on the operation.
    --subscription=: Name or ID of subscription.
    --top=: The number of results to get.
    -g, --resource-group=!: Name of resource group.
