# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get a policy attestation.
flags:
    --namespace=: 'Provider namespace (Ex: Microsoft.Provider).'
    --parent=: 'The parent path (Ex: resourceTypeA/nameA/resourceTypeB/nameB).'
    --resource-type=: 'Resource type (Ex: resourceTypeC).'
    --resource=: Resource ID or resource name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --attestation-name=!: The name of the attestation.
documentation:
    flag:
        namespace: 'Provider namespace (Ex: Microsoft.Provider).'
        parent: 'The parent path (Ex: resourceTypeA/nameA/resourceTypeB/nameB).'
        resource: Resource ID or resource name. If a name is given, please provide the resource group and other relevant resource id arguments.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'Resource type (Ex: resourceTypeC).'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show an attestation at subscription.: az policy attestation show --attestation-name myAttestation
