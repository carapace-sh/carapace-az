# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: get-access-token
description: get AAD token to access to a specified resource.
flags:
    --resource-type=: Type of well-known resource.
    --resource=: Azure resource endpoints in Microsoft Entra v1.0.
    --scope=:
        description: Space-separated scopes in Microsoft Entra v2.0.
        nargs: -1
    -s, --subscription=: Name or ID of subscription.
    -t, --tenant=: Tenant ID for which the token is acquired.
completion:
    flag:
        resource-type:
            - oss-rdbms
            - arm
            - aad-graph
            - ms-graph
            - batch
            - media
            - data-lake
documentation:
    command: Get a token for utilities to access Azure.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        resource: Azure resource endpoints in Microsoft Entra v1.0.
        resource-type: |-
            Type of well-known resource.

            Accepted values: aad-graph, arm, batch, data-lake, media, ms-graph, oss-rdbms
        scope: Space-separated scopes in Microsoft Entra v2.0. Default to Azure Resource Manager.
        tenant: Tenant ID for which the token is acquired. Only available for user and service principal account, not for managed identity or Cloud Shell account.
examples:
    Get an access token for a specific subscription: az account get-access-token --subscription 00000000-0000-0000-0000-000000000000
    Get an access token for a specific tenant: az account get-access-token --tenant 00000000-0000-0000-0000-000000000000
    Get an access token for the current account: az account get-access-token
    Get an access token to use with MS Graph API: az account get-access-token --resource-type ms-graph
