# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: get-access-token
description: get AAD token to access to a specified resource.
documentation:
    flag:
        scope: Space-separated scopes in Microsoft Entra v2.0. Default to Azure Resource Manager.
        tenant: Tenant ID for which the token is acquired. Only available for user and service principal account, not for managed identity or Cloud Shell account
flags:
    --resource-type=: Type of well-known resource.
    --resource=: Azure resource endpoints in Microsoft Entra v1.0.
    --scope=:
        description: Space-separated scopes in Microsoft Entra v2.0.
        nargs: -1
    -s, --subscription=: Name or ID of subscription.
    -t, --tenant=: Tenant ID for which the token is acquired.
completion:
    flag:
        resource-type:
            - oss-rdbms
            - arm
            - aad-graph
            - ms-graph
            - batch
            - media
            - data-lake
