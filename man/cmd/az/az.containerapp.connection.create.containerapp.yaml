# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: containerapp
description: Create a containerapp-to-containerapp connection.
documentation:
    flag:
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        name: Name of the container app. Required if '--source-id' is not specified.None
        opt-out: Whether to disable some configuration steps. Use configinfo to disbale configuration information changes on source. Use publicnetwork to disable public network access configuration.Use auth to skip auth configuration such as enabling managed identity and granting RBAC roles.
        resource-group: The resource group which contains the container app. Required if '--source-id' is not specified.None
        source-id: The resource id of a containerapp. Required if ['--resource-group', '--name'] are not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-app-name: Name of the target container app. Required if '--target-id' is not specified.
        target-id: The resource id of target service. Required if ['--target-resource-group', '--target-app-name'] are not specified.
        target-resource-group: The resource group which contains the target container app. Required if '--target-id' is not specified.
flags:
    --appconfig-id=: The app configuration id to store configuration
    --client-type=: The client type used on the containerapp
    --connection=: Name of the containerapp connection.
    --connstr-props=:
        description: The additional connection string properties used to build connection string.
        nargs: -1
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --opt-out=:
        description: Whether to disable some configuration steps.
        nargs: -1
    --source-id=: The resource id of a containerapp.
    --subscription=: Name or ID of subscription.
    --target-app-name=: Name of the target container app.
    --target-id=: The resource id of target service.
    --target-resource-group=: The resource group which contains the target container app.
    --vault-id=: The id of key vault to store secret value
    -c, --container=: The container where the connection information will be saved (as environment variables).
    -g, --resource-group=: The resource group which contains the container app.
    -n, --name=: Name of the container app.
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - go
            - php
            - ruby
            - django
            - springBoot
            - none
        opt-out:
            - publicnetwork
            - configinfo
            - auth
