# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Azure network virtual appliance.
documentation:
    flag:
        additional-nics: Details required for Additional Network Interface.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        asn: VirtualAppliance ASN. The valid value ranges from 1 to 4294967295.
        boot-blobs: Space-separated list of BootStrapConfigurationBlobs storage URLs.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        cloud-blobs: Space-separated list of CloudInitConfigurationBlob storage URLs.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        delegation: The delegation for the Virtual Appliance  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        identity: The identity of the Network Virtual Appliance, if configured.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        internet-ingress-ips: List of Resource Uri of Public IPs for Internet Ingress Scenario.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        network-profile: Network Profile containing configurations for Public and Private NIC.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
flags:
    --additional-nics=:
        description: Details required for Additional Network Interface.
        nargs: -1
    --asn=: VirtualAppliance ASN.
    --boot-blobs=:
        description: Space-separated list of BootStrapConfigurationBlobs storage URLs.
        nargs: -1
    --cloud-blobs=:
        description: Space-separated list of CloudInitConfigurationBlob storage URLs.
        nargs: -1
    --delegation=:
        description: The delegation for the Virtual Appliance  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --identity=:
        description: The identity of the Network Virtual Appliance, if configured.
        nargs: -1
    --init-config=: CloudInitConfiguration scripts that will be run during cloud initialization.
    --internet-ingress-ips=:
        description: List of Resource Uri of Public IPs for Internet Ingress Scenario.
        nargs: -1
    --network-profile=:
        description: Network Profile containing configurations for Public and Private NIC.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --scale-unit=: Virtual Appliance Scale Unit.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vendor=: Virtual Appliance Vendor.
    --vhub=: Name or ID of the virtual hub to which the Security Partner Provider belongs.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of Network Virtual Appliance.
    -v, --version=: Virtual Appliance Version.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
