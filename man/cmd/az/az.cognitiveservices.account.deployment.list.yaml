# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets the deployments associated with the Cognitive Services account.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: cognitive service account name
documentation:
    command: Show all deployments for Azure Cognitive Services account.
    flag:
        name: Cognitive service account name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show all deployments for Azure Cognitive Services account.: az cognitiveservices account deployment list -g yuanyang-test-sdk -n yytest-oai
