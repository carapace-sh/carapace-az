# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the instructions by billing profile id.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --profile-name=!: The ID that uniquely identifies a billing profile.
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        Command group 'billing instruction' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        profile-name: The ID that uniquely identifies a billing profile.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List instructions by billing profile: az billing instruction list --account-name "{billingAccountName}" --profile-name "{billingProfileName}"
