# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: install-cli
description: Download and install kubectl, the Kubernetes command-line tool.
flags:
    --base-src-url=: Base download source URL for kubectl releases.
    --client-version=: Version of kubectl to install.
    --install-location=: Path at which to install kubectl.
    --kubelogin-install-location=: Path at which to install kubelogin.
    --kubelogin-version=: Version of kubelogin to install.
    --subscription=: Name or ID of subscription.
    -l, --kubelogin-base-src-url=: Base download source URL for kubelogin releases.
documentation:
    command: Download and install kubectl, the Kubernetes command-line tool. Download and install kubelogin, a client-go credential (exec) plugin implementing azure authentication.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        base-src-url: Base download source URL for kubectl releases.
        change-reference: The related change reference ID for this resource operation.
        client-version: |-
            Version of kubectl to install.

            Default value: latest
        gh-token: GitHub authentication token used when downloading kubelogin binaries from GitHub releases. Supplying a token helps avoid GitHub API rate limits.
        install-location: |-
            Path at which to install kubectl. Note: the path should contain the binary filename.

            Default value: ~\.azure-kubectl\kubectl.exe
        kubelogin-base-src-url: Base download source URL for kubelogin releases.
        kubelogin-install-location: |-
            Path at which to install kubelogin. Note: the path should contain the binary filename.

            Default value: ~\.azure-kubelogin\kubelogin.exe
        kubelogin-version: |-
            Version of kubelogin to install.

            Default value: latest
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
