# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: install-cli
description: Download and install kubectl, the Kubernetes command-line tool.
documentation:
    flag:
        install-location: 'Path at which to install kubectl. Note: the path should contain the binary filename.'
        kubelogin-install-location: 'Path at which to install kubelogin. Note: the path should contain the binary filename.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --base-src-url=: Base download source URL for kubectl releases.
    --client-version=: Version of kubectl to install.
    --install-location=: Path at which to install kubectl.
    --kubelogin-install-location=: Path at which to install kubelogin.
    --kubelogin-version=: Version of kubelogin to install.
    --subscription=: Name or ID of subscription.
    -l, --kubelogin-base-src-url=: Base download source URL for kubelogin releases.
