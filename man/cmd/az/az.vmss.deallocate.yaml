# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: deallocate
description: Deallocate VMs within a VMSS.
documentation:
    flag:
        hibernate: Hibernate a virtual machine from the VM scale set. Available for VMSS with Flexible OrchestrationMode only.
        instance-ids: 'Space-separated list of IDs (ex: 1 2 3 ...) or * for all instances. If not provided, the action will be applied on the scaleset itself'
        name: Scale set name. You can configure the default using `az configure --defaults vmss=<name>`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --hibernate=:
        description: Hibernate a virtual machine from the VM scale set.
        nargs: -1
    --instance-ids=:
        description: 'Space-separated list of IDs (ex: 1 2 3 ...) or * for all instances.'
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Scale set name.
completion:
    flag:
        hibernate:
            - "true"
            - "false"
