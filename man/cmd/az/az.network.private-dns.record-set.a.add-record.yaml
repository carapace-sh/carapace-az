# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add-record
description: Add an A record.
flags:
    --subscription=: Name or ID of subscription.
    -a, --ipv4-address=!: IPV4 address in string notation.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -z, --zone-name=!: The name of the Private DNS zone.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ipv4-address: IPV4 address in string notation.
        record-set-name: The name of the record set relative to the zone. Creates a new record set if one does not exist.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        zone-name: The name of the Private DNS zone.
examples:
    Add an A record.: |-
        az network private-dns record-set a add-record -g MyResourceGroup -z www.mysite.com \
            -n MyRecordSet -a MyIpv4Address
