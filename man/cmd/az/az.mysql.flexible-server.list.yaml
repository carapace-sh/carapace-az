# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List available flexible servers.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all MySQL flexible servers in a resource group in table format.: az mysql flexible-server list --resource-group testGroup --output table
    List all MySQL flexible servers in a resource group.: az mysql flexible-server list --resource-group testGroup
    List all MySQL flexible servers in a subscription.: az mysql flexible-server list
