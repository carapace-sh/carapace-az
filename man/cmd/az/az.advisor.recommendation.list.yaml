# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List Azure Advisor recommendations.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -c, --category=: Name of recommendation category.
    -g, --resource-group=: Name of resource group.
    -r, --refresh=: Generate new recommendations.
completion:
    flag:
        category:
            - Cost
            - HighAvailability
            - Performance
            - Security
documentation:
    flag:
        category: |-
            Name of recommendation category.

            Accepted values: Cost, HighAvailability, Performance, Security
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
        refresh: Generate new recommendations.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
