# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Event Hubs consumer group as a nested resource within a Namespace.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --eventhub-name=!: The Event Hub name
    --namespace-name=!: The Namespace name
    --subscription=: Name or ID of subscription.
    --user-metadata=: User Metadata is a placeholder to store user-defined string data with maximum length 1024. e.g. it can be used to store descriptive data, such as list of teams and their contact information also user-defined configuration settings can be stored.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The consumer group name
