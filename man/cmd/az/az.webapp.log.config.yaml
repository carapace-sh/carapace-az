# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: config
description: Configure logging for a web app.
flags:
    --application-logging=: configure application logging
    --detailed-error-messages=:
        description: configure detailed error messages
        nargs: -1
    --docker-container-logging=: configure gathering STDOUT and STDERR output from container
    --failed-request-tracing=:
        description: configure failed request tracing
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --level=: logging level
    --subscription=: Name or ID of subscription.
    --web-server-logging=: configure Web server logging
    -g, --resource-group=: Name of resource group.
    -n, --name=: name of the web app.
    -s, --slot=: the name of the slot.
completion:
    flag:
        application-logging:
            - filesystem
            - azureblobstorage
            - "off"
        detailed-error-messages:
            - "true"
            - "false"
        docker-container-logging:
            - "off"
            - filesystem
        failed-request-tracing:
            - "true"
            - "false"
        level:
            - error
            - warning
            - information
            - verbose
        web-server-logging:
            - "off"
            - filesystem
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        application-logging: |-
            Configure application logging.

            Accepted values: azureblobstorage, filesystem, off
        change-reference: The related change reference ID for this resource operation.
        detailed-error-messages: |-
            Configure detailed error messages.

            Accepted values: false, true
        docker-container-logging: |-
            Configure gathering STDOUT and STDERR output from container.

            Accepted values: filesystem, off
        failed-request-tracing: |-
            Configure failed request tracing.

            Accepted values: false, true
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        level: |-
            Logging level.

            Accepted values: error, information, verbose, warning
        name: Name of the web app. If left unspecified, a name will be randomly generated. You can configure the default using ``` az configure --defaults web=<name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: The name of the slot. Default to the productions slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        web-server-logging: |-
            Configure Web server logging.

            Accepted values: filesystem, off
examples:
    Configure logging for a web app. (autogenerated): az webapp log config --docker-container-logging off --name MyWebapp --resource-group MyResourceGroup
