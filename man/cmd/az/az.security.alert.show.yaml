# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows a security alert.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -l, --location=!: location of the resource
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        location: Location of the resource.
        name: Name of the resource to be fetched.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a security alert on a resource group scope.: az security alert show -g "myRg" --location "centralus" -n "alertName"
    Get a security alert on a subscription scope.: az security alert show --location "centralus" -n "alertName"
