# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Set an existing function app's container settings.
flags:
    --cpu=: Required CPU in cores from 0.5 to 2.0.
    --dapr-app-id=: The Dapr application identifier.
    --dapr-app-port=: The port Dapr uses to communicate to the application.
    --dapr-enable-api-logging=:
        description: Enable/Disable API logging for the Dapr sidecar.
        nargs: -1
    --dapr-http-max-request-size=: Max size of request body http and grpc servers in MB to handle uploading of large files.
    --dapr-http-read-buffer-size=: Max size of http header read buffer in KB to handle when sending multi-KB headers.
    --dapr-log-level=: The log level for the Dapr sidecar
    --enable-dapr=:
        description: Enable/Disable Dapr for a function app on an Azure Container App environment
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --max-replicas=: The maximum number of replicas when create function app on container app
    --memory=: Required momory from 1.0 to 4.0 ending with Gi e.g. 1.0Gi,
    --min-replicas=: The minimum number of replicas when create function app on container app
    --subscription=: Name or ID of subscription.
    --workload-profile-name=: The name of the workload profile to run the app on.
    -c, --image=: the container custom image name and optionally the tag name (e.g., `<registry-name>/<image-name>:<tag>`)
    -g, --resource-group=: Name of resource group.
    -n, --name=: name of the function app
    -p, --registry-password=: the container registry server password
    -r, --registry-server=: the container registry server url
    -s, --slot=: the name of the slot.
    -u, --registry-username=: the container registry server username
completion:
    flag:
        dapr-enable-api-logging:
            - "true"
            - "false"
        dapr-log-level:
            - debug
            - error
            - info
            - warn
        enable-dapr:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cpu: |-
            Required CPU in cores from 0.5 to 2.0. --dal --dapr-enable-api-logging Enable/Disable API logging for the Dapr sidecar.

            Accepted values: false, true
        dapr-app-id: The Dapr application identifier.
        dapr-app-port: The port Dapr uses to communicate to the application. --dapr-http-max-request-size --dhmrs Max size of request body http and grpc servers in MB to handle uploading of large files. --dapr-http-read-buffer-size --dhrbs Max size of http header read buffer in KB to handle when sending multi-KB headers.
        dapr-log-level: |-
            The log level for the Dapr sidecar.

            Accepted values: debug, error, info, warn
        docker-custom-image-name: Option '--docker-custom-image-name' has been deprecated and will be removed in a future release. Use '--image' instead. The container custom image name and optionally the tag name (e.g., ``` <registry-name>/<image-name>:<tag> ``` ).
        docker-registry-server-password: Option '--docker-registry-server-password' has been deprecated and will be removed in a future release. Use '--registry-password' instead. The container registry server password.
        docker-registry-server-url: Option '--docker-registry-server-url' has been deprecated and will be removed in a future release. Use '--registry-server' instead. The container registry server url.
        docker-registry-server-user: Option '--docker-registry-server-user' has been deprecated and will be removed in a future release. Use '--registry-username' instead. The container registry server username.
        enable-dapr: |-
            Enable/Disable Dapr for a function app on an Azure Container App environment.

            Accepted values: false, true
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        max-replicas: The maximum number of replicas when create function app on container app.
        memory: 'Required momory from 1.0 to 4.0 ending with Gi e.g. 1.0Gi, '
        min-replicas: The minimum number of replicas when create function app on container app.
        name: Name of the function app.
        registry-password: The container registry server password.
        registry-server: The container registry server url.
        registry-username: The container registry server username.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: The name of the slot. Default to the productions slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workload-profile-name: The name of the workload profile to run the app on.
examples:
    Set a function app container's settings. (autogenerated): az functionapp config container set --docker-custom-image-name MyDockerCustomImage --docker-registry-server-password StrongPassword --docker-registry-server-url https://{azure-container-registry-name}.azurecr.io --docker-registry-server-user DockerUserId --name MyFunctionApp --resource-group MyResourceGroup
