# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows a security assessment.
flags:
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        name: Name of the resource to be fetched.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a security assessment metadata.: az security assessment-metadata show -n '4fb6c0a0-1137-42c7-a1c7-4bd37c91de8d'
