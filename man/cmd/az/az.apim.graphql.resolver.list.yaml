# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists a collection of Resolver.
flags:
    --api-id=!: API identifier.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    command: List a collection of the resolvers for the specified GraphQL API.
    flag:
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get list of resolvers of an API.: az apim graphql resolver list --service-name MyApim -g MyResourceGroup --api-id MyApi
