# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a GitHub Actions workflow file to the specified repository.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --login-with-github=: Interactively log in with GitHub to retrieve the Personal Access Token
    --repo=!: The GitHub repository to which the workflow file will be added.
    --subscription=: Name or ID of subscription.
    --token=: A Personal Access Token with write access to the specified repository.
    -b, --branch=: The branch to which the workflow file will be added.
    -f, --force=: When true, the command will overwrite any workflow file with a conflicting name.
    -g, --resource-group=: Name of resource group.
    -n, --name=: name of the web app.
    -r, --runtime=: Canonicalized web runtime in the format of Framework|Version, e.g. "PHP|5.6".
    -s, --slot=: The name of the slot.
documentation:
    command: Add a GitHub Actions workflow file to the specified repository. The workflow will build and deploy your app to the specified webapp.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        branch: |-
            The branch to which the workflow file will be added. Defaults to "master" if not specified.

            Default value: master
        change-reference: The related change reference ID for this resource operation.
        force: |-
            When true, the command will overwrite any workflow file with a conflicting name.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        login-with-github: |-
            Interactively log in with GitHub to retrieve the Personal Access Token.

            Default value: False
        name: Name of the web app. If left unspecified, a name will be randomly generated. You can configure the default using ``` az configure --defaults web=<name> ``` .
        repo: 'The GitHub repository to which the workflow file will be added. In the format: ``` <owner>/<repository-name> ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        runtime: Canonicalized web runtime in the format of Framework|Version, e.g. "PHP|5.6". Use "az webapp list-runtimes" for available list.
        slot: The name of the slot. Default to the production slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        token: 'A Personal Access Token with write access to the specified repository. For more information: https://help.github.com/en/github/authenticating-to-github/creating-a-personal-access-token-for-the-command-line .'
examples:
    Add GitHub Actions to a specified repository, providing personal access token: az webapp deployment github-actions add --repo "githubUser/githubRepo" -g MyResourceGroup -n MyWebapp --token MyPersonalAccessToken
    Add GitHub Actions to a specified repository, using interactive method of retrieving personal access token: az webapp deployment github-actions add --repo "githubUser/githubRepo" -g MyResourceGroup -n MyWebapp --login-with-github
