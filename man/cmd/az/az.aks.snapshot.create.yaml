# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a nodepool snapshot.
flags:
    --aks-custom-headers=: Send custom headers.
    --no-wait=: Do not wait for the long-running operation to finish.
    --nodepool-id=!: The nodepool id.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The nodepool snapshot name.
documentation:
    command: Create a snapshot of a cluster.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        aks-custom-headers: Send custom headers. When specified, format should be Key1=Value1,Key2=Value2.
        change-reference: The related change reference ID for this resource operation.
        cluster-id: The source cluster id from which to create this snapshot.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Name of the managed cluster.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a cluster snapshot with custom tags.: az aks snapshot create -g MyResourceGroup -n snapshot1 --cluster-id "/subscriptions/00000/resourceGroups/AnotherResourceGroup/providers/Microsoft.ContainerService/managedClusters/akscluster1" --tags "foo=bar" "key1=val1"
    Create a cluster snapshot.: az aks snapshot create -g MyResourceGroup -n snapshot1 --cluster-id "/subscriptions/00000/resourceGroups/AnotherResourceGroup/providers/Microsoft.ContainerService/managedClusters/akscluster1"
