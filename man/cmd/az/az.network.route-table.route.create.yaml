# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a route in a route table.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --address-prefix=: The destination CIDR to which the route applies.
    --next-hop-ip-address=: The IP address packets should be forwarded to when using the VirtualAppliance hop type.
    --next-hop-type=: The type of Azure hop the packet should be sent to.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --route-table-name=!: Route table name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Route name.
completion:
    flag:
        next-hop-type:
            - Internet
            - None
            - VirtualAppliance
            - VirtualNetworkGateway
            - VnetLocal
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
