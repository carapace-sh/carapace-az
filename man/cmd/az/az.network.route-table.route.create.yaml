# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a route in a route table.
flags:
    --address-prefix=: The destination CIDR to which the route applies.
    --next-hop-ip-address=: The IP address packets should be forwarded to when using the VirtualAppliance hop type.
    --next-hop-type=: The type of Azure hop the packet should be sent to.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --route-table-name=!: Route table name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Route name.
completion:
    flag:
        next-hop-type:
            - Internet
            - None
            - VirtualAppliance
            - VirtualNetworkGateway
            - VnetLocal
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        address-prefix: The destination CIDR to which the route applies.
        change-reference: The related change reference ID for this resource operation.
        name: Route name.
        next-hop-ip-address: The IP address packets should be forwarded to when using the VirtualAppliance hop type.
        next-hop-type: |-
            The type of Azure hop the packet should be sent to.

            Accepted values: Internet, None, VirtualAppliance, VirtualNetworkGateway, VnetLocal
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        route-table-name: Route table name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a route that forces all inbound traffic to a Network Virtual Appliance.: az network route-table route create -g MyResourceGroup --route-table-name MyRouteTable -n MyRoute --next-hop-type VirtualAppliance --address-prefix 10.0.0.0/16 --next-hop-ip-address 10.0.100.4
