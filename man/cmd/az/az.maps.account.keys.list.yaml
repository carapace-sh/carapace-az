# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Get the keys to use with the Maps APIs.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Resource group name
    -n, --name=!: The name of the maps account
documentation:
    command: Get the keys to use with the Maps APIs. A key is used to authenticate and authorize access to the Maps REST APIs. Only one key is needed at a time; two are given to provide seamless key regeneration.
    flag:
        resource-group: Resource group name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List Keys: az maps account keys list --name "myMapsAccount" --resource-group "myResourceGroup"
