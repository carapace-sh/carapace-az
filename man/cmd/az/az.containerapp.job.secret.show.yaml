# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show details of a secret.
flags:
    --secret-name=!: The name of the secret to show.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the container app job for which the secret needs to be retrieved.
documentation:
    flag:
        name: The name of the container app job for which the secret needs to be retrieved.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        secret-name: The name of the secret to show.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the details of a secret.: az containerapp job secret show -n my-containerapp-job -g MyResourceGroup --secret-name MySecret
