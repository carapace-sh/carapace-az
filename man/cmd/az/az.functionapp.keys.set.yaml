# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Create or update a function app key.
flags:
    --key-name=!: Name of the key to set.
    --key-type=!: Type of key.
    --key-value=: Value of the new key.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the function app
    -s, --slot=: The name of the slot.
completion:
    flag:
        key-type:
            - systemKeys
            - functionKeys
            - masterKey
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        key-name: Name of the key to set.
        key-type: |-
            Type of key.

            Accepted values: functionKeys, masterKey, systemKeys
        key-value: Value of the new key. If not provided, a value will be generated.
        name: Name of the function app.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: The name of the slot. Defaults to the productions slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a function key for an Azure Function app.: az functionapp keys set -g MyResourceGroup -n MyFunctionAppName --key-type functionKeys --key-name MyKeyName --key-value MyKeyValue
