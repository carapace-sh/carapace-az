# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Set the VPN client connection ipsec policy per P2S client connection of the virtual network gateway.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --dh-group=!: The DH Groups used for initial SA.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ike-encryption=!: The IKE encryption algorithm.
    --ike-integrity=!: The IKE integrity algorithm.
    --ipsec-encryption=!: The IPSec encryption algorithm.
    --ipsec-integrity=!: The IPSec integrity algorithm.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --pfs-group=!: The Pfs Groups used for new child SA.
    --sa-lifetime=!: The lifetime in seconds for P2S client.
    --sa-max-size=!: The payload size in KB for P2S client.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the VNet gateway.
completion:
    flag:
        dh-group:
            - DHGroup1
            - DHGroup14
            - DHGroup2
            - DHGroup2048
            - DHGroup24
            - ECP256
            - ECP384
            - None
        ike-encryption:
            - AES128
            - AES192
            - AES256
            - DES
            - DES3
            - GCMAES128
            - GCMAES256
        ike-integrity:
            - GCMAES128
            - GCMAES256
            - MD5
            - SHA1
            - SHA256
            - SHA384
        ipsec-encryption:
            - AES128
            - AES192
            - AES256
            - DES
            - DES3
            - GCMAES128
            - GCMAES192
            - GCMAES256
            - None
        ipsec-integrity:
            - GCMAES128
            - GCMAES192
            - GCMAES256
            - MD5
            - SHA1
            - SHA256
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        pfs-group:
            - ECP256
            - ECP384
            - None
            - PFS1
            - PFS14
            - PFS2
            - PFS2048
            - PFS24
            - PFSMM
