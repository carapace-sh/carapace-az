# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Set the VPN client connection ipsec policy per P2S client connection of the virtual network gateway.
flags:
    --dh-group=!: The DH Groups used for initial SA.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ike-encryption=!: The IKE encryption algorithm.
    --ike-integrity=!: The IKE integrity algorithm.
    --ipsec-encryption=!: The IPSec encryption algorithm.
    --ipsec-integrity=!: The IPSec integrity algorithm.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --pfs-group=!: The Pfs Groups used for new child SA.
    --sa-lifetime=!: The lifetime in seconds for P2S client.
    --sa-max-size=!: The payload size in KB for P2S client.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the VNet gateway.
completion:
    flag:
        dh-group:
            - DHGroup1
            - DHGroup14
            - DHGroup2
            - DHGroup2048
            - DHGroup24
            - ECP256
            - ECP384
            - None
        ike-encryption:
            - AES128
            - AES192
            - AES256
            - DES
            - DES3
            - GCMAES128
            - GCMAES256
        ike-integrity:
            - GCMAES128
            - GCMAES256
            - MD5
            - SHA1
            - SHA256
            - SHA384
        ipsec-encryption:
            - AES128
            - AES192
            - AES256
            - DES
            - DES3
            - GCMAES128
            - GCMAES192
            - GCMAES256
            - None
        ipsec-integrity:
            - GCMAES128
            - GCMAES192
            - GCMAES256
            - MD5
            - SHA1
            - SHA256
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        pfs-group:
            - ECP256
            - ECP384
            - None
            - PFS1
            - PFS14
            - PFS2
            - PFS2048
            - PFS24
            - PFSMM
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        dh-group: |-
            The DH Groups used for initial SA.

            Accepted values: DHGroup1, DHGroup14, DHGroup2, DHGroup2048, DHGroup24, ECP256, ECP384, None
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        ike-encryption: |-
            The IKE encryption algorithm.

            Accepted values: AES128, AES192, AES256, DES, DES3, GCMAES128, GCMAES256
        ike-integrity: |-
            The IKE integrity algorithm.

            Accepted values: GCMAES128, GCMAES256, MD5, SHA1, SHA256, SHA384
        ipsec-encryption: |-
            The IPSec encryption algorithm.

            Accepted values: AES128, AES192, AES256, DES, DES3, GCMAES128, GCMAES192, GCMAES256, None
        ipsec-integrity: |-
            The IPSec integrity algorithm.

            Accepted values: GCMAES128, GCMAES192, GCMAES256, MD5, SHA1, SHA256
        name: Name of the VNet gateway.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        pfs-group: |-
            The Pfs Groups used for new child SA.

            Accepted values: ECP256, ECP384, None, PFS1, PFS14, PFS2, PFS2048, PFS24, PFSMM
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sa-lifetime: The lifetime in seconds for P2S client.
        sa-max-size: The payload size in KB for P2S client.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Set the VPN client connection ipsec policy per P2S client connection of the virtual network gateway.: az network vnet-gateway vpn-client ipsec-policy set -g MyResourceGroup -n MyVnetGateway --dh-group DHGroup14 --ike-encryption AES256 --ike-integrity SHA384 --ipsec-encryption DES3 --ipsec-integrity GCMAES256 --pfs-group PFS2048 --sa-lifetime 27000 --sa-max-size 102400000
