# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the properties of a billing account.
flags:
    --billing-profiles-value=: The billing profiles associated with the billing account.
    --departments=: The departments associated to the enrollment.
    --display-name=: The billing account name.
    --enrollment-accounts=: The accounts associated to the enrollment.
    --no-wait=: Do not wait for the long-running operation to finish.
    --sold-to=:
        description: The address of the individual or organization that is responsible for the billing account.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies a billing account.
documentation:
    command: |-
        Command group 'billing account' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        billing-profiles-value: 'The billing profiles associated with the billing account. Expected value: json-string/@json-file.'
        change-reference: The related change reference ID for this resource operation.
        departments: 'The departments associated to the enrollment. Expected value: json-string/@json-file.'
        display-name: The billing account name.
        enrollment-accounts: 'The accounts associated to the enrollment. Expected value: json-string/@json-file.'
        name: The ID that uniquely identifies a billing account.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        sold-to: 'The address of the individual or organization that is responsible for the billing account. Usage: --sold-to first-name=XX last-name=XX company-name=XX address-line1=XX address-line2=XX address-line3=XX city=XX district=XX region=XX country=XX postal-code=XX email=XX phone-number=XX.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a billing account: az billing account update --name "{billingAccountName}" --display-name "Test Account" --sold-to address-line1="Test Address 1" city="Redmond" company-name="Contoso" country="US" first-name="Test" last-name="User" postal-code="12345" region="WA"
