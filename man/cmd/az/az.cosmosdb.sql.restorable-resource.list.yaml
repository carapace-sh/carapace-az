# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Return a list of database and container combo that exist on the account at the given timestamp and location.
flags:
    --subscription=: Name or ID of subscription.
    -i, --instance-id=!: InstanceId of the Account
    -l, --location=!: Azure Location of the account
    -r, --restore-location=!: The region of the restore.
    -t, --restore-timestamp=!: The timestamp of the restore
documentation:
    command: List all the databases and its containers that can be restored in the given account at the given timesamp and region.
    flag:
        instance-id: InstanceId of the Account.
        location: Azure Location of the account.
        restore-location: The region of the restore.
        restore-timestamp: The timestamp of the restore.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
