# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Delete blobs or files from Azure Storage.
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --auth-mode=: The mode in which to run the command.
    --connection-string=: Storage account connection string.
    --exclude-path=: Exclude these paths.
    --exclude-pattern=: Exclude these files where the name matches the pattern list.
    --include-path=: Include only these paths.
    --include-pattern=: Include only these files where the name matches the pattern list.
    --sas-token=: A Shared Access Signature (SAS).
    --subscription=: Name or ID of subscription.
    -c, --container-name=: The container name.
    -n, --name=: The blob name.
    -p, --path=: The path to the file within the file share.
    -r, --recursive=: Look into sub-directories recursively.
    -s, --share-name=: The file share name.
completion:
    flag:
        auth-mode:
            - login
            - key
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY.'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auth-mode: |-
            The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE.

            Accepted values: key, login
        change-reference: The related change reference ID for this resource operation.
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING.'
        container-name: The container name.
        exclude-path: 'Exclude these paths. This option does not support wildcard characters (*). Checks relative path prefix. For example: myFolder;myFolder/subDirName/file.pdf.'
        exclude-pattern: 'Exclude these files where the name matches the pattern list. For example: *.jpg;*.pdf;exactName. This option supports wildcard characters (*)'
        include-path: Include only these paths. This option does not support wildcard characters (*). Checks relative path prefix. For example:myFolder;myFolder/subDirName/file.pdf.
        include-pattern: 'Include only these files where the name matches the pattern list. For example: *.jpg;*.pdf;exactName. This option supports wildcard characters (*)'
        name: The blob name.
        path: The path to the file within the file share.
        recursive: Look into sub-directories recursively.
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_SAS_TOKEN.'
        service-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with ``` az storage account show ``` . Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT.'
        share-name: The file share name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Remove a single blob.: az storage remove -c mycontainer -n MyBlob
    Remove a single file.: az storage remove -s MyShare -p MyFile
    ? Remove a subset of blobs in a virtual directory (For example, only jpg and pdf files, or if the blob name is "exactName" and file names don't start with "test").
    : az storage remove -c mycontainer --include-path path/to/directory --include-pattern "*.jpg;*.pdf;exactName" --exclude-pattern "test*" --recursive
    Remove all the blobs in a Storage Container.: az storage remove -c mycontainer -n path/to/directory
    Remove all the files in a Storage File Share.: az storage remove -s MyShare --recursive
    Remove an entire directory.: az storage remove -s MyShare -p path/to/directory --recursive
    ? Remove an entire virtual directory but exclude certain blobs from the scope (For example, every blob that starts with foo or ends with bar).
    : az storage remove -c mycontainer --include-path path/to/directory --exclude-pattern "foo*;*bar" --recursive
    Remove an entire virtual directory.: az storage remove -c mycontainer -n path/to/directory --recursive
    Remove only the top blobs inside a virtual directory but not its sub-directories.: az storage remove -c mycontainer --recursive
