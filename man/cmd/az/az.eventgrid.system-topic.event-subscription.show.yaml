# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of an event subscription of a system topic.
documentation:
    flag:
        include-full-endpoint-url: Specify to indicate whether the full endpoint URL should be returned. True if flag present.
        include-static-delivery-attribute-secret: Indicate whether any static delivery attribute secrets should be returned. True if flag present.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --include-full-endpoint-url=:
        description: Specify to indicate whether the full endpoint URL should be returned.
        nargs: -1
    --include-static-delivery-attribute-secret=:
        description: Indicate whether any static delivery attribute secrets should be returned.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --system-topic-name=!: Name of the system topic.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the event subscription.
completion:
    flag:
        include-full-endpoint-url:
            - "true"
            - "false"
        include-static-delivery-attribute-secret:
            - "true"
            - "false"
