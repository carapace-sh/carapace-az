# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: assign
description: assign managed identity to the static web app
flags:
    --identities=:
        description: Space-separated identities to assign.
        nargs: -1
    --role=: Role name or id the managed identity will be assigned
    --scope=: The scope the managed identity has access to
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the static site
documentation:
    command: Assign managed identity to the static web app.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        identities: 'Space-separated identities to assign. Use ''[system]'' to refer to the system assigned identity. Default: ''[system]''.'
        name: Name of the static site.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        role: |-
            Role name or id the managed identity will be assigned.

            Default value: Contributor
        scope: The scope the managed identity has access to.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    assign local identity and a user assigned identity to a static web app.: az staticwebapp identity assign -g MyResourceGroup -n MyUniqueApp --identities [system] myAssignedId
    assign local identity and assign a reader role to the current resource group.: az staticwebapp identity assign -g MyResourceGroup -n MyUniqueApp --role reader --scope /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourcegroups/MyResourceGroup
    enable identity for the web app.: az staticwebapp identity assign -g MyResourceGroup -n MyUniqueApp
