# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the private link resources supported for a Key Vault/HSM.
flags:
    --hsm-name=: Name of the HSM.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Vault.
    -g, --resource-group=: Proceed only if Key Vault belongs to the specified resource group.
documentation:
    flag:
        hsm-name: Name of the HSM. (--hsm-name and --name/-n are mutually exclusive, please specify just one of them).
        resource-group: Name of resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Vault.
examples:
    Get the private link resources that need to be created for a HSM.: az keyvault private-link-resource list --hsm-name myhsm
    Get the private link resources that need to be created for a Key Vault.: az keyvault private-link-resource list --vault-name mykv
