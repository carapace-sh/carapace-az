# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a network interface.
documentation:
    flag:
        app-gateway-address-pools: Space-separated list of names or IDs of application gateway backend address pools to associate with the NIC. If names are used, `--gateway-name` must be specified.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        application-security-groups: Space-separated list of application security groups.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        dns-servers: Space-separated list of DNS server IP addresses.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        lb-address-pools: Space-separated list of names or IDs of load balancer address pools to associate with the NIC. If names are used, `--lb-name` must be specified.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        lb-inbound-nat-rules: Space-separated list of names or IDs of load balancer inbound NAT rules to associate with the NIC. If names are used, `--lb-name` must be specified.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subnet: Name or ID of an existing subnet. If name specified, please also specify `--vnet-name`; If you want to use an existing subnet in other resource group, please provide the ID instead of the name of the subnet.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
flags:
    --accelerated-networking=:
        description: Whether to enable accelerated networking.
        nargs: -1
    --app-gateway-address-pools=:
        description: Space-separated list of names or IDs of application gateway backend address pools to associate with the NIC.
        nargs: -1
    --application-security-groups=:
        description: Space-separated list of application security groups.
        nargs: -1
    --auxiliary-mode=: Auxiliary mode of Network Interface resource.
    --auxiliary-sku=: Auxiliary sku of Network Interface resource.
    --dns-servers=:
        description: Space-separated list of DNS server IP addresses.
        nargs: -1
    --edge-zone=: Name of edge zone.
    --gateway-name=: Name of the application gateway.
    --internal-dns-name=: Name of internal DNS label.
    --ip-forwarding=:
        description: Whether to enable IP forwarding.
        nargs: -1
    --lb-address-pools=:
        description: Space-separated list of names or IDs of load balancer address pools to associate with the NIC.
        nargs: -1
    --lb-inbound-nat-rules=:
        description: Space-separated list of names or IDs of load balancer inbound NAT rules to associate with the NIC.
        nargs: -1
    --lb-name=: Name of the load balancer
    --network-security-group=: Name or ID of an existing network security group
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --private-ip-address-version=: Version of private IP address to use.
    --private-ip-address=: Static private IP address to use.
    --public-ip-address=: Name or ID of an existing public IP address.
    --subnet=!: Name or ID of an existing subnet.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vnet-name=: Name of the virtual network.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the network interface (NIC).
completion:
    flag:
        accelerated-networking:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        auxiliary-mode:
            - AcceleratedConnections
            - Floating
            - MaxConnections
            - None
        auxiliary-sku:
            - A1
            - A2
            - A4
            - A8
            - None
        ip-forwarding:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        private-ip-address-version:
            - IPv4
            - IPv6
