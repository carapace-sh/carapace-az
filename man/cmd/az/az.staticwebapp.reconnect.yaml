# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reconnect
description: Connect to a repo and branch following a disconnect command.
flags:
    --login-with-github=: Interactively log in with Github to retrieve the Personal Access Token
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -b, --branch=!: The target branch in the repository.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name of the static site
    -s, --source=!: URL for the repository of the static site.
    -t, --token=: A user's GitHub or Azure Dev Ops repository token.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        branch: The target branch in the repository.
        change-reference: The related change reference ID for this resource operation.
        login-with-github: |-
            Interactively log in with Github to retrieve the Personal Access Token.

            Default value: False
        name: Name of the static site.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source: URL for the repository of the static site.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        token: A user's GitHub or Azure Dev Ops repository token. This is used to create the Github Action or Dev Ops pipeline.
examples:
    Connect a repo and branch to static app, retrieving token interactively: az staticwebapp reconnect -n MyStaticAppName --source MyGitHubRepo -b master --login-with-github
    Connect a repo and branch to static app.: az staticwebapp reconnect -n MyStaticAppName --source MyGitHubRepo -b master --token MyAccessToken
