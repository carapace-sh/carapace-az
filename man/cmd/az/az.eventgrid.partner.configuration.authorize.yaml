# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: authorize
description: Authorize a partner configuration.
documentation:
    flag:
        authorization-expiration-date: Date or datetime in UTC ISO 8601 format (e.g., '2022-02-17T01:59:59+00:00' or '2022-02-17') which is the expiration time of the partner authorization. If this timer expires, any request from this partner to create, update or delete resources in subscriber's context will fail. If specified, the allowed values are between 1 to the value of defaultMaximumExpirationTimeInDays specified in PartnerConfiguration. If not specified, the default value will be the value of defaultMaximumExpirationTimeInDays specified in PartnerConfiguration or 7 if this value is not specified.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --authorization-expiration-date=: Date or datetime in UTC ISO 8601 format (e.g., '2022-02-17T01:59:59+00:00' or '2022-02-17') which is the expiration time of the partner authorization.
    --partner-name=: Official name of the partner.
    --partner-registration-immutable-id=: The immutable ID of the corresponding partner registration.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
