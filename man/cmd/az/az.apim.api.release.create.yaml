# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a new Release for the API.
flags:
    --api-id=!: API identifier.
    --api-revision=!: API revision number.
    --if-match=: ETag of the Entity.
    --notes=: Release Notes.
    --release-id=: Release identifier within an API.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        api-revision: API revision number.
        change-reference: The related change reference ID for this resource operation.
        if-match: ETag of the Entity.
        notes: Release Notes.
        release-id: Release identifier within an API. Must be unique in the current API Management service instance.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Creates a new Release for the API.: az apim api release create --resource-group MyResourceGroup --service-name MyServiceName --api-id MyApiId --release-id MyReleaseId --api-revision 2 --notes MyNotes
