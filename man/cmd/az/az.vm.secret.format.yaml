# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: format
description: Transform secrets into a form that can be used by VMs and VMSSes.
documentation:
    flag:
        certificate-store: 'Windows certificate store names. Default: My'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        secrets: Space-separated list of key vault secret URIs. Perhaps, produced by 'az keyvault secret list-versions --vault-name vaultname -n cert1 --query "[?attributes.enabled].id" -o tsv'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --certificate-store=: Windows certificate store names.
    --keyvault=: Name or ID of the key vault.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -s, --secrets=!:
        description: Space-separated list of key vault secret URIs.
        nargs: -1
