# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: format
description: Transform secrets into a form that can be used by VMs and VMSSes.
flags:
    --certificate-store=: Windows certificate store names.
    --keyvault=: Name or ID of the key vault.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -s, --secrets=!:
        description: Space-separated list of key vault secret URIs.
        nargs: -1
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        certificate-store: 'Windows certificate store names. Default: My.'
        change-reference: The related change reference ID for this resource operation.
        keyvault: Name or ID of the key vault.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        secrets: 'Space-separated list of key vault secret URIs. Perhaps, produced by ''az keyvault secret list-versions --vault-name vaultname -n cert1 --query "[?attributes.enabled].id" -o tsv''. The command will attempt to resolve the vault ID for each secret. If it is unable to do so, specify the vault ID to use for all secrets using: --keyvault NAME --resource-group NAME | --keyvault ID.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a self-signed certificate with the default policy, and add it to a virtual machine.: |-
        az keyvault certificate create --vault-name vaultname -n cert1 \
          -p "$(az keyvault certificate get-default-policy)"
        secrets=$(az keyvault secret list-versions --vault-name vaultname \
          -n cert1 --query "[?attributes.enabled].id" -o tsv)
        vm_secrets=$(az vm secret format -s "$secrets")
        az vm create -g group-name -n vm-name --admin-username deploy  \
          --image Debian11 --secrets "$vm_secrets"
