# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: backup
description: Backs up the specified certificate.
flags:
    --id=: Id of the certificate.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Key Vault.
    -f, --file=!: Local file path in which to store certificate backup.
    -n, --name=: Name of the certificate.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        file: Local file path in which to store certificate backup.
        id: Id of the certificate. If specified all other 'Id' arguments should be omitted.
        name: Name of the certificate. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Key Vault. Required if --id is not specified.
