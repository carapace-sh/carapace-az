# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List available partner event-channels.
documentation:
    flag:
        odata-query: 'The OData query used for filtering the list results. Filtering is currently allowed on the Name property only. The supported operations include: CONTAINS, eq (for equal), ne (for not equal), AND, OR and NOT.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --odata-query=: The OData query used for filtering the list results.
    --partner-namespace-name=!: Name of the partner namespace.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
