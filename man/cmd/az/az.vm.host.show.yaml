# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of a dedicated host.
flags:
    --expand=: The expand expression to apply on the operation.
    --host-group=: The name of the dedicated host group.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the dedicated host.
completion:
    flag:
        expand:
            - instanceView
            - userData
documentation:
    flag:
        expand: |-
            The expand expression to apply on the operation. 'InstanceView' will retrieve the list of instance views of the dedicated host. 'UserData' is not supported for dedicated host.

            Accepted values: instanceView, resiliencyView, userData
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get the details of a dedicated host.: az vm host show --host-group MyHostGroup --name MyDedicatedHost --resource-group MyResourceGroup
