# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove-record
description: Remove a CAA record from its record set.
flags:
    --flags=!: Integer flags for the record.
    --keep-empty-record-set=: Keep the empty record set if the last record is removed.
    --subscription=: Name or ID of subscription.
    --tag=!: Record tag
    --value=!: Value of the CAA record.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -z, --zone-name=!: The name of the zone.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        flags: Integer flags for the record.
        keep-empty-record-set: |-
            Keep the empty record set if the last record is removed.

            Default value: False
        record-set-name: The name of the record set relative to the zone.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tag: Record tag.
        value: Value of the CAA record.
        zone-name: The name of the zone.
examples:
    Remove a CAA record from its record set.: |-
        az network dns record-set caa remove-record -g MyResourceGroup -z www.mysite.com \
            -n MyRecordSet --flags 0 --tag "issue" --value "ca.contoso.com"
