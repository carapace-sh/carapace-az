# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all Spark statements
flags:
    --session-id=!: The id of Spark session.
    --spark-pool-name=!: The name of the Spark pool.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The name of the workspace.
documentation:
    command: List all Spark statements.
    flag:
        session-id: The id of Spark session.
        spark-pool-name: The name of the Spark pool.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The name of the workspace.
examples:
    List all Spark statements.: |-
        az synapse spark statement list --session-id 11 --workspace-name testsynapseworkspace \
        --spark-pool-name testsparkpool
