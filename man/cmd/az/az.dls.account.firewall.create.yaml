# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a firewall rule in a Data Lake Store account.
flags:
    --end-ip-address=!: The end of the valid ip range for the firewall rule.
    --firewall-rule-name=!: The name of the firewall rule.
    --start-ip-address=!: The start of the valid ip range for the firewall rule.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
    -n, --account=!: Name of the Data Lake Store account.
documentation:
    command: |-
        Command group 'dls' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account: Name of the Data Lake Store account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        end-ip-address: The end of the valid ip range for the firewall rule.
        firewall-rule-name: The name of the firewall rule.
        resource-group: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
        start-ip-address: The start of the valid ip range for the firewall rule.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Creates a firewall rule in a Data Lake Store account.: az dls account firewall create -g rg -n myaccount --firewall-rule-name rule --start-ip-address 127.0.0.1 --end-ip-address 127.0.0.2
