# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: renew
description: Regenerate one of the access keys or Kerberos keys (if active directory enabled) for a storage account.
documentation:
    flag:
        key-type: The key type to regenerate. If --key-type is not specified, one of access keys will be regenerated by default.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --key-type=: The key type to regenerate.
    --key=!: The key options to regenerate.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
completion:
    flag:
        key:
            - primary
            - secondary
            - key1
            - key2
        key-type:
            - kerb
