# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: renew
description: Regenerate one of the access keys or Kerberos keys (if active directory enabled) for a storage account.
flags:
    --key-type=: The key type to regenerate.
    --key=!: The key options to regenerate.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
completion:
    flag:
        key:
            - primary
            - secondary
            - key1
            - key2
        key-type:
            - kerb
documentation:
    flag:
        account-name: The storage account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        key: |-
            The key options to regenerate.

            Accepted values: key1, key2, primary, secondary
        key-type: |-
            The key type to regenerate. If --key-type is not specified, one of access keys will be regenerated by default.

            Accepted values: kerb
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Regenerate one of the Kerberos keys for a storage account.: az storage account keys renew -g MyResourceGroup -n MyStorageAccount --key secondary --key-type kerb
    Regenerate one of the access keys for a storage account.: az storage account keys renew -g MyResourceGroup -n MyStorageAccount --key primary
