# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: peer-external-cluster
description: Starts peering the external cluster for this migration volume
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --peer-ip-addresses=!:
        description: A list of IC-LIF IPs that can be used to connect to the On-prem cluster  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -a, --account-name=: The name of the NetApp account
    -g, --resource-group=: Name of resource group.
    -n, --volume-name=: The name of the volume
    -p, --pool-name=: The name of the capacity pool
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Starts peering the external cluster for this migration volume.
    flag:
        account-name: The name of the NetApp account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        peer-ip-addresses: A list of IC-LIF IPs that can be used to connect to the On-prem cluster  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        pool-name: The name of the capacity pool.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Volumes_PeerExternalCluster: az netappfiles volume replication peer-external-cluster --resource-group myRG --account-name account1 --pool-name pool1 --volume-name volume1 --peer-ip-addresses "[0.0.0.1,0.0.0.2,0.0.0.3,0.0.0.4,0.0.0.5,0.0.0.6]"
