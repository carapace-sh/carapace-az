# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete the specified Azure file share or share snapshot.
documentation:
    flag:
        account-name: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        include: 'Optional. Valid values are: snapshots, leased-snapshots, none. The default value is none. For ''snapshots'', the file share is deleted including all of its file share snapshots. If the file share contains leased-snapshots, the deletion fails. For ''leased-snapshots'', the file share is deleted included all of its file share snapshots (leased/unleased). For ''none'', the file share is deleted if it has no share snapshots. If the file share contains any snapshots (leased or unleased), the deletion fails.'
        name: The name of the file share within the specified storage account. File share names must be between 3 and 63 characters in length and use numbers, lower-case letters and dash (-) only. Every dash (-) character must be immediately preceded and followed by a letter or number.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-name=: The name of the storage account within the specified resource group.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --include=: Optional.
    --snapshot=: Optional, used to delete a snapshot.The DateTime value that specifies the share snapshot to retrieve.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the file share within the specified storage account.
    -y, --yes=: Do not prompt for confirmation.
