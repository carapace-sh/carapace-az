# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Create/update secrets.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        secrets: A list of secret(s) for the container app job. Space-separated values in 'key=value' or 'key=keyvaultref:keyvaulturl,identityref:identity' format (where 'key' cannot be longer than 20 characters).
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the container app job for which the secret needs to be retrieved.
    -s, --secrets=!:
        description: A list of secret(s) for the container app job.
        nargs: -1
