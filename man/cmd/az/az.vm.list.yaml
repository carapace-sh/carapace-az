# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List details of Virtual Machines.
flags:
    --subscription=: Name or ID of subscription.
    --vmss=: List VM instances in a specific VMSS.
    -d, --show-details=: show public ip address, FQDN, and power states.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        show-details: |-
            Show public ip address, FQDN, and power states. command will run slow.

            Default value: False
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vmss: List VM instances in a specific VMSS. Please specify the VMSS id or VMSS name.
examples:
    List all VMs by resource group with details.: az vm list -g MyResourceGroup -d
    List all VMs by resource group.: az vm list -g MyResourceGroup
    List all VMs.: az vm list
