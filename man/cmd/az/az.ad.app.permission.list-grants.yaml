# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-grants
description: List Oauth2 permission grants
flags:
    --filter=: OData filter, e.g. --filter "displayname eq 'test' and servicePrincipalType eq 'Application'"
    --id=: identifier uri, application id, or object id
    -r, --show-resource-name=:
        description: show resource's display name
        nargs: -1
completion:
    flag:
        show-resource-name:
            - "true"
            - "false"
documentation:
    command: List Oauth2 permission grants.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        filter: OData filter, e.g. --filter "displayname eq 'test' and servicePrincipalType eq 'Application'".
        id: Identifier uri, application id, or object id.
        show-resource-name: |-
            Show resource's display name.

            Accepted values: false, true
examples:
    list oauth2 permissions granted to the service principal: az ad app permission list-grants --id e042ec79-34cd-498f-9d9f-1234234123456
