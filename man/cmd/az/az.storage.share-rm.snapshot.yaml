# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: snapshot
description: Create a snapshot of an existing share under the specified account.
flags:
    --access-tier=: Access tier for specific share.
    --enabled-protocols=: Immutable property for file shares protocol.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --metadata=:
        description: Metadata in space-separated key=value pairs that is associated with the share.
        nargs: -1
    --root-squash=: Reduction of the access rights for the remote superuser.
    --storage-account=: The name or ID of the storage account.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The file share name.
    -q, --quota=: The maximum size of the share in gigabytes.
completion:
    flag:
        access-tier:
            - TransactionOptimized
            - Hot
            - Cool
            - Premium
        enabled-protocols:
            - SMB
            - NFS
        root-squash:
            - NoRootSquash
            - RootSquash
            - AllSquash
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        access-tier: |-
            Access tier for specific share. GpV2 account can choose between TransactionOptimized (default), Hot, and Cool. FileStorage account can choose Premium.

            Accepted values: Cool, Hot, Premium, TransactionOptimized
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        enabled-protocols: |-
            Immutable property for file shares protocol. NFS protocol will be only available for premium file shares (file shares in the FileStorage account type).

            Accepted values: NFS, SMB
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        metadata: Metadata in space-separated key=value pairs that is associated with the share. This overwrites any existing metadata.
        name: The file share name.
        quota: The maximum size of the share in gigabytes. Must be greater than 0, and less than or equal to 5TB (5120). For Large File Shares, the maximum size is 102400.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        root-squash: |-
            Reduction of the access rights for the remote superuser.

            Accepted values: AllSquash, NoRootSquash, RootSquash
        storage-account: The name or ID of the storage account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a snapshot of an existing share under the specified account.: az storage share-rm snapshot -g MyResourceGroup --storage-account mystorageaccount --name myfileshare
