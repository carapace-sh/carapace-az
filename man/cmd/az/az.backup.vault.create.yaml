# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new Recovery Services vault or update an existing one.
flags:
    --classic-alerts=: Use this property to specify whether backup alerts from the classic solution should be received.
    --cross-subscription-restore-state=: Use this parameter to configure cross subscription restore settings for the vault.
    --immutability-state=: Use this parameter to configure immutability settings for the vault.
    --job-failure-alerts=: Use this property to specify whether built-in Azure Monitor alerts should be received for every job failure.
    --public-network-access=: Use this property to specify whether public network access for the vault should be enabled or disabled.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=!: Location.
    -n, --name=!: Name of the Recovery services vault.
completion:
    flag:
        classic-alerts:
            - Enable
            - Disable
        cross-subscription-restore-state:
            - Enable
            - Disable
            - PermanentlyDisable
        immutability-state:
            - Disabled
            - Locked
            - Unlocked
        job-failure-alerts:
            - Enable
            - Disable
        public-network-access:
            - Enable
            - Disable
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        classic-alerts: |-
            Use this property to specify whether backup alerts from the classic solution should be received.

            Accepted values: Disable, Enable
        cross-subscription-restore-state: |-
            Use this parameter to configure cross subscription restore settings for the vault. By default, the property is "Enabled" for the vault.

            Accepted values: Disable, Enable, PermanentlyDisable
        immutability-state: |-
            Use this parameter to configure immutability settings for the vault. By default, immutability is "Disabled" for the vault. "Unlocked" means that immutability is enabled for the vault and can be reversed. "Locked" means that immutability is enabled for the vault and cannot be reversed.

            Accepted values: Disabled, Locked, Unlocked
        job-failure-alerts: |-
            Use this property to specify whether built-in Azure Monitor alerts should be received for every job failure.

            Accepted values: Disable, Enable
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Name of the Recovery services vault.
        public-network-access: |-
            Use this property to specify whether public network access for the vault should be enabled or disabled. It is enabled by default. For setting up private endpoints, it has to be disabled.

            Accepted values: Disable, Enable
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a new Recovery Services vault or update an existing one. (autogenerated): az backup vault create --location westus2 --name MyRecoveryServicesVault --resource-group MyResourceGroup
