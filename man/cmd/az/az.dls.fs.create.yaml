# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a file or folder in a Data Lake Store account.
documentation:
    flag:
        path: The path in the specified Data Lake Store account where the action should take place. In the format '/folder/file.txt', where the first '/' after the DNS indicates the root of the file system.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --content=: Content for the file to contain upon creation.
    --folder=: Indicates that this new item is a folder and not a file.
    --force=: Indicates that, if the file or folder exists, it should be overwritten
    --path=!: The path in the specified Data Lake Store account where the action should take place.
    --subscription=: Name or ID of subscription.
    -n, --account=!: Name of the Data Lake Store account.
