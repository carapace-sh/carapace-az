# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the restore point collection.
flags:
    --collection-name=!: The name of the restore point collection.
    --expand=: The expand expression to apply on the operation.
    --restore-points=: Show all contained restore points in the restore point collection.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        collection-name: The name of the restore point collection.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restore-points: Show all contained restore points in the restore point collection.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a restore point collection (but not the restore points contained in the restore point collection): az restore-point collection show --resource-group "myResourceGroup" --collection-name "myRpc"
    Get a restore point collection, including the restore points contained in the restore point collection: az restore-point collection show --resource-group "myResourceGroup" --collection-name "rpcName"
