# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an order.
flags:
    --address-line1=!: The address line1.
    --address-line2=: The address line2.
    --address-line3=: The address line3.
    --city=!: The city name.
    --comments=: Comments related to this status change.
    --company-name=!: The name of the company.
    --contact-person=!: The contact person name.
    --country=!: The country name.
    --email-list=!:
        description: The email list.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --phone=!: The phone number.
    --postal-code=!: The postal code.
    --state=!: The state name.
    --status=!: Status of the order as per the allowed status types.
    --subscription=: Name or ID of subscription.
    -d, --device-name=!: The order details of a device.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        status:
            - Untracked
            - AwaitingFulfilment
            - AwaitingPreparation
            - AwaitingShipment
            - Shipped
            - Arriving
            - Delivered
            - ReplacementRequested
            - LostDevice
            - Declined
            - ReturnInitiated
            - AwaitingReturnShipment
            - ShippedBack
            - CollectedAtMicrosoft
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        address-line1: The address line1.
        address-line2: The address line2.
        address-line3: The address line3.
        change-reference: The related change reference ID for this resource operation.
        city: The city name.
        comments: Comments related to this status change.
        company-name: The name of the company.
        contact-person: The contact person name.
        country: The country name.
        device-name: The order details of a device.
        email-list: The email list.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        phone: The phone number.
        postal-code: The postal code.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        state: The state name.
        status: |-
            Status of the order as per the allowed status types.

            Accepted values: Arriving, AwaitingDrop, AwaitingFulfillment, AwaitingPickup, AwaitingPreparation, AwaitingReturnShipment, AwaitingShipment, CollectedAtMicrosoft, Declined, Delivered, LostDevice, PickupCompleted, ReplacementRequested, ReturnInitiated, Shipped, ShippedBack, Untracked
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create an order.: az databoxedge order create --device-name testedgedevice --contact-person John Mcclane --company-name Microsoft --phone (800) 426-9400 --email-list "john@microsoft.com" --address-line1 Microsoft Corporation --address-line2 One Microsoft Way --address-line3 Redmond --postal-code 98052 --city WA --state WA --country USA --resource-group GroupForEdgeAutomation
