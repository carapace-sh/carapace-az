# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an order.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --address-line1=!: The address line1.
    --address-line2=: The address line2.
    --address-line3=: The address line3.
    --city=!: The city name.
    --comments=: Comments related to this status change.
    --company-name=!: The name of the company.
    --contact-person=!: The contact person name.
    --country=!: The country name.
    --email-list=!:
        description: The email list.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --phone=!: The phone number.
    --postal-code=!: The postal code.
    --state=!: The state name.
    --status=!: Status of the order as per the allowed status types.
    --subscription=: Name or ID of subscription.
    -d, --device-name=!: The order details of a device.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        status:
            - Untracked
            - AwaitingFulfilment
            - AwaitingPreparation
            - AwaitingShipment
            - Shipped
            - Arriving
            - Delivered
            - ReplacementRequested
            - LostDevice
            - Declined
            - ReturnInitiated
            - AwaitingReturnShipment
            - ShippedBack
            - CollectedAtMicrosoft
