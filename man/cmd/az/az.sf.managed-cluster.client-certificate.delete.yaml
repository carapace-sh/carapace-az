# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a client certificate from the managed cluster.
documentation:
    flag:
        resource-group: Specify the resource group name. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --common-name=:
        description: A single or Space-separated list of client certificate common name(s) to be remove.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --thumbprint=:
        description: A single or Space-separated list of client certificate thumbprint(s) to be remove.
        nargs: -1
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
