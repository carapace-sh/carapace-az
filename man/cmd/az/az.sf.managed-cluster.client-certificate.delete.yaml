# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a client certificate from the managed cluster.
flags:
    --common-name=:
        description: A single or Space-separated list of client certificate common name(s) to be remove.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --thumbprint=:
        description: A single or Space-separated list of client certificate thumbprint(s) to be remove.
        nargs: -1
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        common-name: A single or Space-separated list of client certificate common name(s) to be remove.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        thumbprint: A single or Space-separated list of client certificate thumbprint(s) to be remove.
examples:
    Delete client certificate by common name.: az sf managed-cluster client-certificate delete -g testRG -c testCluster --common-name Contoso.com
    Delete client certificate by thumbprint.: az sf managed-cluster client-certificate delete -g testRG -c testCluster --thumbprint XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
