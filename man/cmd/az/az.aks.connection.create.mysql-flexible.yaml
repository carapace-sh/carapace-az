# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: mysql-flexible
description: Create a aks connection to mysql-flexible.
flags:
    --appconfig-id=: The app configuration id to store configuration
    --client-type=: The client type used on the aks
    --connection=: Name of the aks connection.
    --connstr-props=:
        description: The additional connection string properties used to build connection string.
        nargs: -1
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --database=: Name of the mysql flexible database.
    --kube-namespace=: The kubernetes namespace where the connection information will be saved into (as kubernetes secret).
    --no-wait=: Do not wait for the long-running operation to finish.
    --opt-out=:
        description: Whether to disable some configuration steps.
        nargs: -1
    --private-endpoint=:
        description: Connect target service by private endpoint.
        nargs: -1
    --secret=:
        description: The secret auth info
        nargs: -1
    --server=: Name of the mysql flexible server.
    --source-id=: The resource id of a aks.
    --subscription=: Name or ID of subscription.
    --target-id=: The resource id of target service.
    --target-resource-group=: The resource group which contains the mysql flexible server.
    -g, --resource-group=: The resource group which contains the managed cluster.
    -n, --name=: Name of the managed cluster.
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - go
            - php
            - ruby
            - django
            - springBoot
            - none
        opt-out:
            - publicnetwork
            - configinfo
            - auth
        private-endpoint:
            - "true"
            - "false"
documentation:
    command: |-
        Command group 'aks connection' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        appconfig-id: The app configuration id to store configuration.
        change-reference: The related change reference ID for this resource operation.
        client-type: |-
            The client type used on the aks.

            Accepted values: django, dotnet, dotnet-internal, go, java, nodejs, none, php, python, ruby, springBoot
        connection: Name of the aks connection.
        connstr-props: The additional connection string properties used to build connection string.
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        database: Name of the mysql flexible database. Required if '--target-id' is not specified.
        kube-namespace: |-
            The kubernetes namespace where the connection information will be saved into (as kubernetes secret).

            Default value: default
        name: Name of the managed cluster. Required if '--source-id' is not specified.None.
        new: |-
            Deleting existing users with the same name before creating a new user in database.

            Default value: False
        no-recreate: |-
            Skip executing creation operation when no updates to an existing connection.

            Default value: False

            Accepted values: false, true
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        opt-out: |-
            Whether to disable some configuration steps. Use configinfo to disbale configuration information changes on source. Use publicnetwork to disable public network access configuration.Use auth to skip auth configuration such as enabling managed identity and granting RBAC roles.

            Accepted values: auth, configinfo, publicnetwork
        private-endpoint: |-
            Connect target service by private endpoint. The private endpoint in source virtual network must be created ahead.

            Accepted values: false, true
        resource-group: The resource group which contains the managed cluster. Required if '--source-id' is not specified.None.
        secret: 'The secret auth info. Usage: --secret name=XX secret=XX --secret name=XX secret-uri=XX --secret name=XX secret-name=XX name    : Required. Username or account name for secret auth. secret  : One of secret, secret-uri, secret-name is required. Password or account key for secret auth. secret-uri  : One of secret, secret-uri, secret-name is required. Keyvault secret uri which stores password. secret-name : One of secret, secret-uri, secret-name is required. Keyvault secret name which stores password. It''s for AKS only.'
        server: Name of the mysql flexible server. Required if '--target-id' is not specified.
        service-principal: 'The service principal auth info. Usage: --service-principal client-id=XX secret=XX client-id            : Required. Client id of the service principal. object-id            : Optional. Object id of the service principal (Enterprise Application). secret               : Required. Secret of the service principal. mysql-identity-id    : Optional. ID of identity used for MySQL flexible server Microsoft Entra Authentication. Ignore it if you are the server Microsoft Entra administrator.'
        source-id: The resource id of a aks. Required if ['--resource-group', '--name'] are not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-id: The resource id of target service. Required if ['--target-resource-group', '--server', '--database'] are not specified. --target-resource-group --tg The resource group which contains the mysql flexible server. Required if '--target-id' is not specified.
        target-resource-group: The resource group which contains the mysql flexible server. Required if '--target-id' is not specified.
        workload-identity: 'The user-assigned managed identity used to create workload identity federation. Usage: ``` --workload-identity <user-identity-resource-id> mysql-identity-id=<mysql-identity-id> ``` user-identity-resource-id: Required. The resource id of the user assigned identity. Please DO NOT use AKS control plane identity and kubelet identity which is not supported by federated identity credential. mysql-identity-id    : Optional. ID of identity used for MySQL flexible server Microsoft Entra Authentication. Ignore it if you are the server Microsoft Entra administrator.'
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Create a connection between aks and mysql-flexible interactively: az aks connection create mysql-flexible
    Create a connection between aks and mysql-flexible with resource id: az aks connection create mysql-flexible --source-id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.ContainerService/managedClusters/{cluster} --target-id /subscriptions/{subscription}/resourceGroups/{target_resource_group}/providers/Microsoft.DBforMySQL/flexibleServers/{server}/databases/{database} --secret name=XX secret=XX
    Create a connection between aks and mysql-flexible with resource name: az aks connection create mysql-flexible -g ClusterRG -n MyCluster --tg MysqlRG --server MyServer --database MyDB --secret name=XX secret=XX
