# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show registration assignment.
documentation:
    flag:
        assignment: The identifier (guid) or the fully qualified resource id of the registration assignment. When resource id is used, subscription id and resource group parameters are ignored.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --assignment=!: The identifier (guid) or the fully qualified resource id of the registration assignment.
    --include-definition=:
        description: Tells whether to return registration definition details also along with registration assignment details.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        include-definition:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
