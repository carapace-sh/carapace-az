# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show registration assignment.
flags:
    --assignment=!: The identifier (guid) or the fully qualified resource id of the registration assignment.
    --include-definition=:
        description: Tells whether to return registration definition details also along with registration assignment details.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        include-definition:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        assignment: The identifier (guid) or the fully qualified resource id of the registration assignment. When resource id is used, subscription id and resource group parameters are ignored.
        include-definition: |-
            Tells whether to return registration definition details also along with registration assignment details.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show an assignment given its fully qualified resource id.: az managedservices assignment show --assignment /subscriptions/a62076fa-768a-403c-9d9d-6a9919aae441/providers/Microsoft.ManagedServices/registrationAssignments/0c3e9687-b461-4615-b6e4-74d54998d6e4
    Show an assignment given its identifier under the default subscription scope with the registration definition details.: az managedservices assignment show --assignment d3087cf0-e180-4cca-b147-54ae00c7b504 --include-definition true
    Show an assignment given its identifier under the default subscription scope.: az managedservices assignment show --assignment d3087cf0-e180-4cca-b147-54ae00c7b504
