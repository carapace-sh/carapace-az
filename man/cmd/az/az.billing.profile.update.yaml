# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Creates or updates a billing profile.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --bill-to=:
        description: Billing address.
        nargs: -1
    --display-name=: The name of the billing profile.
    --enabled-azure-plans=:
        description: Information about the enabled azure plans.
        nargs: -1
    --invoice-email-opt-in=:
        description: Flag controlling whether the invoices for the billing profile are sent through email.
        nargs: -1
    --invoice-sections-value=: The invoice sections associated to the billing profile.
    --no-wait=: Do not wait for the long-running operation to finish.
    --po-number=: The purchase order name that will appear on the invoices generated for the billing profile.
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies a billing profile.
completion:
    flag:
        invoice-email-opt-in:
            - "true"
            - "false"
documentation:
    command: |-
        Command group 'billing profile' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        bill-to: 'Billing address. Usage: --bill-to first-name=XX last-name=XX company-name=XX address-line1=XX address-line2=XX address-line3=XX city=XX district=XX region=XX country=XX postal-code=XX email=XX phone-number=XX.'
        change-reference: The related change reference ID for this resource operation.
        display-name: The name of the billing profile.
        enabled-azure-plans: 'Information about the enabled azure plans. Usage: --enabled-azure-plans sku-id=XX sku-id: The sku id. Multiple actions can be specified by using more than one --enabled-azure-plans argument.'
        invoice-email-opt-in: |-
            Flag controlling whether the invoices for the billing profile are sent through email.

            Accepted values: false, true
        invoice-sections-value: 'The invoice sections associated to the billing profile. Expected value: json-string/@json-file.'
        name: The ID that uniquely identifies a billing profile.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        po-number: The purchase order name that will appear on the invoices generated for the billing profile.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
