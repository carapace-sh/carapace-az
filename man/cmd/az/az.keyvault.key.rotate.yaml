# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: rotate
description: Rotate the key based on the key policy by generating a new version of the key.
flags:
    --hsm-name=: Name of the HSM.
    --id=: Id of the key.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Vault.
    -n, --name=: Name of the key.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        hsm-name: Name of the HSM. (--hsm-name and --vault-name are mutually exclusive, please specify just one of them).
        id: Id of the key. If specified all other 'Id' arguments should be omitted.
        name: Name of the key. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Vault.
