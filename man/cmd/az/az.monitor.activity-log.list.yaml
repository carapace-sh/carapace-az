# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List and query activity log events.
documentation:
    flag:
        end-time: 'End time of the query. Defaults to the current time. Format: date (yyyy-mm-dd) time (hh:mm:ss.xxxxx) timezone (+/-hh:mm)'
        offset: |
            Time offset of the query range, in ##d##h format.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        start-time: 'Start time of the query. Format: date (yyyy-mm-dd) time (hh:mm:ss.xxxxx) timezone (+/-hh:mm)'
        status: |
            Status to query for (ex: Failed)
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --caller=: Caller to query for, such as an e-mail address or service principal ID.
    --correlation-id=: Correlation ID to query.
    --end-time=:
        description: End time of the query.
        nargs: -1
    --max-events=: Maximum number of records to return.
    --namespace=: Resource provider namespace.
    --offset=: 'Time offset of the query range, in ##d##h format.'
    --resource-id=: ARM ID of a resource.
    --select=:
        description: Space-separated list of properties to return.
        nargs: -1
    --start-time=:
        description: Start time of the query.
        nargs: -1
    --status=: 'Status to query for (ex: Failed)'
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        select:
            - authorization
            - claims
            - caller
            - description
            - id
            - eventDataId
            - correlationId
            - eventName
            - category
            - httpRequest
            - level
            - resourceGroupName
            - resourceProviderName
            - resourceId
            - resourceType
            - operationId
            - operationName
            - properties
            - status
            - subStatus
            - eventTimestamp
            - submissionTimestamp
            - subscriptionId
            - tenantId
