# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update 'Azure AD authenticate as ARM' policy for an Azure Container Registry.
flags:
    --status=: Indicate whether authentication-as-arm is enabled.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -r, --registry=!: The name of the container registry.
completion:
    flag:
        status:
            - enabled
            - disabled
documentation:
    command: |-
        Command group 'acr config authentication-as-arm' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        status: |-
            Indicate whether authentication-as-arm is enabled.

            Accepted values: disabled, enabled
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    ? Disable 'Azure AD authenticate as ARM' policy for an Azure Container Registry, so only ACR audienced tokens can be used for authentication
    : az acr config authentication-as-arm update -r myregistry --status Disabled
    ? Enable 'Azure AD authenticate as ARM' policy for an Azure Container Registry, it will allow both ACR and ARM audienced tokens to be used for authentication
    : az acr config authentication-as-arm update -r myregistry --status Enabled
