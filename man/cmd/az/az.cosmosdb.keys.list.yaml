# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the access keys or connection strings for a Azure Cosmos DB database account.
flags:
    --subscription=: Name or ID of subscription.
    --type=: The type of account key.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Cosmosdb account name
completion:
    flag:
        type:
            - keys
            - read-only-keys
            - connection-strings
documentation:
    flag:
        name: Cosmosdb account name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: |-
            The type of account key.

            Default value: keys

            Accepted values: connection-strings, keys, read-only-keys
examples:
    List the access keys or connection strings for a Azure Cosmos DB database account. (autogenerated): az cosmosdb keys list --name MyCosmosDBDatabaseAccount --resource-group MyResourceGroup --subscription MySubscription --type keys
