# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the client id and client secret for the Azure Active Directory identity provider.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --allowed-token-audiences=: The configuration settings of the allowed list of audiences from which to validate the JWT token.
    --certificate-issuer=: Alternative to AAD Client Secret and thumbprint, issuer of a certificate used for signing purposes
    --client-id=: The Client ID of the app used for login.
    --client-secret-name=: The app secret name that contains the client secret of the relying party application.
    --client-secret=: The client secret.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --issuer=: The OpenID Connect Issuer URI that represents the entity which issues access tokens for this application.
    --san=: Alternative to AAD Client Secret and thumbprint, subject alternative name of a certificate used for signing purposes
    --subscription=: Name or ID of subscription.
    --tenant-id=: The tenant id of the application.
    --thumbprint=: Alternative to AAD Client Secret, thumbprint of a certificate used for signing purposes
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Containerapp.
    -y, --yes=: Do not prompt for confirmation.
