# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show details of a linked IoT hub in an Azure IoT Hub Device Provisioning Service instance.
flags:
    --dps-name=!: IoT Hub Device Provisioning Service name
    --linked-hub=!: Host name of linked IoT Hub.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        dps-name: IoT Hub Device Provisioning Service name.
        linked-hub: Host name of linked IoT Hub.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show details of linked IoT hub 'MyLinkedHub' in an Azure IoT Hub Device Provisioning Service: az iot dps linked-hub show --dps-name MyDps --resource-group MyResourceGroup --linked-hub MyLinkedHub
