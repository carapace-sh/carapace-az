# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show application federated identity credential.
flags:
    --federated-credential-id=!: ID or name of the federated identity credential
    --id=!: Application's appId, identifierUri, or id (formerly known as objectId)
documentation:
    flag:
        federated-credential-id: ID or name of the federated identity credential.
        id: Application's appId, identifierUri, or id (formerly known as objectId).
examples:
    Show application federated identity credential with id: az ad app federated-credential show --id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx --federated-credential-id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    Show application federated identity credential with name: az ad app federated-credential show --id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx --federated-credential-id Testing
