# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List an application's password or certificate credential metadata.
flags:
    --cert=: Operate on certificate credentials
    --id=!: identifier uri, application id, or object id
documentation:
    command: List an application's password or certificate credential metadata. (The content of the password or certificate credential is not retrievable.).
    flag:
        cert: |-
            Operate on certificate credentials.

            Default value: False
        id: Identifier uri, application id, or object id.
examples:
    List an application's certificate credentials: az ad app credential list --id 00000000-0000-0000-0000-000000000000 --cert
    List an application's password credentials: az ad app credential list --id 00000000-0000-0000-0000-000000000000
