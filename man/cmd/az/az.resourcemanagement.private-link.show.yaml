# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get resource management private.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: The name of the resource group.
    -n, --name=!: The name of the resource management private link.
documentation:
    flag:
        name: The name of the resource management private link.
        resource-group: The name of the resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get single resource management private link.: az resourcemanagement private-link show --resource-group testRG --name TestRMPL
