# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a manifest in an Azure Container Registry.
flags:
    --subscription=: Name or ID of subscription.
    --suffix=: The tenant suffix in registry login server.
    -n, --name=: The name of the artifact.
    -p, --password=: The password used to log into a container registry
    -r, --registry=: The name of the container registry.
    -u, --username=: The username used to log into a container registry
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: |-
        Command group 'acr manifest' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The name of the artifact. May include a tag in the format 'name:tag' or digest in the format 'name@digest'.
        password: The password used to log into a container registry.
        registry: The name of the container registry. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        suffix: The tenant suffix in registry login server. You may specify '--suffix tenant' if your registry login server is in the format 'registry-tenant.azurecr.io'. Applicable if you're accessing the registry from a different subscription or you have permission to access images but not the permission to manage the registry resource.
        username: The username used to log into a container registry.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete the manifest of the artifact 'hello-world:latest'.: az acr manifest delete myregistry.azurecr.io/hello-world:latest
    Delete the manifest of the artifact referenced by digest 'hello-world@sha256:abc123'.: az acr manifest delete -r myregistry -n hello-world@sha256:abc123
