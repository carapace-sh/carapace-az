# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Adds a user Account to the specified Compute Node.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --expiry-time=: The time at which the Account should expire.
    --is-admin=: Whether the Account should be an administrator on the Compute Node.
    --json-file=: A file containing the user specification in JSON (formatted to match the respective REST API body).
    --name=: The user name of the Account.
    --node-id=!: The ID of the machine on which you want to create a user Account.
    --password=: The password of the Account.
    --pool-id=!: The ID of the Pool that contains the Compute Node.
    --ssh-public-key=: The SSH public key that can be used for remote login to the Compute Node.
    --subscription=: Name or ID of subscription.
documentation:
    command: Add a user account to a Batch compute node.
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        expiry-time: The time at which the Account should expire. If omitted, the default is 1 day from the current time. For Linux Compute Nodes, the expiryTime has a precision up to a day. Expected format is an ISO-8601 timestamp.
        is-admin: Whether the Account should be an administrator on the Compute Node. The default value is false. True if flag present.
        json-file: A file containing the user specification in JSON (formatted to match the respective REST API body). If this parameter is specified, all 'User Arguments' are ignored.
        name: The user name of the Account. Required.
        node-id: The ID of the machine on which you want to create a user Account. Required.
        password: The password of the Account. The password is required for Windows Compute Nodes (those created with 'virtualMachineConfiguration' using a Windows Image reference). For Linux Compute Nodes, the password can optionally be specified along with the sshPublicKey property.
        pool-id: The ID of the Pool that contains the Compute Node. Required.
        ssh-public-key: The SSH public key that can be used for remote login to the Compute Node. The public key should be compatible with OpenSSH encoding and should be base 64 encoded. This property can be specified only for Linux Compute Nodes. If this is specified for a Windows Compute Node, then the Batch service rejects the request; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request).
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a regular (non-admin) user with a public SSH key.: az batch node user create --pool-id pool1 --node-id node1 --name example_user --ssh-public-key example_public_key
