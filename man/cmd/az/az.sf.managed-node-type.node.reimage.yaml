# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reimage
description: Reimage nodes of a node type.
flags:
    --force=:
        description: Using this flag will force the operation even if service fabric is unable to disable the nodes.
        nargs: -1
    --node-name=!:
        description: list of target nodes to perform the operation.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
    -n, --name=!: node type name.
completion:
    flag:
        force:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name. --name --node-type-name -n Node type name.
        force: |-
            Using this flag will force the operation even if service fabric is unable to disable the nodes. Use with caution as this might cause data loss if stateful workloads are running on the node.

            Default value: False

            Accepted values: false, true
        node-name: List of target nodes to perform the operation.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Reimage 2 nodes.: az sf managed-node-type node reimage -g testRG -c testCluster -n snt --node-name snt_0 snt_1
