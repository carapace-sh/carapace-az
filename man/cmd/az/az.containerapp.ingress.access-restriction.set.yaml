# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Configure IP access restrictions for a container app.
flags:
    --action=!: Whether the IP security restriction allows or denies access.
    --description=: The description of the IP security restriction.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ip-address=!: The address range of the IP security restriction in IPv4 CIDR notation.
    --rule-name=!: The IP security restriction name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Containerapp.
completion:
    flag:
        action:
            - Allow
            - Deny
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        action: |-
            Whether the IP security restriction allows or denies access. All restrictions must be use the same action. If no restrictions are set, all traffic is allowed.

            Accepted values: Allow, Deny
        change-reference: The related change reference ID for this resource operation.
        description: The description of the IP security restriction.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        ip-address: The address range of the IP security restriction in IPv4 CIDR notation. (for example, '198.51.100.14/24').
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule-name: The IP security restriction name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add an allow IP access restriction.: az containerapp ingress access-restriction set -n my-containerapp -g MyResourceGroup --rule-name restrictionName --ip-address 192.168.1.1/32 --description "Restriction description." --action Allow
