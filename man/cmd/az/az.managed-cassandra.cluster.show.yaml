# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the properties of a managed Cassandra cluster.
flags:
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Cluster Name
    -g, --resource-group=!: Name of resource group.
documentation:
    command: Get a Managed Cassandra Cluster Resource.
    flag:
        cluster-name: Cluster Name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    ? Gets a Managed Cassandra Cluster Resource. ProvisioningState tells the state of this cluster. If the cluster doesnot exist a NotFound response is returned.
    : az managed-cassandra cluster show --resource-group MyResourceGroup --cluster-name MyCluster
