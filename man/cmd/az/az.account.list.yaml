# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the imported subscriptions.
flags:
    --all=: List all subscriptions from all clouds, including subscriptions that are not 'Enabled'.
    --refresh=: retrieve up-to-date subscriptions from server
documentation:
    command: Get a list of subscriptions for the logged in account. By default, only 'Enabled' subscriptions from the current cloud is shown.
    flag:
        all: List all subscriptions from all clouds, including subscriptions that are not 'Enabled'.
        refresh: Retrieve up-to-date subscriptions from server.
