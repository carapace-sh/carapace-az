# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: install
description: Install Bicep CLI.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-platform: The platform the Bicep CLI will be running on. Set this to skip automatic platform detection if it does not work properly.
        version: The version of Bicep CLI to be installed. Default to the latest if not specified.
flags:
    --subscription=: Name or ID of subscription.
    -t, --target-platform=: The platform the Bicep CLI will be running on.
    -v, --version=: The version of Bicep CLI to be installed.
completion:
    flag:
        target-platform:
            - win-x64
            - linux-musl-x64
            - linux-x64
            - osx-x64
            - linux-arm64
            - osx-arm64
            - win-arm64
