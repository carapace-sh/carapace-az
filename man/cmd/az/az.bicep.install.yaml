# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: install
description: Install Bicep CLI.
flags:
    --subscription=: Name or ID of subscription.
    -t, --target-platform=: The platform the Bicep CLI will be running on.
    -v, --version=: The version of Bicep CLI to be installed.
completion:
    flag:
        target-platform:
            - win-x64
            - linux-musl-x64
            - linux-x64
            - osx-x64
            - linux-arm64
            - osx-arm64
            - win-arm64
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-platform: |-
            The platform the Bicep CLI will be running on. Set this to skip automatic platform detection if it does not work properly.

            Accepted values: linux-arm64, linux-musl-x64, linux-x64, osx-arm64, osx-x64, win-arm64, win-x64
        version: The version of Bicep CLI to be installed. Default to the latest if not specified.
examples:
    Install Bicep CLI and specify the target platform.: az bicep install --target-platform linux-x64
    Install Bicep CLI.: az bicep install
    Install a specific version of Bicep CLI.: az bicep install --version v0.2.212
