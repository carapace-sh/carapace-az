# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: regenerate
description: Regenerate an access key for an App Configuration store.
documentation:
    flag:
        id: Id of the key to be regenerated. Can be found using az appconfig credential list command.
        name: Name of the App Configuration store. You can configure the default name using `az configure --defaults app_configuration_store=<name>`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --id=!: Id of the key to be regenerated.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name of the App Configuration store.
