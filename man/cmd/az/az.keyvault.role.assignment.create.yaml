# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new role assignment for a user, group, or service principal.
flags:
    --assignee-object-id=: Use this parameter instead of '--assignee' to bypass graph permission issues.
    --assignee=: represent a user, group, or service principal.
    --hsm-name=: Name of the HSM.
    --id=: Full URI of the HSM.
    --role=!: role name or id
    --scope=!: scope at which the role assignment or definition applies to, e.g., "/" or "/keys" or "/keys/{keyname}"
    --subscription=: Name or ID of subscription.
    -n, --name=: Name of the role assignment.
    -t, --assignee-principal-type=: The principal type of assignee.
completion:
    flag:
        assignee-principal-type:
            - User
            - Group
            - ServicePrincipal
            - Unknown
            - DirectoryRoleTemplate
            - ForeignGroup
            - Application
            - MSI
            - DirectoryObjectOrGroup
            - Everyone
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        assignee: 'Represent a user, group, or service principal. supported format: object id, user sign-in name, or service principal name.'
        assignee-object-id: Use this parameter instead of '--assignee' to bypass graph permission issues. This parameter only works with object ids for users, groups, service principals, and managed identities. For managed identities use the principal id. For service principals, use the object id and not the app id.
        assignee-principal-type: |-
            The principal type of assignee.

            Accepted values: Application, DirectoryObjectOrGroup, DirectoryRoleTemplate, Everyone, ForeignGroup, Group, MSI, ServicePrincipal, Unknown, User
        change-reference: The related change reference ID for this resource operation.
        hsm-name: Name of the HSM.
        id: Full URI of the HSM. If specified all other 'Id' arguments should be omitted.
        name: Name of the role assignment.
        role: Role name or id.
        scope: Scope at which the role assignment or definition applies to, e.g., "/" or "/keys" or "/keys/{keyname}".
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a role assignment for a specified assignee with a defined role and scope in a Managed HSM using its name. (autogenerated): az keyvault role assignment create --assignee fb2f-ac10--a04f-8b0d786ea37d --hsm-name mock-mhsm --role "Managed HSM Crypto User" --scope "/"
