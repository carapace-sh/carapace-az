# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new key, stores it, then returns key parameters and attributes to the client.
flags:
    --curve=: Elliptic curve name.
    --default-cvm-policy=: Use default policy under which the key can be exported for CVM disk encryption.
    --disabled=:
        description: Create key in disabled state.
        nargs: -1
    --expires=: Expiration UTC datetime  (Y-m-d'T'H:M:S'Z').
    --exportable=:
        description: Whether the private key can be exported.
        nargs: -1
    --hsm-name=: Name of the HSM.
    --id=: Id of the key.
    --immutable=:
        description: Mark a release policy as immutable.
        nargs: -1
    --kty=: The type of key to create.
    --not-before=: Key not usable before the provided UTC datetime  (Y-m-d'T'H:M:S'Z').
    --ops=:
        description: Space-separated list of permitted JSON web key operations.
        nargs: -1
    --policy=: The policy rules under which the key can be exported.
    --size=: The key size in bits.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vault-name=: Name of the Vault.
    -n, --name=: Name of the key.
    -p, --protection=: Specifies the type of key protection.
completion:
    flag:
        curve:
            - P-256
            - P-384
            - P-521
            - P-256K
        disabled:
            - "true"
            - "false"
        exportable:
            - "true"
            - "false"
        immutable:
            - "true"
            - "false"
        kty:
            - EC
            - EC-HSM
            - RSA
            - RSA-HSM
            - oct
            - oct-HSM
        ops:
            - encrypt
            - decrypt
            - sign
            - verify
            - wrapKey
            - unwrapKey
            - import
            - export
        protection:
            - software
            - hsm
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        curve: |-
            Elliptic curve name. For valid values, see: https://learn.microsoft.com/rest/api/keyvault/keys/create-key/create-key#jsonwebkeycurvename .

            Accepted values: P-256, P-256K, P-384, P-521
        default-cvm-policy: |
            Use default policy under which the key can be exported for CVM disk encryption.

            Default value: False
        disabled: |-
            Create key in disabled state.

            Default value: False

            Accepted values: false, true
        expires: Expiration UTC datetime  (Y-m-d'T'H:M:S'Z').
        exportable: |-
            Whether the private key can be exported. To create key with release policy, "exportable" must be true and caller must have "export" permission.

            Accepted values: false, true
        hsm-name: Name of the HSM. (--hsm-name and --vault-name are mutually exclusive, please specify just one of them).
        id: Id of the key. If specified all other 'Id' arguments should be omitted.
        immutable: |-
            Mark a release policy as immutable. An immutable release policy cannot be changed or updated after being marked immutable. Release policies are mutable by default.

            Accepted values: false, true
        kty: |-
            The type of key to create. For valid values, see: https://learn.microsoft.com/rest/api/keyvault/keys/create-key/create-key#jsonwebkeytype .

            Accepted values: EC, EC-HSM, RSA, RSA-HSM, oct, oct-HSM
        name: Name of the key. Required if --id is not specified.
        not-before: Key not usable before the provided UTC datetime  (Y-m-d'T'H:M:S'Z').
        ops: |-
            Space-separated list of permitted JSON web key operations.

            Accepted values: decrypt, encrypt, export, import, sign, unwrapKey, verify, wrapKey
        policy: The policy rules under which the key can be exported. Policy definition as JSON, or a path to a file containing JSON policy definition.
        protection: |-
            Specifies the type of key protection.

            Accepted values: hsm, software
        size: 'The key size in bits. For example: 2048, 3072, or 4096 for RSA. 128, 192, or 256 for oct.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        vault-name: Name of the Vault.
examples:
    Create a key in a specified Key Vault with a given name. (autogenerated): az keyvault key create --vault-name envault -n enkey
