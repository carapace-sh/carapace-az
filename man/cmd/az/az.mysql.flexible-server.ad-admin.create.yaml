# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Active Directory administrator.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --identity=!: Name or ID of identity used for AAD Authentication.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -i, --object-id=!: The unique ID of the Azure AD administrator.
    -s, --server-name=!: Name of the server.
    -u, --display-name=!: Display name of the Azure AD administrator user or group.
