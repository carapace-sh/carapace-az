# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore a file share within a valid retention days if share soft delete is enabled.
flags:
    --deleted-version=!: Identify the version of the deleted share that will be restored.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --restored-name=: A new file share name to be restored.
    --storage-account=: The name or ID of the storage account.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The file share name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        deleted-version: Identify the version of the deleted share that will be restored.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The file share name. Identify the name of the deleted share that will be restored.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restored-name: A new file share name to be restored. If not specified, deleted share name will be used.
        storage-account: The name or ID of the storage account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Restore a file share within a valid retention days if share soft delete is enabled to a new name.: az storage share-rm restore -n deletedshare --deleted-version 01D64EB9886F00C4 --restored-name newname -g MyResourceGroup --storage-account mystorageaccount
    Restore a file share within a valid retention days if share soft delete is enabled.: az storage share-rm restore -n deletedshare --deleted-version 01D64EB9886F00C4 -g MyResourceGroup --storage-account mystorageaccount
