# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List log files for a PostgreSQL flexible server.
flags:
    --file-last-written=: Integer in hours to indicate file last modify time.
    --filename-contains=: The pattern that file name should match.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --max-file-size=: The file size limitation to filter files.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -s, --server-name=: Name of the server.
documentation:
    flag:
        file-last-written: |-
            Integer in hours to indicate file last modify time.

            Default value: 72
        filename-contains: The pattern that file name should match.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        max-file-size: The file size limitation to filter files.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List log files for 'testserver' containing name 'serverlogs'.: az postgres flexible-server server-logs list -g testgroup -s testserver --subscription testSubscription --filename-contains serverlogs
    List log files for 'testserver' less than 30Kb in size.: az postgres flexible-server server-logs list -g testgroup -s testserver --max-file-size 30
    List log files for 'testserver' modified in the last 10 hours.: az postgres flexible-server server-logs list -g testgroup -s testserver --file-last-written 10
    List log files for 'testserver' modified in the last 72 hours (default value).: az postgres flexible-server server-logs list -g testgroup -s testserver
