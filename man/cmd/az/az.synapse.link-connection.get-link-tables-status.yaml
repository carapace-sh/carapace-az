# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: get-link-tables-status
description: Query the link table status of a link connection.
flags:
    --continuation-token=: Continuation token to query table status.
    --max-segment-count=: Max segment count to query table status.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -n, --name=!: The link connection name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        continuation-token: Continuation token to query table status.
        max-segment-count: |-
            Max segment count to query table status.

            Default value: 50
        name: The link connection name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    Query the link table status of a link connection.: |-
        az synapse link-connection get-link-tables-status --workspace-name testsynapseworkspace \
          --name linkconnectionname \
          --max-segment-count 50 \
          --continuation-token token
