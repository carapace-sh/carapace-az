# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an managed integration runtime.
documentation:
    flag:
        if-match: ETag of the integration runtime entity. Should only be specified for update, for which it should match existing entity or can be * for unconditional update.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --compute-type=: Compute type of the data flow cluster which will execute data flow job.
    --core-count=: Core count of the data flow cluster which will execute data flow job.
    --description=: The integration runtime description.
    --if-match=: ETag of the integration runtime entity.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --time-to-live=: Time to live (in minutes) setting of the data flow cluster which will execute data flow job.
    --workspace-name=!: The workspace name.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: The integration runtime location.
    -n, --name=!: The integration runtime name.
completion:
    flag:
        compute-type:
            - General
            - MemoryOptimized
            - ComputeOptimized
