# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an managed integration runtime.
flags:
    --compute-type=: Compute type of the data flow cluster which will execute data flow job.
    --core-count=: Core count of the data flow cluster which will execute data flow job.
    --description=: The integration runtime description.
    --if-match=: ETag of the integration runtime entity.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --time-to-live=: Time to live (in minutes) setting of the data flow cluster which will execute data flow job.
    --workspace-name=!: The workspace name.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: The integration runtime location.
    -n, --name=!: The integration runtime name.
completion:
    flag:
        compute-type:
            - General
            - MemoryOptimized
            - ComputeOptimized
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        compute-type: |-
            Compute type of the data flow cluster which will execute data flow job.

            Default value: General

            Accepted values: ComputeOptimized, General, MemoryOptimized
        core-count: |-
            Core count of the data flow cluster which will execute data flow job.

            Default value: 8
        description: The integration runtime description.
        if-match: ETag of the integration runtime entity. Should only be specified for update, for which it should match existing entity or can be * for unconditional update.
        location: |-
            The integration runtime location.

            Default value: AutoResolve
        name: The integration runtime name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        time-to-live: |-
            Time to live (in minutes) setting of the data flow cluster which will execute data flow job.

            Default value: 0
        workspace-name: The workspace name.
examples:
    Create an managed integration runtime.: |-
        az synapse integration-runtime managed create --workspace-name testsynapseworkspace --resource-group rg \
          --name testintegrationruntime
