# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a job.
documentation:
    flag:
        afs-mount-path: Relative mount path for Azure File Share. The File Share will be available at `$AZ_BATCHAI_JOB_MOUNT_ROOT/<relative_mount_path>` folder.
        afs-name: Name of Azure File Share to mount during the job execution. The File Share will be mounted only on the nodes which are executing the job. Must be used in conjunction with --storage-account-name.  Multiple shares can be mounted using configuration file (see --config-file option).
        bfs-mount-path: Relative mount path for Azure Storage Blob Container. The container will be available at `$AZ_BATCHAI_JOB_MOUNT_ROOT/<relative_mount_path>` folder.
        bfs-name: Name of Azure Storage Blob Container to mount during the job execution. The container will be mounted only on the nodes which are executing the job. Must be used in conjunction with --storage-account-name. Multiple containers can be mounted using configuration file (see --config-file option).
        cluster: Name or ARM ID of the cluster to run the job. You need to provide ARM ID if the cluster belongs to a different workspace.
        nfs: Name or ARM ID of the file server to be mounted during the job execution. You need to provide ARM ID if the file server belongs to a different workspace. You can configure multiple file servers using job's  configuration file.
        nfs-mount-path: Relative mount path for NFS. The NFS will be available at `$AZ_BATCHAI_JOB_MOUNT_ROOT/<relative_mount_path>` folder.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        storage-account-key: Storage account key. Required if the storage account belongs to a different subscription. Can be specified using AZURE_BATCHAI_STORAGE_KEY environment variable.
        storage-account-name: Storage account name for Azure File Shares and/or Azure Storage Containers to be mounted on each cluster node. Can be specified using AZURE_BATCHAI_STORAGE_ACCOUNT environment variable.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --afs-mount-path=: Relative mount path for Azure File Share.
    --afs-name=: Name of Azure File Share to mount during the job execution.
    --bfs-mount-path=: Relative mount path for Azure Storage Blob Container.
    --bfs-name=: Name of Azure Storage Blob Container to mount during the job execution.
    --nfs-mount-path=: Relative mount path for NFS.
    --nfs=: Name or ARM ID of the file server to be mounted during the job execution.
    --storage-account-key=: Storage account key.
    --storage-account-name=: Storage account name for Azure File Shares and/or Azure Storage Containers to be mounted on each cluster node.
    --subscription=: Name or ID of subscription.
    -c, --cluster=!: Name or ARM ID of the cluster to run the job.
    -e, --experiment=!: Name of experiment.
    -f, --config-file=!: A path to a json file containing job create parameters (json representation of azure.mgmt.batchai.models.JobCreateParameters).
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of job.
    -w, --workspace=!: Name of workspace.
