# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-attributes
description: Updates the specified attributes associated with the given certificate.
flags:
    --enabled=:
        description: Enable the certificate.
        nargs: -1
    --id=: Id of the certificate.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vault-name=: Name of the Key Vault.
    -n, --name=: Name of the certificate.
    -p, --policy=: JSON encoded policy definition.
    -v, --version=: The certificate version.
completion:
    flag:
        enabled:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        enabled: |-
            Enable the certificate.

            Accepted values: false, true
        id: Id of the certificate. If specified all other 'Id' arguments should be omitted.
        name: Name of the certificate. Required if --id is not specified.
        policy: JSON encoded policy definition. Use @{file} to load from a file(e.g. @my_policy.json) .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        vault-name: Name of the Key Vault. Required if --id is not specified.
        version: The certificate version. If omitted, uses the latest version.
