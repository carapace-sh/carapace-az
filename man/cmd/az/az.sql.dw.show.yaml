# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets a database.
flags:
    --filter=: An OData filter expression that filters elements in the collection.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the data warehouse.
    -s, --server=: Name of the Azure SQL Server.
documentation:
    command: Get the details for a data warehouse.
    flag:
        filter: An OData filter expression that filters elements in the collection. Default value is None.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the data warehouse.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get the details for a data warehouse. (autogenerated): az sql dw show --name MyDataWarehouse --resource-group MyResourceGroup --server myserver
