# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an elastic pool.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --db-dtu-max=: The maximum capacity (in DTUs or vcores) any one database can consume.
    --db-dtu-min=: The minumum capacity (in DTUs or vcores) each database is guaranteed.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --max-size=: The max storage size.
    --no-wait=: Do not wait for the long-running operation to finish.
    --preferred-enclave-type=: Type of enclave to be configured for the elastic pool.
    --read-replicas=: The number of high availability replicas to provision for the database.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -c, --capacity=: The capacity component of the sku in integer number of DTUs or vcores.
    -e, --tier=: The edition component of the sku.
    -f, --family=: The compute generation component of the sku (for vcore skus only).
    -g, --resource-group=: Name of resource group.
    -m, --maint-config-id=: Specified maintenance configuration id or name for this resource.
    -n, --name=: The name of the elastic pool.
    -s, --server=: Name of the Azure SQL Server.
    -z, --zone-redundant=:
        description: Specifies whether to enable zone redundancy.
        nargs: -1
completion:
    flag:
        preferred-enclave-type:
            - Default
            - VBS
        zone-redundant:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        change-reference: The related change reference ID for this resource operation.
        family: 'The compute generation component of the sku (for vcore skus only). Allowed values include: Gen4, Gen5.'
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        maint-config-id: Specified maintenance configuration id or name for this resource. --max-size --storage The max storage size. If no unit is specified, defaults to bytes (B).
        max-size: The max storage size. If no unit is specified, defaults to bytes (B).
        name: The name of the elastic pool.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        preferred-enclave-type: |-
            Type of enclave to be configured for the elastic pool.

            Accepted values: Default, VBS
        read-replicas: The number of high availability replicas to provision for the database. Only settable for Hyperscale edition.
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tier: 'The edition component of the sku. Allowed values include: Basic, Standard, Premium, GeneralPurpose, BusinessCritical.'
        zone-redundant: |-
            Specifies whether to enable zone redundancy. Default is true if no value is specified.

            Accepted values: false, true
examples:
    Update elastic pool with 2 high availability replicas: az sql elastic-pool update -g mygroup -s myserver -n mypool --ha-replicas 2
    Update elastic pool with VBS enclave: az sql elastic-pool update -g mygroup -s myserver -n mypool --preferred-enclave-type VBS
    Update elastic pool with zone redundancy enabled: az sql elastic-pool update -g mygroup -s myserver -n mypool -z
    Update elastic pool with zone redundancy explicitly disabled: az sql elastic-pool update -g mygroup -s myserver -n mypool -z false
