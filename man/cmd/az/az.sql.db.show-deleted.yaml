        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --keys-filter=: Expand the AKV keys for the database.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -r, --restorable-dropped-database-id=!: Restorable dropped database id.
    -s, --server=: Name of the Azure SQL Server.
completion:
