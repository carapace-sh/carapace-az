# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets information about the specified application package.
flags:
    --application-name=!: The name of the application.
    --subscription=: Name or ID of subscription.
    --version-name=!: The version of the application.
    -g, --resource-group=!: Name of the resource group
    -n, --name=!: Name of the Batch account.
documentation:
    flag:
        application-name: The name of the application. This must be unique within the account. Required.
        name: Name of the Batch account.
        resource-group: Name of the resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        version-name: The version of the application. Required.
