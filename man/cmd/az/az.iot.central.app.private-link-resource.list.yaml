# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all of the IoT Central application private link resources in the specified account.
flags:
    --id=: ID of the resource
    --subscription=: Name or ID of subscription.
    --type=: Type of the resource.
    -g, --resource-group=: Name of resource group.
    -n, --name=: IoT Central application name.
documentation:
    flag:
        id: ID of the resource.
        name: IoT Central application name.
        resource-group: Name of resource group. If provided, --name and --type must be provided too.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: Type of the resource. If provided, --name and --resource-group must be provided too.
examples:
    List all of the private link resources in the IoT Central application given a connection id: az iot central app private-link-resource list --id PrivateLinkResourceID
    List all of the private link resources in the IoT Central application given the resource group and application name.: az iot central app private-link-resource list -g MyResourceGroup --n my-iotc-app
