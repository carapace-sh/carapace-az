# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: check
description: Checks that API entity specified by identifier is associated with the Product entity.
flags:
    --api-id=!: API identifier.
    --product-id=!: Product identifier.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the api management service instance
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        change-reference: The related change reference ID for this resource operation.
        product-id: Product identifier. Must be unique in the current API Management service instance.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the api management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Check if the API is associated with the Product.: az apim product api check --resource-group MyResourceGroup  --service-name MyServiceName  --product-id MyProductID --api-id MyAPIID
