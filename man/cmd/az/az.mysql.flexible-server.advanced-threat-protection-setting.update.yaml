# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates an advanced threat protection setting.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --state=!: State of server's advanced threat protection setting.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the server.
completion:
    flag:
        state:
            - Enabled
            - Disabled
documentation:
    command: Update the server's advanced threat protection setting.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        state: |-
            State of the advanced threat protection setting.

            Accepted values: Disabled, Enabled
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Disable the advanced threat protection setting.: az mysql flexible-server advanced-threat-protection-setting update -g mygroup -n myserver --state Disabled
    Enable the advanced threat protection setting.: az mysql flexible-server advanced-threat-protection-setting update -g mygroup -n myserver --state Enabled
