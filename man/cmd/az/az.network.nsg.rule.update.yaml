# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a network security group rule.
flags:
    --access=: Network traffic is allowed or denied.
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --description=: Description for this rule.
    --destination-address-prefixes=:
        description: Space-separated list of CIDR prefixes or IP ranges.
        nargs: -1
    --destination-asgs=:
        description: Space-separated list of application security group names or IDs.
        nargs: -1
    --destination-port-ranges=:
        description: Space-separated list of ports or port ranges between 0-65535.
        nargs: -1
    --direction=: Direction of the rule.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --nsg-name=: Name of the network security group.
    --priority=: Priority of the rule.
    --protocol=: Network protocol this rule applies to.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --source-address-prefixes=:
        description: Space-separated list of CIDR prefixes or IP ranges.
        nargs: -1
    --source-asgs=:
        description: Space-separated list of application security group names or IDs.
        nargs: -1
    --source-port-ranges=:
        description: Space-separated list of ports or port ranges between 0-65535.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the network security group rule.
completion:
    flag:
        access:
            - Allow
            - Deny
        direction:
            - Inbound
            - Outbound
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - '*'
            - Ah
            - Esp
            - Icmp
            - Tcp
            - Udp
documentation:
    flag:
        access: |-
            Network traffic is allowed or denied.

            Accepted values: Allow, Deny
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        description: Description for this rule. Restricted to 140 chars.
        destination-address-prefixes: Space-separated list of CIDR prefixes or IP ranges. Alternatively, specify ONE of 'VirtualNetwork', 'AzureLoadBalancer', 'Internet' or '*' to match all IPs. Besides, it also supports all available Service Tags like 'ApiManagement', 'SqlManagement', 'AzureMonitor', etc.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        destination-asgs: Space-separated list of application security group names or IDs. Limited by backend server, temporarily this argument only supports one application security group name or ID.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        destination-port-ranges: Space-separated list of ports or port ranges between 0-65535. Use '*' to match all ports.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        direction: |-
            Direction of the rule. The direction specifies if rule will be evaluated on incoming or outgoing traffic.

            Accepted values: Inbound, Outbound
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the network security group rule.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        nsg-name: Name of the network security group.
        priority: Priority of the rule. The value can be between 100 and 4096. The priority number must be unique for each rule in the collection. The lower the priority number, the higher the priority of the rule.
        protocol: |-
            Network protocol this rule applies to.

            Accepted values: *, Ah, Esp, Icmp, Tcp, Udp
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        source-address-prefixes: Space-separated list of CIDR prefixes or IP ranges. Alternatively, specify ONE of 'VirtualNetwork', 'AzureLoadBalancer', 'Internet' or '*' to match all IPs. Besides, it also supports all available Service Tags like 'ApiManagement', 'SqlManagement', 'AzureMonitor', etc.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        source-asgs: Space-separated list of application security group names or IDs. Limited by backend server, temporarily this argument only supports one application security group name or ID.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        source-port-ranges: Space-separated list of ports or port ranges between 0-65535. Use '*' to match all ports.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a network security group rule.: az network nsg rule update --name MyNsgRule --nsg-name MyNsg --resource-group MyResourceGroup --source-address-prefixes 208.130.28/24
    Update an NSG rule with a new wildcard destination address prefix.: az network nsg rule update -g MyResourceGroup --nsg-name MyNsg -n MyNsgRule --destination-address-prefix '*'
