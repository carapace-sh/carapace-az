# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a storage account.
flags:
    --access-tier=: Required for storage accounts where kind = BlobStorage.
    --account-type=: Specify the Active Directory account type for Azure Storage.
    --action=: The action of virtual network rule.
    --allow-blob-public-access=:
        description: Allow or disallow public access to all blobs or containers in the storage account.
        nargs: -1
    --assign-identity=: Generate and assign a new Storage Account Identity for this storage account for use with key management services like Azure KeyVault.
    --azure-storage-sid=: Specify the security identifier (SID) for Azure Storage.
    --bypass=:
        description: Bypass traffic for space-separated uses.
        nargs: -1
    --custom-domain=: User domain assigned to the storage account.
    --default-action=: Default action to apply when no rule matches.
    --dns-endpoint-type=: Allow you to specify the type of endpoint.
    --domain-guid=: Specify the domain GUID.
    --domain-name=: Specify the primary domain that the AD DNS server is authoritative for.
    --domain-sid=: Specify the security identifier (SID).
    --edge-zone=: The name of edge zone.
    --enable-alw=:
        description: The account level immutability property.
        nargs: -1
    --enable-files-aadds=:
        description: Enable Azure Active Directory Domain Services authentication for Azure Files
        nargs: -1
    --enable-files-aadkerb=:
        description: Enable Azure Files Active Directory Domain Service Kerberos Authentication for the storage account
        nargs: -1
    --enable-files-adds=:
        description: Enable Azure Files Active Directory Domain Service Authentication for storage account.
        nargs: -1
    --enable-hierarchical-namespace=:
        description: Allow the blob service to exhibit filesystem semantics.
        nargs: -1
    --enable-large-file-share=: Enable the capability to support large file shares with more than 5 TiB capacity for storage account.Once the property is enabled, the feature cannot be disabled.
    --enable-local-user=:
        description: Enable local user features.
        nargs: -1
    --enable-nfs-v3=:
        description: NFS 3.0 protocol support enabled if sets to true.
        nargs: -1
    --enable-sftp=:
        description: Enable Secure File Transfer Protocol.
        nargs: -1
    --encryption-key-name=: The name of the KeyVault key.
    --encryption-key-source=: The default encryption key source
    --encryption-key-vault=: The Uri of the KeyVault.
    --encryption-key-version=: The version of the KeyVault key to use, which will opt out of implicit key rotation.
    --encryption-services=:
        description: Specifies which service(s) to encrypt.
        nargs: -1
    --forest-name=: Specify the Active Directory forest to get.
    --https-only=:
        description: Allow https traffic only to storage service if set to true.
        nargs: -1
    --identity-type=: The identity type.
    --immutability-period-in-days=: The immutability period for the blobs in the container since the policy creation, in days.
    --immutability-state=: Defines the mode of the policy.
    --key-expiration-period-in-days=: Expiration period in days of the Key Policy assigned to the storage account
    --kind=: Indicate the type of storage account.
    --min-tls-version=: The minimum TLS version to be permitted on requests to storage.
    --net-bios-domain-name=: Specify the NetBIOS domain name.
    --public-network-access=: Enable or disable public network access to the storage account.
    --publish-internet-endpoints=:
        description: A boolean flag which indicates whether internet routing storage endpoints are to be published.
        nargs: -1
    --publish-microsoft-endpoints=:
        description: A boolean flag which indicates whether microsoft routing storage endpoints are to be published.
        nargs: -1
    --routing-choice=: Routing Choice defines the kind of network routing opted by the user.
    --sam-account-name=: Specify the Active Directory SAMAccountName for Azure Storage.
    --sas-expiration-period=: Expiration period of the SAS Policy assigned to the storage account, DD.HH:MM:SS.
    --sku=: The storage account SKU.
    --subnet=: Name or ID of subnet.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --user-identity-id=: The key is the ARM resource identifier of the identity.
    --vnet-name=: Name of a virtual network.
    -d, --default-share-permission=: Default share permission for users using Kerberos authentication if RBAC role is not assigned.
    -f, --key-vault-federated-client-id=: ClientId of the multi-tenant application to be used in conjunction with the user-assigned identity for cross-tenant customer-managed-keys server-side encryption on the storage account.
    -g, --resource-group=!: Name of resource group.
    -i, --require-infrastructure-encryption=:
        description: A boolean indicating whether or not the service applies a secondary layer of encryption with platform managed keys for data at rest.
        nargs: -1
    -k, --allow-shared-key-access=:
        description: Indicate whether the storage account permits requests to be authorized with the account access key via Shared Key.
        nargs: -1
    -l, --location=: Location.
    -n, --name=!: The storage account name.
    -q, --encryption-key-type-for-queue=: Set the encryption key type for Queue service.
    -r, --allow-cross-tenant-replication=:
        description: Allow or disallow cross AAD tenant object replication.
        nargs: -1
    -t, --encryption-key-type-for-table=: Set the encryption key type for Table service.
    -u, --key-vault-user-identity-id=: Resource identifier of the UserAssigned identity to be associated with server-side encryption on the storage account.
    -w, --allow-protected-append-writes=:
        description: This property can only be changed for disabled and unlocked time-based retention policies.
        nargs: -1
