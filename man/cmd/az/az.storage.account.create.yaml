            - StorageFileDataSmbShareContributor
            - StorageFileDataSmbShareElevatedContributor
        dns-endpoint-type:
            - Standard
            - AzureDnsZone
        enable-alw:
            - "true"
            - "false"
        enable-files-aadds:
            - "true"
            - "false"
        enable-files-aadkerb:
            - "true"
            - "false"
        enable-files-adds:
            - "true"
            - "false"
        enable-hierarchical-namespace:
            - "true"
            - "false"
        enable-local-user:
