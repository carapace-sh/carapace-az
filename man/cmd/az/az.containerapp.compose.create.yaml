# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create one or more Container Apps in a new or existing Container App Environment from a Compose specification.
flags:
    --environment=!: Name or resource ID of the container app's environment.
    --registry-password=: The password to log in to container registry.
    --registry-server=: The container registry server hostname, e.g. myregistry.azurecr.io.
    --registry-username=: The username to log in to container registry.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --transport-mapping=:
        description: Transport options per Container App instance (servicename=transportsetting).
        nargs: -1
    -f, --compose-file-path=: Path to a Docker Compose file with the configuration to import to Azure Container Apps.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        compose-file-path: |-
            Path to a Docker Compose file with the configuration to import to Azure Container Apps.

            Default value: ./docker-compose.yml
        environment: Name or resource ID of the container app's environment.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        registry-password: The password to log in to container registry. If stored as a secret, value must start with 'secretref:' followed by the secret name.
        registry-server: The container registry server hostname, e.g. myregistry.azurecr.io.
        registry-username: The username to log in to container registry.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        transport: Option '--transport' has been deprecated and will be removed in a future release. Use '--transport-mapping' instead. Transport options per Container App instance (servicename=transportsetting).
        transport-mapping: Transport options per Container App instance (servicename=transportsetting).
examples:
    Create a container app by explicitly passing in a Compose configuration file.: |-
        az containerapp compose create -g MyResourceGroup \
            --environment MyContainerappEnv \
            --compose-file-path "path/to/docker-compose.yml"
    Create a container app by implicitly passing in a Compose configuration file from current directory.: |-
        az containerapp compose create -g MyResourceGroup \
            --environment MyContainerappEnv
