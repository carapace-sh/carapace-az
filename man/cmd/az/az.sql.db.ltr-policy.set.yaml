# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Updates long term retention for managed database
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        monthly-retention: Retention for the monthly backup. If just a number is passed instead of an ISO 8601 string, days will be assumed as the units.There is a minimum of 7 days and a maximum of 10 years.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        server: Name of the Azure SQL Server. You can configure the default using `az configure --defaults sql-server=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        weekly-retention: Retention for the weekly backup. If just a number is passed instead of an ISO 8601 string, days will be assumed as the units.There is a minimum of 7 days and a maximum of 10 years.
        yearly-retention: Retention for the yearly backup. If just a number is passed instead of an ISO 8601 string, days will be assumed as the units.There is a minimum of 7 days and a maximum of 10 years.
flags:
    --access-tier=: The access tier of a LTR backup.Possible values = [Hot, Archive]
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --make-backups-immutable=:
        description: Whether to make the LTR backups immutable.
        nargs: -1
    --monthly-retention=: Retention for the monthly backup.
    --subscription=: Name or ID of subscription.
    --week-of-year=: The Week of Year, 1 to 52, in which to take the yearly LTR backup.
    --weekly-retention=: Retention for the weekly backup.
    --yearly-retention=: Retention for the yearly backup.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Azure SQL Database.
    -s, --server=: Name of the Azure SQL Server.
completion:
    flag:
        access-tier:
            - Hot
            - Archive
        make-backups-immutable:
            - "true"
            - "false"
