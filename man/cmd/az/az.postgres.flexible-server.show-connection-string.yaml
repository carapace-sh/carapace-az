# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-connection-string
description: Show the connection strings for a PostgreSQL flexible-server database.
documentation:
    flag:
        admin-password: 'The password of the administrator. Minimum 8 characters and maximum 128 characters. Password must contain characters from three of the following categories: English uppercase letters, English lowercase letters, numbers, and non-alphanumeric characters.'
        admin-user: 'Administrator username for the server. Once set, it cannot be changed. '
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --pg-bouncer=: Show connection strings for PgBouncer.
    --subscription=: Name or ID of subscription.
    -d, --database-name=: The name of the database to be created when provisioning the database server
    -p, --admin-password=: The password of the administrator.
    -s, --server-name=: Name of the server.
    -u, --admin-user=: Administrator username for the server.
