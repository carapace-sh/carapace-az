# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates or Updates an Azure Cosmos DB SQL stored procedure
flags:
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Cosmosdb account name.
    -b, --body=!: StoredProcedure body, you can enter it as a string or as a file, e.g., --body @sprocbody-file.json
    -c, --container-name=!: Container name.
    -d, --database-name=!: Database name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: StoredProcedure name
documentation:
    command: Create an SQL stored procedure under an Azure Cosmos DB SQL container.
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        body: StoredProcedure body, you can enter it as a string or as a file, e.g., --body @sprocbody-file.json .
        change-reference: The related change reference ID for this resource operation.
        container-name: Container name.
        database-name: Database name.
        name: StoredProcedure name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create an Azure Cosmos DB SQL stored procedure.: az cosmosdb sql stored-procedure create -g MyResourceGroup -a MyAccount -d MyDatabase -c MyContainer -n MyStoredProcedure -b StoredProcedureBody
