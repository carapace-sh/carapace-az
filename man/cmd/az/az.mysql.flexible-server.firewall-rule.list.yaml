# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all firewall rules for a flexible server.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the server.
documentation:
    flag:
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all firewall rules for a flexible server in table format.: az mysql flexible-server firewall-rule list --resource-group testGroup --name testserver --output table
    List all firewall rules for a flexible server.: az mysql flexible-server firewall-rule list --resource-group testGroup --name testserver
