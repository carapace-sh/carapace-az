# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-sub
description: Lists the metric data for a subscription.
documentation:
    flag:
        auto-adjust-timegrain: When set to true, if the timespan passed in is not supported by this metric, the API will return the result using the closest supported timespan. When set to false, an error is returned for invalid timespan parameters. Defaults to false.
        interval: 'The interval (i.e. timegrain) of the query in ISO 8601 duration format. Defaults to PT1M. Special case for ''FULL'' value that returns single datapoint for entire time span requested. *Examples: PT15M, PT1H, P1D, FULL*'
        order-by: 'The aggregation to use for sorting results and the direction of the sort. Only one order can be specified. Examples: sum asc.'
        result-type: Reduces the set of data collected. The syntax allowed depends on the operation. See the operation's description for details.
        roll-up-by: Dimension name(s) to rollup results by. For example if you only want to see metric values with a filter like 'City eq Seattle or City eq Tacoma' but don't want to see separate values for each city, you can specify 'RollUpBy=City' to see the results for Seattle and Tacoma rolled up into one timeseries.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timespan: The timespan of the query. It is a string with the following format 'startDateTime_ISO/endDateTime_ISO'.
        top: The maximum number of records to retrieve. Valid only if $filter is specified. Defaults to 10.
        validate-dimensions: When set to false, invalid filter parameter values will be ignored. When set to true, an error is returned for invalid filter parameters. Defaults to true.
flags:
    --aggregation=: The list of aggregation types (comma separated) to retrieve.
    --auto-adjust-timegrain=:
        description: When set to true, if the timespan passed in is not supported by this metric, the API will return the result using the closest supported timespan.
        nargs: -1
    --filter=: The **$filter** is used to reduce the set of metric data returned.<br>Example:<br>Metric contains metadata A, B and C.<br>- Return all time series of C where A = a1 and B = b1 or b2<br>**$filter=A eq ‘a1’ and B eq ‘b1’ or B eq ‘b2’ and C eq ‘*’**<br>- Invalid variant:<br>**$filter=A eq ‘a1’ and B eq ‘b1’ and C eq ‘*’ or B = ‘b2’**<br>This is invalid because the logical or operator cannot separate two different metadata names.<br>- Return all time series where A = a1, B = b1 and C = c1:<br>**$filter=A eq ‘a1’ and B eq ‘b1’ and C eq ‘c1’**<br>- Return all time series where A = a1<br>**$filter=A eq ‘a1’ and B eq ‘*’ and C eq ‘*’**.
    --interval=: The interval (i.e. timegrain) of the query in ISO 8601 duration format.
    --metricnames=: The names of the metrics (comma separated) to retrieve.
    --metricnamespace=: Metric namespace where the metrics you want reside.
    --order-by=: The aggregation to use for sorting results and the direction of the sort.
    --region=!: The region where the metrics you want reside.
    --result-type=: Reduces the set of data collected.
    --roll-up-by=: Dimension name(s) to rollup results by.
    --subscription=: Name or ID of subscription.
    --timespan=: The timespan of the query.
    --top=: The maximum number of records to retrieve.
    --validate-dimensions=:
        description: When set to false, invalid filter parameter values will be ignored.
        nargs: -1
completion:
    flag:
        auto-adjust-timegrain:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        result-type:
            - Data
            - Metadata
        validate-dimensions:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
