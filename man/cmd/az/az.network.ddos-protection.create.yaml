# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a DDoS protection plan.
flags:
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vnets=:
        description: Space-separated list of VNets (name or IDs) to associate with the plan.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the DDoS protection plan.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Name of the DDoS protection plan.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        vnets: Space-separated list of VNets (name or IDs) to associate with the plan. This parameter can only be used if all the VNets are within the same subscription as the DDoS protection plan. If this is not the case, set the protection plan on the VNet directly using the ``` az network vnet update ``` command.
examples:
    Create a DDoS protection plan.: az network ddos-protection create -g MyResourceGroup -n MyDdosPlan
    Create a DDoS protection plan. (autogenerated): az network ddos-protection create --location westus2 --name MyDdosPlan --resource-group MyResourceGroup
