# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable
description: Encrypt a VMSS with managed disks.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        key-encryption-keyvault: Name or ID of the key vault containing the key encryption key used to encrypt the disk encryption key. If missing, CLI will use `--disk-encryption-keyvault`.
        name: Scale set name. You can configure the default using `az configure --defaults vmss=<name>`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --disk-encryption-keyvault=!: Name or ID of the key vault where the generated encryption key will be placed.
    --encryption-identity=: Resource Id of the user managed identity which can be used for Azure disk encryption
    --force=: continue by ignoring client side validation errors
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --key-encryption-algorithm=: ""
    --key-encryption-key=: Key vault key name or URL used to encrypt the disk encryption key.
    --key-encryption-keyvault=: Name or ID of the key vault containing the key encryption key used to encrypt the disk encryption key.
    --subscription=: Name or ID of subscription.
    --volume-type=: Type of volume that the encryption operation is performed on
    -g, --resource-group=: Name of resource group.
    -n, --name=: Scale set name.
completion:
    flag:
        volume-type:
            - DATA
            - OS
            - ALL
