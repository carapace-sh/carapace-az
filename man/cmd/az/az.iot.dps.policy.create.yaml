# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new shared access policy in an Azure IoT Hub Device Provisioning Service instance.
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --policy-name=!: A friendly name for DPS access policy.
    --primary-key=: Primary SAS key value, if not provided it will be generated by the service
    --secondary-key=: Secondary SAS key value, if not provided it will be generated by the service
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --dps-name=!: IoT Hub Device Provisioning Service name
    -r, --rights=!:
        description: Access rights for the IoT Hub Device Provisioning Service.
        nargs: -1
completion:
    flag:
        rights:
            - ServiceConfig
            - EnrollmentRead
            - EnrollmentWrite
            - DeviceConnect
            - RegistrationStatusRead
            - RegistrationStatusWrite
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        dps-name: IoT Hub Device Provisioning Service name. --pn --policy-name A friendly name for DPS access policy.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        primary-key: Primary SAS key value, if not provided it will be generated by the service.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rights: |-
            Access rights for the IoT Hub Device Provisioning Service. Use space-separated list for multiple rights.

            Accepted values: DeviceConnect, EnrollmentRead, EnrollmentWrite, RegistrationStatusRead, RegistrationStatusWrite, ServiceConfig
        secondary-key: Secondary SAS key value, if not provided it will be generated by the service.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a new shared access policy in an Azure IoT Hub Device Provisioning Service instance with EnrollmentRead right: az iot dps policy create --dps-name MyDps --resource-group MyResourceGroup --policy-name MyPolicy --rights EnrollmentRead
