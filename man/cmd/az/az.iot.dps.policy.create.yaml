# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new shared access policy in an Azure IoT Hub Device Provisioning Service instance.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        rights: Access rights for the IoT Hub Device Provisioning Service. Use space-separated list for multiple rights.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --policy-name=!: A friendly name for DPS access policy.
    --primary-key=: Primary SAS key value, if not provided it will be generated by the service
    --secondary-key=: Secondary SAS key value, if not provided it will be generated by the service
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --dps-name=!: IoT Hub Device Provisioning Service name
    -r, --rights=!:
        description: Access rights for the IoT Hub Device Provisioning Service.
        nargs: -1
completion:
    flag:
        rights:
            - ServiceConfig
            - EnrollmentRead
            - EnrollmentWrite
            - DeviceConnect
            - RegistrationStatusRead
            - RegistrationStatusWrite
