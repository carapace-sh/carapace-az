# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the specified NetApp account within the resource group
flags:
    --active-directories=:
        description: Active Directories  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --key-name=: The name of KeyVault key.
    --key-source=: The encryption keySource (provider).
    --keyvault-resource-id=: The resource ID of KeyVault.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    --type=: Type of managed service identity (where both SystemAssigned and UserAssigned types are allowed).
    -a, --name=!: The name of the NetApp account
    -g, --resource-group=!: Name of resource group.
    -l, --location=: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    -u, --user-assigned-identity=: The ARM resource identifier of the user assigned identity used to authenticate with key vault.
    -v, --key-vault-uri=: The Uri of KeyVault.
completion:
    flag:
        key-source:
            - Microsoft.KeyVault
            - Microsoft.NetApp
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        type:
            - None
            - SystemAssigned
            - SystemAssigned,UserAssigned
            - UserAssigned
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        active-directories: Active Directories  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        federated-client-id: |-
            ClientId of the multi-tenant AAD Application. Used to access cross-tenant keyvaults.

            Accepted values: None, SystemAssigned, SystemAssigned,UserAssigned, UserAssigned
        key-name: The name of KeyVault key.
        key-source: |-
            The encryption keySource (provider). Possible values (case-insensitive):  Microsoft.NetApp, Microsoft.KeyVault.

            Default value: Microsoft.NetApp

            Accepted values: Microsoft.KeyVault, Microsoft.NetApp
        key-vault-uri: The Uri of KeyVault.
        location: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
        nfs-v4-id-domain: Domain for NFSv4 user ID mapping. This property will be set for all NetApp accounts in the subscription and region and only affect non ldap NFSv4 volumes.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        user-assigned-identity: The ARM resource identifier of the user assigned identity used to authenticate with key vault. Applicable if identity.type has 'UserAssigned'. It should match key of identity.userAssignedIdentities.
examples:
    Create an ANF account: az netappfiles account create -g mygroup --name myname -l location --tags testtag1=mytag1 testtag3=mytagg
    Create an ANF account enabling CMK encryption: az netappfiles account create -g mygroup --name myname -l location --key-source Microsoft.KeyVault --key-name cmkKey --key-vault-uri https://mykvuri.vault.azure.net/ --keyvault-resource-id myKeyVaultResourceId --identity-type UserAssigned --user-assigned-identity '/subscriptions/xxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourcegroups/myrg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/anf-mi'
