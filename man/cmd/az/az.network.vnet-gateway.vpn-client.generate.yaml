# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: generate
description: Generate VPN client configuration.
documentation:
    flag:
        client-root-certificates: Space-separated list of client root certificate public certificate data in Base-64 format. Optional for external Radius-based auth with EAPTLS
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        radius-server-auth-certificate: Public certificate data for the Radius server auth certificate in Base-64 format. Required only if external Radius auth has been configured with EAPTLS auth.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --authentication-method=: Method used to authenticate with the generated client.
    --client-root-certificates=:
        description: Space-separated list of client root certificate public certificate data in Base-64 format.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --processor-architecture=: Processor architecture of the target system.
    --radius-server-auth-certificate=: Public certificate data for the Radius server auth certificate in Base-64 format.
    --subscription=: Name or ID of subscription.
    --use-legacy=:
        description: Generate VPN client package using legacy implementation.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the VNet gateway.
completion:
    flag:
        authentication-method:
            - EAPMSCHAPv2
            - EAPTLS
        processor-architecture:
            - Amd64
            - X86
        use-legacy:
            - "true"
            - "false"
