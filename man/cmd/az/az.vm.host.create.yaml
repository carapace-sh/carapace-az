# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a dedicated host.
flags:
    --auto-replace=:
        description: Replace the host automatically if a failure occurs
        nargs: -1
    --host-group=!: Name of the Dedicated Host Group
    --license-type=: The software license type that will be applied to the VMs deployed on the dedicated host.
    --sku=!: SKU of the dedicated host.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -d, --platform-fault-domain=: Fault domain of the host within a group.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the Dedicated Host
completion:
    flag:
        auto-replace:
            - "true"
            - "false"
        license-type:
            - None
            - Windows_Server_Hybrid
            - Windows_Server_Perpetual
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auto-replace: |-
            Replace the host automatically if a failure occurs.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        host-group: Name of the Dedicated Host Group.
        license-type: |-
            The software license type that will be applied to the VMs deployed on the dedicated host.

            Accepted values: None, Windows_Server_Hybrid, Windows_Server_Perpetual
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` . Otherwise, location will default to the resource group''s location.'
        name: Name of the Dedicated Host.
        platform-fault-domain: 'Fault domain of the host within a group. Allowed values: 0, 1, 2.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: 'SKU of the dedicated host. Available SKUs: https://azure.microsoft.com/pricing/details/virtual-machines/dedicated-host/ .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a dedicated host (autogenerated): az vm host create --auto-replace true --host-group my-host-group --license-type None --location eastasia --name my-host --resource-group my-resource-group --sku DSv3-Type1
    Create a dedicated host in the 'east asia' region. Don't auto replace on failure.: |-
        az vm host create --host-group my-host-group --name my-host --platform-fault-domain 0 \
            --auto-replace false --resource-group my-resource-group --sku ESv3-Type1 --location eastasia
    Create a dedicated host. Ensure it auto replaces on failure: |-
        az vm host create --host-group my-host-group --name my-host --platform-fault-domain 2 \
            --auto-replace --resource-group my-resource-group --sku DSv3-Type1
