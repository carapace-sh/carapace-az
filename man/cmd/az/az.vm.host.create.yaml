# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a dedicated host.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`. Otherwise, location will default to the resource group''s location'
        platform-fault-domain: 'Fault domain of the host within a group. Allowed values: 0, 1, 2'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        sku: 'SKU of the dedicated host. Available SKUs: https://azure.microsoft.com/pricing/details/virtual-machines/dedicated-host/'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --auto-replace=:
        description: Replace the host automatically if a failure occurs
        nargs: -1
    --host-group=!: Name of the Dedicated Host Group
    --license-type=: The software license type that will be applied to the VMs deployed on the dedicated host.
    --sku=!: SKU of the dedicated host.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -d, --platform-fault-domain=: Fault domain of the host within a group.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the Dedicated Host
completion:
    flag:
        auto-replace:
            - "true"
            - "false"
        license-type:
            - None
            - Windows_Server_Hybrid
            - Windows_Server_Perpetual
