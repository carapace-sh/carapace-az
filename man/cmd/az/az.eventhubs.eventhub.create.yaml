# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates the EventHubs Eventhub
flags:
    --archive-name-format=: Blob naming convention for archive, e.g. {Namespace}/{EventHub}/{PartitionId}/{Year}/{Month}/{Day}/{Hour}/{Minute}/{Second}.
    --blob-container=: Blob container Name
    --capture-interval=: Allows you to set the frequency with which the capture to Azure Blobs will happen, value should between 60 to 900 seconds
    --capture-size-limit=: Defines the amount of data built up in your Event Hub before an capture operation, value should be between 10485760 to 524288000 bytes
    --cleanup-policy=: Enumerates the possible values for cleanup policy
    --destination-name=: Name for capture destination, should be EventHubArchive.AzureBlockBlob.
    --enable-capture=:
        description: A boolean value that indicates whether capture is enabled.
        nargs: -1
    --mi-system-assigned=:
        description: Enable System Assigned Identity
        nargs: -1
    --mi-user-assigned=: List of User Assigned Identity ids.
    --min-lag=: The minimum time a message will remain ineligible for compaction in the log.
    --namespace-name=!: name of Namespace
    --partition-count=: Number of partitions created for the Event Hub.
    --retention-time-in-hours=: Number of hours to retain the events for this Event Hub.
    --skip-empty-archives=:
        description: A boolean value that indicates whether to Skip Empty.
        nargs: -1
    --status=: Status of Eventhub
    --storage-account=: Name (if within same resource group and not of type Classic Storage) or ARM id of the storage account to be used to create the blobs
    --subscription=: Name or ID of subscription.
    --timestamp-type=: Denotes the type of timestamp the message will hold.
    --tombstone-retention-time-in-hours=: Number of hours to retain the tombstone markers of a compacted Event Hub.
    --user-metadata=: Gets and Sets Metadata of User.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of Eventhub
completion:
    flag:
        cleanup-policy:
            - Delete
            - Compact
            - DeleteOrCompact
        enable-capture:
            - "true"
            - "false"
        mi-system-assigned:
            - "true"
            - "false"
        skip-empty-archives:
            - "true"
            - "false"
        status:
            - Active
            - Disabled
            - SendDisabled
        timestamp-type:
            - Create
            - LogAppend
documentation:
    command: Creates the EventHubs Eventhub.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        archive-name-format: Blob naming convention for archive, e.g. {Namespace}/{EventHub}/{PartitionId}/{Year}/{Month}/{Day}/{Hour}/{Minute}/{Second}. Here all the parameters (Namespace,EventHub .. etc) are mandatory irrespective of order.
        blob-container: Blob container Name.
        capture-interval: Allows you to set the frequency with which the capture to Azure Blobs will happen, value should between 60 to 900 seconds.
        capture-size-limit: Defines the amount of data built up in your Event Hub before an capture operation, value should be between 10485760 to 524288000 bytes.
        change-reference: The related change reference ID for this resource operation.
        cleanup-policy: |-
            Enumerates the possible values for cleanup policy.

            Accepted values: Compact, Delete, DeleteOrCompact
        destination-name: Name for capture destination, should be EventHubArchive.AzureBlockBlob.
        enable-capture: |-
            A boolean value that indicates whether capture is enabled.

            Accepted values: false, true
        mi-system-assigned: |-
            Enable System Assigned Identity.

            Default value: False

            Accepted values: false, true
        mi-user-assigned: List of User Assigned Identity ids.
        min-lag: The minimum time a message will remain ineligible for compaction in the log. This value is used when cleanupPolicy is Compact or DeleteOrCompact.
        name: Name of Eventhub.
        namespace-name: Name of Namespace.
        partition-count: Number of partitions created for the Event Hub. By default, allowed values are 2-32. Lower value of 1 is supported with Kafka enabled namespaces. In presence of a custom quota, the upper limit will match the upper limit of the quota. --retention-time --retention-time-in-hours Number of hours to retain the events for this Event Hub. This value is only used when cleanupPolicy is Delete. If cleanupPolicy is Compaction the returned value of this property is Long.MaxValue.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        retention-time-in-hours: Number of hours to retain the events for this Event Hub. This value is only used when cleanupPolicy is Delete. If cleanupPolicy is Compaction the returned value of this property is Long.MaxValue
        skip-empty-archives: |-
            A boolean value that indicates whether to Skip Empty.

            Accepted values: false, true
        status: |-
            Status of Eventhub.

            Accepted values: Active, Disabled, SendDisabled
        storage-account: Name (if within same resource group and not of type Classic Storage) or ARM id of the storage account to be used to create the blobs.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timestamp-type: |-
            Denotes the type of timestamp the message will hold.

            Accepted values: Create, LogAppend
        tombstone-retention-time-in-hours: Number of hours to retain the tombstone markers of a compacted Event Hub. This value is only used when cleanupPolicy is Compaction. Consumer must complete reading the tombstone marker within this specified amount of time if consumer begins from starting offset to ensure they get a valid snapshot for the specific key described by the tombstone marker within the compacted Event Hub
        user-metadata: Gets and Sets Metadata of User.
examples:
    Create a new Eventhub.: az eventhubs eventhub create --resource-group myresourcegroup --namespace-name mynamespace --name myeventhub --cleanup-policy Delete --partition-count 15
