# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all the topics in a namespace.
flags:
    --namespace-name=!: The namespace name
    --skip=: Skip is only used if a previous operation returned a partial result.
    --subscription=: Name or ID of subscription.
    --top=: May be used to limit the number of results to the most recent N usageDetails.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        namespace-name: The namespace name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        skip: Skip is only used if a previous operation returned a partial result. If a previous response contains a nextLink element, the value of the nextLink element will include a skip parameter that specifies a starting point to use for subsequent calls.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        top: May be used to limit the number of results to the most recent N usageDetails.
