# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Azure Cosmos DB Cassandra table
flags:
    --analytical-storage-ttl=: Analytical TTL, when analytical storage is enabled.
    --max-throughput=: The maximum throughput resource can scale to (RU/s).
    --schema=!: 'Schema, you can enter it as a string or as a file, e.g., --schema @schema-file.json or --schema "{\"columns\": [{\"name\": \"columnA\",\"type\": \"uuid\"}, {\"name\": \"columnB\",\"type\": \"Ascii\"}],\"partitionKeys\": [{\"name\": \"columnA\"}]}"'
    --subscription=: Name or ID of subscription.
    --throughput=: The throughput of Cassandra table (RU/s).
    --ttl=: Default TTL.
    -a, --account-name=!: Cosmosdb account name.
    -g, --resource-group=!: Name of resource group.
    -k, --keyspace-name=!: Keyspace name
    -n, --name=!: Table name
documentation:
    command: Create an Cassandra table under an Azure Cosmos DB Cassandra keyspace.
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        analytical-storage-ttl: Analytical TTL, when analytical storage is enabled.
        change-reference: The related change reference ID for this resource operation.
        keyspace-name: Keyspace name.
        max-throughput: The maximum throughput resource can scale to (RU/s). Provided when the resource is autoscale enabled. The minimum value can be 4000 (RU/s).
        name: Table name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        schema: |
            Schema, you can enter it as a string or as a file, e.g., --schema @schema-file.json or --schema "{\"columns\": [{\"name\": \"columnA\",\"type\": \"uuid\"}, {\"name\": \"columnB\",\"type\": \"Ascii\"}],\"partitionKeys\": [{\"name\": \"columnA\"}]}"
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        throughput: The throughput of Cassandra table (RU/s). Default value is 400. Omit this parameter if the keyspace has shared throughput unless the table should have dedicated throughput.
        ttl: Default TTL. If the value is missing or set to "-1", items don’t expire. If the value is set to "n", items will expire "n" seconds after last modified time.
examples:
    Create an Azure Cosmos DB Cassandra table.: az cosmosdb cassandra table create -g MyResourceGroup -a MyAccount -k MyKeyspace -n MyTable --schema @indexes-file.json --throughput "500" --ttl 1000
