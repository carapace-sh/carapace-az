# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: capture
description: Capture information for a stopped VM.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --overwrite=: Overwrite the existing disk file.
    --storage-container=: The storage account container name in which to save the disks.
    --subscription=: Name or ID of subscription.
    --vhd-name-prefix=!: The VHD name prefix specify for the VM disks.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Virtual Machine.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Virtual Machine. You can configure the default using `az configure --defaults vm=<name>`
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        overwrite: |-
            Overwrite the existing disk file.

            Default value: True

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        storage-container: |-
            The storage account container name in which to save the disks.

            Default value: vhds
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vhd-name-prefix: The VHD name prefix specify for the VM disks.
examples:
    Deallocate, generalize, and capture a stopped virtual machine.: |-
        az vm deallocate -g MyResourceGroup -n MyVm
        az vm generalize -g MyResourceGroup -n MyVm
        az vm capture -g MyResourceGroup -n MyVm --vhd-name-prefix MyPrefix
    Deallocate, generalize, and capture multiple stopped virtual machines.: |-
        az vm deallocate --ids MyVmIds
        az vm generalize --ids MyVmIds
        az vm capture --ids MyVmIds --vhd-name-prefix MyPrefix
