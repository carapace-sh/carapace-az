# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all private link resources of a private link scope resource.
flags:
    --max-items=: Total number of items to return in the command's output.
    --next-token=: Token to specify where to start paginating.
    --scope-name=!: Name of the Azure Monitor Private Link Scope.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    command: |-
        Command group 'az monitor private-link-scope private-link-resource' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scope-name: Name of the Azure Monitor Private Link Scope.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all private link resources of a private link scope resource.: az monitor private-link-scope private-link-resource list --scope-name MyScope -g MyResourceGroup
