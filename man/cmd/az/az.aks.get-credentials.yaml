# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: get-credentials
description: Get access credentials for a managed Kubernetes cluster.
flags:
    --context=: If specified, overwrite the default context name.
    --format=: Specify the format of the returned credential.
    --overwrite-existing=: Overwrite any existing cluster entry with the same name.
    --public-fqdn=: Get private cluster credential with server address to be public fqdn.
    --subscription=: Name or ID of subscription.
    -a, --admin=: ""
    -f, --file=: ""
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the managed cluster.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        admin: |-
            Get cluster administrator credentials.  Default: cluster user credentials. On clusters with Azure Active Directory integration, this bypasses normal Azure AD authentication and can be used if you're permanently blocked by not having access to a valid Azure AD group with access to your cluster. Requires 'Azure Kubernetes Service Cluster Admin' role.

            Default value: False
        aks-custom-headers: Send custom headers. When specified, format should be Key1=Value1,Key2=Value2.
        change-reference: The related change reference ID for this resource operation.
        context: If specified, overwrite the default context name. The `--admin` parameter takes precedence over `--context`
        file: |-
            Kubernetes configuration file to update. Use "-" to print YAML to stdout instead.

            Default value: ~\.kube\config
        format: |-
            Specify the format of the returned credential. Available values are ["exec", "azure"]. Only take effect when requesting clusterUser credential of AAD clusters.

            Accepted values: azure, exec
        name: Name of the managed cluster.
        overwrite-existing: |-
            Overwrite any existing cluster entry with the same name.

            Default value: False
        public-fqdn: |-
            Get private cluster credential with server address to be public fqdn.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user: |-
            Get credentials for the user. Only valid when --admin is False.  Default: cluster user credentials.

            Default value: clusterUser
examples:
    Get access credentials for a managed Kubernetes cluster. (autogenerated): az aks get-credentials --name MyManagedCluster --resource-group MyResourceGroup
