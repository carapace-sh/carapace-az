# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: get-credentials
description: Get access credentials for a managed Kubernetes cluster.
documentation:
    flag:
        context: If specified, overwrite the default context name. The `--admin` parameter takes precedence over `--context`
        format: Specify the format of the returned credential. Available values are ["exec", "azure"]. Only take effect when requesting clusterUser credential of AAD clusters.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --context=: If specified, overwrite the default context name.
    --format=: Specify the format of the returned credential.
    --overwrite-existing=: Overwrite any existing cluster entry with the same name.
    --public-fqdn=: Get private cluster credential with server address to be public fqdn.
    --subscription=: Name or ID of subscription.
    -a, --admin=: ""
    -f, --file=: ""
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the managed cluster.
