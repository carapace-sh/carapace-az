# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Change the  upgrade type for a cluster.
flags:
    --subscription=: Name or ID of subscription.
    --upgrade-mode=!: cluster upgrade mode
    --version=: cluster code version
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
completion:
    flag:
        upgrade-mode:
            - manual
            - automatic
documentation:
    command: Change the upgrade type for a cluster.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        upgrade-mode: |-
            Cluster upgrade mode.

            Accepted values: automatic, manual
        version: Cluster code version.
examples:
    Set a cluster to use the 'Automatic' upgrade mode.: az sf cluster upgrade-type set -g group-name -c cluster1 --upgrade-mode Automatic
