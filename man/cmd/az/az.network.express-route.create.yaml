# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an express route circuit.
documentation:
    flag:
        allow-classic-operations: 'Allow classic operations. Allowed values: false, true.'
        bandwidth: 'Bandwidth of the circuit. Usage: INT {Mbps,Gbps}. Defaults to Mbps.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        peering-location: 'Name of the peering location.  Values from: az network express-route list-service-providers.'
        provider: 'Name of the ExpressRoute Service Provider.  Values from: az network express-route list-service-providers.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        sku-family: 'Chosen SKU family of ExpressRoute circuit.  Allowed values: MeteredData, UnlimitedData.  Default: MeteredData.'
        sku-tier: 'SKU Tier of ExpressRoute circuit.  Allowed values: Basic, Local, Premium, Standard.  Default: Standard.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
flags:
    --allow-classic-operations=:
        description: Allow classic operations.
        nargs: -1
    --allow-global-reach=:
        description: Enable global reach on the circuit.
        nargs: -1
    --bandwidth=:
        description: Bandwidth of the circuit.
        nargs: -1
    --express-route-port=: Name or ID of an ExpressRoute port.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --peering-location=: Name of the peering location.
    --provider=: Name of the ExpressRoute Service Provider.
    --sku-family=: Chosen SKU family of ExpressRoute circuit.
    --sku-tier=: SKU Tier of ExpressRoute circuit.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: ExpressRoute circuit name.
completion:
    flag:
        allow-classic-operations:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        allow-global-reach:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        sku-family:
            - MeteredData
            - UnlimitedData
        sku-tier:
            - Basic
            - Local
            - Premium
            - Standard
