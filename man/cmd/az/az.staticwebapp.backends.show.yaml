# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show details on the backend linked to a static web app
flags:
    --environment-name=: Name of the environment of static site
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the static site
documentation:
    command: Show details on the backend linked to a static web app.
    flag:
        environment-name: |-
            Name of the environment of static site.

            Default value: default
        name: Name of the static site.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show static web app backends for environment.: az staticwebapp backends show -n MyStaticAppName -g MyResourceGroup --environment-name MyEnvironmentName
    Show static web app backends.: az staticwebapp backends show -n MyStaticAppName -g MyResourceGroup
