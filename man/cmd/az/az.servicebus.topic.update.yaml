# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a topic in the specified namespace.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        auto-delete-on-idle: ISO 8601 timespan idle interval after which the topic is automatically deleted. The minimum duration is 5 minutes.
        default-message-time-to-live: ISO 8601 Default message timespan to live value. This is the duration after which the message expires, starting from when the message is sent to Service Bus. This is the default value used when TimeToLive is not set on a message itself.
        duplicate-detection-history-time-window: ISO 8601 timeSpan structure that defines the duration of the duplicate detection history. The default value is 10 minutes.
        enable-express: Value that indicates whether Express Entities are enabled. An express topic holds a message in memory temporarily before writing it to persistent storage.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        max-message-size: Maximum size (in KB) of the message payload that can be accepted by the topic. This property is only used in Premium today and default is 1024.
        max-size: Maximum size of the topic in megabytes, which is the size of the memory allocated for the topic. Default is 1024.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --auto-delete-on-idle=: ISO 8601 timespan idle interval after which the topic is automatically deleted.
    --default-message-time-to-live=: ISO 8601 Default message timespan to live value.
    --duplicate-detection=:
        description: A value indicating if this queue requires duplicate detection.
        nargs: -1
    --enable-batched-operations=:
        description: Value that indicates whether server-side batched operations are enabled.
        nargs: -1
    --enable-express=:
        description: Value that indicates whether Express Entities are enabled.
        nargs: -1
    --enable-ordering=:
        description: Value that indicates whether the topic supports ordering.
        nargs: -1
    --enable-partitioning=:
        description: Value that indicates whether the topic to be partitioned across multiple message brokers is enabled.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --max-message-size=: Maximum size (in KB) of the message payload that can be accepted by the topic.
    --max-size=: Maximum size of the topic in megabytes, which is the size of the memory allocated for the topic.
    --namespace-name=: The namespace name
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --status=: Enumerates the possible values for the status of a messaging entity.
    --subscription=: Name or ID of subscription.
    -d, --duplicate-detection-history-time-window=: ISO 8601 timeSpan structure that defines the duration of the duplicate detection history.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The topic name.
completion:
