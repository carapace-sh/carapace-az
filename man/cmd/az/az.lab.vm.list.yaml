# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List virtual machines in a given lab.
flags:
    --all=:
        description: List all virtual machines in the lab.
        nargs: -1
    --claimable=:
        description: List only claimable virtual machines in the lab.
        nargs: -1
    --environment=: Name or ID of the environment to list virtual machines in.
    --expand=: Specify the $expand query.
    --filters=: The filter to apply to the operation.
    --lab-name=!: The name of the lab.
    --max-items=: Total number of items to return in the command's output.
    --next-token=: Token to specify where to start paginating.
    --object-id=: Object ID of the owner to list VMs for.
    --order-by=: The ordering expression for the results, using OData notation.
    --subscription=: Name or ID of subscription.
    --top=: The maximum number of resources to return from the operation.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        all:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        claimable:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: |-
        Command group 'lab' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        all: List all virtual machines in the lab. Cannot be used with `--filters`.
        claimable: List only claimable virtual machines in the lab. Cannot be used with `--filters`.
        environment: Name or ID of the environment to list virtual machines in. Cannot be used with `--filters`.
        expand: 'Specify the $expand query. Example: ''"properties($expand=artifacts,computeVm,networkInterface,applicableSchedule)"''.'
        filters: 'The filter to apply to the operation. Example: ''$filter=contains(name,''myName'').'
        lab-name: The name of the lab.
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        object-id: Object ID of the owner to list VMs for.
        order-by: 'The ordering expression for the results, using OData notation. Example: ''$orderby=name desc''.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        top: 'The maximum number of resources to return from the operation. Example: ''$top=10''.'
examples:
    List the VMs in an Azure DevTest Lab.: az lab vm list --lab-name MyLab --resource-group MyResourceGroup
