# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show the properties of a lock
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
    --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
    --resource-type=: 'The resource type (Ex: ''resC'').'
    --resource=: Name or ID of the resource being locked.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the lock
documentation:
    command: Show the properties of a lock.
    flag:
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
        name: Name of the lock.
        namespace: 'Provider namespace (Ex: ''Microsoft.Provider'').'
        parent: 'The parent path (Ex: ''resA/myA/resB/myB''). --resource --resource-name Name or ID of the resource being locked. If an ID is given, other resource arguments should not be given.'
        resource: Name or ID of the resource being locked. If an ID is given, other resource arguments should not be given.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'The resource type (Ex: ''resC''). Can also accept namespace/type format (Ex: ''Microsoft.Provider/resC'').'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show a subscription level lock: az lock show -n lockname
    Show the properties of a lock (autogenerated): az lock show --name lockname --resource-group MyResourceGroup --resource-name MyResource --resource-type Microsoft.Network/virtualNetworks
