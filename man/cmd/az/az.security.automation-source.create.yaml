# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates security automation source.
flags:
    --event-source=!: A valid event source type
    --rule-sets=: A set of rules which evaluate upon event interception.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        event-source: A valid event source type.
        rule-sets: A set of rules which evaluate upon event interception. A logical disjunction is applied between defined rule sets (logical "or").
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Creates security automation source.: az security automation-source create --event-source 'Assessments'
