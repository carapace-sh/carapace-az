# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-primary
description: Fails over a database by setting the specified database as the new primary.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        server: Name of the server containing the secondary replica that will become the new primary. You can configure the default using `az configure --defaults sql-server=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --allow-data-loss=: If specified, the failover operation will allow data loss.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of the resource group containing the secondary replica that will become the new primary.
    -n, --name=: Name of the database to fail over.
    -s, --server=: Name of the server containing the secondary replica that will become the new primary.
