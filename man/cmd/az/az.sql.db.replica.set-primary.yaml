# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-primary
description: Fails over a database by setting the specified database as the new primary.
flags:
    --allow-data-loss=: If specified, the failover operation will allow data loss.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of the resource group containing the secondary replica that will become the new primary.
    -n, --name=: Name of the database to fail over.
    -s, --server=: Name of the server containing the secondary replica that will become the new primary.
documentation:
    command: Set the primary replica database by failing over from the current primary replica database.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allow-data-loss: |-
            If specified, the failover operation will allow data loss.

            Default value: False
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the database to fail over.
        resource-group: Name of the resource group containing the secondary replica that will become the new primary.
        server: Name of the server containing the secondary replica that will become the new primary. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Set the primary replica database by failing over from the current primary replica database. (autogenerated): az sql db replica set-primary --allow-data-loss --name MyDatabase --resource-group MyResourceGroup --server myserver --subscription MySubscription
