# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show a test configuration from a connection monitor.
flags:
    --connection-monitor=!: Connection monitor name.
    --subscription=: Name or ID of subscription.
    -l, --location=!: Location.
    -n, --name=!: The name of the connection monitor test configuration.
documentation:
    command: |-
        Command group 'az network watcher connection-monitor test-configuration' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        connection-monitor: Connection monitor name.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` . --name --test-configuration-name -n The name of the connection monitor test configuration.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show a test configuration from a connection monitor.: az network watcher connection-monitor test-configuration show --connection-monitor MyConnectionMonitor --location westus2 --name MyConnectionMonitorTestConfiguration
