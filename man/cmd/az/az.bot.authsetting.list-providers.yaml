# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-providers
description: Gets supported OAuth Service providers.
flags:
    --provider-name=: Service provider name for which to fetch details.
    --subscription=: Name or ID of subscription.
documentation:
    command: List details for all service providers available for creating OAuth connection settings.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        provider-name: Service provider name for which to fetch details.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Filter by a particular type of service provider.: az bot authsetting list-providers --provider-name google
    List all service providers.: az bot authsetting list-providers
