# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: grant
description: Grant the app an API Delegated permissions
documentation:
    flag:
        api: The id of the resource service principal to which access is authorized. This identifies the API which the client is authorized to attempt to call on behalf of a signed-in user.
        consent-type: Indicates whether authorization is granted for the client application to impersonate all users or only a specific user. 'AllPrincipals' indicates authorization to impersonate all users. 'Principal' indicates authorization to impersonate a specific user. Consent on behalf of all users can be granted by an administrator. Non-admin users may be authorized to consent on behalf of themselves in some cases, for some delegated permissions.
        principal-id: The id of the user on behalf of whom the client is authorized to access the resource, when consentType is 'Principal'. If consentType is 'AllPrincipals' this value is null. Required when consentType is 'Principal'.
        scope: A space-separated list of the claim values for delegated permissions which should be included in access tokens for the resource application (the API). For example, openid User.Read GroupMember.Read.All. Each claim value should match the value field of one of the delegated permissions defined by the API, listed in the oauth2PermissionScopes property of the resource service principal.
flags:
    --api=!: The id of the resource service principal to which access is authorized.
    --consent-type=: Indicates whether authorization is granted for the client application to impersonate all users or only a specific user.
    --id=!: The id of the client service principal for the application which is authorized to act on behalf of a signed-in user when accessing an API.
    --principal-id=: The id of the user on behalf of whom the client is authorized to access the resource, when consentType is 'Principal'.
    --scope=!:
        description: A space-separated list of the claim values for delegated permissions which should be included in access tokens for the resource application (the API).
        nargs: -1
completion:
    flag:
        consent-type:
            - AllPrincipals
            - Principal
