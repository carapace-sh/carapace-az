# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-types
description: Returns all of the resource types that can be linked to a Private Endpoint in this subscription in this region.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.  When not specified, the location of the resource group will be used.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
