# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets the account keys for the specified Batch account.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of the resource group
    -n, --name=!: Name of the Batch account.
documentation:
    command: Gets the account keys for the specified Batch account. This operation applies only to Batch accounts with allowedAuthenticationModes containing 'SharedKey'. If the Batch account doesn't contain 'SharedKey' in its allowedAuthenticationMode, clients cannot use shared keys to authenticate, and must use another allowedAuthenticationModes instead. In this case, getting the keys will fail.
    flag:
        name: Name of the Batch account.
        resource-group: Name of the resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
