# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add-record
description: Add a DS record.
documentation:
    flag:
        algorithm: 'The security algorithm type represents the standard security algorithm number of the DNSKEY Resource Record. See: https://www.iana.org/assignments/dns-sec-alg-numbers/dns-sec-alg-numbers.xhtml'
        digest-type: 'The digest algorithm type represents the standard digest algorithm number used to construct the digest. See: https://www.iana.org/assignments/ds-rr-types/ds-rr-types.xhtml'
        record-set-name: The name of the record set relative to the zone. Creates a new record set if one does not exist.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --algorithm=!: The security algorithm type represents the standard security algorithm number of the DNSKEY Resource Record.
    --digest-type=!: The digest algorithm type represents the standard digest algorithm number used to construct the digest.
    --digest=!: The digest value is a cryptographic hash value of the referenced DNSKEY Resource Record.
    --if-none-match=: Create the record set only if it does not already exist.
    --key-tag=!: The key tag value is used to determine which DNSKEY Resource Record is used for signature verification.
    --subscription=: Name or ID of subscription.
    --ttl=: Record set TTL (time-to-live)
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -z, --zone-name=!: The name of the zone.
