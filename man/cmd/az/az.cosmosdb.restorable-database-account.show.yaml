# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Retrieves the properties of an existing Azure Cosmos DB restorable database account.
flags:
    --subscription=: Name or ID of subscription.
    -i, --instance-id=: InstanceId of the Account
    -l, --location=: Location
documentation:
    command: Show the details of a database account that can be restored.
    flag:
        instance-id: InstanceId of the Account.
        location: Location.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
