# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a virtual network link's properties.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --if-match=: ETag of the virtual network link to the private DNS zone.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --resolution-policy=: The resolution policy on the virtual network link.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags for the virtual network link.
        nargs: -1
    -e, --registration-enabled=:
        description: Specify if the link is registration enabled.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the virtual network link to the specified private DNS zone.
    -z, --zone-name=: Name of the private DNS zone.
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        registration-enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        resolution-policy:
            - Default
            - NxDomainRedirect
documentation:
    command: Update a virtual network link's properties. Does not modify virtual network within the link.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        if-match: ETag of the virtual network link to the private DNS zone. Omit this value to always overwrite the current virtual network link. Specify the last-seen ETag value to prevent accidentally overwriting any concurrent changes.
        name: Name of the virtual network link to the specified private DNS zone.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        registration-enabled: |-
            Specify if the link is registration enabled.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resolution-policy: |-
            The resolution policy on the virtual network link. Only applicable for virtual network links to privatelink zones, and for A,AAAA,CNAME queries. When set to 'NxDomainRedirect', Azure DNS resolver falls back to public resolution if private dns query resolution results in non-existent domain response.

            Accepted values: Default, NxDomainRedirect
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags for the virtual network link.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        zone-name: Name of the private DNS zone.
examples:
    Update a virtual network link properties to enable registration.: az network private-dns link vnet update -g MyResourceGroup -n MyLinkName -z www.mysite.com -e True
