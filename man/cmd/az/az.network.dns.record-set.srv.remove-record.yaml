# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove-record
description: Remove an SRV record from its record set.
flags:
    --keep-empty-record-set=: Keep the empty record set if the last record is removed.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -p, --priority=!: Priority metric.
    -r, --port=!: Service port.
    -t, --target=!: Target domain name.
    -w, --weight=!: Weight metric.
    -z, --zone-name=!: The name of the zone.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        keep-empty-record-set: |-
            Keep the empty record set if the last record is removed.

            Default value: False
        port: Service port.
        priority: Priority metric.
        record-set-name: The name of the record set relative to the zone.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target: Target domain name.
        weight: Weight metric.
        zone-name: The name of the zone.
examples:
    Remove an SRV record from its record set.: |-
        az network dns record-set srv remove-record -g MyResourceGroup -z www.mysite.com \
            -n MyRecordSet -t webserver.mysite.com -r 8081 -p 10 -w 10
