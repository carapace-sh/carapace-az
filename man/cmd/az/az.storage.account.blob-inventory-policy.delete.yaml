# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete Blob Inventory Policy associated with the specified storage account.
flags:
    --account-name=!: The name of the storage account within the specified resource group.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: |-
        Command group 'storage account blob-inventory-policy' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete Blob Inventory Policy associated with the specified storage account without prompt.: az storage account blob-inventory-policy delete -g ResourceGroupName --account-name storageAccountName -y
