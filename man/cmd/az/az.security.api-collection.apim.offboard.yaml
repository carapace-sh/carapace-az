# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: offboard
description: Offboard an Azure API Management API from Microsoft Defender for APIs.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --service-name=: The name of the API Management service.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: API revision identifier.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: |-
        Command group 'az security api-collection apim' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: API revision identifier. Must be unique in the API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Onboard an Azure API Management API to Microsoft Defender for APIs.: az security api-collection apim offboard --resource-group MyResourceGroup --service-name MyApiManagementServiceName --api-id echo-api
