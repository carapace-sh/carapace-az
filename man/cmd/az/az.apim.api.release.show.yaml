# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Returns the details of an API release.
flags:
    --api-id=!: API identifier.
    --release-id=!: Release identifier within an API.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    flag:
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        release-id: Release identifier within an API. Must be unique in the current API Management service instance.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Returns the details of an API release.: az apim api release show --resource-group MyResourceGroup --service-name MyServiceName --api-id MyApiId --release-id MyReleaseId
