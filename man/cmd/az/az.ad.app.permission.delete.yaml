# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Remove an API permission
documentation:
    flag:
        api: requiredResourceAccess.resourceAppId - The unique identifier for the resource that the application requires access to. This should be equal to the appId declared on the target resource application.
        api-permissions: Specify `ResourceAccess.id` - The unique identifier for one of the OAuth2Permission or AppRole instances that the resource application exposes. Space-separated list of `<resource-access-id>`.
flags:
    --api-permissions=:
        description: Specify `ResourceAccess.id` - The unique identifier for one of the OAuth2Permission or AppRole instances that the resource application exposes.
        nargs: -1
    --api=!: requiredResourceAccess.resourceAppId - The unique identifier for the resource that the application requires access to.
    --id=!: identifier uri, application id, or object id
