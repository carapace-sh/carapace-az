# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Adds an application to the specified Batch account.
flags:
    --application-name=!: The name of the application.
    --parameters=: The parameters for the request.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of the resource group
    -n, --name=!: Name of the Batch account.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        application-name: The name of the application. This must be unique within the account. Required.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the Batch account.
        parameters: The parameters for the request. Is either a Application type or a IO type. Default value is None.
        resource-group: Name of the resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a Batch application with the specified parameters.: az batch application create -g MyResourceGroup -n batch --application-name app
