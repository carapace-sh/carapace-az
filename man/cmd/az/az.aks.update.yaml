# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a managed Kubernetes cluster.
documentation:
    flag:
        api-server-authorized-ip-ranges: Comma-separated list of authorized apiserver IP ranges. Set to "" to allow all traffic on a previously restricted cluster. Set to 0.0.0.0/32 to restrict apiserver traffic to node pools.
        assign-kubelet-identity: Update cluster's kubelet identity to an existing user assigned identity. Please note this operation will recreate all agent nodes in the cluster.
        bootstrap-container-registry-resource-id: Configure container registry resource ID. Must use "Cache" as bootstrap artifact source.
        cluster-autoscaler-profile: Comma-separated list of key=value pairs for configuring cluster autoscaler. Pass an empty string to clear the profile.
        disable-azure-monitor-metrics: Disable Azure Monitor Metrics Profile. This will delete all DCRA's associated with the cluster, any linked DCRs with the data stream = prometheus-stream and the recording rule groups created by the addon for this AKS cluster.
        disable-secret-rotation: Disable secret rotation. Use with azure-keyvault-secrets-provider addon.
        enable-acns: Enable advanced network functionalities on a cluster. Enabling this will incur additional costs. For non-cilium clusters, acns security will be disabled by default until further notice.
        enable-cost-analysis: Enable exporting Kubernetes Namespace and Deployment details to the Cost Analysis views in the Azure portal. For more information see aka.ms/aks/docs/cost-analysis.
        enable-secret-rotation: Enable secret rotation. Use with azure-keyvault-secrets-provider addon.
        if-match: The value provided will be compared to the ETag of the managed cluster, if it matches the operation will proceed. If it does not match, the request will be rejected to prevent accidental overwrites. This must not be specified when creating a new cluster.
        if-none-match: Set to '*' to allow a new cluster to be created, but to prevent updating an existing cluster. Other values will be ignored.
        ksm-metric-annotations-allow-list: Comma-separated list of additional Kubernetes label keys that will be used in the resource' labels metric. By default the metric contains only name and namespace labels. To include additional labels provide a list of resource names in their plural form and Kubernetes label keys you would like to allow for them (e.g.'=namespaces=[k8s-label-1,k8s-label-n,...],pods=[app],...)'. A single '*' can be provided per resource instead to allow any labels, but that has severe performance implications (e.g. '=pods=[*]').
        ksm-metric-labels-allow-list: Comma-separated list of additional Kubernetes label keys that will be used in the resource' labels metric. By default the metric contains only name and namespace labels. To include additional labels provide a list of resource names in their plural form and Kubernetes label keys you would like to allow for them (e.g. '=namespaces=[k8s-label-1,k8s-label-n,...],pods=[app],...)'. A single '*' can be provided per resource instead to allow any labels, but that has severe performance implications (e.g. '=pods=[*]').
        max-count: Maximum nodes count used for autoscaler, when "--enable-cluster-autoscaler" specified. Please specify the value in the range of [1, 1000]
        min-count: Minimum nodes count used for autoscaler, when "--enable-cluster-autoscaler" specified. Please specify the value in the range of [1, 1000]
        node-os-upgrade-channel: Manner in which the OS on your nodes is updated. It could be NodeImage, None, SecurityPatch or Unmanaged.
        nodepool-labels: 'space-separated labels: key[=value] [key[=value] ...]. See https://aka.ms/node-labels for syntax of labels.'
        pod-cidr: Update the pod CIDR for a cluster. Used when updating a cluster from Azure CNI to Azure CNI Overlay.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        rotation-poll-interval: Set interval of rotation poll. Use with azure-keyvault-secrets-provider addon.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tier: Specify SKU tier for managed clusters. '--tier standard' enables a standard managed cluster service with a financially backed SLA. '--tier free' changes a standard managed cluster to a free one.
        upgrade-override-until: Until when the cluster upgradeSettings overrides are effective. It needs to be in a valid date-time format that's within the next 30 days. For example, 2023-04-01T13:00:00Z. Note that if --force-upgrade is set to true and --upgrade-override-until is not set, by default it will be set to 3 days from now.
flags:
    --aad-admin-group-object-ids=: Comma-separated list of aad group object IDs that will be set as cluster admin.
    --aad-tenant-id=: The ID of an Azure Active Directory tenant.
    --aks-custom-headers=: Comma-separated key-value pairs to specify custom headers.
    --api-server-authorized-ip-ranges=: Comma-separated list of authorized apiserver IP ranges.
    --assign-identity=: Specify an existing user assigned identity to manage cluster resource group.
    --assign-kubelet-identity=: Update cluster's kubelet identity to an existing user assigned identity.
    --attach-acr=: Grant the 'acrpull' role assignment to the ACR specified by name or resource ID.
    --auto-upgrade-channel=: Specify the upgrade channel for autoupgrade.
    --azure-container-storage-nodepools=: define the comma separated nodepool list to install azure container storage
    --azure-keyvault-kms-key-id=: Identifier of Azure Key Vault key.
    --azure-keyvault-kms-key-vault-network-access=: Network Access of Azure Key Vault.
    --azure-keyvault-kms-key-vault-resource-id=: Resource ID of Azure Key Vault.
    --azure-monitor-workspace-resource-id=: Resource ID of the Azure Monitor Workspace
    --bootstrap-artifact-source=: Configure artifact source when bootstraping the cluster.
    --bootstrap-container-registry-resource-id=: Configure container registry resource ID.
    --cluster-autoscaler-profile=:
        description: Comma-separated list of key=value pairs for configuring cluster autoscaler.
        nargs: -1
    --defender-config=: Path to JSON file containing Microsoft Defender profile configurations.
    --detach-acr=: Disable the 'acrpull' role assignment to the ACR specified by name or resource ID.
    --disable-acns-observability=: Used to disable advanced networking observability features on a clusters when enabling advanced networking features with "--enable-acns".
    --disable-acns-security=: Used to disable advanced networking security features on a clusters when enabling advanced networking features with "--enable-acns".
    --disable-acns=: Disable all advanced networking functionalities on a cluster.
    --disable-ahub=: Disable Azure Hybrid User Benefits (AHUB) feature for cluster.
    --disable-azure-container-storage=: disable azure container storage or any one of the storage pool types
    --disable-azure-keyvault-kms=: Disable Azure KeyVault Key Management Service.
    --disable-azure-monitor-metrics=: Disable Azure Monitor Metrics Profile.
    --disable-azure-rbac=: Disable Azure RBAC to control authorization checks on cluster.
    --disable-blob-driver=: Disable AzureBlob CSI Driver.
    --disable-cost-analysis=: Disable exporting Kubernetes Namespace and Deployment details to the Cost Analysis views in the Azure portal.
    --disable-defender=: Disable defender profile.
    --disable-disk-driver=: Disable AzureDisk CSI Driver.
    --disable-file-driver=: Disable AzureFile CSI Driver.
    --disable-force-upgrade=: Disable forceUpgrade cluster upgrade settings override.
    --disable-image-cleaner=: Disable ImageCleaner Service.
    --disable-keda=: Disable KEDA workload auto-scaler.
    --disable-local-accounts=: If set to true, getting static credential will be disabled for this cluster.
    --disable-public-fqdn=: Disable public fqdn feature for private cluster.
    --disable-secret-rotation=: Disable secret rotation.
    --disable-snapshot-controller=: Disable CSI Snapshot Controller.
    --disable-vpa=: disable vertical pod autoscaler for cluster
    --disable-windows-gmsa=: Disable Windows gmsa on cluster.
    --disable-workload-identity=: Disable workload identity addon.
    --enable-aad=: Enable managed AAD feature for cluster.
    --enable-acns=: Enable advanced network functionalities on a cluster.
    --enable-ahub=: Enable Azure Hybrid User Benefits (AHUB) feature for cluster.
    --enable-azure-container-storage=: enable azure container storage and define storage pool type
    --enable-azure-keyvault-kms=: Enable Azure KeyVault Key Management Service.
    --enable-azure-monitor-metrics=: Enable a kubernetes cluster with the Azure Monitor managed service for Prometheus integration.
    --enable-azure-rbac=: Enable Azure RBAC to control authorization checks on cluster.
    --enable-blob-driver=: Enable AzureBlob CSI Driver.
    --enable-cost-analysis=: Enable exporting Kubernetes Namespace and Deployment details to the Cost Analysis views in the Azure portal.
    --enable-defender=: Enable Microsoft Defender security profile.
    --enable-disk-driver=: Enable AzureDisk CSI Driver.
    --enable-file-driver=: Enable AzureFile CSI Driver.
