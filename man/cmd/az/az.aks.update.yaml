    --grafana-resource-id=: Resource ID of the Azure Managed Grafana Workspace
    --http-proxy-config=: HTTP Proxy configuration for this cluster.
    --if-match=: The value provided will be compared to the ETag of the managed cluster, if it matches the operation will proceed.
    --if-none-match=: Set to '*' to allow a new cluster to be created, but to prevent updating an existing cluster.
    --image-cleaner-interval-hours=: ImageCleaner scanning interval.
    --ip-families=: A comma-separated list of IP versions to use for cluster networking.
    --k8s-support-plan=: Choose from "KubernetesOfficial" or "AKSLongTermSupport", with "AKSLongTermSupport" you get 1 extra year of CVE patchs.
    --ksm-metric-annotations-allow-list=: Comma-separated list of additional Kubernetes label keys that will be used in the resource' labels metric.
    --ksm-metric-labels-allow-list=: Comma-separated list of additional Kubernetes label keys that will be used in the resource' labels metric.
