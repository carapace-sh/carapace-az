    --enable-image-cleaner=: Enable ImageCleaner Service.
    --enable-keda=: Enable KEDA workload auto-scaler.
    --enable-local-accounts=: If set to true, will enable getting static credential for this cluster.
    --enable-managed-identity=: Update current cluster to use managed identity to manage cluster resource group.
    --enable-oidc-issuer=: Enable OIDC issuer.
    --enable-public-fqdn=: Enable public fqdn feature for private cluster.
    --enable-secret-rotation=: Enable secret rotation.
    --enable-snapshot-controller=: Enable Snapshot Controller.
