            - Premium
            - Standard
        ephemeral-disk-volume-type:
            - EphemeralVolumeOnly
            - PersistentVolumeWithAnnotation
        k8s-support-plan:
            - KubernetesOfficial
            - AKSLongTermSupport
        load-balancer-backend-pool-type:
            - nodeIP
            - nodeIPConfiguration
        network-dataplane:
            - azure
            - cilium
        network-plugin:
            - kubenet
            - azure
            - none
        network-policy:
            - azure
            - calico
            - cilium
            - none
        nrg-lockdown-restriction-level:
