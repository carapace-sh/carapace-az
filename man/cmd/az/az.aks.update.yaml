        auto-upgrade-channel:
            - rapid
            - stable
            - patch
            - node-image
            - none
        azure-keyvault-kms-key-vault-network-access:
            - Public
            - Private
        bootstrap-artifact-source:
            - Direct
            - Cache
        disable-azure-container-storage:
