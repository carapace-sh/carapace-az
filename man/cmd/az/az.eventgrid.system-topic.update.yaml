# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a system topic.
documentation:
    flag:
        identity: The managed identity type for the resource. Will be deprecated and replaced by --mi-system-assigned-identity in future
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        mi-user-assigned: Add user assigned identities when identityType is user or mixed. This attribute is valid for all destination types except StorageQueue. Multiple attributes can be specified by using more than one `--mi-user-assigned` argument
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --identity=: The managed identity type for the resource.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --mi-system-assigned=: Presence of this param indicates that SystemAssigned managed identity will be used
    --mi-user-assigned=:
        description: Add user assigned identities when identityType is user or mixed.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the system topic.
completion:
    flag:
        identity:
            - noidentity
            - systemassigned
