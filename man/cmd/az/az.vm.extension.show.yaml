# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Display information about extensions attached to a VM.
flags:
    --expand=: The expand expression to apply on the operation.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --instance-view=: The instance view of a virtual machine extension.
    --subscription=: Name or ID of subscription.
    --vm-name=: The name of the Virtual Machine.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the extension.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        instance-view: |-
            The instance view of a virtual machine extension.

            Default value: False
        name: Name of the extension.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-name: The name of the Virtual Machine. You can configure the default using ``` az configure --defaults vm=<name> ``` .
examples:
    Use VM name and extension name to show the extensions attached to a VM.: az vm extension show -g MyResourceGroup --vm-name MyVm -n extension_name
