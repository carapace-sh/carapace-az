# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: assign
description: Add managed identities to an existing image builder template.
flags:
    --defer=:
        description: Temporarily store the object in the local cache instead of sending to Azure.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --user-assigned=:
        description: Specify one user assigned identity (name or ID, space delimited) of the image template.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the image template.
documentation:
    command: Add managed identities to an existing image builder template. Currently, only one user identity is supported.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        defer: Temporarily store the object in the local cache instead of sending to Azure. Use ``` az cache ``` commands to view/clear.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the image template.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-assigned: Specify one user assigned identity (name or ID, space delimited) of the image template.
examples:
    Add a user assigned managed identity to an existing image builder template.: az image builder identity assign --name MyImageBuilderTemplate --resource-group MyResourceGroup --user-assigned MyAssignedId
