# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all security sub assessment results.
flags:
    --assessed-resource-id=: The target resource for this assessment
    --assessment-name=: Name of the assessment resource
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        assessed-resource-id: The target resource for this assessment.
        assessment-name: Name of the assessment resource.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get security sub assessments.: az security sub-assessment list
