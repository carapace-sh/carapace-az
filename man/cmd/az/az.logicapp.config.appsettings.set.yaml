# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Update a logic app's settings.
flags:
    --settings=:
        description: space-separated app settings in a format of `<name>=<value>`
        nargs: -1
    --slot-settings=:
        description: space-separated slot app settings in a format of `<name>=<value>`
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: name of the logic app.
    -s, --slot=: the name of the slot.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the logic app.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        settings: Space-separated app settings in a format of ``` <name>=<value> ``` .
        slot: The name of the slot. Default to the productions slot if not specified.
        slot-settings: Space-separated slot app settings in a format of ``` <name>=<value> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a logic app's settings.: az logicapp config appsettings set --name myLogicApp --resource-group myRG --subscription mySubscription --settings "AzureWebJobsStorage=$storageConnectionString"
