# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: start
description: Troubleshoot issues with VPN connections or gateway connectivity.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --resource=!: Name or ID of the resource to troubleshoot.
    --storage-account=!: Name or ID of the storage account in which to store the troubleshooting results.
    --storage-path=!: Fully qualified URI to the storage blob container in which to store the troubleshooting results.
    --subscription=: Name or ID of subscription.
    --watcher-rg=: Name of the resource group the watcher is in.
    -g, --resource-group=: Name of resource group.
    -t, --resource-type=: The type of target resource to troubleshoot, if resource ID is not specified.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        resource-type:
            - vnetGateway
            - vpnConnection
