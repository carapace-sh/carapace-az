# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reject
description: Reject a private endpoint connection request for a container registry
documentation:
    flag:
        description: Rejection description. For example, the reason for rejection.
        registry-name: The name of the container registry. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --description=: Rejection description.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the private endpoint connection
    -r, --registry-name=!: The name of the container registry.
