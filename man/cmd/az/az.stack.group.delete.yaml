# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete specified deployment stack from resource group scope
flags:
    --action-on-unmanage=!: Defines what happens to resources that are no longer managed after the stack is updated or deleted.
    --bypass-stack-out-of-sync-error=:
        description: Flag to bypass service errors that indicate the stack resource list is not correctly synchronized.
        nargs: -1
    --id=: The deployment stack resource id.
    --subscription=: Name or ID of subscription.
    --yes=: Do not prompt for confirmation
    -g, --resource-group=: The resource group where the deployment stack exists
    -n, --name=: The deployment stack name
completion:
    flag:
        action-on-unmanage:
            - deleteAll
            - deleteResources
            - detachAll
        bypass-stack-out-of-sync-error:
            - "true"
            - "false"
documentation:
    command: Delete specified deployment stack from resource group scope.
    flag:
        acquire-policy-token: |-
            Acquiring an Azure Policy token automatically for this resource operation.

            Default value: False

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        id: The deployment stack resource id.
        name: The deployment stack name.
        resource-group: |-
            The resource group where the deployment stack exists. --resources-without-delete-support --rwd Defines what happens to resources that do not support deletion when they are no longer managed by the stack.

            Accepted values: detach, fail
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete stack by name.: az stack group delete --name StackName --resource-group ResourceGroup --action-on-unmanage deleteResources
    Delete stack by stack resource id.: az stack group delete --id /subscriptions/111111111111/resourceGroups/ResourceGroup/providers/Microsoft.Resources/deploymentStacks/StackName --action-on-unmanage detachAll
