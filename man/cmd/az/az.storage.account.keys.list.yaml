# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists the access keys or Kerberos keys (if active directory enabled) for the specified storage account.
flags:
    --expand-key-type=: Specify the expanded key types to be listed.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
documentation:
    command: List the access keys or Kerberos keys (if active directory enabled) for a storage account.
    flag:
        account-name: The storage account name.
        expand-key-type: |-
            Specify the expanded key types to be listed.

            Default value: kerb

            Accepted values: kerb
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List the access keys and Kerberos keys (if active directory enabled) for a storage account.: az storage account keys list -g MyResourceGroup -n MyStorageAccount --expand-key-type kerb
    List the access keys for a storage account.: az storage account keys list -g MyResourceGroup -n MyStorageAccount
