# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Set a configuration.
flags:
    --local=: Set as a local configuration in the working directory.
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        local: Set as a local configuration in the working directory.
examples:
    Disable color with `core.no_color`.: az config set core.no_color=true
    Hide warnings and only show errors with `core.only_show_errors`.: az config set core.only_show_errors=true
    Set the default location to `westus2` and default resource group to `myRG`.: az config set defaults.location=westus2 defaults.group=MyResourceGroup
    Set the default resource group to `myRG` on a local scope.: az config set defaults.group=myRG --local
    Turn on client-side telemetry.: az config set core.collect_telemetry=true
    Turn on file logging and set its location.: |-
        az config set logging.enable_log_file=true
        az config set logging.log_dir=~/az-logs
