# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: exec
description: Open an SSH-like interactive shell within a container app replica
flags:
    --command=:
        description: The startup command (bash, zsh, sh, etc.).
        nargs: -1
    --container=: The name of the container to ssh into
    --replica=: The name of the replica to ssh into.
    --revision=: The name of the container app revision to ssh into.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Containerapp.
documentation:
    command: Open an SSH-like interactive shell within a container app replica.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        command: |-
            The startup command (bash, zsh, sh, etc.).

            Default value: sh
        container: The name of the container to ssh into.
        name: The name of the Containerapp.
        replica: The name of the replica to ssh into. List replicas with 'az containerapp replica list'. A replica may not exist if there is not traffic to your app.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        revision: The name of the container app revision to ssh into. Defaults to the latest revision.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    exec into a container app: az containerapp exec -n my-containerapp -g MyResourceGroup
    exec into a particular container app replica and revision: az containerapp exec -n my-containerapp -g MyResourceGroup --replica MyReplica --revision MyRevision
    open a bash shell in a containerapp: az containerapp exec -n my-containerapp -g MyResourceGroup --command bash
