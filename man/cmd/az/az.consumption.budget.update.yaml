# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update operation to create or update a budget.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --amount=: The total amount of cost to track with the budget
    --category=: The category of the budget, whether the budget tracks cost or usage.
    --e-tag=: eTag of the resource.
    --filters=:
        description: May be used to filter budgets by resource group, resource, or meter.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --notifications=:
        description: Dictionary of notifications associated with the budget.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --time-grain=: The time covered by a budget.
    --time-period=:
        description: Has start and end date of the budget.
        nargs: -1
    -n, --name=: Budget Name.
completion:
    flag:
        category:
            - Cost
            - Usage
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        time-grain:
            - Annually
            - Monthly
            - Quarterly
documentation:
    command: |-
        Command group 'consumption' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        amount: The total amount of cost to track with the budget.
        category: |-
            The category of the budget, whether the budget tracks cost or usage.

            Accepted values: Cost, Usage
        change-reference: The related change reference ID for this resource operation.
        e-tag: eTag of the resource. To handle concurrent update scenario, this field will be used to determine whether the user is updating the latest version or not.
        filters: May be used to filter budgets by resource group, resource, or meter.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        notifications: Dictionary of notifications associated with the budget. Budget can have up to five notifications.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        time-grain: |-
            The time covered by a budget. Tracking of the amount will be reset based on the time grain.

            Accepted values: Annually, Monthly, Quarterly
        time-period: Has start and end date of the budget. The start date must be first of the month and should be less than the end date. Budget start date must be on or after June 1, 2017. Future start date should not be more than three months. Past start date should  be selected within the timegrain period. There are no restrictions on the end date.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
