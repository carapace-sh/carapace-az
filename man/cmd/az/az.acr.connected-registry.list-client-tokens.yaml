# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-client-tokens
description: List all the client tokens associated to a specific connected registries.
documentation:
    flag:
        name: Name for the connected registry. Name must be between 5 to 40 character long, start with a letter and contain only alphanumeric characters (including ‘_’ or ‘-’). Name must be unique under the Cloud ACR hierarchy.
        registry: The login server of the Cloud ACR registry. Must be the FQDN to support also Azure Stack.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name for the connected registry.
    -r, --registry=!: The login server of the Cloud ACR registry.
