# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets the list of application type version resources created in the specified Service Fabric application type name resource.
flags:
    --name=!: Specify the application type name.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    command: List version of a given application type.
    flag:
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List versions for a particular application type.: az sf application-type version list -g testRG -c testCluster --application-type-name CalcServiceApp
