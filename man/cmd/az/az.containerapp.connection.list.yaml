# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List connections of a containerapp.
flags:
    --source-id=: The resource id of a containerapp.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group which contains the container app.
    -n, --name=: Name of the container app.
documentation:
    flag:
        name: Name of the container app. Required if '--source-id' is not specified.None.
        resource-group: The resource group which contains the container app. Required if '--source-id' is not specified.None.
        source-id: The resource id of a containerapp. Required if ['--resource-group', '--name'] are not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List containerapp connections by source resource id: az containerapp connection list --source-id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.App/containerApps/{app}
    List containerapp connections by source resource name: az containerapp connection list -g ContainerAppRG -n MyContainerApp
    List containerapp connections interactively: az containerapp connection list
