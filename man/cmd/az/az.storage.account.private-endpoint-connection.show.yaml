# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets the specified private endpoint connection associated with the storage account.
documentation:
    flag:
        id: The ID of the private endpoint connection associated with the Storage Account. You can get it using `az storage account show`.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-name=: The storage account name.
    --id=: The ID of the private endpoint connection associated with the Storage Account.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group name of specified storage account.
    -n, --name=: The name of the private endpoint connection associated with the Storage Account.
