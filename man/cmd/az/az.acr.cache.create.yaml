# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a cache rule.
flags:
    --subscription=: Name or ID of subscription.
    -c, --cred-set=: The name of the credential set.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the cache rule.
    -r, --registry=!: The name of the container registry.
    -s, --source-repo=!: The full source repository path such as 'docker.io/library/ubuntu'.
    -t, --target-repo=!: The target repository namespace such as 'ubuntu'.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cred-set: The name of the credential set.
        identity: 'User-assigned managed identity resource ID for ACR to authenticate with the upstream registry. Format: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}.'
        name: The name of the cache rule.
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source-repo: The full source repository path such as 'docker.io/library/ubuntu'.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-repo: The target repository namespace such as 'ubuntu'.
examples:
    Create a cache rule with a credential set.: az acr cache create -r myregistry -n MyRule -s docker.io/library/ubuntu -t ubuntu -c MyCredSet
    Create a cache rule without a credential set.: az acr cache create -r myregistry -n MyRule -s docker.io/library/ubuntu -t ubuntu
