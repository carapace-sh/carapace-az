# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore-files
description: Restore the specified files from the specified snapshot to the active filesystem
flags:
    --destination-path=: Destination folder where the files will be restored
    --file-paths=!:
        description: List of files to be restored  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -a, --account-name=: The name of the NetApp account
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the snapshot
    -p, --pool-name=: The name of the capacity pool
    -v, --volume-name=: The name of the volume
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Restore the specified files from the specified snapshot to the active filesystem.
    flag:
        account-name: The name of the NetApp account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        destination-path: Destination folder where the files will be restored.
        file-paths: List of files to be restored  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        pool-name: The name of the capacity pool.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        volume-name: The name of the volume.
examples:
    Restore specified files from the specified snapshot to the active filesystem.: az netappfiles snapshot restore-files -g mygroup --account-name myaccname --pool-name mypoolname --volume-name myvolname --name mysnapname --file-paths myfilepaths
