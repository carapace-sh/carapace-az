# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an App Configuration.
flags:
    --arm-auth-mode=: The authentication mode for accessing the App Configuration Store via ARM.
    --assign-identity=:
        description: Space-separated list of managed identities to be assigned.
        nargs: -1
    --disable-local-auth=:
        description: Disable all authentication methods other than AAD authentication.
        nargs: -1
    --enable-arm-private-network-access=:
        description: Enable access to the App Configuration store via ARM Private Link if resource is restricted to private network access.
        nargs: -1
    --no-replica=:
        description: Proceed without replica creation for premium tier store.
        nargs: -1
    --replica-location=: The location of the replica of the App Configuration store.
    --replica-name=: Name of the replica of the App Configuration store.
    --retention-days=: Number of days to retain the soft delete enabled App Configuration store after deleting.
    --sku=: The sku of the App Configuration store
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -e, --enable-public-network=:
        description: When true, requests coming from public networks have permission to access this store while private endpoint is enabled.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=!: Location.
    -n, --name=!: Name of the App Configuration store.
    -p, --enable-purge-protection=:
        description: Property specifying whether protection against purge is enabled for this App Configuration store.
        nargs: -1
completion:
    flag:
        arm-auth-mode:
            - local
            - pass-through
        disable-local-auth:
            - "true"
            - "false"
        enable-arm-private-network-access:
            - "true"
            - "false"
        enable-public-network:
            - "true"
            - "false"
        enable-purge-protection:
            - "true"
            - "false"
        no-replica:
            - "true"
            - "false"
        sku:
            - Free
            - Premium
            - Standard
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        appinsights-resource: Resource ID of the Application Insights resource to link with this App Configuration store.
        arm-auth-mode: |-
            The authentication mode for accessing the App Configuration Store via ARM. 'pass-through' (Recommended) uses Microsoft Entra ID to access the store via ARM with proper authorization.'local' uses access keys for authentication. This requires access keys to be enabled.

            Accepted values: local, pass-through
        assign-identity: Space-separated list of managed identities to be assigned. Use "[system]" to refer to system-assigned managed identity or a resource ID to refer to user-assigned managed identity. If this argument is provided without any value, system-assigned managed identity will be assigned by default. If this argument is not provided, no managed identities will be assigned to this App Configuration store.
        azure-front-door-profile: Resource ID of an Azure Front Door profile to link to this App Configuration store.
        change-reference: The related change reference ID for this resource operation.
        disable-local-auth: |-
            Disable all authentication methods other than AAD authentication.

            Accepted values: false, true
        enable-arm-private-network-access: |-
            Enable access to the App Configuration store via ARM Private Link if resource is restricted to private network access. Requires Pass-through ARM authentication mode.

            Accepted values: false, true
        enable-public-network: |-
            Argument 'enable_public_network' has been deprecated and will be removed in a future release. Use '--public-network-access' instead. When true, requests coming from public networks have permission to access this store while private endpoint is enabled. When false, only requests made through Private Links can reach this store.

            Accepted values: false, true
        enable-purge-protection: |-
            Property specifying whether protection against purge is enabled for this App Configuration store. Setting this property to true activates protection against purge for this App Configuration store and its contents. Enabling this functionality is irreversible.

            Accepted values: false, true
        kv-revision-retention-period: Duration in seconds to retain key-value revisions in the App Configuration store. For Free and Developer sku stores, revisions can be retained for a maximum of 7 days (604,800s); for Standard and Premium sku stores, up to 30 days (2,592,000s). Only Non-Free tiers can update this value. If specified, retention period must be at least 1 hour (3600s).
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Name of the App Configuration store. You can configure the default name using ``` az configure --defaults app_configuration_store=<name> ``` .
        no-replica: |-
            Proceed without replica creation for premium tier store.

            Accepted values: false, true
        public-network-access: |-
            Control permission for data plane traffic coming from public networks. Possible values include: Disabled, Enabled, SecuredByPerimeter. NOTE: The SecuredByPerimeter mode is currently in preview.

            Accepted values: Disabled, Enabled, SecuredByPerimeter
        replica-location: The location of the replica of the App Configuration store.
        replica-name: Name of the replica of the App Configuration store.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        retention-days: Number of days to retain the soft delete enabled App Configuration store after deleting. Must be a positive integer between 0 and 7.
        sku: |-
            The sku of the App Configuration store.

            Default value: Standard

            Accepted values: Developer, Free, Premium, Standard
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].'
examples:
    Create a premium sku App Configuration store with a replica: az appconfig create -g MyResourceGroup -n MyAppConfiguration -l westus --sku Premium --replica-name MyReplica --replica-location eastus
    Create a premium sku App Configuration store without a replica: az appconfig create -g MyResourceGroup -n MyAppConfiguration -l westus --sku Premium --no-replica
    Create an App Configuration store linked to an Azure Front Door profile.: az appconfig create -g MyResourceGroup -n MyAppConfiguration -l westus --sku Standard --azure-front-door-profile /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCEGROUP>/providers/Microsoft.Cdn/profiles/<PROFILE_NAME>
    Create an App Configuration store with Developer sku: az appconfig create -g MyResourceGroup -n MyAppConfiguration -l westus --sku Developer
    Create an App Configuration store with a key-value revision retention period of one day (in seconds).: az appconfig create -g MyResourceGroup -n MyAppConfiguration -l westus --sku Standard --kv-revision-retention-period 86400
    Create an App Configuration store with an Application Insights resource linked for telemetry collection.: az appconfig create -g MyResourceGroup -n MyAppConfiguration -l westus --sku Standard --appinsights-resource /subscriptions/<SUBSCRIPTIONID>/resourceGroups/<RESOURCEGROUP>/providers/microsoft.insights/components/MyAppInsights
    ? Create an App Configuration store with name, location and resource group with ARM authentication mode set to Pass-through and private network access via ARM Private Link enabled.
    : az appconfig create -g MyResourceGroup -n MyAppConfiguration -l westus --arm-auth-mode pass-through --enable-arm-private-network-access true
    Create an App Configuration store with name, location and resource group with ARM authentication mode set to Pass-through.: az appconfig create -g MyResourceGroup -n MyAppConfiguration -l westus --arm-auth-mode pass-through
    ? Create an App Configuration store with name, location and resource group with public network access enabled and local auth disabled.
    : az appconfig create -g MyResourceGroup -n MyAppConfiguration -l westus --enable-public-network --disable-local-auth
    Create an App Configuration store with name, location, sku and resource group with system assigned identity.: az appconfig create -g MyResourceGroup -n MyAppConfiguration -l westus --sku Standard --assign-identity
    Create an App Configuration store with name, location, sku and resource group with user assigned identity.: az appconfig create -g MyResourceGroup -n MyAppConfiguration -l westus --sku Standard --assign-identity /subscriptions/<SUBSCRIPTON ID>/resourcegroups/<RESOURCEGROUP>/providers/Microsoft.ManagedIdentity/userAssignedIdentities/myUserAssignedIdentity
    Create an App Configuration store with name, location, sku, tags and resource group.: az appconfig create -g MyResourceGroup -n MyAppConfiguration -l westus --sku Standard --tags key1=value1 key2=value2
