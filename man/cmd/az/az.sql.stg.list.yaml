# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Retrieve a list of Server Trust Groups.
flags:
    --instance-name=: Managed Instance name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: The resource group name
    -l, --location=: The location of the Server Trust Group.
documentation:
    command: |-
        Command group 'sql stg' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        instance-name: Managed Instance name.
        location: The location of the Server Trust Group.
        resource-group: The resource group name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Retrieve a list of Server Trust Groups by instance.: az sql stg list -g resourcegroup --instance-name mi1-name
    Retrieve a list of Server Trust Groups by location.: az sql stg list -g resourcegroup -l location
