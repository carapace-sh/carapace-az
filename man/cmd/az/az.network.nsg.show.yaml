# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get information about a network security group.
flags:
    --expand=: Expands referenced resources.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the network security group.
documentation:
    flag:
        expand: Expands referenced resources. Default value is None.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the network security group.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get all default NSG rules with "Allow" access and format the output as a table.: az network nsg show -g MyResourceGroup -n MyNsg --query "defaultSecurityRules[?access=='Allow']" -o table
    Get basic information about an NSG.: az network nsg show -g MyResourceGroup -n MyNsg
    Get the default security rules of an NSG and format the output as a table.: az network nsg show -g MyResourceGroup -n MyNsg --query "defaultSecurityRules[]" -o table
