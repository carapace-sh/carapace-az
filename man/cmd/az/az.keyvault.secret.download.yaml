# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: download
description: Download a secret from a KeyVault.
flags:
    --id=: Id of the secret.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Key Vault.
    -e, --encoding=: Encoding of the secret.
    -f, --file=!: File to receive the secret contents.
    -n, --name=: Name of the secret.
    -v, --version=: The secret version.
completion:
    flag:
        encoding:
            - utf-8
            - utf-16le
            - utf-16be
            - ascii
            - base64
            - hex
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        encoding: |-
            Encoding of the secret. By default, will look for the 'file-encoding' tag on the secret. Otherwise will assume 'utf-8'.

            Accepted values: ascii, base64, hex, utf-16be, utf-16le, utf-8
        file: File to receive the secret contents.
        id: Id of the secret. If specified all other 'Id' arguments should be omitted.
        name: Name of the secret. Required if --id is not specified.
        overwrite: |-
            Overwrite the file if it exists.

            Default value: False
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Key Vault. Required if --id is not specified.
        version: The secret version. If omitted, uses the latest version.
