# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show the role assignment detail for the caller within different scopes.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --invoice-section-name=: The ID that uniquely identifies an invoice section.
    --profile-name=: The ID that uniquely identifies a billing profile.
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies a role assignment.
documentation:
    command: |-
        Command group 'billing role-assignment' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        invoice-section-name: The ID that uniquely identifies an invoice section.
        name: The ID that uniquely identifies a role assignment.
        profile-name: The ID that uniquely identifies a billing profile.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show a role assignment for the caller on a billing account: az billing role-assignment show --account-name "{billingAccountName}" --name "{billingRoleAssignmentName}"
    Show a role assignment for the caller on a billing profile: az billing role-assignment show --account-name "{billingAccountName}" --profile-name "{billingProfileName}" --name "{billingRoleAssignmentName}"
    Show a role assignment for the caller on an invoice section: az billing role-assignment show --account-name "{billingAccountName}" --profile-name "{billingProfileName}" --name "{billingRoleAssignmentName}" --invoice-section-name "{invoiceSectionName}"
