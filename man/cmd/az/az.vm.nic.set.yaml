# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Configure settings of a NIC attached to a VM.
flags:
    --nics=!:
        description: Names or IDs of NICs.
        nargs: -1
    --primary-nic=: Name or ID of the primary NIC.
    --subscription=: Name or ID of subscription.
    --vm-name=!: The name of the Virtual Machine.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        nics: Names or IDs of NICs.
        primary-nic: Name or ID of the primary NIC. If missing, the first NIC in the list will be the primary.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-name: The name of the Virtual Machine. You can configure the default using ``` az configure --defaults vm=<name> ``` .
examples:
    Configure settings of a NIC attached to a VM. (autogenerated): az vm nic set --nics nic_name1 nic_name2 --primary-nic nic_name2 --resource-group MyResourceGroup --vm-name MyVm
    Set a NIC on a VM to be the primary interface.: az vm nic set -g MyResourceGroup --vm-name MyVm --nic nic_name1 nic_name2 --primary-nic nic_name2
