# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows the Microsoft Defender for Cloud Home region location.
flags:
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        name: Name of the resource to be fetched.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Shows the Microsoft Defender for Cloud Home region location.: az security location show -n centralus
