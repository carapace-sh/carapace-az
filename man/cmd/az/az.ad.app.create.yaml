# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an application.
documentation:
    flag:
        app-roles: The collection of roles assigned to the application. With app role assignments, these roles can be assigned to users, groups, or service principals associated with other applications. Should be JSON file path or in-line JSON string. See examples for details
        end-date: Date or datetime after which credentials expire (e.g. '2017-12-31T11:59:59+00:00' or '2017-12-31'). Default value is one year after current time
        identifier-uris: space-separated values. Also known as App ID URI, this value is set when an application is used as a resource app. The identifierUris acts as the prefix for the scopes you'll reference in your API's code, and it must be globally unique. You can use the default value provided, which is in the form `api://<application-client-id>`, or specify a more readable URI like https://contoso.com/api.
        is-fallback-public-client: Specifies the fallback application type as public client, such as an installed application running on a mobile device. The default value is false which means the fallback application type is confidential client such as a web app.
        optional-claims: Application developers can configure optional claims in their Microsoft Entra applications to specify the claims that are sent to their application by the Microsoft security token service. For more information, see https://learn.microsoft.com/azure/active-directory/develop/active-directory-optional-claims. Should be JSON file path or in-line JSON string. See examples for details
        public-client-redirect-uris: Space-separated values. Specifies the URLs where user tokens are sent for sign-in, or the redirect URIs where OAuth 2.0 authorization codes and access tokens are sent.
        requested-access-token-version: Specifies the access token version expected by this resource. This changes the version and format of the JWT produced independent of the endpoint or client used to request the access token.
        required-resource-accesses: Specifies the resources that the application needs to access. This property also specifies the set of delegated permissions and application roles that it needs for each of those resources. This configuration of access to the required resources drives the consent experience. Should be JSON file path or in-line JSON string. See examples for details
        start-date: Date or datetime at which credentials become valid (e.g. '2017-01-01T01:00:00+00:00' or '2017-01-01'). Default value is current time
        web-redirect-uris: Space-separated values. Specifies the URLs where user tokens are sent for sign-in, or the redirect URIs where OAuth 2.0 authorization codes and access tokens are sent.
flags:
    --app-roles=: The collection of roles assigned to the application.
    --display-name=!: the display name of the application
    --enable-access-token-issuance=:
        description: Specifies whether this web application can request an access token using the OAuth 2.0 implicit flow.
        nargs: -1
    --enable-id-token-issuance=:
        description: Specifies whether this web application can request an ID token using the OAuth 2.0 implicit flow.
        nargs: -1
    --end-date=: Date or datetime after which credentials expire (e.g. '2017-12-31T11:59:59+00:00' or '2017-12-31').
    --identifier-uris=:
        description: space-separated values.
        nargs: -1
    --is-fallback-public-client=:
        description: Specifies the fallback application type as public client, such as an installed application running on a mobile device.
        nargs: -1
    --key-display-name=: Friendly name for the key.
    --key-type=: the type of the key credentials associated with the application
    --key-usage=: the usage of the key credentials associated with the application.
    --key-value=: the value for the key credentials associated with the application
    --optional-claims=: Application developers can configure optional claims in their Microsoft Entra applications to specify the claims that are sent to their application by the Microsoft security token service.
    --public-client-redirect-uris=:
        description: Space-separated values.
        nargs: -1
    --requested-access-token-version=: Specifies the access token version expected by this resource.
    --required-resource-accesses=: Specifies the resources that the application needs to access.
    --service-management-reference=: References application or service contact information from a Service or Asset Management database.
    --sign-in-audience=: Specifies the Microsoft accounts that are supported for the current application.
    --start-date=: Date or datetime at which credentials become valid (e.g. '2017-01-01T01:00:00+00:00' or '2017-01-01').
    --web-home-page-url=: Home page or landing page of the application.
    --web-redirect-uris=:
        description: Space-separated values.
        nargs: -1
completion:
    flag:
        enable-access-token-issuance:
            - "true"
            - "false"
        enable-id-token-issuance:
            - "true"
            - "false"
        is-fallback-public-client:
            - "true"
            - "false"
        key-type:
            - AsymmetricX509Cert
            - Password
            - Symmetric
        key-usage:
            - Sign
            - Verify
        sign-in-audience:
            - AzureADMyOrg
            - AzureADMultipleOrgs
            - AzureADandPersonalMicrosoftAccount
            - PersonalMicrosoftAccount
