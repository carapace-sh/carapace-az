# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show an endpoint from a connection monitor.
flags:
    --connection-monitor=!: Connection monitor name.
    --subscription=: Name or ID of subscription.
    -l, --location=!: Location.
    -n, --name=!: Name of the connection monitor endpoint.
documentation:
    command: |-
        Command group 'az network watcher connection-monitor endpoint' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        connection-monitor: Connection monitor name. --endpoint-name --name -n Name of the connection monitor endpoint.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show an endpoint from a connection monitor.: az network watcher connection-monitor endpoint show --connection-monitor MyConnectionMonitor --location westus2 --name myconnectionmonitorendpoint --subscription MySubscription
