# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a backup of a web app.
flags:
    --backup-name=: Name of the backup.
    --container-url=!: URL with SAS token to the blob storage container
    --db-connection-string=: Connection string for the database in the backup
    --db-name=: Name of the database in the backup
    --db-type=: Type of database in the backup
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --webapp-name=!: The name of the web app
    -s, --slot=: the name of the slot.
completion:
    flag:
        db-type:
            - SqlAzure
            - MySql
            - LocalMySql
            - PostgreSql
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-name: Name of the backup. If unspecified, the backup will be named with the web app name and a timestamp.
        change-reference: The related change reference ID for this resource operation.
        container-url: URL with SAS token to the blob storage container.
        db-connection-string: Connection string for the database in the backup.
        db-name: Name of the database in the backup.
        db-type: |-
            Type of database in the backup.

            Accepted values: LocalMySql, MySql, PostgreSql, SqlAzure
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: The name of the slot. Default to the productions slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        webapp-name: The name of the web app.
examples:
    Create a backup of a web app. (autogenerated): az webapp config backup create --container-url {container-url} --resource-group MyResourceGroup --webapp-name MyWebapp
