# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a user.
documentation:
    flag:
        immutable-id: 'This property is used to associate an on-premises Active Directory user account to their Microsoft Entra user object. This property must be specified when creating a new user account in the Graph if you''re using a federated domain for the user''s userPrincipalName (UPN) property. NOTE: The $ and _ characters can''t be used when specifying this property.'
        mail-nickname: mail alias. Defaults to user principal name
        user-principal-name: The user principal name (someuser@contoso.com). It must contain one of the verified domains for the tenant.
flags:
    --display-name=!: object's display name or its prefix
    --force-change-password-next-sign-in=:
        description: If the user must change her password on the next login.
        nargs: -1
    --immutable-id=: This property is used to associate an on-premises Active Directory user account to their Microsoft Entra user object.
    --mail-nickname=: mail alias.
    --password=!: user password
    --user-principal-name=!: The user principal name (someuser@contoso.com).
completion:
    flag:
        force-change-password-next-sign-in:
            - "true"
            - "false"
