# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: bind
description: Add or update the hostname and binding with a certificate.
flags:
    --hostname=!: The custom domain name.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -c, --certificate=: Name or resource id of the certificate.
    -e, --environment=: Name or resource id of the Container App environment.
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
    -n, --name=: The name of the Containerapp.
    -t, --thumbprint=: Thumbprint of the certificate.
    -v, --validation-method=: Validation method of custom domain ownership.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        certificate: Name or resource id of the certificate.
        change-reference: The related change reference ID for this resource operation.
        environment: Name or resource id of the Container App environment.
        hostname: The custom domain name.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        thumbprint: Thumbprint of the certificate.
        validation-method: Validation method of custom domain ownership.
examples:
    Add or update hostname and binding with a provided certificate.: az containerapp hostname bind -n my-containerapp -g MyResourceGroup --hostname MyHostname --certificate MyCertificateId
    Look for or create a managed certificate and bind with the hostname if no certificate or thumbprint is provided.: az containerapp hostname bind -n my-containerapp -g MyResourceGroup --hostname MyHostname
