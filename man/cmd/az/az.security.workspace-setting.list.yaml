# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Shows the workspace settings in your subscription - these settings let you control which workspace will hold your security data
flags:
    --subscription=: Name or ID of subscription.
documentation:
    command: Shows the workspace settings in your subscription - these settings let you control which workspace will hold your security data.
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Shows the workspace settings in your subscription - these settings let you control which workspace will hold your security data: az security workspace-setting list
