# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update-credentials
description: Update credentials for a managed Kubernetes cluster, like service principal.
documentation:
    flag:
        aad-client-app-id: The ID of an Azure Active Directory client application. This argument is required if `--reset-aad` is specified.
        aad-server-app-id: The ID of an Azure Active Directory server application. This argument is required if `--reset-aad` is specified.
        aad-server-app-secret: The secret of an Azure Active Directory server application. This argument is required if `--reset-aad` is specified.
        client-secret: Secret associated with the service principal. This argument is required if `--service-principal` is specified.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        service-principal: Service principal used for authentication to Azure APIs. This argument is required if `--reset-service-principal` is specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --aad-client-app-id=: The ID of an Azure Active Directory client application.
    --aad-server-app-id=: The ID of an Azure Active Directory server application.
    --aad-server-app-secret=: The secret of an Azure Active Directory server application.
    --aad-tenant-id=: Tenant ID associated with Azure Active Directory.
    --client-secret=: Secret associated with the service principal.
    --no-wait=: Do not wait for the long-running operation to finish.
    --reset-aad=: Reset Azure Active Directory configuration for a managed cluster.
    --reset-service-principal=: Reset service principal for a managed cluster.
    --service-principal=: Service principal used for authentication to Azure APIs.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the managed cluster.
