# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Create or update a new managed application definition.
flags:
    --deployment-mode=: The managed application deployment mode.
    --description=!: the managed application definition description
    --display-name=!: the managed application definition display name
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --lock-level=!: The type of lock restriction.
    --package-file-uri=: the managed application definition package file uri
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -a, --authorizations=!:
        description: space-separated authorization pairs in a format of `<principalId>:<roleDefinitionId>`
        nargs: -1
    -c, --create-ui-definition=: JSON formatted string or a path to a file with such content
    -g, --resource-group=: the resource group of the managed application definition
    -l, --location=: Location.
    -n, --name=: the managed application definition name
    -t, --main-template=: JSON formatted string or a path to a file with such content
completion:
    flag:
        deployment-mode:
            - Incremental
            - Complete
        lock-level:
            - CanNotDelete
            - ReadOnly
            - None
documentation:
    command: Update a managed application definition.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        authorizations: Space-separated authorization pairs in a format of ``` <principalId>:<roleDefinitionId> ``` .
        change-reference: The related change reference ID for this resource operation.
        create-ui-definition: JSON formatted string or a path to a file with such content.
        deployment-mode: |-
            The managed application deployment mode.

            Accepted values: Complete, Incremental
        description: The managed application definition description.
        display-name: The managed application definition display name.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        lock-level: |-
            The type of lock restriction.

            Accepted values: CanNotDelete, None, ReadOnly
        main-template: JSON formatted string or a path to a file with such content.
        name: The managed application definition name.
        package-file-uri: The managed application definition package file uri.
        resource-group: The resource group of the managed application definition.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Update a managed application defintion with inline values for createUiDefinition and mainTemplate.: |-
        az managedapp definition update -g MyResourceGroup -n MyManagedAppDef -l eastus --display-name "MyManagedAppDef" \
            --description "My Managed App Def description" -a "myPrincipalId:myRoleId" --lock-level None \
            --create-ui-definition @myCreateUiDef.json --main-template @myMainTemplate.json
    Update a managed application defintion.: |-
        az managedapp definition update -g MyResourceGroup -n MyManagedAppDef -l eastus --display-name "MyManagedAppDef" \
            --description "My Managed App Def description" -a "myPrincipalId:myRoleId" --lock-level None \
            --package-file-uri "https://path/to/myPackage.zip"
