# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update diagnostic settings for the specified resource.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        event-hub: The name of the event hub. If none is specified, the default event hub will be selected.
        log-ana-dtype: 'A string indicating whether the export to Log Analytics should use the default destination type, i.e. AzureDiagnostics, or use a destination type constructed as follows: `<normalized service identity>_<normalized category name>`. Possible values are: Dedicated and null (null is default.)'
        logs: The list of logs settings.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        metrics: The list of metric settings.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the diagnostic setting. Required.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        resource-type: 'Target resource type. Can also accept namespace/type format (Ex: ''Microsoft.Compute/virtualMachines'')'
        service-bus-rule-id: The service bus rule Id of the diagnostic setting. This is here to maintain backwards compatibility.
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-id: 'The full ARM resource ID of the Log Analytics workspace to which you would like to send Diagnostic Logs. Example: /subscriptions/4b9e8510-67ab-4e9a-95a9-e2f1e570ea9c/resourceGroups/insights-integration/providers/Microsoft.OperationalInsights/workspaces/viruela2'
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --event-hub-rule=: The resource Id for the event hub authorization rule.
    --event-hub=: The name of the event hub.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --log-ana-dtype=: 'A string indicating whether the export to Log Analytics should use the default destination type, i.e. AzureDiagnostics, or use a destination type constructed as follows: `<normalized service identity>_<normalized category name>`.'
    --logs=:
        description: The list of logs settings.
        nargs: -1
    --marketplace-partner-id=: The full ARM resource ID of the Marketplace resource to which you would like to send Diagnostic Logs.
    --metrics=:
        description: The list of metric settings.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --resource-namespace=: Target resource provider namespace.
    --resource-parent=: Target resource parent path, if applicable.
    --resource-type=: Target resource type.
    --resource=!: Name or ID of the target resource.
    --service-bus-rule-id=: The service bus rule Id of the diagnostic setting.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --storage-account-id=: The resource ID of the storage account to which you would like to send Diagnostic Logs.
    --subscription=: Name or ID of subscription.
    --workspace-id=: The full ARM resource ID of the Log Analytics workspace to which you would like to send Diagnostic Logs.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the diagnostic setting.
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
