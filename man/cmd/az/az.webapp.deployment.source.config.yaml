# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: config
description: Manage deployment from git or Mercurial repositories.
flags:
    --branch=: the branch name of the repository
    --git-token=: Git access token required for auto sync
    --github-action=: If using GitHub action, default to False
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --manual-integration=: disable automatic sync between source control and web
    --repository-type=: repository type
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: name of the web app.
    -s, --slot=: the name of the slot.
    -u, --repo-url=!: repository url to pull the latest source from, e.g. https://github.com/foo/foo-web
completion:
    flag:
        repository-type:
            - git
            - mercurial
            - github
            - externalgit
            - localgit
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        branch: The branch name of the repository.
        change-reference: The related change reference ID for this resource operation.
        git-token: Git access token required for auto sync.
        github-action: If using GitHub action, default to False.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        manual-integration: Disable automatic sync between source control and web.
        name: Name of the web app. If left unspecified, a name will be randomly generated. You can configure the default using ``` az configure --defaults web=<name> ``` .
        repo-url: Repository url to pull the latest source from, e.g. https://github.com/foo/foo-web .
        repository-type: |-
            Repository type.

            Default value: git

            Accepted values: externalgit, git, github, localgit, mercurial
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: The name of the slot. Default to the productions slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Manage deployment from git or Mercurial repositories. (autogenerated): az webapp deployment source config --branch master --manual-integration --name MyWebApp --repo-url https://github.com/Azure-Samples/function-image-upload-resize --resource-group MyResourceGroup
