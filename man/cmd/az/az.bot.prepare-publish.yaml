# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: prepare-publish
description: Adds PostDeployScripts folder with necessary scripts to deploy v3 bot to Azure.
documentation:
    flag:
        name: The resource name of the bot. Bot name must be between 4 and 42 characters in length. Bot name can only have the following characters -, a - z, A - Z, 0 - 9, and _.
        proj-file-path: Path to the start up project file name. (E.g. "./EchoBotWithCounter.csproj") Required only for C#.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        sln-name: Name of the start up solution file name. Required only for C#.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --code-dir=: The directory to download deployment scripts to.
    --proj-file-path=!: Path to the start up project file name.
    --sln-name=!: Name of the start up solution file name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The resource name of the bot.
    -v, --version=: The Microsoft Bot Builder SDK version to be used in the bot template that will be created.
completion:
    flag:
        version:
            - v3
            - v4
