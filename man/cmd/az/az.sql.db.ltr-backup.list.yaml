# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists the long term retention backups for a specified location, instance, or database.
flags:
    --database-state=: '''All'', ''Live'', or ''Deleted''.'
    --only-latest-per-database=: If true, will only return the latest backup for each database
    --subscription=: Name or ID of subscription.
    -d, --database=: Name of the Azure SQL Database.
    -g, --resource-group=: Name of resource group.
    -l, --location=!: The location of the desired backups.
    -s, --server=: Name of the Azure SQL Server.
documentation:
    command: List the long term retention backups for a location, server or database.
    flag:
        database: Name of the Azure SQL Database. If specified (along with server name), retrieves all requested backups under this database. --database-state --state 'All', 'Live', or 'Deleted'. Will fetch backups only from databases of specified state. If no state provied, defaults to 'All'. --latest --only-latest-per-database If true, will only return the latest backup for each database.
        database-state: '''All'', ''Live'', or ''Deleted''. Will fetch backups only from databases of specified state. If no state provied, defaults to ''All''.'
        location: The location of the desired backups.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. If specified, retrieves all requested backups under this server.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List long term retention backups for a database.: az sql db ltr-backup list -l southeastasia -s myserver -d mydb
    List long term retention backups for a location (list only the latest LTR backups, which belong to live databases).: az sql db ltr-backup list -l southeastasia --database-state Live --only-latest-per-database True
    List long term retention backups for a location (with resource group argument).: az sql db ltr-backup list -l southeastasia -g mygroup
    List long term retention backups for a server (list only the latest LTR backups, which belong to live databases).: az sql db ltr-backup list -l southeastasia -s myserver --database-state Live --only-latest-per-database True
    List long term retention backups for a server (with resource group argument).: az sql db ltr-backup list -l southeastasia -g mygroup -s myserver
