name: remove
description: Remove a group owner.
flags:
    --owner-object-id=!: owner's object id
    -g, --group=!: group's object id or display name(prefix also works if there is a unique match)
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        group: Group's object id or display name(prefix also works if there is a unique match).
        owner-object-id: Owner's object id.
examples:
    remove a group owner. (autogenerated): az ad group owner remove --group MyGroupDisplayName --owner-object-id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
