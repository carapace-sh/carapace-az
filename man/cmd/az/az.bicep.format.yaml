# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: format
description: Format a Bicep file.
flags:
    --indent-kind=: Set indentation kind.
    --indent-size=: Number of spaces to indent with (Only valid with --indent-kind set to Space).
    --insert-final-newline=: Insert a final newline.
    --newline-kind=: Set line ending characters.
    --newline=: Set newline char.
    --outdir=: When set, saves the output at the specified directory.
    --outfile=: When set, saves the output as the specified file path.
    --stdout=: When set, prints all output to stdout instead of corresponding files.
    --subscription=: Name or ID of subscription.
    -f, --file=!: The path to the Bicep file to format in the file system.
completion:
    flag:
        indent-kind:
            - Space
            - Tab
        newline-kind:
            - LF
            - CRLF
            - CR
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        file: The path to the Bicep file to format in the file system.
        indent-kind: Set indentation kind.
        indent-size: Number of spaces to indent with (Only valid with --indent-kind set to Space).
        insert-final-newline: Insert a final newline.
        newline: Option '--newline' has been deprecated and will be removed in a future release. Use '--newline-kind' instead. Set newline char. Valid values are ( Auto | LF | CRLF | CR ).
        newline-kind: Set line ending characters.
        outdir: When set, saves the output at the specified directory.
        outfile: When set, saves the output as the specified file path.
        stdout: When set, prints all output to stdout instead of corresponding files.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Format a Bicep file and print all output to stdout.: az bicep format --file {bicep_file} --stdout
    Format a Bicep file and save the result to the specified directory.: az bicep format --file {bicep_file} --outdir {out_dir}
    Format a Bicep file and save the result to the specified file.: az bicep format --file {bicep_file} --outfile {out_file}
    Format a Bicep file insert a final newline.: az bicep format --file {bicep_file} --insert-final-newline
    Format a Bicep file set indentation kind. Valid values are ( Space | Tab ).: az bicep format --file {bicep_file} --indent-kind {indent_kind}
    Format a Bicep file set number of spaces to indent with (Only valid with --indent-kind set to Space).: az bicep format --file {bicep_file} --indent-size {indent_size}
    Format a Bicep file.: az bicep format --file {bicep_file}
