# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets a single Adaptive Network Hardening resource.
flags:
    --adaptive-network-hardenings-resource-name=!: Adaptive Network Hardening resource name
    --resource-name=!: Name of the resource
    --resource-namespace=!: The Namespace of the resource
    --resource-type=!: The type of the resource
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        adaptive-network-hardenings-resource-name: Adaptive Network Hardening resource name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-name: Name of the resource.
        resource-namespace: The Namespace of the resource.
        resource-type: The type of the resource.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Adaptive Network Hardenings - Get.: az security adaptive_network_hardenings show --resource-group 'RG1' --resource-type 'virtualMachines' --resource-namespace 'Microsoft.Compute' --resource-name 'VM1' --adaptive-network-hardenings-resource-name 'default'
