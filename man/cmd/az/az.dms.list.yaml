# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the DMS instances within your currently configured subscription (to set this use "az account set").
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    command: List the DMS instances within your currently configured subscription (to set this use "az account set"). If provided, only show the instances within a given resource group.
    flag:
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all the instances in a given resource group.: az dms list -g myresourcegroup
    List all the instances in your subscription.: az dms list
