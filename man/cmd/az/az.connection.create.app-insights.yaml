# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: app-insights
description: Create a Service Connector local connection to app-insights.
flags:
    --app-insights=: Name of the app insights.
    --client-type=: The client type used on the connection
    --connection=: Name of the connection.
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --secret=:
        description: The secret auth info
        nargs: -1
    --subscription=: Name or ID of subscription.
    --target-id=: The resource id of target service.
    --target-resource-group=: The resource group which contains the app insights.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - go
            - none
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        app-insights: Name of the app insights. Required if '--target-id' is not specified.
        change-reference: The related change reference ID for this resource operation.
        client-type: |-
            The client type used on the connection.

            Accepted values: dotnet, dotnet-internal, go, java, nodejs, none, python
        connection: Name of the connection.
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        secret: 'The secret auth info. Usage: --secret.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-id: The resource id of target service. Required if ['--target-resource-group', '--app-insights'] are not specified. --target-resource-group --tg The resource group which contains the app insights. Required if '--target-id' is not specified.
        target-resource-group: The resource group which contains the app insights. Required if '--target-id' is not specified.
examples:
    Create a connection from local to app-insights interactively: az connection create app-insights -g resourceGroup
    Create a connection from local to app-insights with resource id: az connection create app-insights -g resourceGroup --target-id /subscriptions/{subscription}/resourceGroups/{target_resource_group}/providers/microsoft.insights/components/{appinsights} --secret
    Create a connection from local to app-insights with resource name: az connection create app-insights -g resourceGroup --tg AppInsightsRG --app-insights MyAppInsights --secret
