# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create or Update a volume
documentation:
    flag:
        allowed-clients: Client ingress specification as comma separated string with IPv4 CIDRs, IPv4 host addresses and host names. Exists for backwards compatibility, please use --export-policy-rules --rules instead.
        ca-retrieval-policy: 'coolAccessRetrievalPolicy determines the data retrieval behavior from the cool tier to standard storage based on the read pattern for cool access enabled volumes. The possible values for this field are:   Default - Data will be pulled from cool tier to standard storage on random reads. This policy is the default.  OnRead - All client-driven data read is pulled from cool tier to standard storage on both sequential and random reads.  Never - No client-driven data is pulled from cool tier to standard storage.'
        ca-tiering-policy: 'coolAccessTieringPolicy determines which cold data blocks are moved to cool tier. The possible values for this field are: Auto - Moves cold user data blocks in both the Snapshot copies and the active file system to the cool tier tier. This policy is the default. SnapshotOnly - Moves user data blocks of the Volume Snapshot copies that are not associated with the active file system to the cool tier.'
        chown-mode: This parameter specifies who is authorized to change the ownership of a file. restricted - Only root user can change the ownership of the file. unrestricted - Non-root users can change ownership of files that they own. Possible values include- Restricted, Unrestricted. Exists for backwards compatibility, please use --export-policy-rules --rules instead.
        cifs: Allows CIFS protocol. Enable only for CIFS type volumes. Exists for backwards compatibility, please use --export-policy-rules --rules instead.
        default-group-quota: Default group quota for volume in KiBs. If isDefaultQuotaEnabled is set, the minimum value of 4 KiBs applies.
        default-user-quota: Default user quota for volume in KiBs. If isDefaultQuotaEnabled is set, the minimum value of 4 KiBs applies .
        delete-base-snapshot: If enabled (true) the snapshot the volume was created from will be automatically deleted after the volume create operation has finished.  Defaults to false
        encryption-key-source: 'Source of key used to encrypt data in volume. Applicable if NetApp account has encryption.keySource = ''Microsoft.KeyVault''. Possible values (case-insensitive) are: ''Microsoft.NetApp, Microsoft.KeyVault'''
        file-path: A unique file path for the volume. Used when creating mount targets
        has-root-access: Has root access to volume. Exists for backwards compatibility, please use --export-policy-rules --rules instead.
        kerberos-enabled: Describe if a volume is KerberosEnabled. To be use with swagger version 2020-05-01 or later
        kerberos5i-r: Kerberos5i Readonly access. Exists for backwards compatibility, please use --export-policy-rules --rules instead.
        kerberos5i-rw: Kerberos5i Read and write access. Exists for backwards compatibility, please use --export-policy-rules --rules instead.
        kerberos5p-r: Kerberos5p Readonly access. Exists for backwards compatibility, please use --export-policy-rules --rules instead.
        kerberos5p-rw: Kerberos5p Read and write access. Exists for backwards compatibility, please use --export-policy-rules --rules instead.
        kerberos5-r: Kerberos5 Read only access. Exists for backwards compatibility, please use --export-policy-rules --rules instead.
        kerberos5-rw: Kerberos5 Read and write access. Exists for backwards compatibility, please use --export-policy-rules --rules instead.
        kv-private-endpoint-id: The resource ID of private endpoint for KeyVault. It must reside in the same VNET as the volume. Only applicable if encryptionKeySource = 'Microsoft.KeyVault'.
        placement-rules: Application specific placement rules for the particular volume  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        protocol-types: Set of protocol types, default NFSv3, CIFS for SMB protocol  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        rule-index: Order index. Exists for backwards compatibility, please use --export-policy-rules --rules instead.
        rules: Export policy rule  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        smb-access-enumeration: Enables access based enumeration share property for SMB Shares. Only applicable for SMB/DualProtocol volume
        smb-ca: Enables continuously available share property for smb volume. Only applicable for SMB volume
        smb-encryption: Enables encryption for in-flight smb3 data. Only applicable for SMB/DualProtocol volume. To be used with swagger version 2020-08-01 or later
        smb-non-browsable: Enables non browsable property for SMB Shares. Only applicable for SMB/DualProtocol volume
        subnet: The Azure Resource URI for a delegated subnet. Must have the delegation Microsoft.NetApp/volumes
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        unix-permissions: 'UNIX permissions for NFS volume accepted in octal 4 digit format. First digit selects the set user ID(4), set group ID (2) and sticky (1) attributes. Second digit selects permission for the owner of the file: read (4), write (2) and execute (1). Third selects permissions for other users in the same group. the fourth for other users not in the group. 0755 - gives read/write/execute permissions to owner and read/execute to group and other users.'
        unix-read-only: Read only access. Exists for backwards compatibility, please use --export-policy-rules (--rules) instead.
        unix-read-write: Read and write access. Exists for backwards compatibility, please use --export-policy-rules --rules instead.
        vnet: Name or Resource ID of the vnet. If you want to use a vnet in other resource group, please provide the Resource ID instead of the name of the vnet.
        volume-type: What type of volume is this. For destination volumes in Cross Region Replication, set type to DataProtection
        zones: Availability Zone  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --allowed-clients=: Client ingress specification as comma separated string with IPv4 CIDRs, IPv4 host addresses and host names.
    --avs-data-store=: Specifies whether the volume is enabled for Azure VMware Solution (AVS) datastore purpose
    --backup-id=: Resource identifier used to identify the Backup.
    --backup-policy-id=: Backup Policy Resource ID
    --backup-vault-id=: Backup Vault Resource ID
    --ca-retrieval-policy=: coolAccessRetrievalPolicy determines the data retrieval behavior from the cool tier to standard storage based on the read pattern for cool access enabled volumes.
    --ca-tiering-policy=: coolAccessTieringPolicy determines which cold data blocks are moved to cool tier.
    --chown-mode=:
        description: This parameter specifies who is authorized to change the ownership of a file.
        nargs: -1
    --cifs=:
        description: Allows CIFS protocol.
        nargs: -1
    --cool-access=:
        description: Specifies whether Cool Access(tiering) is enabled for the volume.
        nargs: -1
    --coolness-period=: Specifies the number of days after which data that is not accessed by clients will be tiered.
    --default-group-quota=: Default group quota for volume in KiBs.
    --default-user-quota=: Default user quota for volume in KiBs.
    --delete-base-snapshot=:
        description: If enabled (true) the snapshot the volume was created from will be automatically deleted after the volume create operation has finished.
        nargs: -1
    --enable-subvolumes=: Flag indicating whether subvolume operations are enabled on the volume
    --encryption-key-source=: Source of key used to encrypt data in volume.
    --endpoint-type=: Indicates whether the local volume is the source or destination for the Volume Replication
    --external-host-name=: The Path to a ONTAP Host
    --external-server-name=: The name of a server on the ONTAP Host
    --external-volume-name=: The name of a volume on the server
    --file-path=!: A unique file path for the volume.
    --has-root-access=:
        description: Has root access to volume.
        nargs: -1
    --is-def-quota-enabled=:
        description: Specifies if default quota is enabled for the volume.
        nargs: -1
    --is-large-volume=:
        description: Specifies whether volume is a Large Volume or Regular Volume.
        nargs: -1
    --is-restoring=:
        description: Restoring
        nargs: -1
    --kerberos-enabled=:
        description: Describe if a volume is KerberosEnabled.
        nargs: -1
    --kerberos5i-r=:
        description: Kerberos5i Readonly access.
        nargs: -1
    --kerberos5i-rw=:
        description: Kerberos5i Read and write access.
        nargs: -1
    --kerberos5p-r=:
        description: Kerberos5p Readonly access.
        nargs: -1
    --kerberos5p-rw=:
        description: Kerberos5p Read and write access.
        nargs: -1
    --kerberos5-r=:
        description: Kerberos5 Read only access.
        nargs: -1
    --kerberos5-rw=:
        description: Kerberos5 Read and write access.
        nargs: -1
    --kv-private-endpoint-id=: The resource ID of private endpoint for KeyVault.
    --ldap-enabled=:
        description: Specifies whether LDAP is enabled or not for a given NFS volume.
        nargs: -1
    --network-features=: Basic network, or Standard features available to the volume.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --placement-rules=:
        description: Application specific placement rules for the particular volume  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --policy-enforced=:
        description: Policy Enforced
        nargs: -1
    --pool-resource-id=: Pool Resource Id used in case of creating a volume through volume group
    --ppg=: Proximity placement group associated with the volume
    --protocol-types=:
        description: Set of protocol types, default NFSv3, CIFS for SMB protocol  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --relocation-requested=:
        description: Has relocation been requested for this volume
        nargs: -1
    --remote-volume-id=: The resource ID of the remote volume.
    --remote-volume-region=: The remote region for the other end of the Volume Replication.
    --replication-schedule=: Schedule
    --rule-index=: Order index.
    --rules=:
        description: Export policy rule  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --security-style=: The security style of volume, default unix, defaults to ntfs for dual protocol or CIFS protocol
    --service-level=: serviceLevel
    --smb-access-enumeration=: Enables access based enumeration share property for SMB Shares.
    --smb-ca=:
        description: Enables continuously available share property for smb volume.
        nargs: -1
    --smb-encryption=:
        description: Enables encryption for in-flight smb3 data.
        nargs: -1
    --smb-non-browsable=: Enables non browsable property for SMB Shares.
    --snapshot-dir-visible=:
        description: If enabled (true) the volume will contain a read-only snapshot directory which provides access to each of the volume's snapshots (defaults to true).
        nargs: -1
    --snapshot-id=: Resource identifier used to identify the Snapshot.
    --snapshot-policy-id=: Snapshot Policy ResourceId
    --subnet=: The Azure Resource URI for a delegated subnet.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    --throughput-mibps=: Maximum throughput in MiB/s that can be achieved by this volume and this will be accepted as input only for manual qosType volume
    --unix-permissions=: UNIX permissions for NFS volume accepted in octal 4 digit format.
    --unix-read-only=:
        description: Read only access.
        nargs: -1
    --unix-read-write=:
        description: Read and write access.
        nargs: -1
    --usage-threshold=: Maximum storage quota allowed for a file system in GiB.
    --vnet=: Name or Resource ID of the vnet.
    --volume-spec-name=: Volume spec name is the application specific designation or identifier for the particular volume in a volume group for e.g. data, log
    --volume-type=: What type of volume is this.
    --zones=:
        description: Availability Zone  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    -a, --account-name=!: The name of the NetApp account
    -g, --resource-group=!: Name of resource group.
    -l, --location=: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    -n, --name=!: The name of the volume
    -p, --pool-name=!: The name of the capacity pool
