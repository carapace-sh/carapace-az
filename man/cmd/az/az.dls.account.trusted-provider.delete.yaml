# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes the specified trusted identity provider from the specified Data Lake Store account.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        trusted-id-provider-name: The name of the trusted identity provider to delete. Required.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --trusted-id-provider-name=!: The name of the trusted identity provider to delete.
    -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
    -n, --account=: Name of the Data Lake Store account.
