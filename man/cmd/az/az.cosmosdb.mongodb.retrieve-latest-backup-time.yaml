# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: retrieve-latest-backup-time
description: Retrieves latest restorable timestamp for the given mongodb collection in given region.
flags:
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Name of the CosmosDB database account
    -c, --collection-name=!: Name of the CosmosDB MongoDB collection name
    -d, --database-name=!: Name of the CosmosDB MongoDB database name
    -g, --resource-group=!: Name of resource group.
    -l, --location=!: Location of the account
documentation:
    flag:
        account-name: Name of the CosmosDB database account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        collection-name: Name of the CosmosDB MongoDB collection name.
        database-name: Name of the CosmosDB MongoDB database name.
        location: Location of the account.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
