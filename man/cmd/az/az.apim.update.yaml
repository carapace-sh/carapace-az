# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an API Management service instance.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        disable-gateway: Disable gateway in the master region. Only valid for an Api Management service deployed in multiple locations.
        enable-managed-identity: Create a managed identity for the API Management service to access other Azure resources. Only meant to be used for Consumption SKU Service.
        public-network-access: Whether or not public endpoint access is allowed for this API Management service. If set to true, private endpoints are the exclusive access method.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --disable-gateway=:
        description: Disable gateway in the master region.
        nargs: -1
    --enable-client-certificate=:
        description: Enforces a client certificate to be presented on each request to the gateway and also enables the ability to authenticate the certificate in the policy on the gateway.
        nargs: -1
    --enable-managed-identity=:
        description: Create a managed identity for the API Management service to access other Azure resources.
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --no-wait=: Do not wait for the long-running operation to finish.
    --public-network-access=:
        description: Whether or not public endpoint access is allowed for this API Management service.
        nargs: -1
    --publisher-email=: The e-mail address to receive all system notifications.
    --publisher-name=: The name of your organization for use in the developer portal and e-mail notifications.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku-capacity=: The number of deployed units of the SKU.
    --sku-name=: The sku of the api management instance
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the api management service instance
    -v, --virtual-network=: The virtual network type.
completion:
    flag:
        disable-gateway:
            - "true"
            - "false"
        enable-client-certificate:
            - "true"
            - "false"
        enable-managed-identity:
            - "true"
            - "false"
        public-network-access:
            - "true"
            - "false"
        sku-name:
            - Developer
            - Standard
            - Premium
            - Basic
            - Consumption
            - Isolated
        virtual-network:
            - None
            - External
            - Internal
