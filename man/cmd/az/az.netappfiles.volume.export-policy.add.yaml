# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a new rule to the export policy for a volume.
flags:
    --allowed-clients=: Client ingress specification as comma separated string with IPv4 CIDRs, IPv4 host addresses and host names
    --chown-mode=: This parameter specifies who is authorized to change the ownership of a file.
    --cifs=:
        description: Allows CIFS protocol
        nargs: -1
    --has-root-access=:
        description: Has root access to volume
        nargs: -1
    --kerberos5i-read-only=:
        description: Kerberos5i Read only access.
        nargs: -1
    --kerberos5i-read-write=:
        description: Kerberos5i Read and write access.
        nargs: -1
    --kerberos5p-read-only=:
        description: Kerberos5p Read only access.
        nargs: -1
    --kerberos5p-read-write=:
        description: Kerberos5p Read and write access.
        nargs: -1
    --kerberos5-read-only=:
        description: Kerberos5 Read only access.
        nargs: -1
    --kerberos5-read-write=:
        description: Kerberos5 Read and write access.
        nargs: -1
    --nfsv3=:
        description: Allows NFSv3 protocol.
        nargs: -1
    --nfsv41=:
        description: Allows NFSv4.1 protocol.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --rule-index=: Order index
    --subscription=: Name or ID of subscription.
    --unix-read-only=:
        description: Read only access
        nargs: -1
    --unix-read-write=:
        description: Read and write access
        nargs: -1
    -a, --account-name=!: The name of the NetApp account
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the volume
    -p, --pool-name=!: The name of the capacity pool
