documentation:
    flag:
        account-name: The name of the NetApp account. --name --volume-name -n -v The name of the volume.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allowed-clients: Client ingress specification as comma separated string with IPv4 CIDRs, IPv4 host addresses and host names.
        change-reference: The related change reference ID for this resource operation.
        chown-mode: |-
            This parameter specifies who is authorized to change the ownership of a file. restricted - Only root user can change the ownership of the file. unrestricted - Non-root users can change ownership of files that they own.

            Default value: Restricted

            Accepted values: Restricted, Unrestricted
        cifs: |-
            Allows CIFS protocol.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        has-root-access: |-
            Has root access to volume.

            Default value: True

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        kerberos5i-read-only: |-
            Kerberos5i Read only access. To be use with swagger version 2020-05-01 or later.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        kerberos5i-read-write: |-
            Kerberos5i Read and write access. To be use with swagger version 2020-05-01 or later.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        kerberos5p-read-only: |-
            Kerberos5p Read only access. To be use with swagger version 2020-05-01 or later.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        kerberos5p-read-write: |-
            Kerberos5p Read and write access. To be use with swagger version 2020-05-01 or later.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        kerberos5-read-only: |-
            Kerberos5 Read only access. To be use with swagger version 2020-05-01 or later.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        kerberos5-read-write: |-
            Kerberos5 Read and write access. To be use with swagger version 2020-05-01 or later.

            Default value: False

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        nfsv3: |-
            Allows NFSv3 protocol. Enable only for NFSv3 type volumes.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        nfsv41: |-
            Allows NFSv4.1 protocol. Enable only for NFSv4.1 type volumes.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        pool-name: The name of the capacity pool.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule-index: Order index.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        unix-read-only: |-
            Read only access.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        unix-read-write: |-
            Read and write access.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
examples:
    Add an export policy rule for the ANF volume: az netappfiles volume export-policy add -g mygroup --account-name myaccname --pool-name mypoolname --name myvolname --allowed-clients "1.2.3.0/24" --rule-index 2 --unix-read-only true --unix-read-write false --cifs false --nfsv3 true --nfsv41 false
