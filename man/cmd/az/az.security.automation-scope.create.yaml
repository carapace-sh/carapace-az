# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates security automation scope.
flags:
    --description=!: The resources scope description
    --scope-path=!: The resources scope path.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: The resources scope description.
        scope-path: The resources scope path. Can be the subscription on which the automation is defined on or a resource group under that subscription (fully qualified Azure resource IDs).
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Creates security automation scope.: az security automation-scope create --description 'this is a sample description' --scope-path '/subscriptions/03b601f1-7eca-4496-8f8d-355219eee254/'
