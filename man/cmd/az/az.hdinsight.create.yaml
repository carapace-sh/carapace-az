# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new cluster.
flags:
    --assign-identity=:
        description: The name or ID of user assigned identity.
        nargs: -1
    --autoscale-max-workernode-count=: The max workernode count for Load-based atuoscale.
    --autoscale-min-workernode-count=: The minimal workernode count for Load-based atuoscale.
    --autoscale-type=: The autoscale type.
    --autoscale-workernode-count=: The scheduled workernode count.
    --cluster-admin-account=: The domain user account that will have admin privileges on the cluster.
    --cluster-admin-password=: The domain admin password.
    --cluster-configurations=: Extra configurations of various components.
    --cluster-tier=: The tier of the cluster
    --cluster-users-group-dns=:
        description: A space-delimited list of Distinguished Names for cluster user groups.
        nargs: -1
    --component-version=:
        description: The versions of various Hadoop components, in space-separated versions in 'component=version' format.
        nargs: -1
    --days=:
        description: A space-delimited list of schedule day.
        nargs: -1
    --domain=: The name or resource ID of the user's Azure Active Directory Domain Service.
    --edgenode-size=: The size of the node.
    --enable-compute-isolation=:
        description: Indicate whether enable compute isolation or not.
        nargs: -1
    --enable-private-link=:
        description: Indicate whether enable the private link or not.
        nargs: -1
    --encryption-algorithm=: Algorithm identifier for encryption.
    --encryption-at-host=:
        description: Indicates whether enable encryption at host or not.
        nargs: -1
    --encryption-in-transit=:
        description: Indicates whether enable encryption in transit.
        nargs: -1
    --encryption-key-name=: Key name that is used for enabling disk encryption.
    --encryption-key-version=: Key version that is used for enabling disk encryption.
    --encryption-vault-uri=: Base key vault URI where the customers key is located eg.
    --esp=: Specify to create cluster with Enterprise Security Package.
    --headnode-size=: The size of the node.
    --host-sku=: The dedicated host sku of compute isolation.
    --idbroker=: Specify to create ESP cluster with HDInsight ID Broker.
    --kafka-client-group-id=: The client AAD security group id for Kafka Rest Proxy
    --kafka-client-group-name=: The client AAD security group name for Kafka Rest Proxy
    --kafka-management-node-count=: The number of kafka management node in the cluster
    --kafka-management-node-size=: The size of the node.
    --ldaps-urls=:
        description: A space-delimited list of LDAPS protocol URLs to communicate with the Active Directory.
        nargs: -1
    --minimal-tls-version=: The minimal supported TLS version.
    --no-validation-timeout=: Permit timeout error during argument validation phase.
    --no-wait=: Do not wait for the long-running operation to finish.
    --outbound-dependencies-managed-type=: The direction for the resource provider connection.
    --private-link-config=: The private link configurations when creating cluster.
    --public-ip-tag-type=: 'Gets or sets the ipTag type: Example FirstPartyUsage.'
    --public-ip-tag-value=: Gets or sets value of the IpTag associated with the public IP.Example HDInsight, SQL, Storage etc
    --resource-provider-connection=: The resource provider connection type
    --storage-account-key=: The storage account key.
    --storage-account-managed-identity=: User-assigned managed identity with access to the storage account filesystem.
    --storage-account=: The name or ID of the storage account.
    --storage-container=: The storage container the cluster will use.
    --storage-filesystem=: The storage filesystem the cluster will use.
    --subnet=: The name or ID of subnet.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --time=: The 24-hour time in the form of xx:xx in days.
    --timezone=: The timezone for schedule autoscale type.
    --vnet-name=: The name of a virtual network.
    --workernode-data-disk-size=: The size of the data disk in GB, e.g. 1023.
    --workernode-data-disk-storage-account-type=: 'The type of storage account that will be used for the data disks: standard_lrs or premium_lrs'
    --workernode-data-disks-per-node=: The number of data disks to use per worker node.
    --workernode-size=: The size of the node.
    --zones=:
        description: A space-delimited list of availability zones where cluster will be created.
        nargs: -1
    --zookeepernode-size=: The size of the node.
    -K, --ssh-public-key=: SSH public key for the cluster nodes.
    -P, --ssh-password=: SSH password for the cluster nodes.
    -U, --ssh-user=: SSH username for the cluster nodes.
    -c, --workernode-count=: The number of worker nodes in the cluster.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of the cluster.
    -p, --http-password=: HTTP password for the cluster.
    -t, --type=!: 'Type of HDInsight cluster, like: hadoop, interactivehive, hbase, kafka, storm, spark, rserver, mlservices.'
    -u, --http-user=: HTTP username for the cluster.
    -v, --version=: The HDInsight cluster version.
completion:
    flag:
        autoscale-type:
            - Load
            - Schedule
        cluster-tier:
            - Standard
            - Premium
        days:
            - Monday
            - Tuesday
            - Wednesday
            - Thursday
            - Friday
            - Saturday
            - Sunday
        enable-compute-isolation:
            - "true"
            - "false"
        enable-private-link:
            - "true"
            - "false"
        encryption-algorithm:
            - RSA-OAEP
            - RSA-OAEP-256
            - RSA1_5
        encryption-at-host:
            - "true"
            - "false"
        encryption-in-transit:
            - "true"
            - "false"
        minimal-tls-version:
            - "1.2"
        outbound-dependencies-managed-type:
            - Managed
            - External
        resource-provider-connection:
            - Inbound
            - Outbound
        workernode-data-disk-storage-account-type:
            - standard_lrs
            - premium_lrs
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        assign-identity: The name or ID of user assigned identity. Skip this field when assign_identity_type is SystemAssigned.
        autoscale-type: |-
            The autoscale type.

            Accepted values: Load, Schedule
        change-reference: The related change reference ID for this resource operation.
        cluster-admin-account: The domain user account that will have admin privileges on the cluster. Required only when create cluster with Enterprise Security Package.
        cluster-admin-password: The domain admin password. Required only when create cluster with Enterprise Security Package.
        cluster-configurations: 'Extra configurations of various components. Configurations may be supplied from a file using the ``` @{path} ``` syntax or a JSON string. See also: https://learn.microsoft.com/azure/hdinsight/hdinsight-hadoop-customize-cluster-bootstrap .'
        cluster-tier: |-
            The tier of the cluster.

            Accepted values: Premium, Standard
        cluster-users-group-dns: 'A space-delimited list of Distinguished Names for cluster user groups. Required only when create cluster with Enterprise Security Package. '
        component-version: |-
            The versions of various Hadoop components, in space-separated versions in 'component=version' format. Example: Spark=2.0 Hadoop=2.7.3 See also: https://learn.microsoft.com/azure/hdinsight/hdinsight-component-versioning#hadoop-components-available-with-different-hdinsight-versions .

            Accepted values: false, true
        days: |-
            A space-delimited list of schedule day.

            Accepted values: Friday, Monday, Saturday, Sunday, Thursday, Tuesday, Wednesday
        domain: The name or resource ID of the user's Azure Active Directory Domain Service. Required only when create cluster with Enterprise Security Package.
        edgenode-size: 'The size of the node. See also: https://learn.microsoft.com/azure/hdinsight/hdinsight-hadoop-provision-linux-clusters#configure-cluster-size .'
        enable-private-link: |-
            Indicate whether enable the private link or not.

            Accepted values: false, true
        encryption-algorithm: |-
            Algorithm identifier for encryption.

            Default value: RSA-OAEP

            Accepted values: RSA-OAEP, RSA-OAEP-256, RSA1_5
        encryption-at-host: |-
            Indicates whether enable encryption at host or not.

            Accepted values: false, true
        encryption-in-transit: |-
            Indicates whether enable encryption in transit.

            Accepted values: false, true
        encryption-key-name: Key name that is used for enabling disk encryption.
        encryption-key-version: Key version that is used for enabling disk encryption.
        encryption-vault-uri: Base key vault URI where the customers key is located eg. ``` https://myvault.vault.azure.net ``` .
        esp: |-
            Specify to create cluster with Enterprise Security Package. If omitted, creating cluster with Enterprise Security Package will not not allowed.

            Default value: False
        headnode-size: 'The size of the node. See also: https://learn.microsoft.com/azure/hdinsight/hdinsight-hadoop-provision-linux-clusters#configure-cluster-size .'
        host-sku: The dedicated host sku of compute isolation.
        http-password: HTTP password for the cluster. Will prompt if not given.
        http-user: 'HTTP username for the cluster.  Default: admin.'
        idbroker: |-
            Specify to create ESP cluster with HDInsight ID Broker. If omitted, creating ESP cluster with HDInsight ID Broker will not not allowed.

            Default value: False
        kafka-client-group-id: The client AAD security group id for Kafka Rest Proxy.
        kafka-client-group-name: The client AAD security group name for Kafka Rest Proxy.
        kafka-management-node-count: |-
            The number of kafka management node in the cluster.

            Default value: 2
        kafka-management-node-size: 'The size of the node. See also: https://learn.microsoft.com/azure/hdinsight/hdinsight-hadoop-provision-linux-clusters#configure-cluster-size .'
        ldaps-urls: A space-delimited list of LDAPS protocol URLs to communicate with the Active Directory. Required only when create cluster with Enterprise Security Package.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        minimal-tls-version: |-
            The minimal supported TLS version.

            Accepted values: 1.2
        name: The name of the cluster.
        no-validation-timeout: |-
            Permit timeout error during argument validation phase. If omitted, validation timeout error will be permitted.

            Default value: False
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False

            Accepted values: External, Managed
        private-link-config: The private link configurations when creating cluster. Private Link Configurations may be supplied from a file using the `@{path}` syntax or a JSON string. Please see https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/hdinsight/tests/latest/privatelinkconfigurations.json
        public-ip-tag-type: 'Gets or sets the ipTag type: Example FirstPartyUsage.'
        public-ip-tag-value: |-
            Gets or sets value of the IpTag associated with the public IP.Example HDInsight, SQL, Storage etc.

            Accepted values: Inbound, Outbound
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        ssh-password: SSH password for the cluster nodes. If none specified, uses the HTTP password.
        ssh-public-key: SSH public key for the cluster nodes.
        ssh-user: |-
            SSH username for the cluster nodes.

            Default value: sshuser
        storage-account: The name or ID of the storage account.
        storage-account-key: The storage account key. A key can be retrieved automatically if the user has access to the storage account.
        storage-account-managed-identity: User-assigned managed identity with access to the storage account filesystem. Only required when storage account type is Azure Data Lake Storage Gen2.
        storage-container: The storage container the cluster will use. Uses the cluster name if none was specified. (WASB only).
        storage-filesystem: The storage filesystem the cluster will use. Uses the cluster name if none was specified. (DFS only).
        subnet: The name or ID of subnet. If name is supplied, `--vnet-name` must be supplied.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        time: The 24-hour time in the form of xx:xx in days.
        timezone: The timezone for schedule autoscale type. Values from ``` az hdinsight autoscale list-timezones ``` .
        type: 'Type of HDInsight cluster, like: hadoop, interactivehive, hbase, kafka, storm, spark, rserver, mlservices. See also: https://learn.microsoft.com/azure/hdinsight/hdinsight-hadoop-provision-linux-clusters#cluster-types .'
        version: |-
            The HDInsight cluster version. See also: https://learn.microsoft.com/azure/hdinsight/hdinsight-component-versioning#supported-hdinsight-versions .

            Default value: default
        vnet-name: The name of a virtual network.
        workernode-count: |-
            The number of worker nodes in the cluster.

            Default value: 3
        workernode-data-disk-size: The size of the data disk in GB, e.g. 1023.
        workernode-data-disk-storage-account-type: |-
            The type of storage account that will be used for the data disks: standard_lrs or premium_lrs.

            Accepted values: premium_lrs, standard_lrs
        workernode-data-disks-per-node: The number of data disks to use per worker node.
        workernode-size: 'The size of the node. See also: https://learn.microsoft.com/azure/hdinsight/hdinsight-hadoop-provision-linux-clusters#configure-cluster-size .'
        zones: A space-delimited list of availability zones where cluster will be created.
        zookeepernode-size: 'The size of the node. See also: https://learn.microsoft.com/azure/hdinsight/hdinsight-hadoop-provision-linux-clusters#configure-cluster-size .'
examples:
    Create a Kafka cluster with disk encryption. See https://learn.microsoft.com/azure/hdinsight/kafka/apache-kafka-byok.: |-
        az hdinsight create -t kafka -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" --workernode-data-disks-per-node 2 \
        --storage-account MyStorageAccount \
        --encryption-key-name kafkaClusterKey \
        --encryption-key-version 00000000000000000000000000000000 \
        --encryption-vault-uri https://MyKeyVault.vault.azure.net \
        --assign-identity MyMSI
    Create a cluster which Load-based Autoscale.: |-
        az hdinsight create -t spark --version 3.6 -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" --storage-account MyStorageAccount \
        --autoscale-type Load --autoscale-min-workernode-count 3 --autoscale-max-workernode-count 5
    Create a cluster which Schedule-based Autoscale.: |-
        az hdinsight create -t spark --version 3.6 -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" --storage-account MyStorageAccount \
        --autoscale-type Schedule --timezone "Pacific Standard Time" --days Monday \
        --time 09:00 --autoscale-workernode-count 5
    Create a cluster which enables encryption in transit.: |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" \
        --storage-account MyStorageAccount --encryption-in-transit true
    Create a cluster with Azure Data Lake Storage Gen2: |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" \
        --storage-account MyStorageAccount \
        --storage-account-managed-identity MyMSI
    Create a cluster with Compute Isolation feature.: |-
        az hdinsight create -t spark --version 3.6 -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" --storage-account MyStorageAccount \
        --enable-compute-isolation --workernode-size "Standard_E8S_V3" --headnode-size "Standard_E8S_V3"
    Create a cluster with Relay Outbound and Private Link feature.: |-
        az hdinsight create -t spark --version 3.6 -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" --storage-account MyStorageAccount \
        --subnet "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg/providers/Microsoft.Network/virtualNetworks/fakevnet/subnets/default" \
        --resource-provider-connection Outbound --enable-private-link
    Create a cluster with WASB + MSI.: |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" \
        --storage-account MyStorageAccount \
        --storage-account-managed-identity MyMSI
    Create a cluster with an existing storage account.: |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" \
        --storage-account MyStorageAccount
    Create a cluster with configuration from JSON string.: |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" \
        --storage-account MyStorageAccount \
        --cluster-configuration {'gateway':{'restAuthCredential.username':'admin'}}
    Create a cluster with configuration from a local file.: |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" \
        --storage-account MyStorageAccount \
        --cluster-configuration @config.json
    Create a cluster with encryption at host.: |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" \
        --storage-account MyStorageAccount --encryption-at-host true
    Create a cluster with minimal tls version.: |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" \
        --storage-account MyStorageAccount --minimal-tls-version 1.2
    Create a cluster with the Enterprise Security Package (ESP) and enable HDInsight ID Broker.: |-
        az hdinsight create --esp --idbroker -t spark -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" \
        --storage-account MyStorageAccount \
        --subnet "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyRG/providers/Microsoft.Network/virtualNetworks/MyVnet/subnets/subnet1" \
        --domain "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyRG/providers/Microsoft.AAD/domainServices/MyDomain.onmicrosoft.com" \
        --assign-identity "/subscriptions/00000000-0000-0000-0000-000000000000/resourcegroups/MyMsiRG/providers/Microsoft.ManagedIdentity/userAssignedIdentities/MyMSI" \
        --cluster-admin-account MyAdminAccount@MyDomain.onmicrosoft.com \
        --cluster-users-group-dns MyGroup
    Create a cluster with the Enterprise Security Package (ESP).: |-
        az hdinsight create --esp -t spark -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" \
        --storage-account MyStorageAccount \
        --subnet "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyRG/providers/Microsoft.Network/virtualNetworks/MyVnet/subnets/subnet1" \
        --domain "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyRG/providers/Microsoft.AAD/domainServices/MyDomain.onmicrosoft.com" \
        --assign-identity "/subscriptions/00000000-0000-0000-0000-000000000000/resourcegroups/MyMsiRG/providers/Microsoft.ManagedIdentity/userAssignedIdentities/MyMSI" \
        --cluster-admin-account MyAdminAccount@MyDomain.onmicrosoft.com \
        --cluster-users-group-dns MyGroup
    Create a entra user cluster with Entra User By a JSON file: |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        --ssh-password "sshPassword1234!" \
        --storage-account MyStorageAccount \
        --entra-user-full-info @config.json
    Create a entra user cluster with Entra User By a JSON string: |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        --ssh-password "sshPassword1234!" \
        --storage-account MyStorageAccount \
        --entra-user-full-info '[{"objectId": "00000000-0000-0000-0000-000000000000","displayName": "name","upn": "user@contoso.com"}]'
    Create a entra user cluster with Entra User By a JSON string (use short name): |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        --ssh-password "sshPassword1234!" \
        --storage-account MyStorageAccount \
        --entra-uinfo '[{"objectId": "00000000-0000-0000-0000-000000000000","displayName": "name","upn": "user@contoso.com"}]'
    Create a entra user cluster with Entra User By objectId or upn (comma-separated): |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        --ssh-password "sshPassword1234!" \
        --storage-account MyStorageAccount \
        --entra-user-identity "00000000-0000-0000-0000-000000000000","00000000-0000-0000-0000-000000000000","user@contoso.com"
    Create a entra user cluster with Entra User By objectId or upn (comma-separated, use short name): |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        --ssh-password "sshPassword1234!" \
        --storage-account MyStorageAccount \
        --entra-uid "00000000-0000-0000-0000-000000000000","00000000-0000-0000-0000-000000000000","user@contoso.com"
    Create a entra user cluster with Entra User By objectId or upn (space-separated): |-
        az hdinsight create -t spark -g MyResourceGroup -n MyCluster \
        --ssh-password "sshPassword1234!" \
        --storage-account MyStorageAccount \
        --entra-user-identity "00000000-0000-0000-0000-000000000000" "00000000-0000-0000-0000-000000000000" "user@contoso.com"
    Create a kafka cluster with kafka rest proxy.: |-
        az hdinsight create -t kafka -g MyResourceGroup -n MyCluster \
        -p "HttpPassword1234!" --workernode-data-disks-per-node 2 \
        --storage-account MyStorageAccount \
        --kafka-management-node-size "Standard_D4_v2" \
        --kafka-client-group-id MySecurityGroupId \
        --kafka-client-group-name MySecurityGroupName
        --component-version kafka=2.1
