# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: verify
description: Verifies an Azure IoT Hub certificate.
flags:
    --hub-name=: IoT Hub name.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -e, --etag=!: Entity Tag (etag) of the object.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: A friendly name for the certificate.
    -p, --path=!: The path to the file containing the certificate.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        etag: Etag or entity tag corresponding to the last state of the resource. If no etag is provided the value '*' is used.
        hub-name: IoT Hub name.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: A friendly name for the certificate.
        path: The path to the file containing the certificate.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Verifies an Azure IoT Hub certificate (autogenerated): az iot hub certificate verify --etag AAAAAAAAAAA= --hub-name MyIotHub --name MyCertificate --path /certificates/Verification.pem --resource-group MyResourceGroup --subscription MySubscription
    Verifies ownership of the MyCertificate private key.: az iot hub certificate verify --hub-name MyIotHub --name MyCertificate --path /certificates/Verification.pem --etag AAAAAAAAAAA=
