# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a live output.
flags:
    --archive-window-length=!: ISO 8601 timespan duration of the archive window length.
    --asset-name=!: The name of the asset.
    --description=: The live output description.
    --fragments-per-ts-segment=: The number of fragments per HLS segment.
    --live-event-name=!: The name of the live event.
    --manifest-name=: The manifest file name.
    --output-snap-time=: The output snapshot time.
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: The name of the Azure Media Services account.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the live output.
documentation:
    flag:
        account-name: The name of the Azure Media Services account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        archive-window-length: ISO 8601 timespan duration of the archive window length. This is the duration that customer want to retain the recorded content. Minimum window is 5 minutes (PT5M or 00:05:00). Maximum window is 25 hours (PT25H or 25:00:00). For example, to retain the output for 10 minutes, use PT10M or 00:10:00.
        asset-name: The name of the asset.
        change-reference: The related change reference ID for this resource operation.
        description: The live output description.
        fragments-per-ts-segment: The number of fragments per HLS segment.
        live-event-name: The name of the live event.
        manifest-name: The manifest file name. If not provided, the service will generate one automatically.
        name: The name of the live output.
        output-snap-time: The output snapshot time.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a live output.: az ams live-output create -a myAMS -n liveoutput -g rg --asset-name asset --live-event-name liveevent --archive-window-length PT5M --manifest-name man
