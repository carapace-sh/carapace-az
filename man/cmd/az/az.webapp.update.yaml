# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an existing web app.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --basic-auth=: Enable or disable basic auth.
    --client-affinity-enabled=:
        description: Enables sending session affinity cookies.
        nargs: -1
    --force-dns-registration=:
        description: If true, web app hostname is force registered with DNS
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --https-only=:
        description: Redirect all traffic made to an app using HTTP to HTTPS.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --skip-custom-domain-verification=:
        description: If true, custom (non *.azurewebsites.net) domains associated with web app are not verified
        nargs: -1
    --skip-dns-registration=:
        description: If true web app hostname is not registered with DNS on creation
        nargs: -1
    --subscription=: Name or ID of subscription.
    --ttl-in-seconds=:
        description: Time to live in seconds for web app's default domain name
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -i, --minimum-elastic-instance-count=: Minimum number of instances.
    -n, --name=: name of the web app.
    -s, --slot=: the name of the slot.
    -w, --prewarmed-instance-count=: Number of preWarmed instances.
completion:
    flag:
        basic-auth:
            - Enabled
            - Disabled
        client-affinity-enabled:
            - "true"
            - "false"
        force-dns-registration:
            - "true"
            - "false"
        https-only:
            - "true"
            - "false"
        skip-custom-domain-verification:
            - "true"
            - "false"
        skip-dns-registration:
            - "true"
            - "false"
        ttl-in-seconds:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        basic-auth: |-
            Enable or disable basic auth.

            Accepted values: Disabled, Enabled
        change-reference: The related change reference ID for this resource operation.
        client-affinity-enabled: |-
            Enables sending session affinity cookies.

            Accepted values: false, true
        end-to-end-encryption-enabled: |-
            Enable or disable end-to-end encryption between the Front End and the Workers.

            Accepted values: false, true
        force-dns-registration: |-
            Argument 'force_dns_registration' has been deprecated and will be removed in version '3.0.0'. If true, web app hostname is force registered with DNS.

            Accepted values: false, true
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        https-only: |-
            Redirect all traffic made to an app using HTTP to HTTPS.

            Accepted values: false, true
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        minimum-elastic-instance-count: Minimum number of instances. App must be in an elastic scale App Service Plan.
        name: Name of the web app. If left unspecified, a name will be randomly generated. You can configure the default using ``` az configure --defaults web=<name> ``` .
        platform-release-channel: |-
            Set the platform release channel for the web app. Possible values: Latest, Standard, Extended.

            Accepted values: Extended, Latest, Standard
        prewarmed-instance-count: Number of preWarmed instances. App must be in an elastic scale App Service Plan.
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        site-scoped-certs: |-
            Enable or disable site-scoped certificates.

            Accepted values: false, true
        skip-custom-domain-verification: |-
            Argument 'skip_custom_domain_verification' has been deprecated and will be removed in version '3.0.0'. If true, custom (non *.azurewebsites.net) domains associated with web app are not verified.

            Accepted values: false, true
        skip-dns-registration: |-
            Argument 'skip_dns_registration' has been deprecated and will be removed in version '3.0.0'. If true web app hostname is not registered with DNS on creation.

            Accepted values: false, true
        slot: The name of the slot. Default to the productions slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        ttl-in-seconds: |-
            Argument 'ttl_in_seconds' has been deprecated and will be removed in version '3.0.0'. Time to live in seconds for web app's default domain name.

            Accepted values: false, true
examples:
    Update a web app. (autogenerated): az webapp update --https-only true --name MyAppName --resource-group MyResourceGroup
    Update the platform release channel of a web app. Possible values are Latest, Standard, Extended.: az webapp update --platform-release-channel Extended --name MyAppName --resource-group MyResourceGroup
    Update the tags of a web app.: az webapp update -g MyResourceGroup -n MyAppName --set tags.tagName=tagValue
