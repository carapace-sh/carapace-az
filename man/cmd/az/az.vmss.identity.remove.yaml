# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove user assigned identities from a VM scaleset.
flags:
    --identities=:
        description: Space-separated identities to remove.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Scale set name.
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        identities: 'Space-separated identities to remove. Use ''[system]'' to refer to the system assigned identity. Default: ''[system]''.'
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Scale set name. You can configure the default using ``` az configure --defaults vmss=<name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Remove 2 identities which are in the same resource group with the VM scaleset: az vmss identity remove -g MyResourceGroup -n MyVmss --identities readerId writerId
    Remove system assigned identity: az vmss identity remove -g MyResourceGroup -n MyVmss
    Remove system assigned identity and a user identity: az vmss identity remove -g MyResourceGroup -n MyVmss --identities [system] readerId
