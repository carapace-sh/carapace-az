# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates or updates the specified trusted identity provider.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        trusted-id-provider-name: The name of the trusted identity provider. This is used for differentiation of providers in the account.
flags:
    --id-provider=!: The URL of this trusted identity provider.
    --subscription=: Name or ID of subscription.
    --trusted-id-provider-name=!: The name of the trusted identity provider.
    -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
    -n, --account=!: Name of the Data Lake Store account.
