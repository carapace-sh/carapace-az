# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes the requested long term retention backup.
flags:
    --backup-id=: The resource id of the backups.
    --managed-instance=: Name of the Azure SQL Managed Instance.
    --subscription=: Name or ID of subscription.
    -d, --database=: The name of the Azure SQL Managed Database.
    -l, --location=: The location of the desired backup(s).
    -n, --name=: The name of the LTR backup.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-id: 'The resource id of the backups. Use ''az sql midb ltr-backup show'' or ''az sql midb ltr-backup list'' for backup id. If provided, other arguments are not required. '
        change-reference: The related change reference ID for this resource operation.
        database: The name of the Azure SQL Managed Database.
        location: The location of the desired backup(s). --managed-instance --mi Name of the Azure SQL Managed Instance.
        name: The name of the LTR backup. Use 'az sql midb ltr-backup show' or 'az sql midb ltr-backup list' for backup name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete long term retention backup for a managed database.: az sql midb ltr-backup delete --backup-id '/subscriptions/6caa113c-794c-42f8-ab9d-878d8aa104dc/resourceGroups/mygroup/providers/Microsoft.Sql/locations/southeastasia/longTermRetentionManagedInstances/myinstance/longTermRetentionDatabases/mymanageddb/longTermRetentionManagedInstanceBackups/3214b3fb-fba9-43e7-96a3-09e35ffcb336;132292152080000000'
