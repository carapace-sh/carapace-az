# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List a service principal's password or certificate credential metadata.
flags:
    --cert=: Operate on certificate credentials
    --id=!: service principal name, or object id
documentation:
    command: List a service principal's password or certificate credential metadata. (The content of the password or certificate credential is not retrievable.).
    flag:
        cert: |-
            Operate on certificate credentials.

            Default value: False
        id: Service principal name, or object id.
examples:
    List a service principal's certificate credentials: az ad sp credential list --id 00000000-0000-0000-0000-000000000000 --cert
    List a service principal's password credentials: az ad sp credential list --id 00000000-0000-0000-0000-000000000000
