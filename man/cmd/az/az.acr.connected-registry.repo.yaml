# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: repo
description: Update all the necessary connected registry sync scope maps repository permissions.
documentation:
    flag:
        add: repository permissions to be added to the targeted connected registry and it's ancestors sync scope maps. Use the format "--add [REPO1 REPO2 ...]" per flag. Valid actions are ['content/delete', 'content/read', 'content/write', 'metadata/read', 'metadata/write']
        name: Name for the connected registry. Name must be between 5 to 40 character long, start with a letter and contain only alphanumeric characters (including ‘_’ or ‘-’). Name must be unique under the Cloud ACR hierarchy.
        registry: The login server of the Cloud ACR registry. Must be the FQDN to support also Azure Stack.
        remove: repository permissions to be removed from the targeted connected registry and it's succesors sync scope maps. Use the format "--remove [REPO1 REPO2 ...]" per flag. Valid actions are ['content/delete', 'content/read', 'content/write', 'metadata/read', 'metadata/write']
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --add=:
        description: repository permissions to be added to the targeted connected registry and it's ancestors sync scope maps.
        nargs: -1
    --remove=:
        description: repository permissions to be removed from the targeted connected registry and it's succesors sync scope maps.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name for the connected registry.
    -r, --registry=!: The login server of the Cloud ACR registry.
