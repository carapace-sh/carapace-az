# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get an invoice.
flags:
    --account-name=: The ID that uniquely identifies a billing account.
    --by-subscription=: When provided, it must work with --invoice-name to get an invoice by subscription ID and invoice ID
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies an invoice.
documentation:
    command: Get an invoice. The operation is supported for billing accounts with agreement type Microsoft Partner Agreement or Microsoft Customer Agreement.
    flag:
        account-name: The ID that uniquely identifies a billing account.
        by-subscription: When provided, it must work with --invoice-name to get an invoice by subscription ID and invoice ID.
        name: The ID that uniquely identifies an invoice.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show an invoice by ID: az billing invoice show --name "{invoiceName}"
    Show an invoice by billing account name and ID: az billing invoice show --account-name "{billingAccountName}" --name "{invoiceName}"
    Show an invoice by subscription ID and invoice ID: az billing invoice show --name "{invoiceName}" --by-subscription
