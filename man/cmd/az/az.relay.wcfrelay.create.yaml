# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the Relay Service WCF Relay.
flags:
    --namespace-name=!: Name of Namespace.
    --relay-type=: Relay type.
    --subscription=: Name or ID of subscription.
    --user-metadata=: Endpoint metadata.
    -c, --requires-client-authorization=:
        description: Indicates whether client authorization is required.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of WCF Relay.
    -t, --requires-transport-security=:
        description: Indicates whether transport security is required.
        nargs: -1
completion:
    flag:
        relay-type:
            - Http
            - NetTcp
        requires-client-authorization:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        requires-transport-security:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of WCF Relay.
        namespace-name: Name of Namespace.
        relay-type: |-
            Relay type.  Allowed values: Http, NetTcp.

            Default value: NetTcp

            Accepted values: Http, NetTcp
        requires-client-authorization: |-
            Indicates whether client authorization is required.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        requires-transport-security: |-
            Indicates whether transport security is required.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-metadata: Endpoint metadata.
examples:
    Create Relay Service WCF Relay.: az relay wcfrelay create --resource-group myresourcegroup --namespace-name mynamespace --name myrelay --relay-type NetTcp
