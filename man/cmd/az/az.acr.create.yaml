# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Azure Container Registry.
documentation:
    flag:
        allow-exports: Configure exportPolicy to allow/disallow artifacts from being exported from this registry. Artifacts can be exported via import or transfer operations. For more information, please visit https://aka.ms/acr/export-policy.
        allow-metadata-search: Enable or disable the metadata-search feature for the registry. If not specified, this is set to disabled by default.
        allow-trusted-services: Allow trusted Azure Services to access network restricted registries. For more information, please visit https://aka.ms/acr/trusted-services. The Default is to allow.
        default-action: Default action to apply when no rule matches. Only applicable to Premium SKU.
        key-encryption-key: Key vault key uri. To enable automated rotation, provide a version-less key uri. For manual rotation, provide a versioned key uri.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        public-network-enabled: Allow public network access for the container registry. The Default is to allow.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        workspace: Name or ID of the Log Analytics workspace to send registry diagnostic logs to. All events will be enabled. You can use "az monitor log-analytics workspace create" to create one. Extra billing may apply.
        zone-redundancy: Indicates whether or not zone redundancy should be enabled for this registry or replication. For more information, such as supported locations, please visit https://aka.ms/acr/az. Zone-redundancy cannot be updated. Defaults to 'Disabled'.
flags:
    --admin-enabled=:
        description: Indicates whether the admin user is enabled
        nargs: -1
    --allow-exports=:
        description: Configure exportPolicy to allow/disallow artifacts from being exported from this registry.
        nargs: -1
    --allow-metadata-search=:
        description: Enable or disable the metadata-search feature for the registry.
        nargs: -1
    --allow-trusted-services=:
        description: Allow trusted Azure Services to access network restricted registries.
        nargs: -1
    --default-action=: Default action to apply when no rule matches.
    --identity=: Use assigned managed identity resource id or name if in the same resource group
    --key-encryption-key=: Key vault key uri.
    --public-network-enabled=:
        description: Allow public network access for the container registry.
        nargs: -1
    --sku=!: The SKU of the container registry
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --workspace=: Name or ID of the Log Analytics workspace to send registry diagnostic logs to.
    --zone-redundancy=: Indicates whether or not zone redundancy should be enabled for this registry or replication.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of the container registry.
completion:
    flag:
        admin-enabled:
            - "true"
            - "false"
        allow-exports:
            - "true"
            - "false"
        allow-metadata-search:
            - "true"
            - "false"
        allow-trusted-services:
            - "true"
            - "false"
        default-action:
            - Allow
            - Deny
        public-network-enabled:
            - "true"
            - "false"
        sku:
            - Basic
            - Standard
            - Premium
        zone-redundancy:
            - Enabled
            - Disabled
