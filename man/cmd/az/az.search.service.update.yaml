# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a search service in the given resource group.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        disable-local-auth: When set to true, calls to the search service will not be permitted to utilize API keys for authentication. This cannot be set to true if 'dataPlaneAuthOptions' are defined.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        partition-count: The number of partitions in the search service; if specified, it can be 1, 2, 3, 4, 6, or 12. Values greater than 1 are only valid for standard SKUs. For 'standard3' services with hostingMode set to 'highDensity', the allowed values are between 1 and 3.
        public-access: This value can be set to 'enabled' to avoid breaking changes on existing customer resources and templates. If set to 'disabled', traffic over public interface is not allowed, and private endpoint connections would be the exclusive access method.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        replica-count: The number of replicas in the search service. If specified, it must be a value between 1 and 12 inclusive for standard SKUs or between 1 and 3 inclusive for basic SKU.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        semantic-search: Sets options that control the availability of semantic search. This configuration is only possible for certain Azure Cognitive Search SKUs in certain locations.
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --aad-auth-failure-mode=: Describes what response the data plane API of a Search service would send for requests that failed authentication.
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --auth-options=: Some Help
    --disable-local-auth=:
        description: When set to true, calls to the search service will not be permitted to utilize API keys for authentication.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --identity-type=: The identity type.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ip-rules=: Some help
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --partition-count=: The number of partitions in the search service; if specified, it can be 1, 2, 3, 4, 6, or 12. Values greater than 1 are only valid for standard SKUs.
    --public-access=: This value can be set to 'enabled' to avoid breaking changes on existing customer resources and templates.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --replica-count=: The number of replicas in the search service.
    --semantic-search=: Sets options that control the availability of semantic search.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Azure Cognitive Search service associated with the specified resource group.
completion:
    flag:
        aad-auth-failure-mode:
            - http401WithBearerChallenge
            - http403
        auth-options:
            - aadOrApiKey
            - apiKeyOnly
        disable-local-auth:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        identity-type:
            - None
            - SystemAssigned
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        public-access:
            - disabled
            - enabled
        semantic-search:
            - disabled
            - free
            - standard
