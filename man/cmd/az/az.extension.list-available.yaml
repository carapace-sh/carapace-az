# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-available
description: List publicly available extensions.
flags:
    -d, --show-details=: Show the raw data from the extension index.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        show-details: Show the raw data from the extension index.
examples:
    List all publicly available extensions: az extension list-available
    List details on a particular extension: az extension list-available --show-details --query anextension
