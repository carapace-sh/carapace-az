# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a repository or image in an Azure Container Registry.
flags:
    --repository=: The name of the repository.
    --subscription=: Name or ID of subscription.
    --suffix=: The tenant suffix in registry login server.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
    -p, --password=: The password used to log into a container registry
    -t, --image=: The name of the image.
    -u, --username=: The username used to log into a container registry
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        image: The name of the image. May include a tag in the format 'name:tag' or digest in the format 'name@digest'.
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        password: The password used to log into a container registry.
        repository: The name of the repository.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        suffix: The tenant suffix in registry login server. You may specify '--suffix tenant' if your registry login server is in the format 'registry-tenant.azurecr.io'. Applicable if you're accessing the registry from a different subscription or you have permission to access images but not the permission to manage the registry resource.
        username: The username used to log into a container registry.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete a repository from an Azure Container Registry. This deletes all manifests and tags under 'hello-world'.: az acr repository delete -n myregistry --repository hello-world
    ? Delete an image manifest by sha256-based manifest digest. This deletes the manifest identified by 'hello-world@sha256:abc123' and all tags referencing the manifest.
    : az acr repository delete -n myregistry --image hello-world@sha256:abc123
    ? Delete an image manifest by tag. This deletes the manifest referenced by 'hello-world:latest' and all other tags referencing the same manifest.
    : az acr repository delete -n myregistry --image hello-world:latest
