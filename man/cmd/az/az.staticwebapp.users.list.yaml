# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists users and assigned roles, limited to users who accepted their invites.
flags:
    --authentication-provider=: Authentication provider of the user identity such as AAD, Facebook, GitHub, Google, Twitter.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name of the static site
documentation:
    flag:
        authentication-provider: |-
            Authentication provider of the user identity such as AAD, Facebook, GitHub, Google, Twitter.

            Default value: all
        name: Name of the static site.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Lists users and assigned roles.: az staticwebapp users list -n MyStaticAppName
