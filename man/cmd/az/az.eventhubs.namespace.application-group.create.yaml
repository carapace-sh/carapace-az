# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates an application group for an EventHub namespace
documentation:
    flag:
        is-enabled: Determines if Application Group is allowed to create connection with namespace or not. Once the isEnabled is set to false, all the existing connections of application group gets dropped and no new connections will be allowed
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --client-app-group-identifier=!: The Unique identifier for application group.Supports SAS(NamespaceSASKeyName=KeyName or EntitySASKeyName=KeyName) or AAD(AADAppID=Guid)
    --is-enabled=:
        description: Determines if Application Group is allowed to create connection with namespace or not.
        nargs: -1
    --namespace-name=!: Name of Namespace
    --subscription=: Name or ID of subscription.
    --throttling-policy-config=:
        description: List of Throttling Policy Objects
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of Application Group
completion:
    flag:
        is-enabled:
            - "true"
            - "false"
