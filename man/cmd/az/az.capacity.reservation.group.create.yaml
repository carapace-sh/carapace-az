# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create capacity reservation group.
flags:
    --sharing-profile=:
        description: Space-separated subscription resource IDs or nothing.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --capacity-reservation-group=!: The name of the capacity reservation group.
    -z, --zones=:
        description: Availability Zones to use for this capacity reservation group.
        nargs: -1
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        capacity-reservation-group: The name of the capacity reservation group.
        change-reference: The related change reference ID for this resource operation.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sharing-profile: Space-separated subscription resource IDs or nothing. Specify the settings to enable sharing across subscriptions for the capacity reservation group resource. Specify it to nothing to unsharing.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        zones: Availability Zones to use for this capacity reservation group. If not provided, the group supports only regional resources in the region. If provided, enforces each capacity reservation in the group to be in one of the zones.
examples:
    Create a capacity reservation group with specific zones.: |-
        az capacity reservation group create -n ReservationGroupName -l centraluseuap \
            -g MyResourceGroup --tags key=val --zones 1 2
    Create a capacity reservation group.: az capacity reservation group create -n ReservationGroupName -g MyResourceGroup
