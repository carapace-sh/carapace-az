# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Vault or HSM.
flags:
    --administrators=:
        description: '[HSM Only] Administrator role for data plane operations for Managed HSM.'
        nargs: -1
    --bypass=: Bypass traffic for space-separated uses.
    --default-action=: Default action to apply when no rule matches.
    --enable-purge-protection=:
        description: Property specifying whether protection against purge is enabled for this vault/managed HSM pool.
        nargs: -1
    --enable-rbac-authorization=:
        description: Property that controls how data actions are authorized.
        nargs: -1
    --enabled-for-deployment=:
        description: '[Vault Only] Property to specify whether Azure Virtual Machines are permitted to retrieve certificates stored as secrets from the key vault.'
        nargs: -1
    --enabled-for-disk-encryption=:
        description: '[Vault Only] Property to specify whether Azure Disk Encryption is permitted to retrieve secrets from the vault and unwrap keys.'
        nargs: -1
    --enabled-for-template-deployment=:
        description: '[Vault Only] Property to specify whether Azure Resource Manager is permitted to retrieve secrets from the key vault.'
        nargs: -1
    --hsm-name=: Name of the HSM.
    --mi-user-assigned=:
        description: '[HSM Only] Enable user-assigned managed identities for managed HSM.'
        nargs: -1
    --network-acls-ips=:
        description: Network ACLs IP rules.
        nargs: -1
    --network-acls-vnets=:
        description: Network ACLS VNet rules.
        nargs: -1
    --network-acls=: Network ACLs.
    --no-self-perms=:
        description: '[Vault Only] Don''t add permissions for the current user/service principal in the new vault.'
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --public-network-access=: Control permission for data plane traffic coming from public networks while private endpoint is enabled
    --retention-days=: Soft delete data retention days.
    --sku=: Required.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=: Name of the Vault.
completion:
    flag:
        bypass:
            - AzureServices
            - None
        default-action:
            - Allow
            - Deny
        enable-purge-protection:
            - "true"
            - "false"
        enable-rbac-authorization:
            - "true"
            - "false"
        enabled-for-deployment:
            - "true"
            - "false"
        enabled-for-disk-encryption:
            - "true"
            - "false"
        enabled-for-template-deployment:
            - "true"
            - "false"
        no-self-perms:
            - "true"
            - "false"
        public-network-access:
            - Enabled
            - Disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        administrators: '[HSM Only] Administrator role for data plane operations for Managed HSM. It accepts a space separated list of OIDs that will be assigned.'
        bypass: Bypass traffic for space-separated uses.
        change-reference: The related change reference ID for this resource operation.
        default-action: Default action to apply when no rule matches.
        enable-purge-protection: Property specifying whether protection against purge is enabled for this vault/managed HSM pool. Setting this property to true activates protection against purge for this vault/managed HSM pool and its content - only the Key Vault/Managed HSM service may initiate a hard, irrecoverable deletion. The setting is effective only if soft delete is also enabled. Enabling this functionality is irreversible.
        enable-rbac-authorization: Property that controls how data actions are authorized. When true, the key vault will use Role Based Access Control (RBAC) for authorization of data actions, and the access policies specified in vault properties will be ignored. When false, the key vault will use the access policies specified in vault properties, and any policy stored on Azure Resource Manager will be ignored. If null or not specified, the vault is created with the default value of true. Note that management actions are always authorized with RBAC.
        enabled-for-deployment: '[Vault Only] Property to specify whether Azure Virtual Machines are permitted to retrieve certificates stored as secrets from the key vault.'
        enabled-for-disk-encryption: '[Vault Only] Property to specify whether Azure Disk Encryption is permitted to retrieve secrets from the vault and unwrap keys.'
        enabled-for-template-deployment: '[Vault Only] Property to specify whether Azure Resource Manager is permitted to retrieve secrets from the key vault.'
        hsm-name: Name of the HSM. (--hsm-name and --name/-n are mutually exclusive, please specify just one of them).
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        mi-user-assigned: '[HSM Only] Enable user-assigned managed identities for managed HSM. Accept space-separated list of identity resource IDs.'
        name: Name of the Vault.
        network-acls: 'Network ACLs. It accepts a JSON filename or a JSON string. JSON format: ``` {\"ip\":[<ip1>, <ip2>...],\"vnet\":[<vnet_name_1>/<subnet_name_1>,<subnet_id2>...]} ``` .'
        network-acls-ips: Network ACLs IP rules. Space-separated list of IP addresses.
        network-acls-vnets: Network ACLS VNet rules. Space-separated list of Vnet/subnet pairs or subnet resource ids.
        no-self-perms: '[Vault Only] Don''t add permissions for the current user/service principal in the new vault.'
        no-wait: Do not wait for the long-running operation to finish.
        public-network-access: Control permission for data plane traffic coming from public networks while private endpoint is enabled.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        retention-days: Soft delete data retention days. It accepts >=7 and <=90. Defaults to 90 for keyvault creation. Required for MHSM creation.
        sku: 'Required. SKU details. Allowed values for Vault: premium, standard. Default: standard. Allowed values for HSM: Standard_B1, Custom_B32, Custom_B6, Custom_C42, Custom_C10. Default: Standard_B1.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a key vault with network ACLs specified (use --network-acls to specify IP and VNet rules by using a JSON file).: az keyvault create --location westus2 --name MyKeyVault --resource-group MyResourceGroup --network-acls network-acls-example.json
    Create a key vault with network ACLs specified (use --network-acls to specify IP and VNet rules by using a JSON string).: 'az keyvault create --location westus2 --name MyKeyVault --resource-group MyResourceGroup --network-acls "{\"ip\": [\"1.2.3.4\", \"2.3.4.0/24\"], \"vnet\": [\"vnet_name_1/subnet_name1\", \"vnet_name_2/subnet_name2\", \"/subscriptions/000000-0000-0000/resourceGroups/MyResourceGroup/providers/Microsoft.Network/virtualNetworks/MyVNet/subnets/MySubnet\"]}"'
    ? Create a key vault with network ACLs specified (use --network-acls, --network-acls-ips and --network-acls-vnets together, redundant rules will be removed, finally there will be 4 IP rules and 3 VNet rules).
    : 'az keyvault create --location westus2 --name MyKeyVault --resource-group MyResourceGroup --network-acls "{\"ip\": [\"1.2.3.4\", \"2.3.4.0/24\"], \"vnet\": [\"vnet_name_1/subnet_name1\", \"vnet_name_2/subnet_name2\"]}" --network-acls-ips 3.4.5.0/24 4.5.6.0/24 --network-acls-vnets vnet_name_2/subnet_name_2 vnet_name_3/subnet_name_3 /subscriptions/000000-0000-0000/resourceGroups/MyResourceGroup/providers/Microsoft.Network/virtualNetworks/vnet_name_4/subnets/subnet_name_4'
    Create a key vault with network ACLs specified (use --network-acls-ips to specify IP rules).: az keyvault create --location westus2 --name MyKeyVault --resource-group MyResourceGroup --network-acls-ips 3.4.5.0/24 4.5.6.0/24
    Create a key vault with network ACLs specified (use --network-acls-vnets to specify VNet rules).: az keyvault create --location westus2 --name MyKeyVault --resource-group MyResourceGroup --network-acls-vnets vnet_name_2/subnet_name_2 vnet_name_3/subnet_name_3 /subscriptions/000000-0000-0000/resourceGroups/MyResourceGroup/providers/Microsoft.Network/virtualNetworks/vnet_name_4/subnets/subnet_name_4
    Create a key vault. (autogenerated): az keyvault create --location westus2 --name MyKeyVault --resource-group MyResourceGroup
