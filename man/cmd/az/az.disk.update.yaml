# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a managed disk.
flags:
    --accelerated-network=:
        description: Customers can set on Managed Disks or Snapshots to enable the accelerated networking if the OS disk image support.
        nargs: -1
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --architecture=: CPU architecture supported by an OS disk.
    --data-access-auth-mode=: Specify the auth mode when exporting or uploading to a disk or snapshot.
    --disk-access=: Name or ID of the disk access resource for using private endpoints on disks.
    --disk-encryption-set=: Name or ID of disk encryption set that is used to encrypt the disk.
    --disk-iops-read-only=: The total number of IOPS that will be allowed across all VMs mounting the shared disk as ReadOnly.
    --disk-iops-read-write=: The number of IOPS allowed for this disk; only settable for UltraSSD disks.
    --disk-mbps-read-only=: The total throughput (MBps) that will be allowed across all VMs mounting the shared disk as ReadOnly.
    --disk-mbps-read-write=: The bandwidth allowed for this disk; only settable for UltraSSD disks.
    --enable-bursting=:
        description: Enable on-demand bursting beyond the provisioned performance target of the disk.
        nargs: -1
    --encryption-type=: Encryption type.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --max-shares=: The maximum number of VMs that can attach to the disk at the same time.
    --network-access-policy=: Policy for accessing the disk via network.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --public-network-access=: Customers can set on Managed Disks or Snapshots to control the export policy on the disk.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku=: Underlying storage SKU.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the managed disk that is being created.
    -z, --size-gb=: Size in GB.
completion:
    flag:
        accelerated-network:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        architecture:
            - Arm64
            - x64
        data-access-auth-mode:
            - AzureActiveDirectory
            - None
        enable-bursting:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        encryption-type:
            - EncryptionAtRestWithCustomerKey
            - EncryptionAtRestWithPlatformAndCustomerKeys
            - EncryptionAtRestWithPlatformKey
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        network-access-policy:
            - AllowAll
            - AllowPrivate
            - DenyAll
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        public-network-access:
            - Disabled
            - Enabled
        sku:
            - PremiumV2_LRS
            - Premium_LRS
            - Premium_ZRS
            - StandardSSD_LRS
            - StandardSSD_ZRS
            - Standard_LRS
            - UltraSSD_LRS
documentation:
    flag:
        accelerated-network: |-
            Customers can set on Managed Disks or Snapshots to enable the accelerated networking if the OS disk image support.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        action-on-disk-delay: |-
            Determine on how to handle disks with slow I/O.

            Accepted values: AutomaticReattach, None
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        architecture: |-
            CPU architecture supported by an OS disk.

            Accepted values: Arm64, x64

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        change-reference: The related change reference ID for this resource operation.
        data-access-auth-mode: |-
            Specify the auth mode when exporting or uploading to a disk or snapshot.

            Accepted values: AzureActiveDirectory, None
        disk-access: Name or ID of the disk access resource for using private endpoints on disks.
        disk-encryption-set: Name or ID of disk encryption set that is used to encrypt the disk.
        disk-iops-read-only: The total number of IOPS that will be allowed across all VMs mounting the shared disk as ReadOnly. One operation can transfer between 4k and 256k bytes.
        disk-iops-read-write: The number of IOPS allowed for this disk; only settable for UltraSSD disks. One operation can transfer between 4k and 256k bytes.
        disk-mbps-read-only: The total throughput (MBps) that will be allowed across all VMs mounting the shared disk as ReadOnly. MBps means millions of bytes per second - MB here uses the ISO notation, of powers of 10.
        disk-mbps-read-write: The bandwidth allowed for this disk; only settable for UltraSSD disks. MBps means millions of bytes per second - MB here uses the ISO notation, of powers of 10.
        enable-bursting: Enable on-demand bursting beyond the provisioned performance target of the disk. On-demand bursting is disabled by default, and it does not apply to Ultra disks.
        encryption-type: |-
            Encryption type.

            Accepted values: EncryptionAtRestWithCustomerKey, EncryptionAtRestWithPlatformAndCustomerKeys, EncryptionAtRestWithPlatformKey
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        max-shares: The maximum number of VMs that can attach to the disk at the same time. Value greater than one indicates a disk that can be mounted on multiple VMs at the same time.
        name: The name of the managed disk that is being created. The name can't be changed after the disk is created. Supported characters for the name are a-z, A-Z, 0-9, _ and -. The maximum name length is 80 characters.
        network-access-policy: |-
            Policy for accessing the disk via network.

            Accepted values: AllowAll, AllowPrivate, DenyAll
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        public-network-access: |-
            Customers can set on Managed Disks or Snapshots to control the export policy on the disk.

            Accepted values: Disabled, Enabled
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: |-
            Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .

            Accepted values: TrustedLaunchAndConfidentialVMSupported, TrustedLaunchSupported
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        size-gb: 'Size in GB. Max size: 4095 GB (certain preview disks can be larger).'
        sku: |-
            Underlying storage SKU.

            Accepted values: PremiumV2_LRS, Premium_LRS, Premium_ZRS, StandardSSD_LRS, StandardSSD_ZRS, Standard_LRS, UltraSSD_LRS
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a managed disk and associate it with a disk access resource.: az disk update --name MyManagedDisk --resource-group MyResourceGroup --network-access-policy AllowPrivate --disk-access MyDiskAccessID
    Update a managed disk.: az disk update --name MyManagedDisk --resource-group MyResourceGroup --size-gb 20
