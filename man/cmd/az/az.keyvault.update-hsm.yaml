# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update-hsm
description: Update the properties of a HSM.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --bypass=: Bypass traffic for space-separated uses.
    --default-action=: Default action to apply when no rule matches.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --hsm-name=!: Name of the HSM.
    --mi-user-assigned=:
        description: Enable user-assigned managed identities for managed HSM.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --public-network-access=: Control permission for data plane traffic coming from public networks while private endpoint is enabled
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --secondary-locations=:
        description: --secondary-locations extends/contracts an HSM pool to listed regions.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -e, --enable-purge-protection=:
        description: Property specifying whether protection against purge is enabled for this vault/managed HSM pool.
        nargs: -1
    -g, --resource-group=: Proceed only if Key Vault belongs to the specified resource group.
completion:
    flag:
        bypass:
            - AzureServices
            - None
        default-action:
            - Allow
            - Deny
        enable-purge-protection:
            - "true"
            - "false"
        public-network-access:
            - Enabled
            - Disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        bypass: Bypass traffic for space-separated uses.
        change-reference: The related change reference ID for this resource operation.
        default-action: Default action to apply when no rule matches.
        enable-purge-protection: Property specifying whether protection against purge is enabled for this vault/managed HSM pool. Setting this property to true activates protection against purge for this vault/managed HSM pool and its content - only the Key Vault/Managed HSM service may initiate a hard, irrecoverable deletion. The setting is effective only if soft delete is also enabled. Enabling this functionality is irreversible.
        force-string: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        hsm-name: Name of the HSM.
        mi-user-assigned: Enable user-assigned managed identities for managed HSM. Accept space-separated list of identity resource IDs.
        no-wait: Do not wait for the long-running operation to finish.
        public-network-access: Control permission for data plane traffic coming from public networks while private endpoint is enabled.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Proceed only if Key Vault belongs to the specified resource group.
        secondary-locations: --secondary-locations extends/contracts an HSM pool to listed regions. The primary location where the resource was originally created CANNOT be removed.
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update the properties of a HSM.: az keyvault update-hsm --enable-purge-protection true --hsm-name MyHSM --resource-group MyResourceGroup
