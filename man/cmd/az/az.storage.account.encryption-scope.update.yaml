# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update properties for specified encryption scope within storage account.
flags:
    --account-name=!: The storage account name.
    --state=: Change the state the encryption scope.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the encryption scope within the specified storage account.
    -s, --key-source=: The provider for the encryption scope.
    -u, --key-uri=: The object identifier for a key vault key object.
completion:
    flag:
        key-source:
            - Microsoft.Storage
            - Microsoft.KeyVault
        state:
            - Enabled
            - Disabled
documentation:
    flag:
        account-name: The storage account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        key-source: |-
            The provider for the encryption scope.

            Accepted values: Microsoft.KeyVault, Microsoft.Storage
        key-uri: The object identifier for a key vault key object. When applied, the encryption scope will use the key referenced by the identifier to enable customer-managed key support on this encryption scope.
        name: The name of the encryption scope within the specified storage account.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        state: |-
            Change the state the encryption scope. When disabled, all blob read/write operations using this encryption scope will fail.

            Accepted values: Disabled, Enabled
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create an encryption scope within storage account based on Microsoft.KeyVault key source.: az storage account encryption-scope update --name myencryption -s Microsoft.KeyVault -u "https://vaultname.vault.azure.net/keys/keyname/1f7fa7edc99f4cdf82b5b5f32f2a50a7" --account-name mystorageaccount -g MyResourceGroup
    Disable an encryption scope within storage account.: az storage account encryption-scope update --name myencryption --state Disabled --account-name mystorageaccount -g MyResourceGroup
    Enable an encryption scope within storage account.: az storage account encryption-scope update --name myencryption --state Enabled --account-name mystorageaccount -g MyResourceGroup
    Update an encryption scope key source to Microsoft.Storage.: az storage account encryption-scope update --name myencryption -s Microsoft.Storage --account-name mystorageaccount -g MyResourceGroup
