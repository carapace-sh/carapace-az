# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the specified snapshot within the given volume
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: The name of the NetApp account
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Resource location  When not specified, the location of the resource group will be used.
    -n, --name=!: The name of the snapshot
    -p, --pool-name=!: The name of the capacity pool
    -v, --volume-name=!: The name of the volume
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Create the specified snapshot within the given volume.
    flag:
        account-name: The name of the NetApp account. --name --snapshot-name -n -s The name of the snapshot.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: Resource location  When not specified, the location of the resource group will be used.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        pool-name: The name of the capacity pool.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        volume-name: The name of the volume.
examples:
    Create an ANF snapshot: az netappfiles snapshot create -g mygroup --account-name myaccname --pool-name mypoolname --volume-name myvolname --name mysnapname -l eastus
