# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create connections between two ExpressRoute circuits.
flags:
    --address-prefix=: /29 IP address space to carve out customer addresses for tunnels.
    --authorization-key=: The authorization key used when the peer circuit is in another subscription.
    --circuit-name=!: ExpressRoute circuit name.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --peer-circuit=: Name or ID of the peer ExpressRoute circuit.
    --peering-name=!: Name of BGP peering (i.e. AzurePrivatePeering).
    --source-circuit=: Reference to Express Route Circuit Private Peering Resource of the circuit initiating connection.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the peering connection.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        address-prefix: /29 IP address space to carve out customer addresses for tunnels.
        authorization-key: The authorization key used when the peer circuit is in another subscription.
        change-reference: The related change reference ID for this resource operation.
        circuit-name: ExpressRoute circuit name.
        name: Name of the peering connection.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        peer-circuit: Name or ID of the peer ExpressRoute circuit.
        peering-name: Name of BGP peering (i.e. AzurePrivatePeering).
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source-circuit: Reference to Express Route Circuit Private Peering Resource of the circuit initiating connection.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create connection between two ExpressRoute circuits with AzurePrivatePeering settings.: az network express-route peering connection create -g MyResourceGroup --circuit-name MyCircuit --peering-name AzurePrivatePeering -n myConnection --peer-circuit MyOtherCircuit --address-prefix 104.0.0.0/29
