# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: validate
description: Validate a aks connection.
documentation:
    flag:
        id: The resource id of the connection. ['--resource-group', '--name', '--connection'] are required if '--id' is not specified.
        name: Name of the managed cluster. Required if '--id' is not specified.None
        resource-group: The resource group which contains the managed cluster. Required if '--id' is not specified.None
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --connection=: Name of the aks connection.
    --id=: The resource id of the connection.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group which contains the managed cluster.
    -n, --name=: Name of the managed cluster.
