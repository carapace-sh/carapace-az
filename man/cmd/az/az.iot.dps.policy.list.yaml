# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all shared access policies in an Azure IoT Hub Device Provisioning Service instance.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --dps-name=!: IoT Hub Device Provisioning Service name
documentation:
    flag:
        dps-name: IoT Hub Device Provisioning Service name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all shared access policies in MyDps in the Azure IoT Hub Device Provisioning Service instance 'MyDps': az iot dps policy list --dps-name MyDps --resource-group MyResourceGroup
