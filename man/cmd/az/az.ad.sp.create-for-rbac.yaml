# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create-for-rbac
description: Create a service principal and configure its access to Azure resources.
flags:
    --cert=: Certificate to use for credentials.
    --create-cert=: Create a self-signed certificate to use for the credential.
    --keyvault=: Name or ID of a KeyVault to use for creating or retrieving certificates.
    --role=: Role of the service principal.
    --scopes=:
        description: Space-separated list of scopes the service principal's role assignment applies to.
        nargs: -1
    --sdk-auth=:
        description: Output service principal credential along with cloud endpoints in JSON format.
        nargs: -1
    --skip-assignment=:
        description: No-op.
        nargs: -1
    --years=: Number of years for which the credentials will be valid.
    -n, --display-name=: Display name of the service principal.
completion:
    flag:
        sdk-auth:
            - "true"
            - "false"
        skip-assignment:
            - "true"
            - "false"
documentation:
    command: Create an application and its associated service principal, optionally configure the service principal's RBAC role assignments.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        cert: Certificate to use for credentials. When used with ``` --keyvault, ``` , indicates the name of the cert to use or create. Otherwise, supply a PEM or DER formatted public certificate string. Use ``` @{path} ``` to load from a file. Do not include the private key.
        change-reference: The related change reference ID for this resource operation.
        create-cert: Create a self-signed certificate to use for the credential. Only the current OS user has read/write permission to this certificate. Use with `--keyvault` to create the certificate in Key Vault. Otherwise, a certificate will be created locally.
        create-password: |
            Create a password credential (secret) on the the application. This is the default behavior. Set this argument to false to disable creating password credential.

            Default value: True

            Accepted values: false, true
        display-name: Display name of the service principal. If not present, default to azure-cli-%Y-%m-%d-%H-%M-%S where the suffix is the time of creation.
        keyvault: |-
            ``` to create the certificate in Key Vault. Otherwise, a certificate will be created locally.

            Default value: False
        role: Role of the service principal.
        scopes: Space-separated list of scopes the service principal's role assignment applies to. e.g., subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM.
        sdk-auth: 'Output service principal credential along with cloud endpoints in JSON format. '
        service-management-reference: Set the serviceManagementReference property of the created application. Reference application or service contact information from a Service or Asset Management database.
        years: 'Number of years for which the credentials will be valid. Default: 1 year.'
examples:
    Create using a custom display name.: az ad sp create-for-rbac -n MyApp
    Create using a self-signed certificate, and store it within Azure Key Vault.: az ad sp create-for-rbac --keyvault MyVault --cert CertName --create-cert
    Create using a self-signed certificate.: az ad sp create-for-rbac --create-cert
    Create using an existing certificate file.: |-
        az ad sp create-for-rbac --cert "@~/cert.pem"
        `cert.pem` contains the following content
        -----BEGIN CERTIFICATE-----  <<< this line is optional
        MIICoT...
        -----END CERTIFICATE-----    <<< this line is optional
    Create using an existing certificate string.: az ad sp create-for-rbac --cert "MIICoT..."
    Create using existing certificate in Azure Key Vault.: az ad sp create-for-rbac --keyvault MyVault --cert CertName
    ? Create with a Contributor role assignments on specified scopes. To retrieve current subscription ID, run `az account show --query id --output tsv`.
    : az ad sp create-for-rbac -n MyApp --role Contributor --scopes /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/resourceGroup1 /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/resourceGroup2
    Create without role assignment.: az ad sp create-for-rbac
    Do not create password credential.: az ad sp create-for-rbac --create-password false
