# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upload
description: Upload certificate to a managed environment, add hostname to an app in that environment, and bind the certificate to the hostname
flags:
    --hostname=!: The custom domain name.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -c, --certificate-name=: Name of the certificate which should be unique within the Container Apps environment.
    -e, --environment=!: Name or resource id of the Container App environment.
    -f, --certificate-file=!: The filepath of the .pfx or .pem file
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
    -n, --name=: The name of the Containerapp.
    -p, --password=: The certificate file password
documentation:
    command: Upload certificate to a managed environment, add hostname to an app in that environment, and bind the certificate to the hostname.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        certificate-file: The filepath of the .pfx or .pem file.
        certificate-name: Name of the certificate which should be unique within the Container Apps environment.
        change-reference: The related change reference ID for this resource operation.
        environment: Name or resource id of the Container App environment.
        hostname: The custom domain name.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        password: The certificate file password.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
