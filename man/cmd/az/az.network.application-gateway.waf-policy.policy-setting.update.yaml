# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update properties of a web application firewall global configuration.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        custom-body: If the action type is block, customer can override the response body. The body must be specified in base64 encoding.
        log-scrubbing-state: State of the log scrubbing config. Default value is Enabled.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        scrubbing-rules: 'The rules that are applied to the logs for scrubbing.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.  Singular flags: `--scrubbing-rule`.'
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --custom-body=: If the action type is block, customer can override the response body.
    --custom-status-code=: If the action type is block, customer can override the response status code.
    --file-upload-enforce=:
        description: Whether allow WAF to enforce file upload limits.
        nargs: -1
    --file-upload-limit-in-mb=: Maximum file upload size in Mb for WAF.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --js-cookie-exp-time=: Web Application Firewall JavaScript Challenge Cookie Expiration time in minutes.
    --log-scrubbing-state=: State of the log scrubbing config.
    --max-request-body-size-in-kb=: Maximum request body size in Kb for WAF.
    --mode=: If it is in detection mode or prevention mode at policy level.
    --policy-name=!: Name of the web application firewall policy.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --request-body-check=:
        description: Specified to require WAF to check request body.
        nargs: -1
    --request-body-enforce=:
        description: Whether allow WAF to enforce request body limits.
        nargs: -1
    --request-limit-in-kb=: Max inspection limit in KB for request body inspection for WAF.
    --scrubbing-rules=:
        description: The rules that are applied to the logs for scrubbing.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --state=: If the policy is in enabled state or disabled state.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        file-upload-enforce:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        log-scrubbing-state:
            - Disabled
            - Enabled
        mode:
            - Detection
            - Prevention
        request-body-check:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        request-body-enforce:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        state:
            - Disabled
            - Enabled
