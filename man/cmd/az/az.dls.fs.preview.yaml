# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: preview
description: Preview the content of a file in a Data Lake Store account.
documentation:
    flag:
        force: Indicates that, if the preview is larger than 1MB, still retrieve it. This can potentially be very slow, depending on how large the file is.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        path: The path in the specified Data Lake Store account where the action should take place. In the format '/folder/file.txt', where the first '/' after the DNS indicates the root of the file system.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --force=: Indicates that, if the preview is larger than 1MB, still retrieve it.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --length=: The amount of data to preview in bytes.
    --offset=: The position in bytes to start the preview from.
    --path=!: The path in the specified Data Lake Store account where the action should take place.
    --subscription=: Name or ID of subscription.
    -n, --account=: Name of the Data Lake Store account.
