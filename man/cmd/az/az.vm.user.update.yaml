# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a user account for VM.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --ssh-key-value=: SSH public key file value or public key file path.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Virtual Machine.
    -p, --password=: The user password
    -u, --username=!: The user name
documentation:
    command: Update a user account for VM. You can use it to update password or ssh key value for VM user.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Virtual Machine. You can configure the default using ``` az configure --defaults vm=<name> ``` .
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        password: The user password.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        ssh-key-value: SSH public key file value or public key file path. This command appends the new public key text to the ~/.ssh/authorized_keys file for the admin user on the VM. This does not replace or remove any existing SSH keys.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        username: The user name.
examples:
    Update a Linux user account. ("$(< filename)" syntax is not supported on Command Prompt or PowerShell.): az vm user update -u username --ssh-key-value "$(< ~/.ssh/id_rsa.pub)" -n MyVm -g MyResourceGroup
    Update a Windows user account. If username does not exist, a new user will be created.: az vm user update -u username -p password -n MyVm -g MyResourceGroup
    Update a user on all VMs in a resource group. ("$(< filename)" syntax is not supported on Command Prompt or PowerShell.): az vm user update -u username --ssh-key-value "$(< ~/.ssh/id_rsa.pub)" --ids $(az vm list -g MyResourceGroup --query "[].id" -o tsv)
