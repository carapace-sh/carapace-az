# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: move
description: Moves a subscription's charges to a new invoice section.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --destination-invoice-section-id=!: The destination invoice section id.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        Command group 'billing subscription' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        destination-invoice-section-id: The destination invoice section id.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Move a subscription to another invoice section: az billing subscription move --account-name "{billingAccountName}" --destination-invoice-section-id "/providers/Microsoft.Billing/billingAccounts/{billingAccountName}/billingProfiles/{billingProfileName}/invoiceSections/{newInvoiceSectionName}"
