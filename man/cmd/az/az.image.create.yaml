# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a custom Virtual Machine Image from managed disks or snapshots.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        storage-sku: The SKU of the storage account with which to create the VM image. Unused if source VM is specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        zone-resilient: Specifies whether an image is zone resilient or not. Default is false. Zone resilient images can be created only in regions that provide Zone Redundant Storage
flags:
    --data-disk-caching=: Storage caching type for the image's data disk.
    --data-disk-sources=:
        description: Space-separated list of data disk sources, including unmanaged blob URI, managed disk ID or name, or snapshot ID or name
        nargs: -1
    --edge-zone=: The name of edge zone.
    --hyper-v-generation=: The hypervisor generation of the Virtual Machine created from the image.
    --os-disk-caching=: Storage caching type for the image's OS disk.
    --os-type=: ""
    --source=!: OS disk source from the same region, including a virtual machine ID or name, OS disk blob URI, managed OS disk ID or name, or OS snapshot ID or name
    --storage-sku=: The SKU of the storage account with which to create the VM image.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --zone-resilient=:
        description: Specifies whether an image is zone resilient or not.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: new image name
completion:
    flag:
        data-disk-caching:
            - None
            - ReadOnly
            - ReadWrite
        hyper-v-generation:
            - V1
            - V2
        os-disk-caching:
            - None
            - ReadOnly
            - ReadWrite
        os-type:
            - Windows
            - Linux
        storage-sku:
            - Standard_LRS
            - Premium_LRS
            - StandardSSD_LRS
            - UltraSSD_LRS
            - Premium_ZRS
            - StandardSSD_ZRS
            - PremiumV2_LRS
        zone-resilient:
            - "true"
            - "false"
