# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a custom Virtual Machine Image from managed disks or snapshots.
flags:
    --data-disk-caching=: Storage caching type for the image's data disk.
    --data-disk-sources=:
        description: Space-separated list of data disk sources, including unmanaged blob URI, managed disk ID or name, or snapshot ID or name
        nargs: -1
    --edge-zone=: The name of edge zone.
    --hyper-v-generation=: The hypervisor generation of the Virtual Machine created from the image.
    --os-disk-caching=: Storage caching type for the image's OS disk.
    --os-type=: ""
    --source=!: OS disk source from the same region, including a virtual machine ID or name, OS disk blob URI, managed OS disk ID or name, or OS snapshot ID or name
    --storage-sku=: The SKU of the storage account with which to create the VM image.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --zone-resilient=:
        description: Specifies whether an image is zone resilient or not.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: new image name
completion:
    flag:
        data-disk-caching:
            - None
            - ReadOnly
            - ReadWrite
        hyper-v-generation:
            - V1
            - V2
        os-disk-caching:
            - None
            - ReadOnly
            - ReadWrite
        os-type:
            - Windows
            - Linux
        storage-sku:
            - Standard_LRS
            - Premium_LRS
            - StandardSSD_LRS
            - UltraSSD_LRS
            - Premium_ZRS
            - StandardSSD_ZRS
            - PremiumV2_LRS
        zone-resilient:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        data-disk-caching: |-
            Storage caching type for the image's data disk.

            Accepted values: None, ReadOnly, ReadWrite
        data-disk-sources: Space-separated list of data disk sources, including unmanaged blob URI, managed disk ID or name, or snapshot ID or name.
        edge-zone: The name of edge zone.
        hyper-v-generation: |-
            The hypervisor generation of the Virtual Machine created from the image.

            Default value: V1

            Accepted values: V1, V2
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: New image name.
        os-disk-caching: |-
            Storage caching type for the image's OS disk.

            Accepted values: None, ReadOnly, ReadWrite
        os-type: 'Accepted values: Linux, Windows'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source: OS disk source from the same region, including a virtual machine ID or name, OS disk blob URI, managed OS disk ID or name, or OS snapshot ID or name.
        storage-sku: |-
            The SKU of the storage account with which to create the VM image. Unused if source VM is specified.

            Accepted values: PremiumV2_LRS, Premium_LRS, Premium_ZRS, StandardSSD_LRS, StandardSSD_ZRS, Standard_LRS, UltraSSD_LRS
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        zone-resilient: |-
            Specifies whether an image is zone resilient or not. Default is false. Zone resilient images can be created only in regions that provide Zone Redundant Storage.

            Accepted values: false, true
examples:
    Create an image by capturing an existing generalized virtual machine in the same resource group.: az image create -g MyResourceGroup -n image1 --source MyVm1
    Create an image from an existing disk.: |-
        az image create -g MyResourceGroup -n image1 --os-type Linux \
            --source /subscriptions/db5eb68e-73e2-4fa8-b18a-0123456789999/resourceGroups/rg1/providers/Microsoft.Compute/snapshots/s1
