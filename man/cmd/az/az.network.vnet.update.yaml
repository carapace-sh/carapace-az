# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a virtual network.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --address-prefixes=:
        description: Space-separated list of IP address prefixes for the VNet.
        nargs: -1
    --bgp-community=: The BGP community associated with the virtual network.
    --ddos-protection-plan=: Name or ID of a DDoS protection plan to associate with the VNet.
    --ddos-protection=:
        description: Control whether DDoS protection is enabled.
        nargs: -1
    --dns-servers=:
        description: Space-separated list of DNS server IP addresses.
        nargs: -1
    --enable-encryption=:
        description: Enable encryption on the virtual network.
        nargs: -1
    --encryption-policy=: To control if the Virtual Machine without encryption is allowed in encrypted Virtual Network or not.
    --flowtimeout=: The FlowTimeout value (in minutes) for the Virtual Network.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ipam-allocations=:
        description: A list of IPAM Pools allocating IP address prefixes.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --pe-vnet-policies=: Private Endpoint VNet Policies.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --vm-protection=:
        description: Enable VM protection for all subnets in the VNet.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The virtual network (VNet) name.
completion:
    flag:
        ddos-protection:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-encryption:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        encryption-policy:
            - AllowUnencrypted
            - DropUnencrypted
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        pe-vnet-policies:
            - Basic
            - Disabled
        vm-protection:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        address-prefixes: 'Space-separated list of IP address prefixes for the VNet. Default: 10.0.0.0/16. If provided, --ipam-allocations should not be specified.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        bgp-community: The BGP community associated with the virtual network.
        change-reference: The related change reference ID for this resource operation.
        ddos-protection: |-
            Control whether DDoS protection is enabled.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ddos-protection-plan: Name or ID of a DDoS protection plan to associate with the VNet.
        dns-servers: Space-separated list of DNS server IP addresses.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        enable-encryption: |-
            Enable encryption on the virtual network.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes

            Accepted values: AllowUnencrypted, DropUnencrypted
        flowtimeout: The FlowTimeout value (in minutes) for the Virtual Network.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        ipam-allocations: A list of IPAM Pools allocating IP address prefixes. If provided, --address-prefixes would be empty and should not be specified.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The virtual network (VNet) name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes

            Accepted values: Basic, Disabled
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-protection: |-
            Enable VM protection for all subnets in the VNet.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
examples:
    For --summarized-gateway-prefixes with address-prefixes: az network vnet update --resource-group rg1 --name test-vnet --summarized-gateway-prefixes address-prefixes="[10.0.0.0/16,10.1.0.0/16]"
    For --summarized-gateway-prefixes with ipam-pool-prefix-allocations: az network vnet update --resource-group rg1 --name test-vnet --summarized-gateway-prefixes ipam-pool-prefix-allocations="[{id:<pool-resource-id>,number-of-ip-addresses:10}]"
    Update a virtual network to delete DNS server.: az network vnet update -g MyResourceGroup -n MyVNet --dns-servers null
    Update a virtual network with the IP address of a DNS server.: az network vnet update -g MyResourceGroup -n MyVNet --dns-servers 10.2.0.8
    Update a virtual network.: az network vnet update --address-prefixes 40.1.0.0/24 --name MyVNet --resource-group MyResourceGroup
