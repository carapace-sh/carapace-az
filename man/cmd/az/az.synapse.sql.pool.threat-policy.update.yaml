# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a SQL pool's threat detection policy.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --disabled-alerts=:
        description: List of disabled alerts.
        nargs: -1
    --email-account-admins=:
        description: Whether the alert is sent to the account administrators.
        nargs: -1
    --email-addresses=:
        description: List of email addresses that alerts are sent to.
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --retention-days=: The number of days to retain threat detection logs.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --state=: Threat detection policy state
    --storage-account=: Name of the storage account.
    --storage-endpoint=: The storage account endpoint.
    --storage-key=: Access key for the storage account.
    --subscription=: Name or ID of subscription.
    --workspace-name=: The workspace name.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The SQL pool name.
    -s, --security-alert-policy-name=: Name of the security alert policy.
completion:
    flag:
        email-account-admins:
            - "true"
            - "false"
        state:
            - New
            - Enabled
            - Disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        change-reference: The related change reference ID for this resource operation.
        disabled-alerts: List of disabled alerts.
        email-account-admins: |-
            Whether the alert is sent to the account administrators.

            Accepted values: false, true
        email-addresses: List of email addresses that alerts are sent to.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The SQL pool name.
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        retention-days: The number of days to retain threat detection logs.
        security-alert-policy-name: Name of the security alert policy.
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        state: |-
            Threat detection policy state.

            Accepted values: Disabled, Enabled, New
        storage-account: Name of the storage account.
        storage-endpoint: The storage account endpoint.
        storage-key: Access key for the storage account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    Configure email recipients for a policy.: |-
        az synapse sql pool threat-policy update --name sqlpool --workspace-name testsynapseworkspace --resource-group rg \
        --email-addresses me@examlee.com you@example.com --email-account-admins true \
        --security-alert-policy-name threatpolicy
    Disable a subset of alert types.: |-
        az synapse sql pool threat-policy update --name sqlpool --workspace-name testsynapseworkspace --resource-group rg \
        --disabled-alerts Sql_Injection_Vulnerability Access_Anomaly --security-alert-policy-name threatpolicy
    Disable a threat policy.: |-
        az synapse sql pool threat-policy update --name sqlpool --workspace-name testsynapseworkspace --resource-group rg \
        --state Disabled --security-alert-policy-name threatpolicy
    Enable by storage account name.: |-
        az synapse sql pool threat-policy update --name sqlpool --workspace-name testsynapseworkspace --resource-group rg \
        --state Enabled --storage-account mystorageaccount --security-alert-policy-name threatpolicy
    Enable by storage endpoint and key.: |-
        az synapse sql pool threat-policy update --name sqlpool --workspace-name testsynapseworkspace --resource-group rg \
        --state Enabled --storage-endpoint https://mystorage.blob.core.windows.net --storage-key MYKEY== \
        --security-alert-policy-name threatpolicy
