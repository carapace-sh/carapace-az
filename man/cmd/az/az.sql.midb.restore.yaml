# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restores an existing managed DB (i.e. create with 'PointInTimeRestore' create mode.)
flags:
    --deleted-time=: If specified, restore from a deleted database instead of from an existing database.
    --dest-mi=: Name of the managed instance to restore managed database to.
    --dest-name=!: Name of the managed database that will be created as the restore destination.
    --dest-resource-group=: Name of the resource group of the managed instance to restore managed database to.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --managed-instance=: Name of the Azure SQL Managed Instance.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Azure SQL Managed Database.
    -s, --source-sub=: Subscription id of the source database, the one restored from.
    -t, --time=!: The point in time of the source database that will be restored to create the new database.
documentation:
    command: Restore a managed database.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        deleted-time: If specified, restore from a deleted database instead of from an existing database. Must match the deleted time of a deleted database on the source Managed Instance.
        dest-mi: Name of the managed instance to restore managed database to. This can be same managed instance, or another managed instance on same subscription. When not specified it defaults to source managed instance.
        dest-name: Name of the managed database that will be created as the restore destination.
        dest-resource-group: Name of the resource group of the managed instance to restore managed database to. When not specified it defaults to source resource group.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Azure SQL Managed Database.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source-sub: Subscription id of the source database, the one restored from. This parameter should be used when doing cross subscription restore.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        time: 'The point in time of the source database that will be restored to create the new database. Must be greater than or equal to the source database''s earliestRestoreDate value. Time should be in following format: "YYYY-MM-DDTHH:MM:SS".'
examples:
    Restore a dropped managed database from another subscription using Point in time restore: az sql midb restore -s sourcesubscriptionid -g sourcegroup --mi sourceinstance -n sourcemanageddb --dest-name targetmidb --dest-mi targetmi --time "2018-05-20T05:34:22" --deleted-time "2018-05-20T05:34:22"
    Restore a dropped managed database using Point in time restore: az sql midb restore -g mygroup --mi myinstance -n mymanageddb --dest-name targetmidb --time "2018-05-20T05:34:22" --deleted-time "2018-05-20T05:34:22"
    Restore a live managed database from another instance using Point in time restore: az sql midb restore -g mygroup --mi myinstance -n mymanageddb --dest-name targetmidb --time "2018-05-20T05:34:22" --dest-mi targetmi --dest-resource-group targetrg
    Restore a live managed database from another subscription using Point in time restore: az sql midb restore -s sourcesubscriptionid -g sourcegroup --mi sourceinstance -n sourcemanageddb --dest-name targetmidb --dest-mi targetmi --time "2018-05-20T05:34:22"
    Restore a live managed database using Point in time restore: az sql midb restore -g mygroup --mi myinstance -n mymanageddb --dest-name targetmidb --time "2018-05-20T05:34:22"
