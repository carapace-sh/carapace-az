# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the billing accounts that a user has access to.
flags:
    --expand=: May be used to expand the soldTo, invoice sections and billing profiles.
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        Command group 'billing account' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        expand: May be used to expand the soldTo, invoice sections and billing profiles.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List billing account with desired expanded arguments: az billing account list --expand "enrollmentDetails,departments,enrollmentAccounts"
    List billing accounts: az billing account list
