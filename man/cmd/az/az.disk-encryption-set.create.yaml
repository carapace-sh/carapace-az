# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a disk encryption set
flags:
    --auto-rotation=:
        description: Enable automatic rotation of keys.
        nargs: -1
    --encryption-type=: The type of key used to encrypt the data of the disk.
    --federated-client-id=: The federated client id used in cross tenant scenario.
    --key-url=!: URL pointing to a key or secret in KeyVault.
    --mi-system-assigned=:
        description: Provide this flag to use system assigned identity.
        nargs: -1
    --mi-user-assigned=:
        description: Space separated resource IDs to add user-assigned identities.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --source-vault=: Name or ID of the KeyVault containing the key or secret.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Resource location  When not specified, the location of the resource group will be used.
    -n, --name=!: Name of disk encryption set.
completion:
    flag:
        auto-rotation:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        encryption-type:
            - ConfidentialVmEncryptedWithCustomerKey
            - EncryptionAtRestWithCustomerKey
            - EncryptionAtRestWithPlatformAndCustomerKeys
        mi-system-assigned:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Create a disk encryption set.
    flag:
        acquire-policy-token: |-
            Acquiring an Azure Policy token automatically for this resource operation.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        change-reference: The related change reference ID for this resource operation.
        encryption-type: |-
            The type of key used to encrypt the data of the disk. EncryptionAtRestWithCustomerKey: Disk is encrypted at rest with Customer managed key that can be changed and revoked by a customer. EncryptionAtRestWithPlatformAndCustomerKeys: Disk is encrypted at rest with 2 layers of encryption. One of the keys is Customer managed and the other key is Platform managed. ConfidentialVmEncryptedWithCustomerKey: An additional encryption type accepted for confidential VM. Disk is encrypted at rest with Customer managed key.

            Accepted values: ConfidentialVmEncryptedWithCustomerKey, EncryptionAtRestWithCustomerKey, EncryptionAtRestWithPlatformAndCustomerKeys
        federated-client-id: The federated client id used in cross tenant scenario.
        key-url: URL pointing to a key or secret in KeyVault.
        location: Resource location  When not specified, the location of the resource group will be used.
        mi-system-assigned: |-
            Provide this flag to use system assigned identity.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        mi-user-assigned: Space separated resource IDs to add user-assigned identities.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source-vault: Name or ID of the KeyVault containing the key or secret.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Create a disk encryption set: az disk-encryption-set create --resource-group MyResourceGroup --name MyDiskEncryptionSet --key-url MyKey --source-vault MyVault
    Create a disk encryption set with a system assigned identity.: az disk-encryption-set create --resource-group MyResourceGroup --name MyDiskEncryptionSet --key-url MyKey --source-vault MyVault --mi-system-assigned
    Create a disk encryption set with a user assigned identity.: az disk-encryption-set create --resource-group MyResourceGroup --name MyDiskEncryptionSet --key-url MyKey --source-vault MyVault --mi-user-assigned myAssignedId
    Create a disk encryption set with multi-tenant application client id to access key vault in a different tenant.: az disk-encryption-set create --resource-group MyResourceGroup --name MyDiskEncryptionSet --key-url MyKey --source-vault MyVault --federated-client-id myFederatedClientId
    Create a disk encryption set with system assigned identity and a user assigned identity.: az disk-encryption-set create --resource-group MyResourceGroup --name MyDiskEncryptionSet --key-url MyKey --source-vault MyVault --mi-system-assigned --mi-user-assigned myAssignedId
    Create a disk encryption set.: az disk-encryption-set create --resource-group MyResourceGroup --name MyDiskEncryptionSet --key-url MyKey --source-vault MyVault --encryption-type EncryptionAtRestWithPlatformAndCustomerKeys
