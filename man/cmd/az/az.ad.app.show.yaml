# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of an application.
flags:
    --id=!: identifier uri, application id, or object id
documentation:
    flag:
        id: Identifier uri, application id, or object id.
examples:
    Get the details of an application with appId.: az ad app show --id 00000000-0000-0000-0000-000000000000
    Get the details of an application with id.: az ad app show --id 00000000-0000-0000-0000-000000000000
    Get the details of an application with identifier URI.: az ad app show --id api://myapp
