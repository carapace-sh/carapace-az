# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Disable static web app's managed identity
flags:
    --identities=:
        description: Space-separated identities to assign.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the static site
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: Disable static web app's managed identity.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        identities: 'Space-separated identities to assign. Use ''[system]'' to refer to the system assigned identity. Default: ''[system]''.'
        name: Name of the static site.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Disable static web app's system managed identity: az staticwebapp identity remove --name MyApp --resource-group MyResourceGroup
    Disable static web app's system managed identity and a user managed identity: az staticwebapp identity remove --name MyApp --resource-group MyResourceGroup --identities [system] myAssignedId
