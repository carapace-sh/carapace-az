# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes an existing Azure Cosmos DB SQL Role Assignment.
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Cosmosdb account name.
    -g, --resource-group=!: Name of resource group.
    -i, --role-assignment-id=!: Optional for Create.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: Delete a SQL role assignment under an Azure Cosmos DB account.
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        role-assignment-id: Optional for Create. Unique ID for the Role Assignment. If not provided, a new GUID will be used.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete a SQL role assignment under an Azure Cosmos DB account.: az cosmosdb sql role assignment delete --account-name MyAccount --resource-group MyResourceGroup --role-assignment-id cb8ed2d7-2371-4e3c-bd31-6cc1560e84f8
