# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates an Azure Cosmos DB SQL trigger
flags:
    --operation=: The operation of the trigger.
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Cosmosdb account name.
    -b, --body=!: Trigger body, you can enter it as a string or as a file, e.g., --body @triggerbody-file.json
    -c, --container-name=!: Container name.
    -d, --database-name=!: Database name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Trigger name
    -t, --type=: Trigger type
completion:
    flag:
        operation:
            - All
            - Create
            - Update
            - Delete
            - Replace
        type:
            - Pre
            - Post
documentation:
    command: Create an SQL trigger under an Azure Cosmos DB SQL container.
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        body: Trigger body, you can enter it as a string or as a file, e.g., --body @triggerbody-file.json .
        change-reference: The related change reference ID for this resource operation.
        container-name: Container name.
        database-name: Database name.
        name: Trigger name.
        operation: |-
            The operation of the trigger.

            Accepted values: All, Create, Delete, Replace, Update
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: |-
            Trigger type.

            Accepted values: Post, Pre
examples:
    Create an Azure Cosmos DB SQL trigger.: az cosmosdb sql trigger create -g MyResourceGroup -a MyAccount -d MyDatabase -c MyContainer -n MyTrigger -b TriggerBody
