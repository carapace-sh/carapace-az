# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List role definitions.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --custom-role-only=:
        description: Only show custom role definitions.
        nargs: -1
    --hsm-name=: Name of the HSM.
    --scope=: scope at which the role assignment or definition applies to, e.g., "/" or "/keys" or "/keys/{keyname}"
    --subscription=: Name or ID of subscription.
completion:
    flag:
        custom-role-only:
            - "true"
            - "false"
