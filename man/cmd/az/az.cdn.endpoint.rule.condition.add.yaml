# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: CDN endpoint is the entity within a CDN profile containing configuration information such as origin, protocol, content caching and delivery behavior.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        match-values: Match values of the match condition. e.g, space separated values "GET" "HTTP"
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --match-values=:
        description: Match values of the match condition.
        nargs: -1
    --match-variable=!: 'Name of the match condition: https://learn.microsoft.com/en-us/azure/cdn/cdn-standard-rules-engine-match-conditions'
    --negate-condition=:
        description: If true, negates the condition
        nargs: -1
    --operator=!: Operator of the match condition.
    --profile-name=: Name of the CDN profile which is unique within the resource group.
    --rule-name=!: Name of the rule.
    --selector=: Selector of the match condition.
    --subscription=: Name or ID of subscription.
    --transform=:
        description: Transform to apply before matching.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the CDN endpoint.
completion:
    flag:
        match-variable:
            - ClientPort
            - Cookies
            - HostName
            - HttpVersion
            - IsDevice
            - PostArgs
            - QueryString
            - RemoteAddress
            - RequestBody
            - RequestHeader
            - RequestMethod
            - RequestScheme
            - RequestUri
            - ServerPort
            - SocketAddr
            - SslProtocol
            - UrlFileExtension
            - UrlFileName
            - UrlPath
        negate-condition:
            - "true"
            - "false"
        transform:
            - Lowercase
            - Uppercase
