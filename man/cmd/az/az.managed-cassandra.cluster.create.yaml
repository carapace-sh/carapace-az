# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates an Azure Managed Cassandra Cluster
flags:
    --authentication-method=: Authentication mode can be None or Cassandra.
    --cassandra-version=: The version of Cassandra chosen.
    --client-certificates=:
        description: If specified, enables client certificate authentication to the Cassandra API.
        nargs: -1
    --cluster-name-override=: If a cluster must have a name that is not a valid azure resource name, this field can be specified to choose the Cassandra cluster name.
    --external-seed-nodes=:
        description: A list of ip addresses of the seed nodes of on-premise data centers.
        nargs: -1
    --hours-between-backups=: The number of hours between backup attempts.
    --identity-type=: Type of identity used for Customer Managed Disk Key.
    --no-wait=: Do not wait for the long-running operation to finish.
    --repair-enabled=:
        description: Enables automatic repair.
        nargs: -1
    --restore-from-backup-id=: The resource id of a backup.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -c, --cluster-name=!: Cluster Name
    -e, --external-gossip-certificates=:
        description: A list of certificates that the managed cassandra data center's should accept.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -i, --initial-cassandra-admin-password=: The intial password to be configured when a cluster is created for authentication_method Cassandra.
    -l, --location=!: Azure Location of the Cluster
    -s, --delegated-management-subnet-id=!: The resource id of a subnet where the ip address of the cassandra management server will be allocated.
completion:
    flag:
        authentication-method:
            - None
            - Cassandra
        identity-type:
            - None
            - SystemAssigned
        repair-enabled:
            - "true"
            - "false"
documentation:
    command: Create a Managed Cassandra Cluster.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        authentication-method: |-
            Authentication mode can be None, Cassandra or Ldap. If None, no authentication will be required to connect to the Cassandra API. If Cassandra, then passwords will be used. Ldap is in preview.

            Accepted values: Cassandra, Ldap, None
        azure-connection-method: This field can be specified to create VPN based Cassandra cluster, where the datacenter is in customers vnet with limited permissions to azure.
        cassandra-version: The version of Cassandra chosen.
        change-reference: The related change reference ID for this resource operation.
        client-certificates: If specified, enables client certificate authentication to the Cassandra API.
        cluster-name: Cluster Name.
        cluster-name-override: If a cluster must have a name that is not a valid azure resource name, this field can be specified to choose the Cassandra cluster name. Otherwise, the resource name will be used as the cluster name.
        cluster-type: |-
            Type of the cluster, can be Production or NonProduction. If set to Production, operations on cluster might have restrictions.

            Default value: Production

            Accepted values: NonProduction, Production
        delegated-management-subnet-id: The resource id of a subnet where the ip address of the cassandra management server will be allocated. This subnet must have connectivity to the delegated_subnet_id subnet of each data center. This param is not needed for VPN clusters.
        extensions: 'A set of extensions that will be effective on the cluster. It will replace the entire set of extensions with new set. Use "" to remove all. Now Available: cassandra-lucene-index.'
        external-gossip-certificates: A list of certificates that the managed cassandra data center's should accept.
        external-seed-nodes: A list of ip addresses of the seed nodes of on-premise data centers.
        hours-between-backups: The number of hours between backup attempts.
        identity-type: |-
            Type of identity used for Customer Managed Disk Key.

            Default value: None

            Accepted values: None, SystemAssigned
        initial-cassandra-admin-password: The intial password to be configured when a cluster is created for authentication_method Cassandra.
        location: Azure Location of the Cluster.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        repair-enabled: |-
            Enables automatic repair.

            Accepted values: false, true
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restore-from-backup-id: The resource id of a backup. If provided on create, the backup will be used to prepopulate the cluster. The cluster data center count and node counts must match the backup.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    ? Create a Managed Cassandra Cluster in a given Subscription and ResourceGroup. Either a cassandra admin password or external seed needs are required.
    : |-
        az managed-cassandra cluster create \
        --resource-group MyResourceGroup \
        --cluster-name MyCluster \
        --location MyLocation \
        --initial-cassandra-admin-password password \
        --delegated-management-subnet-id /subscriptions/94d9b402-77b4-4049-b4c1-947bc6b7729b/resourceGroups/My-vnet/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet
