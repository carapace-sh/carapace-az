# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all data centers in a particular managed Cassandra cluster.
flags:
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Cluster Name
    -g, --resource-group=!: Name of resource group.
documentation:
    command: List the Managed Cassandra Datacenters in a given Cluster.
    flag:
        cluster-name: Cluster Name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all Managed Cassandra DataCenters in a given Cluster.: az managed-cassandra datacenter list --resource-group MyResourceGroup --cluster-name MyCluster
