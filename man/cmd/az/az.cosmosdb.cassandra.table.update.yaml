# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an Azure Cosmos DB Cassandra table
flags:
    --analytical-storage-ttl=: Analytical TTL, when analytical storage is enabled.
    --schema=: 'Schema, you can enter it as a string or as a file, e.g., --schema @schema-file.json or --schema "{\"columns\": [{\"name\": \"columnA\",\"type\": \"uuid\"}, {\"name\": \"columnB\",\"type\": \"Ascii\"}],\"partitionKeys\": [{\"name\": \"columnA\"}]}"'
    --subscription=: Name or ID of subscription.
    --ttl=: Default TTL.
    -a, --account-name=!: Cosmosdb account name.
    -g, --resource-group=!: Name of resource group.
    -k, --keyspace-name=!: Keyspace name
    -n, --name=!: Table name
documentation:
    command: Update an Cassandra table under an Azure Cosmos DB Cassandra keyspace.
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        analytical-storage-ttl: Analytical TTL, when analytical storage is enabled.
        change-reference: The related change reference ID for this resource operation.
        keyspace-name: Keyspace name.
        name: Table name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        schema: |
            Schema, you can enter it as a string or as a file, e.g., --schema @schema-file.json or --schema "{\"columns\": [{\"name\": \"columnA\",\"type\": \"uuid\"}, {\"name\": \"columnB\",\"type\": \"Ascii\"}],\"partitionKeys\": [{\"name\": \"columnA\"}]}"
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        ttl: Default TTL. If the value is missing or set to "-1", items don’t expire. If the value is set to "n", items will expire "n" seconds after last modified time.
examples:
    Update an Cassandra table under an Azure Cosmos DB Cassandra keyspace. (autogenerated): az cosmosdb cassandra table update --account-name MyAccount --keyspace-name MyKeyspace --name MyTable --resource-group MyResourceGroup --schema @indexes-file.json
