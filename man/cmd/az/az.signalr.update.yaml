# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an existing SignalR Service.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --client-cert-enabled=:
        description: Enable or disable client certificate authentication for a SignalR Service
        nargs: -1
    --default-action=: Default action to apply when no rule matches.
    --disable-local-auth=:
        description: Enable or disable local auth for a SignalR Service
        nargs: -1
    --enable-message-logs=:
        description: The switch for messaging logs which signalr service will generate or not
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --region-endpoint-enabled=:
        description: Enable or disable region endpoint for a SignalR Service
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --service-mode=: The service mode which signalr service will be working on
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku=: The sku name of the signalr service.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --unit-count=: The number of signalr service unit count
    -a, --allowed-origins=:
        description: 'space separated origins that should be allowed to make cross-origin calls (for example: http://example.com:12345).'
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of signalr service.
completion:
    flag:
        client-cert-enabled:
            - "true"
            - "false"
        default-action:
            - Allow
            - Deny
        disable-local-auth:
            - "true"
            - "false"
        enable-message-logs:
            - "true"
            - "false"
        region-endpoint-enabled:
            - "true"
            - "false"
        service-mode:
            - Default
            - Serverless
            - Classic
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        allowed-origins: 'Space separated origins that should be allowed to make cross-origin calls (for example: ``` http://example.com:12345 ``` ). To allow all, use "*".'
        change-reference: The related change reference ID for this resource operation.
        client-cert-enabled: |-
            Enable or disable client certificate authentication for a SignalR Service.

            Accepted values: false, true
        default-action: |-
            Default action to apply when no rule matches.

            Accepted values: Allow, Deny
        disable-local-auth: |-
            Enable or disable local auth for a SignalR Service.

            Accepted values: false, true
        enable-message-logs: |-
            The switch for messaging logs which signalr service will generate or not.

            Accepted values: false, true
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of signalr service.
        region-endpoint-enabled: |-
            Enable or disable region endpoint for a SignalR Service.

            Accepted values: false, true
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-mode: |-
            The service mode which signalr service will be working on.

            Accepted values: Classic, Default, Serverless
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        sku: The sku name of the signalr service. E.g. Standard_S1.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        unit-count: |-
            The number of signalr service unit count.

            Default value: 1
examples:
    Enable or disable client certificate authentication for a SignalR Service: az signalr update -n MySignalR -g MyResourceGroup --client-cert-enabled False
    Enable or disable local auth for a SignalR Service: az signalr update -n MySignalR -g MyResourceGroup --disable-local-auth True
    Enable or disable region endpoint for a SignalR Service: az signalr update -n MySignalR -g MyResourceGroup --region-endpoint-enabled False
    Update for enabling messaging logs in the service.: az signalr update -n MySignalR -g MyResourceGroup --enable-message-logs True
    Update service mode.: az signalr update -n MySignalR -g MyResourceGroup --service-mode Serverless
    Update unit count to scale the service.: az signalr update -n MySignalR -g MyResourceGroup --sku Standard_S1 --unit-count 50
