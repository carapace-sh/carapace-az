# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restores an existing managed DB (i.e. create with 'RestoreLongTermRetentionBackup' create mode.)
documentation:
    flag:
        backup-id: The resource id of the long term retention backup to be restored. Use 'az sql midb ltr-backup show' or 'az sql midb ltr-backup list' for backup id.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --backup-id=!: The resource id of the long term retention backup to be restored.
    --dest-database=!: Name of the managed database that will be created as the restore destination.
    --dest-mi=!: Name of the managed instance to restore managed database to.
    --dest-resource-group=!: Name of the resource group of the managed instance to restore managed database to.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
