# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restores an existing managed DB (i.e. create with 'RestoreLongTermRetentionBackup' create mode.)
flags:
    --backup-id=!: The resource id of the long term retention backup to be restored.
    --dest-database=!: Name of the managed database that will be created as the restore destination.
    --dest-mi=!: Name of the managed instance to restore managed database to.
    --dest-resource-group=!: Name of the resource group of the managed instance to restore managed database to.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-id: The resource id of the long term retention backup to be restored. Use 'az sql midb ltr-backup show' or 'az sql midb ltr-backup list' for backup id.
        change-reference: The related change reference ID for this resource operation.
        dest-database: Name of the managed database that will be created as the restore destination.
        dest-mi: Name of the managed instance to restore managed database to.
        dest-resource-group: Name of the resource group of the managed instance to restore managed database to.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Restore a managed database using LTR backup.: |-
        az sql midb ltr-backup restore \
            --dest-database targetmidb --dest-mi myinstance --dest-resource-group mygroup \
            --backup-id "/subscriptions/6caa113c-794c-42f8-ab9d-878d8aa104dc/resourceGroups/mygroup/providers/Microsoft.Sql/locations/southeastasia/longTermRetentionManagedInstances/myinstance/longTermRetentionDatabases/sourcemidb/longTermRetentionManagedInstanceBackups/3214b3fb-fba9-43e7-96a3-09e35ffcb336;132292152080000000"
