# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the reliability tier for the primary node in a cluster.
flags:
    --auto-add-node=: Add node count automatically when changing reliability.
    --reliability-level=!: durability level.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
completion:
    flag:
        reliability-level:
            - Bronze
            - Silver
            - Gold
            - Platinum
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auto-add-node: |-
            Add node count automatically when changing reliability.

            Default value: False
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        reliability-level: |-
            Durability level.

            Accepted values: Bronze, Gold, Platinum, Silver
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Change the cluster reliability level to 'Silver'.: az sf cluster reliability update -g group-name -c cluster1 --reliability-level Silver
