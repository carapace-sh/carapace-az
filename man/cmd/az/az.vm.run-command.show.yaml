# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get specific run command
flags:
    --command-id=: The command id.
    --expand=: The expand expression to apply on the operation.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --instance-view=: The instance view of a run command.
    --name=: The name of the virtual machine run command.
    --subscription=: Name or ID of subscription.
    --vm-name=: The name of the virtual machine
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
documentation:
    command: Get specific run command.
    flag:
        command-id: The command id.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        instance-view: |-
            The instance view of a run command.

            Default value: False
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` . --name --run-command-name The name of the virtual machine run command.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm-name: The name of the virtual machine.
examples:
    Get specific run command for a subscription in a location.: az vm run-command show --command-id "RunPowerShellScript" --location "SoutheastAsia"
    Get the run commands in a virtual machine.: az vm run-command show --resource-group "myResourceGroup" --run-command-name "myRunCommand" --vm-name "myVM"
