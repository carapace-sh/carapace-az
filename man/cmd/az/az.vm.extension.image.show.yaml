# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Display information for an extension.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --version=: Extension version.
    -l, --location=: Location.
    -n, --name=: Name of the extension.
    -p, --publisher=: Image publisher name.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        version: Extension version.
examples:
    Show the CustomScript extension version 2.0.2.: az vm extension image show -l westus -n CustomScript --publisher Microsoft.Azure.Extensions --version 2.0.2
    Show the latest version of the Docker extension.: |-
        az vm extension image list-versions --publisher Microsoft.Azure.Extensions -l westus -n DockerExtension --query "[].name" -o tsv | sort | tail -n 1
        az vm extension image show -l westus --publisher Microsoft.Azure.Extensions -n DockerExtension --version LatestVersion
