# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable-for-azurefileshare
description: Start protecting a previously unprotected Azure File share within an Azure Storage account as per the specified policy to a Recovery services vault.
flags:
    --azure-file-share=!: Name of the Azure FileShare.
    --storage-account=!: Name of the Storage Account of the FileShare.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -p, --policy-name=!: Name of the backup policy.
    -v, --vault-name=!: Name of the Recovery services vault.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        azure-file-share: Name of the Azure FileShare.
        change-reference: The related change reference ID for this resource operation.
        policy-name: Name of the backup policy.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        storage-account: Name of the Storage Account of the FileShare.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Recovery services vault.
examples:
    ? Start protecting a previously unprotected Azure File share within an Azure Storage account as per the specified policy to a Recovery services vault. Provide the Azure File share name and the parent storage account name.
    : az backup protection enable-for-azurefileshare --policy-name MyPolicy --resource-group MyResourceGroup --vault-name MyVault --storage-account MyStorageAccount --azure-file-share MyAzureFileShare
