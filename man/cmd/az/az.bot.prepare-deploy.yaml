# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: prepare-deploy
description: Add scripts/config files for publishing with `az webapp deployment`.
flags:
    --code-dir=: The directory to place the generated deployment files in.
    --lang=!: The language or runtime of the bot.
    --proj-file-path=: The path to the .csproj file relative to --code-dir.
    --subscription=: Name or ID of subscription.
completion:
    flag:
        lang:
            - Csharp
            - Javascript
            - Typescript
documentation:
    command: Add scripts/config files for publishing with
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        code-dir: The directory to place the generated deployment files in. Defaults to the current directory the command is called from.
        lang: The language or runtime of the bot.
        proj-file-path: The path to the .csproj file relative to --code-dir.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Prepare to use `az webapp` to deploy a Csharp bot by creating a .deployment file.: az bot prepare-deploy --lang Csharp --code-dir "." --proj-file-path "MyBot.csproj"
    Prepare to use `az webapp` to deploy a Javascript bot by fetching a Node.js IIS web.config file.: az bot prepare-deploy --lang Javascript --code-dir "MyBotCode"
