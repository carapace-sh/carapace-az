# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: prepare-deploy
description: Add scripts/config files for publishing with `az webapp deployment`.
documentation:
    flag:
        code-dir: The directory to place the generated deployment files in. Defaults to the current directory the command is called from.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --code-dir=: The directory to place the generated deployment files in.
    --lang=!: The language or runtime of the bot.
    --proj-file-path=: The path to the .csproj file relative to --code-dir.
    --subscription=: Name or ID of subscription.
completion:
    flag:
        lang:
            - Csharp
            - Javascript
            - Typescript
