# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show a container app replica
flags:
    --replica=!: The name of the replica.
    --revision=: The name of the container app revision.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Containerapp.
documentation:
    command: Show a container app replica.
    flag:
        name: The name of the Containerapp.
        replica: 'The name of the replica. '
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        revision: The name of the container app revision. Defaults to the latest revision.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show a replica from the a particular revision: az containerapp replica show -n my-containerapp -g MyResourceGroup --replica MyReplica --revision MyRevision
    Show a replica from the latest revision: az containerapp replica show -n my-containerapp -g MyResourceGroup --replica MyReplica
