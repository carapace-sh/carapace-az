# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates the specified trusted identity provider.
flags:
    --id-provider=: The URL of this trusted identity provider.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --trusted-id-provider-name=!: The name of the trusted identity provider.
    -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
    -n, --account=: Name of the Data Lake Store account.
documentation:
    command: |-
        Command group 'dls' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account: Name of the Data Lake Store account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        id-provider: The URL of this trusted identity provider.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        trusted-id-provider-name: The name of the trusted identity provider. This is used for differentiation of providers in the account.
