# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update-network-sibling-set
description: Update the network features of a network sibling set
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        subnet-id: The Azure Resource URI for a delegated subnet. Must have the delegation Microsoft.NetApp/volumes. Example /subscriptions/subscriptionId/resourceGroups/resourceGroup/providers/Microsoft.Network/virtualNetworks/testVnet/subnets/{mySubnet}
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --network-features=: Network features available to the volume
    --network-sibling-set-id=!: Network Sibling Set ID for a group of volumes sharing networking resources in a subnet.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --state-id=!: Network sibling set state Id identifying the current state of the sibling set.
    --subnet-id=!: The Azure Resource URI for a delegated subnet.
    --subscription=: Name or ID of subscription.
    -l, --location=: Location.
completion:
    flag:
        network-features:
            - Basic
            - Standard
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
