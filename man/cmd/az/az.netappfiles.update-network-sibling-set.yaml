# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update-network-sibling-set
description: Update the network features of a network sibling set
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --network-features=: Network features available to the volume
    --network-sibling-set-id=!: Network Sibling Set ID for a group of volumes sharing networking resources in a subnet.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --state-id=!: Network sibling set state Id identifying the current state of the sibling set.
    --subnet-id=!: The Azure Resource URI for a delegated subnet.
    --subscription=: Name or ID of subscription.
    -l, --location=: Location.
completion:
    flag:
        network-features:
            - Basic
            - Standard
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Update the network features of a network sibling set.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        network-features: |-
            Network features available to the volume.

            Default value: Basic

            Accepted values: Basic, Standard
        network-sibling-set-id: Network Sibling Set ID for a group of volumes sharing networking resources in a subnet.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        subnet-id: The Azure Resource URI for a delegated subnet. Must have the delegation Microsoft.NetApp/volumes. Example /subscriptions/subscriptionId/resourceGroups/resourceGroup/providers/Microsoft.Network/virtualNetworks/testVnet/subnets/{mySubnet}.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update Network sibling set: az netappfiles update-network-sibling-set -l westus2 --network-sibling-set-id {SIBLIING_SET_ID} --subnet-id {SUBNET_ID} --network-sibling-set-state-id='{SIBLING_SET_STATE_ID}' --network-features Standard
