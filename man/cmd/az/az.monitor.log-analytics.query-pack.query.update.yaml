# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a specific query within a log analytics query pack.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --body=: Content of the query.
    --categories=:
        description: The related categories for the function.
        nargs: -1
    --description=: Description of the query.
    --display-name=: Unique display name for your query within the query pack.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --query-pack-name=: The name of the log analytics query pack.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --resource-types=:
        description: The related resource types for the function.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --solutions=:
        description: The related Log Analytics solutions for the function.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Tags associated with the query.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The id name of a specific query defined in the log analytics query pack.
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: |-
        Command group 'az monitor log-analytics query-pack query' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        body: Content of the query.
        categories: The related categories for the function.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        description: Description of the query.
        display-name: Unique display name for your query within the query pack.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The id name of a specific query defined in the log analytics query pack. It must be of type GUID.
        query-pack-name: The name of the log analytics query pack.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-types: The related resource types for the function.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        solutions: The related Log Analytics solutions for the function.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Tags associated with the query.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Update a query in a query pack: az monitor log-analytics query-pack query update --query-id 112c6b1f-5a86-4f01-a2d7-efb8e31f930f -g resourceGroup  --query-pack-name queryPackName --body "heartbeat | take 20" --categories [2]=databases --tags version[0]=null
