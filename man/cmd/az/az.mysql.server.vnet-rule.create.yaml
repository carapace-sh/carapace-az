# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a virtual network rule to allows access to a MySQL server.
flags:
    --subnet=!: Name or ID of the subnet that allows access to an Azure Postgres Server.
    --subscription=: Name or ID of subscription.
    --vnet-name=: The virtual network name
    -g, --resource-group=!: Name of resource group.
    -i, --ignore-missing-endpoint=:
        description: Create vnet rule before virtual network has vnet service endpoint enabled
        nargs: -1
    -n, --name=!: The name of the vnet rule.
    -s, --server-name=!: Name of the server.
completion:
    flag:
        ignore-missing-endpoint:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ignore-missing-endpoint: |-
            Create vnet rule before virtual network has vnet service endpoint enabled.

            Accepted values: false, true
        name: The name of the vnet rule.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subnet: Name or ID of the subnet that allows access to an Azure Postgres Server. If subnet name is provided, --vnet-name must be provided.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vnet-name: The virtual network name.
examples:
    Create a virtual network rule by providing the subnet id.: az mysql server vnet-rule create -g testgroup -s testsvr -n vnetRuleName --subnet /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Network/virtualNetworks/vnetName/subnets/subnetName
    ? Create a vnet rule by providing the vnet and subnet name. The subnet id is created by taking the resource group name and subscription id of the server.
    : az mysql server vnet-rule create -g testgroup -s testsvr -n vnetRuleName --subnet subnetName --vnet-name vnetName
