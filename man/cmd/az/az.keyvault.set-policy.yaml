# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-policy
description: Update security policy settings for a Key Vault.
flags:
    --application-id=: Application ID of the client making request on behalf of a principal.
    --certificate-permissions=:
        description: Space-separated list of certificate permissions to assign.
        nargs: -1
    --key-permissions=:
        description: Space-separated list of key permissions to assign.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --object-id=: a GUID that identifies the principal that will receive permissions
    --secret-permissions=:
        description: Space-separated list of secret permissions to assign.
        nargs: -1
    --spn=: name of a service principal that will receive permissions
    --storage-permissions=:
        description: Space-separated list of storage permissions to assign.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --upn=: name of a user principal that will receive permissions
    -g, --resource-group=: Proceed only if Key Vault belongs to the specified resource group.
    -n, --name=!: Name of the Vault.
completion:
    flag:
        certificate-permissions:
            - all
            - get
            - list
            - delete
            - create
            - import
            - update
            - managecontacts
            - getissuers
            - listissuers
            - setissuers
            - deleteissuers
            - manageissuers
            - recover
            - purge
            - backup
            - restore
        key-permissions:
            - all
            - encrypt
            - decrypt
            - wrapKey
            - unwrapKey
            - sign
            - verify
            - get
            - list
            - create
            - update
            - import
            - delete
            - backup
            - restore
            - recover
            - purge
            - release
            - rotate
            - getrotationpolicy
            - setrotationpolicy
        secret-permissions:
            - all
            - get
            - list
            - set
            - delete
            - backup
            - restore
            - recover
            - purge
        storage-permissions:
            - all
            - get
            - list
            - delete
            - set
            - update
            - regeneratekey
            - recover
            - purge
            - backup
            - restore
            - setsas
            - listsas
            - getsas
            - deletesas
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        application-id: Application ID of the client making request on behalf of a principal. Exposed for compound identity using on-behalf-of authentication flow.
        certificate-permissions: |-
            Space-separated list of certificate permissions to assign.

            Accepted values: all, backup, create, delete, deleteissuers, get, getissuers, import, list, listissuers, managecontacts, manageissuers, purge, recover, restore, setissuers, update
        change-reference: The related change reference ID for this resource operation.
        key-permissions: |-
            Space-separated list of key permissions to assign.

            Accepted values: all, backup, create, decrypt, delete, encrypt, get, getrotationpolicy, import, list, purge, recover, release, restore, rotate, setrotationpolicy, sign, unwrapKey, update, verify, wrapKey
        name: Name of the Vault.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        object-id: A GUID that identifies the principal that will receive permissions.
        resource-group: Name of resource group.
        secret-permissions: |-
            Space-separated list of secret permissions to assign.

            Accepted values: all, backup, delete, get, list, purge, recover, restore, set
        spn: Name of a service principal that will receive permissions.
        storage-permissions: |-
            Space-separated list of storage permissions to assign.

            Accepted values: all, backup, delete, deletesas, get, getsas, list, listsas, purge, recover, regeneratekey, restore, set, setsas, update
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        upn: Name of a user principal that will receive permissions.
examples:
    Assign key permissions `get`, `list` to a SPN (Service Principal Name).: az keyvault set-policy -n MyVault --key-permissions get list --spn {SPN}
    Assign key permissions `get`, `list` to a UPN (User Principal Name).: az keyvault set-policy -n MyVault --key-permissions get list --upn {UPN}
    Assign key permissions `get`, `list`, `import` and secret permissions `backup`, `restore` to an object id.: az keyvault set-policy -n MyVault --key-permissions get list import --secret-permissions backup restore --object-id {GUID}
