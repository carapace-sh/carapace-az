# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a webapp connection.
flags:
    --connection=: Name of the webapp connection.
    --id=: The resource id of the connection.
    --no-wait=: Do not wait for the long-running operation to finish.
    --slot=: The name of the slot.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group which contains the webapp.
    -n, --name=: Name of the webapp.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        connection: Name of the webapp connection.
        id: The resource id of the connection. ['--resource-group', '--name', '--connection'] are required if '--id' is not specified.
        name: Name of the webapp. Required if '--id' is not specified.None.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: The resource group which contains the webapp. Required if '--id' is not specified.None.
        slot: The name of the slot. Default to the production slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete a webapp connection by connection id: az webapp connection delete --id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.Web/sites/{site}/providers/Microsoft.ServiceLinker/linkers/{linker}
    Delete a webapp connection by connection name: az webapp connection delete -g WebAppRG -n MyWebApp --connection MyConnection
    Delete a webapp connection interactively: az webapp connection delete
