# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Create or update a storage.
flags:
    --access-mode=!: Access mode for the AzureFile storage.
    --no-wait=: Do not wait for the long-running operation to finish.
    --storage-name=!: Name of the storage.
    --subscription=: Name or ID of subscription.
    -a, --azure-file-account-name=!: Name of the AzureFile storage account.
    -f, --azure-file-share-name=!: Name of the share on the AzureFile storage.
    -g, --resource-group=!: Name of resource group.
    -k, --azure-file-account-key=!: Key of the AzureFile storage account.
    -n, --name=!: Name of the Container Apps environment.
completion:
    flag:
        access-mode:
            - ReadWrite
            - ReadOnly
documentation:
    flag:
        access-mode: |-
            Access mode for the AzureFile or nfs AzureFile storage.

            Accepted values: ReadOnly, ReadWrite
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the Container Apps environment.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Server of the NfsAzureFile storage account.
        storage-name: Name of the storage.
        storage-type: |-
            Type of the storage. Assumed to be AzureFile if not specified.

            Accepted values: AzureFile, NfsAzureFile
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a azure file storage.: az containerapp env storage set -g MyResourceGroup -n MyEnv --storage-name MyStorageName --access-mode ReadOnly --azure-file-account-key MyAccountKey --azure-file-account-name MyAccountName --azure-file-share-name MyShareName
    Create a nfs azure file storage.: az containerapp env storage set -g MyResourceGroup -n MyEnv --storage-name MyStorageName --storage-type NfsAzureFile --access-mode ReadOnly --server MyNfsServer.file.core.windows.net --file-share /MyNfsServer/MyShareName
    Create a storage.: az containerapp env storage set -g MyResourceGroup -n MyEnv --storage-name MyStorageName --access-mode ReadOnly --azure-file-account-key MyAccountKey --azure-file-account-name MyAccountName --azure-file-share-name MyShareName
