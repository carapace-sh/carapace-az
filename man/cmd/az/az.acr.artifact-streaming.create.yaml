# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a referrers streaming artifact for a specific image in an ACR.
flags:
    --no-wait=: Do not wait for the run to complete and return immediately after queuing the run.
    --subscription=: Name or ID of subscription.
    --suffix=: The tenant suffix in registry login server.
    -n, --name=!: The name of the container registry.
    -p, --password=: The password used to log into a container registry
    -t, --image=!: The name of the image.
    -u, --username=: The username used to log into a container registry
documentation:
    command: |-
        Command group 'acr artifact-streaming' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        image: The name of the image. May include a tag in the format 'name:tag' or digest in the format 'name@digest'.
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        no-wait: |-
            Do not wait for the run to complete and return immediately after queuing the run.

            Default value: False
        password: The password used to log into a container registry.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        suffix: The tenant suffix in registry login server. You may specify '--suffix tenant' if your registry login server is in the format 'registry-tenant.azurecr.io'. Applicable if you're accessing the registry from a different subscription or you have permission to access images but not the permission to manage the registry resource.
        username: The username used to log into a container registry.
examples:
    Create the streaming artifact of 'MyImage' in the registry 'myregistry'.: az acr artifact-streaming create -n myregistry -t MyImage
