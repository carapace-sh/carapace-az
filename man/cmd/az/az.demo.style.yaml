# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: style
description: A demo showing supported text styles.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        theme: The theme to format styled text. If unspecified, the default theme is used.
flags:
    --subscription=: Name or ID of subscription.
    --theme=: The theme to format styled text.
completion:
    flag:
        theme:
            - dark
            - light
            - cloud-shell
            - none
