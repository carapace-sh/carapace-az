# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Set a revision label to a revision with an associated traffic weight.
flags:
    --label=!: Name of the label.
    --revision=!: Name of the revision.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=: The name of the Containerapp.
    -y, --no-prompt=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        label: Name of the label.
        name: |-
            The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters. --no-prompt --yes -y Do not prompt for confirmation.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        revision: Name of the revision.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add a label to a previous revision.: az containerapp revision label add -g MyResourceGroup --label myLabel --revision revisionName
    Add a label to the latest revision.: az containerapp revision label add -n my-containerapp -g MyResourceGroup --label myLabel --revision latest
