# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: export
description: Export the template used to create the deployment stack
flags:
    --id=: The deployment stack resource id.
    --subscription=: Name or ID of subscription.
    -m, --management-group-id=!: The management group id to create stack at.
    -n, --name=: The deployment stack name
documentation:
    command: Export the template used to create the deployment stack.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        id: The deployment stack resource id.
        management-group-id: The management group id to create stack at.
        name: The deployment stack name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Export template by name.: az stack mg export --name StackName --management-group-id myMg
    Export template by stack resource id.: az stack mg export --id /providers/Microsoft.Management/managementGroups/myMg/providers/Microsoft.Resources/deploymentStacks/StackName --management-group-id myMg
