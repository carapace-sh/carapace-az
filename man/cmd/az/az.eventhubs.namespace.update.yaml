# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a namespace.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --alternate-name=: Alternate name specified when alias and namespace names are same.
    --capacity=: The Event Hubs throughput units for Basic or Standard tiers, where value should be 0 to 20 throughput units.
    --cluster-arm-id=: Cluster ARM ID of the Namespace.
    --disable-local-auth=:
        description: This property disables SAS authentication for the Event Hubs namespace.
        nargs: -1
    --enable-auto-inflate=:
        description: Value that indicates whether AutoInflate is enabled for eventhub namespace.
        nargs: -1
    --encryption=:
        description: Properties of BYOK Encryption description  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --endpoint-connections=:
        description: List of private endpoint connections.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --identity=:
        description: Properties of BYOK Identity description  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --kafka-enabled=:
        description: Value that indicates whether Kafka is enabled for eventhub namespace.
        nargs: -1
    --locations=:
        description: A list of regions where replicas of the namespace are maintained.
        nargs: -1
    --max-lag=: The maximum acceptable lag for data replication operations from the primary replica to a quorum of secondary replicas.
    --maximum-throughput-units=: Upper limit of throughput units when AutoInflate is enabled, value should be within 0 to 20 throughput units.
    --minimum-tls-version=: The minimum TLS version for the cluster to support, e.g. '1.2'
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --public-network-access=: This determines if traffic is allowed over public network.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --sku=: Name of this SKU.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    --tier=: The billing tier of this particular SKU.
    --zone-redundant=:
        description: Enabling this property creates a Standard Event Hubs Namespace in regions supported availability zones.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The Namespace name
completion:
    flag:
        disable-local-auth:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enable-auto-inflate:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        kafka-enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        minimum-tls-version:
            - "1.0"
            - "1.1"
            - "1.2"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        public-network-access:
            - Disabled
            - Enabled
            - SecuredByPerimeter
        sku:
            - Basic
            - Premium
            - Standard
        tier:
            - Basic
            - Premium
            - Standard
        zone-redundant:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Update a namespace. Once created, this namespace's resource manifest is immutable. This operation is idempotent.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        alternate-name: Alternate name specified when alias and namespace names are same.
        capacity: The Event Hubs throughput units for Basic or Standard tiers, where value should be 0 to 20 throughput units. The Event Hubs premium units for Premium tier, where value should be 0 to 10 premium units.
        change-reference: The related change reference ID for this resource operation.
        cluster-arm-id: Cluster ARM ID of the Namespace.
        disable-local-auth: |-
            This property disables SAS authentication for the Event Hubs namespace.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        enable-auto-inflate: |-
            Value that indicates whether AutoInflate is enabled for eventhub namespace.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        encryption: Properties of BYOK Encryption description  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        endpoint-connections: List of private endpoint connections.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        identity: Properties of BYOK Identity description  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        kafka-enabled: |-
            Value that indicates whether Kafka is enabled for eventhub namespace.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        locations: A list of regions where replicas of the namespace are maintained.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        max-lag: The maximum acceptable lag for data replication operations from the primary replica to a quorum of secondary replicas.  When the lag exceeds the configured amount, operations on the primary replica will be failed.
        maximum-throughput-units: Upper limit of throughput units when AutoInflate is enabled, value should be within 0 to 20 throughput units. ( '0' if AutoInflateEnabled = true).
        minimum-tls-version: |-
            The minimum TLS version for the cluster to support, e.g. '1.2'.

            Accepted values: 1.0, 1.1, 1.2
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        public-network-access: |-
            This determines if traffic is allowed over public network. By default it is enabled.

            Accepted values: Disabled, Enabled, SecuredByPerimeter
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        sku: |-
            Name of this SKU.

            Accepted values: Basic, Premium, Standard
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        tier: |-
            The billing tier of this particular SKU.

            Accepted values: Basic, Premium, Standard
        zone-redundant: |-
            Enabling this property creates a Standard Event Hubs Namespace in regions supported availability zones.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
examples:
    Update a new namespace.: az eventhubs namespace update --resource-group myresourcegroup --name mynamespace --tags tag=value --enable-auto-inflate True
