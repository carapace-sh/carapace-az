# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add an output to a connection monitor.
flags:
    --connection-monitor=!: Connection monitor name.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --output-index=: output-index
    --subscription=: Name or ID of subscription.
    --type=!: Connection monitor output destination type.
    --workspace-id=: The id of log analytics workspace
    -l, --location=!: Location.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        type:
            - Workspace
documentation:
    command: |-
        Command group 'network watcher connection-monitor output' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        connection-monitor: Connection monitor name.
        location: |-
            Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` . --output-type --type Connection monitor output destination type. Currently, only "Workspace" is supported.

            Accepted values: Workspace
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        output-index: Output-index.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: Connection monitor output destination type. Currently, only "Workspace" is supported.
        workspace-id: The id of log analytics workspace.
