# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an instance of the Azure Database Migration Service (classic).
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --sku-name=!: The name of the CPU SKU on which the service's virtual machine will run.
    --subnet=!: The Resource ID of the VNet's Subnet you will use to connect the source and target DBs.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: A space-delimited list of tags in "tag1[=value1]" format.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=!: Location.
    -n, --name=!: The name of the Service.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: The name of the Service.
        no-wait: Do not wait for the long-running operation to finish.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku-name: |
            The name of the CPU SKU on which the service's virtual machine will run. Check the name and the availability of SKUs in your area with "az dms list-skus".
        subnet: |
            The Resource ID of the VNet's Subnet you will use to connect the source and target DBs. Use "az network vnet subnet show -h" for help to get your subnet's ID.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: A space-delimited list of tags in "tag1[=value1]" format.
examples:
    Create an instance of DMS.: az dms create -n mydms -g myresourcegroup --sku-name Basic_2vCores --subnet /subscriptions/{vnetSubscriptionId}/resourceGroups/{vnetResourceGroup}/providers/Microsoft.Network/virtualNetworks/{vnetName}/subnets/{subnetName} --tags tagName1=tagValue1 tagWithNoValue
