# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: check-vm
description: The command returns null/empty if the specified resource is not protected under any Recovery Services vault in the subscription.
flags:
    --subscription=: Name or ID of subscription.
    --vm-id=: ID of the virtual machine to be checked for protection.
    --vm=: Name or ID of the Virtual Machine to be protected.
    -g, --resource-group=: Name of resource group.
documentation:
    command: |-
        The command returns null/empty if the specified resource is not protected under any Recovery Services vault in the subscription. When configuring backup fails, it may return vault details. If Azure Backup is failing, then look for the corresponding error code in the Common issues section -
        https://learn.microsoft.com/en-us/azure/backup/backup-azure-vms-troubleshoot#common-issues
        . If it is protected, the relevant vault details will be returned.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm: Name or ID of the Virtual Machine to be protected.
examples:
    ? Find out whether the virtual machine is protected or not. If protected, it returns the recovery services vault ID, otherwise it returns empty. (autogenerated)
    : az backup protection check-vm --resource-group MyResourceGroup --vm myVM
