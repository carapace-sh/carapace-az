name: export
description: Export the template used for a deployment.
flags:
    --subscription=: Name or ID of subscription.
    -m, --management-group-id=!: The management group id.
    -n, --name=!: The deployment name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        management-group-id: The management group id.
        name: The deployment name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Export the template used for a deployment at management group.: az deployment mg export --management-group-id testmg --name MyDeployment
