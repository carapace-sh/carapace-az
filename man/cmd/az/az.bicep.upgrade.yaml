# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upgrade
description: Upgrade Bicep CLI to the latest version.
flags:
    --subscription=: Name or ID of subscription.
    -t, --target-platform=: The platform the Bicep CLI will be running on.
completion:
    flag:
        target-platform:
            - win-x64
            - linux-musl-x64
            - linux-x64
            - osx-x64
            - linux-arm64
            - osx-arm64
            - win-arm64
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-platform: |-
            The platform the Bicep CLI will be running on. Set this to skip automatic platform detection if it does not work properly.

            Accepted values: linux-arm64, linux-musl-x64, linux-x64, osx-arm64, osx-x64, win-arm64, win-x64
examples:
    Upgrade Bicep CLI and specify the target platform.: az bicep upgrade --target-platform linux-x64
    Upgrade Bicep CLI.: az bicep upgrade
