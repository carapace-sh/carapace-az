# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add admin details for a specified certificate issuer.
flags:
    --email=!: Admin e-mail address.
    --first-name=: Admin first name.
    --issuer-name=!: Certificate issuer name.
    --last-name=: Admin last name.
    --phone=: Admin phone number.
    --subscription=: Name or ID of subscription.
    --vault-name=!: Name of the Vault.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        email: Admin e-mail address. Must be unique within the vault.
        first-name: Admin first name.
        issuer-name: Certificate issuer name.
        last-name: Admin last name.
        phone: Admin phone number.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Vault.
examples:
    Add a new certificate issuer administrator to a Key Vault by specifying the vault, issuer name, and admin email. (autogenerated): az keyvault certificate issuer admin add --vault-name cli-mock-kv-ct-is --issuer-name issuer1 --email mock2@mock.com
