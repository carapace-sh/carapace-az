# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes an Azure Cosmos DB database
documentation:
    flag:
        key: Cosmos DB account key. Must be used in conjunction with cosmosdb account name or url-connection.
        name: Cosmos DB account name. Must be used in conjunction with either name of the resource group or cosmosdb account key.
        resource-group-name: name of the resource group. Must be used in conjunction with cosmosdb account name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        url-connection: Cosmos DB account url connection. Must be used in conjunction with cosmosdb account key.
flags:
    --key=: Cosmos DB account key.
    --subscription=: Name or ID of subscription.
    --url-connection=: Cosmos DB account url connection.
    -d, --db-name=!: Database Name
    -g, --resource-group-name=: name of the resource group.
    -n, --name=: Cosmos DB account name.
    -y, --yes=: Do not prompt for confirmation.
