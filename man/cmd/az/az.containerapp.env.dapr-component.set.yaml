# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Create or update a Dapr component.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        yaml: Path to a .yaml file with the configuration of a Dapr component. All other parameters will be ignored. For an example, see https://learn.microsoft.com/en-us/azure/container-apps/dapr-overview?tabs=bicep1%2Cyaml#component-schema
flags:
    --dapr-component-name=!: The Dapr component name.
    --subscription=: Name or ID of subscription.
    --yaml=!: Path to a .yaml file with the configuration of a Dapr component.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The environment name.
