# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Returns the properties for the specified storage account including but not limited to name, SKU name, location, and account status.
flags:
    --expand=: May be used to expand the properties within account's properties.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The storage account name.
documentation:
    command: Show storage account properties.
    flag:
        expand: 'May be used to expand the properties within account''s properties. By default, data is not included when fetching properties. Currently we only support geoReplicationStats and blobRestoreStatus. Known values are: "geoReplicationStats" and "blobRestoreStatus". Default value is None.'
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The storage account name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show properties for a storage account by resource ID.: az storage account show --ids /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Storage/storageAccounts/{StorageAccount}
    Show properties for a storage account using an account name and resource group.: az storage account show -g MyResourceGroup -n MyStorageAccount
