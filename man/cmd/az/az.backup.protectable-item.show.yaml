# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Retrieve the specified protectable item within the given container.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --protectable-item-type=!: Specify the type of items within the Resource which should be discovered and protected by Azure Backup.
    --server-name=!: Parent Server name of the item.
    --subscription=: Name or ID of subscription.
    --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the protectable item.
    -v, --vault-name=: Name of the Recovery services vault.
completion:
    flag:
        protectable-item-type:
            - SQLAG
            - SQLInstance
            - SQLDatabase
            - HANAInstance
            - SAPHanaDatabase
            - SAPHanaSystem
        workload-type:
            - MSSQL
            - SAPHANA
            - SAPASE
            - SAPHanaDatabase
            - SQLDataBase
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the protectable item.
        protectable-item-type: |-
            Specify the type of items within the Resource which should be discovered and protected by Azure Backup. 'HANAInstance' and 'SAPHanaSystem' can be used interchangeably.

            Accepted values: HANAInstance, SAPAseDatabase, SAPHanaDBInstance, SAPHanaDatabase, SAPHanaSystem, SQLAG, SQLDatabase, SQLInstance
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Parent Server name of the item.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Recovery services vault.
        workload-type: |-
            Specify the type of applications within the Resource which should be discovered and protected by Azure Backup. 'MSSQL' and 'SQLDataBase' can be used interchangeably for SQL in Azure VM, as can 'SAPHANA' and 'SAPHanaDatabase' for SAP HANA in Azure VM.

            Accepted values: MSSQL, SAPASE, SAPAseDatabase, SAPHANA, SAPHanaDBInstance, SAPHanaDatabase, SQLDataBase
examples:
    Retrieve the specified protectable item within the given container.: az backup protectable-item show --resource-group MyResourceGroup --vault-name MyVault --workload-type MSSQL --protectable-item-type SQLAG --name Name  --server-name MyServerName
