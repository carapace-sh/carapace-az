# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Build a metric alert rule condition.
documentation:
    flag:
        num-periods: 'The number of evaluation periods for dynamic threshold. Range: 1-6.'
        num-violations: 'The number of violations to trigger an dynamic alert. Range: 1-6. It should be less than or equal to --num-periods.'
        operator: Operator for static threshold can be 'Equals', 'NotEquals', 'GreaterThan', 'GreaterThanOrEqual', 'LessThan' or 'LessThanOrEqual'. Operator for dynamic threshold can be 'GreaterThan', 'LessThan', 'GreaterOrLessThan'.
        since: 'The date from which to start learning the metric historical data and calculate the dynamic thresholds. Format: date (yyyy-mm-dd) time (hh:mm:ss.xxxxx) timezone (+/-hh:mm)'
        skip-metric-validation: Cause the metric validation to be skipped. This allows to use a metric that has not been emitted yet.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --aggregation=!: Time aggregation.
    --dimension=:
        description: Dimension created by 'az monitor metrics alert dimension create'.
        nargs: -1
    --metric=!: Name of metric.
    --namespace=: Namespace of metric.
    --num-periods=: The number of evaluation periods for dynamic threshold.
    --num-violations=: The number of violations to trigger an dynamic alert.
    --operator=!: Operator for static threshold can be 'Equals', 'NotEquals', 'GreaterThan', 'GreaterThanOrEqual', 'LessThan' or 'LessThanOrEqual'.
    --sensitivity=: Alert sensitivity for dynamic threshold.
    --since=:
        description: The date from which to start learning the metric historical data and calculate the dynamic thresholds.
        nargs: -1
    --skip-metric-validation=:
        description: Cause the metric validation to be skipped.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --threshold=: Static threshold value.
    -t, --type=!: Type of condition threshold.
completion:
    flag:
        aggregation:
            - Average
            - Minimum
            - Maximum
            - Total
            - Count
        operator:
            - Equals
            - NotEquals
            - GreaterThan
            - GreaterThanOrEqual
            - LessThan
            - LessThanOrEqual
            - GreaterOrLessThan
        sensitivity:
            - Low
            - Medium
            - High
        skip-metric-validation:
            - "true"
            - "false"
        type:
            - static
            - dynamic
