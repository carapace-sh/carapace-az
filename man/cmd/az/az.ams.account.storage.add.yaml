# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Attach a secondary storage to an Azure Media Services account.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --system-assigned=:
        description: Set the system managed identity on the storage account.
        nargs: -1
    --user-assigned=: Set the user managed identity on the storage account.
    -a, --account-name=: The name of the Azure Media Services account.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name or resource ID of the secondary storage account to detach from the Azure Media Services account.
completion:
    flag:
        system-assigned:
            - "true"
            - "false"
documentation:
    flag:
        account-name: The name of the Azure Media Services account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name or resource ID of the secondary storage account to detach from the Azure Media Services account.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-assigned: |-
            Set the system managed identity on the storage account.

            Default value: False

            Accepted values: false, true
        user-assigned: Set the user managed identity on the storage account.
examples:
    Attach a secondary storage to an Azure Media Services account.: az ams account storage add -a myAMS -g rg -n myStorage
