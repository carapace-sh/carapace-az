# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: publish
description: Publish a bicep file to a remote module registry.
flags:
    --documentationUri=: The documentation uri of the Bicep module.
    --force=: Allow overwriting an existing Bicep module version.
    --subscription=: Name or ID of subscription.
    --with-source=: Publish source code with the module.
    -d, --documentation-uri=: The documentation uri of the Bicep module.
    -f, --file=!: The path to the Bicep module file to publish in the file system.
    -t, --target=!: The target location where the Bicep module will be published.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        documentation-uri: The documentation uri of the Bicep module.
        documentationUri: Option '--documentationuri' has been deprecated and will be removed in a future release. Use '--documentation-uri' instead. The documentation uri of the Bicep module.
        file: The path to the Bicep module file to publish in the file system.
        force: Allow overwriting an existing Bicep module version.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target: The target location where the Bicep module will be published.
        with-source: Publish source code with the module.
examples:
    Publish a bicep file overwriting an existing tag.: az bicep publish --file {bicep_file} --target "br:{registry}/{module_path}:{tag} --force"
    Publish a bicep file with documentation uri and include source code: az bicep publish --file {bicep_file} --target "br:{registry}/{module_path}:{tag}" --documentation-uri {documentation_uri} --with-source
    Publish a bicep file with documentation uri.: az bicep publish --file {bicep_file} --target "br:{registry}/{module_path}:{tag}" --documentation-uri {documentation_uri}
    Publish a bicep file.: az bicep publish --file {bicep_file} --target "br:{registry}/{module_path}:{tag}"
