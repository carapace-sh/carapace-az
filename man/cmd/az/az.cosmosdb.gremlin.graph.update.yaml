# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates an Azure Cosmos DB Gremlin graph
flags:
    --analytical-storage-ttl=: Analytical TTL, when analytical storage is enabled.
    --idx=: 'Indexing Policy, you can enter it as a string or as a file, e.g., --idx @policy-file.json or --idx "{\"indexingMode\": \"consistent\", \"automatic\": true, \"includedPaths\": [{\"path\": \"/*\"}], \"excludedPaths\": [{ \"path\": \"/headquarters/employees/?\"}, { \"path\": \"/\\"_etag\\"/?\"}]}"'
    --subscription=: Name or ID of subscription.
    --ttl=: Default TTL.
    -a, --account-name=!: Cosmosdb account name.
    -d, --database-name=!: Database name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Graph name
documentation:
    command: Update an Gremlin graph under an Azure Cosmos DB Gremlin database.
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        analytical-storage-ttl: Analytical TTL, when analytical storage is enabled.
        change-reference: The related change reference ID for this resource operation.
        database-name: Database name.
        idx: |
            Indexing Policy, you can enter it as a string or as a file, e.g., --idx @policy-file.json or --idx "{\"indexingMode\": \"consistent\", \"automatic\": true, \"includedPaths\": [{\"path\": \"/*\"}], \"excludedPaths\": [{ \"path\": \"/headquarters/employees/?\"}, { \"path\": \"/\\"_etag\\"/?\"}]}"
        name: Graph name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        ttl: Default TTL. If the value is missing or set to "-1", items don’t expire. If the value is set to "n", items will expire "n" seconds after last modified time.
