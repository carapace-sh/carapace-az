# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new Azure Front Door Standard or Azure Front Door Premium or CDN profile with a profile name under the specified subscription and resource group.
flags:
    --identity=:
        description: Managed service identity (system assigned and/or user assigned identities).
        nargs: -1
    --log-scrubbing=:
        description: Defines rules that scrub sensitive fields in the Azure Front Door profile logs.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --origin-response-timeout-seconds=: Send and receive timeout on forwarding request to the origin.
    --sku=: Name of the pricing tier.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the Azure Front Door Standard or Azure Front Door Premium or CDN profile which is unique within the resource group.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        sku:
            - Custom_Verizon
            - Premium_AzureFrontDoor
            - Premium_Verizon
            - StandardPlus_955BandWidth_ChinaCdn
            - StandardPlus_AvgBandWidth_ChinaCdn
            - StandardPlus_ChinaCdn
            - Standard_955BandWidth_ChinaCdn
            - Standard_Akamai
            - Standard_AvgBandWidth_ChinaCdn
            - Standard_AzureFrontDoor
            - Standard_ChinaCdn
            - Standard_Microsoft
            - Standard_Verizon
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        identity: Managed service identity (system assigned and/or user assigned identities).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        log-scrubbing: Defines rules that scrub sensitive fields in the Azure Front Door profile logs.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        origin-response-timeout-seconds: Send and receive timeout on forwarding request to the origin. When timeout is reached, the request fails and returns.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: |-
            Name of the pricing tier.

            Accepted values: Custom_Verizon, Premium_AzureFrontDoor, Premium_Verizon, StandardPlus_955BandWidth_ChinaCdn, StandardPlus_AvgBandWidth_ChinaCdn, StandardPlus_ChinaCdn, Standard_955BandWidth_ChinaCdn, Standard_Akamai, Standard_AvgBandWidth_ChinaCdn, Standard_AzureFrontDoor, Standard_ChinaCdn, Standard_Microsoft, Standard_Verizon
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Create an AFD profile using Standard SKU.: az afd profile create -g group --profile-name profile --sku Standard_AzureFrontDoor
