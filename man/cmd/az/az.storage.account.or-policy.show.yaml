# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the object replication policy of the storage account by policy ID.
flags:
    --policy-id=!: The ID of object replication policy or "default" if the policy ID is unknown.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
documentation:
    command: Show the properties of specified Object Replication Service Policy for storage account.
    flag:
        account-name: The storage account name.
        policy-id: The ID of object replication policy or "default" if the policy ID is unknown. Policy Id will be auto-generated when setting on destination account. Required when setting on source account.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the properties of specified Object Replication Service Policy for storage account.: az storage account or-policy show -g ResourceGroupName -n StorageAccountName --policy-id "04344ea7-aa3c-4846-bfb9-e908e32d3bf8"
