# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Return a list of gremlin database and graphs combo that exist on the account at the given timestamp and location.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --subscription=: Name or ID of subscription.
    -i, --instance-id=!: InstanceId of the Account
    -l, --location=!: Azure Location of the account
    -r, --restore-location=!: The region of the restore.
    -t, --restore-timestamp=!: The timestamp of the restore
