# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update app service environment.
flags:
    --front-end-scale-factor=: (ASEv2 only) Scale of front ends to app service plan instance ratio between 5 and 15.
    --front-end-sku=: (ASEv2 only) Size of front end servers.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -f, --allow-incoming-ftp-connections=:
        description: (ASEv3 only) Configure App Service Environment to allow FTP access.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name of the app service environment
    -p, --allow-new-private-endpoint-connections=:
        description: (ASEv3 only) Configure Apps in App Service Environment to allow new private endpoint connections.
        nargs: -1
    -r, --allow-remote-debugging=:
        description: (ASEv3 only) Configure App Service Environment to allow remote debugging.
        nargs: -1
completion:
    flag:
        allow-incoming-ftp-connections:
            - "true"
            - "false"
        allow-new-private-endpoint-connections:
            - "true"
            - "false"
        allow-remote-debugging:
            - "true"
            - "false"
        front-end-sku:
            - I1
            - I2
            - I3
documentation:
    command: Update App Service Environment.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allow-incoming-ftp-connections: |-
            (ASEv3 only) Configure App Service Environment to allow FTP access. This ftpEnabled setting allows you to allow or deny FTP connections on the App Service Environment level. Individual apps will still need to configure FTP access.

            Accepted values: false, true
        allow-new-private-endpoint-connections: |-
            (ASEv3 only) Configure Apps in App Service Environment to allow new private endpoint connections.

            Accepted values: false, true
        allow-remote-debugging: |-
            (ASEv3 only) Configure App Service Environment to allow remote debugging. You will still have to configure remote debugging at the individual app level.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        name: Name of the app service environment.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update App Service Environment to allow incoming ftp connections.: az appservice ase update -n MyAseName -g MyResourceGroup --allow-incoming-ftp-connections
    Update App Service Environment to allow new private endpoint connections.: az appservice ase update -n MyAseName -g MyResourceGroup --allow-new-private-endpoint-connections
    Update App Service Environment to allow remote debugging.: az appservice ase update -n MyAseName -g MyResourceGroup --allow-remote-debugging
