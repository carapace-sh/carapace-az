# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List resources.
flags:
    --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
    --resource-type=: 'The resource type (Ex: ''resC'').'
    --subscription=: Name or ID of subscription.
    --tag=:
        description: a single tag in 'key[=value]' format.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
    -n, --name=: The resource name.
documentation:
    flag:
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: 'The resource name. (Ex: myC).'
        namespace: 'Provider namespace (Ex: ''Microsoft.Provider'').'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'The resource type (Ex: ''resC''). Can also accept namespace/type format (Ex: ''Microsoft.Provider/resC'').'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tag: a single tag in 'key[=value]' format. Use '' to clear existing tags.
examples:
    List all resources in the West US region.: az resource list --location westus
    List all resources with a tag that starts with 'test'.: az resource list --tag 'test*'
    List all resources with the name 'resourceName'.: az resource list --name 'resourceName'
    List all resources with the tag 'test' that have the value 'example'.: az resource list --tag test=example
    List all resources with the tag 'test'.: az resource list --tag test
