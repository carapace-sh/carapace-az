# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a deployment for Azure Cognitive Services account.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --capacity=: Capacity value of the Sku of Cognitive Services account/deployment.
    --deployment-name=: Cognitive Services account deployment name
    --model-format=!: Cognitive Services account deployment model format.
    --model-name=!: Cognitive Services account deployment model name.
    --model-source=: Cognitive Services account deployment model source.
    --model-version=!: Cognitive Services account deployment model version.
    --scale-capacity=: Cognitive Services account deployment scale settings capacity.
    --scale-type=: Cognitive Services account deployment scale settings scale type.
    --sku=: Name of the Sku of Cognitive Services account/deployment
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: cognitive service account name
completion:
    flag:
        scale-type:
            - Standard
            - Manual
