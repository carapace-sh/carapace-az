# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a deployment for Azure Cognitive Services account.
flags:
    --capacity=: Capacity value of the Sku of Cognitive Services account/deployment.
    --deployment-name=: Cognitive Services account deployment name
    --model-format=!: Cognitive Services account deployment model format.
    --model-name=!: Cognitive Services account deployment model name.
    --model-source=: Cognitive Services account deployment model source.
    --model-version=!: Cognitive Services account deployment model version.
    --scale-capacity=: Cognitive Services account deployment scale settings capacity.
    --scale-type=: Cognitive Services account deployment scale settings scale type.
    --sku=: Name of the Sku of Cognitive Services account/deployment
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: cognitive service account name
completion:
    flag:
        scale-type:
            - Standard
            - Manual
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        deployment-name: Cognitive Services account deployment name.
        model-format: Cognitive Services account deployment model format.
        model-name: Cognitive Services account deployment model name.
        model-source: |-
            Cognitive Services account deployment model source.

            Accepted values: Manual, Standard
        model-version: Cognitive Services account deployment model version.
        name: Cognitive service account name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a deployment for Azure Cognitive Services account.: az cognitiveservices account deployment create -g yuanyang-test-sdk -n yytest-oai --deployment-name dpy --model-name ada --model-version "1" --model-format OpenAI --sku-capacity 1 --sku-name "Standard"
