# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete the hierarchy settings defined at the Management Group level.
flags:
    -n, --name=!: ""
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the management group.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete all hierarchy settings defined at the Management Group level.: az account management-group hierarchy-settings delete --name GroupName
