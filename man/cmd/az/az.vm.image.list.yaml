# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the VM/VMSS images available in the Azure Marketplace.
documentation:
    flag:
        architecture: 'The name of architecture. '
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --all=: Retrieve image list from live Azure service rather using an offline image list
    --architecture=: The name of architecture.
    --edge-zone=: The name of edge zone.
    --subscription=: Name or ID of subscription.
    -f, --offer=: image offer
    -l, --location=: Location.
    -p, --publisher=: image publisher
    -s, --sku=: image sku
completion:
    flag:
        architecture:
            - x64
            - Arm64
