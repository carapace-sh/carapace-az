# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the VM/VMSS images available in the Azure Marketplace.
flags:
    --all=: Retrieve image list from live Azure service rather using an offline image list
    --architecture=: The name of architecture.
    --edge-zone=: The name of edge zone.
    --subscription=: Name or ID of subscription.
    -f, --offer=: image offer
    -l, --location=: Location.
    -p, --publisher=: image publisher
    -s, --sku=: image sku
completion:
    flag:
        architecture:
            - x64
            - Arm64
documentation:
    flag:
        all: |-
            Retrieve image list from live Azure service rather using an offline image list.

            Default value: False
        architecture: |-
            The name of architecture.

            Accepted values: Arm64, x64
        edge-zone: The name of edge zone.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        offer: Image offer name, partial name is accepted.
        publisher: Image publisher name, partial name is accepted.
        sku: Image sku name, partial name is accepted.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all CentOS images.: az vm image list -f CentOS --all
    List all available images.: az vm image list --all
    List all offline cached CentOS images.: az vm image list -f CentOS
