# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: acquire
description: Request a new lease.
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --auth-mode=: The mode in which to run the command.
    --blob-endpoint=: Storage data service endpoint.
    --connection-string=: Storage account connection string.
    --if-match=: An ETag value, or the wildcard character (*).
    --if-modified-since=: Commence only if modified since supplied UTC datetime (Y-m-d'T'H:M'Z')
    --if-none-match=: An ETag value, or the wildcard character (*).
    --if-unmodified-since=: Commence only if unmodified since supplied UTC datetime (Y-m-d'T'H:M'Z')
    --lease-duration=: Specify the duration of the lease, in seconds, or negative one (-1) for a lease that never expires.
    --proposed-lease-id=: Proposed lease ID, in a GUID string format.
    --sas-token=: A Shared Access Signature (SAS).
    --subscription=: Name or ID of subscription.
    --tags-condition=: Specify a SQL where clause on blob tags to operate only on blobs with a matching value.
    --timeout=: Request timeout in seconds.
    -b, --blob-name=!: The blob name.
    -c, --container-name=!: The container name.
completion:
    flag:
        auth-mode:
            - login
            - key
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY.'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auth-mode: |-
            The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE.

            Accepted values: key, login
        blob-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with ``` az storage account show ``` . Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT.'
        blob-name: The blob name.
        change-reference: The related change reference ID for this resource operation.
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING.'
        container-name: The container name.
        if-match: An ETag value, or the wildcard character (*). Specify this header to perform the operation only if the resource's ETag matches the value specified.
        if-modified-since: Commence only if modified since supplied UTC datetime (Y-m-d'T'H:M'Z').
        if-none-match: An ETag value, or the wildcard character (*). Specify this header to perform the operation only if the resource's ETag does not match the value specified. Specify the wildcard character (*) to perform the operation only if the resource does not exist, and fail the operation if it does exist.
        if-unmodified-since: Commence only if unmodified since supplied UTC datetime (Y-m-d'T'H:M'Z').
        lease-duration: |-
            Specify the duration of the lease, in seconds, or negative one (-1) for a lease that never expires. A non-infinite lease can be between 15 and 60 seconds. A lease duration cannot be changed using renew or change. Default is -1 (infinite lease).

            Default value: -1
        proposed-lease-id: Proposed lease ID, in a GUID string format. The Blob service returns 400 (Invalid request) if the proposed lease ID is not in the correct format.
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_SAS_TOKEN.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags-condition: Specify a SQL where clause on blob tags to operate only on blobs with a matching value.
        timeout: Request timeout in seconds. Applies to each call to the service.
examples:
    Request a new lease.: az storage blob lease acquire -b myblob -c mycontainer --account-name mystorageaccount --account-key 0000-0000
