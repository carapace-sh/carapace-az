# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a proximity placement group.
flags:
    --intent-vm-sizes=:
        description: Specifies possible sizes of virtual machines that can be created in the proximity placement group.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Resource location  When not specified, the location of the resource group will be used.
    -n, --name=!: The name of the proximity placement group.
    -t, --type=: The type of the proximity placement group.
    -z, --zone=:
        description: Specifies the Availability Zone where virtual machine, virtual machine scale set or availability set associated with the  proximity placement group can be created.
        nargs: -1
completion:
    flag:
        type:
            - Standard
            - Ultra
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        intent-vm-sizes: Specifies possible sizes of virtual machines that can be created in the proximity placement group.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        location: |-
            Resource location  When not specified, the location of the resource group will be used.

            Accepted values: Standard, Ultra
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        type: 'The type of the proximity placement group. Allowed values: Standard.'
        zone: Specifies the Availability Zone where virtual machine, virtual machine scale set or availability set associated with the  proximity placement group can be created.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Create a proximity placement group with specifying VM sizes that can be created and availability zone.: az ppg create --name MyProximityPlacementGroup --resource-group MyResourceGroup --intent-vm-sizes Standard_E64s_v4 Standard_M416ms_v2 --zone 1
    Create a proximity placement group with specifying VM sizes that can be created.: az ppg create --name MyProximityPlacementGroup --resource-group MyResourceGroup --intent-vm-sizes Standard_E64s_v4 Standard_M416ms_v2
    Create a proximity placement group.: az ppg create --name MyProximityPlacementGroup --resource-group MyResourceGroup
