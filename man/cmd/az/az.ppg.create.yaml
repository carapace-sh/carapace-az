# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a proximity placement group.
documentation:
    flag:
        intent-vm-sizes: Specifies possible sizes of virtual machines that can be created in the proximity placement group.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        type: 'The type of the proximity placement group. Allowed values: Standard.'
        zone: Specifies the Availability Zone where virtual machine, virtual machine scale set or availability set associated with the  proximity placement group can be created.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --intent-vm-sizes=:
        description: Specifies possible sizes of virtual machines that can be created in the proximity placement group.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Resource location  When not specified, the location of the resource group will be used.
    -n, --name=!: The name of the proximity placement group.
    -t, --type=: The type of the proximity placement group.
    -z, --zone=:
        description: Specifies the Availability Zone where virtual machine, virtual machine scale set or availability set associated with the  proximity placement group can be created.
        nargs: -1
completion:
    flag:
        type:
            - Standard
            - Ultra
