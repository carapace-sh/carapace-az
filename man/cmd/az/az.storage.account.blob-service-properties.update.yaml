# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the properties of a storage account's blob service.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --change-feed-retention-days=: Indicate the duration of changeFeed retention in days.
    --container-delete-retention-days=: Indicate the number of days that the deleted container should be retained.
    --delete-retention-days=: Indicate the number of days that the deleted blob should be retained.
    --enable-change-feed=:
        description: Indicate whether change feed event logging is enabled.
        nargs: -1
    --enable-container-delete-retention=:
        description: Enable container delete retention policy for container soft delete when set to true.
        nargs: -1
    --enable-delete-retention=:
        description: Indicate whether delete retention policy is enabled for the blob service.
        nargs: -1
    --enable-restore-policy=:
        description: Enable blob restore policy when it set to true.
        nargs: -1
    --enable-versioning=:
        description: Versioning is enabled if set to true.
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --restore-days=: The number of days for the blob can be restored.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -d, --default-service-version=: Indicate the default version to use for requests to the Blob service if an incoming request's version is not specified.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
    -t, --enable-last-access-tracking=:
        description: When set to true last access time based tracking policy is enabled.
        nargs: -1
completion:
    flag:
        enable-change-feed:
            - "true"
            - "false"
        enable-container-delete-retention:
            - "true"
            - "false"
        enable-delete-retention:
            - "true"
            - "false"
        enable-last-access-tracking:
            - "true"
            - "false"
        enable-restore-policy:
            - "true"
            - "false"
        enable-versioning:
            - "true"
            - "false"
documentation:
    flag:
        account-name: The storage account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        change-feed-days: '``` to indicate null).'
        change-feed-retention-days: Indicate the duration of changeFeed retention in days. Minimum value is 1 day and maximum value is 146000 days (400 years). A null value indicates an infinite retention of the change feed.(Use `--enable-change-feed` without `--change-feed-days` to indicate null)
        change-reference: |-
            The related change reference ID for this resource operation.

            Accepted values: false, true
        container-delete-retention-days: Indicate the number of days that the deleted container should be retained. The minimum specified value can be 1 and the maximum value can be 365.
        default-service-version: Indicate the default version to use for requests to the Blob service if an incoming request's version is not specified.
        delete-retention-days: Indicate the number of days that the deleted blob should be retained. The value must be in range [1,365]. It must be provided when `--enable-delete-retention` is true.
        enable-change-feed: |-
            Indicate whether change feed event logging is enabled. If it is true, you enable the storage account to begin capturing changes. The default value is true. You can see more details in https://learn.microsoft.com/azure/storage/blobs/storage-blob-change-feed?tabs=azure-portal#register-by-using-azure-cli .

            Accepted values: false, true
        enable-container-delete-retention: Enable container delete retention policy for container soft delete when set to true. Disable container delete retention policy when set to false.
        enable-delete-retention: |-
            Indicate whether delete retention policy is enabled for the blob service.

            Accepted values: false, true
        enable-last-access-tracking: |-
            When set to true last access time based tracking policy is enabled.

            Accepted values: false, true
        enable-restore-policy: |-
            Enable blob restore policy when it set to true.

            Accepted values: false, true
        enable-static-website: |-
            Indicates whether static website support is enabled for the specified account.

            Accepted values: false, true
        enable-versioning: |-
            Versioning is enabled if set to true.

            Accepted values: false, true
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        index-document: The webpage that Azure Storage serves for requests to the root of a website or any subfolder (for example, index.html).
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restore-days: The number of days for the blob can be restored. It should be greater than zero and less than Delete Retention Days.
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Disable change feed for the storage account 'mystorageaccount' in resource group 'myresourcegroup'.: az storage account blob-service-properties update --enable-change-feed false -n mystorageaccount -g myresourcegroup
    ? Enable change feed and set change feed retention days to 100 for the storage account 'mystorageaccount' in resource group 'myresourcegroup'.
    : az storage account blob-service-properties update --enable-change-feed --change-feed-days 100 -n mystorageaccount -g myresourcegroup
    ? Enable change feed and set change feed retention days to infinite for the storage account 'mystorageaccount' in resource group 'myresourcegroup'.
    : az storage account blob-service-properties update --enable-change-feed true -n mystorageaccount -g myresourcegroup
    ? Enable delete retention policy and set delete retention days to 100 for the storage account 'mystorageaccount' in resource group 'myresourcegroup'.
    : az storage account blob-service-properties update --enable-delete-retention true --delete-retention-days 100 -n mystorageaccount -g myresourcegroup
    Enable versioning for the storage account 'mystorageaccount' in resource group 'myresourcegroup'.: az storage account blob-service-properties update --enable-versioning -n mystorageaccount -g myresourcegroup
    Set default version for incoming request for storage account 'mystorageaccount'.: az storage account blob-service-properties update --default-service-version 2020-04-08 -n mystorageaccount -g myresourcegroup
