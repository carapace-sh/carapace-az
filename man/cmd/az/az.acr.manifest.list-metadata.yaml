# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-metadata
description: List the metadata of the manifests in a repository in an Azure Container Registry.
flags:
    --orderby=: Order the items in the results.
    --subscription=: Name or ID of subscription.
    --suffix=: The tenant suffix in registry login server.
    --top=: Limit the number of items in the results.
    -n, --name=: The name of the repository.
    -p, --password=: The password used to log into a container registry
    -r, --registry=: The name of the container registry.
    -u, --username=: The username used to log into a container registry
completion:
    flag:
        orderby:
            - time_asc
            - time_desc
documentation:
    command: |-
        Command group 'acr manifest' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The name of the repository.
        orderby: |-
            Order the items in the results. Default to alphabetical order of names.

            Accepted values: time_asc, time_desc
        password: The password used to log into a container registry.
        registry: The name of the container registry. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        suffix: The tenant suffix in registry login server. You may specify '--suffix tenant' if your registry login server is in the format 'registry-tenant.azurecr.io'. Applicable if you're accessing the registry from a different subscription or you have permission to access images but not the permission to manage the registry resource.
        top: Limit the number of items in the results.
        username: The username used to log into a container registry. <REPO_ID> A fully qualified repository specifier such as 'myregistry.azurecr.io/hello-world'.
examples:
    List the metadata of all manifests (tagged/untagged) in the repository 'hello-world'.: az acr manifest list-metadata -r myregistry -n hello-world --query "[]"
    List the metadata of the manifests in the repository 'hello-world'.: az acr manifest list-metadata myregistry.azurecr.io/hello-world
    List the metadata of untagged manifests in the repository 'hello-world'.: az acr manifest list-metadata -r myregistry -n hello-world --query "[?tags==null]"
