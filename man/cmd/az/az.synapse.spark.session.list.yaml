# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all Spark sessions.
flags:
    --from-index=: Optional parameter specifying which index the list should begin from.
    --size=: The size of the returned list.By default it is 20 and that is the maximum.
    --spark-pool-name=!: The name of the Spark pool.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The name of the workspace.
documentation:
    flag:
        from-index: Optional parameter specifying which index the list should begin from.
        size: The size of the returned list.By default it is 20 and that is the maximum.
        spark-pool-name: The name of the Spark pool.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The name of the workspace.
examples:
    List all Spark sessions.: az synapse spark session list --workspace-name testsynapseworkspace --spark-pool-name testsparkpool
