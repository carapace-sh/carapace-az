# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-recursive
description: Set the Access Control on a path and sub-paths in Azure Data Lake Storage Gen2 account.
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit'
        acl: The value is a comma-separated list of access control entries. Each access control entry (ACE) consists of a scope, a type, a user or group identifier, and permissions in the format "[scope:][type]:[id]:[permissions]".  For more information, please refer to https://learn.microsoft.com/azure/storage/blobs/data-lake-storage-access-control.
        auth-mode: 'The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE'
        batch-size: Optional. If data set size exceeds batch size then operation will be split into multiple requests so that progress can be tracked. Batch size should be between 1 and 2000. The default when unspecified is 2000.
        blob-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with `az storage account show`. Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT'
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING'
        continue-on-failure: If set to False, the operation will terminate quickly on encountering user errors (4XX). If True, the operation will ignore user errors and proceed with the operation on other sub-entities of the directory. Continuation token will only be returned when --continue-on-failure is True in case of user errors. If not set the default value is False for this.
        max-batches: Optional. Define maximum number of batches that single change Access Control operation can execute. If maximum is reached before all sub-paths are processed, then continuation token can be used to resume operation. Empty value indicates that maximum number of batches in unbound and operation continues till end.
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_SAS_TOKEN'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: Request timeout in seconds. Applies to each call to the service.
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --acl=!: The value is a comma-separated list of access control entries.
    --auth-mode=: The mode in which to run the command.
    --batch-size=: Optional.
    --blob-endpoint=: Storage data service endpoint.
    --connection-string=: Storage account connection string.
    --continuation=: Optional continuation token that can be used to resume previously stopped operation.
    --continue-on-failure=:
        description: If set to False, the operation will terminate quickly on encountering user errors (4XX).
        nargs: -1
    --max-batches=: Optional.
    --sas-token=: A Shared Access Signature (SAS).
    --subscription=: Name or ID of subscription.
    --timeout=: Request timeout in seconds.
    -f, --file-system=!: File system name (i.e. container name).
    -p, --path=!: The path to a file or directory in the specified file system.
completion:
    flag:
        auth-mode:
            - login
            - key
        continue-on-failure:
            - "true"
            - "false"
