# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a template spec and or template spec version.
flags:
    --description=: The description of the parent template spec.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --ui-form-definition=: The uiFormDefinition file path in the file system for the template spec version.
    --version-description=: The description of the template spec version.
    -d, --display-name=: The display name of the template spec
    -f, --template-file=: a path to a template file or Bicep file in the file system
    -g, --resource-group=!: Name of resource group.
    -l, --location=: The location to store the template-spec and template-spec version(s).
    -n, --name=!: The name of the template spec.
    -v, --version=: The template spec version.
    -y, --yes=: Do not prompt for confirmation
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: The description of the parent template spec.
        display-name: The display name of the template spec.
        location: The location to store the template-spec and template-spec version(s). Cannot be changed after creation.
        name: The name of the template spec.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        template-file: A path to a template file or Bicep file in the file system.
        ui-form-definition: The uiFormDefinition file path in the file system for the template spec version.
        version: The template spec version.
        version-description: The description of the template spec version.
        "yes": Do not prompt for confirmation.
examples:
    Create a template spec and a version of the template spec.: az ts create -g testRG --name TemplateSpecName -v 1.0 -l WestUS --template-file templateSpec.json --display-name "MyDisplayName" --description "Simple template spec" --version-description "Version of simple template spec" --tags key1=value1 key2=value2
    Create a template spec version.: az ts create -g testRG --name TemplateSpecName -v 2.0 -l WestUS --template-file templateSpec.json --version-description "Less simple template spec" --tags key1=value1 key3=value3
    Create a template spec.: az ts create -g testRG --name TemplateSpecName -l WestUS --display-name "MyDisplayName" --description "Simple template spec" --tags key1=value1
