# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new AzureFrontDoor endpoint with the specified endpoint name under the specified subscription, resource group and profile.
flags:
    --enabled-state=: Whether to enable use of this rule.
    --name-reuse-scope=: Indicates the endpoint name reuse scope.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the endpoint under the profile which is unique globally.
completion:
    flag:
        enabled-state:
            - Disabled
            - Enabled
        name-reuse-scope:
            - NoReuse
            - ResourceGroupReuse
            - SubscriptionReuse
            - TenantReuse
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        enabled-state: |-
            Whether to enable use of this rule. Permitted values are 'Enabled' or 'Disabled'.

            Accepted values: Disabled, Enabled
        name-reuse-scope: |-
            Indicates the endpoint name reuse scope. The default value is TenantReuse.

            Accepted values: NoReuse, ResourceGroupReuse, SubscriptionReuse, TenantReuse
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        profile-name: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Creates an enabled endpoint: az afd endpoint create -g group --endpoint-name endpoint1 --profile-name profile --enabled-state Enabled
