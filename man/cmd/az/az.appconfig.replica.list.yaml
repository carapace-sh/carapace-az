# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List replicas of an App Configuration store.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -s, --store-name=!: Name of the App Configuration store.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        store-name: Name of the App Configuration store. You can configure the default name using ``` az configure --defaults app_configuration_store=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List replicas of an App Configuration store.: az appconfig replica list --store-name MyAppConfiguration
