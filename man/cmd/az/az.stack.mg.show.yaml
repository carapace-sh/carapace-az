# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get specified deployment stack from management group scope
flags:
    --id=: The deployment stack resource id.
    --subscription=: Name or ID of subscription.
    -m, --management-group-id=!: The management group id to create stack at.
    -n, --name=: The deployment stack name
documentation:
    command: Get specified deployment stack from management group scope.
    flag:
        id: The deployment stack resource id.
        management-group-id: The management group id to create stack at.
        name: The deployment stack name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get stack by name.: az stack mg show --name StackName --management-group-id myMg
    Get stack by stack resource id.: az stack mg show --id /providers/Microsoft.Management/managementGroups/myMg/providers/Microsoft.Resources/deploymentStacks/StackName --management-group-id myMg
