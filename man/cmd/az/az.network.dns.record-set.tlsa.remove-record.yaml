# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove-record
description: Remove a TLSA record from its record set.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --certificate-data=!: This specifies the certificate association data to be matched.
    --certificate-usage=!: The usage specifies the provided association that will be used to match the certificate presented in the TLS handshake.
    --keep-empty-record-set=: Keep the empty record set if the last record is removed.
    --matching-type=!: The matching type specifies how the certificate association is presented.
    --selector=!: The selector specifies which part of the TLS certificate presented by the server will be matched against the association data.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -z, --zone-name=!: The name of the zone.
