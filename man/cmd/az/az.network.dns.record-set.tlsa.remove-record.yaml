# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove-record
description: Remove a TLSA record from its record set.
flags:
    --certificate-data=!: This specifies the certificate association data to be matched.
    --certificate-usage=!: The usage specifies the provided association that will be used to match the certificate presented in the TLS handshake.
    --keep-empty-record-set=: Keep the empty record set if the last record is removed.
    --matching-type=!: The matching type specifies how the certificate association is presented.
    --selector=!: The selector specifies which part of the TLS certificate presented by the server will be matched against the association data.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -z, --zone-name=!: The name of the zone.
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        certificate-data: This specifies the certificate association data to be matched.
        certificate-usage: The usage specifies the provided association that will be used to match the certificate presented in the TLS handshake.
        change-reference: The related change reference ID for this resource operation.
        keep-empty-record-set: |-
            Keep the empty record set if the last record is removed.

            Default value: False
        matching-type: The matching type specifies how the certificate association is presented.
        record-set-name: The name of the record set relative to the zone.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        selector: The selector specifies which part of the TLS certificate presented by the server will be matched against the association data.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        zone-name: The name of the zone.
examples:
    Remove an TLSA record from its record set.: |-
        az network dns record-set tlsa remove-record -g MyResourceGroup -z www.mysite.com \
            -n MyRecordSet --certificate-usage 3 --selector 1 --matching-type 1 \
            --certificate-data 0C72AC70B745AC19998811B131D662C9AC69DBDBE7CB23E5B514B56664C5D3D6
