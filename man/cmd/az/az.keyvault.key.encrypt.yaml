# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: encrypt
description: Encrypt an arbitrary sequence of bytes using an encryption key that is stored in a Vault or HSM.
flags:
    --aad=: Optional data that is authenticated but not encrypted.
    --data-type=: The type of the original data.
    --hsm-name=: Name of the HSM.
    --id=: Id of the key.
    --iv=: Initialization vector.
    --subscription=: Name or ID of subscription.
    --value=!: The value to be encrypted.
    --vault-name=: Name of the Vault.
    -a, --algorithm=!: Algorithm identifier
    -n, --name=: Name of the key.
    -v, --version=: The key version.
completion:
    flag:
        algorithm:
            - RSA-OAEP
            - RSA-OAEP-256
            - RSA1_5
            - A128GCM
            - A192GCM
            - A256GCM
            - A128CBC
            - A192CBC
            - A256CBC
            - A128CBCPAD
            - A192CBCPAD
            - A256CBCPAD
        data-type:
            - base64
            - plaintext
documentation:
    command: |-
        This command is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        aad: Optional data that is authenticated but not encrypted. For use with AES-GCM encryption.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        algorithm: |-
            Algorithm identifier.

            Accepted values: A128CBC, A128CBCPAD, A128GCM, A192CBC, A192CBCPAD, A192GCM, A256CBC, A256CBCPAD, A256GCM, RSA-OAEP, RSA-OAEP-256, RSA1_5
        change-reference: The related change reference ID for this resource operation.
        data-type: |-
            The type of the original data.

            Default value: base64

            Accepted values: base64, plaintext
        hsm-name: Name of the HSM. (--hsm-name and --vault-name are mutually exclusive, please specify just one of them).
        id: Id of the key. If specified all other 'Id' arguments should be omitted.
        iv: Initialization vector. Required for only AES-CBC(PAD) encryption.
        name: Name of the key. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        value: The value to be encrypted. Default data type is Base64 encoded string.
        vault-name: Name of the Vault.
        version: The key version. If omitted, uses the latest version.
examples:
    Encrypt value(Base64 encoded string) with vault's key using RSA-OAEP.: az keyvault key encrypt --name mykey --vault-name myvault --algorithm RSA-OAEP --value "YWJjZGVm" --data-type base64
    Encrypt value(plaintext) with MHSM's key using AES-GCM.: az keyvault key encrypt --name mykey --hsm-name myhsm --algorithm A256GCM --value "this is plaintext" --data-type plaintext --aad "101112131415161718191a1b1c1d1e1f"
