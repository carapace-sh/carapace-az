# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: encrypt
description: Encrypt an arbitrary sequence of bytes using an encryption key that is stored in a Vault or HSM.
documentation:
    flag:
        aad: Optional data that is authenticated but not encrypted. For use with AES-GCM encryption.
        hsm-name: Name of the HSM. (--hsm-name and --vault-name are mutually exclusive, please specify just one of them)
        id: Id of the key. If specified all other 'Id' arguments should be omitted.
        iv: Initialization vector. Required for only AES-CBC(PAD) encryption.
        name: Name of the key. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        value: The value to be encrypted. Default data type is Base64 encoded string.
        version: The key version. If omitted, uses the latest version.
flags:
    --aad=: Optional data that is authenticated but not encrypted.
    --data-type=: The type of the original data.
    --hsm-name=: Name of the HSM.
    --id=: Id of the key.
    --iv=: Initialization vector.
    --subscription=: Name or ID of subscription.
    --value=!: The value to be encrypted.
    --vault-name=: Name of the Vault.
    -a, --algorithm=!: Algorithm identifier
    -n, --name=: Name of the key.
    -v, --version=: The key version.
completion:
    flag:
        algorithm:
            - RSA-OAEP
            - RSA-OAEP-256
            - RSA1_5
            - A128GCM
            - A192GCM
            - A256GCM
            - A128CBC
            - A192CBC
            - A256CBC
            - A128CBCPAD
            - A192CBCPAD
            - A256CBCPAD
        data-type:
            - base64
            - plaintext
