# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-terms
description: Show the legal terms for purchasing and creating a custom domain.
flags:
    --subscription=: Name or ID of subscription.
    -n, --hostname=!: Name of the custom domain
documentation:
    command: |-
        Command group 'appservice domain' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        hostname: Name of the custom domain.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the legal terms for purchasing and creating MyCustomDomain.com: az appservice domain show-terms --hostname MyCustomDomain.com
