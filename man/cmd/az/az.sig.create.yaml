# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a shared image gallery.
flags:
    --description=: The description of the gallery.
    --eula=: Community gallery publisher eula
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --permissions=: This property allows you to specify the permission of sharing gallery.
    --public-name-prefix=: Community gallery public name prefix
    --publisher-email=: Community gallery publisher contact email
    --publisher-uri=: Community gallery publisher uri
    --soft-delete=:
        description: Enable soft-deletion for resources in this gallery, allowing them to be recovered within retention time.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Resource location  When not specified, the location of the resource group will be used.
    -r, --gallery-name=!: The name of the Shared Image Gallery to be deleted.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        permissions:
            - Community
            - Groups
            - Private
        soft-delete:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: The description of the gallery.
        eula: Community gallery license agreement and privacy statement.
        gallery-name: The name of the Shared Image Gallery.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        permissions: |-
            Experimental This property allows you to specify the permission of sharing gallery.

            Accepted values: Community, Groups, Private
        public-name-prefix: Community gallery public name prefix.
        publisher-email: Community gallery publisher contact email.
        publisher-uri: Community gallery publisher uri.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        soft-delete: |-
            Enable soft-deletion for resources in this gallery, allowing them to be recovered within retention time.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
examples:
    Create a Shared Image Gallery.: az sig create --resource-group MyResourceGroup --gallery-name MyGallery
    Create a shared image gallery: az sig create --resource-group MyResourceGroup --gallery-name MyGallery
    Create a shared image gallery with a user assigned identity.: az sig create --resource-group MyResourceGroup --gallery-name MyGallery123 --user-assigned id1
    Create a shared image gallery with both system and user assigned identity.: az sig create --resource-group MyResourceGroup --gallery-name MyGallery123 --system-assigned --user-assigned id1
    Create a shared image gallery with enabled system assigned identity.: az sig create --resource-group MyResourceGroup --gallery-name MyGallery123 --system-assigned
