# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List encryption scopes within storage account.
documentation:
    flag:
        marker: A string value that identifies the portion of the list of containers to be returned with the next listing operation. The operation returns the NextMarker value within the response body if the listing operation did not return all containers remaining to be listed with the current page. If specified, this generator will begin returning results from the point where the previous generator stopped.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-name=!: The storage account name.
    --filter=: When specified, only encryption scope names starting with the filter will be listed
    --include=: when specified, will list encryption scopes with the specific state
    --marker=: A string value that identifies the portion of the list of containers to be returned with the next listing operation.
    --maxpagesize=: the maximum number of encryption scopes that will be included in the list response
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        include:
            - All
            - Enabled
            - Disabled
