# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a webhook for an Azure Container Registry.
flags:
    --actions=!:
        description: Space-separated list of actions that trigger the webhook to post notifications.
        nargs: -1
    --headers=:
        description: Space-separated custom headers in 'key[=value]' format that will be added to the webhook notifications.
        nargs: -1
    --scope=: The scope of repositories where the event can be triggered.
    --status=: Indicates whether the webhook is enabled.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --uri=!: The service URI for the webhook to post notifications.
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of the webhook
    -r, --registry=!: The name of the container registry.
completion:
    flag:
        actions:
            - push
            - delete
            - quarantine
            - chart_push
            - chart_delete
        status:
            - enabled
            - disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        actions: |-
            Space-separated list of actions that trigger the webhook to post notifications.

            Accepted values: chart_delete, chart_push, delete, push, quarantine
        change-reference: The related change reference ID for this resource operation.
        headers: Space-separated custom headers in 'key[=value]' format that will be added to the webhook notifications. Use '' to clear existing headers.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: The name of the webhook.
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scope: The scope of repositories where the event can be triggered. For example, 'foo:*' means events for all tags under repository 'foo'. 'foo:bar' means events for 'foo:bar' only. 'foo' is equivalent to 'foo:latest'. Empty means events for all repositories.
        status: |-
            Indicates whether the webhook is enabled.

            Default value: enabled

            Accepted values: disabled, enabled
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        uri: The service URI for the webhook to post notifications.
examples:
    Create a webhook for an Azure Container Registry that will deliver docker push and delete events to a service URI.: az acr webhook create -n mywebhook -r myregistry --uri http://myservice.com --actions push delete
    ? Create a webhook for an Azure Container Registry that will deliver docker push events to a service URI with a basic authentication header.
    : az acr webhook create -n mywebhook -r myregistry --uri http://myservice.com --actions push --headers "Authorization=Basic 000000"
    Create a webhook for an Azure Container Registry that will deliver helm chart push and delete events to a service URI.: az acr webhook create -n mywebhook -r myregistry --uri http://myservice.com --actions chart_push chart_delete
