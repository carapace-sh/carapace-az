# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a webhook for an Azure Container Registry.
documentation:
    flag:
        headers: Space-separated custom headers in 'key[=value]' format that will be added to the webhook notifications. Use '' to clear existing headers.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        scope: The scope of repositories where the event can be triggered. For example, 'foo:*' means events for all tags under repository 'foo'. 'foo:bar' means events for 'foo:bar' only. 'foo' is equivalent to 'foo:latest'. Empty means events for all repositories.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --actions=!:
        description: Space-separated list of actions that trigger the webhook to post notifications.
        nargs: -1
    --headers=:
        description: Space-separated custom headers in 'key[=value]' format that will be added to the webhook notifications.
        nargs: -1
    --scope=: The scope of repositories where the event can be triggered.
    --status=: Indicates whether the webhook is enabled.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --uri=!: The service URI for the webhook to post notifications.
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of the webhook
    -r, --registry=!: The name of the container registry.
completion:
    flag:
        actions:
            - push
            - delete
            - quarantine
            - chart_push
            - chart_delete
        status:
            - enabled
            - disabled
