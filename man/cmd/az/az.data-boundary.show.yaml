# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get data boundary at specified scope
flags:
    --default=!: Default string modeled as parameter for auto generation to work correctly.
    --scope=!: The scope at which the operation is performed.
    --subscription=: Name or ID of subscription.
completion:
    flag:
        default:
            - default
documentation:
    command: Get data boundary at specified scope.
    flag:
        default: |-
            Default string modeled as parameter for auto generation to work correctly.

            Accepted values: default
        scope: The scope at which the operation is performed.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get data boundary at scope: |-
        az data-boundary show --scope subscriptions/11111111-1111-1111-1111-111111111111 --default default
        az data-boundary show --scope subscriptions/11111111-1111-1111-1111-111111111111/resourcegroups/my-resource-group --default default
