# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a subscription lock.
flags:
    --notes=: Notes about this lock.
    -n, --name=!: Name of the lock
    -t, --lock-type=!: The type of lock restriction.
completion:
    flag:
        lock-type:
            - CanNotDelete
            - ReadOnly
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        lock-type: |-
            The type of lock restriction.

            Accepted values: CanNotDelete, ReadOnly
        name: Name of the lock.
        notes: Notes about this lock.
examples:
    Create a read-only subscription level lock.: az account lock create --lock-type ReadOnly -n lockName
