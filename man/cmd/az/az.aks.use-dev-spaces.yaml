# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: use-dev-spaces
description: Use Azure Dev Spaces with a managed Kubernetes cluster.
documentation:
    flag:
        endpoint: The endpoint type to be used for a Azure Dev Spaces controller.     See https://aka.ms/azds-networking for more information.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        space: Name of the new or existing dev space to select. Defaults to an     interactive selection experience.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": Do not prompt for confirmation. Requires --space.
flags:
    --subscription=: Name or ID of subscription.
    --update=: Update to the latest Azure Dev Spaces client components.
    -e, --endpoint=: The endpoint type to be used for a Azure Dev Spaces controller.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the managed cluster.
    -s, --space=: Name of the new or existing dev space to select.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        endpoint:
            - Public
            - Private
            - None
