# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: use-dev-spaces
description: Use Azure Dev Spaces with a managed Kubernetes cluster.
flags:
    --subscription=: Name or ID of subscription.
    --update=: Update to the latest Azure Dev Spaces client components.
    -e, --endpoint=: The endpoint type to be used for a Azure Dev Spaces controller.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the managed cluster.
    -s, --space=: Name of the new or existing dev space to select.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        endpoint:
            - Public
            - Private
            - None
documentation:
    command: This command has been deprecated and will be removed in a future release.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        endpoint: |-
            The endpoint type to be used for a Azure Dev Spaces controller. See https://aka.ms/azds-networking for more information.

            Default value: Public

            Accepted values: None, Private, Public
        name: Name of the managed cluster.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        space: Name of the new or existing dev space to select. Defaults to an     interactive selection experience.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        update: |-
            Update to the latest Azure Dev Spaces client components.

            Default value: False
        "yes": |-
            Do not prompt for confirmation. Requires --space.

            Default value: False
examples:
    Use Azure Dev Spaces with a managed Kubernetes cluster with a private endpoint.: az aks use-dev-spaces -g my-aks-group -n my-aks -e private
    Use Azure Dev Spaces with a managed Kubernetes cluster, interactively selecting a dev space.: az aks use-dev-spaces -g my-aks-group -n my-aks
    ? Use Azure Dev Spaces with a managed Kubernetes cluster, selecting a new or existing dev space             'develop/my-space' without prompting for confirmation.
    : az aks use-dev-spaces -g my-aks-group -n my-aks -s develop/my-space -y
    ? Use Azure Dev Spaces with a managed Kubernetes cluster, updating to the latest Azure Dev Spaces             client components and selecting a new or existing dev space 'my-space'.
    : az aks use-dev-spaces -g my-aks-group -n my-aks --update --space my-space
