# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an Azure Availability Set.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --additional-scheduled-events=:
        description: The configuration parameter used while creating event grid and resource graph scheduled event setting.
        nargs: -1
    --enable-user-reboot-scheduled-events=:
        description: The configuration parameter used while publishing scheduled events additional publishing targets.
        nargs: -1
    --enable-user-redeploy-scheduled-events=:
        description: The configuration parameter used while creating user initiated redeploy scheduled event setting creation.
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ppg=: The name or ID of the proximity placement group the availability set should be associated with.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the availability set
completion:
    flag:
        additional-scheduled-events:
            - "true"
            - "false"
        enable-user-reboot-scheduled-events:
            - "true"
            - "false"
        enable-user-redeploy-scheduled-events:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        change-reference: |
            The related change reference ID for this resource operation.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        ppg: Name or ID of the proximity placement group that the availability set should be associated with.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Remove an availability set tag.: az vm availability-set update -n MyAvSet -g MyResourceGroup --remove tags.foo
    Update an availability set: az vm availability-set update -n MyAvSet -g MyResourceGroup
    Update an availability set tag.: az vm availability-set update -n MyAvSet -g MyResourceGroup --set tags.foo=value
