# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-predictive-metric
description: Show predictive autoscale metric future data
flags:
    --aggregation=!: The list of aggregation types (comma separated) to retrieve.
    --autoscale-setting-name=: The autoscale setting name.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --interval=!: The interval (i.e. timegrain) of the query.
    --metric-name=!: The names of the metrics (comma separated) to retrieve.
    --metric-namespace=!: Metric namespace to query metric definitions for.
    --subscription=: Name or ID of subscription.
    --timespan=!: The timespan of the query.
    -g, --resource-group=: Name of resource group.
documentation:
    command: Show predictive autoscale metric future data.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        aggregation: The list of aggregation types (comma separated) to retrieve.
        autoscale-setting-name: The autoscale setting name.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        interval: The interval (i.e. timegrain) of the query.
        metric-name: 'The names of the metrics (comma separated) to retrieve. Special case: If a metricname itself has a comma in it then use %2 to indicate it. Eg: ''Metric,Name1'' should be **''Metric%2Name1''**'
        metric-namespace: Metric namespace to query metric definitions for.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timespan: The timespan of the query. It is a string with the following format 'startDateTime_ISO/endDateTime_ISO'.
