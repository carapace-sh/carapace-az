# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a webhook.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        headers: Space-separated custom headers in 'key[=value]' format that will be added to the webhook notifications. Use '' to clear existing headers.
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        scope: The scope of repositories where the event can be triggered. For example, 'foo:*' means events for all tags under repository 'foo'. 'foo:bar' means events for 'foo:bar' only. 'foo' is equivalent to 'foo:latest'. Empty means events for all repositories.
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --actions=:
        description: Space-separated list of actions that trigger the webhook to post notifications.
        nargs: -1
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --headers=:
        description: Space-separated custom headers in 'key[=value]' format that will be added to the webhook notifications.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --scope=: The scope of repositories where the event can be triggered.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --status=: Indicates whether the webhook is enabled.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --uri=: The service URI for the webhook to post notifications.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the webhook
    -r, --registry=!: The name of the container registry.
completion:
    flag:
        actions:
            - push
            - delete
            - quarantine
            - chart_push
            - chart_delete
        status:
            - enabled
            - disabled
