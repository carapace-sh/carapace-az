# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: download
description: Download the security domain file from the HSM.
flags:
    --hsm-name=: Name of the HSM.
    --id=: Full URI of the HSM.
    --no-wait=: Do not wait for the long-running operation to finish.
    --sd-quorum=!: The minimum number of shares required to decrypt the security domain for recovery.
    --sd-wrapping-keys=!:
        description: Space-separated file paths to PEM files containing public keys.
        nargs: -1
    --security-domain-file=!: Path to a file where the JSON blob returned by this command is stored.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        hsm-name: Name of the HSM. Can be omitted if --id is specified.
        id: Full URI of the HSM.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        sd-quorum: The minimum number of shares required to decrypt the security domain for recovery.
        sd-wrapping-keys: Space-separated file paths to PEM files containing public keys.
        security-domain-file: Path to a file where the JSON blob returned by this command is stored.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Security domain download (N=3, M=2).: az keyvault security-domain download --hsm-name MyHSM --security-domain-file "{SD_FILE_NAME}" --sd-quorum 2 --sd-wrapping-keys "{PEM_PUBLIC_KEY1_FILE_NAME}" "{PEM_PUBLIC_KEY2_FILE_NAME}" "{PEM_PUBLIC_KEY3_FILE_NAME}"
