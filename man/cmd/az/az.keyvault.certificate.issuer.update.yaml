# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a certificate issuer record.
flags:
    --account-id=: The issuer account id/username/etc.
    --enabled=:
        description: Set issuer enabled state.
        nargs: -1
    --issuer-name=!: Certificate issuer name.
    --organization-id=: The organization id.
    --password=: The issuer account password/secret/etc.
    --provider-name=: The certificate provider name.
    --subscription=: Name or ID of subscription.
    --vault-name=!: Name of the Vault.
completion:
    flag:
        enabled:
            - "true"
            - "false"
documentation:
    flag:
        account-id: The issuer account id/username/etc.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        enabled: |-
            Set issuer enabled state.

            Accepted values: false, true
        issuer-name: Certificate issuer name.
        organization-id: The organization id.
        password: The issuer account password/secret/etc.
        provider-name: The certificate provider name. Must be registered with your tenant ID and in your region.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Vault.
