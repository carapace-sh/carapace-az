# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: migrate
description: Migrate the CDN profile to Azure Frontdoor(Standard/Premium) profile.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        migration-endpoint-mappings: A name map between classic CDN endpoints and AFD Premium/Standard endpoints.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-assigned-identities: 'The set of user assigned identities associated with the resource. The userAssignedIdentities dictionary keys will be ARM resource ids in the form: ''/subscriptions/{{subscriptionId}}/resourceGroups/{{resourceGroupName}}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{{identityName}}. The dictionary values can be empty objects ({{}}) in requests.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
flags:
    --identity-type=: Type of managed service identity (where both SystemAssigned and UserAssigned types are allowed).
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --migration-endpoint-mappings=:
        description: A name map between classic CDN endpoints and AFD Premium/Standard endpoints.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium which is unique within the resource group.
    --sku=: Name of the pricing tier.
    --subscription=: Name or ID of subscription.
    --user-assigned-identities=:
        description: The set of user assigned identities associated with the resource.
        nargs: -1
    -g, --resource-group=: Name of resource group.
completion:
    flag:
        identity-type:
            - SystemAssigned
            - None
            - UserAssigned
            - SystemAssigned, UserAssigned
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        sku:
            - Custom_Verizon
            - Premium_AzureFrontDoor
            - Premium_Verizon
            - StandardPlus_955BandWidth_ChinaCdn
            - StandardPlus_AvgBandWidth_ChinaCdn
            - StandardPlus_ChinaCdn
            - Standard_955BandWidth_ChinaCdn
            - Standard_Akamai
            - Standard_AvgBandWidth_ChinaCdn
            - Standard_AzureFrontDoor
            - Standard_ChinaCdn
            - Standard_Microsoft
            - Standard_Verizon
