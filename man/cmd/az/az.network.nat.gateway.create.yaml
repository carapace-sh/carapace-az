# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a NAT gateway.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        public-ip-addresses: Space-separated list of public IP addresses (Names or IDs).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        public-ip-prefixes: Space-separated list of public IP prefixes (Names or IDs).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        zone: 'Availability zone into which to provision the resource. Allowed values: 1, 2, 3.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
flags:
    --idle-timeout=: Idle timeout in minutes.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --public-ip-addresses=:
        description: Space-separated list of public IP addresses (Names or IDs).
        nargs: -1
    --public-ip-prefixes=:
        description: Space-separated list of public IP prefixes (Names or IDs).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the NAT gateway.
    -z, --zone=:
        description: Availability zone into which to provision the resource.
        nargs: -1
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
