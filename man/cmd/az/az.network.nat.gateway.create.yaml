# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a NAT gateway.
flags:
    --idle-timeout=: Idle timeout in minutes.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --public-ip-addresses=:
        description: Space-separated list of public IP addresses (Names or IDs).
        nargs: -1
    --public-ip-prefixes=:
        description: Space-separated list of public IP prefixes (Names or IDs).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the NAT gateway.
    -z, --zone=:
        description: Availability zone into which to provision the resource.
        nargs: -1
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        idle-timeout: Idle timeout in minutes.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Name of the NAT gateway.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        pip-addresses-v6: Space-separated list of public IPv6 addresses (Names or IDs).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        pip-prefixes-v6: Space-separated list of public IPv6 prefixes (Names or IDs).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        public-ip-addresses: Space-separated list of public IP addresses (Names or IDs).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        public-ip-prefixes: Space-separated list of public IP prefixes (Names or IDs).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: |-
            Name of Nat Gateway SKU.

            Default value: Standard

            Accepted values: Standard, StandardV2
        source-vnet: A reference to the source virtual network using this nat gateway resource.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        zone: 'Availability zone into which to provision the resource. Allowed values: 1, 2, 3.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
examples:
    Create a NAT gateway.: az network nat gateway create --resource-group MyResourceGroup --name MyNatGateway --location MyLocation --public-ip-addresses  MyPublicIp --public-ip-prefixes MyPublicIpPrefix --idle-timeout 4 --zone 2
