# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets SQL pool sensitivity labels.
flags:
    --filter=: An OData filter expression that filters elements in the collection.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The SQL pool name.
documentation:
    command: Get the sensitivity classifications of a given SQL pool.
    flag:
        filter: An OData filter expression that filters elements in the collection. Default value is None.
        name: The SQL pool name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
examples:
    List the sensitivity classification of a given SQL pool.: az synapse sql pool classification list --name sqlpool --workspace-name testsynapseworkspace --resource-group rg
