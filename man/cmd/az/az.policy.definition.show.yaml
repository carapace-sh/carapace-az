# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show a policy definition.
flags:
    --management-group=: The name of the management group of the policy [set] definition.
    --subscription=: The subscription id of the policy [set] definition.
    -n, --name=!: The policy definition name.
documentation:
    command: Retrieves a policy definition.
    flag:
        management-group: The name of the management group of the policy [set] definition. This parameter is required if your policy set is scoped to a management group.
        name: The name of the policy definition.
examples:
    Retrieve a policy definition: az policy definition show --name ResourceNaming
    Retrieve a policy definition at management group level: az policy definition show --management-group MyManagementGroup --name ResourceNaming
