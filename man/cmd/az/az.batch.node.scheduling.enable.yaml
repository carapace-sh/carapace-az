# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable
description: Enables Task scheduling on the specified Compute Node.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --node-id=!: The ID of the Compute Node on which you want to enable Task scheduling.
    --pool-id=!: The ID of the Pool that contains the Compute Node.
    --subscription=: Name or ID of subscription.
documentation:
    command: Enable scheduling on a Batch compute node.
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        node-id: The ID of the Compute Node on which you want to enable Task scheduling. Required.
        pool-id: The ID of the Pool that contains the Compute Node. Required.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Enable scheduling on a node.: az batch node scheduling enable --pool-id pool1 --node-id node1
