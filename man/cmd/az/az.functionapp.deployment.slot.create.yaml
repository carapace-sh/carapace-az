# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a deployment slot.
flags:
    --configuration-source=: source slot to clone configurations from.
    --https-only=:
        description: Redirect all traffic made to an app using HTTP to HTTPS.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -d, --registry-password=: The container registry server password
    -g, --resource-group=!: Name of resource group.
    -i, --image=: Container image, e.g. publisher/image-name:tag
    -n, --name=!: name of the function app
    -s, --slot=!: the name of the slot
    -u, --registry-username=: the container registry server username
completion:
    flag:
        https-only:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        configuration-source: Source slot to clone configurations from. Use function app's name to refer to the production slot.
        deployment-container-image-name: Option '--deployment-container-image-name' has been deprecated and will be removed in a future release. Use '--image' instead. Container image, e.g. publisher/image-name:tag.
        docker-registry-server-password: Option '--docker-registry-server-password' has been deprecated and will be removed in a future release. Use '--registry-password' instead. The container registry server password.
        docker-registry-server-user: Option '--docker-registry-server-user' has been deprecated and will be removed in a future release. Use '--registry-username' instead. The container registry server username.
        https-only: |-
            Redirect all traffic made to an app using HTTP to HTTPS.

            Default value: True

            Accepted values: false, true
        image: Container image, e.g. publisher/image-name:tag.
        name: Name of the function app.
        registry-password: The container registry server password.
        registry-username: The container registry server username.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: The name of the slot.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a deployment slot. (autogenerated): az functionapp deployment slot create --name MyFunctionapp --resource-group MyResourceGroup --slot staging
