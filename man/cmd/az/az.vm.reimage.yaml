# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: reimage
description: Reimage (upgrade the operating system) a virtual machine.
flags:
    --admin-password=: Specifies the password of the administrator account.
    --custom-data=: Specifies a base-64 encoded string of custom data.
    --exact-version=: Specifies in decimal number, the version the OS disk should be reimaged to.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --temp-disk=:
        description: Specifies whether to reimage temp disk.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Virtual Machine.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        temp-disk:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        admin-password: Specifies the password of the administrator account.
        change-reference: The related change reference ID for this resource operation.
        custom-data: Specifies a base-64 encoded string of custom data.
        exact-version: Specifies in decimal number, the version the OS disk should be reimaged to. If exact version is not provided, the OS disk is reimaged to the existing version of OS Disk.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Virtual Machine. You can configure the default using `az configure --defaults vm=<name>`
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        temp-disk: |-
            Specifies whether to reimage temp disk. Default value: false. Note: This temp disk reimage parameter is only supported for VM/VMSS with Ephemeral OS disk.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
examples:
    Reimage a virtual machine.: az vm reimage --name MyVm --resource-group MyResourceGroup --admin-password MyPassword --custom-data "dGVzdA==" --temp-disk false --exact-version 0.1
