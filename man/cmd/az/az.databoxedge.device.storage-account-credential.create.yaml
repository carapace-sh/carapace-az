# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the storage account credential.
flags:
    --account-key=:
        description: Encrypted storage key.
        nargs: -1
    --account-type=!: Type of storage accessed on the storage account.
    --alias=!: Alias for the storage account.
    --blob-domain-name=: Blob end point for private clouds.
    --connection-string=: Connection string for the storage account.
    --device-name=!: The device name.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --ssl-status=!: Signifies whether SSL needs to be enabled or not.
    --storage-account-id=: Id of the storage account.
    --subscription=: Name or ID of subscription.
    --user-name=: Username for the storage account.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The storage account credential name.
completion:
    flag:
        account-type:
            - BlobStorage
            - GeneralPurposeStorage
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        ssl-status:
            - Disabled
            - Enabled
documentation:
    flag:
        account-key: Encrypted storage key.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        account-type: |-
            Type of storage accessed on the storage account.

            Accepted values: BlobStorage, GeneralPurposeStorage
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        alias: Alias for the storage account.
        blob-domain-name: Blob end point for private clouds.
        change-reference: The related change reference ID for this resource operation.
        connection-string: Connection string for the storage account. Use this string if username and account key are not specified.
        device-name: The device name.
        name: The storage account credential name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        ssl-status: |-
            Signifies whether SSL needs to be enabled or not.

            Accepted values: Disabled, Enabled
        storage-account-id: Id of the storage account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-name: Username for the storage account.
examples:
    Create storage account credential: az databoxedge device storage-account-credential create --device-name name -n sac-name -g rg --account-type GeneralPurposeStorage --alias testsac --ssl-status Enabled --account-key "{encryptionAlgorithm:AES256,value:xxx,encryptionCertThumbprint:xxx}"
