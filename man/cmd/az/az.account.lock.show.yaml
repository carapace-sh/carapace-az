# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show the details of a subscription lock
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    -n, --name=: Name of the lock
documentation:
    command: Show the details of a subscription lock.
    flag:
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
        name: Name of the lock.
examples:
    Show a subscription level lock: az account lock show -n lockname
