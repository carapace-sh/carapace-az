# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Kusto pool principalAssignment.
flags:
    --kusto-pool-name=!: The name of the Kusto pool.
    --no-wait=: Do not wait for the long-running operation to finish.
    --principal-assignment-name=!: The name of the Kusto principalAssignment.
    --principal-id=: The principal ID assigned to the cluster principal.
    --principal-type=: Principal type.
    --role=: Cluster principal role.
    --subscription=: Name or ID of subscription.
    --tenant-id=: The tenant id of the principal
    --workspace-name=!: The name of the workspace
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        principal-type:
            - App
            - Group
            - User
        role:
            - AllDatabasesAdmin
            - AllDatabasesViewer
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        kusto-pool-name: The name of the Kusto pool.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        principal-assignment-name: The name of the Kusto principalAssignment.
        principal-id: The principal ID assigned to the cluster principal. It can be a user email, application ID, or security group name.
        principal-type: |-
            Principal type.

            Accepted values: App, Group, User
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        role: |-
            Cluster principal role.

            Accepted values: AllDatabasesAdmin, AllDatabasesViewer
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tenant-id: The tenant id of the principal.
        workspace-name: The name of the workspace.
examples:
    KustoPoolPrincipalAssignmentsCreateOrUpdate: az synapse kusto pool-principal-assignment create --kusto-pool-name "kustoclusterrptest4" --principal-id "87654321-1234-1234-1234-123456789123" --principal-type "App" --role "AllDatabasesAdmin" --tenant-id "12345678-1234-1234-1234-123456789123" --principal-assignment-name "kustoprincipal1" --resource-group "kustorptest" --workspace-name "synapseWorkspaceName"
