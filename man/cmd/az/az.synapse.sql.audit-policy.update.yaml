# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a SQL's auditing policy.
flags:
    --actions=:
        description: List of actions and action groups to audit.
        nargs: -1
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --blob-auditing-policy-name=: ""
    --blob-storage-target-state=: Indicate whether blob storage is a destination for audit records.
    --enable-azure-monitor=:
        description: Whether enabling azure monitor target or not.
        nargs: -1
    --event-hub-authorization-rule-id=: The resource Id for the event hub authorization rule.
    --event-hub-target-state=: Indicate whether event hub is a destination for audit records.
    --event-hub=: The name of the event hub.
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --log-analytics-target-state=: Indicate whether log analytics is a destination for audit records.
    --log-analytics-workspace-resource-id=: The workspace ID (resource ID of a Log Analytics workspace) for a Log Analytics workspace to which you would like to send Audit Logs.
    --no-wait=: Do not wait for the long-running operation to finish.
    --queue-delay-time=: The amount of time in milliseconds that can elapse before audit actions are forced to be processed
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --retention-days=: The number of days to retain audit logs.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --state=: Auditing policy state
    --storage-account=: Name of the storage account.
    --storage-endpoint=: The storage account endpoint.
    --storage-key=: Access key for the storage account.
    --storage-subscription=: The subscription id of storage account
    --subscription=: Name or ID of subscription.
    --use-secondary-key=:
        description: Indicates whether using the secondary storeage key or not
        nargs: -1
    --workspace-name=!: The workspace name.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        blob-storage-target-state:
            - Enabled
            - Disabled
        enable-azure-monitor:
            - "true"
            - "false"
        event-hub-target-state:
            - Enabled
            - Disabled
        log-analytics-target-state:
            - Enabled
            - Disabled
        state:
            - Enabled
            - Disabled
        use-secondary-key:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        actions: List of actions and action groups to audit.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        blob-auditing-policy-name: |-
            Default value: default

            Accepted values: Disabled, Enabled
        change-reference: |-
            The related change reference ID for this resource operation.

            Accepted values: Disabled, Enabled
        enable-azure-monitor: |-
            Whether enabling azure monitor target or not.

            Accepted values: false, true
        event-hub: The name of the event hub. If none is specified when providing event_hub_authorization_rule_id, the default event hub will be selected.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False

            Accepted values: Disabled, Enabled
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        retention-days: The number of days to retain audit logs.
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        state: |-
            Auditing policy state.

            Accepted values: Disabled, Enabled
        storage-account: Name of the storage account.
        storage-endpoint: The storage account endpoint.
        storage-key: Access key for the storage account.
        storage-subscription: The subscription id of storage account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        use-secondary-key: |-
            Indicates whether using the secondary storeage key or not.

            Accepted values: false, true
        workspace-name: The workspace name.
examples:
    Disable a blob storage auditing policy.: |-
        az synapse sql audit-policy update --workspace-name testsynapseworkspace --resource-group rg \
        --blob-storage-target-state Disabled
    Disable a log analytics auditing policy.: |-
        az synapse sql audit-policy update --resource-group mygroup --workspace-name myws --state Enabled
            --log-analytics-target-state Disabled
    Disable an auditing policy.: |-
        az synapse sql audit-policy update --workspace-name testsynapseworkspace --resource-group rg \
        --state Disabled
    Disable an event hub auditing policy.: |-
        az synapse sql audit-policy update --resource-group mygroup --workspace-name myws
           --state Enabled --event-hub-target-state Disabled
    Enable a log analytics auditing policy.: |-
        az synapse sql audit-policy update --resource-group mygroup --workspace-name myws --state Enabled \
            --log-analytics-target-state Enabled --log-analytics-workspace-resource-id myworkspaceresourceid
    Enable an event hub auditing policy for default event hub.: |-
        az synapse sql audit-policy update --resource-group mygroup --workspace-name myws --state Enabled \
            --event-hub-target-state Enabled \
            --event-hub-authorization-rule-id eventhubauthorizationruleid
    Enable an event hub auditing policy.: |-
        az synapse sql audit-policy update --resource-group mygroup --workspace-name myws --state Enabled \
            --event-hub-target-state Enabled \
            --event-hub-authorization-rule-id eventhubauthorizationruleid \
            --event-hub eventhubname
    Enable by storage account name.: |-
        az synapse sql audit-policy update --workspace-name testsynapseworkspace --resource-group rg --state Enabled \
            --blob-storage-target-state Enabled --storage-account mystorage
    Enable by storage endpoint and key.: |-
        az synapse sql audit-policy update --workspace-name testsynapseworkspace --resource-group rg --state Enabled \
            --blob-storage-target-state Enabled --storage-endpoint https://mystorage.blob.core.windows.net \
            --storage-key MYKEY==
    Set the list of audit actions.: |-
        az synapse sql audit-policy update --workspace-name testsynapseworkspace --resource-group rg \
        --actions SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP 'UPDATE on database::mydb by public'
