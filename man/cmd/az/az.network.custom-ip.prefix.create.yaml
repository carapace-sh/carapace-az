# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a custom IP prefix resource.
flags:
    --asn=: The ASN for CIDR advertising.
    --authorization-message=: Authorization message for WAN validation.
    --cidr=: The prefix range in CIDR notation.
    --geo=: The Geo for CIDR advertising.
    --is-advertised=:
        description: Whether to do express route advertise.
        nargs: -1
    --is-parent=:
        description: Denotes that resource is being created as a Parent CustomIpPrefix
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --prefix-type=: Type of custom IP prefix.
    --signed-message=: Signed message for WAN validation.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'Space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -c, --cip-prefix-parent=: The Parent CustomIpPrefix for IPv6 /64 CustomIpPrefix.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The name of the custom IP prefix.
    -z, --zone=:
        description: Space-separated list of availability zones into which to provision the resource.
        nargs: -1
completion:
    flag:
        geo:
            - AFRI
            - APAC
            - AQ
            - EURO
            - GLOBAL
            - LATAM
            - ME
            - NAM
            - OCEANIA
        is-advertised:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        is-parent:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        prefix-type:
            - Child
            - Parent
            - Singular
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        asn: The ASN for CIDR advertising. Should be an integer as string.
        authorization-message: Authorization message for WAN validation.
        change-reference: The related change reference ID for this resource operation.
        cidr: The prefix range in CIDR notation. Should include the start address and the prefix length.
        cip-prefix-parent: |-
            The Parent CustomIpPrefix for IPv6 /64 CustomIpPrefix. --express-route-advertise --is-advertised Whether to do express route advertise.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        geo: |-
            The Geo for CIDR advertising. Should be an Geo code.

            Accepted values: AFRI, APAC, AQ, EURO, GLOBAL, LATAM, ME, NAM, OCEANIA
        is-parent: |-
            Denotes that resource is being created as a Parent CustomIpPrefix.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: The name of the custom IP prefix.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        prefix-type: |-
            Type of custom IP prefix. Should be Singular, Parent, or Child.

            Accepted values: Child, Parent, Singular
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        signed-message: Signed message for WAN validation.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        zone: 'Space-separated list of availability zones into which to provision the resource.  Allowed values: 1, 2, 3.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
examples:
    Create a custom IP prefix resource.: az network custom-ip prefix create --location westus2 --name MyCustomIpPrefix --resource-group MyResourceGroup
