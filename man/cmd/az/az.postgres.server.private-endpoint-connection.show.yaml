# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets a private endpoint connection.
documentation:
    flag:
        id: The ID of the private endpoint connection associated with the Server. If specified --server-name/-s and --name/-n, this should be omitted.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the private endpoint connection associated with the Server. Required if --id is not specified
        server-name: Name of the Server. Required if --id is not specified
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --id=: The ID of the private endpoint connection associated with the Server.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group name of specified server.
    -n, --name=: The name of the private endpoint connection associated with the Server.
    -s, --server-name=: Name of the Server.
