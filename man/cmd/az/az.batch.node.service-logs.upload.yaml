# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upload
description: Upload Azure Batch service log files from the specified Compute Node to Azure Blob Storage.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --container-url=: The URL of the container within Azure Blob Storage to which to upload the Batch Service log file(s).
    --end-time=: The end of the time range from which to upload Batch Service log file(s).
    --json-file=: A file containing the content specification in JSON (formatted to match the respective REST API body).
    --node-id=!: The ID of the Compute Node for which you want to get the Remote Desktop Protocol file.
    --pool-id=!: The ID of the Pool that contains the Compute Node.
    --resource-id=: The ARM resource id of the user assigned identity.
    --start-time=: The start of the time range from which to upload Batch Service log file(s).
    --subscription=: Name or ID of subscription.
documentation:
    command: Upload service logs from a specified Batch compute node.
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        container-url: The URL of the container within Azure Blob Storage to which to upload the Batch Service log file(s). If a user assigned managed identity is not being used, the URL must include a Shared Access Signature (SAS) granting write permissions to the container. The SAS duration must allow enough time for the upload to finish. The start time for SAS is optional and recommended to not be specified. Required.
        end-time: The end of the time range from which to upload Batch Service log file(s). Any log file containing a log message in the time range will be uploaded. This means that the operation might retrieve more logs than have been requested since the entire log file is always uploaded, but the operation should not retrieve fewer logs than have been requested. If omitted, the default is to upload all logs available after the startTime. Expected format is an ISO-8601 timestamp.
        json-file: A file containing the content specification in JSON (formatted to match the respective REST API body). If this parameter is specified, all 'Content Arguments' are ignored.
        node-id: The ID of the Compute Node for which you want to get the Remote Desktop Protocol file. Required.
        pool-id: The ID of the Pool that contains the Compute Node. Required.
        resource-id: The ARM resource id of the user assigned identity.
        start-time: The start of the time range from which to upload Batch Service log file(s). Any log file containing a log message in the time range will be uploaded. This means that the operation might retrieve more logs than have been requested since the entire log file is always uploaded, but the operation should not retrieve fewer logs than have been requested. Required. Expected format is an ISO-8601 timestamp.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Upload logs to a storage account SAS URL: az batch node service-logs upload --pool-id pool1 --node-id node1 --start-time 2025-01-13T00:00:00Z --container-url sas_url
