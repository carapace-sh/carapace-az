# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update properties of an SOA record.
flags:
    --subscription=: Name or ID of subscription.
    -e, --email=: Email address.
    -f, --refresh-time=: Refresh value (seconds).
    -g, --resource-group=!: Name of resource group.
    -m, --minimum-ttl=: Minimum TTL (time-to-live, seconds).
    -r, --retry-time=: Retry time (seconds).
    -s, --serial-number=: Serial number.
    -t, --host=: Host name.
    -x, --expire-time=: Expire time (seconds).
    -z, --zone-name=!: The name of the Private DNS zone.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        email: Email address.
        expire-time: Expire time (seconds).
        host: Host name.
        minimum-ttl: Minimum TTL (time-to-live, seconds).
        refresh-time: Refresh value (seconds).
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        retry-time: Retry time (seconds).
        serial-number: Serial number.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        zone-name: The name of the Private DNS zone.
examples:
    Update properties of an SOA record.: |-
        az network private-dns record-set soa update -g MyResourceGroup -z www.mysite.com \
            -e myhostmaster.mysite.com
