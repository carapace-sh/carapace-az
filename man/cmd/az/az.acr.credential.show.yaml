# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the login credentials for an Azure Container Registry.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
documentation:
    flag:
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a password used to log in to an Azure Container Registry.: az acr credential show -n myregistry --query 'passwords[0].value'
    Get the login credentials for an Azure Container Registry.: az acr credential show -n myregistry
    Get the username used to log in to an Azure Container Registry.: az acr credential show -n myregistry --query username
