# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the restore point.
flags:
    --collection-name=!: The name of the restore point collection.
    --expand=: The expand expression to apply on the operation.
    --instance-view=: Show the instance view of a restore point.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the restore point.
documentation:
    flag:
        collection-name: The name of the restore point collection. --name --restore-point-name -n The name of the restore point.
        instance-view: Show the instance view of a restore point.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a restore point: az restore-point show --resource-group "myResourceGroup" --collection-name "rpcName" --name "rpName"
