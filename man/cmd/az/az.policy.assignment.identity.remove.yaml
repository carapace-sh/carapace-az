# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove a managed identity from a policy assignment.
flags:
    --scope=: Scope at which this policy assignment subcommand applies.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: the resource group where the policy will be applied
    -n, --name=!: Name of the policy assignment.
documentation:
    command: Breaking change
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The name of the policy assignment.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scope: Scope at which this policy assignment subcommand applies. Defaults to current context subscription.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Remove user assigned managed identity from a policy assignment: az policy assignment identity remove --name MyPolicyAssignment --user-assigned
