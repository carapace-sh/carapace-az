# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable-azure-ad-auth
description: Enable Azure AD authentication on a SQL virtual machine.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --msi-client-id=: Virutal Machine Managed Identity Client ID.
    --skip-client-validation=: Skip client side Azure AD authentication validation, the server side validation will still happen.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the SQL virtual machine.
documentation:
    command: Enable Azure AD authentication of a SQL virtual machine.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        msi-client-id: Virutal Machine Managed Identity Client ID.
        name: Name of the SQL virtual machine.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        skip-client-validation: Skip client side Azure AD authentication validation, the server side validation will still happen.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    ? Enable Azure AD authentication with system-assigned managed identity skipping client side validation. The server side validation always happens.
    : az sql vm enable-azure-ad-auth -n sqlvm -g myresourcegroup --skip-client-validation
    Enable Azure AD authentication with system-assigned managed identity with client side validation.: az sql vm enable-azure-ad-auth -n sqlvm -g myresourcegroup
    ? Enable Azure AD authentication with user-assigned managed identity skipping client side validation. The server side validation always happens.
    : az sql vm enable-azure-ad-auth -n sqlvm -g myresourcegroup --msi-client-id 12345678 --skip-client-validation
    Enable Azure AD authentication with user-assigned managed identity with client side validation.: az sql vm enable-azure-ad-auth -n sqlvm -g myresourcegroup --msi-client-id 12345678
