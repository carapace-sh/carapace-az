# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update App Routing addon.
flags:
    --attach-kv=: Attach a keyvault id to access secrets and certificates.
    --enable-kv=: Enable the keyvault secrets provider addon.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the managed cluster.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        attach-kv: Attach a keyvault id to access secrets and certificates. This optional flag attaches a keyvault id to access secrets and certificates.
        change-reference: The related change reference ID for this resource operation.
        disable-default-domain: |-
            Disable default domain for Application Routing addon.

            Default value: False
        enable-default-domain: |-
            Enable default domain for Application Routing addon.

            Default value: False
        enable-kv: |-
            Enable the keyvault secrets provider addon. This optional flag enables the keyvault-secrets-provider addon in given cluster. This is required for most App Routing use-cases.

            Default value: False
        name: Name of the managed cluster.
        nginx: |-
            Configure default NginxIngressController resource. Configure default nginx ingress controller type. Valid values are annotationControlled (default behavior), external, internal, or none.

            Accepted values: AnnotationControlled, External, Internal, None
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
