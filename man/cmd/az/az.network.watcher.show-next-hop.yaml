# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-next-hop
description: Get information on the `next hop` of a VM.
flags:
    --dest-ip=!: Destination IPv4 address.
    --nic=: Name or ID of the NIC resource to test.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --source-ip=!: Source IPv4 address.
    --subscription=: Name or ID of subscription.
    --vm=!: Name or ID of the VM to target.
    -g, --resource-group=: Name of the resource group the target VM is in.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Get information on the
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        dest-ip: Destination IPv4 address.
        nic: Name or ID of the NIC resource to test. If the VM has multiple NICs and IP forwarding is enabled on any of them, this parameter is required.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of the resource group the target VM is in.
        source-ip: Source IPv4 address.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vm: Name or ID of the VM to target. If the name of the VM is provided, the `--resource-group` is required.
examples:
    Get the next hop from a VMs assigned IP address to a destination at 10.1.0.4.: az network watcher show-next-hop -g MyResourceGroup --vm MyVm --source-ip 10.0.0.4 --dest-ip 10.1.0.4
