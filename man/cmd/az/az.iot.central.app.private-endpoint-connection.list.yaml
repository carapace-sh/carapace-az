# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all of the private endpoint connections for an IoT Central application.
flags:
    --account-name=: Name of the IoT Central application.
    --id=: ID of the resource
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    flag:
        account-name: Name of the IoT Central application. Required if --id is not specified.
        id: ID of the resource.
        resource-group: Name of resource group. If provided, --name must be provided too.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all of the private endpoint connections in the IoT Central application given a connection id: az iot central app private-endpoint-connection list --id "/subscriptions/0000-0000-0000-0000/resourceGroups/MyResourceGroup/providers/Microsoft.IoTCentral/IoTApps/my-iotc-app/privateEndpointConnections/my-iotc-app.b56b5a95-0588-4f8b-b348-15db61590a6c"
    List all of the private endpoint connections in the IoT Central application given the resource group and application name.: az iot central app private-endpoint-connection list -g MyResourceGroup --account-name my-iotc-app
