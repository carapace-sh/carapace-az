# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all of the private endpoint connections for an IoT Central application.
documentation:
    flag:
        account-name: Name of the IoT Central application. Required if --id is not specified
        resource-group: Name of resource group. If provided, --name must be provided too
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-name=: Name of the IoT Central application.
    --id=: ID of the resource
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
