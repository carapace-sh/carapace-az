# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a resource by PUT request.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --api-version=: The api version of the resource (omit for the latest stable version)
    --force-string=: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --include-response-body=:
        description: Use if the default command output doesn't capture all of the property data.
        nargs: -1
    --namespace=: 'Provider namespace (Ex: ''Microsoft.Provider'')'
    --parent=: 'The parent path (Ex: ''resA/myA/resB/myB'')'
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --resource-type=: 'The resource type (Ex: ''resC'').'
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The resource name.
    -v, --latest-include-preview=: Indicate that the latest api-version will be used regardless of whether it is preview version (like 2020-01-01-preview) or not.
completion:
    flag:
        include-response-body:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: |-
            Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .

            Default value: []
        api-version: The api version of the resource (omit for the latest stable version).
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Default value: False
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
        include-response-body: |-
            Use if the default command output doesn't capture all of the property data.

            Default value: False

            Accepted values: false, true
        latest-include-preview: |-
            Indicate that the latest api-version will be used regardless of whether it is preview version (like 2020-01-01-preview) or not. For example, if the supported api-version of resource provider is 2020-01-01-preview and 2019-01-01: when passing in this parameter it will take the latest version 2020-01-01-preview, otherwise it will take the latest stable version 2019-01-01 without passing in this parameter.

            Default value: False
        name: 'The resource name. (Ex: myC).'
        namespace: 'Provider namespace (Ex: ''Microsoft.Provider'').'
        parent: 'The parent path (Ex: ''resA/myA/resB/myB'').'
        remove: |-
            Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .

            Default value: []
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type: 'The resource type (Ex: ''resC''). Can also accept namespace/type format (Ex: ''Microsoft.Provider/resC'').'
        set: |-
            Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .

            Default value: []
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update a resource. (autogenerated): az resource update --name MyResource --resource-group MyResourceGroup --resource-type subnets --set tags.key=value
    Update a webapp by using the latest api-version whether this version is a preview version.: az resource update --ids /subscriptions/{SubID}/resourceGroups/{ResourceGroup}/providers/Microsoft.Web/sites/{WebApp} --set tags.key=value --latest-include-preview
