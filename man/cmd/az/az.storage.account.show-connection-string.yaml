# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-connection-string
description: Get the connection string for a storage account.
flags:
    --blob-endpoint=: Custom endpoint for blobs.
    --file-endpoint=: Custom endpoint for files.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --key=: The key to use.
    --protocol=: The default endpoint protocol.
    --queue-endpoint=: Custom endpoint for queues.
    --sas-token=: The SAS token to be used in the connection-string.
    --subscription=: Name or ID of subscription.
    --table-endpoint=: Custom endpoint for tables.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The storage account name.
completion:
    flag:
        key:
            - primary
            - secondary
            - key1
            - key2
        protocol:
            - http
            - https
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        blob-endpoint: Custom endpoint for blobs.
        change-reference: The related change reference ID for this resource operation.
        file-endpoint: Custom endpoint for files.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        key: |-
            The key to use.

            Default value: key1

            Accepted values: key1, key2, primary, secondary
        name: The storage account name.
        protocol: |-
            The default endpoint protocol.

            Default value: https

            Accepted values: http, https
        queue-endpoint: Custom endpoint for queues.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sas-token: The SAS token to be used in the connection-string.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        table-endpoint: Custom endpoint for tables.
examples:
    Get a connection string for a storage account.: az storage account show-connection-string -g MyResourceGroup -n MyStorageAccount
    Get the connection string for a storage account. (autogenerated): az storage account show-connection-string --name MyStorageAccount --resource-group MyResourceGroup --subscription MySubscription
