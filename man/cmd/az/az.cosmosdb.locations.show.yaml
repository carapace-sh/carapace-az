# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the properties of an existing Cosmos DB location.
flags:
    --subscription=: Name or ID of subscription.
    -l, --location=!: Name of the location
documentation:
    command: Show the Azure Cosmos DB location properties in the given location.
    flag:
        location: Name of the location.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Shows the Azure Cosmos DB location properties in the given location.: az cosmosdb locations show --location 'East US'
