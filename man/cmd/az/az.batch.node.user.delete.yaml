# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes a user Account from the specified Compute Node.
documentation:
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT'
        node-id: The ID of the machine on which you want to delete a user Account. Required.
        pool-id: The ID of the Pool that contains the Compute Node. Required.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-name: The name of the user Account to delete. Required.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --node-id=!: The ID of the machine on which you want to delete a user Account.
    --pool-id=!: The ID of the Pool that contains the Compute Node.
    --subscription=: Name or ID of subscription.
    --user-name=!: The name of the user Account to delete.
    -y, --yes=: Do not prompt for confirmation.
