# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: geo-restore
description: Geo-restore a flexible server from backup.
flags:
    --address-prefixes=: The IP address prefix to use when creating a new virtual network in CIDR format.
    --backup-identity=: The name or resource ID of the geo backup user identity for data encryption.
    --backup-key=: The resource ID of the geo backup keyvault key for data encryption.
    --geo-redundant-backup=: Whether or not geo redundant backup is enabled.
    --identity=: The name or resource ID of the user assigned identity for data encryption.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --key=: The resource ID of the primary keyvault key for data encryption.
    --no-wait=: Do not wait for the long-running operation to finish.
    --private-dns-zone=: This parameter only applies for a server with private access.
    --restore-time=: The point in time in UTC to restore from (ISO8601 format), e.g., 2017-04-26T02:10:00+00:00The default value is set to current time.
    --source-server=!: The name or resource ID of the source server to restore from.
    --subnet-prefixes=: The subnet IP address prefix to use when creating a new subnet in CIDR format.
    --subnet=: Name or resource ID of a new or existing subnet.
    --subscription=: Name or ID of subscription.
    --vnet=: Name or ID of a new or existing virtual network.
    -g, --resource-group=: Name of resource group.
    -l, --location=!: Location.
    -n, --name=: Name of the server.
    -y, --yes=: Do not prompt for confirmation.
    -z, --zone=: Availability zone into which to provision the resource.
completion:
    flag:
        geo-redundant-backup:
            - Enabled
            - Disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        address-prefixes: The IP address prefix to use when creating a new virtual network in CIDR format. Default value is 10.0.0.0/16.
        backup-identity: The name or resource identifier of the geo backup user identity for data encryption. The identity needs to be in the same region as the backup region.
        backup-key: The resource identifier of the geo backup keyvault key for data encryption. The key needs to be in the same region as the backup region.
        change-reference: The related change reference ID for this resource operation.
        geo-redundant-backup: |-
            Whether or not geo redundant backup is enabled.

            Default value: Disabled

            Accepted values: Disabled, Enabled
        identity: The name or resource identifier of the user assigned identity for data encryption.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        key: The resource identifier of the primary keyvault key for data encryption.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        private-dns-zone: This parameter only applies for a server with private access. The name or id of new or existing private dns zone. You can use the private dns zone from same resource group, different resource group, or different subscription. If you want to use a zone from different resource group or subscription, please provide resource Id. CLI creates a new private dns zone within the same resource group as virtual network if not provided by users.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restore-time: |-
            The point in time in UTC to restore from (ISO8601 format), e.g., 2026-03-22T18:20:22+00:00 The default value is set to current time.

            Default value: 2026-06-30T11:12:41+00:00
        source-server: The name or resource identifier of the source server to restore from.
        subnet: Name or resource ID of a new or existing subnet. If you want to use a subnet from different resource group or subscription, please provide resource ID instead of name. Please note that the subnet will be delegated to flexibleServers. After delegation, this subnet cannot be used for any other type of Azure resources.
        subnet-prefixes: The subnet IP address prefix to use when creating a new subnet in CIDR format. Default value is 10.0.0.0/24.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vnet: Name or identifier of an existing virtual network. If you want to use a vnet from a different resource group or subscription, please provide a resource identifier. The name must be between 2 to 64 characters. The name must begin with a letter or number, end with a letter, number or underscore, and may contain only letters, numbers, underscores, periods, or hyphens.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
        zone: Availability zone into which to provision the resource.
examples:
    ? Geo-restore 'testserver' to current point-in-time as a new server 'testserverNew' in a different subscription / resource group. \ Here --resource-group is for the target server's resource group, and --source-server must be passed as resource identifier. \ This resource identifier can be in a subscription different than the subscription used for az account set.
    : |-
        az postgres flexible-server geo-restore --resource-group testgroup --name testservernew --location testlocationnew \
          --source-server /subscriptions/{sourceSubscriptionId}/resourceGroups/{sourceResourceGroup}/providers/Microsoft.DBforPostgreSQL/flexibleServers/{sourceServer}
    Geo-restore private access server 'testserver' as a new server 'testservernew' using existing private networking resources.: |-
        az postgres flexible-server geo-restore --resource-group testgroup --name testservernew \
          --source-server testserver --vnet testvnetnew --subnet testsubnetnew \
          --private-dns-zone testDNS.postgres.database.azure.com --location newLocation
    Geo-restore public access server 'testserver' to a new server 'testserverNew' in location 'newLocation' with public access.: az postgres flexible-server geo-restore --resource-group testgroup --name testservernew --source-server testserver --location testlocationnew
