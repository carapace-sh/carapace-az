# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a static app.
flags:
    --api-location=: Location of your Azure Functions code.
    --app-location=: Location of your application code.
    --login-with-ado=: Use azure credentials to create an Azure Dev Ops personal access token
    --login-with-github=: Interactively log in with Github to retrieve the Personal Access Token
    --no-wait=: Do not wait for the long-running operation to finish.
    --output-location=: The path of your build output relative to your apps location.
    --sku=: The pricing tiers for Static Web App
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -b, --branch=: The target branch in the repository.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the static site
    -s, --source=: URL for the repository of the static site.
    -t, --token=: A user's GitHub or Azure Dev Ops repository token.
completion:
    flag:
        sku:
            - Free
            - Standard
            - Dedicated
documentation:
    command: Create a static app. To provide content to the static web app and integrate with a Github repo, provide the Github repository URL (--source) and a branch (--branch). If the repo is under a Github organization, please ensure that the Azure CLI Github App has access to the organization. Access can be requested in the browser when using the "--login-with-github" argument. Access must be granted by the organization's admin.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api-location: Location of your Azure Functions code. For example, '/api' represents a folder called 'api'.
        app-location: Location of your application code. For example, '/' represents the root of your app, while '/app' represents a directory called 'app'.
        branch: The target branch in the repository.
        change-reference: The related change reference ID for this resource operation.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        login-with-ado: Use azure credentials to create an Azure Dev Ops personal access token.
        login-with-github: Interactively log in with Github to retrieve the Personal Access Token.
        name: Name of the static site.
        no-wait: Do not wait for the long-running operation to finish.
        output-location: The path of your build output relative to your apps location. For example, setting a value of 'build' when your app location is set to '/app' will cause the content at '/app/build' to be served.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: The pricing tiers for Static Web App.
        source: URL for the repository of the static site.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        token: A user's GitHub or Azure Dev Ops repository token. This is used to create the Github Action or Dev Ops pipeline.
examples:
    Create a static web app without any content and without a github integration: az staticwebapp create -n MyStaticAppName -g MyExistingRg
    Create static app in a subscription, retrieving token interactively: az staticwebapp create -n MyStaticAppName -g MyExistingRg -s https://github.com/JohnDoe/my-first-static-web-app -l WestUs2 -b master --login-with-github
    Create static app in a subscription.: az staticwebapp create -n MyStaticAppName -g MyExistingRg -s https://github.com/JohnDoe/my-first-static-web-app -l WestUs2 -b master -t MyAccessToken
