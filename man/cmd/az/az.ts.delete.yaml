# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a specified template spec or template spec version by name or resource ID..
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the template spec.
    -s, --template-spec=: The template spec resource id.
    -v, --version=: The template spec version.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The name of the template spec.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        template-spec: The template spec resource id.
        version: The template spec version.
        "yes": Do not prompt for confirmation.
examples:
    Delete the specified template spec and all versions.: az ts delete -g MyResourceGroup --name TemplateSpecName
    Delete the specified version from the template spec.: az ts delete -g MyResourceGroup --name TemplateSpecName --version VersionName
    Delete the template spec or version based on resource ID.: az ts delete --template-spec resourceID
