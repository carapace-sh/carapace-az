# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add error handler to an existing image builder template.
documentation:
    flag:
        defer: Temporarily store the object in the local cache instead of sending to Azure. Use `az cache` commands to view/clear.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        on-customizer-error: If there is a customizer error and this field is set to "cleanup", the build VM and associated network resources will be cleaned up. This is the default behavior. If there is a customizer error and this field is set to "abort", the build VM will be preserved.
        on-validation-error: If there is a validation error and this field is set to "cleanup", the build VM and associated network resources will be cleaned up. This is the default behavior. If there is a validation error and this field is set to "abort", the build VM will be preserved.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --defer=:
        description: Temporarily store the object in the local cache instead of sending to Azure.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --on-customizer-error=: If there is a customizer error and this field is set to "cleanup", the build VM and associated network resources will be cleaned up.
    --on-validation-error=: If there is a validation error and this field is set to "cleanup", the build VM and associated network resources will be cleaned up.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the image template.
completion:
    flag:
        on-customizer-error:
            - cleanup
            - abort
        on-validation-error:
            - cleanup
            - abort
