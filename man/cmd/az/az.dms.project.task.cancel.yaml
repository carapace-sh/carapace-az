# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: cancel
description: Cancel a task.
flags:
    --project-name=!: The name of the Project.
    --service-name=!: The name of the Service.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Task.
documentation:
    command: This command is being deprecated. Use the stop command instead.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The name of the Task. A DMS Project Task is the activity that performs migration related work. There could be multiple Tasks associated with a Project.
        object-name: Supported by MongoDB migrations only. The qualified name of the database or collection you wish to stop. Leave blank to stop the entire migration.
        project-name: The name of the Project. DMS Project is a logical grouping that encompasses source database connection, target database connection and a list of databases to migrate.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the Service. DMS Service is an Azure instance that performs database migrations.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
