# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a streaming locator.
flags:
    --alternative-media-id=: An alternative media identifier associated with the streaming locator.
    --asset-name=!: The name of the asset used by the streaming locator.
    --content-key-policy-name=: The default content key policy name used by the streaming locator.
    --content-keys=: JSON string with the content keys to be used by the streaming locator.
    --end-time=: The ISO 8601 DateTime end time (Y-m-d'T'H:M:S'Z') of the streaming locator.
    --filters=:
        description: A space-separated list of asset filter names and/or account filter names.
        nargs: -1
    --start-time=: The ISO 8601 DateTime start time (Y-m-d'T'H:M:S'Z') of the streaming locator.
    --streaming-locator-id=: The identifier of the streaming locator.
    --streaming-policy-name=!: The name of the streaming policy used by the streaming locator.
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: The name of the Azure Media Services account.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the streaming locator.
documentation:
    flag:
        account-name: The name of the Azure Media Services account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        alternative-media-id: An alternative media identifier associated with the streaming locator.
        asset-name: The name of the asset used by the streaming locator.
        change-reference: The related change reference ID for this resource operation.
        content-key-policy-name: The default content key policy name used by the streaming locator.
        content-keys: JSON string with the content keys to be used by the streaming locator. Use @{file} to load from a file. For further information about the JSON structure please refer to swagger documentation on https://learn.microsoft.com/rest/api/media/streaminglocators/create#streaminglocatorcontentkey .
        end-time: The ISO 8601 DateTime end time (Y-m-d'T'H:M:S'Z') of the streaming locator.
        filters: A space-separated list of asset filter names and/or account filter names.
        name: The name of the streaming locator.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        start-time: The ISO 8601 DateTime start time (Y-m-d'T'H:M:S'Z') of the streaming locator.
        streaming-locator-id: The identifier of the streaming locator.
        streaming-policy-name: 'The name of the streaming policy used by the streaming locator. You can either create one with ``` az ams streaming policy create ``` or use any of the predefined policies: Predefined_DownloadOnly, Predefined_ClearStreamingOnly, Predefined_DownloadAndClearStreaming, Predefined_ClearKey, Predefined_MultiDrmCencStreaming, Predefined_MultiDrmStreaming.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a streaming locator.: az ams streaming-locator create -n mylocator -a ams -g rg --streaming-policy-name Predefined_ClearStreamingOnly --asset-name asset
