# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: create a gallery image definition
documentation:
    flag:
        features: A list of gallery image features. E.g. "IsSecureBootSupported=true IsMeasuredBootSupported=false"
        hyper-v-generation: The hypervisor generation of the Virtual Machine. Applicable to OS disks only.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --architecture=: CPU architecture.
    --description=: the description of the gallery image definition
    --disallowed-disk-types=:
        description: disk types which would not work with the image, e.g., Standard_LRS
        nargs: -1
    --end-of-life-date=: the end of life date, e.g. '2020-12-31'
    --eula=: The Eula agreement for the gallery image
    --features=: A list of gallery image features.
    --hyper-v-generation=: The hypervisor generation of the Virtual Machine.
    --maximum-cpu-core=: maximum cpu cores
    --maximum-memory=: maximum memory in MB
    --minimum-cpu-core=: minimum cpu cores
    --minimum-memory=: minimum memory in MB
    --os-state=: This property allows the user to specify whether the virtual machines created under this image are 'Generalized' or 'Specialized'.
    --os-type=!: the type of the OS that is included in the disk if creating a VM from user-image or a specialized VHD
    --plan-name=: plan name
    --plan-product=: plan product
    --plan-publisher=: plan publisher
    --privacy-statement-uri=: The privacy statement uri
    --release-note-uri=: The release note uri
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -f, --offer=!: image offer
    -g, --resource-group=!: Name of resource group.
    -i, --gallery-image-definition=!: gallery image definition
    -l, --location=: Location.
    -p, --publisher=!: image publisher
    -r, --gallery-name=!: gallery name
    -s, --sku=!: image sku
completion:
    flag:
        architecture:
            - x64
            - Arm64
        hyper-v-generation:
            - V1
            - V2
        os-state:
            - Generalized
            - Specialized
        os-type:
            - Windows
            - Linux
