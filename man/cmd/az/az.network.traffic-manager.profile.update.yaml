# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a traffic manager profile.
flags:
    --custom-headers=:
        description: Space-separated list of NAME=VALUE pairs.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --interval=: The interval in seconds at which health checks are conducted.
    --max-failures=: The number of consecutive failed health checks tolerated before an endpoint is considered degraded.
    --max-return=: Maximum number of endpoints to be returned for MultiValue routing type.
    --path=: Path to monitor.
    --port=: Port to monitor.
    --protocol=: Monitor protocol.
    --routing-method=: Routing method.
    --status-code-ranges=:
        description: Space-separated list of status codes in MIN-MAX or VAL format.
        nargs: -1
    --status=: Status of the Traffic Manager profile.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --timeout=: The time in seconds allowed for endpoints to respond to a health check.
    --ttl=: DNS config time-to-live in seconds.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Traffic manager profile name
completion:
    flag:
        protocol:
            - HTTP
            - HTTPS
            - TCP
        routing-method:
            - Performance
            - Weighted
            - Priority
            - Geographic
            - Multivalue
            - Subnet
        status:
            - Enabled
            - Disabled
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        custom-headers: Space-separated list of NAME=VALUE pairs.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        interval: The interval in seconds at which health checks are conducted.
        max-failures: The number of consecutive failed health checks tolerated before an endpoint is considered degraded.
        max-return: Maximum number of endpoints to be returned for MultiValue routing type.
        name: Traffic manager profile name.
        path: Path to monitor. Use ""('""' in PowerShell) for none.
        port: Port to monitor.
        protocol: |-
            Monitor protocol.

            Accepted values: HTTP, HTTPS, TCP
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        routing-method: |-
            Routing method.

            Accepted values: Geographic, Multivalue, Performance, Priority, Subnet, Weighted
        status: |-
            Status of the Traffic Manager profile.

            Accepted values: Disabled, Enabled
        status-code-ranges: Space-separated list of status codes in MIN-MAX or VAL format.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        timeout: The time in seconds allowed for endpoints to respond to a health check.
        ttl: DNS config time-to-live in seconds.
examples:
    Update a traffic manager profile to change the TTL to 300.: az network traffic-manager profile update -g MyResourceGroup -n MyTmProfile --ttl 300
    Update a traffic manager profile. (autogenerated): az network traffic-manager profile update --name MyTmProfile --resource-group MyResourceGroup --status Enabled
