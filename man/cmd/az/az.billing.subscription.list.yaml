# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the subscriptions for a billing account.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --customer-name=: The ID that uniquely identifies a customer.
    --invoice-section-name=: The ID that uniquely identifies an invoice section.
    --profile-name=: The ID that uniquely identifies a billing profile.
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        Command group 'billing subscription' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        customer-name: The ID that uniquely identifies a customer.
        invoice-section-name: The ID that uniquely identifies an invoice section.
        profile-name: The ID that uniquely identifies a billing profile.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List subscriptions for an invoice section: az billing subscription list --account-name "{billingAccountName}" --profile-name "{billingProfileName}" --invoice-section-name "{invoiceSectionName}"
