# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show capacity reservation group.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -i, --instance-view=: Retrieve the list of instance views of the capacity reservations under the capacity reservation group which is a snapshot of the runtime properties of a capacity reservation that is managed by the platform and can change outside of control plane operations.
    -n, --capacity-reservation-group=!: The name of the capacity reservation group.
documentation:
    flag:
        capacity-reservation-group: The name of the capacity reservation group.
        instance-view: Retrieve the list of instance views of the capacity reservations under the capacity reservation group which is a snapshot of the runtime properties of a capacity reservation that is managed by the platform and can change outside of control plane operations.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get a capacity reservation group containing the instance views of the capacity reservations under the capacity reservation group: az capacity reservation group show -n ReservationGroupName -g MyResourceGroup --instance-view
    Get a capacity reservation group.: az capacity reservation group show -n ReservationGroupName -g MyResourceGroup
