# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add an Azure storage account configuration to a web app.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --share-name=!: name of the file share as given in the storage account
    --slot-setting=: With slot setting you can decide to make BYOS configuration sticky to a slot, meaning that when that slot is swapped, the storage account stays with that slot.
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: storage account name
    -g, --resource-group=: Name of resource group.
    -i, --custom-id=!: name of the share configured within the web app
    -k, --access-key=!: storage account access key
    -m, --mount-path=: 'the path which the web app uses to read-write data ex: /share1 or /share2'
    -n, --name=: name of the web app.
    -s, --slot=: the name of the slot.
    -t, --storage-type=!: storage type
completion:
    flag:
        storage-type:
            - AzureFiles
            - AzureBlob
documentation:
    flag:
        access-key: Storage account access key.
        account-name: Storage account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        custom-id: Name of the share configured within the web app. --share-name --sn Name of the file share as given in the storage account.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        mount-path: 'The path which the web app uses to read-write data ex: /share1 or /share2.'
        name: Name of the web app. If left unspecified, a name will be randomly generated. You can configure the default using ``` az configure --defaults web=<name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: The name of the slot. Default to the productions slot if not specified.
        slot-setting: |-
            With slot setting you can decide to make BYOS configuration sticky to a slot, meaning that when that slot is swapped, the storage account stays with that slot.

            Default value: False
        storage-type: |-
            Storage type.

            Accepted values: AzureBlob, AzureFiles
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add a connection to the Azure Files file share called MyShare in the storage account named MyStorageAccount.: |-
        az webapp config storage-account add -g MyResourceGroup -n MyUniqueApp \
          --custom-id CustomId \
          --storage-type AzureFiles \
          --account-name MyStorageAccount \
          --share-name MyShare \
          --access-key MyAccessKey \
          --mount-path /path/to/mount
