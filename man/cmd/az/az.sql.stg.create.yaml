# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Server Trust Group.
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --trust-scope=!:
        description: The trust scope of the Server Trust Group.
        nargs: -1
    -g, --resource-group=!: The resource group name
    -l, --location=!: The location name of the Server Trust Group.
    -m, --group-member=!:
        description: Managed Instance that is to be a member of the group.
        nargs: -1
    -n, --name=!: The name of the Server Trust Group.
documentation:
    command: |-
        Command group 'sql stg' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        group-member: |-
            Managed Instance that is to be a member of the group.
                               Specify resource group, subscription id and the name of the instance.
        location: The location name of the Server Trust Group.
        name: The name of the Server Trust Group.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: The resource group name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        trust-scope: The trust scope of the Server Trust Group.
examples:
    Create a Server Trust Group with specified resource ids of its members.: az sql stg create -g resourcegroup -l location -n stg-name --trust-scope GlobalTransactions -m $mi1-id $mi2-id
