# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Server Trust Group.
documentation:
    flag:
        group-member: |-
            Managed Instance that is to be a member of the group.
                               Specify resource group, subscription id and the name of the instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --trust-scope=!:
        description: The trust scope of the Server Trust Group.
        nargs: -1
    -g, --resource-group=!: The resource group name
    -l, --location=!: The location name of the Server Trust Group.
    -m, --group-member=!:
        description: Managed Instance that is to be a member of the group.
        nargs: -1
    -n, --name=!: The name of the Server Trust Group.
