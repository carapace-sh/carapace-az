# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: evaluate
description: Gets the result of evaluating an automatic scaling formula on the Pool.
documentation:
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT'
        auto-scale-formula: The formula for the desired number of Compute Nodes in the Pool. The formula is validated and its results calculated, but it is not applied to the Pool. To apply the formula to the Pool, 'Enable automatic scaling on a Pool'. For more information about specifying this formula, see Automatically scale Compute Nodes in an Azure Batch Pool (https://azure.microsoft.com/en-us/documentation/articles/batch-automatic-scaling). Required.
        json-file: A file containing the content specification in JSON (formatted to match the respective REST API body). If this parameter is specified, all 'Content Arguments' are ignored.
        pool-id: The ID of the Pool on which to evaluate the automatic scaling formula. Required.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --auto-scale-formula=: The formula for the desired number of Compute Nodes in the Pool.
    --json-file=: A file containing the content specification in JSON (formatted to match the respective REST API body).
    --pool-id=!: The ID of the Pool on which to evaluate the automatic scaling formula.
    --subscription=: Name or ID of subscription.
