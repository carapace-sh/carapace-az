# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: assign
description: Update managed identities for an App Configuration store.
documentation:
    flag:
        identities: Accept system-assigned or user-assigned managed identities separated by spaces. Use '[system]' to refer to system-assigned managed identity or a resource ID to refer to user-assigned managed identity. If this argument is not provided or this argument is provided without any value, system-assigned managed identity will be used by default.
        name: Name of the App Configuration store. You can configure the default name using `az configure --defaults app_configuration_store=<name>`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --identities=:
        description: Accept system-assigned or user-assigned managed identities separated by spaces.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name of the App Configuration store.
