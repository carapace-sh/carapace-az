# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a private endpoint connection request for servicebus namespace.
flags:
    --description=: Comments for delete operation.
    --id=: The ID of the private endpoint connection associated with the Service Bus Namespace.
    --namespace-name=: The Service Bus namesapce name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group name of specified Service bus namespace.
    -n, --name=: The name of the private endpoint connection associated with the Service Bus Namespace.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: Comments for delete operation.
        id: The ID of the private endpoint connection associated with the Service Bus Namespace. You can get it using ``` az servicebus namespace show ``` .
        name: The name of the private endpoint connection associated with the Service Bus Namespace.
        namespace-name: The Service Bus namesapce name.
        resource-group: The resource group name of specified Service bus namespace.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete a private endpoint connection request for servicebus namespace by ID.: |-
        id = (az servicebus namespace show -n mynamespace --query "privateEndpointConnections[0].id")
        az servicebus namespace private-endpoint-connection delete --id $id
    Delete a private endpoint connection request for servicebus namespace using account name and connection name.: az servicebus namespace private-endpoint-connection delete -g myRg --namespace-name mynamespace --name myconnection
    Delete a private endpoint connection request for servicebus namespace using namespace name and connection name.: |-
        name = (az servicebus namespace show -n mynamespace --query "privateEndpointConnections[0].name")
        az servicebus namespace private-endpoint-connection delete -g myRg --namespace-name mynamespace --name $name
