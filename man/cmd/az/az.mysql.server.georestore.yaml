# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: georestore
description: Geo-restore a server from backup.
documentation:
    flag:
        backup-retention: The number of days a backup is retained. Range of 7 to 35 days. Default is 7 days.
        geo-redundant-backup: Enable or disable geo-redundant backups. Default value is Disabled. Not supported in Basic pricing tier.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        sku-name: 'The name of the sku. Defaults to sku of the source server. Follows the convention {pricing tier}_{compute generation}_{vCores} in shorthand. Examples: B_Gen5_1, GP_Gen5_4, MO_Gen5_16.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --backup-retention=: The number of days a backup is retained.
    --geo-redundant-backup=: Enable or disable geo-redundant backups.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --sku-name=: The name of the sku.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -l, --location=!: Location.
    -n, --name=: Name of the server.
    -s, --source-server=!: The name or ID of the source server to restore from.
