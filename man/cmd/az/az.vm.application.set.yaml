# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Set applications for VM.
documentation:
    flag:
        app-config-overrides: Space-separated application configuration overrides for each application version ids. It should have the same number of items as the application version ids. Null is available for a application which does not have a configuration override.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Virtual Machine. You can configure the default using `az configure --defaults vm=<name>`
        order-applications: Whether to set order index at each gallery application. If specified, the first app version id gets specified an order = 1, then the next one 2, and so on. This parameter is meant to be used when the VMApplications specified by app version ids must be installed in a particular order; the lowest order is installed first.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        treat-deployment-as-failure: Space-separated list of true or false corresponding to the application version ids. If set to true, failure to install or update gallery application version operation will fail this operation
flags:
    --app-config-overrides=:
        description: Space-separated application configuration overrides for each application version ids.
        nargs: -1
    --app-version-ids=!:
        description: Space-separated application version ids to set to VM.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --order-applications=: Whether to set order index at each gallery application.
    --subscription=: Name or ID of subscription.
    --treat-deployment-as-failure=:
        description: Space-separated list of true or false corresponding to the application version ids.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Virtual Machine.
