# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get managed instance server configuration option.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --mi=: Name of the managed instance.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the server configuration option.
completion:
    flag:
        name:
            - allowPolybaseExport
documentation:
    flag:
        ids: |-
            One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.

            Accepted values: allowPolybaseExport
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show server configuration option allowPolybaseExport on ManagedInstance_1 in ResourceGroup_1: az sql mi server-configuration-option show -g 'ResourceGroup_1' --mi 'ManagedInstance_1' --name allowPolybaseExport
