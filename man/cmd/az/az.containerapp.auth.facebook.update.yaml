# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the app id and app secret for the Facebook identity provider.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --app-id=: The App ID of the app used for login.
    --app-secret-name=: The app secret name that contains the app secret.
    --app-secret=: The app secret.
    --graph-api-version=: The version of the Facebook api to be used while logging in.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --scopes=: A list of the scopes that should be requested while authenticating.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Containerapp.
    -y, --yes=: Do not prompt for confirmation.
