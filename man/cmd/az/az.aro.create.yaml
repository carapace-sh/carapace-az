# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a cluster.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        master-subnet: Name or ID of master vnet subnet.  If name is supplied, `--vnet` must be supplied.
        outbound-type: Outbound type of cluster. Must be "Loadbalancer" or "UserDefinedRouting".
        pod-cidr: CIDR of pod network. Must be a minimum of /18 or larger.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        service-cidr: CIDR of service network. Must be a minimum of /18 or larger.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        vnet: Name or ID of vnet.  If name is supplied, `--vnet-resource-group` must be supplied.
        worker-subnet: Name or ID of worker vnet subnet.  If name is supplied, `--vnet` must be supplied.
flags:
    --apiserver-visibility=: API server visibility.
    --client-id=: Client ID of cluster service principal.
    --client-secret=: Client secret of cluster service principal.
    --cluster-resource-group=: Resource group of cluster.
    --disk-encryption-set=: ResourceID of the DiskEncryptionSet to be used for master and worker VMs.
    --domain=: Domain of cluster.
    --enable-preconfigured-nsg=:
        description: Use Preconfigured NSGs.
        nargs: -1
    --fips-validated-modules=:
        description: Use FIPS validated cryptography modules.
        nargs: -1
    --ingress-visibility=: Ingress visibility.
    --load-balancer-managed-outbound-ip-count=: The desired number of IPv4 outbound IPs created and managed by Azure for the cluster public load balancer.
    --master-encryption-at-host=:
        description: Encryption at host flag for master VMs.
        nargs: -1
    --master-subnet=!: Name or ID of master vnet subnet.
    --master-vm-size=: Size of master VMs.
    --no-wait=: Do not wait for the long-running operation to finish.
    --outbound-type=: Outbound type of cluster.
    --pod-cidr=: CIDR of pod network.
    --pull-secret=: Pull secret of cluster.
    --service-cidr=: CIDR of service network.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --version=: OpenShift version to use for cluster creation.
    --vnet-resource-group=: Name of vnet resource group.
    --vnet=: Name or ID of vnet.
    --worker-count=: Count of worker VMs.
    --worker-encryption-at-host=:
        description: Encryption at host flag for worker VMs.
        nargs: -1
    --worker-subnet=!: Name or ID of worker vnet subnet.
    --worker-vm-disk-size-gb=: Disk size in GB of worker VMs.
    --worker-vm-size=: Size of worker VMs.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of cluster.
completion:
    flag:
        apiserver-visibility:
            - Private
            - Public
        enable-preconfigured-nsg:
            - "true"
            - "false"
        fips-validated-modules:
            - "true"
            - "false"
        ingress-visibility:
            - Private
            - Public
        master-encryption-at-host:
            - "true"
            - "false"
        worker-encryption-at-host:
            - "true"
            - "false"
