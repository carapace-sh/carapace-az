# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get a billing profile by its ID.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --expand=: May be used to expand the invoice sections.
    --subscription=: Name or ID of subscription.
    -n, --name=!: The ID that uniquely identifies a billing profile.
documentation:
    command: |-
        Command group 'billing profile' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        expand: May be used to expand the invoice sections.
        name: The ID that uniquely identifies a billing profile.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show a billing profile with default properties: az billing profile show --account-name "{billingAccountName}" --name "{billingProfileName}"
    Show a billing profile with expaned properties: az billing profile show --expand "invoiceSections" --account-name "{billingAccountName}" --name "{billingProfileName}"
