# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: start
description: Copy a blob asynchronously.
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit'
        auth-mode: 'The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE'
        blob-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with `az storage account show`. Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT'
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING'
        destination-blob: Name of the destination blob. If it exists, it will be overwritten.
        destination-blob-type: Defines the type of blob at the destination. Value of "Detect" determines the type based on source blob type.
        destination-if-match: An ETag value, or the wildcard character (*). Specify this header to perform the operation only if the resource's ETag matches the value specified.
        destination-if-none-match: An ETag value, or the wildcard character (*). Specify this header to perform the operation only if the resource's ETag does not match the value specified. Specify the wildcard character (*) to perform the operation only if the resource does not exist, and fail the operation if it does exist.
        destination-lease-id: The lease ID specified for this header must match the lease ID of the estination blob. If the request does not include the lease ID or it is not valid, the operation fails with status code 412 (Precondition Failed).
        metadata: Metadata in space-separated key=value pairs. This overwrites any existing metadata.
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_SAS_TOKEN'
        source-if-match: An ETag value, or the wildcard character (*). Specify this header to perform the operation only if the resource's ETag matches the value specified.
        source-if-none-match: An ETag value, or the wildcard character (*). Specify this header to perform the operation only if the resource's ETag does not match the value specified. Specify the wildcard character (*) to perform the operation only if the resource does not exist, and fail the operation if it does exist.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tier: The tier value to set the blob to. For page blob, the tier correlates to the size of the blob and number of allowed IOPS. Possible values are P10, P15, P20, P30, P4, P40, P50, P6, P60, P70, P80 and this is only applicable to page blobs on premium storage accounts; For block blob, possible values are Archive, Cold, Cool, and Hot. This is only applicable to block blobs on standard storage accounts.
        timeout: Request timeout in seconds. Applies to each call to the service.
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --auth-mode=: The mode in which to run the command.
    --blob-endpoint=: Storage data service endpoint.
    --connection-string=: Storage account connection string.
    --destination-blob-type=: Defines the type of blob at the destination.
    --destination-if-match=: An ETag value, or the wildcard character (*).
    --destination-if-modified-since=: Commence only if modified since supplied UTC datetime (Y-m-d'T'H:M'Z')
    --destination-if-none-match=: An ETag value, or the wildcard character (*).
    --destination-if-unmodified-since=: Commence only if unmodified since supplied UTC datetime (Y-m-d'T'H:M'Z')
    --destination-lease-id=: The lease ID specified for this header must match the lease ID of the estination blob.
    --destination-tags-condition=: Specify a SQL where clause on blob tags to operate only on blobs with a matching value.
    --metadata=:
        description: Metadata in space-separated key=value pairs.
        nargs: -1
    --requires-sync=:
        description: Enforce that the service will not return a response until the copy is complete.
        nargs: -1
    --sas-token=: A Shared Access Signature (SAS).
    --source-account-key=: The storage account key of the source blob.
    --source-account-name=: The storage account name of the source blob.
    --source-blob=: The blob name for the source storage account.
    --source-container=: The container name for the source storage account.
    --source-if-match=: An ETag value, or the wildcard character (*).
    --source-if-modified-since=: Commence only if modified since supplied UTC datetime (Y-m-d'T'H:M'Z')
    --source-if-none-match=: An ETag value, or the wildcard character (*).
    --source-if-unmodified-since=: Commence only if unmodified since supplied UTC datetime (Y-m-d'T'H:M'Z')
    --source-lease-id=: Specify this to perform the Copy Blob operation only if the lease ID given matches the active lease ID of the source blob.
    --source-path=: The file path for the source storage account.
    --source-sas=: The shared access signature for the source storage account.
    --source-share=: The share name for the source storage account.
    --source-snapshot=: The blob snapshot for the source storage account.
    --source-tags-condition=: Specify a SQL where clause on blob tags to operate only on blobs with a matching value.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tier=: The tier value to set the blob to.
    --timeout=: Request timeout in seconds.
    -b, --destination-blob=!: Name of the destination blob.
    -c, --destination-container=!: The container name.
    -r, --rehydrate-priority=: Indicate the priority with which to rehydrate an archived blob.
    -u, --source-uri=: ""
completion:
    flag:
        auth-mode:
            - login
            - key
        destination-blob-type:
            - Detect
            - BlockBlob
            - PageBlob
            - AppendBlob
        requires-sync:
            - "true"
            - "false"
