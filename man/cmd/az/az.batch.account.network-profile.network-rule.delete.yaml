# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a Network rule from a Network Profile.
flags:
    --ip-address=: IPv4 address or CIDR range.
    --profile=: Network profile to set.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of the resource group.
    -n, --name=: Name of the batch account to show.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        profile:
            - BatchAccount
            - NodeManagement
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ip-address: IPv4 address or CIDR range.
        name: Name of the batch account to show. If not specified will display currently set account.
        profile: |-
            Network profile to set.

            Accepted values: BatchAccount, NodeManagement
        resource-group: Name of the resource group. If not specified will display currently set account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete ip address from BatchAccount network rule: az batch account network-profile network-rule delete -g MyResourceGroup -n MyBatchAccount --profile BatchAccount --ip-address 1.2.3.4
