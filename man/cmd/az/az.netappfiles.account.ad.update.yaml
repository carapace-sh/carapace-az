            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: Updates an active directory to the account.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        active-directory-id: Id of the Active Directory.
        ad-name: Name of the active directory machine. This optional parameter is used only while creating kerberos volume.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        administrators: Users to be added to the Built-in Administrators active directory group. A list of unique usernames without domain specifier  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        aes-encryption: |
            If enabled, AES encryption will be enabled for SMB communication.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        backup-operators: Users to be added to the Built-in Backup Operator active directory group. A list of unique usernames without domain specifier  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        dns: Comma separated list of DNS server IP addresses (IPv4 only) for the Active Directory domain.
        domain: Name of the Active Directory domain.
        encrypt-dc-connections: |-
            If enabled, Traffic between the SMB server to Domain Controller (DC) will be encrypted.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        kdc-ip: kdc server IP address for the active directory machine. This optional parameter is used only while creating kerberos volume.
        ldap-over-tls: |-
            Specifies whether or not the LDAP traffic needs to be secured via TLS.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ldap-search-scope: LDAP Search scope options  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ldap-signing: |-
            Specifies whether or not the LDAP traffic needs to be signed.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        organizational-unit: The Organizational Unit (OU) within the Windows Active Directory.
        password: Plain text password of Active Directory domain administrator, value is masked in the response  If value is blank it's asked from the tty.
        preferred-servers-for-ldap-client: Comma separated list of IPv4 addresses of preferred servers for LDAP client. At most two comma separated IPv4 addresses can be passed.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        security-operators: Domain Users in the Active directory to be given SeSecurityPrivilege privilege (Needed for SMB Continuously available shares for SQL). A list of unique usernames without domain specifier  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        site: The Active Directory site the service will limit Domain Controller discovery to.
        smb-server-name: NetBIOS name of the SMB server. This name will be registered as a computer account in the AD and used to mount volumes.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        username: A domain user account with permission to create machine accounts.
examples:
    Update an active directory on the account: az netappfiles account ad update -g mygroup --name myname --active-directory-id 13641da9-c0e9-4b97-84fc-4f8014a93848 --username ad_username --password ad_password --domain northeurope --dns 1.2.3.4 --smb-server-name SMBSERVER
