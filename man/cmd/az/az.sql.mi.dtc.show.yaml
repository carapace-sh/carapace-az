# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get managed instance DTC settings.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --mi=: The name of the managed instance.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of the resource group
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of the resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Gets the managed instance DTC: az sql mi show --g resourceGroup1 --managed-instance-name managedInstance1
    Gets the managed instance DTC with the specified resource ID: az sql mi show --ids /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup1/providers/Microsoft.Sql/managedInstances/ManagedInstance1/dtc/current
