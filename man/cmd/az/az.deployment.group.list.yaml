# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List deployments at resource group.
documentation:
    flag:
        filter: Filter expression using OData notation. You can use --filter "provisioningState eq '{state}'" to filter provisioningState. To get more information, please visit https://learn.microsoft.com/rest/api/resources/deployments/listatsubscriptionscope#uri-parameters
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --filter=: Filter expression using OData notation.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
