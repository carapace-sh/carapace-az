# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a VPN connection.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --authorization-key=: The authorization key for the VPN connection.
    --egress-nat-rule=:
        description: List of egress NatRules.
        nargs: -1
    --enable-bgp=: Enable BGP for this VPN connection.
    --express-route-circuit2=: Name or ID of the destination ExpressRoute to connect to using an 'ExpressRoute' connection.
    --express-route-gateway-bypass=:
        description: Bypass ExpressRoute gateway for data forwarding.
        nargs: -1
    --ingress-nat-rule=:
        description: List of ingress NatRules.
        nargs: -1
    --local-gateway2=: Name or ID of the destination local network gateway to connect to using an 'IPSec' connection.
    --routing-weight=: Connection routing weight
    --shared-key=: Shared IPSec key.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --use-policy-based-traffic-selectors=:
        description: Enable policy-based traffic selectors.
        nargs: -1
    --validate=: Display and validate the ARM template but do not create any resources.
    --vnet-gateway1=!: Name or ID of the source virtual network gateway.
    --vnet-gateway2=: Name or ID of the destination virtual network gateway to connect to using a 'Vnet2Vnet' connection.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Connection name.
completion:
    flag:
        express-route-gateway-bypass:
            - "true"
            - "false"
        use-policy-based-traffic-selectors:
            - "true"
            - "false"
