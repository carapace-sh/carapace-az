# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a VPN connection.
flags:
    --authorization-key=: The authorization key for the VPN connection.
    --egress-nat-rule=:
        description: List of egress NatRules.
        nargs: -1
    --enable-bgp=: Enable BGP for this VPN connection.
    --express-route-circuit2=: Name or ID of the destination ExpressRoute to connect to using an 'ExpressRoute' connection.
    --express-route-gateway-bypass=:
        description: Bypass ExpressRoute gateway for data forwarding.
        nargs: -1
    --ingress-nat-rule=:
        description: List of ingress NatRules.
        nargs: -1
    --local-gateway2=: Name or ID of the destination local network gateway to connect to using an 'IPSec' connection.
    --routing-weight=: Connection routing weight
    --shared-key=: Shared IPSec key.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --use-policy-based-traffic-selectors=:
        description: Enable policy-based traffic selectors.
        nargs: -1
    --validate=: Display and validate the ARM template but do not create any resources.
    --vnet-gateway1=!: Name or ID of the source virtual network gateway.
    --vnet-gateway2=: Name or ID of the destination virtual network gateway to connect to using a 'Vnet2Vnet' connection.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Connection name.
completion:
    flag:
        express-route-gateway-bypass:
            - "true"
            - "false"
        use-policy-based-traffic-selectors:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: |-
            Acquiring an Azure Policy token automatically for this resource operation.

            Accepted values: Certificate, PSK
        authorization-key: The authorization key for the VPN connection. --cert-auth --certificate-authentication Certificate-based authentication configuration. Provide as JSON string or file path with @ prefix, Expected keys (outboundAuthCertificate, inboundAuthCertificateChain, inboundAuthCertificateSubjectName).
        change-reference: The related change reference ID for this resource operation.
        egress-nat-rule: List of egress NatRules.
        enable-bgp: |-
            Enable BGP for this VPN connection.

            Default value: False
        express-route-circuit2: Name or ID of the destination ExpressRoute to connect to using an 'ExpressRoute' connection.
        express-route-gateway-bypass: |-
            Bypass ExpressRoute gateway for data forwarding.

            Accepted values: false, true
        ingress-nat-rule: List of ingress NatRules.
        local-gateway2: Name or ID of the destination local network gateway to connect to using an 'IPSec' connection.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Connection name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        routing-weight: |-
            Connection routing weight.

            Default value: 10
        shared-key: Shared IPSec key.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        use-policy-based-traffic-selectors: |-
            Enable policy-based traffic selectors.

            Default value: False

            Accepted values: false, true
        validate: |-
            Display and validate the ARM template but do not create any resources.

            Default value: False
        vnet-gateway1: Name or ID of the source virtual network gateway.
        vnet-gateway2: Name or ID of the destination virtual network gateway to connect to using a 'Vnet2Vnet' connection.
examples:
    Create a VPN connection with --ingress-nat-rule.: az network vpn-connection create -g MyResourceGroup -n MyConnection --vnet-gateway1 MyVnetGateway --local-gateway2 MyLocalGateway --shared-key Abc123 --ingress-nat-rule /subscriptions/000/resourceGroups/TestBGPRG1/providers/Microsoft.Network/virtualNetworkGateways/gwx/natRules/nat
    Create a VPN connection with Certificate authentication using inline JSON.: az network vpn-connection create -g MyResourceGroup -n MyConnection           --vnet-gateway1 MyVnetGateway --local-gateway2 MyLocalGateway           --auth-type Certificate --cert-auth '{"outboundAuthCertificate":"https://customerKv.vault/Certificates/outBoundcert/Version","inboundAuthCertificateChain":["MIIC+TCCAeGgAwIBAgIQFOJUqDaxV5xJcKpTKO..","MIIC+TCCAeGgAwIBAgIQPJerInitNblK7yBgkqh.."],"inboundAuthCertificateSubjectName":"CN=rootCert.com"}'
    Create a VPN connection. (autogenerated): az network vpn-connection create --local-gateway2 MyLocalGateway --location westus2 --name MyConnection --resource-group MyResourceGroup --shared-key Abc123 --vnet-gateway1 MyVnetGateway
    Create a site-to-site connection between an Azure virtual network and an on-premises local network gateway.: az network vpn-connection create -g MyResourceGroup -n MyConnection --vnet-gateway1 MyVnetGateway --local-gateway2 MyLocalGateway --shared-key Abc123
