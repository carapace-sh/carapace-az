# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the customers that are billed to a billing account.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --filter=: May be used to filter the list of customers.
    --profile-name=: The ID that uniquely identifies a billing profile.
    --search=: Used for searching customers by their name.
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        Command group 'billing customer' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        filter: May be used to filter the list of customers.
        profile-name: The ID that uniquely identifies a billing profile.
        search: Used for searching customers by their name. Any customer with name containing the search text will be included in the response.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List customers by billing account: az billing customer list --account-name "{billingAccountName}" --profile-name "{billingProfileName}"
