# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Deletes an application package record and its associated binary file.
documentation:
    flag:
        application-name: The name of the application. This must be unique within the account. Required.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        version-name: The version of the application. Required.
flags:
    --application-name=!: The name of the application.
    --subscription=: Name or ID of subscription.
    --version-name=!: The version of the application.
    -g, --resource-group=!: Name of the resource group
    -n, --name=!: Name of the Batch account.
    -y, --yes=: Do not prompt for confirmation.
