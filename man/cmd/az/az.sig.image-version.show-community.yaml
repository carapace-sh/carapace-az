# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-community
description: Get a community gallery image version.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --public-gallery-name=: The public name of the community gallery.
    --subscription=: Name or ID of subscription.
    -e, --gallery-image-version=: Gallery image version in semantic version pattern.
    -i, --gallery-image-name=: The name of the community gallery image definition from which the image versions are to be listed.
    -l, --location=: Location.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        gallery-image-definition: The name of the community gallery image definition from which the image versions are to be listed.
        gallery-image-version: 'The name of the gallery image version to be created. Needs to follow semantic version name pattern: The allowed characters are digit and period. Digits must be within the range of a 32-bit integer. Format: ``` <MajorVersion>.<MinorVersion>.<Patch> ``` .'
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        public-gallery-name: The public name of the community gallery.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get an image version in a gallery community in the given location.: |-
        az sig image-version show-community --public-gallery-name publicGalleryName \
        --gallery-image-definition MyImage --gallery-image-version 1.0.0 --location myLocation
