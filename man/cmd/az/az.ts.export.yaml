# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: export
description: Export the specified template spec version and artifacts (if any) to the specified output folder.
flags:
    --output-folder=!: Existing folder to output export(s).
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the template spec.
    -s, --template-spec=: The template spec resource id.
    -v, --version=: The template spec version.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: The name of the template spec.
        output-folder: Existing folder to output export(s).
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        template-spec: The template spec resource id.
        version: The template spec version.
examples:
    Export the specified template spec version based on resource ID.: az ts export -s resourceID --output-folder C:/path/
    Export the specified template spec version.: az ts export -g testrg --name TemplateSpecName --version VersionName --output-folder C:/path/
