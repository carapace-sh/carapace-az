# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create capacity reservation.
flags:
    --capacity=: Specify the number of virtual machines in the scale set.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -c, --capacity-reservation-group=!: The name of the capacity reservation group.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --capacity-reservation-name=!: The name of the capacity reservation.
    -s, --sku=!: The SKU of the resource for which capacity needs be reserved.
    -z, --zone=: Availability Zone to use for this capacity reservation.
documentation:
    command: |-
        Create operation to create or update a capacity reservation. Please note some properties can be set only during capacity reservation creation. Please refer to
        https://aka.ms/CapacityReservation
        for more details.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        capacity: Specify the number of virtual machines in the scale set.
        capacity-reservation-group: The name of the capacity reservation group. --capacity-reservation-name --name -n The name of the capacity reservation.
        change-reference: The related change reference ID for this resource operation.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: The SKU of the resource for which capacity needs be reserved. Currently VM Skus with the capability called "CapacityReservationSupported" set to true are supported. Refer to List Microsoft.Compute SKUs in a region ( https://learn.microsoft.com/rest/api/compute/resourceskus/list ) for supported values.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        zone: Availability Zone to use for this capacity reservation. The zone has to be single value and also should be part for the list of zones specified during the capacity reservation group creation. The zone can be assigned only during creation. If not provided, the reservation supports only non-zonal deployments. If provided, enforces VM/VMSS using this capacity reservation to be in same zone.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Create a capacity reservation with specific capacity and zones.: az capacity reservation create -c ReservationGroupName -n ReservationName -l centraluseuap -g MyResourceGroup  --sku Standard_A1_v2 --capacity 5 --zone 1 --tags key=val
    Create a capacity reservation.: az capacity reservation create -c ReservationGroupName -n ReservationName -g MyResourceGroup --sku Standard_A0
