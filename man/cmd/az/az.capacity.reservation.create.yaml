# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create capacity reservation.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        sku: The SKU of the resource for which capacity needs be reserved. Currently VM Skus with the capability called "CapacityReservationSupported" set to true are supported. Refer to List Microsoft.Compute SKUs in a region (https://learn.microsoft.com/rest/api/compute/resourceskus/list) for supported values.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        zone: Availability Zone to use for this capacity reservation. The zone has to be single value and also should be part for the list of zones specified during the capacity reservation group creation. If not provided, the reservation supports only non-zonal deployments. If provided, enforces VM/VMSS using this capacity reservation to be in same zone.
flags:
    --capacity=: Specify the number of virtual machines in the scale set.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -c, --capacity-reservation-group=!: The name of the capacity reservation group.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --capacity-reservation-name=!: The name of the capacity reservation.
    -s, --sku=!: The SKU of the resource for which capacity needs be reserved.
    -z, --zone=: Availability Zone to use for this capacity reservation.
