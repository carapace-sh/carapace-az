# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a DevOps Configuration.
documentation:
    flag:
        inventory-list: List of top-level inventory to select when AutoDiscovery is disabled. This field is ignored when AutoDiscovery is enabled.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --authorization-code=: Sets one-time OAuth code to exchange for refresh and access tokens.
    --auto-discovery=: AutoDiscovery states.
    --inventory-list=:
        description: List of top-level inventory to select when AutoDiscovery is disabled.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The security connector name.
completion:
    flag:
        auto-discovery:
            - Disabled
            - Enabled
            - NotApplicable
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
