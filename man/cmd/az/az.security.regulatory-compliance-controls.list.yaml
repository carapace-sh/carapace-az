# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List supported of regulatory compliance controls details and state for selected standard.
flags:
    --standard-name=!: The compliance standard name
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        standard-name: The compliance standard name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get regulatory compliance controls list.: az security regulatory-compliance-controls list --standard-name 'Azure-CIS-1.1.0'
