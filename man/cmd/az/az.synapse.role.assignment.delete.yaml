# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete role assignments of workspace.
flags:
    --assignee-object-id=: Use this parameter instead of '--assignee' to bypass Graph API invocation in case of insufficient privileges.
    --assignee=: Represent a user or service principal.
    --ids=:
        description: space-separated role assignment ids.
        nargs: -1
    --item-type=: Item type granted access in the workspace.
    --item=: Item granted access in the workspace.
    --role=: The role name/id that is assigned to the principal.
    --scope=: A scope defines the resources or artifacts that the access applies to.
    --subscription=: Name or ID of subscription.
    --workspace-name=!: The workspace name.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        item-type:
            - bigDataPools
            - integrationRuntimes
            - credentials
            - linkedServices
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        assignee: 'Represent a user or service principal. Supported format: object id, user sign-in name, or service principal name.'
        assignee-object-id: Use this parameter instead of '--assignee' to bypass Graph API invocation in case of insufficient privileges. This parameter only works with object ids for users, groups, service principals, and managed identities. For managed identities use the principal id. For service principals, use the object id and not the app id.
        change-reference: The related change reference ID for this resource operation.
        ids: space-separated role assignment ids. You should not provide --role or --assignee when --ids is provided.
        item: Item granted access in the workspace. Using with --item-type to combine the scope of assignment.Using az role assignment with filter condition before executing delete operation to be clearly aware of which assignments will be deleted.
        item-type: |-
            Item type granted access in the workspace. Using with --item to combine the scope of assignment.Using az role assignment with filter condition before executing delete operation to be clearly aware of which assignments will be deleted.

            Accepted values: bigDataPools, credentials, integrationRuntimes, linkedServices
        role: The role name/id that is assigned to the principal.
        scope: A scope defines the resources or artifacts that the access applies to. Synapse supports hierarchical scopes. Permissions granted at a higher-level scope are inherited by objects at a lower level. In Synapse RBAC, the top-level scope is a workspace. Using az role assignment with filter condition before executing delete operation to be clearly aware of which assignments will be deleted.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The workspace name.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Delete role assignments by ids.: |-
        az synapse role assignment delete --workspace-name testsynapseworkspace \
        --ids 10000000-0000-0000-0000-10000000-10000000-0000-0000-0000-10000000
    Delete role assignments by objectId of the User, Group or Service Principal.: |-
        az synapse role assignment delete --workspace-name testsynapseworkspace \
        --assignee 00000000-0000-0000-0000-000000000001
    Delete role assignments by role and assignee.: |-
        az synapse role assignment delete --workspace-name testsynapseworkspace \
        --role "Synapse Administrator" --assignee sp_name
    Delete role assignments by role id/name.: |-
        az synapse role assignment delete --workspace-name testsynapseworkspace \
        --role "Synapse Administrator"
    Delete role assignments by scope.: |-
        az synapse role assignment delete --workspace-name testsynapseworkspace \
        --scope "workspaces/testsynapseworkspace/linkedServices/testlinkedServices"
    Delete role assignments by service principal name.: |-
        az synapse role assignment delete --workspace-name testsynapseworkspace \
        --assignee sp_name
    Delete role assignments by user principal name.: |-
        az synapse role assignment delete --workspace-name testsynapseworkspace \
        --assignee username@contoso.com
