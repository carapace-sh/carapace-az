# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show details of a shared access policies in an Azure IoT Hub Device Provisioning Service instance.
flags:
    --policy-name=!: A friendly name for DPS access policy.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --dps-name=!: IoT Hub Device Provisioning Service name
documentation:
    flag:
        dps-name: IoT Hub Device Provisioning Service name. --pn --policy-name A friendly name for DPS access policy.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show details of shared access policy 'MyPolicy' in the Azure IoT Hub Device Provisioning Service instance 'MyDps': az iot dps policy show --dps-name MyDps --resource-group MyResourceGroup --policy-name MyPolicy
