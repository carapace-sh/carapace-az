# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a failover group.
flags:
    --add-db=:
        description: List of databases to add to Failover Group
        nargs: -1
    --failover-policy=: The failover policy of the Failover Group
    --grace-period=: Interval in hours before automatic failover is initiated if an outage occurs on the primary server.
    --partner-resource-group=: The name of the resource group of the partner server
    --partner-server=!: The name of the partner server of a Failover Group
    --secondary-type=: Databases secondary type on partner server
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Failover Group
    -s, --server=!: Name of the Azure SQL Server.
completion:
    flag:
        failover-policy:
            - Automatic
            - Manual
        secondary-type:
            - Geo
            - Standby
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add-db: List of databases to add to Failover Group.
        change-reference: The related change reference ID for this resource operation.
        failover-policy: |-
            The failover policy of the Failover Group.

            Default value: Manual

            Accepted values: Automatic, Manual
        grace-period: |-
            Interval in hours before automatic failover is initiated if an outage occurs on the primary server. This indicates that Azure SQL Database will not initiate automatic failover before the grace period expires. Please note that failover operation with --allow-data-loss option might cause data loss due to the nature of asynchronous synchronization.

            Default value: 1
        name: The name of the Failover Group.
        partner-resource-group: The name of the resource group of the partner server.
        partner-server: The name of the partner server of a Failover Group.
        partner-server-ids: The list of partner server resource id's of the Failover Group.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        ro-endpoint-target: The resource id of the read only endpoint target server.
        ro-failover-policy: |-
            The policy of the read only endpoint of the Failover Group.

            Default value: Disabled

            Accepted values: Disabled, Enabled
        secondary-type: |-
            Databases secondary type on partner server.

            Accepted values: Geo, Standby
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Creates a failover group. (autogenerated): az sql failover-group create --name MyFailoverGroup --partner-server newDb --resource-group MyResourceGroup --server myserver --subscription MySubscription
