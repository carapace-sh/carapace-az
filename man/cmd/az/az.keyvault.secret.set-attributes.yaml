# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-attributes
description: Update properties of a secret other than its value.
flags:
    --content-type=: Type of the secret value such as a password.
    --enabled=:
        description: Enable the secret.
        nargs: -1
    --expires=: Expiration UTC datetime (Y-m-d'T'H:M:S'Z').
    --id=: Id of the secret.
    --not-before=: Secret not usable before the provided UTC datetime (Y-m-d'T'H:M:S'Z').
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vault-name=: Name of the Key Vault.
    -n, --name=: Name of the secret.
    -v, --version=: The secret version.
completion:
    flag:
        enabled:
            - "true"
            - "false"
documentation:
    command: Updates the attributes associated with a specified secret in a given key vault.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        content-type: Type of the secret value such as a password.
        enabled: |-
            Enable the secret.

            Accepted values: false, true
        expires: Expiration UTC datetime (Y-m-d'T'H:M:S'Z').
        id: Id of the secret. If specified all other 'Id' arguments should be omitted.
        name: Name of the secret. Required if --id is not specified.
        not-before: Secret not usable before the provided UTC datetime (Y-m-d'T'H:M:S'Z').
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        vault-name: Name of the Key Vault. Required if --id is not specified.
        version: The secret version. If omitted, uses the latest version.
