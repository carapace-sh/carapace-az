# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a rule.
documentation:
    flag:
        address-pool: Name or ID of the backend address pool. If only one exists, omit to use as default.
        listener: Name or ID of the listener. If only one exists, omit to use as default.
        priority: Priority of the routing rule. Supported SKU tiers are Standard_v2, WAF_v2.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        settings: Name or ID of the settings. If only one exists, omit to use as default.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --address-pool=: Name or ID of the backend address pool.
    --gateway-name=!: Name of the application gateway.
    --listener=: Name or ID of the listener.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --priority=: Priority of the routing rule.
    --rule-type=: Type of the routing rule.
    --settings=: Name or ID of the settings.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the routing rule.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        rule-type:
            - Basic
            - PathBasedRouting
