# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add one backend address into the load balance backend address pool.
flags:
    --admin-state=: A list of administrative states which once set can override health probe so that Load Balancer will always forward new connections to backend, or deny new connections and reset existing connections.
    --ip-address=!: IP Address belonging to the referenced virtual network.
    --lb-name=!: The name of the load balancer.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --pool-name=!: The name of the backend address pool.
    --subnet=: Name or Id of the subnet.
    --subscription=: Name or ID of subscription.
    --vnet=: Name or Id of the virtual network
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the backend address.
completion:
    flag:
        admin-state:
            - Down
            - None
            - Up
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        admin-state: |-
            A list of administrative states which once set can override health probe so that Load Balancer will always forward new connections to backend, or deny new connections and reset existing connections.

            Accepted values: Down, None, Up
        change-reference: The related change reference ID for this resource operation.
        ip-address: IP Address belonging to the referenced virtual network.
        lb-name: The name of the load balancer.
        name: Name of the backend address.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        pool-name: The name of the backend address pool.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subnet: Name or Id of the subnet. (If name is provided, vnet is also required; If id, vnet is not required).
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Add one backend address into the load balance backend address pool with subnet.: az network lb address-pool address add -g MyResourceGroup --lb-name MyLb --pool-name MyAddressPool -n MyAddress --subnet /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyRg/providers/Microsoft.Network/virtualNetworks/vnet/subnets/subnet1 --ip-address 10.0.0.1
    Add one backend address into the load balance backend address pool.: az network lb address-pool address add -g MyResourceGroup --lb-name MyLb --pool-name MyAddressPool -n MyAddress --vnet MyVnet --ip-address 10.0.0.1
