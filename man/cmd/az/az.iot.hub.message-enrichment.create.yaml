# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a message enrichment for chosen endpoints in your IoT Hub
flags:
    --subscription=: Name or ID of subscription.
    -e, --endpoints=!:
        description: Endpoint(s) to apply enrichments to.
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -k, --key=!: The enrichment's key.
    -n, --name=!: IoT Hub name.
    -v, --value=!: The enrichment's value.
documentation:
    command: Create a message enrichment for chosen endpoints in your IoT Hub.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        endpoints: Endpoint(s) to apply enrichments to. Use a space-separated list for multiple endpoints.
        key: The enrichment's key.
        name: IoT Hub name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        value: The enrichment's value.
examples:
    Create a message enrichment of {"key":"value"} for the "events" endpoint in your IoT Hub: az iot hub message-enrichment create --key key --value value --endpoints events -n {iothub_name}
