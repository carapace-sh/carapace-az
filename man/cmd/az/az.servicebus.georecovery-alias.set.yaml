# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Sets Service Bus Geo-Disaster Recovery Configuration Alias for the give Namespace
flags:
    --alternate-name=: Alternate Name (Post failover) for Primary Namespace, when Namespace name and Alias name are same
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --namespace-name=: Name of Namespace
    --no-wait=: Do not wait for the long-running operation to finish.
    --partner-namespace=!: Name (if within the same resource group) or ARM Id of Primary/Secondary Service Bus  namespace name, which is part of GEO DR pairing
    --subscription=: Name or ID of subscription.
    -a, --alias=!: Name of the Geo-Disaster Recovery Configuration Alias
    -g, --resource-group=: Name of resource group.
documentation:
    command: Sets Service Bus Geo-Disaster Recovery Configuration Alias for the give Namespace.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        alias: Name of the Geo-Disaster Recovery Configuration Alias.
        alternate-name: Alternate Name (Post failover) for Primary Namespace, when Namespace name and Alias name are same.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        namespace-name: Name of Namespace.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        partner-namespace: Name (if within the same resource group) or ARM Id of Primary/Secondary Service Bus  namespace name, which is part of GEO DR pairing.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Sets Geo Disaster Recovery configuration - Alias for the give Namespace: az servicebus georecovery-alias set --resource-group myresourcegroup --namespace-name primarynamespace --alias myaliasname --partner-namespace armresourceid
    Sets Service Bus Geo-Disaster Recovery Configuration Alias for the give Namespace (autogenerated): az servicebus georecovery-alias set --alias myaliasname --namespace-name primarynamespace --partner-namespace armresourceid --resource-group myresourcegroup --subscription MySubscription
