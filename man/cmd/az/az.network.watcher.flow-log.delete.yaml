# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete the specified flow log resource.
documentation:
    flag:
        location: Location to identify the exclusive Network Watcher under a region. Only one Network Watcher can be existed per subscription and region.  When not specified, the location of the resource group will be used.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -l, --location=: Location to identify the exclusive Network Watcher under a region.
    -n, --name=!: The name of the flow logger.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
