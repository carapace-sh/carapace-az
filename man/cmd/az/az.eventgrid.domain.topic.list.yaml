# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List available topics in a domain.
flags:
    --domain-name=!: Name of the domain.
    --odata-query=: The OData query used for filtering the list results.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        domain-name: Name of the domain.
        odata-query: 'The OData query used for filtering the list results. Filtering is currently allowed on the Name property only. The supported operations include: CONTAINS, eq (for equal), ne (for not equal), AND, OR and NOT.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all domain topics in a domain except the domain topic with name "name1": az eventgrid domain topic list -g rg1 --domain-name domain1 --odata-query "NOT (name eq 'name1')"
    List all domain topics in a domain whose name contains the pattern "XYZ": az eventgrid domain topic list -g rg1 --domain-name domain1 --odata-query "Contains(name, 'XYZ')"
    List all topics in a domain.: az eventgrid domain topic list -g rg1 --domain-name domain1
