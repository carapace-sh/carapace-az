# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a test configuration to a connection monitor.
documentation:
    flag:
        frequency: 'The frequency of test evaluation, in seconds.  Default: 60.'
        http-method: 'The HTTP method to use. Allowed values: Get, Post.'
        http-path: The path component of the URI. For instance, "/dir1/dir2".
        http-request-header: The HTTP headers to transmit with the request. List of property=value pairs to define HTTP headers.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        http-valid-status-codes: HTTP status codes to consider successful. For instance, "2xx,301-304,418".  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        icmp-disable-trace-route: 'Value indicating whether path evaluation with trace route should be disabled. false is default.  Allowed values: false, true.'
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        preferred-ip-version: 'The preferred IP version to use in test evaluation. The connection monitor may choose to use a different version depending on other parameters.  Allowed values: IPv4, IPv6.'
        protocol: 'The protocol to use in test evaluation.  Allowed values: Http, Icmp, Tcp.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tcp-disable-trace-route: 'Value indicating whether path evaluation with trace route should be disabled. false is default.  Allowed values: false, true.'
        tcp-port-behavior: 'Destination port behavior.  Allowed values: ListenIfAvailable,  None.'
        test-groups: Space-separated list of names of test group which only need to be affected if specified.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --connection-monitor=!: Connection monitor name.
    --frequency=: The frequency of test evaluation, in seconds.
    --http-method=: The HTTP method to use.
    --http-path=: The path component of the URI.
    --http-port=: The port to connect to.
    --http-prefer-https=:
        description: Value indicating whether HTTPS is preferred over HTTP in cases where the choice is not explicit.
        nargs: -1
    --http-request-header=:
        description: The HTTP headers to transmit with the request.
        nargs: -1
    --http-valid-status-codes=:
        description: HTTP status codes to consider successful.
        nargs: -1
    --icmp-disable-trace-route=:
        description: Value indicating whether path evaluation with trace route should be disabled.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --preferred-ip-version=: The preferred IP version to use in test evaluation.
    --protocol=!: The protocol to use in test evaluation.
    --subscription=: Name or ID of subscription.
    --tcp-disable-trace-route=:
        description: Value indicating whether path evaluation with trace route should be disabled.
        nargs: -1
    --tcp-port-behavior=: Destination port behavior.
    --tcp-port=: The port to connect to.
    --test-groups=!:
        description: Space-separated list of names of test group which only need to be affected if specified.
        nargs: -1
    --threshold-failed-percent=: The maximum percentage of failed checks permitted for a test to evaluate as successful.
    --threshold-round-trip-time=: The maximum round-trip time in milliseconds permitted for a test to evaluate as successful.
    -l, --location=!: Location.
    -n, --name=!: The name of the connection monitor test configuration.
completion:
    flag:
        http-method:
            - Get
            - Post
        http-prefer-https:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        icmp-disable-trace-route:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        preferred-ip-version:
            - IPv4
            - IPv6
        protocol:
            - Http
            - Icmp
            - Tcp
        tcp-disable-trace-route:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        tcp-port-behavior:
            - ListenIfAvailable
            - None
