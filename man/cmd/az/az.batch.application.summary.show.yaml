# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets information about the specified Application.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --application-id=!: The ID of the Application.
    --subscription=: Name or ID of subscription.
documentation:
    command: Gets information about the specified application.
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        application-id: The ID of the Application. Required.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
