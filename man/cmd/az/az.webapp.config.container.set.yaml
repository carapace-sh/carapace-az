# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Set an existing web app's container settings.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --multicontainer-config-file=: config file for multicontainer apps
    --multicontainer-config-type=: config type
    --subscription=: Name or ID of subscription.
    -c, --container-image-name=: The container custom image name and optionally the tag name (e.g., `<registry-name>/<image-name>:<tag>`)
    -g, --resource-group=: Name of resource group.
    -n, --name=: name of the web app.
    -p, --container-registry-password=: The container registry server password
    -r, --container-registry-url=: The container registry server url
    -s, --slot=: the name of the slot.
    -t, --enable-app-service-storage=:
        description: enables platform storage (custom container only)
        nargs: -1
    -u, --container-registry-user=: The container registry server username
completion:
    flag:
        enable-app-service-storage:
            - "true"
            - "false"
        multicontainer-config-type:
            - COMPOSE
            - KUBE
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        container-registry-password: The container registry server password.
        container-registry-url: The container registry server url.
        container-registry-user: The container registry server username.
        docker-custom-image-name: Option '--docker-custom-image-name' has been deprecated and will be removed in a future release. Use '--container-image-name' instead. The container custom image name and optionally the tag name (e.g., ``` <registry-name>/<image-name>:<tag> ``` ).
        docker-registry-server-password: Option '--docker-registry-server-password' has been deprecated and will be removed in a future release. Use '--container-registry-password' instead. The container registry server password.
        docker-registry-server-url: Option '--docker-registry-server-url' has been deprecated and will be removed in a future release. Use '--container-registry-url' instead. The container registry server url.
        docker-registry-server-user: Option '--docker-registry-server-user' has been deprecated and will be removed in a future release. Use '--container-registry-user' instead. The container registry server username.
        enable-app-service-storage: |-
            Enables platform storage (custom container only).

            Accepted values: false, true
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        multicontainer-config-file: Config file for multicontainer apps.
        multicontainer-config-type: |-
            Config type.

            Accepted values: COMPOSE, KUBE
        name: Name of the web app. If left unspecified, a name will be randomly generated. You can configure the default using ``` az configure --defaults web=<name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: The name of the slot. Default to the productions slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Set a web app container's settings. (autogenerated): az webapp config container set --docker-custom-image-name MyDockerCustomImage --docker-registry-server-password StrongPassword --docker-registry-server-url https://{azure-container-registry-name}.azurecr.io --docker-registry-server-user DockerUserId --name MyWebApp --resource-group MyResourceGroup
