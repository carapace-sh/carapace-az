# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: validate
description: Validate whether a template is syntactically correct.
documentation:
    flag:
        no-prompt: The option to disable the prompt of missing parameters for ARM template. When the value is true, the prompt requiring users to provide missing parameter will be ignored. The default value is false.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --mode=: Incremental (only add resources to resource group) or Complete (remove extra resources from resource group)
    --no-prompt=:
        description: The option to disable the prompt of missing parameters for ARM template.
        nargs: -1
    --rollback-on-error=:
        description: The name of a deployment to roll back to on error, or use as a flag to roll back to the last successful deployment.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -f, --template-file=: a path to a template file or Bicep file in the file system
    -g, --resource-group=!: Name of resource group.
    -j, --handle-extended-json-format=: Support to handle extended template content including multiline and comments in deployment
    -p, --parameters=:
        description: the deployment parameters
        nargs: -1
    -u, --template-uri=: a uri to a remote template file
completion:
    flag:
        mode:
            - Incremental
            - Complete
        no-prompt:
            - "true"
            - "false"
