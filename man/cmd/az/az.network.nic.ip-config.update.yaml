# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an IP configuration.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --app-gateway-address-pools=:
        description: Space-separated list of names or IDs of application gateway backend address pools to associate with the NIC.
        nargs: -1
    --application-security-groups=:
        description: Space-separated list of application security groups.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --gateway-lb=: ID of gateway load balancer frontend IP.
    --gateway-name=: Name of the application gateway.
    --lb-address-pools=:
        description: Space-separated list of names or IDs of load balancer address pools to associate with the NIC.
        nargs: -1
    --lb-inbound-nat-rules=:
        description: Space-separated list of names or IDs of load balancer inbound NAT rules to associate with the NIC.
        nargs: -1
    --lb-name=: Name of the load balancer
    --make-primary=:
        description: Set to make this configuration the primary one for the NIC.
        nargs: -1
    --nic-name=!: Name of the network interface (NIC).
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --private-ip-address-version=: Version of private IP address to use.
    --private-ip-address=: Static IP address to use or ""('""' in PowerShell) to use a dynamic address.
    --private-ip-prefix-len=: The private IP address prefix length.
    --public-ip-address=: Name or ID of an existing public IP address.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subnet=: Name or ID of an existing subnet.
    --subscription=: Name or ID of subscription.
    --vnet-name=: Name of the virtual network.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the IP configuration.
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        make-primary:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        private-ip-address-version:
            - IPv4
            - IPv6
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        app-gateway-address-pools: Space-separated list of names or IDs of application gateway backend address pools to associate with the NIC. If names are used, `--gateway-name` must be specified.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        application-security-groups: Space-separated list of application security groups.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        gateway-lb: ID of gateway load balancer frontend IP. If you want to delete it, input null.
        gateway-name: '``` must be specified.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        lb-address-pools: Space-separated list of names or IDs of load balancer address pools to associate with the NIC. If names are used, `--lb-name` must be specified.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        lb-inbound-nat-rules: Space-separated list of names or IDs of load balancer inbound NAT rules to associate with the NIC. If names are used, `--lb-name` must be specified.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        lb-name: '``` must be specified.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        make-primary: |-
            Set to make this configuration the primary one for the NIC.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        name: Name of the IP configuration.
        nic-name: Name of the network interface (NIC).
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        private-ip-address: Static IP address to use or ""('""' in PowerShell) to use a dynamic address.
        private-ip-address-version: |-
            Version of private IP address to use.

            Accepted values: IPv4, IPv6
        private-ip-prefix-len: The private IP address prefix length. If specified and the allocation method is dynamic, the service will allocate a CIDR block instead of a single IP address.
        public-ip-address: Name or ID of an existing public IP address.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subnet: Name or ID of an existing subnet. If name specified, please also specify `--vnet-name`.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vnet-name: Name of the virtual network.
examples:
    Make an IP configuration the default for the supplied NIC.: az network nic ip-config update -g MyResourceGroup --nic-name MyNic -n MyIpConfig --make-primary
    Update a NIC to use a new private IP address.: az network nic ip-config update -g MyResourceGroup --nic-name MyNic -n MyIpConfig --private-ip-address 10.0.0.9
