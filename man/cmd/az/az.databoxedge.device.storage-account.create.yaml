# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create storage account on the device.
flags:
    --data-policy=!: Data policy of the storage Account.
    --description=: Description for the storage Account.
    --device-name=!: The device name.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --sac-id=: Storage Account Credential Id
    --storage-account-status=: Current status of the storage account
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The StorageAccount name.
completion:
    flag:
        data-policy:
            - Cloud
            - Local
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        storage-account-status:
            - NeedsAttention
            - OK
            - Offline
            - Unknown
            - Updating
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        data-policy: |-
            Data policy of the storage Account.

            Accepted values: Cloud, Local
        description: Description for the storage Account.
        device-name: The device name. --name --storage-account-name -n The StorageAccount name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        storage-account-status: |-
            Current status of the storage account.

            Accepted values: NeedsAttention, OK, Offline, Unknown, Updating
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create storage account: az databoxedge device storage-account create -g rg --device-name name -n sa-name --data-policy cloud  --storage-account-status ok --storage-account-credential-id /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg/providers/Microsoft.DataBoxEdge/dataBoxEdgeDevices/device/storageAccountCredentials/sac-name
