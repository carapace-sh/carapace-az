# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create storage account on the device.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --data-policy=!: Data policy of the storage Account.
    --description=: Description for the storage Account.
    --device-name=!: The device name.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --sac-id=: Storage Account Credential Id
    --storage-account-status=: Current status of the storage account
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The StorageAccount name.
completion:
    flag:
        data-policy:
            - Cloud
            - Local
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        storage-account-status:
            - NeedsAttention
            - OK
            - Offline
            - Unknown
            - Updating
