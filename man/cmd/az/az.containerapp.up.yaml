# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: up
description: Create or update a container app as well as any associated resources (ACR, resource group, container apps environment, GitHub Actions, etc.)
documentation:
    flag:
        branch: The branch of the Github repo. Assumed to be the Github repo's default branch if not specified.
        context-path: Path in the repo from which to run the docker build. Defaults to "./". Dockerfile is assumed to be named "Dockerfile" and in this directory.
        env-vars: A list of environment variable(s) for the container. Space-separated values in 'key=value' format. Empty string to clear existing values. Prefix value with 'secretref:' to reference a secret.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        logs-workspace-id: Workspace ID of the Log Analytics workspace to send diagnostics logs to. You can use "az monitor log-analytics workspace create" to create one. Extra billing may apply.
        logs-workspace-key: Log Analytics workspace key to configure your Log Analytics workspace. You can use "az monitor log-analytics workspace get-shared-keys" to retrieve the key.
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        registry-password: The password to log in to container registry. If stored as a secret, value must start with 'secretref:' followed by the secret name.
        repo: 'Create an app via Github Actions. In the format: `https://github.com/<owner>/<repository-name>` or `<owner>/<repository-name>`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        service-principal-client-id: The service principal client ID. Used by Github Actions to authenticate with Azure.
        service-principal-client-secret: The service principal client secret. Used by Github Actions to authenticate with Azure.
        service-principal-tenant-id: The service principal tenant ID. Used by Github Actions to authenticate with Azure.
        source: 'Local directory path containing the application source and Dockerfile for building the container image. Preview: If no Dockerfile is present, a container image is generated using buildpacks. If Docker is not running or buildpacks cannot be used, Oryx will be used to generate the image. See the supported Oryx runtimes here: https://github.com/microsoft/Oryx/blob/main/doc/supportedRuntimeVersions.md.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        token: 'A Personal Access Token with write access to the specified repository. For more information: https://help.github.com/en/github/authenticating-to-github/creating-a-personal-access-token-for-the-command-line. If not provided or not found in the cache (and using --repo), a browser page will be opened to authenticate with Github.'
flags:
    --browse=: Open the app in a web browser after creation and deployment, if possible.
    --context-path=: Path in the repo from which to run the docker build.
    --env-vars=:
        description: A list of environment variable(s) for the container.
        nargs: -1
    --environment=: Name or resource ID of the container app's environment.
    --ingress=: The ingress type.
    --logs-workspace-id=: Workspace ID of the Log Analytics workspace to send diagnostics logs to.
    --logs-workspace-key=: Log Analytics workspace key to configure your Log Analytics workspace.
    --registry-password=: The password to log in to container registry.
    --registry-server=: The container registry server hostname, e.g. myregistry.azurecr.io.
    --registry-username=: The username to log in to container registry.
    --repo=: Create an app via Github Actions.
    --service-principal-client-id=: The service principal client ID.
    --service-principal-client-secret=: The service principal client secret.
    --service-principal-tenant-id=: The service principal tenant ID.
    --source=: Local directory path containing the application source and Dockerfile for building the container image.
    --subscription=: Name or ID of subscription.
    --target-port=: The application port used for ingress traffic.
    --token=: A Personal Access Token with write access to the specified repository.
    -b, --branch=: The branch of the Github repo.
    -g, --resource-group=: Name of resource group.
    -i, --image=: Container image, e.g. publisher/image-name:tag.
    -l, --location=: Location.
    -n, --name=!: The name of the Containerapp.
    -w, --workload-profile-name=: The friendly name for the workload profile
completion:
    flag:
        ingress:
            - internal
            - external
