# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: fabric-sql
description: Create a functionapp connection to fabric-sql.
flags:
    --appconfig-id=: The app configuration id to store configuration
    --client-type=: The client type used on the functionapp
    --connection=: Name of the functionapp connection.
    --connstr-props=:
        description: The additional connection string properties used to build connection string.
        nargs: -1
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --fabric-sql-db-uuid=: UUID of the target Fabric SQL database.
    --fabric-workspace-uuid=: UUID of Fabric workspace which contains the target SQL database.
    --no-wait=: Do not wait for the long-running operation to finish.
    --opt-out=:
        description: Whether to disable some configuration steps.
        nargs: -1
    --source-id=: The resource id of a functionapp.
    --subscription=: Name or ID of subscription.
    --system-identity=:
        description: The system assigned identity auth info
        nargs: -1
    --target-id=: The resource id of target service.
    --user-identity=:
        description: The user assigned identity auth info
        nargs: -1
    --vault-id=: The id of key vault to store secret value
    -g, --resource-group=: The resource group which contains the function app.
    -n, --name=: Name of the function app.
completion:
    flag:
        client-type:
            - dotnet
            - java
            - python
            - go
            - php
            - none
        opt-out:
            - publicnetwork
            - configinfo
            - auth
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        appconfig-id: The app configuration id to store configuration.
        change-reference: The related change reference ID for this resource operation.
        client-type: |-
            The client type used on the functionapp.

            Accepted values: dotnet, go, java, none, php, python
        connection: Name of the functionapp connection.
        connstr-props: The additional connection string properties used to build connection string.
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        fabric-sql-db-uuid: UUID of the target Fabric SQL database. Required if '--target-id' is not specified.
        fabric-workspace-uuid: UUID of Fabric workspace which contains the target SQL database. Required if '--target-id' is not specified.
        name: Name of the function app. Required if '--source-id' is not specified.None.
        new: |-
            Deleting existing users with the same name before creating a new user in database.

            Default value: False
        no-recreate: |-
            Skip executing creation operation when no updates to an existing connection.

            Default value: False

            Accepted values: false, true
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        opt-out: |-
            Whether to disable some configuration steps. Use configinfo to disbale configuration information changes on source. Use publicnetwork to disable public network access configuration.Use auth to skip auth configuration such as enabling managed identity and granting RBAC roles.

            Accepted values: auth, configinfo, publicnetwork
        resource-group: The resource group which contains the function app. Required if '--source-id' is not specified.None.
        source-id: The resource id of a functionapp. Required if ['--resource-group', '--name'] are not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-identity: 'The flag to use system assigned identity auth info. No additional parameters are needed. Usage: --system-identity.'
        target-id: The resource id of target service. Required if ['--fabric-workspace-uuid', '--fabric-sql-db-uuid'] are not specified.
        user-identity: 'The user assigned identity auth info. Usage: --user-identity client-id=XX subs-id=XX client-id      : Required. Client id of the user assigned identity. subs-id        : Required. Subscription id of the user assigned identity.'
        vault-id: The id of key vault to store secret value.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Create a connection between functionapp and fabric-sql interactively: az functionapp connection create fabric-sql
    Create a connection between functionapp and fabric-sql with resource id: az functionapp connection create fabric-sql --source-id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.Web/sites/{site} --target-id https://api.fabric.microsoft.com/v1/workspaces/{fabric_workspace_uuid}/SqlDatabases/{fabric_sql_db_uuid} --system-identity
    Create a connection between functionapp and fabric-sql with resource name: az functionapp connection create fabric-sql -g FuncAppRG -n MyFunctionApp --fabric-workspace-uuid TargetFabricWorkspaceUUID --fabric-sql-db-uuid TargetFabricSQLDatabaseUUID --system-identity
