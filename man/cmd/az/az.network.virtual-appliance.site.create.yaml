# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Azure network virtual appliance site.
flags:
    --address-prefix=: Address Prefix of Network Virtual Appliance Site.
    --allow=:
        description: Flag to control breakout of o365 allow category.
        nargs: -1
    --appliance-name=!: The name of Network Virtual Appliance.
    --default=:
        description: Flag to control breakout of o365 default category.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --optimize=:
        description: Flag to control breakout of o365 optimize category.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of Network Virtual Appliance Site.
completion:
    flag:
        allow:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        default:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        optimize:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        address-prefix: Address Prefix of Network Virtual Appliance Site.
        allow: |-
            Flag to control breakout of o365 allow category. Allowed values: false, true.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        appliance-name: The name of Network Virtual Appliance.
        change-reference: The related change reference ID for this resource operation.
        default: |-
            Flag to control breakout of o365 default category. Allowed values: false, true.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        name: The name of Network Virtual Appliance Site.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        optimize: |-
            Flag to control breakout of o365 optimize category. Allowed values: false, true.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create an Azure network virtual appliance site.: az network virtual-appliance site create -n MyName -g MyRG --appliance-name MyAppliance --address-prefix 10.0.0.0/24 --allow --default --optimize
