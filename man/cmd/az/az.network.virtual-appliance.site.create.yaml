# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Azure network virtual appliance site.
documentation:
    flag:
        allow: 'Flag to control breakout of o365 allow category. Allowed values: false, true.'
        default: 'Flag to control breakout of o365 default category. Allowed values: false, true.'
        optimize: 'Flag to control breakout of o365 optimize category. Allowed values: false, true.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --address-prefix=: Address Prefix of Network Virtual Appliance Site.
    --allow=:
        description: Flag to control breakout of o365 allow category.
        nargs: -1
    --appliance-name=!: The name of Network Virtual Appliance.
    --default=:
        description: Flag to control breakout of o365 default category.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --optimize=:
        description: Flag to control breakout of o365 optimize category.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of Network Virtual Appliance Site.
completion:
    flag:
        allow:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        default:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        optimize:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
