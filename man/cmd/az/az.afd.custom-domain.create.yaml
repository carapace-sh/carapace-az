# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new domain within the specified profile.
flags:
    --azure-dns-zone=: ID of the Azure DNS zone.
    --certificate-type=: Defines the source of the SSL certificate.
    --host-name=: The host name of the domain.
    --minimum-tls-version=: TLS protocol version that will be used for Https
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
    --secret=: Resource reference to the secret.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the domain under the profile which is unique globally
completion:
    flag:
        certificate-type:
            - AzureFirstPartyManagedCertificate
            - CustomerCertificate
            - ManagedCertificate
        minimum-tls-version:
            - TLS10
            - TLS12
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        azure-dns-zone: ID of the Azure DNS zone.
        certificate-type: |-
            Defines the source of the SSL certificate.

            Accepted values: AzureFirstPartyManagedCertificate, CustomerCertificate, ManagedCertificate
        change-reference: The related change reference ID for this resource operation.
        cipher-suite-set-type: |-
            Cipher suite set type that will be used for Https.

            Accepted values: Customized, TLS10_2019, TLS12_2022, TLS12_2023
        customized-cipher-suite-set: Customized cipher suites object that will be used for Https when cipherSuiteSetType is Customized.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        host-name: The host name of the domain. Must be a domain name.
        minimum-tls-version: |-
            TLS protocol version that will be used for Https.

            Accepted values: TLS10, TLS12, TLS13
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        profile-name: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        secret: Resource reference to the secret. ie. subs/rg/profile/secret.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a custom domain that uses AFD managed certificate for SSL/TLS encryption.: az afd custom-domain create -g group --custom-domain-name customDomain --profile-name profile --host-name www.contoso.com --minimum-tls-version TLS12 --certificate-type ManagedCertificate
    ? Create a custom domain that uses your own certificate for SSL/TLS encryption, the certificate is stored in Azure Key Vault and referenced by an AFD secret.
    : az afd custom-domain create -g group --custom-domain-name example-custom-domain --profile-name profile --host-name www.contoso.com --minimum-tls-version TLS12 --certificate-type CustomerCertificate --secret secretName
