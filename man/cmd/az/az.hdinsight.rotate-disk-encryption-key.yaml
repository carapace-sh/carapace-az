# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: rotate-disk-encryption-key
description: Rotate the disk encryption key of the specified HDInsight cluster.
documentation:
    flag:
        encryption-vault-uri: Base key vault URI where the customers key is located eg. https://myvault.vault.azure.net
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --encryption-key-name=!: Key name that is used for enabling disk encryption.
    --encryption-key-version=!: Key version that is used for enabling disk encryption.
    --encryption-vault-uri=!: Base key vault URI where the customers key is located eg.
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the cluster.
