# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a VM in a lab.
documentation:
    flag:
        artifacts: Path to the JSON encoded array of artifacts to be applied. JSON encoded list of parameters.
        formula: Name of the formula. Use `az lab formula list` for available formulas. Use `az lab formula` with the `--export-artifacts` flag to export and update artifacts, then pass the results via the `--artifacts` argument.
        image: The name of the operating system image (gallery image name or custom image name/ID). Use `az lab gallery-image list` for available gallery images or `az lab custom-image list` for available custom images.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        saved-secret: Name of the saved secret to be used for authentication. When this value is provided, it is used in the place of other authentication methods.
        size: The size of the VM to be created. See                                      https://azure.microsoft.com/pricing/details/virtual-machines/ for size info.
        ssh-key: The SSH public key or public key file path. Use `--generate-ssh-keys` to generate SSH keys.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: The tags of the resource.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --admin-password=: Password for the VM admin.
    --admin-username=: Username for the VM admin.
    --allow-claim=:
        description: Flag indicating if the VM should be created as claimable.
        nargs: -1
    --artifacts=: Path to the JSON encoded array of artifacts to be applied.
    --authentication-type=: Type of authentication allowed for the VM.
    --disk-type=:
        description: Storage type to use for virtual machine.
        nargs: -1
    --expiration-date=: The expiration date for VM.
    --formula=: Name of the formula.
    --generate-ssh-keys=:
        description: Generate SSH public and private key files if missing.
        nargs: -1
    --image-type=: Type of the image.
    --image=: The name of the operating system image (gallery image name or custom image name/ID).
    --ip-configuration=: Type of IP configuration to use for the VM.
    --lab-name=!: The name of the lab.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --notes=: The notes of the virtual machine.
    --saved-secret=: Name of the saved secret to be used for authentication.
    --size=: The size of the VM to be created.
    --ssh-key=: The SSH public key or public key file path.
    --subnet=: Name of the subnet to add the VM to.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: The tags of the resource.
        nargs: -1
    --vnet-name=: Name of the virtual network to add the VM to.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the virtual machine or environment
completion:
    flag:
        allow-claim:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        authentication-type:
            - password
            - ssh
        disk-type:
            - Premium
            - Standard
            - StandardSSD
        generate-ssh-keys:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        image-type:
            - gallery
            - custom
        ip-configuration:
            - shared
            - public
            - private
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
