# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a subscription lock.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    -n, --name=: Name of the lock
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). If provided, no other "Resource Id" arguments should be specified.
        name: Name of the lock.
examples:
    Delete a subscription lock: az account lock delete --name lockName
