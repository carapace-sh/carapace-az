# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: browse
description: Show the dashboard for a Kubernetes cluster in a web browser.
flags:
    --disable-browser=: Don't launch a web browser after establishing port-forwarding.
    --listen-address=: The listening address for the dashboard.
    --listen-port=: The listening port for the dashboard.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the managed cluster.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        disable-browser: |-
            Don't launch a web browser after establishing port-forwarding. Add this argument when launching a web browser manually, or for automated testing.

            Default value: False
        listen-address: |-
            The listening address for the dashboard. Add this argument to listen on a specific IP address.

            Default value: 127.0.0.1
        listen-port: |-
            The listening port for the dashboard. Add this argument when the default listening port is used by another process or unavailable.

            Default value: 8001
        name: Name of the managed cluster.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the dashboard for a Kubernetes cluster in a web browser. (autogenerated): az aks browse --name MyManagedCluster --resource-group MyResourceGroup
