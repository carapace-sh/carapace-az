# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create/upload an Azure IoT Hub certificate.
flags:
    --hub-name=!: IoT Hub name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: A friendly name for the certificate.
    -p, --path=!: The path to the file containing the certificate.
    -v, --verified=:
        description: A boolean indicating whether or not the certificate is verified.
        nargs: -1
completion:
    flag:
        verified:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        hub-name: IoT Hub name.
        name: A friendly name for the certificate.
        path: The path to the file containing the certificate.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        verified: |-
            A boolean indicating whether or not the certificate is verified.

            Accepted values: false, true
examples:
    Create/upload an Azure IoT Hub certificate (autogenerated): az iot hub certificate create --hub-name MyIotHub --name MyCertificate --path /certificates/Certificate.cer --resource-group MyResourceGroup --subscription MySubscription
    Uploads a CA certificate CER file to an IoT hub.: az iot hub certificate create --hub-name MyIotHub --name MyCertificate --path /certificates/Certificate.cer
    Uploads a verified CA certificate PEM file to an IoT hub.: az iot hub certificate create --hub-name MyIotHub --name MyCertificate --path /certificates/Certificate.pem --verified
