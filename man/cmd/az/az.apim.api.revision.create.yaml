# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a new API Revision.
flags:
    --api-id=!: API identifier.
    --api-revision-description=: Description of the Api Revision.
    --api-revision=!: Describes the Revision of the Api.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --service-name=!: The name of the API Management service instance.
documentation:
    command: Create API revision.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        api-id: API identifier. Must be unique in the current API Management service instance. Non-current revision has ;rev=n as a suffix where n is the revision number.
        api-revision: Describes the Revision of the Api.
        change-reference: The related change reference ID for this resource operation.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        service-name: The name of the API Management service instance.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a revision for the specfic API.: az apim api revision create --resource-group MyResourceGroup --service-name MyServiceName --api-id MyApiId --api-revision RevisionNumber --api-revision-description RevisionDescription
