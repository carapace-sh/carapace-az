# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets the list of managed application resources created in the specified Service Fabric cluster resource.
flags:
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    command: List managed applications of a given managed cluster.
    flag:
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List managed applications for a given managed cluster.: az sf managed-application list -g testRG -c testCluster
