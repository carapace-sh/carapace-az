# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a load balancer.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        public-ip-address: Name or ID of the public IP address, or '' for none. Uses existing resource if available or will create a new resource with defaults if omitted.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subnet: Name or ID of a subnet. Uses existing resource or creates new if specified, or none if omitted. If name specified, also specify --vnet-name. If you want to use an existing subnet in other resource group or subscription, please provide the ID instead of the name of the subnet
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --backend-pool-name=: The name of the backend address pool.
    --edge-zone=: The name of edge zone.
    --frontend-ip-name=: The name of the frontend IP configuration.
    --frontend-ip-zone=:
        description: used to create internal facing Load balancer
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --private-ip-address-version=: The private IP address version to use.
    --private-ip-address=: Static private IP address to use.
    --public-ip-address-allocation=: IP allocation method.
    --public-ip-address=: Name or ID of the public IP address, or '' for none.
    --public-ip-dns-name=: Globally unique DNS name for a new public IP.
    --public-ip-zone=: used to created a new public ip for the load balancer, a.k.a public facing Load balancer
    --sku=: Load balancer SKU
    --subnet-address-prefix=: The CIDR address prefix to use when creating a new subnet.
    --subnet=: Name or ID of a subnet.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --validate=: Generate and validate the ARM template without creating any resources.
    --vnet-address-prefix=: The CIDR address prefix to use when creating a new VNet.
    --vnet-name=: The virtual network (VNet) name.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The load balancer name.
completion:
    flag:
        private-ip-address-version:
            - IPv4
            - IPv6
        public-ip-address-allocation:
            - Static
            - Dynamic
        sku:
            - Basic
            - Gateway
            - Standard
