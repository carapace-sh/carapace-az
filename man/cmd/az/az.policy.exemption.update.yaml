# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a policy exemption.
flags:
    --description=: Description of policy exemption.
    --display-name=: Display name of the policy exemption.
    --expires-on=: The expiration date and time (in UTC ISO 8601 format yyyy-MM-ddTHH:mm:ssZ) of the policy exemption.
    --metadata=:
        description: Metadata in space-separated key=value pairs.
        nargs: -1
    --scope=: Scope to which this policy exemption applies.
    -e, --exemption-category=: The policy exemption category of the policy exemption
    -g, --resource-group=: the resource group where the policy will be applied
    -n, --name=!: Name of the policy exemption.
    -r, --policy-definition-reference-ids=:
        description: The policy definition reference ids to exempt in the initiative (policy set).
        nargs: -1
completion:
    flag:
        exemption-category:
            - Waiver
            - Mitigated
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        assignment-scope-validation: |-
            The assignment scope validation.

            Accepted values: Default, DoNotValidate
        change-reference: The related change reference ID for this resource operation.
        description: Policy exemption description.
        display-name: The display name of the policy exemption.
        exemption-category: |-
            The policy exemption category.

            Accepted values: Mitigated, Waiver
        expires-on: Breaking change The expiration date and time.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        metadata: The policy exemption metadata.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the policy exemption.
        policy-assignment: The policy assignment to exempt.
        policy-definition-reference-ids: The policy definition reference IDs.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-selectors: The resource selectors list to filter policies by resource properties.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        scope: The scope of the policy assignment.
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
examples:
    Update a policy exemption at scope: az policy exemption update -n exemptTestVM --description "This exemption is very cool." --scope "/providers/Microsoft.Management/managementGroups/{managementGroupName}"
    Update a policy exemption category: az policy exemption update -n exemptTestVM --exemption-category "Mitigated"
    Update a policy exemption in a resource group: az policy exemption update -n exemptTestVM --display-name "Updated display name" --resource-group myResourceGroup
