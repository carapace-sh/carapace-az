# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show deployment logs of the latest deployment, or a specific deployment if deployment-id is specified.
flags:
    --deployment-id=: Deployment ID.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: name of the web app.
    -s, --slot=: the name of the slot.
documentation:
    flag:
        deployment-id: Deployment ID. If none specified, returns the deployment logs of the latest deployment.
        name: Name of the web app. If left unspecified, a name will be randomly generated. You can configure the default using ``` az configure --defaults web=<name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: The name of the slot. Default to the productions slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the deployment logs of a particular deployment: az webapp log deployment show --name MyWebApp --resource-group MyResourceGroup --deployment-id MyDeploymentId
    Show the deployment logs of the latest deployment: az webapp log deployment show --name MyWebApp --resource-group MyResourceGroup
