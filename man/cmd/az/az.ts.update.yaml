# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a template spec version.
flags:
    --description=: The description of the parent template spec.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --ui-form-definition=: The uiFormDefinition file path in the file system for the template spec version.
    --version-description=: The description of the template spec version.
    -d, --display-name=: The display name of the template spec
    -f, --template-file=: a path to a template file or Bicep file in the file system
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the template spec.
    -s, --template-spec=: The template spec resource id.
    -v, --version=: The template spec version.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: The description of the parent template spec.
        display-name: The display name of the template spec.
        name: The name of the template spec.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        template-file: A path to a template file or Bicep file in the file system.
        template-spec: The template spec resource id.
        ui-form-definition: The uiFormDefinition file path in the file system for the template spec version.
        version: The template spec version.
        version-description: The description of the template spec version.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Remove tag(s) from template spec version with no prompt.: az ts update -g ExistingRG --name ExistingName -v 3.0 -f updatedTemplate.json --tags --yes
    Update all the properties of a template spec version.: az ts update -g ExistingRG --name ExistingName -v 3.0 -f updatedTemplate.json --display-name "New parent display name" --description "New parent description" --version-description "New child description" --ui-form-definition formDefinition.json
    Update the description of a template spec version with no prompt.: az ts update -g ExistingRG --name ExistingName -v 3.0 --version-description "New description" --yes
    Update the display name and tag(s) of a template spec based on the resource ID.: az ts update --template-spec resourceID --display-name "NewParentDisplayName" --tags key1=value1
    Update the template content of a template spec or template spec version based on the resource ID.: az ts update --template-spec resourceID -f updatedFile.json
