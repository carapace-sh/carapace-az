# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-locations
description: List regions where a plan sku is available.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --hyperv-workers-enabled=: get regions which support hosting web apps on Windows Container workers
    --linux-workers-enabled=: get regions which support hosting web apps on Linux workers
    --sku=!: The pricing tiers, e.g., F1(Free), D1(Shared), B1(Basic Small), B2(Basic Medium), B3(Basic Large), S1(Standard Small), P1V2(Premium V2 Small), P2V2(Premium V2 Medium), P3V2(Premium V2 Large), P0V3(Premium V3 Extra Small), P1V3(Premium V3 Small), P2V3(Premium V3 Medium), P3V3(Premium V3 Large), P1MV3(Premium Memory Optimized V3 Small), P2MV3(Premium Memory Optimized V3 Medium), P3MV3(Premium Memory Optimized V3 Large), P4MV3(Premium Memory Optimized V3 Extra Large), P5MV3(Premium Memory Optimized V3 Extra Extra Large), I1 (Isolated Small), I2 (Isolated Medium), I3 (Isolated Large), I1V2 (Isolated V2 I1V2), I2V2 (Isolated V2 I2V2), I3V2 (Isolated V2 I3V2), I4V2 (Isolated V2 I4V2), I5V2 (Isolated V2 I5V2), I6V2 (Isolated V2 I6V2), I1MV2 (Isolated Memory Optimized V2 I1MV2), I2MV2 (Isolated Memory Optimized V2 I2MV2), I3MV2 (Isolated Memory Optimized V2 I3MV2), I4MV2 (Isolated Memory Optimized V2 I4MV2), I5MV2 (Isolated Memory Optimized V2 I5MV2), WS1 (Logic Apps Workflow Standard 1), WS2 (Logic Apps Workflow Standard 2), WS3 (Logic Apps Workflow Standard 3)
    --subscription=: Name or ID of subscription.
completion:
    flag:
        sku:
            - F1
            - FREE
            - D1
            - SHARED
            - B1
            - B2
            - B3
            - S1
            - S2
            - S3
            - P1V2
            - P2V2
            - P3V2
            - P0V3
            - P1V3
            - P2V3
            - P3V3
            - P1MV3
            - P2MV3
            - P3MV3
            - P4MV3
            - P5MV3
            - I1
            - I2
            - I3
            - I1V2
            - I2V2
            - I3V2
            - I4V2
            - I5V2
            - I6V2
            - I1MV2
            - I2MV2
            - I3MV2
            - I4MV2
