# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update soft-delete policy for an Azure Container Registry.
flags:
    --days=: 'The number of days to retain a soft-deleted manifest or tag after which it gets purged (Range: 1 to 90).'
    --status=: Indicates whether soft-delete policy is enabled.
    --subscription=: Name or ID of subscription.
    -r, --registry=!: The name of the container registry.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        status:
            - enabled
            - disabled
documentation:
    command: |-
        Command group 'acr config soft-delete' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        days: 'The number of days to retain a soft-deleted manifest or tag after which it gets purged (Range: 1 to 90). Default is 7.'
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        status: |-
            Indicates whether soft-delete policy is enabled.

            Accepted values: disabled, enabled
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Enable soft-delete policy for an Azure Container Registry to purge a soft-deleted manifest after 30 days.: az acr config soft-delete update -r myregistry --status Enabled --days 30
