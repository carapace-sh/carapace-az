# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update soft-delete policy for an Azure Container Registry.
documentation:
    flag:
        days: 'The number of days to retain a soft-deleted manifest or tag after which it gets purged (Range: 1 to 90). Default is 7.'
        registry: The name of the container registry. It should be specified in lower case. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --days=: 'The number of days to retain a soft-deleted manifest or tag after which it gets purged (Range: 1 to 90).'
    --status=: Indicates whether soft-delete policy is enabled.
    --subscription=: Name or ID of subscription.
    -r, --registry=!: The name of the container registry.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        status:
            - enabled
            - disabled
