# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets a specific version of a certificate without returning its management policy.
flags:
    --id=: Id of the certificate.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Key Vault.
    -n, --name=: Name of the certificate.
    -v, --version=: The certificate version.
documentation:
    command: Gets information about a certificate.
    flag:
        id: Id of the certificate. If specified all other 'Id' arguments should be omitted.
        name: Name of the certificate. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Key Vault. Required if --id is not specified.
        version: The certificate version. If omitted, uses the latest version.
