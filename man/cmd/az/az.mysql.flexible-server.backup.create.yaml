# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create backup for a given server with specified backup name.
flags:
    --parameters=: The required parameters for creating and exporting backup of the given server.
    --subscription=: Name or ID of subscription.
    -b, --backup-name=!: The name of the new backup.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the server.
documentation:
    command: Create a backup for a given server with specified backup name.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        backup-name: The name of the new backup.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        parameters: The required parameters for creating and exporting backup of the given server. Is either a ServerBackupV2 type or a IO[bytes] type. Default value is None.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a backup for 'testsvr' with backup name 'testbackup'.: az mysql flexible-server backup create -g testgroup -n testsvr --backup-name testbackup
