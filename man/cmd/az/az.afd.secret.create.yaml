# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new Secret within the specified profile.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --profile-name=!: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
    --secret-source=!: Resource ID of the Azure Key Vault certificate, expected format is like/subscriptions/sub1/resourceGroups/rg1/providers/Microsoft.KeyVault/vaults/vault1/secrets/cert1.
    --secret-version=: Version of the certificate to be used.
    --subscription=: Name or ID of subscription.
    --use-latest-version=:
        description: Whether to use the latest version for the certificate.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the Secret under the profile.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        use-latest-version:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
