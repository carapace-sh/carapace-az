# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a specific query within a log analytics query pack.
flags:
    --body=!: Content of the query.
    --categories=:
        description: The related categories for the function.
        nargs: -1
    --description=: Description of the query.
    --display-name=!: Unique display name for your query within the query pack.
    --query-pack-name=!: The name of the log analytics query pack.
    --resource-types=:
        description: The related resource types for the function.
        nargs: -1
    --solutions=:
        description: The related Log Analytics solutions for the function.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Tags associated with the query.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The id name of a specific query defined in the log analytics query pack.
documentation:
    command: |-
        Command group 'az monitor log-analytics query-pack query' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        body: Content of the query.
        categories: The related categories for the function.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        description: Description of the query.
        display-name: Unique display name for your query within the query pack.
        name: The id name of a specific query defined in the log analytics query pack. It must be of type GUID.
        query-pack-name: The name of the log analytics query pack.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-types: The related resource types for the function.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        solutions: The related Log Analytics solutions for the function.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Tags associated with the query.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Create a query in a query pack: az monitor log-analytics query-pack query create --query-id 112c6b1f-5a86-4f01-a2d7-efb8e31f930f --display-name queryName -g resourceGroupName  --query-pack-name queryPackName --body "heartbeat | take 10" --description "some description" --categories "[network,monitor]" --resource-types "[microsoft.network/loadbalancers,microsoft.insights/autoscalesettings]" --solutions "[networkmonitoring]" --tags "{version:[v2022-01-01,v2021-12-01]}"
