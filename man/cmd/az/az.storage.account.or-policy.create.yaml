# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create Object Replication Service Policy for storage account.
documentation:
    flag:
        destination-account: The destination storage account name or resource Id. Apply --account-name value as destination account when there is no destination account provided in --policy and --destination-account.
        destination-container: The destination storage container name. Required when no --policy provided.
        min-creation-time: 'Blobs created after the time will be replicated to the destination. It must be in datetime format ''yyyy-MM-ddTHH:mm:ssZ''. Example: 2020-02-19T16:05:00Z'
        policy: The object replication policy definition between two storage accounts, in JSON format. Multiple rules can be defined in one policy.
        policy-id: The ID of object replication policy or "default" if the policy ID is unknown. Policy Id will be auto-generated when setting on destination account. Required when setting on source account.
        prefix-match: Optional. Filter the results to replicate only blobs whose names begin with the specified prefix.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        rule-id: Rule Id is auto-generated for each new rule on destination account. It is required for put policy on source account.
        source-account: The source storage account name or resource Id. Required when no --policy provided.
        source-container: The source storage container name. Required when no --policy provided.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --destination-container=: The destination storage container name.
    --policy-id=: The ID of object replication policy or "default" if the policy ID is unknown.
    --prefix-match=:
        description: Optional.
        nargs: -1
    --rule-id=: Rule Id is auto-generated for each new rule on destination account.
    --source-container=: The source storage container name.
    --subscription=: Name or ID of subscription.
    -d, --destination-account=: The destination storage account name or resource Id.
    -g, --resource-group=: Name of resource group.
    -n, --account-name=!: The storage account name.
    -p, --policy=: The object replication policy definition between two storage accounts, in JSON format.
    -s, --source-account=: The source storage account name or resource Id.
    -t, --min-creation-time=: Blobs created after the time will be replicated to the destination.
