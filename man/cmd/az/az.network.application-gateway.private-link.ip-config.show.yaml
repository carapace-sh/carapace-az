# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show an IP configuration of a private link.
flags:
    --gateway-name=!: Name of the application gateway.
    --private-link=!: Name of private link.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the private IP for private link.
documentation:
    command: |-
        Command group 'az network application-gateway private-link ip-config' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        gateway-name: Name of the application gateway.
        name: Name of the private IP for private link.
        private-link: Name of private link.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show an IP configuration of a private link.: az network application-gateway private-link ip-config show -n MyIPConfig -g MyResourceGroup --gateway-name MyGateway --private-link MyPrivateLink
