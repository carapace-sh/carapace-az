# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List role definitions.
flags:
    --custom-role-only=:
        description: custom roles only(vs.
        nargs: -1
    --scope=: scope at which the role assignment or definition applies to, e.g., /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, or /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: use it only if the role or assignment was added at the level of a resource group
    -n, --name=: Matches the role definition's name (GUID) or roleName (e.g. 'Reader') property.
completion:
    flag:
        custom-role-only:
            - "true"
            - "false"
documentation:
    flag:
        custom-role-only: |-
            Custom roles only(vs. build-in ones).

            Default value: False

            Accepted values: false, true
        name: Matches the role definition's name (GUID) or roleName (e.g. 'Reader') property. If a GUID is provided, for better performance, use ``` az role definition show ``` command.
        resource-group: Use it only if the role or assignment was added at the level of a resource group.
        scope: Scope at which the role assignment or definition applies to, e.g., /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, or /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
