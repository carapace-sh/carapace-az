# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List autoscale rules for a profile.
flags:
    --autoscale-name=!: Name of the autoscale settings.
    --profile-name=: Name of the autoscale profile.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        autoscale-name: Name of the autoscale settings.
        profile-name: |-
            Name of the autoscale profile.

            Default value: default
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List autoscale rules for a profile. (autogenerated): az monitor autoscale rule list --autoscale-name MyAutoscale --profile-name MyProfile --resource-group MyResourceGroup
