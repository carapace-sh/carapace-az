# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Set the owner, group, permissions, or access control list for a path.
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --acl=: Sets POSIX access control rights on files and directories.
    --auth-mode=: The mode in which to run the command.
    --blob-endpoint=: Storage data service endpoint.
    --connection-string=: Storage account connection string.
    --group=: Optional.
    --owner=: Optional.
    --permissions=: Optional and only valid if Hierarchical Namespace is enabled for the account.
    --sas-token=: A Shared Access Signature (SAS).
    --subscription=: Name or ID of subscription.
    -f, --file-system=!: File system name (i.e. container name).
    -p, --path=!: The path to a file or directory in the specified file system.
completion:
    flag:
        auth-mode:
            - login
            - key
documentation:
    command: Set the access control properties of a path(directory or file) in Azure Data Lake Storage Gen2 account.
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_KEY.'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit.'
        acl: 'Invalid in conjunction with acl. POSIX access control rights on files and directories in the format "[scope:][type]:[id]:[permissions]". e.g. "user::rwx,group::r--,other::---,mask::rwx". The value is a comma-separated list of access control entries. Each access control entry (ACE) consists of a scope, a type, a user or group identifier, and permissions in the format "[scope:][type]:[id]:[permissions]". The scope must be "default" to indicate the ACE belongs to the default ACL for a directory; otherwise scope is implicit and the ACE belongs to the access ACL. There are four ACE types: "user" grants rights to the owner or a named user, "group" grants rights to the owning group or a named group, "mask" restricts rights granted to named users and the members of groups, and "other" grants rights to all users not found in any of the other entries. The user or group identifier is omitted for entries of type "mask" and "other". The user or group identifier is also omitted for the owner and owning group. For example, the following ACL grants read, write, and execute rights to the file owner an john.doe@contoso, the read right to the owning group, and nothing to everyone else: "user::rwx,user:john.doe@contoso:rwx,group::r--,other::---,mask::rwx". For more information, please refer to https://learn.microsoft.com/azure/storage/blobs/data-lake-storage-access-control.'
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auth-mode: |-
            The mode in which to run the command. "login" mode will directly use your login credentials for the authentication. The legacy "key" mode will attempt to query for an account key if no authentication parameters for the account are provided. Environment variable: AZURE_STORAGE_AUTH_MODE.

            Accepted values: key, login
        blob-endpoint: 'Storage data service endpoint. Must be used in conjunction with either storage account key or a SAS token. You can find each service primary endpoint with ``` az storage account show ``` . Environment variable: AZURE_STORAGE_SERVICE_ENDPOINT.'
        change-reference: The related change reference ID for this resource operation.
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING.'
        file-system: File system name (i.e. container name).
        group: The owning group of the file or directory. The group Azure Active Directory object ID or user principal name to set as the owning group. For more information, please refer to https://learn.microsoft.com/azure/storage/blobs/data-lake-storage-access-control#changing-the-owning-group .
        owner: The owning user of the file or directory. The user Azure Active Directory object ID or user principal name to set as the owner. For more information, please refer to https://learn.microsoft.com/azure/storage/blobs/data-lake-storage-access-control#the-owning-user .
        path: The path to a file or directory in the specified file system.
        permissions: ' Optional and only valid if Hierarchical Namespace is enabled for the account. Sets POSIX access permissions for the file owner, the file owning group, and others. Each class may be granted read, write, or execute permission.  The sticky bit is also supported. Both symbolic (rwxrw-rw-) and 4-digit octal notation (e.g. 0766) are supported. permissions and acl are mutually exclusive.'
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name or service endpoint. Environment variable: AZURE_STORAGE_SAS_TOKEN.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Set owner of a path.: az storage fs access set --owner example@microsoft.com -p dir -f myfilesystem --account-name mystorageaccount --account-key 0000-0000
    Set owning group of a path.: az storage fs access set --group 68390a19-a897-236b-b453-488abf67b4dc -p dir -f myfilesystem --account-name mystorageaccount --account-key 0000-0000
    Set permissions of a path.: az storage fs access set --permissions "rwxrwx---" -p dir -f myfilesystem --account-name mystorageaccount --account-key 0000-0000
    Set the access control list of a path.: az storage fs access set --acl "user::rwx,group::r--,other::---" -p dir -f myfilesystem --account-name mystorageaccount --account-key 0000-0000
