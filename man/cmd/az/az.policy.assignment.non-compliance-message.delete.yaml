# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Remove one or more non-compliance messages from a policy assignment.
flags:
    --scope=: Scope at which this policy assignment subcommand applies.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: the resource group where the policy will be applied
    -m, --message=!: Message that will be shown when a resource is denied by policy or evaluation details are inspected.
    -n, --name=!: Name of the policy assignment.
    -r, --policy-definition-reference-id=: Policy definition reference ID within the assigned initiative (policy set) that the message applies to.
documentation:
    command: Breaking change
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        message: A custom non-compliance message.
        name: The name of the policy assignment.
        policy-definition-reference-id: The policy definition reference ID.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scope: Scope at which this policy assignment subcommand applies. Defaults to current context subscription.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    ? Remove non-compliance messages from a policy assignment that contain a specific message and a specific policy definition reference ID
    : az policy assignment non-compliance-message delete -g MyResourceGroup -n MyPolicySetAssignment -m 'Resources must use allowed SKUs' --policy-definition-reference-id SkuPolicyRefId
    Remove non-compliance messages from a policy assignment that contain a specific message and no policy definition reference ID: az policy assignment non-compliance-message delete -g MyResourceGroup -n MyPolicyAssignment -m 'Resources must follow naming standards'
