# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove an existing subscription from a management group.
flags:
    -n, --name=!: ""
    -s, --subscription=!: Name or ID of subscription.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the management group.
examples:
    Remove an existing subscription from a management group.: az account management-group subscription remove --name GroupName --subscription Subscription
