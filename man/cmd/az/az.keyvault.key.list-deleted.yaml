# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-deleted
description: List all deleted keys, including the public part of each.
documentation:
    flag:
        hsm-name: Name of the HSM. Can be omitted if --id is specified.
        id: Full URI of the Vault or HSM. If specified all other 'Id' arguments should be omitted.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --hsm-name=: Name of the HSM.
    --id=: Full URI of the Vault or HSM.
    --maxresults=: Maximum number of results to return.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Vault.
