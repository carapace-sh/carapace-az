# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List resource policy assignments.
flags:
    --disable-scope-strict-match=: Include policy assignments either inherited from parent scope or at child scope.
    --scope=: Scope at which this policy assignment subcommand applies.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: the resource group where the policy will be applied
documentation:
    command: Retrieve all applicable policy assignments.
    flag:
        disable-scope-strict-match: |-
            Include policy assignments either inherited from parent scopes or at child scopes.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        expand: Additional properties to include in output.
        filter: Filter list results.
        management-group: The management group.
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in ```
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        resource-group: The resource group.
        scope: Scope at which to list applicable policy assignments. If scope is not provided, the scope will be the implied or specified subscription.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List policy assignments that apply to a management group: az policy assignment list --management-group TestManagementGroup --filter atScope()
    List policy assignments that apply to a resource group: az policy assignment list --resource-group TestResourceGroup --filter atScope() --expand LatestDefinitionVersion, EffectiveDefinitionVersion
    List policy assignments that apply to a subscription: az policy assignment list --filter atScope()
