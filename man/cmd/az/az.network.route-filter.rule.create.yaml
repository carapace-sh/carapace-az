# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a rule in a route filter.
flags:
    --access=: The access type of the rule.
    --communities=:
        description: Space-separated list of border gateway protocol (BGP) community values to filter on.
        nargs: -1
    --filter-name=!: Name of the route filter.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the route filter rule.
completion:
    flag:
        access:
            - Allow
            - Deny
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    command: |-
        Command group 'az network route-filter rule' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        access: |-
            The access type of the rule.  Allowed values: Allow, Deny.

            Accepted values: Allow, Deny
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        communities: 'Space-separated list of border gateway protocol (BGP) community values to filter on.  Values from: az network route-filter rule list-service-communities.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        filter-name: Name of the route filter.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Name of the route filter rule.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a rule in a route filter to allow Dynamics 365.: az network route-filter rule create -g MyResourceGroup --filter-name MyRouteFilter -n MyRouteFilterRule --communities 12076:5040 --access Allow
