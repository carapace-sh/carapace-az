# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a rule in a route filter.
documentation:
    flag:
        access: 'The access type of the rule.  Allowed values: Allow, Deny.'
        communities: 'Space-separated list of border gateway protocol (BGP) community values to filter on.  Values from: az network route-filter rule list-service-communities.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --access=: The access type of the rule.
    --communities=:
        description: Space-separated list of border gateway protocol (BGP) community values to filter on.
        nargs: -1
    --filter-name=!: Name of the route filter.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the route filter rule.
completion:
    flag:
        access:
            - Allow
            - Deny
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
