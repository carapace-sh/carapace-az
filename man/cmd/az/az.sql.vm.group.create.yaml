# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a SQL virtual machine group.
flags:
    --bootstrap-acc=: Account name used for creating cluster (at minimum needs permissions to 'Create Computer Objects' in domain).
    --cluster-subnet-type=: Cluster subnet type.
    --fsw-path=: Optional path for fileshare witness.
    --ou-path=: Organizational Unit path in which the nodes and cluster will be present.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -e, --service-acc=!: Account name under which SQL service will run on all participating SQL virtual machines in the cluster.
    -f, --domain-fqdn=!: Fully qualified name of the domain.
    -g, --resource-group=!: Name of resource group.
    -i, --image-offer=!: SQL image offer.
    -k, --sa-key=: Primary key of the witness storage account.
    -l, --location=: Location.
    -n, --name=!: Name of the SQL virtual machine group.
    -p, --operator-acc=!: Account name used for operating cluster i.e. will be part of administrators group on all the participating virtual machines in the cluster.
    -s, --image-sku=!: SQL image sku.
    -u, --storage-account=!: Storage account url of the witness storage account.
completion:
    flag:
        cluster-subnet-type:
            - SingleSubnet
            - MultiSubnet
        image-sku:
            - Developer
            - Enterprise
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        bootstrap-acc: Account name used for creating cluster (at minimum needs permissions to 'Create Computer Objects' in domain).
        change-reference: The related change reference ID for this resource operation.
        cluster-subnet-type: |-
            Cluster subnet type.

            Default value: SingleSubnet

            Accepted values: MultiSubnet, SingleSubnet
        domain-fqdn: Fully qualified name of the domain.
        fsw-path: Optional path for fileshare witness.
        image-offer: SQL image offer. Examples may include SQL2016-WS2016, SQL2017-WS2016.
        image-sku: |-
            SQL image sku.

            Accepted values: Developer, Enterprise
        location: Location. If not provided, group will be created in the same reosurce group location.You can configure the default location using ``` az configure --defaults location=<location> ``` .
        name: Name of the SQL virtual machine group.
        operator-acc: Account name used for operating cluster i.e. will be part of administrators group on all the participating virtual machines in the cluster.
        ou-path: 'Organizational Unit path in which the nodes and cluster will be present. Example: OU=WSCluster,DC=testdomain,DC=com.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sa-key: Primary key of the witness storage account.
        service-acc: Account name under which SQL service will run on all participating SQL virtual machines in the cluster.
        storage-account: Storage account url of the witness storage account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a SQL virtual machine group for SQL2016-WS2016 Enterprise virtual machines.: az sql vm group create -n sqlvmgroup -l eastus -g myresourcegroup --image-offer SQL2016-WS2016 --image-sku Enterprise --domain-fqdn Domain.com --operator-acc testop --service-acc testservice --sa-key {PublicKey} --storage-account 'https://storacc.blob.core.windows.net/'
    Create a SQL virtual machine group for SQL2019-WS2022 Enterprise virtual machines with MultiSubnet.: az sql vm group create -n sqlvmgroup -l eastus -g myresourcegroup --image-offer SQL2019-WS2022 --image-sku Enterprise --cluster-subnet-type MultiSubnet --domain-fqdn Domain.com --operator-acc testop --service-acc testservice --sa-key {PublicKey} --storage-account 'https://storacc.blob.core.windows.net/'
