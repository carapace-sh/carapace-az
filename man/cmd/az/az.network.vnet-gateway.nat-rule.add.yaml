# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add nat rule in a virtual network gateway.
documentation:
    flag:
        external-mappings: The private IP address external mapping for NAT.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        internal-mappings: The private IP address internal mapping for NAT.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the resource that is unique within a resource group. This name can be used to access the resource.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --external-mappings=!:
        description: The private IP address external mapping for NAT.
        nargs: -1
    --gateway-name=!: Virtual network gateway name.
    --internal-mappings=!:
        description: The private IP address internal mapping for NAT.
        nargs: -1
    --ip-config-id=: The IP Configuration ID this NAT rule applies to.
    --mode=: The Source NAT direction of a VPN NAT.
    --name=!: The name of the resource that is unique within a resource group.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --type=: The type of NAT rule for VPN NAT.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        mode:
            - EgressSnat
            - IngressSnat
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        type:
            - Dynamic
            - Static
