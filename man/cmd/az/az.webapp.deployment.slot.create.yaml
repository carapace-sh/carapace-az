# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a deployment slot.
flags:
    --configuration-source=: source slot to clone configurations from.
    --subscription=: Name or ID of subscription.
    -c, --container-image-name=: The container custom image name and optionally the tag name (e.g., `<registry-name>/<image-name>:<tag>`)
    -g, --resource-group=!: Name of resource group.
    -i, --deployment-container-image-name=: Container image name, e.g. publisher/image-name:tag
    -n, --name=!: Name of the webapp
    -r, --container-registry-url=: The container registry server url
    -s, --slot=!: the name of the slot
    -u, --container-registry-user=: The container registry server username
    -w, --container-registry-password=: The container registry server password
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        configuration-source: Source slot to clone configurations from. Use web app's name to refer to the production slot.
        container-image-name: 'The container custom image name and optionally the tag name (e.g., ``` <registry-name>/<image-name>:<tag> ``` ). Note: if --container-registry-url is also provided, use ``` <image-name>:<tag> ``` without the registry name.'
        container-registry-password: The container registry server password.
        container-registry-url: The container registry server url.
        container-registry-user: The container registry server username.
        deployment-container-image-name: Option '--deployment-container-image-name' has been deprecated and will be removed in a future release. Container image name, e.g. publisher/image-name:tag.
        docker-registry-server-password: Option '--docker-registry-server-password' has been deprecated and will be removed in a future release. Use '--container-registry-password' instead. The container registry server password.
        docker-registry-server-user: Option '--docker-registry-server-user' has been deprecated and will be removed in a future release. Use '--container-registry-user' instead. The container registry server username.
        name: Name of the webapp.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: The name of the slot.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a deployment slot. (autogenerated): az webapp deployment slot create --name MyWebapp --resource-group MyResourceGroup --slot staging
