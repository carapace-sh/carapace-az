# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Start a deployment at tenant scope.
flags:
    --no-prompt=:
        description: The option to disable the prompt of missing parameters for ARM template.
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --proceed-if-no-change=: Instruct the command to execute the deployment if the What-If result contains no resource changes.
    --subscription=: Name or ID of subscription.
    -c, --confirm-with-what-if=: Instruct the command to run deployment What-If before executing the deployment.
    -f, --template-file=: a path to a template file or Bicep file in the file system
    -j, --handle-extended-json-format=: Support to handle extended template content including multiline and comments in deployment
    -l, --location=!: Location.
    -n, --name=: The deployment name.
    -p, --parameters=:
        description: the deployment parameters
        nargs: -1
    -q, --query-string=: The query string (a SAS token) to be used with the template-uri in the case of linked templates.
    -r, --what-if-result-format=: ""
    -s, --template-spec=: The template spec resource id.
    -u, --template-uri=: a uri to a remote template file
    -w, --what-if=: Instruct the command to run deployment What-If.
    -x, --what-if-exclude-change-types=:
        description: Space-separated list of resource change types to be excluded from What-If results.
        nargs: -1
completion:
    flag:
        no-prompt:
            - "true"
            - "false"
        what-if-exclude-change-types:
            - Create
            - Delete
            - Ignore
            - Deploy
            - NoChange
            - Modify
            - Unsupported
        what-if-result-format:
            - ResourceIdOnly
            - FullResourcePayloads
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        confirm-with-what-if: Instruct the command to run deployment What-If before executing the deployment. It then prompts you to acknowledge resource changes before it continues.
        handle-extended-json-format: Option '--handle-extended-json-format/-j' has been deprecated and will be removed in a future release. Support to handle extended template content including multiline and comments in deployment.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        name: The deployment name. Default to template file base name
        no-prompt: |-
            The option to disable the prompt of missing parameters for ARM template. When the value is true, the prompt requiring users to provide missing parameter will be ignored. The default value is false.

            Default value: False

            Accepted values: false, true
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        parameters: Supply deployment parameter values. Parameters may be supplied from a file using the ``` @{path} ``` syntax, a JSON string, or as ``` <KEY=VALUE> ``` pairs. Parameters are evaluated in order, so when a value is assigned twice, the latter value will be used. It is recommended that you supply your parameters file first, and then override selectively using KEY=VALUE syntax.
        proceed-if-no-change: Instruct the command to execute the deployment if the What-If result contains no resource changes. Applicable when --confirm-with-what-if is set.
        query-string: The query string (a SAS token) to be used with the template-uri in the case of linked templates.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        template-file: The path to the template file or Bicep file.
        template-spec: The template spec resource id.
        template-uri: The URI to the template file.
        validation-level: |-
            The deployment validation level. May be set to "Provider" (the default), "Template", or "ProviderNoRbac". With a validation level of "provider", ARM will perform full validation and check that you have sufficient permission to deploy all resources in the template. With a validation level of "providerNoRbac", ARM will perform full validation but only check for read permissions on each resource. With a validation level of "template", only static validation will be performed: preflight and permissions checks will be skipped.

            Accepted values: Provider, ProviderNoRbac, Template
        what-if: Instruct the command to run deployment What-If.
        what-if-exclude-change-types: |-
            Space-separated list of resource change types to be excluded from What-If results. Applicable when --confirm-with-what-if is set.

            Accepted values: Create, Delete, Deploy, Ignore, Modify, NoChange, Unsupported
        what-if-result-format: The format of What-If results. Applicable when ```
examples:
    Create a deployment at tenant scope from a local template file, using parameters from a JSON string.: |-
        az deployment tenant create --name rollout01 --location WestUS \
            --template-file azuredeploy.json \
            --parameters '{ \"policyName\": { \"value\": \"policy2\" } }'
    ? Create a deployment at tenant scope from a local template, using a parameter file, a remote parameter file, and selectively overriding key/value pairs.
    : |-
        az deployment tenant create --name rollout01 --location WestUS \
            --template-file azuredeploy.json  --parameters @params.json \
            --parameters https://mysite/params.json --parameters MyValue=This MyArray=@array.json
    Create a deployment at tenant scope from a remote template file, using parameters from a local JSON file.: |-
        az deployment tenant create --name rollout01 --location WestUS \
            --template-uri https://myresource/azuredeploy.json --parameters @myparameters.json
