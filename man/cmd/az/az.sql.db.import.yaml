# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: import
description: Imports a bacpac file into an existing database.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --storage-key-type=!: Required.
    --storage-key=!: Required.
    --storage-uri=!: Required.
    --subscription=: Name or ID of subscription.
    -a, --auth-type=: Authentication type.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Azure SQL Database.
    -p, --admin-password=!: Required.
    -s, --server=: Name of the Azure SQL Server.
    -u, --admin-user=!: Required.
completion:
    flag:
        auth-type:
            - SQL
            - ADPassword
        storage-key-type:
            - SharedAccessKey
            - StorageAccessKey
documentation:
    command: Imports a bacpac into a new database, or an existing empty database.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        admin-password: Required. Administrator login password.
        admin-user: Required. Administrator login name.
        auth-type: |-
            Authentication type.

            Accepted values: ADPassword, ManagedIdentity, SQL
        change-reference: The related change reference ID for this resource operation.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the Azure SQL Database.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        storage-key: Required. Storage key.
        storage-key-type: |-
            Required. Storage key type.

            Accepted values: ManagedIdentity, SharedAccessKey, StorageAccessKey
        storage-uri: Required. Storage Uri.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get an SAS key for use in import operation.: |-
        az storage blob generate-sas --account-name myAccountName -c myContainer -n myBacpac.bacpac \
            --permissions rw --expiry 2018-01-01T00:00:00Z
    Import bacpac into an existing database using a storage account key.: |-
        az sql db import -s myserver -n mydatabase -g mygroup -p password -u login --storage-key MYKEY== \
            --storage-key-type StorageAccessKey \
            --storage-uri https://myAccountName.blob.core.windows.net/myContainer/myBacpac.bacpac
    Import bacpac into an existing database using an SAS key.: |-
        az sql db import -s myserver -n mydatabase -g mygroup -p password -u login \
            --storage-key "?sr=b&sp=rw&se=2018-01-01T00%3A00%3A00Z&sig=mysignature&sv=2015-07-08" \
            --storage-key-type SharedAccessKey \
            --storage-uri https://myAccountName.blob.core.windows.net/myContainer/myBacpac.bacpac
