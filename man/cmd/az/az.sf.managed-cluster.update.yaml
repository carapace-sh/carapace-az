# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a managed cluster.
flags:
    --client-connection-port=: Port used for client connections to the cluster.
    --dns-name=: Cluster's dns name
    --gateway-connection-port=: Port used for http connections to the cluster.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        dns-name: Cluster's dns name. --gateway-connection-port --gateway-port Port used for http connections to the cluster.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Update cluster client port and dns name.: az sf managed-cluster update -g testRG -c testCluster --client-port 50000 --dns-name testnewdns
