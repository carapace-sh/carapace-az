# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a new share under the specified account as described by request body.
documentation:
    flag:
        access-tier: Access tier for specific share. GpV2 account can choose between TransactionOptimized (default), Hot, and Cool. FileStorage account can choose Premium.
        account-name: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        bursting-max-mibps: The maximum paid bursting bandwidth for the share, in mebibytes per second. This property is only for file shares created under Files Provisioned v1 SSD account type. The maximum allowed value is 10340 which is the maximum allowed bandwidth for a share.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        metadata: A name-value pair to associate with the share as metadata.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        name: The name of the file share within the specified storage account. File share names must be between 3 and 63 characters in length and use numbers, lower-case letters and dash (-) only. Every dash (-) character must be immediately preceded and followed by a letter or number.
        paid-bursting-enabled: Indicates whether paid bursting is enabled for the share. This property is only for file shares created under Files Provisioned v1 SSD account type.
        paid-bursting-max-iops: The maximum paid bursting IOPS for the share. This property is only for file shares created under Files Provisioned v1 SSD account type. The maximum allowed value is 102400 which is the maximum allowed IOPS for a share.
        provisioned-bandwidth: The provisioned bandwidth of the share, in mebibytes per second. This property is only for file shares created under Files Provisioned v2 account type. Please refer to the GetFileServiceUsage API response for the minimum and maximum allowed value for provisioned bandwidth.
        provisioned-iops: The provisioned IOPS of the share. This property is only for file shares created under Files Provisioned v2 account type. Please refer to the GetFileServiceUsage API response for the minimum and maximum allowed value for provisioned IOPS.
        quota: The provisioned size of the share, in gibibytes. Must be greater than 0, and less than or equal to 5TB (5120). For Large File Shares, the maximum size is 102400. For file shares created under Files Provisioned v2 account type, please refer to the GetFileServiceUsage API response for the minimum and maximum allowed provisioned storage size.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        root-squash: Reduction of the access rights for the remote superuser. The property is for NFS share only. The default is NoRootSquash.
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --access-tier=: Access tier for specific share.
    --account-name=: The name of the storage account within the specified resource group.
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --bursting-max-mibps=: The maximum paid bursting bandwidth for the share, in mebibytes per second.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --metadata=:
        description: A name-value pair to associate with the share as metadata.
        nargs: -1
    --paid-bursting-enabled=:
        description: Indicates whether paid bursting is enabled for the share.
        nargs: -1
    --paid-bursting-max-iops=: The maximum paid bursting IOPS for the share.
    --provisioned-bandwidth=: The provisioned bandwidth of the share, in mebibytes per second.
    --provisioned-iops=: The provisioned IOPS of the share.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --root-squash=: Reduction of the access rights for the remote superuser.
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the file share within the specified storage account.
    -q, --quota=: The provisioned size of the share, in gibibytes.
completion:
    flag:
        access-tier:
            - Cool
            - Hot
            - Premium
            - TransactionOptimized
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        paid-bursting-enabled:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        root-squash:
            - AllSquash
            - NoRootSquash
            - RootSquash
