# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a web app.
flags:
    --acr-identity=: Accept system or user assigned identity which will be set for acr image pull.
    --acr-use-identity=: Enable or disable pull image from acr use managed identity
    --assign-identity=:
        description: accept system or user assigned identities separated by spaces.
        nargs: -1
    --basic-auth=: Enable or disable basic auth for both SCM and FTP Basic Auth Publishing Credentials.
    --container-registry-url=: The container registry server url
    --https-only=:
        description: Redirect all traffic made to an app using HTTP to HTTPS.
        nargs: -1
    --multicontainer-config-file=: Linux only.
    --multicontainer-config-type=: Linux only.
    --public-network-access=: Enable or disable public access to the web app
    --role=: Role name or id the system assigned identity will have
    --scope=: Scope that the system assigned identity can access
    --sitecontainers-app=:
        description: If true, a webapp which supports sitecontainers will be created
        nargs: -1
    --startup-file=: Linux only.
    --subnet=: Name or resource ID of the pre-existing subnet to have the webapp join.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --vnet=: Name or resource ID of the regional virtual network.
    -b, --deployment-source-branch=: the branch to deploy
    -c, --container-image-name=: The container custom image name and optionally the tag name (e.g., `<registry-name>/<image-name>:<tag>`)
    -g, --resource-group=!: Name of resource group.
    -i, --deployment-container-image-name=: Container image name from container registry, e.g. publisher/image-name:tag
    -l, --deployment-local-git=: enable local git
    -n, --name=!: Name of the new web app.
    -p, --plan=!: name or resource id of the app service plan.
    -r, --runtime=: canonicalized web runtime in the format of Framework:Version, e.g. "PHP:7.2".Use `az webapp list-runtimes` for available list
    -s, --container-registry-user=: The container registry server username
    -u, --deployment-source-url=: Git repository URL to link with manual integration
    -w, --container-registry-password=: The container registry server password.
completion:
    flag:
        basic-auth:
            - Enabled
            - Disabled
        https-only:
            - "true"
            - "false"
        multicontainer-config-type:
            - COMPOSE
            - KUBE
        public-network-access:
            - Enabled
            - Disabled
        sitecontainers-app:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        acr-identity: Accept system or user assigned identity which will be set for acr image pull. Use '[system]' to refer system assigned identity, or a resource id to refer user assigned identity.
        acr-use-identity: |-
            Enable or disable pull image from acr use managed identity.

            Default value: False
        assign-identity: Accept system or user assigned identities separated by spaces. Use '[system]' to refer system assigned identity, or a resource id to refer user assigned identity. Check out help for more examples.
        basic-auth: |-
            Enable or disable basic auth for both SCM and FTP Basic Auth Publishing Credentials. Disabled by default for new apps. See https://aka.ms/app-service-basic-auth to learn more.

            Accepted values: Disabled, Enabled
        change-reference: The related change reference ID for this resource operation.
        container-image-name: 'The container custom image name and optionally the tag name (e.g., ``` <registry-name>/<image-name>:<tag> ``` ). Note: if --container-registry-url is also provided, use ``` <image-name>:<tag> ``` without the registry name.'
        container-registry-password: The container registry server password. Required for private registries.
        container-registry-url: The container registry server url.
        container-registry-user: The container registry server username.
        deployment-container-image-name: Option '--deployment-container-image-name' has been deprecated and will be removed in a future release. Container image name from container registry, e.g. publisher/image-name:tag.
        deployment-local-git: Enable local git.
        deployment-source-branch: |-
            The branch to deploy.

            Default value: master
        deployment-source-url: Git repository URL to link with manual integration.
        docker-registry-server-password: Option '--docker-registry-server-password' has been deprecated and will be removed in a future release. Use '--container-registry-password' instead. The container registry server password. Required for private registries.
        docker-registry-server-user: Option '--docker-registry-server-user' has been deprecated and will be removed in a future release. Use '--container-registry-user' instead. The container registry server username.
        domain-name-scope: |-
            Specify the scope of uniqueness for the default hostname during resource creation.

            Accepted values: NoReuse, ResourceGroupReuse, SubscriptionReuse, TenantReuse
        end-to-end-encryption-enabled: |-
            Enable or disable end-to-end encryption between the Front End and the Workers.

            Accepted values: false, true
        https-only: |-
            Redirect all traffic made to an app using HTTP to HTTPS.

            Default value: False

            Accepted values: false, true
        min-tls-cipher-suite: The minimum TLS Cipher Suite required for requests, e.g., 'TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384'.
        min-tls-version: The minimum version of TLS required for SSL requests, e.g., '1.0', '1.1', '1.2'.
        multicontainer-config-file: Linux only. Config file for multicontainer apps. (local or remote).
        multicontainer-config-type: |-
            Linux only.

            Accepted values: COMPOSE, KUBE
        name: Name of the new web app. Web app name can contain only allow alphanumeric characters and hyphens, it cannot start or end in a hyphen, and must be less than 64 characters.
        plan: Name or resource id of the app service plan. Use 'appservice plan create' to get one.
        public-network-access: |-
            Enable or disable public access to the web app.

            Accepted values: Disabled, Enabled
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        role: |-
            Role name or id the system assigned identity will have.

            Default value: Contributor
        runtime: Canonicalized web runtime in the format of Framework:Version, e.g. "PYTHON:3.14".Use ``` az webapp list-runtimes ``` for available list.
        scope: Scope that the system assigned identity can access.
        site-scoped-certs: |-
            Enable or disable site-scoped certificates.

            Accepted values: false, true
        sitecontainers-app: |-
            If true, a webapp which supports sitecontainers will be created.

            Accepted values: false, true
        startup-file: 'Linux only. The web''s startup command or script file. Required for FastAPI and other ASGI frameworks (auto-detection is not supported). Example command: "gunicorn --bind=0.0.0.0 --timeout 600 app:app". Example for FastAPI: "gunicorn -k uvicorn.workers.UvicornWorker app:app". Example script file: "startup.sh".'
        subnet: Name or resource ID of the pre-existing subnet to have the webapp join. The --vnet is argument also needed if specifying subnet by name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        vnet: Name or resource ID of the regional virtual network. If there are multiple vnets of the same name across different resource groups, use vnet resource id to specify which vnet to use. If vnet name is used, by default, the vnet in the same resource group as the webapp will be used. Must be used with --subnet argument.
examples:
    Create a Linux Python web app with a custom startup command.: az webapp create -g MyResourceGroup -p MyLinuxPlan -n MyUniqueAppName --runtime "PYTHON:3.14" --startup-file "gunicorn --bind=0.0.0.0 app:app"
    Create a Linux Python web app with a startup script.: az webapp create -g MyResourceGroup -p MyLinuxPlan -n MyUniqueAppName --runtime "PYTHON:3.14" --startup-file "startup.sh"
    Create a container webapp with an image pulled from a private Azure Container Registry using a User Assigned Managed Identity: az webapp create -g MyResourceGroup -p MyPlan -n MyUniqueAppName --container-image-name myregistry.azurecr.io/docker-image:tag --assign-identity MyAssignIdentities --acr-use-identity --acr-identity MyUserAssignedIdentityResourceId
    Create a web app which supports sitecontainers.: az webapp create -g MyResourceGroup -p MyPlan -n MyUniqueAppName --sitecontainers-app
    Create a web app with a Java 21 runtime.: az webapp create -g MyResourceGroup -p MyPlan -n MyUniqueAppName --runtime "JAVA:21-java21"
    Create a web app with a NodeJS 20 runtime and deployed from a local git repository.: az webapp create -g MyResourceGroup -p MyPlan -n MyUniqueAppName --runtime "node:20LTS" --deployment-local-git
    Create a web app with an image from DockerHub.: az webapp create -g MyResourceGroup -p MyPlan -n MyUniqueAppName -i nginx
    Create a web app with an image from a private Azure Container Registry.: az webapp create -g MyResourceGroup -p MyPlan -n MyUniqueAppName -i myregistry.azurecr.io/docker-image:tag
    Create a web app with an image from a private DockerHub registry.: az webapp create -g MyResourceGroup -p MyPlan -n MyUniqueAppName -i MyImageName -s username -w password
    Create a web app with both SCM and FTP Basic Auth Publishing Credentials disabled.: az webapp create -g MyResourceGroup -p MyPlan -n MyUniqueAppName --basic-auth Disabled
    Create a web app with end-to-end encryption enabled and minimum TLS version 1.2: az webapp create -g MyResourceGroup -p MyPlan -n MyUniqueAppName --end-to-end-encryption-enabled true --min-tls-version 1.2
    Create a web app with the default configuration.: az webapp create -g MyResourceGroup -p MyPlan -n MyUniqueAppName
    create a WebApp using shared App Service Plan that is in a different resource group.: AppServicePlanID=$(az appservice plan show -n SharedAppServicePlan -g MyASPRG --query "id" --out tsv) az webapp create -g MyResourceGroup -p "$AppServicePlanID" -n MyUniqueAppName
