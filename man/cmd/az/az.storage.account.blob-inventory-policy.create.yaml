# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create Blob Inventory Policy for storage account.
documentation:
    flag:
        account-name: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only.
        policy: The Storage Account Blob Inventory Policy, string in JSON format or json file path. See more details in https://learn.microsoft.com/azure/storage/blobs/blob-inventory#inventory-policy.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-name=!: The name of the storage account within the specified resource group.
    --policy=!: The Storage Account Blob Inventory Policy, string in JSON format or json file path.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
