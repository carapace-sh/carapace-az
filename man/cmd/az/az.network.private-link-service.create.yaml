# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a private link service.
flags:
    --auto-approval=:
        description: Space-separated list of subscription IDs to auto-approve.
        nargs: -1
    --destination-ip-address=: The destination IP address of the private link service.
    --edge-zone=: The name of edge zone.
    --enable-proxy-protocol=:
        description: Enable proxy protocol for private link service.
        nargs: -1
    --fqdns=:
        description: Space-separated list of FQDNs.
        nargs: -1
    --lb-frontend-ip-configs=:
        description: Space-separated list of names or IDs of load balancer frontend IP configurations to link to.
        nargs: -1
    --lb-name=: Name of the load balancer to retrieve frontend IP configs from.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --private-ip-address-version=: IP version of the private IP address.
    --private-ip-address=: Static private IP address to use.
    --private-ip-allocation-method=: Private IP address allocation method.
    --subnet=!: Name or ID of subnet to use.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    --visibility=:
        description: Space-separated list of subscription IDs for which the private link service is visible.
        nargs: -1
    --vnet-name=: The virtual network (VNet) name.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the private link service.
completion:
    flag:
        enable-proxy-protocol:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        private-ip-address-version:
            - IPv4
            - IPv6
        private-ip-allocation-method:
            - Dynamic
            - Static
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        auto-approval: Space-separated list of subscription IDs to auto-approve.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        destination-ip-address: The destination IP address of the private link service.
        edge-zone: The name of edge zone.
        enable-proxy-protocol: |-
            Enable proxy protocol for private link service.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        fqdns: Space-separated list of FQDNs.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ip-configurations: An array of private link service IP configurations.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        lb-frontend-ip-configs: Space-separated list of names or IDs of load balancer frontend IP configurations to link to. If names are used, also supply `--lb-name`.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        lb-name: Name of the load balancer to retrieve frontend IP configs from. Ignored if a frontend IP configuration ID is supplied.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Name of the private link service.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        private-ip-address: Static private IP address to use.
        private-ip-address-version: |-
            IP version of the private IP address.

            Default value: IPv4

            Accepted values: IPv4, IPv6
        private-ip-allocation-method: |-
            Private IP address allocation method.

            Accepted values: Dynamic, Static
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subnet: Name or ID of subnet to use. If name provided, also supply `--vnet-name`.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        visibility: Space-separated list of subscription IDs for which the private link service is visible.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        vnet-name: The virtual network (VNet) name.
examples:
    Create a private link service: az network private-link-service create -g MyResourceGroup -n MyPLSName --vnet-name MyVnetName --subnet MySubnet --lb-name MyLBName --lb-frontend-ip-configs LoadBalancerFrontEnd -l centralus
