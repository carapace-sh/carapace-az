# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove the identities associated with a Cosmos DB account
flags:
    --identities=:
        description: Space-separated identities to remove.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the Cosmos DB database account
documentation:
    command: |-
        Command group 'cosmosdb identity' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        identities: 'Space-separated identities to remove. Use ''[system]'' to refer to the system assigned identity. Default: ''[system]''.'
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the Cosmos DB database account.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Remove SystemAssigned identity for a Azure Cosmos DB database account.: az cosmosdb identity remove --name MyCosmosDBDatabaseAccount --resource-group MyResourceGroup
    Remove a UserAssigned identity for a Azure Cosmos DB database account.: az cosmosdb identity remove --name MyCosmosDBDatabaseAccount --resource-group MyResourceGroup --identities /subscriptions/00000000-0000-0000-0000-00000000/resourcegroups/MyRG/providers/Microsoft.ManagedIdentity/userAssignedIdentities/MyID
