# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove-record
description: Remove an MX record from its record set.
flags:
    --keep-empty-record-set=: Keep the empty record set if the last record is removed.
    --subscription=: Name or ID of subscription.
    -e, --exchange=!: Exchange metric.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -p, --preference=!: Preference metric.
    -z, --zone-name=!: The name of the zone.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        exchange: Exchange metric.
        keep-empty-record-set: |-
            Keep the empty record set if the last record is removed.

            Default value: False
        preference: Preference metric.
        record-set-name: The name of the record set relative to the zone.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        zone-name: The name of the zone.
examples:
    Remove an MX record from its record set.: |-
        az network dns record-set mx remove-record -g MyResourceGroup -z www.mysite.com \
            -n MyRecordSet -e mail.mysite.com -p 10
