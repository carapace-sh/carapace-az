# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add-record
description: Add an AAAA record.
documentation:
    flag:
        record-set-name: The name of the record set relative to the zone. Creates a new record set if one does not exist.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --if-none-match=: Create the record set only if it does not already exist.
    --subscription=: Name or ID of subscription.
    --ttl=: Record set TTL (time-to-live)
    -a, --ipv6-address=!: IPv6 address in string notation.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -z, --zone-name=!: The name of the zone.
