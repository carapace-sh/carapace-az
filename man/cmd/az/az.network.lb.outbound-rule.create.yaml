# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an outbound-rule.
flags:
    --address-pool=!: The name or ID of the backend address pool.
    --enable-tcp-reset=:
        description: Receive bidirectional TCP Reset on TCP flow idle timeout or unexpected connection termination.
        nargs: -1
    --frontend-ip-configs=:
        description: The List of frontend IP configuration IDs or names.
        nargs: -1
    --idle-timeout=: The timeout for the TCP idle connection.
    --lb-name=!: The load balancer name.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --outbound-ports=: The number of outbound ports to be used for NAT.
    --protocol=!: The protocol for the outbound rule in load balancer.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the outbound rule.
completion:
    flag:
        enable-tcp-reset:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        protocol:
            - All
            - Tcp
            - Udp
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        enable-tcp-reset: |-
            Receive bidirectional TCP Reset on TCP flow idle timeout or unexpected connection termination. This element is only used when the protocol is set to TCP.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        frontend-ip-configs: The List of frontend IP configuration IDs or names.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        lb-name: The load balancer name.
        name: The name of the outbound rule.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        protocol: |-
            The protocol for the outbound rule in load balancer.

            Accepted values: All, Tcp, Udp
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create an outbound-rule.: az network lb outbound-rule create --address-pool MyAddressPool --frontend-ip-configs myfrontendoutbound --idle-timeout 5 --lb-name MyLb --name MyOutboundRule --outbound-ports 10000 --protocol Udp --resource-group MyResourceGroup
