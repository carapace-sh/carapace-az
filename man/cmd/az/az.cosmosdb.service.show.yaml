# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets the status of service.
flags:
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: Name of the Cosmos DB database account.
    -g, --resource-group-name=!: Name of the resource group of the database account.
    -n, --name=!: Service Name.
documentation:
    command: |-
        Command group 'cosmosdb service' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: Name of the Cosmos DB database account.
        name: Service Name.
        resource-group-name: Name of the resource group of the database account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get cosmosdb service resource under an account.: az cosmosdb service show --resource-group MyResourceGroup --account-name MyAccount --name "sqlDedicatedGateway"
