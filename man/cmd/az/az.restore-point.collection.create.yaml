# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the restore point collection.
flags:
    --collection-name=!: The name of the restore point collection.
    --source-id=!: Resource Id of the source resource used to create this restore point collection
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
documentation:
    command: |-
        Create operation to create or update the restore point collection. Please refer to
        https://aka.ms/RestorePoints
        for more details. When updating a restore point collection, only tags may be modified.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        instant-access: |-
            This property determines whether instant access snapshot is enabled for restore points created under this restore point collection for Premium SSD v2 or Ultra disk. Instant access snapshot for Premium SSD v2 or Ultra disk is instantaneously available for restoring disk with fast restore performance.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .  When not specified, the location of the resource group will be used.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source-id: Resource Id of the source resource used to create this restore point collection.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...].  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.'
examples:
    Create or update a restore point collection.: az restore-point collection create --location "norwayeast" --source-id "/subscriptions/{subscription-id}/resourceGroups/myResourceGroup/providers/Microsoft.Compute/virtualMachines/myVM" --tags myTag1="tagValue1" --resource-group "myResourceGroup" --collection-name "myRpc" --instant-access true
