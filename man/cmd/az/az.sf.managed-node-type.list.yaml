# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets the list of Node types of the specified managed cluster.
flags:
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    command: List node types of a managed cluster.
    flag:
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List node types by cluster.: az sf managed-node-type list -g testRG -c testCluster
