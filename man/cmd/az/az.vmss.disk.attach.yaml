# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: attach
description: Attach managed data disks to a scale set or its instances.
flags:
    --caching=: Disk caching policy
    --disk=: existing disk name or ID to attach or detach from VM instances
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --instance-id=: Scale set VM instance id
    --lun=: 0-based logical unit number (LUN).
    --sku=: Underlying storage SKU
    --subscription=: Name or ID of subscription.
    --vmss-name=: Scale set name.
    -g, --resource-group=: Name of resource group.
    -z, --size-gb=: size in GB.
completion:
    flag:
        caching:
            - None
            - ReadOnly
            - ReadWrite
        sku:
            - Standard_LRS
            - Premium_LRS
            - StandardSSD_LRS
            - UltraSSD_LRS
            - Premium_ZRS
            - StandardSSD_ZRS
            - PremiumV2_LRS
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        caching: |-
            Disk caching policy.

            Accepted values: None, ReadOnly, ReadWrite
        change-reference: The related change reference ID for this resource operation.
        disk: Existing disk name or ID to attach or detach from VM instances.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        instance-id: Scale set VM instance id.
        lun: 0-based logical unit number (LUN). Max value depends on the Virtual Machine instance size.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        size-gb: 'size in GB. Max size: 4095 GB (certain preview disks can be larger).'
        sku: |-
            Underlying storage SKU.

            Accepted values: PremiumV2_LRS, Premium_LRS, Premium_ZRS, StandardSSD_LRS, StandardSSD_ZRS, Standard_LRS, UltraSSD_LRS
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vmss-name: Scale set name. You can configure the default using ``` az configure --defaults vmss=<name> ``` .
examples:
    Attach managed data disks of a given size to a scale set or its instances. (autogenerated): az vmss disk attach --vmss-name MyVmss --resource-group MyResourceGroup --size-gb 50
    Attach managed data disks to a scale set or its instances. (autogenerated): az vmss disk attach --disk {disk} --instance-id 0 --resource-group MyResourceGroup
