# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove a network rule.
documentation:
    flag:
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using `az configure --defaults acr=<registry name>`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subnet: Name or ID of subnet. If name is supplied, `--vnet-name` must be supplied.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --ip-address=: IPv4 address or CIDR range.
    --subnet=: Name or ID of subnet.
    --subscription=: Name or ID of subscription.
    --vnet-name=: Name of a virtual network.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
