# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set
description: Contains information about an application in a Batch account.
flags:
    --allow-updates=: Specify to indicate whether packages within the application may be overwritten using the same version string.
    --application-name=!: The name of the application.
    --default-version=: Specify which package to use if a client requests the application but does not specify a version.
    --display-name=: Specify the display name for the application.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of the resource group
    -n, --name=!: Name of the Batch account.
documentation:
    command: Update properties for a Batch application.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allow-updates: Specify to indicate whether packages within the application may be overwritten using the same version string. Specify either 'true' or 'false' to update the property.
        application-name: The name of the application.
        change-reference: The related change reference ID for this resource operation.
        default-version: Specify which package to use if a client requests the application but does not specify a version.
        display-name: Specify the display name for the application.
        name: Name of the Batch account.
        resource-group: Name of the resource group.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
