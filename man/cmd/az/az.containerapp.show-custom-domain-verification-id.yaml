# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-custom-domain-verification-id
description: Show the verification id for binding app or environment custom domains
flags:
    --subscription=: Name or ID of subscription.
documentation:
    command: Show the verification id for binding app or environment custom domains.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get the verification id, which needs to be added as a TXT record for app custom domain to verify domain ownership: az containerapp show-custom-domain-verification-id
    Get the verification id, which needs to be added as a TXT record for custom environment DNS suffix to verify domain ownership: az containerapp show-custom-domain-verification-id
