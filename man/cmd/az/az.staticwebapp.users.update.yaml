# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates a user entry with the listed roles.
flags:
    --authentication-provider=: Authentication provider of the user identity such as AAD, Facebook, GitHub, Google, Twitter.
    --roles=!: Comma-separated default or user-defined role names.
    --subscription=: Name or ID of subscription.
    --user-details=: Email for AAD, Facebook, and Google.
    --user-id=: Given id of registered user.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: Name of the static site
documentation:
    command: Updates a user entry with the listed roles. Either user details or user id is required.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        authentication-provider: Authentication provider of the user identity such as AAD, Facebook, GitHub, Google, Twitter.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the static site.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        roles: Comma-separated default or user-defined role names. Roles that can be assigned to a user are comma separated and case-insensitive (at most 50 roles up to 25 characters each and restricted to 0-9,A-Z,a-z, and _). Define roles in routes.json during root directory of your GitHub repo.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-details: Email for AAD, Facebook, and Google. Account name (handle) for GitHub and Twitter.
        user-id: Given id of registered user.
examples:
    Updates a user entry with the listed roles.: az staticwebapp users update -n MyStaticAppName --user-details JohnDoe --role Contributor
