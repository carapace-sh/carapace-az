name: show
description: Get the details of a user.
flags:
    --id=!: The object ID or principal name of the user for which to get information
documentation:
    flag:
        id: The object ID or principal name of the user for which to get information.
examples:
    Show a user.: az ad user show --id myuser@contoso.com
