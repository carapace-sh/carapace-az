# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-primary
description: Failover an instance failover group.
documentation:
    flag:
        allow-data-loss: Complete the failover even if doing so may result in data loss. This will allow the failover to proceed even if a primary database is unavailable.
        location: 'Location of the secondary instance in the Instance Failover Group. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`'
        resource-group: Name of resource group of the secondary instance in the Instance Failover Group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --allow-data-loss=: Complete the failover even if doing so may result in data loss.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group of the secondary instance in the Instance Failover Group.
    -l, --location=!: Location of the secondary instance in the Instance Failover Group.
    -n, --name=!: The name of the Instance Failover Group
