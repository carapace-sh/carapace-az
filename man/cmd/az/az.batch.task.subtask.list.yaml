# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Lists all of the subtasks that are associated with the specified multi-instance Task.
flags:
    --account-endpoint=: Batch service endpoint.
    --account-key=: Batch account key.
    --account-name=: Batch account name.
    --job-id=!: The ID of the Job.
    --select=:
        description: An OData $select clause.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --task-id=!: The ID of the Task.
documentation:
    flag:
        account-endpoint: 'Batch service endpoint. Alternatively, set by environment variable: AZURE_BATCH_ENDPOINT.'
        account-key: 'Batch account key. Alternatively, set by environment variable: AZURE_BATCH_ACCESS_KEY.'
        account-name: 'Batch account name. Alternatively, set by environment variable: AZURE_BATCH_ACCOUNT.'
        job-id: The ID of the Job. Required.
        select: An OData $select clause.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        task-id: The ID of the Task. Required.
