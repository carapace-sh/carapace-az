# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update-for-vm
description: Update disk exclusion settings associated with a backed up VM item.
documentation:
    flag:
        container-name: Name of the backup container. Accepts 'Name' or 'FriendlyName' from the output of az backup container list command. If 'FriendlyName' is passed then BackupManagementType is required.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --disk-list-setting=: option to decide whether to include or exclude the disk or reset any previous settings to default behavior
    --diskslist=:
        description: List of disks to be excluded or included.
        nargs: -1
    --exclude-all-data-disks=:
        description: Option to specify to backup OS disk only.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -c, --container-name=: Name of the backup container.
    -g, --resource-group=: Name of resource group.
    -i, --item-name=: Name of the backed up item.
    -v, --vault-name=: Name of the Recovery services vault.
completion:
    flag:
        disk-list-setting:
            - include
            - exclude
            - resetexclusionsettings
        exclude-all-data-disks:
            - "true"
            - "false"
