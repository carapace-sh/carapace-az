# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete-policy
description: Delete security policy settings for a Key Vault.
flags:
    --application-id=: Application ID of the client making request on behalf of a principal.
    --no-wait=: Do not wait for the long-running operation to finish.
    --object-id=: a GUID that identifies the principal that will receive permissions
    --spn=: name of a service principal that will receive permissions
    --subscription=: Name or ID of subscription.
    --upn=: name of a user principal that will receive permissions
    -g, --resource-group=: Proceed only if Key Vault belongs to the specified resource group.
    -n, --name=!: Name of the Vault.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        application-id: Application ID of the client making request on behalf of a principal. Exposed for compound identity using on-behalf-of authentication flow.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the Vault.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        object-id: A GUID that identifies the principal that will receive permissions.
        resource-group: Name of resource group.
        spn: Name of a service principal that will receive permissions.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        upn: Name of a user principal that will receive permissions.
