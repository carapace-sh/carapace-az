# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove a managed rule set by rule set group name if rule_group_name is specified.
flags:
    --group-name=: The name of the web application firewall rule set group.
    --policy-name=!: The name of the web application firewall policy.
    --subscription=: Name or ID of subscription.
    --type=!: The type of the web application firewall rule set.
    --version=!: The version of the web application firewall rule set type.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        type:
            - Microsoft_BotManagerRuleSet
            - OWASP
        version:
            - "0.1"
            - "1.0"
            - "1.1"
            - "2.1"
            - 2.2.9
            - "3.0"
            - "3.1"
            - "3.2"
documentation:
    command: Remove a managed rule set by rule set group name if rule_group_name is specified. Otherwise, remove all rule set.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        group-name: The name of the web application firewall rule set group.
        policy-name: The name of the web application firewall policy.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        type: |-
            The type of the web application firewall rule set.

            Accepted values: Microsoft_BotManagerRuleSet, Microsoft_DefaultRuleSet, Microsoft_HTTPDDoSRuleSet, OWASP
        version: The version of the web application firewall rule set type. 0.1, 1.0, and 1.1 are used for Microsoft_BotManagerRuleSet.
examples:
    Remove a managed rule set by rule set group name if rule_group_name is specified. Otherwise, remove all rule set.: az network application-gateway waf-policy managed-rule rule-set remove --policy-name MyPolicy --resource-group MyResourceGroup --type OWASP --version 3.1
