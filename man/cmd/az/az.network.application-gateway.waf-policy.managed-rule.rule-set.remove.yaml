# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove a managed rule set by rule set group name if rule_group_name is specified.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        version: The version of the web application firewall rule set type. 0.1, 1.0, and 1.1 are used for Microsoft_BotManagerRuleSet.
flags:
    --group-name=: The name of the web application firewall rule set group.
    --policy-name=!: The name of the web application firewall policy.
    --subscription=: Name or ID of subscription.
    --type=!: The type of the web application firewall rule set.
    --version=!: The version of the web application firewall rule set type.
    -g, --resource-group=!: Name of resource group.
completion:
    flag:
        type:
            - Microsoft_BotManagerRuleSet
            - OWASP
        version:
            - "0.1"
            - "1.0"
            - "1.1"
            - "2.1"
            - 2.2.9
            - "3.0"
            - "3.1"
            - "3.2"
