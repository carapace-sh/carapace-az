# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get the details of a firewall rule.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the server.
    -r, --rule-name=: The name of the firewall rule.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule-name: 'The name of the firewall rule. If name is omitted, default name will be chosen for firewall name. The firewall rule name can only contain 0-9, a-z, A-Z, ''-'' and ''_''. Additionally, the name of the firewall rule must be at least 1 character and no more than 80 characters in length. '
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get the details of a firewall rule.: az mysql flexible-server firewall-rule show --rule-name testRule --resource-group testGroup --name testserver
