# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: verify
description: Verify a certificate in an Azure IoT Hub Device Provisioning Service instance.
flags:
    --dps-name=!: IoT Hub Device Provisioning Service name
    --subscription=: Name or ID of subscription.
    -e, --etag=!: Entity Tag (etag) of the object.
    -g, --resource-group=: Name of resource group.
    -n, --certificate-name=!: A friendly name for the certificate.
    -p, --path=!: The path to the file containing the certificate.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        dps-name: IoT Hub Device Provisioning Service name.
        etag: Entity Tag (etag) of the object.
        path: The path to the file containing the certificate.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Verify ownership of the MyCertificate private key.: az iot dps certificate verify --dps-name MyDps --resource-group MyResourceGroup --name MyCertificate --path /certificates/Verification.pem --etag AAAAAAAAAAA=
