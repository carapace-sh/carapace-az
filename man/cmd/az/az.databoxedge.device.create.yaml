# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Data Box Edge/Data Box Gateway resource.
flags:
    --description=: The Description of the Data Box Edge/Gateway device.
    --etag=: The etag for the devices.
    --friendly-name=: The Data Box Edge/Gateway device name.
    --model-description=: The description of the Data Box Edge/Gateway device model.
    --no-wait=: Do not wait for the long-running operation to finish.
    --sku=: The SKU type.
    --status=: The status of the Data Box Edge/Gateway device.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The device name.
completion:
    flag:
        sku:
            - Gateway
            - Edge
            - TEA_1Node
            - TEA_1Node_UPS
            - TEA_1Node_Heater
            - TEA_1Node_UPS_Heater
            - TEA_4Node_Heater
            - TEA_4Node_UPS_Heater
            - TMA
            - TDC
            - TCA_Small
            - GPU
            - TCA_Large
            - EdgeP_Base
            - EdgeP_High
            - EdgePR_Base
            - EdgePR_Base_UPS
            - EP2_64_1VPU_W
            - EP2_128_1T4_Mx1_W
            - EP2_256_2T4_W
            - EdgeMR_Mini
            - RCA_Small
            - RCA_Large
            - RDC
            - Management
        status:
            - ReadyToSetup
            - Online
            - Offline
            - NeedsAttention
            - Disconnected
            - PartiallyDisconnected
            - Maintenance
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: The Description of the Data Box Edge/Gateway device.
        etag: The etag for the devices.
        friendly-name: The Data Box Edge/Gateway device name.
        location: The location of the device. This is a supported and registered Azure geographical region (for example, West US, East US, or Southeast Asia). The geographical region of a device cannot be changed once it is created, but if an identical geographical region is specified on update, the request will succeed.  When not specified, the location of the resource group will be used.
        model-description: The description of the Data Box Edge/Gateway device model.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: |-
            SKU name.

            Accepted values: EP2_128_1T4_Mx1_W, EP2_256_2T4_W, EP2_64_1VPU_W, Edge, EdgeMR_Mini, EdgePR_Base, EdgePR_Base_UPS, EdgeP_Base, EdgeP_High, GPU, Gateway, Management, RCA_Large, RCA_Small, RDC, TCA_Large, TCA_Small, TDC, TEA_1Node, TEA_1Node_Heater, TEA_1Node_UPS, TEA_1Node_UPS_Heater, TEA_4Node_Heater, TEA_4Node_UPS_Heater, TMA
        status: |-
            The status of the Data Box Edge/Gateway device.

            Accepted values: Disconnected, Maintenance, NeedsAttention, Offline, Online, PartiallyDisconnected, ReadyToSetup
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: The list of tags that describe the device. These tags can be used to view and group this device (across resource groups).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Create a Data Box Edge resource.: az databoxedge device create --location "eastus" --sku "Edge" --name "testedgedevice" --resource-group "GroupForEdgeAutomation"
