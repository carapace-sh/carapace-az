# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Data Box Edge/Data Box Gateway resource.
documentation:
    flag:
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --description=: The Description of the Data Box Edge/Gateway device.
    --etag=: The etag for the devices.
    --friendly-name=: The Data Box Edge/Gateway device name.
    --model-description=: The description of the Data Box Edge/Gateway device model.
    --no-wait=: Do not wait for the long-running operation to finish.
    --sku=: The SKU type.
    --status=: The status of the Data Box Edge/Gateway device.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The device name.
completion:
    flag:
        sku:
            - Gateway
            - Edge
            - TEA_1Node
            - TEA_1Node_UPS
            - TEA_1Node_Heater
            - TEA_1Node_UPS_Heater
            - TEA_4Node_Heater
            - TEA_4Node_UPS_Heater
            - TMA
            - TDC
            - TCA_Small
            - GPU
            - TCA_Large
            - EdgeP_Base
            - EdgeP_High
            - EdgePR_Base
            - EdgePR_Base_UPS
            - EP2_64_1VPU_W
            - EP2_128_1T4_Mx1_W
            - EP2_256_2T4_W
            - EdgeMR_Mini
            - RCA_Small
            - RCA_Large
            - RDC
            - Management
        status:
            - ReadyToSetup
            - Online
            - Offline
            - NeedsAttention
            - Disconnected
            - PartiallyDisconnected
            - Maintenance
