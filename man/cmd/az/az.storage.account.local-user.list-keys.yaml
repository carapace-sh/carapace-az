# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-keys
description: List SSH authorized keys and shared key of the local user.
flags:
    --account-name=!: The storage account name.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --user-name=!: The name of local user.
documentation:
    command: List sharedkeys and sshAuthorizedKeys for a local user.
    flag:
        account-name: The storage account name. --name --user-name -n The name of local user. The username must contain lowercase letters and numbers only. It must be unique only within the storage account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-name: The name of local user. The username must contain lowercase letters and numbers only. It must be unique only within the storage account.
examples:
    List sharedkeys and sshAuthorizedKeys for a local-user: az storage account local-user list-keys --account-name {account-name} -g {resource-group} -n {username}
