# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: lock
description: Sets the ImmutabilityPolicy to Locked state.
documentation:
    flag:
        account-name: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only. Required.
        if-match: The entity state (ETag) version of the immutability policy to update must be returned to the server for all update operations. The ETag value must include the leading and trailing double quotes as returned by the service. Required.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-name=!: The name of the storage account within the specified resource group.
    --if-match=!: The entity state (ETag) version of the immutability policy to update must be returned to the server for all update operations.
    --subscription=: Name or ID of subscription.
    -c, --container-name=!: The container name.
    -g, --resource-group=: Name of resource group.
