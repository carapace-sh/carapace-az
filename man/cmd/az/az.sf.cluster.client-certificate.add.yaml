# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add a common name or certificate thumbprint to the cluster for client authentication.
flags:
    --admin-client-thumbprints=:
        description: client certificate thumbprint that only has admin permission.
        nargs: -1
    --certificate-common-name=: client certificate common name.
    --certificate-issuer-thumbprint=: client certificate issuer thumbprint.
    --client-certificate-common-names=: JSON encoded parameters configuration.
    --is-admin=: Client authentication type.
    --readonly-client-thumbprints=:
        description: Space-separated list of client certificate thumbprint that has read only permission.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --thumbprint=: client certificate thumbprint.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        client-certificate-common-names: 'JSON encoded parameters configuration. Use @{file} to load from a file. For example: [{"isAdmin":true, "certificateCommonName": "test.com", "certificateIssuerThumbprint": "22B4AE296B504E512DF880A77A2CAE20200FF922"}]'
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        is-admin: |-
            Client authentication type.

            Default value: False
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        thumbprint: Client certificate thumbprint.
examples:
    Add client certificate by thumbprint: az sf cluster client-certificate add -g group-name -c cluster1 --thumbprint '5F3660C715EBBDA31DB1FFDCF508302348DE8E7A'
