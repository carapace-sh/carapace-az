# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List resource links.
flags:
    --filter=: Filter string for limiting results.
    --scope=: Fully-qualified scope for retrieving links.
    --subscription=: Name or ID of subscription.
documentation:
    flag:
        filter: Filter string for limiting results.
        scope: Fully-qualified scope for retrieving links.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all links for resource group {ResourceGroup} in subscription {SubID}: az resource link list --scope /subscriptions/{SubID}/resourceGroups/{ResourceGroup}
    List links, filtering with {filter-string}: az resource link list --filter {filter-string}
