# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a server.
documentation:
    flag:
        admin-password: 'The password of the administrator. Minimum 8 characters and maximum 128 characters. Password must contain characters from three of the following categories: English uppercase letters, English lowercase letters, numbers, and non-alphanumeric characters.'
        admin-user: Administrator username for the server. Once set, it cannot be changed.
        auto-grow: Enable or disable autogrow of the storage. Default value is Enabled.
        backup-retention: The number of days a backup is retained. Range of 7 to 35 days. Default is 7 days.
        geo-redundant-backup: Enable or disable geo-redundant backups. Default value is Disabled. Not supported in Basic pricing tier.
        infrastructure-encryption: Add an optional second layer of encryption for data using new encryption algorithm. Default value is Disabled.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        minimal-tls-version: Set the minimal TLS version for connections to server when SSL is enabled. Default is TLSEnforcementDisabled.
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        public-network-access: 'Enable or disable public network access to server. When disabled, only connections made through Private Links can reach this server. Allowed values are : `Enabled`, `Disabled`, `all`, `0.0.0.0`, `<SingleIP>`, `<StartIP-DestinationIP>`. Default is `Enabled`.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        sku-name: 'The name of the sku. Follows the convention {pricing tier}_{compute generation}_{vCores} in shorthand. Examples: B_Gen5_1, GP_Gen5_4, MO_Gen5_16. '
        ssl-enforcement: Enable or disable ssl enforcement for connections to server. Default is Enabled.
        storage-size: The storage capacity of the server (unit is megabytes). Minimum 5120 and increases in 1024 increments. Default is 5120.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --assign-identity=:
        description: Generate and assign an Microsoft Entra Identity for this server for use with key management services like Azure KeyVault.
        nargs: -1
    --auto-grow=: Enable or disable autogrow of the storage.
    --backup-retention=: The number of days a backup is retained.
    --geo-redundant-backup=: Enable or disable geo-redundant backups.
    --minimal-tls-version=: Set the minimal TLS version for connections to server when SSL is enabled.
    --public-network-access=: Enable or disable public network access to server.
    --sku-name=: The name of the sku.
    --ssl-enforcement=: Enable or disable ssl enforcement for connections to server.
    --storage-size=: The storage capacity of the server (unit is megabytes).
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --version=: Server major version.
    -g, --resource-group=: Name of resource group.
    -i, --infrastructure-encryption=:
        description: Add an optional second layer of encryption for data using new encryption algorithm.
        nargs: -1
    -l, --location=: Location.
    -n, --name=: Name of the server.
    -p, --admin-password=: The password of the administrator.
    -u, --admin-user=: Administrator username for the server.
completion:
    flag:
        auto-grow:
            - Enabled
            - Disabled
        geo-redundant-backup:
            - Enabled
            - Disabled
        infrastructure-encryption:
            - Enabled
            - Disabled
        minimal-tls-version:
            - TLS1_0
            - TLS1_1
            - TLS1_2
            - TLSEnforcementDisabled
        ssl-enforcement:
            - Enabled
            - Disabled
