# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Retrieve a Server Trust Group.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: The resource group name
    -l, --location=!: The location of the Server Trust Group.
    -n, --name=!: The name of the Server Trust Group.
documentation:
    command: |-
        Command group 'sql stg' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        location: The location of the Server Trust Group.
        name: The name of the Server Trust Group.
        resource-group: The resource group name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Retrieve a Server Trust Group.: az sql stg show -g resourcegroup -l location -n stg-name
