# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Gets information about the specified private link resource.
documentation:
    flag:
        account-name: The name of the Batch account. Required.
        name: The private link resource name. This must be unique within the account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --account-name=!: The name of the Batch account.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of the resource group
    -n, --name=!: The private link resource name.
