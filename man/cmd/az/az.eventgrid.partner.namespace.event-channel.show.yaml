# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get an event channel.
flags:
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --partner-namespace-name=: Name of the partner namespace.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the event channel.
documentation:
    command: This command is implicitly deprecated because command group 'eventgrid partner namespace event-channel' is deprecated and will be removed in a future release.
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the event channel.
        partner-namespace-name: Name of the partner namespace.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the details of an event channel.: az eventgrid partner namespace event-channel show -g rg1 --partner-namespace-name partnernamespace1 -n eventChannelName1
    Show the details of an event-channel based on resource ID.: az eventgrid partner namespace event-channel show --ids /subscriptions/{SubID}/resourceGroups/{RG}/providers/Microsoft.EventGrid/partnenamespaces/partnernamespace1/eventChannels/eventChannelName1
