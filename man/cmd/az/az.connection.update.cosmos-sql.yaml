# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: cosmos-sql
description: Update a local to cosmos-sql connection.
flags:
    --client-type=: The client type used on the connection
    --connection=: Name of the connection.
    --customized-keys=:
        description: The customized keys used to change default configuration names.
        nargs: -1
    --id=: The id of connection.
    --no-wait=: Do not wait for the long-running operation to finish.
    --secret=:
        description: The secret auth info
        nargs: -1
    --service-principal=:
        description: The service principal auth info
        nargs: -1
    --subscription=: Name or ID of subscription.
    --user-account=:
        description: The local user account auth info
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
completion:
    flag:
        client-type:
            - dotnet
            - dotnet-internal
            - java
            - python
            - nodejs
            - springBoot
            - none
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        client-type: |-
            The client type used on the connection.

            Accepted values: dotnet, dotnet-internal, java, nodejs, none, python, springBoot
        connection: Name of the connection.
        customized-keys: The customized keys used to change default configuration names. Key is the original name, value is the customized name.
        id: The id of connection.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        secret: 'The secret auth info. Usage: --secret.'
        service-principal: 'The service principal auth info. Usage: --service-principal client-id=XX secret=XX client-id      : Required. Client id of the service principal. object-id      : Optional. Object id of the service principal (Enterprise Application). secret         : Required. Secret of the service principal.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-account: 'The user account auth info. Usage: --user-account object-id=XX object-id              : Optional. Object id of current login user. It will be set automatically if not provided.'
examples:
    Update the client type of a connection with resource id: az connection update cosmos-sql --id /subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/Microsoft.ServiceLinker/locations/{location}/connectors/{connectorName} --client-type dotnet
    Update the client type of a connection with resource name: az connection update cosmos-sql -g resourceGroup --connection MyConnection --client-type dotnet
