# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get information about a gallery image version.
flags:
    --expand=: The expand expression to apply on the operation.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    -e, --gallery-image-version=: The name of the gallery image version to be deleted.
    -g, --resource-group=: Name of resource group.
    -i, --gallery-image-definition=: The name of the gallery image definition in which the Image Version resides.
    -r, --gallery-name=: The name of the Shared Image Gallery in which the Image Definition resides.
completion:
    flag:
        expand:
            - ReplicationStatus
            - UefiSettings
documentation:
    flag:
        expand: |-
            The expand expression to apply on the operation.

            Accepted values: ReplicationStatus, UefiSettings
        gallery-image-definition: The name of the gallery image definition in which the Image Version resides.
        gallery-name: The name of the Shared Image Gallery in which the Image Definition resides.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
