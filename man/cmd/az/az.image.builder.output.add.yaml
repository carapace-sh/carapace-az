# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add an image builder output distributor to an image builder template.
documentation:
    flag:
        artifact-tags: 'Tags that will be applied to the output artifact once it has been created by the distributor. space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        defer: Temporarily store the object in the local cache instead of sending to Azure. Use `az cache` commands to view/clear.
        gallery-replication-regions: Space-separated list of regions to replicate the image version into. Defaults to resource group's location.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        managed-image-location: Location where the customized image will be created. Defaults to resource group's location.
        output-name: Name of the image builder run output. Defaults to the name of the managed image or sig image definition.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vhd-uri: Optional Azure Storage URI for the distributed VHD blob. Omit to use the default (empty string) in which case VHD would be published to the storage account in the staging resource group.
flags:
    --artifact-tags=:
        description: Tags that will be applied to the output artifact once it has been created by the distributor.
        nargs: -1
    --defer=:
        description: Temporarily store the object in the local cache instead of sending to Azure.
        nargs: -1
    --gallery-image-definition=: Name or ID of the existing SIG image definition to create the customized image version with.
    --gallery-name=: Shared image gallery name, if image definition name and not ID was provided.
    --gallery-replication-regions=:
        description: Space-separated list of regions to replicate the image version into.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --is-vhd=: The output is a VHD distributor.
    --managed-image-location=: Location where the customized image will be created.
    --managed-image=: Name or ID of the customized managed image to be created.
    --output-name=: Name of the image builder run output.
    --subscription=: Name or ID of subscription.
    --versioning=: Describe how to generate new x.y.z version number for distribution.
    --vhd-uri=: Optional Azure Storage URI for the distributed VHD blob.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the image template.
completion:
    flag:
        versioning:
            - Latest
            - Source
