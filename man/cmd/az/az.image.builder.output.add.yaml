# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Add an image builder output distributor to an image builder template.
flags:
    --artifact-tags=:
        description: Tags that will be applied to the output artifact once it has been created by the distributor.
        nargs: -1
    --defer=:
        description: Temporarily store the object in the local cache instead of sending to Azure.
        nargs: -1
    --gallery-image-definition=: Name or ID of the existing SIG image definition to create the customized image version with.
    --gallery-name=: Shared image gallery name, if image definition name and not ID was provided.
    --gallery-replication-regions=:
        description: Space-separated list of regions to replicate the image version into.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --is-vhd=: The output is a VHD distributor.
    --managed-image-location=: Location where the customized image will be created.
    --managed-image=: Name or ID of the customized managed image to be created.
    --output-name=: Name of the image builder run output.
    --subscription=: Name or ID of subscription.
    --versioning=: Describe how to generate new x.y.z version number for distribution.
    --vhd-uri=: Optional Azure Storage URI for the distributed VHD blob.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the image template.
completion:
    flag:
        versioning:
            - Latest
            - Source
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        artifact-tags: 'Tags that will be applied to the output artifact once it has been created by the distributor. space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        change-reference: The related change reference ID for this resource operation.
        defer: Temporarily store the object in the local cache instead of sending to Azure. Use ``` az cache ``` commands to view/clear.
        gallery-image-definition: Name or ID of the existing SIG image definition to create the customized image version with.
        gallery-name: Shared image gallery name, if image definition name and not ID was provided.
        gallery-replication-regions: Space-separated list of regions to replicate the image version into. Defaults to resource group's location.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        is-vhd: The output is a VHD distributor.
        managed-image: Name or ID of the customized managed image to be created.
        managed-image-location: Location where the customized image will be created. Defaults to resource group's location.
        name: The name of the image template.
        output-name: Name of the image builder run output. Defaults to the name of the managed image or sig image definition.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        versioning: |-
            Describe how to generate new x.y.z version number for distribution.

            Accepted values: Latest, Source
        vhd-uri: Optional Azure Storage URI for the distributed VHD blob. Omit to use the default (empty string) in which case VHD would be published to the storage account in the staging resource group.
examples:
    Add a VHD distributor to an image template in the cli object cache.: |-
        az image builder output add -n mytemplate -g my-group \
            --output-name my_vhd_image --is-vhd  --defer
    Add a VHD distributor with specifying storage uri to an image template in the cli object cache.: |-
        az image builder output add -n mytemplate -g my-group \
            --output-name my_vhd_image --is-vhd --vhd-uri https://mystorageaccount.blob.core.windows.net/container/path_to_vhd_file --defer
    Add a managed image distributor to an image template in the cli object cache. Specify a run output name.: |-
        az image builder output add -n mytemplate -g my-group \
            --managed-image my_desired_image_name --output-name managed_image_run_01 --defer
    Add a shared image gallery distributor to an image template in the cli object cache. Specify its replication regions.: |-
        az image builder output add -n mytemplate -g my-group --gallery-name my_shared_gallery \
            --gallery-replication-regions westus brazilsouth \
            --gallery-image-definition linux_image_def --defer
