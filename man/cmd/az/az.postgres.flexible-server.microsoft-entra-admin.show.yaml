# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get a Microsoft Entra administrator.
flags:
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -i, --object-id=!: The unique ID of the Microsoft Entra administrator.
    -s, --server-name=!: Name of the server.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        object-id: The unique identifier of the Microsoft Entra administrator.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get Microsoft Entra administrator with identifier '00000000-0000-0000-0000-000000000000'.: az postgres flexible-server microsoft-entra-admin show -g testgroup -s testserver -i 00000000-0000-0000-0000-000000000000
