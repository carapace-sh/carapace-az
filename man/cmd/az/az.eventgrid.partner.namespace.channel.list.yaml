# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List available partner channels.
flags:
    --odata-query=: The OData query used for filtering the list results.
    --partner-namespace-name=!: Name of the partner namespace.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        odata-query: 'The OData query used for filtering the list results. Filtering is currently allowed on the Name property only. The supported operations include: CONTAINS, eq (for equal), ne (for not equal), AND, OR and NOT.'
        partner-namespace-name: Name of the partner namespace.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all channel under a partner namespace whose name contains the pattern "XYZ": az eventgrid partner namespace channel list -g rg1 --partner-namespace-name partnernamespace1  --odata-query "Contains(name, 'XYZ')"
    List all channels in a specific partner namespace.: az eventgrid partner namespace channel list -g rg1 --partner-namespace-name partnernamespace1
