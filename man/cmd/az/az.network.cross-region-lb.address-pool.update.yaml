# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a load balancer backend address pool.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --admin-state=: Default administrative state to backend addresses in `--backend-addresses`.
    --backend-addresses=:
        description: An array of backend addresses.
        nargs: -1
    --drain-period=: Amount of seconds Load Balancer waits for before sending RESET to client and backend address.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --lb-name=: The name of the load balancer.
    --location=: The location of the backend address pool.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --sync-mode=: Backend address synchronous mode for the backend pool
    --vnet-id=: A reference to a virtual network.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the backend address pool.
completion:
    flag:
        admin-state:
            - Down
            - None
            - Up
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        sync-mode:
            - Automatic
            - Manual
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        admin-state: Default administrative state to backend addresses in ```
        backend-address: '``` .'
        backend-addresses: 'An array of backend addresses.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.  Singular flags: `--backend-address`.'
        change-reference: The related change reference ID for this resource operation.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        lb-name: The name of the load balancer.
        location: The location of the backend address pool.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        sync-mode: |-
            Backend address synchronous mode for the backend pool.

            Accepted values: Automatic, Manual
        vnet-id: A reference to a virtual network.
examples:
    Remove the first backend address in the address pool using shorthand syntax: az network cross-region-lb address-pool update -g MyResourceGroup --lb-name MyLb -n MyAddressPool --backend-addresses [0]=null
    Update all backend addresses in the address pool using shorthand syntax: az network cross-region-lb address-pool update -g MyResourceGroup --lb-name MyLb -n MyAddressPool --backend-addresses "[{name:addr1,frontend-ip-address:'/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/cli_test_lb_address_pool_addresses000001/providers/Microsoft.Network/loadBalancers/regional-lb/frontendIPConfigurations/fe-rlb1'},{name:addr2,frontend-ip-address:'/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/cli_test_lb_address_pool_addresses000001/providers/Microsoft.Network/loadBalancers/regional-lb/frontendIPConfigurations/fe-rlb2'}]"
    Update the frontend-ip-address of the first backend address in the address pool using shorthand syntax: az network cross-region-lb address-pool update -g MyResourceGroup --lb-name MyLb -n MyAddressPool --backend-addresses [0].frontend-ip-address=/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/cli_test_lb_address_pool_addresses000001/providers/Microsoft.Network/loadBalancers/regional-lb/frontendIPConfigurations/fe-rlb1
