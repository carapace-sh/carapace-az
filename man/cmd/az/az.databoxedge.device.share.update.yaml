# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update share on the device.
flags:
    --access-protocol=: Access protocol to be used by the share.
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --azure-container-info=:
        description: Azure container mapping for the share.
        nargs: -1
    --client-access-rights=:
        description: List of IP addresses and corresponding access rights on the share(required for NFS protocol).
        nargs: -1
    --data-policy=: Data policy of the share.
    --description=: Description for the share.
    --device-name=: The device name.
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --monitoring-status=: Current monitoring status of the share.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --refresh-details=:
        description: Details of the refresh job on this share.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --share-status=: Current status of the share.
    --subscription=: Name or ID of subscription.
    --user-access-rights=:
        description: Mapping of users and corresponding access rights on the share (required for SMB protocol).
        nargs: -1
    -g, --resource-group=: Name of resource group.
    -n, --name=: The share name.
completion:
    flag:
        access-protocol:
            - NFS
            - SMB
        data-policy:
            - Cloud
            - Local
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        monitoring-status:
            - Disabled
            - Enabled
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        share-status:
            - NeedsAttention
            - OK
            - Offline
            - Unknown
            - Updating
documentation:
    flag:
        access-protocol: |-
            Access protocol to be used by the share.

            Accepted values: NFS, SMB
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: ``` --add property.listProperty <key=value, string or JSON string> ``` .'
        azure-container-info: Azure container mapping for the share.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        change-reference: The related change reference ID for this resource operation.
        client-access-rights: List of IP addresses and corresponding access rights on the share(required for NFS protocol).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        data-policy: |-
            Data policy of the share.

            Accepted values: Cloud, Local
        description: Description for the share.
        device-name: The device name.
        force-string: |-
            When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        monitoring-status: |-
            Current monitoring status of the share.

            Accepted values: Disabled, Enabled
        name: The share name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        refresh-details: Details of the refresh job on this share.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remove: 'Remove a property or an element from a list.  Example: ``` --remove property.list <indexToRemove> ``` OR ``` --remove propertyToRemove ``` .'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        set: 'Update an object by specifying a property path and value to set.  Example: ``` --set property1.property2=<value> ``` .'
        share-status: |-
            Current status of the share.

            Accepted values: NeedsAttention, OK, Offline, Unknown, Updating
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        user-access-rights: Mapping of users and corresponding access rights on the share (required for SMB protocol).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
examples:
    Update share: az databoxedge device share update -g rg -n share-name --device-name name --description test
