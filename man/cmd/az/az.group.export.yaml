# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: export
description: Captures a resource group as a template.
flags:
    --include-comments=: export template with comments.
    --include-parameter-default-value=: export template parameter with default value.
    --resource-ids=:
        description: space-separated resource ids to filter the export by.
        nargs: -1
    --skip-all-params=: export template parameter and skip all parameterization.
    --skip-resource-name-params=: export template and skip resource name parameterization.
    --subscription=: Name or ID of subscription.
    -n, --name=!: Name of resource group.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        export-format: |-
            The format of the exported template.

            Default value: json

            Accepted values: arm, bicep, json
        include-comments: |-
            Export template with comments.

            Default value: False
        include-parameter-default-value: |-
            Export template parameter with default value.

            Default value: False
        name: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        resource-ids: space-separated resource ids to filter the export by. To export all resources, do not specify this argument or supply "*".
        skip-all-params: |-
            Export template parameter and skip all parameterization.

            Default value: False
        skip-resource-name-params: |-
            Export template and skip resource name parameterization.

            Default value: False
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
