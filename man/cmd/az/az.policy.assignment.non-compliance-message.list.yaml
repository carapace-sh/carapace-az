# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List the non-compliance messages for a policy assignment.
flags:
    --scope=: Scope at which this policy assignment subcommand applies.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: the resource group where the policy will be applied
    -n, --name=!: Name of the policy assignment.
documentation:
    command: Retrieve non-compliance messages.
    flag:
        name: The name of the policy assignment.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scope: Scope at which this policy assignment subcommand applies. Defaults to current context subscription.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List the non-compliance messages for a policy assignment: az policy assignment non-compliance-message list -g MyResourceGroup -n MyPolicyAssignment
