# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a connection monitor.
documentation:
    flag:
        endpoints: List of connection monitor endpoints.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        outputs: List of connection monitor outputs.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Connection monitor tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        test-configurations: List of connection monitor test configurations.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        test-groups: List of connection monitor test groups.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --auto-start=:
        description: Determines if the connection monitor will start automatically once created.
        nargs: -1
    --endpoints=:
        description: List of connection monitor endpoints.
        nargs: -1
    --location=: Connection monitor location.
    --migrate=: Value indicating whether connection monitor V1 should be migrated to V2 format.
    --network-watcher-name=!: The name of the Network Watcher resource.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --notes=: Optional notes to be associated with the connection monitor.
    --outputs=:
        description: List of connection monitor outputs.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Connection monitor tags.
        nargs: -1
    --test-configurations=:
        description: List of connection monitor test configurations.
        nargs: -1
    --test-groups=:
        description: List of connection monitor test groups.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the connection monitor.
completion:
    flag:
        auto-start:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
