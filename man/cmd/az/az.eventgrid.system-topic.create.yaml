# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a system topic.
flags:
    --identity=: The managed identity type for the resource.
    --mi-system-assigned=: Presence of this param indicates that SystemAssigned managed identity will be used
    --mi-user-assigned=:
        description: Add user assigned identities when identityType is user or mixed.
        nargs: -1
    --source=!: The ARM Id for the topic, e.g., /subscriptions/{SubId}/resourceGroups/{RgName}/providers/Microsoft.Storage/storageAccounts/{AccountName}
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --topic-type=!: Name of the topic type.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: Name of the system topic.
completion:
    flag:
        identity:
            - noidentity
            - systemassigned
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        identity: |-
            Argument 'identity' has been deprecated and will be removed in a future release. The managed identity type for the resource. Will be deprecated and replaced by --mi-system-assigned-identity in future.

            Accepted values: noidentity, systemassigned
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        mi-system-assigned: Presence of this param indicates that SystemAssigned managed identity will be used.
        mi-user-assigned: Add user assigned identities when identityType is user or mixed. This attribute is valid for all destination types except StorageQueue. Multiple attributes can be specified by using more than one `--mi-user-assigned` argument
        name: Name of the system topic.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        source: The ARM Id for the topic, e.g., /subscriptions/{SubId}/resourceGroups/{RgName}/providers/Microsoft.Storage/storageAccounts/{AccountName}.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        topic-type: Name of the topic type.
examples:
    Create a new system topic for storage account source.: az eventgrid system-topic create -g rg1 --name systemtopic1 --location westus2 --topic-type microsoft.storage.storageaccounts --source /subscriptions/1b3b4501-23b9-4790-c31b-ddbd88d72123/resourceGroups/rg2/providers/Microsoft.Storage/storageAccounts/stgaccountname
    Create a new system topic with systemassigned identity: az eventgrid system-topic create -g rg1 --name systemtopic1 --location westus2 --topic-type microsoft.storage.storageaccounts --source /subscriptions/1b3b4501-23b9-4790-c31b-ddbd88d72123/resourceGroups/rg2/providers/Microsoft.Storage/storageAccounts/stgaccountname --identity systemassigned
