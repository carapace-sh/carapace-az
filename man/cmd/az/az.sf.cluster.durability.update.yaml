# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the durability tier or VM SKU of a node type in the cluster.
flags:
    --durability-level=!: durability level.
    --node-type=!: the Node type name.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
completion:
    flag:
        durability-level:
            - Bronze
            - Silver
            - Gold
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        durability-level: |-
            Durability level.

            Accepted values: Bronze, Gold, Silver
        node-type: The Node type name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Change the cluster durability level to 'Silver'.: az sf cluster durability update -g group-name -c cluster1 --durability-level Silver --node-type nt1
