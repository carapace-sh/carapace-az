# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update the durability tier or VM SKU of a node type in the cluster.
documentation:
    flag:
        resource-group: Specify the resource group name. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --durability-level=!: durability level.
    --node-type=!: the Node type name.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
completion:
    flag:
        durability-level:
            - Bronze
            - Silver
            - Gold
