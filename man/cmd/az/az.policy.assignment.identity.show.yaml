# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show a policy assignment's managed identity.
flags:
    --scope=: Scope at which this policy assignment subcommand applies.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: the resource group where the policy will be applied
    -n, --name=!: Name of the policy assignment.
documentation:
    command: Retrieve the managed identity.
    flag:
        name: The name of the policy assignment.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scope: Scope at which this policy assignment subcommand applies. Defaults to current context subscription.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show a policy assignment's managed identity: az policy assignment identity show --name MyPolicyAssignment --scope '/providers/Microsoft.Management/managementGroups/{managementGroupName}'
