# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Selectively update the set of tags on a specific resource.
documentation:
    flag:
        resource-id: The resource identifier for the tagged entity. A resource, a resource group or a subscription may be tagged.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --operation=!: 'The update operation: options include Merge, Replace and Delete.'
    --resource-id=!: The resource identifier for the tagged entity.
    --subscription=: Name or ID of subscription.
    --tags=!:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
completion:
    flag:
        operation:
            - Merge
            - Replace
            - Delete
