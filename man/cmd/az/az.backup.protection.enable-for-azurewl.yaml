# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: enable-for-azurewl
description: Start protecting a previously unprotected workload within an Azure VM as per the specified policy to a Recovery services vault.
flags:
    --protectable-item-name=!: Specify the resource name to be protected by Azure Backup service.
    --protectable-item-type=!: Specify the type of items within the Resource which should be discovered and protected by Azure Backup.
    --server-name=!: Parent Server name of the item.
    --subscription=: Name or ID of subscription.
    --workload-type=!: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
    -g, --resource-group=!: Name of resource group.
    -p, --policy-name=!: Name of the backup policy.
    -v, --vault-name=!: Name of the Recovery services vault.
completion:
    flag:
        protectable-item-type:
            - SQLAG
            - SQLInstance
            - SQLDatabase
            - HANAInstance
            - SAPHanaDatabase
            - SAPHanaSystem
        workload-type:
            - VM
            - AzureFileShare
            - SAPHANA
            - MSSQL
            - SAPHanaDatabase
            - SQLDataBase
documentation:
    command: Start protecting a previously unprotected workload within an Azure VM as per the specified policy to a Recovery services vault. Provide the workload details as a protectable item.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        policy-name: Name of the backup policy.
        protectable-item-name: Specify the resource name to be protected by Azure Backup service.
        protectable-item-type: |-
            Specify the type of items within the Resource which should be discovered and protected by Azure Backup. 'HANAInstance' and 'SAPHanaSystem' can be used interchangeably.

            Accepted values: HANAInstance, SAPAseDatabase, SAPHanaDBInstance, SAPHanaDatabase, SAPHanaSystem, SQLAG, SQLDatabase, SQLInstance
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Parent Server name of the item.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Recovery services vault.
        workload-type: |-
            Specify the type of applications within the Resource which should be discovered and protected by Azure Backup. 'MSSQL' and 'SQLDataBase' can be used interchangeably for SQL in Azure VM, as can 'SAPHANA' and 'SAPHanaDatabase' for SAP HANA in Azure VM.

            Accepted values: AzureFileShare, MSSQL, SAPASE, SAPAseDatabase, SAPHANA, SAPHanaDBInstance, SAPHanaDatabase, SQLDataBase, VM
examples:
    ? Start protecting a previously unprotected workload within an Azure VM as per the specified policy to a Recovery services vault. Provide the workload details as a protectable item.
    : az backup protection enable-for-azurewl --policy-name MyPolicy --resource-group MyResourceGroup --vault-name MyVault --protectable-item-name ItemName --protectable-item-type SQLInstance --server-name Myserver --workload-type MSSQL
