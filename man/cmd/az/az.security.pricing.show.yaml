# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Shows the Azure Defender plan for the subscription
flags:
    --subscription=: Name or ID of subscription.
    -n, --name=!: name of the resource to be fetched
documentation:
    command: Shows the Azure Defender plan for the subscription.
    flag:
        name: Name of the resource to be fetched.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Shows the Azure Defender plan for the subscription: az security pricing show -n VirtualMachines
