# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add-record
description: Add an SRV record.
flags:
    --if-none-match=: Create the record set only if it does not already exist.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -p, --priority=!: Priority metric.
    -r, --port=!: Service port.
    -t, --target=!: Target domain name.
    -w, --weight=!: Weight metric.
    -z, --zone-name=!: The name of the zone.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        if-none-match: Create the record set only if it does not already exist.
        port: Service port.
        priority: Priority metric.
        record-set-name: The name of the record set relative to the zone. Creates a new record set if one does not exist.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target: Target domain name.
        weight: Weight metric.
        zone-name: The name of the zone.
examples:
    Add an SRV record.: |-
        az network dns record-set srv add-record -g MyResourceGroup -z www.mysite.com \
            -n MyRecordSet -t webserver.mysite.com -r 8081 -p 10 -w 10
