# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Updates the Azure defender plan for the subscription.
documentation:
    flag:
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --extensions=:
        description: pricing extensions
        nargs: -1
    --subplan=: bundle suplan
    --subscription=: Name or ID of subscription.
    --tier=!: pricing tier type
    -n, --name=!: name of the resource to be fetched
