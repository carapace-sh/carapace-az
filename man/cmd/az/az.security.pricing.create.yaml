# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Updates the Azure defender plan for the subscription.
flags:
    --extensions=:
        description: pricing extensions
        nargs: -1
    --subplan=: bundle suplan
    --subscription=: Name or ID of subscription.
    --tier=!: pricing tier type
    -n, --name=!: name of the resource to be fetched
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        extensions: Pricing extensions.
        name: Name of the resource to be fetched.
        subplan: Bundle suplan.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tier: Pricing tier type.
examples:
    Updates the Azure defender plan for the subscription with suplan and extensions: az security pricing create -n VirtualMachines --tier standard --subplan P2 --extensions name=MdeDesignatedSubscription isEnabled=False --extensions name=AgentlessVmScanning isEnabled=True additionalExtensionProperties='{"ExclusionTags":"[{\"key\":\"A\",\"value\":\"B\"}]"}'
    Updates the Azure defender plan for the subscription.: az security pricing create -n VirtualMachines --tier standard
