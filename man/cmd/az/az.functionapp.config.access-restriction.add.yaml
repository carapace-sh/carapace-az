# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add
description: Adds an Access Restriction to the function app
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        slot: the name of the slot. Default to the productions slot if not specified
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --action=: Allow or deny access
    --description=: Description of the access restriction rule
    --http-headers=:
        description: space-separated http headers in a format of `<name>=<value>`
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --ip-address=: IP address or CIDR range (optional comma separated list of up to 8 ranges)
    --scm-site=:
        description: True if access restrictions is added for scm site
        nargs: -1
    --service-tag=: Service Tag (optional comma separated list of up to 8 tags)
    --subnet=: Subnet name (requires vNet name) or subnet resource id
    --subscription=: Name or ID of subscription.
    --vnet-name=: vNet name
    --vnet-resource-group=: Resource group of virtual network (default is web app resource group)
    -g, --resource-group=: Name of resource group.
    -i, --ignore-missing-endpoint=:
        description: Create access restriction rule with checking if the subnet has Microsoft.Web service endpoint enabled
        nargs: -1
    -k, --skip-service-tag-validation=:
        description: Skip validating public service tags
        nargs: -1
    -n, --name=: name of the function app.
    -p, --priority=!: Priority of the access restriction rule
    -r, --rule-name=: Name of the access restriction rule to add
    -s, --slot=: the name of the slot.
completion:
    flag:
        action:
            - Allow
            - Deny
        ignore-missing-endpoint:
            - "true"
            - "false"
        scm-site:
            - "true"
            - "false"
        skip-service-tag-validation:
            - "true"
            - "false"
