# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show-backend-health
description: Get information on the backend health of an application gateway.
flags:
    --address-pool=: The name or ID of the backend address pool.
    --expand=: Expands BackendAddressPool and BackendHttpSettings referenced in backend health.
    --host-name-from-http-settings=:
        description: Use host header from HTTP settings.
        nargs: -1
    --host=: The name of the host to send the probe.
    --http-settings=: The name or ID of the HTTP settings.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --match-body=: Body that must be contained in the health response.
    --match-status-codes=:
        description: Space-separated list of allowed ranges of healthy status codes for the health response.
        nargs: -1
    --path=: The relative path of the probe.
    --protocol=: The HTTP settings protocol.
    --subscription=: Name or ID of subscription.
    --timeout=: The probe timeout in seconds.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the application gateway.
completion:
    flag:
        host-name-from-http-settings:
            - "true"
            - "false"
        protocol:
            - Http
            - Https
            - Tcp
            - Tls
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        address-pool: The name or ID of the backend address pool.
        change-reference: The related change reference ID for this resource operation.
        expand: Expands BackendAddressPool and BackendHttpSettings referenced in backend health.
        host: The name of the host to send the probe.
        host-name-from-http-settings: |-
            Use host header from HTTP settings.

            Accepted values: false, true
        http-settings: The name or ID of the HTTP settings.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        match-body: Body that must be contained in the health response.
        match-status-codes: Space-separated list of allowed ranges of healthy status codes for the health response.
        name: Name of the application gateway.
        path: The relative path of the probe. Valid paths start from "/".
        protocol: |-
            The HTTP settings protocol.

            Accepted values: Http, Https, Tcp, Tls
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: The probe timeout in seconds.
examples:
    Show backend health of an application gateway for given combination of backend pool and http setting.: az network application-gateway show-backend-health -g MyResourceGroup -n MyAppGateway --host-name-from-http-settings --path /test --timeout 100 --http-settings appGatewayBackendHttpSettings --address-pool appGatewayBackendPool
    Show backend health of an application gateway.: az network application-gateway show-backend-health -g MyResourceGroup -n MyAppGateway
