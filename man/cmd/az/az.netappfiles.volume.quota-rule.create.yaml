# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create the specified quota rule within the given volume
documentation:
    flag:
        quota-target: UserID/GroupID/SID based on the quota target type. UserID and groupID can be found by running `id` or `getent` command for the user or group and SID can be found by running :code:wmic useraccount where name='user-name' get sid`
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --quota-size=: Size of quota in KiB
    --quota-target=: UserID/GroupID/SID based on the quota target type.
    --quota-type=: Type of quota
    --subscription=: Name or ID of subscription.
    --tags=:
        description: Resource tags.
        nargs: -1
    -a, --account-name=!: The name of the NetApp account
    -g, --resource-group=!: Name of resource group.
    -l, --location=: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    -n, --name=!: The name of volume quota rule
    -p, --pool-name=!: The name of the capacity pool
    -v, --volume-name=!: The name of the volume
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        quota-type:
            - DefaultGroupQuota
            - DefaultUserQuota
            - IndividualGroupQuota
            - IndividualUserQuota
