# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all replications for a specified volume
flags:
    --subscription=: Name or ID of subscription.
    -a, --account-name=!: The name of the NetApp account
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the volume
    -p, --pool-name=!: The name of the capacity pool
documentation:
    command: List all replications for a specified volume.
    flag:
        account-name: The name of the NetApp account. --name --volume-name -n -v The name of the volume.
        exclude: |-
            Exclude Replications filter. 'None' returns all replications, 'Deleted' excludes deleted replications. Default is 'None'.

            Default value: None

            Accepted values: Deleted, None
        pool-name: The name of the capacity pool.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all replications for a specified volume: az netappfiles volume replication list -g mygroup --account-name myaccname --pool-name mypoolname --name mydestinationvolname
