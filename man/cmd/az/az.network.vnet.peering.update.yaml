# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a peering in the specified virtual network.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        local-subnet-names: List of local subnet names that are subnet peered with remote virtual network.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remote-subnet-names: List of remote subnet names from remote virtual network that are subnet peered.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        use-remote-gateways: Allows VNet to use the remote VNet's gateway. Remote VNet gateway must have --allow-gateway-transit enabled for remote peering. Only 1 peering can have this flag enabled. Cannot be set if the VNet already has a gateway.
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --allow-forwarded-traffic=:
        description: Allows forwarded traffic from the local VNet to the remote VNet.
        nargs: -1
    --allow-gateway-transit=:
        description: Allows gateway link to be used in the remote VNet.
        nargs: -1
    --allow-vnet-access=:
        description: Allows access from the local VNet to the remote VNet.
        nargs: -1
    --enable-only-ipv6=:
        description: Whether only Ipv6 address space is peered for subnet peering.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --local-subnet-names=:
        description: List of local subnet names that are subnet peered with remote virtual network.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --peer-complete-vnets=:
        description: Whether complete virtual network address space is peered.
        nargs: -1
    --remote-subnet-names=:
        description: List of remote subnet names from remote virtual network that are subnet peered.
        nargs: -1
    --remote-vnet=: Name or ID of the remote VNet.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --sync-remote=: Parameter indicates the intention to sync the peering with the current address space on the remote vNet after it's updated.
    --use-remote-gateways=:
        description: Allows VNet to use the remote VNet's gateway.
        nargs: -1
    --vnet-name=: The virtual network (VNet) name.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the VNet peering.
