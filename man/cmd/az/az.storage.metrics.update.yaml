# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update metrics settings for a storage account.
documentation:
    flag:
        account-key: 'Storage account key. Must be used in conjunction with storage account name. Environment variable: AZURE_STORAGE_KEY'
        account-name: 'Storage account name. Related environment variable: AZURE_STORAGE_ACCOUNT. Must be used in conjunction with either storage account key or a SAS token. If neither are present, the command will try to query the storage account key using the authenticated Azure account. If a large number of storage commands are executed the API quota may be hit'
        api: Specify whether to include API in metrics. Applies to both hour and minute metrics if both are specified. Must be specified if hour or minute metrics are enabled and being updated.
        connection-string: 'Storage account connection string. Environment variable: AZURE_STORAGE_CONNECTION_STRING'
        retention: Number of days for which to retain metrics. 0 to disable. Applies to both hour and minute metrics if both are specified.
        sas-token: 'A Shared Access Signature (SAS). Must be used in conjunction with storage account name. Environment variable: AZURE_STORAGE_SAS_TOKEN'
        services: 'The storage services from which to retrieve metrics info: (b)lob (q)ueue (t)able. Can be combined.'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        timeout: Request timeout in seconds. Applies to each call to the service.
flags:
    --account-key=: Storage account key.
    --account-name=: Storage account name.
    --api=: Specify whether to include API in metrics.
    --connection-string=: Storage account connection string.
    --hour=: Update the hourly metrics
    --minute=: Update the by-minute metrics
    --retention=!: Number of days for which to retain metrics.
    --sas-token=: A Shared Access Signature (SAS).
    --services=!: 'The storage services from which to retrieve metrics info: (b)lob (q)ueue (t)able.'
    --subscription=: Name or ID of subscription.
    --timeout=: Request timeout in seconds.
completion:
    flag:
        api:
            - "true"
            - "false"
        hour:
            - "true"
            - "false"
        minute:
            - "true"
            - "false"
