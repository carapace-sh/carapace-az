# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update an Azure Cosmos DB SQL container throughput
flags:
    --max-throughput=: The maximum throughput resource can scale to (RU/s).
    --subscription=: Name or ID of subscription.
    --throughput=: The throughput of SQL container (RU/s).
    -a, --account-name=!: Cosmosdb account name.
    -d, --database-name=!: Database name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Container name
documentation:
    command: Update the throughput of the SQL container under an Azure Cosmos DB SQL database.
    flag:
        account-name: Cosmosdb account name.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        database-name: Database name.
        max-throughput: The maximum throughput resource can scale to (RU/s). Provided when the resource is autoscale enabled. The minimum value can be 4000 (RU/s).
        name: Container name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        throughput: The throughput of SQL container (RU/s).
        throughput-buckets: 'Throughput Buckets, you can enter it as a string or as a file, e.g., --throughput-buckets @throughput-buckets-file.json or --throughput-buckets "[ { "id": 1, "maxThroughputPercentage" : 10 }, { "id": 2, "maxThroughputPercentage" : 20, "isDefaultBucket": true } ]".'
examples:
    Update the throughput of the SQL container under an Azure Cosmos DB SQL database.: az cosmosdb sql container throughput update --resource-group resource_group --account-name database_account_name --database-name parent_database_name --name name_of_collection_needs_to_be_restored --throughput 1000
