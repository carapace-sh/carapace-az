# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: add-record
description: Add a TLSA record.
documentation:
    flag:
        record-set-name: The name of the record set relative to the zone. Creates a new record set if one does not exist.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --certificate-data=!: This specifies the certificate association data to be matched.
    --certificate-usage=!: The usage specifies the provided association that will be used to match the certificate presented in the TLS handshake.
    --if-none-match=: Create the record set only if it does not already exist.
    --matching-type=!: The matching type specifies how the certificate association is presented.
    --selector=!: The selector specifies which part of the TLS certificate presented by the server will be matched against the association data.
    --subscription=: Name or ID of subscription.
    --ttl=: Record set TTL (time-to-live)
    -g, --resource-group=!: Name of resource group.
    -n, --record-set-name=!: The name of the record set relative to the zone.
    -z, --zone-name=!: The name of the zone.
