# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore-file
description: Restore the specified files from the specified backup to the active filesystem
documentation:
    flag:
        file-list: List of files to be restored  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        restore-file-path: Destination folder where the files will be restored. The path name should start with a forward slash. If it is omitted from request then restore is done at the root folder of the destination volume by default
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --destination-volume-id=!: Resource Id of the destination volume on which the files need to be restored
    --file-list=!:
        description: List of files to be restored  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --restore-file-path=: Destination folder where the files will be restored.
    --subscription=: Name or ID of subscription.
    -a, --account-name=: The name of the NetApp account
    -b, --backup-name=: The name of the backup
    -g, --resource-group=: Name of resource group.
    -v, --backup-vault-name=: The name of the Backup Vault
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
