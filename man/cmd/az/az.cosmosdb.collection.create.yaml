# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates an Azure Cosmos DB collection
documentation:
    flag:
        cep: |
            Client Encryption Policy, you can enter it as a string or as a file, e.g., --cep @policy-file.json or --cep "{\"includedPaths\": [{\"path\": \"/path1\",\"clientEncryptionKeyId\": \"key1\",\"encryptionAlgorithm\": \"AEAD_AES_256_CBC_HMAC_SHA256\",\"encryptionType\": \"Deterministic\"}],\"policyFormatVersion\": 2}"
        default-ttl: Default TTL. Provide 0 to disable.
        key: Cosmos DB account key. Must be used in conjunction with cosmosdb account name or url-connection.
        name: Cosmos DB account name. Must be used in conjunction with either name of the resource group or cosmosdb account key.
        resource-group-name: name of the resource group. Must be used in conjunction with cosmosdb account name.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        url-connection: Cosmos DB account url connection. Must be used in conjunction with cosmosdb account key.
        vector-embeddings: |
            Vector Embedding Policy, you can enter it as a string or as a file, e.g., --vector-embeddings @policy-file.json or --vector-embeddings "{\"vectorEmbeddings\": [{\"path\": \"/vector1\", \"dataType\": \"float32\", \"dimensions\": 2, \"distanceFunction\": \"dotproduct\" }]}"
flags:
    --cep=: 'Client Encryption Policy, you can enter it as a string or as a file, e.g., --cep @policy-file.json or --cep "{\"includedPaths\": [{\"path\": \"/path1\",\"clientEncryptionKeyId\": \"key1\",\"encryptionAlgorithm\": \"AEAD_AES_256_CBC_HMAC_SHA256\",\"encryptionType\": \"Deterministic\"}],\"policyFormatVersion\": 2}"'
    --default-ttl=: Default TTL.
    --indexing-policy=: Indexing Policy, you can enter it as a string or as a file, e.g., --indexing-policy @policy-file.json)
    --key=: Cosmos DB account key.
    --partition-key-path=: Partition Key Path, e.g., '/properties/name'
    --subscription=: Name or ID of subscription.
    --throughput=: Offer Throughput (RU/s)
    --url-connection=: Cosmos DB account url connection.
    --vector-embeddings=: 'Vector Embedding Policy, you can enter it as a string or as a file, e.g., --vector-embeddings @policy-file.json or --vector-embeddings "{\"vectorEmbeddings\": [{\"path\": \"/vector1\", \"dataType\": \"float32\", \"dimensions\": 2, \"distanceFunction\": \"dotproduct\" }]}"'
    -c, --collection-name=!: Collection Name
    -d, --db-name=!: Database Name
    -g, --resource-group-name=: name of the resource group.
    -n, --name=: Cosmos DB account name.
