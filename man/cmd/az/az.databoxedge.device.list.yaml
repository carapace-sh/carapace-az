# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Get all the Data Box Edge/Data Box Gateway devices in a resource group or in a subscription.
flags:
    --expand=: Specify $expand=details to populate additional fields related to the resource or Specify `$skipToken=<token>` to populate the next page in the list.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    command: List all the Data Box Edge/Data Box Gateway devices in a subscription.
    flag:
        expand: Specify $expand=details to populate additional fields related to the resource or Specify $skipToken=token to populate the next page in the list.
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in ```
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Get all the Data Box Edge/Data Box Gateway devices in a resource group.: az databoxedge device list --resource-group "GroupForEdgeAutomation"
    Get all the Data Box Edge/Data Box Gateway devices in a subscription.: az databoxedge device list
