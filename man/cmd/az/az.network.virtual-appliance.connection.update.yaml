# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update existing connection to Network Virtual Appliance
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        associated-route-table: The resource id RouteTable associated with this RoutingConfiguration.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        inbound-route-map: The resource id of the RouteMap associated with this RoutingConfiguration for inbound learned routes.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        labels: The list of labels.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        outbound-route-map: The resource id of theRouteMap associated with this RoutingConfiguration for outbound advertised routes.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        propagated: List of resource id of propagated route tables.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --associated-route-table=:
        description: The resource id RouteTable associated with this RoutingConfiguration.
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --inbound-route-map=:
        description: The resource id of the RouteMap associated with this RoutingConfiguration for inbound learned routes.
        nargs: -1
    --labels=:
        description: The list of labels.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --nva=: The name of the Network Virtual Appliance.
    --outbound-route-map=:
        description: The resource id of theRouteMap associated with this RoutingConfiguration for outbound advertised routes.
        nargs: -1
    --propagated=:
        description: List of resource id of propagated route tables.
        nargs: -1
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the NVA connection.
completion:
    flag:
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
