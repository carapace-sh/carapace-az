# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show an authorization certificate.
flags:
    --gateway-name=!: Name of the application gateway.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the authentication certificate.
documentation:
    flag:
        gateway-name: Name of the application gateway.
        name: Name of the authentication certificate.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show an authorization certificate.: az network application-gateway auth-cert show -g MyResourceGroup --gateway-name MyAppGateway -n MyAuthCert
    View expiry date of an authorization certificate. It is in Base-64 encoded X.509 (.CER) format.: az network application-gateway auth-cert show -g MyResourceGroup --gateway-name MyAppGateway -n MyAuthCert --query data -o tsv | base64 -d | openssl x509 -enddate -noout
