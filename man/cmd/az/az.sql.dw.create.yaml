# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Creates a datawarehouse.
documentation:
    flag:
        backup-storage-redundancy: 'Backup storage redundancy used to store backups. Allowed values include: Local, Zone, Geo, GeoZone.'
        max-size: The max storage size. If no unit is specified, defaults to bytes (B).
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        server: Name of the Azure SQL Server. You can configure the default using `az configure --defaults sql-server=<name>`
        service-objective: 'The service objective for the new database. For example: DW100, DW1000c'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        zone-redundant: Specifies whether to enable zone redundancy. Default is true if no value is specified
flags:
    --availability-zone=: Availability zone
    --backup-storage-redundancy=: Backup storage redundancy used to store backups.
    --collation=: The collation of the data warehouse.
    --max-size=: The max storage size.
    --no-wait=: Do not wait for the long-running operation to finish.
    --service-objective=: The service objective for the new database.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --zone-redundant=:
        description: Specifies whether to enable zone redundancy.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the data warehouse.
    -s, --server=!: Name of the Azure SQL Server.
completion:
    flag:
        zone-redundant:
            - "true"
            - "false"
