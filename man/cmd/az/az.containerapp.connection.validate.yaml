# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: validate
description: Validate a containerapp connection.
flags:
    --connection=: Name of the containerapp connection.
    --id=: The resource id of the connection.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: The resource group which contains the container app.
    -n, --name=: Name of the container app.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        connection: Name of the containerapp connection.
        id: The resource id of the connection. ['--resource-group', '--name', '--connection'] are required if '--id' is not specified.
        name: Name of the container app. Required if '--id' is not specified.None.
        resource-group: The resource group which contains the container app. Required if '--id' is not specified.None.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Validate a connection by connection id: az containerapp connection validate --id /subscriptions/{subscription}/resourceGroups/{source_resource_group}/providers/Microsoft.Web/sites/{site}/providers/Microsoft.ServiceLinker/linkers/{linker}
    Validate a connection by connection name: az containerapp connection validate -g ContainerAppRG -n MyContainerApp --connection MyConnection
    Validate a connection interactively: az containerapp connection validate
