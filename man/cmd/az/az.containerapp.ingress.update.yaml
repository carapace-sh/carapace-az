# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update ingress for a container app.
documentation:
    flag:
        exposed-port: Additional exposed port. Only supported by tcp transport protocol. Must be unique per environment if the app ingress is external.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the Containerapp. A name must consist of lower case alphanumeric characters or '-', start with a letter, end with an alphanumeric character, cannot have '--', and must be less than 32 characters.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --allow-insecure=:
        description: Allow insecure connections for ingress traffic.
        nargs: -1
    --exposed-port=: Additional exposed port.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --target-port=: The application port used for ingress traffic.
    --transport=: The transport protocol used for ingress traffic.
    --type=: The ingress type.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the Containerapp.
completion:
    flag:
        allow-insecure:
            - "true"
            - "false"
        transport:
            - auto
            - http
            - http2
            - tcp
        type:
            - internal
            - external
