# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create sitecontainers for a linux webapp
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        slot: Name of the web app slot. Default to the productions slot if not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --container-name=: Name of the SiteContainer
    --image=: Image Name
    --is-main=:
        description: true if the container is the main SiteContainer; false otherwise
        nargs: -1
    --registry-password=: Password used for image registry auth
    --registry-username=: Username used for image registry auth
    --sitecontainers-spec-file=: Path to a json sitecontainer spec file containing a list of sitecontainers, other sitecontainer input args will be ignored if this arg is provided
    --startup-cmd=: Startup Command for the SiteContainer
    --subscription=: Name or ID of subscription.
    --system-assigned-identity=:
        description: If true, the system-assigned identity will be used for auth while pulling image
        nargs: -1
    --target-port=: Target port for SiteContainer
    --user-assigned-identity=: ClientID for the user-maganed identity which will be used for auth while pulling image
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the linux webapp
    -s, --slot=: Name of the web app slot.
completion:
    flag:
        is-main:
            - "true"
            - "false"
        system-assigned-identity:
            - "true"
            - "false"
