# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create sitecontainers for a linux webapp
flags:
    --container-name=: Name of the SiteContainer
    --image=: Image Name
    --is-main=:
        description: true if the container is the main SiteContainer; false otherwise
        nargs: -1
    --registry-password=: Password used for image registry auth
    --registry-username=: Username used for image registry auth
    --sitecontainers-spec-file=: Path to a json sitecontainer spec file containing a list of sitecontainers, other sitecontainer input args will be ignored if this arg is provided
    --startup-cmd=: Startup Command for the SiteContainer
    --subscription=: Name or ID of subscription.
    --system-assigned-identity=:
        description: If true, the system-assigned identity will be used for auth while pulling image
        nargs: -1
    --target-port=: Target port for SiteContainer
    --user-assigned-identity=: ClientID for the user-maganed identity which will be used for auth while pulling image
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the linux webapp
    -s, --slot=: Name of the web app slot.
completion:
    flag:
        is-main:
            - "true"
            - "false"
        system-assigned-identity:
            - "true"
            - "false"
documentation:
    command: Create sitecontainers for a linux webapp.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        container-name: Name of the SiteContainer.
        image: Image Name.
        is-main: |-
            True if the container is the main SiteContainer; false otherwise.

            Accepted values: false, true
        name: Name of the linux webapp.
        registry-password: Password used for image registry auth.
        registry-username: |-
            Username used for image registry auth. --si --system-assigned-identity If true, the system-assigned identity will be used for auth while pulling image.

            Accepted values: false, true
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        slot: Name of the web app slot. Default to the productions slot if not specified.
        startup-cmd: Startup Command for the SiteContainer.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        target-port: Target port for SiteContainer. --ui --user-assigned-identity ClientID for the user-maganed identity which will be used for auth while pulling image.
examples:
    Create a main sitecontainer for a linux webapp: az webapp sitecontainers create --name MyWebApp --resource-group MyResourceGroup --container-name MyContainer --image MyImageRegistry.io/MyImage:latest --target-port 80 --is-main
    Create or update multiple sitecontainers for a linux webapp using a json sitecontainer-spec file: az webapp sitecontainers create --name MyWebApp --resource-group MyResourceGroup --sitecontainers-spec-file ./sitecontainersspec.json
