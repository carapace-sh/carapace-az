# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: start
description: Enable bringing your PostgreSQL data into Microsoft Fabric.
flags:
    --subscription=: Name or ID of subscription.
    -d, --database-names=!:
        description: Space-separated list of the database names to be mirrored.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -s, --server-name=!: Name of the server.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        database-names: Space-separated list of the database names to be mirrored. Required if --mirroring is enabled.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server-name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Enable bringing your PostgreSQL data into Microsoft Fabric.: az postgres flexible-server fabric-mirroring start -g testgroup -s testserver --database-names testdatabase
