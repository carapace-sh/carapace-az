# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Disconnects the private endpoint connection and deletes it from the search service.
documentation:
    flag:
        private-endpoint-connection-name: The name of the private endpoint connection to the Azure Cognitive Search service with the specified resource group. Required.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --service-name=!: The name of the search service.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --private-endpoint-connection-name=!: The name of the private endpoint connection to the Azure Cognitive Search service with the specified resource group.
    -y, --yes=: Do not prompt for confirmation.
