# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: Gets the list of service resources created in the specified Service Fabric managed application resource.
flags:
    --application=!: Specify the name of the service.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    command: List managed services of a given managed application.
    flag:
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List managed services.: az sf managed-service list -g testRG -c testCluster --application-name testApp
