# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete role assignments.
flags:
    --assignee=: represent a user, group, or service principal.
    --ids=:
        description: space-separated role assignment ids
        nargs: -1
    --include-inherited=: include assignments applied on parent scopes
    --role=: role name or id
    --scope=: scope at which the role assignment or definition applies to, e.g., /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, or /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: use it only if the role or assignment was added at the level of a resource group
    -y, --yes=: Currently no-op.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        assignee: 'Represent a user, group, or service principal. supported format: object id, user sign-in name, or service principal name.'
        assignee-object-id: The assignee's object ID (also known as principal ID). Use this argument instead of '--assignee' to bypass Microsoft Graph query in case the logged-in account has no permission or the machine has no network access to query Microsoft Graph.
        change-reference: The related change reference ID for this resource operation.
        ids: Space-separated role assignment ids.
        include-inherited: |-
            Include assignments applied on parent scopes.

            Default value: False
        resource-group: Use it only if the role or assignment was added at the level of a resource group.
        role: Role name or id.
        scope: Scope at which the role assignment or definition applies to, e.g., /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333, /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup, or /subscriptions/0b1f6471-1bf0-4dda-aec3-111122223333/resourceGroups/myGroup/providers/Microsoft.Compute/virtualMachines/myVM.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": Currently no-op.
examples:
    Delete all role assignments of an assignee (with its object ID) at the subscription scope.: az role assignment delete --assignee-object-id 00000000-0000-0000-0000-000000000000 --scope /subscriptions/00000000-0000-0000-0000-000000000000
    Delete all role assignments of an assignee at the subscription scope.: az role assignment delete --assignee 00000000-0000-0000-0000-000000000000 --scope /subscriptions/00000000-0000-0000-0000-000000000000
    Delete all role assignments with "Reader" role at the subscription scope.: az role assignment delete --role Reader --scope /subscriptions/00000000-0000-0000-0000-000000000000
