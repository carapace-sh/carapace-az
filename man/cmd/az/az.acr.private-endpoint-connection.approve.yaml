# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: approve
description: Approve a private endpoint connection request for a container registry
flags:
    --description=: Approval description.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the private endpoint connection
    -r, --registry-name=!: The name of the container registry.
documentation:
    command: Approve a private endpoint connection request for a container registry.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        description: Approval description. For example, the reason for approval.
        name: The name of the private endpoint connection.
        registry-name: The name of the container registry. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
