# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: get-member-groups
description: Get groups of which the user is a member
flags:
    --id=!: The object ID or principal name of the user for which to get information
    --security-enabled-only=:
        description: true to specify that only security groups that the entity is a member of should be returned; false to specify that all groups and directory roles that the entity is a member of should be returned.
        nargs: -1
completion:
    flag:
        security-enabled-only:
            - "true"
            - "false"
documentation:
    command: Get groups of which the user is a member.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        id: The object ID or principal name of the user for which to get information.
        security-enabled-only: |-
            True to specify that only security groups that the entity is a member of should be returned; false to specify that all groups and directory roles that the entity is a member of should be returned.

            Default value: False

            Accepted values: false, true
examples:
    Get groups of which the user is a member: az ad user get-member-groups --id myuser@contoso.com
