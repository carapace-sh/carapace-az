# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: set-policy
description: Update the policy associated with this item.
documentation:
    flag:
        backup-management-type: 'Specify the backup management type. Define how Azure Backup manages the backup of entities within the ARM resource. For eg: AzureWorkloads refers to workloads installed within Azure VMs, AzureStorage refers to entities within Storage account. Required only if friendly name is used as Container name.'
        container-name: Name of the backup container. Accepts 'Name' or 'FriendlyName' from the output of az backup container list command. If 'FriendlyName' is passed then BackupManagementType is required.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the backed up item. You can use the backup item list command to get the name of a backed up item.
        policy-name: Name of the Backup policy. You can use the backup policy list command to get the name of a backup policy.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workload-type: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup. 'MSSQL' and 'SQLDataBase' can be used interchangeably for SQL in Azure VM, as can 'SAPHANA' and 'SAPHanaDatabase' for SAP HANA in Azure VM.
flags:
    --backup-management-type=: Specify the backup management type.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --subscription=: Name or ID of subscription.
    --tenant-id=: ID of the tenant if the Resource Guard protecting the vault exists in a different tenant.
    --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
    -c, --container-name=: Name of the backup container.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the backed up item.
    -p, --policy-name=!: Name of the Backup policy.
    -v, --vault-name=: Name of the Recovery services vault.
    -y, --yes=: Skip confirmation when updating Standard to Enhanced Policies.
completion:
    flag:
        backup-management-type:
            - AzureIaasVM
            - AzureStorage
            - AzureWorkload
        workload-type:
            - VM
            - AzureFileShare
            - SAPHANA
            - MSSQL
            - SAPHanaDatabase
            - SQLDataBase
