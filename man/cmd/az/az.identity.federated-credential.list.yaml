# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all federated identity credentials under an existing user assigned identity.
flags:
    --identity-name=!: The name of the identity resource.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
documentation:
    flag:
        identity-name: The name of the identity resource.
        max-items: Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in ```
        next-token: Token to specify where to start paginating. This is the token value from a previously truncated response.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        skiptoken: A skip token is used to continue retrieving items after an operation returns a partial result. If a previous response contains a nextLink element, the value of the nextLink element will include a skipToken parameter that specifies a starting point to use for subsequent calls.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        top: Number of records to return.
examples:
    List all federated identity credentials under an existing user assigned identity.: az identity federated-credential list --identity-name myIdentityName --resource-group myResourceGroup
