# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates an ipv6 firewall rule.
flags:
    --end-ipv6-address=: The end IPv6 address of the firewall rule.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --start-ipv6-address=: The start IPv6 address of the firewall rule.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=: The name of the IPv6 firewall rule.
    -s, --server=: Name of the Azure SQL Server.
documentation:
    command: Update an ipv6 firewall rule.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        end-ipv6-address: The end IPv6 address of the firewall rule. Must be IPv6 format.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: The name of the IPv6 firewall rule.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        server: Name of the Azure SQL Server. You can configure the default using ``` az configure --defaults sql-server=<name> ``` .
        start-ipv6-address: The start IPv6 address of the firewall rule. Must be IPv6 format.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Update an ipv6 firewall rule: az sql server ipv6-firewall-rule update -g mygroup -s myserver -n myrule --start-ipv6-address 0229:e3a4:e0d7:36d3:d228:73fa:12fc:ae30 --end-ipv6-address 0229:e3a4:e0d7:36d3:d228:73fa:12fc:ae30
