# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: restore
description: Restore a flexible server from backup.
flags:
    --accelerated-logs=: Enable or disable accelerated logs.
    --address-prefixes=: The IP address prefix to use when creating a new virtual network in CIDR format.
    --backup-retention=: The number of days a backup is retained.
    --database-port=: The port of the database.
    --geo-redundant-backup=: Whether or not geo redundant backup is enabled.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=: Do not wait for the long-running operation to finish.
    --private-dns-zone=: This parameter only applies if you are creating cross region replica server with private access.
    --public-access=: Determines the public access.
    --restore-time=: The point in time in UTC to restore from (ISO8601 format), e.g., 2017-04-26T02:10:00+00:00The default value is set to current time.
    --sku-name=: The name of the compute SKU.
    --source-server=!: The name or resource ID of the source server to restore from.
    --storage-auto-grow=: Enable or disable autogrow of the storage.
    --storage-redundancy=: Enable local redundancy or zone redundancy.
    --storage-size=: The storage capacity of the server.
    --subnet-prefixes=: The subnet IP address prefix to use when creating a new subnet in CIDR format.
    --subnet=: Name or resource ID of a new or existing subnet.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tier=: Compute tier of the server.
    --vnet=: Name or ID of a new or existing virtual network.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the server.
    -y, --yes=: Do not prompt for confirmation.
    -z, --zone=: Availability zone into which to provision the resource.
completion:
    flag:
        accelerated-logs:
            - Enabled
            - Disabled
        geo-redundant-backup:
            - Enabled
            - Disabled
        public-access:
            - Enabled
            - Disabled
        storage-auto-grow:
            - Enabled
            - Disabled
        storage-redundancy:
            - LocalRedundancy
            - ZoneRedundancy
documentation:
    flag:
        accelerated-logs: |-
            Enable or disable accelerated logs. Only support for Business Critical tier. Default value is Enabled.

            Accepted values: Disabled, Enabled
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        address-prefixes: The IP address prefix to use when creating a new virtual network in CIDR format. Default value is 10.0.0.0/16.
        backup-retention: The number of days a backup is retained. Range of 1 to 35 days. Default is 7 days.
        change-reference: The related change reference ID for this resource operation.
        database-port: The port of the database. Default value is 3306.
        faster-restore: |-
            Enable or disable Auto scale IOPS configuration for both the source and the newly restored server to enable faster restore.

            Accepted values: Disabled, Enabled
        geo-redundant-backup: |-
            Whether or not geo redundant backup is enabled.

            Accepted values: Disabled, Enabled
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        name: Name of the server. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        private-dns-zone: This parameter only applies if you are creating cross region replica server with private access. For in-region read replica with private access, source server settings are carried over and this parameter is ignored. The name or id of new or existing private dns zone. You can use the private dns zone from same resource group, different resource group, or different subscription. If you want to use a zone from different resource group or subscription, please provide resource Id. CLI creates a new private dns zone within the same resource group as virtual network if not provided by users.
        public-access: |-
            Determines the public access.

            Accepted values: Disabled, Enabled
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        restore-time: |-
            The point in time in UTC to restore from (ISO8601 format), e.g., 2017-04-26T02:10:00+00:00The default value is set to current time.

            Default value: 2026-06-30T11:12:40+00:00
        sku-name: 'The name of the compute SKU. Follows the convention Standard_{VM name}. Examples: Standard_B1ms.'
        source-server: The name or resource ID of the source server to restore from.
        storage-auto-grow: |-
            Enable or disable autogrow of the storage. Default value is Enabled.

            Accepted values: Disabled, Enabled
        storage-redundancy: Enable local redundancy or zone redundancy. Zone redundancy only supports Business Critical tier.
        storage-size: The storage capacity of the server. Minimum is 32 GiB and max is 16 TiB.
        subnet: Name or resource ID of a new or existing subnet. This parameter only applies if you are creating cross region replica server with private access. For in-region read replica with private access, source server settings are carried over and this parameter is ignored. If you want to use a subnet from different resource group or subscription, please provide resource ID instead of name. Please note that the subnet will be delegated to flexibleServers. After delegation, this subnet cannot be used for any other type of Azure resources.
        subnet-prefixes: The subnet IP address prefix to use when creating a new subnet in CIDR format. Default value is 10.0.0.0/24.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tier: 'Compute tier of the server. Accepted values: Burstable, GeneralPurpose, MemoryOptimized '
        vnet: Name or ID of a new or existing virtual network. This parameter only applies if you are creating cross region replica server with private access. For in-region read replica with private access, source server settings are carried over and this parameter is ignored. If you want to use a vnet from different resource group or subscription, please provide a resource ID. The name must be between 2 to 64 characters. The name must begin with a letter or number, end with a letter, number or underscore, and may contain only letters, numbers, underscores, periods, or hyphens.
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
        zone: Availability zone into which to provision the resource.
examples:
    Restore 'testserver' to a specific point-in-time as a new server 'testserverNew' with the same network configuration.: az mysql flexible-server restore --resource-group testGroup --name testserverNew --source-server testserver --restore-time "2017-06-15T13:10:00Z"
    ? Restore 'testserver' to current point-in-time as a new server 'testserverNew' in a different resource group. Here --resource-group is for the target server's resource group, and --source-server must be passed as resource ID.
    : |-
        az mysql flexible-server restore --resource-group testGroup --name testserverNew \
          --source-server /subscriptions/{sourceSubscriptionId}/resourceGroups/{sourceResourceGroup}/providers/Microsoft.DBforMySQL/flexibleServers/{sourceServerName}
    ? Restore 'testserver' to current point-in-time as a new server 'testserverNew' in a different subscription. Here --resource-group is for the target server's resource group, and --source-server must be passed as resource ID. This resource ID can be in a subscription different than the subscription used for az account set.
    : |-
        az mysql flexible-server restore --resource-group testGroup --name testserverNew \
          --source-server /subscriptions/{sourceSubscriptionId}/resourceGroups/{sourceResourceGroup}/providers/Microsoft.DBforMySQL/flexibleServers/{sourceServerName}
    Restore private access server 'testserver' to current point-in-time as a new server 'testserverNew' with public access.: |-
        az mysql flexible-server restore --resource-group testGroup --name testserverNew \
          --source-server testserver --public-access Enabled
    ? Restore public access or private access server 'testserver' as a new server 'testserverNew' with new subnet to current point-in-time. New vnet, subnet, and private dns zone for the restored server will be provisioned. Please refer to 'flexible-server create' command for more private access scenarios.
    : |-
        az mysql flexible-server restore --resource-group testGroup --name testserverNew \
          --source-server testserver --vnet newVnet --subnet newSubnet \
          --address-prefixes 172.0.0.0/16 --subnet-prefixes 172.0.0.0/24 \
          --private-dns-zone testDNS.mysql.database.azure.com
