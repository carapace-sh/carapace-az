# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: remove
description: Remove settings from a cluster.
flags:
    --parameter=: parameter name
    --section=: section name
    --settings-section-description=: JSON encoded parameters configuration.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Specify the name of the cluster, if not given it will be same as resource group name
    -g, --resource-group=!: Specify the resource group name.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Specify the name of the cluster, if not given it will be same as resource group name.
        parameter: Parameter name.
        resource-group: Specify the resource group name. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        section: 'Section name. --settings-section --settings-section-description JSON encoded parameters configuration. Use @{file} to load from a file. For example: [{"section": "NamingService","parameter": "MaxOperationTimeout"}].'
        settings-section-description: 'JSON encoded parameters configuration. Use @{file} to load from a file. For example: [{"section": "NamingService","parameter": "MaxOperationTimeout"}]'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Remove the `MaxFileOperationTimeout` setting from a cluster using settings file.: az sf cluster setting remove -g group-name -c cluster1 --settings-section '@settings-section.json'
    Remove the `MaxFileOperationTimeout` setting from a cluster.: az sf cluster setting remove -g group-name -c cluster1 --section 'NamingService' --parameter 'MaxFileOperationTimeout'
