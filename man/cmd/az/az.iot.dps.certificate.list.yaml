# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all certificates contained within an Azure IoT Hub Device Provisioning Service instance
flags:
    --dps-name=!: IoT Hub Device Provisioning Service name
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
documentation:
    command: List all certificates contained within an Azure IoT Hub Device Provisioning Service instance.
    flag:
        dps-name: IoT Hub Device Provisioning Service name.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    List all certificates in MyDps: az iot dps certificate list --dps-name MyDps --resource-group MyResourceGroup
