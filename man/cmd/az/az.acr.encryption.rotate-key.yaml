# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: rotate-key
description: Rotate (update) the container registry's encryption key
flags:
    --identity=: client id of managed identity, resource name or id of user assigned identity.
    --key-encryption-key=: Key vault key uri.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -n, --name=!: The name of the container registry.
documentation:
    command: Rotate (update) the container registry's encryption key.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        identity: Client id of managed identity, resource name or id of user assigned identity. Use '[system]' to refer to the system assigned identity.
        key-encryption-key: Key vault key uri. To enable automated rotation, provide a version-less key uri. For manual rotation, provide a versioned key uri.
        name: The name of the container registry. It should be specified in lower case. You can configure the default registry name using ``` az configure --defaults acr=<registry name> ``` .
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
