# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new firewall rule for a flexible server.
flags:
    --end-ip-address=: The end IP address of the firewall rule.
    --start-ip-address=: The start IP address of the firewall rule.
    --subscription=: Name or ID of subscription.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the server.
    -r, --rule-name=: The name of the firewall rule.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        end-ip-address: 'The end IP address of the firewall rule. Must be IPv4 format. Use value ''0.0.0.0'' to represent all Azure-internal IP addresses. '
        name: The name of the firewall rule. If name is omitted, default name will be chosen for firewall rule name. The firewall rule name can only contain 0-9, a-z, A-Z, '-' and '_'. Additionally, the name of the firewall rule must be at least 3 characters and no more than 128 characters in length.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        rule-name: 'The name of the firewall rule. If name is omitted, default name will be chosen for firewall name. The firewall rule name can only contain 0-9, a-z, A-Z, ''-'' and ''_''. Additionally, the name of the firewall rule must be at least 3 characters and no more than 128 characters in length. '
        server-name: Name of the server.
        start-ip-address: 'The start IP address of the firewall rule. Must be IPv4 format. Use value ''0.0.0.0'' to represent all Azure-internal IP addresses. '
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Create a firewall rule allowing connections from a specific IP address.: az postgres flexible-server firewall-rule create --resource-group testGroup --server-name testserver --name allowip --start-ip-address 107.46.14.221
    Create a firewall rule allowing connections from an IP address range.: az postgres flexible-server firewall-rule create --resource-group testGroup --server-name testserver --name allowiprange --start-ip-address 107.46.14.0 --end-ip-address 107.46.14.221
    Create a firewall rule allowing connections to all Azure services: az postgres flexible-server firewall-rule create --resource-group testGroup --server-name testserver --name allowazureservices --start-ip-address 0.0.0.0
