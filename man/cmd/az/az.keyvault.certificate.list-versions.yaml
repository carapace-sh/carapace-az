# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-versions
description: List the identifiers and properties of a certificate's versions.
documentation:
    flag:
        id: Id of the certificate. If specified all other 'Id' arguments should be omitted.
        maxresults: Maximum number of results to return in a page. If not specified, the service will return up to 25 results.
        name: Name of the certificate. Required if --id is not specified.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        vault-name: Name of the Key Vault. Required if --id is not specified
flags:
    --id=: Id of the certificate.
    --maxresults=: Maximum number of results to return in a page.
    --subscription=: Name or ID of subscription.
    --vault-name=: Name of the Key Vault.
    -n, --name=: Name of the certificate.
