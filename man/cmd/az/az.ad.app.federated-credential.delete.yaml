# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete application federated identity credential.
flags:
    --federated-credential-id=!: ID or name of the federated identity credential
    --id=!: Application's appId, identifierUri, or id (formerly known as objectId)
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        federated-credential-id: ID or name of the federated identity credential.
        id: Application's appId, identifierUri, or id (formerly known as objectId).
examples:
    Delete application federated identity credential.: az ad app federated-credential delete --id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx --federated-credential-id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
