# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list-skus
description: List skus for Azure Cognitive Services account.
flags:
    --kind=: the API name of cognitive services account
    --subscription=: Name or ID of subscription.
    -g, --resource-group=: Name of resource group.
    -l, --location=: Location.
    -n, --name=: cognitive service account name
documentation:
    command: Manage Azure Cognitive Services accounts.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        kind: |-
            The API name of cognitive services account.

            Value from: az cognitiveservices account list-kinds
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        name: Cognitive service account name. --kind and --location will be ignored when --name is specified. --resource-group is required when when --name is specified.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` . --resource-group is used when when --name is specified. In other cases it will be ignored.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show SKUs.: az cognitiveservices account list-skus --kind Face --location westus
