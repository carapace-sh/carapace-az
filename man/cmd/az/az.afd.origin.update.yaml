# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Update a new origin within the specified origin group.
documentation:
    flag:
        add: 'Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`'
        enabled-state: Whether to enable health probes to be made against backends defined under backendPools. Health probes can only be disabled if there is a single enabled backend in single enabled backend pool. When an origin is disabled, both routing and health probes to the origin are also disabled.
        host-name: The address of the origin. Domain names, IPv4 addresses, and IPv6 addresses are supported.This should be unique across all origins in an endpoint.
        http-port: The value of the HTTP port. Must be between 1 and 65535.
        https-port: The value of the HTTPS port. Must be between 1 and 65535.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        origin-host-header: The host header value sent to the origin with each request. If you leave this blank, the request hostname determines this value. Azure Front Door origins, such as Web Apps, Blob Storage, and Cloud Services require this host header value to match the origin hostname by default. This overrides the host header defined at Endpoint
        priority: Priority of origin in given origin group for load balancing. Higher priorities will not be used for load balancing if any lower priority origin is healthy.Must be between 1 and 5
        remove: 'Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        set: 'Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`'
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        weight: Weight of the origin in given origin group for load balancing. Must be between 1 and 1000
flags:
    --add=:
        description: Add an object to a list of objects by specifying a path and key value pairs.
        nargs: -1
    --enable-private-link=:
        description: Indicates whether private link is enabled on that origin.
        nargs: -1
    --enabled-state=: Whether to enable health probes to be made against backends defined under backendPools.
    --enforce-certificate-name-check=:
        description: Whether to enable certificate name check at origin level
        nargs: -1
    --force-string=:
        description: When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
        nargs: -1
    --host-name=: The address of the origin.
    --http-port=: The value of the HTTP port.
    --https-port=: The value of the HTTPS port.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --origin-group-name=: Name of the origin group which is unique within the profile.
    --origin-host-header=: The host header value sent to the origin with each request.
    --priority=: Priority of origin in given origin group for load balancing.
    --private-link-location=: The location of origin that will be connected to using the private link.
    --private-link-request-message=: The message that is shown to the approver of the private link request.
    --private-link-resource=: The resource ID of the origin that will be connected to using the private link.
    --private-link-sub-resource-type=: The sub-resource type of the origin that will be connected to using the private link.You can use "az network private-link-resource list" to obtain the supported sub-resource types.
    --profile-name=: Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
    --remove=:
        description: Remove a property or an element from a list.
        nargs: -1
    --set=:
        description: Update an object by specifying a property path and value to set.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --weight=: Weight of the origin in given origin group for load balancing.
    -g, --resource-group=: Name of resource group.
    -n, --name=: Name of the origin which is unique within the profile.
completion:
    flag:
        enable-private-link:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        enabled-state:
            - Disabled
            - Enabled
        enforce-certificate-name-check:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        force-string:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
