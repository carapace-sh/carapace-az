# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Spark pool.
documentation:
    flag:
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --delay=: The delay time whose unit is minute.
    --enable-auto-pause=:
        description: The flag of enabling auto pause.
        nargs: -1
    --enable-auto-scale=:
        description: The flag of enabling auto scale.
        nargs: -1
    --enable-dynamic-exec=:
        description: Indicates whether Dynamic Executor Allocation is enabled or not.
        nargs: -1
    --max-executors=: The maximum number of executors alloted.
    --max-node-count=: The max node count.
    --min-executors=: The minimum number of executors alloted.
    --min-node-count=: The min node count.
    --no-wait=: Do not wait for the long-running operation to finish.
    --node-count=!: The number of node.
    --node-size-family=: The kind of nodes that the Big Data pool provides
    --node-size=!: The level of compute power that each node in the Big Data pool has..
    --spark-config-file-path=: Absolute path of Spark pool properties configuration file.
    --spark-events-folder=: The Spark events folder.
    --spark-log-folder=: The default Spark log folder.
    --spark-version=!: The supported Spark version is 2.4 now.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --workspace-name=!: The workspace name.
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: The name of the Spark pool.
completion:
    flag:
        enable-auto-pause:
            - "true"
            - "false"
        enable-auto-scale:
            - "true"
            - "false"
        enable-dynamic-exec:
            - "true"
            - "false"
        node-size:
            - None
            - Small
            - Medium
            - Large
            - XLarge
            - XXLarge
            - XXXLarge
        node-size-family:
            - None
            - MemoryOptimized
            - HardwareAcceleratedFPGA
            - HardwareAcceleratedGPU
