# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: list
description: List all policies for a Recovery services vault.
documentation:
    flag:
        backup-management-type: 'Specify the backup management type. Define how Azure Backup manages the backup of entities within the ARM resource. For eg: AzureWorkloads refers to workloads installed within Azure VMs, AzureStorage refers to entities within Storage account. Required only if friendly name is used as Container name.'
        policy-sub-type: Sub type of policies to be retrieved. To list standard backup policies, specify ‘Standard’ as the value of this parameter. To list enhanced backup policies for Azure VMs, specify ‘Enhanced’ as the value of this parameter.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workload-type: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup. 'MSSQL' and 'SQLDataBase' can be used interchangeably for SQL in Azure VM, as can 'SAPHANA' and 'SAPHanaDatabase' for SAP HANA in Azure VM.
flags:
    --backup-management-type=: Specify the backup management type.
    --move-to-archive-tier=: Parameter that specifies whether to only list policies where archive tier move is enabled/disabled.
    --policy-sub-type=: Sub type of policies to be retrieved.
    --subscription=: Name or ID of subscription.
    --workload-type=: Specify the type of applications within the Resource which should be discovered and protected by Azure Backup.
    -g, --resource-group=!: Name of resource group.
    -v, --vault-name=!: Name of the Recovery services vault.
completion:
    flag:
        backup-management-type:
            - AzureIaasVM
            - AzureStorage
            - AzureWorkload
        move-to-archive-tier:
            - Enabled
            - Disabled
            - All
        policy-sub-type:
            - Standard
            - Enhanced
        workload-type:
            - VM
            - AzureFileShare
            - SAPHANA
            - MSSQL
            - SAPHanaDatabase
            - SQLDataBase
