# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: change-key-vault
description: Change KeyVault/Managed HSM that is used for encryption of volumes under NetApp account
documentation:
    flag:
        endpoint-pairs: Pairs of virtual network ID and private endpoint ID. Every virtual network that has volumes encrypted with customer-managed keys needs its own key vault private endpoint.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
flags:
    --endpoint-pairs=:
        description: Pairs of virtual network ID and private endpoint ID.
        nargs: -1
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --key-name=: The name of the key that should be used for encryption.
    --keyvault-resource-id=: Azure resource ID of the key vault/managed HSM that should be used for encryption.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --subscription=: Name or ID of subscription.
    -a, --account-name=: The name of the NetApp account
    -g, --resource-group=: Name of resource group.
    -v, --key-vault-uri=: The URI of the key vault/managed HSM that should be used for encryption.
    -y, --yes=: Do not prompt for confirmation.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
