# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Show the instruction by name.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --profile-name=!: The ID that uniquely identifies a billing profile.
    --subscription=: Name or ID of subscription.
    -n, --name=!: Instruction Name.
documentation:
    command: |-
        Command group 'billing instruction' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        name: Instruction Name.
        profile-name: The ID that uniquely identifies a billing profile.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Instruction: az billing instruction show --account-name "{billingAccountName}" --profile-name "{billingProfileName}" --name "{instructionName}"
