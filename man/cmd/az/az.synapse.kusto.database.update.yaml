# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates a database.
flags:
    --database-name=: The name of the database in the Kusto pool.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --kusto-pool-name=: The name of the Kusto pool.
    --no-wait=: Do not wait for the long-running operation to finish.
    --read-write-database=:
        description: Class representing a read write database.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --workspace-name=: The name of the workspace
    -g, --resource-group=: Name of resource group.
documentation:
    command: Experimental
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        database-name: The name of the database in the Kusto pool.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        kusto-pool-name: The name of the Kusto pool.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        read-write-database: 'Class representing a read write database. Usage: --read-write-database soft-delete-period=XX hot-cache-period=XX location=XX kind=XX soft-delete-period: The time the data should be kept before it stops being accessible to queries in TimeSpan. hot-cache-period: The time the data should be kept in cache for fast queries in TimeSpan. location: Resource location. kind: Required. Kind of the database.'
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        workspace-name: The name of the workspace.
examples:
    KustoPoolDatabasesUpdate: az synapse kusto database update --database-name "KustoDatabase8" --kusto-pool-name "kustoclusterrptest4" --read-write-database soft-delete-period="P1D" --resource-group "kustorptest" --workspace-name "synapseWorkspaceName"
