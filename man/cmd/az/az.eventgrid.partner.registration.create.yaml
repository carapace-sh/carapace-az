# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new partner registration.
documentation:
    flag:
        authorized-subscription-ids: A space-separated list of Azure subscription Ids that are authorized to create a partner namespace associated with this partner registration. This is an optional property. Creating partner namespaces is always permitted under the same Azure subscription as the one used for creating the partner registration.
        customer-service-extension: The extension of the customer service number of the publisher. Only digits are allowed and number of digits should not exceed 10.
        customer-service-number: 'The customer service number of the publisher. The expected phone format should start with a ''+'' sign followed by the country code. The remaining digits are then followed. Only digits and spaces are allowed and its length cannot exceed 16 digits including country code. Examples of valid phone numbers are: +1 515 123 4567 and +966 7 5115 2471. Examples of invalid phone numbers are: +1 (515) 123-4567, 1 515 123 4567 and +966 121 5115 24 7 551 1234 43.'
        long-description: Description of the custom scenarios and integration. Length of this description should not exceed 2048 characters
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        resource-type-name: Name of the partner topic resource type. This name should be unique among all partner topic types names.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --authorized-subscription-ids=:
        description: A space-separated list of Azure subscription Ids that are authorized to create a partner namespace associated with this partner registration.
        nargs: -1
    --customer-service-extension=: The extension of the customer service number of the publisher.
    --customer-service-number=: The customer service number of the publisher.
    --customer-service-uri=: The customer service URI of the publisher.
    --description=: Description of the partner topic type.
    --display-name=: Display name for the partner topic type.
    --logo-uri=: URI of the partner logo.
    --long-description=: Description of the custom scenarios and integration.
    --partner-name=: Official name of the partner.
    --resource-type-name=: Name of the partner topic resource type.
    --setup-uri=: URI of the partner website that can be used by Azure customers to setup Event Grid integration on an event source.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the partner registration.
