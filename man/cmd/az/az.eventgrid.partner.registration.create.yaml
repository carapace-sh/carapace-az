# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a new partner registration.
flags:
    --authorized-subscription-ids=:
        description: A space-separated list of Azure subscription Ids that are authorized to create a partner namespace associated with this partner registration.
        nargs: -1
    --customer-service-extension=: The extension of the customer service number of the publisher.
    --customer-service-number=: The customer service number of the publisher.
    --customer-service-uri=: The customer service URI of the publisher.
    --description=: Description of the partner topic type.
    --display-name=: Display name for the partner topic type.
    --logo-uri=: URI of the partner logo.
    --long-description=: Description of the custom scenarios and integration.
    --partner-name=: Official name of the partner.
    --resource-type-name=: Name of the partner topic resource type.
    --setup-uri=: URI of the partner website that can be used by Azure customers to setup Event Grid integration on an event source.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the partner registration.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        authorized-subscription-ids: A space-separated list of Azure subscription Ids that are authorized to create a partner namespace associated with this partner registration. This is an optional property. Creating partner namespaces is always permitted under the same Azure subscription as the one used for creating the partner registration.
        change-reference: The related change reference ID for this resource operation.
        customer-service-extension: Argument 'customer_service_extension' has been deprecated and will be removed in a future release. The extension of the customer service number of the publisher. Only digits are allowed and number of digits should not exceed 10.
        customer-service-number: 'Argument ''customer_service_number'' has been deprecated and will be removed in a future release. The customer service number of the publisher. The expected phone format should start with a ''+'' sign followed by the country code. The remaining digits are then followed. Only digits and spaces are allowed and its length cannot exceed 16 digits including country code. Examples of valid phone numbers are: +1 515 123 4567 and +966 7 5115 2471. Examples of invalid phone numbers are: +1 (515) 123-4567, 1 515 123 4567 and +966 121 5115 24 7 551 1234 43.'
        customer-service-uri: Argument 'customer_service_uri' has been deprecated and will be removed in a future release. The customer service URI of the publisher.
        description: Argument 'description' has been deprecated and will be removed in a future release. Description of the partner topic type.
        display-name: Argument 'display_name' has been deprecated and will be removed in a future release. Display name for the partner topic type.
        logo-uri: Argument 'logo_uri' has been deprecated and will be removed in a future release. URI of the partner logo.
        long-description: Argument 'long_description' has been deprecated and will be removed in a future release. Description of the custom scenarios and integration. Length of this description should not exceed 2048 characters.
        name: Name of the partner registration.
        partner-name: Argument 'partner_name' has been deprecated and will be removed in a future release. Official name of the partner.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        resource-type-name: Argument 'resource_type_name' has been deprecated and will be removed in a future release. Name of the partner topic resource type. This name should be unique among all partner topic types names.
        setup-uri: Argument 'setup_uri' has been deprecated and will be removed in a future release. URI of the partner website that can be used by Azure customers to setup Event Grid integration on an event source.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a new partner registration with basic information.: az eventgrid partner registration create -g rg1 --name partnerRegistrationName1 --partner-name Contoso --resource-type-name Accounts --authorized-subscription-ids 533ad9de-25db-46e2-b94a-d00c37cf022b 05aa2228-7d34-4635-922d-2b582c422445
    Create a new partner registration with partner information.: az eventgrid partner registration create -g rg1 --name partnerRegistrationName1 --partner-name Contoso --resource-type-name Accounts --authorized-subscription-ids 533ad9de-25db-46e2-b94a-d00c37cf022b 05aa2228-7d34-4635-922d-2b582c422445 --description ExampleDescription --display-name ExampleDisplayName1 --logo-uri 'https://www.example.com/logo.png' --setup-uri 'https://www.example.com' --long-description 'This is sample description}' --customer-service-number '+1 800 123 4567' --customer-service-extension '125' --customer-service-uri 'https://www.example.com/customerservice'
