# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upload
description: Upload a file or folder to a Data Lake Store account.
flags:
    --block-size=: Number of bytes for a block.
    --buffer-size=: Number of bytes for internal buffer.
    --chunk-size=: Number of bytes for a chunk.
    --destination-path=!: The full path in the Data Lake Store filesystem to upload the file or folder to.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --overwrite=: Indicates that, if the destination file or folder exists, it should be overwritten
    --source-path=!: The path to the file or folder to upload.
    --subscription=: Name or ID of subscription.
    --thread-count=: Specify the parallelism of the upload.
    -n, --account=: Name of the Data Lake Store account.
documentation:
    command: |-
        Command group 'dls' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account: Name of the Data Lake Store account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        block-size: |-
            Size of a block, in bytes. Within each chunk, a smaller block is written for each API call. A block cannot be bigger than a chunk and must be bigger than a buffer.

            Default value: 4194304
        buffer-size: |-
            Size of the transfer buffer, in bytes. A buffer cannot be bigger than a chunk and cannot be smaller than a block.

            Default value: 4194304
        change-reference: The related change reference ID for this resource operation.
        chunk-size: |-
            Size of a chunk, in bytes. Large files are split into chunks. Files smaller than this size will always be transferred in a single thread.

            Default value: 268435456
        destination-path: The full path in the Data Lake Store filesystem to upload the file or folder to.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        overwrite: |-
            Indicates that, if the destination file or folder exists, it should be overwritten.

            Default value: False
        source-path: The path to the file or folder to upload.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        thread-count: Specify the parallelism of the upload. Default is the number of cores in the local machine.
examples:
    Upload a file or folder to a Data Lake Store account. (autogenerated): az dls fs upload --account {account} --destination-path {destination-path} --overwrite  --source-path {source-path}
