# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: upload
description: Upload a file or folder to a Data Lake Store account.
documentation:
    flag:
        block-size: Number of bytes for a block. Within each chunk, we write a smaller block for each API call. This block cannot be bigger than a chunk.
        buffer-size: Number of bytes for internal buffer. This block cannot be bigger than a chunk and cannot be smaller than a block.
        chunk-size: Number of bytes for a chunk. Large files are split into chunks. Files smaller than this number will always be transferred in a single thread.
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        thread-count: Specify the parallelism of the upload. Default is the number of cores in the local machine.
flags:
    --block-size=: Number of bytes for a block.
    --buffer-size=: Number of bytes for internal buffer.
    --chunk-size=: Number of bytes for a chunk.
    --destination-path=!: The full path in the Data Lake Store filesystem to upload the file or folder to.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --overwrite=: Indicates that, if the destination file or folder exists, it should be overwritten
    --source-path=!: The path to the file or folder to upload.
    --subscription=: Name or ID of subscription.
    --thread-count=: Specify the parallelism of the upload.
    -n, --account=: Name of the Data Lake Store account.
