# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates a Data Lake Store account.
documentation:
    flag:
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
flags:
    --allow-azure-ips=: Allow/block Azure originating IPs through the firewall
    --default-group=: Name of the default group to give permissions to for freshly created files and folders in the Data Lake Store account.
    --firewall-state=: Enable/disable existing firewall rules.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --key-version=: Key version for the user-assigned encryption type.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tier=: The desired commitment tier for this account to use.
    --trusted-id-provider-state=: Enable/disable the existing trusted ID providers.
    -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
    -n, --account=: Name of the Data Lake Store account.
completion:
    flag:
        allow-azure-ips:
            - Enabled
            - Disabled
        firewall-state:
            - Enabled
            - Disabled
        tier:
            - Consumption
            - Commitment_1TB
            - Commitment_10TB
            - Commitment_100TB
            - Commitment_500TB
            - Commitment_1PB
            - Commitment_5PB
        trusted-id-provider-state:
            - Enabled
            - Disabled
