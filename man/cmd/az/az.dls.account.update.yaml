# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: update
description: Updates a Data Lake Store account.
flags:
    --allow-azure-ips=: Allow/block Azure originating IPs through the firewall
    --default-group=: Name of the default group to give permissions to for freshly created files and folders in the Data Lake Store account.
    --firewall-state=: Enable/disable existing firewall rules.
    --ids=:
        description: One or more resource IDs (space-delimited).
        nargs: -1
    --key-version=: Key version for the user-assigned encryption type.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tier=: The desired commitment tier for this account to use.
    --trusted-id-provider-state=: Enable/disable the existing trusted ID providers.
    -g, --resource-group=: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
    -n, --account=: Name of the Data Lake Store account.
completion:
    flag:
        allow-azure-ips:
            - Enabled
            - Disabled
        firewall-state:
            - Enabled
            - Disabled
        tier:
            - Consumption
            - Commitment_1TB
            - Commitment_10TB
            - Commitment_100TB
            - Commitment_500TB
            - Commitment_1PB
            - Commitment_5PB
        trusted-id-provider-state:
            - Enabled
            - Disabled
documentation:
    command: |-
        Command group 'dls' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account: Name of the Data Lake Store account.
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        allow-azure-ips: |-
            Allow/block Azure originating IPs through the firewall.

            Accepted values: Disabled, Enabled
        change-reference: The related change reference ID for this resource operation.
        default-group: Name of the default group to give permissions to for freshly created files and folders in the Data Lake Store account.
        firewall-state: |-
            Enable/disable existing firewall rules.

            Accepted values: Disabled, Enabled
        ids: One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
        key-version: Key version for the user-assigned encryption type.
        resource-group: If not specified, will attempt to discover the resource group for the specified Data Lake Store account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        tier: |-
            The desired commitment tier for this account to use.

            Accepted values: Commitment_100TB, Commitment_10TB, Commitment_1PB, Commitment_1TB, Commitment_500TB, Commitment_5PB, Consumption
        trusted-id-provider-state: |-
            Enable/disable the existing trusted ID providers.

            Accepted values: Disabled, Enabled
examples:
    Updates a Data Lake Store account. (autogenerated): az dls account update --account mydatalakestoragegen1 --allow-azure-ips Enabled --firewall-state Enabled --resource-group MyResourceGroup --subscription MySubscription --tags key=value
