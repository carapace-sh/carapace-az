# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a Synapse workspace.
documentation:
    flag:
        allowed-tenant-ids: The approved Azure AD tenants which outbound data traffic allowed to. The Azure AD tenant of the current user will be included by default. Use "" or '' ('""' in PowerShell) to disable all allowed tenant ids.
        host-name: If using github Enterprise Server, provide sever URL. Do not use this option with GitHub Enterprise Cloud.
        key-identifier: 'The customer-managed key used to encrypt all data at rest in the workspace. Key identifier should be in the format of: https://{keyvaultname}.vault.azure.net/keys/{keyname}.'
        key-name: The workspace customer-managed key display name. All existing keys can be found using "az synapse workspace key list" cmdlet.
        location: 'Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.'
        managed-rg-name: ' Workspace managed resource group. The resource group name uniquely identifies the resource group within the user subscriptionId.'
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        root-folder: The name of the folder to the location of your Azure synapse JSON resources are imported. Default is /
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        use-sami-in-encrypt: Whether use System assigned identity in Workspace Encryption. If use uami, please set True.If not, set False
flags:
    --account-name=: GitHub account name used for the repository or Azure devops organization name
    --allowed-tenant-ids=:
        description: The approved Azure AD tenants which outbound data traffic allowed to.
        nargs: -1
    --collaboration-branch=: The branch name where you will collaborate with others and from which you will publish.
    --enable-managed-vnet=:
        description: The flag indicates whether enable managed virtual network.
        nargs: -1
    --file-system=!: The file system of the data lake storage account.
    --host-name=: If using github Enterprise Server, provide sever URL.
    --key-identifier=: The customer-managed key used to encrypt all data at rest in the workspace.
    --key-name=: The workspace customer-managed key display name.
    --last-commit-id=: The last commit ID.
    --managed-rg-name=: Workspace managed resource group.
    --no-wait=: Do not wait for the long-running operation to finish.
    --prevent-exfiltration=:
        description: The flag indicates whether enable data exfiltration.
        nargs: -1
    --project-name=: The project name to which you are connecting.
    --repository-name=: The name of the repository to which you are connecting.
    --repository-type=: The repository configuration type.
    --root-folder=: The name of the folder to the location of your Azure synapse JSON resources are imported.
    --storage-account=!: The data lake storage account name or resource id.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --tenant-id=: The tenant id used to connect Azure devops
    --uami-id-in-encrypt=: User assigned identity resource Id used in Workspace Encryption
    --uami-id=:
        description: The list of User-assigned Managed Identity Id for workspace.
        nargs: -1
    --use-sami-in-encrypt=: Whether use System assigned identity in Workspace Encryption.
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Location.
    -n, --name=!: The workspace name.
    -p, --sql-admin-login-password=!: The sql administrator login password.
    -u, --sql-admin-login-user=!: The sql administrator login user name.
completion:
    flag:
        enable-managed-vnet:
            - "true"
            - "false"
        prevent-exfiltration:
            - "true"
            - "false"
        repository-type:
            - AzureDevOpsGit
            - GitHub
