# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: purge
description: Permanently delete an App Configuration store.
flags:
    --subscription=: Name or ID of subscription.
    -l, --location=: Location of the deleted App Configuration store.
    -n, --name=!: Name of the App Configuration store.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: Permanently delete an App Configuration store. Aka 'purge' the deleted App Configuration store.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        location: Location of the deleted App Configuration store. Can be viewed using command ``` az appconfig show-deleted ``` .
        name: Name of the App Configuration store. You can configure the default name using ``` az configure --defaults app_configuration_store=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": Do not prompt for confirmation.
examples:
    Purge a deleted App Configuration store named 'sample-app-configuration'.: az appconfig purge --name sample-app-configuration
