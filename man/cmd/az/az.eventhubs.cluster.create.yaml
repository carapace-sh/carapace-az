# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an instance of an Event Hubs Cluster.
documentation:
    flag:
        location: Resource location.  When not specified, the location of the resource group will be used.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --capacity=: The quantity of Event Hubs Cluster Capacity Units contained in this cluster.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --provisioning-state=: Provisioning state of the Cluster.
    --sku=: Name of this SKU.
    --subscription=: Name or ID of subscription.
    --supports-scaling=:
        description: A value that indicates whether Scaling is Supported.
        nargs: -1
    --tags=:
        description: Resource tags.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Resource location.
    -n, --name=!: The name of the Event Hubs Cluster.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        sku:
            - Dedicated
        supports-scaling:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
