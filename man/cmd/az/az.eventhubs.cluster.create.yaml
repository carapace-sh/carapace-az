# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an instance of an Event Hubs Cluster.
flags:
    --capacity=: The quantity of Event Hubs Cluster Capacity Units contained in this cluster.
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --provisioning-state=: Provisioning state of the Cluster.
    --sku=: Name of this SKU.
    --subscription=: Name or ID of subscription.
    --supports-scaling=:
        description: A value that indicates whether Scaling is Supported.
        nargs: -1
    --tags=:
        description: Resource tags.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=: Resource location.
    -n, --name=!: The name of the Event Hubs Cluster.
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
        sku:
            - Dedicated
        supports-scaling:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        capacity: |-
            The quantity of Event Hubs Cluster Capacity Units contained in this cluster.

            Default value: 1
        change-reference: The related change reference ID for this resource operation.
        location: Resource location.  When not specified, the location of the resource group will be used.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        provisioning-state: Provisioning state of the Cluster.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        sku: |-
            Name of this SKU.

            Default value: Dedicated

            Accepted values: Dedicated
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        supports-scaling: |-
            A value that indicates whether Scaling is Supported.

            Accepted values: 0, 1, f, false, n, no, t, true, y, yes
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
