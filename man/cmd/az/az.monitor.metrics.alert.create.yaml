# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a metric-based alert rule.
documentation:
    flag:
        condition: The condition which triggers the rule. It can be created by 'az monitor metrics alert condition create' command.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        scopes: Space-separated list of scopes the rule applies to. The resources specified in this parameter must be of the same type and exist in the same location.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
        target-resource-region: The region of the target resource(s) in scopes. This must be provided when scopes is resource group or subscription.
        target-resource-type: The resource type of the target resource(s) in scopes. This must be provided when scopes is resource group or subscription.
flags:
    --auto-mitigate=:
        description: Automatically resolve the alert.
        nargs: -1
    --condition=!:
        description: The condition which triggers the rule.
        nargs: -1
    --description=: Free-text description of the rule.
    --disabled=:
        description: Create the rule in a disabled state.
        nargs: -1
    --evaluation-frequency=: Frequency with which to evaluate the rule in "##h##m##s" format.
    --scopes=!:
        description: Space-separated list of scopes the rule applies to.
        nargs: -1
    --severity=: Severity of the alert from 0 (critical) to 4 (verbose).
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --target-resource-region=: The region of the target resource(s) in scopes.
    --target-resource-type=: The resource type of the target resource(s) in scopes.
    --window-size=: Time over which to aggregate metrics in "##h##m##s" format.
    -a, --action=:
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the alert rule.
completion:
    flag:
        auto-mitigate:
            - "true"
            - "false"
        disabled:
            - "true"
            - "false"
