# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a metric-based alert rule.
flags:
    --auto-mitigate=:
        description: Automatically resolve the alert.
        nargs: -1
    --condition=!:
        description: The condition which triggers the rule.
        nargs: -1
    --description=: Free-text description of the rule.
    --disabled=:
        description: Create the rule in a disabled state.
        nargs: -1
    --evaluation-frequency=: Frequency with which to evaluate the rule in "##h##m##s" format.
    --scopes=!:
        description: Space-separated list of scopes the rule applies to.
        nargs: -1
    --severity=: Severity of the alert from 0 (critical) to 4 (verbose).
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    --target-resource-region=: The region of the target resource(s) in scopes.
    --target-resource-type=: The resource type of the target resource(s) in scopes.
    --window-size=: Time over which to aggregate metrics in "##h##m##s" format.
    -a, --action=:
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -n, --name=!: Name of the alert rule.
completion:
    flag:
        auto-mitigate:
            - "true"
            - "false"
        disabled:
            - "true"
            - "false"
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        action: 'Add an action group and optional webhook properties to fire when the alert is triggered. Usage:   --action ACTION_GROUP_NAME_OR_ID [KEY=VAL [KEY=VAL ...]] Multiple action groups can be specified by using more than one ```'
        auto-mitigate: |-
            Automatically resolve the alert.

            Accepted values: false, true
        change-reference: The related change reference ID for this resource operation.
        condition: 'The condition which triggers the rule. It can be created by ''az monitor metrics alert condition create'' command. Usage:  --condition {avg,min,max,total,count} [NAMESPACE.]METRIC [{=,!=,>,>=,<,<=} THRESHOLD] [{>,><,<} dynamic SENSITIVITY VIOLATIONS of EVALUATIONS [since DATETIME]] [where DIMENSION {includes,excludes} VALUE [or VALUE ...] [and   DIMENSION {includes,excludes} VALUE [or VALUE ...] ...]] [with skipmetricvalidation] Sensitivity can be ''low'', ''medium'', ''high''. Violations can be the number of violations to trigger an alert. It should be smaller or equal to evaluation. Evaluations can be the number of evaluation periods for dynamic threshold. Datetime can be the date from which to start learning the metric historical data and calculate the dynamic thresholds (in ISO8601 format). Dimensions can be queried by adding the ''where'' keyword and multiple dimensions can be queried by combining them with the ''and'' keyword. Values for METRIC, DIMENSION and appropriate THRESHOLD values can be obtained from ``` az monitor metrics list-definitions ``` command. Due to server limitation, when an alert rule contains multiple criterias, the use of dimensions is limited to one value per dimension within each criterion. Multiple conditions can be specified by using more than one ```'
        description: Free-text description of the rule.
        disabled: |-
            Create the rule in a disabled state.

            Default value: False

            Accepted values: false, true
        evaluation-frequency: |-
            Frequency with which to evaluate the rule in "##h##m##s" format.

            Default value: 1m
        name: Name of the alert rule.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        scopes: Space-separated list of scopes the rule applies to. The resources specified in this parameter must be of the same type and exist in the same location.
        severity: |-
            Severity of the alert from 0 (critical) to 4 (verbose).

            Default value: 2
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags. --target-resource-type --type The resource type of the target resource(s) in scopes. This must be provided when scopes is resource group or subscription.'
        target-resource-region: The region of the target resource(s) in scopes. This must be provided when scopes is resource group or subscription.
        target-resource-type: The resource type of the target resource(s) in scopes. This must be provided when scopes is resource group or subscription.
        window-size: |-
            Time over which to aggregate metrics in "##h##m##s" format.

            Default value: 5m
examples:
    Create a dynamic CPU usage alert on several VMs with no actions.: |-
        az monitor metrics alert create -n alert1 -g {ResourceGroup} --scopes {VirtualMachineID1} {VirtualMachineID2} {VirtualMachineID3} \
            --condition "avg Percentage CPU > dynamic medium 2 of 4 since 2020-10-01T10:23:00.000Z"
            --description "Dynamic CPU"
            --window-size 5m
            --region westus
    Create a high CPU usage alert on a VM with email and webhook actions.: |-
        az monitor metrics alert create -n alert1 -g {ResourceGroup} --scopes {VirtualMachineID} \
            --condition "avg Percentage CPU > 90" --window-size 5m --evaluation-frequency 1m \
            --action "/subscriptions/<subscriptionId>/resourceGroups/<resourceGroupName>/providers/Microsoft.Insights/actionGroups/<actionGroupName>" apiKey={APIKey} type=HighCPU \
            --description "High CPU"
    Create a high CPU usage alert on a VM with no action.: az monitor metrics alert create -n alert1 -g {ResourceGroup} --scopes {VirtualMachineID} --condition "avg Percentage CPU > 90" --description "High CPU"
    Create a high CPU usage alert on several VMs with no actions.: |-
        az monitor metrics alert create -n alert1 -g {ResourceGroup} --scopes {VirtualMachineID1} {VirtualMachineID2} {VirtualMachineID3} \
            --condition "avg Percentage CPU > 90" --description "High CPU" --region westus
    Create a metric-based alert rule that monitors a custom metric.: |-
        az monitor metrics alert create -n "metric alert rule on a custom metric" -g "Demos" --scopes {VirtualMachineID} \
            --condition "max Azure.VM.Windows.GuestMetrics.Memory\Available Bytes > 90" \
            --window-size 5m --evaluation-frequency 1m
    Create an alert when a storage account shows a high number of slow transactions, using multi-dimensional filters.: |-
        az monitor metrics alert create -g {ResourceGroup} -n alert1 --scopes {StorageAccountId} \
            --description "Storage Slow Transactions" \
            --condition "total transactions > 5 where ResponseType includes Success" \
            --condition "avg SuccessE2ELatency > 250 where ApiName includes GetBlob"
