# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create a partner destination.
flags:
    --activation-expiration-date=: Date or datetime in UTC ISO 8601 format (e.g., '2022-02-17T01:59:59+00:00' or '2022-02-17') which is the expiration time of the partner destination.
    --endpoint-base-url=: Endpoint Base URL of the partner destination.
    --endpoint-service-context=: Endpoint context associated with this partner destination.
    --message-for-activation=: Context or helpful message that can be used during the approval process.
    --partner-registration-immutable-id=: The immutable ID of the corresponding partner registration.
    --subscription=: Name or ID of subscription.
    --tags=:
        description: 'space-separated tags: key[=value] [key[=value] ...].'
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -l, --location=!: Location.
    -n, --name=!: Name of the partner destination.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        activation-expiration-date: Date or datetime in UTC ISO 8601 format (e.g., '2022-02-17T01:59:59+00:00' or '2022-02-17') which is the expiration time of the partner destination. If this timer expires and the partner destination was never activated, the partner destination and corresponding channel are deleted.
        change-reference: The related change reference ID for this resource operation.
        endpoint-base-url: Endpoint Base URL of the partner destination.
        location: 'Location. Values from: ``` az account list-locations ``` . You can configure the default location using ``` az configure --defaults location=<location> ``` .'
        message-for-activation: Context or helpful message that can be used during the approval process. --partner-registration-immutable-id --pr-id The immutable ID of the corresponding partner registration.
        name: Name of the partner destination.
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: 'space-separated tags: key[=value] [key[=value] ...]. Use '''' to clear existing tags.'
examples:
    Create a partner destination with an activation message and expiration time.: |-
        az eventgrid partner destination create --location westus2 -g rg1 -n destination1 \
            --activation-expiration-date 2022-06-14T05:37:51.272Z \
            --message-for-activation "This is an activation message"
    Create a partner destination.: az eventgrid partner destination create --location westus2 -g rg1 -n destination1
