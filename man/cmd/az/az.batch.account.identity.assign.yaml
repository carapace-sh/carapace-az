# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: assign
description: Add managed identities to an existing batch account.
flags:
    --subscription=: Name or ID of subscription.
    --system-assigned=: Provide this flag to use system assigned identity for batch accounts.
    --user-assigned=: User Assigned Identity ids to be used for batch account.
    -g, --resource-group=!: Name of the resource group.
    -n, --name=!: Name of the batch account to show.
documentation:
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        name: Name of the batch account to show. If not specified will display currently set account.
        resource-group: Name of the resource group. If not specified will display currently set account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        system-assigned: Provide this flag to use system assigned identity for batch accounts. Check out help for more examples.
        user-assigned: User Assigned Identity ids to be used for batch account. Check out help for more examples.
examples:
    Add a system assigned managed identity to an existing batch account.: az batch account identity assign --name MyBatchAccount --resource-group MyResourceGroup --system-assigned
    Add a user assigned managed identity to an existing batch account.: az batch account identity assign --name MyBatchAccount --resource-group MyResourceGroup --user-assigned MyAssignedId
