# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: create
description: Create an Azure Compute Fleet
documentation:
    flag:
        alp: Represents the configuration for additional locations where Fleet resources may be deployed.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        cp: Compute Profile to use for running user's workloads.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        identity: The managed service identities assigned to this resource.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        plan: Details of the resource plan.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        resource-group: Name of resource group. You can configure the default group using `az configure --defaults group=<name>`
        rpp: Configuration Options for Regular instances in Compute Fleet.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        spp: Configuration Options for Spot instances in Compute Fleet.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        tags: Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        vma: Attribute based Fleet.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        vmsizeprof: List of VM sizes supported for Compute Fleet  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
        zones: Zones in which the Compute Fleet is available  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
flags:
    --alp=:
        description: Represents the configuration for additional locations where Fleet resources may be deployed.
        nargs: -1
    --cp=:
        description: Compute Profile to use for running user's workloads.
        nargs: -1
    --no-wait=:
        description: Do not wait for the long-running operation to finish.
        nargs: -1
    --rpp=:
        description: Configuration Options for Regular instances in Compute Fleet.
        nargs: -1
    --spp=:
        description: Configuration Options for Spot instances in Compute Fleet.
        nargs: -1
    --subscription=: Name or ID of subscription.
    --vma=:
        description: Attribute based Fleet.
        nargs: -1
    --vmsizeprof=:
        description: List of VM sizes supported for Compute Fleet  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
    -g, --resource-group=!: Name of resource group.
    -i, --identity=:
        description: The managed service identities assigned to this resource.
        nargs: -1
    -l, --location=: The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    -n, --name=!: The name of the Compute Fleet
    -p, --plan=:
        description: Details of the resource plan.
        nargs: -1
    -t, --tags=:
        description: Resource tags.
        nargs: -1
    -z, --zones=:
        description: Zones in which the Compute Fleet is available  Support shorthand-syntax, json-file and yaml-file.
        nargs: -1
completion:
    flag:
        no-wait:
            - "true"
            - t
            - "yes"
            - "y"
            - "1"
            - "false"
            - f
            - "no"
            - "n"
            - "0"
