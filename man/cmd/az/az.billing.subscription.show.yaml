# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: show
description: Get a subscription by its ID.
flags:
    --account-name=!: The ID that uniquely identifies a billing account.
    --subscription=: Name or ID of subscription.
documentation:
    command: |-
        Command group 'billing subscription' is in preview and under development. Reference and support levels:
        https://aka.ms/CLI_refstatus
    flag:
        account-name: The ID that uniquely identifies a billing account.
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
examples:
    Show the subscription information of a billing account: az billing subscription show --account-name "{billingAccountName}"
