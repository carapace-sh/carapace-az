# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: delete
description: Delete a managed Cassandra data center.
flags:
    --no-wait=: Do not wait for the long-running operation to finish.
    --subscription=: Name or ID of subscription.
    -c, --cluster-name=!: Cluster Name
    -d, --data-center-name=!: Datacenter Name
    -g, --resource-group=!: Name of resource group.
    -y, --yes=: Do not prompt for confirmation.
documentation:
    command: Deletes a Managed Cassandra Datacenter.
    flag:
        acquire-policy-token: Acquiring an Azure Policy token automatically for this resource operation.
        change-reference: The related change reference ID for this resource operation.
        cluster-name: Cluster Name.
        data-center-name: Datacenter Name.
        no-wait: |-
            Do not wait for the long-running operation to finish.

            Default value: False
        resource-group: Name of resource group. You can configure the default group using ``` az configure --defaults group=<name> ``` .
        subscription: Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`
        "yes": |-
            Do not prompt for confirmation.

            Default value: False
examples:
    Deletes a Managed Cassandra Datacenter in the given Cluster without waiting for the long-running operation to finish.: az managed-cassandra datacenter delete --resource-group MyResourceGroup --cluster-name MyCluster --data-center-name MyDataCenter --no-wait
    Deletes a Managed Cassandra Datacenter in the given Cluster.: az managed-cassandra datacenter delete --resource-group MyResourceGroup --cluster-name MyCluster --data-center-name MyDataCenter
