name: dependabot
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  az:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'carapace-sh/carapace-az'
    steps:
    - name: deep clone
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: check for docker changes
      id: docker-changed
      run: |
        if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '^(Dockerfile|compose\.yaml)$'; then
          echo "changed=true" >> "$GITHUB_OUTPUT"
        else
          echo "changed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: fix git safe.directory
      run:  git config --global --add safe.directory '*'

    - name: generate command table
      if: steps.docker-changed.outputs.changed == 'true'
      run: docker compose build && docker compose run --rm az > az_commands.json

    - name: setup go
      if: steps.docker-changed.outputs.changed == 'true'
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: generate specs
      if: steps.docker-changed.outputs.changed == 'true'
      run: go run -C cmd/carapace-spec-az . --target cmd/carapace-az/cmd/azcli --no-doc az_commands.json

    - name: install carapace-man
      if: steps.docker-changed.outputs.changed == 'true'
      run: go install github.com/carapace-sh/carapace-man@latest

    - name: generate man specs
      if: steps.docker-changed.outputs.changed == 'true'
      run: |
        go run -C cmd/carapace-spec-az . --stdout az_commands.json > /tmp/az-full-spec.yaml
        carapace-man update /tmp/az-full-spec.yaml man/cmd/az

    - name: generate code
      if: steps.docker-changed.outputs.changed == 'true'
      run: go generate ./cmd/carapace-az

    - name: push
      if: steps.docker-changed.outputs.changed == 'true'
      run: |
        if [ ! -z "$(git status --porcelain)" ]; then
          git config user.name rsteube-bot
          git config user.email rsteube-bot@users.noreply.github.com
          git add -A
          git commit -m "updated az specs"
          git push https://rsteube-bot:${DEPENDABOT_TOKEN}@github.com/carapace-sh/carapace-az.git HEAD:${GITHUB_HEAD_REF}
        fi
      env:
        DEPENDABOT_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}

  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'carapace-sh/carapace-az'
    needs: az
    steps:
      - name: approve
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: merge
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.DEPENDABOT_TOKEN}}
